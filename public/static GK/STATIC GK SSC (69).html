<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Sonal Mansingh is associated with which dance form?</span></p>\n",
    "options": [
      "Kuchipudi and Sattriya",
      "Bharatnatyam and Odissi",
      "Manipuri and kathak",
      "Manipuri and Kuchipudi"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b) <strong>Bharatnatyam and Odissi.</strong> <span style=\"font-family: Cambria Math;\">Sonal Mansingh is a prominent Indian classical dancer. </span><strong><span style=\"font-family: Cambria Math;\">Awards</span></strong><span style=\"font-family: Cambria Math;\"><strong>:</strong> Padma Bhushan (1992), Padma Vibhushan (2003). </span><strong><span style=\"font-family: Cambria Math;\">8 classical dance forms in India</span></strong><span style=\"font-family: Cambria Math;\"><strong>:</strong> Bharatanatyam (Tamil Nadu), Kathak (Uttar Pradesh), Odissi (Odisha), Manipuri (Manipur), Mohiniyattam (Kerala), Kuchipudi (Andhra Pradesh), Kathakali (Kerala), Sattriya (Assam). </span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Who was/is a successful Indian business tycoon and was the founder of Reliance Industries?</span></p>\n",
    "options": [
      "Dhirubhai Ambani",
      "Anant Ambani",
      "Mukesh Ambani",
      "Akash Ambani"
    ],
    "correct_option_id": 0,
    "solution": "<p>2.(a)<span style=\\\"font-family: Cambria Math;\\\"> </span><strong><span style=\\\"font-family: Cambria Math;\\\">Dhirubhai Ambani</span></strong><span style=\\\"font-family: Cambria Math;\\\"> (founded Reliance Industries in 1958, Maharashtra) took Reliance public in 1977. In 2016, he was honoured posthumously with the Padma Vibhushan. Reliance Industries\\'s Chairman and Managing Director - Mukesh D. Ambani.</span></p>\\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Nasik is also known as _____ capital of India.</span></p>\n",
    "options": [
      "Wine",
      "Gold",
      "Orange",
      "Cotton"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Wine</strong>. <span style=\"font-family: Cambria Math;\">Nashik (</span><span style=\"font-family: Cambria Math;\"><strong>\"Wine Capital of India\"</strong>)</span><span style=\"font-family: Cambria Math;\"> holds almost half of the wineries in India. Wine is composed of ethanol (12%). Nashik is situated on the banks of river</span><span style=\"font-family: Cambria Math;\"> <strong>Godavari</strong></span><span style=\"font-family: Cambria Math;\">. The Godavari starts from Trimbakeshwar, Maharashtra and flows to the Bay of Bengal. It is also known for hosting the</span><span style=\"font-family: Cambria Math;\"> <strong>Kumbh Mela every</strong></span><span style=\"font-family: Cambria Math;\"> 12 years. </span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Who was conferred with the Ashok Chakra for his gallantry in 26/11 Mumbai terrorist attacks?</span></p>\n",
    "options": [
      "Mohan Chand Sharma",
      "Hemant Karkare",
      "R P Diengdoh",
      "Mohit Sharma"
    ],
    "correct_option_id": 1,
    "solution": "<p>4.(b) <strong>Hemant Karkare</strong><span style=\\\"font-family: Cambria Math;\\\"> was the chief of the Mumbai Anti-Terrorist Squad (ATS). He was killed in action during the 2008 Mumbai attacks. In 2009, he was posthumously given the Ashoka Chakra, India\\'s highest peacetime gallantry decoration.</span></p>\\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which of the following temple is situated in Tamil Nadu?</span></p>\n",
    "options": [
      "Shore temple",
      "Kailasa temple",
      "Virupaksha temple",
      "Jagannatha temple"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a)<span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">The Shore Temple</span></strong><span style=\"font-family: Cambria Math;\"> (Dravidian style). It is located in Mahabalipuram (Tamil Nadu). It was designated a</span><span style=\"font-family: Cambria Math;\"> UNESCO</span><span style=\"font-family: Cambria Math;\"> World Heritage site in 1984. It was built probably in the reign of Narasimhavarman II. </span><strong><span style=\"font-family: Cambria Math;\">The Kailasa or Kailasanatha temple</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(Ellora Caves, Maharashtra), </span><strong><span style=\"font-family: Cambria Math;\">Virupaksha Temple</span></strong><span style=\"font-family: Cambria Math;\"> ( Hampi, Karnataka), </span><strong><span style=\"font-family: Cambria Math;\">Jagannatha Temple</span></strong><span style=\"font-family: Cambria Math;\"> (Puri, Odisha).</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which among the following is the official sport of Maharashtra, as of 2022?</span></p>\n",
    "options": [
      "Mallakhamb",
      "Kalaripayattu",
      "Sand sculptures",
      "Dahi-Handi"
    ],
    "correct_option_id": 3,
    "solution": "<p>6.<span style=\"font-family: Cambria Math;\">(d) <strong>Dahi-Handi.</strong> </span><span style=\"font-family: Cambria Math;\">It is an entertainment and competitive event celebrated with Hindu festival Krishna Janmashtami (birth of god Krishna). </span><span style=\"font-family: Cambria Math;\"><strong>Madhya Pradesh </strong>(</span><span style=\"font-family: Cambria Math;\">Mallakhamb</span><span style=\"font-family: Cambria Math;\">), <strong>Kerala </strong></span><span style=\"font-family: Cambria Math;\">(Kalaripayattu).</span><span style=\"font-family: Cambria Math;\"> <strong>Puri Beach</strong> <strong>(Odisha)</strong> </span><span style=\"font-family: Cambria Math;\">&ndash; Sudarsan Pattnaik is here where he showcases his sand arts. </span><strong><span style=\"font-family: Cambria Math;\">Mysore Sand Sculpture Museum</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>&ndash; It is home to several sand models and was founded by M N Gowri.</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Who among the following authors wrote \"The Living Mountain\"?</span></p>\n",
    "options": [
      "Amitav Ghosh",
      "Nitin Gokhale",
      "Anindya Dutta",
      "Kabir Bedi"
    ],
    "correct_option_id": 0,
    "solution": "<p>7.<span style=\"font-family: Cambria Math;\">(a) <strong>Amitav Ghosh.</strong> </span><span style=\"font-family: Cambria Math;\">&lsquo;Manohar Parrikar: &ldquo;Brilliant Mind, Simple Life&rdquo; </span><span style=\"font-family: Cambria Math;\"><strong>by Nitin Gokhale</strong>.</span><span style=\"font-family: Cambria Math;\"> &ldquo;Advantage India: The Story of Indian Tennis&rdquo; by </span><strong><span style=\"font-family: Cambria Math;\">Anindya Dutta.</span></strong><span style=\"font-family: Cambria Math;\"><strong> &ldquo;</strong>Stories I Must Tell: Emotional Life of an Actor&rdquo; autobiography by </span><strong><span style=\"font-family: Cambria Math;\">Kabir Bedi</span><span style=\"font-family: Cambria Math;\">.</span></strong></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> dance is introverted and restrained compared to most other dances of India - the artist never establishes eye contact with the audience.</span></p>\n",
    "options": [
      "Kathakali",
      "Manipuri",
      "Kuchipudi",
      "Bharatnatyam"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.<span style=\"font-family: Cambria Math;\">(b) <strong>Manipuri. Kathakali (Kerala)</strong>,</span><span style=\"font-family: Cambria Math;\"> It is associated with the storytelling form of this art. </span><strong><span style=\"font-family: Cambria Math;\">Kuchipudi </span></strong><span style=\"font-family: Cambria Math;\">(Andhra pradesh), It is a dance-drama performance art. </span><strong><span style=\"font-family: Cambria Math;\">Bharatnatyam</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(Tamil Nadu). It is a solo dance performed only by women, A form of illustrative of Hindu religious themes and spiritual ideas emoted by dancers with excellent footwork and impressive gestures.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> A ritual bath named \"Shahi Snan\" is a major event of which of the following festival?</span></p>\n",
    "options": [
      "Teej",
      "Holi",
      "Diwali",
      "Kumbh Mela"
    ],
    "correct_option_id": 3,
    "solution": "<p>9.<span style=\"font-family: Cambria Math;\">(d) <strong>Kumbh Mela</strong>.</span><span style=\"font-family: Cambria Math;\"> It is celebrated after a cycle of approximately 12 years when Jupiter completes one revolution in its orbit. It is celebrated at four river-bank pilgrimage sites: </span><strong><span style=\"font-family: Cambria Math;\">Prayagraj </span></strong><span style=\"font-family: Cambria Math;\">(Ganges-Yamuna-Sarasvati rivers confluence), </span><strong><span style=\"font-family: Cambria Math;\">Haridwar </span></strong><span style=\"font-family: Cambria Math;\">(Ganges), </span><span style=\"font-family: Cambria Math;\">Nashik </span><span style=\"font-family: Cambria Math;\">(Godavari), and </span><span style=\"font-family: Cambria Math;\">Ujjain </span><span style=\"font-family: Cambria Math;\">(Shipra). At </span><strong><span style=\"font-family: Cambria Math;\">Prayagraj</span></strong><span style=\"font-family: Cambria Math;\">, Ardh kumbh Mela is held every 6 years and Maha Kumbh at every 12 years.</span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> What is the full form of RPG?</span></p>\n",
    "options": [
      "Report Program Generator",
      "Random Program Generator",
      "Report Process Generator",
      "Random Process Generator"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.<span style=\"font-family: Cambria Math;\">(a) <strong>Report Program Generator.</strong> </span><span style=\"font-family: Cambria Math;\">It is a high-level programming language for business applications, introduced in 1959 for the IBM 140.</span><span style=\"font-family: Cambria Math;\"> <strong>Some Major High Language</strong></span><span style=\"font-family: Cambria Math;\"> - Python, Java, C++, JavaScript and C#.</span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Market Based Economic Dispatch (MBED) Mechanism is related with which of the following ministry?</span></p>\n",
    "options": [
      "Ministry of Power",
      "Ministry of Corporate Affairs",
      "Ministry of Finance",
      "Ministry of Micro, Small and Medium Enterprises"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>The Ministry of Power<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The Market-Based Economic Dispatch (MBED)</span></strong><span style=\"font-family: Cambria Math;\"> mechanism proposes a centralised scheduling of power dispatches, both inter-state and intra-state. </span><strong><span style=\"font-family: Cambria Math;\">The Electricity Act, 2003</span></strong><span style=\"font-family: Cambria Math;\"> - An Act to consolidate the laws relating to generation, transmission, distribution, trading and use of electricity. </span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\"> Who is the author of the book \\'Elephant in the Womb\\'?</span></p>\\n",
    "options": [
      "Twinkle Khanna",
      "Konkana Sen Sharma",
      "Kalki Koechlin",
      "Farhan Akhtar"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c) <strong>Kalki Koechlin. Other famous</strong> <span style=\"font-family: Cambria Math;\">Books written by Actresses - </span><span style=\"font-family: Cambria Math;\"><strong>Twinkle Khanna:</strong> &ldquo;</span><span style=\"font-family: Cambria Math;\">Mrs Funnybones&rdquo;, &ldquo;The Legend of Lakshmi Prasad&rdquo;, &ldquo;Pyjamas Are Forgiving&rdquo;, </span><strong><span style=\"font-family: Cambria Math;\">Priyanka Chopra</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- &ldquo;Unfinished&rdquo;,</span><span style=\"font-family: Cambria Math;\"> <strong>Soha ali khan</strong></span><span style=\"font-family: Cambria Math;\"> - &ldquo;The perils of being moderately famous&rdquo;, </span><strong><span style=\"font-family: Cambria Math;\">Sonali Bendre</span></strong><span style=\"font-family: Cambria Math;\"> - &ldquo;Modern Gurukul&rdquo;, </span><span style=\"font-family: Cambria Math;\">Shilpa shetty</span><span style=\"font-family: Cambria Math;\"> - &ldquo;The Diary of domestic Diva&rdquo;,</span><span style=\"font-family: Cambria Math;\"> <strong>Gauri Khan</strong></span><span style=\"font-family: Cambria Math;\"> - &ldquo;My life in Design&rdquo;.</span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Ganga Dussehra takes place every year on the ________ day of Shukla Paksha of Jyeshtha month.</span></p>\n",
    "options": [
      "6th",
      "8th",
      "10th",
      "12th"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>10th. Ganga Dussehra (Gangavataran) </strong>- <span style=\"font-family: Cambria Math;\">Hindu festival, marks the descendance of river Ganga on Earth. </span><span style=\"font-family: Cambria Math;\">Holi: </span><span style=\"font-family: Cambria Math;\">full moon date (Purnima) of Falgun month (Feb-March). </span><span style=\"font-family: Cambria Math;\"><strong>Diwali</strong>: </span><span style=\"font-family: Cambria Math;\">new moon day or Amavasya of Kartik month (Oct-Nov). </span><strong><span style=\"font-family: Cambria Math;\">Raksha Bandhan: </span></strong><span style=\"font-family: Cambria Math;\">full moon day in the holy month of Shravana.</span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> \"Living root bridges\" is an iconic structure found in which state?</span></p>\n",
    "options": [
      "Meghalaya",
      "West Bengal",
      "Himachal Pradesh",
      "Assam"
    ],
    "correct_option_id": 0,
    "solution": "<p>14.(a) <strong>Meghalaya. Living root bridges </strong><span style=\"font-family: Cambria Math;\">(Jing Kieng Jri) - The aerial bridges, built by weaving and adjusting the roots of the Indian rubber tree. Other Famous root bridges - Riwai Root Bridge and Umshiang Double Decker Bridge. Properties - Elastic, easily combined, grows in rough and rocky soils. Grown by Khasi and Jaintia tribes of Meghalaya.</span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The Garba dance is performed in which state?</span></p>\n",
    "options": [
      "Haryana",
      "Kerala",
      "Gujarat",
      "Punjab"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>Gujarat. Garba: </strong><span style=\"font-family: Cambria Math;\">Performed during Shardiya Navratri (September-October). Other dances of Gujarat: Garba, Dandiya Ras, Tippani Juriun, Bhavai. </span><span style=\"font-family: Cambria Math;\"><strong>Haryana</strong>: </span><span style=\"font-family: Cambria Math;\">Jhumar, Phag Dance, Daph, Dhamal, Loor, Gugga, Khor, Gagor. </span><span style=\"font-family: Cambria Math;\"><strong>Kerala</strong>: </span><span style=\"font-family: Cambria Math;\">Ottam Thulal, Kaikottikali, Tappatikali, Mohiniattam. </span><span style=\"font-family: Cambria Math;\"><strong>Punjab</strong>: </span><span style=\"font-family: Cambria Math;\">Bhangra, Giddha, Daff, Dhaman, Bhand, Naqual.</span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
