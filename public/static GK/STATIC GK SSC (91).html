<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. In which year did Abhinav Bindra create history by becoming the first Indian to win an individual gold medal in the 10m air rifle event at the Olympic Games ?</p>",
    "options": [
      "2005",
      "2000",
      "2008",
      "2010"
    ],
    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>2008.</strong> Indian shooters (Medal Achievements) in Olympics- Rajyavardhan Singh Rathore : Silver (Athens 2004). Gagan Narang : Bronze (London 2012). Vijay Kumar : Silver (London 2012). Manu Bhaker : Bronze (Paris 2024). Swapnil Kusale : Bronze (Paris 2024).</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Durand Cup is related to which sport ?</p>",
    "options": [
      "Cricket",
      "Badminton",
      "Hockey",
      "Football"
    ],
    "correct_option_id": 3,
    "solution": "<p>2.(d) <strong>Football. </strong>Durand Cup is Asia&rsquo;s oldest and the world&rsquo;s third oldest football tournament. It was started at Shimla in 1888 by Sir Henry Mortimer Durand. Other trophy related to Football : Santosh Trophy, Subroto Mukherjee Cup, Vittal Trophy, Kalinga Cup, Scissor Cup, etc.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Varahamihira\\'s work Panchasiddhantika deals with ______ astronomical systems.</p>",
    "options": [
      "three",
      "two",
      "four",
      "five"
    ],
    "correct_option_id": 3,
    "solution": "<p>3.(d) <strong>five.</strong> Varahamihira was an Indian philosopher, astronomer, and mathematician who served in the court of Chandragupta II. He was born in Ujjain. Varahamihira is famous for his works, including Brihat Jataka, Brihat Samhita, and Pancha-Siddhantika.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Shiv Kumar Sharma\\'s name is famous for the Indian classical musical instrument, _______ .</p>",
    "options": [
      "Shehnai",
      "Sitar",
      "Tabla",
      "Santoor"
    ],
    "correct_option_id": 3,
    "solution": "<p>4.(d) <strong>Santoor. </strong>Shiv Kumar Sharma was awarded the Sangeet Natak Akademi Award (in 1986), Padma Shri (in 1991) and the Padma Vibhushan (in 2001). Other Santoor players : Rahul Sharma, Tarun Bhattacharya, Ulhas Bapat, Satish Vyas, etc.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. In which year did the father of the Green Revolution in India die ?</p>",
    "options": [
      "1993",
      "2013",
      "2023",
      "2003"
    ],
    "correct_option_id": 2,
    "solution": "<p>5.(c) <strong>2023.</strong> MS Swaminathan was born in 1925 in Kumbakonam, Tamil Nadu. He was instrumental in his pivotal role in the Green Revolution in India during the 1960s and 1970s. In 1987, he was awarded the World Food Prize. Other awards: Padma Shri in 1967, Padma Bhushan in 1972, Padma Vibhushan in 1989 and Bharat Ratna in 2024.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. The folk dance \\'Jatra\\' originated from which of the following states ?</p>",
    "options": [
      "Punjab",
      "Tamil Nadu",
      "West Bengal",
      "Haryana"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(c) <strong>West Bengal. </strong>Jatra, a traditional folk theatre form, is renowned for its energetic performances that blend music, dance, and dramatic storytelling, often based on Hindu mythology, folklore, and historical events. Other folk dances of West Bengal : Chhau Dance, Kirtan Dance, Baul Dance, Dhali Dance, Gambhira Dance, Tushu Dance, Mundari dance, Rabha Dances , etc.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. In which Indian state is Kambala, the traditional buffalo race, conducted during the winter months to celebrate the harvest season ?</p>",
    "options": [
      "Telangana",
      "Karnataka",
      "Kerala",
      "Tamil Nadu"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.(b) <strong>Karnataka. </strong>The Kambala festival season starts in November and lasts till March. The festival is dedicated to Lord Kadri Manjunatha, an incarnation of Lord Shiva. Festivals of Karnataka : Ugadi, Hampi Festival, Pattadakal, Mysore Dasara, Karaga festival, Karnataka Rajyotsava.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Brahmotsavam festival is historically native to which of the following states ?</p>",
    "options": [
      "Andhra Pradesh",
      "Kerala",
      "Karnataka",
      "Tamil Nadu"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) <strong>Andhra Pradesh.</strong> Brahmotsavam (Hindu festival) is a significant annual festival celebrated at the Tirumala Temple. Famous Festivals of Andhra Pradesh: Pongal, Vinayaka Chaturthi, Visakha Utsav, Tirupati Tirumala Brahmotsavam, Lumbini Festival, Rayalaseema Food &amp; Dance Festival, Deccan Festival.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. The National Rural Employment Guarantee Act (NREGA) aims to provide a guarantee of how many days of employment per year to rural households in India ?</p>",
    "options": [
      "100",
      "50",
      "1000",
      "75"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a) <strong>100. </strong>Mahatma Gandhi National Rural Employment Guarantee Act 2005 (MGNREGA) earlier known as the National Rural Employment Guarantee Act or NREGA. Introduced by - Raghuvansh Prasad Singh, the then Minister of Rural Development.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. In Football a direct ______ is awarded if a player commits any of the following offences against an opponent in a manner considered by the referee to be careless, reckless or using excessive force:</p>",
    "options": [
      "head kick",
      "court kick",
      "free kick",
      "hat trick"
    ],
    "correct_option_id": 2,
    "solution": "<p>10.(c) <strong>free kick. </strong>A penalty kick is a term used in soccer, where it refers to a free kick taken from the penalty spot after a foul has been committed inside the penalty area. Important terms of Football: Corner kick, direct free kick, indirect free kick, dribble, goal kick, penalty, hat trick, off side, tripping.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Sonal Mansingh is mainly associated with which dance style ?</p>",
    "options": [
      "Bharatnatyam and Sattriya",
      "Odissi and Bharatanatyam",
      "Odissi and Kathak",
      "Bharatnatyam and Kathak"
    ],
    "correct_option_id": 1,
    "solution": "<p>11.(b) <strong>Odissi and Bharatanatyam. </strong>Sonal Mansingh has been nominated by the President of India to become a Member of Parliament, Rajya Sabha. She is the Youngest recipient of Padma Bhushan in 1992 and Padma Vibhushan in 2003.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Which of the following pair of sports persons - sports associated with is correct ?<br>I. Manu Bhaker - Shooting<br>II. Tajinderpal Singh Toor - Shotput</p>",
    "options": [
      "Neither I nor II",
      "Only I",
      "Both I and II",
      "Only II"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c) <strong>Both I and II. </strong>Manu Bhaker is an Olympic medalist who won two bronze medals at the 2024 Summer Olympics in Paris in women\\'s 10m air pistol event and mixed 10m air pistol event. She became the first Indian female Shooter to win a medal at Olympics. Tajinderpal Singh Toor is a two-time Asian champion, an Asian Games gold-medallist, four time national champion.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Renowned violinist - ______trained in Carnatic music as well as Western classical music.</p>",
    "options": [
      "Ravi Shankar",
      "Ustad Zakir Hussain",
      "Ustad Bismillah Khan",
      "Lakshminarayana Subramaniam"
    ],
    "correct_option_id": 3,
    "solution": "<p>13.(d) <strong>Lakshminarayana Subramaniam : </strong>Awards - Padma Bhushan (2001). Ravi Shankar was an Indian sitarist and composer. Award : Bharat Ratna (1999). Ustad Zakir Hussain is widely considered as one of the greatest tabla players of all time. Ustad Bismillah Khan was an Indian musician credited with popularizing the Shehnai.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Which dance style was kept alive by the Devadasis ?</p>",
    "options": [
      "Odissi",
      "Bharatnatyam",
      "Kathakali",
      "Kuchipudi"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>Bharatnatyam.</strong> Its origin can be traced from back to Sadir - the solo dance of temple dancers or devadasis in Tamil Nadu. Eight classical dances: Bharatanatyam (Tamil Nadu), Kathak (Uttar Pradesh), Kathakali (Kerala), Kuchipudi (Andhra Pradesh), Manipuri (Manipur), Mohiniyattam (Kerala), Odissi (Odisha), Sattriya (Assam).</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Which sport is played by the Indian sportsperson Sania Mirza ?</p>",
    "options": [
      "Table Tennis",
      "Lawn Tennis",
      "Hockey",
      "Badminton"
    ],
    "correct_option_id": 1,
    "solution": "<p>15.(b)<strong> Lawn Tennis.</strong> It is a form of tennis, played with a soft ball on an open court. Famous Tennis Players: Leander Paes, Mahesh Bhupathi, Rohan Bopanna, Vijay Amritraj, Ramanathan Krishnan, Ramesh Krishnan, Somdev Devvarman, Yuki Bhambri, Novak Djokovic, Rafael Nadal, Roger Federer, Serena Williams.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
