<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. In Microsoft PowerPoint, what is the shortcut key combination to insert a new slide in a presentation?</p>",
    "options": [
      "Ctrl + I",
      "Ctrl + N",
      "Ctrl + D",
      "Ctrl + M"
    ],
    "correct_option_id": 3,
    "solution": "<p>1.(d)<strong> Ctrl + M.</strong> Microsoft PowerPoint is a presentation program, created by Robert Gaskins, Tom Rudkin and Dennis Austin at a software company named Forethought, Inc. Shortcut keys in Microsoft Powerpoint : Ctrl + I - Add or remove italics to selected text. Ctrl + N - Create a new slide. Ctrl + D - Duplicate the selected object or slide.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. In Kabaddi, a super tackle is when a raider is caught/self out/declared out with or less than how many defenders defending?</p>",
    "options": [
      "Six",
      "Five",
      "Three",
      "Four"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>Three.</strong> Kabaddi is a contact team sport that originated in India and is popular in many South Asian countries. The game is played with two teams of seven players each. Other terminologies in Kabaddi : Chain Tackle - A defensive tactic where the opponents form chains by holding hands in twos or threes. Dubki - An escape technique used by raiders who face a chain tackle. Golden Raid - It happens when there is a tie between two teams at the end of extra time.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Who among the following wrote the popular Telugu patriotic song &lsquo;Desamunu preminchumanna, manchi annadi penchumanna&rsquo; meaning &lsquo;Love the nation, grow the goodness&rsquo;?</p>",
    "options": [
      "Gurajada Apparao",
      "Sri Krishnadevaraya",
      "Bammera Potana",
      "Goparaju Ramachandra Rao"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Gurajada Apparao.</strong> Gurajada Venkata Apparao was an Indian playwright, dramatist, poet, and writer known for his works in Telugu theatre. Rao wrote the play Kanyasulkam in 1892, which is considered as the greatest play in the Telugu language. He holds the titles Kavisekhara and Abyudaya Kavitha Pithamahudu. In 1910, Rao scripted the widely known Telugu patriotic song \"Desamunu Preminchumanna\".</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. How can you insert a blank row at the top of a worksheet?</p>",
    "options": [
      "Drag the mouse on the row border to select the row and click Insert in the Cells group on the Home tab",
      "Click on the row number and press the Insert key on the keyboard",
      "Click on the row number and press the Delete key on the keyboard.",
      "Right-click on the row number and select Insert."
    ],
    "correct_option_id": 0,
    "solution": "<p>4.(a) Microsoft Excel is a spreadsheet editor developed by Microsoft for Windows, macOS, Android, iOS and iPadOS. It features calculation or computation capabilities, graphing tools, pivot tables, and a macro programming language called Visual Basic for Applications (VBA). Excel forms part of the Microsoft 365 suite of software.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Which folk music of Jammu and Kashmir is sung in wedding ceremonies?</p>",
    "options": [
      "Alha",
      "Wanawun",
      "Panihari",
      "Baul"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Wanawun.</strong> It is usually performed by women, who sing and dance together, accompanied by traditional instruments like the tarang (a type of drum) and the tumbaknari (a single-headed drum). Other folk music: Alha - Uttar Pradesh and Madhya Pradesh. Panihari - Rajasthan. Baul - West Bengal.</p>",
    "question_index": 4
  },
  {
    "question": "Which of the following statements is correct with respect to the Badminton game and match length?",
    "options": [
      "A match consists of the best of two games of 21 points",
      "A match consists of the best of five games of 21 points",
      "A match consists of the best of three games of 21 points.",
      "A match consists of the best of four games of 21 points."
    ],
    "correct_option_id": 2,
    "solution": "6.(c) In badminton, a standard match is played as the best of three games. Each game is played to 21 points, and a player must win by at least a 2-point margin. If the score reaches 20-20, the game continues until one player or team leads by 2 points up to a maximum of 30 points. The player or team that wins two out of three games wins the match.",
    "question_index": 5
  },
  {
    "question": "<p>7. What kind of technology is most frequently used to manage and digitise e-land records?</p>",
    "options": [
      "Virtual Reality (VR)",
      "Blockchain",
      "Augmented Reality (AR)",
      "Geographic Information System (GIS)"
    ],
    "correct_option_id": 3,
    "solution": "<p>7.(d)<strong> Geographic Information System (GIS</strong>) allows for the effective mapping, analysis, and management of land data by integrating spatial and attribute information. It provides tools for creating detailed maps, analyzing land use patterns, and managing land records efficiently. Blockchain technology can enhance security and transparency, and VR and AR have potential applications.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Which of the following Indian classical dances has originated from Andhra Pradesh?</p>",
    "options": [
      "Odissi",
      "Kuchipudi",
      "Kathakali",
      "Mohiniattam"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b) <strong>Kuchipudi.</strong> Other states and their classical dance: Assam - Sattriya, Tamil Nadu - Bharatanatyam, Kerala - Kathakali, Mohiniattam, Odisha - Odissi, Manipur - Manipuri, Uttar Pradesh - Kathak.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Jamshedi Navroz is a festival of _________ community.</p>",
    "options": [
      "Christian",
      "Hindu",
      "Parsi",
      "Jain"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>Parsi.</strong> Navroz has links with the legend of King Jamshid of Iran, also called Jamshedi Navroz. It is celebrated on the first day of the first month of the Fasli calendar, which usually falls on August 18 or August 19. Other religious festivals: Christian - Christmas and Easter. Muslim - Ramadan and Eid ul-Fitr. Hindu - Diwali, Holi, Makar Sankranti, Dussehra, etc. Parsi - Pateti Festival, Gahambars, Zarthost No Deeso, Khordad Sal. Jain - Paryushan Mahaparva, Navpad Oli, The Birthday of Mahavir.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Who was the first female Indian wrestler to win Gold at the Commonwealth Games?</p>",
    "options": [
      "Babita Phogat",
      "Alka Tomar",
      "Geeta Phogat",
      "Sakshi Malik"
    ],
    "correct_option_id": 2,
    "solution": "<p>10.(c) <strong>Geeta Phogat.</strong> She achieved this feat in the 55 kg freestyle category at the 2010 Commonwealth Games held in Delhi, India. Babita Phogat secured silver in 2010. She won her first Commonwealth Games gold in 2014. Sakshi Malik earned a bronze medal at the 2016 Rio Olympics.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. The Yakshagana is the dance-drama primarily associated with which of the following states?</p>",
    "options": [
      "Bihar",
      "Odisha",
      "Himachal Pradesh",
      "Karnataka"
    ],
    "correct_option_id": 3,
    "solution": "<p>11.(d) <strong>Karnataka.</strong> Other states Dance: Bihar - Jat-Jatin, Bidesia, Jhijhian, Kathghorwa, etc. Odisha - Odissi, Chhau, Gotipua, Sambalpuri, etc. Himachal Pradesh - Nati, Kulluvi, etc. Kerala - Kathakali, Mohiniyattam, Thiruvathira, etc. Chhattisgarh - Panthi, Raut Nacha, Karma, Saila, etc.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. In field hockey, in a penalty stroke, an attacker shoots at goal from _________ yards away&nbsp;in a one-on-one confrontation with the goalkeeper.</p>",
    "options": [
      "10",
      "8",
      "7",
      "9"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c) <strong>7</strong>. Field hockey is an eleven-a-side game played on a pitch measuring 91.4 meters long by 55 meters wide (approximately 100 yards by 60 yards). Each team consists of 10 field players and one goalkeeper.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. The number of Indian athletes who participated in the Tokyo Paralympics 2020 was ________ .</p>",
    "options": [
      "57",
      "56",
      "54",
      "55"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>54.</strong> The 2020 Summer Paralympics, the 16th edition, was hosted in Tokyo, Japan, with the motto \"United by Emotion.\" It featured 4,403 athletes competing in 539 events across 22 sports. The 17th edition, the 2024 Summer Paralympics, was hosted in Paris, France, with the motto \"Games Wide Open,\" featuring 4,463 athletes, including 84 from India, competing in 549 events across 22 sports.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. In which year was the first underground section (Vishwavidyalaya - Kashmere Gate) of&nbsp;the Golden Route opened in New Delhi?</p>",
    "options": [
      "2004",
      "2000",
      "1998",
      "1997"
    ],
    "correct_option_id": 0,
    "solution": "<p>14.(a) <strong>2004.</strong> The Red Line, the inaugural line of the Delhi Metro, was officially opened in December 2002, by the then Prime Minister of India, Atal Bihari Vajpayee.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Guru Vempati Chinna Satyam is a famous dancer of _________ dance form of India.</p>",
    "options": [
      "Bharatanatyam",
      "Kuchipudi",
      "Manipuri",
      "Odissi"
    ],
    "correct_option_id": 1,
    "solution": "<p>15.(b) <strong>Kuchipudi.</strong> Vempati Chinna Satyam was awarded the Padma Bhushan in 1998 and the Sangeet Natak Akademi Fellowship in 1967. Famous Classical Dances and Dancers: Kuchipudi - Yamini Krishnamurti, Raja and Radha Reddy. Bharatanatyam - Padma Subrahmanyam, Alarmel Valli, Mallika Sarabhai. Manipuri - Nirmala Mehta, Guru Bipin Sinha. Odissi - Sujata Mohapatra, Ratikant Mohapatra, Meera Das, Kelucharan Mohapatra.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
