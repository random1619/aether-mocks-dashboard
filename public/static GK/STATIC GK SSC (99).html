<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="28">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">14</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">28 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1.<span style=\"font-family: Roboto;\"> In which of the following years were two additional Commissioners appointed to the Election commission of India for the first time?</span></p>",
    "options": [
      "1989",
      "1991",
      "1990",
      "1998"
    ],
    "correct_option_id": 0,
    "solution": "<p>1.(a)<span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">Originally the commission had only a Chief Election Commissioner. It currently consists of the Chief Election Commissioner and two Election Commissioners. For the first time two additional Commissioners were appointed on 16th October 1989 but they had a very short tenure till 1st January 1990.</span></p>",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Roboto;\">Which of the following years is called the Year of the Great Divide in the demographic history of India?&nbsp;</span></p>",
    "options": [
      "1951",
      "1921",
      "1931",
      "1911"
    ],
    "correct_option_id": 1,
    "solution": "<p>2.(b) <span style=\"font-family: Roboto;\">The year 1921 is a &ldquo;year of the great divide&rdquo; in the demographic history of India when mortality started to decline leading to acceleration in the rate of population growth (the second stage).</span></p>",
    "question_index": 1
  },
  {
    "question": "<p>3.<span style=\"font-family: Roboto;\"> Who among the following founded the Bombay Stock Exchange?</span></p>",
    "options": [
      "Ashishkumar Chauhan",
      "Premchand Roychand",
      "Vikramjit Sen",
      "Roychand Deepchand"
    ],
    "correct_option_id": 1,
    "solution": "<p>3.(b)<span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">The Bombay stock exchange was founded by Premchand Roychand. He made a fortune in the stockbroking business and came to be known as the Cotton King, the Bullion King or just the Big Bull.</span></p>",
    "question_index": 2
  },
  {
    "question": "<p>4.<span style=\\\"font-family: Roboto;\\\"> Which of the following was previously known as \\'the Lady Willingdon Park\\'.</span></p>",
    "options": [
      "Buddha Jayanti Park",
      "Mughal Gardens",
      "Deer Park",
      "Lodhi Gardens"
    ],
    "correct_option_id": 3,
    "solution": "<p>4.(d) <span style=\"font-family: Roboto;\">Lady Willingdon Park, was inaugurated in April 1936. It was renamed Lodhi Gardens after 1947.</span></p>",
    "question_index": 3
  },
  {
    "question": "<p>5.<span style=\"font-family: Roboto;\"> The 14th Dalai Lama resides in ______.</span></p>",
    "options": [
      "Gangtok",
      "Dharamsala",
      "Kalimpong",
      "Shillong"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <span style=\"font-family: Roboto;\">Dalai lama lives in Dharamshala in Himachal pradesh. He has been living there since 1959, when he was forced to escape into exile after the brutal suppression of Tibetean national uprising by the Chinese troops.</span><span style=\"font-family: Roboto;\">.</span></p>",
    "question_index": 4
  },
  {
    "question": "<p>6. <span style=\\\"font-family: Roboto;\\\">Georg Simon Ohm in whose honor we have the famous Ohm\\'s Law, hailed from which country?</span></p>",
    "options": [
      "Germany",
      "Spain",
      "Poland",
      "Russia"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.<span style=\\\"font-family: Roboto;\\\">(a)</span><span style=\\\"font-family: Roboto;\\\"> </span><span style=\\\"font-family: Roboto;\\\">Georg Simon Ohm was a German physicist, best known for his &ldquo;Ohm\\'s Law&rdquo;. </span></p>",
    "question_index": 5
  },
  {
    "question": "<p>7. <span style=\"font-family: Roboto;\">The Indus Waters Treaty was signed between India and Pakistan on ______.</span></p>",
    "options": [
      "16 December 1963",
      "19 September 1960",
      "18 October 1969",
      "12 November 1959"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.<span style=\"font-family: Roboto;\">(b)</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">The Indus Waters Treaty (IWT) was signed in Karachi on September 19, 1960 by the first Prime Minister of India Pandit Jawaharlal Nehru and then President of Pakistan Ayub Khan.</span></p>",
    "question_index": 6
  },
  {
    "question": "<p>8.<span style=\"font-family: Roboto;\"> Which of the following monuments is NOT a part of the Qutub Complex?</span></p>",
    "options": [
      "Buland Darwaza",
      "Qutub Minar",
      "Quwwat-ul-Islam Mosque",
      "Alai Darwaza"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a)<span style=\\\"font-family: Roboto;\\\"> Buland Darwaza is not a part of the Qutub Complex it is situated in Fatehpur Sikri UP. Following are the parts of Qutub minar: Alai Darwaza, Qutub Minar, Quwwat-ul-Islam Mosque, Iron pillar.</span><br><span style=\\\"font-family: Roboto;\\\">Tombs: Tomb of Iltutmish, Tomb of Imam Zamin, Ala-ud-din Khilji\\'s tomb and madrasa, Alai Minar of Khalji. </span></p>",
    "question_index": 7
  },
  {
    "question": "<p>9. <span style=\"font-family: Roboto;\">Which ISO certification pertains to Environmental Management Systems?&nbsp;</span></p>",
    "options": [
      "9001",
      "22000",
      "14001",
      "27001"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c)<span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">ISO 14001 is the international standard that specifies requirements for an effective environmental management system. </span></p>",
    "question_index": 8
  },
  {
    "question": "<p>10.<span style=\"font-family: Roboto;\"> Which of the following martial art forms is practiced in the state of Punjab and West Bengal?</span></p>",
    "options": [
      "Lathi",
      "Mardaani Khel",
      "Kalaripayattu",
      "Thang-ta"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.(a)<span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">Lathi or stick martial arts practiced in Punjab and Bengal region of India. Lathi still remains a popular sport in Indian villages.</span></p>",
    "question_index": 9
  },
  {
    "question": "<p>11.<span style=\"font-family: Roboto;\"> The Mission of the Ramsar Convention is to conserve______.</span></p>",
    "options": [
      "wetlands",
      "deserts",
      "rivers",
      "oceans"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.<span style=\"font-family: Roboto;\">(a)</span><span style=\"font-family: Roboto;\"> The Ramsar Convention on Wetlands of International Importance especially as Waterfowl Habitat is an international treaty for the conservation and sustainable use of wetlands. It is named after the city of Ramsar in Iran, where the Convention was signed in 1971.</span></p>",
    "question_index": 10
  },
  {
    "question": "<p>12.<span style=\"font-family: Roboto;\"> Which of the following animals does NOT find a place in the National Emblem of India?</span></p>",
    "options": [
      "Horse",
      "Camel",
      "Lion",
      "Bull"
    ],
    "correct_option_id": 1,
    "solution": "<p>12.<span style=\"font-family: Roboto;\">(b)</span><span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">The Emblem is a replica of the Lion of Sarnath, near Varanasi, Uttar Pradesh. The abacus is girded by four smaller animals - guardians of the four directions: the lion of the north, the elephant of the east, the horse of the south and the bull of the west. </span></p>",
    "question_index": 11
  },
  {
    "question": "<p>13.<span style=\"font-family: Roboto;\"> Jai Prakash Narayan Museum of Socialism is situated in:</span></p>",
    "options": [
      "New Delhi",
      "Lucknow",
      "Amritsar",
      "Vadodara"
    ],
    "correct_option_id": 1,
    "solution": "<p>13.(b)<span style=\"font-family: Roboto;\"> Jai Prakash Narayan museum of socialism is situated in Gomti Nagar, Lucknow.</span></p>",
    "question_index": 12
  },
  {
    "question": "<p>14.<span style=\"font-family: Roboto;\"> Who designed the logo for Lokpal in India?</span></p>",
    "options": [
      "Deepak Punia",
      "Prashant Mishra",
      "Kamareddy",
      "B.P.Raju"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b)<span style=\"font-family: Roboto;\"> </span><span style=\"font-family: Roboto;\">The Logo for Lokpal was designed by Prashant Mishra, a resident of Prayagraj, Uttar Pradesh.&nbsp;</span></p>",
    "question_index": 13
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
