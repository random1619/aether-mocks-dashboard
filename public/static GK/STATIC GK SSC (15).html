<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. <span style=\"font-family: Cambria Math;\">The length of the badminton court for singles is</span></p>\n",
    "options": [
      "13.44 m",
      "13.55 m",
      "14 m",
      "13.40 m\\r\\n "
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1.(</span><span style=\"font-family: Cambria Math;\">d)&nbsp;</span><strong>13.40 m (44ft). </strong><span style=\"font-weight: 400;\">The width for singles court is 5.18m (17 feet), while for the doubles court, the width is 6.1m (20 feet).The diagonal length of the full court is 14.723 m. Terminology used in badminton : Server and Receiver, Service Over, All, Love, Deuce. Trophies of Badminton : Thomas Cup, Uber Cup (women), Tunku Abdul-Rahman Cup, Yonex Cup. Badminton is the National game of Indonesia.</span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">Which of the following is the largest pan-India scheme to strengthen health care infrastructure across the country with focus on primary</span><span style=\"font-family: Cambria Math;\">, secondary and tertiary care services?</span></p>\n",
    "options": [
      "LaQshya",
      "AB-PMJAY",
      "PM-ABHIM",
      "PM-MI"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">c)&nbsp; </span><strong>PM-ABHIM</strong><span style=\"font-weight: 400;\"> (Prime Minister Ayushman Bharat Health Infrastructure Mission)</span><strong>. Ministry- </strong><span style=\"font-weight: 400;\">Ministry of Health and Family Welfare.</span><strong> </strong><span style=\"font-weight: 400;\">Launched in - October 2021. Under the scheme the total financial outlay for the scheme period (2021-22 to 2025-26) is Rs 64180 Crore. Other Important scheme : AB-PMJAY (Ayushman Bharat Pradhan Mantri Jan Arogya Yojana, 2018).&nbsp;</span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3. <span style=\\\"font-family: Cambria Math;\\\">Which of the following festivals is associated with the term \\'ties of protection\\'? </span></p>\\n",
    "options": [
      "Baisakhi",
      "Karwa Chauth",
      "Chhath Pooja",
      "Raksha Bandhan"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Raksha Bandhan</strong></span><span style=\"font-family: Cambria Math;\"> (Hindu festival). According to </span><span style=\"font-family: Cambria Math;\">hindu</span><span style=\"font-family: Cambria Math;\"> calendar, Raksha Bandhan is celebrated on the full-moon day of t</span><span style=\"font-family: Cambria Math;\">he Hindu month of Shravana. Other festivals celebrated on the full moon day - Holi, Guru Nanak Jayanti, Karthik </span><span style=\"font-family: Cambria Math;\">Purnima .</span><span style=\"font-family: Cambria Math;\"> Baisakhi (Punjab, Haryana) means the &lsquo;beginning of the New Year&rsquo; according to the Sikh calendar. Chhath Pooja (Bihar, Jharkhand) is de</span><span style=\"font-family: Cambria Math;\">dicated to the Sun God Surya. Karwa Chauth is celebrated by married women for the well-being and longevity of their husbands on the fourth day after Purnima in the month of Kartik.</span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">In 2018, Google Doodle celebrated the 100th birthday of Mrinalini </span><span style=\"font-family: Cambria Math;\">Sarabhai. She is an exponent of which of the following dance forms?</span></p>\n",
    "options": [
      "Bharatanatyam and Kathakali",
      "Odissi and Kathak",
      "Kuchipudi and Bharatanatyam",
      "Yakshagana"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Bharatanatyam and Kathakali.</strong></span><span style=\"font-family: Cambria Math;\"> Awards of </span><span style=\"font-family: Cambria Math;\">Mrinalini Sarabhai - Padma Shri (1965), Padma Bhushan (1992), Sangeet Natak Akademi Award (1970)</span><span style=\"font-family: Cambria Math;\">, Dhirubhai</span><span style=\"font-family: Cambria Math;\"> Thakar Savyasachi Saraswat Award (2014), Sangeet Natak Akademi Fellowship (1994), Kerala Sangeetha Nataka Akademi Fellowship (1988). Sh</span><span style=\"font-family: Cambria Math;\">e was the founder of Darpana Academy of Performing Arts (1949).</span><span style=\"font-family: Cambria Math;\"> Famous dancers of Indian </span><span style=\"font-family: Cambria Math;\">dances :</span><span style=\"font-family: Cambria Math;\"> Bharatanatyam (Tamil Nadu) - Yamini Krishnamurthy, Rukmini Devi Arundale. Kathakali (Kerala) </span><span style=\"font-family: Cambria Math;\">- Kalamandalam</span><span style=\"font-family: Cambria Math;\"> Gopi, Kalamandalam Krishna Prasad, Kottakal Sivar</span><span style=\"font-family: Cambria Math;\">aman. </span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Bhar</span><span style=\"font-family: Cambria Math;\">atanatyam expresses South Indian religious themes and spiritual ideas of______.</span></p>\n",
    "options": [
      "Sufism",
      "Shaivism",
      "Buddhism",
      "Jainism"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">b) <strong>Shaivism </strong>-</span><span style=\"font-family: Cambria Math;\"> A Hindu tradition (which worships Shiva) that most accepts ascetic life and emphasizes yoga. The followers of Shaivism are called Shaivas or Shaivites. Bharatnatyam (Tamil Nadu</span><span style=\"font-family: Cambria Math;\">) :</span><span style=\"font-family: Cambria Math;\"> It traces its origins back to the Natyashastra, an ancient treatise on thea</span><span style=\"font-family: Cambria Math;\">tre written by the mythic priest Bharata. </span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Who among the following musicians is popular for his mastery over the musical instrument Sitar? </span></p>\n",
    "options": [
      "Ali Akbar Khan",
      "Vilayat Khan",
      "Bahadur Khan",
      "Amjad Ali Khan"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">b) <strong>Vilayat Khan </strong><span style=\"font-weight: 400;\">(Agra Gharana)</span><strong>. </strong><span style=\"font-weight: 400;\">Awards :&nbsp; Padma Shri (1964) and Padma Bhushan (1968). Sitar - plucked stringed instrument. Famous sitar players - Pandit Ravi Shankar, Imrat Khan, Annapurna Devi</span><span style=\"font-weight: 400;\">. </span><strong>Sarod -</strong><span style=\"font-weight: 400;\"> Bahadur Khan (Senia Gharana), Amjad Ali Khan (Senia-Bangash Gharana). </span></span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">7</span><span style=\\\"font-family: Cambria Math;\\\">. Wh</span><span style=\\\"font-family: Cambria Math;\\\">o received the Nobel Prize in 1901 for \\'recognition of the extraordinary services rendered by the discovery of the laws of chemical dynamics and osmotic pressure in solutions\\'? </span></p>\\n",
    "options": [
      "Hermann Emil Fischer",
      "Jacobus Henricus van \\'t Hoff ",
      "Svante August Arrhenius ",
      "Henri Moissan"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">7.(</span><span style=\\\"font-family: Cambria Math;\\\">b) <strong>Jacobus Henricus van\\'t Hoff.</strong><span style=\\\"font-weight: 400;\\\"> Nobel Prize -</span><strong> 1902</strong><span style=\\\"font-weight: 400;\\\"> - Hermann Emil Fischer &ldquo;in recognition of the extraordinary services he has rendered by his work on sugar and purine synthesis&rsquo;&rdquo;. </span><strong>1903</strong><span style=\\\"font-weight: 400;\\\"> - Svante August Arrhenius &ldquo;in recognition of the extraordinary services he has rendered to the advancement of chemistry by his electrolytic theory of dissociation&rdquo;.</span><strong> 1906</strong><span style=\\\"font-weight: 400;\\\"> - Henri Moissan &ldquo;in recognition of the great services rendered by him in his investigation and isolation of the element fluorine, and for the adoption in the service of science of the electric furnace called after him&rdquo;.</span></span></p>\\n",
    "question_index": 6
  },
  {
    "question": "<p>8<span style=\"font-family: Cambria Math;\">. Which of the following musical instruments were played by the musicians such as Shakoor Khan and Pandit Ram Narayan?</span></p>\n",
    "options": [
      "Sarangi",
      "Shehnai",
      "Guitar",
      "Veena"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">a)&nbsp; </span><strong>Sarangi</strong><span style=\"font-weight: 400;\"> </span><strong>. </strong><span style=\"font-weight: 400;\">Ustad Shakoor Khan&nbsp; - Belongs to Kirana Gharana. Some musical instrument players:</span><strong> Sarangi</strong><span style=\"font-weight: 400;\"> - Ustad Sultan Khan, Ustad Hafizullah Khan, Sultan Khan and Zakir Hussain. </span><strong>Shehnai</strong><span style=\"font-weight: 400;\"> -&nbsp; Ustad bismillah khan, Anant Lal, Pandit Ram Sahay, Ali Ahmed Hussain Khan. </span><strong>Veena </strong><span style=\"font-weight: 400;\">- Jayanthi Kumaresh, Veenai Dhanammal.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p>9. <span style=\\\"font-family: Cambria Math;\\\">When did Linus Carl Pauling receive the Nobel Prize in Chemistry for \\'his research into the nature of the chemical bond and its applications to the elucidation of the structure of complex sub</span><span style=\\\"font-family: Cambria Math;\\\">stances\\'?</span></p>\\n",
    "options": [
      "1954",
      "1950",
      "1956",
      "1958"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9.(</span><span style=\"font-family: Cambria Math;\">a) <strong>1954.&nbsp;</strong></span><strong>&nbsp;Nobel Prize </strong><span style=\"font-weight: 400;\">(1901)</span><strong> -</strong><strong> </strong><span style=\"font-weight: 400;\">Linus Carl Pauling was also awarded with the Nobel Peace Prize (1962). Some </span><strong>Scientists</strong><span style=\"font-weight: 400;\"> who won Nobel Prize in Chemistry :- Otto Paul Hermann Diels and Kurt Alder (</span><strong>1950</strong><span style=\"font-weight: 400;\">) - &ldquo;for their discovery and development of the diene synthesis&rdquo;. Sir Cyril Norman Hinshelwood and Nikolay Semenov (</span><strong>1956</strong><span style=\"font-weight: 400;\">) - &ldquo;for their research into the mechanism of chemical reactions&rdquo;.&nbsp; Frederick Sanger (</span><strong>1958</strong><span style=\"font-weight: 400;\">)- &ldquo;for his work on the structure of proteins, especially that of insulin&rdquo;.</span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p>10<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Daskathia of __</span><span style=\"font-family: Cambria Math;\">_________ is the tribal dance performed by two males depicting the historic and Puranic events.</span></p>\n",
    "options": [
      "Uttar Pradesh",
      "Gujarat",
      "Goa",
      "Odisha"
    ],
    "correct_option_id": 3,
    "solution": "<p>10<span style=\"font-family: Cambria Math;\">.(d) <strong>Odisha</strong>.</span><span style=\"font-family: Cambria Math;\"> Daskathia (Folk theatre form, associated with the </span><span style=\"font-family: Cambria Math;\">worship of Lord Shiva). Some Folk theatre form:- Bhavai (Rajasthan), Garodas (Gujarat), Jatra (Odisha), Kariyila (Himachal Pradesh), Maach (Madhya Pradesh), Swang (Punjab and Haryana), Ojapali (Assam), Powada (Maharashtra), Tamasha (Maharashtra), Bhand Pat</span><span style=\"font-family: Cambria Math;\">her (Jammu and Kashmir), Bhaona (Assam), Dashavatar (Konkan area), Naqal (Punjab) or Bhand (Uttar Pradesh).</span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Guru Bipin Singh,</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">a</span><span style=\"font-family: Cambria Math;\"> Nrityacharya awardee, Sangeet Natak Akademi awardee and Kalidas Samman awardee, was renowned for promoting which classical dance form?</span></p>\n",
    "options": [
      "Manipuri",
      "Kuchipudi",
      "Odissi",
      "Kathak"
    ],
    "correct_option_id": 0,
    "solution": "<p>11<span style=\"font-family: Cambria Math;\">.(a) </span><strong>Manipuri. Awards </strong><span style=\"font-weight: 400;\">of Guru Bipin Singh</span><strong> - </strong><span style=\"font-weight: 400;\">Sangeet Natak Akademi Award (1966), Kalidas Samman (1989), Title of Hanjaba by the Maharaja of Manipur. Famous Dancers :</span><strong> Manipuri - </strong><span style=\"font-weight: 400;\">Yumlembam Gambhini Devi, Darshana Jhaveri, Nirmala Mehta. </span><strong>Kuchipudi - </strong><span style=\"font-weight: 400;\">Kaushalya Reddy, Yamini Reddy, Bhavana Reddy, Atisha Pratap Singh, Haleem Khan. </span><strong>Odissi - </strong><span style=\"font-weight: 400;\">Sonal Mansingh, Jhelum Paranjape, Mayadhar Raut, Gangadhar Pradhan, Leana Citaristi, Leena Mohanty. </span><strong>Kathak - </strong><span style=\"font-weight: 400;\">Pandit Birju Maharaj, Lachu Maharaj, Shambu Maharaj, Shovna Narayan, Kumari Kamala, Sunanya Hazarilal&nbsp; Agarwal.</span><strong>&nbsp;</strong></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which of the following is a Tibeto-Burmese language?</span></p>\n",
    "options": [
      "Odia",
      "Tripuri",
      "Assamese",
      "Tulu"
    ],
    "correct_option_id": 1,
    "solution": "<p>12<span style=\"font-family: Cambria Math;\">.(b) <strong>Tripuri </strong>(</span><span style=\"font-family: Cambria Math;\">Kokborok) - One of the official languages of Tripura. It is spoken in Tripura, and neighbouring areas of Bangladesh. Kokborok Day (Tripuri Language Day) - 19th January. </span><span style=\"font-family: Cambria Math;\">Other Tibeto</span><span style=\"font-family: Cambria Math;\"> Burmese languages - Burmese, Tibetan, Bai, Yi (Lolo), Karen, Meitei, Hani, Jingpo.</span><span style=\"font-family: Cambria Math;\"> Tulu is a Dravidian language spoken mainly in two coastal districts Dakshina Kannada and Udupi of Karnataka and Kasaragod district of Kerala.</span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">. When was the International Day of the Girl Child 2021 celebrated?</span></p>\n",
    "options": [
      "14 October",
      "12 October",
      "13 October",
      "11 October\\r\\n "
    ],
    "correct_option_id": 3,
    "solution": "<p>13<span style=\\\"font-family: Cambria Math;\\\">.(d)&nbsp; </span><strong>11 October. International Girl Child Day - </strong><span style=\\\"font-weight: 400;\\\">First time celebrated in 2012. It is celebrated by the United Nations General Assembly.</span><strong> Other important Days: </strong><span style=\\\"font-weight: 400;\\\">5 October </span><strong>- </strong><span style=\\\"font-weight: 400;\\\">World Teachers\\' Day, 2 October - Gandhi Jayanti, 23 March - Sahid Diwas, 22 April - Earth Day, 5 June - Environment Day.</span></p>\\n",
    "question_index": 12
  },
  {
    "question": "<p>14<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Ambubachi Mela (Fair) is held in which of the temples of North-East India?</span></p>\n",
    "options": [
      "Dakshineswar Kali",
      "Bhuvaneswari",
      "Billeswar",
      "Kamakhya"
    ],
    "correct_option_id": 3,
    "solution": "<p>14<span style=\"font-family: Cambria Math;\">.(d)&nbsp;</span><strong>Kamakhya (Assam). </strong><span style=\"font-weight: 400;\">The Ambubachi Mela is an annual four-day celebration held at Kamakhya Temple in Guwahati during the Monsoon season. It is based on the belief that Goddess Kamakhya goes through her annual </span><strong>menstrual cycle</strong><span style=\"font-weight: 400;\"> during this time. Other festivals (Assam): </span><strong>Bihu</strong><span style=\"font-weight: 400;\">, Baishagu (celebrated by Bodo Kacharis), Ligang (by the Mishing tribe).&nbsp;</span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">15</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Who among the following performing artists bagged the best actress award for Meena Gurjari in 1975?</span></p>\n",
    "options": [
      "Sonal Masingh",

    "correct_option_id": 3,
    "solution": "<p>15<span style=\\\"font-family: Cambria Math;\\\">.(d)&nbsp;</span><strong>Mallika Sarabhai </strong><span style=\\\"font-weight: 400;\\\">(Bharatanatyam and kuchipudi dancer)</span><strong>. </strong><span style=\\\"font-weight: 400;\\\">Awards: Padma Bhushan (2010), Sangeet Natak Akademi Award (1999), French Palme D\\'or (1977) - The highest Civilian award in France.&nbsp; </span><strong>Other female Classical Dancers:</strong><span style=\\\"font-weight: 400;\\\"> Rukmini Devi Arundale (Bharatnatyam), Shovana Narayan (Kathak dancers), Sonal Mansingh (Bharatanatyam and Odissi), Sitara Devi (Queen of Kathak).</span></p>\\n",
    "question_index": 14
  }
];
    </script>

    <script src="../js/mock-core.js"></script>
</body>
</html>
