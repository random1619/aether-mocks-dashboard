<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1.<span style=\"font-family: Cambria Math;\"> The ancient harvest festival of Baisakhi is celebrated in which month of the year?</span></p>\n",
    "options": [
      "November",
      "April",
      "August",
      "January"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1.(</span><span style=\"font-family: Cambria Math;\">b) <strong>April. Baisakhi - </strong><span style=\"font-weight: 400;\">The first day of the month of Baisakh and is usually celebrated on the 13th or 14th of April every year. It is the main harvest festival of Punjab state. </span><strong>Other festivals of Punjab:</strong><span style=\"font-weight: 400;\"> Lohri, Hola Mohalla, Basant Panchmi, Teeyan, Chappar Mela, Jor Mela, Tikka, Gurupurab. </span><strong>Harvest Festivals - </strong><span style=\"font-weight: 400;\">Pongal (Tamil Nadu), Lohri (Punjab), Bhogali Bihu (Assam), Poush Parbon (West Bengal), Onam (Kerala).</span></span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">Lionel Messi is a famous player of __________ sport.</span></p>\n",
    "options": [
      "Basketball",
      "Football",
      "Badminton",
      "Cricket"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">b) <strong>Football. Lionel Andres Messi</strong><span style=\"font-weight: 400;\"> (Argentine footballer) - He plays for Inter Miami and the Argentina national team as a striker. </span><strong>Famous players </strong><span style=\"font-weight: 400;\">- Cristiano Ronaldo, Neymar, Ronaldinho Gaucho, David Beckham. </span><strong>Famous tournaments - </strong><span style=\"font-weight: 400;\">FIFA World Cup, UEFA Champions League, UEFA European Championship, FA Cup, Copa America, UEFA Europa League, Africa Cup of Nations.</span></span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3.<span style=\"font-family: Cambria Math;\"> Ramappa Temple is dedicated to which God?</span></p>\n",
    "options": [
      "Lord Rama",
      "Lord Vishnu",
      "Lord Indra",
      "Lord Shiva"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Lord Shiva. Ramappa Temple</strong><span style=\"font-weight: 400;\"> (Rudreshwara Temple or Ramalingeswara Temple)</span><strong> -</strong><span style=\"font-weight: 400;\"> Situated in Palampet in (Warangal) Telangana. It is a masterpiece of the Kakatiyan style of temple architecture and nominated as a UNESCO World Heritage Site in 2014. </span><strong>Other famous temples </strong><span style=\"font-weight: 400;\">(Telangana) - Chilkur Balaji Temple, Sanghi Temple, Gnana Saraswathi Temple, Surendrapuri Temple, Karmanghat Hanuman Temple, Beechupally Anjaneya Swamy Temple.</span></span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">4. Rukmini Devi Arundale was a famous exponent of which form of dance? </span></p>\n",
    "options": [
      "Bharatnatyam",
      "Kuchipudi",
      "Mohiniattam",
      "Kathakali"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Bharatnatyam. Rukmini Devi Arundale:</strong><span style=\"font-weight: 400;\"> Awards - Padma Bhushan (1956), Sangeet Natak Akademi Fellowship (1967), Prani Mitra (1968), Friend of All Animals, (Animal Welfare Board of India), Kalidas Samman (1984, by govt. of Madhya Pradesh). Famous exponents - </span><strong>Kuchipudi </strong><span style=\"font-weight: 400;\">(Vedantam Lakshminarayana Sastri, Vempati Venkatanarayana Sastri and Chinta Venkataramayya), </span><strong>Mohiniyattam </strong><span style=\"font-weight: 400;\">- Sunanda Nair, Kalamandalam Kalyanikutty Amma, Jayaprabha Menon, Pallavi Krishnan, </span><strong>Kathakali - </strong><span style=\"font-weight: 400;\">Kalamandalam Gopi, Kalamandalam Krishna Prasad.</span></span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">5. &lsquo;A Life of the Genius: The Man Who Knew Infinity\\' is</span><span style=\\\"font-family: Cambria Math;\\\"> a biography of Indian mathematician _____</span><span style=\\\"font-family: Cambria Math;\\\">_ .</span></p>\\n",
    "options": [
      "Acharya Pingala",
      "Aryabhata",
      "Srinivasa Ramanujan",
      "Neena Gupta"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">5.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>&nbsp;Srinivasa Ramanujan:- </strong><span style=\\\"font-weight: 400;\\\">He is also called \\'mathematician of mathematicians\\' and \\'magician of numbers\\' for his amazing work on number theory. National Mathematics Day (celebrated on 22 December to commemorate the birth anniversary of Srinivasa Ramanujan). \\\"The Man Who Knew Infinity\\\" is a biography of Ramanujan written by Robert Kanigel. He was the first Indian to receive a fellowship from Trinity College, Cambies. Ramanujan Museum and Mathematics Education Center is located in Chennai (Tamil Nadu).</span></span></p>\\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">6.Which</span><span style=\"font-family: Cambria Math;\"> harvest festival is famously celebrated in Assam?</span></p>\n",
    "options": [
      "Bhogali Bihu",
      "Lohri",
      "Makar Sankranti",
      "Onam"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">6.(</span><span style=\\\"font-family: Cambria Math;\\\">a) <strong>Bhogali Bihu.</strong><span style=\\\"font-weight: 400;\\\"> </span><strong>Bohag Bihu </strong><span style=\\\"font-weight: 400;\\\">or</span><strong> Rongali Bihu</strong><span style=\\\"font-weight: 400;\\\"> is one of the biggest festivals of Assam and is celebrated in the month of Baisakh (mid April month) to mark the Assamese New Year. </span><strong>\\'Magh Bihu</strong><span style=\\\"font-weight: 400;\\\">\\' is celebrated in the month of \\'Magh\\' (in the middle of the month of January) and</span><strong> \\'Kati Bihu\\'</strong><span style=\\\"font-weight: 400;\\\"> is celebrated in the month of Kartik (in the middle of the month of October).</span></span></p>\\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">7. Ustad Shafaat Ahmed Khan was best known for which of the following instruments?</span></p>\n",
    "options": [
      "Tabla",
      "Rudra Veena",
      "Violin",
      "Harmonium"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Tabla. Ustad Shafaat Ahmed Khan </strong><span style=\"font-weight: 400;\">(Delhi gharana). </span><strong>Awards</strong><span style=\"font-weight: 400;\"> - Padma Shri Award in 2003. </span><strong>Famous Tabla players </strong><span style=\"font-weight: 400;\">- Zakir Hussain, Trilok Gurtu,&nbsp; Kishan Maharaj, Alla Rakha. </span><strong>Rudra Veena Player </strong><span style=\"font-weight: 400;\">- Asad Ali Khan. </span><strong>Violin </strong><span style=\"font-weight: 400;\">- Abhijith P. S. Nair, Ambi Subramaniam, Arrol Carelli, Avaneeswaram S R Vinu. </span><strong>Harmonium Player&nbsp; - </strong><span style=\"font-weight: 400;\">Omkar Agnihotri, Lisa Alvarado, Tori Amos.</span></span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p>8. Which<span style=\"font-family: Cambria Math;\"> is the oldest tennis tournament in the world?</span></p>\n",
    "options": [
      "French Open",
      "US Open",
      "Wimbledon",
      "Australian Open"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">c) <strong>Wimbledon</strong><span style=\"font-weight: 400;\"> -The tournament dates back to 1877. Wimbledon is the oldest and most prestigious grass court Grand Slam tennis tournament, believed to be the oldest active tennis tournament globally, and is held from late June to early July each year.&nbsp; </span><strong>US Open -</strong><span style=\"font-weight: 400;\"> This tournament was started in 1881 AD,</span><strong> French Open </strong><span style=\"font-weight: 400;\">(Roland Garros tournament) - This tournament was started in 1891, </span><strong>Australian Open -</strong><span style=\"font-weight: 400;\"> This tournament was started in 1905 AD.</span></span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">9.How</span><span style=\"font-family: Cambria Math;\"> many field players are in a hockey team?</span></p>\n",
    "options": [
      "14",
      "7",
      "11",
      "9"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9.(</span><span style=\"font-family: Cambria Math;\">c) <strong>11. Terms related to Hockey - </strong><span style=\"font-weight: 400;\">16 yard hit, Advancing, Attack (Attacker), Back-line, Bully, Center pass, Clearing, Cross. </span><strong>Trophies related to Hockey - </strong><span style=\"font-weight: 400;\">Sahni Trophy, Rene Frank Trophy, Ranjit Singh Gold Cup, Rangaswami Cup (National Hockey Championship), Rangaswami Cup, Obaid Ullah Gold Cup, Nehru Trophy (Hockey Women&rsquo;s), Modi Gold Cup, MCC Trophy.</span></span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">. Which state government launched the \"</span><span style=\"font-family: Cambria Math;\">Panchamrut Yojana&rdquo;?</span></p>\n",
    "options": [
      "Karnataka",
      "Odisha",
      "West Bengal",
      "Uttar Pradesh"
    ],
    "correct_option_id": 3,
    "solution": "<p>10<span style=\"font-family: Cambria Math;\">.(d) <strong>Uttar Pradesh. The Panchamrut scheme </strong><span style=\"font-weight: 400;\">seeks to reduce the production cost of sugarcane, as well as increase productivity and the fertility of the land. </span><strong>Five approaches</strong><span style=\"font-weight: 400;\"> - An integrated trench method for sowing of sugarcane, ratoon management and trash mulching, drip irrigation and co-cropping. </span><strong>Other schemes</strong><span style=\"font-weight: 400;\"> -&nbsp; Kanya Vidya Dhan Yojna, Uttar Pradesh Divyang Shadi Yojana.</span></span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Baisakhi Festival is majorly celebrated in the states of ____ and ____.</span></p>\n",
    "options": [
      "Nagaland , Tripura",
      "Rajasthan, Madhya Pradesh",
      "Punjab, Haryana",
      "Tamil Nadu, Kerala"
    ],
    "correct_option_id": 2,
    "solution": "<p>11<span style=\"font-family: Cambria Math;\">.(c) <strong>Punjab, Haryana. Baisakhi (</strong><span style=\"font-weight: 400;\">harvest festivals) - It falls on the 13th or 14th April every year as a regional holiday. It also commemorates the formation of the Khalsa Panth by Guru Gobind Singh in 1699.</span><strong> Other harvest festivals in india:</strong><strong> </strong><span style=\"font-weight: 400;\">Lohri (Punjab), Bohag Bihu (Assam), Wangala (Meghalaya and Assam), Ka Pomblang Nongkrem (Meghalaya), Nuakhai (Orissa), Nabanna (West Bengal), Onam (Kerala), Pongal (Tamil Nadu).</span></span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">V. Satyanarayana Sarma was </span><span style=\"font-family: Cambria Math;\">awarded with Padma Shri in 1970 for his contributions in the field of ____ dance</span></p>\n",
    "options": [
      "Kuchipudi",
      "Odissi",
      "Manipuri",
      "Kathak"
    ],
    "correct_option_id": 0,
    "solution": "<p>12<span style=\"font-family: Cambria Math;\">.(a) <strong>Kuchipudi</strong><span style=\"font-weight: 400;\"> - It originates from a village named Kuchipudi (Andhra Pradesh). </span><strong>V. Satyanarayana Sarma:</strong><span style=\"font-weight: 400;\"> Awards - Padma Shri (1970), Sangeet Natak Akademi Fellowship (1967) , Sangeet Natak Akademi Award (1961) , Kalidas Samman (1988). </span><strong>Eight classical dances in india </strong><span style=\"font-weight: 400;\">(by the Sangeet Natak Akademi) -&nbsp; Bharatanatyam (Tamil Nadu), Kathak (Uttar Pradesh), Kathakali (Kerala), Kuchipudi (Andhra Pradesh), Manipuri (Manipur), Mohiniyattam (Kerala), Odissi (Odisha), Sattriya (Assam).</span></span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Koneru Humpy is associated with which of the following sports?</span></p>\n",
    "options": [
      "Chess",
      "Boxing",
      "Badminton",
      "Cricket"
    ],
    "correct_option_id": 0,
    "solution": "<p>13<span style=\"font-family: Cambria Math;\">.(a) <strong>Chess. Koneru Humpy </strong><span style=\"font-weight: 400;\">(Grandmaster</span><strong>): </strong><span style=\"font-weight: 400;\">She won three gold medals in the class of girls under -10, 12 and 14 at the World Youth Chess Championship in 1997, 1998 and 2000 respectively. In October 2007, she became the second female player to cross the 2600 Elo rating mark after</span><strong> Judit Polgar</strong><span style=\"font-weight: 400;\"> (ranked 2606). </span><strong>Awards</strong><span style=\"font-weight: 400;\">: Arjuna Award (2003), </span><strong>Padma Shri</strong><span style=\"font-weight: 400;\"> (2007),&nbsp; BBC Indian Sportswoman of the Year (2021), Sportstar Aces Sportswoman of the Decade (Individual non-Olympic Sports) - 2021,&nbsp; Player of the Chess Tournament at PSPB Inter-unit Chess and Bridge Tournament (Mumbai) - 2022.</span></span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which of the following is NOT one of the harvest festivals celebrated in India?</span></p>\n",
    "options": [
      "Onam",
      "Lohri",
      "Baisakhi",
      "Diwali"
    ],
    "correct_option_id": 3,
    "solution": "<p>14<span style=\"font-family: Cambria Math;\">.(d) <strong>Diwali - </strong><span style=\"font-weight: 400;\">It is celebrated during the Hindu lunisolar month Kartika (between mid-October and mid-November), observed on Amavasya (New Moon). </span><strong>Harvest Festivals in India:</strong><span style=\"font-weight: 400;\"> Makar Sankranti, Baisakhi (Punjab and Haryana), Lohri, Bohag Bihu, Nuakhai (Orissa), Onam (Kerala), Pongal (Tamil Nadu), Vishu (Kerala and Karnataka), Gudi Padwa (Maharashtra, Karnataka and Andhra Pradesh).</span></span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">15</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">With respect to sports, WADA stands for_____________</span><span style=\"font-family: Cambria Math;\">_ .</span></p>\n",
    "options": [
      "World Anti-Doping Association",
      "World Anti-Doping Agency",
      "Wrestling Anti-Doping Association",
      "World Autonomous - Doping Agency"
    ],
    "correct_option_id": 1,
    "solution": "<p>15.(b) <span style=\"font-family: Cambria Math;\"><strong>World Anti-Doping Agency - </strong><span style=\"font-weight: 400;\">It was established in 1999 as an international independent agency composed and funded equally by the sport movement and governments of the world. The First World Conference on Doping in Sport held in Lausanne (Switzerland) in 1999. </span><strong>Headquarter</strong><span style=\"font-weight: 400;\"> - Montreal, Canada.</span></span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
