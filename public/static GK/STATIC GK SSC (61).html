<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which famous sportsperson has received the Bharat Ratna award in 2014?</span></p>\n",

    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1.(</span><span style=\"font-family: Cambria Math;\">d)</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Sachin Tendulkar</span></strong><span style=\"font-family: Cambria Math;\"> has received several awards from the government of India:<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Arjuna Award</span></strong><span style=\"font-family: Cambria Math;\"> (1994),<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Khel Ratna Award</span></strong><span style=\"font-family: Cambria Math;\"> (1997), </span><strong><span style=\"font-family: Cambria Math;\">Maharashtra Bhushan Award</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(2001), </span><strong><span style=\"font-family: Cambria Math;\">Padma Shri</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(1999), </span><strong><span style=\"font-family: Cambria Math;\">Padma Vibhushan</span></strong><span style=\"font-family: Cambria Math;\"> (2008). Bharat Ratna (Highest civilian Award of the country) was instituted in the year 1954.</span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The shehnai is a reed instrument with how many holes along the tubes?</span></p>\n",
    "options": [
      "Five",
      "Seven",
      "Eleven",
      "Six"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">b)<strong> Seven. Shehnai </strong>-</span><span style=\"font-family: Cambria Math;\"> It is a reed instrument in which there are<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>seven</strong> </span><span style=\"font-family: Cambria Math;\">holes along the tube which are used for playing the melody by opening and closing them with the fingers. It is known as</span><span style=\"font-family: Cambria Math;\"> <strong>Mangal </strong></span><strong><span style=\"font-family: Cambria Math;\">Vadya</span></strong><span style=\"font-family: Cambria Math;\">. It is considered to have come to India from </span><span style=\"font-family: Cambria Math;\">West Asia</span><span style=\"font-family: Cambria Math;\">. In the early fifties of this century, </span><strong><span style=\"font-family: Cambria Math;\">Ustad Bismillah Khan</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>is credited for </span><span style=\"font-family: Cambria Math;\">popularising</span><span style=\"font-family: Cambria Math;\"> this instrument. </span><strong><span style=\"font-family: Cambria Math;\">Pt. Anant Lal</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>and </span><strong><span style=\"font-family: Cambria Math;\">Pt. Daya Shankar</span></strong><span style=\"font-family: Cambria Math;\"> is also a noted Shehnai player.</span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">. Which among the following festivals is celebrated as the Telugu New Year? </span></p>\n",
    "options": [
      "Dasara",
      "Vishu",
      "Ugadi ",
      "Monpa "
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">c) </span><strong><span style=\"font-family: Cambria Math;\">Ugadi</span></strong><span style=\"font-family: Cambria Math;\"> comes in the spring season (usually </span><strong><span style=\"font-family: Cambria Math;\">March or April</span></strong><span style=\"font-family: Cambria Math;\">). It is celebrated according to the Luni-Solar calendar in the states of</span><strong><span style=\"font-family: Cambria Math;\"> Andhra Pradesh, Telangana</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>and </span><strong><span style=\"font-family: Cambria Math;\">Karnataka</span></strong><span style=\"font-family: Cambria Math;\"><strong>. </strong>It also marks the beginning of new </span><span style=\"font-family: Cambria Math;\">Samvatsara</span><span style=\"font-family: Cambria Math;\"> (a cycle of sixty years). People also refer </span><span style=\"font-family: Cambria Math;\">Ugadi</span><span style=\"font-family: Cambria Math;\"> as </span><strong><span style=\"font-family: Cambria Math;\">Gudi Padwa</span></strong><span style=\"font-family: Cambria Math;\"> in Maharashtra and </span><strong><span style=\"font-family: Cambria Math;\">Visu</span></strong><span style=\"font-family: Cambria Math;\"> in Kerala and </span><span style=\"font-family: Cambria Math;\">Tamilnadu</span><span style=\"font-family: Cambria Math;\">.<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Monpa</span></strong><span style=\"font-family: Cambria Math;\"> is a major tribe of Arunachal Pradesh. </span><span style=\"font-family: Cambria Math;\"><strong>New Year</strong> </span><span style=\"font-family: Cambria Math;\">festival</span><span style=\"font-family: Cambria Math;\"> :</span><span style=\"font-family: Cambria Math;\">- </span><span style=\"font-family: Cambria Math;\">Bohag</span><span style=\"font-family: Cambria Math;\"> Bihu </span><span style=\"font-family: Cambria Math;\">(Assam), </span><span style=\"font-family: Cambria Math;\">Cheti</span><span style=\"font-family: Cambria Math;\"> Chand (Sindhi), Pana Sankranti (Odisha), </span><span style=\"font-family: Cambria Math;\">Pohela</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Boishakh</span><span style=\"font-family: Cambria Math;\"> (West Bengal), </span><span style=\"font-family: Cambria Math;\">Puthandu</span><span style=\"font-family: Cambria Math;\"> (Tamil), Vaisakhi (Punjab), Vishu (Malayalam), </span><span style=\"font-family: Cambria Math;\">Bestu</span><span style=\"font-family: Cambria Math;\"> Varas (Gujarat), </span><span style=\"font-family: Cambria Math;\">Losoong</span><span style=\"font-family: Cambria Math;\"> (Sikkim), </span><span style=\"font-family: Cambria Math;\">Navreh</span><span style=\"font-family: Cambria Math;\"> (Kashmir), Hijri (Islam), Losar (Arunachal Pradesh), Nowruz (Persian).</span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">4</span><span style=\\\"font-family: Cambria Math;\\\">. International Women\\'s Day is celebrated on?</span></p>\\n",
    "options": [
      "12th march",
      "8th march",
      "8th july ",
      "12th july "
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">4.(</span><span style=\\\"font-family: Cambria Math;\\\">b)</span><span style=\\\"font-family: Cambria Math;\\\"> <strong>8th march.</strong> </span><span style=\\\"font-family: Cambria Math;\\\">International Women\\'s Day (IWD) is a global day celebrating the social, economic, cultural and political achievements of women. It is also celebrated to honor the movement for women\\'s rights and to build support for achieving universal suffrage for women. </span><strong><span style=\\\"font-family: Cambria Math;\\\">12th March</span></strong><span style=\\\"font-family: Cambria Math;\\\"><strong>-</strong> National Girl Scout Day and National Napping Day. </span><span style=\\\"font-family: Cambria Math;\\\"><strong>26th August</strong> </span><span style=\\\"font-family: Cambria Math;\\\">- Women&rsquo;s Equality Day.</span></p>\\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Hari Prasad</span><span style=\"font-family: Cambria Math;\"> Chaurasia is associated with which of the following instruments?</span></p>\n",
    "options": [
      "Bansuri",
      "Tabla",
      "Drum",
      "Veena"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">a)</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Bansuri. Personalities associated with Bansuri-</span></strong><span style=\"font-family: Cambria Math;\"> Rakesh Chaurasia, Milind Date, Devendra </span><span style=\"font-family: Cambria Math;\">Murdeshwar</span><span style=\"font-family: Cambria Math;\">, Pannalal Ghosh, Keshav Ginde, Pravin </span><span style=\"font-family: Cambria Math;\">Godkhindi</span><span style=\"font-family: Cambria Math;\">, etc. </span><strong><span style=\"font-family: Cambria Math;\">Tabla</span></strong><span style=\"font-family: Cambria Math;\">- Ustad Ahmed Jan </span><span style=\"font-family: Cambria Math;\">Thirakwa</span><span style=\"font-family: Cambria Math;\">, Ustad </span><span style=\"font-family: Cambria Math;\">Alla</span><span style=\"font-family: Cambria Math;\"> Rakha, Ustad Zakir Hussain, Pandit Yogesh Shamsi, Pandit Suresh Talwalkar, Pandit Anindo Chatterjee, etc.</span><span style=\"font-family: Cambria Math;\"> <strong>Veena</strong></span><span style=\"font-family: Cambria Math;\">- Emani Sankara Sastry, Veena E. Gayathri, </span><span style=\"font-family: Cambria Math;\">Rajhesh</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Vaidhya</span><span style=\"font-family: Cambria Math;\">, Karaikudi Subramaniam &amp; Trichy Sankaran, etc. </span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">According to WHO, if a person&rsquo;s BMI is below </span><span style=\"font-family: Cambria Math;\">18.5</span><span style=\"font-family: Cambria Math;\"> he/she is classified as___</span></p>\n",
    "options": [
      "Healthy ",
      "Blind",
      "Underweight",
      "Mentally unfit"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">c) </span><span style=\"font-family: Cambria Math;\"><strong>Underweight. BMI (Body mass Index)</strong>-</span><span style=\"font-family: Cambria Math;\"> It is an </span><span style=\"font-family: Cambria Math;\">individual weight</span><span style=\"font-family: Cambria Math;\"> in kilograms (or pounds) divided by the square of height in meters (or feet)</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">According to WHO, for adults over 20 years old, BMI falls into</span><span style=\"font-family: Cambria Math;\">- </span><strong><span style=\"font-family: Cambria Math;\">Underweight</span></strong><span style=\"font-family: Cambria Math;\"> (less than 18.5),</span><span style=\"font-family: Cambria Math;\"> <strong>Normal</strong></span><span style=\"font-family: Cambria Math;\"> (18.5 - 24.9), </span><span style=\"font-family: Cambria Math;\"><strong>Overweight</strong> </span><span style=\"font-family: Cambria Math;\">(25 - 29.9),<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Obesity </strong>(</span><span style=\"font-family: Cambria Math;\">30 - 34.9</span><span style=\"font-family: Cambria Math;\">)</span><span style=\"font-family: Cambria Math;\">, </span><strong><span style=\"font-family: Cambria Math;\">Severely obese</span></strong><span style=\"font-family: Cambria Math;\">(35 - 39.9 ) </span><strong><span style=\"font-family: Cambria Math;\">Morbid obesity</span></strong><span style=\"font-family: Cambria Math;\"> (more than 40).</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following pairs of &ldquo;term - sports&rdquo; is </span><span style=\"font-family: Cambria Math;\">correct ?</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> I. Eagle - Hockey </span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> II. Penalty kick - Volleyball </span></p>\n",

    "solution": "<p><span style=\"font-family: Cambria Math;\">7.(</span><span style=\"font-family: Cambria Math;\">c) </span><span style=\"font-family: Cambria Math;\"><strong>Neither I nor II. Hockey terminology-</strong> </span><span style=\"font-family: Cambria Math;\">Striking Circle, Scoop, Back stick, Faceoff, Sticks, Penalty Corner, etc.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Volleyball Terminology</span></strong><span style=\"font-family: Cambria Math;\">- </span><span style=\"font-family: Cambria Math;\">Six Pack, Double Block, Jump Serve, Wipe, Dump, Slide, Side Arm Serve, etc</span><span style=\"font-family: Cambria Math;\">. <strong>Golf Terminology -</strong></span><span style=\"font-family: Cambria Math;\"> Eagle, Bogey, Birdie, Double Bogey, Hook, Fairway, Rough etc.</span><span style=\"font-family: Cambria Math;\"> <strong>Football Terminology</strong>- </span><span style=\"font-family: Cambria Math;\">Free Kick, Dead Ball, Foul, Penalty kick, Dead Ball, Scissor Kick etc. </span></p>\n",
    "question_index": 6

  {

    "options": [

    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">c) </span><span style=\"font-family: Cambria Math;\"> <strong>Arundhati Roy. More books by </strong></span><span style=\"font-family: Cambria Math;\"><strong>her</strong>:-</span><span style=\"font-family: Cambria Math;\"> &ldquo;The God of Small Things&rdquo;, &ldquo;The End of Imagination&rdquo;, &ldquo;The Cost of Living&rdquo;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">&ldquo;The Algebra of Infinite Justice&rdquo;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">&ldquo;Walking with the Comrades&rdquo;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">&ldquo;Kashmir: The Case for Freedom&rdquo;. &ldquo;Capitalism: A Ghost Story&rdquo;</span><span style=\"font-family: Cambria Math;\">. <strong>Jia </strong></span><strong><span style=\"font-family: Cambria Math;\">Pingwa</span></strong><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Cambria Math;\">&ldquo;Ruined City </span><span style=\"font-family: Cambria Math;\">and Qin</span><span style=\"font-family: Cambria Math;\"> Opera&rdquo;). </span><strong><span style=\"font-family: Cambria Math;\">Daniel Gerhard Brown</span></strong><span style=\"font-family: Cambria Math;\"> Angels &amp; Demons, The Da Vinci Code, The Lost Symbol, </span><span style=\"font-family: Cambria Math;\">Inferno ,</span><span style=\"font-family: Cambria Math;\"> and Origin . </span><span style=\"font-family: Cambria Math;\"><strong>Sunita</strong> Narain- </span><span style=\"font-family: Cambria Math;\">She is a writer and environmentalist. In 2005 she was awarded the Padma Shri by the Indian government. </span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Shri Jatin Goswami received several </span><span style=\"font-family: Cambria Math;\">honours</span><span style=\"font-family: Cambria Math;\"> for his contribution to</span></p>\n",

    "solution": "<p><span style=\"font-family: Cambria Math;\">9.(</span><span style=\"font-family: Cambria Math;\">c)</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Sattriya</span></strong><span style=\"font-family: Cambria Math;\"><strong> dance</strong> </span><span style=\"font-family: Cambria Math;\">(Assam): Guru Jatin Goswami (Padma Shri in 2008) and </span><span style=\"font-family: Cambria Math;\">Sharodi</span><span style=\"font-family: Cambria Math;\"> Saikia. </span><span style=\"font-family: Cambria Math;\"><strong>Bharatnatyam dance</strong> </span><span style=\"font-family: Cambria Math;\">(Tamil Nadu): Rukmini Devi, Padma Subrahmanyam, </span><span style=\"font-family: Cambria Math;\">Alarmel</span><span style=\"font-family: Cambria Math;\"> Valli, Yamini Krishnamurthy, Mallika Sarabhai. </span><strong><span style=\"font-family: Cambria Math;\">Kathak dance</span></strong><span style=\"font-family: Cambria Math;\"> (Uttar Pradesh): Pandit Birju Maharaj, Lachu </span><span style=\"font-family: Cambria Math;\">Maharaj, </span><span style=\"font-family: Cambria Math;\">Shovna</span><span style=\"font-family: Cambria Math;\"> Narayan, Kumari Kamala, Pandit </span><span style=\"font-family: Cambria Math;\">Durgalal</span><span style=\"font-family: Cambria Math;\">, Prerana Shrimala, Sitara Devi. </span><strong><span style=\"font-family: Cambria Math;\">Manipuri dance</span></strong><span style=\"font-family: Cambria Math;\"> (Manipur): Darshana Jhaveri, </span><span style=\"font-family: Cambria Math;\">Yumlembam</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Gambhini</span><span style=\"font-family: Cambria Math;\"> Devi, Nirmala Mehta, Guru Bipin Singh, Devyani Chalia.</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> The Nobel Prize for Physics 2022 has been given in the field of</span></p>\n",
    "options": [
