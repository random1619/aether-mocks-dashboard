<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Which Indian musician and sitar player is the founder of the National Orchestra of India?</p>",
    "options": [
      "Ravi Shankar",
      "Shahid Parvez Khan",
      "Kishan Maharaj",
      "Ayyagari Syamasundaram"
    ],
    "correct_option_id": 0,
    "solution": "<p>1.(a) <strong>Ravi Shankar.</strong> He was an Indian musician and player of the sitar, who was influential in stimulating Western appreciation of Indian music. His Awards: Bharat Ratna (1999), Padma Vibhushan (1981), Padma Bhushan (1967) and Grammy Award (1968) for Best Chamber Music Performance for his work \"West Meets East\".</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Gandharva Mahavidyalaya, which was founded by Pandit Vinaya Chandra Maudgalya, is located at ___.</p>",
    "options": [
      "New Delhi",
      "Pune",
      "Kolkata",
      "Mumbai"
    ],
    "correct_option_id": 0,
    "solution": "<p>2.(a) <strong>New Delhi.</strong> Gandharva Mahavidyalaya was established in 1939. It is one of the oldest and most distinguished cultural institutions of Delhi. Its role in imparting training to entire generations of music lovers and bringing Indian classical music and dance into the cultural mainstream is well acknowledged.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. In chess, which of the following may only move forward to the unoccupied square immediately in front of it?</p>",
    "options": [
      "The Bishop",
      "The Queen",
      "The Pawn",
      "The Rook"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>The Pawn.</strong> Chess is a board game for two players. It is played on a square board, made up of 64 smaller squares, with eight squares in each row and column. Chess Pieces Move: King - Moves one square in any direction. Queen - Moves any number of squares diagonally, horizontally, or vertically. Rook - Moves any number of squares horizontally or vertically. Bishop - Moves any number of squares diagonally. Knight - Moves in an &lsquo;L-shape,&rsquo; two squares in a straight direction, and then one square perpendicular to that.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Which is the joint digital skills initiative for employability through digital skills by National Career Service and Microsoft India?</p>",
    "options": [
      "Digisaksham",
      "Vidyadaan",
      "Shiksha Vani",
      "Swayam"
    ],
    "correct_option_id": 0,
    "solution": "<p>4.(a) <strong>Digisaksham</strong>. The DigiSaksham program was launched in 2021. The program was a collaboration between the Ministry of Labour and Employment (MoLE) and Microsoft India. Goal : To help job seekers become more employable by teaching them digital skills. Other Initiatives for Youth Employment : Pradhan Mantri Mudra Yojana (PMMY), National Career Service, and Pradhan Mantri Kaushal Vikas Yojana 3.0.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. In which of the following states is Me-dam-me-phi festival primarily celebrated?</p>",
    "options": [
      "Bihar",
      "Assam",
      "Nagaland",
      "Odisha"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Assam</strong>. Me-Dam-Me-Phi is a community festival celebrated by the Ahom people in memory of their dearly departed. &lsquo;Me&rsquo; means offering, &lsquo;Dam&rsquo; means ancestors and &lsquo;Phi&rsquo; means god. The major festivals celebrated in Assam are Bihu, Baishagu, Ali-Ai-Ligang, Baikho, Rongker, Bohaggiyo Bishu, and Ambubashi Mela.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Match the following Sportsman in List I and Award in List II :<br><strong id=\"docs-internal-guid-3f0df5a6-7fff-945b-f63a-d70f089f0263\"><img src=\"https://lh7-rt.googleusercontent.com/docsz/AD_4nXd_ZYT2XLuoGVdXWhmjBUle0tGN4gZ1uJ8ALo7ftnPSV1h8PI-foAJ6wmU_oPYksmBIwvBJX5TSvzFJ0OCgR4AeL-1b65sCbL2nF_dF3Z-Yy1tUUT3jr1MWBuV8hXGPZBprd-hZcQ?key=9YeyfO-fP2wPp9ObHfIubg5H\" width=\"471\" height=\"99\"></strong></p>",
    "options": [
      "A-ii, B-i, C-iv, D-iii",
      "A-iii, B-iv, C-i, D-ii",
      "A-i, B-iii, C-ii, D-iv",
      "A-iv, B-i, C-iii, D-ii"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(a) <strong>A-ii, B-i, C-iv, D-iii. </strong>Devendra Jhajharia (Paralympic javelin thrower) : Awards - Major Dhyan Chand Khel Ratna (2017), Padma Shri (2012), Arjuna Award (2004). Sumit Antil (javelin thrower) : Award - Khel Ratna Award (2021). Neeraj Chopra : Awards - Arjuna Award (2018), Padma Shri (2022). Shikhar Dhawan is an Indian former cricketer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Who among the following was the youngest recipient of the Sangeetha Kalanidhi awarded by the Music Academy in 1947?</p>",
    "options": [
      "Semmangudi Radhakrishna Srinivasa Iyer",
      "Ariyakudi Ramanuja Iyengar",
      "Mallikarjun Bheemarayappa Mansur",
      "Bhimsen Joshi"
    ],
    "correct_option_id": 0,
    "solution": "<p>7.(a) <strong>Semmangudi Radhakrishna Srinivasa Iyer</strong> (Vocalist) : Awards - National Eminence Award (2002), Kalidas Samman (1980). Ariyakudi Ramanuja Iyengar : Awards - Sangeetha Kalanidhi award (1938), Padma Bhushan (1958). <br>Mallikarjun Bheemarayappa Mansur : Awards - Padma Shri (1970), Padma Bhushan (1976), Padma Vibhushan (1992). <br>Bhimsen Joshi : Awards - Padma Shri (1972), Padma Bhushan (1985), Padma Vibhushan (1999), Bharat Ratna (2009).</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Which web portal was launched by the Department of Telecommunications for sharing information on mobile towers and EMF emission compliance?</p>",
    "options": [
      "E-Amrit",
      "Namaste",
      "Tarang Sanchar",
      "PM-Daksh"
    ],
    "correct_option_id": 2,
    "solution": "<p>8.(c) <strong>Tarang Sanchar. </strong>It has been developed in Public Private Partnership (PPP) mode by the Department of Telecommunications with Industry. Through the portal, the public can access the following services : Locate mobile towers in vicinity of any locality, Locate mobile towers with their EMF Safety Status based on your current location, EMF Measurement Request by Public, Learning resources on EMF.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. India hosted the Asian Games in which of the following years?</p>",
    "options": [
      "1954 and 1986",
      "1951 and 1982",
      "1951 and 1986",
      "1954 and 1982"
    ],
    "correct_option_id": 1,
    "solution": "<p>9.(b) <strong>1951 and 1982.</strong> The Asian Games are organized by the Olympic Council of Asia (OCA) every four years, with headquarters in Kuwait. The 20th Asian Games will be held in Nagoya, Japan, in 2026. Kamaljeet Sandhu became the first Indian woman to win an individual gold medal at the 1970 Asian Games. Bangkok, Thailand, has hosted the most Asian Games (1966, 1970, 1978, and 1998), followed by South Korea in 1986, 2002, and 2014.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Sardhana Christian Fair is held in which of the following states?</p>",
    "options": [
      "West Bengal",
      "Haryana",
      "Madhya Pradesh",
      "Uttar Pradesh"
    ],
    "correct_option_id": 3,
    "solution": "<p>10.(d) <strong>Uttar Pradesh.</strong> Sardhana Christian Fair : Every year on the 1st Sunday of the month of November a large feast is held in honor of Mother Mary. Other Fairs of Uttar Pradesh : Kumbh Mela (the festival of the sacred Pitcher), Gau Charan Fair, Nauchandi Fair, Dewa Sharif Fair, Shakumbhari Fair, Magh Fair (Prayagraj), Rath Fair (Vrindavan), Agra Cattle Fair or Bateshwar Fair (Agra).</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Ali Akbar Khan was associated with which of the following gharanas?</p>",
    "options": [
      "Maihar gharana",
      "Agra gharana",
      "Gwalior gharana",
      "Kirana gharana"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>Maihar gharana. </strong>Ali Akbar Khan : Awards - Padma Bhushan (1967), Padma Vibhushan (1989). Exponents of Maihar gharana : Allauddin Khan, Pandit Nikhil Ranjan Banerjee, Nityanand Haldipur. Agra gharana : Founders - Haji Sujan Khan; Ustad Gagghe Khuda Bakhsh. Gwalior Gharana : Founders - Ustad Hassu Khan, Ustad Haddu Khan and Ustad Nathu Khan. Kirana Gharana : Founders - Abdul Karim Khan and Abdul Wahid Khan.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Vishu festival is celebrated in which of the following states?</p>",
    "options": [
      "Kerala And Karnataka",
      "Kerala And Tamil Nadu",
      "Madhya Pradesh &amp; Rajasthan",
      "Gujarat and Maharashtra"
    ],
    "correct_option_id": 1,
    "solution": "<p>12.(b) <strong>Kerala And Tamil Nadu.</strong> Vishu is a Hindu festival celebrated on the first day of the Malayali month of Medam ( Malayalam New Year). New year festivals : Ugadi (Andhra Pradesh, Karnataka, Telangana), Gudi Padwa (Maharashtra), Baisakhi (Punjab, Haryana), Pohela Boishakh (West Bengal, Tripura), Puthandu (Tamil Nadu), Bohag Bihu (Assam), Cheti Chand (Sindhi community), Losoong (Sikkim), Navreh (Kashmir), Chaitra Sukladi (North India).</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Elelakkaradi dance of Kerala is performed by which of the following tribes?</p>",
    "options": [
      "Irular tribe",
      "Kurumba tribe",
      "Adiyan tribe",
      "Mavilan tribe"
    ],
    "correct_option_id": 0,
    "solution": "<p>13.(a) <strong>Irular tribe. </strong>Elelakkaradi : The dance resembles the fight of the people against the wild bears which often attack their tribal hamlets. Other dances of Kerala : Mudiyettu dance, Thiruvathirakali, Kolkali, Oppana, Kummattikali, Chavittu Natakam, Kakkarissi Natakam, Kanyarkali, Arjuna Nritham, Ezhamathukali, Alamikali, Vedanpaattu, Onathaar.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Bhakti Pradeep Kulkarni is associated with ____.</p>",
    "options": [
      "badminton",
      "kabaddi",
      "chess",
      "cricket"
    ],
    "correct_option_id": 2,
    "solution": "<p>14.(c) <strong>chess</strong>. Bhakti Kulkarni received the FIDE titles of Woman Grandmaster (WGM) in 2012 and International Master (IM) in 2019. Other Chess Players : Subbaraman Vijayalakshmi, Pentala Harikrishna, Divya Deshmukh, Koneru Humpy, Rameshbabu Praggnanandhaa, Viswanathan Anand, Dibyendu Barua.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. The National Youth Policy was launched in:</p>",
    "options": [
      "2012",
      "2013",
      "2014",
      "2015"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>2014</strong>. The National Youth Policy (NYP) defines \"youth\" as individuals aged 15 to 29 years and aims to enhance their growth opportunities. It focuses on improving access to social infrastructure, education, and employment, empowering young people to overcome societal challenges.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
