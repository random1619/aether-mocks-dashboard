<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. <span style=\"font-family: Cambria Math;\">Raut Nacha is a famous folk dance form of ________</span><span style=\"font-family: Cambria Math;\">_ state</span><span style=\"font-family: Cambria Math;\"> of india. </span></p>\n",
    "options": [
      "Chhattisgarh",
      "Sikkim",
      "Punjab",
      "Karnataka"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Chhattisgarh. Other dances</strong><span style=\"font-weight: 400;\"> </span><strong>here </strong><span style=\"font-weight: 400;\">- Saila, Karma, Sua Nacha, Panthi, Gendi. </span><strong>Sikkim -</strong><span style=\"font-weight: 400;\"> Singhi Chaam, Gha To Kito, Maruni, Tamang Selo, Yak Cham, Ghantu. </span><strong>Punjab - </strong><span style=\"font-weight: 400;\">Bhangra, Giddha, Luddi, Sammi. </span><strong>Karnataka -</strong><span style=\"font-weight: 400;\"> Yakshagana, Dollu Kunitha, Gaarudi Gombe, Nagamandala, Joodu Haligi.</span><strong> Assam - </strong><span style=\"font-weight: 400;\">Bihu, Bhortal, Bagurumba.</span></span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">Which among the following dance forms of India is associated with </span><span style=\"font-family: Cambria Math;\">Rajasthan ?</span></p>\n",
    "options": [
      "Kalbelia",
      "Bharatanatyam",
      "Odissi",
      "Kathakali"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">a)</span><span style=\"font-family: Cambria Math;\"> <strong>Kalbelia (</strong><span style=\"font-weight: 400;\">Snake Charmer Dance). Only performed by women while the men play the &ldquo;khanjari&rdquo;&nbsp; and the \"poongi\"( traditionally played to capture snakes ) instrument.&nbsp; UNESCO list of Intangible Cultural Heritage (2010). Other folk dances of</span><strong> Rajasthan </strong><span style=\"font-weight: 400;\">- Ghumar, Chakri, Ganagor, Jhulan Leela, Jhuma, Suisini and Ghapal.</span><strong> </strong><span style=\"font-weight: 400;\">&nbsp;Bharatanatyam (Tamil Nadu). Odissi (Odisha). Kathakali ( Kerala)</span></span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3.<span style=\\\"font-family: Cambria Math;\\\">\\'Freedom in Exile\\' is the autobiographical book of______________.</span></p>\\n",
    "options": [
      "Jawaharlal Nehru",
      "Mahatma Gandhi",
      "J.B. Kriplani",
      "Dalai Lama"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">3.(</span><span style=\\\"font-family: Cambria Math;\\\">d) <strong>Dalai Lama.&nbsp; </strong><span style=\\\"font-weight: 400;\\\">The Dalai Lama wrote </span><strong>two </strong><span style=\\\"font-weight: 400;\\\">autobiographies; the first was &lsquo;My Land And My People&rsquo; and the second was \\'Freedom in Exile\\' . More books by him:- &ldquo; The Art of Happiness&rdquo;, &ldquo;The Book of Joy&rdquo;, &ldquo;Ancient Wisdom, Modern World&rdquo;, &ldquo;Beyond Religion&rdquo;. Jawaharlal Nehru - &ldquo;Toward freedom&rdquo; ( autobiographical book). Mahatma Gandhi - &ldquo;My Experiments with Truth&rdquo;. J B Kripalani - &ldquo;My Times&rdquo; (autobiographical book).</span></span></p>\\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The</span><span style=\"font-family: Cambria Math;\"> Guru Kelucharan Mohapatra Award was instituted in the year 1995. Guru Kelucharan Mohapatra was recognized for which dance form?</span></p>\n",
    "options": [
      "Kathak",
      "Manipuri",
      "Chhau",
      "Odissi"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Odissi. </strong><span style=\"font-weight: 400;\">Awards:- Padma Vibhushan (2000), Padma Bhushan (1988), Padma Shri (1974), Sangeet Natak Akademi Award (1966), Sangeet Natak Akademi Fellowship (1991), Kelucharan Mohapatra (1988-89). Built Srjan in 1993. Other famous personalities of </span><strong>Odissi </strong><span style=\"font-weight: 400;\">(classical dance) - Raghunath Dutta, Deba Prasad Das, Pankaj Charan Das, Gangadhar Pradhan, Jhelum Paranjape, Mayadhar Raut, and Ileana Citaristi.</span></span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p>5.<span style=\"font-family: Cambria Math;\"> \"Ambubachi Mela\" is held in which place?</span></p>\n",
    "options": [
      "Patna",
      "Lucknow",
      "Pune",
      "Guwahati"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Guwahati (Assam). </strong><span style=\"font-weight: 400;\">Ambubachi Mela also known as</span><strong> Ameti </strong><span style=\"font-weight: 400;\">or Tantric fertility festival. </span><span style=\"font-weight: 400;\">It is the celebration of the yearly menstruation (phallus worship - worship of sexual organ) course of goddess Kamakhya. Kamakhya temple is located on Nilachal Hills on the banks of Brahmaputra river. It is built on Nilachala Style of Architecture. Other festivals and melas of</span><strong> Assam </strong><span style=\"font-weight: 400;\">:- Bihu, Me-Dum-Me-Phi, Majuli, Dehing Patkai, Kaziranga Elephant, Ali Ai Ligang, Junbeel Mela, Rongker &amp; Chomangkan, Raas Lila, Karam Puja, Baishagu.</span></span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p>6.<span style=\\\"font-family: Cambria Math;\\\"> Which famous Indian sportsman is nicknamed as \\'Captain </span><span style=\\\"font-family: Cambria Math;\\\">Cool&rsquo; ?</span></p>\\n",
    "options": [
      "Mahendra Singh Dhoni",
      "Major Dhyan Chand",
      "Milkha Singh",
      "Rohit Sharma"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Mahendra Singh Dhoni </strong><span style=\"font-weight: 400;\">(Thala, mahi)</span><strong>. </strong><span style=\"font-weight: 400;\">&nbsp;Other players nicknames :- Sachin Tendulkar (Master Blaster and God of cricket), Mary Kom (Magnificent Mary), Milkha Singh (Flying sikh), Rohit Sharma (Hitman), Major Dhyan Chand (Hockey wizard), Sunil Gavaskar (Little Master), Kapil Dev (Haryana Hurricane), Virat Kohli&nbsp; (Chikoo), Saurav Ganguly - Dada, Prince of Kolkata. Rahul Dravid (The Wall), Yuvraj Singh (Yuvi), Anil Kumble (Jumbo).</span></span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p>7. <span style=\"font-family: Cambria Math;\">As of 2022, which Indian musician has the most number of Oscar awards?</span></p>\n",
    "options": [
      "Asha Bhosle",
      "Gulzar",
      "AR Rahman",
      "Lata Mangeshkar"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">7.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>AR Rahman.</strong><span style=\\\"font-weight: 400;\\\">&nbsp; He won the award for Best Original Score and Best Original Song for the single Jai Ho in the 2009 Oscars for Danny Boyle\\'s Slumdog Millionaire. First Indian woman to win an Oscar Was Bhanu Athaiya (1983) for the film \\'Gandhi\\'.</span><strong> </strong><span style=\\\"font-weight: 400;\\\">Other Indians who won Oscars: - Satyajit Ray, Resul Pookutty Gulzar, Kartiki Gonsalves (2023) and MM Keeravani and Chandrabose (2023). It was started in 1929 and is given by &lsquo;Academy of Motion Picture Arts and Sciences.</span></span></p>\\n",
    "question_index": 6
  },
  {
    "question": "<p>8. <span style=\"font-family: Cambria Math;\">How many field players are in a football team?</span></p>\n",
    "options": [
      "11",
      "14",
      "12",
      "13"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">a) <strong>11 -&nbsp; </strong><span style=\"font-weight: 400;\">Divided into the goalkeeper(1), defenders(3-5), midfielders and forwards. A team will also need to play with less than 11 if one or more of their players get sent off during the match after seeing a</span><strong> </strong><span style=\"font-weight: 400;\">red card for Offenses committed during the game. Number of players in other games :- Badminton - 2 or 4, Baseball - 9, Basketball - 5, Hockey - 11, Kabaddi - 7, Kho -Kho - 9, Polo - 4.</span></span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p>9.<span style=\\\"font-family: Cambria Math;\\\"> Which among the following is India\\'s first Human spaceflight programme? </span></p>\\n",
    "options": [
      "Shukrayaan",
      "Gaganyaan",
      "Mangalyaan",
      "Chandrayaan - 1"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">9.(</span><span style=\\\"font-family: Cambria Math;\\\">b) <strong>Gaganyaan -</strong><span style=\\\"font-weight: 400;\\\"> It envisages demonstration of human spaceflight capability. It will be launched at the end of 2023 or in 2024. Mars Orbiter Mission (MOM, Mangalyaan): Launch vehicle - PSLV-C25, Date - 5 November 2013. Chandrayaan-1 (India\\'s first moon mission): Launched on - 22 October 2008. Place - SDSC SHAR (Sriharikota). Chandrayaan-2: Launched on - 22 July 2019. Launch vehicle - GSLV MkIII-M1. Chandrayaan - 3 : Launched on - 14 July 2023. Launch vehicle - LVM3 M4.</span></span></p>\\n",
    "question_index": 8
  },
  {
    "question": "<p>10<span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\">\\'Galpaguchchha\\', written by Rabindranath Tagore is a collection of ________.</span></p>\\n",
    "options": [
      "devotional songs",
      "poems",
      "English shayaris",
      "short stories\\r\\n "
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">10</span><span style=\\\"font-family: Cambria Math;\\\">.(d) <strong>Short stories. </strong><span style=\\\"font-weight: 400;\\\">Galpaguchchha is a collection of sixty-one of Tagore&rsquo;s short stories. Other short stories by Tagore - \\\"Kabuliwala\\\", &ldquo;Kshudita Pashan\\'\\'. </span><strong>Some novels</strong><span style=\\\"font-weight: 400;\\\"> - Chaturanga, Shesher Kobita, Char Odhay, and Noukadubi. </span><strong>Poetry </strong><span style=\\\"font-weight: 400;\\\">- Gitanjali (Nobel Prize in Literature in 1913).</span></span></p>\\n",
    "question_index": 9
  },
  {
    "question": "<p>11<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">__________ is a festival of sowing seeds in the field. It is a major festival celebrated in Jharkhand.</span></p>\n",
    "options": [
      "Karam",
      "Bandana",
      "Jawa",
      "Rohini"
    ],
    "correct_option_id": 3,
    "solution": "<p>11<span style=\"font-family: Cambria Math;\">.(d) <strong>Rohini. </strong><span style=\"font-weight: 400;\">Festivals like Rajsawala Ambavati and Chitgomha are also celebrated with Rohini. </span><strong>Tribal festivals of Jharkhand</strong><span style=\"font-weight: 400;\"> - Karma, Sarhul,</span><span style=\"font-weight: 400;\"> </span><span style=\"font-weight: 400;\">Akhain Jatra or Hal Punhya, Bhagta Parab, Karam, Bandna, Tusu or Makar.</span></span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p>12<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which among the following dances is also known as Ekaharya, where one dancer takes on many roles in a single performance?</span></p>\n",
    "options": [
      "Bharatnatyam",
      "Kuchipudi ",
      "Kathakali",
      "Kathak"
    ],
    "correct_option_id": 0,
    "solution": "<p>12<span style=\"font-family: Cambria Math;\">.(a) <strong>Bharatnatyam.</strong><span style=\"font-weight: 400;\"> It originated in the temples of South India, particularly, Tamil Nadu. It used to be performed by Devadasis, thus it was also known as Dasiattam. Bharatanatyam artists - Mrinalini Sarabhai, Shobhana, Yamini Krishnamurthy, Padma Subrahmanyam, Chithra Vishveshwaran, etc. Indian classical dances - Bharatanatyam, Kathak, Kathakali, Kuchipudi, Odissi, Sattriya, Manipuri, Mohiniyattam, Chhau.</span></span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p>13<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The Blackbuck National Park is located in ________.</span></p>\n",
    "options": [
      "Sikkim",
      "Gujarat",
      "Madhya Pradesh",
      "Haryana"
    ],
    "correct_option_id": 1,
    "solution": "<p>13<span style=\"font-family: Cambria Math;\">.(b) <strong>Gujarat. </strong><span style=\"font-weight: 400;\">Blackbuck National Park (Velavadar National Park) was established in 1976. Blackbuck is the state animal of three Indian states: - Punjab, Haryana and Andhra Pradesh.&#8203; </span><strong>State and National parks</strong><span style=\"font-weight: 400;\">:- Sikkim - Khangchendzonga. Madhya Pradesh - Bandhavgarh, Kanha, Kuno, Madhav, Panna, etc. Haryana - Kalesar, Sultanpur. Gujarat - Gir, Marine (Gulf of Kachchh), Vansda.</span></span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p>14<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Bhimsen Josh</span><span style=\"font-family: Cambria Math;\">i was one of the greatest Indian vocalists from _________ in the Hindustani classical tradition.</span></p>\n",
    "options": [
      "Karnataka",
      "Tamil Nadu",
      "Maharashtra",
      "Kerala"
    ],
    "correct_option_id": 0,
    "solution": "<p>14<span style=\"font-family: Cambria Math;\">.(a) <strong>Karnataka. </strong><span style=\"font-weight: 400;\">Bhimsen Joshi belongs to the </span><strong>Kirana Gharana</strong><span style=\"font-weight: 400;\"> tradition of Hindustani Classical Music. </span><strong>Award - </strong><span style=\"font-weight: 400;\">&nbsp;Sangeet Natak Akademi Fellowship (1998), Bharat Ratna (2008). </span><strong>Girija Devi -</strong><span style=\"font-weight: 400;\"> Uttar Pradesh, representing the Banaras gharana. </span><strong>Pandit Jasraj - </strong><span style=\"font-weight: 400;\">Haryana, representing Mewati Gharana.</span></span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p>15<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The High court of Delhi was established in _______.</span></p>\n",
    "options": [
      "1962",
      "1947",
      "1951",
      "1966"
    ],
    "correct_option_id": 3,
    "solution": "<p>15<span style=\"font-family: Cambria Math;\">.(d) <strong>1966. </strong><span style=\"font-weight: 400;\">The High Court of Delhi was established with four Judges. They were </span><strong>Chief Justice</strong><span style=\"font-weight: 400;\"> K.S.Hegde, Justice I.D. Dua, Justice H.R.Khanna and Justice S.K.Kapur. Presently, the sanctioned strength of Judges of the High Court of Delhi is 45 permanent Judges and 15 Additional Judges. Chief Justice of Delhi High court (As of June 2023) - Satish Chandra Sharma. Before 1966 under the States Reorganization Act, 1956 Delhi was under the jurisdiction of the Punjab High Court.</span></span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
