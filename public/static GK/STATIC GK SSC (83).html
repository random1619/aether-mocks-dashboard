<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Mocks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #1e293b;
            --dark: #0f172a;
            --gray: #64748b;
            --light-gray: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --body-bg: #030712;
            --header-bg: rgba(15, 23, 42, 0.6);
            --footer-bg: rgba(15, 23, 42, 0.8);
            --box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
            --box-shadow-sm: 0 4px 16px rgba(0,0,0,0.2);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--body-bg);
            color: #f8fafc;
            line-height: 1.6;
            padding-bottom: 80px; /* Space for fixed navigation */
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        /* Header Styles */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f8fafc;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            box-shadow: var(--box-shadow-sm);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #f8fafc;
            text-decoration: none;
            gap: 8px;
        }
        
        .header-brand i {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .control-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        
        .control-btn.active {
            background: var(--primary);
            border-color: var(--primary-light);
        }
        
        .timer-display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            white-space: nowrap;
            color: #f8fafc;
        }
        
        .timer-display i {
            margin-right: 6px;
            color: var(--accent);
        }
        
        /* Main Content */
        .main-content {
            margin-top: 60px;
            padding: 16px;
            min-height: calc(100vh - 140px);
        }
        
        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--light-gray);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--box-shadow-sm);
            transition: var(--transition);
        }
        
        .question-counter {
            font-size: 0.9rem;
            color: var(--gray);
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .question-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #f8fafc;
            overflow-wrap: break-word;
            word-wrap: break-word;
            hyphens: auto;
            max-width: 100%;
        }
        
        .option-item {
            margin-bottom: 12px;
            position: relative;
        }
        
        .option-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .question-text img,
        .option-label img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 8px 0;
            border-radius: 8px;
        }
        
        .option-label {
            display: block;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            color: #f8fafc;
        }
        
        .option-label:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
            box-shadow: var(--box-shadow-sm);
        }
        
        .option-input:checked + .option-label {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 12px var(--primary-glow);
        }
        
        .option-input:checked + .option-label::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--primary);
        }
        
        /* When reviewing answers */
        .review-mode .option-input:checked + .option-label.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 12px var(--success-glow);
        }
        
        .review-mode .option-input:checked + .option-label.correct::after {
            background: var(--success);
        }
        
        .review-mode .option-input:checked + .option-label.incorrect {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.08);
            box-shadow: 0 0 12px var(--danger-glow);
        }
        
        .review-mode .option-input:checked + .option-label.incorrect::after {
            background: var(--danger);
        }
        
        .review-mode .option-label.correct-answer {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 12px var(--success-glow);
        }
        
        .review-mode .option-label.correct-answer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--success);
        }
        
        .solution-container {
            margin-top: 24px;
            padding: 18px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 12px;
            border-left: 3px solid var(--primary);
            border-top: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .solution-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-light);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Question Navigation */
        .question-nav {
            position: fixed;
            top: 60px;
            right: 0;
            bottom: 80px;
            width: 100%;
            max-width: 320px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255,255,255,0.06);
            box-shadow: var(--box-shadow);
            transform: translateX(100%);
            transition: var(--transition);
            z-index: 900;
            overflow-y: auto;
            padding: 16px;
        }
        
        .question-nav.show {
            transform: translateX(0);
        }
        
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .nav-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0;
            color: #f8fafc;
        }
        
        .question-stats {
            display: flex;
            gap: 8px;
        }
        
        .stat-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 500;
            color: white;
        }
        
        .section-selector {
            width: 100%;
            margin-bottom: 16px;
            border-radius: 12px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #f8fafc;
            font-size: 0.9rem;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }
        
        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
        }
        
        .q-box {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            color: #94a3b8;
            transition: var(--transition);
            position: relative;
        }
        
        .q-box:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
            color: #f8fafc;
        }
        
        .q-box.attempted {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }
        
        .q-box.correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
        }
        
        .q-box.incorrect {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
            box-shadow: 0 0 8px var(--danger-glow);
        }
        
        .q-box.current {
            border: 2px solid var(--accent) !important;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
            color: #f8fafc;
        }
        
        .q-box.unattempted {
            background-color: var(--gray);
            color: white;
            border-color: var(--gray);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: var(--footer-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 800;
        }
        
        .nav-btn {
            height: 48px;
            border-radius: 12px;
            border: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            transition: var(--transition);
            gap: 8px;
            cursor: pointer;
        }
        
        .nav-btn i {
            font-size: 1rem;
        }
        
        .nav-btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .nav-btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        
        .nav-btn-outline {
            background: rgba(255,255,255,0.02);
            color: #f8fafc;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        /* Overlay when nav is open */
        .nav-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 80px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 800;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        
        .nav-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Results Modal */
        .results-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            padding: 16px;
        }
        
        .results-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .results-card {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            transform: translateY(20px);
            transition: var(--transition);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .results-modal.show .results-card {
            transform: translateY(0);
        }
        
        .results-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .results-title {
            margin: 0;
            font-weight: 600;
            font-size: 1.4rem;
        }
        
        .results-body {
            padding: 24px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
            font-weight: 500;
        }
        
        .results-footer {
            padding: 18px 24px;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.1);
        }
        
        /* MathJax Styling Override */
        .MathJax, .mjx-chtml {
            overflow-x: auto;
            max-width: 100%;
            display: inline-block;
        }
        
        /* Responsive Adjustments */
        @media (min-width: 992px) {
            .question-nav {
                transform: translateX(0);
            }
            
            .main-content {
                margin-right: 320px;
            }
            
            .nav-overlay {
                display: none;
            }
            
            .bottom-nav {
                display: none;
            }
        }
        
        @media (max-width: 576px) {
            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
                gap: 6px;
            }
            
            .q-box {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
            
            .option-label {
                padding: 12px 14px;
            }
            
            .question-text {
                font-size: 1rem;
            }
            
            .header-brand {
                font-size: 1rem;
            }
            
            .control-btn {
                width: 32px;
                height: 32px;
            }
            
            .timer-display {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            
            .nav-btn {
                height: 44px;
                padding: 0 16px;
                font-size: 0.9rem;
            }
        }
</style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="header-brand">
                <i class="fas fa-graduation-cap"></i>
                <span>Aether Mocks</span>
            </a>
            
            <div class="header-controls">
                <!-- Timer -->
                <div class="timer-display">
                    <i class="far fa-clock"></i>
                    <span id="timer-display">8:00</span>
                </div>
                
                                <!-- Full Screen Button -->
                <button class="control-btn" id="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
                
                <!-- Language toggle -->
                <button class="control-btn" id="lang-btn" onclick="toggleLanguage()">
                    <span id="lang-text">En</span>
                </button>
                
                <!-- Submit button -->
                <button class="control-btn" id="submit-btn" onclick="confirmSubmit()">
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <!-- Questions toggle for mobile -->
                <button class="control-btn nav-toggle-btn" id="nav-toggle" onclick="toggleNav()">
                    <i class="fas fa-th"></i>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main content -->
    <main class="main-content" id="main-content">
        <div class="question-counter" id="question-counter">Question 1 of 15</div>
        
        <!-- Questions will be displayed here -->
        <div id="questions-container"></div>
    </main>
    
    <!-- Overlay for mobile nav -->
    <div class="nav-overlay" id="nav-overlay" onclick="toggleNav(false)"></div>
    
    <!-- Question navigation sidebar -->
    <aside class="question-nav" id="question-nav">
        <div class="nav-header">
            <h3 class="nav-title">Questions</h3>
            <div class="question-stats">
                <span class="stat-badge bg-primary" id="attempted-count">0</span>
                <span class="stat-badge bg-gray" id="total-count">15</span>
                <button class="control-btn d-lg-none" onclick="toggleNav(false)">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <!-- Section selector -->
        <select class="section-selector" id="section-selector" onchange="switchSection(this.value)">
            <option value="all">All Sections</option>
        </select>
        
        <!-- Question grid -->
        <div class="question-grid" id="question-boxes"></div>
    </aside>
    
    <!-- Bottom navigation for mobile -->
    <nav class="bottom-nav d-lg-none">
        <button class="nav-btn nav-btn-outline" onclick="prevQuestion()">
            <i class="fas fa-chevron-left"></i>
            <span>Previous</span>
        </button>
        <button class="nav-btn nav-btn-outline" onclick="nextQuestion()">
            <span>Next</span>
            <i class="fas fa-chevron-right"></i>
        </button>
    </nav>
    
    <!-- Results modal -->
    <div class="results-modal" id="results-modal">
        <div class="results-card">
            <div class="results-header">
                <h3 class="results-title">Test Results</h3>
            </div>
            <div class="results-body">
                <div class="stats-grid">
                    <div class="stat-card" style="background: linear-gradient(135deg, var(--primary), var(--primary-dark))">
                        <div class="stat-value" id="score-value">0</div>
                        <div class="stat-label">Score</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, var(--success), #1b9aaa)">
                        <div class="stat-value" id="correct-value">0</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, var(--danger), var(--accent))">
                        <div class="stat-value" id="incorrect-value">0</div>
                        <div class="stat-label">Incorrect</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, var(--gray), var(--dark))">
                        <div class="stat-value" id="unattempted-value">0</div>
                        <div class="stat-label">Unattempted</div>
                    </div>
                </div>
            </div>
            <div class="results-footer">
                <button class="nav-btn nav-btn-primary" onclick="reviewTest()">
                    <i class="fas fa-search me-1"></i>
                    <span>Review Test</span>
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Questions data
        const questions = [];
        const sections = {};
        let currentLang = "en";
        let currentQuestion = 0;
        let answers = {};
        let submitted = false;
        let totalTime = 8 * 60;
        
                function toggleFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            if (!btn) return;
            const icon = btn.querySelector('i');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    icon.className = 'fas fa-compress';
                }).catch(err => {
                    console.error("Fullscreen error: ", err);
                });
            } else {
                document.exitFullscreen().then(() => {
                    icon.className = 'fas fa-expand';
                });
            }
        }
        
        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreen-btn');
            if (btn) {
                const icon = btn.querySelector('i');
                if (document.fullscreenElement) {
                    icon.className = 'fas fa-compress';
                } else {
                    icon.className = 'fas fa-expand';
                }
            }
        });

        // Initialize the test
        window.onload = function() {
            initializeTest();
            startTimer();

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Odissi. </strong><span style=\"font-weight: 400;\">Awards:- Padma Vibhushan (2000), Padma Bhushan (1988), Padma Shri (1974), Sangeet Natak Akademi Award (1966), Sangeet Natak Akademi Fellowship (1991), Kelucharan Mohapatra (1988-89). Built Srjan in 1993. Other famous personalities of </span><strong>Odissi </strong><span style=\"font-weight: 400;\">(classical dance) - Raghunath Dutta, Deba Prasad Das, Pankaj Charan Das, Gangadhar Pradhan, Jhelum Paranjape, Mayadhar Raut, and Ileana Citaristi.</span></span></p>\n",
                    solution_hi: "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">d) <strong>&#2323;&#2337;&#2367;&#2360;&#2368;&#2404; </strong><span style=\"font-weight: 400;\">&#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;:- &#2346;&#2342;&#2381;&#2350; &#2357;&#2367;&#2349;&#2370;&#2359;&#2339; (2000), &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; (1988), &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; (1974), &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; (1966), &#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2347;&#2364;&#2375;&#2354;&#2379;&#2358;&#2367;&#2346; (1991), &#2325;&#2375;&#2354;&#2369;&#2330;&#2352;&#2339; &#2350;&#2361;&#2366;&#2346;&#2366;&#2340;&#2381;&#2352; (1988-89)&#2404; 1993 &#2350;&#2375;&#2306; &#2360;&#2371;&#2332;&#2344; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; </span><strong>&#2323;&#2337;&#2367;&#2360;&#2368; </strong><span style=\"font-weight: 400;\">(&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351;) &#2325;&#2368; &#2309;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2360;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305; - &#2352;&#2328;&#2369;&#2344;&#2366;&#2341; &#2342;&#2340;&#2381;&#2340;&#2366;, &#2342;&#2375;&#2348;&#2366; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2342;&#2366;&#2360;, &#2346;&#2306;&#2325;&#2332; &#2330;&#2352;&#2339; &#2342;&#2366;&#2360;, &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;, &#2333;&#2375;&#2354;&#2350; &#2346;&#2352;&#2366;&#2306;&#2332;&#2346;&#2375;, &#2350;&#2366;&#2351;&#2366;&#2343;&#2352; &#2352;&#2366;&#2313;&#2340;, &#232                 questions.push({
                    id: "5",
                    section: "18",
                    question_en: "<p>5.<span style=\"font-family: Cambria Math;\"> \"Ambubachi Mela\" is held in which place?</span></p>\n",
                    question_hi: "<p>5.<span style=\"font-family: Cambria Math;\"> \"</span><span style=\"font-family: Cambria Math;\">&#2309;&#2306;&#2348;&#2369;&#2348;&#2366;&#2330;&#2368;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2350;&#2375;&#2354;&#2366;</span><span style=\"font-family: Cambria Math;\"> (Ambubachi Mela)\" </span><span style=\"font-family: Cambria Math;\">&#2325;&#2361;&#2366;&#2305;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2310;&#2351;&#2379;&#2332;&#2367;&#2340;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2325;&#2367;&#2351;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2332;&#2366;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2361;&#2376;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p>Patna</p>\n", "<p>Lucknow</p>\n", 
                                "<p>Pune</p>\n", "<p>Guwahati</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Cambria Math;\">&#2346;&#2335;&#2344;&#2366;</span></p>\n", "<p><span style=\"font-family: Cambria Math;\">&#2354;&#2326;&#2344;&#2314;</span></p>\n",
                                "<p><span style=\"font-family: Cambria Math;\">&#2346;&#2369;&#2339;&#2375;</span></p>\n", "<p><span style=\"font-family: Cambria Math;\">&#2327;&#2369;&#2357;&#2366;&#2361;&#2366;&#2335;&#2368;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Guwahati (Assam). </strong><span style=\"font-weight: 400;\">Ambubachi Mela also known as</span><strong> Ameti </strong><span style=\"font-weight: 400;\">or Tantric fertility festival. </span><span style=\"font-weight: 400;\">It is the celebration of the yearly menstruation (phallus worship - worship of sexual organ) course of goddess Kamakhya. Kamakhya temple is located on Nilachal Hills on the banks of Brahmaputra river. It is built on Nilachala Style of Architecture. Other festivals and melas of</span><strong> Assam </strong><span style=\"font-weight: 400;\">:- Bihu, Me-Dum-Me-Phi, Majuli, Dehing Patkai, Kaziranga Elephant, Ali Ai Ligang, Junbeel Mela, Rongker &amp; Chomangkan, Raas Lila, Karam Puja, Baishagu.</span></span></p>\n",
                    solution_hi: "<p>5.(<span style=\"font-family: Cambria Math;\">d) <strong>&#2327;&#2369;&#2357;&#2366;&#2361;&#2366;&#2335;&#2368; (&#2309;&#2360;&#2350;)&#2404;</strong><span style=\"font-weight: 400;\"> &#2309;&#2306;&#2348;&#2369;&#2348;&#2366;&#2330;&#2368; &#2350;&#2375;&#2354;&#2366; &#2325;&#2379; </span><strong>&#2309;&#2350;&#2375;&#2335;&#2368; </strong><span style=\"font-weight: 400;\">&#2351;&#2366; &#2340;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2313;&#2340;&#2381;&#2360;&#2357; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2342;&#2375;&#2357;&#2368; &#2325;&#2366;&#2350;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2350;&#2366;&#2360;&#2367;&#2325; &#2343;&#2352;&#2381;&#2350; (&#2347;&#2366;&#2354;&#2360; &#2346;&#2370;&#2332;&#2366; - &#2351;&#2380;&#2344; &#2309;&#2306;&#2327; &#2325;&#2368; &#2346;&#2370;&#2332;&#2366;) &#2325;&#2366; &#2313;&#2340;&#2381;&#2360;&#2357; &#2361;&#2376;&#2404; &#2325;&#2366;&#2350;&#2366;&#2326;&#2381;&#2351;&#2366; &#2350;&#2306;&#2342;&#2367;&#2352; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2325;&#2375; &#2340;&#2335; &#2346;&#2352; &#2344;&#2368;&#2354;&#2366;&#2330;&#2354; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2361; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2368; &#2344;&#2368;&#2354;&#2366;&#2330;&#2354;&#2366; &#2358;&#2376;&#2354;&#2368; &#2346;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; </span><strong>&#2309;&#2360;&#2350; &#2325;&#2375; &#2309;&#2344;&#2381;&#2351; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352;:</strong><span style=\"font-weight: 400;\">- &#2348;&#2367;&#2361;&#2370;, &#2350;&#2368;-&#2342;&#2350;-&#2350;&#2368;-&#2347;&#2368;, &#2350;&#2366;&#2332;&#2369;&#2354;&#2368;, &#2342;&#2375;&#2361;&#2367;&#2306;&#2327; &#2346;&#2335;&#2325;&#2366;&#2312;, &#2325;&#2366;&#2332;&#2368;&#2352;&#2306;&#2327;&#2366; &#2361;&#2366;&#2341;&#2368;, &#2309;&#2354;&#2368; &#2320; &#2354;&#2367;&#2327;&#2366;&#2306;&#2327;, &#2332;&#2369;&#2344;&#2348;&#2368;&#2354; &#2350;&#2375;&#2354;&#2366;, &#2352;&#2379;&#2306;&#2327;&#2325;&#2375;&#2352; &#2324;&#2352; &#2330;&#2379;&#2350;&#2366;&#2306;&#2327;&#2325;&#2344;, &#2352;&#2366;&#2360; &#2354;&#2368;&#2354;&#2366;, &#2325;&#2352;&#2350; &#2346;&#2370;&#2332;&#2366;, &#2348;&#2376;&#2358;&#2366;&#2327;&#2369;&#2404;</span></span></p>\n",
                    correct: "d",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });

                    question_en: "<p>6.<span style=\"font-family: Cambria Math;\"> Which famous Indian sportsman is nicknamed as \'Captain </span><span style=\"font-family: Cambria Math;\">Cool&rsquo; ?</span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Mahendra Singh Dhoni </strong><span style=\"font-weight: 400;\">(Thala, mahi)</span><strong>. </strong><span style=\"font-weight: 400;\">&nbsp;Other players nicknames :- Sachin Tendulkar (Master Blaster and God of cricket), Mary Kom (Magnificent Mary), Milkha Singh (Flying sikh), Rohit Sharma (Hitman), Major Dhyan Chand (Hockey wizard), Sunil Gavaskar (Little Master), Kapil Dev (Haryana Hurricane), Virat Kohli&nbsp; (Chikoo), Saurav Ganguly - Dada, Prince of Kolkata. Rahul Dravid (The Wall), Yuvraj Singh (Yuvi), Anil Kumble (Jumbo).</span></span></p>\n",
                    solution_hi: "<p>6.(a) <strong>&#2350;&#2361;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2367;&#2306;&#2361; &#2343;&#2379;&#2344;&#2368; </strong><span style=\"font-weight: 400;\">(&#2341;&#2366;&#2354;&#2366;, &#2350;&#2366;&#2361;&#2368;)&#2404; &#2309;&#2344;&#2381;&#2351; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2313;&#2346;&#2344;&#2366;&#2350;:- &#2360;&#2330;&#2367;&#2344; &#2340;&#2375;&#2306;&#2342;&#2369;&#2354;&#2325;&#2352; (&#2350;&#2366;&#2360;&#2381;&#2335;&#2352; &#2348;&#2381;&#2354;&#2366;&#2360;&#2381;&#2335;&#2352; &#2324;&#2352; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2325;&#2375; &#2349;&#2327;&#2357;&#2366;&#2344;), &#2350;&#2376;&#2352;&#2368; &#2325;&#2377;&#2350; (&#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2347;&#2367;&#2360;&#2375;&#2306;&#2335; &#2350;&#2376;&#2352;&#2368;), &#2350;&#2367;&#2354;&#2381;&#2326;&#2366; &#2360;&#2367;&#2306;&#2361; (&#2347;&#2381;&#2354;&#2366;&#2311;&#2306;&#2327; &#2360;&#2367;&#2326;), &#2352;&#2379;&#2361;&#2367;&#2340; &#2358;&#2352;&#2381;&#2350;&#2366; (&#2361;&#2367;&#2335;&#2350;&#2376;&#2344;), &#2350;&#2375;&#2332;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344;&#2330;&#2306;&#2342; (&#2361;&#2377;&#2325;&#2368; &#2325;&#2375; &#2332;&#2366;&#2342;&#2370;&#2327;&#2352;), &#2360;&#2369;&#2344;&#2368;&#2354; &#2327;&#2366;&#2357;&#2360;&#2381;&#2325;&#2352; (&#2354;&#2367;&#2335;&#2367;&#2354; &#2350;&#2366;&#2360;&#2381;&#2335;&#2352;) , &#2325;&#2346;&#2367;&#2354; &#2342;&#2375;&#2357; (&#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366; &#2361;&#2352;&#2367;&#2325;&#2375;&#2344;), &#2357;&#2367;&#2352;&#2366;&#2335; &#2325;&#2379;&#2361;&#2354;&#2368; (&#2330;&#2368;&#2325;&#2370;), &#2360;&#2380;&#2352;&#2357; &#2327;&#2366;&#2306;&#2327;&#2369;&#2354;&#2368; - &#2342;&#2366;&#2342;&#2366;, &#2346;&#2381;&#2352;&#2367;&#2306;&#2360; &#2321;&#2347; &#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366;&#2404; &#2352;&#2366;&#2                 questions.push({
                    id: "7",
                    section: "18",
                    question_en: "<p>7. <span style=\"font-family: Cambria Math;\">As of 2022, which Indian musician has the most number of Oscar awards?</span></p>\n",
                    question_hi: "<p>7. <span style=\"font-family: Cambria Math;\">2022 </span><span style=\"font-family: Cambria Math;\">&#2340;&#2325;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">&#2325;&#2367;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2325;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2346;&#2366;&#2360;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2360;&#2348;&#2360;&#2375;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2309;&#2343;&#2367;&#2325;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2321;&#2360;&#2381;&#2325;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2361;&#2376;&#2306;</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
                    options_en: ["<p><span style=\"font-family: Cambria Math;\"> Asha Bhosle</span></p>\n", "<p>Gulzar</p>\n", 
                                "<p>AR Rahman</p>\n", "<p>Lata Mangeshkar</p>\n"],
                    options_hi: ["<p><span style=\"font-family: Cambria Math;\">&#2310;&#2358;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2349;&#2379;&#2360;&#2354;&#2375;</span></p>\n", "<p><span style=\"font-family: Cambria Math;\">&#2327;&#2369;&#2354;&#2332;&#2364;&#2366;&#2352;</span></p>\n",
                                "<p><span style=\"font-family: Cambria Math;\">&#2319;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2310;&#2352;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2352;&#2361;&#2350;&#2366;&#2344;</span></p>\n", "<p><span style=\"font-family: Cambria Math;\">&#2354;&#2340;&#2366;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">&#2350;&#2306;&#2327;&#2375;&#2358;&#2325;&#2352;</span></p>\n"],
                    solution_en: "<p><span style=\"font-family: Cambria Math;\">7.(</span><span style=\"font-family: Cambria Math;\">c) <strong>AR Rahman.</strong><span style=\"font-weight: 400;\">&nbsp; He won the award for Best Original Score and Best Original Song for the single Jai Ho in the 2009 Oscars for Danny Boyle\'s Slumdog Millionaire. First Indian woman to win an Oscar Was Bhanu Athaiya (1983) for the film \'Gandhi\'.</span><strong> </strong><span style=\"font-weight: 400;\">Other Indians who won Oscars: - Satyajit Ray, Resul Pookutty Gulzar, Kartiki Gonsalves (2023) and MM Keeravani and Chandrabose (2023). It was started in 1929 and is given by &lsquo;Academy of Motion Picture Arts and Sciences.</span></span></p>\n",
                    solution_hi: "<p>7.(c) <strong>&#2319; &#2310;&#2352; &#2352;&#2361;&#2350;&#2366;&#2344;&#2404;</strong><span style=\"font-weight: 400;\"> &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2337;&#2376;&#2344;&#2368; &#2348;&#2377;&#2351;&#2354; &#2325;&#2368; &#2360;&#2381;&#2354;&#2350;&#2337;&#2377;&#2327; &#2350;&#2367;&#2354;&#2367;&#2351;&#2344;&#2375;&#2351;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 2009 &#2325;&#2375; &#2321;&#2360;&#2381;&#2325;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325;&#2354; &#2332;&#2351; &#2361;&#2379; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2352;&#2381;&#2357;&#2358;&#2381;&#2352;&#2375;&#2359;&#2381;&#2336; &#2350;&#2370;&#2354; &#2360;&#2381;&#2325;&#2379;&#2352; &#2324;&#2352; &#2360;&#2352;&#2381;&#2357;&#2358;&#2381;&#2352;&#2375;&#2359;&#2381;&#2336; &#2350;&#2370;&#2354; &#2327;&#2368;&#2340; &#2325;&#2366; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2332;&#2368;&#2340;&#2366;&#2404; &#2347;&#2367;&#2354;&#2381;&#2350; \'&#2327;&#2366;&#2306;&#2343;&#2368;\' &#2325;&#2375; &#2354;&#2367;&#2319; &#2321;&#2360;&#2381;&#2325;&#2352; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2349;&#2366;&#2344;&#2369; &#2309;&#2341;&#2376;&#2351;&#2366; (1983) &#2341;&#2368;&#2306;&#2404; &#2321;&#2360;&#2381;&#2325;&#2352; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2344;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351;:- &#2360;&#2340;&#2381;&#2351;&#2332;&#2368;&#2340; &#2352;&#2375;, &#2352;&#2375;&#2360;&#2369;&#2354; &#2346;&#2369;&#2325;&#2369;&#2335;&#2381;&#2335;&#2368; &#2327;&#2369;&#2354;&#2332;&#2364;&#2366;&#2352;, &#2325;&#2366;&#2352;&#2381;&#2340;&#2367;&#2325;&#2368; &#2327;&#2379;&#2306;&#2360;&#2366;&#2354;&#2381;&#2357;&#2375;&#2360; (2023) &#2324;&#2352; &#2319;&#2350;&#2319;&#2350; &#2325;&#2368;&#2352;&#2                     solution_en: "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">a) <strong>11 -&nbsp; </strong><span style=\"font-weight: 400;\">Divided into the goalkeeper(1), defenders(3-5), midfielders and forwards. A team will also need to play with less than 11 if one or more of their players get sent off during the match after seeing a</span><strong> </strong><span style=\"font-weight: 400;\">red card for Offenses committed during the game. Number of players in other games :- Badminton - 2 or 4, Baseball - 9, Basketball - 5, Hockey - 11, Kabaddi - 7, Kho -Kho - 9, Polo - 4.</span></span></p>\n",

                    solution_en: "<p><span style=\"font-family: Cambria Math;\">9.(</span><span style=\"font-family: Cambria Math;\">b) <strong>Gaganyaan -</strong><span style=\"font-weight: 400;\"> It envisages demonstration of human spaceflight capability. It will be launched at the end of 2023 or in 2024. Mars Orbiter Mission (MOM, Mangalyaan): Launch vehicle - PSLV-C25, Date - 5 November 2013. Chandrayaan-1 (India\'s first moon mission): Launched on - 22 October 2008. Place - SDSC SHAR (Sriharikota). Chandrayaan-2: Launched on - 22 July 2019. Launch vehicle - GSLV MkIII-M1. Chandrayaan - 3 : Launched on - 14 July 2023. Launch vehicle - LVM3 M4.</span></span></p>\n",

                                "<p>1951</p>\n", "<p>1966</p>\n"],
                    solution_en: "<p>15<span style=\"font-family: Cambria Math;\">.(d) <strong>1966. </strong><span style=\"font-weight: 400;\">The High Court of Delhi was established with four Judges. They were </span><strong>Chief Justice</strong><span style=\"font-weight: 400;\"> K.S.Hegde, Justice I.D. Dua, Justice H.R.Khanna and Justice S.K.Kapur. Presently, the sanctioned strength of Judges of the High Court of Delhi is 45 permanent Judges and 15 Additional Judges. Chief Justice of Delhi High court (As of June 2023) - Satish Chandra Sharma. Before 1966 under the States Reorganization Act, 1956 Delhi was under the jurisdiction of the Punjab High Court.</span></span></p>\n",
                    solution_hi: "<p>15<span style=\"font-family: Cambria Math;\">.(d) <strong>1966 </strong><span style=\"font-weight: 400;\">&#2404;</span><strong> </strong><span style=\"font-weight: 400;\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2330;&#2366;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2368; &#2327;&#2312;&#2404; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306;&nbsp; </span><strong>&#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</strong><span style=\"font-weight: 400;\"> K.S.&#2361;&#2375;&#2327;&#2337;&#2364;&#2375;, &#2344;&#2381;&#2351;&#2366;&#2351;&#2350;&#2370;&#2352;&#2381;&#2340;&#2367; I.D.&#2342;&#2369;&#2310;, &#2344;&#2381;&#2351;&#2366;&#2351;&#2350;&#2370;&#2352;&#2381;&#2340;&#2367; H.R.&#2326;&#2344;&#2381;&#2344;&#2366; &#2324;&#2352; &#2344;&#2381;&#2351;&#2366;&#2351;&#2350;&#2370;&#2352;&#2381;&#2340;&#2367;&nbsp; S.K.&#2325;&#2346;&#2370;&#2352; &#2341;&#2375;&#2404; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306;, &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 45 &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2324;&#2352; 15 &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2361;&#2376;&#2306;&#2404; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; (&#2332;&#2370;&#2344; 2023 &#2340;&#2325;) - &#2360;&#2340;&#2368;&#2358; &#2330;&#2306;&#2342;&#2381;&#2352; &#2358;&#2352;&#2381;&#2350;&#2366;&#2404; 1966 &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2369;&#2344;&#2352;&#2381;&#2327;&#2336;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1956 &#2325;&#2375; &#2340;&#2361;&#2340; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368;, &#2346;&#2306;&#2332;&#2366;&#2348; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2341;&#2368;&#2404;</span></span></p>\n",
                    correct: "d",
                    pos_marks: 3.0,
                    neg_marks: 1.0
                });
            
            // Generate question boxes
            const boxesContainer = document.getElementById('question-boxes');
            questions.forEach((q, index) => {
                const box = document.createElement('div');
                box.className = 'q-box';
                box.textContent = index + 1;
                box.onclick = () => showQuestion(index);
                box.id = `box-${index}`;
                boxesContainer.appendChild(box);
            });
            
            // Show first question
            showQuestion(0);
            updateProgress();
        }
        
        // Show a specific question
        
        function formatContent(text) {
            if (!text) return '';
            return text.replace(/<img/g, '<img style="max-width:100%;height:auto;"');
        }
        
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestion = index;
            const question = questions[index];
            
            // Update question counter
            document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
            
            // Update question boxes
            document.querySelectorAll('.q-box').forEach(box => box.classList.remove('current'));
            document.getElementById(`box-${index}`).classList.add('current');
            
            // Generate question HTML
            let html = `
                <div class="question-card">
                    <div class="question-text">
                        <div class="en">${formatContent(question.question_en)}</div>
                        <div class="hi" style="display:none">${formatContent(question.question_hi)} </div>
                    </div>
                    <div class="options" id="options-container">`;
            
            // Add options
            ['a', 'b', 'c', 'd'].forEach((opt, i) => {
                let optionClass = '';
                let isCorrectAnswer = opt === question.correct;
                let isUserAnswer = answers[question.id] === opt;
                
                // When reviewing, add appropriate classes
                if (submitted) {
                    if (isCorrectAnswer) {
                        optionClass += ' correct-answer';
                    } else if (isUserAnswer && !isCorrectAnswer) {
                        optionClass += ' incorrect';
                    }
                }
                
                html += `
                    <div class="option-item">
                        <input class="option-input" type="radio" name="q${index}" 
                            id="opt-${index}-${opt}" value="${opt}" 
                            ${isUserAnswer ? 'checked' : ''}
                            onclick="selectAnswer('${question.id}', '${opt}')">
                       <label class="option-label${optionClass}" for="opt-${index}-${opt}">
                            <div class="en">${question.options_en[i]}</div>
                            <div class="hi" style="display:none">${question.options_hi[i]}</div>
                        </label>
                    </div>`;
            });
            
            // Add solution if submitted
            if (submitted) {
                const isCorrect = answers[question.id] === question.correct;
                const resultText = answers[question.id] ? (isCorrect ? 'Correct!' : 'Incorrect!') : 'Not attempted';
                
                html += `
                    <div class="solution-container">
                        <div class="solution-title">${resultText}</div>
                        <div class="solution-text">
                            <div class="en">${question.solution_en}</div>
                            <div class="hi" style="display:none">${question.solution_hi}</div>
                        </div>
                    </div>`;
            }
            
            html += `</div></div>`;
            
            document.getElementById('questions-container').innerHTML = html;
            
            // Apply language settings
            applyLanguage();
            
            // If in mobile view, close the menu
            if (window.innerWidth < 992) {
                toggleNav(false);
            }
            
            // Add review mode class if submitted
            if (submitted) {
                document.getElementById('options-container').classList.add('review-mode');
            }
        }
        
        // Apply current language
        function applyLanguage() {
            document.querySelectorAll(`.${currentLang}`).forEach(el => el.style.display = 'block');
            document.querySelectorAll(`.${currentLang === 'en' ? 'hi' : 'en'}`).forEach(el => el.style.display = 'none');
            
            // Update language button text
            document.getElementById('lang-text').textContent = currentLang === 'en' ? 'Hi' : 'En';
        }
        
        // Select an answer
        function selectAnswer(qId, option) {
            if (submitted) return;
            
            answers[qId] = option;
            updateProgress();
            
            // Mark question as attempted in the navigation
            const index = questions.findIndex(q => q.id === qId);
            if (index >= 0) {
                const box = document.getElementById(`box-${index}`);
                box.classList.add('attempted');
                box.classList.remove('unattempted');
            }
        }
        
        // Navigate to previous/next question
        function prevQuestion() { 
            if (currentQuestion > 0) showQuestion(currentQuestion - 1); 
        }
        
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1); 
        }
        
        // Switch section
        function switchSection(sectionId) {
            if (sectionId === 'all') {
                showQuestion(0);
                return;
            }
            
            const section = sections[sectionId];
            if (section) showQuestion(section.start);
        }
        
        // Toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            applyLanguage();
        }
        
        // Toggle navigation sidebar
        function toggleNav(show) {
            const nav = document.getElementById('question-nav');
            const overlay = document.getElementById('nav-overlay');
            
            if (show === undefined) {
                show = !nav.classList.contains('show');
            }
            
            if (show) {
                nav.classList.add('show');
                overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            } else {
                nav.classList.remove('show');
                overlay.classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        
        // Update progress
        function updateProgress() {
            const attempted = Object.keys(answers).length;
            document.getElementById('attempted-count').textContent = attempted;
        }
        
        // Start timer
        function startTimer() {
            const timerDisplay = document.getElementById('timer-display');
            let timeLeft = totalTime;
            
            const timerInterval = setInterval(() => {
                if (timeLeft <= 0 || submitted) {
                    clearInterval(timerInterval);
                    if (!submitted) submitTest();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        }
        
        // Confirm before submitting
        function confirmSubmit() {
            if (submitted) return;
            
            const attempted = Object.keys(answers).length;
            const remaining = questions.length - attempted;
            
            // Create a more modern confirmation dialog
            const confirmHtml = `
                <div style="text-align: center; padding: 20px;">
                    <h4 style="margin-bottom: 16px; color: var(--dark);">Confirm Submission</h4>
                    <p style="margin-bottom: 24px; color: var(--gray);">
                        You have attempted ${attempted} of ${questions.length} questions.<br>
                        ${remaining} questions are unattempted.
                    </p>
                    <div style="display: flex; justify-content: center; gap: 12px;">
                        <button onclick="this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; border: 1px solid var(--light-gray); background: white; border-radius: 8px; cursor: pointer;">
                            Cancel
                        </button>
                        <button onclick="submitTest(); this.closest('.modal').querySelector('.cancel-btn').click()" 
                            style="padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">
                            Submit Test
                        </button>
                    </div>
                </div>`;
            
            // Create modal element
            const modal = document.createElement('div');
            modal.className = 'results-modal show';
            modal.innerHTML = `
                <div class="results-card" style="max-width: 400px;">
                    <button class="cancel-btn" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray);" onclick="this.closest('.results-modal').remove()">
                        ×
                    </button>
                    ${confirmHtml}
                </div>`;
            
            document.body.appendChild(modal);
        }
        
        // Submit test
        function submitTest() {
            if (submitted) return;
            
            submitted = true;
            
            let score = 0;
            let correctCount = 0;
            let incorrectCount = 0;
            let unattemptedCount = 0;
            
            questions.forEach((q, index) => {
                const userAns = answers[q.id];
                const box = document.getElementById(`box-${index}`);
                
                box.classList.remove('attempted');
                
                if (!userAns) {
                    unattemptedCount++;
                    box.classList.add('unattempted');
                } else if (userAns === q.correct) {
                    correctCount++;
                    score += q.pos_marks;
                    box.classList.add('correct');
                } else {
                    incorrectCount++;
                    score -= q.neg_marks;
                    box.classList.add('incorrect');
                }
            });
            
            // Update result values
            document.getElementById('score-value').textContent = score.toFixed(2);
            document.getElementById('correct-value').textContent = correctCount;
            document.getElementById('incorrect-value').textContent = incorrectCount;
            document.getElementById('unattempted-value').textContent = unattemptedCount;
            
            // Show the results modal
            document.getElementById('results-modal').classList.add('show');
            
            // Disable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-check"></i>';
            submitBtn.style.backgroundColor = 'var(--success)';
            
            // Refresh current question view to show solution
            showQuestion(currentQuestion);
        }
        
        // Review test
        function reviewTest() {
            document.getElementById('results-modal').classList.remove('show');
            showQuestion(0);
        }
        
        // Close modal when clicking outside
        window.addEventListener('click', function(event) {
            if (event.target === document.getElementById('results-modal')) {
                document.getElementById('results-modal').classList.remove('show');
            }
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevQuestion();
            if (e.key === 'ArrowRight') nextQuestion();
        });
    </script>
</body>
</html>
