<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {

    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which among the following is an agricultural festival of Arunachal Pradesh and celebrated by the Galo tribe?</span></p>\n",

: Cambria Math;\">Jharkhand). </span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Gair dance is performed by the ______________community of Rajasthan.</span></p>\n",
    "options": [
      "Bhil",
      "Gond",

    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Bhil. Gair dance -</strong> </span><span style=\"font-family: Cambria Math;\">It is most famous in the Mewar and </span><span style=\"font-family: Cambria Math;\">Marwar</span><span style=\"font-family: Cambria Math;\"> regions of Rajasthan. It is performed on occasions like Holi and Janmashtami. It originated from the Bhil dance. </span><span style=\"font-family: Cambria Math;\"><strong>Folk Dances</strong> </span><span style=\"font-family: Cambria Math;\">(Rajasthan): </span><span style=\"font-family: Cambria Math;\">Ghoomar</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Kathputli</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Kalbelia</span><span style=\"font-family: Cambria Math;\">, Walar, Terah Taali, Gair, Gawri, Chakri, </span><span style=\"font-family: Cambria Math;\">bhavai</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">chari</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Kacchi</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Ghodi</span><span style=\"font-family: Cambria Math;\">. </span><strong><span style=\"font-family: Cambria Math;\">Tribes </span></strong><span style=\"font-family: Cambria Math;\">(Rajasthan): Minas, Damor, </span><span style=\"font-family: Cambria Math;\">Dhanka</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Garasia</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Kathodi</span><span style=\"font-family: Cambria Math;\">.</span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Ilyas Khan was born in Lucknow to a family of musicians. He was famous for playing</span></p>\n",

      "Tabla",
      "Sitar",
      "Veena",

    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> \"Magnus Carlsen\" is associated with which of the following games?</span></p>\n",
    "options": [
      "Boxing",

    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">c) </span><strong><span style=\"font-family: Cambria Math;\">Chess.</span><span style=\"font-family: Cambria Math;\"> </span></strong><span style=\"font-family: Cambria Math;\"><strong>Magnus Carlsen</strong> - </span><span style=\"font-family: Cambria Math;\">A Norwegian chess grandmaster who is a former five-time World Chess Champion. </span><strong><span style=\"font-family: Cambria Math;\">Famous Chess player </span></strong><span style=\"font-family: Cambria Math;\">(India) - Viswanathan Anand, </span><span style=\"font-family: Cambria Math;\">Pentala</span><span style=\"font-family: Cambria Math;\"> Harikrishna, Koneru Humpy, Rameshbabu </span><span style=\"font-family: Cambria Math;\">Praggnanandhaa</span><span style=\"font-family: Cambria Math;\">, Vidit </span><span style=\"font-family: Cambria Math;\">Gujrathi</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Parimarjan</span><span style=\"font-family: Cambria Math;\"> Negi, Krishnan Sasikiran, Surya Shekhar Ganguly, Abhijeet Gupta.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Terms</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">related to Chess - Castling, Rook, Back-rank checkmate etc.</span></p>\n",

    "question_index": 5

y: Cambria Math;\">Bhortal</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\"><strong>Haryana</strong> - </span><span style=\"font-family: Cambria Math;\">Khoria</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Phag</span><span style=\"font-family: Cambria Math;\">, Daph, </span><span style=\"font-family: Cambria Math;\">Dhamal</span><span style=\"font-family: Cambria Math;\">, Loor, Gugga, </span><span style=\"font-family: Cambria Math;\">Saang</span><span style=\"font-family: Cambria Math;\">.</span></p>\n",

ont-family: Cambria Math;\">) ,</span><span style=\"font-family: Cambria Math;\"> Kalidas Samman (by Madhya Pradesh Government). </span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Dr. APJ Abdul Kalam, famous Indian scientist, autobiography is known as_________.</span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Pandit Shiv Kumar Sharma, an Indian musician and composer was the foremost exponent of the______.</span></p>\n",

    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">10.(</span><span style=\"font-family: Cambria Math;\">b) <strong>Santoor. Pandit Shiv Kumar Sharma</strong> (</span><span style=\"font-family: Cambria Math;\">Jammu and Kashmir) </span><strong><span style=\"font-family: Cambria Math;\">Awards</span></strong><span style=\"font-family: Cambria Math;\"> - Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Award (1986), the Padma Shri (1991), and the Padma Vibhushan </span><span style=\"font-family: Cambria Math;\">( 2001</span><span style=\"font-family: Cambria Math;\">).</span><span style=\"font-family: Cambria Math;\"> <strong>Famous Santoor players:</strong> </span><span style=\"font-family: Cambria Math;\">Rahul Sharma, Satish Vyas, Tarun Bhattacharya, Bhajan Sopori, Abhay Sopori, etc. </span></p>\n",
