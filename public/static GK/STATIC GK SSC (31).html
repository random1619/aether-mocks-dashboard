<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="28">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">14</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">28 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">1</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which of the following is NOT a folk dance belonging to the union territory of Jammu and Kashmir?</span></p>",
    "options": [
      "Dhumal",
      "Hafiza",
      "Rouf",
      "Dangi"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1</span><span style=\"font-family: Cambria Math;\">.(d)</span><span style=\"font-family: Cambria Math;\"> The Dangi is a Folk Dance of himachal pradesh .The Dance performed by Dangis is called Dangi Nrutya. Men and women join to make a chain making serpentine movements with one of them leading. One of the amazing sights of this Dance is the creation of the human pyramids.</span></p>",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">2</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">In which state has the Jawara Dance, a dance form to celebrate wealth, originated?</span></p>",
    "options": [
      "Rajasthan",
      "Gujarat",
      "Madhya Pradesh",
      "Kerala"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(c) </span><span style=\"font-family: Cambria Math;\">Originated from Madhya Pradesh state and originally it was considered as the symbol of the reaping of good harvest. It is regarded as one of the best dance forms for any event or occasion performed at prosperity time.</span></p>",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Bhavai and Kalbelia as traditional dance forms , owe their genesis to which Indian state?</span></p>",
    "options": [
      "Punjab",
      "Rajasthan",
      "Assam",
      "Odisha"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">.(b) </span><span style=\"font-family: Cambria Math;\">Bhavai and Kalbelia are traditional dance forms of Rajasthan. In Bhavai Women wear colourful dresses such as Ghaghra cholis and dupattas and they balance a number of earthen pots on their head and dance. Kalbelia dance is performed by a tribe of people known by the same name, Kalbelia.</span></p>",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Select the correct pair of dance forms and its state.</span></p>",
    "options": [
      "Dalkhai- Karnataka",
      "Kalbelia - HimachalPradesh",
      "Thang Ta - Bihar",
      "Padayani - Kerala"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(d) </span><span style=\"font-family: Cambria Math;\">Padayani literally means </span><span style=\"font-family: Cambria Math;\">&ldquo;</span><span style=\"font-family: Cambria Math;\">row of warriors</span><span style=\"font-family: Cambria Math;\">&rdquo; </span><span style=\"font-family: Cambria Math;\">is a dance form belonging to Kerala. Performed in honour of </span><span style=\"font-family: Cambria Math;\">&ldquo;</span><span style=\"font-family: Cambria Math;\">Bhadrakali</span><span style=\"font-family: Cambria Math;\">&rdquo; </span><span style=\"font-family: Cambria Math;\">(i.e. an avatar of Lord Shiva) this dance form has its origins in the Pathanamthitta district in Kerala. </span><span style=\"font-family: Cambria Math;\">Dalkhai - Odisha, Kalbelia- Rajasthan, Thang Ta - Manipur.</span></p>",
    "question_index": 3
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">5</span><span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\">In which of the following festivals the meaning is \\'merry making of the gods\\'?</span></p>",
    "options": [
      "Diwali",
      "Pongal",
      "Li Haroba",
      "Makar Sankranti"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5</span><span style=\"font-family: Cambria Math;\">.(c)</span><span style=\"font-family: Cambria Math;\"> Lai Haraoba is the ritual ceremonial festival of Manipur which is believed to be the act of re-enactment of the creation of the universe by the gods and goddesses at the sacred site Haraothel of Koubru Hill.</span></p>",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">In which of the following Indian states is the Lai Haraoba festival celebrated?</span></p>",
    "options": [
      "Goa",
      "Karnataka",
      "Manipur",
      "Kerala"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">.(c) </span><span style=\"font-family: Cambria Math;\">Lai Haraoba is a ritualistic festival of the Meiteis observing from ancient times. It mirrors the entire culture of Manipur and depicts the close affinities between the hill and plain people. </span></p>",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> In which state is the festival of Uttarayan uniquely celebrated?</span></p>",
    "options": [
      "Jharkhand",
      "Uttar Pradesh",
      "Kerala",
      "Gujarat"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(d) </span><span style=\"font-family: Cambria Math;\">Uttarayan, as Makar</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\"> Sankranti is called in Gujarati, is a major festival in the state of Gujarat which lasts for two days. </span><span style=\"font-family: Cambria Math;\">14 </span><span style=\"font-family: Cambria Math;\">January is Uttarayan and </span><span style=\"font-family: Cambria Math;\">15 </span><span style=\"font-family: Cambria Math;\">January is Vasi-Uttarayan (Stale Uttarayan).</span></p>",
    "question_index": 6
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">8</span><span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\">Who among the following was a famous \\'Qawwali singer\\'?</span></p>",
    "options": [
      "Bade Ghulam Ali Khan",
      "Nusrat Fateh Ali Khan",
      "Begum Akhtar",
      "Nazia Hassan"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">.(b)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Nusrat Fateh Ali Khan, born Pervez Fateh Ali Khan, was a Pakistani vocalist, musician and music director primarily a singer of Qawwali, a form of Sufi Islamic devotional music.</span></p>",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Which of the following academies organise the Tansen Sangeet Samaroh in Gwalior?</span></p>",
    "options": [
      "Ustad Alauddin Khan Kala Evam Sangeet Academy",
      "Multirama Sangeet Academy",
      "Ravindra Jain Sangeet Academy",
      "Renuka Sangeet Academy"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">.(a) </span><span style=\"font-family: Cambria Math;\">Ustad Alauddin khan kala Evam Sangeet Academy organised Tansen Samaroh in Gwalior. Tansen Samaroh is the oldest and esteemed classical music festival in India.</span></p>",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The wood of which of the following trees is used to make the large plucked string instrument used in Carnatic classical music known as Bobbili Veena/Saraswathi Veena?</span></p>",
    "options": [
      "Teak wood",
      "Jackfruit wood",
      "Walnut wood",
      "Sandal wood"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">.(b) </span><span style=\"font-family: Cambria Math;\">Bobbili Veena is carved from a single piece of jack wood.</span></p>",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Prolific Indian Painter Maqbool Fida Hussain predominantly used which of these animals to depict a lively and free spirit in his paintings?</span></p>",
    "options": [
      "Tigers",
      "Cows",
      "Elephants",
      "Horses"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.(d) </span><span style=\"font-family: Cambria Math;\">Maqbool Fida Hussain also known as M.F. Hussain predominantly used horses in his painting to depict a lively and free spirit. He was awarded Padma Shri in </span><span style=\"font-family: Cambria Math;\">1966</span><span style=\"font-family: Cambria Math;\">, Padma Bhushan in</span><span style=\"font-family: Cambria Math;\">1973 </span><span style=\"font-family: Cambria Math;\">and Padma Vibhushan in </span><span style=\"font-family: Cambria Math;\">1991</span><span style=\"font-family: Cambria Math;\">.</span></p>",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The process of coating grooves or engravings in ornaments with coloured enamels is called_____.</span></p>",
    "options": [
      "Phulkari",
      "Zardozi",
      "Meenakari",
      "Chikankari"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(c)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Meenakari designing basically refers to the process of coating grooves or engravings in ornaments with colored enamels. A wide variety of metals can be used for meenakari designing which include brass, copper, silver and gold.</span></p>",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which city in India is world renowned for one of the most traditional embroidery styles, Chikankari?</span></p>",
    "options": [
      "Ahmedabad",
      "Lucknow",
      "Hyderabad",
      "Udaipur"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(b) </span><span style=\"font-family: Cambria Math;\">Chikankari is a traditional embroidery style from Lucknow, India. It is also popular by the name Lucknow chikan or Lucknow Chikankari or Chikan Embroidery. It is believed that the wife of Jahangir, Nur jehan introduced this embroidery.</span></p>",
    "question_index": 12
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">14</span><span style=\\\"font-family: Cambria Math;\\\">.</span><span style=\\\"font-family: Cambria Math;\\\"> Who wrote the play \\'Mricchakatika\\' (The Little Clay Cart), a social drama with touches of grim reality?</span></p>",
    "options": [
      "Raidasa",
      "Magh",
      "Kalidasa",
      "Sudraka"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.(d)</span><span style=\"font-family: Cambria Math;\"> Mrichchhakatika means </span><span style=\"font-family: Cambria Math;\">&lsquo;</span><span style=\"font-family: Cambria Math;\">The little clay cart</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Cambria Math;\">written by sidraka. Poverty is the main theme of this play.</span></p>",
    "question_index": 13
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
