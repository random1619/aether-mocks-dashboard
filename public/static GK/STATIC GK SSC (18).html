<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Which of the following dances is performed by women on various occasions to the beating of a drum in Madhya Pradesh?</p>",
    "options": [
      "Matki dance",
      "Mundari",
      "Rouf",
      "Bhagoria"
    ],
    "correct_option_id": 0,
    "solution": "<p>1.(a) <strong>Matki dance</strong> - Women balance earthen pots on their heads while dancing. Other folk dance of Madhya pradesh: Tertali- Performed by two or three women sitting on the ground. Lehangi - A dance of the Banjara and Kanjar tribes, performed during the monsoon. Akiri Dance - A signature dance of the cattle herders in Gwalior. Bhagoriya - It is a dance of the Bhils tribe.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. In which year was the first edition of the Indian Premier League (IPL) cricket tournament held?</p>",
    "options": [
      "2015",
      "2003",
      "2008",
      "2018"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>2008</strong>. The inaugural IPL season was won by Rajasthan Royals. There have been seventeen seasons of the IPL tournament (As of August, 2024). Mumbai Indians and Chennai Super Kings have each won five titles.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. In which of the following states is the Hornbill festival celebrated?</p>",
    "options": [
      "Nagaland",
      "Manipur",
      "Assam",
      "Mizoram"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Nagaland</strong>. Hornbill festival is celebrated annually in the first week of December. It is celebrated by the Naga tribe. It takes place at Kisama Heritage Village, around 12 km from Kohima (Capital city). It began in 2000. Other festivals in the state are Sekrenyi and Aoleang.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Who of the following is famous for playing the musical instrument Kanjira?</p>",
    "options": [
      "Kishan Maharaj",
      "Pannalal Ghosh",
      "Pudukkotai Dakshinamurthi Pillai",
      "S.V. Rajarao"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c)<strong> Pudukkottai Dakshinamurthi Pillai.</strong> His Awards: Kalaimamani award (1985), Sahitya Kala Parishad award (1992). Other Indian Kanjira players: Anandan Sivamani, Jamey Haddad, Natarajan Ganesh Kumar.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Kathak dance is known as a combination of ______ .</p>",
    "options": [
      "Music and narrative only",
      "Music and drama only",
      "Music and dance only",
      "Music, dance and narrative"
    ],
    "correct_option_id": 3,
    "solution": "<p>5.(d)<strong> Music, dance and narrative. </strong>Kathak is one of the classical dances of India. The word Kathak has been derived from the word Katha which means a story. It is mainly performed in Northern India and often portrays the legends of Radha and Krishna. Notable Kathak dancers are Pandit Birju Maharaj and Sitara Devi.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Which instrument is played by Pandit Ravi Shankar?</p>",
    "options": [
      "Sarod",
      "Guitar",
      "Sitar",
      "Tabla"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(c) <strong>Sitar</strong>. His awards: Bharat Ratna (1999), Padma Vibhushan (1981), and Padma Bhushan (1967). Exponents of Various Musical Instruments: Sitar - Nikhil Banerjee, Manilal Nag, and Mustaq Ali Khan; Sarod - Amjad Ali Khan, Allaudin Khan, and Ustad Ali Akbar Khan; Tabla - Allah Rakha, Pt. Kishan Maharaj.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Radha Sridhar is associated with which of the following classical dance?</p>",
    "options": [
      "Sattriya",
      "Bharatnatyam",
      "Kathak",
      "Manipuri"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.(b) <strong>Bharatnatyam</strong>. Her Award - Sangeet Natak Akademi Award (2018). Other Exponents of Bharatnatyam - Mrinalini Sarabhai, Mallika Sarabhai, Padma Subramanyam, Yamini Krishnamurthy and Anita Ratnam. Exponents of Indian Classical Dances: Kathak - Pandit Birju Maharaj, Roshan Kumari, Shovana Narayan, and Kumudini Lakhia; Manipuri - Guru Bipin Singh, Darshana Jhaveri, and Charu Mathur; Sattriya - Guru Jatin Goswami, Guru Ghanakanta Bora, and Bhabananda Barbayan.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Gurpurab is celebrated by which of the following community ?</p>",
    "options": [
      "Hindu",
      "Christian",
      "Sikh",
      "Parsi"
    ],
    "correct_option_id": 2,
    "solution": "<p>8.(c) <strong>Sikh</strong>. Gurpurab is celebrated in honour of the Sikh Gurus. Other Fairs and Festivals of Punjab - Lohri, Basant Panchami, Hola Mohalla, Maghi, Bandi Chhor Divas, and Baisakhi.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Which sport is played by the Indian sportsperson Anjum Chopra ?</p>",
    "options": [
      "Lawn Tennis",
      "Cricket",
      "Badminton",
      "Football"
    ],
    "correct_option_id": 1,
    "solution": "<p>9.(b) <strong>Cricket</strong>. Sports and their personalities: Cricket - Harmanpreet Kaur, Shafali Verma, Smriti Mandhana. Tennis - Sania Mirza, Rohan Bopanna, Mahesh Bhupathi. Badminton - Saina Nehwal, PV Sindhu, Prakash Padukone. Football - Sunil Chhetri, Gurmeet Singh, Bhaichung Bhutia.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Rukmini Devi is regarded as one of the most distinguished artists of _____.</p>",
    "options": [
      "Bharatanatyam",
      "Kathakali",
      "Mohiniattam",
      "Bhortal Dance"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.(a) <strong>Bharatanatyam</strong>. Rukmini Devi Arundale - The first woman in Indian history to be nominated as a member&nbsp;of the Rajya Sabha. She established the Kalakshetra Foundation at Adyar, Chennai. Her award: Padma Bhushan (1956). Other Exponents of Bharatanatyam: Meenakshi Sundaram Pillai, T. Balasaraswati, Alarmel Valli, and Yamini Krishnamurthy.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. A football match is played by two teams, each with a maximum of _____.</p>",
    "options": [
      "eleven players",
      "ten players",
      "five players",
      "seven players"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>eleven players.</strong> Sports and Number of Players: Cricket (11), Basketball (5), Volleyball (6), Hockey (11), Baseball (9), Handball (7), Water Polo (7), Kabaddi (7), and Kho Kho (9).</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. _____ in Indian Dance is given in recognition of excellence and achievement in performance or research studies in Indian Dance.</p>",
    "options": [
      "The Manorama Thakkar Award",
      "The Uday Shankar Award",
      "The Rukmini Devi Award",
      "The Nritya Choodamani Award"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>The Manorama Thakkar Award. </strong>Rukmini Devi Arundale was a trailblazer in the world of Bharatanatyam. Uday Shankar was an Indian dancer and choreographer, best known for creating a fusion style of dance. The Nritya Choodamani Award is given to artists who have made outstanding contributions to their art form and society through their dedication and performances.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. In which of the following states of India is the Nongkrem festival celebrated ?</p>",
    "options": [
      "Rajasthan",
      "Madhya Pradesh",
      "Tamil Nadu",
      "Meghalaya"
    ],
    "correct_option_id": 3,
    "solution": "<p>13.(d) <strong>Meghalaya</strong>. The Nongkrem dance festival is celebrated during Autumn at Smit, the cultural centre of the Khasi Hills. It is a five day long religious festival of the Khasis. Other festivals of Meghalaya : Shad Suk Mynsiem, Behdienkhlam Festival, Shad Sukra, Wangala Festival, Strawberry Festival.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Which dance form originated in Andhra Pradesh ?</p>",
    "options": [
      "Kuchipudi",
      "Kathak",
      "Bharatnatyam",
      "Sattriya"
    ],
    "correct_option_id": 0,
    "solution": "<p>14.(a) <strong>Kuchipudi </strong>is one of the eight major Indian classical dances. It originates from a village named Kuchipudi in Andhra Pradesh. List of Classical dances: Bharatanatyam (Tamil Nadu), Kathak (Uttar Pradesh), Kuchipudi (Andhra Pradesh), Odissi (Odisha), Kathakali (Kerala), Sattriya (Assam), Manipuri (Manipur), Mohiniyattam (Kerala).</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. In any tennis game, any game starts at 0-0 and the zero point in tennis is called ______.</p>",
    "options": [
      "origin",
      "start",
      "love",
      "base"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>love</strong>. The word Love (for zero score) comes from the French word l\\'oeuf &ndash; which means egg which is in the shape of zero. Common tennis terms: ACE, Backhand, Advantage, Deuce, Double fault, Forehand, Alley, Baseline, Break Point, Fault, Serve, Drop Shot.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
