<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Which state government honoured Vani Jairam with the MS Subbulakshmi Award for 2019?</p>",
    "options": [
      "Maharashtra",
      "Karnataka",
      "Odisha",
      "Tamil Nadu"
    ],
    "correct_option_id": 3,
    "solution": "<p>1.(d) <strong>Tamil Nadu.</strong> Vani Jairam was an Indian playback singer, fondly referred to as the \"Meera of Modern India.\" She received the Padma Bhushan award in 2023. M.S. Subbulakshmi Award is a tribute to the legendary Carnatic singer, M.S. Subbulakshmi. She was the first musician ever to be awarded the Bharat Ratna in 1998.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Ranjana Gauhar was awarded the Padma Shri Award (2003) for her contribution to which of the following Indian dance forms?</p>",
    "options": [
      "Kuchipudi",
      "Sattriya",
      "Odissi",
      "Manipuri"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>Odissi</strong>. Ranjana Gauhar also received the Sangeet Natak Akademi Award in 2007. Other renowned Odissi dancers include Kelucharan Mohapatra, Mayadhar Raut, Sanjukta Panigrahi, Ratikant Mohapatra, Deba Prasad Das, Kumkum Mohanty, Pankaj Charan Das, and Aruna Mohanty.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Who won the paralympic bronze medal in archery for India at Tokyo in 2020?</p>",
    "options": [
      "Atanu Das",
      "Pravin Jadhav",
      "Deepika Kumari",
      "Harvinder Singh"
    ],
    "correct_option_id": 3,
    "solution": "<p>3.(d) <strong>Harvinder Singh</strong> is a double Paralympic medalist, having won gold at the 2024 Paris Paralympics and bronze at the 2020 Tokyo Paralympics. Some famous Indian archers include Deepika Kumari, Dola Banerjee, Tarundeep Rai, Atanu Das, Ankita Bhakat, Pravin Ramesh Jadhav, Jyothi Surekha Vennam, and Ojas Deotale.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Chhath Puja is the main festival of which state?</p>",
    "options": [
      "Bihar",
      "Tamil Nadu",
      "Karnataka",
      "Assam"
    ],
    "correct_option_id": 0,
    "solution": "<p>4.(a) <strong>Bihar</strong>. Chhath Puja, celebrated on the sixth day of Kartik in the Hindu calendar, is also known as Surya Shashthi. This bathing festival involves four days of abstinence and religious purity, marking a rigorous spiritual ritual. Other notable festivals in Bihar include Rajgir Mahotsav, Mahaveer Jayanti, Buddha Jayanti, and Makar Sankranti.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Which Indian singer wrote &lsquo;Raag Sarita&rsquo;?</p>",
    "options": [
      "Kesarbai Kerkar",
      "Balasaheb Poonchwale",
      "Kumar Gandharva",
      "Chintaman Raghunath Vyas"
    ],
    "correct_option_id": 3,
    "solution": "<p>5.(d) <strong>Chintaman Raghunath Vyas </strong>was an Indian classical singer, renowned for his khyal style. He received the Padma Bhushan in 1992 and the Sangeet Natak Akademi Award in 1987. He researched traditional ragas and bandishes, composing over 200 bandishes in various ragas under the pen name Gunijaan. In tribute to his guru, Gunidas, he founded the Gunidas Sangeet Sammelan in 1977.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Presently, which of the following countries in NOT a beneficiary of India&rsquo;s Duty-Free Tariff Preference (DFTP) Scheme?</p>",
    "options": [
      "Rwanda",
      "Burundi",
      "Myanmar",
      "Angola"
    ],
    "correct_option_id": 3,
    "solution": "<p>6.(d) <strong>Angola</strong>. India\\'s Duty-Free Tariff Preference (DFTP) Scheme, introduced in 2008, grants Least Developed Countries (LDCs) duty-free access to the Indian market for a wide range of products. As of June 2023, 35 Least Developed Countries (LDCs) have been notified as beneficiaries of the scheme. Some of these countries include Benin, Liberia, Togo, Burkina Faso, Madagascar, Zambia, Burundi, Malawi, Afghanistan, Chad, Mali, Bangladesh, Uganda, Sierra Leone, Lesotho, and Tanzania.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. The birth anniversary of Mahatma Gandhi is celebrated as the national festival of India. In which of the following years was Gandhi ji born?</p>",
    "options": [
      "1885",
      "1869",
      "1890",
      "1877"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.(b) <strong>1869</strong>. 2nd October is also observed globally as the International Day of Non-Violence in recognition of his contributions to peace and non-violent movements. India\\'s three national festivals are: Republic Day (January 26) - Marks the adoption of the Indian Constitution in 1950. Independence Day (August 15) - Commemorates India\\'s independence from British rule in 1947. Gandhi Jayanti (October 2) - Celebrates the birth anniversary of Mahatma Gandhi.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. The Nandi Award for Best Male Playback Singer was instituted by which state in the year 1977?</p>",
    "options": [
      "Gujarat",
      "Andhra Pradesh",
      "Tripura",
      "Maharashtra"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b) <strong>Andhra Pradesh.</strong> S. P. Balasubrahmanyam holds the successful record of winning the most Nandi Awards in this category. The Nandi Awards recognize excellence in Telugu cinema, theatre, television, and lifetime achievements in Indian cinema. They are presented annually by the Government of Andhra Pradesh and were first awarded in 1964.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Indian Olympic Association was established in which of the following years ?</p>",
    "options": [
      "1927",
      "1931",
      "1933",
      "1929"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a) <strong>1927</strong>. The Indian Olympic Association is headquartered in New Delhi. The first president of the association was Sir Dorabji Tata, and the current president (as of September 2024) is PT Usha. The International Olympic Committee was founded on June 23, 1894, in Paris, France. Its founders are Pierre de Coubertin and Demetrios Vikelas. The headquarters are located in Lausanne, Switzerland.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Which of the following is India&rsquo;s national academy of dance ?</p>",
    "options": [
      "Lalit Kala Akademi",
      "Centre for Cultural Resources and Training",
      "Centre for Indian Classical Dances",
      "Sangeet Natak Akademi"
    ],
    "correct_option_id": 3,
    "solution": "<p>10.(d) <strong>Sangeet Natak Akademi</strong> was set up in 1953. It has three constituent units, two of these being dance-teaching institutions: the Jawaharlal Nehru Manipur Dance Academy (JNMDA) at Imphal, and Kathak Kendra in Delhi. Lalit Kala Akademi is India\\'s national academy of fine arts established in 1954. Centre for Cultural Resources and Training, established in 1979, works in the field of linking education with culture.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Padma Bhushan awardee, Ustad Sabri Khan played which of the following musical instruments?</p>",
    "options": [
      "Sarod",
      "Santoor",
      "Tabla",
      "Sarangi"
    ],
    "correct_option_id": 3,
    "solution": "<p>11.(d) <strong>Sarangi</strong>. Ustad Sabri Khan was awarded the Padma Bhushan in 2006. Musical instruments and exponents: Sarod - Ali Akbar Khan, Amjad Ali Khan, Radhika Mohan Maitra, Buddhadev Das Gupta. Santoor - Tarun Bhattacharya, Ulhas Bapat. Tabla - Zakir Hussain, Ustad Alla Rakha, Shaikh Dawood Khan.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Match the following neighbouring countries with their official languages correctly. <br>Country name <br>Official Languages <br>1. Afghanistan <br>a. Dzongkha<br>2. Bhutan <br>b. Burmese <br>3. Pakistan <br>c. Dari <br>4. Myanmar<br>d. Urdu</p>",
    "options": [
      "1-c, 2-a, 3-b, 4-d",
      "1-c, 2-a, 3-d, 4-b",
      "1-c, 2-d, 3-a, 4-b",
      "1-a, 2-c, 3-d, 4-b"
    ],
    "correct_option_id": 1,
    "solution": "<p>12.(b) <strong>1-c, 2-a, 3-d, 4-b.</strong> Country and Official language: Bangladesh(Bengali), Israel (Hebrew), Maldives (Dhivehi), Netherlands (Dutch), Portugal (Portuguese), Saudi Arabia (Arabic), Sri Lanka (Sinhala and Tamil).</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Where was the Hindu College established in the year 1791?</p>",
    "options": [
      "Mathura",
      "Kolkata",
      "Benaras",
      "Patna"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>Benaras</strong>. The Hindu College was founded by Jonathan Duncan, a British officer, and Raja Rameshwar Singh, the Maharaja of Banaras. The college was originally known as the Sanskrit College, and it was dedicated to the study of Sanskrit language and literature. In 1958, the Sanskrit College became a university and was renamed Sampurnanand Sanskrit University in 1974. Raja Ram Mohan Roy established the Hindu College in Calcutta in 1817, which is now known as Presidency University, Kolkata.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Sangeet Kala Acharya Award is given by which organisation every year since 1993?</p>",
    "options": [
      "Madras Music Academy",
      "Calcutta School of Music",
      "Shankar Mahadevan Academy",
      "Subramaniam Academy of Performing Arts"
    ],
    "correct_option_id": 0,
    "solution": "<p>14.(a) <strong>Madras Music Academy :</strong> It was established as an offshoot of the All India Congress Session in December 1927 and inaugurated on August 18, 1928, by Sir CP Ramaswami Aiyar at the YMCA Auditorium, Esplanade. Its mission was to set the standard for Carnatic music. In 1929, it initiated annual music conferences, leading to the December Music Festival of Madras, one of the world\\'s largest cultural events. Sangita Kala Acharya : This award was instituted in 1993 and is given to those who have contributed by bringing several disciples to the concert platform.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Sangeet Natak Akademy Awardee Sulochana Chavan was a famous ________ singer.</p>",
    "options": [
      "Giddha",
      "Jhumair",
      "Ghumar",
      "Lavani"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Lavani</strong>. Sulochana Chavan : Her Awards - Padma Shri (in 2022), Lata Mangeshkar Award (in 2010), Sangeet Natak Akademi Award (in 2012). Other Lavani Singers : Bela Shende, Asha Bhosle, Usha Mangeshkar, Vaishali Samant.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
