<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. <span style=\"font-family: Cambria Math;\">Rann Utsav is celebrated in which of the following states?</span></p>\n",
    "options": [
      "Goa",
      "Punjab",
      "Gujarat",
      "Haryana"
    ],
    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>Gujarat</strong>. <span style=\"font-family: Cambria Math;\">Rann Utsav - It was conceptualised as a three-day festival, which progressively evolved into a 100-day celebration at Dhordo, a village near Rann of Kutch. States and Festivals: Gujarat - Navratri, Janmashtami, Kutch Utsav, Uttarayana, </span><span style=\"font-family: Cambria Math;\">Punjab - Lohri, Baisakhi, Haryana - The Kurukshetra Festival, Goa - Shigmo, Sunburn festival, Ladain, Mando.</span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">Which of the following is a folk dance from the state of Guja</span><span style=\"font-family: Cambria Math;\">rat? </span></p>\n",
    "options": [
      "Trippani",
      "Phag",
      "Dhimsa",
      "Dhamal"
    ],
    "correct_option_id": 0,
    "solution": "<p>2.(a) <strong>Tippani </strong><span style=\"font-family: Cambria Math;\">(Gujarati dance from Chorwad district). Other Dances of Gujarat: Hudo, Mer Ras, Palli Jag Garbo, Vinchhudo, Maniaro Raas. Phag - Haryana (performed by the agricultural community), Dhimsa - Andhra Pradesh (performed by the Porja tribe). Dhamaal dance is fam</span><span style=\"font-family: Cambria Math;\">ous in the Gurgaon region, which is home to the Ahirs.</span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3.<span style=\"font-family: Cambria Math;\"> Who among the following is a famous music director?</span></p>\n",
    "options": [
      "Khayyam",
      "Sameer",
      "Anjaan",
      "Kaifi Azmi"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Khayyam </strong><span style=\"font-family: Cambria Math;\">(Mohammed Zahur Khayyam Hashmi)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">was a famous music director in Hindi cinema. Known for - Umrao Jaan, Kabhi Kabhie, Razia </span><span style=\"font-family: Cambria Math;\">Sultan, Dil-e-Nadaan, Dard, Thodisi Bewafai. </span><span style=\"font-family: Cambria Math;\"><strong>Award </strong>-</span><span style=\"font-family: Cambria Math;\"> Padma Bhushan (2011)</span><span style=\"font-family: Cambria Math;\">. <strong>Sameer</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>was a lyricist. </span><strong><span style=\"font-family: Cambria Math;\">Anjaan </span></strong><span style=\"font-family: Cambria Math;\">was an Indian lyricist. </span><span style=\"font-family: Cambria Math;\"><strong>Kaifi Azmi</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>was a poet.</span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p>4.<span style=\"font-family: Cambria Math;\"> What is the only sport specifically designed to be played by participants of both genders simultaneously?</span></p>\n",
    "options": [
      "Netball",
      "Quidditch",
      "Korfball",
      "Basketball"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c) <strong>Korfball </strong><span style=\"font-family: Cambria Math;\">- It</span><span style=\"font-family: Cambria Math;\"> is a ball sport, with similarities to netball and basketball. It was invented in the Netherlands in 1902 by Nico Broekhuysen. Each team has 8 players, 4 men and 4 women, who are divided into an attacking and defending division. Aim - To score by throwing </span><span style=\"font-family: Cambria Math;\">the ball through a basket that is 3.5 meters high (11.5 feet).</span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p>5.<span style=\"font-family: Cambria Math;\"> Which of the following countries is NOT a member of SAARC (South Asian Association for Region</span><span style=\"font-family: Cambria Math;\">al Cooperation)?</span></p>\n",
    "options": [
      "Pakistan",
      "Myanmar",
      "Afghanistan",
      "Bhutan"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Myanmar</strong>. <strong>SAARC</strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(South Asian Association for Regional Cooperation) is the regional intergovernmental organization and geopolitical union of states in South Asia. </span><span style=\"font-family: Cambria Math;\"><strong>Member states </strong>:</span><span style=\"font-family: Cambria Math;\"> Afghanistan, Bangladesh, Bhutan, India, Maldives, Nepal, Pakistan, a</span><span style=\"font-family: Cambria Math;\">nd Sri Lanka.</span><span style=\"font-family: Cambria Math;\"> Founded :</span><span style=\"font-family: Cambria Math;\"> 8 December 1985, Dhaka (Bangladesh). </span><span style=\"font-family: Cambria Math;\">Objectives</span><span style=\"font-family: Cambria Math;\"> - To promote economic cooperation, social progress, and cultural development among its member states. </span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p>6.<span style=\"font-family: Cambria Math;\"> Lui Ngai Ni is a festival that is associated with which of the following states?</span></p>\n",
    "options": [
      "Manipur",
      "Uttar Pradesh",
      "Uttarakhand",
      "Himachal Pradesh"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a) <strong>Manipur</strong>. <strong>Lui Ngai Ni</strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- A festival that is celebrated by the Naga tribes of Manipur (India). It is a seed-sowing festival that marks the beginning of the new year for the Nagas. The festival is celebrated on February 15th every year.</span><span style=\"font-family: Cambria Math;\"> <strong>Important Festivals </strong>: <strong>Manipur</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Ningol Chak</span><span style=\"font-family: Cambria Math;\">ouba, Cheiraoba, Kang, Lai Haraoba, Yaoshang. </span><span style=\"font-family: Cambria Math;\"><strong>Uttar Pradesh</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Ram Navmi, Ganga Mahotsav, Navaratri, Khichdi. </span><span style=\"font-family: Cambria Math;\"><strong>Himachal Pradesh</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Rakhadumni, Gochi Festival. </span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p>7.<span style=\"font-family: Cambria Math;\"> Gulabo Sapera is associated to which of the following dance form?</span></p>\n",
    "options": [
      "Sattriya",
      "Kuchipudi",
      "Kalbelia",
      "Pandavani"
    ],
    "correct_option_id": 2,
    "solution": "<p>7.(c) <strong>Kalbelia </strong><span style=\\\"font-family: Cambria Math;\\\">(Folk dance of Rajasthan) - It is well known by other names like \\'Sapera Dance\\' or \\'Snake Charmer Dance\\'. It is particularly performed by a Rajasthani tribe called \\'Kalbelia\\'. Gulabo Sapera Awards - Padma Shri in 2016, Bharat Gaurav Award (2021). </span><strong><span style=\\\"font-family: Cambria Math;\\\">Sattriya</span><span style=\\\"font-family: Cambria Math;\\\"> </span></strong><span style=\\\"font-family: Cambria Math;\\\">- Classical dance form of Assam. </span><strong><span style=\\\"font-family: Cambria Math;\\\">Kuchipudi </span></strong><span style=\\\"font-family: Cambria Math;\\\">- Andhra Pradesh, </span><strong><span style=\\\"font-family: Cambria Math;\\\">Pandavani </span></strong><span style=\\\"font-family: Cambria Math;\\\">- Chattisgarh.</span></p>\\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which of the following classical dance forms is associat</span><span style=\"font-family: Cambria Math;\">ed with Hindustani Classical Music?</span></p>\n",
    "options": [
      "Kathak",
      "Sattriya",
      "Mohiniyattam",
      "Kathakali"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) <strong>Kathak </strong>(<span style=\"font-family: Cambria Math;\">Uttar Pradesh). </span><strong><span style=\"font-family: Cambria Math;\">Exponents</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Pandit Birju Maharaj, Shovna Narayan, Sitara Devi. </span><span style=\"font-family: Cambria Math;\"><strong>Classical Dances </strong></span><span style=\"font-family: Cambria Math;\">of India</span><span style=\"font-family: Cambria Math;\"> - </span><span style=\"font-family: Cambria Math;\">Bharatanatyam (Tamil Nadu), Kathakali (Kerala), Kuchipudi (Andhra Pradesh), Mohiniyattam (Kerala), Odissi (Odisha), Sattri</span><span style=\"font-family: Cambria Math;\">ya (Assam), Manipuri (Manipur). </span><span style=\"font-family: Cambria Math;\"><strong>Indian Classical Music</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>has 2 Schools - Hindustani Music (mainly in North India) and Carnatic music (mainly in Southern India).</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which state has become the first state to launch a dedicated Semiconductor Policy in July 2022?</span></p>\n",
    "options": [
      "Haryana",
      "Madhya Pradesh",
      "Kerala",
      "Gujarat"
    ],
    "correct_option_id": 3,
    "solution": "<p>9.(d) <strong>Gujarat </strong>(<span style=\"font-family: Cambria Math;\">2022-27). </span><span style=\"font-family: Cambria Math;\"><strong>India Semiconductor Mission </strong></span><span style=\"font-family: Cambria Math;\">(2021) : Objective - Development of sustainable sem</span><span style=\"font-family: Cambria Math;\">iconductor and display ecosystem; Under the Ministry of Electronics and Information Technology; Provide financial support to companies investing in semiconductors. Micron Technology (US-based Company) has signed a Memorandum of Understanding (MoU) with the</span><span style=\"font-family: Cambria Math;\"> state government of Gujarat to establish a Semiconductor Unit worth Rs 22,500 crore near Ahmedabad. India and the US signed MoU on establishing the Semiconductor Supply chain during India - US 5th Commercial Dialogue 2023. </span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Which of the following states has the honour of being India\\'s first carbon-free state?</span></p>\\n",
    "options": [
      "Arunachal Pradesh",
      "Himachal Pradesh",
      "Madhya Pradesh",
      "Kerala"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">10</span><span style=\\\"font-family: Cambria Math;\\\">.(b) <strong>Himachal Pradesh </strong>(</span><span style=\\\"font-family: Cambria Math;\\\">India\\'s first and the world\\'s second carbon-free state). </span><span style=\\\"font-family: Cambria Math;\\\">A state is </span><span style=\\\"font-family: Cambria Math;\\\"><strong>carbon</strong>-<strong>free</strong></span><span style=\\\"font-family: Cambria Math;\\\"><strong> </strong>if all of its electricity is from clean energy sources like wind, solar, and nuclear. First carbon neutral district - Majuli (Assam). First carbon free panchayat - Pali Village (Jammu and Kashmir). </span><strong><span style=\\\"font-family: Cambria Math;\\\">Bhutan </span></strong><span style=\\\"font-family: Cambria Math;\\\">is the first carbon negative</span><span style=\\\"font-family: Cambria Math;\\\"> country in the world. </span></p>\\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> What was the percentage of women working in the primary sector of India as of 2011 - 2012 ?</span></p>\n",
    "options": [
      "61%",
      "63.08%",
      "64.5%",
      "62.8%"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.(d) <strong>62.8%</strong>.</span><span style=\"font-family: Cambria Math;\"> Distribution of workforce by Industry, as per 2011-12 data : Primary sector :- 48.9 percent (Men - 43.6 percent), Secondary Sector :- 24.3 percent (Men - 25.9 percent, women - 20 percent), Tertiary/service Sector - 26.8 percent (Men - 30.5 percent).</span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">What is the minimum lane width in Swimming in metres?</span></p>\n",
    "options": [
      "2.10",
      "2.11",
      "2.12",
      "2.13"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">.(d)<strong> 2.13.</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>Size of swimming pool (Olympics) : 50 m long, 25 m wide and minimum 2 m depth, divided into 10 lanes. </span><strong><span style=\"font-family: Cambria Math;\">Types of Swimming</span></strong><span style=\"font-family: Cambria Math;\"><strong> -</strong> Freestyle, Backstroke, Breaststroke, Butterfly, Medley, Marathon swimming (in open water environments as the rivers, lakes, sea). </span><span style=\"font-family: Cambria Math;\"><strong>Famous Olympic Swimmers</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Michael Phelps, Sajan Prakash, Krisztina Egerszegi, Virdhawal Khade, Shivani Kataria. </span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Tusu Parab is the harvest festival of which of the following Indian states ?</span></p>\n",
    "options": [
      "Gujarat",
      "Sikkim",
      "Karnataka",
      "Jharkhand"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.(d) <strong>Jharkhand</strong>. </span><span style=\"font-family: Cambria Math;\">Harvest festival (States): Pongal (Tamil Nadu), Baisakhi and Lohri (Punjab), Bhogali Bihu (Assam), Poush Parbon (West Bengal), Onam (Kerala), Gudi Padwa (Maharashtra), Ugadi (Andhra Pradesh, Telangana and Karnataka), Maghi (Punjab, Haryana and Himachal Pra</span><span style=\"font-family: Cambria Math;\">desh), Bisu parba (Karnataka), Makar Sankranti (Pan India but mainly in North), Wangala (Meghalaya), Nuakhai (Odisha), Vishu (kerala, Karnataka), Dree (Arunachal Pradesh).</span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Who among the following personalities is associated with the musical instrument Flute?</span></p>\n",
    "options": [
      "Ustad Zakir Hussain",
      "Ustad Bismillah Khan",
      "Pandit Hari Prasad Chaurasia",
      "Ustad Vilayat Khan"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Pandit Hari Prasad Chaurasia. </strong></span><span style=\"font-family: Cambria Math;\">Awards : Padma Vibhushan (2000), Padma Bhushan (1992).</span><span style=\"font-family: Cambria Math;\"> <strong>Exponents</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>: </span><strong><span style=\"font-family: Cambria Math;\">Flute</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Rakesh Chaurasia, Rajendra Prasanna, Shashank Subramanyam.</span><span style=\"font-family: Cambria Math;\"> <strong>Tabla</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Ustad Zakir Hussain, Swapan Chaudhuri, Tanmoy Bose, Ustad Alla Rakha. </span><strong><span style=\"font-family: Cambria Math;\">Shehnai</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>-</span><span style=\"font-family: Cambria Math;\"> Anant Lal, Ali Ahmed Hussain Khan, Bismillah Khan.</span><span style=\"font-family: Cambria Math;\"> <strong>Sitar</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Ustad Vilayat Khan, Ravi Shankar, Annapurna Devi, Anoushka Shankar.</span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following is an award presented for classical dance forms?</span></p>\n",
    "options": [
      "Kabir Puraskar",
      "Saraswati Samman",
      "Kalidas Samman",
      "Jnanpith Award"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">15</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Kalidas Samman </strong>- </span><span style=\"font-family: Cambria Math;\">An arts award presented annually by the Government of Madhya Pradesh. The award is named after Kalidasa (a renowned Classical Sanskrit writer of ancient India). It was first awarded in 1980. It was initially conferred in alternate years in four fields : Cl</span><span style=\"font-family: Cambria Math;\">assical Music, Classical Dance, Theatre and Plastic Arts. First recipients - Semmangudi Srinivasa Iyer and Mallikarjun Mansur. </span><span style=\"font-family: Cambria Math;\"><strong>Kabir Puraskar</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Giver for promotion of communal harmony, </span><span style=\"font-family: Cambria Math;\"><strong>Saraswati Samman</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- An annual award for outstanding prose or poetry lite</span><span style=\"font-family: Cambria Math;\">rary works in any of the 22 languages of India listed in 8th Schedule of Indian Constitution. </span><span style=\"font-family: Cambria Math;\"><strong>Jnanpith award</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Oldest and the highest Indian literary award bestowed only on Indian writers writing in 22 Indian languages of 8th schedule.</span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
