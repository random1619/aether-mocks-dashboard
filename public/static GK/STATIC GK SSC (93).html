<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. The Ultimate Kho-Kho League was started in which year ?</p>",
    "options": [
      "2021",
      "2022",
      "2023",
      "2020"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b) <strong>2022.</strong> Ultimate Kho Kho modifies traditional Kho Kho rules by reducing the attacking team to seven players and shrinking the field to 22 &times; 16 meters. Each tag is worth two points, intensifying the scoring. A 30-second break between batches allows for strategic pauses in the game.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. In MS-Word, a number printed above the base line is called _________ .</p>",
    "options": [
      "superscript",
      "strikethrough",
      "subscript",
      "above BL"
    ],
    "correct_option_id": 0,
    "solution": "<p>2.(a) <strong>superscript. </strong>In Microsoft Word, a superscript is a number or text that is printed above the baseline, smaller than the regular text. It is often used to represent exponents, footnotes, or endnotes. Examples: 10̣<sup>2</sup> - 2 above 10 is called the superscript.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Who among the following launched the digital platform \\'FASTER\\' ?</p>",
    "options": [
      "Finance Minister",
      "President",
      "Chief Justice of India",
      "Prime Minister"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>Chief Justice of India.</strong> FASTER, which stands for \\'Fast and Secured Transmission of Electronic Records\\', is a digital platform used by court officials. It enables instant transmission of electronic copies of court orders. This secure electronic communication channel ensures swift delivery of documents to the intended parties. Portals Launched by Government of India : &ldquo;ROSHNI&rdquo; - IIT Ropar, Shiksha Vani - CBSE, Diksha - Ministry of Human Resource Development, e-Sahaj - Ministry of Home Affairs.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Under which Gharana do the composition of blend of Khayal and Dhrupad-Dhamar styles come ?</p>",
    "options": [
      "Indore Gharana",
      "Patiala Gharana",
      "Agra Gharana",
      "Gwalior Gharana"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c)<strong> Agra Gharana</strong> was founded by Haji Sujan Khan. Agra was an important part of Braj Bhumi, the land of Shri Krishna, and home to Bhakti and Sufi saints like Surdas and Raskhan. The Gwalior Gharana, considered the oldest Khayal Gharana in Indian classical music, was founded by Nathan Khan, and Tansen was one of its earliest and most famous vocalists.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. The famous book \\'Sangraha Choodamani\\', which deals with the current system of Carnatic music was written by:</p>",
    "options": [
      "Damodara Misra",
      "Haripala",
      "Matanga",
      "Govindacharya"
    ],
    "correct_option_id": 3,
    "solution": "<p>5.(d) <strong>Govindacharya. </strong>Matanga Muni authored the Brihaddesi, a significant text in the study of Indian music. Bharata Muni is traditionally attributed with the Natya Shastra, an ancient musical and dramatic treatise.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. We can add a table in an MS Word document from which of the following tabs ?</p>",
    "options": [
      "Home Tab",
      "Design Tab",
      "Insert Tab",
      "View Tab"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(c)<strong> Insert Tab. </strong>Home Tab: Used for basic formatting, including font styles, alignment, and paragraph settings. Design Tab: Used to customize the layout and design of your document. View Tab: Used to change the view of your document, such as switching between print layout and web layout.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. In which state is the Raika tribe found ?</p>",
    "options": [
      "Kerala",
      "Manipur",
      "West Bengal",
      "Rajasthan"
    ],
    "correct_option_id": 3,
    "solution": "<p>7.(d)<strong> Rajasthan. </strong>The Raika tribe is renowned for herding animals, particularly camels, sheep, and goats. Other tribes of Rajasthan: Minas, Damor, Dhanka, Garasia, Kathodi etc.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Which of the following folk music of Chhattisgarh is based on the epic Mahabharata ?</p>",
    "options": [
      "Ghumar",
      "Pandavani",
      "Paani Haari",
      "Maand"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b) <strong>Pandavani.</strong> It depicts the story of the Pandavas, the leading characters in the epic Mahabharata. Other folk music of Chhattisgarh : Panthi folk music and dance associated with the Satnami community. Raut Nacha is a traditional dance of the Yadav community performed on Deepawali. Ghumar, Paani Haari, and Maand are folk music forms related to the state of Rajasthan.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Where did the indigenous sport &lsquo;Kalaripayattu&rsquo; originate from ?</p>",
    "options": [
      "Kerala",
      "Tamil Nadu",
      "Goa",
      "Karnataka"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a) <strong>Kerala.</strong> Kalaripayattu is a martial art based on the ancient knowledge of the human body. The Various Martial Art Forms in India: Thang Ta - Manipur, Lathi Khela - West Bengal, Gatka - Punjab, Mallakhamb - Madhya Pradesh, Silambam - Tamil Nadu, Kathi Samu - Andhra Pradesh, Sqay - Kashmir, Paikha Akhadha - Odisha, Musti Yuddha - Uttar Pradesh (Varanasi).</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. ______ is a form of Sikh festival</p>",
    "options": [
      "Bhairav",
      "kalyan",
      "Khamaj",
      "Hola Mohalla"
    ],
    "correct_option_id": 3,
    "solution": "<p>10.(d) <strong>Hola Mohalla</strong> is a vibrant three days festival unique to Punjab in the city of Anandpur Sahib. Other festivals of sikh community: Baisakhi, Guru Nanak Jayanti, Maghi Festival.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Good Friday is related to:</p>",
    "options": [
      "Sikhism",
      "Christianity",
      "Hinduism",
      "Jainism"
    ],
    "correct_option_id": 1,
    "solution": "<p>11.(b) <strong>Christianity. </strong>Good Friday commemorates the crucifixion of Jesus Christ and his death at Calvary. Other important Christian Festivals: Easter, Christmas. Festivals of the Jains: Mahavir Jayanti, Paryushan, Mahamastak Abhishek. Festivals of the Sikhs: Guru Nanak Jayanti, Guru Purab, Holla Mohalla. Hindu Festivals: Pongal, Maha Shivratri, Vasant Panchami.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Which of the following is the default alignment of text in a Microsoft Word document ?</p>",
    "options": [
      "Right",
      "Center",
      "Left",
      "Justified"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c) <strong>Left.</strong> The alignment buttons located in the Home tab within the Paragraph section of word processing software offer a range of options for adjusting the alignment of text and other objects. These buttons allow users to align their content to the Left, Right, Center, or choose the Justified option for evenly distributed text across the page.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Which city is referred to as the &lsquo;Manchester of India&rsquo; ?</p>",
    "options": [
      "Kanpur",
      "Kolkata",
      "Ahmedabad",
      "Mumbai"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>Ahmedabad. </strong>It is located in Gujarat on the banks of the Sabarmati river. The first mill was established in 1859. It soon became the second largest textile city of India, after Mumbai. It is referred to as the \"Manchester of India\" because of its similarities to the well-known cotton textile center of Manchester, Great Britain. Cities and their nicknames: Kanpur - Leather City of the World, Kolkata - City of Joy, Mumbai - City of Dreams.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. The government of which state started the Tansen Samman ?</p>",
    "options": [
      "Uttar Pradesh",
      "Himachal Pradesh",
      "Madhya Pradesh",
      "Arunachal Pradesh"
    ],
    "correct_option_id": 2,
    "solution": "<p>14.(c) <strong>Madhya Pradesh. </strong>The Tansen Award was founded in 1980. It is a musical award conferred to the exponents of Hindustani music. The award carries a cash prize of Rs. 5 Lakh along with a memento.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Where was India&rsquo;s first hockey club founded ?</p>",
    "options": [
      "Madras",
      "Delhi",
      "Calcutta",
      "Shimla"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>Calcutta. </strong>The first hockey club formed in the then Calcutta (now Kolkata) in 1855. The Hockey Association was founded in 1886. The Indian Hockey Federation was the administrative body of field hockey in India, incorporated in 1925. The International Hockey Federation is the global governing body of field hockey founded on 7th January.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
