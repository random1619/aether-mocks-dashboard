<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: helvetica, arial, sans-serif;\">1. With reference to Sonepur Cattle fair, consider the following statements and select the correct option.</span><br><span style=\"font-family: helvetica, arial, sans-serif;\">a) It is associated with the Hariharnath temple. </span><br><span style=\"font-family: helvetica, arial, sans-serif;\">b) It begins on Purnima (full moon night) and Kartik month.</span><br><span style=\"font-family: helvetica, arial, sans-serif;\">c) It is celebrated in the Madhya Pradesh state.</span></p>",
    "options": [
      "Both a and b",
      "Both a and c",
      "Both b and c",
      "a, b, c"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\\\"font-family: helvetica, arial, sans-serif;\\\">1.(a) <strong>Both a and b</strong>. Sonepur Cattle Fair is one of Asia\\'s largest cattle fairs, organized at the confluence of two rivers, the Ganga and Gandak in Bihar. Nagaji Fair is celebrated in the tribal area of Madhya Pradesh. <strong>Other Important fairs </strong>- Pushkar (Rajasthan), Hemis Gompa (Ladakh), Surajkund (Haryana).</span></p>",
    "question_index": 0
  },
  {
    "question": "<p>2. In 2006, IIeana Citaristi, an Italian Odissi dancer, was awarded with the ______.</p>",
    "options": [
      "Padma Bhushan",
      "Bharat Ratna",
      "Padma Shri",
      "Padma Vibhushan"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>Padma Shri.</strong> Ileana Citaristi won the Best Choreography prize at the 43rd National Film Awards in 1995 for Yugant. <strong>Other Odissi Dancer </strong>- Kumkum Mohanty, Sonal Mansingh (Bharatanatyam as well), Kiran Segal, Pankaj Charan Das (Father of Odissi Dance), Mayadhar Raut, Gangadhar Pradhan.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. The music legend Jagjit Singh is associated with:</p>",
    "options": [
      "Ghazal",
      "Classical Music",
      "Western Music",
      "Instrument"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Ghazal</strong> (a form of amatory poem or ode, originating in Arabic poetry). <strong>Awards</strong> - Padma Bhushan (2003), Rajasthan Ratna (2012), Lata Mangeshkar Samman (1998), Sahitya Academy Award (1998), Sahitya Kala Academy Award by Rajasthan government (1998). <strong>Other Ghazal Singers: </strong>Hariharan, Pankaj Udhas, Talat Aziz, Anup Jalota, Farida Khanum, Ustad Mehndi Hasan, Ghulam Ali.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. What is the classical dance of Assam?</p>",
    "options": [
      "Sattriya Nritya",
      "Bharatnatyam",
      "Kathak",
      "Kuchipudi"
    ],
    "correct_option_id": 0,
    "solution": "<p>4.(a) <strong>Sattriya Nritya</strong> originated in Sattra, monastery, as a part of neo-Vaishnavite movement started by Srimanta Sankardev in Assam, in the 15th Century. It was given the status of a classical dance in the year 2000 by the Sangeet Natak Akademi. <strong>Other classical dances of India</strong>: Bharatnatyam (Tamil Nadu), Kathakali (Kerala), Kuchipudi (Andhra Pradesh), Kathak (Uttar Pradesh), Mohiniyattam (Kerala), Manipuri (Manipur) and Odissi (Odisha).</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Which Indian state was the first to make it mandatory for all homes to have rooftop rainwater harvesting structures?</p>",
    "options": [
      "Sikkim",
      "Tamil Nadu",
      "Odisha",
      "Haryana"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Tamil Nadu. Rooftop rainwater harvesting</strong> is a technique used for the conservation of water. The rainwater that has fallen on the roof of houses or buildings is collected in storage or underground tanks through the help of pipes in this technique. This helps in recharging the groundwater levels. Rainwater harvesting is already a common practice in Mizoram.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. How many countries are part of SAARC?</p>",
    "options": [
      "8",
      "2",
      "5",
      "7"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a) <strong>8. South Asian Association for Regional Cooperation (SAARC) </strong>: Established in - 1985. Objective - Advance social improvement, economic growth, and cultural development throughout South Asia. Headquarters - Kathmandu, Nepal. Member Countries - Afghanistan, Bangladesh, Bhutan, India, Maldives, Nepal, Pakistan, and Sri Lanka. Afghanistan joined as the 8th member of SAARC in 2007.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Chaitrual and Phulaich are the festival of which of the following states ?</p>",
    "options": [
      "Himachal Pradesh",
      "Gujarat",
      "Uttarakhand",
      "Haryana"
    ],
    "correct_option_id": 0,
    "solution": "<p>7.(a) <strong>Himachal Pradesh.</strong> Chaitrual (festival of pictures) - celebrated in the month of Chaitra (March - April) in Sirmaur area. Phulaich (festival of flowers)- celebrated on the 16th day of the Hindu month of Bhadrapada (August - September). <strong>States and their festivals</strong> : Himachal Pradesh - Pori Festival, Minjar Fair, Halda Festival, Losar Festival. Haryana - Teej, Guga Navmi, Gangore Festival. Uttarakhand - Basant Panchami, Bhitauli, Harela, Phooldei, Batsavitri, Ganga Dussehra, Dikar Puja. Gujarat - Navratri, Uttarayan, Rann Utsav, Shamlaji Melo.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Which of the following erstwhile Princely states was primarily associated with Kathak?</p>",
    "options": [
      "Tripura",
      "Avadh",
      "Baroda",
      "Vijaynagar"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b) <strong>Avadh.</strong> Kathak (Uttar Pradesh) - It was performed under the Mughal emperors. Exponents - Pandit Birju Maharaj, Shovna Narayan, Shambhu Maharaj, Lachhu Maharaj. Other dances of Uttar Pradesh: Charkula, Khyal, Raslila, Nautanki Dance, Kajri. Tripura - Hojagiri, Garia, Jhum, Bijhu, Sangrai, Lebang boomani.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9.Which of the following components is NOT related to the New India Literacy Programme?</p>",
    "options": [
      "Business and Enhancing skill Development",
      "Foundational Literacy and Numeracy",
      "Critical Life Skills",
      "Basic Education"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a) Implementation during five years from the FYs 2022-23 to 2026-27. <strong>Aim</strong> - Aims to cover a target of 5.00 crore non-literates in the age group of 15 years and above. The scheme has five components - Foundational Literacy and Numeracy, Critical Life Skills,Vocational Skills Development, Basic Education and Continuing Education, Vocational Skills Development, Continuing Education.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10.Ranjumoni Saikia was awarded the Sangeet Natak Akademi Award 2019 for her contribution to which classical dance?</p>",
    "options": [
      "Kuchipudi",
      "Mohiniyattam",
      "Sattriya",
      "Chhau"
    ],
    "correct_option_id": 2,
    "solution": "<p>10.(c) <strong>Sattriya</strong> (Classical dance of Assam). Exponents - Guru Jatin Goswami, Manik Barbayan, Ghanakanta Bora. <strong>Other dances and their exponents </strong>: Kuchipudi (Andhra Pradesh) - Indrani Bajpai, Yamini Krishnamurty, Raja Radha Reddy, Swapna Sundari, and Mallika Sarabhai. Mohiniyattam (Kerala) - Sunanda Nair, Kalamandalam Kalyanikutty Amma, Radha Dutta, Vijayalakshmi, Gopika Varma. Chhau (West Bengal) - Gambhir Singh Mura.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. When was Kapil Dev awarded with Padma Shri Award?</p>",
    "options": [
      "1981",
      "1980",
      "1982",
      "1983"
    ],
    "correct_option_id": 2,
    "solution": "<p>11.(c) <strong>1982.</strong> Kapil Dev (The Haryana Hurricane) : He was the captain of the Indian cricket team when India lifted a World Cup trophy (1983). <strong>Awards</strong> - Padma Bhushan (1991), Arjuna Award for Cricket (1979), C. K. Nayudu Lifetime Achievement Award (2013).</p>",
    "question_index": 10
  },
  {
    "question": "<p>12.Who is credited with creating the popular Raga Miya Ki Malhar?</p>",
    "options": [
      "Tansen",
      "Amir Khusrau",
      "Meera Bai",
      "Zakir Hussain"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>Tansen.</strong> Compositions - Darbari Kanhra (night raga), Mian Ki Todi (morning raga), Mian ki Sarang (mid-day raga). Miya ki Malhar (seasonal raga). <strong>Zakir Hussain</strong> - An Indian tabla player, composer, percussionist and music producer. <strong>Amir Khusrau</strong> (founder of qawwali). He was a famous musician in the court of Alauddin Khalji. <strong>Meera Bai</strong> (Devotee of Krishna) - Bhajans and Raga composed by her - Raag Govind, Govind Tika, Raag Soratha, Meera Ki Malhar, Mira Padavali, Narsi ji Ka Mayara.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Bhimsen Joshi belongs to which of the following classical music traditions?</p>",
    "options": [
      "Delhi Gharana",
      "Banaras Gharana",
      "Kirana Gharana",
      "Jaipur Gharana"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>Kirana gharana : Founder </strong>- Ustad Abdul Karim Khan. <strong>Famous artists</strong> - Suresh Babu Mane, Hira Bai Badodekar and Roshanara Begum. <strong>Bhimsen Joshi Awards</strong> - Bharat Ratna (2009), Padma Vibhusan (1999), Padma Bhusan (1985), Padma Shri (1972). <strong>Gharana and Founder:</strong> Banaras - Ram Sahai. Jaipur Gharana - Bhanuji.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Lotia is a regional music form of which state ?</p>",
    "options": [
      "Odisha",
      "Rajasthan",
      "Assam",
      "Bihar"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>Rajasthan. Lotia</strong> - It is sung by the peasants while working in the fields on the occasion of Lotia festival in the Chaitra month according to the Hindu calendar. Women bring lotas (a vessel to fill water) and kalash (a vessel considered to be auspicious to fill water during worship) filled with water from ponds and wells. <strong>Traditional Folk Music of Rajasthan </strong>- Pabuji Ki Phach, Maand, Panihari.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Which of the following Indian classical dancers was the recipient of the Padma Vibhushan award of 2003?</p>",
    "options": [
      "Saswati Sen",
      "Elam Endira Devi",
      "Birju Maharaj",
      "Sonal mansingh"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Sonal Mansingh</strong> : Indian classical dancer in Bharatanatyam and Odissi dancing style. <strong>Award</strong> - Padma Bhushan (youngest recipient) (1992), Lifetime Achievement Award (2019). <strong>Other dancers and awards : Saswati Sen</strong> (Kathak dancer) - Sangeet Natak Akademi Award (2004-05). <strong>Pandit Birju Maharaj</strong> ( Kathak dancer) - Padma Vibhushan (1986), Sangeet Natak Akademi Award (1964), Kalidas Samman (1987), Lata Mangeshkar Puruskar (2002). <strong>Elam Endira Devi </strong>(dance form of Manipuri) - Padma Shri (2014).</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
