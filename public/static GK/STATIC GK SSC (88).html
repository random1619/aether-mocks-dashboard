<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. __________ is a lively dance form of the Bundelkhand region. Its performance begins with the beating of mridang and gradually gains momentum dotted with prose and poetic dialogues.</p>",
    "options": [
      "Matki",
      "Gangaur",
      "Rai",
      "Swang"
    ],
    "correct_option_id": 3,
    "solution": "<p>1.(d) <strong>Swang </strong>- A popular folk dance - theatre form performed in Rajasthan, Haryana, Uttar Pradesh and Malwa region of Madhya Pradesh. Other dances: Rai - This dance of Bundelkhand is performed by a man disguised as a woman to the accompaniment of musical instruments like dholak and nagara. Matki - A community dance from the Malwa region, performed by women. Gangaur - Performed during the nine days of Gangaur festival in the Nimar region in honour of their deity Ranubai and Dhaniyer Suryadev.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Leander Paes is associated with _________.</p>",
    "options": [
      "Badminton",
      "Lawn Tennis",
      "Cricket",
      "Golf"
    ],
    "correct_option_id": 1,
    "solution": "<p>2.(b) <strong>Lawn Tennis. </strong>Leander Paes (Awards) : Padma Bhushan (2014), Padma Shri (2001), Major Dhyan Chand Khel Ratna award (1996-97) and Arjuna Award (1990). Other Tennis Players: Novak Djokovic, Serena Williams, Roger Federer, Rafael Nadal, Sania Mirza, and Rohan Bopanna. Eminent Badminton players: Saina Nehwal, Lakshya Sen, and P. V. Sindhu. Eminent Cricket Players: Mithali Raj, Smriti Mandhana, and Arshdeep Singh. Eminent Golf Players: Scottie Scheffler, and Steven Mark Bottomley.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Ustad Binda Khan is associated with which of the following instruments?</p>",
    "options": [
      "Shehnai",
      "Tabla",
      "Sarangi",
      "Flute"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>Sarangi.</strong> Other exponents of the Sarangi include: Abdul Latif Khan, Ram Narayan, Sultan Khan, and Shakoor Khan. Instruments and Their Notable Exponents: Shehnai - Bismillah Khan, Anant Lal, and Raghunath Prasanna; Tabla - Anindo Chatterjee and Pt. Kishan Maharaj; Flute - Hariprasad Chaurasia, Rajendra Prasanna, and Pannalal Ghosh.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. \"Mysuru Dasara\" is a grand celebration in the Indian state of __________ featuring a royal procession, cultural events, and a display of decorated elephants.</p>",
    "options": [
      "Kerala",
      "Karnataka",
      "Orissa",
      "Tamil Nadu"
    ],
    "correct_option_id": 1,
    "solution": "<p>4.(b) <strong>Karnataka.</strong> Mysore Dasara is a 10-day festival, starting with nine nights called Navratri and the last day being Vijayadashami. The festival is observed on the tenth day in the Hindu calendar month of Ashvina. Important festivals celebrated in Indian states: Karnataka - Gombe Habba, Gowri Habba. Kerala - Onam, Vishu (Malayalam New Year), Vettukad Festival. Orissa - Raja Festival, Nua Khai Festival, Dhanu Yatra; Tamil Nadu - Mahamagam, Chithirai, Arubathu Moovar Festival.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. In an Olympics table tennis event, if the points are tied at 10-10, a player then has to strive for a __________ point lead to win the game.</p>",
    "options": [
      "2",
      "3",
      "1",
      "4"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>2.</strong> According to the laws of table tennis, a player can win a game of table tennis by scoring 11 points - with one point awarded for every infringement. Every player gets to serve twice in a row. The first to 11 points is declared the winner. Table tennis rules, the regulations, and equipment used: The game is played on a 2.74 x 1.53-metre rectangular table; The table tennis net stands at a height of 15.25 centimetres; Table tennis racquet - Approximately 17 cm long and 15 cm wide; Table tennis ball - Weighs about 2.7 grams and is spherical with a diameter of 40 millimetres.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. In any tennis game, if both players win three points each in a game (i.e. score is 40-40), then it\\'s called a _______ .</p>",
    "options": [
      "equal",
      "deuce",
      "back",
      "rattle"
    ],
    "correct_option_id": 1,
    "solution": "<p>6.(b) <strong>Deuce.</strong> Tennis scoring system - A player or team has to win 4 points to win a game. Any game starts at 0-0 and the zero point in tennis is called love. The progression of points occurs as follows: First point - 15, Second point - 30, Third point - 40, Fourth point - Game. After deuce, the player who wins the next point has advantage.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Which musical instrument is played by Pt. Ravi Shankar?</p>",
    "options": [
      "Been",
      "Sarod",
      "Sarangi",
      "Sitar"
    ],
    "correct_option_id": 3,
    "solution": "<p>7.(d) <strong>Sitar.</strong> Pt. Ravi Shankar received the Bharat Ratna in 1999, the Padma Vibhushan in 1981, the Padma Bhushan in 1967, and the Sangeet Natak Akademi Award in 1962. Famous sitar players: Wahid Khan, Mushtaq Ali Khan, Nikhil Banerjee, Shamim Ahmed Khan, Shahid Parvez, Budhaditya Mukherjee, Kartick Kumar, and Harvinder Kumar Sharma.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. The \"Hornbill Festival\" features which indigenous tribes showcasing their culture and traditions ?</p>",
    "options": [
      "Gond",
      "Garo",
      "Naga",
      "Bhil"
    ],
    "correct_option_id": 2,
    "solution": "<p>8.(c) <strong>Naga. </strong>The Hornbill Festival, also known as the \\'Festival of Festivals,\\' is an annual event celebrated from December 1 to 10 in the northeastern Indian state of Nagaland. This festival was initiated by the Government of Nagaland in 2000. Other festivals in Nagaland include Sekrenyi, Moatsu Mong, Bushu, Yemshe, Metumniu, Metemneo, Ngada, Tokhu Emong, Tuluni, Sukrunye, and Naknyulum.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. \\'Mundari\\' dance is associated with which of the following state ?</p>",
    "options": [
      "Kerala",
      "Jharkhand",
      "Uttar Pradesh",
      "Tamil Nadu"
    ],
    "correct_option_id": 1,
    "solution": "<p>9.(b) <strong>Jharkhand </strong>has various traditional dance forms, including Mardani Jhumar, Paika, Chhau, Santhal Dance, Agni Dance, Phagua, Nachni. Other states and dances: Kerala - Kathakali, Mohiniyattam, Theyyam, Koothu. Uttar Pradesh - Kathak, Ramlila, Braj Raslila, Charkula, Rasiya. Tamil Nadu - Bharatanatyam, Karakattam, Mayil Attam, Kummi, Theru Koothu.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Which sport is the Agha Khan Cup associated with?</p>",
    "options": [
      "Kabaddi",
      "Hockey",
      "Cricket",
      "Rugby"
    ],
    "correct_option_id": 1,
    "solution": "<p>10.(b) <strong>Hockey.</strong> Sports and Cups/Trophies: Hockey - Beighton Cup, Murugappa Gold Cup, Ranjit Singh Gold Cup, Scindia Gold Cup. Cricket - Irani Trophy, Vijay Merchant Trophy, Cooch Behar Trophy.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Which Indian dancer won the Sangeet Natak Akademi Award in 2018 for Chhau Dance ?</p>",
    "options": [
      "Akham Lakshmi Devi",
      "Tapan kumar pattanayak",
      "Dr. Aruna Mohanty",
      "Gopika Varma"
    ],
    "correct_option_id": 1,
    "solution": "<p>11.(b) <strong>Tapan Kumar Pattanayak</strong> (Seraikella). Chhau is performed in three styles: Purulia Chhau (West Bengal), Seraikella Chhau (Jharkhand), and Mayurbhanj Chhau (Odisha). Notable Chhau dancers include Kedar Nath Sahoo (Seraikella), Shashadhar Acharya, and Gambhir Singh Mura (Purulia).</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Duleep Trophy is associated with ________.</p>",
    "options": [
      "badminton",
      "cricket",
      "football",
      "basketball"
    ],
    "correct_option_id": 1,
    "solution": "<p>12.(b) <strong>Cricket.</strong> The Duleep Trophy is a domestic first-class cricket competition played in India. The first edition was held in 1961-62 and was named after the former cricketer Duleepsinhji. Other trophies related to cricket include the C.K. Naidu Trophy, Rani Jhansi Trophy, Deodhar Trophy, Ranji Trophy, Vijay Hazare Trophy, Syed Mushtaq Ali Trophy and Moin-ud-Dowlah Gold Cup.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Ustad Bismillah Khan is a famous exponent of _________.</p>",
    "options": [
      "dholak",
      "shehnai",
      "tabla",
      "harmonium"
    ],
    "correct_option_id": 1,
    "solution": "<p>13.(b) <strong>Shehnai.</strong> Ustad Bismillah Khan was awarded the Bharat Ratna in 2001, the Padma Vibhushan in 1980, and the Padma Bhushan in 1968. Musical Instruments and Exponents: Shehnai - Pt. Raghunath Prasanna, Krishna Ram Chaudhary, Ali Ahmad Hussain; Tabla - Ustad Ahmed Jan Thirakwa, Pt. Samta Prasad; Harmonium - Appa Jalgaonkar, Tulsidas Vasant Borkar.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. In which sport the Participants are called Pugilist ?</p>",
    "options": [
      "Badminton",
      "Hockey",
      "Boxing",
      "Tennis"
    ],
    "correct_option_id": 2,
    "solution": "<p>14.(c) <strong>Boxing.</strong> Pugilistis a historical term originated from the Latin word \"pugil\" which means a fist-fighter or boxer. Boxing terminologies: Clinch, Eight count, Jab, Knockdown, Second, Shoulder roll, Southpaw, Toe-to-toe.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. To which of the following states does the dance form Lavani belong?</p>",
    "options": [
      "Tamil Nadu",
      "Madhya Pradesh",
      "Maharashtra",
      "Assam"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>Maharashtra.</strong> Indian States and dances: Maharashtra - Dhangari Gaja, Povada dance, Waghya Murali dance, Koli dance. Madhya Pradesh - Bhagoria, Pardhauni, Swang, Matki. Assam - Deva-nati or Nati-nach, Oja-Pali, Sattriya, Bagurumba. Tamil Nadu - Karakattam, Kummi, Mayil Aattam, Poikkal Kudirai Aattam.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
