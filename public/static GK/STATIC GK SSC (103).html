<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {

    "solution": " <p>1.(b) </span><span style=\"font-family:Palanquin Dark\">Famous </span><span style=\"font-family:Palanquin Dark\">Santoor</span><span style=\"font-family:Palanquin Dark\"> players: Pandit Shivkumar Sharma, Rahul Sharma, and Tarun Bhattacharya.</span><span style=\"font-family:Palanquin Dark\"> Sitar </span><span style=\"font-family:Palanquin Dark\">Players: Nikhil Banerjee, and Ravi Shankar. </span><span style=\"font-family:Palanquin Dark\">Nadaswaram </span><span style=\"font-family:Palanquin Dark\">players: Thirumarukal Nadesa Pillai , and T.N. Rajarathnam Pillai.</span><span style=\"font-family:Palanquin Dark\"> Dholak</span><span style=\"font-family:Palanquin Dark\"> player: Girish Vishwa.</span></p>",
    "question_index": 0
  },
  {
    "question": " <p>2. </span><span style=\"font-family:Palanquin Dark\">In which state of India </span><span style=\"font-family:Palanquin Dark\">is Konark</span><span style=\"font-family:Palanquin Dark\"> dance festival celebrated?</span></p>",
    "options": [

    "solution": " <p>2.(b) </span><span style=\"font-family:Palanquin Dark\">Famous dances of</span><span style=\"font-family:Palanquin Dark\"> Odisha: </span><span style=\"font-family:Palanquin Dark\">Konark dance, Chhau dance, Gotipua dance , Odissi dance, Ghumura dance, Ranapa dance, Jodi Sankha dance, Chaiti Ghoda dance, Sambalpuri folk dance, Bhaga nacha, and Paika Nrutya. </span></p>",
    "question_index": 1
  },
  {

  },
  {

      "M J Akbar"
    ],
    "correct_option_id": 2,
    "solution": " <p>4.(c) Sitaram Yechury books: </span><span style=\"font-family:Palanquin Dark\">Socialism in a Changing World, Left Hand Drive: Concrete Analysis of Concrete Conditions, Modi Government: New Surge of Communalism, Communalism vs. Secularism, and Ghrina Ki Rajniti. </span></p>",
    "question_index": 3
  },
  {
    "question": "<p>5. <span style=\"font-weight: 400;\">Harmandar Sahib is situated in which city of Punjab?</span></p>\n",
    "options": [
      "Bathinda ",
      "Amritsar ",
      "Kapurthala ",
      "Patiala"
    ],
    "correct_option_id": 1,

  {

  {

    "solution": " <p>7.(b) Odissi </span><span style=\"font-family:Palanquin Dark\">is one of the principal classical dance styles of India; It is indigenous to Odissa, eastern India, and follows the principles of the Natya-shastra.</span><span style=\"font-family:Palanquin Dark\"> Other</span><span style=\"font-family:Palanquin Dark\"> classical dances include bharata natyam, kuchipudi, kathak, kathakali, and manipuri.</span></p>",
    "question_index": 6
  },
  {

    "solution": "<p>8.(d) <span style=\"font-weight: 400;\">Famous festivals of </span>Andhra Pradesh:<span style=\"font-weight: 400;\"> Deccan Festival, Pongal (Observed At The Inception Of The Harvesting Season), Ugadi (Celebrated As The New Year&rsquo;s Day), Rottela Panduga, Prabhala Theertham, Visakha Utsav (Amazing Cultural Festival In South India), Tirupati Tirumala Brahmotsavam , Lumbini Festival (Highlights Buddhist Culture), Rayalaseema Food &amp; Dance Festival , etc.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p>9. <span style=\"font-family: Palanquin Dark;\">Which of the following is the standard means by which elections are conducted in </span><span style=\"font-family: Palanquin Dark;\">India?</span></p>\n",
    "options": [
      "Blockchain",

      "Electronic Voting Machine"
    ],
    "correct_option_id": 3,
    "solution": "<p>9.(d)<span style=\"font-family: Palanquin Dark;\"> EVMs were used for the first time in India in 1982 in the by-election to the North Paravur Assembly constituency in Kerala. </span></p>\n",
    "question_index": 8
  },
  {
    "question": " <p>10.</span><span style=\"font-family:Palanquin Dark\"> As per Census 2011, which of the following is India’s most populated metropolitan city?</span></p>",

      "Chennai"
    ],
    "correct_option_id": 1,
    "solution": " <p>10.(b)</span><span style=\"font-family:Palanquin Dark\"> 3 Most populated metro cities are Mumbai (Maharashtra), Delhi, and Bangalore (Karnataka). The least populated metro cities are Kapurthala (Punjab), Banswara (Rajasthan), Nagda (Madhya Pradesh), and Datia (Madya Pradesh).</span></p>",
    "question_index": 9
  },
  {
    "question": " <p>11. </span><span style=\"font-family:Palanquin Dark\">Which of the following festivals is associated with Rajasthan?</span></p>",
    "options": [
      "Gudi Padwa",
      "Bundi Utsav",
      "Bonalu",
      "Matho Narang"
    ],
    "correct_option_id": 1,
    "solution": " <p>11.(b)</span><span style=\"font-family:Palanquin Dark\"> Famous festivals of Rajasthan: Pushkar Camel Fair, Festival of Urs, Gangaur, Nagaur fair, Chandrabhaga Fair, Bundi Utsav, Kumbhalgarh festival, Baneshwar festival, Kolayat Fair, etc. Gudi Padwa (Maharashtra), Bonalu (Telangana), and Matho Narang (Ladakh).</span></p>",
    "question_index": 10
  },
  {
    "question": " <p>12.</span><span style=\\\"font-family:Palanquin Dark\\\"> Who among the following Indian musicians received the \\'Best Original Song\\' award for his composition in \\'Slumdog Millionaire\\', at Oscars 2009?</span></p>",

    "question_index": 11

    "question_index": 12
  },
  {
    "question": " <p>14.</span><span style=\"font-family:Palanquin Dark\"> Rita performs ‘Giddha’ dance form. Which state does this dance form belong to?</span></p>",

    "question_index": 13

  {

    "correct_option_id": 1,

</body>
</html>
