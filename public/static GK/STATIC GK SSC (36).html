<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Ustad Bismillah Khan is associated with which of the following instruments ?</span></p>\n",
    "options": [
      "Shehnai",
      "Veena",
      "Flute",
      "Violin"
    ],
    "correct_option_id": 0,
    "solution": "<p>1.(a) <strong>Shehnai</strong>. <span style=\"font-family: Cambria Math;\">Ustad Bismillah Khan : Awards - Bharat Ratna (2001), Padma Vibhushan (1980), Padma Bhushan (1968), Padma Shri (1961). Other Famous Shehnai Players (India) - Anant Lal, S. Ballesh, Ali Ahmed Hussain Kha</span><span style=\"font-family: Cambria Math;\">n, Raghunath Prasanna.</span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Safeguarding India\\'s Intangible Cultural Heritage and Diverse Cultural Traditions of India&rsquo; is a scheme of which Ministry of the Government of India?</span></p>\\n",
    "options": [
      "Ministry of Culture",
      "Ministry of Tourism",
      "Ministry of Education",
      "Ministry of Urban Development"
    ],
    "correct_option_id": 0,
    "solution": "<p>2.(a) <strong>Ministry of Culture. Schemes under the Ministry of Culture: </strong><span style=\"font-family: Cambria Math;\">Scheme for Financial Assistance to Cultural Organizations, National Mission on Libraries, Centenary and Anniversary Celebrations, Museum Grant Scheme, Scheme of Financial Assistance under Seva Bhoj Yojna, Scheme for Promotion of Culture of Science (SPOCS).</span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> In 1996, Dr. Indira PP Bora, an exponent of Sattriya, was honoured with the __________. </span></p>\n",
    "options": [
      "Filmfare Award",
      "Bharat Ratna",
      "Sangeet Natak Akademi Award",
      "Saraswati Samman"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>Sangeet Natak Akademi Award.</strong><span style=\"font-family: Cambria Math;\"> Dr. Indira PP Bora: Awards - State Bishnu Rava Award (2004), Padma Shri (2020). Famous Male Sattriya artists - Guru Jatin Goswami, Guru Ghanakanta Bora, Manik Barbayan and Bhabananda Barbayan, Moniram Dutta. Women Sattriya dancers - Sharodi Saikia, Anita </span><span style=\"font-family: Cambria Math;\">Sharma, Anwesha Mahanta and Mallika Kandali.</span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Subha Mudgal is famous for which of the following music forms?</span></p>\n",
    "options": [
      "Carnatic music",
      "Reggae music",
      "Hip hop music",
      "Hindustani music"
    ],
    "correct_option_id": 3,
    "solution": "<p>4.(d) <strong>Hindustani music. Subha Mudgal:</strong><span style=\"font-family: Cambria Math;\"><strong> Awards </strong>- Padma Shri (2000), Rajiv Gandhi National Sadbhavana Award (2016).<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Major exponents of</strong> <strong>Hindust</strong></span><span style=\"font-family: Cambria Math;\"><strong>ani</strong> <strong>Music</strong>:</span><span style=\"font-family: Cambria Math;\"> Allauddin Khan, Vilayat Khan, Bismillah Khan, Bhimsen Joshi, Pandit Jasraj, Ravi Shankar, Hariprasad Chaurasia, Zakir Hussain, Shivkumar Sharma, Ali Akbar Khan. </span><strong><span style=\"font-family: Cambria Math;\">Carnatic Musicians: </span></strong><span style=\"font-family: Cambria Math;\">Aruna Sairam, M. S. Subbulakshmi, Lalgudi Jayaraman. </span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Hornbill festival is celebrated in which of the following states?</span></p>\n",
    "options": [
      "Nagaland",
      "Manipur",
      "Sikkim",
      "Assam"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>Nagaland</strong>. <span style=\"font-family: Cambria Math;\">Hornbill Festival - celebrated every year between December 1 to 10. This festival showcases the rich cultural heritage and tradition of the Nagas on one platform at Naga Heritage Village Kisama under Kohima District. Festivals in India: </span><strong><span style=\"font-family: Cambria Math;\">Nagaland </span></strong><span style=\"font-family: Cambria Math;\">- Tsukhene</span><span style=\"font-family: Cambria Math;\">ye, Mim Kut, Hega Festival, Bushu Festival, Yemshe. </span><span style=\"font-family: Cambria Math;\"><strong>Manipur </strong>- </span><span style=\"font-family: Cambria Math;\">Gang - Ngai, Lui - Ngai - Ni, Yaosang, Cheiraoba Festival. </span><span style=\"font-family: Cambria Math;\"><strong>Sikkim</strong> - </span><span style=\"font-family: Cambria Math;\">Losar, Sonam Lochar, Saga Dawa, Dasain, Drupka Teshi. </span><strong><span style=\"font-family: Cambria Math;\">Assam </span></strong><span style=\"font-family: Cambria Math;\">- Bihu, Baishagu, Ali - Ai - Ligang, Baikho, Rongker.</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Which country came </span><span style=\\\"font-family: Cambria Math;\\\">out with the first \\'official\\' compilation of volleyball rules and was published by the YMCA?</span></p>\\n",
    "options": [
      "Germany",
      "The US",
      "The UK",
      "Australia"
    ],
    "correct_option_id": 1,
    "solution": "<p>6.(b) <strong>The US.</strong> <span style=\"font-family: Cambria Math;\">William G. Morgan - A YMCA physical education director, created the </span><span style=\"font-family: Cambria Math;\">game of volleyball in 1895, and he also wrote down the original rules for the sport. These rules were officially published by the YMCA and served as the foundation for the game of volleyball. </span><span style=\"font-family: Cambria Math;\"><strong>Federation</strong> <strong>Internationale de Volleyball</strong></span><span style=\"font-family: Cambria Math;\"> (FIVB) - Founded in 1947</span><span style=\"font-family: Cambria Math;\">, and they standardized the rules for volleyball. Headquarters: Lausanne, Switzerland. </span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">The traditional \\'</span><span style=\\\"font-family: Cambria Math;\\\">Cheraw\\' dance, in which bamboo is used, is famous in____________.</span></p>\\n",
    "options": [
      "Mizoram",
      "Goa",
      "Odisha",
      "Bihar"
    ],
    "correct_option_id": 0,
    "solution": "<p>7.(a) <strong>Mizoram</strong>. <strong>Cheraw dance</strong>: <span style=\"font-family: Cambria Math;\">It consists of usually six to eight people holding a pair of bamboo staves onto another bamboo positioned horizontally on the ground. In 2010, A Guinness World Record was made in which the highest number of Cheraw dancers performed at the same time. Folk</span><span style=\"font-family: Cambria Math;\"> dances of </span><span style=\"font-family: Cambria Math;\"><strong>Mizoram </strong>- </span><span style=\"font-family: Cambria Math;\">Chailam, Khuallam, Chawnglaizawn, Chheihlam, Tlanglam. </span><span style=\"font-family: Cambria Math;\"><strong>Goa</strong>:</span><span style=\"font-family: Cambria Math;\"> Ghode Modni, Dhangar Dance, Goff Talgadi, Shigmo and Mussel khel. </span><strong><span style=\"font-family: Cambria Math;\">Odisha</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Chhau, Gotipua, Danda Nata, Sambapuri, Dalkhai, Chaitighoda. </span><span style=\"font-family: Cambria Math;\">Bihar</span><span style=\"font-family: Cambria Math;\"> - Jhijhiya, Jat-Jatin.</span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following po</span><span style=\"font-family: Cambria Math;\">sts of Defence Research Development Organisation (DRDO) is in the Level I (top level) of its organisational chart?</span></p>\n",
    "options": [
      "Director General Technical Cluster",
      "Secretary DD and R &amp; D",
      "Director General Corporate",
      "Director of Laboratory"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b) <strong>Secretary</strong> <strong>DD and R &amp; D.</strong> <span style=\\\"font-family: Cambria Math;\\\">DRDO: Formed - 1958; Headquarters - DRDO Bhavan (New Delhi); Motto</span><span style=\\\"font-family: Cambria Math;\\\">- \\\"Strength\\'s Origin is in Science\\\". DRDO - ASTRA Missile, Anti Drone System, SATCOM Devices, QRSAM, ADFCR, Helina, ADTCR, Guided Bomb. DRDO has develop</span><span style=\\\"font-family: Cambria Math;\\\">ed an antibody detection-based kit called DIPCOVAN.</span></p>\\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">In which year did India win its first Hockey World Cup for Men\\'s?</span></p>\\n",
    "options": [
      "1971",
      "1979",
      "1975",
      "1983"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>1975</strong>.<span style=\"font-family: Cambria Math;\"> The match was held in Kuala Lumpur (Malaysia). India Defeated Pakistan. Men&rsquo;s Hockey World Cup: First Event - 1971. Barcelona (Spai</span><span style=\"font-family: Cambria Math;\">n). Winner - Pakistan. International Hockey Federation: Formation - 1924. Headquarters - Lausanne (Switzerland). The Indian hockey men&rsquo;s team has won 8 Olympic gold medals in all, six of them in a row (1928-1956) and added two more at Tokyo 1964 and Mosco</span><span style=\"font-family: Cambria Math;\">w 1980.</span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Who among the following personalities is a Sarod Maestro?</span></p>\n",
    "options": [
      "Ustad Bismillah Khan",
      "Ustad Zakir Hussain",
      "Hariprasad Chaurasia",
      "Ustad Amjad Ali Khan"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">.(d) <strong>Ustad Amjad Ali Khan</strong></span><span style=\"font-family: Cambria Math;\">. Best known for his clear and fast ekhara taans. Awards: Padma Shri (1975), Padma Bhushan (1991), Padma Vibhushan (2001). Famous Sarod Players: Ali Akbar Khan, Allauddin Khan, Radhika Mohan Maitra, Aashish Khan, Tejendra Majumdar, Buddhadev Das Gupta, Sha</span><span style=\"font-family: Cambria Math;\">ran Rani Backliwal, Hafiz Ali Khan. </span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Who among the following personalities coined the term \\'Odissi\\' for Odisha\\'s classical dance?</span></p>\\n",
    "options": [
      "Kabichandra Kalicharan Patnaik",
      "Kelucharan Mohapatra",
      "Raja Rammohan Roy",
      "Rabindranath Tagore"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.(a) <strong>Kabichandra Kalicharan Patnaik</strong></span><span style=\"font-family: Cambria Math;\">. His Contribution was in the field of Odissi music, Odissi dance and Odia theater. Some of his major published works: Kalanka Bhanjana, Milana Madhuri, Daridrya Bhanjana. Famous Odissi Dancers: Pan</span><span style=\"font-family: Cambria Math;\">kaj Charan Das, Deba Prasad Das, Sujata Mohapatra, Geeta Mahalik, Sharmila Biswas, Kiran Segal, Sonal Mansingh, Mayadhar Raut, Kelucharan Mohapatra.</span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following initiatives of the Government of India is aimed at developing and rejuvenating 75 water bodies in each district of the country as a part of the celebration of Azadi ka Amrit M</span><span style=\"font-family: Cambria Math;\">ahotsav?</span></p>\n",
    "options": [
      "Mission Amrit Clean Water",
      "Mission Amrit Water",
      "Mission Amrit Sarovar",
      "Mission Amrit District"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">.(c)<strong> Mission Amrit Sarovar.</strong></span><span style=\"font-family: Cambria Math;\"> With a view to conserve water for the future this Mission launched on 24th April, 2022.<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Water Conservation Scheme</strong></span><span style=\"font-family: Cambria Math;\"><strong>:</strong> Pradhan Mantri Krishi Sinchayee Yojana (2015), Jal Jeevan Mission (2019), Sahi Fasal campaign </span><span style=\"font-family: Cambria Math;\">(2019).</span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Deepavali is celebrated in which month of Hindu calendar?</span></p>\n",
    "options": [
      "Magha",
      "Chaitra",
      "Ashwin",
      "Kartika"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.(d) <strong>Kartika</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>is the 8th month of the Hindu Calendar. Festivals - Govardhana Puja, Bhaiya Dooj, Narak Chaturdashi, Dhanteras. </span><strong><span style=\"font-family: Cambria Math;\">Chaitra</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(March - April) - First month in Hindu calendar. Festivals - Ranga Panchami, Gudi Padwa, Rama Navami, Hanuman Jayanti. </span><strong><span style=\"font-family: Cambria Math;\">Ashwin </span></strong><span style=\"font-family: Cambria Math;\">(Septembe</span><span style=\"font-family: Cambria Math;\">r - October) - 7th month in Hindu calendar. Festivals - Saraswati puja, Durga Ashtami, Indira Ekadashi, Shardiya Navratri. </span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Padma Bhushan Kumari Kamala is associated with which Indian dance?</span></p>\n",
    "options": [
      "Kathakali",
      "Kathak",
      "Odissi",
      "Kuchipudi"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>Kathak</strong>.<span style=\"font-family: Cambria Math;\"> Kumari Kamala (also known as Kamala Lakshman) was invited to perform for Queen Elizabeth II during her coronation festivities in 1953. Awards: Kalaimamani (1967), Padma Bhushan (1970). Other Kathak dancers (Shambhu Maharaj, Mohanrao Kal</span><span style=\"font-family: Cambria Math;\">lianpurkar, Sitara Devi, Prerana Shrimali). Other dance forms and dancers: Kathakali (Guru Kunchu Kurup, Guru Gopinath, Kottakkal Sivaraman). Odissi (Ranjana Gauhar, Ratikant Mohapatra). Kuchipudi (Sobha Naidu, Vempati Chinna Satyam, K. Uma Rama Rao). </span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">What is the number of players in a Kho Kho team?</span></p>\n",
    "options": [
      "12",
      "13",
      "10",
      "11"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">15</span><span style=\"font-family: Cambria Math;\">.(a) <strong>12. Kho Kho:</strong> </span><span style=\"font-family: Cambria Math;\">Pune&rsquo;s Deccan Gymkhana club first came out with formalized rules and regulations for Kho Kho. It was demonstrated on the sidelines of the 1936 Berlin Olympics. Game And Number of Players: Baseball - 9, Basketball - 5, Cricket - 11, Football - 11, Handball</span><span style=\"font-family: Cambria Math;\"> - 7, Ice Hockey - 6, Polo - 4, Rugby Football - 15, Volleyball - 6.</span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
