<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. In whose ashram did the Beatles compose rock music in 1968 influenced by classical music?</p>",
    "options": [
      "Osho Rajnish Ashram",
      "Maharshi Aurobindo Ashram",
      "Pandit Ravishankar Ashram",
      "Maharshi Mahesh Yogi Ashram"
    ],
    "correct_option_id": 3,
    "solution": "<p>1.(d) <strong>Maharshi Mahesh Yogi Ashram</strong>. In February 1968, the English rock band the Beatles traveled to Rishikesh (Uttarakhand) to take part in a Transcendental Meditation (TM) training course at Maharshi Mahesh Yogi\\'s Ashram. Maharshi Mahesh Yogi is the founder of the Transcendental Meditation technique.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. In classical Carnatic music, tempo is called as ________.</p>",
    "options": [
      "padam",
      "gita",
      "laya",
      "achala"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>laya.</strong> Carnatic music originated in South India whereas Hindustani music originated in North India. Different forms of Carnatic Music: Gitam (simple composition), Swarajathi (devotional or heroic), Varnam (unique to Carnatic music), Kirtanam (focused on devotion), and Kriti (an evolved form of Kirtanam).</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. In a spreadsheet, page orientation is changed through ___________.</p>",
    "options": [
      "paper dialog box",
      "print dialog box",
      "page setup dialog box",
      "format dialogue box"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c)<strong> page setup dialog box.</strong> This dialog box allows you to adjust various page settings, including: Page orientation (landscape or portrait), Paper size, Margins, Headers and footers, Print area. To access the Page Setup dialog box, you usually go to the File menu, select \"Page Setup\" or \"Print Setup\", or use a keyboard shortcut.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Which of the following is NOT any position in the Basketball sport?</p>",
    "options": [
      "Point guard",
      "Shooting guard",
      "Small forward",
      "All rounder"
    ],
    "correct_option_id": 3,
    "solution": "<p>4.(d) In basketball, the five positions on the court are: Point guard - Usually the team\\'s best ball handler and playmaker. Shooting guard - A scoring specialist who can shoot from outside. Small forward - Often considered the most versatile player, responsible for scoring, rebounding, and defense. Power forward - Typically the strongest rebounder and post player. Center - The tallest player, responsible for defending the basket and rebounding.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Which of the following steps is used to format a cell in an MS Excel Spreadsheet?</p>",
    "options": [
      "Select cell &rarr; Right click &rarr; Format cell",
      "View Select cell &rarr; Format",
      "Select cell &rarr; View &rarr; Format cell",
      "Menu &rarr; Select cell &rarr; Format"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>Select cell &rarr; Right click &rarr; Format cell. </strong>In Excel, cell alignment is how your text or numbers are positioned in the cell. You can align vertically, meaning towards the top, the middle or the bottom. And also align horizontally, meaning to the left, the center or to the right.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Jagoi and Cholom are two divisions in the Indian classical dance form of ________.</p>",
    "options": [
      "Kathak",
      "Bharatanatyam",
      "Manipuri",
      "Kathakali"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(c) <strong>Manipuri.</strong> Jagoi refers to the gentle and graceful movements, often depicting devotion and love. Cholom refers to the fast-paced and energetic movements, often depicting heroic and martial themes. Other dances and their division: Kathakali (Kerala) - Satvika, rajasika and tamasika. Bharatanatyam (Tamil Nadu) - Nritta, Nritya and Natya.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. In Hindustani classical music, according to Vishnu Narayana Bhatkhande, how many thaats are the origins of ragas?</p>",
    "options": [
      "72",
      "52",
      "10",
      "20"
    ],
    "correct_option_id": 2,
    "solution": "<p>7.(c) <strong>10.</strong> These 10 thaats are: Bilawal, Khamaj, Kafi, Asavari, Bhairav, Bhairavi, Todi, Purvi, Marwa, Yaman. Each thaat has a specific arrangement of whole and half steps, and ragas are derived from these thaats by using different combinations of notes, ornamentations, and emotional expressions.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. In which year was the &lsquo;Aatmanirbhar Bharat Rojgar&rsquo; Yojana launched by the Government of India?</p>",
    "options": [
      "2020",
      "2022",
      "2010",
      "2015"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) <strong>2020.</strong> The \\'Aatmanirbhar Bharat Rojgar\\' Yojana has been launched with effect from 1st October, 2020 as part of Atmanirbhar Bharat package 3.0 to incentivize employers for creation of new employment along with social security benefits and restoration of loss of employment during Covid-19 pandemic.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. The institute established by Kaka Hathrasi in 1932 is:</p>",
    "options": [
      "Sangeet Karyalaya",
      "Music Art Centre",
      "Music Art Kendra",
      "Swar Sangam Kendra"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a) <strong>Sangeet Karyalaya</strong>: Located - Hathras (Uttar Pradesh). The institute was founded with the aim of promoting Indian classical music and preserving the cultural heritage of India. Kaka Hathrasi published the monthly magazine \"SANGEET\" in 1935.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. The Chau dancers of ___________ organise a festival named Chau-Jhumur Utsav, where an open stage is designed for the performance by Chau groups.</p>",
    "options": [
      "Jharkhand",
      "West Bengal",
      "Madhya Pradesh",
      "Chhattisgarh"
    ],
    "correct_option_id": 1,
    "solution": "<p>10.(b) <strong>West Bengal.</strong> Chhau is performed in three styles across eastern India: Purulia Chhau - West Bengal. Seraikela Chhau - Jharkhand. Mayurbhanj Chhau - Odisha. Folk dance of other states: Jharkhand - Karma, Santhali, Mundari, etc. Madhya Pradesh - Gaur Dance, Tertali, Grida Dance, etc. Chhattisgarh - Panthi, Raut Nacha, Karma, Saila, etc.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Which of the following is NOT an alignment option for text in a cell ?</p>",
    "options": [
      "Justified",
      "Center",
      "Left",
      "Right"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>Justified</strong> alignment is typically used in paragraph formatting to align text to both the left and right margins. Common shortcut keys related to line alignment in MS Word: Horizontal Alignment: Ctrl + L = Left align, Ctrl + E = Center align, Ctrl + R = Right align, Ctrl + J= Justify align (in some applications).</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Which of the following pairs of state and folk dance is correctly paired ?</p>",
    "options": [
      "Punjab &ndash; Bhangra dance",
      "Gujarat &ndash; Bihu dance",
      "Haryana &ndash; Garia or Goria dance",
      "Kerala &ndash; Ghoomar dance"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>Punjab - Bhangra dance</strong>. Famous Folk dances of Indian States: Punjab - Giddha, Luddi, Sammi, Bhangra. Gujarat - Siddi Dhamal (hunting dance), Padhar Dance (rituals dance), Garba, Raas. Rajasthan - Ghoomar (weddings and Festivals dance), Kalbeliya Dance, Chari Dance, Pavri Nach (festival dance). Haryana - Phalgun dance, Loor dance, Daph dance, Khoria dance.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. __________ is one of the well-known schemes sponsored by the Union Government of India. It was launched in November 2015 with the aim of rescuing the country&rsquo;s ailing electricity distribution companies.</p>",
    "options": [
      "One Nation, One Grid",
      "Integrated Power Development Scheme (IPDS)",
      "Ujwal DISCOM Assurance Yojana",
      "Deendayal Upadhyaya Gram Jyoti Yojana"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>Ujwal DISCOM Assurance Yojana. </strong>Key Features of UDAY: Financial Turnaround: Allows state governments to take over 75% of DISCOM debt and pay back lenders by selling bonds. Energy Efficiency: Promotes the use of energy-efficient LED bulbs, agricultural pumps, fans, and air conditioners. Other Scheme: One Nation, One Grid refers to the unified national power grid. Integrated Power Development Scheme (IPDS) focuses on strengthening sub-transmission and distribution infrastructure. Deendayal Upadhyaya Gram Jyoti Yojana (DDUGJY) aims to provide 24/7 electricity to rural areas.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Where did the indigenous sport &lsquo;Gatka&rsquo; originate from ?</p>",
    "options": [
      "Punjab",
      "Manipur",
      "Rajasthan",
      "Jammu and Kashmir"
    ],
    "correct_option_id": 0,
    "solution": "<p>14.(a) <strong>Punjab.</strong> Gatka is a traditional fighting style of the Nihang Sikh warriors, used both for self- defence as well as a sport. Famous Martial Arts in India: Kalaripayattu (Oldest Martial Art in India; Kerala), Silambam (Tamil Nadu), Thang-ta, and Sarit Sarak (Manipur), Thoda (Himachal Pradesh), Lathi (Punjab and Bengal), Inbuan Wrestling (Mizoram), Musti Yuddha (Varanasi), and Pari -Khanda (Bihar).</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Which of the following songs did AR Rahman record with Michael Jackson?</p>",
    "options": [
      "You are my destiny",
      "The Oracle",
      "Infinity Love",
      "Ekam Satyam"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Ekam Satyam.</strong> A.R. Rahman collaborated with Michael Jackson on the song \"Ekam Satyam\" (also known as \"The One Truth\"), which was recorded in 1999. Michael Jackson (\"King of Pop\") was an American singer, songwriter, dancer, and record producer.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
