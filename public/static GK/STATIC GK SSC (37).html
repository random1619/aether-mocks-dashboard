<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> &lsquo;Nupa&rsquo; dance is associated with which Indian state?</span></p>",
    "options": [
      "Karnataka",
      "Manipur",
      "Jharkhand",
      "Tamil Nadu"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b) <span style=\"font-family: Cambria Math;\">Folk dances of </span><strong><span style=\"font-family: Cambria Math;\">Manipur</span><span style=\"font-family: Cambria Math;\">: </span></strong><span style=\"font-family: Cambria Math;\"><strong>Nupa Dance</strong>,</span><span style=\"font-family: Cambria Math;\"> Thang Ta, Lai Haraoba, Pung Cholom, Rakhal, Nat Rash, Maha Rash, Raukhat, Dol Cholam, Khamba Thaibi, Raslila, Khubak Eshei, Lhou Sha, etc. </span><strong><span style=\"font-family: Cambria Math;\">Karnataka</span></strong><span style=\"font-family: Cambria Math;\">: Yakshagana, Huttari, Suggi, Kunitha, Karga, Lambi, etc.<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Tamil Nadu</strong>:</span><span style=\"font-family: Cambria Math;\"> Karagam, Kumi,</span><span style=\"font-family: Cambria Math;\"> Kolattam, Kavadi, Dappankuthu, etc. </span></p>",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following festivals is NOT associated with Sikkim?</span></p>",
    "options": [
      "Losar",
      "Lohri",
      "Sakewa",
      "Yenya"
    ],
    "correct_option_id": 1,
    "solution": "<p>2.(b) <strong>Lohri </strong><span style=\"font-family: Cambria Math;\">is a popular winter </span><strong><span style=\"font-family: Cambria Math;\">Punjabi </span></strong><span style=\"font-family: Cambria Math;\">folk festival celebrated primarily in Northern India (Punjab, Jammu region, Delhi, Haryana and Himachal Pradesh). Festivals of </span><strong><span style=\"font-family: Cambria Math;\">Sikkim</span></strong><span style=\"font-family: Cambria Math;\">: Losoong Festival, Sonam Lhochhar, </span><span style=\"font-family: Cambria Math;\">Losar</span><span style=\"font-family: Cambria Math;\">, Bhumchu, Chaite Dashain, Sakewa, Saga Dawa, Tendong Lho Rum Faat, </span><strong><span style=\"font-family: Cambria Math;\">yenya </span></strong><span style=\"font-family: Cambria Math;\">Festival, Pang Lhabsol, Tihar, Hee Bermiok Festival, etc. </span></p>",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which country is the le</span><span style=\"font-family: Cambria Math;\">ading producer of jute?</span></p>",
    "options": [
      "Brazil",
      "China",
      "India",
      "Columbia"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>India </strong><span style=\"font-family: Cambria Math;\">is the largest producer of jute (golden fibre) in the world follo</span><span style=\"font-family: Cambria Math;\">wed by Bangladesh, China, and Thailand. </span><strong><span style=\"font-family: Cambria Math;\">West Bengal</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>followed by Bihar, Assam, Orissa, Andhra Pradesh, Tripura, and Meghalaya are the largest producers in India.</span></p>",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The first edition of the Commonwealth Youth Games was held at __________.</span></p>",
    "options": [
      "Edinburgh",
      "Sydney",
      "Melbourne",
      "Brisbane"
    ],
    "correct_option_id": 0,
    "solution": "<p>4.(a) <span style=\"font-family: Cambria Math;\">The first edition of the Commonwealth Youth Games was held in </span><strong><span style=\"font-family: Cambria Math;\">Ed</span><span style=\"font-family: Cambria Math;\">inburgh </span></strong><span style=\"font-family: Cambria Math;\">(Scotland) in 2020, where the top nation was </span><strong><span style=\"font-family: Cambria Math;\">England</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Latest Edition</span></strong><span style=\"font-family: Cambria Math;\"> (6th edition): Host (Nassau, The Bahamas); Top Nation (England). 2023 Edition: Host (Port of Spain, Trinidad and Tobago). </span></p>",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following s</span><span style=\"font-family: Cambria Math;\">trokes in swimming does NOT start with a dive into the pool </span><span style=\"font-family: Cambria Math;\">from outside?</span></p>",
    "options": [
      "Butterfly",
      "Backstroke",
      "Breaststroke",
      "Freestyle"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Backstroke:</strong> <span style=\"font-family: Cambria Math;\">The backstroke is unique because it&rsquo;s the only stroke done on the back. It&rsquo;s the third-fastest competitive swimming stroke &ndash; faster than the breaststroke but slower than the butterfly. </span><span style=\"font-family: Cambria Math;\"><strong>Breaststroke</strong>:</span><span style=\"font-family: Cambria Math;\">. It is the slowest competitive swimming stroke. </span><strong><span style=\"font-family: Cambria Math;\">Freestyle</span></strong><span style=\"font-family: Cambria Math;\">: It is performed face down, with the alternating movement of the arms. Each stroke is performed by driving an arm forward and pushing the water below the surface to propel you forward. </span><span style=\"font-family: Cambria Math;\"><strong>Butterfly</strong>: </span><span style=\"font-family: Cambria Math;\">Start by putting both of your arms straight in front of you</span><span style=\"font-family: Cambria Math;\"> at the 12 o&rsquo;clock position, palms slightly tilted outward at about a shoulder&rsquo;s width apart.</span></p>",
    "question_index": 4
  },
  {
    "question": "<p>6. <span style=\"font-family: Cambria Math;\">Where does the headquarters of the Indian Council of Agricultural Resea</span><span style=\"font-family: Cambria Math;\">rch Institute located?</span></p>",
    "options": [
      "Amritsar",
      "Surat",
      "Lucknow",
      "New Delhi"
    ],
    "correct_option_id": 3,
    "solution": "<p>6.(d) <strong>Indian Council of Agricultural Research: </strong><span style=\"font-family: Cambria Math;\">Headquarters</span><span style=\"font-family: Cambria Math;\"> (<strong>New Delhi</strong>),</span><span style=\"font-family: Cambria Math;\"> Founded (16 July 1929), Director: Himashu Pathak, President {Minister of Agriculture, Shri Narendra Singh Tomar (As of December 2022)}, reports to the Department of Agricultural </span><span style=\"font-family: Cambria Math;\">Research and Education, Ministry of Agriculture. </span></p>",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> From which year did Sangeet Natak Akademi, New Delhi, institute the Ustad Bismillah Khan Yuva Puraskar?</span></p>",
    "options": [
      "2001",
      "2005",
      "2004",
      "2006"
    ],
    "correct_option_id": 3,
    "solution": "<p>7.(d) <span style=\"font-family: Cambria Math;\">Ustad Bismillah Khan Yuva Puraskar, established in</span><span style=\"font-family: Cambria Math;\"> <strong>2006</strong></span><span style=\"font-family: Cambria Math;\">, is an annual Indian award given by the Sangeet Natak Akademi. </span><span style=\"font-family: Cambria Math;\"><strong>First awarded (2006)</strong>: </span><span style=\"font-family: Cambria Math;\">Sheejith Krishna (Bharatnatyam), Kalamandalam Pradeep Kumar (Kathakali), Prashant Shah (Kathak), Vedantam Venkata Nagachalapathi Rao (Kuchipudi), Sijagurumayum Nimita Dev</span><span style=\"font-family: Cambria Math;\">i (Manipuri), Bijayini Satpathy, Leena Mohanty (Odissi), and Anurupa Roy (puppetry).</span></p>",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Yamini Krishnamurthy is famous for which </span><span style=\"font-family: Cambria Math;\">dance form?</span></p>",
    "options": [
      "Manipuri",
      "Odissi",
      "Bharatanatyam",
      "Yakshagana"
    ],
    "correct_option_id": 2,
    "solution": "<p>8.(c)<span style=\"font-family: Cambria Math;\"> Mungara Yamini Krishnamurthy is an Indian dancer of </span><strong><span style=\"font-family: Cambria Math;\">Bharatanatyam </span></strong><span style=\"font-family: Cambria Math;\">and </span><strong><span style=\"font-family: Cambria Math;\">Kuchipudi </span></strong><span style=\"font-family: Cambria Math;\">styles of dancing.</span><span style=\"font-family: Cambria Math;\"> <strong>Awards and Honors: </strong></span><span style=\"font-family: Cambria Math;\">Padma Shri (1968), Padma Bhushan (2001), Padma Vibhushan (2016), and \"Natya Shastra\" award by Shambhavi School of Dance (2014). </span></p>",
    "question_index": 7
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\"> Who </span><span style=\\\"font-family: Cambria Math;\\\">choreographed the Bollywood song \\'Mohe Rang Do Laal\\' from Bajirao Mastani?</span></p>",
    "options": [
      "Saroj Khan",
      "Farah Khan",
      "Ganesh Acharya",
      "Birju Maharaj"
    ],
    "correct_option_id": 3,
    "solution": "<p>9.(d) <strong>\"Mohe Rang Do Laal&rdquo;</strong><span style=\"font-family: Cambria Math;\"><strong> </strong>song of Bajirao Mastani film was composed by Sanjay Leela Bhansali and sung by Shreya Ghoshal and choreographed by</span><span style=\"font-family: Cambria Math;\"> <strong>Pandit Birju Maharaj</strong> </span><span style=\"font-family: Cambria Math;\">(exponent of Lucknow \"Kalka-Binda</span><span style=\"font-family: Cambria Math;\">din\" Gharana of Kathak dance) . For this song Pandit Birju Maharaj won Filmfare Award for Best Choreography in 2016. His other </span><strong><span style=\"font-family: Cambria Math;\">awards and Honors:</span></strong><span style=\"font-family: Cambria Math;\"> - Sangeet Natak Akademi Award (1964), Padma Vibhushan (1966), Nritya Choodamani Award by Sri Krishna Gana Sabh</span><span style=\"font-family: Cambria Math;\">a (1986), Kalidas Samman (1987), Lata Mangeshkar Puraskar (2002), National Film Award for Best Choreography (2012), etc. </span></p>",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> In hockey, what is the meaning of </span><span style=\"font-family: Cambria Math;\">the signal if the umpire points both arms horizontally towards the goal?</span></p>",
    "options": [
      "Free hit",
      "Penalty corner",
      "Penalty stroke",
      "Goal scored"
    ],
    "correct_option_id": 1,
    "solution": "<p>10.(b) <strong>Umpire signals in Hockey: Penalty Corner</strong><span style=\"font-family: Cambria Math;\"> (pointin</span><span style=\"font-family: Cambria Math;\">g both arms horizontally towards the goal),</span><span style=\"font-family: Cambria Math;\"> <strong>Free hit</strong></span><span style=\"font-family: Cambria Math;\"> (Indicate the direction with one arm raised horizontally and open hand at face level),</span><span style=\"font-family: Cambria Math;\"> <strong>Penalty stroke</strong></span><span style=\"font-family: Cambria Math;\"> (One arm points to the penalty spot, the other points straight in the air), </span><strong><span style=\"font-family: Cambria Math;\">Goal scored</span></strong><span style=\"font-family: Cambria Math;\"> (pont both ar</span><span style=\"font-family: Cambria Math;\">ms horizontally towards the center of the field). </span></p>",
    "question_index": 9
  },
  {
    "question": "<p>11.I<span style=\"font-family: Cambria Math;\">n which state is the festival of Gudi Padwa specially celebrated?</span></p>\n",
    "options": [
      "Maharashtra",
      "Punjab",
      "Goa",
      "Odisha"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>Gudi Padwa</strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(spring festival) is specially celebrated in the state of </span><strong><span style=\"font-family: Cambria Math;\">Maharashtra</span></strong><span style=\"font-family: Cambria Math;\">. It is also celebrated in Goa, Madhya Pradesh and the union territory of Dadra and Nagar Haveli and Daman and Diu on the first day of the </span><strong><span style=\"font-family: Cambria Math;\">Chaitra </span></strong><span style=\"font-family: Cambria Math;\">month, to mark th</span><span style=\"font-family: Cambria Math;\">e beginning of the new year according to the lunisolar method of the Hindu calendar. The same day is celebrated as </span><strong><span style=\"font-family: Cambria Math;\">Ugadi </span></strong><span style=\"font-family: Cambria Math;\">(Yugadi) in Andhra Pradesh, Telangana and Karnataka.</span></p>",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">12.Which of the following sports was initially known as Poona?</span></p>",
    "options": [
      "Badminton",
      "Baseball",
      "Volleyball",
      "Kho-Kho"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <span style=\\\"font-family: Cambria Math;\\\">The modern version of </span><strong><span style=\\\"font-family: Cambria Math;\\\">Badminton </span></strong><span style=\\\"font-family: Cambria Math;\\\">has its origins in the city of Pune in India and was initially called </span><span style=\\\"font-family: Cambria Math;\\\">\\'<strong>Poona</strong></span><span style=\\\"font-family: Cambria Math;\\\">\\', which was played by British army officers stationed in India in the 1860s. In 1873 the </span><strong><span style=\\\"font-family: Cambria Math;\\\">duke of Beaufort</span></strong><span style=\\\"font-family: Cambria Math;\\\"> introduced the sport at his country estate, Badminton, from which the game derives its name.</span></p>",
    "question_index": 11
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">13._________was conferred with \\'Officier de la Legion d\\'Honneur\\', France\\'s highest </span><span style=\\\"font-family: Cambria Math;\\\">civilian award, in 2009.</span></p>",
    "options": [
      "Asha Bhosale",
      "Lata Mangeshkar",
      "S. Janaki",
      "K.S.Chithra"
    ],
    "correct_option_id": 1,
    "solution": "<p>13.(b) <strong>Lata Mangeshkar</strong><span style=\\\"font-family: Cambria Math;\\\"><strong> </strong>(playback singer and music composer). </span><strong><span style=\\\"font-family: Cambria Math;\\\">Awards and Honors:</span></strong><span style=\\\"font-family: Cambria Math;\\\"> Bharat Ratna (2001), Padma Bhushan (1969), Padma Vibhushan (1999), Zee Cine Award for Lifetime Achievements (1999), Dadasaheb Phalke Award (1989), Maharashtra Bhushan Award (1997), NTR National Awar</span><span style=\\\"font-family: Cambria Math;\\\">d (1999), Legion of Honour (2007), ANR National Award (2009), three National Film Awards and 15 Bengal Film Journalists\\' Association Awards.</span></p>",
    "question_index": 12
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">14.Which Indian music director was awarded Japan\\'s Fukuoka prize - 2016 for his outstanding contribution in creating, preserving and showcasing South Asian traditional fusion music?</span></p>",
    "options": [
      "Vishal Bharadwaj",
      "Pritam Chakraborty",
      "AR Rahman",
      "MM Keeravani"
    ],
    "correct_option_id": 2,
    "solution": "<p>14.(c) <strong>A.R. Rahman </strong><span style=\\\"font-family: Cambria Math;\\\">was awarded Japan\\'s</span><span style=\\\"font-family: Cambria Math;\\\"> \\'<strong>Fukuoka prize-2016\\'</strong></span><span style=\\\"font-family: Cambria Math;\\\"> for outstanding contribution towards South Asian traditional fusion music. He</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">is a winner of</span><span style=\\\"font-family: Cambria Math;\\\"> <strong>six National Film Awards</strong> </span><span style=\\\"font-family: Cambria Math;\\\">(1992, 1996, 2001, 2002, 2007), </span><strong><span style=\\\"font-family: Cambria Math;\\\">two Oscar Awards</span></strong><span style=\\\"font-family: Cambria Math;\\\"><strong> </strong>(2009 and 2011), Padma Shri (2000), Padma Bhushan (2010) two Grammy Awards (both in 2009), a BAFTA Award (2009), a Golden Globe Award (2009), fifteen Filmfare Awards and seventeen Filmfare Awards South. </span></p>",
    "question_index": 13
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">15.The official enumeration of population done periodical</span><span style=\"font-family: Cambria Math;\">ly is called_________.</span></p>",
    "options": [
      "Census",
      "demographic count",
      "Estimation",
      "Record"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">15.(a) </span><span style=\\\"font-family: Cambria Math;\\\">A </span><strong><span style=\\\"font-family: Cambria Math;\\\">census </span></strong><span style=\\\"font-family: Cambria Math;\\\">is an official enumeration of the population done periodically. In India the </span><span style=\\\"font-family: Cambria Math;\\\"><strong>first census</strong> </span><span style=\\\"font-family: Cambria Math;\\\">was held in the year </span><strong><span style=\\\"font-family: Cambria Math;\\\">1872</span></strong><span style=\\\"font-family: Cambria Math;\\\">. The</span><span style=\\\"font-family: Cambria Math;\\\"> \\'<strong>demographic dividend\\' </strong></span><span style=\\\"font-family: Cambria Math;\\\">results from an increase in the proportion of workers relative to non-workers in the population. In terms of age, the working population is roughly between 15 and 64 years of age.</span></p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
