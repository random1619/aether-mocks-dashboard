ated from NCSC for Scheduled Tribes.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,0,0\" data-index-in-node=\"0\">NCBC (OBC)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,1,0\" data-index-in-node=\"0\">338B</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,2,0\" data-index-in-node=\"0\">102nd CAA, 2018</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,3,0\">Constitutional status for Backward Classes.</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">3. Specialized Federal Bodies (विशिष्ट संघीय निकाय)</strong></h3>\n<h4 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">GST Council (GST परिषद) - Art. 279A</strong></h4>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Chairman:</strong> Union Finance Minister (केंद्रीय वित्त मंत्री).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Nature:</strong> A federal body created by the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"38\">101st CAA, 2016</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Voting Weight (मतदान भार):</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0,0\" data-index-in-node=\"0\">Centre:</strong> <span class=\"math-inline\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-math=\"1/3\" data-index-in-node=\"8\">1/3 </span>weightage of total votes cast.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,1,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,1,0\" data-index-in-node=\"0\">States:</strong> <span class=\"math-inline\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-math=\"2/3\" data-index-in-node=\"8\">2/3</span>&nbsp;weightage of total votes cast.</p>\n</li>\n</ul>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Decision Majority:</strong> Needs at least <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"34\"><span class=\"math-inline\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-math=\"3/4\" data-index-in-node=\"34\">$3/4$</span> (75%)</strong> weighted majority.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" data-index-in-node=\"0\">🚀 Error-Free \"Trap\" Points for Revision</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,0,0\" data-index-in-node=\"0\">Panchayat Elections:</strong> The Election Commission of India (Art. 324) <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,0,0\" data-index-in-node=\"65\">does NOT</strong> conduct Panchayat elections. This is done by the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,0,0\" data-index-in-node=\"123\">State Election Commission</strong> (Art. 243K).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0\" data-index-in-node=\"0\">CAG's Eligibility:</strong> Unlike the Attorney General, the CAG cannot take up any job under the Government of India or State Government after retiring.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,0\" data-index-in-node=\"0\">Finance Commission Members:</strong> The qualifications for members of the FC are decided by <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,0\" data-index-in-node=\"84\">Parliament</strong> (under FC he <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"7\">NCPCR (Child Rights)</strong> chairperson must be an eminent person in child welfare, and at least two members of the commission must be women. (NCPCR (बाल अधिकार) का अध्यक्ष बाल कल्याण में एक प्रतिष्ठित व्यक्ति होना चाहिए, और आयोग के कम से कम दो सदस्य महिलाएं होनी चाहिए।)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the office of the Governor in India and identify how many are CORRECT?</strong><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"118\">(भारत में राज्यपाल के पद के संबंध में निम्नलिखित कथनों पर विचार करें और पहचानें कि कितने सही हैं?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Constitutional Role (Art. 154):</strong><span class=\"\"> The executive power of the State is vested in the Governor,</span><span class=\"\"> and all executive actions are formally taken in their name.</span><span class=\"\"> (राज्य की कार्यकारी शक्ति राज्यपाल में निहित है,</span><span class=\"\"> और सभी कार्यकारी कार्य औपचारिक रूप से उनके नाम पर किए जाते हैं।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Dual Capacity:</strong><span class=\"\"> The Governor acts as the constitutional head of the state and simultaneously as an agent/representative of the Union Government.</span><span class=\"\"> (राज्यपाल राज्य के संवैधानिक प्रमुख के रूप में और साथ ही केंद्र सरकार के एजेंट/प्रतिनिधि के रूप में कार्य करता है।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong class=\"\" data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Appointment &amp; Term:</strong><span class=\"\"> The Governor is appointed by the President and holds office during the \"pleasure of the President\" (Art.</span><span class=\"\"> 156),</span><span class=\"\"> with no fixed security of tenure.</span><span class=\"\"> (राज्यपाल की नियुक्ति राष्ट्रपति द्वारा की जाती है और वह \"राष्ट्रपति के प्रसादपर्यंत\" (अनुच्छेद 156) पद धारण करता है,</span><span class=\"\"> जिसके कार्यकाल की कोई निश्चित सुरक्षा नहीं है।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Historical Evolution (GoI Act 1935):</strong><span class=\"\"> Under the 1935 Act,</span><span class=\"\"> provinces were granted \"Provincial Autonomy,</span><span class=\"\">\" requiring the Governor to act mostly on the advice of the Council of Ministers.</span><span class=\"\"> (1935 के अधिनियम के तहत,</span><span class=\"\"> प्रांतों को \"प्रांतीय स्वायत्तता\" दी गई थी,</span><span class=\"\"> जिससे राज्यपाल को अधिकतर मंत्रिपरिषद की सलाह पर कार्य करना आवश्यक हो गया था।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong class=\"\" data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Election Notification:</strong><span class=\"\"> While the Election Commission of India recommends the schedule,</span><span class=\"\"> the Governor officially issues the notification for elections to the State Legislative Assembly.</span><span class=\"\"> (जबकि भारत का चुनाव आयोग कार्यक्रम की सिफारिश करता है,</span><span class=\"\"> राज्यपाल आधिकारिक तौर पर राज्य विधानसभा के चुनावों के लिए अधिसूचना जारी करता है।)</span></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong class=\"\" data-path-to-node=\"6\" data-index-in-node=\"0\">Options: / विकल्प:</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong class=\"\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong><span class=\"\"> Only three statements (केवल तीन कथन)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong class=\"\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong><span class=\"\"> Only four statements (केवल चार कथन)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong class=\"\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong><span class=\"\"> All five statements (सभी पाँचों कथन)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong class=\"\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong><span class=\"\"> Only two statements (केवल दो कथन)</span></p>\n</li>\n</ul>",

ine-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\" data-index-in-node=\"0\">161</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\" data-index-in-node=\"0\">Pardoning powers</strong> (Can pardon, remit, or commute; but <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\" data-index-in-node=\"53\">cannot</strong> pardon death sentence).</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,0,0\" data-index-in-node=\"0\">163</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,1,0\">Council of Ministers to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,1,0\" data-index-in-node=\"24\">Aid and Advise</strong> the Governor.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,6,0,0\" data-index-in-node=\"0\">213</strong></span></td>\n<td style     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the appointment and service conditions of the Governor, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"112\">(राज्यपाल की नियुक्ति और सेवा शर्तों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Constitutional Status:</strong> The Supreme Court (1979) held that the office of the Governor is an employment under the Central Government and follows a master-servant relationship.</p>\n<p data-path-to-node=\"5,0,1\">(संवैधानिक स्थिति: सर्वोच्च न्यायालय (1979) ने माना कि राज्यपाल का पद केंद्र सरकार के अधीन एक रोजगार है और यह स्वामी-सेवक संबंध का पालन करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Appointment Model:</strong> India adopted the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"37\">Canadian model</strong> (appointment by the Centre) rather than the American model (direct election) to avoid friction with the parliamentary system.</p>\n<p data-path-to-node=\"5,1,1\">(नियुक्ति मॉडल: भारत ने संसदीय प्रणाली के साथ टकराव से बचने के लिए अमेरिकी मॉडल (प्रत्यक्ष चुनाव) के बजाय <strong data-path-to-node=\"5,1,1\" data-index-in-node=\"106\">कनाडाई मॉडल</strong> (केंद्र द्वारा नियुक्ति) को अपनाया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Oath of Office:</strong> Under Article 159, the Governor takes the oath before the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"74\">Chief Justice of the State High Court</strong>.</p>\n<p data-path-to-node=\"5,2,1\">(पद की शपथ: अनुच्छेद 159 के तहत, राज्यपाल <strong data-path-to-node=\"5,2,1\" data-index-in-node=\"42\">राज्य उच्च न्यायालय के मुख्य न्यायाधीश</strong> के समक्ष शपथ लेता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Qualifications (Art. 157):</strong> A candidate must be a citizen of India, at least 35 years of age, and must not hold any office of profit.</p>\n<p data-path-to-node=\"5,3,1\">(योग्यताएं (अनुच्छेद 157): उम्मीदवार को भारत का नागरिक होना चाहिए, उसकी आयु कम से कम 35 वर्ष होनी चाहिए, और उसे लाभ का कोई पद धारण नहीं करना चाहिए।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"90\">A)</strong> 1, 2, and 3 only</p>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only</p>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>",
    "comp": "",

    "solution": "<p data-path-to-node=\"8\"><strong data-path-to-node=\"8\" data-index-in-node=\"0\">Answer: B</strong> &gt; <strong data-path-to-node=\"8\" data-index-in-node=\"12\">Logical Verification:</strong> &gt; * <strong data-path-to-node=\"8\" data-index-in-node=\"38\">Statement 1 is Incorrect:</strong> The SC (1979) ruled that the Governor&rsquo;s office is an <strong data-path-to-node=\"8\" data-index-in-node=\"117\">independent constitutional office</strong> and NOT an employment under the Central Government.</p>\n<blockquote data-path-to-node=\"9\">\n<ul data-path-to-node=\"9,0\">\n<li>\n<p data-path-to-node=\"9,0,0,0\"><strong data-path-to-node=\"9,0,0,0\" data-index-in-node=\"0\">Statements 2, 3, &amp; 4 are Correct:</strong> They accurately reflect the Canadian model, the specific oath-taking authority, and the age requirement (35 years).</p>\n</li>\n</ul>\n</blockquote>",

    "solution": "<p data-path-to-node=\"17\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" data-index-in-node=\"0\">Answer: A</strong> &gt; <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" data-index-in-node=\"12\">Logical Verification:</strong> &gt; * <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" data-index-in-node=\"38\">Art 161:</strong> Governor lacks power for death sentences and Court Martials.</p>\n<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\">\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,0,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,0,0\" data-index-in-node=\"0\">Art 200:</strong> Money Bills (Art 203) cannot be returned for reconsideration.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,0,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,1,0\" data-index-in-node=\"0\">Art 163/164:</strong> Situational discretion in choosing the CM.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,0,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,2,0\" data-index-in-node=\"0\">Note on Discretion:</strong> Unlike the President, the Governor has <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,2,0\" data-index-in-node=\"59\">Constitutional Discretion</strong> (explicitly mentioned in Art 163).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,0,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,3,0\" data-index-in-node=\"0\">Salary:</strong> Note that the Salary is paid from the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,3,0\" data-index-in-node=\"46\">Consolidated Fund of the State</strong>, but the Pension is paid from the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,3,0\" data-index-in-node=\"111\">Consolidated Fund of India</strong>.</p>\n</li>\n</ul>\n</blockquote>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\" data-index-in-node=\"0\">🚀: Governor vs. President</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin- ortant;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,1,0\" data-index-in-node=\"0\">Dual Role:</strong> He is the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,1,0\" data-index-in-node=\"21\">Titular Head</strong> of the state and an <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,1,0\" data-index-in-node=\"54\">Agent of the Centre</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,2,0\" data-index-in-node=\"0\">Pardoning (Art 161 vs 72):</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,2,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,2,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,2,1,0,0\" data-index-in-node=\"0\">Governor:</strong> Cannot pardon a death sentence or a court-martial sentence.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,2,1,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,2,1,1,0\" data-index-in-node=\"0\">President:</strong> Can pardon death sentences and military court sentences.</p>\n</li>\n</ul>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,3,0\" data-index-in-node=\"0\     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the Chief Minister (CM) and the Council of Ministers (CoM), consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"116\">(मुख्यमंत्री (CM) और मंत्रिपरिषद (CoM) के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Constitutional Articles:</strong> While <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"31\">Article 163</strong> deals with the status of the CoM to aid and advise the Governor, <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"108\">Article 164</strong> deals with the appointment, tenure, and salaries of the Ministers. (संवैधानिक अनुच्छेद: जबकि <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"213\">अनुच्छेद 163</strong> राज्यपाल को सहायता और सलाह देने के लिए CoM की स्थिति से संबंधित है, <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"294\">अनुच्छेद 164</strong> मंत्रियों की नियुक्ति, कार्यकाल और वेतन से संबंधित है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Size Restriction:</strong> Under the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"28\">91st Amendment Act (2003)</strong>, the total number of ministers, including the CM, in a state shall not exceed 15% of the total strength of the Legislative Assembly, but shall not be fewer than 12. (आकार प्रतिबंध: <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"235\">91वें संशोधन अधिनियम (2003)</strong> के तहत, राज्य में मुख्यमंत्री सहित मंत्रियों की कुल संख्या विधानसभा की कुल संख्या के 15% से अधिक नहीं होगी, लेकिन 12 से कम नहीं होगी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Membership Requirement:</strong> A person who is not a member of the State Legislature can be appointed as a Minister, provided they become a member of the legislature within <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"166\">three months</strong>. (सदस्यता की आवश्यकता: एक व्यक्ति जो राज्य विधानमंडल का सदस्य नहीं है, उसे मंत्री के रूप में नियुक्त किया जा सकता है, बशर्ते वह <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"307\">तीन महीने</strong> के भीतर विधानमंडल का सदस्य बन जाए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Disqualification:</strong> Any member of the State Legislature disqualified on the grounds of defection (Anti-Defection Law) is also disqualified to be appointed as a Minister. (अयोग्यता: दल-बदल (दल-बदल विरोधी कानून) के आधार पर अयोग्य घोषित राज्य विधानमंडल का कोई भी सदस्य मंत्री के रूप में नियुक्त होने के लिए भी अयोग्य है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 1, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 2 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,4,1,0\">4. Hold office during the \"Pleasure of the Governor\"</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"15\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" data-index-in-node=\"0\">Codes: / कूट:</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,0,0\" data-index-in-node=\"0\">A)</strong> A-2, B-3, C-4, D-1</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0\" data-index-in-node=\"0\">B)</strong> A-1, B-3, C-4, D-2</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,0\" data-index-in-node=\"0\">C)</strong> A-2, B-4, C-3, D-1</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,3,0\" data-index-in-node=\"0\">     "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">State Executive: Technical Breakdown (राज्य कार्यकारिणी)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Description &amp; Legal Nuance (विवरण और कानूनी बारीकियां)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Article/Act (अनुच्छेद/अधिनियम)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\" data-index-in-node=\"0\">Real Executive</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\" data-index-in-node=\"0\">Chief Minister (CM):</strong> The de facto head of government.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\" data-index-in-node=\"0\">Art. 164</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\" data-index-in-node=\"0\">Nominal Executive</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\" data-index-in-node=\"0\">Governor:</strong> The de jure head of state; acts as a link to the Centre.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\" data-index-in-node=\"0\">Art. 154</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\" data-index-in-node=\"0\">CM's Duty</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\" data-index-in-node=\"0\">Information Link:</strong> CM must communicate all cabinet decisions to the Governor.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\" data-index-in-node=\"0\">Art. 167</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,0,0\" data-index-in-node=\"0\">Size Limit</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\" data-index-in-node=\"0\">15% Limit:</strong> Total ministers cannot exceed 15% of Assembly strength; Minimum <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\" data-index-in-node=\"75\">12</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,2,0\" data-index-in-node=\"0\">91st CAA (2003)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,0,0\" data-index-in-node=\"0\">Collective Responsibility</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,1,0\">Ministers are jointly accountable to the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,1,0\" data-index-in-node=\"41\">Legislative Assembly</strong> (Lower House).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,2,0\" data-index-in-node=\"0\">Art. 164(2)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,0,0\" data-index-in-node=\"0\">Individual Responsibility</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,1,0\">Ministers hold office during the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,1,0\" data-index-in-node=\"33\">\"Pleasure of the Governor\"</strong> (removed on CM's advice).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,2,0\" data-index-in-node=\"0\">Art. 164(1)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,0,0\" data-index-in-node=\"0\">Right of Audience</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,1,0\">Ministers can speak in both Houses but vote only in their own House.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,2,0\" data-index-in-node=\"0\">Art. 177</strong></span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" data-index-in-node=\"0\">🚀 Key \"Must-Remember\" Exam Points</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"6,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,0,0\" data-index-in-node=\"0\">Dissolution vs. Vacancy:</strong> The death or resignation of the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,0,0\" data-index-in-node=\"57\">Chief Minister</strong> leads to the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,0,0\" data-index-in-node=\"85\">automatic dissolution</strong> of the Council of Ministers. However, the death/resignation of an individual minister only creates a vacancy that the CM may fill.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"6,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0\" data-index-in-node=\"0\">Legal Responsibility:</strong> In <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0\" data-index-in-node=\"25\">Britain</strong>, ministers are legally responsible (must countersign orders). In <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0\" data-index-in-node=\"98\">India</strong>, there is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0\" data-index-in-node=\"114\">no system of legal responsibility</strong>; the Governor's orders are valid without a minister's signature.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"6,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,2,0\" data-index-in-node=\"0\">Oath:</strong> The Governor administers the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,2,0\" data-index-in-node=\"35\">Oath of Office and Secrecy</strong> to the CM and the Ministers.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"6,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,3,0\" data-index-in-node=\"0\">Disqualification:</strong> If a member is disqualified under the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,3,0\" data-index-in-node=\"56\">Anti-Defection Law (10th Schedule)</strong>, they are also disqualified from being appointed as a Minister.</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the State Legislature in India, consider the following statements and identify which ones are CORRECT:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"124\">(भारत में राज्य विधानमंडल के संदर्भ में, निम्नलिखित कथनों पर विचार करें और पहचानें कि कौन से सही हैं:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Composition (Art. 168):</strong> The State Legislature consists of the Governor and the Legislative Assembly (Vidhan Sabha), and in some states, a Legislative Council (Vidhan Parishad). (संरचना (अनुच्छेद 168): राज्य विधानमंडल में राज्यपाल और विधानसभा (विधान सभा) और कुछ राज्यों में, एक विधान परिषद (विधान परिषद) शामिल होती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Bicameral States:</strong> Currently, seven states in India have a bicameral legislature, including West Bengal and Jammu &amp; Kashmir. (द्विसदनीय राज्य: वर्तमान में, भारत में पश्चिम बंगाल और जम्मू और कश्मीर सहित सात राज्यों में द्विसदनीय विधायिका है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Abolition/Creation (Art. 169):</strong> The Parliament can abolish or create a Legislative Council if the Legislative Assembly of the concerned state passes a resolution by a <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"166\">Special Majority</strong>. (उन्मूलन/निर्माण (अनुच्छेद 169): संसद विधान परिषद को समाप्त या बना सकती है यदि संबंधित राज्य की विधानसभा <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"289\">विशेष बहुमत</strong> से प्रस्ताव पारित करती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Nature of Amendment:</strong> A law passed by Parliament for the creation or abolition of a Legislative Council is considered a Constitutional Amendment under Article 368. (संशोधन की प्रकृति: विधान परिषद के निर्माण या उन्मूलन के लिए संसद द्वारा पारित कानून को अनुच्छेद 368 के तहत संवैधानिक संशोधन माना जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Unicameralism:</strong> Most Indian states follow a unicameral system where only the Legislative Assembly exists as the primary law-making body. (एकसदनीयता: अधिकांश भारतीय राज्य एकसदनीय प्रणाली का पालन करते हैं जहां प्राथमिक कानून बनाने वाले निकाय के रूप में केवल विधानसभा मौजूद होती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Options: / विकल्प:</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 3, and 5 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 3, 4, and 5 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,0,0\" data-index-in-node=\"0\">Statement 1 is CORRECT:</strong> Per Article 168, the Governor is an integral part of the Legislature.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"0\">Statement 2 is INCORRECT:</strong> There are currently only <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"51\">6 Bicameral States</strong>: Andhra Pradesh, Telangana, Uttar Pradesh, Bihar, Maharashtra, and Karnataka. (J&amp;K is a UT; West Bengal is unicameral).</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,1,0,0\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0,0\" data-index-in-node=\"0\">Mnemonic to remember:</em> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0,0\" data-index-in-node=\"22\">KUMBAT</strong> (Karnataka, UP, Maharashtra, Bihar, Andhra, Telangana).</p>\n</li>\n</ul>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"0\">Statement 3 is CORRECT:</strong> The state assembly must pass the request by a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"70\">Special Majority</strong> (majority of total membership + 2/3rd present and voting).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"0\">Statement 4 is INCORRECT:</strong> Under Article 169(3), such a law is treated as an <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"76\">Ordinary Law</strong> and is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"96\">not</strong> deemed an amendment of the Constitution for the purposes of Article 368.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0\" data-index-in-node=\"0\">Statement 5 is CORRECT:</strong> The majority of Indian states are unicameral.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">🚀 \"Quick-Strike\" Revision Table</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Aspect (पहलू)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Legislative Assembly (Vidhan Sabha)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Legislative Council (Vidhan Parishad)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0,0\" data-index-in-node=\"0\">Popular Name</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,1,0\">Lower House (लोकप्रिय सदन)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,2,0\">Upper House (वरिष्ठ सदन)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0,0\" data-index-in-node=\"0\">Mandatory?</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,1,0\">Yes (Always present)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,2,0\">No (Optional under Art 169)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\" data-index-in-node=\"0\">Direct/Indirect</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1,0\">Direct Election by people</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,2,0\">Indirect Election/Nomination</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\" data-index-in-node=\"0\">States having it</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\">All 28 States + 3 UTs (DL, PY, JK)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,2,0\">Only 6 States</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"3\"><strong data-path-to-node=\"3\" data-index-in-node=\"0\">Q. Consider the following statements regarding the composition and elections of the Legislative Assembly (SLA) and Legislative Council (SLC), and identify which ones are CORRECT?</strong> <strong data-path-to-node=\"3\" data-index-in-node=\"179\">(विधानसभा (SLA) और विधान परिषद (SLC) की संरचना और चुनावों के संबंध में निम्नलिखित कथनों पर विचार करें, और पहचानें कि कौन से सही हैं?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"4\">\n<li>\n<p data-path-to-node=\"4,0,0\"><strong data-path-to-node=\"4,0,0\" data-index-in-node=\"0\">SLA Strength:</strong> The maximum strength of a Legislative Assembly is 500 members, while the minimum is 60, though exceptions like Sikkim (32) and Goa (40) exist. (SLA संख्या: विधानसभा की अधिकतम सदस्य संख्या 500 है, जबकि न्यूनतम 60 है, हालांकि सिक्किम (32) और गोवा (40) जैसे अपवाद मौजूद हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,1,0\"><strong data-path-to-node=\"4,1,0\" data-index-in-node=\"0\">SLC Strength:</strong> The total number of members in the Legislative Council must not exceed one-third (1/3) of the total strength of the Assembly and cannot be fewer than 40. (SLC संख्या: विधान परिषद में सदस्यों की कुल संख्या विधानसभा की कुल संख्या के एक-तिहाई (1/3) से अधिक नहीं होनी चाहिए और 40 से कम नहीं हो सकती।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,2,0\"><strong data-path-to-node=\"4,2,0\" data-index-in-node=\"0\">SLA Nominations:</strong> Following the 104th Constitutional Amendment Act (2019), the Governor no longer has the power to nominate an Anglo-Indian member to the Assembly. (SLA नामांकन: 104वें संवैधानिक संशोधन अधिनियम (2019) के बाद, राज्यपाल के पास अब विधानसभा में एंग्लो-इंडियन सदस्य को नामित करने की शक्ति नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,3,0\"><strong data-path-to-node=\"4,3,0\" data-index-in-node=\"0\">SLC Election (5/6th):</strong> In the Legislative Council, five-sixth (5/6) of the total members are elected indirectly, including 1/12th by registered graduates and 1/12th by teachers of at least 3 years' standing. (SLC चुनाव (5/6): विधान परिषद में, कुल सदस्यों का पांच-छठा (5/6) भाग अप्रत्यक्ष रूप से चुना जाता है, जिसमें 1/12 पंजीकृत स्नातकों द्वारा और 1/12 कम से कम 3 वर्ष के अनुभव वाले शिक्षकों द्वारा चुने जाते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,4,0\"><strong data-path-to-node=\"4,4,0\" data-index-in-node=\"0\">SLC Nominations (1/6th):</strong> The Governor nominates 1/6th of the members based on their special knowledge in fields including Cooperative Movement, Literature, Art, Science, and Social Service. (SLC नामांकन (1/6): राज्यपाल सहकारी आंदोलन, साहित्य, कला, विज्ञान और समाज सेवा सहित क्षेत्रों में उनके विशेष ज्ञान के आधार पर 1/6 सदस्यों को नामित करता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">Options: / विकल्प:</strong></p>\n<ul data-path-to-node=\"6\">\n<li>\n<p data-path-to-node=\"6,0,0\"><strong data-path-to-node=\"6,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only (केवल 1, 2 और 3)</p>\n</li>\n<li>\n<p data-path-to-node=\"6,1,0\"><strong data-path-to-node=\"6,1,0\" data-index-in-node=\"0\">B)</strong> 2, 4, and 5 only (केवल 2, 4 और 5)</p>\n</li>\n<li>\n<p data-path-to-node=\"6,2,0\"><strong data-path-to-node=\"6,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, 4, and 5 only (केवल 1, 3, 4 और 5)</p>\n</li>\n<li>\n<p data-path-to-node=\"6,3,0\"><strong data-path-to-node=\"6,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the State Legislature (SLA &amp; SLC), consider the following statements and identify which ones are CORRECT?</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"127\">(राज्य विधानमंडल (SLA और SLC) के संदर्भ में, निम्नलिखित कथनों पर विचार करें और पहचानें कि कौन से सही हैं?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Chamber Duration:</strong> The Legislative Assembly is a permanent house and never dissolves, while the Legislative Council has a normal term of 5 years unless dissolved earlier by the Governor. (सदन की अवधि: विधानसभा एक स्थायी सदन है और कभी भंग नहीं होती है, जबकि विधान परिषद का सामान्य कार्यकाल 5 वर्ष होता है जब तक कि राज्यपाल द्वारा इसे पहले भंग न कर दिया जाए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Presiding Officers:</strong> Both the Speaker (Assembly) and the Chairperson (Council) are elected from among their respective members and possess a 'Casting Vote' only in the case of a tie. (पीठासीन अधिकारी: अध्यक्ष (विधानसभा) और सभापति (परिषद) दोनों अपने-अपने सदस्यों के बीच से चुने जाते हैं और केवल टाई होने की स्थिति में 'कास्टिंग वोट' (निर्णायक मत) का अधिकार रखते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Age Qualification:</strong> A person must be at least 25 years old to contest elections for the Legislative Assembly and at least 30 years old for the Legislative Council. (आयु योग्यता: विधानसभा के लिए चुनाव लड़ने के लिए व्यक्ति की आयु कम से कम 25 वर्ष और विधान परिषद के लिए कम से कम 30 वर्ष होनी चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Disqualification Decision:</strong> Disqualification on grounds of an 'Office of Profit' is decided by the Governor (consulting the EC), whereas disqualification under the 'Anti-Defection Law' (10th Schedule) is decided by the Presiding Officer. (अयोग्यता का निर्णय: 'लाभ के पद' के आधार पर अयोग्यता का निर्णय राज्यपाल (चुनाव आयोग की सलाह से) द्वारा किया जाता है, जबकि 'दल-बदल विरोधी कानून' (10वीं अनुसूची) के तहत अयोग्यता का निर्णय पीठासीन अधिकारी द्वारा किया जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Quorum:</strong> The minimum attendance required to conduct business in either house is 10 members or one-tenth (1/10th) of the total membership, whichever is higher. (कोरम/गणपूर्ति: किसी भी सदन में कार्यवाही संचालित करने के लिए आवश्यक न्यूनतम उपस्थिति 10 सदस्य या कुल सदस्यता का दसवां हिस्सा (1/10वां), जो भी अधिक हो, है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Options: / विकल्प:</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, 4, and 5 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 5 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Regarding the legislative process and the movement of bills in the State Legislature, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"124\">(राज्य विधानमंडल में विधायी प्रक्रिया और विधेयकों के संचलन के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Lapsing of Bills:</strong> A bill pending in the Legislative Council which has <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"70\">not</strong> been passed by the Legislative Assembly does <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"119\">not</strong> lapse on the dissolution of the Assembly. (विधेयकों का व्यपगत होना: विधान परिषद में लंबित विधेयक जिसे विधानसभा द्वारा पारित <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"247\">नहीं</strong> किया गया है, विधानसभा के विघटन पर व्यपगत (समाप्त) <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"302\">नहीं</strong> होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Ordinary Bills (Delay):</strong> Unlike the Rajya Sabha (which can delay for 6 months), the State Legislative Council can delay an Ordinary Bill for a maximum period of <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"160\">4 months</strong> in total. (साधारण विधेयक (देरी): राज्यसभा (जो 6 महीने तक देरी कर सकती है) के विपरीत, राज्य विधान परिषद एक साधारण विधेयक को कुल अधिकतम <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"303\">4 महीने</strong> की अवधि के लिए रोक सकती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Joint Sitting:</strong> In case of a deadlock between the Assembly and the Council over an Ordinary Bill, the Governor can summon a Joint Sitting of both houses under Article 108. (संयुक्त बैठक: साधारण विधेयक पर विधानसभा और परिषद के बीच गतिरोध के मामले में, राज्यपाल अनुच्छेद 108 के तहत दोनों सदनों की संयुक्त बैठक बुला सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Presidential Veto (Art. 201):</strong> When a bill is reserved for the President, and the President returns it for reconsideration, if the State Legislature passes it again, the President is <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"182\">not bound</strong> to give assent. (राष्ट्रपति का वीटो (अनुच्छेद 201): जब कोई विधेयक राष्ट्रपति के लिए आरक्षित होता है, और राष्ट्रपति उसे पुनर्विचार के लिए वापस भेज देता है, यदि राज्य विधानमंडल इसे फिर से पारित करता है, तो राष्ट्रपति सहमति देने के लिए <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"425\">बाध्य नहीं</strong> है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

e=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0,0\" data-index-in-node=\"0\">House Level</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,1,0\">Lower House (निचला सदन / लोकप्रिय सदन)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,2,0\">Upper House (उच्च सदन / वरिष्ठ सदन)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,0,0\" data-index-in-node=\"0\">Permanency</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,1,0\">Temporary (अस्थायी) - 5 Years</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,2,0\">Permanent (स्थायी) - Never Dissolves</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !i
