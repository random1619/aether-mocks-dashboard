    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the Parliament of India, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"78\">(भारत की संसद के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">Under <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"6\">Article 79</strong>, the Parliament of India consists of the President, the Rajya Sabha, and the Lok Sabha; the Hindi names for these houses were adopted in <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"154\">1954</strong>. (अनुच्छेद 79 के तहत, भारत की संसद में राष्ट्रपति, राज्यसभा और लोकसभा शामिल हैं; इन सदनों के हिंदी नाम <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"262\">1954</strong> में अपनाए गए थे।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Unlike the American system, the Indian President is an <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"55\">integral part of the legislature</strong>, even though he/she is not a member of either House. (अमेरिकी प्रणाली के विपरीत, भारतीय राष्ट्रपति <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"187\">विधायिका का एक अभिन्न अंग</strong> है, भले ही वह किसी भी सदन का सदस्य नहीं होता/होती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The President has the power to <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"31\">summon</strong> and <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"42\">prorogue</strong> both Houses, and can dissolve the Lok Sabha before 5 years, which <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"117\">cannot be challenged</strong> in any court of law. (राष्ट्रपति के पास दोनों सदनों को <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"193\">आहूत (समन)</strong> करने और <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"212\">सत्रावसान (प्रोरोग)</strong> क     "solution": "<p>Statement 4 is <strong data-path-to-node=\"8,0\" data-index-in-node=\"22\">Incorrect</strong> because it is swapped. The <strong data-path-to-node=\"8,0\" data-index-in-node=\"59\">Rajya Sabha</strong> represents the States/UTs, and the <strong data-path-to-node=\"8,0\" data-index-in-node=\"106\">Lok Sabha</strong> represents the people of India as a whole. (कथन 4 गलत है: राज्यसभा राज्यों/केंद्र शासित प्रदेशों का प्रतिनिधित्व करती है, और लोकसभा भारत के लोगों का।)</p>\n<p></p>\n<p>PARLIAMENT OF INDIA (PART V : ARTICLES 79&ndash;122)</p>\n<h2 data-start=\"254\" data-end=\"299\">I. Organisation &amp; Composition (Article 79)</h2>\n<ul data-start=\"301\" data-end=\"783\">\n<li data-start=\"301\" data-end=\"369\">\n<p data-start=\"303\" data-end=\"369\">Parliament is the <strong data-start=\"321\" data-end=\"366\">legislative organ of the Union Government</strong>.</p>\n</li>\n<li data-start=\"370\" data-end=\"480\">\n<p data-start=\"372\" data-end=\"387\">It consists of:</p>\n<ol data-start=\"390\" data-end=\"480\">\n<li data-start=\"390\" data-end=\"410\">\n<p data-start=\"393\" data-end=\"410\"><strong data-start=\"393\" data-end=\"410\">The President</strong></p>\n</li>\n<li data-start=\"413\" data-end=\"443\">\n<p data-start=\"416\" data-end=\"443\"><strong data-start=\"416\" data-end=\"443\">Lok Sabha (Lower House)</strong></p>\n</li>\n<li data-start=\"446\" data-end=\"480\">\n<p data-start=\"449\" data-end=\"480\"><strong data-start=\"449\" data-end=\"478\">Rajya Sabha (Upper House)</strong></p>\n</li>\n</ol>\n</li>\n<li data-start=\"481\" data-end=\"610\">\n<p data-start=\"483\" data-end=\"610\"><strong data-start=\"483\" data-end=\"502\">Articles 79&ndash;122</strong> deal with organisation, composition, duration, officers, procedures, privileges and powers of Parliament.</p>\n</li>\n<li data-start=\"611\" data-end=\"686\">\n<p data-start=\"613\" data-end=\"686\">Hindi names <strong data-start=\"625\" data-end=\"638\">Lok Sabha</strong> and <strong data-start=\"643\" data-end=\"658\">Rajya Sabha</strong> were adopted in <strong data-start=\"675\" data-end=\"683\">1954</strong>.</p>\n</li>\n<li data-start=\"687\" data-end=\"783\">\n<p data-start=\"689\" data-end=\"783\"><strong data-start=\"689\" data-end=\"704\">Rajya Sabha</strong> represents <strong data-start=\"716\" data-end=\"732\">States &amp; UTs</strong>; <strong data-start=\"734\" data-end=\"747\">Lok Sabha</strong> represents the <strong data-start=\"763\" data-end=\"782\">people of India</strong>.</p>\n</li>\n</ul>\n<p data-start=\"785\" data-end=\"916\">📌 <em data-start=\"788\" data-end=\"798\">PYQ Fact</em>: In India, the President is an integral part of Parliament; in the USA, the President is not part of the legislature.</p>\n<hr data-start=\"918\" data-end=\"921\" />\n<h2 data-start=\"923\" data-end=\"972\">II. President as an Integral Part (Article 79)</h2>\n<p></p>\n<ul data-start=\"974\" data-end=\"1284\">\n<li data-start=\"974\" data-end=\"1068\">\n<p data-start=\"976\" data-end=\"1068\">The President is <strong data-start=\"993\" data-end=\"1025\">not a member of either House</strong> but is an <strong data-start=\"1036\" data-end=\"1067\">integral part of Parliament</strong>.</p>\n</li>\n<li data-start=\"1069\" data-end=\"1207\">\n<p data-start=\"1071\" data-end=\"1078\">Powers:</p>\n<ul data-start=\"1081\" data-end=\"1207\">\n<li data-start=\"1081\" data-end=\"1118\">\n<p data-start=\"1083\" data-end=\"1118\">Summons and prorogues both Houses</p>\n</li>\n<li data-start=\"1121\" data-end=\"1144\">\n<p data-start=\"1123\" data-end=\"1144\">Dissolves Lok Sabha</p>\n</li>\n<li data-start=\"1147\" data-end=\"1171\">\n<p data-start=\"1149\" data-end=\"1171\">Addresses Parliament</p>\n</li>\n<li data-start=\"1174\" data-end=\"1207\">\n<p data-start=\"1176\" data-end=\"1207\">Issues Ordinances (Article 123)</p>\n</li>\n</ul>\n</li>\n<li data-start=\"1208\" data-end=\"1284\">\n<p data-start=\"1210\" data-end=\"1284\">Dissolution of Lok Sabha <strong data-start=\"1235\" data-end=\"1283\">before 5 years cannot be challenged in court</strong>.</p>\n</li>\n</ul>\n<h2 data-start=\"3991\" data-end=\"4027\">I. संगठन एवं संरचना (अनुच्छेद 79)</h2>\n<ul data-start=\"4029\" data-end=\"4386\">\n<li data-start=\"4029\" data-end=\"4069\">\n<p data-start=\"4031\" data-end=\"4069\">संसद <strong data-start=\"4036\" data-end=\"4063\">संघ सरकार का विधायी अंग</strong> है।</p>\n</li>\n<li data-start=\"4070\" data-end=\"4142\">\n<p data-start=\"4072\" data-end=\"4088\">संसद के तीन घटक:</p>\n<ol data-start=\"4091\" data-end=\"4142\">\n<li data-start=\"4091\" data-end=\"4108\">\n<p data-start=\"4094\" data-end=\"4108\"><strong data-start=\"4094\" data-end=\"4108\">राष्ट्रपति</strong></p>\n</li>\n<li data-start=\"4111\" data-end=\"4124\">\n<p data-start=\"4114\" data-end=\"4124\"><strong data-start=\"4114\" data-end=\"4124\">लोकसभा</strong></p>\n</li>\n<li data-start=\"4127\" data-end=\"4142\">\n<p data-start=\"4130\" data-end=\"4142\"><strong data-start=\"4130\" data-end=\"4142\">राज्यसभा</strong></p>\n</li>\n</ol>\n</li>\n<li data-start=\"4143\" data-end=\"4236\">\n<p data-start=\"4145\" data-end=\"4236\">अनुच्छेद <strong data-start=\"4154\" data-end=\"4164\">79&ndash;122</strong> संसद की संरचना, शक्तियाँ, प्रक्रियाएँ एवं विशेषाधिकारों से संबंधित हैं।</p>\n</li>\n<li data-start=\"4237\" data-end=\"4284\">\n<p data-start=\"4239\" data-end=\"4284\">लोकसभा और राज्यसभा नाम <strong data-start=\"4262\" data-end=\"4270\">1954</strong> में अपनाए गए।</p>\n</li>\n<li data-start=\"4285\" data-end=\"4346\">\n<p data-start=\"4287\" data-end=\"4346\">राज्यसभा &rarr; राज्यों व केंद्रशासित प्रदेशों का प्रतिनिधित्व</p>\n</li>\n<li data-start=\"4347\" data-end=\"4386\">\n<p data-start=\"4349\" data-end=\"4386\">लोकसभा &rarr; भारत की जनता का प्रतिनिधित्व</p>\n</li>\n</ul>\n<hr data-start=\"4388\" data-end=\"4391\" />\n<h2 data-start=\"4393\" data-end=\"4429\">II. संसद में राष्ट्रपति की भूमिका</h2>\n<p></p>\n<ul data-start=\"4431\" data-end=\"4706\">\n<li data-start=\"4431\" data-end=\"4504\">\n<p data-start=\"4433\" data-end=\"4504\">राष्ट्रपति किसी सदन का सदस्य नहीं है, फिर भी संसद का <strong data-start=\"4486\" data-end=\"4500\">अभिन्न अंग</strong> है।</p>\n</li>\n<li data-start=\"4505\" data-end=\"4627\">\n<p data-start=\"4507\" data-end=\"4516\">शक्तियाँ:</p>\n<ul data-start=\"4519\" data-end=\"4627\">\n<li data-start=\"4519\" data-end=\"4553\">\n<p data-start=\"4521\" data-end=\"4553\">संसद सत्र बुलाना व स्थगित करना</p>\n</li>\n<li data-start=\"4556\" data-end=\"4575\">\n<p data-start=\"4558\" data-end=\"4575\">लोकसभा भंग करना</p>\n</li>\n<li data-start=\"4578\" data-end=\"4602\">\n<p data-start=\"4580\" data-end=\"4602\">संसद को संबोधित करना</p>\n</li>\n<li data-start=\"4605\" data-end=\"4627\">\n<p data-start=\"4607\" data-end=\"4627\">अध्यादेश जारी करना</p>\n</li>\n</ul>\n</li>\n<li data-start=\"4628\" data-end=\"4706\">\n<p data-start=\"4630\" data-end=\"4706\">5 वर्ष से पहले लोकसभा भंग करने का निर्णय <strong data-start=\"4671\" data-end=\"4705\">न्यायालय में चुनौती योग्य नहीं</strong>।</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Evaluate the following statements regarding the composition and duration of the Houses:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"88\">(सदनों की संरचना और अवधि के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">The maximum strength of <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"24\">Rajya Sabha</strong> is 250, including 12 members nominated by the President for special knowledge in literature, science, art, and <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"147\">social service</strong>. ( <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"165\">राज्यसभा</strong> की अधिकतम संख्या 250 है, जिसमें साहित्य, विज्ञान, कला और <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"231\">समाज सेवा</strong> में विशेष ज्ञान के लिए राष्ट्रपति द्वारा नामित 12 सदस्य शामिल हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"4\">104th Constitutional Amendment Act (2019)</strong> discontinued the nomination of 2 Anglo-Indians in the Lok Sabha. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"113\">104वें संविधान संशोधन अधिनियम (2019)</strong> ने लोकसभा में 2 आंग्ल-भारतीयों (Anglo-Indians) के नामांकन को समाप्त कर दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">Members of the Rajya Sabha are elected by MLAs using <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"53\">proportional representation</strong>, while Lok Sabha members are directly elected via the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"135\">First-past-the-post</strong> system. (राज्यसभा के सदस्य विधायकों (MLAs) द्वारा <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"205\">आनुपातिक प्रतिनिधित्व</strong> के माध्यम से चुने जाते हैं, जबकि लोकसभा सदस्य सीधे <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"278\">फर्स्ट-पास्ट-द-पोस्ट</strong> प्रणाली के माध्यम से चुने जाते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The Lok Sabha is a continuing chamber that never dissolves, while one-third of Rajya Sabha members retire every two years. (लोकसभा एक निरंतर चलने वाला सदन है जो कभी भंग नहीं होता है, जबकि राज्यसभा के एक-तिहाई सदस्य हर दो साल में सेवानिवृत्त होते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,4,0\">During a National Emergency, the term of the Lok Sabha can be extended for <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"75\">one year</strong> at a time, but cannot exceed <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"113\">six months</strong> after the emergency ends. (राष्ट्रीय आपातकाल के दौरान, लोकसभा के कार्यकाल को एक बार में <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"212\">एक वर्ष</strong> के लिए बढ़ाया जा सकता है, लेकिन आपातकाल समाप्त होने के बाद यह <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"282\">छह महीने</strong> से अधिक नहीं हो सकता।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 1, 2, 3, and 5 only C) 2, 3, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",
    "comp": "",

    "solution": "<p>Statement 4 is <strong data-path-to-node=\"16,0\" data-index-in-node=\"22\">Incorrect</strong>. The <strong data-path-to-node=\"16,0\" data-index-in-node=\"37\">Rajya Sabha</strong> is the continuing chamber (permanent), while the <strong data-path-to-node=\"16,0\" data-index-in-node=\"98\">Lok Sabha</strong> dissolves every 5 years or earlier. (कथन 4 गलत है: राज्यसभा स्थाई सदन है, जबकि लोकसभा हर 5 साल में भंग हो जाती है।)</p>\n<p></p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" data-index-in-node=\"0\">Revision \"Key Facts\" Table</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Rajya Sabha (राज्यसभा)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Lok Sabha (लोकसभा)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; data-path-to-node=\"19,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,0,0\" data-index-in-node=\"0\">Term</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,1,0\">Permanent (6-year member term)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,2,0\">5 years (unless dissolved)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\" data-index-in-node=\"0\">Seat Allocation</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,1,0\">4th Schedule</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,2,0\">Territorial Constituencies</span></td>\n</tr>\n</tbody>\n</table>\n<h2 data-start=\"1291\" data-end=\"1344\">III. Houses of Parliament &ndash; Comparative Features</h2>\n<p data-start=\"1345\" data-end=\"1366\">(Articles 80, 81, 83)</p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1368\" data-end=\"1860\">\n<thead data-start=\"1368\" data-end=\"1405\">\n<tr data-start=\"1368\" data-end=\"1405\">\n<th data-start=\"1368\" data-end=\"1378\" data-col-size=\"sm\">Feature</th>\n<th data-start=\"1378\" data-end=\"1392\" data-col-size=\"md\">Rajya Sabha</th>\n<th data-start=\"1392\" data-end=\"1405\" data-col-size=\"sm\">Lok Sabha</th>\n</tr>\n</thead>\n<tbody data-start=\"1440\" data-end=\"1860\">\n<tr data-start=\"1440\" data-end=\"1523\">\n<td data-start=\"1440\" data-end=\"1459\" data-col-size=\"sm\">Maximum Strength</td>\n<td data-col-size=\"md\" data-start=\"1459\" data-end=\"1494\">250 (238 elected + 12 nominated)</td>\n<td data-col-size=\"sm\" data-start=\"1494\" data-end=\"1523\">550 (530 States + 20 UTs)</td>\n</tr>\n<tr data-start=\"1524\" data-end=\"1556\">\n<td data-start=\"1524\" data-end=\"1543\" data-col-size=\"sm\">Present Strength</td>\n<td data-col-size=\"md\" data-start=\"1543\" data-end=\"1549\">245</td>\n<td data-col-size=\"sm\" data-start=\"1549\" data-end=\"1556\">543</td>\n</tr>\n<tr data-start=\"1557\" data-end=\"1639\">\n<td data-start=\"1557\" data-end=\"1571\" data-col-size=\"sm\">Nominations</td>\n<td data-col-size=\"md\" data-start=\"1571\" data-end=\"1621\">12 by President (Art, Lit, Sci, Social Service)</td>\n<td data-col-size=\"sm\" data-start=\"1621\" data-end=\"1639\">Not applicable</td>\n</tr>\n<tr data-start=\"1640\" data-end=\"1705\">\n<td data-start=\"1640\" data-end=\"1666\" data-col-size=\"sm\">Anglo-Indian Nomination</td>\n<td data-col-size=\"md\" data-start=\"1666\" data-end=\"1671\">NA</td>\n<td data-col-size=\"sm\" data-start=\"1671\" data-end=\"1705\">Discontinued (104th CAA, 2019)</td>\n</tr>\n<tr data-start=\"1706\" data-end=\"1762\">\n<td data-start=\"1706\" data-end=\"1717\" data-col-size=\"sm\">Election</td>\n<td data-col-size=\"md\" data-start=\"1717\" data-end=\"1745\">Indirect (PR-STV by MLAs)</td>\n<td data-col-size=\"sm\" data-start=\"1745\" data-end=\"1762\">Direct (FPTP)</td>\n</tr>\n<tr data-start=\"1763\" data-end=\"1808\">\n<td data-start=\"1763\" data-end=\"1770\" data-col-size=\"sm\">Term</td>\n<td data-col-size=\"md\" data-start=\"1770\" data-end=\"1797\">Permanent House; 6 years</td>\n<td data-col-size=\"sm\" data-start=\"1797\" data-end=\"1808\">5 years</td>\n</tr>\n<tr data-start=\"1809\" data-end=\"1860\">\n<td data-start=\"1809\" data-end=\"1831\" data-col-size=\"sm\">Emergency Extension</td>\n<td data-col-size=\"md\" data-start=\"1831\" data-end=\"1836\">NA</td>\n<td data-col-size=\"sm\" data-start=\"1836\" data-end=\"1860\">Extendable by 1 year</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1862\" data-end=\"1865\" />\n<h2 data-start=\"1867\" data-end=\"1908\">IV. Qualifications &amp; Disqualifications</h2>\n<h3 data-start=\"1910\" data-end=\"1944\">A. Qualifications (Article 84)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1946\" data-end=\"2097\">\n<thead data-start=\"1946\" data-end=\"1976\">\n<tr data-start=\"1946\" data-end=\"1976\">\n<th data-start=\"1946\" data-end=\"1954\" data-col-size=\"sm\">House</th>\n<th data-start=\"1954\" data-end=\"1976\" data-col-size=\"sm\">Key Qualifications</th>\n</tr>\n</thead>\n<tbody data-start=\"2004\" data-end=\"2097\">\n<tr data-start=\"2004\" data-end=\"2051\">\n<td data-start=\"2004\" data-end=\"2018\" data-col-size=\"sm\">Rajya Sabha</td>\n<td data-col-size=\"sm\" data-start=\"2018\" data-end=\"2051\">Citizen, Oath, Age &ge; 30 years</td>\n</tr>\n<tr data-start=\"2052\" data-end=\"2097\">\n<td data-start=\"2052\" data-end=\"2064\" data-col-size=\"sm\">Lok Sabha</td>\n<td data-col-size=\"sm\" data-start=\"2064\" data-end=\"2097\">Citizen, Oath, Age &ge; 25 years</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"2099\" data-end=\"2176\"><strong data-start=\"2099\" data-end=\"2112\">RPA, 1951</strong>: Must be a registered elector; SC/ST status for reserved seats.</p>\n<hr data-start=\"2178\" data-end=\"2181\" />\n<h3 data-start=\"2183\" data-end=\"2220\">B. Disqualification (Article 102)</h3>\n<p data-start=\"2222\" data-end=\"2248\"><strong data-start=\"2222\" data-end=\"2248\">Constitutional Grounds</strong></p>\n<ul data-start=\"2249\" data-end=\"2340\">\n<li data-start=\"2249\" data-end=\"2269\">\n<p data-start=\"2251\" data-end=\"2269\">Office of profit</p>\n</li>\n<li data-start=\"2270\" data-end=\"2296\">\n<p data-start=\"2272\" data-end=\"2296\">Not a citizen of India</p>\n</li>\n<li data-start=\"2297\" data-end=\"2313\">\n<p data-start=\"2299\" data-end=\"2313\">Unsound mind</p>\n</li>\n<li data-start=\"2314\" data-end=\"2340\">\n<p data-start=\"2316\" data-end=\"2340\">Undischarged insolvent</p>\n</li>\n</ul>\n<p data-start=\"2342\" data-end=\"2363\"><strong data-start=\"2342\" data-end=\"2363\">RPA, 1951 Grounds</strong></p>\n<ul data-start=\"2364\" data-end=\"2484\">\n<li data-start=\"2364\" data-end=\"2385\">\n<p data-start=\"2366\" data-end=\"2385\">Election offences</p>\n</li>\n<li data-start=\"2386\" data-end=\"2422\">\n<p data-start=\"2388\" data-end=\"2422\">Interest in government contracts</p>\n</li>\n<li data-start=\"2423\" data-end=\"2455\">\n<p data-start=\"2425\" data-end=\"2455\">Conviction for social crimes</p>\n</li>\n<li data-start=\"2456\" data-end=\"2484\">\n<p data-start=\"2458\" data-end=\"2484\">Dismissal for corruption</p>\n</li>\n</ul>\n<hr data-start=\"2486\" data-end=\"2489\" />\n<h3 data-start=\"2491\" data-end=\"2523\">C. Defection (10th Schedule)</h3>\n<p></p>\n<ul data-start=\"2525\" data-end=\"2669\">\n<li data-start=\"2525\" data-end=\"2585\">\n<p data-start=\"2527\" data-end=\"2546\">Decision Authority:</p>\n<ul data-start=\"2549\" data-end=\"2585\">\n<li data-start=\"2549\" data-end=\"2566\">\n<p data-start=\"2551\" data-end=\"2566\">RS &rarr; Chairman</p>\n</li>\n<li data-start=\"2569\" data-end=\"2585\">\n<p data-start=\"2571\" data-end=\"2585\">LS &rarr; Speaker</p>\n</li>\n</ul>\n</li>\n<li data-start=\"2586\" data-end=\"2669\">\n<p data-start=\"2588\" data-end=\"2634\">Decisions are <strong data-start=\"2602\" data-end=\"2632\">subject to judicial review</strong></p>\n<ul data-start=\"2637\" data-end=\"2669\">\n<li data-start=\"2637\" data-end=\"2669\">\n<p data-start=\"2639\" data-end=\"2669\">(<em data-start=\"2640\" data-end=\"2668\">Kihoto Hollohan Case, 1992</em>)</p>\n</li>\n</ul>\n</li>\n</ul>\n<h2 data-start=\"4713\" data-end=\"4751\">III. संसद के सदन &ndash; तुलनात्मक अध्ययन</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4753\" data-end=\"4974\">\n<thead data-start=\"4753\" data-end=\"4784\">\n<tr data-start=\"4753\" data-end=\"4784\">\n<th data-start=\"4753\" data-end=\"4763\" data-col-size=\"sm\">विशेषता</th>\n<th data-start=\"4763\" data-end=\"4774\" data-col-size=\"sm\">राज्यसभा</th>\n<th data-start=\"4774\" data-end=\"4784\" data-col-size=\"sm\">लोकसभा</th>\n</tr>\n</thead>\n<tbody data-start=\"4813\" data-end=\"4974\">\n<tr data-start=\"4813\" data-end=\"4841\">\n<td data-start=\"4813\" data-end=\"4828\" data-col-size=\"sm\">अधिकतम सदस्य</td>\n<td data-col-size=\"sm\" data-start=\"4828\" data-end=\"4834\">250</td>\n<td data-col-size=\"sm\" data-start=\"4834\" data-end=\"4841\">550</td>\n</tr>\n<tr data-start=\"4842\" data-end=\"4872\">\n<td data-start=\"4842\" data-end=\"4859\" data-col-size=\"sm\">वर्तमान संख्या</td>\n<td data-col-size=\"sm\" data-start=\"4859\" data-end=\"4865\">245</td>\n<td data-col-size=\"sm\" data-start=\"4865\" data-end=\"4872\">543</td>\n</tr>\n<tr data-start=\"4873\" data-end=\"4904\">\n<td data-start=\"4873\" data-end=\"4883\" data-col-size=\"sm\">नामांकन</td>\n<td data-col-size=\"sm\" data-start=\"4883\" data-end=\"4894\">12 सदस्य</td>\n<td data-col-size=\"sm\" data-start=\"4894\" data-end=\"4904\">समाप्त</td>\n</tr>\n<tr data-start=\"4905\" data-end=\"4939\">\n<td data-start=\"4905\" data-end=\"4916\" data-col-size=\"sm\">कार्यकाल</td>\n<td data-col-size=\"sm\" data-start=\"4916\" data-end=\"4929\">स्थायी सदन</td>\n<td data-col-size=\"sm\" data-start=\"4929\" data-end=\"4939\">5 वर्ष</td>\n</tr>\n<tr data-start=\"4940\" data-end=\"4974\">\n<td data-start=\"4940\" data-end=\"4948\" data-col-size=\"sm\">चुनाव</td>\n<td data-start=\"4948\" data-end=\"4961\" data-col-size=\"sm\">अप्रत्यक्ष</td>\n<td data-start=\"4961\" data-end=\"4974\" data-col-size=\"sm\">प्रत्यक्ष</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"4976\" data-end=\"4979\" />\n<h2 data-start=\"4981\" data-end=\"5011\">IV. अर्हताएँ एवं निरर्हताएँ</h2>\n<h3 data-start=\"5013\" data-end=\"5039\">अर्हताएँ (अनुच्छेद 84)</h3>\n<ul data-start=\"5041\" data-end=\"5108\">\n<li data-start=\"5041\" data-end=\"5051\">\n<p data-start=\"5043\" data-end=\"5051\">नागरिकता</p>\n</li>\n<li data-start=\"5052\" data-end=\"5057\">\n<p data-start=\"5054\" data-end=\"5057\">शपथ</p>\n</li>\n<li data-start=\"5058\" data-end=\"5108\">\n<p data-start=\"5060\" data-end=\"5064\">आयु:</p>\n<ul data-start=\"5067\" data-end=\"5108\">\n<li data-start=\"5067\" data-end=\"5087\">\n<p data-start=\"5069\" data-end=\"5087\">राज्यसभा &ndash; 30 वर्ष</p>\n</li>\n<li data-start=\"5090\" data-end=\"5108\">\n<p data-start=\"5092\" data-end=\"5108\">लोकसभा &ndash; 25 वर्ष</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"5110\" data-end=\"5113\" />\n<h3 data-start=\"5115\" data-end=\"5144\">निरर्हताएँ (अनुच्छेद 102)</h3>\n<p></p>\n<ul data-start=\"5146\" data-end=\"5205\">\n<li data-start=\"5146\" data-end=\"5157\">\n<p data-start=\"5148\" data-end=\"5157\">लाभ का पद</p>\n</li>\n<li data-start=\"5158\" data-end=\"5168\">\n<p data-start=\"5160\" data-end=\"5168\">दिवालिया</p>\n</li>\n<li data-start=\"5169\" data-end=\"5186\">\n<p data-start=\"5171\" data-end=\"5186\">विदेशी नागरिकता</p>\n</li>\n<li data-start=\"5187\" data-end=\"5205\">\n<p data-start=\"5189\" data-end=\"5205\">अस्वस्थ मस्तिष्क</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the qualifications and the concept of 'Office of Profit', consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"111\">(योग्यता और 'लाभ के पद' की अवधारणा के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">While the Constitution mandates a minimum age of <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"49\">25 for Lok Sabha</strong> and <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"70\">30 for Rajya Sabha</strong>, the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"94\">RPA 1951</strong> requires a candidate to be registered as an elector in any Parliamentary constituency. (जहाँ संविधान <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"204\">लोकसभा के लिए 25 वर्ष</strong> और <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"229\">राज्यसभा के लिए 30 वर्ष</strong> की न्यूनतम आयु का आदेश देता है, वहीं <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"290\">RPA 1951</strong> के अनुसार उम्मीदवार का किसी भी संसदीय निर्वाचन क्षेत्र में निर्वाचक के रूप में पंजीकृत होना आवश्यक है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The term <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"9\">'Office of Profit'</strong> is explicitly defined in <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"53\">Article 102</strong> of the Constitution and the Representation of the People Act, 1951. ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"135\">'लाभ का पद'</strong> शब्द को संविधान के <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"166\">अनुच्छेद 102</strong> और जनप्रतिनिधित्व अधिनियम, 1951 में स्पष्ट रूप से परिभाषित किया गया है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">There is no constitutional limit on the number of offices that Parliament can exempt from disqualification under the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"117\">Office of Profit</strong> law. (संसद द्वारा <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"152\">लाभ के पद</strong> कानून के तहत अयोग्यता से छूट दिए जाने वाले पदों की संख्या पर कोई संवैधानिक सीमा नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Under the RPA 1951, a person is disqualified if they hold a managing office in a corporation in which the government has at least <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"130\">25% share</strong>. (RPA 1951 के तहत, यदि कोई व्यक्ति उस निगम में प्रबंधकीय पद पर है जिसमें सरकार की कम से कम <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"231\">25% हिस्सेदारी</strong> है, तो वह अयोग्य माना जाता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 1, 3, and 4 only C) 2 and 4 only D) All of the above</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&nbsp;Statement 2 is <strong data-path-to-node=\"8,0\" data-index-in-node=\"22\">Incorrect</strong>. The term 'Office of Profit' is <em data-path-to-node=\"8,0\" data-index-in-node=\"64\">mentioned</em> in the Constitution but <strong data-path-to-node=\"8,0\" data-index-in-node=\"98\">not defined</strong> in the Constitution or the RPA 1951. (तर्क: 'लाभ का पद' शब्द का उल्लेख तो है, पर परिभाषा कहीं नहीं दी गई है।)</p>",
    "marks": 2.0,
    "section": "ADVANCE POLITY 360"
  },

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Evaluate the following statements regarding Article 101 and the Tenth Schedule:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"80\">(अनुच्छेद 101 और दसवीं अनुसूची के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">If a person is elected to <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"26\">both Houses</strong> of Parliament and fails to intimate their choice within <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"94\">10 days</strong>, their seat in the Rajya Sabha becomes vacant. (यदि कोई व्यक्ति संसद के <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"174\">दोनों सदनों</strong> के लिए चुना जाता है और <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"209\">10 दिनों</strong> के भीतर अपनी पसंद नहीं बताता है, तो राज्यसभा में उसकी सीट खाली हो जाती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">A member of Parliament elected to a <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"36\">State Legislature</strong> must resign from the State seat within <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"93\">14 days</strong>, or their Parliament seat becomes vacant. (राज्य विधानमंडल के लिए चुने गए संसद सदस्य को <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"189\">14 दिनों</strong> के भीतर राज्य की सीट से इस्तीफा देना होगा, अन्यथा उनकी संसद की सीट खाली हो जाएगी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">Under the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"10\">Tenth Schedule</strong>, the decision on disqualification due to defection is made by the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"91\">President</strong> and is not subject to judicial review. ( <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"142\">दसवीं अनुसूची</strong> के तहत, दलबदल के कारण अयोग्यता का निर्णय <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"197\">राष्ट्रपति</strong> द्वारा लिया जाता है और यह न्यायिक समीक्षा के अधीन नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"4\">Kihoto Hollohan (1992)</strong> judgment affirmed that the Presiding Officer&rsquo;s decision under the Anti-Defection law is subject to <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"126\">Judicial Review</strong>. ( <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"145\">किहोतो होलोहन (1992)</strong> के फैसले ने पुष्टि की कि दलबदल विरोधी कानून के तहत पीठासीन अधिकारी का निर्णय <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"243\">न्यायिक समीक्षा</strong> के अधीन है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 2 and 3 only C) 1 and 4 only D) 1, 2, 3, and 4</p>",
    "comp": "",
    "options": [
      "<p>D</p>",
      "<p>A</p>",
      "<p>C</p>",
      "<p>A</p>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement 3 is <strong data-path-to-node=\"16,0\" data-index-in-node=\"22\">Incorrect</strong>. The decision is made by the <strong data-path-to-node=\"16,0\" data-index-in-node=\"61\">Chairman/Speaker</strong> (not the President), and since 1992, it <em data-path-to-node=\"16,0\" data-index-in-node=\"118\">is</em> subject to judicial review. (तर्क: निर्णय सभापति/अध्यक्ष लेते हैं, और यह न्यायिक समीक्षा के अधीन है।)</p>\n<p></p>\n<h2 data-start=\"2676\" data-end=\"2713\">V. Vacating of Seats (Article 101)</h2>\n<ul data-start=\"2715\" data-end=\"2885\">\n<li data-start=\"2715\" data-end=\"2754\">\n<p data-start=\"2717\" data-end=\"2754\">No double membership of Parliament.</p>\n</li>\n<li data-start=\"2755\" data-end=\"2822\">\n<p data-start=\"2757\" data-end=\"2822\">If elected to both Houses &rarr; must resign one within <strong data-start=\"2808\" data-end=\"2819\">10 days</strong>.</p>\n</li>\n<li data-start=\"2823\" data-end=\"2885\">\n<p data-start=\"2825\" data-end=\"2885\">Lok Sabha + State Legislature &rarr; resign within <strong data-start=\"2871\" data-end=\"2882\">14 days</strong>.</p>\n</li>\n</ul>\n<hr data-start=\"2887\" data-end=\"2890\" />\n<h2 data-start=\"2892\" data-end=\"2915\">VI. Office of Profit</h2>\n<ul data-start=\"2917\" data-end=\"3189\">\n<li data-start=\"2917\" data-end=\"2969\">\n<p data-start=\"2919\" data-end=\"2969\">Mentioned in <strong data-start=\"2932\" data-end=\"2966\">Articles 102(1)(a) &amp; 191(1)(a)</strong>.</p>\n</li>\n<li data-start=\"2970\" data-end=\"3019\">\n<p data-start=\"2972\" data-end=\"3019\">Not defined in the Constitution or RPA, 1951.</p>\n</li>\n<li data-start=\"3020\" data-end=\"3099\">\n<p data-start=\"3022\" data-end=\"3099\">Parliament (Prevention of Disqualification) Act, 1959 regulates exemptions.</p>\n</li>\n<li data-start=\"3100\" data-end=\"3147\">\n<p data-start=\"3102\" data-end=\"3147\"><strong data-start=\"3102\" data-end=\"3120\">2006 Amendment</strong> upheld by Supreme Court.</p>\n</li>\n<li data-start=\"3148\" data-end=\"3189\">\n<p data-start=\"3150\" data-end=\"3189\">No limit on number of exempted offices.</p>\n</li>\n</ul>\n<hr data-start=\"3191\" data-end=\"3194\" />\n<h2 data-start=\"3196\" data-end=\"3226\">VII. Elections to Lok Sabha</h2>\n<p></p>\n<ul data-start=\"3228\" data-end=\"3544\">\n<li data-start=\"3228\" data-end=\"3269\">\n<p data-start=\"3230\" data-end=\"3269\">Article 81: Territorial constituencies.</p>\n</li>\n<li data-start=\"3270\" data-end=\"3315\">\n<p data-start=\"3272\" data-end=\"3284\">Reservation:</p>\n<ul data-start=\"3287\" data-end=\"3315\">\n<li data-start=\"3287\" data-end=\"3315\">\n<p data-start=\"3289\" data-end=\"3315\">Articles 330 &amp; 332 &rarr; SC/ST</p>\n</li>\n</ul>\n</li>\n<li data-start=\"3316\" data-end=\"3396\">\n<p data-start=\"3318\" data-end=\"3330\">Seat Freeze:</p>\n<ul data-start=\"3333\" data-end=\"3396\">\n<li data-start=\"3333\" data-end=\"3363\">\n<p data-start=\"3335\" data-end=\"3363\">42nd CAA, 1976 &rarr; till 2000</p>\n</li>\n<li data-start=\"3366\" data-end=\"3396\">\n<p data-start=\"3368\" data-end=\"3396\">84th CAA, 2001 &rarr; till 2026</p>\n</li>\n</ul>\n</li>\n<li data-start=\"3397\" data-end=\"3442\">\n<p data-start=\"3399\" data-end=\"3410\">Voting Age:</p>\n<ul data-start=\"3413\" data-end=\"3442\">\n<li data-start=\"3413\" data-end=\"3442\">\n<p data-start=\"3415\" data-end=\"3442\">61st CAA, 1988 &rarr; 18 years</p>\n</li>\n</ul>\n</li>\n<li data-start=\"3443\" data-end=\"3544\">\n<p data-start=\"3445\" data-end=\"3461\">104th CAA, 2019:</p>\n<ul data-start=\"3464\" data-end=\"3544\">\n<li data-start=\"3464\" data-end=\"3506\">\n<p data-start=\"3466\" data-end=\"3506\">SC/ST reservation extended till <strong data-start=\"3498\" data-end=\"3506\">2030</strong></p>\n</li>\n<li data-start=\"3509\" data-end=\"3544\">\n<p data-start=\"3511\" data-end=\"3544\">Anglo-Indian nomination abolished</p>\n</li>\n</ul>\n</li>\n</ul>\n<h2 data-start=\"5212\" data-end=\"5240\">V. दल-बदल (10वीं अनुसूची)</h2>\n<ul data-start=\"5242\" data-end=\"5323\">\n<li data-start=\"5242\" data-end=\"5263\">\n<p data-start=\"5244\" data-end=\"5263\">राज्यसभा &rarr; सभापति</p>\n</li>\n<li data-start=\"5264\" data-end=\"5284\">\n<p data-start=\"5266\" data-end=\"5284\">लोकसभा &rarr; अध्यक्ष</p>\n</li>\n<li data-start=\"5285\" data-end=\"5323\">\n<p data-start=\"5287\" data-end=\"5323\">निर्णय <strong data-start=\"5294\" data-end=\"5319\">न्यायिक समीक्षा योग्य</strong> है।</p>\n</li>\n</ul>\n<hr data-start=\"5325\" data-end=\"5328\" />\n<h2 data-start=\"5330\" data-end=\"5349\">VI. लोकसभा चुनाव</h2>\n<p></p>\n<ul data-start=\"5351\" data-end=\"5561\">\n<li data-start=\"5351\" data-end=\"5394\">\n<p data-start=\"5353\" data-end=\"5394\">अनुच्छेद 81: क्षेत्रीय निर्वाचन क्षेत्र</p>\n</li>\n<li data-start=\"5395\" data-end=\"5430\">\n<p data-start=\"5397\" data-end=\"5430\">अनुच्छेद 330, 332: SC/ST आरक्षण</p>\n</li>\n<li data-start=\"5431\" data-end=\"5454\">\n<p data-start=\"5433\" data-end=\"5454\">सीट फ्रीज़: 2026 तक</p>\n</li>\n<li data-start=\"5455\" data-end=\"5477\">\n<p data-start=\"5457\" data-end=\"5477\">मतदान आयु: 18 वर्ष</p>\n</li>\n<li data-start=\"5478\" data-end=\"5561\">\n<p data-start=\"5480\" data-end=\"5494\">104वाँ संशोधन:</p>\n<ul data-start=\"5497\" data-end=\"5561\">\n<li data-start=\"5497\" data-end=\"5529\">\n<p data-start=\"5499\" data-end=\"5529\">एंग्लो-इंडियन नामांकन समाप्त</p>\n</li>\n<li data-start=\"5532\" data-end=\"5561\">\n<p data-start=\"5534\" data-end=\"5561\">SC/ST आरक्षण 2030 तक बढ़ाया</p>\n</li>\n</ul>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">Identify the INCORRECT statement based on the system of elections to Lok Sabha:</strong></p>\n<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"80\">(लोकसभा चुनाव प्रणाली के आधार पर गलत कथन की पहचान करें:)</strong></p>\n<p data-path-to-node=\"21\"></p>",
    "comp": "",
    "options": [
      "<p>&nbsp;The <strong data-path-to-node=\"21\" data-index-in-node=\"7\">61st Amendment Act (1988)</strong>&nbsp;reduced the voting age from 21 to 18 years.</p>\n<p>(&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"79\">61वें संशोधन अधिनियम (1988)</strong>&nbsp;ने मतदान की आयु 21 से घटाकर 18 वर्ष कर दी।)&nbsp;</p>",
      "<p>The <strong data-path-to-node=\"21\" data-index-in-node=\"158\">84th Amendment Act (2001)</strong>&nbsp;extended the freeze on seat allocation and territorial constituencies until&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"260\">2026</strong>&nbsp;based on 1971 levels. (&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"289\">84वें संशोधन अधिनियम (2001)</strong>&nbsp;ने 1971 के स्तर के आधार पर सीटों के आवंटन और क्षेत्रीय निर्वाचन क्षेत्रों पर रोक को&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"401\">2026</strong>&nbsp;तक बढ़ा दिया।)</p>",
      "<p>The&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"428\">104th CAA (2019)</strong>&nbsp;extended SC/ST reservations until 2030 and increased the Anglo-Indian nomination to 4 members.</p>\n<p>(&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"542\">104वें CAA (2019)</strong>&nbsp;ने SC/ST आरक्षण को 2030 तक बढ़ा दिया और आंग्ल-भारतीय नामांकन को बढ़ाकर 4 सदस्य कर दिया।)</p>",
      "<p>&nbsp;Scheduled Castes (SC) and Scheduled Tribes (ST) are elected by all voters in a constituency (joint electorate), not a separate electorate. (अनुसूचित जाति और अनुसूचित जनजाति का चुनाव निर्वाचन क्षेत्र के सभी मतदाताओं द्वारा किया जाता है (संयुक्त निर्वाचन मंडल), न कि अलग निर्वाचन मंडल द्वारा।)</p>"

    "solution": "<p>The <strong data-path-to-node=\"23,0\" data-index-in-node=\"11\">104th CAA discontinued</strong> (ended) the nomination of Anglo-Indians; it did not increase it. (तर्क: 104वें संशोधन ने आंग्ल-भारतीय नामांकन को <strong data-path-to-node=\"23,0\" data-index-in-node=\"147\">समाप्त</strong> कर दिया है।)</p>\n<p></p>\n<h2 data-start=\"5568\" data-end=\"5591\">VII. पीठासीन अधिकारी</h2>\n<ul data-start=\"5593\" data-end=\"5656\">\n<li data-start=\"5593\" data-end=\"5624\">\n<p data-start=\"5595\" data-end=\"5624\">लोकसभा &rarr; अध्यक्ष, उपाध्यक्ष</p>\n</li>\n<li data-start=\"5625\" data-end=\"5656\">\n<p data-start=\"5627\" data-end=\"5656\">राज्यसभा &rarr; सभापति, उपसभापति</p>\n</li>\n</ul>\n<hr data-start=\"5658\" data-end=\"5661\" />\n<h3 data-start=\"5663\" data-end=\"5693\">🔥 <strong data-start=\"5670\" data-end=\"5693\">EXAM FINAL TAKEAWAY</strong></h3>\n<p></p>\n<ul data-start=\"5694\" data-end=\"5879\">\n<li data-start=\"5694\" data-end=\"5737\">\n<p data-start=\"5696\" data-end=\"5737\">President = Integral part of Parliament</p>\n</li>\n<li data-start=\"5738\" data-end=\"5771\">\n<p data-start=\"5740\" data-end=\"5771\">Rajya Sabha = Permanent House</p>\n</li>\n<li data-start=\"5772\" data-end=\"5811\">\n<p data-start=\"5774\" data-end=\"5811\">Anglo-Indian Nomination = Abolished</p>\n</li>\n<li data-start=\"5812\" data-end=\"5839\">\n<p data-start=\"5814\" data-end=\"5839\">Seat Freeze = Till 2026</p>\n</li>\n<li data-start=\"5840\" data-end=\"5879\">\n<p data-start=\"5842\" data-end=\"5879\">Defection = Judicial Review allowed</p>\n</li>\n</ul>\n<h2 data-start=\"3551\" data-end=\"3578\">VIII. Presiding Officers</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3580\" data-end=\"3701\">\n<thead data-start=\"3580\" data-end=\"3600\">\n<tr data-start=\"3580\" data-end=\"3600\">\n<th data-start=\"3580\" data-end=\"3588\" data-col-size=\"sm\">House</th>\n<th data-start=\"3588\" data-end=\"3600\" data-col-size=\"sm\">Officers</th>\n</tr>\n</thead>\n<tbody data-start=\"3618\" data-end=\"3701\">\n<tr data-start=\"3618\" data-end=\"3657\">\n<td data-start=\"3618\" data-end=\"3630\" data-col-size=\"sm\">Lok Sabha</td>\n<td data-start=\"3630\" data-end=\"3657\" data-col-size=\"sm\">Speaker, Deputy Speaker</td>\n</tr>\n<tr data-start=\"3658\" data-end=\"3701\">\n<td data-start=\"3658\" data-end=\"3672\" data-col-size=\"sm\">Rajya Sabha</td>\n<td data-start=\"3672\" data-end=\"3701\" data-col-size=\"sm\">Chairman, Deputy Chairman</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<h3 data-start=\"3703\" data-end=\"3734\">Historical Facts (PYQ Gold)</h3>\n<p></p>\n<ul data-start=\"3735\" data-end=\"3941\">\n<li data-start=\"3735\" data-end=\"3802\">\n<p data-start=\"3737\" data-end=\"3802\">1921: First Speaker &ndash; <strong data-start=\"3759\" data-end=\"3800\">Frederick Whyte</strong></p>\n</li>\n<li data-start=\"3803\" data-end=\"3871\">\n<p data-start=\"3805\" data-end=\"3871\">First Indian Speaker &ndash; <strong data-start=\"3828\" data-end=\"3869\">Vithalbhai J. Patel</strong></p>\n</li>\n<li data-start=\"3872\" data-end=\"3941\">\n<p data-start=\"3874\" data-end=\"3941\">First Lok Sabha Speaker &ndash; <strong data-start=\"3900\" data-end=\"3941\">G.V. Mavalankar</strong></p>\n</li>\n</ul>",

=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,1,1,0\">Temporary; senior-most member; administers oath.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,1,2,0\">अस्थायी; वरिष्ठतम सदस्य; शपथ दिलाता है।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,2,0,0\" data-index-in-node=\"0\">Art. 104 Penalty</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,2,1,0\">₹500/day for sitting without qualification.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,2,2,0\">बिना योग्यता के बैठने पर ₹500/दिन जुर्माना।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,3,0,0\" data-index-in-node=\"0\">1st Deputy Speaker</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,3,1,0\">Sachchidanand Sinha (1921).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,3,2,0\">सच्चिदानंद सिन्हा (1921)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,4,0,0\" data-index-in-node=\"0\">Art. 106 Salaries</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,4,1,0\">Determined by Parliament.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,4,2,0\">संसद द्वारा निर्धारित।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,5,0,0\" data-index-in-node=\"0\">Art. 102(1)(a)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,5,1,0\">Disqualification on Office of Profit.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33,5,2,0\">लाभ के पद पर अयोग्यता।</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Speaker of the Lok Sabha:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"77\">(लोकसभा अध्यक्ष के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Speaker is elected by the Lok Sabha from among its members, and the date of the election is fixed by the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"109\">President</strong>. (अध्यक्ष का चुनाव लोकसभा द्वारा अपने सदस्यों में से किया जाता है, और चुनाव की तारीख <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"204\">राष्ट्रपति</strong> द्वारा निर्धारित की जाती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The Speaker can be removed by a resolution passed by a <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"55\">simple majority</strong> of the members present and voting, provided a 14-day notice is given. (अध्यक्ष को उपस्थित और मतदान करने वाले सदस्यों के <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"191\">साधारण बहुमत</strong> से पारित प्रस्ताव द्वारा हटाया जा सकता है, बशर्ते 14 दिन का नोटिस दिया गया हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The Speaker does not vote in the first instance but possesses a <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"64\">Casting Vote</strong> in case of a tie; furthermore, the Speaker's decision on whether a bill is a <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"154\">Money Bill</strong> is final and cannot be questioned in court. (अध्यक्ष पहली बार में मतदान नहीं करता है लेकिन बराबरी की स्थिति में <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"277\">निर्णायक मत (Casting Vote)</strong> देता है; इसके अलावा, कोई विधेयक <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"336\">धन विधेयक</strong> है या नहीं, इस पर अध्यक्ष का निर्णय अंतिम होता है और अदालत में इस पर सवाल नहीं उठाया जा सकता।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Even after the dissolution of the Lok Sabha, the Speaker <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"57\">does not vacate</strong> his office immediately but continues until the first meeting of the new Lok Sabha. (लोकसभा भंग होने के बाद भी, अध्यक्ष तुरंत अपना पद <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"206\">खाली नहीं करता</strong> है, बल्कि नई लोकसभा की पहली बैठक तक बना रहता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">The Speaker's salaries and allowances are fixed by Parliament and are <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"70\">charged on the Consolidated Fund of India</strong>, meaning they are not subject to the annual vote of Parliament. (अध्यक्ष के वेतन और भत्ते संसद द्वारा निर्धारित किए जाते हैं और <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"240\">भारत की संचित निधि पर भारित</strong> होते हैं, जिसका अर्थ है कि उन पर संसद के वार्षिक मतदान की आवश्यकता नहीं होती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 3, and 5 only B) 1, 3, 4, and 5 only C) 2, 4, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<p><strong data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 2 is INCORRECT:</strong> The Speaker is removed by an <strong data-path-to-node=\"10,1,0\" data-index-in-node=\"55\">Effective Majority</strong> (a majority of all the <em data-path-to-node=\"10,1,0\" data-index-in-node=\"97\">then</em> members of the House), not a simple majority. Also, at least 50 members must support the move for it to be admitted. (कथन 2 गलत है: अध्यक्ष को <strong data-path-to-node=\"10,1,0\" data-index-in-node=\"245\">प्रभावी बहुमत</strong> द्वारा हटाया जाता है, न कि साधारण बहुमत द्वारा।)</p>\n<p></p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">\"Sure-Shot\" Exam Facts&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Feature (मुख्य विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Constitutional Detail (संवैधानिक विवरण)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Resignation</strong> (इस्तीफा)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\">To the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\" data-index-in-node=\"7\">Deputy Speaker</strong> (उपाध्यक्ष को)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">Quorum</strong> (कोरम)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\">Can adjourn House if less than <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\" data-index-in-node=\"31\">1/10th</strong> members are present.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">Joint Sitting</strong> (संयुक्त बैठक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">Presides over Joint Sittings under <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\" data-index-in-node=\"35\">Article 108</strong>.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Precedence</strong> (वरीयता क्रम)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">Ranked <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\" data-index-in-node=\"7\">7th</strong> (Equal to the Chief Justice of India).</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\" data-index-in-node=\"0\">Removal Status</strong> (हटाने की प्रक्रिया)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\">Cannot preside but can <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\" data-index-in-node=\"23\">speak and vote</strong> in the 1st instance.</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the Chairman and Deputy Chairman of the Rajya Sabha, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"109\">(राज्यसभा के सभापति और उपसभापति के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Chairman of the Rajya Sabha is not a member of the House, whereas the Deputy Chairman is elected from among the members of the Rajya Sabha. (राज्यसभा के सभापति सदन के सदस्य नहीं होते हैं, जबकि उपसभापति का चुनाव राज्यसभा के सदस्यों में से किया जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While a removal resolution for the Vice-President is under consideration, he cannot preside over the Rajya Sabha but retains the right to vote in the first instance. (जब उपराष्ट्रपति को हटाने का प्रस्ताव विचाराधीन होता है, तो वह राज्यसभा की अध्यक्षता नहीं कर सकते और उन्हें पहली बार में मतदान करने का अधिकार होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The Deputy Chairman submits his resignation to the President of India. (उपसभापति अपना इस्तीफा भारत के राष्ट्रपति को सौंपते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">If the offices of both Chairman and Deputy Chairman are <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"56\">vacant</strong>, the President appoints a member of the Rajya Sabha to preside. (यदि सभापति और उपसभापति दोनों के पद <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"163\">रिक्त</strong> हैं, तो राष्ट्रपति राज्यसभा के एक सदस्य को अध्यक्षता के लिए नियुक्त करते हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 4 only B) 1, 2, and 4 only C) 2 and 3 only D) All of the above</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 2 is <strong data-path-to-node=\"8,0\" data-index-in-node=\"22\">Incorrect</strong> because the Chairman has <strong data-path-to-node=\"8,0\" data-index-in-node=\"57\">no voting rights</strong> at all when his removal is being considered.</p>\n<p>Statement 3 is <strong data-path-to-node=\"8,0\" data-index-in-node=\"134\">Incorrect</strong> because the Deputy Chairman resigns to the <strong data-path-to-node=\"8,0\" data-index-in-node=\"187\">Chairman (Vice-President)</strong>. Note the difference between \"Vacancy\" (Art 91) and \"Absence\"&mdash;in vacancy, the President appoints; in absence, the Panel presides.</p>\n<p></p>\n<div class=\"pointer-events-none h-px w-px absolute bottom-0\" aria-hidden=\"true\" data-edge=\"true\"></div>\n<div class=\"flex flex-col text-sm pb-25\">\n<article class=\"text-token-text-primary w-full focus:outline-none [--shadow-height:45px] has-data-writing-block:pointer-events-none has-data-writing-block:-mt-(--shadow-height) has-data-writing-block:pt-(--shadow-height) [&amp;:has([data-writing-block])&gt;*]:pointer-events-auto scroll-mt-[calc(var(--header-height)+min(200px,max(70px,20svh)))]\" dir=\"auto\" tabindex=\"-1\" data-turn-id=\"request-WEB:3440c7e4-0eb5-4b4d-a9f7-8af34986c840-3\" data-testid=\"conversation-turn-8\" data-scroll-anchor=\"true\" data-turn=\"assistant\">\n<div class=\"text-base my-auto mx-auto pb-10 [--thread-content-margin:--spacing(4)] @w-sm/main:[--thread-content-margin:--spacing(6)] @w-lg/main:[--thread-content-margin:--spacing(16)] px-(--thread-content-margin)\">\n<div class=\"[--thread-content-max-width:40rem] @w-lg/main:[--thread-content-max-width:48rem] mx-auto max-w-(--thread-content-max-width) flex-1 group/turn-messages focus-visible:outline-hidden relative flex w-full min-w-0 flex-col agent-turn\">\n<div class=\"flex max-w-full flex-col grow\">\n<div class=\"min-h-8 text-message relative flex w-full flex-col items-end gap-2 text-start break-words whitespace-normal [.text-message+&amp;]:mt-1\" data-message-author-role=\"assistant\" data-message-id=\"c95295a7-e3b5-427d-9ef0-45302d3f72ba\" data-message-model-slug=\"gpt-5-2\">\n<div class=\"flex w-full flex-col gap-1 empty:hidden first:pt-[1px]\">\n<div class=\"markdown prose dark:prose-invert w-full break-words light markdown-new-styling\">\n<h1 data-start=\"42\" data-end=\"73\"><strong data-start=\"44\" data-end=\"71\">CHAIRMAN OF RAJYA SABHA</strong></h1>\n<h2 data-start=\"74\" data-end=\"143\"><strong data-start=\"77\" data-end=\"143\">(Articles 89&ndash;92) | PYQ-Focused |&nbsp; CHEAT SHEET</strong></h2>\n<hr data-start=\"145\" data-end=\"148\" />\n<h2 data-start=\"150\" data-end=\"191\">🔹 <strong data-start=\"156\" data-end=\"191\">PART A: ENGLISH (ULTRA-CONCISE)</strong></h2>\n<p data-start=\"193\" data-end=\"217\"><strong data-start=\"193\" data-end=\"215\">Position (Art. 89)</strong></p>\n<ul data-start=\"218\" data-end=\"326\">\n<li data-start=\"218\" data-end=\"288\">\n<p data-start=\"220\" data-end=\"288\">Vice-President of India is <strong data-start=\"247\" data-end=\"270\">ex-officio Chairman</strong> of Rajya Sabha.</p>\n</li>\n<li data-start=\"289\" data-end=\"326\">\n<p data-start=\"291\" data-end=\"326\">Not separately elected as Chairman.</p>\n</li>\n</ul>\n<p data-start=\"328\" data-end=\"342\"><strong data-start=\"328\" data-end=\"340\">Election</strong></p>\n<ul data-start=\"343\" data-end=\"395\">\n<li data-start=\"343\" data-end=\"395\">\n<p data-start=\"345\" data-end=\"395\">Elected as <strong data-start=\"356\" data-end=\"374\">Vice-President</strong>, not by Rajya Sabha.</p>\n</li>\n</ul>\n<p data-start=\"397\" data-end=\"424\"><strong data-start=\"397\" data-end=\"422\">Tenure (Arts. 67, 89)</strong></p>\n<ul data-start=\"425\" data-end=\"526\">\n<li data-start=\"425\" data-end=\"469\">\n<p data-start=\"427\" data-end=\"469\">Co-terminous with Vice-President&rsquo;s term.</p>\n</li>\n<li data-start=\"470\" data-end=\"526\">\n<p data-start=\"472\" data-end=\"526\">Vacates only if VP vacates/removal. <em data-start=\"508\" data-end=\"526\">(UPSC 2012/2018)</em></p>\n</li>\n</ul>\n<p data-start=\"528\" data-end=\"551\"><strong data-start=\"528\" data-end=\"549\">Removal (Art. 90)</strong></p>\n<ul data-start=\"552\" data-end=\"677\">\n<li data-start=\"552\" data-end=\"590\">\n<p data-start=\"554\" data-end=\"590\">Only by removal of Vice-President.</p>\n</li>\n<li data-start=\"591\" data-end=\"677\">\n<p data-start=\"593\" data-end=\"677\">During removal motion: cannot preside; sits as member; <strong data-start=\"648\" data-end=\"676\">no voting (even casting)</strong>.</p>\n</li>\n</ul>\n<p data-start=\"679\" data-end=\"698\"><strong data-start=\"679\" data-end=\"696\">Voting Rights</strong></p>\n<ul data-start=\"699\" data-end=\"740\">\n<li data-start=\"699\" data-end=\"740\">\n<p data-start=\"701\" data-end=\"740\">No first vote; <strong data-start=\"716\" data-end=\"739\">casting vote in tie</strong>.</p>\n</li>\n</ul>\n<p data-start=\"742\" data-end=\"763\"><strong data-start=\"742\" data-end=\"761\">Powers &amp; Duties</strong></p>\n<ul data-start=\"764\" data-end=\"828\">\n<li data-start=\"764\" data-end=\"828\">\n<p data-start=\"766\" data-end=\"828\">Presides over RS; maintains order; ensures smooth functioning.</p>\n</li>\n</ul>\n<p data-start=\"830\" data-end=\"852\"><strong data-start=\"830\" data-end=\"850\">Exclusive Limits</strong></p>\n<ul data-start=\"853\" data-end=\"1014\">\n<li data-start=\"853\" data-end=\"906\">\n<p data-start=\"855\" data-end=\"906\">❌ Cannot decide <strong data-start=\"871\" data-end=\"885\">Money Bill</strong> (Speaker decides).</p>\n</li>\n<li data-start=\"907\" data-end=\"968\">\n<p data-start=\"909\" data-end=\"968\">❌ Does not preside over <strong data-start=\"933\" data-end=\"950\">Joint Sitting</strong> (Speaker does).</p>\n</li>\n<li data-start=\"969\" data-end=\"1014\">\n<p data-start=\"971\" data-end=\"1014\">✅ Link between <strong data-start=\"986\" data-end=\"1013\">Rajya Sabha &amp; President</strong>.</p>\n</li>\n</ul>\n<p data-start=\"1016\" data-end=\"1034\"><strong data-start=\"1016\" data-end=\"1032\">Independence</strong></p>\n<ul data-start=\"1035\" data-end=\"1132\">\n<li data-start=\"1035\" data-end=\"1086\">\n<p data-start=\"1037\" data-end=\"1086\">Salary fixed by Parliament; charged on <strong data-start=\"1076\" data-end=\"1083\">CFI</strong>.</p>\n</li>\n<li data-start=\"1087\" data-end=\"1132\">\n<p data-start=\"1089\" data-end=\"1132\">Expected <strong data-start=\"1098\" data-end=\"1111\">non-party</strong>, British convention.</p>\n</li>\n</ul>\n<p data-start=\"1134\" data-end=\"1147\"><strong data-start=\"1134\" data-end=\"1145\">Ranking</strong></p>\n<ul data-start=\"1148\" data-end=\"1195\">\n<li data-start=\"1148\" data-end=\"1195\">\n<p data-start=\"1150\" data-end=\"1195\">No separate rank; rank as <strong data-start=\"1176\" data-end=\"1194\">Vice-President</strong>.</p>\n</li>\n</ul>\n<p data-start=\"1197\" data-end=\"1219\"><strong data-start=\"1197\" data-end=\"1217\">Legislative Role</strong></p>\n<ul data-start=\"1220\" data-end=\"1270\">\n<li data-start=\"1220\" data-end=\"1270\">\n<p data-start=\"1222\" data-end=\"1270\">Supervisory/procedural role in Rajya Sabha only.</p>\n</li>\n</ul>\n<h2 data-start=\"1277\" data-end=\"1316\"><strong style=\"font-size: 16px;\" data-start=\"1318\" data-end=\"1334\">पद (अनु. 89)</strong></h2>\n<ul data-start=\"1337\" data-end=\"1425\">\n<li data-start=\"1337\" data-end=\"1394\">\n<p data-start=\"1339\" data-end=\"1394\">भारत का <strong data-start=\"1347\" data-end=\"1363\">उपराष्ट्रपति</strong> राज्यसभा का <strong data-start=\"1376\" data-end=\"1391\">पदेन सभापति</strong>।</p>\n</li>\n<li data-start=\"1395\" data-end=\"1425\">\n<p data-start=\"1397\" data-end=\"1425\">अलग से सभापति का चुनाव नहीं।</p>\n</li>\n</ul>\n<p data-start=\"1427\" data-end=\"1438\"><strong data-start=\"1427\" data-end=\"1436\">चुनाव</strong></p>\n<ul data-start=\"1439\" data-end=\"1480\">\n<li data-start=\"1439\" data-end=\"1480\">\n<p data-start=\"1441\" data-end=\"1480\">उपराष्ट्रपति चुने जाने पर स्वतः सभापति।</p>\n</li>\n</ul>\n<p data-start=\"1482\" data-end=\"1510\"><strong data-start=\"1482\" data-end=\"1508\">कार्यकाल (अनु. 67, 89)</strong></p>\n<ul data-start=\"1511\" data-end=\"1590\">\n<li data-start=\"1511\" data-end=\"1548\">\n<p data-start=\"1513\" data-end=\"1548\">उपराष्ट्रपति के कार्यकाल के समान।</p>\n</li>\n<li data-start=\"1549\" data-end=\"1590\">\n<p data-start=\"1551\" data-end=\"1590\">हटेगा तभी जब VP हटे/कार्यकाल समाप्त हो।</p>\n</li>\n</ul>\n<p data-start=\"1592\" data-end=\"1613\"><strong data-start=\"1592\" data-end=\"1611\">हटाना (अनु. 90)</strong></p>\n<ul data-start=\"1614\" data-end=\"1715\">\n<li data-start=\"1614\" data-end=\"1645\">\n<p data-start=\"1616\" data-end=\"1645\">केवल उपराष्ट्रपति को हटाकर।</p>\n</li>\n<li data-start=\"1646\" data-end=\"1715\">\n<p data-start=\"1648\" data-end=\"1715\">प्रस्ताव के समय: पीठासीन नहीं; सदस्य की तरह बैठेगा; <strong data-start=\"1700\" data-end=\"1714\">मतदान नहीं</strong>।</p>\n</li>\n</ul>\n<p data-start=\"1717\" data-end=\"1735\"><strong data-start=\"1717\" data-end=\"1733\">मतदान अधिकार</strong></p>\n<ul data-start=\"1736\" data-end=\"1783\">\n<li data-start=\"1736\" data-end=\"1783\">\n<p data-start=\"1738\" data-end=\"1783\">प्रारंभिक मत नहीं; बराबरी पर <strong data-start=\"1767\" data-end=\"1782\">निर्णायक मत</strong>।</p>\n</li>\n</ul>\n<p data-start=\"1785\" data-end=\"1807\"><strong data-start=\"1785\" data-end=\"1805\">शक्तियाँ/कर्तव्य</strong></p>\n<ul data-start=\"1808\" data-end=\"1848\">\n<li data-start=\"1808\" data-end=\"1848\">\n<p data-start=\"1810\" data-end=\"1848\">राज्यसभा की कार्यवाही संचालन, अनुशासन।</p>\n</li>\n</ul>\n<p data-start=\"1850\" data-end=\"1868\"><strong data-start=\"1850\" data-end=\"1866\">विशेष सीमाएँ</strong></p>\n<ul data-start=\"1869\" data-end=\"1964\">\n<li data-start=\"1869\" data-end=\"1896\">\n<p data-start=\"1871\" data-end=\"1896\">❌ मनी बिल तय नहीं करता।</p>\n</li>\n<li data-start=\"1897\" data-end=\"1934\">\n<p data-start=\"1899\" data-end=\"1934\">❌ संयुक्त बैठक की अध्यक्षता नहीं।</p>\n</li>\n<li data-start=\"1935\" data-end=\"1964\">\n<p data-start=\"1937\" data-end=\"1964\">✅ राष्ट्रपति&ndash;राज्यसभा सेतु।</p>\n</li>\n</ul>\n<p data-start=\"1966\" data-end=\"1982\"><strong data-start=\"1966\" data-end=\"1980\">स्वतंत्रता</strong></p>\n<ul data-start=\"1983\" data-end=\"2052\">\n<li data-start=\"1983\" data-end=\"2023\">\n<p data-start=\"1985\" data-end=\"2023\">वेतन संसद तय; <strong data-start=\"1999\" data-end=\"2013\">संचित निधि</strong> से देय।</p>\n</li>\n<li data-start=\"2024\" data-end=\"2052\">\n<p data-start=\"2026\" data-end=\"2052\">दल-निरपेक्ष आचरण अपेक्षित।</p>\n</li>\n</ul>\n<p data-start=\"2054\" data-end=\"2066\"><strong data-start=\"2054\" data-end=\"2064\">वरीयता</strong></p>\n<ul data-start=\"2067\" data-end=\"2097\">\n<li data-start=\"2067\" data-end=\"2097\">\n<p data-start=\"2069\" data-end=\"2097\">अलग रैंक नहीं; VP के अनुसार।</p>\n</li>\n</ul>\n<p data-start=\"2099\" data-end=\"2118\"><strong data-start=\"2099\" data-end=\"2116\">विधायी भूमिका</strong></p>\n<ul data-start=\"2119\" data-end=\"2160\">\n<li data-start=\"2119\" data-end=\"2160\">\n<p data-start=\"2121\" data-end=\"2160\">केवल राज्यसभा में प्रक्रियात्मक भूमिका।</p>\n</li>\n</ul>\n<hr data-start=\"2162\" data-end=\"2165\" />\n<h3 data-start=\"2167\" data-end=\"2197\">🔥 <strong data-start=\"2174\" data-end=\"2197\">ONE-LOOK EXAM TRAPS</strong></h3>\n<ul data-start=\"2198\" data-end=\"2347\" data-is-last-node=\"\" data-is-only-node=\"\">\n<li data-start=\"2198\" data-end=\"2244\">\n<p data-start=\"2200\" data-end=\"2244\">Chairman = <strong data-start=\"2211\" data-end=\"2242\">Vice-President (ex-officio)</strong></p>\n</li>\n<li data-start=\"2245\" data-end=\"2278\">\n<p data-start=\"2247\" data-end=\"2278\">First vote ❌ | Casting vote ✅</p>\n</li>\n<li data-start=\"2279\" data-end=\"2313\">\n<p data-start=\"2281\" data-end=\"2313\">Money Bill ❌ | Joint Sitting ❌</p>\n</li>\n<li data-start=\"2314\" data-end=\"2347\" data-is-last-node=\"\">\n<p data-start=\"2316\" data-end=\"2347\" data-is-last-node=\"\">Removal only via <strong data-start=\"2333\" data-end=\"2347\" data-is-last-node=\"\">VP removal</strong></p>\n</li>\n</ul>\n</div>\n</div>\n</div>\n</div>\n<div class=\"z-0 flex min-h-[46px] justify-start\"></div>\n<div class=\"mt-3 w-full empty:hidden\">\n<div class=\"text-center\"></div>\n</div>\n</div>\n</div>\n</article>\n</div>",
    "marks": 2.0,
    "section": "ADVANCE POLITY 360"

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Q. Evaluate the following statements regarding Parliamentary leaders and the Speaker's position:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"97\">(संसदीय नेताओं और अध्यक्ष की स्थिति के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">The British Speaker must resign from their political party upon election, whereas the Indian Speaker traditionally retains party membership. (ब्रिटिश अध्यक्ष को चुनाव के बाद अपने राजनीतिक दल से इस्तीफा देना पड़ता है, जबकि भारतीय अध्यक्ष पारंपरिक रूप से पार्टी की सदस्यता बनाए रखते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"4\">Leader of the Opposition (LoP)</strong> is a constitutional post and was first recognized in the Constitution in 1969. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"116\">विपक्ष के नेता (LoP)</strong> का पद एक संवैधानिक पद है और इसे पहली बार 1969 में संविधान में मान्यता दी गई थी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">To be recognized as the Leader of the Opposition in the Lok Sabha, a party must secure at least <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"96\">10%</strong> of the total strength (55 seats). (लोकसभा में विपक्ष के नेता के रूप में मान्यता प्राप्त करने के लिए, एक दल को कुल संख्या का कम से कम <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"233\">10%</strong> (55 सीटें) प्राप्त करना अनिवार्य है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The office of the <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"18\">Whip</strong> is not mentioned in the Constitution of India but is based on parliamentary conventions. ( <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"114\">सचेतक (Whip)</strong> के कार्यालय का उल्लेख भारत के संविधान में नहीं है, बल्कि यह संसदीय परंपराओं पर आधारित है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 3, and 4 only B) 1 and 2 only C) 2, 3, and 4 only D) All of the above</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 2 is <strong data-path-to-node=\"16,0\" data-index-in-node=\"22\">Incorrect</strong>. The LoP is a <strong data-path-to-node=\"16,0\" data-index-in-node=\"46\">Statutory Post</strong> (legal), not a Constitutional one. It received statutory recognition in 1977.</p>",
    "marks": 2.0,
    "section": "ADVANCE POLITY 360"
  },

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the sessions of Parliament and the status of bills upon dissolution of the Lok Sabha, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"142\">(संसद के सत्रों और लोकसभा के विघटन पर विधेयकों की स्थिति के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The gap between two sessions of Parliament cannot exceed six months, and the Constitution mandates a minimum of 60 sittings per year. (संसद के दो सत्रों के बीच का अंतर छह महीने से अधिक नहीं हो सकता है, और संविधान प्रति वर्ष न्यूनतम 60 बैठकों का आदेश देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"6\">Adjournment</strong> terminates a sitting, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"40\">Prorogation</strong> terminates both a sitting and the session; however, neither affects the pending bills of the House. (जहाँ <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"158\">स्थगन (Adjournment)</strong> एक बैठक को समाप्त करता है, वहीं <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"210\">सत्रावसान (Prorogation)</strong> बैठक और सत्र दोनों को समाप्त करता है; हालाँकि, दोनों में से कोई भी सदन के लंबित विधेयकों को प्रभावित नहीं करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">A bill pending in the Rajya Sabha which has <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"44\">not</strong> been passed by the Lok Sabha does not lapse on the dissolution of the Lok Sabha. (राज्यसभा में लंबित विधेयक जिसे लोकसभा द्वारा पारित <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"181\">नहीं</strong> किया गया है, लोकसभा के विघटन पर व्यपगत (Lapse) नहीं होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">A bill passed by both Houses but returned by the President for reconsideration lapses upon the dissolution of the Lok Sabha. (दोनों सदनों द्वारा पारित लेकिन राष्ट्रपति द्वारा पुनर्विचार के लिए लौटाया गया विधेयक लोकसभा के विघटन पर व्यपगत हो जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Quorum</strong> is the minimum 1/10th strength required to conduct business; in its absence, the Presiding Officer must adjourn the House. ( <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"132\">गणपूर्ति (Quorum)</strong> कार्य संचालन के लिए आवश्यक न्यूनतम 1/10 सदस्य संख्या है; इसकी अनुपस्थिति में, पीठासीन अधिकारी को सदन स्थगित करना चाहिए।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 3 only B) 2, 3, and 5 only C) 1, 3, and 4 only D) All of the above</p>",

e=\"4,4,0,0\" data-index-in-node=\"0\">D) Guillotine Closure</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,1,0\">4. Targeted against the entire Council of Ministers; if passed, Govt must resign. (संपूर्ण मंत्रिपरिषद के विरुद्ध; पारित होने पर सरकार को इस्तीफा देना होगा।)</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Choose the correct code: / सही कूट का चयन करें:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">A) A-2, B-1, C-4, D-3</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">B) A-1, B-2, C-4, D-3</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">C) A-2, B-4, C-1, D-3</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">D) A-3, B-1, C-4, D-2</p>",
