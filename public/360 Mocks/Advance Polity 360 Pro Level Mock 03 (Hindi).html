\" data-path-to-node=\"4,4,2,0\" data-index-in-node=\"0\">1/3rd</strong> of Assembly Strength</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,0,0\" data-index-in-node=\"0\">Min Strength</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,1,0\" data-index-in-node=\"0\">60</strong> (Exceptions: Sikkim-32, Goa-40)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,0\" data-index-in-node=\"0\">40</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,0,0\" data-index-in-node=\"0\">Election Type</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,1,0\" data-index-in-node=\"0\">Direct</strong> (प्रत्यक्ष चुनाव)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,2,0\" data-index-in-node=\"0\">Indirect</strong> (अप्रत्यक्ष चुनाव)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,7,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,7,0,0\" data-index-in-node=\"0\">Presiding Officer</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,7,1,0\">Speaker (अध्यक्ष)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,7,2,0\">Chairperson (सभापति)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,8,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,8,0,0\" data-index-in-node=\"0\">Money Bills</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,8,1,0\">Can initiate &amp; pass.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,8,2,0\">14-day delay power only.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,9,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,9,0,0\" data-index-in-node=\"0\">No-Confidence</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,9,1,0\">Can remove the Government.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,9,2,0\">No power to remove Government.</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" />\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"0\">&nbsp;Key Procedures &amp; Powers (मुख्य प्रक्रियाएं और शक्तियां)</strong></h2>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\" data-index-in-node=\"0\">1. Legislative Powers (विधायी शक्तियां)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"8,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0,0\" data-index-in-node=\"0\">Ordinary Bill (साधारण विधेयक):</strong> If there is a disagreement, the Assembly prevails. The Council can delay it for a total of <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0,0\" data-index-in-node=\"122\">4 months</strong> (3 + 1).</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"8,0,1,0,0\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0,1,0,0\" data-index-in-node=\"0\">Note: There is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0,1,0,0\" data-index-in-node=\"15\">NO Joint Sitting</strong> (संयुक्त बैठक) in the State Legislature.</em></p>\n</li>\n</ul>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"8,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,0\" data-index-in-node=\"0\">Money Bill (धन विधेयक):</strong> Introduced only in the Assembly with the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,0\" data-index-in-node=\"65\">Governor's prior recommendation</strong>. The Council must return it in <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,0\" data-index-in-node=\"128\">14 days</strong>.</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"8,1,1,0,0\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,1,0,0\" data-index-in-node=\"0\">Note: The Governor <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,1,0,0\" data-index-in-node=\"19\">cannot</strong> return a Money Bill for reconsideration.</em></p>\n</li>\n</ul>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">2. Privileges (विशेषाधिकार)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Collective (सामूहिक):</strong> Courts cannot inquire into the proceedings of the House.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Individual (व्यक्तिगत):</strong> Freedom of speech in the House. No arrest in <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0\" data-index-in-node=\"69\">Civil Cases</strong> (सिविल मामले) during the session and 40 days before/after.</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,1,0,0\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,0,0\" data-index-in-node=\"0\">Note: No immunity in <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,0,0\" data-index-in-node=\"21\">Criminal Cases</strong> (आपराधिक मामले).</em></p>\n</li>\n</ul>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" />\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">🚀 Error-Free \"Cheat\" Points (UPSC/SSC Traps)</strong></h2>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Abolition (अनुच्छेद 169):</strong> Parliament can abolish the Council if the Assembly passes a resolution by <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"100\">Special Majority</strong>. This law is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"130\">NOT</strong> a Constitutional Amendment under Art. 368.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Council Nominations:</strong> The Governor nominates <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"44\">1/6th</strong> of the members. Unlike the President, the Governor includes <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"110\">\"Cooperative Movement\"</strong> (सहकारी आंदोलन) as a criteria.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Lapsing of Bills:</strong> If a bill is pending in the Council but was <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"62\">NOT</strong> passed by the Assembly, it <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"93\">does not lapse</strong> (समाप्त नहीं होता) when the Assembly dissolves.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">104th CAA (2019):</strong> Nomination of <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"32\">Anglo-Indians</strong> to the State Assembly has been <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"77\">removed</strong>.</p>\n</li>\n</ol>\n</li>\n</ul>",
