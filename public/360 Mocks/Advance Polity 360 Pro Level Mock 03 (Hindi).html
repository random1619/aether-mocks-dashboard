!important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,2,0\">व्यापारिक एकाधिकार समाप्त (चाय और चीन को छोड़कर)। शिक्षा के लिए 1 लाख।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,0,0\" data-index-in-node=\"0\">Charter Act, 1833</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,1,0\">GG of Bengal <span class=\"math-inline\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-math=\"\\rightarrow\" data-index-in-node=\"13\">$\\rightarrow$</span> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,1,0\" data-index-in-node=\"25\">GG of India</strong> (Lord William Bentinck). Ended <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,1,0\" data-index-in-node=\"68\">all</strong> trade monopolies.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,2,0\">बंगाल का गवर्नर-जनरल <span class=\"math-inline\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-math=\"\\rightarrow\" data-index-in-node=\"21\">$\\rightarrow$</span> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,2,0\" data-index-in-node=\"33\">भारत का गवर्नर-जनरल</strong>। पूर्ण व्यापारिक एकाधिकार समाप्त।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,0,0\" data-index-in-node=\"0\">Charter Act, 1853</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,1,0\">Separated Legislative &amp; Executive functions. Created <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,1,0\" data-index-in-node=\"53\">Mini-Parliament</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,2,0\">विधायी और कार्यकारी कार्यों का पृथक्करण। <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,2,0\" data-index-in-node=\"41\">लघु-संसद</strong> का निर्माण।</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" data-index-in-node=\"0\">3. Key Institutional Milestones&nbsp;</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px ! nt; margin-top: 0px !important;\"> Warren Hastings (1773).<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\"><sup class=\"superscript\" style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 16px !important; background-color: transparent !important;\" data-turn-source-index=\"3\">3</sup></source-footnote></span><sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" aria-label=\"View source details for citation from Online Collection | National Army Museum, London - National Army Museum. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjojZKk-NORAxUAAAAAHQAAAAAQrgQ\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\"></mat-icon></button></div>\n<p></p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"14,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-h     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the constitutional developments under the British Crown between 1858 and 1909, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"135\">(1858 और 1909 के बीच ब्रिटिश क्राउन के तहत संवैधानिक विकास के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">Government of India Act, 1858</strong> abolished the \"Double Government\" (Board of Control and Court of Directors) and created the office of the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"140\">Secretary of State for India</strong> with a 15-member advisory council. (1858 के भारत सरकार अधिनियम ने \"दोहरी सरकार\" को समाप्त कर दिया और 15-सदस्यीय सलाहकार परिषद के साथ <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"302\">भारत के राज्य सचिव</strong> का पद बनाया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">Indian Councils Act, 1861</strong> restored legislative powers to the Bombay and Madras Presidencies and introduced the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"115\">Portfolio System</strong>. (1861 के भारतीय परिषद अधिनियम ने बॉम्बे और मद्रास प्रेसीडेंसी को विधायी शक्तियां वापस दीं और <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"226\">पोर्टफोलियो प्रणाली</strong> की शुरुआत की।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Under the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"10\">Indian Councils Act, 1892</strong>, the official majority was removed in both central and provincial councils, and direct elections were introduced for the first time. (1892 के भारतीय परिषद अधिनियम के तहत, केंद्रीय और प्रांतीय दोनों परिषदों में आधिकारिक बहुमत को हटा दिया गया था, और पहली बार प्रत्यक्ष चुनाव शुरू किए गए थे।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">Morley-Minto Reforms (1909)</strong> legalized communalism by introducing separate electorates for Muslims and appointed <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"116\">Satyendra Prasad Sinha</strong> as the first Indian member of the Viceroy&rsquo;s Executive Council. ( <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"204\">मार्ले-मिंटो सुधार (1909)</strong> ने मुसलमानों के लिए अलग निर्वाचक मंडल शुरू करके सांप्रदायिकता को वैध बना दिया और <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"311\">सत्येंद्र प्रसाद सिन्हा</strong> को वायसराय की कार्यकारी परिषद के पहले भारतीय सदस्य के रूप में नियुक्त किया।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 3 only B) 1, 2, and 4 only C) 2, 3, and 4 only D) All of the above</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 2,
    "solution": "<ul>\n<li>\n<p data-path-to-node=\"8,1,0,0\"><strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"0\">Statement 3 is Incorrect:</strong> While the 1892 Act increased non-official members, the <strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"81\">official majority was maintained</strong> in the Central Legislative Council. Furthermore, the elections introduced were <strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"193\">indirect</strong>, not direct.</p>\n</li>\n<li>\n<p data-path-to-node=\"8,1,1,0\">Statements 1, 2, and 4 are historically accurate facts regarding the 1858, 1861, and 1909 Acts.</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Regarding the major constitutional milestones from 1919 to 1947, identify the CORRECT sequence and details:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"111\">(1919 से 1947 तक के प्रमुख संवैधानिक मील के पत्थर के संबंध में, सही अनुक्रम और विवरण की पहचान करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">The <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"4\">Government of India Act, 1919</strong> introduced <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"45\">Dyarchy in provinces</strong>, dividing subjects into \"Reserved\" and \"Transferred,\" and established a bicameral legislature at the center. (1919 के भारत सरकार अधिनियम ने <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"206\">प्रांतों में द्वैध शासन (Dyarchy)</strong> की शुरुआत की, विषयों को \"आरक्षित\" और \"हस्तांतरित\" में विभाजित किया, और केंद्र में एक द्विसदनीय विधायिका की स्थापना की।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"4\">Simon Commission (1927)</strong> recommended the abolition of Dyarchy and the extension of responsible government in the provinces, which was later reflected in the 1935 Act. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"172\">साइमन कमीशन (1927)</strong> ने प्रांतों में द्वैध शासन को समाप्त करने और जिम्मेदार सरकार के विस्तार की सिफारिश की, जो बाद में 1935 के अधिनियम में परिलक्षित हुई।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">The <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"4\">Government of India Act, 1935</strong> established an All-India Federation and divided powers into three lists, where the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"117\">Residuary powers</strong> were given to the Federal Legislature. (1935 के भारत सरकार अधिनियम ने एक अखिल भारतीय संघ की स्थापना की और शक्तियों को तीन सूचियों में विभाजित किया, जहाँ <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"287\">अवशिष्ट शक्तियाँ</strong> संघीय विधायिका को दी गई थीं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"4\">Poona Pact (1932)</strong> resulted in the abandonment of separate electorates for the depressed classes in favor of reserved seats within the joint Hindu electorate. ( <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"164\">पुणे पैक्ट (1932)</strong> के परिणामस्वरूप संयुक्त हिंदू निर्वाचक मंडल के भीतर आरक्षित सीटों के पक्ष में दलित वर्गों के लिए अलग निर्वाचक मंडल को छोड़ दिया गया।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 1, 3, and 4 only C) 2, 3, and 4 only D) All of the above</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],

    "solution": "<p data-path-to-node=\"16,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\" data-index-in-node=\"0\">Statement 3 is Incorrect:</strong> Under the Government of India Act, 1935, the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\" data-index-in-node=\"71\">Residuary powers</strong> were assigned to the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\" data-index-in-node=\"109\">Viceroy</strong>, not the Federal Legislature. (Note: In modern India, they belong to the Parliament).</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,1,0\" style=\"line-height: 1.15 !important;\">Statements 1, 2, and 4 are high-frequency PYQ facts. The 1935 Act also provided for the establishment of the RBI and the Federal Court.</p>\n</li>\n</ul>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Act of 1919</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Act of 1935</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,0,0\" data-index-in-node=\"0\">System</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,1,0\">Dyarchy in Provinces</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,2,0\">Provincial Autonomy; Dyarchy at Centre</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,0,0\" data-index-in-node=\"0\">Lists</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,1,0\">2 Lists (Central &amp; Provincial)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,2,0\">3 Lists (Federal-59, Provincial-54, Concurrent-36)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,0,0\" data-index-in-node=\"0\">Franchise</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,1,0\">Limited (Based on Property/Tax)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,2,0\">Extended to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,2,0\" data-index-in-node=\"12\">14%</strong> of the population</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\" data-index-in-node=\"0\">Institutions</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,1,0\">Central PSC (1926)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,2,0\">RBI (1935), Federal Court (1937), Federal PSC</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,0,0\" data-index-in-node=\"0\">Minorities</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,1,0\">Extended to Sikhs, Christians, etc.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,2,0\">Extended to Depressed Classes, Women, Labour</span></td>\n</tr>\n</tbody>\n</table>\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">Crown Rule Cheat Sheet (1858&ndash;1947)</strong></h2>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">क्राउन शासन: मुख्य तथ्य</strong></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" data-index-in-node=\"0\">1. The Transitional Phase (1858 - 1892)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Act (अधिनियम)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">The \"Crux\" (English)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">मुख्य बिंदु (Hindi)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\" data-index-in-node=\"0\">Govt. of India Act, 1858</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\">Ended <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\" data-index-in-node=\"6\">Double Govt</strong> (Board of Control/Court of Directors). Created <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\" data-index-in-node=\"65\">Secretary of State</strong> (SOS).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,2,0\">\"दोहरी सरकार\" समाप्त। <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,2,0\" data-index-in-node=\"22\">भारत के राज्य सचिव</strong> का सृजन।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\" data-index-in-node=\"0\">Indian Councils Act, 1861</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\">Introduced <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\" data-index-in-node=\"11\">Portfolio System</strong>. Restored legislative powers to Madras/Bombay (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\" data-index-in-node=\"75\">Decentralization</strong>).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,2,0\" data-index-in-node=\"0\">पोर्टफोलियो प्रणाली</strong>। विधायी शक्तियों का विकेंद्रीकरण।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\" data-index-in-node=\"0\">Indian Councils Act, 1892</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\">Introduced <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\" data-index-in-node=\"11\">Indirect Elections</strong>. Councils could discuss <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\" data-index-in-node=\"54\">Budget</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,2,0\" data-index-in-node=\"0\">अप्रत्यक्ष चुनाव</strong> की शुरुआत। परिषद को बजट पर चर्चा की अनुमति।</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\" data-index-in-node=\"0\">2. The Reform Era (1909 - 1919)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Morley-Minto (1909)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Montagu-Chelmsford (1919)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,0,0\" data-index-in-node=\"0\">Main Objective</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,1,0\">Legalize Communalism.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,1,2,0\">Responsible Government.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,0,0\" data-index-in-node=\"0\">System</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,1,0\" data-index-in-node=\"0\">Separate Electorate</strong> for Muslims.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,2,2,0\" data-index-in-node=\"0\">Dyarchy</strong> (द्वैध शासन) in Provinces.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,0,0\" data-index-in-node=\"0\">Legislature</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,1,0\">Size increased; non-official majority in provinces.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,2,0\" data-index-in-node=\"0\">Bicameralism</strong> (द्विसदनीयता) at Centre.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,0,0\" data-index-in-node=\"0\">Indian Rep.</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,1,0\" data-index-in-node=\"0\">S.P. Sinha</strong> (1st Indian in Executive Council).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,2,0\">3 Indians in Viceroy's Executive Council.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,5,0,0\" data-index-in-node=\"0\">Expansion</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,5,1,0\">Lord Minto: \"Father of Communal Electorate.\"</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,5,2,0\">Separate electorates for Sikhs, Christians, etc.</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" data-index-in-node=\"0\">3. The Blueprint for Modern India (1935 - 1947)</strong></h3>\n<h4 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">Government of India Act, 1935</strong></h4>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,0,0\" data-index-in-node=\"0\">Structure:</strong> 321 Sections, 10 Schedules.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"0\">Federalism:</strong> Proposed All-India Federation (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"43\">Never joined by Princely States</strong>).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"0\">Lists:</strong> Federal (59), Provincial (54), Concurrent (36). <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"55\">Residuary Powers with Viceroy.</strong></p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"0\">Provincial Autonomy:</strong> Dyarchy abolished in provinces, introduced at the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"71\">Centre</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0\" data-index-in-node=\"0\">Institutions:</strong> Established <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0\" data-index-in-node=\"26\">RBI</strong> (1935), <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0\" data-index-in-node=\"38\">Federal Court</strong> (1937), and Federal/Provincial PSCs.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,5,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0\" data-index-in-node=\"0\">Franchise:</strong> Voting rights given to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0\" data-index-in-node=\"34\">14%</strong> of the population.</p>\n</li>\n</ul>\n<h4 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" data-index-in-node=\"0\">Indian Independence Act, 1947</strong></h4>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"14,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">Dominion Status:</strong> Created India and Pakistan (Aug 15, 1947).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"14,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">Abolition:</strong> Office of Viceroy and Secretary of State abolished.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"14,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">Sovereignty:</strong> Constituent Assemblies became sovereign bodies with power to repeal British laws.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\" data-index-in-node=\"0\">4. Key Constitutional Milestones (विशेष तथ्य)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"17,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0,0\" data-index-in-node=\"0\">Simon Commission (1927):</strong> 7-member <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0,0\" data-index-in-node=\"34\">all-white</strong> commission. Recommended abolition of Dyarchy.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"17,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,1,0\" data-index-in-node=\"0\">Communal Award (1932):</strong> Ramsay MacDonald offered separate electorates for <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,1,0\" data-index-in-node=\"73\">Depressed Classes</strong> (Scheduled Castes).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"17,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,2,0\" data-index-in-node=\"0\">Poona Pact (1932):</strong> Agreement between <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,2,0\" data-index-in-node=\"37\">Gandhi &amp; Ambedkar</strong>. Replaced separate electorates with <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,2,0\" data-index-in-node=\"91\">Reserved Seats</strong> in the Joint Hindu Electorate.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\" data-index-in-node=\"0\">🚀 Quick Revision \"Trap\" Points (PYQ focus)</strong></h3>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"20\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,0,0\" data-index-in-node=\"0\">Dyarchy (Provinces):</strong> 1919 Act | <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,0,0\" data-index-in-node=\"32\">Dyarchy (Centre):</strong> 1935 Act.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0\" data-index-in-node=\"0\">Bicameralism (Centre):</strong> 1919 Act | <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0\" data-index-in-node=\"34\">Bicameralism (Provinces):</strong> 1935 Act (in 6 provinces).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,2,0\" data-index-in-node=\"0\">Portfolio System:</strong> 1861 Act (Lord Canning).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,3,0\" data-index-in-node=\"0\">Decentralization:</strong> Started with 1861 Act (reversing the 1833 trend).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,0\" data-index-in-node=\"0\">Direct Elections:</strong> First introduced in 1919.</p>\n</li>\n</ol>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the Constituent Assembly of India, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"91\">(भारत की संविधान सभा के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Assembly was constituted in November 1946 under the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"56\">Cabinet Mission Plan</strong>, with members being partly elected by provincial assemblies and partly nominated by heads of princely states. (सभा का गठन नवंबर 1946 में <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"214\">कैबिनेट मिशन योजना</strong> के तहत किया गया था, जिसमें सदस्य आंशिक रूप से प्रांतीय विधानसभाओं द्वारा चुने गए थे और आंशिक रूप से रियासतों के प्रमुखों द्वारा नामित किए गए थे।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Dr. Sachchidananda Sinha</strong> was elected as the permanent President of the Assembly, while H.C. Mukherjee and V.T. Krishnamachari served as Vice-Presidents. ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"155\">डॉ. सच्चिदानंद सिन्हा</strong> को सभा के स्थायी अध्यक्ष के रूप में चुना गया था, जबकि एच.सी. मुखर्जी और वी.टी. कृष्णमाचारी ने उपाध्यक्ष के रूप में कार्य किया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">After the Independence Act of 1947, the Assembly became a sovereign body performing dual functions: as a constituent body chaired by <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"133\">Dr. Rajendra Prasad</strong> and as a legislative body chaired by <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"190\">G.V. Mavalankar</strong>. (1947 के स्वतंत्रता अधिनियम के बाद, सभा एक संप्रभु निकाय बन गई जो दोहरे कार्य करती थी: <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"294\">डॉ. राजेंद्र प्रसाद</strong> की अध्यक्षता में एक संवैधानिक निकाय के रूप में और <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"364\">जी.वी. मावलंकर</strong> की अध्यक्षता में एक विधायी निकाय के रूप में।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">Drafting Committee</strong>, headed by Dr. B.R. Ambedkar, included members like K.M. Munshi and Alladi Krishnaswamy Ayyar, completing the final draft in less than six months. (डॉ. बी.आर. अंबेडकर की अध्यक्षता वाली <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"208\">प्रारूप समिति</strong> में के.एम. मुंशी और अल्लादी कृष्णास्वामी अय्यर जैसे सदस्य शामिल थे, जिन्होंने छह महीने से भी कम समय में अंतिम प्रारूप पूरा किया।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 1, 3, and 4 only C) 2, 3, and 4 only D) All of the above</p>",

    "question": "<p data-path-to-node=\"15\"><strong data-path-to-node=\"15\" data-index-in-node=\"0\">Which of the following features accurately describe the \"Sovereign, Democratic Republic\" of India as per the 1949 and present-day status?</strong> <strong data-path-to-node=\"15\" data-index-in-node=\"141\">(1949 और वर्तमान स्थिति के अनुसार निम्नलिखित में से कौन सी विशेषताएं भारत के \"संप्रभु, लोकतांत्रिक गणराज्य\" का सटीक वर्णन करती हैं?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"16\">\n<li>\n<p data-path-to-node=\"16,0,0\">It is the <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"10\">lengthiest written constitution</strong> in the world, originally containing 395 Articles, 22 Parts, and 8 Schedules. (यह दुनिया का <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"133\">सबसे लंबा लिखित संविधान</strong> है, जिसमें मूल रूप से 395 अनुच्छेद, 22 भाग और 8 अनुसूचियां थीं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,1,0\">It establishes a <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"17\">Federal System with Unitary Bias</strong>, where features like Single Citizenship and an Integrated Judiciary favor a strong Centre. (यह <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"145\">एकात्मक झुकाव के साथ एक संघीय प्रणाली</strong> स्थापित करता है, जहाँ एकल नागरिकता और एकीकृत न्यायपालिका जैसी विशेषताएं एक मजबूत केंद्र का पक्ष लेती हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,2,0\">The <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"4\">42nd Amendment Act (1976)</strong> added the terms 'Secular' and 'Socialist' to the Preamble and introduced Fundamental Duties under Article 51-A. ( <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"144\">42वें संशोधन अधिनियम (1976)</strong> ने प्रस्तावना में 'धर्मनिरपेक्ष' और 'समाजवादी' शब्द जोड़े और अनुच्छेद 51-A के तहत मौलिक कर्तव्यों की शुरुआत की।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,3,0\">The <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"4\">73rd and 74th Amendment Acts (1992)</strong> added a <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"48\">\"Third Tier\"</strong> to the government by recognizing Panchayati Raj and Municipalities. ( <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"131\">73वें और 74वें संशोधन अधिनियमों (1992)</strong> ने पंचायती राज और नगर पालिकाओं को मान्यता देकर सरकार में <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"227\">\"तीसरा स्तर\"</strong> जोड़ा।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"17\"><strong data-path-to-node=\"17\" data-index-in-node=\"0\">Choose the correct option: / सही विकल्प चुनें:</strong></p>\n<ul data-path-to-node=\"18\">\n<li>\n<p data-path-to-node=\"18,0,0\"><strong data-path-to-node=\"18,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"18,1,0\"><strong data-path-to-node=\"18,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"18,2,0\"><strong data-path-to-node=\"18,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"18,3,0\"><strong data-path-to-node=\"18,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",

e=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,9,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,9,1,0\" data-index-in-node=\"0\">Amendment Procedure</strong> (Article 368), Election of Rajya Sabha members.</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" />\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">Part 3: Hierarchy &amp; Salient Features (पदानुक्रम और मुख्य विशेषताएं)</strong></h2>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">I. Hierarchy of Laws (कानूनों का पदानुक्रम)</strong></h3>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Constitution (संविधान):</strong> The Supreme Law. All other laws must comply.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Statutory Law (अधिनियम):</strong> Passed by Parliament/State Legislature.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Ordinance (अध्यादेश):</strong> Temporary (same force as law). Issued under <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"66\">Art 123</strong> (President) or <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"89\">Art 213</strong> (Governor).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Delegated Legislation (प्रत्यायोजित विधान):</strong> Rules, Regulations, and Bylaws made by the Executive.</p>\n</li>\n</ol>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">II. Key Features (प्रमुख विशेषताएं)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"0\">Lengthiest Written Constitution:</strong> Originally <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"44\">395</strong> Articles; now ~<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"63\">470</strong> Articles in <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"79\">25</strong> Parts and <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"92\">12</strong> Schedules.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0\" data-index-in-node=\"0\">Rigidity vs. Flexibility:</strong> A unique blend. Some parts need a simple majority, others a special majority.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"0\">Universal Adult Franchise:</strong> Voting age reduced from 21 to 18 by the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"67\">61st Amendment Act, 1989</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0\" data-index-in-node=\"0\">Single Citizenship:</strong> Unlike the US, India has only national citizenship to promote integrity.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0\" data-index-in-node=\"0\">Emergency Provisions:</strong> Three types&mdash;National (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0\" data-index-in-node=\"44\">Art 352</strong>), State (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0\" data-index-in-node=\"61\">Art 356</strong>), and Financial (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0\" data-index-in-node=\"86\">Art 360</strong>).</p>\n</li>\n</ul>",

tant;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0\" data-index-in-node=\"0\">Term:</strong> 6 years or 65 years.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"0\">Removal:</strong> The <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"13\">CEC</strong> (Chief Election Commissioner) is removed like a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"65\">Supreme Court Judge</strong>. Other Commissioners are removed by the President on the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"142\">recommendation of the CEC</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0\" data-index-in-node=\"0\">Scope:</strong> Conducts elections for Parliament, State Legislatures, President, and Vice-President.</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,3,1,0,0\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1,0,0\" data-index-in-node=\"0\">Note: Does <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1,0,0\" data-index-in-node=\"11\">NOT</strong> conduct Panchayat/Municipal elections (done by State EC).</em></p>\n</li>\n</ul>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" data-index-in-node=\"0\">🚀 SSC &amp; UPSC PYQ \"Trap\" Points</strong></h3>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"18\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,0\" data-index-in-node=\"0\">CAG Ineligibility:</strong> The CAG is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,0\" data-index-in-node=\"30\">not eligible</strong> for any further office under the Govt of India or any State after retirement.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,1,0\" data-index-in-node=\"0\">FC Qualifications:</strong> Qualifications of FC members are decided by <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,1,0\" data-index-in-node=\"63\">Parliament</strong>, not the President.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,2,0\" data-index-in-node=\"0\">AGI vs. MP:</strong> The AGI enjoys all privileges and immunities of an MP but lacks the right to vote in the house.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,3,0\" data-index-in-node=\"0\">89th Amendment:</strong> This is the most repeated amendment in PYQs&mdash;it split the joint SC/ST commission into two.</p>\n</li>\n</ol>",

    "question": "<p data-path-to-node=\"15\"><strong data-path-to-node=\"15\" data-index-in-node=\"0\">&nbsp;With reference to the Election Commission and the National Commissions for various classes, consider the following statements:</strong> <strong data-path-to-node=\"15\" data-index-in-node=\"130\">(चुनाव आयोग और विभिन्न वर्गों के लिए राष्ट्रीय आयोगों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"16\">\n<li>\n<p data-path-to-node=\"16,0,0\">The <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"4\">Election Commission of India (Art. 324)</strong> is responsible for conducting elections to Parliament, State Legislatures, and local bodies (Panchayats and Municipalities). (भारत का चुनाव आयोग (अनुच्छेद 324) संसद, राज्य विधानसभाओं और स्थानीय निकायों (पंचायतों और नगर पालिकाओं) के चुनाव कराने के लिए जिम्मेदार है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,1,0\">The <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"4\">89th Amendment Act, 2003</strong> bifurcated the combined commission into the <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"73\">National Commission for Scheduled Castes (Art. 338)</strong> and the <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"133\">National Commission for Scheduled Tribes (Art. 338A)</strong>. (89वें संशोधन अधिनियम, 2003 ने संयुक्त आयोग को राष्ट्रीय अनुसूचित जाति आयोग (अनुच्छेद 338) और राष्ट्रीय अनुसूचित जनजाति आयोग (अनुच्छेद 338A) में विभाजित कर दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,2,0\">The <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"4\">National Commission for Backward Classes (NCBC)</strong> was granted constitutional status through the <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"98\">102nd Amendment Act, 2018</strong> under <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"130\">Article 338B</strong>. (राष्ट्रीय पिछड़ा वर्ग आयोग (NCBC) को 102वें संशोधन अधिनियम, 2018 के माध्यम से अनुच्छेद 338B के तहत संवैधानिक दर्जा दिया गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,3,0\">The <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"4\">Chief Election Commissioner (CEC)</strong> can be removed only in the same manner as an SC judge, but other Election Commissioners can be removed by the President on the recommendation of the CEC. (मुख्य चुनाव आयुक्त (CEC) को केवल SC के न्यायाधीश की तरह ही हटाया जा सकता है, लेकिन अन्य चुनाव आयुक्तों को CEC की सिफारिश पर राष्ट्रपति द्वारा हटाया जा सकता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"17\"><strong data-path-to-node=\"17\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>\n<ul data-path-to-node=\"18\">\n<li>\n<p data-path-to-node=\"18,0,0\"><strong data-path-to-node=\"18,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"18,1,0\"><strong data-path-to-node=\"18,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"18,2,0\"><strong data-path-to-node=\"18,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"18,3,0\"><strong data-path-to-node=\"18,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\">\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0,0\" data-index-in-node=\"0\">Statement 1 is Incorrect:</strong> The ECI conducts elections for Parliament, State Legislatures, President, and Vice-President. Elections to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0,0\" data-index-in-node=\"133\">Panchayats and Municipalities</strong> are conducted by the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0,0\" data-index-in-node=\"184\">State Election Commission</strong>, not the ECI.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"20,1,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,1,0\" data-index-in-node=\"0\">Statements 2, 3, and 4 are correct:</strong> They accurately reflect the 89th and 102nd amendments and the specific removal protections for the CEC vs. other ECs.</p>\n</li>\n</ul>\n</blockquote>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\" data-index-in-node=\"0\">&nbsp;Revision Table (Art. 338 Series)</strong></h3>\n<p data-path-to-nod     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the statutory and executive bodies in India, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"101\">(भारत में सांविधिक और कार्यकारी निकायों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">Lokpal and Lokayukta Act (2013)</strong> established a body consisting of a Chairperson and up to 8 members, where 50% must be judicial members and 50% must come from SC, ST, OBC, Minorities, and Women. (लोकपाल और लोकायुक्त अधिनियम (2013) ने एक अध्यक्ष और अधिकतम 8 सदस्यों वाले निकाय की स्थापना की, जहाँ 50% न्यायिक सदस्य होने चाहिए और 50% SC, ST, OBC, अल्पसंख्यक और महिलाओं से होने चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">Lokayukta</strong> was first established in the state of Maharashtra in 1971, based on the recommendations of the Administrative Reforms Commission (1966&ndash;70). (प्रशासनिक सुधार आयोग (1966-70) की सिफारिशों के आधार पर 1971 में महाराष्ट्र राज्य में पहली बार लोकायुक्त की स्थापना की गई थी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">NITI Aayog</strong>, which replaced the Planning Commission in 2015, is a <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"65\">Statutory Body</strong> established by an Act of Parliament to promote \"Cooperative Federalism.\" (नीति आयोग, जिसने 2015 में योजना आयोग का स्थान लिया, \"सहकारी संघवाद\" को बढ़ावा देने के लिए संसद के एक अधिनियम द्वारा स्थापित एक <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"281\">सांविधिक निकाय</strong> है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">Law Commission of India</strong> is a non-statutory advisory body that identifies obsolete laws for repeal and submits reports to the Ministry of Law and Justice. (भारतीय विधि आयोग एक गैर-सांविधिक सलाहकार निकाय है जो निरसन के लिए अप्रचलित कानूनों की पहचान करता है और कानून और न्याय मंत्रालय को रिपोर्ट सौंपता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 1, 2, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<ul>\n<li>\n<p data-path-to-node=\"9,1,0,0\"><strong data-path-to-node=\"9,1,0,0\" data-index-in-node=\"0\">Statement 3 is Incorrect:</strong> NITI Aayog is <strong data-path-to-node=\"9,1,0,0\" data-index-in-node=\"40\">NOT</strong> a statutory body. It is an <strong data-path-to-node=\"9,1,0,0\" data-index-in-node=\"71\">Extra-Constitutional/Executive Body</strong> created by a Cabinet Resolution. It was not created by an Act of Parliament.</p>\n</li>\n<li>\n<p data-path-to-node=\"9,1,1,0\"><strong data-path-to-node=\"9,1,1,0\" data-index-in-node=\"0\">Statements 1, 2, and 4 are correct:</strong> They accurately reflect the composition of Lokpal, the historical origin of Lokayukta, and the advisory nature of the Law Commission.</p>\n</li>\n</ul>\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">&nbsp;Constitutional Bodies of India: Bilingual Cheat Sheet</strong></h2>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">भारत के संवैधानिक निकाय: द्विभाषी चीट शीट</strong></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" data-index-in-node=\"0\">1. Core Constitutional Bodies (प्रमुख संवैधानिक निकाय)</strong></h3>\n<table style=\"margin-bottom: 32px; fo 0\">148</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,2,0\">President</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,3,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,3,0\" data-index-in-node=\"0\">6 yrs / 65 age</strong>. Removed like <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,3,0\" data-index-in-node=\"29\">SC Judge</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,4,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,4,0\" data-index-in-node=\"0\">Not eligible</strong> for further office after retirement.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">Attorney General</strong> (भारत के महान्यायवादी)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\" data-index-in-node=\"0\">76</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,2,0\">President</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,3,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,3,0\" data-index-in-node=\"0\">Pleasure of President</strong> (No fixed tenure).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,4,0\">Right to speak in Parliament but <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,4,0\" data-index-in-node=\"33\">No Right to Vote</strong>.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,0,0\" data-index-in-node=\"0\">Advocate General</strong> (राज्य के महाधिवक्ता)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,1,0\" data-index-in-node=\"0\">165</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-n
