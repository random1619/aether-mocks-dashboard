    "solution": "<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0,0\" data-index-in-node=\"0\">A-2 (Starred Question):</strong> Distinguished by an asterisk. It requires an <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0,0\" data-index-in-node=\"69\">oral answer</strong>, meaning supplementary questions can follow. (तारांकित प्रश्न: मौखिक उत्तर की आवश्यकता होती है, इसलिए पूरक प्रश्न पूछे जा सकते हैं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,1,0\" data-index-in-node=\"0\">B-1 (Adjournment Motion):</strong> An extraordinary device to discuss a matter of urgent public importance. Since it interrupts regular business and carries an element of <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,1,0\" data-index-in-node=\"162\">censure</strong>, it is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,1,0\" data-index-in-node=\"177\">not permitted in the Rajya Sabha</strong>. (स्थगन प्रस्ताव: तत्काल सार्वजनिक महत्व के मामले पर चर्चा; इसमें निंदा का तत्व होता है, इसलिए राज्यसभा में इसकी अनुमति नहीं है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,2,0\" data-index-in-node=\"0\">C-4 (No-Confidence Motion):</strong> Based on <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,2,0\" data-index-in-node=\"37\">Article 75</strong>, the government stays in power only as long as it enjoys the confidence of the Lok Sabha. If passed, the entire cabinet must resign. (अविश्वास प्रस्ताव: अनुच्छेद 75 पर आधारित; पारित होने पर पूरी सरकार को इस्तीफा देना पड़ता है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,0\" data-index-in-node=\"0\">D-3 (Guillotine Closure):</strong> A type of closure motion where undiscussed clauses of a bill or budget are put to vote along with discussed ones to save time. (गिलोयटीन क्लोजर: समय बचाने के लिए बिना चर्चा वाले खंडों पर सीधे मतदान।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">🚀 \"Sure-Shot\" Key Facts for Revision</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Device (साधन)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Technicality (English)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">प्रमुख तकनीकी तथ्य (Hindi)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\" data-index-in-node=\"0\">Zero Hour</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0\">Informal; Indian innovation (1962); starts at 12 PM.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,2,0\">अनौपचारिक; भारतीय नवाचार (1962); दोपहर 12 बजे शुरू।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node= td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,1,0\">Against a minister for \"breach of privilege.\"</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,2,0\">\"विशेषाधिकार हनन\" के लिए मंत्री के विरुद्ध।</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the sessions of Parliament and the status of bills upon dissolution of the Lok Sabha, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"142\">(संसद के सत्रों और लोकसभा के विघटन पर विधेयकों की स्थिति के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The gap between two sessions of Parliament cannot exceed six months, and the Constitution mandates a minimum of 60 sittings per year. (संसद के दो सत्रों के बीच का अंतर छह महीने से अधिक नहीं हो सकता है, और संविधान प्रति वर्ष न्यूनतम 60 बैठकों का आदेश देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"6\">Adjournment</strong> terminates a sitting, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"40\">Prorogation</strong> terminates both a sitting and the session; however, neither affects the pending bills of the House. (जहाँ <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"158\">स्थगन (Adjournment)</strong> एक बैठक को समाप्त करता है, वहीं <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"210\">सत्रावसान (Prorogation)</strong> बैठक और सत्र दोनों को समाप्त करता है; हालाँकि, दोनों में से कोई भी सदन के लंबित विधेयकों को प्रभावित नहीं करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">A bill pending in the Rajya Sabha which has <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"44\">not</strong> been passed by the Lok Sabha does not lapse on the dissolution of the Lok Sabha. (राज्यसभा में लंबित विधेयक जिसे लोकसभा द्वारा पारित <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"181\">नहीं</strong> किया गया है, लोकसभा के विघटन पर व्यपगत (Lapse) नहीं होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">A bill passed by both Houses but returned by the President for reconsideration lapses upon the dissolution of the Lok Sabha. (दोनों सदनों द्वारा पारित लेकिन राष्ट्रपति द्वारा पुनर्विचार के लिए लौटाया गया विधेयक लोकसभा के विघटन पर व्यपगत हो जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Quorum</strong> is the minimum 1/10th strength required to conduct business; in its absence, the Presiding Officer must adjourn the House. ( <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"132\">गणपूर्ति (Quorum)</strong> कार्य संचालन के लिए आवश्यक न्यूनतम 1/10 सदस्य संख्या है; इसकी अनुपस्थिति में, पीठासीन अधिकारी को सदन स्थगित करना चाहिए।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 5 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">Sure-Shot\" Key Facts for Revision</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Device (साधन)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Technicality (English)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">प्रमुख तकनीकी तथ्य (Hindi)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\" data-index-in-node=\"0\">Zero Hour</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0\">Informal; Indian innovation (1962); starts at 12 PM.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,2,0\">अनौपचारिक; भारतीय नवाचार (1962); दोपहर 12 बजे शुरू।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\" data-index-in-node=\"0\">Censure Motion</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\">Can be against one minister; reasons must be stated.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,2,0\">एक मंत्री के विरुद्ध हो सकता है; कारण बताना अनिवार्य है।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\" data-index-in-node=\"0\">Short Notice Q</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,1,0\">Answered orally; requires &lt; 10 days notice.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,2,0\">मौखिक उत्तर; 10 दिन से कम का नोटिस आवश्यक।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0,0\" data-index-in-node=\"0\">Privilege Motion</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,1,0\">Against a minister for \"breach of privilege.\"</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,2,0\">\"विशेषाधिकार हनन\" के लिए मंत्री के विरुद्ध।</span></td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li>\n<p data-path-to-node=\"16,0,0\"><strong data-path-to-node=\"16,0,0\" data-index-in-node=\"0\">A)</strong> <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"3\">Zero Hour</strong> is an Indian innovation (since 1962) that is not mentioned in the Rules of Procedure. ( <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"101\">शून्यकाल</strong> एक भारतीय नवाचार है जिसका उल्लेख प्रक्रिया के नियमों में नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,1,0\"><strong data-path-to-node=\"16,1,0\" data-index-in-node=\"0\">B)</strong> A <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"5\">Censure Motion</strong> must state the reasons for its adoption and can be moved against an individual minister or the entire Council of Ministers. ( <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"146\">निंदा प्रस्ताव</strong> में इसे अपनाने के कारणों का उल्लेख होना चाहिए और इसे किसी व्यक्तिगत मंत्री या संपूर्ण मंत्रिपरिषद के विरुद्ध लाया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,2,0\"><strong data-path-to-node=\"16,2,0\" data-index-in-node=\"0\">C)</strong> A <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"5\">Privilege Motion</strong> is moved by a minister to alert the House about urgent public matters. ( <strong data-path-to-node=\"16,2,0\" data-index-in-node=\"95\">विशेषाधिकार प्रस्ताव</strong> एक मंत्री द्वारा सदन को तत्काल सार्वजनिक मामलों के प्रति सचेत करने के लिए पेश किया जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"16,3,0\"><strong data-path-to-node=\"16,3,0\" data-index-in-node=\"0\">D)</strong> Failure to pass the <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"23\">Motion of Thanks</strong> in the Lok Sabha amounts to a defeat of the Government. (लोकसभा में <strong data-path-to-node=\"16,3,0\" data-index-in-node=\"108\">धन्यवाद प्रस्ताव</strong> पारित न होना सरकार की हार के समान है।)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the different types of bills in the Indian Parliament, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"111\">(भारतीय संसद में विभिन्न प्रकार के विधेयकों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">A <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"2\">Public Bill</strong> is introduced only by a Minister and reflects government policies; its rejection in the Lok Sabha may lead to the resignation of the government. (एक <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"163\">सार्वजनिक विधेयक</strong> केवल एक मंत्री द्वारा पेश किया जाता है और यह सरकारी नीतियों को दर्शाता है; लोकसभा में इसकी अस्वीकृति से सरकार का इस्तीफा हो सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">A <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"2\">Private Bill</strong> requires a notice period of seven days for introduction, whereas a Public Bill requires a notice of one month. (एक <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"130\">निजी विधेयक</strong> को पेश करने के लिए सात दिनों की सूचना अवधि की आवश्यकता होती है, जबकि सार्वजनिक विधेयक के लिए एक महीने की सूचना की आवश्यकता होती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">According to <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"13\">Article 117</strong>, all Money Bills are Financial Bills, but not all Financial Bills are Money Bills. ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"110\">अनुच्छेद 117</strong> के अनुसार, सभी धन विधेयक (Money Bills) वित्त विधेयक होते हैं, लेकिन सभी वित्त विधेयक, धन विधेयक नहीं होते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">In the case of a <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"17\">Constitutional Amendment Bill</strong> under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"53\">Article 368</strong>, the President can summon a joint sitting if a deadlock occurs between the two Houses. ( <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"154\">अनुच्छेद 368</strong> के तहत <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"174\">संविधान संशोधन विधेयक</strong> के मामले में, यदि दोनों सदनों के बीच गतिरोध उत्पन्न होता है, तो राष्ट्रपति संयुक्त बैठक बुला सकते हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 3 only B) 2 and 4 only C) 1, 2, and 3 only D) 1, 3, and 4 only</p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Regarding the stages of an Ordinary Bill and the powers of the Houses, evaluate the following statements:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"109\">(साधारण विधेयक के चरणों और सदनों की शक्तियों के संबंध में, निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">During the <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"11\">First Reading</strong>, no discussion on the bill takes place; it consists of the introduction and publication in the Gazette. ( <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"131\">प्रथम वाचन</strong> के दौरान, विधेयक पर कोई चर्चा नहीं होती है; इसमें केवल विधेयक को पेश करना और राजपत्र में प्रकाशन शामिल है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"4\">Second Reading</strong> is the most significant stage, where the bill undergoes clause-by-clause examination and amendments can be moved. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"135\">द्वितीय वाचन</strong> सबसे महत्वपूर्ण चरण है, जहाँ विधेयक के प्रत्येक खंड की जांच की जाती है और संशोधन पेश किए जा सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">If an Ordinary Bill passed by the Lok Sabha is rejected by the Rajya Sabha or kept pending for <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"95\">six months</strong>, the President can summon a joint sitting. (यदि लोकसभा द्वारा पारित साधारण विधेयक को राज्यसभा द्वारा खारिज कर दिया जाता है या <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"232\">छह महीने</strong> तक लंबित रखा जाता है, तो राष्ट्रपति संयुक्त बैठक बुला सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">When a bill is returned by the President for reconsideration and is passed again by both Houses (with or without amendments), the President <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"140\">may</strong> still withhold assent. (जब राष्ट्रपति द्वारा पुनर्विचार के लिए विधेयक लौटाया जाता है और दोनों सदनों द्वारा (संशोधन के साथ या बिना) फिर से पारित किया जाता है, तो राष्ट्रपति फिर भी अपनी सहमति रोक <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"338\">सकते</strong> हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 2 and 3 only C) 1, 2, and 3 only D) All of the above</p>",

    "solution": "<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\" data-index-in-node=\"0\">Statement 4 is Incorrect:</strong> If a bill is passed again by both Houses after being returned, the President <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\" data-index-in-node=\"103\">must</strong> give assent (Suspensive Veto is exhausted).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,1,0\" style=\"line-height: 1.15 !important;\">Statements 1, 2, and 3 accurately reflect the constitutional procedure for ordinary legislation.</p>\n</li>\n</ul>\n</blockquote>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" data-index-in-node=\"0\">&nbsp;\"Quick-Strike\" Revision Table</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-hei t;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\" data-index-in-node=\"0\">Joint Sitting</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,1,0\" data-index-in-node=\"0\">Applicable</strong> (अनुच्छेद 108)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,2,0\" data-index-in-node=\"0\">Not Applicable</strong> (लागू नहीं)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,0,0\" data-index-in-node=\"0\">President</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,1,0\">Assent/Withhold/Return</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,2,0\">Assent/Withhold (Cannot Return)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the financial administration of India, consider the following statements:</strong><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"95\">(भारत के वित्तीय प्रशासन के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><span class=\"\">No money can be withdrawn from the </span><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"35\">Consolidated Fund of India (Article 266)</strong><span class=\"\"> except under appropriation made by a parliamentary law.</span><span class=\"\"> (संसदीय कानून द्वारा किए गए विनियोग के अलावा </span><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"177\">भारत की संचित निधि (अनुच्छेद 266)</strong><span class=\"\"> से कोई भी धन नहीं निकाला जा सकता है।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><span class=\"\">The </span><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">Public Account of India</strong><span class=\"\"> includes provident fund deposits and judicial deposits; it is operated by executive action and does not require a parliamentary vote.</span><span class=\"\"> ( </span><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"164\">भारत के सार्वजनिक खाते</strong><span class=\"\"> में भविष्य निधि जमा और न्यायिक जमा शामिल हैं; यह कार्यकारी कार्रवाई द्वारा संचालित होता है और इसके लिए संसदीय वोट की आवश्यकता नहीं होती है।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><span class=\"\">The </span><strong class=\"\" data-path-to-node=\"5,2,0\" data-index-in-node=\"4\">Contingency Fund of India (Article 267)</strong><span class=\"\"> is held by the Finance Secretary on behalf of the President to meet unforeseen expenditure.</span><span class=\"\"> ( </span><strong class=\"\" data-path-to-node=\"5,2,0\" data-index-in-node=\"138\">भारत की आकस्मिकता निधि (अनुच्छेद 267)</strong><span class=\"\"> राष्ट्रपति की ओर से वित्त सचिव द्वारा अप्रत्याशित खर्च को पूरा करने के लिए रखी जाती है।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><span class=\"\">An </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"3\">Excess Grant (Article 115)</strong><span class=\"\"> is issued for a \"new service\" not contemplated in the budget,</span><span class=\"\"> while an </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"101\">Additional Grant</strong><span class=\"\"> is voted upon when the actual expenditure exceeds the budgeted amount.</span><span class=\"\"> ( </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"191\">अतिरिक्त अनुदान (Excess Grant)</strong><span class=\"\"> बजट में परिकल्पित नहीं की गई \"नई सेवा\" के लिए जारी किया जाता है,</span><span class=\"\"> जबकि </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"292\">अपर अनुदान (Additional Grant)</strong><span class=\"\"> तब दिया जाता है जब वास्तविक खर्च बजट राशि से अधिक हो जाता है।)</span></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong class=\"\" data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong><span class=\"\"> A) 1 and 2 only B) 1,</span><span class=\"\"> 2,</span><span class=\"\"> and 3 only C) 3 and 4 only D) All of the above</span></p>",

      "<p>A</p>",

    "solution": "<blockquote data-path-to-node=\"8\">\n<p data-path-to-node=\"8,0\"><strong data-path-to-node=\"8,0\" data-index-in-node=\"26\">Statement 4 is Incorrect:</strong> The definitions are swapped. An <strong data-path-to-node=\"8,0\" data-index-in-node=\"84\">Excess Grant</strong> is for spending <em data-path-to-node=\"8,0\" data-index-in-node=\"113\">more</em> than the budget (requires PAC approval), while an <strong data-path-to-node=\"8,0\" data-index-in-node=\"168\">Additional Grant</strong> is for a <em data-path-to-node=\"8,0\" data-index-in-node=\"194\">new service</em> not foreseen in the budget.</p>\n<ul data-path-to-node=\"8,1\">\n<li>\n<p data-path-to-node=\"8,1,0,0\">Statements 1, 2, and 3 are technically accurate as per Articles 266 and 267.</p>\n</li>\n</ul>\n</blockquote>",

    "question": "<p><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Regarding the relationship between the two Houses of Parliament, identify the INCORRECT statement:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"102\">(संसद के दोनों सदनों के बीच संबंधों के संबंध में, गलत कथन की पहचान करें:)</strong></p>",
    "comp": "",
    "options": [
      "<p><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Rajya Sabha has equal status with Lok Sabha in the election and impeachment of the President and the removal of Judges of the Supreme Court.</strong> (राष्ट्रपति के चुनाव और महाभियोग तथा सर्वोच्च न्यायालय के न्यायाधीशों को हटाने में राज्यसभा का लोकसभा के साथ समान दर्जा है।)</p>",
      "<p><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">A Money Bill can only be introduced in the Lok Sabha, and the Rajya Sabha must return it within 14 days with or without recommendations.</strong> ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"142\">धन विधेयक</strong> केवल लोकसभा में पेश किया जा सकता है, और राज्यसभा को इसे 14 दिनों के भीतर सिफारिशों के साथ या बिना लौटाना होगा।)</p>",
      "<p><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Under Article 249, the Rajya Sabha can authorize Parliament to make laws on a subject in the State List by a simple majority of members present and voting.</strong> ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"161\">अनुच्छेद 249</strong> के तहत, राज्यसभा उपस्थित और मतदान करने वाले सदस्यों के <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"229\">साधारण बहुमत</strong> से संसद को राज्य सूची के विषय पर कानून बनाने के लिए अधिकृत कर सकती है।)</p>",
      "<p><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Only the Rajya Sabha has the power to initiate a resolution for the creation of new All India Services (Article 312).</strong> (केवल राज्यसभा के पास नई <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"146\">अखिल भारतीय सेवाओं (अनुच्छेद 312)</strong> के सृजन के लिए प्रस्ताव शुरू करने की शक्ति है।)</p>"

    "correct_option_id": 2,
    "solution": "<p data-path-to-node=\"8\"><strong data-path-to-node=\"8\" data-index-in-node=\"0\">Correct Option: C (INCORRECT)</strong></p>\n<p data-path-to-node=\"9\"><strong data-path-to-node=\"9\" data-index-in-node=\"0\">Why is Statement C flawed? (कथन C त्रुटिपूर्ण क्यों है?):</strong> Under <strong data-path-to-node=\"9\" data-index-in-node=\"64\">Article 249</strong>, the Rajya Sabha does indeed have the power to authorize Parliament to legislate on a State List subject, but it requires a <strong data-path-to-node=\"9\" data-index-in-node=\"200\">Special Majority</strong>. This means the resolution must be passed by <strong data-path-to-node=\"9\" data-index-in-node=\"262\">not less than two-thirds of the members present and voting</strong>, not a simple majority. (अनुच्छेद 249 के तहत, राज्यसभा को राज्य सूची पर कानून बनाने के लिए संसद को अधिकृत करने हेतु <strong data-path-to-node=\"9\" data-index-in-node=\"437\">विशेष बहुमत</strong> की आवश्यकता होती है। इसका अर्थ है कि प्रस्ताव <strong data-path-to-node=\"9\" data-index-in-node=\"495\">उपस्थित और मतदान करने वाले सदस्यों के दो-तिहाई</strong> से कम नहीं होना चाहिए, न कि साधारण बहुमत।)</p>\n<p data-path-to-node=\"9\"></p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">Quick Comparison Table for Revision</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">With reference to the Seventh Schedule and Article 246 of the Indian Constitution, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"121\">(भारतीय संविधान की सातवीं अनुसूची और अनुच्छेद 246 के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The concept of a three-fold distribution of legislative subjects in the Indian Constitution is borrowed from the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"113\">Government of India Act, 1935</strong>. (भारतीय संविधान में विधायी विषयों के तीन-स्तरीय वितरण की अवधारणा <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"209\">भारत सरकार अधिनियम, 1935</strong> से ली गई है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While the Union List has seen an increase from 97 to 100 subjects, the State List was reduced from 66 to 61 subjects due to the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"128\">42nd Amendment Act, 1976</strong>. (जहाँ संघ सूची में विषयों की संख्या 97 से बढ़कर 100 हो गई है, वहीं <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"221\">42वें संशोधन अधिनियम, 1976</strong> के कारण राज्य सूची 66 से घटकर 61 विषयों पर आ गई है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Under <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"6\">Article 248</strong>, the power to legislate on <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"45\">Residuary subjects</strong> (like Cyber Law and AI) is vested in the State Legislatures, following the US model. ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"151\">अनुच्छेद 248</strong> के तहत, <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"172\">अवशिष्ट विषयों</strong> (जैसे साइबर कानून और AI) पर कानून बनाने की शक्ति अमेरिकी मॉडल का पालन करते हुए राज्य विधानमंडलों में निहित है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">Concurrent List</strong>, borrowed from the Australian Constitution, includes subjects like Marriage, Education, and Forests where both Centre and States can legislate. (ऑस्ट्रेलियाई संविधान से ली गई <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"195\">समवर्ती सूची</strong> में विवाह, शिक्षा और वन जैसे विषय शामिल हैं जहाँ केंद्र और राज्य दोनों कानून बना सकते हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 1, 2, and 4 only C) 2, 3, and 4 only D) All of the above</p>",

"5,3,0,0\" data-index-in-node=\"0\">C) Article 253</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\">3. Union law prevails over State law in case of conflict on a Concurrent subject. (समवर्ती विषय पर टकराव की स्थिति में केंद्रीय कानून राज्य के कानून पर हावी होता है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">D) Article 254</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\">4. Parliament can legislate on State subjects during a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\" data-index-in-node=\"55\">National Emergency</strong>. (राष्ट्रीय आपातकाल के दौरान संसद राज्य सूची के विषयों पर कानून बना सकती है।)</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"6\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"0\">Choose the correct code: / सही कूट का चयन करें:</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-t data-index-in-node=\"0\">C-1 (Article 253):</strong> Empowers Parliament to make laws for the whole or any part of India for implementing any <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,2,0\" data-index-in-node=\"108\">treaty, agreement, or convention</strong> with any other country.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<div class=\"flex flex-col text-sm pb-25\">\n<article class=\"text-token-text-primary w-full focus:outline-none [--shadow-height:45px] has-data-writing-block:pointer-events-none has-data-writing-block:-mt-(--shadow-height) has-data-writing-block:pt-(--shadow-height) [&amp;:has([data-writing-block])&gt;*]:pointer-events-auto scroll-mt-[calc(var(--header-height)+min(200px,max(70px,20svh)))]\" dir=\"auto\" tabindex=\"-1\" data-turn-id=\"request-WEB:675c7f4d-4969-47b6-bf92-f5bac4a4bada-16\" data-testid=\"conversation-turn-34\" data-scroll-anchor=\"true\" data-turn=\"assistant\">\n<div class=\"text-base my-auto mx-auto pb-10 [--thread-content-margin:--spacing(4)] @w-sm/main:[--thread-content-margin:--spacing(6)] @w-lg/main:[--thread-content-margin:--spacing(16)] px-(--thread-content-margin)\">\n<div class=\"[--thread-content-max-width:40rem] @w-lg/main:[--thread-content-max-width:48rem] mx-auto max-w-(--thread-content-max-width) flex-1 -sm/main:[--thread-content-margin:--spacing(6)] @w-lg/main:[--thread-content-margin:--spacing(16)] px-(--thread-content-margin)\">\n<div class=\"[--thread-content-max-width:40rem] @w-lg/main:[--thread-content-max-width:48rem] mx-auto max-w-(--thread-content-max-width) flex-1 group/turn-messages focus-visible:outline-hidden relative flex w-full min-w-0 flex-col agent-turn\">\n<div class=\"flex max-w-full flex-col grow\">\n<div class=\"min-h-8 text-message relative flex w-full flex-col items-end gap-2 text-start break-words whitespace-normal [.text-message+&amp;]:mt-1\" data-message-author-role=\"assistant\" data-message-id=\"4280dfab-e3c2-4ee4-947e-58d3389ed10d\" data-message-model-slug=\"gpt-5-2\">\n<div class=\"flex w-full flex-col gap-1 empty:hidden first:pt-[1px]\">\n<div class=\"markdown prose dark:prose-invert w-full wrap-break-word light markdown-new-styling\">\n<p data-start=\"0\" data-end=\"202\"><strong data-start=\"0\" data-end=\"23\">A-2 (अनुच्छेद 249):</strong> यदि <strong data-start=\"28\" data-end=\"40\">राज्यसभा</strong> राष्ट्रीय हित में आवश्यक घोषित करे (उपस्थित व मतदान करने वाले सदस्यों के <strong data-start=\"114\" data-end=\"127\">2/3 बहुमत</strong> से), तो संसद को <strong data-start=\"144\" data-end=\"158\">राज्य सूची</strong> के विषय पर कानून बनाने की शक्ति मिलती है।</p>\n<p data-start=\"204\" data-end=\"343\"><strong data-start=\"204\" data-end=\"227\">B-4 (अनुच्छेद 250):</strong> <strong data-start=\"228\" data-end=\"249\">राष्ट्रीय आपातकाल</strong> के दौरान संसद को <strong data-start=\"267\" data-end=\"281\">राज्य सूची</strong> के किसी भी विषय पर कानून बनाने की शक्ति प्राप्त हो जाती है।</p>\n<p data-start=\"345\" data-end=\"501\"><strong data-start=\"345\" data-end=\"368\">C-1 (अनुच्छेद 253):</strong> संसद को <strong data-start=\"377\" data-end=\"417\">अंतरराष्ट्रीय संधि, समझौते या अभिसमय</strong> को लागू करने हेतु पूरे भारत या उसके किसी भाग के लिए कानून बनाने की शक्ति देता है।</p>\n<p data-start=\"503\" data-end=\"680\"><strong data-start=\"503\" data-end=\"526\">D-3 (अनुच्छेद 254):</strong> <strong data-start=\"527\" data-end=\"543\">समवर्ती सूची</strong> पर संसद और राज्य विधानमंडल के कानूनों के बीच <strong data-start=\"589\" data-end=\"623\">टकराव (प्रतिस्पर्धा/रिपगनेंसी)</strong> से संबंधित है; इसमें <strong data-start=\"645\" data-end=\"669\">संघ का कानून प्रभावी</strong> होता है।</p>\n<ul data-start=\"682\" data-end=\"1092\" data-is-last-node=\"\" data-is-only-node=\"\">\n<li data-start=\"682\" data-end=\"830\">\n<p data-start=\"684\" data-end=\"830\"><strong data-start=\"684\" data-end=\"704\">अनुच्छेद 254(1):</strong> समवर्ती सूची के विषय पर टकराव होने पर, चाहे कानून पहले या बाद में बना हो, <strong data-start=\"779\" data-end=\"827\">संसदीय कानून राज्य कानून पर प्रधानता रखता है</strong>।</p>\n</li>\n<li data-start=\"831\" data-end=\"964\">\n<p data-start=\"833\" data-end=\"964\"><strong data-start=\"833\" data-end=\"853\">अनुच्छेद 254(2):</strong> यदि टकराव वाला <strong data-start=\"869\" data-end=\"907\">राज्य कानून राष्ट्रपति की स्वीकृति</strong> प्राप्त कर ले, तो वह <strong data-start=\"929\" data-end=\"950\">उस राज्य में लागू</strong> रह सकता है।</p>\n</li>\n<li data-start=\"965\" data-end=\"1092\" data-is-last-node=\"\">\n<p data-start=\"967\" data-end=\"1092\" data-is-last-node=\"\"><strong data-start=\"967\" data-end=\"986\">संसदीय अधिरोहण:</strong> राष्ट्रपति की स्वीकृति के बाद भी संसद <strong data-start=\"1025\" data-end=\"1080\">बाद में राज्य कानून को संशोधित, परिवर्तित या निरस्त</strong> कर सकती है।</p>\n<p data-path-to-node=\"11,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,3,0\" data-index-in-node=\"0\">D-3 (Article 254):</strong> Deals with the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,3,0\" data-index-in-node=\"34\">repugnancy</strong> (conflict) between laws made by Parliament and laws made by the Legislatures of States regarding the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,3,0\" data-index-in-node=\"146\">Concurrent List</strong>. It ensures Union law prevails.&nbsp;</p>\n</li>\n</ul>\n</div>\n</div>\n</div>\n</div>\n</div>\n</div>\n</article>\n</div>\n</div>\n</div>\n</div>\n</div>\n</div>\n</div>\n</article>\n</div>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin le=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,2,0\">Cyber Law, AI, Space Exploration.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,3,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,3,0\" data-index-in-node=\"0\">Parliament</strong> (Art. 248).</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\" data-index-in-node=\"0\">2. The 42nd Amendment (1976): The Shift (42वां संशोधन)</strong></h3>\n<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\">\n<p data-path-to-node=\"8,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0\" data-index-in-node=\"0\">Crux:</strong> Shifted <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,0\" data-index-in-node=\"14\">5 subjects</strong> from State List to Concurrent List.</p>\n</blockquote>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"9\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0,0\" data-index-in-node=\"0\">Education</strong> (शिक्षा)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,1,0\" data-index-in-node=\"0\">Forests</strong> (वन)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,2,0\" data-index-in-node=\"0\">Weights &amp; Measures</strong> (बाट और माप)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,3,0\" data-index-in-node=\"0\">Protection of Wild Animals/Birds</strong> (वन्यजीव संरक्षण)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"9,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,4,0\" data-index-in-node=\"0\">Administration of Justice</strong> (न्याय प्रशासन)</p>\n</li>\n</ol>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">3. Constitutional Priorities &amp; Conflicts (टकराव और वरीयता)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,0,0\" data-index-in-node=\"0\">Hierarchy:</strong> Union List <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,0,0\" data-index-in-node=\"22\">&gt;</strong> Concurrent List <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,0,0\" data-index-in-node=\"40\">&gt;</strong> State List.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"0\">Article 254 (Repugnancy):</strong> If Union and State laws on a Concurrent subject conflict, <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"84\">Union law prevails</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"0\">Exception:</strong> State law prevails <em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"30\">only</em> if it was reserved for and received <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0\" data-index-in-node=\"71\">Presidential Assent</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"0\">Article 246A:</strong> Special provision for <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0\" data-index-in-node=\"36\">GST</strong> (Concurrent taxing power).</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">4. When Parliament Invades State List (संसद द्वारा राज्य सूची पर कानून)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Article</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Condition (English)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">शर्त (Hindi)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0,0\" data-index-in-node=\"0\">Art. 249</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,1,0\">National Interest (RS Resolution).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,2,0\">राष्ट्रीय हित (राज्यसभा संकल्प - 2/3 बहुमत)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0,0\" data-index-in-node=\"0\">Art. 250</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,1,0\">During National Emergency.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,2,0\">राष्ट्रीय आपातकाल के दौरान।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\" data-index-in-node=\"0\">Art. 252</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1,0\">Consent of 2 or more States.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,2,0\">2 या अधिक राज्यों की सहमति पर।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\" data-index-in-node=\"0\">Art. 253</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\">International Treaties.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,2,0\">अंतर्राष्ट्रीय समझौतों को लागू करने के लिए।</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" data-index-in-node=\"0\">5. Essential PYQ Pointers (परीक्षा के लिए महत्वपूर्ण तथ्य)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,0\" data-index-in-node=\"0\">Historical Base:</strong> Derived from the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,0,0\" data-index-in-node=\"34\">Government of India Act, 1935</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,1,0\" data-index-in-node=\"0\">Sarkaria Commission:</strong> Termed the Concurrent List as the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,1,0\" data-index-in-node=\"55\">\"Gray Area\"</strong> of the Constitution.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,2,0\" data-index-in-node=\"0\">Residuary Difference:</strong> In the USA, residuary powers belong to States; in India, they belong to the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,2,0\" data-index-in-node=\"98\">Union</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,3,0\" data-index-in-node=\"0\">Railway Police:</strong> Note that while 'Railways' is Union, <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,3,0\" data-index-in-node=\"53\">Railway Police</strong> is in the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,3,0\" data-index-in-node=\"78\">State List</strong>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"18,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,4,0\" data-index-in-node=\"0\">Lotteries:</strong> Organized by the Government of India or a State are in the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18,4,0\" data-index-in-node=\"70\">Union List</strong>.</p>\n</li>\n</ul>",

      "<p>The&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"248\">101st Amendment (2016)</strong>&nbsp;introduced&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"282\">Article 246A</strong>, granting concurrent taxing powers to both Parliament and State Legislatures for GST.</p>\n<p>(&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"383\">101वें संशोधन (2016)</strong>&nbsp;ने&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"407\">अनुच्छेद 246A</strong>&nbsp;पेश किया, जो GST के लिए संसद और राज्य विधानमंडलों दोनों को समवर्ती कराधान शक्तियां प्रदान करता है।)&nbsp;</p>",
      "<p>&nbsp;If a State law on a Concurrent subject conflicts with a Union law, the State law <em data-path-to-node=\"15\" data-index-in-node=\"605\">always</em>&nbsp;prevails if it was passed first.</p>\n<p>(यदि समवर्ती विषय पर राज्य का कानून केंद्रीय कानून के साथ टकराता है, तो राज्य का कानून&nbsp;<em data-path-to-node=\"15\" data-index-in-node=\"732\">हमेशा</em>&nbsp;हावी होता है यदि वह पहले पारित किया गया था।)&nbsp;</p>",
      "<p>&nbsp;Parliament can legislate on State subjects if two or more States request it under <strong data-path-to-node=\"15\" data-index-in-node=\"868\">Article 252</strong>. (यदि दो या दो से अधिक राज्य&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"909\">अनुच्छेद 252</strong>&nbsp;के तहत अनुरोध करते हैं, तो संसद राज्य विषयों पर कानून बना सकती है।)</p>"

: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,0,0\" data-index-in-node=\"0\">Railway Police</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,1,0\">Part of the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,1,0\" data-index-in-node=\"12\">State List</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,2,0\" data-index-in-node=\"0\">राज्य सूची</strong> का हिस्सा।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,5,0,0\" data-index-in-node=\"0\">Cyber Law</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,5,1,0\" data-index-in-node=\"0\">Residuary Subject</strong> (Parliament).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,5,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,5,2,0\" data-index-in-node=\"0\">अवशिष्ट विषय</strong> (संसद)।</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"0\">&nbsp;With reference to the legislative and administrative changes during the Company Rule, consider the following statements:</strong><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"124\">(कंपनी शासन के दौरान विधायी और प्रशासनिक परिवर्तनों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><span class=\"\">The </span><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">Regulating Act of 1773</strong><span class=\"\"> was the first step by the British Parliament to regulate the East India Company and it designated the Governor of Bengal as the </span><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"155\">Governor-General of Bengal</strong><span class=\"\">.</span><span class=\"\"> (1773 का रेगुलेटिंग एक्ट ईस्ट इंडिया कंपनी को विनियमित करने के लिए ब्रिटिश संसद का पहला कदम था और इसने बंगाल के गवर्नर को </span><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"305\">बंगाल का गवर्नर-जनरल</strong><span class=\"\"> नामित किया।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><span class=\"\">The </span><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">Pitt&rsquo;s India Act of 1784</strong><span class=\"\"> introduced a \"Double Government\" system by creating the </span><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"85\">Board of Control</strong><span class=\"\"> to manage political affairs.</span><span class=\"\"> (1784 के पिट्स इंडिया एक्ट ने राजनीतिक मामलों के प्रबंधन के लिए </span><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"195\">बोर्ड ऑफ कंट्रोल</strong><span class=\"\"> बनाकर \"दोहरी सरकार\" प्रणाली की शुरुआत की।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><span class=\"\">The </span><strong class=\"\" data-path-to-node=\"5,2,0\" data-index-in-node=\"4\">Charter Act of 1813</strong><span class=\"\"> ended the Company's trade monopoly in India completely,</span><span class=\"\"> including the trade in tea and trade with China.</span><span class=\"\"> (1813 के चार्टर एक्ट ने भारत में कंपनी के व्यापारिक एकाधिकार को पूरी तरह समाप्त कर दिया,</span><span class=\"\"> जिसमें चाय का व्यापार और चीन के साथ व्यापार भी शामिल था।)</span></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><span class=\"\">The </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">Charter Act of 1833</strong><span class=\"\"> made the Governor-General of Bengal the </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"64\">Governor-General of India</strong><span class=\"\">,</span><span class=\"\"> vesting in him all civil and military powers.</span><span class=\"\"> (1833 के चार्टर एक्ट ने बंगाल के गवर्नर-जनरल को </span><strong class=\"\" data-path-to-node=\"5,3,0\" data-index-in-node=\"185\">भारत का गवर्नर-जनरल</strong><span class=\"\"> बना दिया,</span><span class=\"\"> जिसमें सभी नागरिक और सैन्य शक्तियां निहित थीं।)</span></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong class=\"\" data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong><span class=\"\"> A) 1,</span><span class=\"\"> 2,</span><span class=\"\"> and 3 only B) 1,</span><span class=\"\"> 2,</span><span class=\"\"> and 4 only C) 2,</span><span class=\"\"> 3,</span><span class=\"\"> and 4 only D) All of the above</span></p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],

    "solution": "<p><strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"0\">Statement 3 is Incorrect:</strong> The Charter Act of 1813 ended the monopoly in India <strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"78\">except</strong> for trade in tea and trade with China. These remaining monopolies were finally ended by the <strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"177\">Charter Act of 1833</strong>. (तर्क: 1813 के एक्ट ने चाय और चीन के साथ व्यापार को छोड़कर एकाधिकार समाप्त किया। पूर्ण समाप्ति 1833 में हुई।)</p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Regarding the judicial and legislative developments under the Charter Acts, identify the INCORRECT statement:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"113\">(चार्टर एक्ट के तहत न्यायिक और विधायी विकास के संबंध में, गलत कथन की पहचान करें:)</strong></p>\n<p data-path-to-node=\"13\"><span class=\"citation-33\">A) The </span><strong data-path-to-node=\"13\" data-index-in-node=\"7\">Amending Act of 1781</strong><span class=\"citation-33 citation-end-33\"> (Act of Settlement) exempted the Governor-General and his Council from the jurisdiction of the Supreme Court for their official acts.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (1781 के संशोधन अधिनियम ने गवर्नर-जनरल और उनकी परिषद को उनके आधिकारिक कार्यों के लिए सर्वोच्च न्यायालय के अधिकार क्षेत्र से छूट दी।)</p>\n<p data-path-to-node=\"13\">B) <span class=\"citation-32\">The </span><strong data-path-to-node=\"13\" data-index-in-node=\"302\">Charter Act of 1833</strong><span class=\"citation-32\"> established the first </span><strong data-path-to-node=\"13\" data-index-in-node=\"344\">Indian Law Commission</strong><span class=\"citation-32 citation-end-32\"> under the chairmanship of Lord Macaulay.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (1833 के चार्टर एक्ट ने लॉर्ड मैकाले की अध्यक्षता में पहले <strong data-path-to-node=\"13\" data-index-in-node=\"466\">भारतीय विधि आयोग</strong> की स्थापना की।)</p>\n<p data-path-to-node=\"13\"><span class=\"citation-31\">C) The </span><strong data-path-to-node=\"13\" data-index-in-node=\"506\">Charter Act of 1853</strong><span class=\"citation-31 citation-end-31\"> separated the legislative and executive functions of the Governor-General&rsquo;s Council for the first time.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (1853 के चार्टर एक्ट ने पहली बार गवर्नर-जनरल की परिषद के विधायी और कार्यकारी कार्यों को अलग किया।)</p>\n<p data-path-to-node=\"13\">D) The system of open competition for the recruitment of civil servants was successfully introduced for the first time by the <strong data-path-to-node=\"13\" data-index-in-node=\"855\">Charter Act of 1833</strong>. (सिविल सेवकों की भर्ती के लिए खुली प्रतियोगिता की प्रणाली पहली बार <strong data-path-to-node=\"13\" data-index-in-node=\"943\">1833 के चार्टर एक्ट</strong> द्वारा सफलतापूर्वक शुरू की गई थी।)<sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Law Commission of India. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjojZKk-NORAxUAAAAAHQAAAAAQhQQ\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Wikipedia. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjojZKk-NORAxUAAAAAHQAAAAAQhgQ\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p>     "solution": "<p><strong data-path-to-node=\"17,1,0,0\" data-index-in-node=\"0\">Statement D is flawed:</strong><span class=\"citation-30\"> While the Charter Act of 1833 </span><em data-path-to-node=\"17,1,0,0\" data-index-in-node=\"53\">attempted</em><span class=\"citation-30 citation-end-30\"> to introduce open competition, it was opposed by the Court of Directors and was not implemented.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> The system was <strong data-path-to-node=\"17,1,0,0\" data-index-in-node=\"175\">successfully introduced</strong> only by the <strong data-path-to-node=\"17,1,0,0\" data-index-in-node=\"211\">Charter Act of 1853</strong>, following the recommendations of the Macaulay Committee (1854). (तर्क: 1833 में केवल प्रयास किया गया था; सफलतापूर्वक शुरुआत 1853 के एक्ट से हुई थी।)</p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\" data-index-in-node=\"0\">\"Quick-Strike\" Revision Summary Table</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Act (अधिनियम)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0 transparent !important;\" data-turn-source-index=\"12\">12</sup></source-footnote></span></span></td>\n</tr>\n</tbody>\n</table>\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">&nbsp;Historical Background: Company Rule (1773&ndash;1858)</strong></h2>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">इतिहासिक पृष्ठभूमि: कंपनी शासन</strong></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" data-index-in-node=\"0\">1. The Foundation (1773 - 1786)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Act (अधिनियम)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Provisions (प्रमुख प्रावधान)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Logical Crux (महत्व)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\" data-index-in-node=\"0\">Regulating Act, 1773</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\" data-index-in-node=\"0\">Gov. of Bengal</strong> <span class=\"math-inline\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-math=\"\\rightarrow\" data-index-in-node=\"15\">$\\rightarrow$</span> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\" data-index-in-node=\"27\">Gov. General of Bengal</strong> (Warren Hastings). Established SC at Calcutta (1774).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,2,0\">First step of <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,2,0\" data-index-in-node=\"14\">Centralization</strong> in India
