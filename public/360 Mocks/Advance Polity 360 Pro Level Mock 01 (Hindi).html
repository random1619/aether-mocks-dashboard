      "<p>&nbsp;The <strong data-start=\"2541\" data-end=\"2559\">Ninth Schedule</strong>, added by the First Constitutional Amendment Act, 1951, contains laws protected from judicial review; however, laws added after 24 April 1973 are subject to review as per the I.R. Coelho case.</p>\n<p>(नौवीं अनुसूची में कुछ कानूनों को न्यायिक समीक्षा से संरक्षण दिया गया था, लेकिन 24 अप्रैल 1973 के बाद जोड़े गए कानून अब समीक्षा योग्य हैं।)</p>",
      "<p>The <strong data-start=\"2909\" data-end=\"2927\">Tenth Schedule</strong> contains provisions related to disqualification on the ground of defection, whereas the <strong data-start=\"3016\" data-end=\"3050\">Eleventh and Twelfth Schedules</strong> deal with the powers and functions of Panchayats and Municipalities respectively.<br data-start=\"3132\" data-end=\"3135\" /><em data-start=\"3135\" data-end=\"3246\">(दसवीं अनुसूची दल-बदल विरोधी कानून से, ग्यारहवीं व बारहवीं अनुसूचियाँ पंचायतों व नगरपालिकाओं से संबंधित हैं।)</em></p>",
      "<p>The <strong data-start=\"3259\" data-end=\"3280\">Eleventh Schedule</strong> contains 18 functional items related to Urban Local Bodies, while the <strong data-start=\"3351\" data-end=\"3371\">Twelfth Schedule</strong> contains 29 items related to Rural Local Bodies.<br data-start=\"3420\" data-end=\"3423\" /><em data-start=\"3423\" data-end=\"3494\">(ग्यारहवीं अनुसूची में 18 तथा बारहवीं अनुसूची में 29 विषय शामिल हैं।)</em></p>"

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements regarding the initiation and passage of a Constitutional Amendment Bill:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"107\">(संविधान संशोधन विधेयक की शुरुआत और पारित होने के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">A Constitutional Amendment Bill can be initiated in either House of Parliament or by a State Legislature if it concerns federal provisions. (संविधान संशोधन विधेयक संसद के किसी भी सदन में या राज्य विधानमंडल द्वारा शुरू किया जा सकता है यदि यह संघीय प्रावधानों से संबंधित हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Prior recommendation of the President is mandatory to introduce the bill, and it can only be introduced by a Minister. (विधेयक पेश करने के लिए राष्ट्रपति की पूर्व सिफारिश अनिवार्य है, और इसे केवल एक मंत्री द्वारा ही पेश किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">There is no provision for a Joint Sitting (Art. 108) if the two Houses disagree on the bill. (यदि दोनों सदन विधेयक पर असहमत होते हैं, तो संयुक्त बैठक (अनुच्छेद 108) का कोई प्रावधान नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Per the 24th Amendment Act (1971), the President must give assent and cannot return the bill for reconsideration. (24वें संशोधन अधिनियम (1971) के अनुसार, राष्ट्रपति को सहमति देनी होगी और वे पुनर्विचार के लिए विधेयक वापस नहीं कर सकते।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<p data-path-to-node=\"8,0\"><span style=\"font-size: 12pt;\"><strong data-path-to-node=\"8,0\" data-index-in-node=\"16\">Statement 1 is Wrong:</strong> Only Parliament can initiate (States cannot).</span></p>\n<ul data-path-to-node=\"8,1\">\n<li>\n<p data-path-to-node=\"8,1,0,0\"><span style=\"font-size: 12pt;\"><strong data-path-to-node=\"8,1,0,0\" data-index-in-node=\"0\">Statement 2 is Wrong:</strong> No prior permission from the President is needed; it can be introduced by a Minister OR Private Member.</span></p>\n</li>\n<li>\n<p data-path-to-node=\"8,1,1,0\"><span style=\"font-size: 12pt;\"><strong data-path-to-node=\"8,1,1,0\" data-index-in-node=\"0\">Statement 3 &amp; 4 are Correct:</strong> No Joint Sitting allowed, and President's assent is mandatory.</span></p>\n</li>\n</ul>\n<h1 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><span style=\"font-size: 12pt;\">CONSTITUTIONAL AMENDMENT (Article 368)</span></h1>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><span style=\"font-size: 12pt;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">(संविधान संशोधन: अनुच्छेद 368 -</strong></span></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\"><span style=\"font-size: 12pt;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" data-index-in-node=\"0\">&nbsp;Key Steps &amp; Requirements (प्रक्रिया और आवश्यकताएं)</strong></span></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-size: 12pt;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Aspect (पहलू)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-size: 12pt;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Detail (विवरण)</strong></span></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0,0\" data-index-in-node=\"0\">Initiation (शुरुआत)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,1,0\" data-index-in-node=\"0\">Parliament ONLY</strong> (Either Lok Sabha or Rajya Sabha). States cannot initiate. (केवल संसद में।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,2,0,0\" data-index-in-node=\"0\">Who can Introduce</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,2,1,0\" data-index-in-node=\"0\">Minister</strong> OR <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,2,1,0\" data-index-in-node=\"12\">Private Member</strong>. (मंत्री या निजी सदस्य दोनों द्वारा।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,3,0,0\" data-index-in-node=\"0\">Prior Permission</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,3,1,0\" data-index-in-node=\"0\">NOT Required</strong> from the President. (राष्ट्रपति की पूर्व अनुमति आवश्यक नहीं है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,4,0,0\" data-index-in-node=\"0\">Passage (पारित होना)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,4,1,0\">Each House must pass it <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,4,1,0\" data-index-in-node=\"24\">Separately</strong> with a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,4,1,0\" data-index-in-node=\"42\">Special Majority</strong>. (दोनों सदनों द्वारा अलग-अलग विशेष बहुमत से।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,5,0,0\" data-index-in-node=\"0\">Joint Sitting (Art 108)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,5,1,0\" data-index-in-node=\"0\">NO provision</strong> for joint sitting for Amendment Bills. (संयुक्त बैठक का कोई प्रावधान नहीं है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,6,0,0\" data-index-in-node=\"0\">President's Assent</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,6,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,6,1,0\" data-index-in-node=\"0\">Obligatory/Mandatory</strong> (24th Amendment, 1971). (राष्ट्रपति को सहमति देनी ही होगी।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,7,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,7,0,0\" data-index-in-node=\"0\">Veto Power</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,7,1,0\">President <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,7,1,0\" data-index-in-node=\"10\">CANNOT</strong> withhold or return the bill. (न तो रोक सकते हैं, न ही वापस भेज सकते हैं।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,8,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,8,0,0\" data-index-in-node=\"0\">State Role</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important; font-size: 12pt;\" data-path-to-node=\"6,8,1,0\">Limited to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,8,1,0\" data-index-in-node=\"11\">Ratification</strong> of federal provisions only. (केवल संघीय प्रावधानों की पुष्टि तक सीमित।)</span></td>\n</tr>\n</tbody>\n</table>",

    "solution": "<p data-path-to-node=\"16,0\"><span style=\"font-size: 10pt;\"><strong data-path-to-node=\"16,0\" data-index-in-node=\"16\">Simple Majority (Outside 368):</strong> Citizenship, Quorum, New States, Salaries, SC Puisne judges.</span></p>\n<ul data-path-to-node=\"16,1\">\n<li>\n<p data-path-to-node=\"16,1,0,0\"><span style=\"font-size: 10pt;\"><strong data-path-to-node=\"16,1,0,0\" data-index-in-node=\"0\">Special Majority (Under 368):</strong> FRs and DPSPs.</span></p>\n</li>\n<li>\n<p data-path-to-node=\"16,1,1,0\"><span style=\"font-size: 10pt;\"><strong data-path-to-node=\"16,1,1,0\" data-index-in-node=\"0\">Special Majority + States:</strong> Federal matters like President's Election, 7th Schedule, and the Judiciary.</span></p>\n</li>\n</ul>\n<h1 data-start=\"201\" data-end=\"249\"><span style=\"font-size: 10pt;\">📘 CONSTITUTIONAL AMENDMENT &mdash; MAJORITY TYPES</span><span style=\"font-size: 10pt;\">(बहुमत की तीन श्रेणियां)</span></h1>\n<hr data-start=\"279\" data-end=\"282\" />\n<h2 data-start=\"284\" data-end=\"346\"><span style=\"font-size: 10pt;\">🅰️ <strong data-start=\"291\" data-end=\"344\">Category A: Simple Majority (Outside Article 368)</strong></span></h2>\n<h3 data-start=\"347\" data-end=\"390\"><span style=\"font-size: 10pt;\"><em data-start=\"351\" data-end=\"390\">(साधारण बहुमत &mdash; अनुच्छेद 368 के बाहर)</em></span></h3>\n<p data-start=\"392\" data-end=\"414\"><span style=\"font-size: 10pt;\"><strong data-start=\"392\" data-end=\"412\">Nature (स्वरूप):</strong></span></p>\n<ul data-start=\"415\" data-end=\"541\">\n<li data-start=\"415\" data-end=\"469\">\n<p data-start=\"417\" data-end=\"469\"><span style=\"font-size: 10pt;\">Amendment is treated like <strong data-start=\"443\" data-end=\"466\">ordinary law-making</strong>.</span></p>\n</li>\n<li data-start=\"470\" data-end=\"541\">\n<p data-start=\"472\" data-end=\"541\"><span style=\"font-size: 10pt;\">Constitutional amendment <strong data-start=\"497\" data-end=\"540\">procedure of Article 368 does NOT apply</strong>.</span></p>\n</li>\n</ul>\n<h3 data-start=\"543\" data-end=\"576\"><span style=\"font-size: 10pt;\"><strong data-start=\"547\" data-end=\"576\">Key Provisions / Examples</strong></span></h3>\n<p data-start=\"578\" data-end=\"615\"><span style=\"font-size: 10pt;\"><strong data-start=\"578\" data-end=\"613\">Admission / Formation of States</strong></span></p>\n<ul data-start=\"616\" data-end=\"745\">\n<li data-start=\"616\" data-end=\"646\">\n<p data-start=\"618\" data-end=\"646\"><span style=\"font-size: 10pt;\">New States &mdash; <strong data-start=\"631\" data-end=\"644\">Article 2</strong></span></p>\n</li>\n<li data-start=\"647\" data-end=\"745\">\n<p data-start=\"649\" data-end=\"745\"><span style=\"font-size: 10pt;\">Formation, names, boundaries of States &mdash; <strong data-start=\"690\" data-end=\"703\">Article 3</strong></span><br data-start=\"703\" data-end=\"706\" /><span style=\"font-size: 10pt;\"> <em data-start=\"706\" data-end=\"745\">(नए राज्य, सीमाओं/नामों में परिवर्तन)</em></span></p>\n</li>\n</ul>\n<p data-start=\"747\" data-end=\"785\"><span style=\"font-size: 10pt;\"><strong data-start=\"747\" data-end=\"783\">Legislative &amp; Procedural Matters</strong></span></p>\n<ul data-start=\"786\" data-end=\"964\">\n<li data-start=\"786\" data-end=\"849\">\n<p data-start=\"788\" data-end=\"849\"><span style=\"font-size: 10pt;\">Creation / Abolition of Legislative Councils &mdash; <strong data-start=\"835\" data-end=\"847\">Art. 169</strong></span></p>\n</li>\n<li data-start=\"850\" data-end=\"889\">\n<p data-start=\"852\" data-end=\"889\"><span style=\"font-size: 10pt;\">Quorum in Parliament &mdash; <strong data-start=\"875\" data-end=\"887\">Art. 100</strong></span></p>\n</li>\n<li data-start=\"890\" data-end=\"964\">\n<p data-start=\"892\" data-end=\"964\"><span style=\"font-size: 10pt;\">Rules of procedure in Parliament</span><br data-start=\"924\" data-end=\"927\" /><span style=\"font-size: 10pt;\"> <em data-start=\"927\" data-end=\"964\">(विधान परिषद, कोरम, कार्यविधि नियम)</em></span></p>\n</li>\n</ul>\n<p data-start=\"966\" data-end=\"998\"><span style=\"font-size: 10pt;\"><strong data-start=\"966\" data-end=\"996\">Other Important Provisions</strong></span></p>\n<ul data-start=\"999\" data-end=\"1312\">\n<li data-start=\"999\" data-end=\"1057\">\n<p data-start=\"1001\" data-end=\"1057\"><span style=\"font-size: 10pt;\"><strong data-start=\"1001\" data-end=\"1020\">Second Schedule</strong> (Salaries, allowances, privileges)</span></p>\n</li>\n<li data-start=\"1058\" data-end=\"1090\">\n<p data-start=\"1060\" data-end=\"1090\"><span style=\"font-size: 10pt;\">Salaries &amp; allowances of MPs</span></p>\n</li>\n<li data-start=\"1091\" data-end=\"1139\">\n<p data-start=\"1093\" data-end=\"1139\"><span style=\"font-size: 10pt;\">Number of <strong data-start=\"1103\" data-end=\"1137\">Puisne Judges of Supreme Court</strong></span></p>\n</li>\n<li data-start=\"1140\" data-end=\"1172\">\n<p data-start=\"1142\" data-end=\"1172\"><span style=\"font-size: 10pt;\">Citizenship &mdash; <strong data-start=\"1156\" data-end=\"1170\">Arts. 5&ndash;11</strong></span></p>\n</li>\n<li data-start=\"1173\" data-end=\"1207\">\n<p data-start=\"1175\" data-end=\"1207\"><span style=\"font-size: 10pt;\">Delimitation of constituencies</span></p>\n</li>\n<li data-start=\"1208\" data-end=\"1256\">\n<p data-start=\"1210\" data-end=\"1256\"><span style=\"font-size: 10pt;\">Elections to Parliament &amp; State Legislatures</span></p>\n</li>\n<li data-start=\"1257\" data-end=\"1288\">\n<p data-start=\"1259\" data-end=\"1288\"><span style=\"font-size: 10pt;\"><strong data-start=\"1259\" data-end=\"1286\">Fifth &amp; Sixth Schedules</strong></span></p>\n</li>\n<li data-start=\"1289\" data-end=\"1312\">\n<p data-start=\"1291\" data-end=\"1312\"><span style=\"font-size: 10pt;\"><strong data-start=\"1291\" data-end=\"1312\">Union Territories</strong></span></p>\n</li>\n</ul>\n<p data-start=\"1314\" data-end=\"1333\"><span style=\"font-size: 10pt;\">📌 <strong data-start=\"1317\" data-end=\"1331\">Exam Rule:</strong></span></p>\n<blockquote data-start=\"1334\" data-end=\"1401\">\n<p data-start=\"1336\" data-end=\"1401\"><span style=\"font-size: 10pt;\"><em data-start=\"1336\" data-end=\"1401\">If amendment looks administrative/procedural &rarr; Simple Majority.</em></span></p>\n</blockquote>\n<hr data-start=\"1403\" data-end=\"1406\" />\n<h2 data-start=\"1408\" data-end=\"1469\"><span style=\"font-size: 10pt;\">🅱️ <strong data-start=\"1415\" data-end=\"1467\">Category B: Special Majority (Under Article 368)</strong></span></h2>\n<h3 data-start=\"1470\" data-end=\"1515\"><span style=\"font-size: 10pt;\"><em data-start=\"1474\" data-end=\"1515\">(विशेष बहुमत &mdash; अनुच्छेद 368 के अंतर्गत)</em></span></h3>\n<p data-start=\"1517\" data-end=\"1556\"><span style=\"font-size: 10pt;\"><strong data-start=\"1517\" data-end=\"1554\">Majority Required (आवश्यक बहुमत):</strong></span></p>\n<ul data-start=\"1557\" data-end=\"1654\">\n<li data-start=\"1557\" data-end=\"1612\">\n<p data-start=\"1559\" data-end=\"1612\"><span style=\"font-size: 10pt;\"><strong data-start=\"1559\" data-end=\"1598\">Majority of total membership (50%+)</strong></span><br data-start=\"1598\" data-end=\"1601\" /><span style=\"font-size: 10pt;\"> <strong data-start=\"1603\" data-end=\"1610\">AND</strong></span></p>\n</li>\n<li data-start=\"1613\" data-end=\"1654\">\n<p data-start=\"1615\" data-end=\"1654\"><span style=\"font-size: 10pt;\"><strong data-start=\"1615\" data-end=\"1654\">2/3rd of members present and voting</strong></span></p>\n</li>\n</ul>\n<h3 data-start=\"1656\" data-end=\"1682\"><span style=\"font-size: 10pt;\"><strong data-start=\"1660\" data-end=\"1682\">Provisions Covered</strong></span></h3>\n<p data-start=\"1684\" data-end=\"1716\"><span style=\"font-size: 10pt;\"><strong data-start=\"1684\" data-end=\"1714\">Core Constitutional Values</strong></span></p>\n<ul data-start=\"1717\" data-end=\"1807\">\n<li data-start=\"1717\" data-end=\"1754\">\n<p data-start=\"1719\" data-end=\"1754\"><span style=\"font-size: 10pt;\"><strong data-start=\"1719\" data-end=\"1752\">Fundamental Rights &mdash; Part III</strong></span></p>\n</li>\n<li data-start=\"1755\" data-end=\"1807\">\n<p data-start=\"1757\" data-end=\"1807\"><span style=\"font-size: 10pt;\"><strong data-start=\"1757\" data-end=\"1807\">Directive Principles of State Policy &mdash; Part IV</strong></span></p>\n</li>\n</ul>\n<p data-start=\"1809\" data-end=\"1832\"><span style=\"font-size: 10pt;\"><strong data-start=\"1809\" data-end=\"1830\">Residual Category</strong></span></p>\n<ul data-start=\"1833\" data-end=\"1956\">\n<li data-start=\"1833\" data-end=\"1956\">\n<p data-start=\"1835\" data-end=\"1874\"><span style=\"font-size: 10pt;\">All provisions <strong data-start=\"1850\" data-end=\"1865\">not covered</strong> under:</span></p>\n<ul data-start=\"1877\" data-end=\"1956\">\n<li data-start=\"1877\" data-end=\"1905\">\n<p data-start=\"1879\" data-end=\"1905\"><span style=\"font-size: 10pt;\">Simple Majority category</span></p>\n</li>\n<li data-start=\"1908\" data-end=\"1956\">\n<p data-start=\"1910\" data-end=\"1956\"><span style=\"font-size: 10pt;\">Special Majority + State Ratification category</span></p>\n</li>\n</ul>\n</li>\n</ul>\n<p data-start=\"1958\" data-end=\"1977\"><span style=\"font-size: 10pt;\">📌 <strong data-start=\"1961\" data-end=\"1975\">Exam Rule:</strong></span></p>\n<blockquote data-start=\"1978\" data-end=\"2031\">\n<p data-start=\"1980\" data-end=\"2031\"><span style=\"font-size: 10pt;\"><em data-start=\"1980\" data-end=\"2031\">Default category of amendment = Special Majority.</em></span></p>\n</blockquote>\n<hr data-start=\"2033\" data-end=\"2036\" />\n<h2 data-start=\"2038\" data-end=\"2108\"><span style=\"font-size: 10pt;\">🅲 <strong data-start=\"2044\" data-end=\"2106\">Category C: Special Majority + State Consent (Article 368)</strong></span></h2>\n<h3 data-start=\"2109\" data-end=\"2150\"><span style=\"font-size: 10pt;\"><em data-start=\"2113\" data-end=\"2150\">(विशेष बहुमत + राज्यों की स्वीकृति)</em></span></h3>\n<p data-start=\"2152\" data-end=\"2190\"><span style=\"font-size: 10pt;\"><strong data-start=\"2152\" data-end=\"2188\">Majority Required (दोहरा बहुमत):</strong></span></p>\n<ul data-start=\"2191\" data-end=\"2329\">\n<li data-start=\"2191\" data-end=\"2242\">\n<p data-start=\"2193\" data-end=\"2242\"><span style=\"font-size: 10pt;\"><strong data-start=\"2193\" data-end=\"2227\">Special Majority in Parliament</strong></span><br data-start=\"2227\" data-end=\"2230\" /><span style=\"font-size: 10pt;\"> <strong data-start=\"2232\" data-end=\"2240\">PLUS</strong></span></p>\n</li>\n<li data-start=\"2243\" data-end=\"2329\">\n<p data-start=\"2245\" data-end=\"2329\"><span style=\"font-size: 10pt;\"><strong data-start=\"2245\" data-end=\"2297\">Ratification by at least &frac12; of State Legislatures</strong></span><br data-start=\"2297\" data-end=\"2300\" /><span style=\"font-size: 10pt;\"> (Simple Majority in states)</span></p>\n</li>\n</ul>\n<h3 data-start=\"2331\" data-end=\"2365\"><span style=\"font-size: 10pt;\"><strong data-start=\"2335\" data-end=\"2365\">Federal Provisions Covered</strong></span></h3>\n<p data-start=\"2367\" data-end=\"2394\"><span style=\"font-size: 10pt;\"><strong data-start=\"2367\" data-end=\"2392\">President &amp; Executive</strong></span></p>\n<ul data-start=\"2395\" data-end=\"2495\">\n<li data-start=\"2395\" data-end=\"2448\">\n<p data-start=\"2397\" data-end=\"2448\"><span style=\"font-size: 10pt;\">Election of President &amp; manner &mdash; <strong data-start=\"2430\" data-end=\"2446\">Arts. 54, 55</strong></span></p>\n</li>\n<li data-start=\"2449\" data-end=\"2495\">\n<p data-start=\"2451\" data-end=\"2495\"><span style=\"font-size: 10pt;\">Extent of executive powers of Union &amp; States</span></p>\n</li>\n</ul>\n<p data-start=\"2497\" data-end=\"2512\"><span style=\"font-size: 10pt;\"><strong data-start=\"2497\" data-end=\"2510\">Judiciary</strong></span></p>\n<ul data-start=\"2513\" data-end=\"2563\">\n<li data-start=\"2513\" data-end=\"2563\">\n<p data-start=\"2515\" data-end=\"2563\"><span style=\"font-size: 10pt;\">Supreme Court &amp; High Courts &mdash; <strong data-start=\"2545\" data-end=\"2563\">Arts. 124, 214</strong></span></p>\n</li>\n</ul>\n<p data-start=\"2565\" data-end=\"2592\"><span style=\"font-size: 10pt;\"><strong data-start=\"2565\" data-end=\"2590\">Union&ndash;State Relations</strong></span></p>\n<ul data-start=\"2593\" data-end=\"2703\">\n<li data-start=\"2593\" data-end=\"2631\">\n<p data-start=\"2595\" data-end=\"2631\"><span style=\"font-size: 10pt;\">Distribution of legislative powers</span></p>\n</li>\n<li data-start=\"2632\" data-end=\"2703\">\n<p data-start=\"2634\" data-end=\"2703\"><span style=\"font-size: 10pt;\"><strong data-start=\"2634\" data-end=\"2688\">Seventh Schedule (Union, State &amp; Concurrent Lists)</strong> &mdash; <strong data-start=\"2691\" data-end=\"2703\">Art. 246</strong></span></p>\n</li>\n</ul>\n<p data-start=\"2705\" data-end=\"2725\"><span style=\"font-size: 10pt;\"><strong data-start=\"2705\" data-end=\"2723\">Representation</strong></span></p>\n<ul data-start=\"2726\" data-end=\"2766\">\n<li data-start=\"2726\" data-end=\"2766\">\n<p data-start=\"2728\" data-end=\"2766\"><span style=\"font-size: 10pt;\">Representation of States in Parliament</span></p>\n</li>\n</ul>\n<p data-start=\"2768\" data-end=\"2795\"><span style=\"font-size: 10pt;\"><strong data-start=\"2768\" data-end=\"2793\">Self-Amendment Clause</strong></span></p>\n<ul data-start=\"2796\" data-end=\"2820\">\n<li data-start=\"2796\" data-end=\"2820\">\n<p data-start=\"2798\" data-end=\"2820\"><span style=\"font-size: 10pt;\"><strong data-start=\"2798\" data-end=\"2820\">Article 368 itself</strong></span></p>\n</li>\n</ul>\n<p data-start=\"2822\" data-end=\"2841\"><span style=\"font-size: 10pt;\">📌 <strong data-start=\"2825\" data-end=\"2839\">Exam Rule:</strong></span></p>\n<blockquote data-start=\"2842\" data-end=\"2908\">\n<p data-start=\"2844\" data-end=\"2908\"><span style=\"font-size: 10pt;\"><em data-start=\"2844\" data-end=\"2908\">Anything affecting federal balance &rarr; States&rsquo; consent required.</em></span></p>\n</blockquote>\n<hr data-start=\"2910\" data-end=\"2913\" />\n<h2 data-start=\"2915\" data-end=\"2944\"><span style=\"font-size: 10pt;\">🧠 <strong data-start=\"2921\" data-end=\"2944\">ONE-LOOK MEMORY KEY</strong></span></h2>\n<ul data-start=\"2946\" data-end=\"3140\">\n<li data-start=\"2946\" data-end=\"3013\">\n<p data-start=\"2948\" data-end=\"3013\"><span style=\"font-size: 10pt;\"><strong data-start=\"2948\" data-end=\"2967\">Simple Majority</strong> &rarr; States, salaries, citizenship, procedures</span></p>\n</li>\n<li data-start=\"3014\" data-end=\"3068\">\n<p data-start=\"3016\" data-end=\"3068\"><span style=\"font-size: 10pt;\"><strong data-start=\"3016\" data-end=\"3036\">Special Majority</strong> &rarr; FRs, DPSPs, rest provisions</span></p>\n</li>\n<li data-start=\"3069\" data-end=\"3140\">\n<p data-start=\"3071\" data-end=\"3140\"><span style=\"font-size: 10pt;\"><strong data-start=\"3071\" data-end=\"3091\">Special + States</strong> &rarr; President, Judiciary, 7th Schedule, federalism</span></p>\n</li>\n</ul>\n<hr data-start=\"3142\" data-end=\"3145\" />\n<h2 data-start=\"3147\" data-end=\"3174\"><span style=\"font-size: 10pt;\">⚠️ <strong data-start=\"3153\" data-end=\"3174\">COMMON EXAM TRAPS</strong></span></h2>\n<p></p>\n<ul data-start=\"3175\" data-end=\"3333\">\n<li data-start=\"3175\" data-end=\"3221\">\n<p data-start=\"3177\" data-end=\"3221\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"3179\" data-end=\"3211\">FRs amended by simple majority</em> &mdash; WRONG</span></p>\n</li>\n<li data-start=\"3222\" data-end=\"3279\">\n<p data-start=\"3224\" data-end=\"3279\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"3226\" data-end=\"3269\">All amendments require state ratification</em> &mdash; WRONG</span></p>\n</li>\n<li data-start=\"3280\" data-end=\"3333\">\n<p data-start=\"3282\" data-end=\"3333\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"3284\" data-end=\"3323\">Article 368 amendments = ordinary law</em> &mdash; WRONG</span></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">With reference to the Indian Constitution, consider the following points:</strong> <strong data-path-to-node=\"20\" data-index-in-node=\"74\">(भारतीय संविधान के संदर्भ में, निम्नलिखित बिंदुओं पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"21\">\n<li>\n<p data-path-to-node=\"21,0,0\">The <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"4\">Kesavananda Bharati case (1973)</strong> established that Parliament can amend any part of the Constitution, but cannot destroy its 'Basic Structure'. (केशवानंद भारती मामले (1973) ने स्थापित किया कि संसद संविधान के किसी भी हिस्से में संशोधन कर सकती है, लेकिन इसके 'बुनियादी ढांचे' को नष्ट नहीं कर सकती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,1,0\">One flaw in the process is that the Constitution specifies a strict time limit (6 months) for States to ratify an amendment. (प्रक्रिया में एक खामी यह है कि संविधान राज्यों द्वारा संशोधन की पुष्टि करने के लिए एक सख्त समय सीमा (6 महीने) निर्दिष्ट करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,2,0\">States can only initiate a change regarding the creation or abolition of Legislative Councils (Art. 169). (राज्य केवल विधान परिषदों के निर्माण या उन्मूलन (अनुच्छेद 169) के संबंध में बदलाव शुरू कर सकते हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",
    "comp": "",
    "options": [
      "<p>&nbsp;1 and 2 only&nbsp;</p>",
      "<p>&nbsp;2 and 3 only&nbsp;</p>",
      "<p>&nbsp;1 and 3 only&nbsp;</p>",
      "<p>&nbsp;1, 2, and 3</p>"
    ],
    "correct_option_id": 2,
    "solution": "<p data-path-to-node=\"24,0\"><strong data-path-to-node=\"24,0\" data-index-in-node=\"16\">Statement 2 is Wrong:</strong> The theory explicitly states that the Constitution does <strong data-path-to-node=\"24,0\" data-index-in-node=\"94\">not</strong> mention a time limit for state ratification.</p>\n<ul data-path-to-node=\"24,1\">\n<li>\n<p data-path-to-node=\"24,1,0,0\"><strong data-path-to-node=\"24,1,0,0\" data-index-in-node=\"0\">Statements 1 &amp; 3 are Correct:</strong> 1973 case defines Basic Structure, and Art. 169 is the only way states provide input for change</p>\n</li>\n</ul>\n<h3 data-path-to-node=\"26\"><strong data-path-to-node=\"26\" data-index-in-node=\"0\">One-Line Revision Cheat-Sheet</strong></h3>\n<ul data-path-to-node=\"27\">\n<li>\n<p data-path-to-node=\"27,0,0\"><strong data-path-to-node=\"27,0,0\" data-index-in-node=\"0\">Minister/Private Member:</strong> Both can introduce. (दोनों पेश कर सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,1,0\"><strong data-path-to-node=\"27,1,0\" data-index-in-node=\"0\">Joint Sitting:</strong> Strictly <strong data-path-to-node=\"27,1,0\" data-index-in-node=\"24\">NO</strong>. (बिल्कुल नहीं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,2,0\"><strong data-path-to-node=\"27,2,0\" data-index-in-node=\"0\">President Assent:</strong> Mandatory (24th CAA 1971). (अनिवार्य है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,3,0\"><strong data-path-to-node=\"27,3,0\" data-index-in-node=\"0\">Simple Majority:</strong> Admission of states, Quorum, Delimitation. (साधारण बहुमत।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,4,0\"><strong data-path-to-node=\"27,4,0\" data-index-in-node=\"0\">State Ratification:</strong> Only 1/2 states needed by <strong data-path-to-node=\"27,4,0\" data-index-in-node=\"46\">Simple Majority</strong>. (आधे राज्य, साधारण बहुमत से।)</p>\n</li>\n</ul>\n<h3 data-path-to-node=\"19\"><strong data-path-to-node=\"19\" data-index-in-node=\"0\">&nbsp;Important Judgement: Basic Structure Doctrine</strong></h3>\n<ul data-path-to-node=\"20\">\n<li>\n<p data-path-to-node=\"20,0,0\"><strong data-path-to-node=\"20,0,0\" data-index-in-node=\"0\">Case:</strong> <strong data-path-to-node=\"20,0,0\" data-index-in-node=\"6\">Kesavananda Bharati v. State of Kerala (1973)</strong>.</p>\n</li>\n<li>\n<p data-path-to-node=\"20,1,0\"><strong data-path-to-node=\"20,1,0\" data-index-in-node=\"0\">Outcome:</strong> Parliament can amend <strong data-path-to-node=\"20,1,0\" data-index-in-node=\"30\">ANY</strong> part (including Fundamental Rights) but <strong data-path-to-node=\"20,1,0\" data-index-in-node=\"74\">CANNOT</strong> alter the <strong data-path-to-node=\"20,1,0\" data-index-in-node=\"91\">'Basic Structure'</strong>.</p>\n</li>\n<li>\n<p data-path-to-node=\"20,2,0\"><strong data-path-to-node=\"20,2,0\" data-index-in-node=\"0\">Result:</strong> Established the <strong data-path-to-node=\"20,2,0\" data-index-in-node=\"24\">Supremacy of the Constitution</strong>.</p>\n</li>\n</ul>\n<hr data-path-to-node=\"21\" />\n<h3 data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">4. Major Flaws in the Process (प्रक्रिया में कमियां)</strong></h3>\n<ul data-path-to-node=\"23\">\n<li>\n<p data-path-to-node=\"23,0,0\"><strong data-path-to-node=\"23,0,0\" data-index-in-node=\"0\">Initiation:</strong> States cannot propose amendments (except Art 169 request).</p>\n</li>\n<li>\n<p data-path-to-node=\"23,1,0\"><strong data-path-to-node=\"23,1,0\" data-index-in-node=\"0\">State Input:</strong> Consent is required for only a few federal cases.</p>\n</li>\n<li>\n<p data-path-to-node=\"23,2,0\"><strong data-path-to-node=\"23,2,0\" data-index-in-node=\"0\">No Time Limit:</strong> The Constitution does <strong data-path-to-node=\"23,2,0\" data-index-in-node=\"37\">NOT</strong> mention a time limit for states to ratify/reject.</p>\n</li>\n<li>\n<p data-path-to-node=\"23,3,0\"><strong data-path-to-node=\"23,3,0\" data-index-in-node=\"0\">Withdrawal:</strong> Unclear if a state can withdraw approval once given.</p>\n</li>\n<li>\n<p data-path-to-node=\"23,4,0\"><strong data-path-to-node=\"23,4,0\" data-index-in-node=\"0\">Deadlock:</strong> No special body (Convention) or Joint Sitting to resolve disagreements.</p>\n</li>\n</ul>\n<hr data-path-to-node=\"24\" />\n<h3 data-path-to-node=\"25\"><strong data-path-to-node=\"25\" data-index-in-node=\"0\">🚀 THE \"CRISP\" CHEAT SHEET (For 100% Accuracy)</strong></h3>\n<ul data-path-to-node=\"26\">\n<li>\n<p data-path-to-node=\"26,0,0\"><strong data-path-to-node=\"26,0,0\" data-index-in-node=\"0\">Art. 2 &amp; 3:</strong> Simple Majority.</p>\n</li>\n<li>\n<p data-path-to-node=\"26,1,0\"><strong data-path-to-node=\"26,1,0\" data-index-in-node=\"0\">Art. 169 (Legislative Council):</strong> Simple Majority.</p>\n</li>\n<li>\n<p data-path-to-node=\"26,2,0\"><strong data-path-to-node=\"26,2,0\" data-index-in-node=\"0\">Art. 368 (Amendment itself):</strong> Special Majority + States.</p>\n</li>\n<li>\n<p data-path-to-node=\"26,3,0\"><strong data-path-to-node=\"26,3,0\" data-index-in-node=\"0\">7th Schedule:</strong> Special Majority + States.</p>\n</li>\n<li>\n<p data-path-to-node=\"26,4,0\"><strong data-path-to-node=\"26,4,0\" data-index-in-node=\"0\">Fundamental Rights:</strong> Special Majority only.</p>\n</li>\n<li>\n<p data-path-to-node=\"26,5,0\"><strong data-path-to-node=\"26,5,0\" data-index-in-node=\"0\">Presidential Election:</strong> Special Majority + States.</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements based on the evolution of the Indian Constitution:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"85\">(भारतीय संविधान के विकास के आधार पर निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">1st CAA (1951)</strong> added the Ninth Schedule to protect land reforms and introduced \"Public Order\" as a ground for restricting free speech under Article 19. (प्रथम संशोधन (1951) ने भूमि सुधारों की रक्षा के लिए नौवीं अनुसूची जोड़ी और अनुच्छेद 19 के तहत अभिव्यक्ति की स्वतंत्रता को प्रतिबंधित करने के लिए \"लोक व्यवस्था\" को एक आधार के रूप में पेश किया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">7th CAA (1956)</strong> reorganized India into 14 States and 6 UTs and allowed for a common High Court and a common Governor for two or more States. (7वें संशोधन (1956) ने भारत को 14 राज्यों और 6 केंद्र शासित प्रदेशों में पुनर्गठित किया और दो या दो से अधिक राज्यों के लिए एक साझा उच्च न्यायालय और एक साझा राज्यपाल का प्रावधान किया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"4\">9th CAA (1960)</strong> incorporated Puducherry into the Indian Union, while the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"76\">14th CAA (1962)</strong> handled the cession of Berubari Union to Pakistan. (9वें संशोधन (1960) ने पुडुचेरी को भारतीय संघ में शामिल किया, जबकि 14वें संशोधन (1962) ने बेरुबारी यूनियन को पाकिस्तान को सौंपने का कार्य किया।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Match the following Constitutional Amendment Acts with their primary objective:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(निम्नलिखित संविधान संशोधन अधिनियमों को उनके प्राथमिक उद्देश्य के साथ सुमेलित करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">CAA (संशोधन)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Objective (उद्देश्य)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">I. 16th CAA (1963)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\" data-index-in-node=\"0\">A.</strong> Abolished Privy Purses and privileges of former princely rulers. (भूतपूर्व रियासतों के राजाओं के प्रिवी पर्स और विशेषाधिकारों को समाप्त किया।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">II. 24th CAA (1971)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\" data-index-in-node=\"0\">B.</strong> Limited the Right to Property and protected laws implementing DPSPs (Art. 39b/c). (संपत्ति के अधिकार को सीमित किया और DPSPs (39b/c) को लागू करने वाले कानूनों की रक्षा की।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">III. 25th CAA (1971)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\" data-index-in-node=\"0\">C.</strong> Required oaths of office to include commitments to India&rsquo;s sovereignty and integrity. (कार्यालय की शपथ में भारत की संप्रभुता और अखंडता के प्रति प्रतिबद्धता को शामिल करना अनिवार्य किया।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">IV. 26th CAA (1971)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\" data-index-in-node=\"0\">D.</strong> Made it compulsory for the President to give assent to a Constitutional Amendment Bill. (राष्ट्रपति के लिए संविधान संशोधन विधेयक पर सहमति देना अनिवार्य कर दिया।)</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"14\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">Choose the correct code / सही कोड चुनें</strong></p>",

    "question": "<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">With reference to the constitutional status of territories and election disputes, consider the following points:</strong> <strong data-path-to-node=\"20\" data-index-in-node=\"113\">(क्षेत्रों की संवैधानिक स्थिति और चुनाव विवादों के संदर्भ में, निम्नलिखित बिंदुओं पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"21\">\n<li>\n<p data-path-to-node=\"21,0,0\">The <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"4\">35th CAA (1974)</strong> conferred the status of an 'Associate State' on Sikkim, while the <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"86\">36th CAA (1975)</strong> made it a full-fledged State of the Indian Union. (35वें संशोधन (1974) ने सिक्किम को 'संबद्ध राज्य' का दर्जा दिया, जबकि 36वें संशोधन (1975) ने इसे भारतीय संघ का पूर्ण राज्य बना दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,1,0\">The <strong data-path-to-node=\"21,1,0\" data-index-in-node=\"4\">39th CAA (1975)</strong> placed the election of the President, VP, PM, and Speaker beyond the scrutiny of the courts. (39वें संशोधन (1975) ने राष्ट्रपति, उपराष्ट्रपति, प्रधानमंत्री और अध्यक्ष के चुनाव को अदालतों की जांच के दायरे से बाहर कर दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,2,0\">The 35th CAA added a Tenth Schedule for Sikkim&rsquo;s association, which was subsequently omitted by the 36th CAA. (35वें संशोधन ने सिक्किम के जुड़ाव के लिए दसवीं अनुसूची जोड़ी, जिसे बाद में 36वें संशोधन द्वारा हटा दिया गया।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<h2 data-start=\"2520\" data-end=\"2555\"><strong data-start=\"2526\" data-end=\"2555\">FINAL ONE-LINE MEMORY SET</strong></h2>\n<p></p>\n<ul data-start=\"2556\" data-end=\"2868\">\n<li data-start=\"2556\" data-end=\"2603\">\n<p data-start=\"2558\" data-end=\"2603\"><strong data-start=\"2558\" data-end=\"2565\">1st</strong> &rarr; OBCs, 9th Schedule, Art 19 limits</p>\n</li>\n<li data-start=\"2604\" data-end=\"2652\">\n<p data-start=\"2606\" data-end=\"2652\"><strong data-start=\"2606\" data-end=\"2613\">7th</strong> &rarr; States reorganisation, HC/Governor</p>\n</li>\n<li data-start=\"2653\" data-end=\"2675\">\n<p data-start=\"2655\" data-end=\"2675\"><strong data-start=\"2655\" data-end=\"2662\">9th</strong> &rarr; Berubari</p>\n</li>\n<li data-start=\"2676\" data-end=\"2701\">\n<p data-start=\"2678\" data-end=\"2701\"><strong data-start=\"2678\" data-end=\"2686\">14th</strong> &rarr; Puducherry</p>\n</li>\n<li data-start=\"2702\" data-end=\"2738\">\n<p data-start=\"2704\" data-end=\"2738\"><strong data-start=\"2704\" data-end=\"2712\">24th</strong> &rarr; President must assent</p>\n</li>\n<li data-start=\"2739\" data-end=\"2770\">\n<p data-start=\"2741\" data-end=\"2770\"><strong data-start=\"2741\" data-end=\"2749\">26th</strong> &rarr; Privy purse gone</p>\n</li>\n<li data-start=\"2771\" data-end=\"2815\">\n<p data-start=\"2773\" data-end=\"2815\"><strong data-start=\"2773\" data-end=\"2786\">35th&ndash;36th</strong> &rarr; Sikkim associate &rarr; State</p>\n</li>\n<li data-start=\"2816\" data-end=\"2868\">\n<p data-start=\"2818\" data-end=\"2868\"><strong data-start=\"2818\" data-end=\"2826\">39th</strong> &rarr; Top elections beyond courts (Emergency)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements regarding the major constitutional shifts between 1976 and 1985:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"99\">(1976 और 1985 के बीच प्रमुख संवैधानिक बदलावों के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">42nd CAA (1976)</strong> added \"Socialist, Secular, and Integrity\" to the Preamble, introduced Fundamental Duties (Part IV-A), and shifted five subjects (Education, Forests, etc.) to the Concurrent List. (42वें संशोधन (1976) ने प्रस्तावना में \"समाजवादी, पंथनिरपेक्ष और अखंडता\" शब्द जोड़े, मौलिक कर्तव्य (भाग IV-A) पेश किए, और पांच विषयों (शिक्षा, वन, आदि) को समवर्ती सूची में स्थानांतरित किया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">44th CAA (1978)</strong> replaced &lsquo;internal disturbance&rsquo; with &lsquo;armed rebellion&rsquo;, made Cabinet's written advice mandatory for Emergency, and ensured Articles 20 and 21 cannot be suspended during an Emergency. (44वें संशोधन (1978) ने 'आंतरिक अशांति' को 'सशस्त्र विद्रोह' से बदल दिया, आपातकाल के लिए कैबिनेट की लिखित सलाह अनिवार्य की, और यह सुनिश्चित किया कि आपातकाल के दौरान अनुच्छेद 20 और 21 को निलंबित नहीं किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"4\">52nd CAA (1985)</strong> added the Tenth Schedule (Anti-Defection Law), while the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"77\">42nd CAA</strong> had earlier established that DPSPs are superior to Fundamental Rights. (52वें संशोधन (1985) ने दसवीं अनुसूची (दल-बदल विरोधी कानून) जोड़ी, जबकि <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"228\">42वें संशोधन</strong> ने पहले ही यह स्थापित कर दिया था कि DPSP मौलिक अधिकारों से ऊपर हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">44th CAA</strong> deleted the Right to Property from Fundamental Rights and moved it to Article 300A as a legal right. (44वें संशोधन ने संपत्ति के अधिकार को मौलिक अधिकारों से हटा दिया और इसे अनुच्छेद 300A के तहत कानूनी अधिकार बना दिया।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements are correct? / कौन से कथन सही हैं?</strong></p>",

      "<p>&nbsp;2, 3, and 4&nbsp;</p>",

    "solution": "<h1 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\">📜 THE AMENDMENT DUO: 42nd &amp; 44th CAA</h1>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">(42वां और 44वां संशोधन अधिनियम: मुख्य बिंदु)</strong></h3>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" />\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">🏗️ 42nd CAA, 1976 (The \"Mini-Constitution\")</h2>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Context: Enacted during the Emergency based on the Swaran Singh Committee recommendations.</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(संदर्भ: आपातकाल के दौरान स्वर्ण सिंह समिति की सिफारिशों पर लागू।)</p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\" data-index-in-node=\"0\">1. Preamble &amp; Territory (प्रस्तावना और क्षेत्र)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">New Words: Added Socialist, Secular, and Integrity.</p>\n<p style=\"line-height: 1.15 !important;\">(नए शब्द: समाजवादी, पंथनिरपेक्ष और अखंडता जोड़े गए।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Delimitation: Froze seats in Lok Sabha/Assemblies until 2001 census.</p>\n<p style=\"line-height: 1.15 !important;\">(परिसीमन: लोकसभा/विधानसभा सीटों को 2001 की जनगणना तक फ्रीज कर दिया गया।)</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">2. Fundamental Duties &amp; DPSPs (मौलिक कर्तव्य और नीति निदेशक तत्व)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Part IV-A: Added Fundamental Duties (Article 51A).</p>\n<p style=\"line-height: 1.15 !important;\">(भाग IV-A: मौलिक कर्तव्य (अनुच्छेद 51A) जोड़े गए।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">New DPSPs: Added 39 (Child development), 39A (Free legal aid), 43A (Worker participation), and 48A (Environment/Wildlife).</p>\n<p style=\"line-height: 1.15 !important;\">(नए DPSP: अनुच्छेद 39, 39A, 43A और 48A जोड़े गए।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Supremacy: Gave DPSPs precedence over Fundamental Rights.</p>\n<p style=\"line-height: 1.15 !important;\">(सर्वोच्चता: DPSP को मौलिक अधिकारों पर प्राथमिकता दी गई।)</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">3. Executive &amp; Judiciary (कार्यपालिका और न्यायपालिका)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">President: Made it mandatory for the President to act on the Cabinet's advice.</p>\n<p style=\"line-height: 1.15 !important;\">(राष्ट्रपति: राष्ट्रपति के लिए कैबिनेट की सलाह मानना अनिवार्य कर दिया गया।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Judicial Review: Curtailed the power of Judicial Review; amendments were made immune to court challenges.</p>\n<p style=\"line-height: 1.15 !important;\">(न्यायिक समीक्षा: शक्तियों में कटौती की गई; संशोधनों को अदालती चुनौती से मुक्त कर दिया गया।)</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" data-index-in-node=\"0\">4. Federalism &amp; Emergency (संघवाद और आपातकाल)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Concurrent List: Shifted 5 subjects from State List: Education, Forests, Weights &amp; Measures, Wild Animals/Birds, and Admin of Justice.</p>\n<p style=\"line-height: 1.15 !important;\">(समवर्ती सूची: 5 विषयों (शिक्षा, वन, आदि) को राज्य सूची से स्थानांतरित किया गया।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Emergency: Allowed the President to declare a National Emergency in any part (localised) of India.</p>\n<p style=\"line-height: 1.15 !important;\">(आपातकाल: भारत के किसी भी हिस्से में 'स्थानीय आपातकाल' लगाने की अनुमति दी गई।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" />\n<h2 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">🛠️ 44th CAA, 1978 (The \"Corrective\" Amendment)</h2>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Context: Enacted by the Janata Government to undo the distortions of the 42nd Amendment.</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(संदर्भ: 42वें संशोधन की विकृतियों को सुधारने के लिए जनता सरकार द्वारा लागू।)</p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" data-index-in-node=\"0\">1. Restoration of Rights (अधिकारों की बहाली)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Right to Property: Removed from FRs (Art 19 &amp; 31) and made it a Legal Right under Article 300A.</p>\n<p style=\"line-height: 1.15 !important;\">(संपत्ति का अधिकार: मौलिक अधिकारों से हटाकर अनुच्छेद 300A के तहत कानूनी अधिकार बनाया गया।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Suspension: Guaranteed that Articles 20 and 21 cannot be suspended even during an Emergency.</p>\n<p style=\"line-height: 1.15 !important;\">(निलंबन: यह गारंटी दी गई कि आपातकाल में भी अनुच्छेद 20 और 21 निलंबित नहीं होंगे।)</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\" data-index-in-node=\"0\">2. Emergency Provisions (आपातकाल के प्रावधान)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Grounds: Replaced \"Internal Disturbance\" with \"Armed Rebellion\".</p>\n<p style=\"line-height: 1.15 !important;\">(आधार: 'आंतरिक अशांति' को 'सशस्त्र विद्रोह' से बदल दिया गया।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Written Advice: President can declare Emergency ONLY on written advice from the Cabinet.</p>\n<p style=\"line-height: 1.15 !important;\">(लिखित सलाह: राष्ट्रपति केवल कैबिनेट की लिखित सलाह पर ही आपातकाल घोषित कर सकते हैं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Approval: Changed Periodic Parliamentary approval to a Special Majority (2/3rd).</p>\n<p style=\"line-height: 1.15 !important;\">(अनुमोदन: संसदीय अनुमोदन के लिए 'विशेष बहुमत' (2/3) अनिवार्य किया गया।)</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\" data-index-in-node=\"0\">3. Judicial &amp; Legislative Changes (न्यायिक और विधायी बदलाव)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Habeas Corpus: Restored the power of Courts to issue writs of Habeas Corpus.</p>\n<p style=\"line-height: 1.15 !important;\">(बंदी प्रत्यक्षीकरण: अदालतों की रिट जारी करने की शक्ति बहाल की गई।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Election Disputes: Restored the power of Courts to decide election disputes of PM, Speaker, and President (removing 39th CAA distortion).</p>\n<p style=\"line-height: 1.15 !important;\">(चुनाव विवाद: पीएम, अध्यक्ष और राष्ट्रपति के चुनाव विवादों को तय करने की अदालती शक्ति बहाल की गई।)</p>\n</li>\n</ul>\n<p data-path-to-node=\"24\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">[Image comparing 42nd and 44th amendments of Indian Constitution]</p>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26\" data-index-in-node=\"0\">🚀 THE \"QUICK-HIT\" CHEAT SHEET</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">42nd CAA (1976)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">44th CAA (1978)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,1,0,0\" data-index-in-node=\"0\">Emergency Ground</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"lin 0\" data-index-in-node=\"0\">A.</strong> Granted Special Status to Delhi (NCT) with a 70-member assembly. (दिल्ली (NCT) को 70 सदस्यीय विधानसभा के साथ विशेष दर्जा दिया।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\" data-index-in-node=\"0\">II. 69th CAA (1991)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\" data-index-in-node=\"0\">B.</strong> Added Part IX-A and 12th Schedule for Urban Local Bodies. (शहरी स्थानीय निकायों के लिए भाग IX-A और 12वीं अनुसूची जोड़ी।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\" data-index-in-node=\"0\">III. 74th CAA (1992)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,1,0\" data-index-in-node=\"0\">C.</strong> Reduced voting age from 21 to 18 years. (मतदान की आयु 21 से घटाकर 18 वर्ष की।)</span></td>\n</tr>\n<tr     "question": "<p data-path-to-node=\"26\"><strong data-path-to-node=\"26\" data-index-in-node=\"0\">Consider the following latest constitutional developments:</strong> <strong data-path-to-node=\"26\" data-index-in-node=\"59\">(निम्नलिखित नवीनतम संवैधानिक घटनाक्रमों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"27\">\n<li>\n<p data-path-to-node=\"27,0,0\">The <strong data-path-to-node=\"27,0,0\" data-index-in-node=\"4\">102nd CAA</strong> gave constitutional status to the NCBC (Art 338B), while the <strong data-path-to-node=\"27,0,0\" data-index-in-node=\"75\">105th CAA</strong> restored the power of State Governments to maintain their own SEBC lists. (102वें संशोधन ने NCBC (अनु. 338B) को संवैधानिक दर्जा दिया, जबकि 105वें संशोधन ने राज्य सरकारों को अपनी SEBC सूची बनाए रखने की शक्ति बहाल की।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,1,0\">The <strong data-path-to-node=\"27,1,0\" data-index-in-node=\"4\">103rd CAA</strong> provided a maximum of 10% reservation for EWS, introducing Articles 15(6) and 16(6). (103वें संशोधन ने EWS के लिए अधिकतम 10% आरक्षण प्रदान किया, जिससे अनुच्छेद 15(6) और 16(6) पेश किए गए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,2,0\">The <strong data-path-to-node=\"27,2,0\" data-index-in-node=\"4\">104th CAA</strong> extended SC/ST reservations in legislatures until 2030 and discontinued representation for the Anglo-Indian community. (104वें संशोधन ने विधायिकाओं में SC/ST आरक्षण को 2030 तक बढ़ाया और एंग्लो-इंडियन समुदाय के प्रतिनिधित्व को समाप्त कर दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"27,3,0\">The <strong data-path-to-node=\"27,3,0\" data-index-in-node=\"4\">106th CAA (2023)</strong> reserves one-third (33%) of seats for women in the Lok Sabha, State Assemblies, and Delhi Assembly. (106वें संशोधन (2023) ने लोकसभा, राज्य विधानसभाओं और दिल्ली विधानसभा में महिलाओं के लिए एक-तिहाई (33%) सीटें आरक्षित कीं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"28\"><strong data-path-to-node=\"28\" data-index-in-node=\"0\">Which of the statements are correct? / कौन से कथन सही हैं?</strong></p>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"31\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"31\" data-index-in-node=\"0\">THE \"FINAL\" REVISION CHEAT SHEET&nbsp;</strong></h3>\n<p data-path-to-node=\"33\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32\">\n<thead style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">CAA</strong></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Highlight</strong></td>\n</tr>\n</thead>\n<tbody style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !i rtant;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,5,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,5,0,0\" data-index-in-node=\"0\">102nd</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,5,1,0\">NCBC Constitutional Status (Art 338B).</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,6,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,6,0,0\" data-index-in-node=\"0\">103rd</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,6,1,0\">10% EWS Reservation.</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,7,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,7,0,0\" data-index-in-node=\"0\">104th</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,7,1,0\">SC/ST Seat Extension (2030) + Anglo-Indian end.</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,8,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,8,0,0\" data-index-in-node=\"0\">105th</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,8,1,0\">States regained power to list SEBCs.</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,9,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,9,0,0\" data-index-in-node=\"0\">106th</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,9,1,0\">33% Women's Reservation in Lok Sabha/Assemblies.</span></td>\n</tr>\n</tbody>\n</table>",
