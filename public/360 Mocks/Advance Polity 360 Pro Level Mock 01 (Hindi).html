    "question": "<h3 data-start=\"399\" data-end=\"528\">With reference to <strong data-start=\"428\" data-end=\"492\">Fundamental Rights under Part III of the Indian Constitution</strong>, consider the following statements:</h3>\n<hr data-start=\"530\" data-end=\"533\" />\n<p data-start=\"535\" data-end=\"1424\"><strong data-start=\"535\" data-end=\"541\">A.</strong> Fundamental Rights, inspired by the <strong data-start=\"578\" data-end=\"599\">US Bill of Rights</strong>, are known as the <strong data-start=\"618\" data-end=\"642\">Magna Carta of India</strong> and aim at the material, intellectual, moral and spiritual development of individuals; they are <strong data-start=\"739\" data-end=\"767\">qualified (not absolute)</strong>, <strong data-start=\"769\" data-end=\"784\">justiciable</strong>, operate as <strong data-start=\"797\" data-end=\"837\">claims of citizens against the State</strong>, protect individuals against arbitrary State action (and in some cases against private individuals), include both <strong data-start=\"952\" data-end=\"984\">negative and positive rights</strong>, promote <strong data-start=\"994\" data-end=\"1017\">political democracy</strong>, and are <strong data-start=\"1027\" data-end=\"1127\">amendable by Parliament subject to the Basic Structure doctrine (Kesavananda Bharati case, 1973)</strong>.<br data-start=\"1128\" data-end=\"1131\" /><em data-start=\"1131\" data-end=\"1424\">(मौलिक अधिकार अमेरिकी संविधान से प्रेरित हैं, भारत का मैग्ना कार्टा कहलाते हैं, पूर्ण नहीं बल्कि युक्तियुक्त प्रतिबंधों के अधीन हैं, न्यायालय द्वारा प्रवर्तनीय हैं, नागरिकों के राज्य के विरुद्ध दावे हैं, लोकतंत्र को सुदृढ़ करते हैं और मूल संरचना का उल्लंघन किए बिना संशोधित किए जा सकते हैं।)</em></p>\n<hr data-start=\"1426\" data-end=\"1429\" />\n<p data-start=\"1431\" data-end=\"2169\"><strong data-start=\"1431\" data-end=\"1437\">B.</strong> At present, there are <strong data-start=\"1460\" data-end=\"1486\">six Fundamental Rights</strong>; the <strong data-start=\"1492\" data-end=\"1513\">Right to Property</strong> under <strong data-start=\"1520\" data-end=\"1555\">Article 31 and Article 19(1)(f)</strong> was removed by the <strong data-start=\"1575\" data-end=\"1618\">44th Constitutional Amendment Act, 1978</strong> and reclassified as a <strong data-start=\"1641\" data-end=\"1701\">constitutional/legal right under Article 300A (Part XII)</strong>; during a <strong data-start=\"1712\" data-end=\"1734\">National Emergency</strong>, Fundamental Rights can be suspended <strong data-start=\"1772\" data-end=\"1801\">except Articles 20 and 21</strong>, and <strong data-start=\"1807\" data-end=\"1921\">Article 19 freedoms are automatically suspended only during external aggression and not during armed rebellion</strong>.<br data-start=\"1922\" data-end=\"1925\" /><em data-start=\"1925\" data-end=\"2169\">(वर्तमान में छह मौलिक अधिकार हैं; संपत्ति का अधिकार 44वें संशोधन द्वारा हटाकर अनुच्छेद 300A में रखा गया; राष्ट्रीय आपातकाल में अनुच्छेद 20 व 21 को छोड़कर अधिकार निलंबित हो सकते हैं तथा अनुच्छेद 19 केवल बाह्य आक्रमण में स्वतः निलंबित होता है।)</em></p>\n<hr data-start=\"2171\" data-end=\"2174\" />\n<p data-start=\"2176\" data-end=\"3058\"><strong data-start=\"2176\" data-end=\"2182\">C.</strong> Under <strong data-start=\"2189\" data-end=\"2203\">Article 12</strong>, the term <strong data-start=\"2214\" data-end=\"2225\">&lsquo;State&rsquo;</strong> includes the Government and Parliament of India, State Governments and Legislatures, all local authorities, statutory and non-statutory bodies, and even <strong data-start=\"2379\" data-end=\"2449\">private bodies acting as an instrumentality or agency of the State</strong>; under <strong data-start=\"2457\" data-end=\"2471\">Article 13</strong>, all laws inconsistent with or derogatory to Fundamental Rights are void, the term <strong data-start=\"2555\" data-end=\"2564\">&lsquo;law&rsquo;</strong> includes permanent laws, ordinances, delegated legislation, customs and usages, judicial review is expressly provided, and although <strong data-start=\"2697\" data-end=\"2714\">Article 13(4)</strong> excludes constitutional amendments under Article 368, such amendments can still be challenged if they violate the <strong data-start=\"2829\" data-end=\"2848\">Basic Structure</strong>.<br data-start=\"2849\" data-end=\"2852\" /><em data-start=\"2852\" data-end=\"3058\">(अनुच्छेद 12 में राज्य की व्यापक परिभाषा दी गई है; अनुच्छेद 13 के तहत मौलिक अधिकारों के विरुद्ध कानून शून्य हैं, न्यायिक समीक्षा का प्रावधान है और मूल संरचना का उल्लंघन करने वाले संशोधन चुनौती योग्य हैं।)</em></p>\n<hr data-start=\"3060\" data-end=\"3063\" />\n<p data-start=\"3065\" data-end=\"3692\"><strong data-start=\"3065\" data-end=\"3071\">D.</strong> Fundamental Rights are available <strong data-start=\"3105\" data-end=\"3162\">only to citizens under Articles 15, 16, 19, 29 and 30</strong>, while <strong data-start=\"3170\" data-end=\"3199\">Articles 14, 20&ndash;28 and 32</strong> are available to <strong data-start=\"3217\" data-end=\"3249\">both citizens and foreigners</strong>; the classification includes <strong data-start=\"3279\" data-end=\"3308\">Right to Equality (14&ndash;18)</strong>, <strong data-start=\"3310\" data-end=\"3338\">Right to Freedom (19&ndash;22)</strong>, <strong data-start=\"3340\" data-end=\"3378\">Right against Exploitation (23&ndash;24)</strong>, <strong data-start=\"3380\" data-end=\"3420\">Right to Freedom of Religion (25&ndash;28)</strong>, <strong data-start=\"3422\" data-end=\"3465\">Cultural and Educational Rights (29&ndash;30)</strong>, and the <strong data-start=\"3475\" data-end=\"3528\">Right to Constitutional Remedies under Article 32</strong>.<br data-start=\"3529\" data-end=\"3532\" /><em data-start=\"3532\" data-end=\"3692\">(अनुच्छेद 15, 16, 19, 29, 30 केवल नागरिकों के लिए हैं; 14, 20&ndash;28, 32 नागरिकों व विदेशियों दोनों के लिए हैं; सभी मौलिक अधिकारों का वर्गीकरण इसमें सम्मिलित है।)</em></p>\n<hr data-start=\"3694\" data-end=\"3697\" />\n<h3 data-start=\"3699\" data-end=\"3760\"><strong data-start=\"3703\" data-end=\"3758\">Which of the statements given above is/are incorrect?</strong></h3>",

    "solution": "<ul>\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Magna Carta:</strong><span class=\"citation-6 citation-end-6\"> Part III.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span><sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from BYJU'S. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjn9KCJmMyRAxUAAAAAHQAAAAAQxgU\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Justiciable:</strong> Enforceable by courts.</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Negative Rights:</strong> Limits on state authority.</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Positive Rights:</strong> Individual privileges.</p>\n</li>\n<li>\n<p data-path-to-node=\"13,4,0\"><strong data-path-to-node=\"13,4,0\" data-index-in-node=\"0\">Article 20 &amp; 21:</strong> NEVER suspended during National Emergency.</p>\n</li>\n<li>\n<p data-path-to-node=\"13,5,0\"><strong data-path-to-node=\"13,5,0\" data-index-in-node=\"0\">Article 13(4) vs. <span class=\"citation-5\">Kesavananda:</span></strong><span class=\"citation-5 citation-end-5\"> Amendments can be challenged if they hit the \"Basic Structure.\"<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Right to Equality in the Indian Constitution:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"94\">(भारतीय संविधान में समानता के अधिकार के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Article 14</strong> includes 'Equality Before Law' (British origin), which implies the absence of special privileges, and 'Equal Protection of Laws' (American origin), which mandates that \"like should be treated alike.\" (अनुच्छेद 14 में 'विधि के समक्ष समानता' (ब्रिटिश मूल) शामिल है, जिसका अर्थ है विशेषाधिकारों की अनुपस्थिति, और 'विधियों का समान संरक्षण' (अमेरिकी मूल), जो आदेश देता है कि \"समान लोगों के साथ समान व्यवहार किया जाना चाहिए\"।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Article 15</strong> prohibits discrimination on five grounds (Religion, Race, Caste, Sex, Place of Birth) and allows the State to provide reservations for SEBCs, SCs, STs, and a 10% quota for EWS under the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"197\">103rd CAA, 2019</strong>. (अनुच्छेद 15 पांच आधारों (धर्म, मूलवंश, जाति, लिंग, जन्म स्थान) पर भेदभाव को रोकता है और राज्य को SEBC, SC, ST के लिए आरक्षण और <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"342\">103वें संशोधन, 2019</strong> के तहत EWS के लिए 10% कोटा प्रदान करने की अनुमति देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Article 16</strong> adds 'Descent' and 'Residence' to the grounds of non-discrimination for public employment; however, Parliament can prescribe residence as a condition for certain posts, currently only in Andhra Pradesh and Telangana. (अनुच्छेद 16 सार्वजनिक रोजगार के लिए भेदभाव न करने के आधारों में 'वंश' और 'निवास' को जोड़ता है; हालाँकि, संसद कुछ पदों के लिए निवास को एक शर्त के रूप में निर्धारित कर सकती है, जो वर्तमान में केवल आंध्र प्रदेश और तेलंगाना में है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"4\">Indra Sawhney Judgment (1992)</strong> upheld the 27% OBC reservation but rejected the 10% reservation for poorer sections and ruled that total reserved quotas should generally not exceed 50%. (इंद्रा साहनी निर्णय (1992) ने 27% OBC आरक्षण को बरकरार रखा लेकिन गरीब वर्गों के लिए 10% आरक्षण को खारिज कर दिया और फैसला सुनाया कि कुल आरक्षित कोटा आमतौर पर 50% से अधिक नहीं होना चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Article 17</strong> is enforceable against private individuals, while <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"61\">Article 18</strong> prohibits all titles including National Awards like Bharat Ratna, as they cannot be used as suffixes or prefixes. (अनुच्छेद 17 निजी व्यक्तियों के खिलाफ लागू करने योग्य है, जबकि अनुच्छेद 18 भारत रत्न जैसे राष्ट्रीय पुरस्कारों सहित सभी उपाधियों को प्रतिबंधित करता है, क्योंकि उन्हें प्रत्यय या उपसर्ग के रूप में उपयोग नहीं किया जा सकता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",
    "comp": "",
    "options": [
      "<p>1, 2, 3, and 5 only&nbsp;</p>",
      "<p>&nbsp;2, 3, 4, and 5 only&nbsp;</p>",
      "<p>&nbsp;1, 2, 3, and 4 only&nbsp;</p>",
      "<p>All of the above (1, 2, 3, 4, and 5)</p>"

    "correct_option_id": 2,
    "solution": "<p><strong data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">Statement 5 is INCORRECT:</strong> While Art. 18 prohibits titles, the <strong data-path-to-node=\"10,4,0\" data-index-in-node=\"62\">Balaji Raghavan Case (1996)</strong> ruled that National Awards (Bharat Ratna, etc.) are <strong data-path-to-node=\"10,4,0\" data-index-in-node=\"142\">NOT</strong> titles within the meaning of Art. 18. They are distinctions, though they cannot be used as prefixes/suffixes. <em data-path-to-node=\"10,4,0\" data-index-in-node=\"256\">(कथन 5 <strong data-path-to-node=\"10,4,0\" data-index-in-node=\"263\">गलत</strong> है: बालाजी राघवन मामले (1996) ने फैसला सुनाया कि राष्ट्रीय पुरस्कार अनुच्छेद 18 के अर्थ में 'उपाधियाँ' <strong data-path-to-node=\"10,4,0\" data-index-in-node=\"370\">नहीं</strong> हैं। वे सम्मान हैं, हालांकि उन्हें नाम के आगे या पीछे नहीं लगाया जा सकता।)</em></p>\n<p></p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">&nbsp;RIGHT TO EQUALITY: THE CORE CRUX</strong></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">(समानता का अधिकार: मुख्य सार)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Article</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Core Concept (मुख्य अवधारणा)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Bilingual Exam \"Traps\" (परीक्षा के लिए महत्वपूर्ण बिंदु)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0,0\" data-index-in-node=\"0\">Art. 14</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,1,0\" data-index-in-node=\"0\">Rule of Law</strong> (विधि का शासन)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,1,2,0\" style=\"line-height: 1.15 !important;\">Permits <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,2,0\" data-index-in-node=\"8\">Reasonable Classification</strong> but forbids Class Legislation.</p>\n<br style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,2,1\" />\n<p data-path-to-node=\"4,1,2,2\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,2,2\" data-index-in-node=\"0\">(तर्कसंगत वर्गीकरण की अनुमति है, लेकिन वर्ग विधान निषिद्ध है।)</em></p>\n</td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,0,0\" data-index-in-node=\"0\">Art. 15</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,1,0\" data-index-in-node=\"0\">No Discrimination</strong> (भेदभाव का निषेध)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,2,2,0\" style=\"line-height: 1.15 !important;\">Applies to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,2,0\" data-index-in-node=\"11\">State &amp; Private Individuals</strong> (shops, wells, hotels).</p>\n<br style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,2,1\" />\n<p data-path-to-node=\"4,2,2,2\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,2,2\" data-index-in-node=\"0\">(राज्य और निजी व्यक्तियों दोनों पर लागू (दुकानें, कुएं, होटल)।)</em></p>\n</td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,0,0\" data-index-in-node=\"0\">Art. 16</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,1,0\" data-index-in-node=\"0\">Equal Opportunity</strong> (समान अवसर)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,3,2,0\" style=\"line-height: 1.15 !important;\">Adds <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,2,0\" data-index-in-node=\"5\">Descent &amp; Residence</strong> as grounds. Residence can be an exception.</p>\n<br style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,2,1\" />\n<p data-path-to-node=\"4,3,2,2\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,2,2\" data-index-in-node=\"0\">(वंश और निवास को आधार के रूप में जोड़ता है। निवास एक अपवाद हो सकता है।)</em></p>\n</td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,0,0\" data-index-in-node=\"0\">Art. 17</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,1,0\" data-index-in-node=\"0\">Abolition of Untouchability</strong> (अस्पृश्यता का अंत)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,4,2,0\" style=\"line-height: 1.15 !important;\">Absolute Right. <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,2,0\" data-index-in-node=\"16\">Untouchability</strong> is NOT defined in the Constitution.</p>\n<br style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,2,1\" />\n<p data-path-to-node=\"4,4,2,2\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,2,2\" data-index-in-node=\"0\">(पूर्ण अधिकार। संविधान में 'अस्पृश्यता' को परिभाषित नहीं किया गया है।)</em></p>\n</td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,0,0\" data-index-in-node=\"0\">Art. 18</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,1,0\" data-index-in-node=\"0\">Abolition of Titles</strong> (उपाधियों का अंत)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,5,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,0\" data-index-in-node=\"0\">National Awards</strong> (Bharat Ratna, etc.) are NOT titles (Balaji Raghavan Case).</p>\n<br style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,1\" />\n<p data-path-to-node=\"4,5,2,2\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,2\" data-index-in-node=\"0\">(राष्ट्रीय पुरस्कार 'उपाधियाँ' नहीं हैं (बालाजी राघवन मामला)।)</em></p>\n</td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"0\">⚠️ PRELIMS \"SMART-CHECK\" (BILINGUAL)</strong></h3>\n<p></p>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">Article 14 Origins:</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Equality Before Law: British (Negative) - No one is above law.</p>\n<p style=\"line-height: 1.15 !important;\">(विधि के समक्ष समानता: ब्रिटिश (नकारात्मक) - कोई भी कानून से ऊपर नहीं है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Equal Protection of Laws: American (Positive) - Like should be treated alike.</p>\n<p style=\"line-height: 1.15 !important;\">(विधियों का समान संरक्षण: अमेरिकी (सकारात्मक) - समान लोगों के साथ समान व्यवहार।)</p>\n</li>\n</ul>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 15 Grounds (5): Religion, Race, Caste, Sex, Place of Birth.</p>\n<p style=\"line-height: 1.15 !important;\">(आधार: धर्म, मूलवंश, जाति, लिंग, जन्म स्थान।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 16 Grounds (7): Adds Descent and Residence to the above five.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 16 आधार: उपरोक्त पांच में वंश और निवास जोड़ता है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">Indra Sawhney Logic:</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,1,0,0\" style=\"line-height: 1.15 !important;\">27% OBC Quota: <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,1,0,0\" data-index-in-node=\"15\">YES</strong> (excluding Creamy Layer).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,1,1,0\" style=\"line-height: 1.15 !important;\">10% EWS (Old 1992 verdict): <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,1,1,0\" data-index-in-node=\"28\">NO</strong> (later allowed by 103rd CAA).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,1,2,0\" style=\"line-height: 1.15 !important;\">50% Limit: <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,1,2,0\" data-index-in-node=\"11\">YES</strong> (total quota should not exceed this).</p>\n</li>\n</ul>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 18 Exceptions: Military and Academic distinctions are Allowed.</p>\n<p style=\"line-height: 1.15 !important;\">(अपवाद: सैन्य और शैक्षणिक विशिष्टताओं की अनुमति है।)</p>\n</li>\n</ol>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Right to Freedom in the Indian Constitution:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"93\">(भारतीय संविधान में स्वतंत्रता के अधिकार के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Article 19</strong> guarantees six rights available only to citizens, including the Right to access the Internet and the Right to fly the national flag, but it does not guarantee the Right to Strike or the Right to Lockout. (अनुच्छेद 19 केवल नागरिकों को छह अधिकारों की गारंटी देता है, जिसमें इंटरनेट तक पहुंच का अधिकार और राष्ट्रीय ध्वज फहराने का अधिकार शामिल है, लेकिन यह 'हड़ताल के अधिकार' या 'तालाबंदी के अधिकार' की गारंटी नहीं देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The State can impose reasonable restrictions on the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"52\">Freedom of Movement and Residence</strong> solely on two grounds: the interest of the general public and the protection of the interests of any Scheduled Tribe. (राज्य 'आवागमन और निवास की स्वतंत्रता' पर केवल दो आधारों पर उचित प्रतिबंध लगा सकता है: सार्वजनिक हित और किसी भी अनुसूचित जनजाति के हितों का संरक्षण।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Article 20</strong> provides protection against double jeopardy and self-incrimination for criminal proceedings only; however, the \"No Ex-Post-Facto Law\" provision prohibits retrospective application of both criminal and civil laws. (अनुच्छेद 20 केवल आपराधिक कार्यवाही के लिए 'दोहरे दंड' और 'स्व-दोषारोपण' के खिलाफ सुरक्षा प्रदान करता है; हालाँकि, \"कार्योत्तर विधि निषेध\" प्रावधान आपराधिक और नागरिक दोनों कानूनों के पूर्वव्यापी आवेदन को रोकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"6\">Article 21</strong>, the Supreme Court in the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"43\">Maneka Gandhi Case (1978)</strong> established that a law depriving life or liberty must be \"reasonable, fair, and just,\" effectively introducing the American concept of 'Due Process of Law'. (अनुच्छेद 21 के तहत, उच्चतम न्यायालय ने <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"266\">मेनका गांधी मामले (1978)</strong> में स्थापित किया कि जीवन या स्वतंत्रता से वंचित करने वाला कानून \"उचित, निष्पक्ष और न्यायपूर्ण\" होना चाहिए, जिससे प्रभावी रूप से 'कानून की उचित प्रक्रिया' की अमेरिकी अवधारणा शुरू हुई।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">Under <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"6\">Article 22</strong>, a person detained under a 'Preventive Detention' law cannot be held for more than three months without an advisory board's report, and the constitutional safeguard of being produced before a magistrate within 24 hours does not apply to enemy aliens. (अनुच्छेद 22 के तहत, 'निवारक निरोध' कानून के तहत हिरासत में लिए गए व्यक्ति को सलाहकार बोर्ड की रिपोर्ट के बिना तीन महीने से अधिक समय तक नहीं रखा जा सकता है, और 24 घंटे के भीतर मजिस्ट्रेट के सामने पेश होने का संवैधानिक संरक्षण 'शत्रु अन्यदेशीय' (enemy aliens) पर लागू नहीं होता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<ul>\n<li>\n<p data-path-to-node=\"10,2,0\"><strong data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3 is INCORRECT:</strong> While Art. 20 protects against retrospective <strong data-path-to-node=\"10,2,0\" data-index-in-node=\"71\">criminal</strong> laws, the government <strong data-path-to-node=\"10,2,0\" data-index-in-node=\"101\">can</strong> enact retrospective <strong data-path-to-node=\"10,2,0\" data-index-in-node=\"125\">civil or tax laws</strong>. The \"No Ex-Post-Facto Law\" limitation applies <em data-path-to-node=\"10,2,0\" data-index-in-node=\"190\">only</em> to criminal legislation. <em data-path-to-node=\"10,2,0\" data-index-in-node=\"220\">(कथन 3 <strong data-path-to-node=\"10,2,0\" data-index-in-node=\"227\">गलत</strong> है: जबकि अनुच्छेद 20 पूर्वव्यापी <strong data-path-to-node=\"10,2,0\" data-index-in-node=\"264\">अपराधिक</strong> कानूनों से बचाता है, सरकार पूर्वव्यापी <strong data-path-to-node=\"10,2,0\" data-index-in-node=\"311\">नागरिक या कर कानून</strong> बना सकती है। \"कार्योत्तर विधि निषेध\" केवल आपराधिक कानून पर लागू होता है।)</em></p>\n</li>\n<li>&nbsp;</li>\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Article 19(1)(a):</strong> Includes \"Right to Silence\" and \"Right to Know,\" but NOT \"Right to Strike.\" <em data-path-to-node=\"13,0,0\" data-index-in-node=\"94\">(अनुच्छेद 19(1)(a) में \"मौन रहने का अधिकार\" शामिल है, लेकिन \"हड़ताल का अधिकार\" नहीं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Article 20:</strong> Double Jeopardy applies only to proceedings before a <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"65\">Court or Judicial Tribunal</strong>, not departmental/administrative inquiries. <em data-path-to-node=\"13,1,0\" data-index-in-node=\"136\">(दोहरा दंड केवल न्यायालय या न्यायिक न्यायाधिकरण के समक्ष कार्यवाही पर लागू होता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Article 21:</strong> Now includes the \"Right to protection from climate change impacts\" (as of April 2024). <em data-path-to-node=\"13,2,0\" data-index-in-node=\"99\">(अनुच्छेद 21 में अब \"जलवायु परिवर्तन के प्रभावों से सुरक्षा का अधिकार\" भी शामिल है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Article 21A:</strong> Inserted by <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"25\">86th CAA, 2002</strong>; covers only <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"53\">6&ndash;14 years</strong> (not early childhood or higher education). <em data-path-to-node=\"13,3,0\" data-index-in-node=\"107\">(अनुच्छेद 21A केवल 6-14 वर्ष के बच्चों को कवर करता है।)</em></p>\n</li>\n<li>&nbsp;</li>\n</ul>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Match the Constitutional Provisions (List I) with their corresponding Restrictions/Details (List II):</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(संवैधानिक प्रावधानों (सूची I) का उनके संबंधित प्रतिबंधों/विवरणों (सूची II) के साथ मिलान करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">List I: Provision (प्रावधान)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">List II: Restriction/Detail (प्रतिबंध/विवरण)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\" data-index-in-node=\"0\">A. Freedom of Speech &amp; Expression (19-1-a)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\" data-index-in-node=\"0\">1. Protection of the interests of any Scheduled Tribes.</strong> (किसी भी अनुसूचित जनजाति के हितों का संरक्षण।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\" data-index-in-node=\"0\">B. Freedom of Association (19-1-c)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\" data-index-in-node=\"0\">2. Decency, Morality, and Contempt of Court.</strong> (शिष्टता, नैतिकता और न्यायालय की अवमानना।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\" data-index-in-node=\"0\">C. Freedom of Movement &amp; Residence (19-1-d &amp; e)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\" data-index-in-node=\"0\">3. Right to form Cooperative Societies.</strong> (सहकारी समितियां बनाने का अधिकार।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">D. Right to Education (21A)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\" data-index-in-node=\"0\">4. Prescribing technical qualifications for business.</strong> (व्यवसाय के लिए तकनीकी योग्यता निर्धारित करना।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,0,0\" data-index-in-node=\"0\">E. Freedom of Profession (19-1-g)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,1,0\" data-index-in-node=\"0\">5. Inserted by the 86th Constitutional Amendment Act.</strong> (86वें संविधान संशोधन अधिनियम द्वारा जोड़ा गया।)</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"6\" style=\"font-family: 'Google Sans Text', sans-serif     "solution": "<ul>\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Strike/Lockout (हड़ताल):</strong> NOT a fundamental right under 19(1)(a) or (c).</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Internet Access (इंटरनेट):</strong> Part of 19(1)(a).</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Age for RTE (शिक्षा की आयु):</strong> Strictly <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"38\">6 to 14 years</strong> (not below 6).</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">National Flag (ध्वज):</strong> Flying it is a fundamental right under 19(1)(a).</p>\n</li>\n<li>\n<p data-path-to-node=\"13,4,0\"><strong data-path-to-node=\"13,4,0\" data-index-in-node=\"0\">Technical Qualifications:</strong> Only applicable to the Right to Profession (19-1-g).</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements based on the Fundamental Rights guaranteed in Part III:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"90\">(भाग III में गारंटीकृत मौलिक अधिकारों के आधार पर निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Article 23</strong> prohibits human trafficking, 'Devadasis', and slavery, and is enforceable against both the State and private persons; however, the State can impose compulsory military or social service without an obligation to pay. (अनुच्छेद 23 मानव तस्करी, 'देवदासी' और गुलामी को रोकता है, और राज्य एवं निजी व्यक्तियों दोनों के खिलाफ लागू करने योग्य है; हालाँकि, राज्य भुगतान करने के दायित्व के बिना अनिवार्य सैन्य या सामाजिक सेवा थोप सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Article 24</strong> prohibits the employment of children below 14 in factories or mines, but the Constitution itself does not prohibit their employment in harmless or innocent work. (अनुच्छेद 24 कारखानों या खदानों में 14 वर्ष से कम उम्र के बच्चों के नियोजन को रोकता है, लेकिन संविधान स्वयं उन्हें हानिरहित या निर्दोष कार्यों में नियोजित करने से नहीं रोकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">While <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"6\">Article 25</strong> guarantees the individual right to profess and propagate religion (excluding the right to convert), <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"117\">Article 26</strong> protects collective freedom, allowing religious denominations to manage their own affairs and acquire property. (जबकि अनुच्छेद 25 धर्म को मानने और प्रचार करने के व्यक्तिगत अधिकार (परिवर्तन के अधिकार को छोड़कर) की गारंटी देता है, अनुच्छेद 26 सामूहिक स्वतंत्रता की रक्षा करता है, जिससे धार्मिक संप्रदायों को अपने मामलों का प्रबंधन करने और संपत्ति प्राप्त करने की अनुमति मिलती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"6\">Article 28</strong>, religious instruction is completely prohibited in institutions wholly maintained by State funds, but it is permitted on a voluntary basis in institutions recognized by or receiving aid from the State. (अनुच्छेद 28 के तहत, राज्य निधि से पूरी तरह से संचालित संस्थानों में धार्मिक शिक्षा पूरी तरह से प्रतिबंधित है, लेकिन राज्य द्वारा मान्यता प्राप्त या सहायता प्राप्त संस्थानों में यह स्वैच्छिक आधार पर अनुमत है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements are correct? / कौन से कथन सही हैं?</strong></p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Consider the following statements regarding Cultural, Educational Rights and Article 32:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"89\">(सांस्कृतिक, शैक्षिक अधिकारों और अनुच्छेद 32 के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Article 29</strong> grants protection to both religious and linguistic minorities, but its scope extends to 'any section of citizens,' thereby including the majority as well. (अनुच्छेद 29 धार्मिक और भाषाई दोनों अल्पसंख्यकों को सुरक्षा प्रदान करता है, लेकिन इसका दायरा 'नागरिकों के किसी भी वर्ग' तक फैला हुआ है, जिससे इसमें बहुसंख्यक भी शामिल हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Article 30</strong> is confined only to minorities and provides the right to establish and administer educational institutions; however, the term 'minority' is not defined anywhere in the Constitution. (अनुच्छेद 30 केवल अल्पसंख्यकों तक सीमित है और शैक्षणिक संस्थान स्थापित करने एवं प्रशासित करने का अधिकार देता है; हालाँकि, 'अल्पसंख्यक' शब्द को संविधान में कहीं भी परिभाषित नहीं किया गया है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">Dr. B.R. Ambedkar called <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"25\">Article 32</strong> &ldquo;the very soul and heart of the Constitution,&rdquo; and the right to move the Supreme Court under this article can only be suspended as provided by the Constitution (e.g., Article 359). (डॉ. बी.आर. अंबेडकर ने अनुच्छेद 32 को \"संविधान की आत्मा और हृदय\" कहा था, और इस अनुच्छेद के तहत सर्वोच्च न्यायालय जाने के अधिकार को केवल संविधान (जैसे अनुच्छेद 359) द्वारा प्रदान किए गए अनुसार ही निलंबित किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The writ jurisdiction of the Supreme Court under Article 32 is original and exclusive, meaning a person cannot approach the High Court for the enforcement of Fundamental Rights. (अनुच्छेद 32 के तहत सर्वोच्च न्यायालय का रिट क्षेत्राधिकार मौलिक और अनन्य है, जिसका अर्थ है कि कोई व्यक्ति मौलिक अधिकारों के प्रवर्तन के लिए उच्च न्यायालय का दरवाजा नहीं खटखटा सकता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",
    "comp": "",
    "options": [
      "<p>&nbsp;1, 2, and 3 only</p>",
      "<p>&nbsp;2, 3, and 4 only&nbsp;</p>",
      "<p>1 and 4 only&nbsp;</p>",
      "<p>&nbsp;1, 2, 3, and 4</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 4 is <strong data-path-to-node=\"16,0\" data-index-in-node=\"27\">FALSE</strong>. The jurisdiction of the SC is <strong data-path-to-node=\"16,0\" data-index-in-node=\"64\">Original but NOT Exclusive</strong>. It is <strong data-path-to-node=\"16,0\" data-index-in-node=\"98\">Concurrent</strong> with the High Court's jurisdiction under <strong data-path-to-node=\"16,0\" data-index-in-node=\"150\">Article 226</strong>. You can go to either.</p>\n<p></p>\n<ul>\n<li>\n<p data-path-to-node=\"19,0,0\"><strong data-path-to-node=\"19,0,0\" data-index-in-node=\"0\">Article 23 Exception:</strong> State can demand service for public purposes without pay. (राज्य बिना वेतन के सार्वजनिक सेवा मांग सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,1,0\"><strong data-path-to-node=\"19,1,0\" data-index-in-node=\"0\">Article 25 Scope:</strong> Includes wearing <em data-path-to-node=\"19,1,0\" data-index-in-node=\"35\">Kirpans</em> (Sikhs); 'Hindus' include Sikhs, Jains, and Buddhists. (हिंदुओं में सिख, जैन और बौद्ध शामिल हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,2,0\"><strong data-path-to-node=\"19,2,0\" data-index-in-node=\"0\">Article 27 Fee:</strong> Taxes are banned for religion, but <strong data-path-to-node=\"19,2,0\" data-index-in-node=\"51\">Fees</strong> are allowed. (धर्म के लिए कर प्रतिबंधित है, लेकिन 'शुल्क' की अनुमति है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,0\"><strong data-path-to-node=\"19,3,0\" data-index-in-node=\"0\">Article 29 vs 30:</strong> 29 is for \"Any Section\" (Majority + Minority), 30 is <strong data-path-to-node=\"19,3,0\" data-index-in-node=\"71\">Only for Minorities</strong>. (29 'किसी भी वर्ग' के लिए है, 30 'केवल अल्पसंख्यकों' के लिए है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,4,0\"><strong data-path-to-node=\"19,4,0\" data-index-in-node=\"0\">Article 32 Suspension:</strong> President can suspend the right to move court during National Emergency under <strong data-path-to-node=\"19,4,0\" data-index-in-node=\"101\">Art. 359</strong>. (राष्ट्रपति अनुच्छेद 359 के तहत आपातकाल के दौरान अदालत जाने के अधिकार को निलंबित कर सकते हैं।)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Writ Jurisdiction in India:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"76\">(भारत में रिट क्षेत्राधिकार के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Habeas Corpus</strong> is issued to release a person from unlawful detention, while <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"75\">Mandamus</strong> commands a public authority to perform a duty but cannot be issued against the President, State Governors, or private individuals. (हैबियस कॉर्पस (बंदी प्रत्यक्षीकरण) एक व्यक्ति को अवैध हिरासत से मुक्त करने के लिए जारी किया जाता है, जबकि मैंडमस (परमादेश) एक सार्वजनिक प्राधिकरण को कर्तव्य निभाने का आदेश देता है लेकिन इसे राष्ट्रपति, राज्य के राज्यपालों या निजी व्यक्तियों के खिलाफ जारी नहीं किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Prohibition</strong> is issued to prevent a lower court from exceeding its jurisdiction, whereas <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"88\">Certiorari</strong> is used to quash a decision already made; notably, Certiorari was extended to administrative authorities in 1991. (प्रोहिबिशन (प्रतिषेध) निचली अदालत को अपने अधिकार क्षेत्र से बाहर जाने से रोकने के लिए जारी किया जाता है, जबकि सर्टिओरारी (उत्प्रेषण) पहले से लिए गए निर्णय को रद्द करने के लिए उपयोग किया जाता है; विशेष रूप से, 1991 में सर्टिओरारी का विस्तार प्रशासनिक अधिकारियों तक किया गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Quo-Warranto</strong> challenges the legality of a person's claim to a public office and, unlike other writs, it can be sought by any interested person, even if they are not the aggrieved party. (को-वारंटो (अधिकार-पृच्छा) सार्वजनिक पद पर किसी व्यक्ति के दावे की वैधता को चुनौती देता है और अन्य रिटों के विपरीत, इसे किसी भी इच्छुक व्यक्ति द्वारा मांगा जा सकता है, भले ही वह पीड़ित पक्ष न हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The Supreme Court's writ jurisdiction under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"44\">Article 32</strong> is wider than the High Court's under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"92\">Article 226</strong> because the SC can issue writs throughout the territory of India for any legal right. (अनुच्छेद 32 के तहत सर्वोच्च न्यायालय का रिट क्षेत्राधिकार अनुच्छेद 226 के तहत उच्च न्यायालय की तुलना में अधिक विस्तृत है क्योंकि सर्वोच्च न्यायालय किसी भी कानूनी अधिकार के लिए पूरे भारत में रिट जारी कर सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">While a remedy under <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"21\">Article 32</strong> is a Fundamental Right and the Supreme Court cannot refuse to exercise it, the remedy under <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"124\">Article 226</strong> is discretionary for the High Court. (जबकि अनुच्छेद 32 के तहत उपचार एक मौलिक अधिकार है और सर्वोच्च न्यायालय इसे प्रयोग करने से इनकार नहीं कर सकता है, अनुच्छेद 226 के तहत उच्च न्यायालय के लिए यह उपचार विवेकाधीन (discretionary) है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<p data-path-to-node=\"10,3,0\"><strong data-path-to-node=\"10,3,0\" data-index-in-node=\"0\">Statement 4 is INCORRECT:</strong> This is a major exam trap!</p>\n<ul data-path-to-node=\"10,3,1\">\n<li>\n<p data-path-to-node=\"10,3,1,0,0\">The <strong data-path-to-node=\"10,3,1,0,0\" data-index-in-node=\"4\">Supreme Court's</strong> scope is <strong data-path-to-node=\"10,3,1,0,0\" data-index-in-node=\"29\">Narrower</strong> (Only for Fundamental Rights).</p>\n</li>\n<li>\n<p data-path-to-node=\"10,3,1,1,0\">The <strong data-path-to-node=\"10,3,1,1,0\" data-index-in-node=\"4\">High Court's</strong> scope is <strong data-path-to-node=\"10,3,1,1,0\" data-index-in-node=\"26\">Wider</strong> (For Fundamental Rights + \"Any other purpose\"/Ordinary legal rights). <em data-path-to-node=\"10,3,1,1,0\" data-index-in-node=\"102\">(कथन 4 <strong data-path-to-node=\"10,3,1,1,0\" data-index-in-node=\"109\">गलत</strong> है: सर्वोच्च न्यायालय का दायरा <strong data-path-to-node=\"10,3,1,1,0\" data-index-in-node=\"144\">संकीर्ण</strong> है (केवल मौलिक अधिकारों के लिए), जबकि उच्च न्यायालय का दायरा <strong data-path-to-node=\"10,3,1,1,0\" data-index-in-node=\"213\">विस्तृत</strong> है (मौलिक अधिकार + \"किसी अन्य उद्देश्य\" के लिए)।)</em></p>\n</li>\n</ul>\n<p></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Writ (रिट)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Distinction (मुख्य अंतर)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Habeas Corpus</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\">To release the body. (शरीर को प्रस्तुत करना/रिहा करना)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">Mandamus</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\">Against public officials for duty. (कर्तव्य के लिए सार्वजनिक अधिकारियों के खिलाफ)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">Prohibition</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">To stop a lower court (Preventive). (निचली अदालत को रोकना - निवारक)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Certiorari</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">To quash an order (Curative). (आदेश को रद्द करना - उपचारात्मक)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\" data-index-in-node=\"0\">Quo-Warranto</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\">Any person can file it. (कोई भी व्यक्ति इसे दायर कर सकता है)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements based on the final provisions of Fundamental Rights and the Indian Constitution:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"115\">(भारतीय संविधान और मौलिक अधिकारों के अंतिम प्रावधानों के आधार पर निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">Under <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"6\">Article 33</strong>, only the Parliament has the power to restrict the Fundamental Rights of Armed Forces and Intelligence agencies, and such laws cannot be challenged in any court for violating FRs. (अनुच्छेद 33 के तहत, केवल संसद के पास सशस्त्र बलों और खुफिया एजेंसियों के मौलिक अधिकारों को प्रतिबंधित करने की शक्ति है, और ऐसे कानूनों को मौलिक अधिकारों के उल्लंघन के लिए किसी भी अदालत में चुनौती नहीं दी जा सकती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"6\">Article 34</strong> provides for the restriction of FRs during Martial Law, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"73\">Article 35</strong> ensures that the power to make laws to give effect to rights like Articles 17 (Untouchability) and 23 (Forced Labour) vests exclusively in the Parliament to maintain uniformity. (जबकि अनुच्छेद 34 मार्शल लॉ के दौरान मौलिक अधिकारों के प्रतिबंध का प्रावधान करता है, अनुच्छेद 35 यह सुनिश्चित करता है कि अनुच्छेद 17 (अस्पृश्यता) और 23 (जबरन श्रम) जैसे अधिकारों को प्रभावी करने के लिए कानून बनाने की शक्ति एकरूपता बनाए रखने के लिए विशेष रूप से संसद के पास है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">As per the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"11\">I.R. Coelho case (2007)</strong>, any law placed in the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"58\">Ninth Schedule</strong> (protected by Art. 31B) after April 24, 1973, is open to judicial review if it violates the 'Basic Structure' of the Constitution. (आई.आर. कोएल्हो केस (2007) के अनुसार, 24 अप्रैल, 1973 के बाद नौवीं अनुसूची (अनुच्छेद 31B द्वारा संरक्षित) में डाला गया कोई भी कानून न्यायिक समीक्षा के लिए खुला है यदि वह संविधान के 'मूल ढांचे' का उल्लंघन करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Rights such as the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"19\">Right to Vote (Art. 326)</strong>, the Right to Property (Art. 300-A), and the freedom of trade (Art. 301) are Constitutional Rights but they are situated outside Part III of the Constitution. (मतदान का अधिकार (अनुच्छेद 326), संपत्ति का अधिकार (अनुच्छेद 300-A), और व्यापार की स्वतंत्रता (अनुच्छेद 301) जैसे अधिकार संवैधानिक अधिकार हैं लेकिन वे संविधान के भाग III के बाहर स्थित हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">A <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"2\">Special Majority under Article 368</strong> requires a majority of the total membership of the House AND two-thirds of the members present and voting; this majority is mandatory for amending Fundamental Rights and for resolutions to disapprove a National Emergency. (अनुच्छेद 368 के तहत एक विशेष बहुमत के लिए सदन की कुल सदस्यता का बहुमत और उपस्थित एवं मतदान करने वाले सदस्यों के दो-तिहाई बहुमत की आवश्यकता होती है; यह बहुमत मौलिक अधिकारों में संशोधन और राष्ट्रीय आपातकाल को अस्वीकार करने के प्रस्तावों के लिए अनिवार्य है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong>&nbsp;</p>",

    "solution": "<h3 data-start=\"241\" data-end=\"284\">🔹 <strong data-start=\"248\" data-end=\"282\">Special Majority (विशेष बहुमत)</strong></h3>\n<p data-start=\"285\" data-end=\"389\"><strong data-start=\"285\" data-end=\"297\">Formula:</strong><br data-start=\"297\" data-end=\"300\" /><strong data-start=\"300\" data-end=\"387\">Special Majority = (&gt;50% of Total Membership) + (2/3rd of Members Present &amp; Voting)</strong></p>\n<p data-start=\"391\" data-end=\"415\"><strong data-start=\"391\" data-end=\"413\">Used for (प्रयोग):</strong></p>\n<ul data-start=\"416\" data-end=\"582\">\n<li data-start=\"416\" data-end=\"448\">\n<p data-start=\"418\" data-end=\"448\"><strong data-start=\"418\" data-end=\"446\">Fundamental Rights (FRs)</strong></p>\n</li>\n<li data-start=\"449\" data-end=\"501\">\n<p data-start=\"451\" data-end=\"501\"><strong data-start=\"451\" data-end=\"499\">Directive Principles of State Policy (DPSPs)</strong></p>\n</li>\n<li data-start=\"502\" data-end=\"582\">\n<p data-start=\"504\" data-end=\"582\"><strong data-start=\"504\" data-end=\"542\">Removal of Judges of SC/HC and CAG</strong><br data-start=\"542\" data-end=\"545\" /><em data-start=\"545\" data-end=\"580\">(न्यायाधीशों व CAG को हटाने हेतु)</em></p>\n</li>\n</ul>\n<hr data-start=\"584\" data-end=\"587\" />\n<h3 data-start=\"589\" data-end=\"660\">🔹 <strong data-start=\"596\" data-end=\"658\">UDHR &ndash; Universal Declaration of Human Rights (10 Dec 1948)</strong></h3>\n<ul data-start=\"661\" data-end=\"829\">\n<li data-start=\"661\" data-end=\"782\">\n<p data-start=\"663\" data-end=\"782\">The principles of <strong data-start=\"681\" data-end=\"732\">UDHR are reflected in the Indian Constitution&rsquo;s</strong><br data-start=\"732\" data-end=\"735\" /><strong data-start=\"737\" data-end=\"779\">Preamble, Fundamental Rights and DPSPs</strong>.</p>\n</li>\n<li data-start=\"783\" data-end=\"829\">\n<p data-start=\"785\" data-end=\"829\"><strong data-start=\"785\" data-end=\"828\">Article 26 of UDHR = Right to Education</strong>.</p>\n</li>\n</ul>\n<ul data-start=\"844\" data-end=\"986\">\n<li data-start=\"844\" data-end=\"940\">\n<p data-start=\"846\" data-end=\"940\"><strong data-start=\"846\" data-end=\"866\">UDHR के सिद्धांत</strong> हमारी <strong data-start=\"873\" data-end=\"923\">प्रस्तावना, मौलिक अधिकार और नीति निदेशक तत्वों</strong> में झलकते हैं।</p>\n</li>\n<li data-start=\"941\" data-end=\"986\">\n<p data-start=\"943\" data-end=\"986\"><strong data-start=\"943\" data-end=\"985\">UDHR का अनुच्छेद 26 = शिक्षा का अधिकार</strong>।</p>\n</li>\n</ul>\n<hr data-start=\"988\" data-end=\"991\" />\n<h3 data-start=\"993\" data-end=\"1032\">🔹 <strong data-start=\"1000\" data-end=\"1030\">Article 31C (अनुच्छेद 31C)</strong></h3>\n<ul data-start=\"1033\" data-end=\"1155\">\n<li data-start=\"1033\" data-end=\"1100\">\n<p data-start=\"1035\" data-end=\"1100\"><strong data-start=\"1035\" data-end=\"1097\">Only provision where Fundamental Rights make way for DPSPs</strong>.</p>\n</li>\n<li data-start=\"1101\" data-end=\"1155\">\n<p data-start=\"1103\" data-end=\"1155\">Applies <strong data-start=\"1111\" data-end=\"1154\">specifically to Article 39(b) and 39(c</strong></p>\n</li>\n</ul>\n<ul data-start=\"1170\" data-end=\"1313\">\n<li data-start=\"1170\" data-end=\"1313\">\n<p data-start=\"1172\" data-end=\"1313\"><strong data-start=\"1172\" data-end=\"1212\">अनुच्छेद 31C एकमात्र ऐसा प्रावधान है</strong> जहाँ<br data-start=\"1217\" data-end=\"1220\" /><strong data-start=\"1222\" data-end=\"1268\">मौलिक अधिकार, DPSP के लिए मार्ग छोड़ते हैं</strong><br data-start=\"1268\" data-end=\"1271\" /><em data-start=\"1273\" data-end=\"1312\">(केवल अनुच्छेद 39(b) और 39(c) के लिए)</em>।</p>\n</li>\n</ul>\n<hr data-start=\"1315\" data-end=\"1318\" />\n<h3 data-start=\"1320\" data-end=\"1386\">🔹 <strong data-start=\"1327\" data-end=\"1384\">Article 300-A &ndash; Right to Property (संपत्ति का अधिकार)</strong></h3>\n<ul data-start=\"1387\" data-end=\"1585\">\n<li data-start=\"1387\" data-end=\"1437\">\n<p data-start=\"1389\" data-end=\"1437\">Removed from <strong data-start=\"1402\" data-end=\"1435\">Part III (Fundamental Rights)</strong></p>\n</li>\n<li data-start=\"1438\" data-end=\"1518\">\n<p data-start=\"1440\" data-end=\"1518\">Inserted in <strong data-start=\"1452\" data-end=\"1464\">Part XII</strong> by the <strong data-start=\"1472\" data-end=\"1515\">44th Constitutional Amendment Act, 1978</strong>.</p>\n</li>\n<li data-start=\"1519\" data-end=\"1585\">\n<p data-start=\"1521\" data-end=\"1585\">Now a <strong data-start=\"1527\" data-end=\"1559\">Legal / Constitutional Right</strong>, not a Fundamental Right.</p>\n</li>\n</ul>\n<ul data-start=\"1600\" data-end=\"1765\">\n<li data-start=\"1600\" data-end=\"1706\">\n<p data-start=\"1602\" data-end=\"1706\"><strong data-start=\"1602\" data-end=\"1633\">44वें संविधान संशोधन (1978)</strong> द्वारा<br data-start=\"1640\" data-end=\"1643\" /><strong data-start=\"1645\" data-end=\"1703\">संपत्ति का अधिकार भाग III से हटाकर भाग XII में रखा गया</strong>।</p>\n</li>\n<li data-start=\"1707\" data-end=\"1765\">\n<p data-start=\"1709\" data-end=\"1765\">अब यह <strong data-start=\"1715\" data-end=\"1742\">कानूनी/संवैधानिक अधिकार</strong> है, मौलिक अधिकार नहीं।</p>\n</li>\n</ul>\n<hr data-start=\"1767\" data-end=\"1770\" />\n<h3 data-start=\"1772\" data-end=\"1832\">🔹 <strong data-start=\"1779\" data-end=\"1830\">Special Majority &ndash; Hidden Trap (Exam Favourite)</strong></h3>\n<ul data-start=\"1833\" data-end=\"1923\">\n<li data-start=\"1833\" data-end=\"1923\">\n<p data-start=\"1835\" data-end=\"1923\"><strong data-start=\"1835\" data-end=\"1922\">Special Majority is required to DISAPPROVE the continuation of a National Emergency</strong>.</p>\n</li>\n</ul>\n<p></p>\n<ul data-start=\"1938\" data-end=\"2021\">\n<li data-start=\"1938\" data-end=\"2021\">\n<p data-start=\"1940\" data-end=\"2021\"><strong data-start=\"1940\" data-end=\"2020\">राष्ट्रीय आपातकाल के जारी रहने को अस्वीकार करने के लिए विशेष बहुमत आवश्यक है</strong>।</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">onsider the following statements regarding the Directive Principles of State Policy (DPSP):</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"93\">(राज्य के नीति निदेशक तत्वों (DPSP) के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The DPSP are enshrined in <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"26\">Part IV (Articles 36-51)</strong> and were borrowed from the Irish Constitution of 1937, which had originally taken them from the Spanish Constitution. (DPSP <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"175\">भाग IV (अनुच्छेद 36-51)</strong> में निहित हैं और इन्हें 1937 के आयरिश संविधान से लिया गया था, जिसने मूल रूप से इन्हें स्पेनिश संविधान से लिया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While Dr. B.R. Ambedkar described DPSP as a '<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"45\">Novel Feature</strong>', Granville Austin referred to the DPSP along with Fundamental Rights as the '<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"137\">Conscience of the Constitution</strong>'. (जहाँ डॉ. बी.आर. अंबेडकर ने DPSP को '<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"207\">नवल विशेषता</strong>' बताया, वहीं ग्रानविले ऑस्टिन ने मौलिक अधिकारों के साथ DPSP को '<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"283\">संविधान की अंतरात्मा</strong>' कहा।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The division of rights into justiciable (FRs) and non-justiciable (DPSPs) was originally recommended by <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"104\">B.N. Rau</strong>, the Constitutional Advisor to the Drafting Committee. (अधिकारों को न्यायसंगत (FRs) और गैर-न्यायसंगत (DPSPs) में विभाजित करने की सिफारिश मूल रूप से मसौदा समिति के संवैधानिक सलाहकार <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"294\">बी.एन. राऊ</strong> द्वारा की गई थी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Unlike Fundamental Rights which are negative injunctions, DPSPs impose <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"71\">positive obligations</strong> on the state to establish a 'police state' rather than a 'welfare state'. (मौलिक अधिकारों के विपरीत जो नकारात्मक निषेध हैं, DPSP राज्य पर एक 'कल्याणकारी राज्य' के बजाय 'पुलिस राज्य' स्थापित करने के लिए <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"294\">सकारात्मक दायित्व</strong> डालते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">According to <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"13\">Article 37</strong>, DPSPs are fundamental in the governance of the country but are non-justiciable, meaning they are not enforceable by any court of law. (अनुच्छेद 37 के अनुसार, DPSP देश के शासन में मौलिक हैं लेकिन गैर-न्यायसंगत हैं, जिसका अर्थ है कि वे किसी भी अदालत द्वारा लागू करने योग्य नहीं हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,5,0\">There are certain directives located outside Part IV, such as the claims of SCs/STs to services (<strong data-path-to-node=\"5,5,0\" data-index-in-node=\"97\">Art. 335</strong>), instruction in mother tongue (<strong data-path-to-node=\"5,5,0\" data-index-in-node=\"138\">Art. 350A</strong>), and the development of the Hindi language (<strong data-path-to-node=\"5,5,0\" data-index-in-node=\"193\">Art. 351</strong>). (भाग IV के बाहर भी कुछ निर्देश स्थित हैं, जैसे सेवाओं के लिए SC/ST के दावे (<strong data-path-to-node=\"5,5,0\" data-index-in-node=\"280\">अनु. 335</strong>), मातृभाषा में शिक्षा (<strong data-path-to-node=\"5,5,0\" data-index-in-node=\"312\">अनु. 350A</strong>), और हिंदी भाषा का विकास (<strong data-path-to-node=\"5,5,0\" data-index-in-node=\"348\">अनु. 351</strong>)।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong>&nbsp;</p>",
    "comp": "",

      "<p>&nbsp;1, 2, 3, and 5 only&nbsp;</p>",
      "<p>&nbsp;1, 2, 3, 5, and 6 only&nbsp;</p>",

    "solution": "<ul>\n<li>\n<p data-path-to-node=\"10,1,0\"><strong data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 4 is INCORRECT:</strong> This is a classic \"Trap.\" DPSPs aim to establish a <strong data-path-to-node=\"10,1,0\" data-index-in-node=\"77\">Welfare State</strong> (कल्याणकारी राज्य) and specifically seek to move away from the concept of a <strong data-path-to-node=\"10,1,0\" data-index-in-node=\"167\">Police State</strong> (पुलिस राज्य).</p>\n</li>\n<li>&nbsp;</li>\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Instrument of Instructions:</strong> DPSPs resemble the instructions given to the Governor-General in the <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"97\">Government of India Act, 1935</strong>. <em data-path-to-node=\"13,0,0\" data-index-in-node=\"128\">(DPSP <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"134\">भारत सरकार अधिनियम, 1935</strong> में गवर्नर-जनरल को दिए गए निर्देशों के समान हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Economic Democracy:</strong> While FRs establish Political Democracy, DPSPs aim for <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"75\">Social and Economic Democracy</strong>. <em data-path-to-node=\"13,1,0\" data-index-in-node=\"106\">(जहाँ FR राजनीतिक लोकतंत्र स्थापित करते हैं, वहीं DPSP <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"161\">सामाजिक और आर्थिक लोकतंत्र</strong> का लक्ष्य रखते हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Article 350A:</strong> Relates to facilities for instruction in mother-tongue at the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"76\">primary stage</strong> for linguistic minorities. <em data-path-to-node=\"13,2,0\" data-index-in-node=\"117\">(भाषाई अल्पसंख्यकों के लिए <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"144\">प्राथमिक स्तर</strong> पर मातृभाषा में शिक्षा से संबंधित है।)</em></p>\n</li>\n<li>&nbsp;</li>\n</ul>",

  },

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Match List I (Ideological Category) with List II (Articles) correctly:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(सूची I (वैचारिक श्रेणी) का सूची II (अनुच्छेद) के साथ सही मिलान करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">List I: Category (श्रेणी)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">List II: Article Content (अनुच्छेद की सामग्री)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\" data-index-in-node=\"0\">A. Socialistic</strong> (समाजवादी)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\" data-index-in-node=\"0\">1. Article 40:</strong> Organize Village Panchayats. (ग्राम पंचायतों का संगठन)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\" data-index-in-node=\"0\">B. Gandhian</strong> (गांधीवादी)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\" data-index-in-node=\"0\">2. Article 44:</strong> Uniform Civil Code for citizens. (नागरिकों के लिए समान नागरिक संहिता)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\" data-index-in-node=\"0\">C. Liberal-Intellectual</strong> (उदार-बौद्धिक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\" data-index-in-node=\"0\">3. Article 39A:</strong> Equal justice and free legal aid. (समान न्याय और मुफ्त कानूनी सहायता)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">D. Mixed Gandhian/Socialist</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\" data-index-in-node=\"0\">4. Article 47:</strong> Prohibition of intoxicating drinks/drugs vs Raising nutrition. (नशीले पेय/दवाओं का निषेध बनाम पोषण स्तर बढ़ाना)</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Codes / कोड:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">A) A-3, B-1, C-2, D-4</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">B) A-1, B-3, C-2, D-4</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">C) A-3, B-2, C-1, D-4</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">D) A-4, B-1, C-2, D-3</p>",
