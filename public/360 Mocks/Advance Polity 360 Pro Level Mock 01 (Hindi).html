  {
    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements / निम्नलिखित कथनों पर विचार करें:</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">A bill is a Money Bill if it exclusively contains provisions for the imposition, remission, or regulation of any tax, or the regulation of borrowing/guarantees by the Union Government. (एक विधेयक धन विधेयक है यदि इसमें विशेष रूप से किसी कर के अधिरोपण, छूट या विनियमन, या केंद्र सरकार द्वारा ऋण लेने/गारंटी के विनियमन के प्रावधान हों।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Matters regarding the custody of the Consolidated (CFI) and Contingency Funds, appropriation of money from CFI, and declaring expenditure charged on CFI are valid criteria. (संचित निधि (CFI) और आकस्मिक निधि की कस्टडी, CFI से धन का विनियोग, और CFI पर भारित व्यय घोषित करना वैध मानदंड हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Receipt of money on account of the Consolidated Fund of India or the Public Account of India, the custody or issue of such money, and the audit of the accounts of the Union are included under Article 110 of the Constitution of India. (भारत की संचित निधि (Consolidated Fund of India) या भारत के सार्वजनिक खाते (Public Account of India) में धन की प्राप्ति, ऐसे धन की अभिरक्षा (custody) या निकास (issue), और संघ के खातों का अंकेक्षण (audit), भारत के संविधान के अनुच्छेद 110 के अंतर्गत शामिल हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">A bill is automatically classified as a Money Bill if it involves fines, license fees, or local taxes imposed by local authorities. (यदि किसी विधेयक में जुर्माना, लाइसेंस शुल्क या स्थानीय अधिकारियों द्वारा लगाए गए स्थानीय कर शामिल हैं, तो इसे स्वचालित रूप से धन विधेयक माना जाता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",
    "comp": "",
    "options": [
      "<p>1, 2, and 3 only / केवल 1, 2 और 3&nbsp;</p>",
      "<p>2, 3, and 4 only / केवल 2, 3 और 4</p>",
      "<p>1, 3, and 4 only / केवल 1, 3 और 4</p>",
      "<p>1, 2, 3, and 4 / 1, 2, 3 और 4</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p data-path-to-node=\"7\"><strong data-path-to-node=\"7\" data-index-in-node=\"0\">Answer / उत्तर: A</strong></p>\n<ul data-path-to-node=\"8\">\n<li>\n<p data-path-to-node=\"8,0,0\">&nbsp;Statement 4 is <strong data-path-to-node=\"8,0,0\" data-index-in-node=\"29\">incorrect</strong>. : \"A bill is <strong data-path-to-node=\"8,0,0\" data-index-in-node=\"80\">not</strong> considered a Money Bill merely because it includes fines, fees, or local taxes.\"</p>\n</li>\n<li>\n<p data-path-to-node=\"8,1,0\">&nbsp;कथन 4 <strong data-path-to-node=\"8,1,0\" data-index-in-node=\"18\">गलत</strong> है।&nbsp; \"जुर्माने, शुल्क या स्थानीय करों के कारण किसी विधेयक को धन विधेयक <strong data-path-to-node=\"8,1,0\" data-index-in-node=\"127\">नहीं</strong> माना जाता है।\"</p>\n</li>\n</ul>\n<p data-path-to-node=\"0\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Here is the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"0\" data-index-in-node=\"12\">Crux Summary Table</strong> of the legislative procedure for a Money Bill. This table covers every administrative and constitutional nuance mentioned in your notes and verified against standard exam patterns.</p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"1\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"1\" data-index-in-node=\"0\">Money Bill: Legislative Procedure &amp; Powers&nbsp;</strong></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">धन विधेयक: विधायी प्रक्रिया और शक्तियाँ&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Status in Money Bill (धन विधेयक में स्थिति)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Legal Logic (कानूनी तर्क)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\" data-index-in-node=\"0\">Recommendation (सिफारिश)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\" data-index-in-node=\"0\">President only</strong> (केवल राष्ट्रपति द्वारा)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\">Introduced with his prior permission as it involves state funds. (राज्य निधि शामिल होने के कारण उनकी पूर्व अनुमति से पेश किया गया।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\" data-index-in-node=\"0\">Introduction (प्रस्तुति)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\" data-index-in-node=\"0\">Lok Sabha only</strong> (केवल लोकसभा में)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\">Represents the direct will of the people regarding finances. (वित्त के संबंध में जनता की प्रत्यक्ष इच्छा का प्रतिनिधित्व करता है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\" data-index-in-node=\"0\">Nature of Bill (प्रकार)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\" data-index-in-node=\"0\">Government Bill</strong> (केवल सरकारी विधेयक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\">Can only be introduced by a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\" data-index-in-node=\"28\">Minister</strong>. (इसे केवल एक <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\" data-index-in-node=\"51\">मंत्री</strong> द्वारा ही पेश किया जा सकता है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,0,0\" data-index-in-node=\"0\">Speaker's Authority (अध्यक्ष की शक्ति)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\" data-index-in-node=\"0\">Final &amp; Binding</strong> (अंतिम और बाध्यकारी)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,2,0\">The Speaker certifies the bill; this cannot be challenged in court. (अध्यक्ष विधेयक को प्रमाणित करते हैं; इसे अदालत में चुनौती नहीं दी जा सकती।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,0,0\" data-index-in-node=\"0\">Rajya Sabha Power (राज्यसभा की शक्ति)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,1,0\" data-index-in-node=\"0\">Limited to 14 Days</strong> (14 दिनों तक सीमित)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,5,2,0\">Cannot reject or amend; can only make recommendations. (अस्वीकार या संशोधित नहीं कर सकते; केवल सिफारिशें कर सकते हैं।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,0,0\" data-index-in-node=\"0\">Lok Sabha's Choice (लोकसभा का विकल्प)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,1,0\" data-index-in-node=\"0\">Absolute Discretion</strong> (पूर्ण विवेक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,6,2,0\">Lok Sabha may accept or reject all or any recommendations. (लोकसभा सभी या किसी भी सिफारिश को स्वीकार या अस्वीकार कर सकती है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,0,0\" data-index-in-node=\"0\">Joint Sitting (संयुक्त बैठक)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,1,0\" data-index-in-node=\"0\">NOT Allowed</strong> (अनुमति नहीं है)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,7,2,0\">No provision under Article 108 for Money Bills. (धन विधेयकों के लिए अनुच्छेद 108 के तहत कोई प्रावधान नहीं है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,8,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,8,0,0\" data-index-in-node=\"0\">President's Veto (राष्ट्रपति का वीटो)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,8,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,8,1,0\" data-index-in-node=\"0\">Cannot Return</strong> (वापस नहीं कर सकते)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,8,2,0\">Can give or withhold assent, but cannot send for reconsideration. (सहमति दे सकते हैं या रोक सकते हैं, लेकिन पुनर्विचार के लिए नहीं भेज सकते।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,9,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,9,0,0\" data-index-in-node=\"0\">Govt. Accountability (सरकारी जवाबदेही)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,9,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,9,1,0\" data-index-in-node=\"0\">Mandatory Resignation</strong> (अनिवार्य इस्तीफा)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,9,2,0\">Defeat in Lok Sabha leads to the fall of the government. (लोकसभा में हार सरकार के पतन का कारण बनती है।)</span></td>\n</tr>\n</tbody>\n</table>\n<h3 data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;Theory Recap (Quick Revision)</strong></h3>\n<ul data-path-to-node=\"6\">\n<li>\n<p data-path-to-node=\"6,0,0\"><strong data-path-to-node=\"6,0,0\" data-index-in-node=\"0\">Article 110:</strong> Defines a Money Bill. (अनुच्छेद 110: धन विधेयक को परिभाषित करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"6,1,0\"><strong data-path-to-node=\"6,1,0\" data-index-in-node=\"0\">Article 109:</strong> Special procedure for Money Bills. (अनुच्छेद 109: धन विधेयकों के लिए विशेष प्रक्रिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"6,2,0\"><strong data-path-to-node=\"6,2,0\" data-index-in-node=\"0\">The \"Exclusively\" Rule:</strong> A bill is a Money Bill ONLY if it contains matters listed in Article 110. (एक विधेयक धन विधेयक तभी है जब उसमें केवल अनुच्छेद 110 में सूचीबद्ध मामले हों।)</p>\n</li>\n<li>\n<p data-path-to-node=\"6,3,0\"><strong data-path-to-node=\"6,3,0\" data-index-in-node=\"0\">The \"Exclusion\" Rule:</strong> Fines, Fees, and Local Taxes do <strong data-path-to-node=\"6,3,0\" data-index-in-node=\"54\">NOT</strong> make a bill a Money Bill. (जुर्माना, शुल्क और स्थानीय कर किसी विधेयक को धन विधेयक <strong data-path-to-node=\"6,3,0\" data-index-in-node=\"140\">नहीं</strong> बनाते हैं।)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">With reference to the legislative procedure, evaluate the following: / विधायी प्रक्रिया के संदर्भ में, निम्नलिखित का मूल्यांकन करें:</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">A Money Bill must be introduced only in the Lok Sabha by a minister (Government Bill) with the prior recommendation of the President. (धन विधेयक केवल लोकसभा में एक मंत्री (सरकारी विधेयक) द्वारा राष्ट्रपति की पूर्व सिफारिश पर पेश किया जाना चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The Rajya Sabha can suggest recommendations but cannot amend or reject the bill; it must return the bill within 14 days. (राज्यसभा सिफारिशें दे सकती है लेकिन विधेयक को संशोधित या अस्वीकार नहीं कर सकती; उसे 14 दिनों के भीतर विधेयक वापस करना होगा।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">If the Rajya Sabha does not return the bill within 14 days, it is deemed passed by both Houses in the form originally passed by the Lok Sabha. (यदि राज्यसभा 14 दिनों के भीतर विधेयक वापस नहीं करती है, तो इसे लोकसभा द्वारा पारित मूल रूप में दोनों सदनों द्वारा पारित माना जाता।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">A joint sitting is summoned in case of a deadlock, and the defeat of a Money Bill in the Lok Sabha does not require the government to resign. (गतिरोध की स्थिति में संयुक्त बैठक बुलाई जाती है, और लोकसभा में धन विधेयक की हार होने पर सरकार को इस्तीफा देने की आवश्यकता नहीं होती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<ul>\n<li>\n<p data-path-to-node=\"16,0,0\">statement 4 is <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"29\">incorrect</strong>. There is <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"49\">no joint sitting</strong> for Money Bills, and the government <strong data-path-to-node=\"16,0,0\" data-index-in-node=\"102\">must resign</strong> if it is defeated in Lok Sabha.</p>\n</li>\n<li>\n<p data-path-to-node=\"16,1,0\">कथन 4 <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"18\">गलत</strong> है। धन विधेयकों के लिए <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"45\">कोई संयुक्त बैठक नहीं</strong> होती है, और लोकसभा में हारने पर सरकार को <strong data-path-to-node=\"16,1,0\" data-index-in-node=\"108\">इस्तीफा देना होगा</strong>।</p>\n</li>\n<li>\n<h1 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\">📘 MONEY BILL&nbsp;</h1>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"0\">(Article 109 &amp; 110 of the Constitution of India)</strong></h3>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" data-index-in-node=\"0\">1️⃣ Definition &amp; Criteria | परिभाषा और मानदंड (Article 110)</strong></h3>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">A bill is a Money Bill if it deals exclusively with matters under Article 110.</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(कोई विधेयक धन विधेयक है यदि वह विशेष रूप से अनुच्छेद 110 के विषयों से संबंधित है।)</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">Taxation:</strong> Imposition, abolition, remission, or regulation. (कराधान: अधिरोपण, उन्मूलन, छूट या विनियमन।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">Borrowing:</strong> Regulation of borrowing by the Union Government. (ऋण: केंद्र सरकार द्वारा ऋण लेने का विनियमन।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">Funds:</strong> Custody/Withdrawal from <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"31\">Consolidated Fund (CFI)</strong> or <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"58\">Contingency Fund</strong>. (निधियां: संचित निधि या आकस्मिक निधि से धन निकालना।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">Appropriation:</strong> Withdrawal of money from CFI. (विनियोग: संचित निधि से धन की निकासी।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,4,0\" data-index-in-node=\"0\">Audit:</strong> Receipt of money or Audit of accounts of the Union/States. (अंकेक्षण: संघ/राज्यों के खातों का ऑडिट।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">2️⃣ Introduction &amp; Nature | प्रस्तुति और प्रकृति</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">House: Only in Lok Sabha (Not in Rajya Sabha).</p>\n<p style=\"line-height: 1.15 !important;\">(सदन: केवल लोकसभा में (राज्यसभा में नहीं)।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Permission: Mandatory prior recommendation of the President.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुमति: राष्ट्रपति की अनिवार्य पूर्व सिफारिश।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Introducer: Only by a Minister (Hence, a Government Bill).</p>\n<p style=\"line-height: 1.15 !important;\">(प्रस्तुतकर्ता: केवल एक मंत्री द्वारा (इसलिए, एक सरकारी विधेयक)।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">3️⃣ Role of Rajya Sabha | राज्यसभा की भूमिका</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Limitations:</strong> Cannot reject; Cannot amend. (सीमाएं: अस्वीकार नहीं कर सकती; संशोधन नहीं कर सकती।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Power:</strong> Can only make recommendations. (शक्ति: केवल सिफारिशें दे सकती है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Deadline:</strong> Must return the bill within <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"38\">14 days</strong>. (समय सीमा: 14 दिनों के भीतर विधेयक वापस करना अनिवार्य है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Lok Sabha's Choice:</strong> May accept or reject RS recommendations. (लोकसभा का विकल्प: राज्यसभा की सिफारिशों को स्वीकार या अस्वीकार कर सकती है।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" data-index-in-node=\"0\">4️⃣ Deemed Passage | स्वतः पारित होना</strong></h3>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">If Rajya Sabha does not return the bill within 14 days:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(यदि राज्यसभा 14 दिनों में विधेयक वापस नहीं करती:)</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">The bill is deemed passed by both Houses in the original form passed by Lok Sabha.</p>\n<p style=\"line-height: 1.15 !important;\">(विधेयक को लोकसभा द्वारा पारित मूल रूप में दोनों सदनों से पारित माना जाता है।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\" data-index-in-node=\"0\">5️⃣ No Joint Sitting | संयुक्त बैठक का अभाव</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Deadlock: Impossible, because Lok Sabha has the final say.</p>\n<p style=\"line-height: 1.15 !important;\">(गतिरोध: असंभव, क्योंकि लोकसभा का निर्णय अंतिम होता है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 108: Does NOT apply to Money Bills.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 108: धन विधेयक पर लागू नहीं होता है।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\" data-index-in-node=\"0\">6️⃣ Speaker&rsquo;s Certification | अध्यक्ष का प्रमाणन</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Authority: The Speaker of Lok Sabha decides if a bill is a Money Bill.</p>\n<p style=\"line-height: 1.15 !important;\">(अधिकार: लोकसभा अध्यक्ष तय करते हैं कि विधेयक धन विधेयक है या नहीं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Finality: The Speaker&rsquo;s decision is Final and Binding.</p>\n<p style=\"line-height: 1.15 !important;\">(अंतिम निर्णय: अध्यक्ष का निर्णय अंतिम और बाध्यकारी होता है।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"24\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25\" data-index-in-node=\"0\">7️⃣ President&rsquo;s Assent | राष्ट्रपति की सहमति</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"26,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,0,0\" data-index-in-node=\"0\">Options:</strong> May give assent OR withhold assent. (विकल्प: सहमति दे सकते हैं या रोक सकते हैं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Prohibition: Cannot return the bill for reconsideration.</p>\n<p style=\"line-height: 1.15 !important;\">(निषेध: पुनर्विचार के लिए विधेयक वापस नहीं कर सकते।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"28\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"28\" data-index-in-node=\"0\">8️⃣ Government Accountability | सरकारी जवाबदेही (V. Imp)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Defeat: If a Money Bill is defeated in Lok Sabha.</p>\n<p style=\"line-height: 1.15 !important;\">(हार: यदि लोकसभा में धन विधेयक गिर जाता है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Consequence: Loss of confidence; Council of Ministers must resign.</p>\n<p style=\"line-height: 1.15 !important;\">(परिणाम: विश्वास की कमी; मंत्रिपरिषद को इस्तीफा देना अनिवार्य है।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"30\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"31\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"31\" data-index-in-node=\"0\">9️⃣ State Money Bill | राज्य धन विधेयक</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"32,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,0,0\" data-index-in-node=\"0\">Intro:</strong> Only in <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,0,0\" data-index-in-node=\"15\">Legislative Assembly</strong> (Governor's recommendation). (विधानसभा में राज्यपाल की सिफारिश पर।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"32,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,1,0\" data-index-in-node=\"0\">Council:</strong> Only <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,1,0\" data-index-in-node=\"14\">14 days</strong>; no power to reject. (विधान परिषद: केवल 14 दिन; अस्वीकार करने की शक्ति नहीं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"32,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,2,0\" data-index-in-node=\"0\">Governor:</strong> Can Approve, Withhold, or <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,2,0\" data-index-in-node=\"36\">Reserve for President</strong>. (राज्यपाल: मंजूरी, रोक, या राष्ट्रपति के लिए आरक्षित कर सकते हैं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"32,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"32,3,0\" data-index-in-node=\"0\">No Return:</strong> Governor cannot return it for reconsideration. (पुनर्विचार के लिए वापस नहीं कर सकते।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"33\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"34\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"34\" data-index-in-node=\"0\">🔟 Money Bill vs Financial Bill | धन विधेयक बनाम वित्त विधेयक</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Money Bill (Art 110)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Financial Bill (Art 117)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,1,0,0\" data-index-in-node=\"0\">Origin</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,1,1,0\">Only Lok Sabha</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,1,2,0\">Type I: Lok Sabha; Type II: Either House</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,2,0,0\" data-index-in-node=\"0\">Recommendation</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,2,1,0\">President Required</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,2,2,0\">Required (Except Type II intro)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,3,0,0\" data-index-in-node=\"0\">RS Power</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,3,1,0\">Restricted (14 days)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,3,2,0\">Equal to Lok Sabha</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,4,0,0\" data-index-in-node=\"0\">Joint Sitting</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,4,1,0\">Not Possible</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"35,4,2,0\">Possible</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"36\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"37\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"37\" data-index-in-node=\"0\">⚠️ Exam Traps (Don't Forget!)</strong></h3>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"38\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"38,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"38,0,0\" data-index-in-node=\"0\">Local Taxes/Fines:</strong> These do <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"38,0,0\" data-index-in-node=\"28\">NOT</strong> make a bill a Money Bill. (स्थानीय कर/जुर्माना विधेयक को धन विधेयक नहीं बनाते।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"38,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"38,1,0\" data-index-in-node=\"0\">Audit:</strong> Audit of accounts <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"38,1,0\" data-index-in-node=\"25\">is</strong> a criterion for a Money Bill. (खातों का ऑडिट धन विधेयक का एक मानदंड है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"38,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"38,2,0\" data-index-in-node=\"0\">Veto:</strong> President can withhold assent, but <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"38,2,0\" data-index-in-node=\"41\">never</strong> return it. (राष्ट्रपति सहमति रोक सकते हैं, लेकिन कभी वापस नहीं भेज सकते।)</p>\n</li>\n</ol>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">Consider the following regarding constitutional authorities: / संवैधानिक अधिकारियों के संबंध में निम्नलिखित पर विचार करें:</strong></p>\n<ol start=\"1\" data-path-to-node=\"21\">\n<li>\n<p data-path-to-node=\"21,0,0\">The Speaker&rsquo;s certification of a Money Bill is mandatory before transmission to the Rajya Sabha, and this decision is final. (राज्यसभा को भेजने से पहले धन विधेयक पर अध्यक्ष का प्रमाणन अनिवार्य है, और यह निर्णय अंतिम है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,1,0\">The President must give assent; he can neither withhold his assent nor return the bill for reconsideration. (राष्ट्रपति को सहमति देनी ही होगी; वह न तो अपनी सहमति रोक सकते हैं और न ही पुनर्विचार के लिए विधेयक वापस कर सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,2,0\">In State Legislatures, Money Bills are introduced only in the Legislative Assembly with the Governor's recommendation. (राज्य विधानमंडलों में, धन विधेयक केवल राज्यपाल की सिफारिश पर विधानसभा में पेश किए जाते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,3,0\">A Governor can approve, withhold, or reserve a Money Bill for the President, but cannot return it for reconsideration. (राज्यपाल धन विधेयक को मंजूरी दे सकते हैं, रोक सकते हैं या राष्ट्रपति के लिए आरक्षित कर सकते हैं, लेकिन पुनर्विचार के लिए वापस नहीं कर सकते।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<ul>\n<li>\n<p data-path-to-node=\"24,0,0\"><span style=\"font-size: 10pt;\">Statement 2 is <strong data-path-to-node=\"24,0,0\" data-index-in-node=\"29\">incorrect</strong>. The President <strong data-path-to-node=\"24,0,0\" data-index-in-node=\"54\">can withhold</strong> his assent (though he usually doesn't), but he <strong data-path-to-node=\"24,0,0\" data-index-in-node=\"114\">cannot return</strong> it for reconsideration.</span></p>\n</li>\n<li>\n<p data-path-to-node=\"24,1,0\"><span style=\"font-size: 10pt;\">&nbsp;कथन 2 <strong data-path-to-node=\"24,1,0\" data-index-in-node=\"18\">गलत</strong> है। राष्ट्रपति अपनी सहमति <strong data-path-to-node=\"24,1,0\" data-index-in-node=\"48\">रोक सकते हैं</strong> (हालांकि वह आमतौर पर ऐसा नहीं करते), लेकिन वह इसे पुनर्विचार के लिए <strong data-path-to-node=\"24,1,0\" data-index-in-node=\"129\">वापस नहीं कर सकते</strong>।</span></p>\n<h2 data-start=\"974\" data-end=\"1010\"><span style=\"font-size: 10pt;\">Quick Exam Logic</span></h2>\n<ul data-start=\"1011\" data-end=\"1102\">\n<li data-start=\"1011\" data-end=\"1035\">\n<p data-start=\"1013\" data-end=\"1035\"><span style=\"font-size: 10pt;\">✔️ Give assent &rarr; Yes</span></p>\n</li>\n<li data-start=\"1036\" data-end=\"1064\">\n<p data-start=\"1038\" data-end=\"1064\"><span style=\"font-size: 10pt;\">✔️ Withhold assent &rarr; Yes</span></p>\n</li>\n<li data-start=\"1065\" data-end=\"1102\">\n<p data-start=\"1067\" data-end=\"1102\"><span style=\"font-size: 10pt;\">❌ Return for reconsideration &rarr; No</span></p>\n</li>\n</ul>\n<h1 data-start=\"272\" data-end=\"314\"><span style=\"font-size: 10pt;\">MONEY BILL &mdash; CHEAT SHEET (Article 110)</span></h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" style=\"width: 2380px;\" data-start=\"339\" data-end=\"1059\">\n<thead data-start=\"339\" data-end=\"382\">\n<tr data-start=\"339\" data-end=\"382\">\n<th style=\"width: 216.641px;\" data-start=\"339\" data-end=\"349\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\">Feature</span></th>\n<th style=\"width: 718.094px;\" data-start=\"349\" data-end=\"382\" data-col-size=\"md\"><span style=\"font-size: 10pt;\">Rules &amp; Facts (Union / State)</span></th>\n<th style=\"width: 717.625px;\">&nbsp;</th>\n<th style=\"width: 717.641px;\">&nbsp;</th>\n</tr>\n</thead>\n<tbody data-start=\"425\" data-end=\"1059\">\n<tr data-start=\"425\" data-end=\"501\">\n<td style=\"width: 216.641px;\" data-start=\"425\" data-end=\"448\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"427\" data-end=\"447\">Relevant Article</strong></span></td>\n<td style=\"width: 718.094px;\" data-start=\"448\" data-end=\"501\" data-col-size=\"md\"><span style=\"font-size: 10pt;\"><strong data-start=\"450\" data-end=\"473\">Article 110 (Union)</strong> / <strong data-start=\"476\" data-end=\"499\">Article 199 (State)</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"450\" data-end=\"473\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"450\" data-end=\"473\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"502\" data-end=\"576\">\n<td style=\"width: 216.641px;\" data-start=\"502\" data-end=\"530\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"504\" data-end=\"529\">House of Introduction</strong></span></td>\n<td style=\"width: 718.094px;\" data-col-size=\"md\" data-start=\"530\" data-end=\"576\"><span style=\"font-size: 10pt;\"><strong data-start=\"532\" data-end=\"550\">Lok Sabha only</strong> / <strong data-start=\"553\" data-end=\"574\">Vidhan Sabha only</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"532\" data-end=\"550\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"532\" data-end=\"550\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"577\" data-end=\"646\">\n<td style=\"width: 216.641px;\" data-start=\"577\" data-end=\"598\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"579\" data-end=\"597\">Recommendation</strong></span></td>\n<td style=\"width: 718.094px;\" data-col-size=\"md\" data-start=\"598\" data-end=\"646\"><span style=\"font-size: 10pt;\"><strong data-start=\"600\" data-end=\"621\">President (Union)</strong> / <strong data-start=\"624\" data-end=\"644\">Governor (State)</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"600\" data-end=\"621\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"600\" data-end=\"621\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"647\" data-end=\"703\">\n<td style=\"width: 216.641px;\" data-start=\"647\" data-end=\"664\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"649\" data-end=\"663\">Introducer</strong></span></td>\n<td style=\"width: 718.094px;\" data-start=\"664\" data-end=\"703\" data-col-size=\"md\"><span style=\"font-size: 10pt;\"><strong data-start=\"666\" data-end=\"683\">Minister only</strong> (Government Bill)</span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"666\" data-end=\"683\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"666\" data-end=\"683\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"704\" data-end=\"759\">\n<td style=\"width: 216.641px;\" data-start=\"704\" data-end=\"724\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"706\" data-end=\"723\">Certification</strong></span></td>\n<td style=\"width: 718.094px;\" data-start=\"724\" data-end=\"759\" data-col-size=\"md\"><span style=\"font-size: 10pt;\"><strong data-start=\"726\" data-end=\"757\">Speaker&rsquo;s decision is final</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"726\" data-end=\"757\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"726\" data-end=\"757\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"760\" data-end=\"889\">\n<td style=\"width: 216.641px;\" data-start=\"760\" data-end=\"783\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"762\" data-end=\"782\">Upper House Role</strong></span></td>\n<td style=\"width: 718.094px;\" data-start=\"783\" data-end=\"889\" data-col-size=\"md\"><span style=\"font-size: 10pt;\"><strong data-start=\"785\" data-end=\"823\">Rajya Sabha / Legislative Council:</strong> Max <strong data-start=\"828\" data-end=\"839\">14 days</strong>, can only <strong data-start=\"850\" data-end=\"863\">recommend</strong>, cannot amend or reject</span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"785\" data-end=\"823\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"785\" data-end=\"823\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"890\" data-end=\"929\">\n<td style=\"width: 216.641px;\" data-start=\"890\" data-end=\"910\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"892\" data-end=\"909\">Joint Sitting</strong></span></td>\n<td style=\"width: 718.094px;\" data-col-size=\"md\" data-start=\"910\" data-end=\"929\"><span style=\"font-size: 10pt;\"><strong data-start=\"912\" data-end=\"927\">Not allowed</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"912\" data-end=\"927\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"912\" data-end=\"927\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"930\" data-end=\"995\">\n<td style=\"width: 216.641px;\" data-start=\"930\" data-end=\"947\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"932\" data-end=\"946\">Veto Power</strong></span></td>\n<td style=\"width: 718.094px;\" data-col-size=\"md\" data-start=\"947\" data-end=\"995\"><span style=\"font-size: 10pt;\"><strong data-start=\"949\" data-end=\"993\">Assent or Withhold Assent; Cannot Return</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"949\" data-end=\"993\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"949\" data-end=\"993\">&nbsp;</strong></span></td>\n</tr>\n<tr data-start=\"996\" data-end=\"1059\">\n<td style=\"width: 216.641px;\" data-start=\"996\" data-end=\"1029\" data-col-size=\"sm\"><span style=\"font-size: 10pt;\"><strong data-start=\"998\" data-end=\"1028\">If defeated in Lower House</strong></span></td>\n<td style=\"width: 718.094px;\" data-col-size=\"md\" data-start=\"1029\" data-end=\"1059\"><span style=\"font-size: 10pt;\"><strong data-start=\"1031\" data-end=\"1057\">Government must resign</strong></span></td>\n<td style=\"width: 717.625px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"1031\" data-end=\"1057\">&nbsp;</strong></span></td>\n<td style=\"width: 717.641px;\"><span style=\"font-size: 10pt;\"><strong data-start=\"1031\" data-end=\"1057\">&nbsp;</strong></span></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1061\" data-end=\"1064\" />\n<h2 data-start=\"1066\" data-end=\"1115\"><span style=\"font-size: 10pt;\">🚫 &ldquo;NOT A MONEY BILL&rdquo; LIST (Very Common Traps)</span></h2>\n<p data-start=\"1117\" data-end=\"1181\"><span style=\"font-size: 10pt;\">A Bill is <strong data-start=\"1127\" data-end=\"1134\">NOT</strong> a Money Bill <strong data-start=\"1148\" data-end=\"1166\">merely because</strong> it deals with:</span></p>\n<ul data-start=\"1183\" data-end=\"1365\">\n<li data-start=\"1183\" data-end=\"1222\">\n<p data-start=\"1185\" data-end=\"1222\"><span style=\"font-size: 10pt;\"><strong data-start=\"1185\" data-end=\"1207\">Fines or penalties</strong> (आर्थिक दंड)</span></p>\n</li>\n<li data-start=\"1223\" data-end=\"1283\">\n<p data-start=\"1225\" data-end=\"1283\"><span style=\"font-size: 10pt;\"><strong data-start=\"1225\" data-end=\"1258\">Fees for licences or services</strong> (लाइसेंस / सेवा शुल्क)</span></p>\n</li>\n<li data-start=\"1284\" data-end=\"1365\">\n<p data-start=\"1286\" data-end=\"1365\"><span style=\"font-size: 10pt;\"><strong data-start=\"1286\" data-end=\"1301\">Local taxes</strong> imposed by municipalities or panchayats (स्थानीय निकायों के कर)</span></p>\n</li>\n</ul>\n<p data-start=\"1367\" data-end=\"1422\"><span style=\"font-size: 10pt;\">👉 These <strong data-start=\"1376\" data-end=\"1385\">alone</strong> do <strong data-start=\"1389\" data-end=\"1396\">NOT</strong> make a bill a Money Bill.</span></p>\n<hr data-start=\"1424\" data-end=\"1427\" />\n<h2 data-start=\"1429\" data-end=\"1467\"><span style=\"font-size: 10pt;\">📜 &ldquo;EXCLUSIVELY ARTICLE 110&rdquo; LIST</span></h2>\n<p data-start=\"1468\" data-end=\"1529\"><span style=\"font-size: 10pt;\">A Bill is a <strong data-start=\"1480\" data-end=\"1528\">Money Bill ONLY IF it deals exclusively with</strong>:</span></p>\n<ul data-start=\"1531\" data-end=\"2328\">\n<li data-start=\"1531\" data-end=\"1654\">\n<p data-start=\"1533\" data-end=\"1654\"><span style=\"font-size: 10pt;\"><strong data-start=\"1533\" data-end=\"1604\">Imposition, abolition, remission, alteration or regulation of taxes</strong></span><br data-start=\"1604\" data-end=\"1607\" /><span style=\"font-size: 10pt;\"> (कर लगाना / हटाना / बदलना / नियंत्रित करना)</span></p>\n</li>\n<li data-start=\"1655\" data-end=\"1775\">\n<p data-start=\"1657\" data-end=\"1775\"><span style=\"font-size: 10pt;\"><strong data-start=\"1657\" data-end=\"1724\">Borrowing of money or giving guarantees by the Union Government</strong></span><br data-start=\"1724\" data-end=\"1727\" /><span style=\"font-size: 10pt;\"> (केंद्र सरकार द्वारा ऋण लेना या गारंटी देना)</span></p>\n</li>\n<li data-start=\"1776\" data-end=\"1895\">\n<p data-start=\"1778\" data-end=\"1895\"><span style=\"font-size: 10pt;\"><strong data-start=\"1778\" data-end=\"1852\">Custody of the Consolidated Fund of India or Contingency Fund of India</strong></span><br data-start=\"1852\" data-end=\"1855\" /><span style=\"font-size: 10pt;\"> (CFI / Contingency Fund की अभिरक्षा)</span></p>\n</li>\n<li data-start=\"1896\" data-end=\"1991\">\n<p data-start=\"1898\" data-end=\"1991\"><span style=\"font-size: 10pt;\"><strong data-start=\"1898\" data-end=\"1962\">Appropriation of money out of the Consolidated Fund of India</strong></span><br data-start=\"1962\" data-end=\"1965\" /><span style=\"font-size: 10pt;\"> (CFI से धन का विनियोग)</span></p>\n</li>\n<li data-start=\"1992\" data-end=\"2103\">\n<p data-start=\"1994\" data-end=\"2103\"><span style=\"font-size: 10pt;\"><strong data-start=\"1994\" data-end=\"2066\">Declaration of expenditure charged on the Consolidated Fund of India</strong></span><br data-start=\"2066\" data-end=\"2069\" /><span style=\"font-size: 10pt;\"> (CFI पर भारित व्यय घोषित करना)</span></p>\n</li>\n<li data-start=\"2104\" data-end=\"2232\">\n<p data-start=\"2106\" data-end=\"2158\"><span style=\"font-size: 10pt;\"><strong data-start=\"2106\" data-end=\"2144\">Receipt, custody or issue of money</strong> relating to</span></p>\n<ul data-start=\"2161\" data-end=\"2232\">\n<li data-start=\"2161\" data-end=\"2198\">\n<p data-start=\"2163\" data-end=\"2198\"><span style=\"font-size: 10pt;\"><strong data-start=\"2163\" data-end=\"2193\">Consolidated Fund of India</strong> or</span></p>\n</li>\n<li data-start=\"2201\" data-end=\"2232\">\n<p data-start=\"2203\" data-end=\"2232\"><span style=\"font-size: 10pt;\"><strong data-start=\"2203\" data-end=\"2230\">Public Account of India</strong></span></p>\n</li>\n</ul>\n</li>\n<li data-start=\"2233\" data-end=\"2328\">\n<p data-start=\"2235\" data-end=\"2328\"><span style=\"font-size: 10pt;\"><strong data-start=\"2235\" data-end=\"2278\">Audit of the accounts of the UNION only</strong></span><br data-start=\"2278\" data-end=\"2281\" /><span style=\"font-size: 10pt;\"> (⚠️ State accounts audit is <strong data-start=\"2311\" data-end=\"2318\">NOT</strong> included)</span></p>\n</li>\n</ul>\n<hr data-start=\"2330\" data-end=\"2333\" />\n<h2 data-start=\"2335\" data-end=\"2377\"><span style=\"font-size: 10pt;\">🗳️ VETO OPTIONS (Important Difference)</span></h2>\n<h3 data-start=\"2379\" data-end=\"2410\"><span style=\"font-size: 10pt;\"><strong data-start=\"2383\" data-end=\"2410\">President &mdash; Article 111</strong></span></h3>\n<ul data-start=\"2411\" data-end=\"2486\">\n<li data-start=\"2411\" data-end=\"2428\">\n<p data-start=\"2413\" data-end=\"2428\"><span style=\"font-size: 10pt;\">✅ Give assent</span></p>\n</li>\n<li data-start=\"2429\" data-end=\"2450\">\n<p data-start=\"2431\" data-end=\"2450\"><span style=\"font-size: 10pt;\">❌ Withhold assent</span></p>\n</li>\n<li data-start=\"2451\" data-end=\"2486\">\n<p data-start=\"2453\" data-end=\"2486\"><span style=\"font-size: 10pt;\">🚫 <strong data-start=\"2456\" data-end=\"2486\">Cannot return a Money Bill</strong></span></p>\n</li>\n</ul>\n<h3 data-start=\"2488\" data-end=\"2518\"><span style=\"font-size: 10pt;\"><strong data-start=\"2492\" data-end=\"2518\">Governor &mdash; Article 200</strong></span></h3>\n<ul data-start=\"2519\" data-end=\"2642\">\n<li data-start=\"2519\" data-end=\"2536\">\n<p data-start=\"2521\" data-end=\"2536\"><span style=\"font-size: 10pt;\">✅ Give assent</span></p>\n</li>\n<li data-start=\"2537\" data-end=\"2558\">\n<p data-start=\"2539\" data-end=\"2558\"><span style=\"font-size: 10pt;\">❌ Withhold assent</span></p>\n</li>\n<li data-start=\"2559\" data-end=\"2600\">\n<p data-start=\"2561\" data-end=\"2600\"><span style=\"font-size: 10pt;\">📤 Reserve the bill for the President</span></p>\n</li>\n<li data-start=\"2601\" data-end=\"2642\">\n<p data-start=\"2603\" data-end=\"2642\"><span style=\"font-size: 10pt;\">🚫 <strong data-start=\"2606\" data-end=\"2642\">Cannot return a State Money Bill</strong></span></p>\n</li>\n</ul>\n<hr data-start=\"2644\" data-end=\"2647\" />\n<h2 data-start=\"2649\" data-end=\"2685\"><span style=\"font-size: 10pt;\">🛑 TOP EXAM TRAPS (Must Remember)</span></h2>\n<p></p>\n<ul data-start=\"2687\" data-end=\"3087\">\n<li data-start=\"2687\" data-end=\"2769\">\n<p data-start=\"2689\" data-end=\"2769\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"2691\" data-end=\"2729\">&ldquo;Rajya Sabha can amend a Money Bill&rdquo;</em></span><br data-start=\"2729\" data-end=\"2732\" /><span style=\"font-size: 10pt;\"> &rarr; <strong data-start=\"2736\" data-end=\"2745\">Wrong</strong> (It can only recommend)</span></p>\n</li>\n<li data-start=\"2771\" data-end=\"2872\">\n<p data-start=\"2773\" data-end=\"2872\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"2775\" data-end=\"2832\">&ldquo;President can return a Money Bill for reconsideration&rdquo;</em></span><br data-start=\"2832\" data-end=\"2835\" /><span style=\"font-size: 10pt;\"> &rarr; <strong data-start=\"2839\" data-end=\"2848\">Wrong</strong> (Return is not allowed)</span></p>\n</li>\n<li data-start=\"2874\" data-end=\"2983\">\n<p data-start=\"2876\" data-end=\"2983\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"2878\" data-end=\"2944\">&ldquo;Audit of Union and State accounts is covered under Article 110&rdquo;</em></span><br data-start=\"2944\" data-end=\"2947\" /><span style=\"font-size: 10pt;\"> &rarr; <strong data-start=\"2951\" data-end=\"2960\">Wrong</strong> (Only <strong data-start=\"2967\" data-end=\"2976\">Union</strong> audit)</span></p>\n</li>\n<li data-start=\"2985\" data-end=\"3087\">\n<p data-start=\"2987\" data-end=\"3087\"><span style=\"font-size: 10pt;\">❌ <em data-start=\"2989\" data-end=\"3039\">&ldquo;Chairman of Rajya Sabha certifies a Money Bill&rdquo;</em></span><br data-start=\"3039\" data-end=\"3042\" /><span style=\"font-size: 10pt;\"> &rarr; <strong data-start=\"3046\" data-end=\"3055\">Wrong</strong> (Only <strong data-start=\"3062\" data-end=\"3086\">Speaker of Lok Sabha</strong>)</span></p>\n</li>\n</ul>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"28\"><strong data-path-to-node=\"28\" data-index-in-node=\"0\">Evaluate the following statements: / निम्नलिखित कथनों का मूल्यांकन करें:</strong></p>\n<ol start=\"1\" data-path-to-node=\"29\">\n<li>\n<p data-path-to-node=\"29,0,0\">A Money Bill (Art. 110) deals exclusively with Article 110 subjects, while a Financial Bill (Art. 117) deals with financial matters beyond those subjects. (धन विधेयक (अनुछेद 110) विशेष रूप से अनुछेद 110 के विषयों से संबंधित है, जबकि वित्त विधेयक (अनुछेद 117) उन विषयों के अलावा वित्तीय मामलों से संबंधित है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"29,1,0\">Finance and Appropriation Bills are Money Bills; Banking Regulation and Companies (Amendment) Bills are Financial Bills. (वित्त और विनियोग विधेयक धन विधेयक हैं; बैंकिंग विनियमन और कंपनी (संशोधन) विधेयक वित्त विधेयक हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"29,2,0\">Money Bills can only originate in the Lok Sabha, whereas all Financial Bills can be introduced in either House. (धन विधेयक केवल लोकसभा में शुरू हो सकते हैं, जबकि सभी वित्त विधेयक किसी भी सदन में पेश किए जा सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"29,3,0\">The Aadhaar Act (2016) and Finance Act (2017) faced controversy for using the Money Bill route to include non-financial matters like tribunal appointments and benefit distribution. (आधार अधिनियम (2016) और वित्त अधिनियम (2017) को न्यायाधिकरण नियुक्तियों और लाभ वितरण जैसे गैर-वित्तीय मामलों को शामिल करने के लिए धन विधेयक मार्ग का उपयोग करने के लिए विवाद का सामना करना पड़ा।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"30\"><strong data-path-to-node=\"30\" data-index-in-node=\"0\">Which of the statements given above are correct? / उपर्युक्त में से कौन से कथन सही हैं?</strong></p>",

    "solution": "<ul data-path-to-node=\"32\">\n<li>\n<p data-path-to-node=\"32,0,0\">&nbsp;Statement 3 is <strong data-path-to-node=\"32,0,0\" data-index-in-node=\"29\">incorrect</strong>. While Financial Bill (Type II) can be introduced in either House, <strong data-path-to-node=\"32,0,0\" data-index-in-node=\"106\">Financial Bill (Type I) can only be introduced in the Lok Sabha</strong> (similar to a Money Bill).</p>\n</li>\n<li>\n<p data-path-to-node=\"32,1,0\">&nbsp;कथन 3 <strong data-path-to-node=\"32,1,0\" data-index-in-node=\"18\">गलत</strong> है। हालांकि वित्त विधेयक (टाइप II) किसी भी सदन में पेश किया जा सकता है, <strong data-path-to-node=\"32,1,0\" data-index-in-node=\"94\">वित्त विधेयक (टाइप I) केवल लोकसभा में ही पेश किया जा सकता है</strong> (धन विधेयक की तरह)।</p>\n</li>\n</ul>\n<ul data-start=\"1714\" data-end=\"1991\">\n<li data-start=\"1714\" data-end=\"1753\">\n<p data-start=\"1716\" data-end=\"1753\">Money Bills &rarr; ✔️ <strong data-start=\"1733\" data-end=\"1751\">Only Lok Sabha</strong></p>\n</li>\n<li data-start=\"1754\" data-end=\"1991\">\n<p data-start=\"1756\" data-end=\"1823\">Financial Bills &rarr; ❌ <strong data-start=\"1776\" data-end=\"1787\">Not all</strong> can be introduced in either House</p>\n<ul data-start=\"1826\" data-end=\"1991\">\n<li data-start=\"1826\" data-end=\"1916\">\n<p data-start=\"1828\" data-end=\"1916\"><strong data-start=\"1828\" data-end=\"1859\">Financial Bill (Category I)</strong> &rarr; <strong data-start=\"1862\" data-end=\"1880\">Lok Sabha only</strong> (with President&rsquo;s recommendation)</p>\n</li>\n<li data-start=\"1919\" data-end=\"1991\">\n<p data-start=\"1921\" data-end=\"1991\"><strong data-start=\"1921\" data-end=\"1953\">Financial Bill (Category II)</strong> &rarr; can be introduced in either House</p>\n</li>\n</ul>\n</li>\n</ul>\n<p></p>\n<p data-start=\"1993\" data-end=\"2042\">📌 The word <strong data-start=\"2005\" data-end=\"2014\">&ldquo;all&rdquo;</strong> makes this statement wrong.</p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"1\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"1\" data-index-in-node=\"0\">Articles Related to Money Bills (Union vs. State)</strong></h3>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">(धन विधेयक से संबंधित अनुच्छेद: संघ बनाम राज्य)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Union (संघ)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">State (राज्य)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Core Rule (मुख्य नियम)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\" data-index-in-node=\"0\">Definition (परिभाषा)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\" data-index-in-node=\"0\">Article 110</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\" data-index-in-node=\"0\">Article 199</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,3,0\">Defines what qualifies as a Money Bill. (परिभाषित करता है कि धन विधेयक क्या है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\" data-index-in-node=\"0\">Special Procedure (विशेष प्रक्रिया)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\" data-index-in-node=\"0\">Article 109</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\" data-index-in-node=\"0\">Article 198</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,3,0\">Prohibits intro in Upper House; 14-day return rule. (उच्च सदन में रोक; 14 दिन का नियम।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\" data-index-in-node=\"0\">Assent of Executive (सहमति)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\" data-index-in-node=\"0\">Article 111</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !im ant; margin-top: 0px !important;\" data-path-to-node=\"7,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,1,0\" data-index-in-node=\"0\">Appropriation Bill</strong> (विनियोग विधेयक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,2,0\">It is a type of Money Bill used to withdraw money from CFI. (यह CFI से धन निकालने के लिए एक प्रकार का धन विधेयक है।)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,4,0,0\" data-index-in-node=\"0\">Article 117</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,4,1,0\" data-index-in-node=\"0\">Financial Bills</strong> (वित्त विधेयक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,4,2,0\">Broader category; All Money Bills fall under this. (व्यापक श्रेणी; सभी धन विधेयक इसके अंतर्गत आते हैं।)</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0       "<p>The <strong data-start=\"487\" data-end=\"505\">First Schedule</strong> lists the States and Union Territories of India along with their territories, while the <strong data-start=\"594\" data-end=\"613\">Fourth Schedule</strong> allocates seats to States and Union Territories in the Rajya Sabha.<br data-start=\"681\" data-end=\"684\" /><em data-start=\"684\" data-end=\"806\">(प्रथम अनुसूची राज्यों व केंद्रशासित प्रदेशों की सूची देती है, जबकि चतुर्थ अनुसूची राज्यसभा में सीटों का आवंटन करती है।)</em></p>",
      "<p>The <strong data-start=\"819\" data-end=\"838\">Second Schedule</strong> deals with emoluments and allowances of constitutional authorities such as the President, Governors, Judges of SC/HC and the CAG, whereas the <strong data-start=\"981\" data-end=\"999\">Third Schedule</strong> contains forms of oaths or affirmations for constitutional functionaries.<br data-start=\"1073\" data-end=\"1076\" /><em data-start=\"1076\" data-end=\"1184\">(द्वितीय अनुसूची संवैधानिक पदाधिकारियों के वेतन-भत्तों से तथा तृतीय अनुसूची शपथ/प्रतिज्ञान से संबंधित है।)</em></p>",

    "question": "<p>With reference to the <strong data-start=\"2089\" data-end=\"2148\">Seventh to Twelfth Schedules of the Indian Constitution</strong>, consider the following statements:</p>",
