    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Consider the following statements regarding the classification of DPSP:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"72\">(DPSP के वर्गीकरण के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Article 38</strong> directs the State to minimize inequalities in income, status, and opportunities to secure a social order informed by justice. (अनुच्छेद 38 राज्य को आय, स्थिति और अवसरों में असमानताओं को कम करने का निर्देश देता है ताकि न्यायपूर्ण सामाजिक व्यवस्था सुनिश्चित हो सके।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Article 43B</strong>, added by the 97th CAA 2011, is a Gandhian principle that promotes the professional management of cooperative societies. (अनुच्छेद 43B, जिसे 97वें संशोधन 2011 द्वारा जोड़ा गया, एक गांधीवादी सिद्धांत है जो सहकारी समितियों के पेशेवर प्रबंधन को बढ़ावा देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Article 48</strong> contains both Gandhian and Liberal elements as it deals with prohibiting the slaughter of milch cattle and organizing agriculture on scientific lines. (अनुच्छेद 48 में गांधीवादी और उदार दोनों तत्व शामिल हैं क्योंकि यह दुधारू पशुओं के वध को रोकने और वैज्ञानिक तर्ज पर कृषि के संगठन से संबंधित है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The promotion of cottage industries (Art. 43) on an individual or cooperative basis in rural areas is a Socialist principle. (ग्रामीण क्षेत्रों में व्यक्तिगत या सहकारी आधार पर कुटीर उद्योगों को बढ़ावा देना (अनुच्छेद 43) एक समाजवादी सिद्धांत है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 1, 2, and 3 only C) 2 and 3 only D) All of the above</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"

    "marks": 2.0,

nance. (न्यायालय द्वारा लागू नहीं, पर शासन में मौलिक)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,0,0\" data-index-in-node=\"0\">38</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,1,0\">Socialist</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,3,2,0\" data-index-in-node=\"0\">Welfare:</strong> Minimize inequalities in income/status. (कल्याणकारी राज्य; आय असमानता कम करना)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,0,0\" data-index-in-node=\"0\">39</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,1,0\">Socialist</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,4,2,0\" data-index-in-node=\"0\">Livelihood &amp; Wealth:</strong> Equal pay for equal work; prevent concentration of wealth. (आजीविका; धन का समान वितरण; समान कार्य-समान वेतन)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,0,0\" data-index-in-node=\"0\">39A</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,1,0\">Socialist</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,0\" data-index-in-node=\"0\">Legal Aid:</strong> Free legal aid for the poor (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,5,2,0\" data-index-in-node=\"40\">Added by 42nd CAA</strong>). (मुफ्त कानूनी सहायता)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,6,0,0\" data-index-in-node=\"0\">40</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; px !important;\" data-path-to-node=\"4,18,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,18,2,0\" data-index-in-node=\"0\">Monuments:</strong> Protect places of national importance. (राष्ट्रीय महत्व के स्मारकों का संरक्षण)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,19,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,19,0,0\" data-index-in-node=\"0\">50</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,19,1,0\">Liberal</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,19,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,19,2,0\" data-index-in-node=\"0\">Judiciary:</strong> Separation of Judiciary from Executive. (कार्यपालिका से न्यायपालिका का पृथक्करण)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,20,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,20,0,0\" data-index-in-node=\"0\">51</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-no     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the amendments to DPSP and the judicial conflict between Part III and Part IV:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"123\">(DPSP में संशोधनों और भाग III एवं भाग IV के बीच न्यायिक संघर्ष के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">42nd Amendment Act of 1976</strong> added four new DPSP: Article 39(f) for children's development, 39A for free legal aid, 43A for workers' participation, and 48A for environmental protection. (1976 के <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"197\">42वें संशोधन अधिनियम</strong> ने चार नए DPSP जोड़े: बच्चों के विकास के लिए 39(f), मुफ्त कानूनी सहायता के लिए 39A, श्रमिकों की भागीदारी के लिए 43A, और पर्यावरण संरक्षण के लिए 48A।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">44th Amendment Act (1978)</strong> added Article 38(2) to minimize inequalities, while the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"86\">97th Amendment Act (2011)</strong> promoted the management of cooperative societies under Article 43B. (1978 के <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"189\">44वें संशोधन अधिनियम</strong> ने असमानताओं को कम करने के लिए अनुच्छेद 38(2) जोड़ा, जबकि <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"268\">97वें संशोधन अधिनियम (2011)</strong> ने अनुच्छेद 43B के तहत सहकारी समितियों के प्रबंधन को बढ़ावा दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">In the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"7\">Champakam Dorairajan case (1951)</strong>, the Supreme Court ruled that DPSP are subsidiary to Fundamental Rights and must conform to them, leading to the 1st Constitutional Amendment. (चंपकम दोरैराजन मामले (1951) में, सुप्रीम कोर्ट ने फैसला सुनाया कि DPSP मौलिक अधिकारों के सहायक हैं और उनके अनुरूप होने चाहिए, जिसके कारण पहला संविधान संशोधन हुआ।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">In <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"3\">Minerva Mills (1980)</strong>, the Supreme Court struck down the 42nd Amendment's provision giving DPSP absolute precedence over FRs, ruling that the Constitution is founded on the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"175\">balance</strong> between Part III and Part IV. (मिनर्वा मिल्स (1980) में, सुप्रीम कोर्ट ने 42वें संशोधन के उस प्रावधान को रद्द कर दिया जिसने DPSP को FRs पर पूर्ण प्राथमिकता दी थी, यह फैसला सुनाते हुए कि संविधान भाग III और भाग IV के बीच <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"402\">संतुलन</strong> की आधारशिला पर टिका है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">The current legal position is that while FRs are generally superior, laws implementing Socialist principles of <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"111\">Articles 39(b) and 39(c)</strong> are protected from challenge under Articles 14 and 19. (वर्तमान कानूनी स्थिति यह है कि जबकि FRs आम तौर पर श्रेष्ठ हैं, <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"255\">अनुच्छेद 39(b) और 39(c)</strong> के समाजवादी सिद्धांतों को लागू करने वाले कानूनों को अनुच्छेद 14 और 19 के तहत चुनौती से सुरक्षा प्राप्त है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 3, and 5 only B) 2, 4, and 5 only C) 1, 2, 3, and 4 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">&nbsp;</h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Case / Amendment</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Result (परिणाम)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Champakam Dorairajan</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\" data-index-in-node=\"0\">FR &gt; DPSP</strong> (DPSP is a subsidiary/सहायक)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1 \">42nd CAA (1976)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\" data-index-in-node=\"0\">DPSP &gt; FR</strong> (Parliament tried to flip the balance/संतुलन पलटने का प्रयास)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\" data-index-in-node=\"0\">Minerva Mills (1980)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\" data-index-in-node=\"0\">Harmonious Construction</strong>; FR and DPSP are complementary. (समान्वयपूर्ण अर्थान्वयन)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the comparative features of Fundamental Rights (Part III), Fundamental Duties (Part IVA), and Directive Principles of State Policy (Part IV):</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"186\">(मौलिक अधिकारों (भाग III), मौलिक कर्तव्यों (भाग IVA) और राज्य के नीति निदेशक तत्वों (भाग IV) की तुलनात्मक विशेषताओं के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Fundamental Rights (FRs)</strong><span class=\"citation-24\"> are justiciable and aim to establish political democracy, whereas </span><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"91\">DPSPs</strong><span class=\"citation-24 citation-end-24\"> are non-justiciable and aim to establish social and economic democracy.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (मौलिक अधिकार (FR) न्यायसंगत हैं और राजनीतिक लोकतंत्र स्थापित करना चाहते हैं, जबकि DPSP गैर-न्यायसंगत हैं और सामाजिक एवं आर्थिक लोकतंत्र स्थापित करना चाहते हैं।)<sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Testbook. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjn9KCJmMyRAxUAAAAAHQAAAAAQ1Ac\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><span class=\"citation-23\">While FRs act as </span><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"17\">negative obligations</strong><span class=\"citation-23\"> that restrict State action, DPSPs represent </span><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"82\">positive obligations</strong><span class=\"citation-23 citation-end-23\"> that direct the State to act in a certain manner for community welfare.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (जहाँ FR 'नकारात्मक दायित्व' के रूप में कार्य करते हैं जो राज्य की कार्रवाई को प्रतिबंधित करते हैं, वहीं DPSP 'सकारात्मक दायित्व' का प्रतिनिधित्व करते हैं जो राज्य को सामुदायिक कल्याण के लिए कार्य करने का निर्देश देते हैं।)<sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Centre for Constitutional Studies. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjn9KCJmMyRAxUAAAAAHQAAAAAQ1Qc\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Fundamental Duties (FDs)</strong><span class=\"citation-22\"> and </span><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"29\">DPSPs</strong><span class=\"citation-22 citation-end-22\"> both share a non-justiciable nature and rely primarily on moral sanctions rather than legal sanctions for their enforcement.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (मौलिक कर्तव्य (FD) और DPSP दोनों एक गैर-न्यायसंगत प्रकृति साझा करते हैं और अपने प्रवर्तन के लिए कानूनी प्रतिबंधों के बजाय मुख्य रूप से नैतिक प्रतिबंधों पर निर्भर करते हैं।)<sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Wikipedia. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjn9KCJmMyRAxUAAAAAHQAAAAAQ1gc\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><span class=\"citation-21\">Any law violating </span><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"18\">Fundamental Rights</strong><span class=\"citation-21\"> can be declared unconstitutional by the courts, but a law cannot be declared unconstitutional merely because it violates a </span><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"160\">DPSP</strong><span class=\"citation-21\"> or a </span><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"170\">Fundamental Duty</strong><span class=\"citation-21 citation-end-21\">.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (मौलिक अधिकारों का उल्लंघन करने वाले किसी भी कानून को अदालतों द्वारा असंवैधानिक घोषित किया जा सकता है, लेकिन किसी कानून को केवल इसलिए असंवैधानिक घोषित नहीं किया जा सकता क्योंकि वह DPSP या मौलिक कर्तव्य का उल्लंघन करता है।)<sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Finology Blog. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjn9KCJmMyRAxUAAAAAHQAAAAAQ1wc\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p></p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><span class=\"citation-20\">Regarding their origins, FRs were inspired by the </span><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"50\">USA Constitution</strong><span class=\"citation-20\">, DPSPs by the </span><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"81\">Irish Constitution</strong><span class=\"citation-20\">, and FDs were borrowed from the </span><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"132\">Soviet (USSR) Constitution</strong><span class=\"citation-20 citation-end-20\">.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> (इनकी उत्पत्ति के संबंध में, FR अमेरिकी संविधान से, DPSP आयरिश संविधान से और FD सोवियत (USSR) संविधान से लिए गए थे।)<sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n<div class=\"source-inline-chip-container ng-star-inserted\"><button class=\"button ng-star-inserted\" aria-label=\"View source details for citation from Drishti IAS. Opens side panel.\" data-hveid=\"0\" data-ved=\"0CAAQvoAQahgKEwjn9KCJmMyRAxUAAAAAHQAAAAAQ2Ac\"><mat-icon _ngcontent-ng-c3128960296=\"\" role=\"img\" fonticon=\"link\" class=\"mat-icon notranslate symbol gds-icon-s google-symbols mat-ligature-font mat-icon-no-color ng-star-inserted\" aria-hidden=\"true\" data-mat-icon-type=\"font\" data-mat-icon-name=\"link\"></mat-icon></button></div>\n<p></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 5 only B) 2, 3, and 4 only C) 1, 3, 4, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">&nbsp;</h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">FRs (Part III)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">DPSPs (Part IV)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">FDs (Part IVA)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Democracy</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\">Political (राजनीतिक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,2,0\">Social &amp; Economic (सामाजिक-आर्थिक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,3,0\">Civic (नागरिक)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">Enforcement</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\">Court (अदालत द्वारा)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,2,0\">Legislation required (कानून आवश्यक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,3,0\">Special Laws (विशेष कानून)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">Origin</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">USA (अमेरिका)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,2,0\">Ireland (आयरलैंड)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,3,0\">USSR (सोवियत संघ)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Focus</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">Individual (व्यक्तिगत)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\">Community (सामुदायिक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,3,0\">Responsibility (जिम्मेदारी)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Assertion (A):</strong> Fundamental Rights are often referred to as 'Negative Obligations' on the State, while Fundamental Duties are 'Positive Obligations' on the citizens. <strong data-path-to-node=\"4\" data-index-in-node=\"165\">कथन (A):</strong> मौलिक अधिकारों को अक्सर राज्य पर 'नकारात्मक दायित्व' के रूप में संदर्भित किया जाता है, जबकि मौलिक कर्तव्य नागरिकों पर 'सकारात्मक दायित्व' हैं।</p>\n<p data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">Reason (R):</strong> Fundamental Rights restrict the State from infringing upon individual liberty, whereas Fundamental Duties expect citizens to perform specific civic and moral acts for the nation. <strong data-path-to-node=\"5\" data-index-in-node=\"191\">कारण (R):</strong> मौलिक अधिकार राज्य को व्यक्तिगत स्वतंत्रता का उल्लंघन करने से रोकते हैं, जबकि मौलिक कर्तव्य नागरिकों से राष्ट्र के लिए विशिष्ट नागरिक और नैतिक कार्य करने की अपेक्षा करते हैं।</p>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Codes / विकल्प:</strong>&nbsp;</p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Assertion (A):</strong> A law cannot be declared unconstitutional by the Supreme Court merely because it is in violation of the Fundamental Duties mentioned in Part IV-A. <strong data-path-to-node=\"12\" data-index-in-node=\"162\">कथन (A):</strong> सुप्रीम कोर्ट द्वारा किसी कानून को केवल इसलिए असंवैधानिक घोषित नहीं किया जा सकता क्योंकि वह भाग IV-A में उल्लिखित मौलिक कर्तव्यों का उल्लंघन करता है।</p>\n<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Reason (R):</strong> Fundamental Duties are non-justiciable and do not have any legal sanction provided by the Constitution itself against their violation. <strong data-path-to-node=\"13\" data-index-in-node=\"147\">कारण (R):</strong> मौलिक कर्तव्य गैर-न्यायसंगत हैं और संविधान स्वयं उनके उल्लंघन के विरुद्ध कोई कानूनी दंड प्रदान नहीं करता है।</p>\n<p data-path-to-node=\"13\"></p>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Codes / विकल्प:</strong>&nbsp;</p>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">1. Fundamental Rights (न्यायालय द्वारा लागू - Justiciable)</strong></h3>\n<p data-path-to-node=\"3\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Fundamental Rights are like a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\" data-index-in-node=\"30\">Shield (शील्ड)</strong> for the citizen.</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,0,0\" data-index-in-node=\"0\">If a law breaks your FR:</strong> The court can throw that law away (declare it unconstitutional).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0\" data-index-in-node=\"0\">Power Source:</strong> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0\" data-index-in-node=\"14\">Article 13</strong> says any law that takes away or lessens your Fundamental Rights is <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,1,0\" data-index-in-node=\"92\">\"Null and Void\"</strong> (zero/shunya).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"4,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,0\" data-index-in-node=\"0\">Bilingual View:</strong> यदि कोई कानून आपके मौलिक अधिकारों को छीनता है, तो अदालत उस कानून को <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4,2,0\" data-index-in-node=\"84\">अमान्य (रद्द)</strong> घोषित कर सकती है।</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" data-index-in-node=\"0\">2. Fundamental Duties (न्यायालय द्वारा लागू नहीं - Non-Justiciable)</strong></h3>\n<p data-path-to-node=\"6\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Fundamental Duties are like a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"30\">Moral Guide (नैतिक मार्गदर्शक)</strong> for the citizen.</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">If a law ignores an FD:</strong> The court <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"34\">cannot</strong> strike down that law just because it doesn't align with an FD.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">Why?</strong> Because the Constitution does not give the courts the power to enforce FDs directly. They are <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0\" data-index-in-node=\"99\">moral obligations</strong>, not legal ones.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">Bilingual View:</strong> मौलिक कर्तव्य <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"30\">गैर-न्यायसंगत</strong> हैं। आप किसी कानून को केवल इसलिए रद्द नहीं करवा सकते क्योंकि वह मौलिक कर्तव्यों के खिलाफ है, क्योंकि संविधान ने उन्हें कानूनी रूप से अनिवार्य नहीं बनाया है।</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">3. Key Comparison: Judicial Review (न्यायिक समीक्षा)</strong></h3>\n<ul>\n<li>\n<p data-path-to-node=\"19,0,0\"><strong data-path-to-node=\"19,0,0\" data-index-in-node=\"0\">FRs:</strong> Automatically enforceable (justiciable).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,1,0\"><strong data-path-to-node=\"19,1,0\" data-index-in-node=\"0\">FDs:</strong> Not automatically enforceable; require a separate law (like the Prevention of Insults to National Honour Act) for punishment.</p>\n</li>\n<li>\n<p data-path-to-node=\"19,2,0\"><strong data-path-to-node=\"19,2,0\" data-index-in-node=\"0\">Basic Structure:</strong> Only FRs are part of the Basic Structure (as per various cases), while FDs are used by courts to interpret the \"reasonableness\" of laws.</p>\n</li>\n<li>&nbsp;</li>\n</ul>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Aspect</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Fundamental Rights (FRs)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Fundamental Duties (FDs)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0,0\" data-index-in-node=\"0\">Justiciable?</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,0\" data-index-in-node=\"0\">YES</strong> (न्यायसंगत)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,2,0\" data-index-in-node=\"0\">NO</strong> (गैर-न्यायसंगत)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0,0\" data-index-in-node=\"0\">Can strike down a law?</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,1,0\" data-index-in-node=\"0\">YES</strong> (कानून रद्द हो सकता है)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,2,0\" data-index-in-node=\"0\">NO</strong> (कानून रद्द नहीं हो सकता)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,0,0\" data-index-in-node=\"0\">Role of Court</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,1,0\">Protector &amp; Guarantor (रक्षक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,2,0\">Mere Interpreter (केवल व्याख्याकार)</span></td>\n</tr>\n</tbody>\n</table>",
