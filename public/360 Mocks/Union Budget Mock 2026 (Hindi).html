    "question": "<p data-start=\"336\" data-end=\"430\">Consider the following statements regarding Financial Provisions in the Constitution of India:</p>\n<p data-start=\"432\" data-end=\"514\">भारतीय संविधान के वित्तीय प्रावधानों के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"516\" data-end=\"1255\">\n<li data-start=\"516\" data-end=\"752\">\n<p data-start=\"519\" data-end=\"752\">Article 110 defines a Money Bill, while Article 109 lays down the special procedure in respect of Money Bills.<br data-start=\"629\" data-end=\"632\" />अनुच्छेद 110 मनी बिल को परिभाषित करता है, जबकि अनुच्छेद 109 मनी बिल के संबंध में विशेष प्रक्रिया निर्धारित करता है।</p>\n</li>\n<li data-start=\"754\" data-end=\"965\">\n<p data-start=\"757\" data-end=\"965\">Article 112 deals with the Annual Financial Statement, and Article 114 relates to the Appropriation Bill.<br data-start=\"862\" data-end=\"865\" />अनुच्छेद 112 वार्षिक वित्तीय विवरण से संबंधित है तथा अनुच्छेद 114 विनियोग विधेयक से संबंधित है।</p>\n</li>\n<li data-start=\"967\" data-end=\"1088\">\n<p data-start=\"970\" data-end=\"1088\">Article 113 provides for supplementary and excess grants.<br data-start=\"1027\" data-end=\"1030\" />अनुच्छेद 113 अनुपूरक एवं अधिक अनुदानों से संबंधित है।</p>\n</li>\n<li data-start=\"1090\" data-end=\"1255\">\n<p data-start=\"1093\" data-end=\"1255\">Article 116 provides for Vote on Account, Vote of Credit, and Exceptional Grant.<br data-start=\"1173\" data-end=\"1176\" />अनुच्छेद 116 लेखानुदान, प्रत्ययानुदान तथा अपवादात्मक अनुदान से संबंधित है।</p>\n</li>\n</ol>\n<p data-start=\"1257\" data-end=\"1342\">Which of the statements given above are correct?<br data-start=\"1305\" data-end=\"1308\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p data-start=\"1344\" data-end=\"1422\">A. 1, 2 and 4 only<br data-start=\"1362\" data-end=\"1365\" />B. 1 and 3 only<br data-start=\"1380\" data-end=\"1383\" />C. 2, 3 and 4 only<br data-start=\"1401\" data-end=\"1404\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"1502\" data-end=\"1598\">Consider the following statements regarding the Macroeconomic Blueprint of Union Budget 2026&ndash;27:</p>\n<p data-start=\"1600\" data-end=\"1711\">संघीय बजट 2026&ndash;27 के व्यापक आर्थिक खाके (Macroeconomic Blueprint) के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"1713\" data-end=\"2588\">\n<li data-start=\"1713\" data-end=\"1944\">\n<p data-start=\"1716\" data-end=\"1944\">The total expenditure for 2026&ndash;27 is pegged at ₹53.47 lakh crore, while the revised estimate for 2025&ndash;26 is ₹49.6 lakh crore.<br data-start=\"1841\" data-end=\"1844\" />2026&ndash;27 के लिए कुल व्यय ₹53.47 लाख करोड़ है, जबकि 2025&ndash;26 का संशोधित अनुमान ₹49.6 लाख करोड़ है।</p>\n</li>\n<li data-start=\"1946\" data-end=\"2129\">\n<p data-start=\"1949\" data-end=\"2129\">The fiscal deficit is estimated at 4.3% of GDP for 2026&ndash;27, compared to 4.4% in 2025&ndash;26 (RE).<br data-start=\"2042\" data-end=\"2045\" />2026&ndash;27 में राजकोषीय घाटा GDP का 4.3% अनुमानित है, जबकि 2025&ndash;26 में यह 4.4% है।</p>\n</li>\n<li data-start=\"2131\" data-end=\"2383\">\n<p data-start=\"2134\" data-end=\"2383\">Capital expenditure is ₹12.2 lakh crore (3.1% of GDP), and the debt-to-GDP ratio is projected at 55.6% with a target of 50% by 2031.<br data-start=\"2266\" data-end=\"2269\" />पूंजीगत व्यय ₹12.2 लाख करोड़ (GDP का 3.1%) है तथा ऋण-GDP अनुपात 55.6% है, जिसे 2031 तक 50% करने का लक्ष्य है।</p>\n</li>\n<li data-start=\"2385\" data-end=\"2588\">\n<p data-start=\"2388\" data-end=\"2588\">The disinvestment target for 2026&ndash;27 is ₹80,000 crore and the projected real GDP growth is around 7%.<br data-start=\"2489\" data-end=\"2492\" />2026&ndash;27 के लिए विनिवेश लक्ष्य ₹80,000 करोड़ है तथा वास्तविक GDP वृद्धि लगभग 7% अनुमानित है।</p>\n</li>\n</ol>\n<p data-start=\"2590\" data-end=\"2675\">Which of the statements given above are correct?<br data-start=\"2638\" data-end=\"2641\" />उपरोक्त में से कौन-से कथन सही हैं nly<br data-start=\"1151\" data-end=\"1154\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"57\" data-end=\"91\">Consider the following statements:</p>\n<p data-start=\"93\" data-end=\"125\">निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"127\" data-end=\"667\">\n<li data-start=\"127\" data-end=\"290\">\n<p data-start=\"130\" data-end=\"290\">Article 112 of the Constitution refers to the Budget as the &ldquo;Annual Financial Statement.&rdquo;<br data-start=\"219\" data-end=\"222\" />संविधान का अनुच्छेद 112 बजट को &ldquo;वार्षिक वित्तीय विवरण&rdquo; कहता है।</p>\n</li>\n<li data-start=\"292\" data-end=\"420\">\n<p data-start=\"295\" data-end=\"420\">The biggest source of government income is Borrowings (about 24%).<br data-start=\"361\" data-end=\"364\" />सरकार की आय का सबसे बड़ा स्रोत उधारी (लगभग 24%) है।</p>\n</li>\n<li data-start=\"422\" data-end=\"540\">\n<p data-start=\"425\" data-end=\"540\">The largest expenditure item is Interest Payments (about 20%).<br data-start=\"487\" data-end=\"490\" />सबसे बड़ा व्यय मद ब्याज भुगतान (लगभग 20%) है।</p>\n</li>\n<li data-start=\"542\" data-end=\"667\">\n<p data-start=\"545\" data-end=\"667\">The Railway Budget was merged with the General Budget in 2017.<br data-start=\"607\" data-end=\"610\" />रेलवे बजट को 2017 में सामान्य बजट में विलय किया गया।</p>\n</li>\n</ol>\n<p data-start=\"669\" data-end=\"748\">Which of the above statements are correct?<br data-start=\"711\" data-end=\"714\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p data-start=\"750\" data-end=\"828\">A. 1, 2 and 4 only<br data-start=\"768\" data-end=\"771\" />B. 1 and 3 only<br data-start=\"786\" data-end=\"789\" />C. 2, 3 and 4 only<br data-start=\"807\" data-end=\"810\" />D. 1, 2, 3 and 4</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Largest expenditure is States&rsquo; Share (22%), not Interest (20%).</p>\n<h2 data-start=\"72\" data-end=\"106\">1️⃣ THE BASICS&nbsp;</h2>\n<p data-start=\"108\" data-end=\"270\"><strong data-start=\"108\" data-end=\"124\">Article 112:</strong><br data-start=\"124\" data-end=\"127\" />The Constitution calls the Budget the <strong data-start=\"165\" data-end=\"198\">&ldquo;Annual Financial Statement.&rdquo;</strong><br data-start=\"198\" data-end=\"201\" />संविधान का अनुच्छेद 112 बजट को <strong data-start=\"232\" data-end=\"259\">&ldquo;वार्षिक वित्तीय विवरण&rdquo;</strong> कहता है।</p>\n<p data-start=\"272\" data-end=\"510\"><strong data-start=\"272\" data-end=\"297\">Definition (परिभाषा):</strong><br data-start=\"297\" data-end=\"300\" />The Budget is an estimate of government <strong data-start=\"340\" data-end=\"361\">Receipts (Income)</strong> and <strong data-start=\"366\" data-end=\"392\">Expenditure (Spending)</strong> for one financial year.<br data-start=\"416\" data-end=\"419\" />बजट एक वित्तीय वर्ष के लिए सरकार की <strong data-start=\"455\" data-end=\"475\">प्राप्तियों (आय)</strong> और <strong data-start=\"479\" data-end=\"494\">व्यय (खर्च)</strong> का अनुमान है।</p>\n<p data-start=\"512\" data-end=\"670\"><strong data-start=\"512\" data-end=\"537\">Preparation (तैयारी):</strong><br data-start=\"537\" data-end=\"540\" />Prepared by the <strong data-start=\"556\" data-end=\"597\">Budget Division, Ministry of Finance.</strong><br data-start=\"597\" data-end=\"600\" />बजट का निर्माण <strong data-start=\"615\" data-end=\"647\">वित्त मंत्रालय के बजट प्रभाग</strong> द्वारा किया जाता है।</p>\n<p data-start=\"672\" data-end=\"868\"><strong data-start=\"672\" data-end=\"705\">14-Day Rule (14 दिन का नियम):</strong><br data-start=\"705\" data-end=\"708\" />Rajya Sabha can keep a Money Bill for <strong data-start=\"746\" data-end=\"762\">only 14 days</strong> and cannot reject it.<br data-start=\"784\" data-end=\"787\" />राज्यसभा मनी बिल को <strong data-start=\"807\" data-end=\"822\">केवल 14 दिन</strong> तक रख सकती है और उसे अस्वीकार नहीं कर सकती।</p>\n<hr data-start=\"870\" data-end=\"873\" />\n<h2 data-start=\"875\" data-end=\"910\">2️⃣ WHERE THE MONEY COMES FROM</h2>\n<h2 data-start=\"911\" data-end=\"940\">2️⃣ रुपया कहाँ से आता है</h2>\n<p data-start=\"942\" data-end=\"1006\">Think of this as government&rsquo;s income.<br data-start=\"979\" data-end=\"982\" />इसे सरकार की आय समझें।</p>\n<ul data-start=\"1008\" data-end=\"1447\">\n<li data-start=\"1008\" data-end=\"1142\">\n<p data-start=\"1010\" data-end=\"1142\"><strong data-start=\"1010\" data-end=\"1030\">Borrowings (24%)</strong> &rarr; Largest source (Loans taken by government)<br data-start=\"1075\" data-end=\"1078\" /><strong data-start=\"1080\" data-end=\"1095\">उधारी (24%)</strong> &rarr; सबसे बड़ा स्रोत (सरकार द्वारा लिया गया ऋण)</p>\n</li>\n<li data-start=\"1144\" data-end=\"1245\">\n<p data-start=\"1146\" data-end=\"1245\"><strong data-start=\"1146\" data-end=\"1166\">Income Tax (21%)</strong> &rarr; Tax paid by individuals<br data-start=\"1192\" data-end=\"1195\" /><strong data-start=\"1197\" data-end=\"1211\">आयकर (21%)</strong> &rarr; व्यक्तियों द्वारा दिया गया कर</p>\n</li>\n<li data-start=\"1247\" data-end=\"1352\">\n<p data-start=\"1249\" data-end=\"1352\"><strong data-start=\"1249\" data-end=\"1274\">Corporation Tax (18%)</strong> &rarr; Tax paid by companies<br data-start=\"1298\" data-end=\"1301\" /><strong data-start=\"1303\" data-end=\"1320\">निगम कर (18%)</strong> &rarr; कंपनियों द्वारा दिया गया कर</p>\n</li>\n<li data-start=\"1354\" data-end=\"1447\">\n<p data-start=\"1356\" data-end=\"1447\"><strong data-start=\"1356\" data-end=\"1369\">GST (15%)</strong> &rarr; Tax on goods and services<br data-start=\"1397\" data-end=\"1400\" /><strong data-start=\"1402\" data-end=\"1418\">जीएसटी (15%)</strong> &rarr; वस्तुओं एवं सेवाओं पर कर</p>\n</li>\n</ul>\n<hr data-start=\"1449\" data-end=\"1452\" />\n<h2 data-start=\"1454\" data-end=\"1483\">3️⃣ WHERE THE MONEY GOES</h2>\n<h2 data-start=\"1484\" data-end=\"1511\">3️⃣ रुपया कहाँ जाता है</h2>\n<p data-start=\"1513\" data-end=\"1581\">Think of this as government&rsquo;s expenses.<br data-start=\"1552\" data-end=\"1555\" />इसे सरकार का खर्च समझें।</p>\n<ul data-start=\"1583\" data-end=\"2115\">\n<li data-start=\"1583\" data-end=\"1681\">\n<p data-start=\"1585\" data-end=\"1681\"><strong data-start=\"1585\" data-end=\"1608\">States&rsquo; Share (22%)</strong> &rarr; Largest expenditure<br data-start=\"1630\" data-end=\"1633\" /><strong data-start=\"1635\" data-end=\"1662\">राज्यों का हिस्सा (22%)</strong> &rarr; सबसे बड़ा व्यय</p>\n</li>\n<li data-start=\"1683\" data-end=\"1788\">\n<p data-start=\"1685\" data-end=\"1788\"><strong data-start=\"1685\" data-end=\"1712\">Interest Payments (20%)</strong> &rarr; Interest on old loans<br data-start=\"1736\" data-end=\"1739\" /><strong data-start=\"1741\" data-end=\"1763\">ब्याज भुगतान (20%)</strong> &rarr; पुराने ऋणों पर ब्याज</p>\n</li>\n<li data-start=\"1790\" data-end=\"1920\">\n<p data-start=\"1792\" data-end=\"1920\"><strong data-start=\"1792\" data-end=\"1824\">Central Sector Schemes (17%)</strong> &rarr; Major government projects<br data-start=\"1852\" data-end=\"1855\" /><strong data-start=\"1857\" data-end=\"1891\">केंद्रीय क्षेत्र योजनाएँ (17%)</strong> &rarr; प्रमुख सरकारी परियोजनाएँ</p>\n</li>\n<li data-start=\"1922\" data-end=\"2016\">\n<p data-start=\"1924\" data-end=\"2016\"><strong data-start=\"1924\" data-end=\"1941\">Defence (11%)</strong> &rarr; Army, Navy, Air Force<br data-start=\"1965\" data-end=\"1968\" /><strong data-start=\"1970\" data-end=\"1985\">रक्षा (11%)</strong> &rarr; थल सेना, नौसेना, वायु सेना</p>\n</li>\n<li data-start=\"2018\" data-end=\"2115\">\n<p data-start=\"2020\" data-end=\"2115\"><strong data-start=\"2020\" data-end=\"2038\">Subsidies (6%)</strong> &rarr; Food, fertilizer, LPG etc.<br data-start=\"2067\" data-end=\"2070\" /><strong data-start=\"2072\" data-end=\"2088\">सब्सिडी (6%)</strong> &rarr; खाद्य, उर्वरक, गैस आदि</p>\n</li>\n</ul>\n<hr data-start=\"2117\" data-end=\"2120\" />\n<h2 data-start=\"2122\" data-end=\"2152\">4️⃣ HISTORICAL ONE-LINERS</h2>\n<h2 data-start=\"2153\" data-end=\"2186\">4️⃣ महत्वपूर्ण ऐतिहासिक तथ्य</h2>\n<ul data-start=\"2188\" data-end=\"2620\">\n<li data-start=\"2188\" data-end=\"2319\">\n<p data-start=\"2190\" data-end=\"2319\"><strong data-start=\"2190\" data-end=\"2222\">First Budget of India (1860)</strong> &rarr; Presented by <strong data-start=\"2238\" data-end=\"2254\">James Wilson</strong><br data-start=\"2254\" data-end=\"2257\" /><strong data-start=\"2259\" data-end=\"2286\">भारत का पहला बजट (1860)</strong> &rarr; जेम्स विल्सन द्वारा प्रस्तुत</p>\n</li>\n<li data-start=\"2321\" data-end=\"2492\">\n<p data-start=\"2323\" data-end=\"2492\"><strong data-start=\"2323\" data-end=\"2367\">First Budget of Independent India (1947)</strong> &rarr; Presented by <strong data-start=\"2383\" data-end=\"2409\">R.K. Shanmukham Chetty</strong><br data-start=\"2409\" data-end=\"2412\" /><strong data-start=\"2414\" data-end=\"2450\">स्वतंत्र भारत का पहला बजट (1947)</strong> &rarr; आर.के. शन्मुखम चेट्टी द्वारा प्रस्तुत</p>\n</li>\n<li data-start=\"2494\" data-end=\"2620\">\n<p data-start=\"2496\" data-end=\"2620\"><strong data-start=\"2496\" data-end=\"2511\">2017 Merger</strong> &rarr; Railway Budget merged with General Budget<br data-start=\"2555\" data-end=\"2558\" /><strong data-start=\"2560\" data-end=\"2573\">2017 विलय</strong> &rarr; रेलवे बजट को सामान्य बजट में मिला दिया गया</p>\n</li>\n</ul>\n<p data-start=\"2627\" data-end=\"2668\"><strong data-start=\"2630\" data-end=\"2666\">Exam Trick (परीक्षा हेतु ट्रिक):</strong></p>\n<p></p>\n<ul data-start=\"2669\" data-end=\"2828\">\n<li data-start=\"2669\" data-end=\"2711\">\n<p data-start=\"2671\" data-end=\"2711\">Largest Receipt &rarr; <strong data-start=\"2689\" data-end=\"2709\">Borrowings (24%)</strong></p>\n</li>\n<li data-start=\"2712\" data-end=\"2761\">\n<p data-start=\"2714\" data-end=\"2761\">Largest Expenditure &rarr; <strong data-start=\"2736\" data-end=\"2759\">States&rsquo; Share (22%)</strong></p>\n</li>\n<li data-start=\"2762\" data-end=\"2794\">\n<p data-start=\"2764\" data-end=\"2794\">Article for Budget &rarr; <strong data-start=\"2785\" data-end=\"2792\">112</strong></p>\n</li>\n<li data-start=\"2795\" data-end=\"2828\">\n<p data-start=\"2797\" data-end=\"2828\">Money Bill Rule &rarr; <strong data-start=\"2815\" data-end=\"2826\">14 Days</strong></p>\n</li>\n</ul>",
    "marks": 2.0,
    "section": "UNION BUDGET 2026-27"
  },
