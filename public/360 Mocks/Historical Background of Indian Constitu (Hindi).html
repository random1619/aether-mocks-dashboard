    "question": "<p data-start=\"73\" data-end=\"189\">Consider the following statements regarding the evolution of the Indian Constitution and the Regulating Act of 1773:</p>\n<p data-start=\"191\" data-end=\"288\">भारतीय संविधान के विकास एवं 1773 के विनियमन अधिनियम के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"290\" data-end=\"1487\">\n<li data-start=\"290\" data-end=\"494\">\n<p data-start=\"293\" data-end=\"494\">The Indian Constitution came into force on 26 January 1950, making India a Sovereign Democratic Republic.<br data-start=\"398\" data-end=\"401\" />भारतीय संविधान 26 जनवरी 1950 को लागू हुआ, जिससे भारत एक संप्रभु लोकतांत्रिक गणराज्य बना।</p>\n</li>\n<li data-start=\"496\" data-end=\"683\">\n<p data-start=\"499\" data-end=\"683\">Dr. B.R. Ambedkar was the Chairman of the Drafting Committee of the Constituent Assembly (1946&ndash;1949).<br data-start=\"600\" data-end=\"603\" />डॉ. बी.आर. अम्बेडकर संविधान सभा (1946&ndash;1949) की प्रारूप समिति के अध्यक्ष थे।</p>\n</li>\n<li data-start=\"685\" data-end=\"957\">\n<p data-start=\"688\" data-end=\"957\">The Regulating Act of 1773 elevated the Governor of Bengal to the Governor-General of Bengal, with Warren Hastings as the first Governor-General.<br data-start=\"833\" data-end=\"836\" />1773 के विनियमन अधिनियम ने बंगाल के गवर्नर को गवर्नर-जनरल ऑफ बंगाल बनाया, तथा वॉरेन हेस्टिंग्स पहले गवर्नर-जनरल बने।</p>\n</li>\n<li data-start=\"959\" data-end=\"1263\">\n<p data-start=\"962\" data-end=\"1263\">The Supreme Court established at Fort William in 1774 had one Chief Justice and three other judges, and Sir Elijah Impey was the first Chief Justice.<br data-start=\"1111\" data-end=\"1114\" />1774 में फोर्ट विलियम में स्थापित सर्वोच्च न्यायालय में एक मुख्य न्यायाधीश और तीन अन्य न्यायाधीश थे, तथा सर एलिजा इम्पे पहले मुख्य न्यायाधीश थे।</p>\n</li>\n<li data-start=\"1265\" data-end=\"1487\">\n<p data-start=\"1268\" data-end=\"1487\">Under the Regulating Act, the Governors of Bombay and Madras were made nd=\"1325\" />C. 2, 3 and 4 only<br data-start=\"1343\" data-end=\"1346\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"1454\" data-end=\"1522\">Consider the following statements regarding the Charter Act of 1833:</p>\n<p data-start=\"1524\" data-end=\"1592\">1833 के चार्टर अधिनियम के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"1594\" data-end=\"2401\">\n<li data-start=\"1594\" data-end=\"1754\">\n<p data-start=\"1597\" data-end=\"1754\">It redesignated the Governor-General of Bengal as the Governor-General of India.<br data-start=\"1677\" data-end=\"1680\" />इस अधिनियम ने बंगाल के गवर्नर-जनरल को भारत का गवर्नर-जनरल घोषित किया।</p>\n</li>\n<li data-start=\"1756\" data-end=\"2019\">\n<p data-start=\"1759\" data-end=\"2019\">The legislative powers of Bombay and Madras were abolished, and only the Governor-General of India could make laws for the whole country.<br data-start=\"1896\" data-end=\"1899\" />बॉम्बे और मद्रास की विधायी शक्तियाँ समाप्त कर दी गईं और केवल भारत का गवर्नर-जनरल पूरे देश के लिए कानून बना सकता था।</p>\n</li>\n<li data-start=\"2021\" data-end=\"2205\">\n<p data-start=\"2024\" data-end=\"2205\">The East India Company ceased to be a trading company and became purely administrative.<br data-start=\"2111\" data-end=\"2114\" />ईस्ट इंडिया कंपनी का व्यापारिक स्वरूप समाप्त हो गया और वह केवल प्रशासनिक संस्था बन गई।</p>\n</li>\n<li data-start=\"2207\" data-end=\"2401\">\n<p data-start=\"2210\" data-end=\"2401\">Lord Macaulay was appointed as the first Law Member and the First Law Commission was established in 1834.<br data-start=\"2315\" data-end=\"2318\" />लॉर्ड मैकाले पहले विधि सदस्य बने और 1834 में प्रथम विधि आयोग की स्थापना की गई।</p>\n</li>\n</ol>\n<p data-start=\"2403\" data-end=\"2488\">Which of the statements given above are correct?<br data-start=\"2451\" data-end=\"2454\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p></p>\n<p data-start=\"2490\" data-end=\"2568\">A. 1 and 2 only<br data-start=\"2505\" data-end=\"2508\" />B. 1, 2 and 3 only<br data-start=\"2526\" data-end=\"2529\" />C. 1, 3 and 4 only<br data-start=\"2547\" data-end=\"2550\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"59\" data-end=\"131\">Consider the following statements regarding the <strong data-start=\"107\" data-end=\"130\">Charter Act of 1853</strong>:</p>\n<p data-start=\"133\" data-end=\"201\">1853 के चार्टर अधिनियम के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"203\" data-end=\"884\">\n<li data-start=\"203\" data-end=\"408\">\n<p data-start=\"206\" data-end=\"408\">It separated the Legislative and Executive functions of the Governor-General&rsquo;s Council for the first time.<br data-start=\"312\" data-end=\"315\" />इस अधिनियम ने पहली बार गवर्नर-जनरल की परिषद की विधायी और कार्यकारी शक्तियों को अलग किया।</p>\n</li>\n<li data-start=\"410\" data-end=\"611\">\n<p data-start=\"413\" data-end=\"611\">It introduced open competitive examinations for recruitment to the Indian Civil Services (ICS).<br data-start=\"508\" data-end=\"511\" />इस अधिनियम ने भारतीय सिविल सेवा (ICS) के लिए खुली प्रतिस्पर्धात्मक परीक्षा की व्यवस्था शुरू की।</p>\n</li>\n<li data-start=\"613\" data-end=\"746\">\n<p data-start=\"616\" data-end=\"746\">It extended the Company&rsquo;s rule in India for another 20 years.<br data-start=\"677\" data-end=\"680\" />इस अधिनियम ने कंपनी के शासन को 20 वर्षों के लिए और बढ़ा दिया।</p>\n</li>\n<li data-start=\"748\" data-end=\"884\">\n<p data-start=\"751\" data-end=\"884\">It provided for a separate Lieutenant-Governor for Bengal.<br data-start=\"809\" data-end=\"812\" />इस अधिनियम ने बंगाल के लिए पृथक लेफ्टिनेंट-गवर्नर का प्रावधान किया।</p>\n</li>\n</ol>\n<p data-start=\"886\" data-end=\"971\">Which of the statements given above are correct?<br data-start=\"934\" data-end=\"937\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p></p>\n<p data-start=\"973\" data-end=\"1048\">A. 1, 2 and 4 only<br data-start=\"991\" data-end=\"994\" />B. 1 and 3 only<br data-start=\"1009\" data-end=\"1012\" />C. 2 and 3 only<br data-start=\"1027\" data-end=\"1030\" />D. 1, 2, 3 and 4</p>",

    "solution": "<p>STATEMENT 3 WRONG. Did NOT extend Company rule for 20 years .</p>\n<p></p>\n<p data-start=\"1177\" data-end=\"1295\">✔ <strong data-start=\"1179\" data-end=\"1219\">Final Charter Act (1793&ndash;1853 series)</strong><br data-start=\"1219\" data-end=\"1222\" />यह 1793 से 1853 तक के चार्टर अधिनियमों की श्रृंखला का अंतिम अधिनियम था।</p>\n<p data-start=\"1297\" data-end=\"1460\">✔ <strong data-start=\"1299\" data-end=\"1323\">No 20-Year Extension</strong><br data-start=\"1323\" data-end=\"1326\" />इस अधिनियम ने कंपनी के शासन को 20 वर्षों के लिए नहीं बढ़ाया। इससे संकेत मिला कि ब्रिटिश क्राउन कभी भी सत्ता अपने हाथ में ले सकता है।</p>\n<p data-start=\"1462\" data-end=\"1609\">✔ <strong data-start=\"1464\" data-end=\"1512\">Indian Legislative Council (Mini Parliament)</strong><br data-start=\"1512\" data-end=\"1515\" />12 सदस्यीय विस्तारित विधायी परिषद बनाई गई, जो ब्रिटिश संसदीय पद्धति के अनुसार कार्य करती थी।</p>\n<p data-start=\"1611\" data-end=\"1720\">✔ <strong data-start=\"1613\" data-end=\"1642\">Provincial Representation</strong><br data-start=\"1642\" data-end=\"1645\" />पहली बार मद्रास, बॉम्बे, बंगाल और आगरा से प्रतिनिधियों को शामिल किया गया।</p>\n<p data-start=\"1722\" data-end=\"1829\">✔ <strong data-start=\"1724\" data-end=\"1753\">Macaulay Committee (1854)</strong><br data-start=\"1753\" data-end=\"1756\" />ICS में मेरिट आधारित भर्ती लागू करने हेतु मैकॉले समिति का गठन किया गया।</p>\n<p data-start=\"1831\" data-end=\"1947\">✔ <strong data-start=\"1833\" data-end=\"1869\">Full Voting Rights to Law Member</strong><br data-start=\"1869\" data-end=\"1872\" />विधि सदस्य (Law Member) को कार्यकारी परिषद में पूर्ण मतदान अधिकार दिए गए।</p>\n<p data-start=\"1949\" data-end=\"2089\">✔ <strong data-start=\"1951\" data-end=\"1979\">Weakened Company Control</strong><br data-start=\"1979\" data-end=\"1982\" />कोर्ट ऑफ डायरेक्टर्स की संख्या 24 से घटाकर 18 कर दी गई, जिनमें 6 को ब्रिटिश क्राउन द्वारा नामित किया गया।</p>\n<p></p>\n<p data-start=\"2091\" data-end=\"2202\">✔ <strong data-start=\"2093\" data-end=\"2122\">Creation of New Provinces</strong><br data-start=\"2122\" data-end=\"2125\" />नए प्रांत बनाने की शक्ति दी गई &mdash; जिसके परिणामस्वरूप पंजाब एक पृथक इकाई बना।</p>",

    "question": "<p data-start=\"257\" data-end=\"291\">Consider the following statements:</p>\n<p data-start=\"293\" data-end=\"325\">निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"327\" data-end=\"1130\">\n<li data-start=\"327\" data-end=\"577\">\n<p data-start=\"330\" data-end=\"577\">The Government of India Act, 1858 abolished the East India Company and created the office of the Secretary of State for India.<br data-start=\"456\" data-end=\"459\" />1858 के भारत शासन अधिनियम ने ईस्ट इंडिया कंपनी को समाप्त किया और भारत के लिए सेक्रेटरी ऑफ स्टेट का पद सृजित किया।</p>\n</li>\n<li data-start=\"579\" data-end=\"817\">\n<p data-start=\"582\" data-end=\"817\">The Indian Councils Act, 1861 introduced the Portfolio System and restored legislative powers to Bombay and Madras.<br data-start=\"697\" data-end=\"700\" />1861 के भारतीय परिषद अधिनियम ने पोर्टफोलियो प्रणाली लागू की और बॉम्बे व मद्रास की विधायी शक्तियाँ पुनः बहाल कीं।</p>\n</li>\n<li data-start=\"819\" data-end=\"978\">\n<p data-start=\"822\" data-end=\"978\">The Indian Councils Act, 1892 introduced direct elections for legislative councils.<br data-start=\"905\" data-end=\"908\" />1892 के अधिनियम ने विधान परिषदों के लिए प्रत्यक्ष चुनाव शुरू किए।</p>\n</li>\n<li data-start=\"980\" data-end=\"1130\">\n<p data-start=\"983\" data-end=\"1130\">The Indian Councils Act, 1909 introduced separate electorate for Muslims.<br data-start=\"1056\" data-end=\"1059\" />1909 के अधिनियम ने मुसलमानों के लिए पृथक निर्वाचन प्रणाली शुरू की।</p>\n</li>\n</ol>\n<p data-start=\"1132\" data-end=\"1217\">Which of the statements given above are correct?<br data-start=\"1180\" data-end=\"1183\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p></p>\n<p data-start=\"1219\" data-end=\"1297\">A. 1, 2 and 4 only<br data-start=\"1237\" data-end=\"1240\" />B. 1 and 3 only<br data-start=\"1255\" data-end=\"1258\" />C. 2, 3 and 4 only<br data-start=\"1276\" data-end=\"1279\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"1689\" data-end=\"1767\">Consider the following statements regarding the Government of India Act, 1919:</p>\n<p data-start=\"1769\" data-end=\"1840\">1919 के भारत शासन अधिनियम के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"1842\" data-end=\"2513\">\n<li data-start=\"1842\" data-end=\"2070\">\n<p data-start=\"1845\" data-end=\"2070\">It introduced Dyarchy in the provinces by dividing subjects into Reserved and Transferred categories.<br data-start=\"1946\" data-end=\"1949\" />इस अधिनियम ने प्रांतों में विषयों को आरक्षित और स्थानांतरित श्रेणियों में विभाजित कर द्वैध शासन (Dyarchy) लागू किया।</p>\n</li>\n<li data-start=\"2072\" data-end=\"2194\">\n<p data-start=\"2075\" data-end=\"2194\">It introduced a bicameral legislature at the Centre.<br data-start=\"2127\" data-end=\"2130\" />इस अधिनियम ने केंद्र में द्विसदनीय विधानमंडल की स्थापना की।</p>\n</li>\n<li data-start=\"2196\" data-end=\"2396\">\n<p data-start=\"2199\" data-end=\"2396\">It extended separate electorates to Sikhs, Anglo-Indians, Indian Christians and Europeans.<br data-start=\"2289\" data-end=\"2292\" />इस अधिनियम ने सिखों, एंग्लो-इंडियनों, भारतीय ईसाइयों और यूरोपियनों को पृथक निर्वाचन का अधिकार दिया।</p>\n</li>\n<li data-start=\"2398\" data-end=\"2513\">\n<p data-start=\"2401\" data-end=\"2513\">It introduced responsible government at the Centre.<br data-start=\"2452\" data-end=\"2455\" />इस अधिनियम ने केंद्र में उत्तरदायी शासन स्थापित किया।</p>\n</li>\n</ol>\n<p data-start=\"2515\" data-end=\"2600\">Which of the statements given above are correct?<br data-start=\"2563\" data-end=\"2566\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p data-start=\"2602\" data-end=\"2680\">A. 1, 2 and 3 only<br data-start=\"2620\" data-end=\"2623\" />B. 1 and 4 only<br data-start=\"2638\" data-end=\"2641\" />C. 2, 3 and 4 only<br data-start=\"2659\" data-end=\"2662\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"72\" data-end=\"154\">Consider the following statements regarding the <strong data-start=\"120\" data-end=\"153\">Government of India Act, 1935</strong>:</p>\n<p data-start=\"156\" data-end=\"225\">भारत शासन अधिनियम, 1935 के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"227\" data-end=\"1096\">\n<li data-start=\"227\" data-end=\"519\">\n<p data-start=\"230\" data-end=\"519\">It proposed an All-India Federation of British Provinces and Princely States, but it never came into force due to non-participation of Princely States.<br data-start=\"381\" data-end=\"384\" />इसने ब्रिटिश प्रांतों और देशी रियासतों के संघीय ढाँचे का प्रस्ताव रखा, परंतु रियासतों के शामिल न होने के कारण यह लागू नहीं हो सका।</p>\n</li>\n<li data-start=\"521\" data-end=\"672\">\n<p data-start=\"524\" data-end=\"672\">It abolished Dyarchy in the provinces and introduced Provincial Autonomy.<br data-start=\"597\" data-end=\"600\" />इसने प्रांतों में द्वैध शासन समाप्त कर प्रांतीय स्वायत्तता लागू की।</p>\n</li>\n<li data-start=\"674\" data-end=\"783\">\n<p data-start=\"677\" data-end=\"783\">Residuary powers were given to the Federal Legislature.<br data-start=\"732\" data-end=\"735\" />अवशिष्ट शक्तियाँ संघीय विधानमंडल को दी गईं।</p>\n</li>\n<li data-start=\"785\" data-end=\"963\">\n<p data-start=\"788\" data-end=\"963\">It established the Reserve Bank of India (1935) and the Federal Court (1937).<br data-start=\"865\" data-end=\"868\" />इस अधिनियम के अंतर्गत भारतीय रिज़र्व बैंक (1935) तथा संघीय न्यायालय (1937) की स्थापना हुई।</p>\n</li>\n<li data-start=\"965\" data-end=\"1096\">\n<p data-start=\"968\" data-end=\"1096\">Only the British Parliament had the authority to amend this Act.<br data-start=\"1032\" data-end=\"1035\" />इस अधिनियम में संशोधन का अधिकार केवल ब्रिटिश संसद को था।</p>\n</li>\n</ol>\n<p data-start=\"1098\" data-end=\"1183\">Which of the statements given above are correct?<br data-start=\"1146\" data-end=\"1149\" />उपरोक्त में से कौन-से     "solution": "<p data-start=\"80\" data-end=\"380\">✔ <strong data-start=\"82\" data-end=\"124\">All-India Federation (Not Implemented)</strong><br data-start=\"124\" data-end=\"127\" />Proposed a federation of British Provinces and Princely States, but it was never implemented due to refusal of Princely States.<br data-start=\"254\" data-end=\"257\" />ब्रिटिश प्रांतों और देशी रियासतों के संघीय ढाँचे का प्रस्ताव रखा गया, परंतु रियासतों के शामिल न होने से लागू नहीं हो सका।</p>\n<hr data-start=\"382\" data-end=\"385\" />\n<p data-start=\"387\" data-end=\"574\">✔ <strong data-start=\"389\" data-end=\"412\">Provincial Autonomy</strong><br data-start=\"412\" data-end=\"415\" />Dyarchy was abolished in provinces and autonomous provincial governments were introduced.<br data-start=\"504\" data-end=\"507\" />प्रांतों में द्वैध शासन समाप्त कर प्रांतीय स्वायत्तता लागू की गई।</p>\n<hr data-start=\"576\" data-end=\"579\" />\n<p data-start=\"581\" data-end=\"763\">✖ <strong data-start=\"583\" data-end=\"608\">Statement 3 Incorrect</strong><br data-start=\"608\" data-end=\"611\" />Residuary powers were not given to the Federal Legislature but to the Viceroy.<br data-start=\"689\" data-end=\"692\" />अवशिष्ट शक्तियाँ संघीय विधानमंडल को नहीं, बल्कि वायसराय को दी गई थीं।</p>\n<hr data-start=\"765\" data-end=\"768\" />\n<p data-start=\"770\" data-end=\"831\">✔ <strong data-start=\"772\" data-end=\"804\">New Institutions Established</strong><br data-start=\"804\" data-end=\"807\" />नए संस्थानों की स्थापना:</p>\n<ul data-start=\"833\" data-end=\"1048\">\n<li data-start=\"833\" data-end=\"882\">\n<p data-start=\"835\" data-end=\"882\"><strong data-start=\"835\" data-end=\"849\">RBI &ndash; 1935</strong><br data-start=\"849\" data-end=\"852\" />भारतीय रिज़र्व बैंक &ndash; 1935</p>\n</li>\n<li data-start=\"884\" data-end=\"938\">\n<p data-start=\"886\" data-end=\"938\"><strong data-start=\"886\" data-end=\"910\">Federal Court &ndash; 1937</strong><br data-start=\"910\" data-end=\"913\" />संघीय न्यायालय &ndash; 1937</p>\n</li>\n<li data-start=\"940\" data-end=\"1048\">\n<p data-start=\"942\" data-end=\"1048\"><strong data-start=\"942\" data-end=\"1000\">Federal, Provincial &amp; Joint Public Service Commissions</strong><br data-start=\"1000\" data-end=\"1003\" />संघीय, प्रांतीय एवं संयुक्त लोक सेवा आयोग</p>\n</li>\n</ul>\n<hr data-start=\"1050\" data-end=\"1053\" />\n<p data-start=\"1055\" data-end=\"1139\">✔ <strong data-start=\"1057\" data-end=\"1108\">Other Important Features (Exam Priority Points)</strong><br data-start=\"1108\" data-end=\"1111\" />✔ <strong data-start=\"1113\" data-end=\"1137\">3 Lists of Subjects:</strong></p>\n<ul data-start=\"1140\" data-end=\"1267\">\n<li data-start=\"1140\" data-end=\"1161\">\n<p data-start=\"1142\" data-end=\"1161\">Federal List &ndash; 59</p>\n</li>\n<li data-start=\"1162\" data-end=\"1186\">\n<p data-start=\"1164\" data-end=\"1186\">Provincial List &ndash; 54</p>\n</li>\n<li data-start=\"1187\" data-end=\"1267\">\n<p data-start=\"1189\" data-end=\"1267\">Concurrent List &ndash; 36<br data-start=\"1209\" data-end=\"1212\" />तीन सूचियाँ &ndash; संघ (59), प्रांतीय (54), समवर्ती (36)</p>\n</li>\n</ul>\n<p data-start=\"1269\" data-end=\"1350\">✔ <strong data-start=\"1271\" data-end=\"1307\">Dyarchy introduced at the Centre</strong><br data-start=\"1307\" data-end=\"1310\" />केंद्र में द्वैध शासन लागू किया गया।</p>\n<p data-start=\"1352\" data-end=\"1437\">✔ <strong data-start=\"1354\" data-end=\"1385\">Bicameralism in 6 Provinces</strong><br data-start=\"1385\" data-end=\"1388\" />6 प्रांतों में द्विसदनीय व्यवस्था लागू की गई।</p>\n<p data-start=\"1439\" data-end=\"1543\">✔ <strong data-start=\"1441\" data-end=\"1474\">Separate Electorates Extended</strong><br data-start=\"1474\" data-end=\"1477\" />पृथक निर्वाचन का विस्तार (अनुसूचित जाति, महिलाएँ, श्रमिक आदि)।</p>\n<p data-start=\"1545\" data-end=\"1694\">✔ <strong data-start=\"1547\" data-end=\"1565\">Reorganization</strong><br data-start=\"1565\" data-end=\"1568\" />Burma separated (1937); Sindh &amp; Orissa created as new provinces.<br data-start=\"1634\" data-end=\"1637\" />1937 में बर्मा अलग हुआ; सिंध और उड़ीसा नए प्रांत बने।</p>\n<p data-start=\"1696\" data-end=\"1821\">✔ <strong data-start=\"1698\" data-end=\"1720\">Franchise Extended</strong><br data-start=\"1720\" data-end=\"1723\" />Voting rights extended to about 14% of the population.<br data-start=\"1779\" data-end=\"1782\" />लगभग 14% जनसंख्या को मताधिकार मिला।</p>\n<p></p>\n<p data-start=\"1823\" data-end=\"1962\">✔ <strong data-start=\"1825\" data-end=\"1846\">British Supremacy</strong><br data-start=\"1846\" data-end=\"1849\" />Only the British Parliament could amend the Act.<br data-start=\"1899\" data-end=\"1902\" />इस अधिनियम में संशोधन का अधिकार केवल ब्रिटिश संसद को था।</p>",

    "question": "<p data-start=\"72\" data-end=\"154\">Consider the following statements regarding the <strong data-start=\"120\" data-end=\"153\">Indian Independence Act, 1947</strong>:</p>\n<p data-start=\"156\" data-end=\"233\">भारतीय स्वतंत्रता अधिनियम, 1947 के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</p>\n<ol data-start=\"235\" data-end=\"1304\">\n<li data-start=\"235\" data-end=\"527\">\n<p data-start=\"238\" data-end=\"527\">It declared India as an independent and sovereign nation from 15 August 1947 and provided for the creation of two dominions &mdash; India and Pakistan.<br data-start=\"383\" data-end=\"386\" />इसने 15 अगस्त 1947 से भारत को स्वतंत्र एवं संप्रभु राष्ट्र घोषित किया और दो डोमिनियन &mdash; भारत एवं पाकिस्तान &mdash; के निर्माण का प्रावधान किया।</p>\n</li>\n<li data-start=\"529\" data-end=\"784\">\n<p data-start=\"532\" data-end=\"784\">The office of the Viceroy was abolished, and each dominion was to have a Governor-General appointed by the British King.<br data-start=\"652\" data-end=\"655\" />वायसराय का पद समाप्त कर दिया गया और प्रत्येक डोमिनियन के लिए ब्रिटिश सम्राट द्वारा नियुक्त गवर्नर-जनरल का प्रावधान किया गया।</p>\n</li>\n<li data-start=\"786\" data-end=\"1054\">\n<p data-start=\"789\" data-end=\"1054\">The Act abolished British suzerainty over princely states and allowed them to join India or Pakistan or remain independent.<br data-start=\"912\" data-end=\"915\" />इस अधिनियम ने रियासतों पर ब्रिटिश अधिपत्य समाप्त कर दिया और उन्हें भारत या पाकिस्तान में शामिल होने या स्वतंत्र रहने की स्वतंत्रता दी।</p>\n</li>\n<li data-start=\"1056\" data-end=\"1304\">\n<p data-start=\"1059\" data-end=\"1304\">The Government of India Act, 1919 was to continue as the interim constitutional framework until new constitutions were framed.<br data-start=\"1185\" data-end=\"1188\" />नए संविधान बनने तक भारत शासन अधिनियम, 1919 को अंतरिम संवैधानिक ढाँचे के रूप में लागू रखने का प्रावधान किया गया।</p>\n</li>\n</ol>\n<p data-start=\"1306\" data-end=\"1391\">Which of the statements given above are correct?<br data-start=\"1354\" data-end=\"1357\" />उपरोक्त में से कौन-से कथन सही हैं?</p>\n<p data-start=\"1393\" data-end=\"1471\">A. 1, 2 and 3 only<br data-start=\"1411\" data-end=\"1414\" />B. 1 and 4 only<br data-start=\"1429\" data-end=\"1432\" />C. 2, 3 and 4 only<br data-start=\"1450\" data-end=\"1453\" />D. 1, 2, 3 and 4</p>",

, 2, 3 and 4</p>",
