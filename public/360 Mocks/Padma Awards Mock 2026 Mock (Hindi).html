"1427\" data-end=\"1809\">In <em data-start=\"1430\" data-end=\"1465\">Balaji Raghavan v. Union of India</em> (1996), the Supreme Court held that Padma Awards are &ldquo;National Honours&rdquo; and not titles, and therefore do not violate Article 18(1) of the Constitution.<br data-start=\"1617\" data-end=\"1620\" /><em data-start=\"1623\" data-end=\"1654\">Balaji Raghavan बनाम भारत संघ</em> (1996) में सर्वोच्च न्यायालय ने निर्णय दिया कि पद्म पुरस्कार &ldquo;राष्ट्रीय सम्मान&rdquo; हैं, न कि उपाधियाँ, अतः वे संविधान के अनुच्छेद 18(1) का उल्लंघन नहीं करते।</p>\n</li>\n</ol>\n<h3 data-start=\"1816\" data-end=\"1870\">Which of the statements given above are correct?</h3>\n<h3 data-start=\"1871\" data-end=\"1911\">उपर्युक्त में से कौन-से कथन सही हैं?</h3>\n<p></p>\n<p data-start=\"1913\" data-end=\"2007\">(a) 1, 3, 4 and 5 only<br data-start=\"1935\" data-end=\"1938\" />(b) 1, 2, 3 and 4 only<br data-start=\"1960\" data-end=\"1963\" />(c) 1, 3 and 5 only<br data-start=\"1982\" data-end=\"1985\" />(d) 1, 2, 3, 4 and 5</p>",

ul>",
