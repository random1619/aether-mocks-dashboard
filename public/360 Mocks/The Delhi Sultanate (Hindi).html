    "question": "<p data-start=\"0\" data-end=\"97\"><strong data-start=\"0\" data-end=\"95\">Qutub-ud-din Aibak / कुतुबुद्दीन ऐबक के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"99\" data-end=\"1173\">\n<li data-section-id=\"1524ujf\" data-start=\"99\" data-end=\"232\">He was the founder of the Delhi Sultanate and the Slave/Mamluk Dynasty. / वह दिल्ली सल्तनत एवं गुलाम (ममलुक) वंश का संस्थापक था।</li>\n<li data-section-id=\"pxjso5\" data-start=\"234\" data-end=\"376\">Originally, he was a trusted slave and military general of Muhammad Ghori. / प्रारंभ में वह मुहम्मद गौरी का विश्वसनीय दास एवं सेनापति था।</li>\n<li data-section-id=\"56c4cc\" data-start=\"378\" data-end=\"577\">After the death of Muhammad Ghori in 1206 AD, Aibak declared himself the independent ruler of India. / 1206 ई. में मुहम्मद गौरी की मृत्यु के बाद ऐबक ने स्वयं को भारत का स्वतंत्र शासक घोषित किया।</li>\n<li data-section-id=\"1wspvhe\" data-start=\"579\" data-end=\"783\">He made Lahore his capital to avoid interference from Central Asian rivals like Yalduz and Qubacha. / यल्दौज एवं कुबाचा जैसे मध्य एशियाई प्रतिद्वंद्वियों से दूर रहने हेतु उसने लाहौर को राजधानी बनाया।</li>\n<li data-section-id=\"1i7lvoc\" data-start=\"785\" data-end=\"1000\">Though called Sultan later, he never officially assumed the title of &ldquo;Sultan&rdquo; during his reign. / यद्यपि बाद में उसे सुल्तान कहा गया, परंतु अपने शासनकाल में उसने आधिकारिक रूप से &ldquo;सुल्तान&rdquo; की उपाधि धारण नहीं की।</li>\n<li data-section-id=\"107qeah\" data-start=\"1002\" data-end=\"1173\">He introduced Turkish culture in Delhi and did not issue coins in his own name. / उसने दिल्ली में तुर्की संस्कृति का परिचय कराया तथा अपने नाम से सिक्के जारी नहीं किए।</li>\n</ol>\n<p data-start=\"1175\" data-end=\"1262\"><strong data-start=\"1175\" data-end=\"1260\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p></p>\n<p data-start=\"1264\" data-end=\"1445\">A. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"1305\" data-end=\"1308\" />B. 1, 2, 4, 5 and 6 only / केवल 1, 2, 4, 5 और 6<br data-start=\"1355\" data-end=\"1358\" />C. 1, 2, 3, 5 and 6 only / केवल 1, 2, 3, 5 और 6<br data-start=\"1405\" data-end=\"1408\" />D. All of the above / उपर्युक्त सभी</p>",

    "question": "<p data-start=\"1525\" data-end=\"1700\"><strong data-start=\"1525\" data-end=\"1698\">Architecture, Culture and Administration of Qutub-ud-din Aibak / कुतुबुद्दीन ऐबक की स्थापत्य, संस्कृति एवं प्रशासन के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"1702\" data-end=\"2986\">\n<li data-section-id=\"17q63i6\" data-start=\"1702\" data-end=\"1928\">Quwwat-ul-Islam Mosque at Delhi is regarded as the first functional mosque of the Delhi Sultanate period in India. / दिल्ली स्थित कुव्वत-उल-इस्लाम मस्जिद को दिल्ली सल्तनत काल की भारत की प्रथम कार्यशील मस्जिद माना जाता है।</li>\n<li data-section-id=\"99984w\" data-start=\"1930\" data-end=\"2113\">Adhai Din ka Jhopra at Ajmer was constructed on the site of a former Sanskrit school. / अजमेर स्थित अढ़ाई दिन का झोपड़ा एक पूर्व संस्कृत विद्यालय के स्थान पर निर्मित किया गया था।</li>\n<li data-section-id=\"vbu7e6\" data-start=\"2115\" data-end=\"2362\">Qutub Minar was started by Qutub-ud-din Aibak and named after the Sufi saint Khwaja Qutubuddin Bakhtiyar Kaki. / कुतुब मीनार का निर्माण कुतुबुद्दीन ऐबक ने प्रारंभ कराया तथा इसका नाम सूफी संत ख्वाजा कुतुबुद्दीन बख्तियार काकी के नाम पर रखा गया।</li>\n<li data-section-id=\"12x133o\" data-start=\"2364\" data-end=\"2611\">Hasan-ul-Nizami, patronized by Aibak, wrote Taj-ul-Maasir, considered the first historical work of the Delhi Sultanate. / ऐबक द्वारा संरक्षित हसन-उल-निजामी ने &lsquo;ताज-उल-मासिर&rsquo; की रचना की, जिसे दिल्ली सल्तनत का प्रथम ऐतिहासिक ग्रंथ माना जाता है।</li>\n<li data-section-id=\"ap4clq\" data-start=\"2613\" data-end=\"2795\">Aibak died in 1210 AD after falling from a horse while playing Chaugan (Polo) at Lahore. / 1210 ई. में लाहौर में चौगान (पोलो) खेलते समय घोड़े से गिरने के कारण ऐबक की मृत्यु हुई।</li>\n<li data-section-id=\"xjip8w\" data-start=\"2797\" data-end=\"2986\">After Aibak&rsquo;s death, Aram Shah briefly succeeded him before being defeated by Iltutmish. / ऐबक की मृत्यु के बाद आराम शाह अल्पकाल के लिए शासक बना, जिसे बाद में इल्तुतमिश ने पराजित किया।</li>\n</ol>\n<p data-start=\"2988\" data-end=\"3075\"><strong data-start=\"2988\" data-end=\"3073\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p></p>\n<p data-start=\"3077\" data-end=\"3258\">A. 1, 2, 3 and 5 only / केवल 1, 2, 3 और 5<br data-start=\"3118\" data-end=\"3121\" />B. 1, 2, 3, 4 and 6 only / केवल 1, 2, 3, 4 और 6<br data-start=\"3168\" data-end=\"3171\" />C. 2, 3, 4, 5 and 6 only / केवल 2, 3, 4, 5 और 6<br data-start=\"3218\" data-end=\"3221\" />D. All of the above / उपर्युक्त सभी</p>",

    "solution": "<h1 data-section-id=\"1pss7er\" data-start=\"0\" data-end=\"53\">SLAVE / MAMLUK DYNASTY (1206&ndash;1290 AD) &mdash; CHEAT SHEET</h1>\n<h2 data-section-id=\"dbpfb9\" data-start=\"55\" data-end=\"96\">Overview of the Slave (Mamluk) Dynasty</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"98\" data-end=\"558\">\n<thead data-start=\"98\" data-end=\"120\">\n<tr data-start=\"98\" data-end=\"120\">\n<th class=\"last:pe-10\" data-start=\"98\" data-end=\"106\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"106\" data-end=\"120\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"131\" data-end=\"558\">\n<tr data-start=\"131\" data-end=\"184\">\n<td data-start=\"131\" data-end=\"145\" data-col-size=\"sm\">Other Names</td>\n<td data-col-size=\"md\" data-start=\"145\" data-end=\"184\">Mamluk Dynasty, Ilbari Turk Dynasty</td>\n</tr>\n<tr data-start=\"185\" data-end=\"248\">\n<td data-start=\"185\" data-end=\"205\" data-col-size=\"sm\">Meaning of Mamluk</td>\n<td data-col-size=\"md\" data-start=\"205\" data-end=\"248\">&ldquo;Mamluk&rdquo; means property/slave in Arabic</td>\n</tr>\n<tr data-start=\"249\" data-end=\"283\">\n<td data-start=\"249\" data-end=\"258\" data-col-size=\"sm\">Origin</td>\n<td data-col-size=\"md\" data-start=\"258\" data-end=\"283\">The rulers were Turks</td>\n</tr>\n<tr data-start=\"284\" data-end=\"386\">\n<td data-start=\"284\" data-end=\"302\" data-col-size=\"sm\">Special Feature</td>\n<td data-col-size=\"md\" data-start=\"302\" data-end=\"386\">Early Delhi Sultans were mostly slaves or sons of slaves who later became rulers</td>\n</tr>\n<tr data-start=\"387\" data-end=\"438\">\n<td data-start=\"387\" data-end=\"397\" data-col-size=\"sm\">Founder</td>\n<td data-start=\"397\" data-end=\"438\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Qutb al-Din Aibak</span></td>\n</tr>\n<tr data-start=\"439\" data-end=\"532\">\n<td data-start=\"439\" data-end=\"462\" data-col-size=\"sm\">Founder&rsquo;s Background</td>\n<td data-col-size=\"md\" data-start=\"462\" data-end=\"532\">Trusted slave and general of <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Muhammad Ghori</span></td>\n</tr>\n<tr data-start=\"533\" data-end=\"558\">\n<td data-start=\"533\" data-end=\"542\" data-col-size=\"sm\">Period</td>\n<td data-col-size=\"md\" data-start=\"542\" data-end=\"558\">1206&ndash;1290 AD</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"560\" data-end=\"563\" />\n<h1 data-section-id=\"7ptgpi\" data-start=\"565\" data-end=\"599\">QUTB-UD-DIN AIBAK (1206&ndash;1210 AD)</h1>\n<h2 data-section-id=\"v2uv5u\" data-start=\"601\" data-end=\"629\">Founding of the Sultanate</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"631\" data-end=\"1124\">\n<thead data-start=\"631\" data-end=\"653\">\n<tr data-start=\"631\" data-end=\"653\">\n<th class=\"last:pe-10\" data-start=\"631\" data-end=\"639\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"639\" data-end=\"653\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"664\" data-end=\"1124\">\n<tr data-start=\"664\" data-end=\"726\">\n<td data-start=\"664\" data-end=\"674\" data-col-size=\"sm\">Founder</td>\n<td data-col-size=\"md\" data-start=\"674\" data-end=\"726\">Founder of the Delhi Sultanate and Slave Dynasty</td>\n</tr>\n<tr data-start=\"727\" data-end=\"816\">\n<td data-start=\"727\" data-end=\"746\" data-col-size=\"sm\">Earlier Position</td>\n<td data-col-size=\"md\" data-start=\"746\" data-end=\"816\">General and trusted slave of <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Muhammad Ghori</span></td>\n</tr>\n<tr data-start=\"817\" data-end=\"915\">\n<td data-start=\"817\" data-end=\"837\" data-col-size=\"sm\">Role after Tarain</td>\n<td data-col-size=\"md\" data-start=\"837\" data-end=\"915\">Managed Indian territories after the <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Second Battle of Tarain</span></td>\n</tr>\n<tr data-start=\"916\" data-end=\"994\">\n<td data-start=\"916\" data-end=\"931\" data-col-size=\"sm\">Independence</td>\n<td data-start=\"931\" data-end=\"994\" data-col-size=\"md\">Declared himself independent after Ghori&rsquo;s death in 1206 AD</td>\n</tr>\n<tr data-start=\"995\" data-end=\"1015\">\n<td data-start=\"995\" data-end=\"1005\" data-col-size=\"sm\">Capital</td>\n<td data-start=\"1005\" data-end=\"1015\" data-col-size=\"md\">Lahore</td>\n</tr>\n<tr data-start=\"1016\" data-end=\"1124\">\n<td data-start=\"1016\" data-end=\"1045\" data-col-size=\"sm\">Reason for Choosing Lahore</td>\n<td data-col-size=\"md\" data-start=\"1045\" data-end=\"1124\">To stay away from Central Asian politics and rivals like Yalduz and Qubacha</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1126\" data-end=\"1129\" />\n<h2 data-section-id=\"dtzy9\" data-start=\"1131\" data-end=\"1156\">Titles and Personality</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1158\" data-end=\"1473\">\n<thead data-start=\"1158\" data-end=\"1177\">\n<tr data-start=\"1158\" data-end=\"1177\">\n<th class=\"last:pe-10\" data-start=\"1158\" data-end=\"1166\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1166\" data-end=\"1177\" data-col-size=\"md\">Details</th>\n</tr>\n</thead>\n<tbody data-start=\"1188\" data-end=\"1473\">\n<tr data-start=\"1188\" data-end=\"1266\">\n<td data-start=\"1188\" data-end=\"1204\" data-col-size=\"sm\">Famous Titles</td>\n<td data-col-size=\"md\" data-start=\"1204\" data-end=\"1266\">Lakh Baksh (Giver of Lakhs), Peel Baksh, Malik, Sipahsalar</td>\n</tr>\n<tr data-start=\"1267\" data-end=\"1304\">\n<td data-start=\"1267\" data-end=\"1276\" data-col-size=\"sm\">Nature</td>\n<td data-start=\"1276\" data-end=\"1304\" data-col-size=\"md\">Brave and generous ruler</td>\n</tr>\n<tr data-start=\"1305\" data-end=\"1372\">\n<td data-start=\"1305\" data-end=\"1322\" data-col-size=\"sm\">Important Note</td>\n<td data-col-size=\"md\" data-start=\"1322\" data-end=\"1372\">Never officially assumed the title of &ldquo;Sultan&rdquo;</td>\n</tr>\n<tr data-start=\"1373\" data-end=\"1438\">\n<td data-start=\"1373\" data-end=\"1397\" data-col-size=\"sm\">Cultural Contribution</td>\n<td data-col-size=\"md\" data-start=\"1397\" data-end=\"1438\">Introduced Turkish culture into Delhi</td>\n</tr>\n<tr data-start=\"1439\" data-end=\"1473\">\n<td data-start=\"1439\" data-end=\"1450\" data-col-size=\"sm\">Currency</td>\n<td data-col-size=\"md\" data-start=\"1450\" data-end=\"1473\">Did not issue coins</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1475\" data-end=\"1478\" />\n<h2 data-section-id=\"176p56r\" data-start=\"1480\" data-end=\"1509\">Architecture and Monuments</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1511\" data-end=\"1948\">\n<thead data-start=\"1511\" data-end=\"1541\">\n<tr data-start=\"1511\" data-end=\"1541\">\n<th class=\"last:pe-10\" data-start=\"1511\" data-end=\"1522\" data-col-size=\"sm\">Monument</th>\n<th class=\"last:pe-10\" data-start=\"1522\" data-end=\"1541\" data-col-size=\"md\">Important Facts</th>\n</tr>\n</thead>\n<tbody data-start=\"1552\" data-end=\"1948\">\n<tr data-start=\"1552\" data-end=\"1644\">\n<td data-start=\"1552\" data-end=\"1585\" data-col-size=\"sm\">Quwwat-ul-Islam Mosque (Delhi)</td>\n<td data-col-size=\"md\" data-start=\"1585\" data-end=\"1644\">First functional mosque of the Delhi Sultanate in India</td>\n</tr>\n<tr data-start=\"1645\" data-end=\"1728\">\n<td data-start=\"1645\" data-end=\"1675\" data-col-size=\"sm\">Adhai Din ka Jhopra (Ajmer)</td>\n<td data-col-size=\"md\" data-start=\"1675\" data-end=\"1728\">Built in 1199 AD on the site of a Sanskrit school</td>\n</tr>\n<tr data-start=\"1729\" data-end=\"1782\">\n<td data-start=\"1729\" data-end=\"1743\" data-col-size=\"sm\">Qutub Minar</td>\n<td data-col-size=\"md\" data-start=\"1743\" data-end=\"1782\">Foundation laid in 1192 AD in Delhi</td>\n</tr>\n<tr data-start=\"1783\" data-end=\"1849\">\n<td data-start=\"1783\" data-end=\"1797\" data-col-size=\"sm\">Named After</td>\n<td data-col-size=\"md\" data-start=\"1797\" data-end=\"1849\">Sufi saint <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Khwaja Qutbuddin Bakhtiar Kaki</span></td>\n</tr>\n<tr data-start=\"1850\" data-end=\"1948\">\n<td data-start=\"1850\" data-end=\"1873\" data-col-size=\"sm\">Cheraman Juma Mosque</td>\n<td data-col-size=\"md\" data-start=\"1873\" data-end=\"1948\">Oldest mosque building in India, but not related to the Delhi Sultanate</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1950\" data-end=\"1953\" />\n<h2 data-section-id=\"1w1qj2u\" data-start=\"1955\" data-end=\"1990\">Saints, Scholars, and Literature</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1992\" data-end=\"2334\">\n<thead data-start=\"1992\" data-end=\"2028\">\n<tr data-start=\"1992\" data-end=\"2028\">\n<th class=\"last:pe-10\" data-start=\"1992\" data-end=\"2003\" data-col-size=\"sm\">Category</th>\n<th class=\"last:pe-10\" data-start=\"2003\" data-end=\"2028\" data-col-size=\"md\">Names / Contributions</th>\n</tr>\n</thead>\n<tbody data-start=\"2039\" data-end=\"2334\">\n<tr data-start=\"2039\" data-end=\"2144\">\n<td data-start=\"2039\" data-end=\"2048\" data-col-size=\"sm\">Saints</td>\n<td data-start=\"2048\" data-end=\"2144\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Khwaja Qutbuddin Bakhtiar Kaki</span> (Delhi), <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Moinuddin Chishti</span> (Ajmer)</td>\n</tr>\n<tr data-start=\"2145\" data-end=\"2176\">\n<td data-start=\"2145\" data-end=\"2157\" data-col-size=\"sm\">Historian</td>\n<td data-start=\"2157\" data-end=\"2176\" data-col-size=\"md\">Hasan-ul-Nizami</td>\n</tr>\n<tr data-start=\"2177\" data-end=\"2257\">\n<td data-start=\"2177\" data-end=\"2191\" data-col-size=\"sm\">Famous Book</td>\n<td data-start=\"2191\" data-end=\"2257\" data-col-size=\"md\"><em data-start=\"2193\" data-end=\"2208\">Taj-ul-Maasir</em> &mdash; first historical work of the Delhi Sultanate</td>\n</tr>\n<tr data-start=\"2258\" data-end=\"2290\">\n<td data-start=\"2258\" data-end=\"2273\" data-col-size=\"sm\">Other Writer</td>\n<td data-col-size=\"md\" data-start=\"2273\" data-end=\"2290\">Fakhar-ud-din</td>\n</tr>\n<tr data-start=\"2291\" data-end=\"2334\">\n<td data-start=\"2291\" data-end=\"2306\" data-col-size=\"sm\">Other Source</td>\n<td data-start=\"2306\" data-end=\"2334\" data-col-size=\"md\"><em data-start=\"2308\" data-end=\"2332\">Tarikh-i-Mubarak Shahi</em></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2336\" data-end=\"2339\" />\n<h2 data-section-id=\"1cnppp\" data-start=\"2341\" data-end=\"2362\">Military and Death</h2>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2364\" data-end=\"2783\" data-is-last-node=\"\" data-is-only-node=\"\">\n<thead data-start=\"2364\" data-end=\"2386\">\n<tr data-start=\"2364\" data-end=\"2386\">\n<th class=\"last:pe-10\" data-start=\"2364\" data-end=\"2372\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"2372\" data-end=\"2386\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"2397\" data-end=\"2783\" data-is-last-node=\"\">\n<tr data-start=\"2397\" data-end=\"2458\">\n<td data-start=\"2397\" data-end=\"2417\" data-col-size=\"sm\">Important General</td>\n<td data-col-size=\"md\" data-start=\"2417\" data-end=\"2458\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Bakhtiyar Khilji</span></td>\n</tr>\n<tr data-start=\"2459\" data-end=\"2512\">\n<td data-start=\"2459\" data-end=\"2482\" data-col-size=\"sm\">Military Achievement</td>\n<td data-col-size=\"md\" data-start=\"2482\" data-end=\"2512\">Conquered Bihar and Bengal</td>\n</tr>\n<tr data-start=\"2513\" data-end=\"2596\">\n<td data-start=\"2513\" data-end=\"2521\" data-col-size=\"sm\">Death</td>\n<td data-start=\"2521\" data-end=\"2596\" data-col-size=\"md\">Died in 1210 AD after falling from a horse while playing Chaugan (Polo)</td>\n</tr>\n<tr data-start=\"2597\" data-end=\"2656\">\n<td data-start=\"2597\" data-end=\"2604\" data-col-size=\"sm\">Tomb</td>\n<td data-col-size=\"md\" data-start=\"2604\" data-end=\"2656\">Located in <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Lahore</span></td>\n</tr>\n<tr data-start=\"2657\" data-end=\"2682\">\n<td data-start=\"2657\" data-end=\"2669\" data-col-size=\"sm\">Successor</td>\n<td data-col-size=\"md\" data-start=\"2669\" data-end=\"2682\">Aram Shah</td>\n</tr>\n<tr data-start=\"2683\" data-end=\"2783\" data-is-last-node=\"\">\n<td data-start=\"2683\" data-end=\"2702\" data-col-size=\"sm\">End of Aram Shah</td>\n<td data-col-size=\"md\" data-start=\"2702\" data-end=\"2783\" data-is-last-node=\"\">\n<p>Defeated by <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Iltutmish</span>, who became the next Sultan</p>\n<p></p>\n</td>\n</tr>\n</tbody>\n</table>\n<p></p>\n<h1 data-section-id=\"1gqghya\" data-start=\"0\" data-end=\"48\">गुलाम / ममलूक वंश (1206&ndash;1290 ई.) &mdash; CHEAT SHEET</h1>\n<h2 data-section-id=\"19lkgb3\" data-start=\"50\" data-end=\"79\">गुलाम (ममलूक) वंश का परिचय</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"81\" data-end=\"507\">\n<thead data-start=\"81\" data-end=\"102\">\n<tr data-start=\"81\" data-end=\"102\">\n<th class=\"last:pe-10\" data-start=\"81\" data-end=\"88\" data-col-size=\"sm\">विषय</th>\n<th class=\"last:pe-10\" data-start=\"88\" data-end=\"102\" data-col-size=\"md\">मुख्य तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"113\" data-end=\"507\">\n<tr data-start=\"113\" data-end=\"155\">\n<td data-start=\"113\" data-end=\"124\" data-col-size=\"sm\">अन्य नाम</td>\n<td data-col-size=\"md\" data-start=\"124\" data-end=\"155\">ममलूक वंश, इल्बरी तुर्क वंश</td>\n</tr>\n<tr data-start=\"156\" data-end=\"225\">\n<td data-start=\"156\" data-end=\"172\" data-col-size=\"sm\">ममलूक का अर्थ</td>\n<td data-col-size=\"md\" data-start=\"172\" data-end=\"225\">अरबी भाषा में &ldquo;ममलूक&rdquo; का अर्थ दास/संपत्ति होता है</td>\n</tr>\n<tr data-start=\"226\" data-end=\"249\">\n<td data-start=\"226\" data-end=\"232\" data-col-size=\"sm\">मूल</td>\n<td data-col-size=\"md\" data-start=\"232\" data-end=\"249\">शासक तुर्क थे</td>\n</tr>\n<tr data-start=\"250\" data-end=\"343\">\n<td data-start=\"250\" data-end=\"260\" data-col-size=\"sm\">विशेषता</td>\n<td data-col-size=\"md\" data-start=\"260\" data-end=\"343\">प्रारम्भिक दिल्ली सुल्तान या तो दास थे या दासों के पुत्र थे जो बाद में शासक बने</td>\n</tr>\n<tr data-start=\"344\" data-end=\"396\">\n<td data-start=\"344\" data-end=\"355\" data-col-size=\"sm\">संस्थापक</td>\n<td data-col-size=\"md\" data-start=\"355\" data-end=\"396\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Qutb al-Din Aibak</span></td>\n</tr>\n<tr data-start=\"397\" data-end=\"479\">\n<td data-start=\"397\" data-end=\"409\" data-col-size=\"sm\">पृष्ठभूमि</td>\n<td data-start=\"409\" data-end=\"479\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Muhammad Ghori</span> का विश्वसनीय दास एवं सेनापति</td>\n</tr>\n<tr data-start=\"480\" data-end=\"507\">\n<td data-start=\"480\" data-end=\"491\" data-col-size=\"sm\">शासन काल</td>\n<td data-col-size=\"md\" data-start=\"491\" data-end=\"507\">1206&ndash;1290 ई.</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"509\" data-end=\"512\" />\n<h1 data-section-id=\"16zf0h1\" data-start=\"514\" data-end=\"546\">कुतुबुद्दीन ऐबक (1206&ndash;1210 ई.)</h1>\n<h2 data-section-id=\"1hpj2wd\" data-start=\"548\" data-end=\"568\">सल्तनत की स्थापना</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"570\" data-end=\"1073\">\n<thead data-start=\"570\" data-end=\"591\">\n<tr data-start=\"570\" data-end=\"591\">\n<th class=\"last:pe-10\" data-start=\"570\" data-end=\"577\" data-col-size=\"sm\">विषय</th>\n<th class=\"last:pe-10\" data-start=\"577\" data-end=\"591\" data-col-size=\"md\">मुख्य तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"602\" data-end=\"1073\">\n<tr data-start=\"602\" data-end=\"656\">\n<td data-start=\"602\" data-end=\"613\" data-col-size=\"sm\">संस्थापक</td>\n<td data-col-size=\"md\" data-start=\"613\" data-end=\"656\">दिल्ली सल्तनत एवं गुलाम वंश का संस्थापक</td>\n</tr>\n<tr data-start=\"657\" data-end=\"738\">\n<td data-start=\"657\" data-end=\"668\" data-col-size=\"sm\">पूर्व पद</td>\n<td data-col-size=\"md\" data-start=\"668\" data-end=\"738\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Muhammad Ghori</span> का सेनापति एवं विश्वसनीय दास</td>\n</tr>\n<tr data-start=\"739\" data-end=\"843\">\n<td data-start=\"739\" data-end=\"761\" data-col-size=\"sm\">तराइन के बाद भूमिका</td>\n<td data-start=\"761\" data-end=\"843\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Second Battle of Tarain</span> के बाद भारत के प्रशासन का दायित्व संभाला</td>\n</tr>\n<tr data-start=\"844\" data-end=\"945\">\n<td data-start=\"844\" data-end=\"866\" data-col-size=\"sm\">स्वतंत्रता की घोषणा</td>\n<td data-col-size=\"md\" data-start=\"866\" data-end=\"945\">1206 ई. में मुहम्मद गोरी की मृत्यु के बाद स्वयं को स्वतंत्र शासक घोषित किया</td>\n</tr>\n<tr data-start=\"946\" data-end=\"965\">\n<td data-start=\"946\" data-end=\"956\" data-col-size=\"sm\">राजधानी</td>\n<td data-start=\"956\" data-end=\"965\" data-col-size=\"md\">लाहौर</td>\n</tr>\n<tr data-start=\"966\" data-end=\"1073\">\n<td data-start=\"966\" data-end=\"988\" data-col-size=\"sm\">लाहौर चुनने का कारण</td>\n<td data-col-size=\"md\" data-start=\"988\" data-end=\"1073\">मध्य एशियाई राजनीति एवं यल्दुज तथा कुबाचा जैसे प्रतिद्वंद्वियों से दूरी बनाए रखना</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1075\" data-end=\"1078\" />\n<h2 data-section-id=\"81lpj4\" data-start=\"1080\" data-end=\"1106\">उपाधियाँ एवं व्यक्तित्व</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1108\" data-end=\"1429\">\n<thead data-start=\"1108\" data-end=\"1124\">\n<tr data-start=\"1108\" data-end=\"1124\">\n<th class=\"last:pe-10\" data-start=\"1108\" data-end=\"1115\" data-col-size=\"sm\">विषय</th>\n<th class=\"last:pe-10\" data-start=\"1115\" data-end=\"1124\" data-col-size=\"md\">विवरण</th>\n</tr>\n</thead>\n<tbody data-start=\"1135\" data-end=\"1429\">\n<tr data-start=\"1135\" data-end=\"1192\">\n<td data-start=\"1135\" data-end=\"1153\" data-col-size=\"sm\">प्रमुख उपाधियाँ</td>\n<td data-col-size=\"md\" data-start=\"1153\" data-end=\"1192\">लाख बख्श, पील बख्श, मलिक, सिपहसालार</td>\n</tr>\n<tr data-start=\"1193\" data-end=\"1225\">\n<td data-start=\"1193\" data-end=\"1202\" data-col-size=\"sm\">स्वभाव</td>\n<td data-col-size=\"md\" data-start=\"1202\" data-end=\"1225\">साहसी एवं उदार शासक</td>\n</tr>\n<tr data-start=\"1226\" data-end=\"1316\">\n<td data-start=\"1226\" data-end=\"1244\" data-col-size=\"sm\">महत्वपूर्ण तथ्य</td>\n<td data-col-size=\"md\" data-start=\"1244\" data-end=\"1316\">अपने शासनकाल में कभी आधिकारिक रूप से &ldquo;सुल्तान&rdquo; की उपाधि धारण नहीं की</td>\n</tr>\n<tr data-start=\"1317\" data-end=\"1380\">\n<td data-start=\"1317\" data-end=\"1337\" data-col-size=\"sm\">सांस्कृतिक योगदान</td>\n<td data-col-size=\"md\" data-start=\"1337\" data-end=\"1380\">दिल्ली में तुर्की संस्कृति की शुरुआत की</td>\n</tr>\n<tr data-start=\"1381\" data-end=\"1429\">\n<td data-start=\"1381\" data-end=\"1390\" data-col-size=\"sm\">मुद्रा</td>\n<td data-start=\"1390\" data-end=\"1429\" data-col-size=\"md\">किसी प्रकार के सिक्के जारी नहीं किए</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1431\" data-end=\"1434\" />\n<h2 data-section-id=\"w0pk67\" data-start=\"1436\" data-end=\"1458\">स्थापत्य एवं स्मारक</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1460\" data-end=\"1896\">\n<thead data-start=\"1460\" data-end=\"1488\">\n<tr data-start=\"1460\" data-end=\"1488\">\n<th class=\"last:pe-10\" data-start=\"1460\" data-end=\"1469\" data-col-size=\"sm\">स्मारक</th>\n<th class=\"last:pe-10\" data-start=\"1469\" data-end=\"1488\" data-col-size=\"md\">महत्वपूर्ण तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"1499\" data-end=\"1896\">\n<tr data-start=\"1499\" data-end=\"1587\">\n<td data-start=\"1499\" data-end=\"1534\" data-col-size=\"sm\">कुव्वत-उल-इस्लाम मस्जिद (दिल्ली)</td>\n<td data-col-size=\"md\" data-start=\"1534\" data-end=\"1587\">दिल्ली सल्तनत काल की भारत की पहली कार्यशील मस्जिद</td>\n</tr>\n<tr data-start=\"1588\" data-end=\"1670\">\n<td data-start=\"1588\" data-end=\"1618\" data-col-size=\"sm\">अढ़ाई दिन का झोपड़ा (अजमेर)</td>\n<td data-col-size=\"md\" data-start=\"1618\" data-end=\"1670\">1199 ई. में संस्कृत विद्यालय के स्थान पर निर्मित</td>\n</tr>\n<tr data-start=\"1671\" data-end=\"1712\">\n<td data-start=\"1671\" data-end=\"1685\" data-col-size=\"sm\">कुतुब मीनार</td>\n<td data-col-size=\"md\" data-start=\"1685\" data-end=\"1712\">1192 ई. में नींव रखी गई</td>\n</tr>\n<tr data-start=\"1713\" data-end=\"1782\">\n<td data-start=\"1713\" data-end=\"1722\" data-col-size=\"sm\">नामकरण</td>\n<td data-col-size=\"md\" data-start=\"1722\" data-end=\"1782\">सूफी संत <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Khwaja Qutbuddin Bakhtiar Kaki</span> के नाम पर</td>\n</tr>\n<tr data-start=\"1783\" data-end=\"1896\">\n<td data-start=\"1783\" data-end=\"1804\" data-col-size=\"sm\">चेरामन जुमा मस्जिद</td>\n<td data-col-size=\"md\" data-start=\"1804\" data-end=\"1896\">भारत की सबसे प्राचीन मस्जिद मानी जाती है, परन्तु यह दिल्ली सल्तनत काल से संबंधित नहीं है</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1898\" data-end=\"1901\" />\n<h2 data-section-id=\"xa2vzf\" data-start=\"1903\" data-end=\"1930\">संत, विद्वान एवं साहित्य</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1932\" data-end=\"2244\">\n<thead data-start=\"1932\" data-end=\"1957\">\n<tr data-start=\"1932\" data-end=\"1957\">\n<th class=\"last:pe-10\" data-start=\"1932\" data-end=\"1941\" data-col-size=\"sm\">श्रेणी</th>\n<th class=\"last:pe-10\" data-start=\"1941\" data-end=\"1957\" data-col-size=\"md\">नाम / योगदान</th>\n</tr>\n</thead>\n<tbody data-start=\"1968\" data-end=\"2244\">\n<tr data-start=\"1968\" data-end=\"2071\">\n<td data-start=\"1968\" data-end=\"1974\" data-col-size=\"sm\">संत</td>\n<td data-start=\"1974\" data-end=\"2071\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Khwaja Qutbuddin Bakhtiar Kaki</span> (दिल्ली), <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Moinuddin Chishti</span> (अजमेर)</td>\n</tr>\n<tr data-start=\"2072\" data-end=\"2101\">\n<td data-start=\"2072\" data-end=\"2084\" data-col-size=\"sm\">इतिहासकार</td>\n<td data-start=\"2084\" data-end=\"2101\" data-col-size=\"md\">हसन-उल-निजामी</td>\n</tr>\n<tr data-start=\"2102\" data-end=\"2178\">\n<td data-start=\"2102\" data-end=\"2120\" data-col-size=\"sm\">प्रसिद्ध पुस्तक</td>\n<td data-start=\"2120\" data-end=\"2178\" data-col-size=\"md\"><em data-start=\"2122\" data-end=\"2136\">ताज-उल-मासिर</em> &mdash; दिल्ली सल्तनत का प्रथम ऐतिहासिक ग्रंथ</td>\n</tr>\n<tr data-start=\"2179\" data-end=\"2205\">\n<td data-start=\"2179\" data-end=\"2191\" data-col-size=\"sm\">अन्य लेखक</td>\n<td data-start=\"2191\" data-end=\"2205\" data-col-size=\"md\">फखर-उद-दीन</td>\n</tr>\n<tr data-start=\"2206\" data-end=\"2244\">\n<td data-start=\"2206\" data-end=\"2219\" data-col-size=\"sm\">अन्य स्रोत</td>\n<td data-col-size=\"md\" data-start=\"2219\" data-end=\"2244\"><em data-start=\"2221\" data-end=\"2242\">तारीख-ए-मुबारक शाही</em></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2246\" data-end=\"2249\" />\n<h2 data-section-id=\"17q54hg\" data-start=\"2251\" data-end=\"2276\">सैन्य कार्य एवं मृत्यु</h2>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2278\" data-end=\"2668\" data-is-last-node=\"\" data-is-only-node=\"\">\n<thead data-start=\"2278\" data-end=\"2299\">\n<tr data-start=\"2278\" data-end=\"2299\">\n<th class=\"last:pe-10\" data-start=\"2278\" data-end=\"2285\" data-col-size=\"sm\">विषय</th>\n<th class=\"last:pe-10\" data-start=\"2285\" data-end=\"2299\" data-col-size=\"md\">मुख्य तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"2310\" data-end=\"2668\" data-is-last-node=\"\">\n<tr data-start=\"2310\" data-end=\"2368\">\n<td data-start=\"2310\" data-end=\"2327\" data-col-size=\"sm\">प्रमुख सेनापति</td>\n<td data-start=\"2327\" data-end=\"2368\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Bakhtiyar Khilji</span></td>\n</tr>\n<tr data-start=\"2369\" data-end=\"2412\">\n<td data-start=\"2369\" data-end=\"2385\" data-col-size=\"sm\">सैन्य उपलब्धि</td>\n<td data-start=\"2385\" data-end=\"2412\" data-col-size=\"md\">बिहार एवं बंगाल पर विजय</td>\n</tr>\n<tr data-start=\"2413\" data-end=\"2482\">\n<td data-start=\"2413\" data-end=\"2422\" data-col-size=\"sm\">मृत्यु</td>\n<td data-start=\"2422\" data-end=\"2482\" data-col-size=\"md\">1210 ई. में चौगान (पोलो) खेलते समय घोड़े से गिरकर मृत्यु</td>\n</tr>\n<tr data-start=\"2483\" data-end=\"2542\">\n<td data-start=\"2483\" data-end=\"2491\" data-col-size=\"sm\">मकबरा</td>\n<td data-start=\"2491\" data-end=\"2542\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Lahore</span> में स्थित</td>\n</tr>\n<tr data-start=\"2543\" data-end=\"2570\">\n<td data-start=\"2543\" data-end=\"2558\" data-col-size=\"sm\">उत्तराधिकारी</td>\n<td data-start=\"2558\" data-end=\"2570\" data-col-size=\"md\">आराम शाह</td>\n</tr>\n<tr data-start=\"2571\" data-end=\"2668\" data-is-last-node=\"\">\n<td data-start=\"2571\" data-end=\"2589\" data-col-size=\"sm\">आराम शाह का अंत</td>\n<td data-start=\"2589\" data-end=\"2668\" data-is-last-node=\"\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Iltutmish</span> द्वारा पराजित, जो बाद में सुल्तान     "question": "<p data-start=\"0\" data-end=\"369\"><strong data-start=\"0\" data-end=\"18\">Assertion (A):</strong> Quwwat-ul-Islam Mosque is regarded as the first functional mosque of the Delhi Sultanate period in India, although Cheraman Juma Mosque is considered the oldest mosque building in India.<br data-start=\"205\" data-end=\"208\" />/ कुव्वत-उल-इस्लाम मस्जिद को दिल्ली सल्तनत काल की भारत की प्रथम कार्यशील मस्जिद माना जाता है, जबकि चेरामन जुमा मस्जिद भारत की सबसे प्राचीन मस्जिद मानी जाती है।</p>\n<p data-start=\"0\" data-end=\"369\"></p>\n<p data-start=\"371\" data-end=\"787\"><strong data-start=\"371\" data-end=\"386\">Reason (R):</strong> Qutub-ud-din Aibak, the founder of the Slave (Mamluk) Dynasty, introduced Turkish culture into Delhi and also started the construction of Qutub Minar in the name of Sufi saint Khwaja Qutubuddin Bakhtiyar Kaki.<br data-start=\"596\" data-end=\"599\" />/ गुलाम (ममलुक) वंश के संस्थापक कुतुबुद्दीन ऐबक ने दिल्ली में तुर्की संस्कृति का परिचय कराया तथा सूफी संत ख्वाजा कुतुबुद्दीन बख्तियार काकी के नाम पर कुतुब मीनार का निर्माण प्रारंभ कराया।</p>\n<p data-start=\"789\" data-end=\"839\"><strong data-start=\"789\" data-end=\"837\">Choose the correct answer / सही उत्तर चुनिए:</strong></p>\n<p data-start=\"841\" data-end=\"961\">A. Both A and R are true, and R is the correct explanation of A./ A और R दोनों सही हैं तथा R, A की सही व्याख्या है।</p>\n<p data-start=\"963\" data-end=\"1095\">B. Both A and R are true, but R is not the correct explanation of A./ A और R दोनों सही हैं, लेकिन R, A की सही व्याख्या नहीं है।</p>\n<p data-start=\"1097\" data-end=\"1158\">C. A is true, but R is false./ A सही है, लेकिन R गलत है।</p>\n<p></p>\n<p data-start=\"1160\" data-end=\"1221\">D. A is false, but R is true./ A गलत है, लेकिन R सही है।</p>",

    "question": "<p data-start=\"0\" data-end=\"129\"><strong data-start=\"0\" data-end=\"127\">&nbsp;Aram Shah and Accession of Iltutmish / आराम शाह एवं इल्तुतमिश के उदय के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"131\" data-end=\"875\">\n<li data-section-id=\"1u6x7as\" data-start=\"131\" data-end=\"330\">Aram Shah became the second Sultan of the Mamluk Dynasty after the death of Qutub-ud-din Aibak in 1210 AD. / 1210 ई. में कुतुबुद्दीन ऐबक की मृत्यु के बाद आराम शाह ममलुक वंश का दूसरा सुल्तान बना।</li>\n<li data-section-id=\"hjbjkm\" data-start=\"332\" data-end=\"524\">Chroniclers like Ferishta and Al-Badaoni described Aram Shah as the son of Qutub-ud-din Aibak. / फ़रिश्ता एवं अल-बदायूनी जैसे इतिहासकारों ने आराम शाह को कुतुबुद्दीन ऐबक का पुत्र बताया है।</li>\n<li data-section-id=\"18be55v\" data-start=\"526\" data-end=\"695\">Nasir-ud-din Qabacha revolted against Aram Shah and laid siege to Uch and Multan. / नासिरुद्दीन कुबाचा ने आराम शाह के विरुद्ध विद्रोह कर उच एवं मुल्तान को घेर लिया।</li>\n<li data-section-id=\"1ed9msf\" data-start=\"697\" data-end=\"875\">Turkish nobles invited Iltutmish, the Governor of Lahore, to take the throne of Delhi. / तुर्क अमीरों ने लाहौर के गवर्नर इल्तुतमिश को दिल्ली का शासक बनने हेतु आमंत्रित किया।</li>\n</ol>\n<p data-start=\"877\" data-end=\"964\"><strong data-start=\"877\" data-end=\"962\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"966\" data-end=\"1107\">A. 1, 2 and 3 only / केवल 1, 2 और 3<br data-start=\"1001\" data-end=\"1004\" />B. 1 and 4 only / केवल 1 और 4<br data-start=\"1033\" data-end=\"1036\" />C. 2, 3 and 4 only / केवल 2, 3 और 4<br data-start=\"1071\" data-end=\"1074\" />D. 1, 2, 3 and 4 / 1, 2, 3 और 4</p>",

    "question": "<p data-start=\"1346\" data-end=\"1452\"><strong data-start=\"1346\" data-end=\"1450\">Shams-ud-din Iltutmish / शम्सुद्दीन इल्तुतमिश के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"1454\" data-end=\"2217\">\n<li data-section-id=\"1eg9nbm\" data-start=\"1454\" data-end=\"1654\">Iltutmish belonged to the Ilbari tribe and is regarded as the real founder of the Delhi Sultanate. / इल्तुतमिश इल्बरी जनजाति से संबंधित था तथा उसे दिल्ली सल्तनत का वास्तविक संस्थापक माना जाता है।</li>\n<li data-section-id=\"q7ranu\" data-start=\"1656\" data-end=\"1860\">He was the first Sultan to receive formal recognition and the title of Sultan from the Caliph of Baghdad. / वह बगदाद के खलीफा से औपचारिक मान्यता एवं &ldquo;सुल्तान&rdquo; की उपाधि प्राप्त करने वाला पहला शासक था।</li>\n<li data-section-id=\"zdm21b\" data-start=\"1862\" data-end=\"2056\">He introduced the silver Tanka and copper Jital as part of a pure Arabic coinage system in India. / उसने भारत में शुद्ध अरबी सिक्का प्रणाली के अंतर्गत चाँदी का टंका एवं ताँबे का जीतल चलाया।</li>\n<li data-section-id=\"q8texo\" data-start=\"2058\" data-end=\"2217\">He introduced the hereditary Iqta system to strengthen the position of nobles. / उसने अमीरों की स्थिति मजबूत करने हेतु वंशानुगत इक्ता व्यवस्था प्रारंभ की।</li>\n</ol>\n<p data-start=\"2219\" data-end=\"2306\"><strong data-start=\"2219\" data-end=\"2304\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"2308\" data-end=\"2453\">A. 1 and 2 only / केवल 1 और 2<br data-start=\"2337\" data-end=\"2340\" />B. 1, 2 and 3 only / केवल 1, 2 और 3<br data-start=\"2375\" data-end=\"2378\" />C. 2, 3 and 4 only / केवल 2, 3 और 4<br data-start=\"2413\" data-end=\"2416\" />D. 1, 3 and 4 only / केवल 1, 3 और 4</p>",

    "question": "<p data-start=\"2712\" data-end=\"2878\"><strong data-start=\"2712\" data-end=\"2876\">Administration, Military and Architecture under Iltutmish / इल्तुतमिश के प्रशासन, सैन्य नीति एवं स्थापत्य के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"2880\" data-end=\"3824\">\n<li data-section-id=\"1ul3hub\" data-start=\"2880\" data-end=\"3053\">Iltutmish organized a group of forty Turkish nobles known as Turkan-i-Chahalgani. / इल्तुतमिश ने चालीस तुर्क अमीरों का एक समूह गठित किया जिसे तुर्कान-ए-चहलगानी कहा गया।</li>\n<li data-section-id=\"1ookeqi\" data-start=\"3055\" data-end=\"3272\">He granted asylum to Jalaluddin Mangbarani against Genghis Khan, which led to the first Mongol invasion of India. / उसने चंगेज़ खान से भागे जलालुद्दीन मंगबरनी को शरण दी, जिसके कारण भारत पर प्रथम मंगोल आक्रमण हुआ।</li>\n<li data-section-id=\"1b6v7vh\" data-start=\"3274\" data-end=\"3420\">He defeated Tajuddin Yaldoz in the Third Battle of Tarain (1215 AD). / उसने 1215 ई. के तृतीय तराइन युद्ध में ताजुद्दीन यल्दौज को पराजित किया।</li>\n<li data-section-id=\"i0gdn5\" data-start=\"3422\" data-end=\"3622\">Sultan Ghari, regarded as the first Islamic mausoleum in India, was built by Iltutmish for his son. / भारत का प्रथम इस्लामी मकबरा माने जाने वाला सुल्तानगढ़ी इल्तुतमिश ने अपने पुत्र के लिए बनवाया।</li>\n<li data-section-id=\"ol4vrp\" data-start=\"3624\" data-end=\"3824\">Iltutmish nominated Razia Sultan as his successor because he found his surviving sons incompetent. / इल्तुतमिश ने अपने जीवित पुत्रों को अयोग्य मानते हुए रज़िया सुल्तान को उत्तराधिकारी नामित किया।</li>\n</ol>\n<p data-start=\"3826\" data-end=\"3913\"><strong data-start=\"3826\" data-end=\"3911\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"3915\" data-end=\"4080\">A. 1, 3, 4 and 5 only / केवल 1, 3, 4 और 5<br data-start=\"3956\" data-end=\"3959\" />B. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"4000\" data-end=\"4003\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"4038\" data-end=\"4041\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>\n<p data-start=\"4082\" data-end=\"4119\"></p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<h3 data-section-id=\"17dv77n\" data-start=\"4121\" data-end=\"4148\">Explanation / व्याख्या:</h3>\n<ul data-start=\"4149\" data-end=\"4406\">\n<li data-section-id=\"1q88t45\" data-start=\"4149\" data-end=\"4406\">Statement 2 is incorrect because Iltutmish diplomatically&nbsp;<strong data-start=\"4209\" data-end=\"4227\">refused asylum</strong>&nbsp;to Jalaluddin Mangbarani, thereby avoiding Mongol invasion.<br data-start=\"4287\" data-end=\"4290\" />/ कथन 2 गलत है क्योंकि इल्तुतमिश ने जलालुद्दीन मंगबरनी को शरण देने से इनकार कर दिया था, जिससे मंगोल आक्रमण टल गया।</li>\n</ul>\n<p></p>\n<h1 data-section-id=\"1yiafst\" data-start=\"463\" data-end=\"519\">शम्सुद्दीन इल्तुतमिश (1210&ndash;1236 ई.) &mdash; CRUX CHEAT SHEET</h1>\n<h2 data-section-id=\"ehumbq\" data-start=\"521\" data-end=\"539\">परिचय एवं महत्व</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"541\" data-end=\"833\">\n<thead data-start=\"541\" data-end=\"562\">\n<tr data-start=\"541\" data-end=\"562\">\n<th class=\"last:pe-10\" data-start=\"541\" data-end=\"548\" data-col-size=\"sm\">विषय</th>\n<th class=\"last:pe-10\" data-start=\"548\" data-end=\"562\" data-col-size=\"sm\">मुख्य तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"573\" data-end=\"833\">\n<tr data-start=\"573\" data-end=\"655\">\n<td data-start=\"573\" data-end=\"585\" data-col-size=\"sm\">पृष्ठभूमि</td>\n<td data-col-size=\"sm\" data-start=\"585\" data-end=\"655\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Qutb al-Din Aibak</span> का दास एवं बदायूँ का सूबेदार</td>\n</tr>\n<tr data-start=\"656\" data-end=\"684\">\n<td data-start=\"656\" data-end=\"668\" data-col-size=\"sm\">प्रसिद्धि</td>\n<td data-col-size=\"sm\" data-start=\"668\" data-end=\"684\">&ldquo;दास का दास&rdquo;</td>\n</tr>\n<tr data-start=\"685\" data-end=\"731\">\n<td data-start=\"685\" data-end=\"691\" data-col-size=\"sm\">वंश</td>\n<td data-start=\"691\" data-end=\"731\" data-col-size=\"sm\">इल्बरी वंश एवं शम्सी वंश का संस्थापक</td>\n</tr>\n<tr data-start=\"732\" data-end=\"780\">\n<td data-start=\"732\" data-end=\"740\" data-col-size=\"sm\">उपाधि</td>\n<td data-col-size=\"sm\" data-start=\"740\" data-end=\"780\">दिल्ली सल्तनत का &ldquo;वास्तविक संस्थापक&rdquo;</td>\n</tr>\n<tr data-start=\"781\" data-end=\"833\">\n<td data-start=\"781\" data-end=\"791\" data-col-size=\"sm\">राजधानी</td>\n<td data-col-size=\"sm\" data-start=\"791\" data-end=\"833\">राजधानी लाहौर से दिल्ली स्थानांतरित की</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"835\" data-end=\"838\" />\n<h2 data-section-id=\"xuhx7b\" data-start=\"840\" data-end=\"861\">मान्यता एवं मुद्रा</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"863\" data-end=\"1110\">\n<thead data-start=\"863\" data-end=\"884\">\n<tr data-start=\"863\" data-end=\"884\">\n<th class=\"last:pe-10\" data-start=\"863\" data-end=\"870\" data-col-size=\"sm\">विषय</th>\n<th class=\"last:pe-10\" data-start=\"870\" data-end=\"884\" data-col-size=\"md\">मुख्य तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"895\" data-end=\"1110\">\n<tr data-start=\"895\" data-end=\"988\">\n<td data-start=\"895\" data-end=\"905\" data-col-size=\"sm\">मान्यता</td>\n<td data-col-size=\"md\" data-start=\"905\" data-end=\"988\">बगदाद के खलीफा से &ldquo;मंशूर&rdquo; एवं &ldquo;सुल्तान&rdquo; की उपाधि प्राप्त करने वाला पहला सुल्तान</td>\n</tr>\n<tr data-start=\"989\" data-end=\"1056\">\n<td data-start=\"989\" data-end=\"1006\" data-col-size=\"sm\">मुद्रा प्रणाली</td>\n<td data-col-size=\"md\" data-start=\"1006\" data-end=\"1056\">भारत में शुद्ध अरबी सिक्का प्रणाली प्रारम्भ की</td>\n</tr>\n<tr data-start=\"1057\" data-end=\"1083\">\n<td data-start=\"1057\" data-end=\"1064\" data-col-size=\"sm\">टंक </span> in 1210 AD</td>\n</tr>\n<tr data-start=\"211\" data-end=\"272\">\n<td data-start=\"211\" data-end=\"222\" data-col-size=\"sm\">Identity</td>\n<td data-start=\"222\" data-end=\"272\" data-col-size=\"md\">Considered the son of Aibak by many historians</td>\n</tr>\n<tr data-start=\"273\" data-end=\"308\">\n<td data-start=\"273\" data-end=\"280\" data-col-size=\"sm\">Rule</td>\n<td data-start=\"280\" data-end=\"308\" data-col-size=\"md\">Weak and incapable ruler</td>\n</tr>\n<tr data-start=\"309\" data-end=\"379\">\n<td data-start=\"309\" data-end=\"321\" data-col-size=\"sm\">Rebellion</td>\n<td data-start=\"321\" data-end=\"379\" data-col-size=\"md\">Nasir-ud-din Qabacha revolted in Sind, Uch, and Multan</td>\n</tr>\n<tr data-start=\"380\" data-end=\"492\">\n<td data-start=\"380\" data-end=\"386\" data-col-size=\"sm\">End</td>\n<td data-start=\"386\" data-end=\"492\" data-col-size=\"md\">Turkish nobles invited <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Iltutmish</span>, who defeated Aram Shah and became Sultan</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"494\" data-end=\"497\" />\n<h1 data-section-id=\"194f6q8\" data-start=\"499\" data-end=\"557\">SHAMS-UD-DIN ILTUTMISH (1210&ndash;1236 AD) &mdash; CRUX CHEAT SHEET</h1>\n<h2 data-section-id=\"1iqx4if\" data-start=\"559\" data-end=\"587\">Introduction &amp; Importance</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"589\" data-end=\"925\">\n<thead data-start=\"589\" data-end=\"611\">\n<tr data-start=\"589\" data-end=\"611\">\n<th class=\"last:pe-10\" data-start=\"589\" data-end=\"597\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"597\" data-end=\"611\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"622\" data-end=\"925\">\n<tr data-start=\"622\" data-end=\"709\">\n<td data-start=\"622\" data-end=\"635\" data-col-size=\"sm\">Background</td>\n<td data-start=\"635\" data-end=\"709\" data-col-size=\"md\">Slave of <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Qutb al-Din Aibak</span> and Governor of Badayun</td>\n</tr>\n<tr data-start=\"710\" data-end=\"747\">\n<td data-start=\"710\" data-end=\"725\" data-col-size=\"sm\">Famous Title</td>\n<td data-start=\"725\" data-end=\"747\" data-col-size=\"md\">&ldquo;Slave of a Slave&rdquo;</td>\n</tr>\n<tr data-start=\"748\" data-end=\"802\">\n<td data-start=\"748\" data-end=\"758\" data-col-size=\"sm\">Dynasty</td>\n<td data-start=\"758\" data-end=\"802\" data-col-size=\"md\">Founder of the Ilbari and Shamsi Dynasty</td>\n</tr>\n<tr data-start=\"803\" data-end=\"870\">\n<td data-start=\"803\" data-end=\"816\" data-col-size=\"sm\">Importance</td>\n<td data-start=\"816\" data-end=\"870\" data-col-size=\"md\">Known as the &ldquo;Real Founder of the Delhi Sultanate&rdquo;</td>\n</tr>\n<tr data-start=\"871\" data-end=\"925\">\n<td data-start=\"871\" data-end=\"881\" data-col-size=\"sm\">Capital</td>\n<td data-start=\"881\" data-end=\"925\" data-col-size=\"md\">Shifted the capital from Lahore to Delhi</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"927\" data-end=\"930\" />\n<h2 data-section-id=\"1m5yo8z\" data-start=\"932\" data-end=\"957\">Recognition &amp; Currency</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"959\" data-end=\"1204\">\n<thead data-start=\"959\" data-end=\"981\">\n<tr data-start=\"959\" data-end=\"981\">\n<th class=\"last:pe-10\" data-start=\"959\" data-end=\"967\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"967\" data-end=\"981\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"992\" data-end=\"1204\">\n<tr data-start=\"992\" data-end=\"1094\">\n<td data-start=\"992\" data-end=\"1006\" data-col-size=\"sm\">Recognition</td>\n<td data-start=\"1006\" data-end=\"1094\" data-col-size=\"md\">First Sultan to receive &ldquo;Manshur&rdquo; and the title of Sultan from the Caliph of Baghdad</td>\n</tr>\n<tr data-start=\"1095\" data-end=\"1156\">\n<td data-start=\"1095\" data-end=\"1113\" data-col-size=\"sm\">Currency System</td>\n<td data-start=\"1113\" data-end=\"1156\" data-col-size=\"md\">Introduced pure Arabic coinage in India</td>\n</tr>\n<tr data-start=\"1157\" data-end=\"1180\">\n<td data-start=\"1157\" data-end=\"1165\" data-col-size=\"sm\">Tanka</td>\n<td data-start=\"1165\" data-end=\"1180\" data-col-size=\"md\">Silver coin</td>\n</tr>\n<tr data-start=\"1181\" data-end=\"1204\">\n<td data-start=\"1181\" data-end=\"1189\" data-col-size=\"sm\">Jital</td>\n<td data-start=\"1189\" data-end=\"1204\" data-col-size=\"md\">Copper coin</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1206\" data-end=\"1209\" />\n<h2 data-section-id=\"1mkxmq3\" data-start=\"1211\" data-end=\"1228\">Administration</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1230\" data-end=\"1392\">\n<thead data-start=\"1230\" data-end=\"1252\">\n<tr data-start=\"1230\" data-end=\"1252\">\n<th class=\"last:pe-10\" data-start=\"1230\" data-end=\"1238\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1238\" data-end=\"1252\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1263\" data-end=\"1392\">\n<tr data-start=\"1263\" data-end=\"1324\">\n<td data-start=\"1263\" data-end=\"1285\" data-col-size=\"sm\">Turkan-i-Chahalgani</td>\n<td data-start=\"1285\" data-end=\"1324\" data-col-size=\"md\">Group of 40 powerful Turkish nobles</td>\n</tr>\n<tr data-start=\"1325\" data-end=\"1392\">\n<td data-start=\"1325\" data-end=\"1335\" data-col-size=\"sm\">Purpose</td>\n<td data-start=\"1335\" data-end=\"1392\" data-col-size=\"md\">Strengthened administration and controlled rebellions</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1394\" data-end=\"1397\" />\n<h2 data-section-id=\"12g03pv\" data-start=\"1399\" data-end=\"1415\">Mongol Threat</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1417\" data-end=\"1621\">\n<thead data-start=\"1417\" data-end=\"1439\">\n<tr data-start=\"1417\" data-end=\"1439\">\n<th class=\"last:pe-10\" data-start=\"1417\" data-end=\"1425\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1425\" data-end=\"1439\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1450\" data-end=\"1621\">\n<tr data-start=\"1450\" data-end=\"1507\">\n<td data-start=\"1450\" data-end=\"1466\" data-col-size=\"sm\">Mongol Leader</td>\n<td data-start=\"1466\" data-end=\"1507\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Genghis Khan</span></td>\n</tr>\n<tr data-start=\"1508\" data-end=\"1561\">\n<td data-start=\"1508\" data-end=\"1517\" data-col-size=\"sm\">Policy</td>\n<td data-start=\"1517\" data-end=\"1561\" data-col-size=\"md\">Refused shelter to Jalaluddin Mangbarani</td>\n</tr>\n<tr data-start=\"1562\" data-end=\"1621\">\n<td data-start=\"1562\" data-end=\"1571\" data-col-size=\"sm\">Result</td>\n<td data-start=\"1571\" data-end=\"1621\" data-col-size=\"md\">Saved the Delhi Sultanate from Mongol invasion</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1623\" data-end=\"1626\" />\n<h2 data-section-id=\"nmqec7\" data-start=\"1628\" data-end=\"1649\">Military Campaigns</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1651\" data-end=\"1944\">\n<thead data-start=\"1651\" data-end=\"1676\">\n<tr data-start=\"1651\" data-end=\"1676\">\n<th class=\"last:pe-10\" data-start=\"1651\" data-end=\"1662\" data-col-size=\"sm\">Campaign</th>\n<th class=\"last:pe-10\" data-start=\"1662\" data-end=\"1676\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1687\" data-end=\"1944\">\n<tr data-start=\"1687\" data-end=\"1750\">\n<td data-start=\"1687\" data-end=\"1722\" data-col-size=\"sm\">Third Battle of Tarain (1215 AD)</td>\n<td data-start=\"1722\" data-end=\"1750\" data-col-size=\"md\">Defeated Tajuddin Yaldoz</td>\n</tr>\n<tr data-start=\"1751\" data-end=\"1802\">\n<td data-start=\"1751\" data-end=\"1769\" data-col-size=\"sm\">Punjab &amp; Multan</td>\n<td data-start=\"1769\" data-end=\"1802\" data-col-size=\"md\">Defeated Nasir-ud-din Qabacha</td>\n</tr>\n<tr data-start=\"1803\" data-end=\"1879\">\n<td data-start=\"1803\" data-end=\"1825\" data-col-size=\"sm\">Rajasthan Campaigns</td>\n<td data-start=\"1825\" data-end=\"1879\" data-col-size=\"md\">Captured Gwalior, Ajmer, Ranthambore, Bayana, etc.</td>\n</tr>\n<tr data-start=\"1880\" data-end=\"1944\">\n<td data-start=\"1880\" data-end=\"1897\" data-col-size=\"sm\">Bengal &amp; Bihar</td>\n<td data-start=\"1897\" data-end=\"1944\" data-col-size=\"md\">Re-conquered by his son Nasir-ud-din Mahmud</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1946\" data-end=\"1949\" />\n<h2 data-section-id=\"1fchc7f\" data-start=\"1951\" data-end=\"1977\">Architecture &amp; Religion</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1979\" data-end=\"2246\">\n<thead data-start=\"1979\" data-end=\"2001\">\n<tr data-start=\"1979\" data-end=\"2001\">\n<th class=\"last:pe-10\" data-start=\"1979\" data-end=\"1987\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1987\" data-end=\"2001\" data-col-size=\"sm\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"2012\" data-end=\"2246\">\n<tr data-start=\"2012\" data-end=\"2057\">\n<td data-start=\"2012\" data-end=\"2026\" data-col-size=\"sm\">Qutub Minar</td>\n<td data-start=\"2026\" data-end=\"2057\" data-col-size=\"sm\">Completed the upper storeys</td>\n</tr>\n<tr data-start=\"2058\" data-end=\"2102\">\n<td data-start=\"2058\" data-end=\"2074\" data-col-size=\"sm\">Hauz-i-Shamsi</td>\n<td data-start=\"2074\" data-end=\"2102\" data-col-size=\"sm\">Built in Mehrauli, Delhi</td>\n</tr>\n<tr data-start=\"2103\" data-end=\"2149\">\n<td data-start=\"2103\" data-end=\"2118\" data-col-size=\"sm\">Sultan Ghari</td>\n<td data-start=\"2118\" data-end=\"2149\" data-col-size=\"sm\">First Islamic tomb in India</td>\n</tr>\n<tr data-start=\"2150\" data-end=\"2187\">\n<td data-start=\"2150\" data-end=\"2158\" data-col-size=\"sm\">Title</td>\n<td data-start=\"2158\" data-end=\"2187\" data-col-size=\"sm\">&ldquo;Father of Tomb Building&rdquo;</td>\n</tr>\n<tr data-start=\"2188\" data-end=\"2246\">\n<td data-start=\"2188\" data-end=\"2204\" data-col-size=\"sm\">Religious Act</td>\n<td data-start=\"2204\" data-end=\"2246\" data-col-size=\"sm\">Destroyed the Mahakal Temple at Ujjain</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2248\" data-end=\"2251\" />\n<h2 data-section-id=\"1qqhpot\" data-start=\"2253\" data-end=\"2267\">Iqta System</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2269\" data-end=\"2441\">\n<thead data-start=\"2269\" data-end=\"2291\">\n<tr data-start=\"2269\" data-end=\"2291\">\n<th class=\"last:pe-10\" data-start=\"2269\" data-end=\"2277\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"2277\" data-end=\"2291\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"2302\" data-end=\"2441\">\n<tr data-start=\"2302\" data-end=\"2364\">\n<td data-start=\"2302\" data-end=\"2316\" data-col-size=\"sm\">Iqta System</td>\n<td data-start=\"2316\" data-end=\"2364\" data-col-size=\"md\">Land revenue assigned instead of cash salary</td>\n</tr>\n<tr data-start=\"2365\" data-end=\"2395\">\n<td data-start=\"2365\" data-end=\"2379\" data-col-size=\"sm\">Iqta Holder</td>\n<td data-start=\"2379\" data-end=\"2395\" data-col-size=\"md\">Muqti / Wali</td>\n</tr>\n<tr data-start=\"2396\" data-end=\"2441\">\n<td data-start=\"2396\" data-end=\"2406\" data-col-size=\"sm\">Feature</td>\n<td data-start=\"2406\" data-end=\"2441\" data-col-size=\"md\">Transferable and non-hereditary</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2443\" data-end=\"2446\" />\n<h2 data-section-id=\"17j6gma\" data-start=\"2448\" data-end=\"2467\">Division of Land</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2469\" data-end=\"2673\">\n<thead data-start=\"2469\" data-end=\"2499\">\n<tr data-start=\"2469\" data-end=\"2499\">\n<th class=\"last:pe-10\" data-start=\"2469\" data-end=\"2484\" data-col-size=\"sm\">Type of Land</th>\n<th class=\"last:pe-10\" data-start=\"2484\" data-end=\"2499\" data-col-size=\"md\">Description</th>\n</tr>\n</thead>\n<tbody data-start=\"2510\" data-end=\"2673\">\n<tr data-start=\"2510\" data-end=\"2563\">\n<td data-start=\"2510\" data-end=\"2525\" data-col-size=\"sm\">Khalisa Land</td>\n<td data-start=\"2525\" data-end=\"2563\" data-col-size=\"md\">Under direct control of the Sultan</td>\n</tr>\n<tr data-start=\"2564\" data-end=\"2611\">\n<td data-start=\"2564\" data-end=\"2576\" data-col-size=\"sm\">Iqta Land</td>\n<td data-start=\"2576\" data-end=\"2611\" data-col-size=\"md\">Assigned to officers and nobles</td>\n</tr>\n<tr data-start=\"2612\" data-end=\"2673\">\n<td data-start=\"     "question": "<p data-start=\"0\" data-end=\"90\"><strong data-start=\"0\" data-end=\"88\">Razia Sultan / रज़िया सुल्तान के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"92\" data-end=\"909\">\n<li data-section-id=\"18sqmf5\" data-start=\"92\" data-end=\"250\">Razia Sultan was the first and only female Muslim ruler of the Delhi Sultanate. / रज़िया सुल्तान दिल्ली सल्तनत की पहली एवं एकमात्र महिला मुस्लिम शासक थी।</li>\n<li data-section-id=\"t8w3bd\" data-start=\"252\" data-end=\"472\">She discarded the Parda system, wore male attire like Quba and Kulah, and personally led armies in battles. / उसने पर्दा प्रथा को अस्वीकार किया, कुबा एवं कुलाह जैसे पुरुष वेश धारण किए तथा स्वयं सेना का नेतृत्व किया।</li>\n<li data-section-id=\"fm3859\" data-start=\"474\" data-end=\"732\">Turkish nobles opposed her mainly because she promoted Jalal-ud-din Yaqut, an Abyssinian noble, to the post of Amir-i-Akhur. / तुर्क अमीरों ने मुख्यतः इसलिए उसका विरोध किया क्योंकि उसने अबीसीनियाई अमीर जलालुद्दीन याकूत को अमीर-ए-आखुर पद पर पदोन्नत किया।</li>\n<li data-section-id=\"z8wyg6\" data-start=\"734\" data-end=\"909\">Razia successfully defeated Altunia near Kaithal and regained the throne of Delhi. / रज़िया ने कैथल के निकट अल्तूनिया को पराजित कर दिल्ली का सिंहासन पुनः प्राप्त कर लिया।</li>\n</ol>\n<p data-start=\"911\" data-end=\"998\"><strong data-start=\"911\" data-end=\"996\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"1000\" data-end=\"1141\">A. 1, 2 and 3 only / केवल 1, 2 और 3<br data-start=\"1035\" data-end=\"1038\" />B. 1 and 4 only / केवल 1 और 4<br data-start=\"1067\" data-end=\"1070\" />C. 2, 3 and 4 only / केवल 2, 3 और 4<br data-start=\"1105\" data-end=\"1108\" />D. 1, 2, 3 and 4 / 1, 2, 3 और 4</p>",

    "question": "<p data-start=\"1463\" data-end=\"1565\"><strong data-start=\"1463\" data-end=\"1563\">Later Mamluk Rulers / बाद के ममलुक शासकों के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"1567\" data-end=\"2336\">\n<li data-section-id=\"l08ymu\" data-start=\"1567\" data-end=\"1700\">Bahram Shah was a puppet ruler under the control of Turkish nobles. / बहराम शाह तुर्क अमीरों के नियंत्रण में एक कठपुतली शासक था।</li>\n<li data-section-id=\"19qvk35\" data-start=\"1702\" data-end=\"1840\">During Bahram Shah&rsquo;s reign, the office of Naib-i-Mamaliqat was created. / बहराम शाह के शासनकाल में नायब-ए-ममालिकात पद की स्थापना हुई।</li>\n<li data-section-id=\"s2i2ux\" data-start=\"1842\" data-end=\"2001\">Nasiruddin Mahmud earned his livelihood by sewing caps and copying the Quran. / नासिरुद्दीन महमूद टोपी सिलकर एवं कुरान की प्रतिलिपि बनाकर जीविका चलाता था।</li>\n<li data-section-id=\"1s4i3rf\" data-start=\"2003\" data-end=\"2167\">Balban served as Naib under Nasiruddin Mahmud and later became Sultan. / बलबन ने नासिरुद्दीन महमूद के नायब के रूप में कार्य किया तथा बाद में स्वयं सुल्तान बना।</li>\n<li data-section-id=\"s7fpci\" data-start=\"2169\" data-end=\"2336\">Ibn Battuta stated that Nasiruddin Mahmud poisoned Balban to seize power. / इब्न बतूता के अनुसार सत्ता प्राप्त करने हेतु नासिरुद्दीन महमूद ने बलबन को विष दिया था।</li>\n</ol>\n<p data-start=\"2338\" data-end=\"2425\"><strong data-start=\"2338\" data-end=\"2423\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p></p>\n<p data-start=\"2427\" data-end=\"2590\">A. 1, 2 and 5 only / केवल 1, 2 और 5<br data-start=\"2462\" data-end=\"2465\" />B. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"2506\" data-end=\"2509\" />C. 2, 3, 4 and 5 only / केवल 2, 3, 4 और 5<br data-start=\"2550\" data-end=\"2553\" />D. 1, 3 and 5 only / केवल 1, 3 और 5</p>",

    "question": "<p data-start=\"2924\" data-end=\"3025\"><strong data-start=\"2924\" data-end=\"3023\">Ghiyas-ud-din Balban / ग़ियासुद्दीन बलबन के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"3027\" data-end=\"3947\">\n<li data-section-id=\"aqkz8x\" data-start=\"3027\" data-end=\"3218\">Balban adopted the title Zill-i-Ilahi and introduced court practices like Sijda and Paibos. / बलबन ने ज़िल्ल-ए-इलाही की उपाधि धारण की तथा सिजदा एवं पैबोस जैसी दरबारी प्रथाएँ प्रारंभ कीं।</li>\n<li data-section-id=\"11epzp5\" data-start=\"3220\" data-end=\"3377\">He abolished the Turkan-i-Chahalgani to strengthen the authority of the Sultan. / उसने सुल्तान की शक्ति बढ़ाने हेतु तुर्कान-ए-चहलगानी को समाप्त कर दिया।</li>\n<li data-section-id=\"1kfsttb\" data-start=\"3379\" data-end=\"3573\">Balban followed the policy of &ldquo;Blood and Iron&rdquo; to suppress rebels and establish law and order. / बलबन ने विद्रोहियों को दबाने एवं कानून-व्यवस्था स्थापित करने हेतु &ldquo;रक्त एवं लौह नीति&rdquo; अपनाई।</li>\n<li data-section-id=\"1dvtnnc\" data-start=\"3575\" data-end=\"3775\">He completely expelled the Mongols from Punjab and annexed the entire region into the Delhi Sultanate. / उसने मंगोलों को पूर्णतः पंजाब से बाहर निकालकर पूरे क्षेत्र को दिल्ली सल्तनत में मिला लिया।</li>\n<li data-section-id=\"riqp6i\" data-start=\"3777\" data-end=\"3947\">Jalaluddin Firoz Khilji ended the Mamluk Dynasty in 1290 AD after killing Kaimurs. / 1290 ई. में जलालुद्दीन फिरोज खिलजी ने कैमुर्स की हत्या कर ममलुक वंश का अंत किया।</li>\n</ol>\n<p data-start=\"3949\" data-end=\"4036\"><strong data-start=\"3949\" data-end=\"4034\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"4038\" data-end=\"4197\">A. 1, 2, 3 and 5 only / केवल 1, 2, 3 और 5<br data-start=\"4079\" data-end=\"4082\" />B. 1, 3 and 4 only / केवल 1, 3 और 4<br data-start=\"4117\" data-end=\"4120\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"4155\" data-end=\"4158\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>",

    "solution": "<p>Statement 4 is incorrect because Balban did not completely expel the Mongols; instead, he followed both military defence and diplomatic adjustment policies.<br data-start=\"4424\" data-end=\"4427\" />/ कथन 4 गलत है क्योंकि बलबन ने मंगोलों को पूर्णतः बाहर नहीं निकाला था, बल्कि सैन्य एवं कूटनीतिक दोनों नीतियाँ अपनाईं।</p>\n<p></p>\n<div class=\"pointer-events-none -mt-px h-px translate-y-[calc(var(--scroll-root-safe-area-inset-bottom)-14*var(--spacing))]\" aria-hidden=\"true\"></div>\n<div class=\"qMYqUG_convSearchResultHighlightRoot\">\n<div class=\"relative w-full overflow-visible\">\n<section class=\"text-token-text-primary w-full focus:outline-none [--shadow-height:45px] has-data-writing-block:pointer-events-none has-data-writing-block:-mt-(--shadow-height) has-data-writing-block:pt-(--shadow-height) [&amp;:has([data-writing-block])&gt;*]:pointer-events-auto [content-visibility:auto] supports-[content-visibility:auto]:[contain-intrinsic-size:auto_100lvh] R6Vx5W_threadScrollVars scroll-mb-[calc(var(--scroll-root-safe-area-inset-bottom,0px)+var(--thread-response-height))] scroll-mt-[calc(var(--header-height)+min(200px,max(70px,20svh)))]\" dir=\"auto\" data-turn-id=\"request-6a03460a-4178-83e8-9f6a-40ce4bbb42d9-2\" data-turn-id-container=\"request-6a03460a-4178-83e8-9f6a-40ce4bbb42d9-2\" data-testid=\"conversation-turn-16\" data-scroll-anchor=\"false\" data-turn=\"assistant\">\n<div class=\"text-base my-auto mx-auto pb-10 [--thread-content-margin:var(--thread-content-margin-xs,calc(var(--spacing)*4))] @w-sm/main:[--thread-content-margin:var(--thread-content-margin-sm,calc(var(--spacing)*6))] @w-lg/main:[--thread-content-margin:var(--thread-content-margin-lg,calc(var(--spacing)*16))] px-(--thread-content-margin)\">\n<div class=\"[--thread-content-max-width:40rem] @w-lg/main:[--thread-content-max-width:48rem] mx-auto max-w-(--thread-content-max-width) flex-1 -sm/main:[--thread-content-margin:var(--thread-content-margin-sm,calc(var(--spacing)*6))] @w     "question": "<p data-start=\"0\" data-end=\"137\"><strong data-start=\"0\" data-end=\"135\">&nbsp;Khilji Revolution and Jalaluddin Khilji / खिलजी क्रांति एवं जलालुद्दीन खिलजी के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"139\" data-end=\"905\">\n<li data-section-id=\"qyj17e\" data-start=\"139\" data-end=\"310\">The Khiljis were of Turko-Afghan origin and their rise is known as the &ldquo;Khilji Revolution.&rdquo; / खिलजी तुर्क-अफगान मूल के थे तथा उनके उदय को &ldquo;खिलजी क्रांति&rdquo; कहा जाता है।</li>\n<li data-section-id=\"1tplxiq\" data-start=\"312\" data-end=\"469\">Jalaluddin Khilji served as Ariz-i-Mumalik under Balban before becoming Sultan. / सुल्तान बनने से पूर्व जलालुद्दीन खिलजी बलबन के अधीन आरिज-ए-मुमालिक था।</li>\n<li data-section-id=\"1qvfipl\" data-start=\"471\" data-end=\"699\">Jalaluddin Khilji was the first Delhi Sultan to declare that government should rest on the willing support of the governed. / जलालुद्दीन खिलजी पहला दिल्ली सुल्तान था जिसने कहा कि शासन प्रजा की स्वीकृति पर आधारित होना चाहिए।</li>\n<li data-section-id=\"5feyy8\" data-start=\"701\" data-end=\"905\">He strictly followed Balban&rsquo;s policy of blood and iron and became famous as &ldquo;Clemency Jalaluddin.&rdquo; / उसने बलबन की रक्त एवं लौह नीति का कठोर पालन किया और &ldquo;क्लेमेंसी जलालुद्दीन&rdquo; के नाम से प्रसिद्ध हुआ।</li>\n</ol>\n<p data-start=\"907\" data-end=\"994\"><strong data-start=\"907\" data-end=\"992\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"996\" data-end=\"1137\">A. 1, 2 and 3 only / केवल 1, 2 और 3<br data-start=\"1031\" data-end=\"1034\" />B. 1 and 4 only / केवल 1 और 4<br data-start=\"1063\" data-end=\"1066\" />C. 2, 3 and 4 only / केवल 2, 3 और 4<br data-start=\"1101\" data-end=\"1104\" />D. 1, 2, 3 and 4 / 1, 2, 3 और 4</p>",

      "<p>C</p>",
