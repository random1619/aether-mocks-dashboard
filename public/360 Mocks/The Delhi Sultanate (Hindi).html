ata-start=\"116\" data-end=\"140\" data-col-size=\"md\">Turko-Afghan dynasty</td>\n</tr>\n<tr data-start=\"141\" data-end=\"215\">\n<td data-start=\"141\" data-end=\"156\" data-col-size=\"sm\">Significance</td>\n<td data-start=\"156\" data-end=\"215\" data-col-size=\"md\">Ended the Slave Dynasty and Turkish monopoly over power</td>\n</tr>\n<tr data-start=\"216\" data-end=\"267\">\n<td data-start=\"216\" data-end=\"226\" data-col-size=\"sm\">Founder</td>\n<td data-start=\"226\" data-end=\"267\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Jalaluddin Firoz Khilji</span></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"269\" data-end=\"272\" />\n<h1 data-section-id=\"oye28m\" data-start=\"274\" data-end=\"327\">JALALUDDIN KHILJI (1290&ndash;1296 AD) &mdash; CRUX CHEAT SHEET</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"329\" data-end=\"915\">\n<thead data-start=\"329\" data-end=\"351\">\n<tr data-start=\"329\" data-end=\"351\">\n<th class=\"last:pe-10\" data-start=\"329\" data-end=\"337\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"337\" data-end=\"351\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"362\" data-end=\"915\">\n<tr data-start=\"362\" data-end=\"430\">\n<td data-start=\"362\" data-end=\"381\" data-col-size=\"sm\">Earlier Position</td>\n<td data-start=\"381\" data-end=\"430\" data-col-size=\"md\">Ariz-i-Mumalik (Minister of War) under Balban</td>\n</tr>\n<tr data-start=\"431\" data-end=\"485\">\n<td data-start=\"431\" data-end=\"443\" data-col-size=\"sm\">Accession</td>\n<td data-start=\"443\" data-end=\"485\" data-col-size=\"md\">Became Sultan in 1290 AD after Kaimurs</td>\n</tr>\n<tr data-start=\"486\" data-end=\"519\">\n<td data-start=\"486\" data-end=\"494\" data-col-size=\"sm\">Title</td>\n<td data-start=\"494\" data-end=\"519\" data-col-size=\"md\">&ldquo;Clemency Jalaluddin&rdquo;</td>\n</tr>\n<tr data-start=\"520\" data-end=\"560\">\n<td data-start=\"520\" data-end=\"529\" data-col-size=\"sm\">Policy</td>\n<td data-start=\"529\" data-end=\"560\" data-col-size=\"md\">Liberal and forgiving ruler</td>\n</tr>\n<tr data-start=\"561\" data-end=\"637\">\n<td data-start=\"561\" data-end=\"578\" data-col-size=\"sm\">Important Idea</td>\n<td data-start=\"578\" data-end=\"637\" data-col-size=\"md\">Accepted that India could not be a purely Islamic state</td>\n</tr>\n<tr data-start=\"638\" data-end=\"697\">\n<td data-start=\"638\" data-end=\"655\" data-col-size=\"sm\">Administration</td>\n<td data-start=\"655\" data-end=\"697\" data-col-size=\"md\">Ended Turkish monopoly in high offices</td>\n</tr>\n<tr data-start=\"698\" data-end=\"746\">\n<td data-start=\"698\" data-end=\"715\" data-col-size=\"sm\">Mongol Victory</td>\n<td data-start=\"715\" data-end=\"746\" data-col-size=\"md\">Defeated Mongols in 1292 AD</td>\n</tr>\n<tr data-start=\"747\" data-end=\"804\">\n<td data-start=\"747\" data-end=\"759\" data-col-size=\"sm\">Expansion</td>\n<td data-start=\"759\" data-end=\"804\" data-col-size=\"md\">Began campaigns toward Malwa and Devagiri</td>\n</tr>\n<tr data-start=\"805\" data-end=\"915\">\n<td data-start=\"805\" data-end=\"813\" data-col-size=\"sm\">Death</td>\n<td data-start=\"813\" data-end=\"876\" data-col-size=\"md\">Murdered by <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Alauddin Khilji</span> in 1296 AD</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"917\" data-end=\"920\" />\n<h1 data-section-id=\"1v7bi2n\" data-start=\"922\" data-end=\"973\">ALAUDDIN KHILJI (1296&ndash;1316 AD) &mdash; CRUX CHEAT SHEET</h1>\n<h2 data-section-id=\"1rz091s\" data-start=\"975\" data-end=\"999\">Introduction &amp; Titles</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1001\" data-end=\"1374\">\n<thead data-start=\"1001\" data-end=\"1023\">\n<tr data-start=\"1001\" data-end=\"1023\">\n<th class=\"last:pe-10\" data-start=\"1001\" data-end=\"1009\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1009\" data-end=\"1023\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1034\" data-end=\"1374\">\n<tr data-start=\"1034\" data-end=\"1062\">\n<td data-start=\"1034\" data-end=\"1046\" data-col-size=\"sm\">Real Name</td>\n<td data-start=\"1046\" data-end=\"1062\" data-col-size=\"md\">Ali Gurshasp</td>\n</tr>\n<tr data-start=\"1063\" data-end=\"1120\">\n<td data-start=\"1063\" data-end=\"1074\" data-col-size=\"sm\">Relation</td>\n<td data-start=\"1074\" data-end=\"1120\" data-col-size=\"md\">Nephew and son-in-law of Jalaluddin Khilji</td>\n</tr>\n<tr data-start=\"1121\" data-end=\"1154\">\n<td data-start=\"1121\" data-end=\"1138\" data-col-size=\"sm\">Early Position</td>\n<td data-start=\"1138\" data-end=\"1154\" data-col-size=\"md\">Amir-i-Tuzuk</td>\n</tr>\n<tr data-start=\"1155\" data-end=\"1224\">\n<td data-start=\"1155\" data-end=\"1171\" data-col-size=\"sm\">Rise to Power</td>\n<td data-start=\"1171\" data-end=\"1224\" data-col-size=\"md\">Became Sultan after killing Jalaluddin in 1296 AD</td>\n</tr>\n<tr data-start=\"1225\" data-end=\"1278\">\n<td data-start=\"1225\" data-end=\"1240\" data-col-size=\"sm\">Famous Title</td>\n<td data-start=\"1240\" data-end=\"1278\" data-col-size=\"md\">Sikandar-i-Sani (Second Alexander)</td>\n</tr>\n<tr data-start=\"1279\" data-end=\"1329\">\n<td data-start=\"1279\" data-end=\"1292\" data-col-size=\"sm\">Reputation</td>\n<td data-start=\"1292\" data-end=\"1329\" data-col-size=\"md\">&ldquo;Sikandar&rdquo; of the Delhi Sultanate</td>\n</tr>\n<tr data-start=\"1330\" data-end=\"1374\">\n<td data-start=\"1330\" data-end=\"1343\" data-col-size=\"sm\">Philosophy</td>\n<td data-start=\"1343\" data-end=\"1374\" data-col-size=\"md\">&ldquo;Kingship knows no kinship&rdquo;</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1376\" data-end=\"1379\" />\n<h2 data-section-id=\"l2soi5\" data-start=\"1381\" data-end=\"1401\">Domestic Policies</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1403\" data-end=\"1760\">\n<thead data-start=\"1403\" data-end=\"1425\">\n<tr data-start=\"1403\" data-end=\"1425\">\n<th class=\"last:pe-10\" data-start=\"1403\" data-end=\"1411\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1411\" data-end=\"1425\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1436\" data-end=\"1760\">\n<tr data-start=\"1436\" data-end=\"1514\">\n<td data-start=\"1436\" data-end=\"1455\" data-col-size=\"sm\">Religious Policy</td>\n<td data-start=\"1455\" data-end=\"1514\" data-col-size=\"md\">First Turkish Sultan to separate religion from politics</td>\n</tr>\n<tr data-start=\"1515\" data-end=\"1562\">\n<td data-start=\"1515\" data-end=\"1528\" data-col-size=\"sm\">Spy System</td>\n<td data-start=\"1528\" data-end=\"1562\" data-col-size=\"md\">Appointed Barids and Munhiyans</td>\n</tr>\n<tr data-start=\"1563\" data-end=\"1626\">\n<td data-start=\"1563\" data-end=\"1578\" data-col-size=\"sm\">Prohibitions</td>\n<td data-start=\"1578\" data-end=\"1626\" data-col-size=\"md\">Banned alcohol, gambling, and social parties</td>\n</tr>\n<tr data-start=\"1627\" data-end=\"1701\">\n<td data-start=\"1627\" data-end=\"1644\" data-col-size=\"sm\">Social Control</td>\n<td data-start=\"1644\" data-end=\"1701\" data-col-size=\"md\">Nobles needed permission for marriages and gatherings</td>\n</tr>\n<tr data-start=\"1702\" data-end=\"1760\">\n<td data-start=\"1702\" data-end=\"1720\" data-col-size=\"sm\">Property Policy</td>\n<td data-start=\"1720\" data-end=\"1760\" data-col-size=\"md\">Imposed taxes on Inam and Waqf lands</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1762\" data-end=\"1765\" />\n<h2 data-section-id=\"10gplns\" data-start=\"1767\" data-end=\"1786\">Military Reforms</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1788\" data-end=\"2051\">\n<thead data-start=\"1788\" data-end=\"1810\">\n<tr data-start=\"1788\" data-end=\"1810\">\n<th class=\"last:pe-10\" data-start=\"1788\" data-end=\"1796\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"1796\" data-end=\"1810\" data-col-size=\"sm\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1821\" data-end=\"2051\">\n<tr data-start=\"1821\" data-end=\"1870\">\n<td data-start=\"1821\" data-end=\"1837\" data-col-size=\"sm\">Standing Army</td>\n<td data-start=\"1837\" data-end=\"1870\" data-col-size=\"sm\">Created a huge permanent army</td>\n</tr>\n<tr data-start=\"1871\" data-end=\"1922\">\n<td data-start=\"1871\" data-end=\"1887\" data-col-size=\"sm\">Chehra System</td>\n<td data-start=\"1887\" data-end=\"1922\" data-col-size=\"sm\">Recorded soldiers&rsquo; descriptions</td>\n</tr>\n<tr data-start=\"1923\" data-end=\"1959\">\n<td data-start=\"1923\" data-end=\"1937\" data-col-size=\"sm\">Dagh System</td>\n<td data-col-size=\"sm\" data-start=\"1937\" data-end=\"1959\">Branding of horses</td>\n</tr>\n<tr data-start=\"1960\" data-end=\"2001\">\n<td data-start=\"1960\" data-end=\"1976\" data-col-size=\"sm\">Salary System</td>\n<td data-col-size=\"sm\" data-start=\"1976\" data-end=\"2001\">Paid soldiers in cash</td>\n</tr>\n<tr data-start=\"2002\" data-end=\"2051\">\n<td data-start=\"2002\" data-end=\"2016\" data-col-size=\"sm\">Iqta System</td>\n<td data-col-size=\"sm\" data-start=\"2016\" data-end=\"2051\">Abolished for military purposes</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2053\" data-end=\"2056\" />\n<h2 data-section-id=\"w5r6al\" data-start=\"2058\" data-end=\"2083\">Agrarian &amp; Tax Reforms</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2085\" data-end=\"2374\">\n<thead data-start=\"2085\" data-end=\"2107\">\n<tr data-start=\"2085\" data-end=\"2107\">\n<th class=\"last:pe-10\" data-start=\"2085\" data-end=\"2093\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"2093\" data-end=\"2107\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"2118\" data-end=\"2374\">\n<tr data-start=\"2118\" data-end=\"2177\">\n<td data-start=\"2118\" data-end=\"2137\" data-col-size=\"sm\">Land Measurement</td>\n<td data-col-size=\"md\" data-start=\"2137\" data-end=\"2177\">Started land measurement for revenue</td>\n</tr>\n<tr data-start=\"2178\" data-end=\"2223\">\n<td data-start=\"2178\" data-end=\"2187\" data-col-size=\"sm\">Kharaj</td>\n<td data-col-size=\"md\" data-start=\"2187\" data-end=\"2223\">Land tax fixed at 50% of produce</td>\n</tr>\n<tr data-start=\"2224\" data-end=\"2282\">\n<td data-start=\"2224\" data-end=\"2236\" data-col-size=\"sm\">New Taxes</td>\n<td data-start=\"2236\" data-end=\"2282\" data-col-size=\"md\">Ghari (House Tax) and Charai (Grazing Tax)</td>\n</tr>\n<tr data-start=\"2283\" data-end=\"2333\">\n<td data-start=\"2283\" data-end=\"2294\" data-col-size=\"sm\">Equality</td>\n<td data-start=\"2294\" data-end=\"2333\" data-col-size=\"md\">Khuts and Muqaddams also paid taxes</td>\n</tr>\n<tr data-start=\"2334\" data-end=\"2374\">\n<td data-start=\"2334\" data-end=\"2344\" data-col-size=\"sm\">Officer</td>\n<td data-col-size=\"md\" data-start=\"2344\" data-end=\"2374\">Created Diwan-i-Mustakhraj</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2376\" data-end=\"2379\" />\n<h2 data-section-id=\"pqi2v7\" data-start=\"2381\" data-end=\"2405\">Market Control System</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2407\" data-end=\"2804\">\n<thead data-start=\"2407\" data-end=\"2429\">\n<tr data-start=\"2407\" data-end=\"2429\">\n<th class=\"last:pe-10\" data-start=\"2407\" data-end=\"2415\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"2415\" data-end=\"2429\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"2440\" data-end=\"2804\">\n<tr data-start=\"2440\" data-end=\"2491\">\n<td data-start=\"2440\" data-end=\"2452\" data-col-size=\"sm\">Objective</td>\n<td data-start=\"2452\" data-end=\"2491\" data-col-size=\"md\">Maintain large army on low salaries</td>\n</tr>\n<tr data-start=\"2492\" data-end=\"2561\">\n<td data-start=\"2492\" data-end=\"2508\" data-col-size=\"sm\">Price Control</td>\n<td data-col-size=\"md\" data-start=\"2508\" data-end=\"2561\">Fixed prices of grains, cloth, horses, and slaves</td>\n</tr>\n<tr data-start=\"2562\" data-end=\"2618\">\n<td data-start=\"2562\" data-end=\"2584\" data-col-size=\"sm\">Public Distribution</td>\n<td data-start=\"2584\" data-end=\"2618\" data-col-size=\"md\">Stored grain for famine relief</td>\n</tr>\n<tr data-start=\"2619\" data-end=\"2670\">\n<td data-start=\"2619\" data-end=\"2634\" data-col-size=\"sm\">Main Markets</td>\n<td data-start=\"2634\" data-end=\"2670\" data-col-size=\"md\">Mandi, Sarai-i-Adl, Horse Market</td>\n</tr>\n<tr data-start=\"2671\" data-end=\"2703\">\n<td data-start=\"2671\" data-end=\"2684\" data-col-size=\"sm\">Department</td>\n<td data-col-size=\"md\" data-start=\"2684\" data-end=\"2703\">Diwan-i-Riyasat</td>\n</tr>\n<tr data-start=\"2704\" data-end=\"2739\">\n<td data-start=\"2704\" data-end=\"2721\" data-col-size=\"sm\">Market Officer</td>\n<td data-col-size=\"md\" data-start=\"2721\" data-end=\"2739\">     "question": "<p data-start=\"1472\" data-end=\"1617\"><strong data-start=\"1472\" data-end=\"1615\">Alauddin Khilji: Administration and Reforms / अलाउद्दीन खिलजी के प्रशासन एवं सुधारों के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"1619\" data-end=\"2428\">\n<li data-section-id=\"vq4uv4\" data-start=\"1619\" data-end=\"1864\">Alauddin Khilji was the first Turkish Sultan to completely separate religion from politics and reduce the influence of the Ulema. / अलाउद्दीन खिलजी पहला तुर्क सुल्तान था जिसने राजनीति को धर्म से अलग किया तथा उलेमाओं के हस्तक्षेप को कम किया।</li>\n<li data-section-id=\"q8zuw8\" data-start=\"1866\" data-end=\"2015\">He introduced Chehra and Dagh systems to prevent corruption in the army. / उसने सेना में भ्रष्टाचार रोकने हेतु चेहरा एवं दाग प्रणाली प्रारंभ की।</li>\n<li data-section-id=\"v2q7em\" data-start=\"2017\" data-end=\"2203\">He abolished cash payment to soldiers and revived the iqta system for military officers. / उसने सैनिकों को नकद वेतन देना समाप्त कर सैन्य अधिकारियों हेतु इक्ता व्यवस्था पुनः लागू की।</li>\n<li data-section-id=\"3ap2og\" data-start=\"2205\" data-end=\"2355\">He was the first ruler to insist on land measurement for revenue assessment. / वह भू-राजस्व निर्धारण हेतु भूमि मापन पर बल देने वाला पहला शासक था।</li>\n<li data-section-id=\"npx25\" data-start=\"2357\" data-end=\"2428\">He introduced Ghari and Charai taxes. / उसने घरी एवं चराई कर लगाए।</li>\n</ol>\n<p data-start=\"2430\" data-end=\"2517\"><strong data-start=\"2430\" data-end=\"2515\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"2519\" data-end=\"2684\">A. 1, 2, 4 and 5 only / केवल 1, 2, 4 और 5<br data-start=\"2560\" data-end=\"2563\" />B. 1, 3 and 5 only / केवल 1, 3 और 5<br data-start=\"2598\" data-end=\"2601\" />C. 2, 3, 4 and 5 only / केवल 2, 3, 4 और 5<br data-start=\"2642\" data-end=\"2645\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>",

    "question": "<p data-start=\"2990\" data-end=\"3129\"><strong data-start=\"2990\" data-end=\"3127\">Market Reforms of Alauddin Khilji / अलाउद्दीन खिलजी की बाजार नियंत्रण व्यवस्था के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"3131\" data-end=\"3813\">\n<li data-section-id=\"zhxm98\" data-start=\"3131\" data-end=\"3278\">Alauddin fixed the prices of grains, cloth, horses, slaves and cattle. / अलाउद्दीन ने अनाज, वस्त्र, घोड़े, दास एवं पशुओं के मूल्य निश्चित किए।</li>\n<li data-section-id=\"1n5p2dq\" data-start=\"3280\" data-end=\"3408\">Diwan-i-Riyasat was established to supervise price control measures. / मूल्य नियंत्रण हेतु दीवान-ए-रियासत की स्थापना की गई।</li>\n<li data-section-id=\"1eluxod\" data-start=\"3410\" data-end=\"3520\">Shahna-i-Mandi acted as the market superintendent. / शाहना-ए-मंडी बाजार अधीक्षक के रूप में कार्य करता था।</li>\n<li data-section-id=\"mmaznb\" data-start=\"3522\" data-end=\"3660\">Hoarding and black marketing were officially encouraged during famines. / अकाल के समय जमाखोरी एवं कालाबाजारी को प्रोत्साहित किया गया।</li>\n<li data-section-id=\"1fltarm\" data-start=\"3662\" data-end=\"3813\">Traders were required to register themselves and sell goods in Sarai-i-Adl. / व्यापारियों को पंजीकरण कराकर सराय-ए-अदल में वस्तुएँ बेचनी पड़ती थीं।</li>\n</ol>\n<p data-start=\"3815\" data-end=\"3902\"><strong data-start=\"3815\" data-end=\"3900\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"3904\" data-end=\"4063\">A. 1, 2 and 3 only / केवल 1, 2 और 3<br data-start=\"3939\" data-end=\"3942\" />B. 1, 2, 3 and 5 only / केवल 1, 2, 3 और 5<br data-start=\"3983\" data-end=\"3986\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"4021\" data-end=\"4024\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>",

    "question": "<p data-start=\"4303\" data-end=\"4437\"><strong data-start=\"4303\" data-end=\"4435\">&nbsp;Military Campaigns of Alauddin Khilji / अलाउद्दीन खिलजी के सैन्य अभियानों के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"4439\" data-end=\"5297\">\n<li data-section-id=\"1szqm2l\" data-start=\"4439\" data-end=\"4594\">Malik Kafur led the major South Indian campaigns of Alauddin Khilji. / मलिक काफूर ने अलाउद्दीन खिलजी के प्रमुख दक्षिण भारतीय अभियानों का नेतृत्व किया।</li>\n<li data-section-id=\"h6dst8\" data-start=\"4596\" data-end=\"4785\">During the Gujarat campaign, Nusrat Khan purchased Malik Kafur, who was known as &ldquo;Hazar Dinari.&rdquo; / गुजरात अभियान के दौरान नुसरत खान ने मलिक काफूर को खरीदा, जिसे &ldquo;हज़ार दिनारी&rdquo; कहा गया।</li>\n<li data-section-id=\"uoamnt\" data-start=\"4787\" data-end=\"4969\">After the conquest of Chittor, Alauddin renamed it Khizrabad after his son Khizr Khan. / चित्तौड़ विजय के बाद अलाउद्दीन ने उसका नाम अपने पुत्र खिज्र खान के नाम पर खिज्राबाद रखा।</li>\n<li data-section-id=\"c9sjns\" data-start=\"4971\" data-end=\"5149\">The Kohinoor diamond was obtained during the Warangal campaign against Pratap Rudra Dev II. / प्रताप रुद्र देव द्वितीय के विरुद्ध वारंगल अभियान में कोहिनूर हीरा प्राप्त हुआ।</li>\n<li data-section-id=\"x62704\" data-start=\"5151\" data-end=\"5297\">Devagiri was permanently annexed into the Delhi Sultanate in 1313 AD. / 1313 ई. में देवगिरि को स्थायी रूप से दिल्ली सल्तनत में मिला लिया गया।</li>\n</ol>\n<p data-start=\"5299\" data-end=\"5386\"><strong data-start=\"5299\" data-end=\"5384\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p></p>\n<p data-start=\"5388\" data-end=\"5547\">A. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"5429\" data-end=\"5432\" />B. 1, 3 and 5 only / केवल 1, 3 और 5<br data-start=\"5467\" data-end=\"5470\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"5505\" data-end=\"5508\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>",

d=\"1440\">Nasiruddin Khusro Shah, regarded as the first Indian Muslim Sultan of Delhi, was defeated by Ghiyasuddin Tughlaq, leading to the establishment of the Tughlaq Dynasty.<br data-start=\"1282\" data-end=\"1285\" />/ नासिरुद्दीन खुसरो शाह, जिन्हें दिल्ली का प्रथम भारतीय मुस्लिम सुल्तान माना जाता है, को गयासुद्दीन तुगलक ने पराजित किया, जिससे तुगलक वंश की स्थापना हुई।</li>\n</ol>\n<p data-start=\"1442\" data-end=\"1529\"><strong data-start=\"1442\" data-end=\"1527\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"1531\" data-end=\"1690\">A. 1, 2 and 3 only / केवल 1, 2 और 3<br data-start=\"1566\" data-end=\"1569\" />B. 1, 2, 3 and 5 only / केवल 1, 2, 3 और 5<br data-start=\"1610\" data-end=\"1613\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"1648\" data-end=\"1651\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>\n</div>\n</div>\n</div>\n</div>\n<div class=\"z-0 flex min-h-[46px] justify-start\"></div>\n<div class=\"mt-3 w-full empty:hidden\">\n<div class=\"text-center\"></div>\n</div>\n</div>\n</div>\n</section>\n<div class=\"contents\"></div>\n</div>\n</div>",

    "solution": "<h3 data-section-id=\"17dv77n\" data-start=\"1731\" data-end=\"1758\">Explanation / व्याख्या:</h3>\n<ul data-start=\"1759\" data-end=\"1993\" data-is-last-node=\"\" data-is-only-node=\"\">\n<li data-section-id=\"b4bxwv\" data-start=\"1759\" data-end=\"1993\" data-is-last-node=\"\">Statement 4 is incorrect because&nbsp;<strong data-start=\"1794\" data-end=\"1828\">Alai Minar remained unfinished</strong>&nbsp;and was intended to be twice the height of Qutub Minar.<br data-start=\"1884\" data-end=\"1887\" />/ कथन 4 गलत है क्योंकि&nbsp;<strong data-start=\"1910\" data-end=\"1939\">अलाई मीनार अधूरी रह गई थी</strong>&nbsp;तथा इसे कुतुब मीनार से दोगुना ऊँचा बनाने की योजना थी।</li>\n</ul>\n<p></p>\n<h1 data-section-id=\"1lqkebo\" data-start=\"0\" data-end=\"67\">ART &amp; LITERATURE UNDER ALAUDDIN KHILJI &mdash; TABULAR CRUX CHEAT SHEET</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"69\" data-end=\"715\">\n<thead data-start=\"69\" data-end=\"91\">\n<tr data-start=\"69\" data-end=\"91\">\n<th class=\"last:pe-10\" data-start=\"69\" data-end=\"77\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"77\" data-end=\"91\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"102\" data-end=\"715\">\n<tr data-start=\"102\" data-end=\"174\">\n<td data-start=\"102\" data-end=\"114\" data-col-size=\"sm\">Patronage</td>\n<td data-start=\"114\" data-end=\"174\" data-col-size=\"md\">Alauddin Khilji was a great patron of art and literature</td>\n</tr>\n<tr data-start=\"175\" data-end=\"271\">\n<td data-start=\"175\" data-end=\"189\" data-col-size=\"sm\">Famous Poet</td>\n<td data-start=\"189\" data-end=\"271\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Amir Khusrau</span> &mdash; known as <em data-start=\"240\" data-end=\"251\">Tu-i-Hind</em> (Parrot of India)</td>\n</tr>\n<tr data-start=\"272\" data-end=\"343\">\n<td data-start=\"272\" data-end=\"290\" data-col-size=\"sm\">Spiritual Guide</td>\n<td data-start=\"290\" data-end=\"343\" data-col-size=\"md\">Disciple of <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Nizamuddin Auliya</span></td>\n</tr>\n<tr data-start=\"344\" data-end=\"396\">\n<td data-start=\"344\" data-end=\"360\" data-col-size=\"sm\">Court Service</td>\n<td data-start=\"360\" data-end=\"396\" data-col-size=\"md\">Served in the courts of 8 rulers</td>\n</tr>\n<tr data-start=\"397\" data-end=\"468\">\n<td data-start=\"397\" data-end=\"421\" data-col-size=\"sm\">Musical Contributions</td>\n<td data-start=\"421\" data-end=\"468\" data-col-size=\"md\">Credited with inventing the Sitar and Tabla</td>\n</tr>\n<tr data-start=\"469\" data-end=\"537\">\n<td data-start=\"469\" data-end=\"486\" data-col-size=\"sm\">Music &amp; Poetry</td>\n<td data-start=\"486\" data-end=\"537\" data-col-size=\"md\">Popularized Qawwali, Ghazal, Masnavi, and Rubai</td>\n</tr>\n<tr data-start=\"538\" data-end=\"622\">\n<td data-start=\"538\" data-end=\"553\" data-col-size=\"sm\">Famous Works</td>\n<td data-start=\"553\" data-end=\"622\" data-col-size=\"md\"><em data-start=\"555\" data-end=\"573\">Khazain-ul-Futuh</em>, <em data-start=\"575\" data-end=\"589\">Tughlaq Nama</em>, <em data-start=\"591\" data-end=\"606\">Wast-ul-Hayat</em>, <em data-start=\"608\" data-end=\"620\">Nuh Sipihr</em></td>\n</tr>\n<tr data-start=\"623\" data-end=\"715\">\n<td data-start=\"623\" data-end=\"636\" data-col-size=\"sm\">Other Poet</td>\n<td data-start=\"636\" data-end=\"676\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Mir Hasan Dehlvi</span></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"717\" data-end=\"720\" />\n<h1 data-section-id=\"22ab6p\" data-start=\"722\" data-end=\"785\">ARCHITECTURE UNDER ALAUDDIN KHILJI &mdash; TABULAR CRUX CHEAT SHEET</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"787\" data-end=\"1388\">\n<thead data-start=\"787\" data-end=\"819\">\n<tr data-start=\"787\" data-end=\"819\">\n<th class=\"last:pe-10\" data-start=\"787\" data-end=\"805\" data-col-size=\"sm\">Monument / Work</th>\n<th class=\"last:pe-10\" data-start=\"805\" data-end=\"819\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"830\" data-end=\"1388\">\n<tr data-start=\"830\" data-end=\"915\">\n<td data-start=\"830\" data-end=\"855\" data-col-size=\"sm\">Alai Darwaza (1311 AD)</td>\n<td data-start=\"855\" data-end=\"915\" data-col-size=\"md\">First Indian building based on true Islamic architecture</td>\n</tr>\n<tr data-start=\"916\" data-end=\"982\">\n<td data-start=\"916\" data-end=\"938\" data-col-size=\"sm\">Siri Fort (1303 AD)</td>\n<td data-start=\"938\" data-end=\"982\" data-col-size=\"md\">New capital city established by Alauddin</td>\n</tr>\n<tr data-start=\"983\" data-end=\"1071\">\n<td data-start=\"983\" data-end=\"1005\" data-col-size=\"sm\">Jamait Khana Mosque</td>\n<td data-start=\"1005\" data-end=\"1071\" data-col-size=\"md\">Built near the shrine of <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Nizamuddin Auliya</span></td>\n</tr>\n<tr data-start=\"1072\" data-end=\"1131\">\n<td data-start=\"1072\" data-end=\"1084\" data-col-size=\"sm\">Hauz Khas</td>\n<td data-start=\"1084\" data-end=\"1131\" data-col-size=\"md\">Famous water reservoir and complex in Delhi</td>\n</tr>\n<tr data-start=\"1132\" data-end=\"1214\">\n<td data-start=\"1132\" data-end=\"1145\" data-col-size=\"sm\">Alai Minar</td>\n<td data-start=\"1145\" data-end=\"1214\" data-col-size=\"md\">Unfinished minaret planned to be double the height of Qutub Minar</td>\n</tr>\n<tr data-start=\"1215\" data-end=\"1263\">\n<td data-start=\"1215\" data-end=\"1229\" data-col-size=\"sm\">Hazar Sutun</td>\n<td data-start=\"1229\" data-end=\"1263\" data-col-size=\"md\">Palace of one thousand pillars</td>\n</tr>\n<tr data-start=\"1264\" data-end=\"1388\">\n<td data-start=\"1264\" data-end=\"1278\" data-col-size=\"sm\">Other Works</td>\n<td data-start=\"1278\" data-end=\"1349\" data-col-size=\"md\">Added entrance gate to Qutub Minar and built a mosque at Rameshwaram</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1390\" data-end=\"1393\" />\n<h1 data-section-id=\"n2yamb\" data-start=\"1395\" data-end=\"1458\">SUCCESSORS &amp; END OF KHILJI DYNASTY &mdash; TABULAR CRUX CHEAT SHEET</h1>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1460\" data-end=\"2060\" data-is-last-node=\"\" data-is-only-node=\"\">\n<thead data-start=\"1460\" data-end=\"1491\">\n<tr data-start=\"1460\" data-end=\"1491\">\n<th class=\"last:pe-10\" data-start=\"1460\" data-end=\"1468\" data-col-size=\"sm\">Ruler</th>\n<th class=\"last:pe-10\" data-start=\"1468\" data-end=\"1477\" data-col-size=\"sm\">Period</th>\n<th class=\"last:pe-10\" data-start=\"1477\" data-end=\"1491\" data-col-size=\"lg\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1506\" data-end=\"2060\" data-is-last-node=\"\">\n<tr data-start=\"1506\" data-end=\"1634\">\n<td data-start=\"1506\" data-end=\"1525\" data-col-size=\"sm\">Shihabuddin Umar</td>\n<td data-start=\"1525\" data-end=\"1535\" data-col-size=\"sm\">1316 AD</td>\n<td data-start=\"1535\" data-end=\"1634\" data-col-size=\"lg\">Minor son of Alauddin; Malik Kafur controlled administration; Malik Kafur killed within 35 days</td>\n</tr>\n<tr data-start=\"1635\" data-end=\"1795\">\n<td data-start=\"1635\" data-end=\"1668\" data-col-size=\"sm\">Qutubuddin Mubarak Shah Khilji</td>\n<td data-start=\"1668\" data-end=\     "question": "<p data-start=\"4614\" data-end=\"4756\"><strong data-start=\"4614\" data-end=\"4754\">&nbsp;Later Tughlaqs and Timur&rsquo;s Invasion / उत्तरकालीन तुगलक शासकों एवं तैमूर के आक्रमण के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"4758\" data-end=\"5606\">\n<li data-section-id=\"1r3bit5\" data-start=\"4758\" data-end=\"4894\">Nasiruddin Mahmud Shah Tughlaq was the last ruler of the Tughlaq Dynasty. / नासिरुद्दीन महमूद शाह तुगलक तुगलक वंश का अंतिम शासक था।</li>\n<li data-section-id=\"1vvozj0\" data-start=\"4896\" data-end=\"5099\">Timur invaded India in 1398 AD and captured Delhi after devastating many towns on the way. / तैमूर ने 1398 ई. में भारत पर आक्रमण किया तथा मार्ग में अनेक नगरों को नष्ट करते हुए दिल्ली पर अधिकार किया।</li>\n<li data-section-id=\"dbruaj\" data-start=\"5101\" data-end=\"5262\">Sultan Mahmud Shah and his Wazir fled from Delhi during Timur&rsquo;s invasion. / तैमूर के आक्रमण के समय सुल्तान महमूद शाह एवं उसका वज़ीर दिल्ली छोड़कर भाग गए थे।</li>\n<li data-section-id=\"g37zyu\" data-start=\"5264\" data-end=\"5410\">Timur carried Indian artisans to Samarkand for construction activities. / तैमूर भारतीय कारीगरों को समरकंद निर्माण कार्य हेतु अपने साथ ले गया।</li>\n<li data-section-id=\"1ji952g\" data-start=\"5412\" data-end=\"5606\">Before leaving India, Timur appointed Khizr Khan as governor of Multan, Lahore and Dipalpur. / भारत छोड़ने से पूर्व तैमूर ने खिज्र खान को मुल्तान, लाहौर एवं दीपालपुर का गवर्नर नियुक्त किया।</li>\n</ol>\n<p data-start=\"5608\" data-end=\"5695\"><strong data-start=\"5608\" data-end=\"5693\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"5697\" data-end=\"5856\">A. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"5738\" data-end=\"5741\" />B. 1, 3 and 5 only / केवल 1, 3 और 5<br data-start=\"5776\" data-end=\"5779\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"5814\" data-end=\"5817\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>\n<p data-start=\"5858\" data-end=\"5895\"></p>",

    "question": "<p data-start=\"1391\" data-end=\"1509\"><strong data-start=\"1391\" data-end=\"1507\">Lodi Dynasty and Sikandar Lodi / लोदी वंश एवं सिकंदर लोदी के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"1511\" data-end=\"2356\">\n<li data-section-id=\"1othhj8\" data-start=\"1511\" data-end=\"1688\">The Lodi Dynasty was the last ruling dynasty of the Delhi Sultanate and the first Afghan dynasty of Delhi. / लोदी वंश दिल्ली सल्तनत का अंतिम शासक वंश एवं पहला अफगान वंश था।</li>\n<li data-section-id=\"1rdkz74\" data-start=\"1690\" data-end=\"1879\">Bahlol Lodi treated Afghan nobles as equal partners and sat with them on carpets instead of a throne. / बहलोल लोदी अफगान अमीरों को समान भागीदार मानता था तथा उनके साथ कालीन पर बैठता था।</li>\n<li data-section-id=\"1tn5jrk\" data-start=\"1881\" data-end=\"2058\">Sikandar Lodi founded Agra in 1504 AD and shifted the capital there in 1506 AD. / सिकंदर लोदी ने 1504 ई. में आगरा की स्थापना की तथा 1506 ई. में राजधानी वहां स्थानांतरित की।</li>\n<li data-section-id=\"2e3atd\" data-start=\"2060\" data-end=\"2228\">Sikandar Lodi abolished Jaziya and adopted a policy of complete religious tolerance. / सिकंदर लोदी ने जज़िया समाप्त किया तथा पूर्ण धार्मिक सहिष्णुता की नीति अपनाई।</li>\n<li data-section-id=\"w2v6z2\" data-start=\"2230\" data-end=\"2356\">Sikandar Lodi wrote Persian poetry under the pen name &ldquo;Gulrukhi.&rdquo; / सिकंदर लोदी &lsquo;गुलरुखी&rsquo; उपनाम से फ़ारसी कविता लिखता था।</li>\n</ol>\n<p data-start=\"2358\" data-end=\"2445\"><strong data-start=\"2358\" data-end=\"2443\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p data-start=\"2447\" data-end=\"2610\">A. 1, 2 and 4 only / केवल 1, 2 और 4<br data-start=\"2482\" data-end=\"2485\" />B. 1, 2, 3 and 5 only / केवल 1, 2, 3 और 5<br data-start=\"2526\" data-end=\"2529\" />C. 2, 3, 4 and 5 only / केवल 2, 3, 4 और 5<br data-start=\"2570\" data-end=\"2573\" />D. 1, 3 and 5 only / केवल 1, 3 और 5</p>\n<p data-start=\"2612\" data-end=\"2649\"></p>",

    "question": "<p data-start=\"2917\" data-end=\"3058\"><strong data-start=\"2917\" data-end=\"3056\">Ibrahim Lodi and End of Delhi Sultanate / इब्राहिम लोदी एवं दिल्ली सल्तनत के पतन के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"3060\" data-end=\"3979\">\n<li data-section-id=\"yyl699\" data-start=\"3060\" data-end=\"3172\">Ibrahim Lodi was the last Sultan of the Delhi Sultanate. / इब्राहिम लोदी दिल्ली सल्तनत का अंतिम सुल्तान था।</li>\n<li data-section-id=\"jh2oqu\" data-start=\"3174\" data-end=\"3324\">Ibrahim Lodi was defeated by Rana Sanga in the Battle of Khatoli (1518 AD). / इब्राहिम लोदी 1518 ई. के खातोली युद्ध में राणा सांगा से पराजित हुआ।</li>\n<li data-section-id=\"1op6r0g\" data-start=\"3326\" data-end=\"3508\">Daulat Khan Lodi and Rana Sanga invited Babur to invade India against Ibrahim Lodi. / दौलत खान लोदी एवं राणा सांगा ने इब्राहिम लोदी के विरुद्ध बाबर को भारत आने का निमंत्रण दिया।</li>\n<li data-section-id=\"10z0qx0\" data-start=\"3510\" data-end=\"3736\">In the First Battle of Panipat (1526 AD), Ibrahim Lodi became the first Sultan of Delhi to die on the battlefield. / 1526 ई. के प्रथम पानीपत युद्ध में इब्राहिम लोदी युद्धभूमि में मारा जाने वाला दिल्ली का पहला सुल्तान बना।</li>\n<li data-section-id=\"1yqfcfn\" data-start=\"3738\" data-end=\"3979\">The First Battle of Panipat marked the first major use of gunpowder in Indian warfare and ended the Delhi Sultanate. / प्रथम पानीपत युद्ध में भारतीय युद्धों में पहली बार बारूद का प्रमुख उपयोग हुआ तथा इसी के साथ दिल्ली सल्तनत का अंत हुआ।</li>\n</ol>\n<p data-start=\"3981\" data-end=\"4068\"><strong data-start=\"3981\" data-end=\"4066\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p></p>\n<p data-start=\"4070\" data-end=\"4229\">A. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"4111\" data-end=\"4114\" />B. 1, 3 and 5 only / केवल 1, 3 और 5<br data-start=\"4149\" data-end=\"4152\" />C. 2, 4 and 5 only / केवल 2, 4 और 5<br data-start=\"4187\" data-end=\"4190\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>",

    "solution": "<h1 data-section-id=\"n3x51b\" data-start=\"0\" data-end=\"50\">SAYYID DYNASTY (1414&ndash;1451 AD) &mdash; CRUX CHEAT SHEET</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"52\" data-end=\"306\">\n<thead data-start=\"52\" data-end=\"74\">\n<tr data-start=\"52\" data-end=\"74\">\n<th class=\"last:pe-10\" data-start=\"52\" data-end=\"60\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"60\" data-end=\"74\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"85\" data-end=\"306\">\n<tr data-start=\"85\" data-end=\"134\">\n<td data-start=\"85\" data-end=\"93\" data-col-size=\"sm\">Order</td>\n<td data-start=\"93\" data-end=\"134\" data-col-size=\"md\">Fourth dynasty of the Delhi Sultanate</td>\n</tr>\n<tr data-start=\"135\" data-end=\"184\">\n<td data-start=\"135\" data-end=\"143\" data-col-size=\"sm\">Claim</td>\n<td data-col-size=\"md\" data-start=\"143\" data-end=\"184\">Claimed descent from Prophet Muhammad</td>\n</tr>\n<tr data-start=\"185\" data-end=\"253\">\n<td data-start=\"185\" data-end=\"202\" data-col-size=\"sm\">Identification</td>\n<td data-col-size=\"md\" data-start=\"202\" data-end=\"253\">Known as <em data-start=\"213\" data-end=\"226\">Kulah-Daran</em> (Wearers of pointed cap)</td>\n</tr>\n<tr data-start=\"254\" data-end=\"306\">\n<td data-start=\"254\" data-end=\"264\" data-col-size=\"sm\">Founder</td>\n<td data-start=\"264\" data-end=\"306\" data-col-size=\"md\"><span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Khizr Khan</span></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"308\" data-end=\"311\" />\n<h1 data-section-id=\"111z45h\" data-start=\"313\" data-end=\"359\">KHIZR KHAN (1414&ndash;1421 AD) &mdash; CRUX CHEAT SHEET</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"361\" data-end=\"900\">\n<thead data-start=\"361\" data-end=\"383\">\n<tr data-start=\"361\" data-end=\"383\">\n<th class=\"last:pe-10\" data-start=\"361\" data-end=\"369\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"369\" data-end=\"383\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"394\" data-end=\"900\">\n<tr data-start=\"394\" data-end=\"438\">\n<td data-start=\"394\" data-end=\"404\" data-col-size=\"sm\">Founder</td>\n<td data-start=\"404\" data-end=\"438\" data-col-size=\"md\">Established the Sayyid Dynasty</td>\n</tr>\n<tr data-start=\"439\" data-end=\"531\">\n<td data-start=\"439\" data-end=\"453\" data-col-size=\"sm\">Appointment</td>\n<td data-col-size=\"md\" data-start=\"453\" data-end=\"531\">Appointed ruler of Multan by <span class=\"hover:entity-accent entity-underline inline cursor-pointer align-baseline\">Timur</span> in 1398</td>\n</tr>\n<tr data-start=\"532\" data-end=\"587\">\n<td data-start=\"532\" data-end=\"544\" data-col-size=\"sm\">Accession</td>\n<td data-col-size=\"md\" data-start=\"544\" data-end=\"587\">Defeated Daulat Khan and occupied Delhi</td>\n</tr>\n<tr data-start=\"588\" data-end=\"650\">\n<td data-start=\"588\" data-end=\"596\" data-col-size=\"sm\">Title</td>\n<td data-col-size=\"md\" data-start=\"596\" data-end=\"650\">Used the title <em data-start=\"613\" data-end=\"623\">Raya-Ala</em>; did not assume &ldquo;Sultan&rdquo;</td>\n</tr>\n<tr data-start=\"651\" data-end=\"704\">\n<td data-start=\"651\" data-end=\"659\" data-col-size=\"sm\">Coins</td>\n<td data-col-size=\"md\" data-start=\"659\" data-end=\"704\">Issued coins in the name of Shahrukh Khan</td>\n</tr>\n<tr data-start=\"705\" data-end=\"776\">\n<td data-start=\"705\" data-end=\"723\" data-col-size=\"sm\">Main Challenges</td>\n<td data-col-size=\"md\" data-start=\"723\" data-end=\"776\">Suppressed revolts in Kateher, Badaun, and Etawah</td>\n</tr>\n<tr data-start=\"777\" data-end=\"827\">\n<td data-start=\"777\" data-end=\"790\" data-col-size=\"sm\">Competence</td>\n<td data-start=\"790\" data-end=\"827\" data-col-size=\"md\">Most capable ruler of the dynasty</td>\n</tr>\n<tr data-start=\"828\" data-end=\"900\">\n<td data-start=\"828\" data-end=\"840\" data-col-size=\"sm\">Historian</td>\n<td data-start=\"840\" data-end=\"900\" data-col-size=\"md\">Yahya bin Ahmad Sirhindi wrote <em data-start=\"873\" data-end=\"897\">Tarikh-i-Mubarak Shahi</em></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"902\" data-end=\"905\" />\n<h1 data-section-id=\"1jj1un8\" data-start=\"907\" data-end=\"947\">LATER SAYYID RULERS &mdash; CRUX CHEAT SHEET</h1>\n<h2 data-section-id=\"93wenb\" data-start=\"949\" data-end=\"979\">MUBARAK SHAH (1421&ndash;1434 AD)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"981\" data-end=\"1344\">\n<thead data-start=\"981\" data-end=\"1003\">\n<tr data-start=\"981\" data-end=\"1003\">\n<th class=\"last:pe-10\" data-start=\"981\" data-end=\"989\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"989\" data-end=\"1003\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"1014\" data-end=\"1344\">\n<tr data-start=\"1014\" data-end=\"1050\">\n<td data-start=\"1014\" data-end=\"1022\" data-col-size=\"sm\">Title</td>\n<td data-col-size=\"md\" data-start=\"1022\" data-end=\"1050\">Adopted the title &ldquo;Shah&rdquo;</td>\n</tr>\n<tr data-start=\"1051\" data-end=\"1104\">\n<td data-start=\"1051\" data-end=\"1059\" data-col-size=\"sm\">Coins</td>\n<td data-col-size=\"md\" data-start=\"1059\" data-end=\"1104\">Issued coins with <em data-start=\"1079\" data-end=\"1102\">Naybe-Amirul Momineen</em></td>\n</tr>\n<tr data-start=\"1105\" data-end=\"1154\">\n<td data-start=\"1105\" da     "question": "<p data-start=\"0\" data-end=\"166\"><strong data-start=\"0\" data-end=\"164\">Society, Architecture and Music during the Delhi Sultanate / दिल्ली सल्तनत कालीन समाज, स्थापत्य एवं संगीत के संबंध में निम्नलिखित statements पर विचार कीजिए:</strong></p>\n<ol data-start=\"168\" data-end=\"1187\">\n<li data-section-id=\"hlm1t8\" data-start=\"168\" data-end=\"405\">Delhi Sultanate architecture marked the emergence of Indo-Islamic architecture combining Indian and Persian-Islamic elements. / दिल्ली सल्तनत काल में भारतीय एवं फ़ारसी-इस्लामी तत्वों के मिश्रण से इंडो-इस्लामिक स्थापत्य का विकास हुआ।</li>\n<li data-section-id=\"1f5wymw\" data-start=\"407\" data-end=\"582\">The Tomb of Balban is regarded as the first monument in India to feature a true arch. / बलबन का मकबरा भारत में प्रथम वास्तविक मेहराब (True Arch) वाला स्मारक माना जाता है।</li>\n<li data-section-id=\"1s8dkiv\" data-start=\"584\" data-end=\"749\">Alai Darwaza is considered the first structure in India to feature a true dome. / अलाई दरवाजा भारत में प्रथम वास्तविक गुंबद (True Dome) वाली इमारत मानी जाती है।</li>\n<li data-section-id=\"n7l7mu\" data-start=\"751\" data-end=\"992\">Amir Khusrau, known as &ldquo;Tu-i-Hind,&rdquo; is credited with inventing the Tabla and Sitar and popularizing Qawwali. / अमीर खुसरो, जिन्हें &ldquo;तूत-ए-हिंद&rdquo; कहा जाता है, को तबला एवं सितार के आविष्कार तथा कव्वाली के लोकप्रियकरण का श्रेय दिया जाता है।</li>\n<li data-section-id=\"1r9m50l\" data-start=\"994\" data-end=\"1187\">Raja Man Singh Tomar of Gwalior is associated with the consolidation of the Dhrupad style of music. / ग्वालियर के राजा मानसिंह तोमर को ध्रुपद शैली के विकास एवं सुदृढ़ीकरण से जोड़ा जाता है।</li>\n</ol>\n<p data-start=\"1189\" data-end=\"1276\"><strong data-start=\"1189\" data-end=\"1274\">Which of the above statements are correct? / उपर्युक्त में से कौन-से कथन सही हैं?</strong></p>\n<p></p>\n<p data-start=\"1278\" data-end=\"1437\">A. 1, 2, 3 and 4 only / केवल 1, 2, 3 और 4<br data-start=\"1319\" data-end=\"1322\" />B. 2, 3 and 5 only / केवल 2, 3 और 5<br data-start=\"1357\" data-end=\"1360\" />C. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5<br data-start=\"1397\" data-end=\"1400\" />D. 1, 3 and 4 only / केवल 1, 3 और 4</p>",

 5<br data-start=\"2681\" data-end=\"2684\" />D. 1, 2, 3, 4 and 5 / 1, 2, 3, 4 और 5</p>",

    "solution": "<p></p>\n<p>Statement 5 is incorrect because&nbsp;<strong data-start=\"4074\" data-end=\"4084\">Kharaj</strong>&nbsp;was mainly imposed on non-Muslims, whereas&nbsp;<strong data-start=\"4128\" data-end=\"4136\">Ushr</strong>&nbsp;was levied on Muslim cultivators.<br data-start=\"4170\" data-end=\"4173\" />/ कथन 5 गलत है क्योंकि&nbsp;<strong data-start=\"4196\" data-end=\"4205\">ख़राज</strong>&nbsp;मुख्यतः गैर-मुस्लिमों पर लगाया जाता था, जबकि&nbsp;<strong data-start=\"4251\" data-end=\"4259\">उश्र</strong>&nbsp;मुस्लिम कृषकों पर लगाया जाता था।</p>\n<p></p>\n<h1 data-section-id=\"dhtfx5\" data-start=\"0\" data-end=\"55\">DELHI SULTANATE: SOCIETY &amp; CULTURE &mdash; CRUX CHEAT SHEET</h1>\n<h2 data-section-id=\"a18188\" data-start=\"57\" data-end=\"71\">Social Life</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"73\" data-end=\"416\">\n<thead data-start=\"73\" data-end=\"95\">\n<tr data-start=\"73\" data-end=\"95\">\n<th class=\"last:pe-10\" data-start=\"73\" data-end=\"81\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"81\" data-end=\"95\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"106\" data-end=\"416\">\n<tr data-start=\"106\" data-end=\"169\">\n<td data-start=\"106\" data-end=\"114\" data-col-size=\"sm\">Women</td>\n<td data-start=\"114\" data-end=\"169\" data-col-size=\"md\">Subordinate position; Sati and Purdah became common</td>\n</tr>\n<tr data-start=\"170\" data-end=\"217\">\n<td data-start=\"170\" data-end=\"186\" data-col-size=\"sm\">Hindu Society</td>\n<td data-start=\"186\" data-end=\"217\" data-col-size=\"md\">Based on rigid caste system</td>\n</tr>\n<tr data-start=\"218\" data-end=\"296\">\n<td data-start=\"218\" data-end=\"235\" data-col-size=\"sm\">Muslim Society</td>\n<td data-start=\"235\" data-end=\"296\" data-col-size=\"md\">Divided into Turks, Iranians, Afghans, and Indian Muslims</td>\n</tr>\n<tr data-start=\"297\" data-end=\"365\">\n<td data-start=\"297\" data-end=\"324\" data-col-size=\"sm\">Religious Discrimination</td>\n<td data-start=\"324\" data-end=\"365\" data-col-size=\"md\">Hindus called <em data-start=\"340\" data-end=\"348\">Zimmis</em> and paid Jizya</td>\n</tr>\n<tr data-start=\"366\" data-end=\"416\">\n<td data-start=\"366\" data-end=\"376\" data-col-size=\"sm\">Slavery</td>\n<td data-start=\"376\" data-end=\"416\" data-col-size=\"md\">Male and female slaves openly traded</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"418\" data-end=\"421\" />\n<h1 data-section-id=\"hjurnz\" data-start=\"423\" data-end=\"456\">ARCHITECTURE &mdash; CRUX CHEAT SHEET</h1>\n<h2 data-section-id=\"cc2t3j\" data-start=\"458\" data-end=\"498\">Features of Indo-Islamic Architecture</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"500\" data-end=\"760\">\n<thead data-start=\"500\" data-end=\"522\">\n<tr data-start=\"500\" data-end=\"522\">\n<th class=\"last:pe-10\" data-start=\"500\" data-end=\"508\" data-col-size=\"sm\">Topic</th>\n<th class=\"last:pe-10\" data-start=\"508\" data-end=\"522\" data-col-size=\"md\">Key Points</th>\n</tr>\n</thead>\n<tbody data-start=\"533\" data-end=\"760\">\n<tr data-start=\"533\" data-end=\"594\">\n<td data-start=\"533\" data-end=\"547\" data-col-size=\"sm\">Innovations</td>\n<td data-start=\"547\" data-end=\"594\" data-col-size=\"md\">Arches, Domes, Minarets, Arabic Calligraphy</td>\n</tr>\n<tr data-start=\"595\" data-end=\"656\">\n<td data-start=\"595\" data-end=\"607\" data-col-size=\"sm\">Technique</td>\n<td data-start=\"607\" data-end=\"656\" data-col-size=\"md\">Transition from Slab-Beam to True Arch &amp; Dome</td>\n</tr>\n<tr data-start=\"657\" data-end=\"700\">\n<td data-start=\"657\" data-end=\"668\" data-col-size=\"sm\
