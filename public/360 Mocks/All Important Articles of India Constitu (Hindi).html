    "question": "<p><strong>&nbsp;Which of the following statements is/are correct regarding the Indian Constitution and related cases? / प्रश्न: निम्नलिखित में से कौन सा/से कथन भारतीय संविधान और संबंधित मामलों के बारे में सही है/हैं?</strong></p>\n<ol>\n<li>The <strong>KA Najeeb vs Union of India</strong> case deals with the violation of rights under <strong>Article 21</strong>. / <strong>KA Najeeb बनाम भारत संघ</strong> मामला <strong>अनुच्छेद 21</strong> के तहत अधिकारों के उल्लंघन से संबंधित है।</li>\n<li><strong>Article 79</strong> of the Indian Constitution provides for a bicameral Parliament of India. / भारतीय संविधान का <strong>अनुच्छेद 79</strong> भारत की द्व chambers संसद का प्रावधान करता है।</li>\n<li><strong>Article 79</strong> defines the Constitution of Parliament, while <strong>Article 80</strong> details the composition of the Rajya Sabha, <strong>Article 81</strong> outlines the composition of the Lok Sabha, and <strong>Article 83</strong> describes the duration of the Houses of Parliament. / <strong>अनुच्छेद 79</strong> संसद के संविधान को परिभाषित करता है, जबकि <strong>अनुच्छेद 80</strong> राज्य सभा की संरचना का विवरण देता है, <strong>अनुच्छेद 81</strong> लोक सभा की संरचना को निर्धारित करता है, और <strong>अनुच्छेद 83</strong> संसद के सदनों की अवधि का वर्णन करता है।</li>\n<li>As per <strong>Article 172 (2)</strong>, the Legislative Council (Saasana Mandali) of a State shall NOT be subject to dissolution. / <strong>अनुच्छेद 172 (2)</strong> के अनुसार, एक राज्य की विधान परिषद (सासना मंडली) को भंग नहीं किया जाएगा।</li>\n</ol>\n<p><strong>Select the correct answer: / सही उत्तर का चयन करें:</strong></p>",

    "solution": "<p><strong>Legislative Council (Saasana Mandali)</strong>: It is the upper house in those states of India that have a bicameral state legislature. Six States have a Legislative Council: <strong>Andhra Pradesh, Telangana, Uttar Pradesh, Bihar, Maharashtra, Karnataka</strong>.</p>\n<p><strong>राज्य परिषद (सासना मंडली)</strong>: यह भारत के उन राज्यों में उच्च सदन है जिनके पास द्व chambersीय राज्य विधानमंडल है। छह राज्यों में राज्य परिषद है: <strong>आंध्र प्रदेश, तेलंगाना, उत्तर प्रदेश, बिहार, महाराष्ट्र, कर्नाटका</strong>।</p>\n<hr />\n<p><strong>State Legislative Assembly (Vidhan Sabha)</strong>: A legislative body in the states and union territories of India.</p>\n<p><strong>राज्य विधान सभा (विदान सभा)</strong>: भारत के राज्यों और संघ क्षेत्रों में एक विधायी निकाय है।</p>\n<hr />\n<p><strong>Council of States (Rajya Sabha)</strong>: The upper house of the Parliament of India.</p>\n<p><strong>राज्य सभा (काउंसिल ऑफ स्टेट्स)</strong>: भारत की संसद का उच्च सदन।</p>\n<hr />\n<p><strong>House of People (Lok Sabha)</strong>: The lower house of the Parliament of India.</p>\n<p><strong>लोक सभा (हाउस ऑफ पीपल्स)</strong>: भारत की संसद का निचला सदन।</p>\n<hr />\n<p><strong>Article 21</strong>: Protection of life and personal liberty.</p>\n<p><strong>अनुच्छेद 21</strong>: जीवन और व्यक्तिगत स्वतंत्रता का संरक्षण।</p>\n<hr />\n<p><strong>Important Cases related to Article 21</strong>:</p>\n<ol>\n<li>\n<p><strong>A.K. Gopalan vs. the State of Madras, 1950</strong>: The Supreme Court took a narrow interpretation of Article 21 in this case.</p>\n<p><strong>महत्वपूर्ण मामले जो अनुच्छेद 21 से संबंधित हैं</strong>:</p>\n<ol>\n<li><strong>A.K. गोपालन बनाम मद्रास राज्य, 1950</strong>: इस मामले में सर्वोच्च न्यायालय ने अनुच्छेद 21 का संकीर्ण अर्थ निकाला।</li>\n</ol>\n</li>\n<li>\n<p><strong>Maneka Gandhi vs. Union of India, 1978</strong>: In this case, the Supreme Court overruled its judgement from the Gopalan Case by taking a wider interpretation of Article 21.</p>\n<ol start=\"2\">\n<li><strong>मेनका गांधी बनाम भारत संघ, 1978</strong>: इस मामले में, सर्वोच्च न्यायालय ने गोपालन मामले के अपने निर्णय को पलटा और अनुच्छेद 21 का व्यापक अर्थ निकाला।</li>\n</ol>\n</li>\n</ol>",
