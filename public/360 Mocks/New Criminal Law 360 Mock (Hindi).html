    "solution": "<h3 data-start=\"205\" data-end=\"262\"><strong data-start=\"209\" data-end=\"262\">New Offences Introduced (Tabular &ndash; High Yield)</strong></h3>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"264\" data-end=\"1951\">\n<thead data-start=\"264\" data-end=\"399\">\n<tr data-start=\"264\" data-end=\"399\">\n<th data-start=\"264\" data-end=\"274\" data-col-size=\"sm\">Sr. No.</th>\n<th data-start=\"274\" data-end=\"292\" data-col-size=\"sm\"><strong data-start=\"276\" data-end=\"291\">BNS Section</strong></th>\n<th data-start=\"292\" data-end=\"329\" data-col-size=\"sm\"><strong data-start=\"294\" data-end=\"328\">New Offence (English &ndash; Simple)</strong></th>\n<th data-start=\"329\" data-end=\"359\" data-col-size=\"md\"><strong data-start=\"331\" data-end=\"358\">नया अपराध (हिंदी &ndash; सरल)</strong></th>\n<th data-start=\"359\" data-end=\"399\" data-col-size=\"md\"><strong data-start=\"361\" data-end=\"397\">Key Feature / Impact (Exam Line)</strong></th>\n</tr>\n</thead>\n<tbody data-start=\"422\" data-end=\"1951\">\n<tr data-start=\"422\" data-end=\"555\">\n<td data-start=\"422\" data-end=\"426\" data-col-size=\"sm\">1</td>\n<td data-start=\"426\" data-end=\"439\" data-col-size=\"sm\"><strong data-start=\"428\" data-end=\"438\">Sec 48</strong></td>\n<td data-start=\"439\" data-end=\"464\" data-col-size=\"sm\">Extraterritorial Crime</td>\n<td data-start=\"464\" data-end=\"508\" data-col-size=\"md\">विदेश से भारत में अपराध करवाने में सहायता</td>\n<td data-start=\"508\" data-end=\"555\" data-col-size=\"md\">Expands India&rsquo;s jurisdiction beyond borders</td>\n</tr>\n<tr data-start=\"556\" data-end=\"692\">\n<td data-start=\"556\" data-end=\"560\" data-col-size=\"sm\">2</td>\n<td data-start=\"560\" data-end=\"573\" data-col-size=\"sm\"><strong data-start=\"562\" data-end=\"572\">Sec 69</strong></td>\n<td data-start=\"573\" data-end=\"592\" data-col-size=\"sm\">Sex by Deception</td>\n<td data-start=\"592\" data-end=\"650\" data-col-size=\"md\">छल से यौन संबंध (शादी/नौकरी का झूठा वादा, पहचान छुपाना)</td>\n<td data-col-size=\"md\" data-start=\"650\" data-end=\"692\">Sexual acts via deceit made punishable</td>\n</tr>\n<tr data-start=\"693\" data-end=\"821\">\n<td data-start=\"693\" data-end=\"697\" data-col-size=\"sm\">3</td>\n<td data-start=\"697\" data-end=\"713\" data-col-size=\"sm\"><strong data-start=\"699\" data-end=\"712\">Sec 70(B)</strong></td>\n<td data-start=\"713\" data-end=\"743\" data-col-size=\"sm\">Aggravated Group Rape (&lt;18)</td>\n<td data-col-size=\"md\" data-start=\"743\" data-end=\"783\">नाबालिग (&lt;18) के साथ सामूहिक बलात्कार</td>\n<td data-col-size=\"md\" data-start=\"783\" data-end=\"821\"><strong data-start=\"785\" data-end=\"819\">Life till natural life / Death</strong></td>\n</tr>\n<tr data-start=\"822\" data-end=\"943\">\n<td data-start=\"822\" data-end=\"826\" data-col-size=\"sm\">4</td>\n<td data-start=\"826\" data-end=\"839\" data-col-size=\"sm\"><strong data-start=\"828\" data-end=\"838\">Sec 93</strong></td>\n<td data-start=\"839\" data-end=\"871\" data-col-size=\"sm\">Forcing Child to Commit Crime</td>\n<td data-start=\"871\" data-end=\"895\" data-col-size=\"md\">बच्चे से अपराध करवाना</td>\n<td data-col-size=\"md\" data-start=\"895\" data-end=\"943\">Protects children from criminal exploitation</td>\n</tr>\n<tr data-start=\"944\" data-end=\"1048\">\n<td data-start=\"944\" data-end=\"948\" data-col-size=\"sm\">5</td>\n<td data-start=\"948\" data-end=\"965\" data-col-size=\"sm\"><strong data-start=\"950\" data-end=\"964\">Sec 103(2)</strong></td>\n<td data-start=\"965\" data-end=\"980\" data-col-size=\"sm\">Mob Lynching</td>\n<td data-start=\"980\" data-end=\"1014\" data-col-size=\"md\">5+ लोगों द्वारा हत्या/गंभीर चोट</td>\n<td data-start=\"1014\" data-end=\"1048\" data-col-size=\"md\">Separate, highly penal offence</td>\n</tr>\n<tr data-start=\"1049\" data-end=\"1184\">\n<td data-start=\"1049\" data-end=\"1053\" data-col-size=\"sm\">6</td>\n<td data-start=\"1053\" data-end=\"1070\" data-col-size=\"sm\"><strong data-start=\"1055\" data-end=\"1069\">Sec 104(2)</strong></td>\n<td data-start=\"1070\" data-end=\"1096\" data-col-size=\"sm\">Failure to Report Death</td>\n<td data-start=\"1096\" data-end=\"1137\" data-col-size=\"md\">लापरवाही से हुई मृत्यु की सूचना न देना</td>\n<td data-col-size=\"md\" data-start=\"1137\" data-end=\"1184\">Hit-and-run type non-reporting criminalised</td>\n</tr>\n<tr data-start=\"1185\" data-end=\"1293\">\n<td data-start=\"1185\" data-end=\"1189\" data-col-size=\"sm\">7</td>\n<td data-start=\"1189\" data-end=\"1203\" data-col-size=\"sm\"><strong data-start=\"1191\" data-end=\"1202\">Sec 111</strong></td>\n<td data-start=\"1203\" data-end=\"1221\" data-col-size=\"sm\">Organised Crime</td>\n<td data-start=\"1221\" data-end=\"1249\" data-col-size=\"md\">संगठित गिरोह द्वारा अपराध</td>\n<td data-start=\"1249\" data-end=\"1293\" data-col-size=\"md\">Covers extortion, kidnapping, cybercrime</td>\n</tr>\n<tr data-start=\"1294\" data-end=\"1405\">\n<td data-start=\"1294\" data-end=\"1298\" data-col-size=\"sm\">8</td>\n<td data-start=\"1298\" data-end=\"1312\" data-col-size=\"sm\"><strong data-start=\"1300\" data-end=\"1311\">Sec 110</strong></td>\n<td data-start=\"1312\" data-end=\"1336\" data-col-size=\"sm\">Petty Organised Crime</td>\n<td data-start=\"1336\" data-end=\"1364\" data-col-size=\"md\">बार-बार छोटे संगठित अपराध</td>\n<td data-start=\"1364\" data-end=\"1405\" data-col-size=\"md\">Targets chronic public-order offences</td>\n</tr>\n<tr data-start=\"1406\" data-end=\"1502\">\n<td data-start=\"1406\" data-end=\"1410\" data-col-size=\"sm\">9</td>\n<td data-col-size=\"sm\" data-start=\"1410\" data-end=\"1424\"><strong data-start=\"1412\" data-end=\"1423\">Sec 113</strong></td>\n<td data-col-size=\"sm\" data-start=\"1424\" data-end=\"1441\">Terrorist Acts</td>\n<td data-col-size=\"md\" data-start=\"1441\" data-end=\"1458\">आतंकवादी कृत्य</td>\n<td data-col-size=\"md\" data-start=\"1458\" data-end=\"1502\">Unified definition for national security</td>\n</tr>\n<tr data-start=\"1503\" data-end=\"1626\">\n<td data-start=\"1503\" data-end=\"1507\" data-col-size=\"sm\">10</td>\n<td data-start=\"1507\" data-end=\"1524\" data-col-size=\"sm\"><strong data-start=\"1509\" data-end=\"1523\">Sec 115(3)</strong></td>\n<td data-col-size=\"sm\" data-start=\"1524\" data-end=\"1547\">Permanent Disability</td>\n<td data-col-size=\"md\" data-start=\"1547\" data-end=\"1582\">स्थायी अपंगता/ब्रेन डेथ पहुँचाना</td>\n<td data-col-size=\"md\" data-start=\"1582\" data-end=\"1626\">Separate provision for irreversible harm</td>\n</tr>\n<tr data-start=\"1627\" data-end=\"1729\">\n<td data-start=\"1627\" data-end=\"1631\" data-col-size=\"sm\">11</td>\n<td data-start=\"1631\" data-end=\"1645\" data-col-size=\"sm\"><strong data-start=\"1633\" data-end=\"1644\">Sec 150</strong></td>\n<td data-start=\"1645\" data-end=\"1670\" data-col-size=\"sm\">Acts Endangering Unity</td>\n<td data-col-size=\"md\" data-start=\"1670\" data-end=\"1693\">भारत की एकता को खतरा</td>\n<td data-col-size=\"md\" data-start=\"1693\" data-end=\"1729\"><strong data-start=\"1695\" data-end=\"1727\">Replaces Sedition (IPC 124A)</strong></td>\n</tr>\n<tr data-start=\"1730\" data-end=\"1848\">\n<td data-start=\"1730\" data-end=\"1734\" data-col-size=\"sm\">12</td>\n<td data-start=\"1734\" data-end=\"1748\" data-col-size=\"sm\"><strong data-start=\"1736\" data-end=\"1747\">Sec 224</strong></td>\n<td data-start=\"1748\" data-end=\"1772\" data-col-size=\"sm\">Suicide to Pressurise</td>\n<td data-start=\"1772\" data-end=\"1810\" data-col-size=\"md\">दबाव बनाने हेतु आत्महत्या का प्रयास</td>\n<td data-start=\"1810\" data-end=\"1848\" data-col-size=\"md\">Punishment &rarr; <strong data-start=\"1825\" data-end=\"1846\">Community Service</strong></td>\n</tr>\n<tr data-start=\"1849\" data-end=\"1951\">\n<td data-start=\"1849\" data-end=\"1853\" data-col-size=\"sm\">13</td>\n<td data-start=\"1853\" data-end=\"1867\" data-col-size=\"sm\"><strong data-start=\"1855\" data-end=\"1866\">Sec 304</strong></td>\n<td data-col-size=\"sm\" data-start=\"1867\" data-end=\"1891\">Snatching (छीना-झपटी)</td>\n<td data-col-size=\"md\" data-start=\"1891\" data-end=\"1914\">बलपूर्वक वस्तु छीनना</td>\n<td data-col-size=\"md\" data-start=\"1914\" data-end=\"1951\">Now a distinct offence&nbsp;</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

  {
    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Q. With reference to the offences against the state and public order in BNS 2023, consider the following statements:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"117\">(BNS 2023 में राज्य और सार्वजनिक व्यवस्था के खिलाफ अपराधों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Sec 113 (Terrorist Acts):</strong> It provides a new, comprehensive definition for acts harming India's unity and security, replacing segmented older laws. <em data-path-to-node=\"13,0,0\" data-index-in-node=\"147\">(<strong data-path-to-node=\"13,0,0\" data-index-in-node=\"148\">धारा 113 (आतंकवादी कृत्य):</strong> यह भारत की एकता और सुरक्षा को नुकसान पहुँचाने वाले कृत्यों के लिए एक नई परिभाषा प्रदान करता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Sec 150 (Acts Endangering Unity):</strong> This section replaces the colonial offence of <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"80\">Sedition (IPC 124A)</strong> with a focus on national security. <em data-path-to-node=\"13,1,0\" data-index-in-node=\"135\">(<strong data-path-to-node=\"13,1,0\" data-index-in-node=\"136\">धारा 150 (एकता को खतरे में डालने वाले कृत्य):</strong> यह धारा औपनिवेशिक <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"200\">राजद्रोह (IPC 124A)</strong> के स्थान पर राष्ट्रीय सुरक्षा पर केंद्रित प्रावधान लाती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Sec 224 (Attempted Suicide to Pressurize):</strong> Attempting suicide to compel public officials is now punished with the new penalty of <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"129\">Community Service</strong>. <em data-path-to-node=\"13,2,0\" data-index-in-node=\"148\">(<strong data-path-to-node=\"13,2,0\" data-index-in-node=\"149\">धारा 224 (दबाव बनाने के लिए आत्महत्या का प्रयास):</strong> सार्वजनिक अधिकारियों को मजबूर करने के लिए आत्महत्या के प्रयास को अब <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"267\">सामुदायिक सेवा</strong> के नए दंड से दंडित किया जाता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Sec 104(2):</strong> Specifically penalizes a person who causes death by negligence (hit-and-run) but <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"93\">fails to report</strong> the matter to the police. <em data-path-to-node=\"13,3,0\" data-index-in-node=\"135\">(<strong data-path-to-node=\"13,3,0\" data-index-in-node=\"136\">धारा 104(2):</strong> विशेष रूप से उस व्यक्ति को दंडित करती है जो लापरवाही से मृत्यु का कारण बनता है लेकिन पुलिस को मामले की <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"252\">सूचना देने में विफल</strong> रहता है।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"15\">\n<li>\n<p data-path-to-node=\"15,0,0\"><strong data-path-to-node=\"15,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"15,1,0\"><strong data-path-to-node=\"15,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"15,2,0\"><strong data-path-to-node=\"15,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"15,3,0\"><strong data-path-to-node=\"15,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">Q. Regarding the protection of children and current legal concerns in BNS 2023, identify the INCORRECT statement:</strong> <strong data-path-to-node=\"20\" data-index-in-node=\"114\">(BNS 2023 में बच्चों के संरक्षण और वर्तमान कानूनी चिंताओं के संबंध में, गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"21\">\n<li>\n<p data-path-to-node=\"21,0,0\"><strong data-path-to-node=\"21,0,0\" data-index-in-node=\"0\">A) Sec 70(B):</strong> Provides the strictest punishment (Death or Life Imprisonment) for Group Rape against a girl under 18 years of age. <em data-path-to-node=\"21,0,0\" data-index-in-node=\"130\">(<strong data-path-to-node=\"21,0,0\" data-index-in-node=\"131\">धारा 70(B):</strong> 18 वर्ष से कम उम्र की लड़की के साथ सामूहिक बलात्कार के लिए कठोरतम दंड (मृत्यु या आजीवन कारावास) प्रदान करती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"21,1,0\"><strong data-path-to-node=\"21,1,0\" data-index-in-node=\"0\">B) Sec 93:</strong> Criminalizes the act of using or coercing a child to commit a criminal act. <em data-path-to-node=\"21,1,0\" data-index-in-node=\"87\">(<strong data-path-to-node=\"21,1,0\" data-index-in-node=\"88\">धारा 93:</strong> बच्चे का उपयोग करने या उसे आपराधिक कृत्य करने के लिए मजबूर करने को अपराध मानती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"21,2,0\"><strong data-path-to-node=\"21,2,0\" data-index-in-node=\"0\">C) Marital Rape:</strong> The BNS has officially recognized marital rape as a criminal offence to ensure gender neutrality. <em data-path-to-node=\"21,2,0\" data-index-in-node=\"115\">(<strong data-path-to-node=\"21,2,0\" data-index-in-node=\"116\">वैवाहिक बलात्कार:</strong> BNS ने आधिकारिक तौर पर वैवाहिक बलात्कार को एक आपराधिक अपराध के रूप में मान्यता दी है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"21,3,0\"><strong data-path-to-node=\"21,3,0\" data-index-in-node=\"0\">D) Criminal Responsibility:</strong> The age of criminal responsibility in BNS remains low, starting from <strong data-path-to-node=\"21,3,0\" data-index-in-node=\"97\">7 years</strong>. <em data-path-to-node=\"21,3,0\" data-index-in-node=\"106\">(<strong data-path-to-node=\"21,3,0\" data-index-in-node=\"107\">अपराधिक उत्तरदायित्व:</strong> BNS में आपराधिक उत्तरदायित्व की आयु कम बनी हुई है, जो <strong data-path-to-node=\"21,3,0\" data-index-in-node=\"183\">7 वर्ष</strong> से शुरू होती है।)</em></p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">Answer (उत्तर): C</strong></p>\n<p data-path-to-node=\"22\"><strong data-path-to-node=\"23,0\" data-index-in-node=\"0\">Explanation:</strong>&nbsp;Statement C is incorrect. Critics have highlighted that the&nbsp;<strong data-path-to-node=\"23,0\" data-index-in-node=\"73\">BNS still does NOT recognize marital rape</strong>&nbsp;as an offence, which remains a major point of contention. (<strong data-path-to-node=\"23,0\" data-index-in-node=\"174\">व्याख्या:</strong>&nbsp;कथन C गलत है। आलोचकों ने इस बात पर जोर दिया है कि&nbsp;<strong data-path-to-node=\"23,0\" data-index-in-node=\"234\">BNS अभी भी वैवाहिक बलात्कार को अपराध के रूप में मान्यता नहीं देता है</strong>, जो विवाद का एक मुख्य बिंदु बना हुआ है।)</p>\n<h3 data-start=\"1958\" data-end=\"2020\"><strong data-start=\"1962\" data-end=\"2020\">B. Issues &amp; Concerns (Critics&rsquo; View) | विवाद व चिंताएँ</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2022\" data-end=\"2467\">\n<thead data-start=\"2022\" data-end=\"2092\">\n<tr data-start=\"2022\" data-end=\"2092\">\n<th data-start=\"2022\" data-end=\"2044\" data-col-size=\"sm\"><strong data-start=\"2024\" data-end=\"2043\">Issue (English)</strong></th>\n<th data-start=\"2044\" data-end=\"2065\" data-col-size=\"sm\"><strong data-start=\"2046\" data-end=\"2064\">मुद्दा (हिंदी)</strong></th>\n<th data-start=\"2065\" data-end=\"2092\" data-col-size=\"md\"><strong data-start=\"2067\" data-end=\"2090\">Exam-Relevant Point</strong></th>\n</tr>\n</thead>\n<tbody data-start=\"2107\" data-end=\"2467\">\n<tr data-start=\"2107\" data-end=\"2219\">\n<td data-start=\"2107\" data-end=\"2137\" data-col-size=\"sm\">Criminal Responsibility Age</td>\n<td data-start=\"2137\" data-end=\"2162\" data-col-size=\"sm\">आपराधिक दायित्व की आयु</td>\n<td data-col-size=\"md\" data-start=\"2162\" data-end=\"2219\">Starts at <strong data-start=\"2174\" data-end=\"2185\">7 years</strong> (extendable to 12) &ndash; criticised</td>\n</tr>\n<tr data-start=\"2220\" data-end=\"2296\">\n<td data-start=\"2220\" data-end=\"2239\" data-col-size=\"sm\">Child Definition</td>\n<td data-start=\"2239\" data-end=\"2258\" data-col-size=\"sm\">बच्चे की परिभाषा</td>\n<td data-col-size=\"md\" data-start=\"2258\" data-end=\"2296\">Inconsistency (18 / 16 / 12 years)</td>\n</tr>\n<tr data-start=\"2297\" data-end=\"2393\">\n<td data-start=\"2297\" data-end=\"2319\" data-col-size=\"sm\">Old Rape Provisions</td>\n<td data-col-size=\"sm\" data-start=\"2319\" data-end=\"2346\">पुराने बलात्कार प्रावधान</td>\n<td data-col-size=\"md\" data-start=\"2346\" data-end=\"2393\">Justice Verma Committee suggestions ignored</td>\n</tr>\n<tr data-start=\"2394\" data-end=\"2467\">\n<td data-start=\"2394\" data-end=\"2409\" data-col-size=\"sm\">Marital Rape</td>\n<td data-col-size=\"sm\" data-start=\"2409\" data-end=\"2428\">वैवाहिक बलात्कार</td>\n<td data-col-size=\"md\" data-start=\"2428\" data-end=\"2467\"><strong data-start=\"2430\" data-end=\"2465\">Still not recognised as offence</strong></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2469\" data-end=\"2472\" />\n<h3 data-start=\"2474\" data-end=\"2515\"><strong data-start=\"2478\" data-end=\"2515\">C. One-Glance Summary (PYQ Ready)</strong></h3>\n<p data-path-to-node=\"22\"></p>\n<ul data-start=\"2517\" data-end=\"3009\">\n<li data-start=\"2517\" data-end=\"2585\">\n<p data-start=\"2519\" data-end=\"2585\"><strong data-start=\"2519\" data-end=\"2529\">Focus:</strong> Justice over Punishment<br data-start=\"2553\" data-end=\"2556\" /><strong data-start=\"2558\" data-end=\"2567\">फोकस:</strong> दंड नहीं, न्याय</p>\n</li>\n<li data-start=\"2586\" data-end=\"2725\">\n<p data-start=\"2588\" data-end=\"2725\"><strong data-start=\"2588\" data-end=\"2606\">Key Additions:</strong> Organised crime, Mob lynching, Terrorism, Snatching<br data-start=\"2658\" data-end=\"2661\" /><strong data-start=\"2663\" data-end=\"2678\">मुख्य जोड़:</strong> संगठित अपराध, भीड़ हिंसा, आतंकवाद, छीना-झपटी</p>\n</li>\n<li data-start=\"2726\" data-end=\"2814\">\n<p data-start=\"2728\" data-end=\"2814\"><strong data-start=\"2728\" data-end=\"2755\">Reformative Punishment:</strong> Community Service<br data-start=\"2773\" data-end=\"2776\" /><strong data-start=\"2778\" data-end=\"2797\">सुधारात्मक दंड:</strong> सामुदायिक सेवा</p>\n</li>\n<li data-start=\"2815\" data-end=\"2899\">\n<p data-start=\"2817\" data-end=\"2899\"><strong data-start=\"2817\" data-end=\"2830\">Priority:</strong> Women &amp; Child Protection<br data-start=\"2855\" data-end=\"2858\" /><strong data-start=\"2860\" data-end=\"2875\">प्राथमिकता:</strong> महिला एवं बाल संरक्षण</p>\n</li>\n<li data-start=\"2900\" data-end=\"3009\">\n<p data-start=\"2902\" data-end=\"3009\"><strong data-start=\"2902\" data-end=\"2917\">Unresolved:</strong> Marital rape, age inconsistencies<br data-start=\"2951\" data-end=\"2954\" /><strong data-start=\"2956\" data-end=\"2972\">अभी विवादित:</strong> वैवाहिक बलात्कार, आयु की अस्पष्टता</p>\n</li>\n</ul>",
    "marks": 2.0,
    "section": "NEW CRIMINAL LAW"

    "question": "<p data-path-to-node=\"4\"><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the Bharatiya Nagarik Suraksha Sanhita (BNSS) 2023, consider the following statements regarding investigation procedures:</strong><strong class=\"\" data-path-to-node=\"4\" data-index-in-node=\"143\">(भारतीय नागरिक सुरक्षा संहिता (BNSS) 2023 के संदर्भ में, जांच प्रक्रियाओं के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><span class=\"\">Forensic investigation is now mandatory for all offences punishable with imprisonment of </span><strong class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"89\">7 years or more</strong><span class=\"\">.</span><em class=\"\" data-path-to-node=\"5,0,0\" data-index-in-node=\"106\">(अब <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"110\">7 वर्ष या उससे अधिक</strong> के कारावास से दंडनीय सभी अपराधों के लिए फोरेंसिक जांच अनिवार्य है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><span class=\"\">In cases involving offenses against women or children,</span><span class=\"\"> the investigation must be completed within </span><strong class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"98\">2 months</strong><span class=\"\">.</span><em class=\"\" data-path-to-node=\"5,1,0\" data-index-in-node=\"108\">(महिलाओं या बच्चों के खिलाफ अपराधों के मामलों में, जांच <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"164\">2 महीने</strong> के भीतर पूरी होनी चाहिए।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><span class=\"\">All search and seizure operations must be </span><strong class=\"\" data-path-to-node=\"5,2,0\" data-index-in-node=\"42\">audio-video recorded</strong><span class=\"\">,</span><span class=\"\"> and the chargesheet is considered invalid without this recording.</span><em class=\"\" data-path-to-node=\"5,2,0\" data-index-in-node=\"130\">(सभी तलाशी और जब्ती कार्यों की <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"161\">ऑडियो-वीडियो रिकॉर्डिंग</strong> होनी चाहिए, और इस रिकॉर्डिंग के बिना चार्जशीट को अमान्य माना जाता है।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong class=\"\" data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<p data-path-to-node=\"8\"></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong class=\"\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong><span class=\"\"> 1 and 2 only</span></p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong class=\"\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong><span class=\"\"> 2 and 3 only</span></p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong class=\"\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong><span class=\"\"> 1 and 3 only</span></p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong class=\"\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong><span class=\"\"> All of the above (1,</span><span class=\"\"> 2,</span><span class=\"\"> and 3)</span></p>\n</li>\n</ul>",

      "<p>A</p>",

    "solution": "<h2 data-start=\"0\" data-end=\"56\"><strong data-start=\"3\" data-end=\"54\">BHARATIYA NAGARIK SURAKSHA SANHITA (BNSS), 2023</strong></h2>\n<h2 data-start=\"57\" data-end=\"107\"><strong data-start=\"60\" data-end=\"105\">भारतीय नागरिक सुरक्षा संहिता (BNSS), 2023</strong></h2>\n<p data-start=\"108\" data-end=\"172\"><strong data-start=\"108\" data-end=\"172\">(CrPC, 1973 को प्रतिस्थापित करती है | प्रभावी: 1 जुलाई 2024)</strong></p>\n<hr data-start=\"174\" data-end=\"177\" />\n<h2 data-start=\"179\" data-end=\"230\"><strong data-start=\"182\" data-end=\"230\">1️⃣ Structural Changes | संरचनात्मक परिवर्तन</strong></h2>\n<ul data-start=\"232\" data-end=\"659\">\n<li data-start=\"232\" data-end=\"297\">\n<p data-start=\"234\" data-end=\"297\"><strong data-start=\"234\" data-end=\"247\">Sections:</strong> 531 (CrPC: 484)<br data-start=\"263\" data-end=\"266\" /><strong data-start=\"268\" data-end=\"279\">धाराएँ:</strong> 531 (CrPC: 484)</p>\n</li>\n<li data-start=\"298\" data-end=\"400\">\n<p data-start=\"300\" data-end=\"400\"><strong data-start=\"300\" data-end=\"317\">Digital Mode:</strong> Mandatory electronic process<br data-start=\"346\" data-end=\"349\" /><strong data-start=\"351\" data-end=\"366\">डिजिटल मोड:</strong> इलेक्ट्रॉनिक प्रक्रिया अनिवार्य</p>\n</li>\n<li data-start=\"401\" data-end=\"502\">\n<p data-start=\"403\" data-end=\"502\"><strong data-start=\"403\" data-end=\"431\">Metropolitan Magistrate:</strong> Separate role removed<br data-start=\"453\" data-end=\"456\" /><strong data-start=\"458\" data-end=\"482\">महानगरीय मजिस्ट्रेट:</strong> अलग भूमिका समाप्त</p>\n</li>\n<li data-start=\"503\" data-end=\"582\">\n<p data-start=\"505\" data-end=\"582\"><strong data-start=\"505\" data-end=\"521\">Terminology:</strong> &ldquo;Unsoundness of mind&rdquo;<br data-start=\"543\" data-end=\"546\" /><strong data-start=\"548\" data-end=\"561\">शब्दावली:</strong> &ldquo;अस्वस्थ मस्तिष्क&rdquo;</p>\n</li>\n<li data-start=\"583\" data-end=\"659\">\n<p data-start=\"585\" data-end=\"659\"><strong data-start=\"585\" data-end=\"606\">Property Seizure:</strong> Movable + Immovable<br data-start=\"626\" data-end=\"629\" /><strong data-start=\"631\" data-end=\"650\">संपत्ति ज़ब्ती:</strong> चल + अचल</p>\n</li>\n</ul>\n<hr data-start=\"661\" data-end=\"664\" />\n<h2 data-start=\"666\" data-end=\"719\"><strong data-start=\"669\" data-end=\"719\">2️⃣ Investigation &amp; Evidence | जांच और साक्ष्य</strong></h2>\n<p></p>\n<ul data-start=\"721\" data-end=\"1304\">\n<li data-start=\"721\" data-end=\"859\">\n<p data-start=\"723\" data-end=\"859\"><strong data-start=\"723\" data-end=\"747\">Mandatory Forensics:</strong> For offences punishable with <strong data-start=\"777\" data-end=\"789\">7+ years</strong><br data-start=\"789\" data-end=\"792\" /><strong data-start=\"794\" data-end=\"816\">अनिवार्य फोरेंसिक:</strong> <strong data-start=\"817\" data-end=\"835\">7 वर्ष या अधिक</strong> सज़ा वाले अपराधों में</p>\n</li>\n<li data-start=\"860\" data-end=\"1018\">\n<p data-start=\"862\" data-end=\"1018\"><strong data-start=\"862\" data-end=\"888\">Audio-Video Recording:</strong> All searches mandatory; without it <strong data-start=\"924\" data-end=\"947\">chargesheet invalid</strong><br data-start=\"947\" data-end=\"950\" /><strong data-start=\"952\" data-end=\"980\">ऑडियो-वीडियो रिकॉर्डिंग:</strong> बिना रिकॉर्डिंग <strong data-start=\"997\" data-end=\"1016\">चार्जशीट अमान्य</strong></p>\n</li>\n<li data-start=\"1019\" data-end=\"1091\">\n<p data-start=\"1021\" data-end=\"1091\"><strong data-start=\"1021\" data-end=\"1034\">Zero FIR:</strong> Any police station<br data-start=\"1053\" data-end=\"1056\" /><strong data-start=\"1058\" data-end=\"1072\">ज़ीरो FIR:</strong> किसी भी थाने में</p>\n</li>\n<li data-start=\"1092\" data-end=\"1177\">\n<p data-start=\"1094\" data-end=\"1177\"><strong data-start=\"1094\" data-end=\"1104\">e-FIR:</strong> Sign within <strong data-start=\"1117\" data-end=\"1127\">3 days</strong><br data-start=\"1127\" data-end=\"1130\" /><strong data-start=\"1132\" data-end=\"1142\">ई-FIR:</strong> <strong data-start=\"1143\" data-end=\"1152\">3 दिन</strong> में हस्ताक्षर अनिवार्य</p>\n</li>\n<li data-start=\"1178\" data-end=\"1304\">\n<p data-start=\"1180\" data-end=\"1304\"><strong data-start=\"1180\" data-end=\"1192\">Samples:</strong> Magistrate can compel even non-arrested persons<br data-start=\"1240\" data-end=\"1243\" /><strong data-start=\"1245\" data-end=\"1255\">नमूने:</strong> मजिस्ट्रेट गैर-गिरफ्तार व्यक्ति से भी ले सकता है</p>\n</li>\n</ul>",
    "marks": 2.0,
    "section": "NEW CRIMINAL LAW"

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Q. Which of the following is a significant structural change introduced in the BNSS 2023 as compared to the CrPC 1973?</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"119\">(CrPC 1973 की तुलना में BNSS 2023 में निम्नलिखित में से कौन सा एक महत्वपूर्ण संरचनात्मक परिवर्तन पेश किया गया है?)</strong></p>\n<ul data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">A)</strong> The classification of <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"25\">Metropolitan Areas</strong> and the role of <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"60\">Metropolitan Magistrates</strong> have been removed. <em data-path-to-node=\"13,0,0\" data-index-in-node=\"104\">(<strong data-path-to-node=\"13,0,0\" data-index-in-node=\"105\">महानगरीय क्षेत्रों</strong> का वर्गीकरण और <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"139\">महानगरीय मजिस्ट्रेटों</strong> की भूमिका को हटा दिया गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">B)</strong> The designation of <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"22\">Chief Judicial Magistrate</strong> has been abolished. <em data-path-to-node=\"13,1,0\" data-index-in-node=\"68\">(मुख्य न्यायिक मजिस्ट्रेट का पद समाप्त कर दिया गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">C)</strong> The term \"Unsoundness of mind\" has been replaced with \"Mental illness\". <em data-path-to-node=\"13,2,0\" data-index-in-node=\"75\">(\"अस्वस्थ मन\" (Unsoundness of mind) शब्द को \"मानसिक बीमारी\" से बदल दिया गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">D)</strong> High Courts no longer have the power to appoint Session Judges. <em data-path-to-node=\"13,3,0\" data-index-in-node=\"67\">(उच्च न्यायालयों के पास अब सत्र न्यायाधीशों को नियुक्त करने की शक्ति नहीं है।)</em></p>\n</li>\n</ul>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p><strong data-path-to-node=\"15,0\" data-index-in-node=\"0\">Clarification:</strong> The BNSS simplifies the hierarchy by removing the separate metropolitan category. Also, note that \"Mental illness\" was the old term; BNSS uses <strong data-path-to-node=\"15,0\" data-index-in-node=\"158\">\"Unsoundness of mind\"</strong> (as per legal formality).</p>\n<h2 data-start=\"1311\" data-end=\"1370\"><strong data-start=\"1314\" data-end=\"1370\">3️⃣ Speedy Justice Timelines | त्वरित न्याय समय-सीमा</strong></h2>\n<ul data-start=\"1372\" data-end=\"1794\">\n<li data-start=\"1372\" data-end=\"1487\">\n<p data-start=\"1374\" data-end=\"1487\"><strong data-start=\"1374\" data-end=\"1392\">Investigation:</strong> <strong data-start=\"1393\" data-end=\"1404\">90 days</strong> (Women/Children: <strong data-start=\"1422\" data-end=\"1434\">2 months</strong>)<br data-start=\"1435\" data-end=\"1438\" /><strong data-start=\"1440\" data-end=\"1449\">जांच:</strong> <strong data-start=\"1450\" data-end=\"1460\">90 दिन</strong> (महिला/बच्चे: <strong data-start=\"1475\" data-end=\"1484\">2 माह</strong>)</p>\n</li>\n<li data-start=\"1488\" data-end=\"1574\">\n<p data-start=\"1490\" data-end=\"1574\"><strong data-start=\"1490\" data-end=\"1522\">Documents to Accused/Victim:</strong> <strong data-start=\"1523\" data-end=\"1534\">14 days</strong><br data-start=\"1534\" data-end=\"1537\" /><strong data-start=\"1539\" data-end=\"1561\">दस्तावेज़ आपूर्ति:</strong> <strong data-start=\"1562\" data-end=\"1572\">14 दिन</strong></p>\n</li>\n<li data-start=\"1575\" data-end=\"1645\">\n<p data-start=\"1577\" data-end=\"1645\"><strong data-start=\"1577\" data-end=\"1597\">Framing Charges:</strong> <strong data-start=\"1598\" data-end=\"1609\">60 days</strong><br data-start=\"1609\" data-end=\"1612\" /><strong data-start=\"1614\" data-end=\"1632\">आरोप निर्धारण:</strong> <strong data-start=\"1633\" data-end=\"1643\">60 दिन</strong></p>\n</li>\n<li data-start=\"1646\" data-end=\"1736\">\n<p data-start=\"1648\" data-end=\"1736\"><strong data-start=\"1648\" data-end=\"1661\">Judgment:</strong> <strong data-start=\"1662\" data-end=\"1673\">30 days</strong> (Max <strong data-start=\"1679\" data-end=\"1690\">45 days</strong>)<br data-start=\"1691\" data-end=\"1694\" /><strong data-start=\"1696\" data-end=\"1707\">निर्णय:</strong> <strong data-start=\"1708\" data-end=\"1718\">30 दिन</strong> (अधिकतम <strong data-start=\"1727\" data-end=\"1733\">45</strong>)</p>\n</li>\n<li data-start=\"1737\" data-end=\"1794\">\n<p data-start=\"1739\" data-end=\"1794\"><strong data-start=\"1739\" data-end=\"1756\">Adjournments:</strong> Max <strong data-start=\"1761\" data-end=\"1766\">2</strong><br data-start=\"1766\" data-end=\"1769\" /><strong data-start=\"1771\" data-end=\"1781\">स्थगन:</strong> अधिकतम <strong data-start=\"1789\" data-end=\"1794\">2</strong></p>\n</li>\n</ul>\n<hr data-start=\"1796\" data-end=\"1799\" />\n<h2 data-start=\"1801\" data-end=\"1858\"><strong data-start=\"1804\" data-end=\"1858\">4️⃣ Rights, Bail &amp; Trial | अधिकार, ज़मानत व ट्रायल</strong></h2>\n<h3 data-start=\"1860\" data-end=\"1897\"><strong data-start=\"1864\" data-end=\"1897\">Victim Rights | पीड़ित अधिकार</strong></h3>\n<ul data-start=\"1898\" data-end=\"2064\">\n<li data-start=\"1898\" data-end=\"1986\">\n<p data-start=\"1900\" data-end=\"1986\">FIR copy + <strong data-start=\"1911\" data-end=\"1929\">90-day updates</strong> mandatory<br data-start=\"1939\" data-end=\"1942\" />FIR प्रति + <strong data-start=\"1956\" data-end=\"1975\">90-दिवसीय अपडेट</strong> अनिवार्य</p>\n</li>\n<li data-start=\"1987\" data-end=\"2064\">\n<p data-start=\"1989\" data-end=\"2064\"><strong data-start=\"1989\" data-end=\"2018\">Witness Protection Scheme</strong> by States<br data-start=\"2028\" data-end=\"2031\" /><strong data-start=\"2033\" data-end=\"2055\">गवाह संरक्षण योजना</strong> अनिवार्य</p>\n</li>\n</ul>\n<h3 data-start=\"2066\" data-end=\"2106\"><strong data-start=\"2070\" data-end=\"2106\">Bail &amp; Custody | ज़मानत व हिरासत</strong></h3>\n<ul data-start=\"2107\" data-end=\"2487\">\n<li data-start=\"2107\" data-end=\"2189\">\n<p data-start=\"2109\" data-end=\"2189\"><strong data-start=\"2109\" data-end=\"2126\">Security Bond</strong> instead of arrest<br data-start=\"2144\" data-end=\"2147\" />गिरफ्तारी के बजाय <strong data-start=\"2167\" data-end=\"2187\">सिक्योरिटी बॉन्ड</strong></p>\n</li>\n<li data-start=\"2190\" data-end=\"2287\">\n<p data-start=\"2192\" data-end=\"2287\">Bail restricted for life/death/multiple cases<br data-start=\"2237\" data-end=\"2240\" />आजीवन/मृत्युदंड/बहु-मामलों में सीमित ज़मानत</p>\n</li>\n<li data-start=\"2288\" data-end=\"2395\">\n<p data-start=\"2290\" data-end=\"2395\"><strong data-start=\"2290\" data-end=\"2314\">First-time offender:</strong> Release after <strong data-start=\"2329\" data-end=\"2345\">1/3 sentence</strong><br data-start=\"2345\" data-end=\"2348\" /><strong data-start=\"2350\" data-end=\"2367\">प्रथम अपराधी:</strong> <strong data-start=\"2368\" data-end=\"2380\">1/3 सज़ा</strong> के बाद रिहाई</p>\n</li>\n<li data-start=\"2396\" data-end=\"2487\">\n<p data-start=\"2398\" data-end=\"2487\"><strong data-start=\"2398\" data-end=\"2420\">Community Service:</strong> Unpaid social work<br data-start=\"2439\" data-end=\"2442\" /><strong data-start=\"2444\" data-end=\"2463\">सामुदायिक सेवा:</strong> बिना वेतन सामाजिक कार्य</p>\n</li>\n</ul>\n<h3 data-start=\"2489\" data-end=\"2531\"><strong data-start=\"2493\" data-end=\"2531\">Trial Provisions | ट्रायल प्रावधान</strong></h3>\n<p></p>\n<ul data-start=\"2532\" data-end=\"2761\">\n<li data-start=\"2532\" data-end=\"2657\">\n<p data-start=\"2534\" data-end=\"2657\"><strong data-start=\"2534\" data-end=\"2554\">Plea Bargaining:</strong> Sentence bargaining; apply within <strong data-start=\"2589\" data-end=\"2600\">30 days</strong><br data-start=\"2600\" data-end=\"2603\" /><strong data-start=\"2605\" data-end=\"2625\">प्ली बार्गेनिंग:</strong> सज़ा पर; <strong data-start=\"2635\" data-end=\"2645\">30 दिन</strong> में आवेदन</p>\n</li>\n<li data-start=\"2658\" data-end=\"2761\">\n<p data-start=\"2660\" data-end=\"2761\"><strong data-start=\"2660\" data-end=\"2682\">Trial in Absentia:</strong> For proclaimed offenders<br data-start=\"2707\" data-end=\"2710\" /><strong data-start=\"2712\" data-end=\"2737\">अनुपस्थित में ट्रायल:</strong> उद्घोषित अपराधियों हेतु</p>\n</li>\n</ul>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Q. Match the following procedures under BNSS with their mandatory timelines:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(BNSS के तहत निम्नलिखित प्रक्रियाओं को उनकी अनिवार्य समयसीमा के साथ सुमेलित करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Procedure (प्रक्रिया)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Mandatory Timeline (अनिवार्य समयसीमा)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,0,0\" data-index-in-node=\"0\">(A) Framing of Charges</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,1,1,0\">(i) Within 30 days (max 45 days) of arguments.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,2,0,0\" data-index-in-node=\"0\">(B) Judgment Pronouncement</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,2,1,0\">(ii) Within 14 days of production/appearance.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,3,0,0\" data-index-in-node=\"0\">(C) Document Supply to Accused</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,3,1,0\">(iii) Within 60 days of the first hearing.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,0,0\" data-index-in-node=\"0\">(D) Zero FIR Transfer</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20,4,1,0\">(iv) Can be filed at any station and then transferred.</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"21\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\" data-index-in-node=\"0\">Select the correct code (सही कूट चुनें):</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,0,0\" data-index-in-node=\"0\">A)</strong> A-iii, B-i, C-ii, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,1,0\" data-index-in-node=\"0\">B)</strong> A-i, B-ii, C-iii, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,2,0\" data-index-in-node=\"0\">C)</strong> A-iii, B-ii, C-i, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,3,0\" data-index-in-node=\"0\">D)</strong> A-iv, B-iii, C-ii, D-i</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"27\"><strong data-path-to-node=\"27\" data-index-in-node=\"0\">Q. Regarding the custody and bail provisions in BNSS 2023, which of the following statements is INCORRECT?</strong> <strong data-path-to-node=\"27\" data-index-in-node=\"107\">(BNSS 2023 में हिरासत और जमानत के प्रावधानों के संबंध में, निम्नलिखित में से कौन सा कथन गलत है?)</strong></p>\n<ul data-path-to-node=\"28\">\n<li>\n<p data-path-to-node=\"28,0,0\"><strong data-path-to-node=\"28,0,0\" data-index-in-node=\"0\">A) Police Custody:</strong> Can be authorized for up to 15 days within the first 40 or 60 days of detention. <em data-path-to-node=\"28,0,0\" data-index-in-node=\"100\">(पुलिस हिरासत: हिरासत के पहले 40 या 60 दिनों के भीतर 15 दिनों तक के लिए अधिकृत की जा सकती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"28,1,0\"><strong data-path-to-node=\"28,1,0\" data-index-in-node=\"0\">B) Trial in Absentia:</strong> A trial can proceed and judgment can be pronounced even if a proclaimed offender has absconded. <em data-path-to-node=\"28,1,0\" data-index-in-node=\"118\">(अनुपस्थिति में सुनवाई: यदि कोई घोषित अपराधी फरार हो गया है, तब भी सुनवाई आगे बढ़ सकती है और निर्णय सुनाया जा सकता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"28,2,0\"><strong data-path-to-node=\"28,2,0\" data-index-in-node=\"0\">C) First-time Offenders:</strong> Must be released on personal bond after serving <strong data-path-to-node=\"28,2,0\" data-index-in-node=\"73\">half</strong> of the maximum sentence. <em data-path-to-node=\"28,2,0\" data-index-in-node=\"103\">(पहली बार अपराध करने वाले: अधिकतम सजा का <strong data-path-to-node=\"28,2,0\" data-index-in-node=\"144\">आधा</strong> हिस्सा पूरा करने के बाद उन्हें व्यक्तिगत बांड पर रिहा किया जाना चाहिए।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"28,3,0\"><strong data-path-to-node=\"28,3,0\" data-index-in-node=\"0\">D) Handcuffs:</strong> Can be used during arrest for certain serious offenses like organized crime or rape. <em data-path-to-node=\"28,3,0\" data-index-in-node=\"99\">(हथकड़ी: संगठित अपराध या बलात्कार जैसे कुछ गंभीर अपराधों के लिए गिरफ्तारी के दौरान उपयोग की जा सकती है।)</em></p>\n</li>\n</ul>",

ृक)</p>\n</li>\n</ul>",

oncerns | मुद्दे व चिंताएँ</strong></h2>\n<ul data-start=\"2817\" data-end=\"3240\">\n<li data-start=\"2817\" data-end=\"2942\">\n<p data-start=\"2819\" data-end=\"2942\"><strong data-start=\"2819\" data-end=\"2838\">Police Custody:</strong> Up to <strong data-start=\"2845\" data-end=\"2856\">15 days</strong> within first <strong data-start=\"2870\" data-end=\"2884\">40&ndash;60 days</strong><br data-start=\"2884\" data-end=\"2887\" /><strong data-start=\"2889\" data-end=\"2906\">पुलिस हिरासत:</strong> पहले <strong data-start=\"2912\" data-end=\"2925\">40&ndash;60 दिन</strong> में <strong data-start=\"2930\" data-end=\"2940\">15 दिन</strong></p>\n</li>\n<li data-start=\"2943\" data-end=\"3057\">\n<p data-start=\"2945\" data-end=\"3057\"><strong data-start=\"2945\" data-end=\"2959\">Handcuffs:</strong> Allowed in serious offences (SC/NHRC concern)<br data-start=\"3005\" data-end=\"3008\" /><strong data-start=\"3010\" data-end=\"3021\">हथकड़ी:</strong> गंभीर अपराधों में (SC/NHRC चिंता)</p>\n</li>\n<li data-start=\"3058\" data-end=\"3147\">\n<p data-start=\"3060\" data-end=\"3147\"><strong data-start=\"3060\" data-end=\"3076\">Bail Limits:</strong> May affect jail decongestion<br data-start=\"3105\" data-end=\"3108\" /><strong data-start=\"3110\" data-end=\"3126\">ज़मानत सीमा:</strong> जेल भीड़ पर प्रभाव</p>\n</li>\n<li data-start=\"3148\" data-end=\"3240\">\n<p data-start=\"3150\" data-end=\"3240\"><strong data-start=\"3150\" data-end=\"3169\">Infrastructure:</strong> Digital &amp; forensic capacity gaps<br data-start=\"3202\" data-end=\"3205\" /><strong data-start=\"3207\" data-end=\"3220\">अवसंरचना:</strong> डिजिटल/फोरेंसिक कमी</p>\n</li>\n</ul>\n<hr data-start=\"3242\" data-end=\"3245\" />\n<h3 data-start=\"3247\" data-end=\"3278\"><strong data-start=\"3251\" data-end=\"3278\">EXAM CRUX | परीक्षा सार</strong></h3>\n<ul data-start=\"3279\" data-end=\"3498\" data-is-last-node=\"\" data-is-only-node=\"\">\n<li data-start=\"3279\" data-end=\"3383\">\n<p data-start=\"3281\" data-end=\"3383\"><strong data-start=\"3281\" data-end=\"3331\">BNSS = Technology + Timelines + Victim-centric</strong><br data-start=\"3331\" data-end=\"3334\" /><strong data-start=\"3336\" data-end=\"3381\">BNSS = तकनीक + समय-सीमा + पीड़ित-केंद्रित</strong></p>\n</li>\n<li data-start=\"3384\" data-end=\"3498\" data-is-last-node=\"\">\n<p data-start=\"3386\" data-end=\"3498\" data-is-last-node=\"\"><strong data-start=\"3386\" data-end=\"3440\">Forensics (7+ years) &amp; A-V search = core MCQ traps</strong><br data-start=\"3440\" data-end=\"3443\" /><strong data-start=\"3445\" data-end=\"3498\" data-is-last-node=\"\">फोरेंसिक (7+ वर्ष) व A-V तलाशी = प्रमुख MCQ ट्रैप</strong></p>\n</li>\n</ul>\n</div>\n</div>\n</div>\n</div>\n<div class=\"z-0 flex min-h-[46px] justify-start\"></div>\n<div class=\"mt-3 w-full empty:hidden\">\n<div class=\"text-center\"></div>\n</div>\n</div>\n</div>\n</article>\n</div>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the transition from the Indian Evidence Act (IEA), 1872 to the Bharatiya Sakshya Adhiniyam (BSA), 2023, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"160\">(भारतीय साक्ष्य अधिनियम (IEA), 1872 से भारतीय साक्ष्य अधिनियम (BSA), 2023 में संक्रमण के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The BSA has <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"12\">170 sections</strong>, compared to the 167 sections in the colonial-era IEA. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"80\">(BSA में <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"89\">170 धाराएं</strong> हैं, जबकि औपनिवेशिक काल के IEA में 167 धाराएं थीं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Under the new Act, 24 sections have been altered, 2 added, and 6 sections repealed. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"84\">(नए अधिनियम के तहत, 24 धाराओं में बदलाव किया गया है, 2 जोड़ी गई हैं और 6 धाराओं को निरस्त कर दिया गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Like the other two criminal codes, the BSA came into effect on <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"63\">July 1, 2024</strong>. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"77\">(अन्य दो आपराधिक संहिताओं की तरह, BSA <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"115\">1 जुलाई, 2024</strong> से प्रभावी हुआ।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, and 3)</p>\n</li>\n</ul>",

    "solution": "<h2 data-start=\"0\" data-end=\"48\"><strong data-start=\"3\" data-end=\"46\">BHARATIYA SAKSHYA ADHINIYAM (BSA), 2023</strong></h2>\n<h2 data-start=\"49\" data-end=\"92\"><strong data-start=\"52\" data-end=\"90\">भारतीय साक्ष्य अधिनियम (BSA), 2023</strong></h2>\n<p data-start=\"93\" data-end=\"163\"><strong data-start=\"93\" data-end=\"163\">(Indian Evidence Act, 1872 का स्थानापन्न | Effective: 1 July 2024)</strong></p>\n<hr data-start=\"165\" data-end=\"168\" />\n<h2 data-start=\"170\" data-end=\"209\"><strong data-start=\"173\" data-end=\"209\">1️⃣ Basic Structure | मूल संरचना</strong></h2>\n<ul data-start=\"211\" data-end=\"522\">\n<li data-start=\"211\" data-end=\"262\">\n<p data-start=\"213\" data-end=\"262\"><strong data-start=\"213\" data-end=\"232\">Total Sections:</strong> 170<br data-start=\"236\" data-end=\"239\" /><strong data-start=\"241\" data-end=\"256\">कुल धाराएँ:</strong> 170</p>\n</li>\n<li data-start=\"263\" data-end=\"336\">\n<p data-start=\"265\" data-end=\"336\"><strong data-start=\"265\" data-end=\"289\">Earlier (IEA, 1872):</strong> 167 Sections<br data-start=\"302\" data-end=\"305\" /><strong data-start=\"307\" data-end=\"323\">पूर्व कानून:</strong> 167 धाराएँ</p>\n</li>\n<li data-start=\"337\" data-end=\"522\">\n<p data-start=\"339\" data-end=\"358\"><strong data-start=\"339\" data-end=\"356\">Changes Made:</strong></p>\n<ul data-start=\"361\" data-end=\"522\">\n<li data-start=\"361\" data-end=\"415\">\n<p data-start=\"363\" data-end=\"415\"><strong data-start=\"363\" data-end=\"386\">24 Sections amended</strong> | <strong data-start=\"389\" data-end=\"413\">24 धाराओं में संशोधन</strong></p>\n</li>\n<li data-start=\"418\" data-end=\"470\">\n<p data-start=\"420\" data-end=\"470\"><strong data-start=\"420\" data-end=\"440\">2 Sections added</strong> | <strong data-start=\"443\" data-end=\"468\">2 नई धाराएँ जोड़ी गईं</strong></p>\n</li>\n<li data-start=\"473\" data-end=\"522\">\n<p data-start=\"475\" data-end=\"522\"><strong data-start=\"475\" data-end=\"498\">6 Sections repealed</strong> | <strong data-start=\"501\" data-end=\"522\">6 धाराएँ हटाई गईं</strong></p>\n</li>\n</ul>\n</li>\n</ul>\n<p data-start=\"524\" data-end=\"591\">👉 <strong data-start=\"527\" data-end=\"541\">Exam Trap:</strong> Numbers (170 / 24 / 2 / 6) &ndash; SSC &amp; UPSC favourite</p>\n<hr data-start=\"593\" data-end=\"596\" />\n<h2 data-start=\"598\" data-end=\"657\"><strong data-start=\"601\" data-end=\"655\">2️⃣ Retained Core Principles (Old Rules Continued)</strong></h2>\n<h2 data-start=\"658\" data-end=\"698\"><strong data-start=\"661\" data-end=\"698\">मूल सिद्धांत (पुराने नियम बरकरार)</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"700\" data-end=\"1170\">\n<thead data-start=\"700\" data-end=\"742\">\n<tr data-start=\"700\" data-end=\"742\">\n<th data-start=\"700\" data-end=\"722\" data-col-size=\"md\">Principle (English)</th>\n<th data-start=\"722\" data-end=\"742\" data-col-size=\"md\">सिद्धांत (Hindi)</th>\n</tr>\n</thead>\n<tbody data-start=\"753\" data-end=\"1170\">\n<tr data-start=\"753\" data-end=\"844\">\n<td data-start=\"753\" data-end=\"799\" data-col-size=\"md\">Only legally admissible evidence is allowed</td>\n<td data-start=\"799\" data-end=\"844\" data-col-size=\"md\">केवल विधिक रूप से स्वीकार्य साक्ष्य मान्य</td>\n</tr>\n<tr data-start=\"845\" data-end=\"922\">\n<td data-start=\"845\" data-end=\"877\" data-col-size=\"md\">Courts rely on <em data-start=\"862\" data-end=\"876\">proved facts</em></td>\n<td data-start=\"877\" data-end=\"922\" data-col-size=\"md\">न्यायालय <em data-start=\"888\" data-end=\"902\">सिद्ध तथ्यों</em> पर भरोसा करते हैं</td>\n</tr>\n<tr data-start=\"923\" data-end=\"997\">\n<td data-start=\"923\" data-end=\"959\" data-col-size=\"md\">Police confession is inadmissible</td>\n<td data-start=\"959\" data-end=\"997\" data-col-size=\"md\">पुलिस के समक्ष स्वीकारोक्ति अमान्य</td>\n</tr>\n<tr data-start=\"998\" data-end=\"1082\">\n<td data-start=\"998\" data-end=\"1037\" data-col-size=\"md\">Magistrate-recorded confession valid</td>\n<td data-start=\"1037\" data-end=\"1082\" data-col-size=\"md\">मजिस्ट्रेट द्वारा दर्ज स्वीकारोक्ति मान्य</td>\n</tr>\n<tr data-start=\"1083\" data-end=\"1170\">\n<td data-start=\"1083\" data-end=\"1126\" data-col-size=\"md\">Discovery rule retained (Sec 27 concept)</td>\n<td data-start=\"1126\" data-end=\"1170\" data-col-size=\"md\">खोज से संबंधित सूचना स्वीकार्य (धारा 27)</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p></p>\n<p data-start=\"1172\" data-end=\"1249\">📌 <strong data-start=\"1175\" data-end=\"1188\">PYQ Line:</strong> <em data-start=\"1189\" data-end=\"1249\">Police confession is inadmissible except before Magistrate</em></p>",

    "question": "<h3 data-path-to-node=\"11\"><strong data-path-to-node=\"11\" data-index-in-node=\"0\">प्रश्न 2: इलेक्ट्रॉनिक रिकॉर्ड और डिजिटल साक्ष्य</strong></h3>\n<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Q. How does the BSA 2023 treat electronic and digital records in legal proceedings?</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"84\">(BSA 2023 कानूनी कार्यवाही में इलेक्ट्रॉनिक और डिजिटल रिकॉर्ड के साथ कैसा व्यवहार करता है?)</strong></p>\n<ul data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">A)</strong> Electronic records are considered inferior to paper documents. <em data-path-to-node=\"13,0,0\" data-index-in-node=\"66\">(इलेक्ट्रॉनिक रिकॉर्ड को कागजी दस्तावेजों की तुलना में निम्न माना जाता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">B)</strong> Electronic and digital records are given the same legal status as paper documents. <em data-path-to-node=\"13,1,0\" data-index-in-node=\"86\">(इलेक्ट्रॉनिक और डिजिटल रिकॉर्ड को कागजी दस्तावेजों के समान ही कानूनी दर्जा दिया गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">C)</strong> Oral evidence cannot be delivered through electronic means under the new law. <em data-path-to-node=\"13,2,0\" data-index-in-node=\"81\">(नए कानून के तहत मौखिक साक्ष्य इलेक्ट्रॉनिक माध्यम से नहीं दिए जा सकते।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">D)</strong> All electronic evidence is automatically admissible without any certification. <em data-path-to-node=\"13,3,0\" data-index-in-node=\"82\">(सभी इलेक्ट्रॉनिक साक्ष्य बिना किसी प्रमाणन के स्वतः ही स्वीकार्य हैं।)</em></p>\n</li>\n</ul>",

    "correct_option_id": 0,
    "solution": "<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Answer (उत्तर): B</strong></p>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"15,0\" data-index-in-node=\"0\">Key Fact:</strong>&nbsp;BSA specifically categorizes electronic records as&nbsp;<strong data-path-to-node=\"15,0\" data-index-in-node=\"61\">Secondary Evidence</strong>&nbsp;and allows&nbsp;<strong data-path-to-node=\"15,0\" data-index-in-node=\"91\">Oral Evidence</strong>&nbsp;via video conferencing. (<strong data-path-to-node=\"15,0\" data-index-in-node=\"130\">मुख्य तथ्य:</strong>&nbsp;BSA विशेष रूप से इलेक्ट्रॉनिक रिकॉर्ड को&nbsp;<strong data-path-to-node=\"15,0\" data-index-in-node=\"183\">द्वितीयक साक्ष्य</strong>&nbsp;के रूप में वर्गीकृत करता है और वीडियो कॉन्फ्रेंसिंग के माध्यम से&nbsp;<strong data-path-to-node=\"15,0\" data-index-in-node=\"265\">मौखिक साक्ष्य</strong>&nbsp;की अनुमति देता है।)</p>\n<p data-path-to-node=\"14\"></p>\n<h2 data-start=\"1256\" data-end=\"1311\"><strong data-start=\"1259\" data-end=\"1309\">Technology Integration (Major Reform Area)</strong></h2>\n<h2 data-start=\"1312\" data-end=\"1346\"><strong data-start=\"1315\" data-end=\"1346\">तकनीकी एकीकरण (मुख्य सुधार)</strong></h2>\n<h3 data-start=\"1348\" data-end=\"1398\"><strong data-start=\"1352\" data-end=\"1398\">Electronic Evidence | इलेक्ट्रॉनिक साक्ष्य</strong></h3>\n<ul data-start=\"1400\" data-end=\"1826\">\n<li data-start=\"1400\" data-end=\"1513\">\n<p data-start=\"1402\" data-end=\"1513\"><strong data-start=\"1402\" data-end=\"1425\">Equal Legal Status:</strong><br data-start=\"1425\" data-end=\"1428\" />Electronic records = Paper documents<br data-start=\"1466\" data-end=\"1469\" /><strong data-start=\"1471\" data-end=\"1513\">इलेक्ट्रॉनिक रिकॉर्ड = कागजी दस्तावेज़</strong></p>\n</li>\n<li data-start=\"1515\" data-end=\"1694\">\n<p data-start=\"1517\" data-end=\"1567\"><strong data-start=\"1517\" data-end=\"1536\">Scope Expanded:</strong><br data-start=\"1536\" data-end=\"1539\" />Includes data stored in:</p>\n<ul data-start=\"1570\" data-end=\"1694\">\n<li data-start=\"1570\" data-end=\"1583\">\n<p data-start=\"1572\" data-end=\"1583\">Computers</p>\n</li>\n<li data-start=\"1586\" data-end=\"1603\">\n<p data-start=\"1588\" data-end=\"1603\">Mobile phones</p>\n</li>\n<li data-start=\"1606\" data-end=\"1617\">\n<p data-start=\"1608\" data-end=\"1617\">Servers</p>\n</li>\n<li data-start=\"1620\" data-end=\"1694\">\n<p data-start=\"1622\" data-end=\"1694\">Communication devices<br data-start=\"1643\" data-end=\"1646\" /><strong data-start=\"1648\" data-end=\"1694\">कंप्यूटर, मोबाइल, सर्वर, संचार उपकरण शामिल</strong></p>\n</li>\n</ul>\n</li>\n<li data-start=\"1696\" data-end=\"1826\">\n<p data-start=\"1698\" data-end=\"1826\"><strong data-start=\"1698\" data-end=\"1717\">Classification:</strong><br data-start=\"1717\" data-end=\"1720\" />Electronic records are treated as <strong data-start=\"1756\" data-end=\"1778\">Secondary Evidence</strong><br data-start=\"1778\" data-end=\"1781\" /><strong data-start=\"1783\" data-end=\"1826\">इलेक्ट्रॉनिक साक्ष्य = द्वितीयक साक्ष्य</strong></p>\n</li>\n</ul>\n<hr data-start=\"1828\" data-end=\"1831\" />\n<h3 data-start=\"1833\" data-end=\"1870\"><strong data-start=\"1837\" data-end=\"1870\">Oral Evidence | मौखिक साक्ष्य</strong></h3>\n<ul data-start=\"1872\" data-end=\"2015\">\n<li data-start=\"1872\" data-end=\"1960\">\n<p data-start=\"1874\" data-end=\"1960\">Oral evidence can be given <strong data-start=\"1901\" data-end=\"1919\">electronically</strong><br data-start=\"1919\" data-end=\"1922\" />(Video conferencing, digital mode)</p>\n</li>\n<li data-start=\"1961\" data-end=\"2015\">\n<p data-start=\"1963\" data-end=\"2015\"><strong data-start=\"1963\" data-end=\"2015\">मौखिक साक्ष्य अब वीडियो कॉन्फ्रेंसिंग से भी संभव</strong></p>\n</li>\n</ul>\n<hr data-start=\"2017\" data-end=\"2020\" />\n<h3 data-start=\"2022\" data-end=\"2068\"><strong data-start=\"2026\" data-end=\"2068\">New Systems Introduced | नई प्रणालियाँ</strong></h3>\n<p data-path-to-node=\"14\"></p>\n<ul data-start=\"2070\" data-end=\"2214\">\n<li data-start=\"2070\" data-end=\"2125\">\n<p data-start=\"2072\" data-end=\"2125\"><strong data-start=\"2072\" data-end=\"2092\">E-Sakshya System</strong> &ndash; Digital handling of evidence</p>\n</li>\n<li data-start=\"2126\" data-end=\"2175\">\n<p data-start=\"2128\" data-end=\"2175\"><strong data-start=\"2128\" data-end=\"2141\">E-Summons</strong> &ndash; Electronic service of summons</p>\n</li>\n<li data-start=\"2176\" data-end=\"2214\">\n<p data-start=\"2178\" data-end=\"2214\"><strong data-start=\"2178\" data-end=\"2214\">ई-साक्ष्य एवं ई-समन प्रणाली लागू</strong></p>\n</li>\n</ul>",
    "marks": 2.0,
    "section": "NEW CRIMINAL LAW"
  },

    "question": "<p data-path-to-node=\"19\"><strong data-path-to-node=\"19\" data-index-in-node=\"0\">Q. Regarding confessions and information received from an accused in custody, which core principle of the IEA has been RETAINED in the BSA 2023?</strong> <strong data-path-to-node=\"19\" data-index-in-node=\"145\">(हिरासत में आरोपी से प्राप्त स्वीकारोक्ति और जानकारी के संबंध में, IEA का कौन सा मूल सिद्धांत BSA 2023 में बरकरार रखा गया है?)</strong></p>\n<ul data-path-to-node=\"20\">\n<li>\n<p data-path-to-node=\"20,0,0\"><strong data-path-to-node=\"20,0,0\" data-index-in-node=\"0\">A)</strong> All confessions made to a police officer are now fully admissible in court. <em data-path-to-node=\"20,0,0\" data-index-in-node=\"79\">(पुलिस अधिकारी के सामने की गई सभी स्वीकारोक्ति अब अदालत में पूरी तरह से स्वीकार्य हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"20,1,0\"><strong data-path-to-node=\"20,1,0\" data-index-in-node=\"0\">B)</strong> Confessions given to the police are generally <strong data-path-to-node=\"20,1,0\" data-index-in-node=\"49\">inadmissible</strong> unless recorded by a Magistrate. <em data-path-to-node=\"20,1,0\" data-index-in-node=\"95\">(पुलिस को दी गई स्वीकारोक्ति आमतौर पर <strong data-path-to-node=\"20,1,0\" data-index-in-node=\"133\">अस्वीकार्य</strong> होती है जब तक कि उसे मजिस्ट्रेट द्वारा रिकॉर्ड न किया गया हो।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"20,2,0\"><strong data-path-to-node=\"20,2,0\" data-index-in-node=\"0\">C)</strong> Information from an accused in custody can never be used as evidence under any circumstance. <em data-path-to-node=\"20,2,0\" data-index-in-node=\"96\">(हिरासत में आरोपी से मिली जानकारी का किसी भी परिस्थिति में साक्ष्य के रूप में उपयोग नहीं किया जा सकता।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"20,3,0\"><strong data-path-to-node=\"20,3,0\" data-index-in-node=\"0\">D)</strong> The presumption of police responsibility for custodial injuries has been newly added. <em data-path-to-node=\"20,3,0\" data-index-in-node=\"89\">(हिरासत में चोटों के लिए पुलिस की जिम्मेदारी का अनुमान नया जोड़ा गया है।)</em></p>\n</li>\n</ul>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,

    "section": "NEW CRIMINAL LAW"

    "question": "<p data-path-to-node=\"25\"><strong data-path-to-node=\"25\" data-index-in-node=\"0\">Q. The BSA 2023 introduces/clarifies the concept of 'Joint Trials'. What does this imply?</strong> <strong data-path-to-node=\"25\" data-index-in-node=\"90\">(BSA 2023 'संयुक्त सुनवाई' की अवधारणा को पेश/स्पष्ट करता है। इसका क्या अर्थ है?)</strong></p>\n<ul data-path-to-node=\"26\">\n<li>\n<p data-path-to-node=\"26,0,0\"><strong data-path-to-node=\"26,0,0\" data-index-in-node=\"0\">A)</strong> A trial where civil and criminal cases are merged. <em data-path-to-node=\"26,0,0\" data-index-in-node=\"54\">(एक सुनवाई जहाँ दीवानी और आपराधिक मामलों का विलय कर दिया जाता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"26,1,0\"><strong data-path-to-node=\"26,1,0\" data-index-in-node=\"0\">B)</strong> More than one person can be tried together for the same crime, even if one accused is <strong data-path-to-node=\"26,1,0\" data-index-in-node=\"89\">absconding</strong>. <em data-path-to-node=\"26,1,0\" data-index-in-node=\"101\">(एक ही अपराध के लिए एक से अधिक व्यक्तियों पर एक साथ मुकदमा चलाया जा सकता है, भले ही एक आरोपी <strong data-path-to-node=\"26,1,0\" data-index-in-node=\"194\">फरार</strong> हो।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"26,2,0\"><strong data-path-to-node=\"26,2,0\" data-index-in-node=\"0\">C)</strong> A trial that must involve both a male and a female judge. <em data-path-to-node=\"26,2,0\" data-index-in-node=\"61\">(एक सुनवाई जिसमें पुरुष और महिला दोनों न्यायाधीशों का होना अनिवार्य है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"26,3,0\"><strong data-path-to-node=\"26,3,0\" data-index-in-node=\"0\">D)</strong> Joint trials are only applicable to petty offenses below ₹5,000. <em data-path-to-node=\"26,3,0\" data-index-in-node=\"68\">(संयुक्त सुनवाई केवल ₹5,000 से कम के छोटे अपराधों पर लागू होती है।)</em></p>\n</li>\n</ul>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p><strong data-path-to-node=\"27\" data-index-in-node=\"0\">Answer (उत्तर): B</strong></p>\n<h2 data-start=\"2221\" data-end=\"2279\"><strong data-start=\"2224\" data-end=\"2279\">Procedural Innovations | प्रक्रियात्मक परिवर्तन</strong></h2>\n<h3 data-start=\"2281\" data-end=\"2326\"><strong data-start=\"2285\" data-end=\"2326\">Joint Trial Concept | संयुक्त परीक्षण</strong></h3>\n<ul data-start=\"2328\" data-end=\"2564\">\n<li data-start=\"2328\" data-end=\"2416\">\n<p data-start=\"2330\" data-end=\"2416\">Multiple accused can be tried together<br data-start=\"2368\" data-end=\"2371\" /><strong data-start=\"2373\" data-end=\"2416\">एक से अधिक अभियुक्तों का संयुक्त ट्रायल</strong></p>\n</li>\n<li data-start=\"2418\" data-end=\"2564\">\n<p data-start=\"2420\" data-end=\"2564\"><strong data-start=\"2420\" data-end=\"2448\">Absconding Accused Rule:</strong><br data-start=\"2448\" data-end=\"2451\" />Even if one accused absconds, <strong data-start=\"2483\" data-end=\"2502\">trial continues</strong><br data-start=\"2502\" data-end=\"2505\" /><strong data-start=\"2507\" data-end=\"2564\">यदि कोई अभियुक्त फरार हो जाए, तब भी ट्रायल जारी रहेगा</strong></p>\n</li>\n</ul>\n<p data-start=\"2566\" data-end=\"2628\">🎯 <strong data-start=\"2569\" data-end=\"2582\">SSC Trap:</strong> Trial will NOT stop due to absconding accused</p>\n<hr data-start=\"2630\" data-end=\"2633\" />\n<h2 data-start=\"2635\" data-end=\"2685\"><strong data-start=\"2638\" data-end=\"2683\">5️⃣ Issues &amp; Concerns (Critical Analysis)</strong></h2>\n<h2 data-start=\"2686\" data-end=\"2710\"><strong data-start=\"2689\" data-end=\"2710\">मुद्दे और चिंताएँ</strong></h2>\n<h3 data-start=\"2712\" data-end=\"2754\"><strong data-start=\"2716\" data-end=\"2752\">A. Electronic Evidence Tampering</strong></h3>\n<ul data-start=\"2755\" data-end=\"2855\">\n<li data-start=\"2755\" data-end=\"2806\">\n<p data-start=\"2757\" data-end=\"2806\">Risk during <strong data-start=\"2769\" data-end=\"2804\">search, seizure &amp; investigation</strong></p>\n</li>\n<li data-start=\"2807\" data-end=\"2855\">\n<p data-start=\"2809\" data-end=\"2855\"><strong data-start=\"2809\" data-end=\"2855\">इलेक्ट्रॉनिक साक्ष्य में छेड़छाड़ की आशंका</strong></p>\n</li>\n</ul>\n<hr data-start=\"2857\" data-end=\"2860\" />\n<h3 data-start=\"2862\" data-end=\"2915\"><strong data-start=\"2866\" data-end=\"2915\">B. Certification Confusion (Major Exam Issue)</strong></h3>\n<ul data-start=\"2917\" data-end=\"3094\">\n<li data-start=\"2917\" data-end=\"2995\">\n<p data-start=\"2919\" data-end=\"2995\">Normally, electronic evidence needs <strong data-start=\"2955\" data-end=\"2970\">certificate</strong> (like Sec 65B earlier)</p>\n</li>\n<li data-start=\"2996\" data-end=\"3055\">\n<p data-start=\"2998\" data-end=\"3055\">But BSA also treats electronic records as <strong data-start=\"3040\" data-end=\"3053\">documents</strong></p>\n</li>\n<li data-start=\"3056\" data-end=\"3094\">\n<p data-start=\"3058\" data-end=\"3094\">This creates <strong data-start=\"3071\" data-end=\"3094\">legal contradiction</strong></p>\n</li>\n</ul>\n<p data-start=\"3096\" data-end=\"3112\"><strong data-start=\"3096\" data-end=\"3110\">हिंदी में:</strong></p>\n<ul data-start=\"3113\" data-end=\"3229\">\n<li data-start=\"3113\" data-end=\"3162\">\n<p data-start=\"3115\" data-end=\"3162\">इलेक्ट्रॉनिक साक्ष्य के लिए प्रमाणपत्र आवश्यक</p>\n</li>\n<li data-start=\"3163\" data-end=\"3206\">\n<p data-start=\"3165\" data-end=\"3206\">परंतु &ldquo;दस्तावेज़&rdquo; मानने से भ्रम उत्पन्न</p>\n</li>\n<li data-start=\"3207\" data-end=\"3229\">\n<p data-start=\"3209\" data-end=\"3229\"><strong data-start=\"3209\" data-end=\"3229\">कानूनी विरोधाभास</strong></p>\n</li>\n</ul>\n<hr data-start=\"3231\" data-end=\"3234\" />\n<h3 data-start=\"3236\" data-end=\"3275\"><strong data-start=\"3240\" data-end=\"3275\">C. Ignored Judicial Suggestions</strong></h3>\n<ul data-start=\"3277\" data-end=\"3585\">\n<li data-start=\"3277\" data-end=\"3424\">\n<p data-start=\"3279\" data-end=\"3424\"><strong data-start=\"3279\" data-end=\"3311\">Custodial Safeguards Ignored</strong><br data-start=\"3311\" data-end=\"3314\" />Supreme Court &amp; Law Commission suggestions not included<br data-start=\"3371\" data-end=\"3374\" /><strong data-start=\"3376\" data-end=\"3424\">हिरासत में यातना से सुरक्षा सुझाव शामिल नहीं</strong></p>\n</li>\n<li data-start=\"3426\" data-end=\"3585\">\n<p data-start=\"3428\" data-end=\"3585\"><strong data-start=\"3428\" data-end=\"3461\">Police Accountability Diluted</strong><br data-start=\"3461\" data-end=\"3464\" />No presumption of police responsibility for custodial injuries<br data-start=\"3528\" data-end=\"3531\" /><strong data-start=\"3533\" data-end=\"3585\">हिरासत में चोट पर पुलिस जिम्मेदारी की धारणा नहीं</strong></p>\n</li>\n</ul>\n<p></p>\n<p data-start=\"3587\" data-end=\"3646\">📌 <strong data-start=\"3590\" data-end=\"3605\">UPSC Angle:</strong> Human rights &amp; custodial justice concern</p>",
    "marks": 2.0,
    "section": "NEW CRIMINAL LAW"
  },

    "question": "<p data-path-to-node=\"31\"><strong data-path-to-node=\"31\" data-index-in-node=\"0\">Q. To be admissible in court under BSA 2023, electronic records must usually be authenticated by a/an ________.</strong> <strong data-path-to-node=\"31\" data-index-in-node=\"112\">(BSA 2023 के तहत अदालत में स्वीकार्य होने के लिए, इलेक्ट्रॉनिक रिकॉर्ड को आमतौर पर ________ द्वारा प्रमाणित किया जाना चाहिए।)</strong></p>\n<ul data-path-to-node=\"32\">\n<li>\n<p data-path-to-node=\"32,0,0\"><strong data-path-to-node=\"32,0,0\" data-index-in-node=\"0\">A)</strong> FIR Copy (एफ़आईआर कॉपी)</p>\n</li>\n<li>\n<p data-path-to-node=\"32,1,0\"><strong data-path-to-node=\"32,1,0\" data-index-in-node=\"0\">B)</strong> Certificate (प्रमाण पत्र)</p>\n</li>\n<li>\n<p data-path-to-node=\"32,2,0\"><strong data-path-to-node=\"32,2,0\" data-index-in-node=\"0\">C)</strong> Newspaper Cutting (अखबार की कटिंग)</p>\n</li>\n<li>\n<p data-path-to-node=\"32,3,0\"><strong data-path-to-node=\"32,3,0\" data-index-in-node=\"0\">D)</strong> Oral witness only (केवल मौखिक गवाह)</p>\n</li>\n</ul>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p><strong data-path-to-node=\"33\" data-index-in-node=\"0\">Answer (उत्तर): B (Certificate / प्रमाण पत्र)</strong></p>\n<h2 data-start=\"3653\" data-end=\"3701\"><strong data-start=\"3656\" data-end=\"3701\">Exam-Ready Summary |</strong></h2>\n<ul data-start=\"3703\" data-end=\"4151\">\n<li data-start=\"3703\" data-end=\"3776\">\n<p data-start=\"3705\" data-end=\"3776\"><strong data-start=\"3705\" data-end=\"3740\">BSA = Evidence Law + Technology</strong><br data-start=\"3740\" data-end=\"3743\" /><strong data-start=\"3745\" data-end=\"3776\">BSA = साक्ष्य कानून + तकनीक</strong></p>\n</li>\n<li data-start=\"3778\" data-end=\"3872\">\n<p data-start=\"3780\" data-end=\"3872\"><strong data-start=\"3780\" data-end=\"3824\">Electronic Evidence = Secondary Evidence</strong><br data-start=\"3824\" data-end=\"3827\" /><strong data-start=\"3829\" data-end=\"3872\">इलेक्ट्रॉनिक साक्ष्य = द्वितीयक साक्ष्य</strong></p>\n</li>\n<li data-start=\"3874\" data-end=\"3961\">\n<p data-start=\"3876\" data-end=\"3961\"><strong data-start=\"3876\" data-end=\"3913\">Video-based Oral Evidence Allowed</strong><br data-start=\"3913\" data-end=\"3916\" /><strong data-start=\"3918\" data-end=\"3961\">वीडियो के माध्यम से मौखिक साक्ष्य मान्य</strong></p>\n</li>\n<li data-start=\"3963\" data-end=\"4045\">\n<p data-start=\"3965\" data-end=\"4045\"><strong data-start=\"3965\" data-end=\"4005\">Police confession still inadmissible</strong><br data-start=\"4005\" data-end=\"4008\" /><strong data-start=\"4010\" data-end=\"4045\">पुलिस स्वीकारोक्ति अब भी अमान्य</strong></p>\n</li>\n<li data-start=\"4047\" data-end=\"4151\">\n<p data-start=\"4049\" data-end=\"4151\"><strong data-start=\"4049\" data-end=\"4099\">Joint Trial continues even if accused absconds</strong><br data-start=\"4099\" data-end=\"4102\" /><strong data-start=\"4104\" data-end=\"4151\">फरार अभियुक्त के बावजूद संयुक्त ट्रायल जारी</strong></p>\n</li>\n</ul>\n<hr data-start=\"4153\" data-end=\"4156\" />\n<h3 data-start=\"4158\" data-end=\"4190\">🔑 <strong data-start=\"4165\" data-end=\"4190\">ONE-LINE PYQ TAKEAWAY</strong></h3>\n<p></p>\n<blockquote data-start=\"4191\" data-end=\"4362\">\n<p data-start=\"4193\" data-end=\"4362\"><strong data-start=\"4193\" data-end=\"4362\">Bharatiya Sakshya Adhiniyam, 2023 modernizes evidence law by giving electronic records equal legal status while retaining core principles of the Indian Evidence Act.</strong></p>\n</blockquote>",
    "marks": 2.0,
    "section": "NEW CRIMINAL LAW"

mportant; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\">(i) Online delivery and tracking of court notices and summons.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\" data-index-in-node=\"0\">(B) Nyaya Shruti</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\">(ii) Recording of search, seizure, and crime scene evidence by IOs.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\" data-index-in-node=\"0\">(C) e-Summon</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\">(iii) Comprehensive guide mobile app on new criminal laws for stakeholders.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">(D) NCRB Sankalan</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\">(iv) Facilitating e-trials and virtual court hearings (Video Conferencing).</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"6\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"0\">Select the correct code (सही कूट चुनें):</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> A-ii, B-iv, C-i, D-iii</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> A-i, B-ii, C-iv, D-iii</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> A-ii, B-i, C-iv, D-iii</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> A-iv, B-iii, C-ii, D-i</p>\n</li>\n</ul>",
