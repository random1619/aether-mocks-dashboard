    "solution": "<p><strong style=\"font-family: 'Google Sans Text', sans-serif; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" data-index-in-node=\"0\">Answer (उत्तर): A</strong></p>\n<p></p>\n<h2 data-start=\"0\" data-end=\"47\">🔷 <strong data-start=\"6\" data-end=\"45\">KEY HIGHLIGHTS OF NEW CRIMINAL LAWS</strong></h2>\n<h3 data-start=\"48\" data-end=\"103\"><strong data-start=\"52\" data-end=\"101\">BNS &bull; BNSS &bull; BSA (Effective from 1 July 2024)</strong></h3>\n<h3 data-start=\"104\" data-end=\"185\"><strong data-start=\"108\" data-end=\"185\">नए आपराधिक कानूनों के प्रमुख बिंदु &ndash;&nbsp;</strong></h3>\n<hr data-start=\"187\" data-end=\"190\" />\n<h2 data-start=\"192\" data-end=\"247\">🧱 <strong data-start=\"198\" data-end=\"247\">1. Structure &amp; Transition | संरचना और संक्रमण</strong></h2>\n<ul data-start=\"249\" data-end=\"1214\">\n<li data-start=\"249\" data-end=\"422\">\n<p data-start=\"251\" data-end=\"422\"><strong data-start=\"251\" data-end=\"306\">Continuity of Old Laws | पुराने कानूनों की निरंतरता</strong><br data-start=\"306\" data-end=\"309\" />Pending cases will continue under <strong data-start=\"345\" data-end=\"359\">IPC &amp; CrPC</strong> till disposal.<br data-start=\"374\" data-end=\"377\" />लंबित मामलों पर <strong data-start=\"395\" data-end=\"409\">IPC व CrPC</strong> लागू रहेंगे।</p>\n</li>\n<li data-start=\"424\" data-end=\"563\">\n<p data-start=\"426\" data-end=\"563\"><strong data-start=\"426\" data-end=\"475\">State Amendments (BNSS) | राज्य संशोधन अधिकार</strong><br data-start=\"475\" data-end=\"478\" />States can amend <strong data-start=\"497\" data-end=\"505\">BNSS</strong> provisions.<br data-start=\"517\" data-end=\"520\" />राज्यों को <strong data-start=\"533\" data-end=\"541\">BNSS</strong> में संशोधन का अधिकार।</p>\n</li>\n<li data-start=\"565\" data-end=\"896\">\n<p data-start=\"567\" data-end=\"628\"><strong data-start=\"567\" data-end=\"626\">Applicability Rule | लागू होने का नियम (VERY IMPORTANT)</strong></p>\n<ul data-start=\"631\" data-end=\"896\">\n<li data-start=\"631\" data-end=\"760\">\n<p data-start=\"633\" data-end=\"760\"><strong data-start=\"633\" data-end=\"659\">Substantive Law (BNS):</strong><br data-start=\"659\" data-end=\"662\" />Offence before <strong data-start=\"681\" data-end=\"710\">1 July 2024 &rarr; IPC applies</strong><br data-start=\"710\" data-end=\"713\" />1 जुलाई 2024 से पहले अपराध &rarr; <strong data-start=\"746\" data-end=\"758\">IPC लागू</strong></p>\n</li>\n<li data-start=\"763\" data-end=\"896\">\n<p data-start=\"765\" data-end=\"896\"><strong data-start=\"765\" data-end=\"796\">Procedural Laws (BNSS/BSA):</strong><br data-start=\"796\" data-end=\"799\" />Apply to <strong data-start=\"812\" data-end=\"825\">all cases</strong>, before &amp; after 1 July 2024<br data-start=\"853\" data-end=\"856\" />प्रक्रिया कानून &rarr; सभी मामलों पर लागू</p>\n</li>\n</ul>\n</li>\n<li data-start=\"898\" data-end=\"1032\">\n<p data-start=\"900\" data-end=\"1032\"><strong data-start=\"900\" data-end=\"924\">Objective | उद्देश्य</strong><br data-start=\"924\" data-end=\"927\" />Remove colonial mindset + modern, citizen-centric justice<br data-start=\"986\" data-end=\"989\" />औपनिवेशिक सोच हटाकर नागरिक-केंद्रित न्याय</p>\n</li>\n<li data-start=\"1034\" data-end=\"1214\">\n<p data-start=\"1036\" data-end=\"1214\"><strong data-start=\"1036\" data-end=\"1082\">Historical Background | ऐतिहासिक पृष्ठभूमि</strong><br data-start=\"1082\" data-end=\"1085\" />IPC drafted by <strong data-start=\"1102\" data-end=\"1126\">Lord Macaulay (1860)</strong><br data-start=\"1126\" data-end=\"1129\" />CrPC designed to suppress revolts<br data-start=\"1164\" data-end=\"1167\" />IPC &ndash; मैकाले | CrPC &ndash; औपनिवेशिक नियंत्रण हेतु</p>\n</li>\n</ul>\n<hr data-start=\"1216\" data-end=\"1219\" />\n<h2 data-start=\"1221\" data-end=\"1276\">💻 <strong data-start=\"1227\" data-end=\"1276\">2. Technology &amp; Forensics | तकनीक और फॉरेंसिक</strong></h2>\n<h3 data-start=\"1278\" data-end=\"1308\">🔹 Mandatory Videography</h3>\n<ul data-start=\"1309\" data-end=\"1434\">\n<li data-start=\"1309\" data-end=\"1356\">\n<p data-start=\"1311\" data-end=\"1356\">Search &amp; seizure <strong data-start=\"1328\" data-end=\"1354\">must be video-recorded</strong></p>\n</li>\n<li data-start=\"1357\" data-end=\"1434\">\n<p data-start=\"1359\" data-end=\"1434\">No videography &rarr; <strong data-start=\"1376\" data-end=\"1399\">Chargesheet invalid</strong><br data-start=\"1399\" data-end=\"1402\" />तलाशी/जब्ती का वीडियो अनिवार्य</p>\n</li>\n</ul>\n<h3 data-start=\"1436\" data-end=\"1484\">🔹 Mandatory Forensic Investigation (BNSS)</h3>\n<ul data-start=\"1485\" data-end=\"1609\">\n<li data-start=\"1485\" data-end=\"1526\">\n<p data-start=\"1487\" data-end=\"1526\">Offences with <strong data-start=\"1501\" data-end=\"1524\">7+ years punishment</strong></p>\n</li>\n<li data-start=\"1527\" data-end=\"1609\">\n<p data-start=\"1529\" data-end=\"1609\">Forensic experts must visit crime scene<br data-start=\"1568\" data-end=\"1571\" />7+ वर्ष के अपराध &rarr; फॉरेंसिक अनिवार्य</p>\n</li>\n</ul>\n<h3 data-start=\"1611\" data-end=\"1632\">🔹 E-Procedures</h3>\n<ul data-start=\"1633\" data-end=\"1746\">\n<li data-start=\"1633\" data-end=\"1688\">\n<p data-start=\"1635\" data-end=\"1688\"><strong data-start=\"1635\" data-end=\"1655\">E-FIR &amp; Zero FIR</strong> via <strong data-start=\"1660\" data-end=\"1669\">CCTNS</strong> (multi-language)</p>\n</li>\n<li data-start=\"1689\" data-end=\"1746\">\n<p data-start=\"1691\" data-end=\"1746\"><strong data-start=\"1691\" data-end=\"1734\">Digital Evidence = Documentary Evidence</strong> (BNS + BSA)</p>\n</li>\n</ul>\n<hr data-start=\"1748\" data-end=\"1751\" />\n<h2 data-start=\"1753\" data-end=\"1808\">🖥️ <strong data-start=\"1760\" data-end=\"1808\">3. Government Digital Initiatives (NIC Apps)</strong></h2>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1810\" data-end=\"2109\">\n<thead data-start=\"1810\" data-end=\"1865\">\n<tr data-start=\"1810\" data-end=\"1865\">\n<th data-start=\"1810\" data-end=\"1825\" data-col-size=\"sm\">App / System</th>\n<th data-start=\"1825\" data-end=\"1845\" data-col-size=\"sm\">Purpose (English)</th>\n<th data-start=\"1845\" data-end=\"1865\" data-col-size=\"sm\">उद्देश्य (Hindi)</th>\n</tr>\n</thead>\n<tbody data-start=\"1880\" data-end=\"2109\">\n<tr data-start=\"1880\" data-end=\"1943\">\n<td data-start=\"1880\" data-end=\"1896\" data-col-size=\"sm\"><strong data-start=\"1882\" data-end=\"1895\">E-Sakshya</strong></td>\n<td data-start=\"1896\" data-end=\"1925\" data-col-size=\"sm\">Digital evidence recording</td>\n<td data-start=\"1925\" data-end=\"1943\" data-col-size=\"sm\">डिजिटल साक्ष्य</td>\n</tr>\n<tr data-start=\"1944\" data-end=\"1990\">\n<td data-start=\"1944\" data-end=\"1959\" data-col-size=\"sm\"><strong data-start=\"1946\" data-end=\"1958\">E-Summon</strong></td>\n<td data-start=\"1959\" data-end=\"1976\" data-col-size=\"sm\">Online summons</td>\n<td data-start=\"1976\" data-end=\"1990\" data-col-size=\"sm\">ऑनलाइन समन</td>\n</tr>\n<tr data-start=\"1991\" data-end=\"2039\">\n<td data-start=\"1991\" data-end=\"2010\" data-col-size=\"sm\"><strong data-start=\"1993\" data-end=\"2009\">Nyaya Shruti</strong></td>\n<td data-start=\"2010\" data-end=\"2027\" data-col-size=\"sm\">E-Trial system</td>\n<td data-start=\"2027\" data-end=\"2039\" data-col-size=\"sm\">ई-ट्रायल</td>\n</tr>\n<tr data-start=\"2040\" data-end=\"2109\">\n<td data-start=\"2040\" data-end=\"2052\" data-col-size=\"sm\"><strong data-start=\"2042\" data-end=\"2051\">CCTNS</strong></td>\n<td data-start=\"2052\" data-end=\"2080\" data-col-size=\"sm\">Police&ndash;Court connectivity</td>\n<td data-start=\"2080\" data-end=\"2109\" data-col-size=\"sm\">14,000 PS + 22,000 Courts</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Q. Regarding the transition from the old (IPC/CrPC) to the new (BNS/BNSS) criminal laws, which of the following statements is INCORRECT?</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"137\">(पुराने (IPC/CrPC) से नए (BNS/BNSS) आपराधिक कानूनों में संक्रमण के संबंध में, निम्नलिखित में से कौन सा कथन गलत है?)</strong></p>\n<ul data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">A)</strong> If an offence occurred before <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"33\">July 1, 2024</strong>, the substantive law applicable will be the <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"90\">IPC, 1860</strong>. <em data-path-to-node=\"13,0,0\" data-index-in-node=\"101\">(यदि कोई अपराध <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"116\">1 जुलाई, 2024</strong> से पहले हुआ है, तो लागू होने वाला मूल कानून <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"174\">IPC, 1860</strong> होगा।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">B)</strong> Procedural laws like the <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"28\">BNSS</strong> apply to all trials and investigations, regardless of when the offence occurred. <em data-path-to-node=\"13,1,0\" data-index-in-node=\"114\">(<strong data-path-to-node=\"13,1,0\" data-index-in-node=\"115\">BNSS</strong> जैसे प्रक्रियात्मक कानून सभी मुकदमों और जांचों पर लागू होते हैं, चाहे अपराध कभी भी हुआ हो।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">C)</strong> Pending cases under the IPC will be immediately converted to BNS sections to ensure a faster trial. <em data-path-to-node=\"13,2,0\" data-index-in-node=\"103\">(IPC के तहत लंबित मामलों को त्वरित सुनवाई सुनिश्चित करने के लिए तुरंत BNS धाराओं में परिवर्तित कर दिया जाएगा।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">D)</strong> States have the authority to make specific amendments to the provisions of the <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"82\">BNSS</strong>. <em data-path-to-node=\"13,3,0\" data-index-in-node=\"88\">(राज्यों के पास <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"104\">BNSS</strong> के प्रावधानों में विशिष्ट संशोधन करने का अधिकार है।)</em></p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Answer (उत्तर): C</strong></p>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"15,0\" data-index-in-node=\"0\">Explanation:</strong>&nbsp;Pending cases continue under the old laws (<strong data-path-to-node=\"15,0\" data-index-in-node=\"56\">IPC/CrPC</strong>) until disposal; they are not retroactively re-labeled under BNS to avoid legal confusion. (<strong data-path-to-node=\"15,0\" data-index-in-node=\"157\">व्याख्या:</strong>&nbsp;IPC/CrPC के तहत लंबित मामले निपटान तक पुराने कानूनों के तहत ही चलते रहेंगे; कानूनी भ्रम से बचने के लिए उन्हें BNS के तहत दोबारा लेबल नहीं किया जाता है।)</p>\n<p data-path-to-node=\"14\"></p>\n<h2 data-start=\"2116\" data-end=\"2175\">⏱️ <strong data-start=\"2122\" data-end=\"2175\">4. Speedy Justice Timelines (BNSS) | त्वरित न्याय</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2177\" data-end=\"2580\">\n<thead data-start=\"2177\" data-end=\"2201\">\n<tr data-start=\"2177\" data-end=\"2201\">\n<th data-start=\"2177\" data-end=\"2189\" data-col-size=\"sm\">Procedure</th>\n<th data-start=\"2189\" data-end=\"2201\" data-col-size=\"sm\">Timeline</th>\n</tr>\n</thead>\n<tbody data-start=\"2212\" data-end=\"2580\">\n<tr data-start=\"2212\" data-end=\"2267\">\n<td data-start=\"2212\" data-end=\"2252\" data-col-size=\"sm\">Preliminary enquiry (3&ndash;7 yrs offence)</td>\n<td data-start=\"2252\" data-end=\"2267\" data-col-size=\"sm\"><strong data-start=\"2254\" data-end=\"2265\">14 days</strong></td>\n</tr>\n<tr data-start=\"2268\" data-end=\"2330\">\n<td data-start=\"2268\" data-end=\"2284\" data-col-size=\"sm\">Investigation</td>\n<td data-start=\"2284\" data-end=\"2330\" data-col-size=\"sm\"><strong data-start=\"2286\" data-end=\"2297\">90 days</strong> (Women/Children: <strong data-start=\"2315\" data-end=\"2327\">2 months</strong>)</td>\n</tr>\n<tr data-start=\"2331\" data-end=\"2384\">\n<td data-start=\"2331\" data-end=\"2369\" data-col-size=\"sm\">Document supply to accused &amp; victim</td>\n<td data-start=\"2369\" data-end=\"2384\" data-col-size=\"sm\"><strong data-start=\"2371\" data-end=\"2382\">14 days</strong></td>\n</tr>\n<tr data-start=\"2385\" data-end=\"2421\">\n<td data-start=\"2385\" data-end=\"2406\" data-col-size=\"sm\">Framing of charges</td>\n<td data-start=\"2406\" data-end=\"2421\" data-col-size=\"sm\"><strong data-start=\"2408\" data-end=\"2419\">60 days</strong></td>\n</tr>\n<tr data-start=\"2422\" data-end=\"2462\">\n<td data-start=\"2422\" data-end=\"2447\" data-col-size=\"sm\">Judgment pronouncement</td>\n<td data-start=\"2447\" data-end=\"2462\" data-col-size=\"sm\"><strong data-start=\"2449\" data-end=\"2460\">45 days</strong></td>\n</tr>\n<tr data-start=\"2463\" data-end=\"2499\">\n<td data-start=\"2463\" data-end=\"2485\" data-col-size=\"sm\">Rape medical report</td>\n<td data-col-size=\"sm\" data-start=\"2485\" data-end=\"2499\"><strong data-start=\"2487\" data-end=\"2497\">7 days</strong></td>\n</tr>\n<tr data-start=\"2500\" data-end=\"2533\">\n<td data-start=\"2500\" data-end=\"2515\" data-col-size=\"sm\">Adjournments</td>\n<td data-start=\"2515\" data-end=\"2533\" data-col-size=\"sm\"><strong data-start=\"2517\" data-end=\"2531\">Max 2 only</strong></td>\n</tr>\n<tr data-start=\"2534\" data-end=\"2580\">\n<td data-start=\"2534\" data-end=\"2550\" data-col-size=\"sm\">Summary trial</td>\n<td data-start=\"2550\" data-end=\"2580\" data-col-size=\"sm\">Expanded (&le;3 yrs offences)</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2582\" data-end=\"2585\" />\n<h2 data-start=\"2587\" data-end=\"2642\">👩&zwj;⚖️ <strong data-start=\"2596\" data-end=\"2642\">5. Victim &amp; Citizen Rights | पीड़ित अधिकार</strong></h2>\n<ul data-start=\"2644\" data-end=\"3030\">\n<li data-start=\"2644\" data-end=\"2680\">\n<p data-start=\"2646\" data-end=\"2680\">FIR &amp; chargesheet copy to victim</p>\n</li>\n<li data-start=\"2681\" data-end=\"2724\">\n<p data-start=\"2683\" data-end=\"2724\">Investigation update within <strong data-start=\"2711\" data-end=\"2722\">90 days</strong></p>\n</li>\n<li data-start=\"2725\" data-end=\"2782\">\n<p data-start=\"2727\" data-end=\"2782\">Victim must be heard before withdrawal (BNSS Sec 360)</p>\n</li>\n<li data-start=\"2783\" data-end=\"2822\">\n<p data-start=\"2785\" data-end=\"2822\">Witness Protection Scheme mandatory</p>\n</li>\n<li data-start=\"2823\" data-end=\"2870\">\n<p data-start=\"2825\" data-end=\"2870\">Free medical treatment for women &amp; children</p>\n</li>\n<li data-start=\"2871\" data-end=\"2967\">\n<p data-start=\"2873\" data-end=\"2967\">Exempted from police station visit:<br data-start=\"2908\" data-end=\"2911\" /><strong data-start=\"2913\" data-end=\"2965\">Women, &lt;15 yrs, &gt;60 yrs, disabled, seriously ill</strong></p>\n</li>\n<li data-start=\"2968\" data-end=\"3030\">\n<p data-start=\"2970\" data-end=\"3030\">Reduced arrests: No arrest only for handwriting/voice sample</p>\n</li>\n</ul>\n<hr data-start=\"3032\" data-end=\"3035\" />\n<h2 data-start=\"3037\" data-end=\"3084\">⚖️ <strong data-start=\"3043\" data-end=\"3084\">6. New Offences &amp; Harsher Punishments</strong></h2>\n<ul data-start=\"3086\" data-end=\"3376\">\n<li data-start=\"3086\" data-end=\"3182\">\n<p data-start=\"3088\" data-end=\"3182\"><strong data-start=\"3088\" data-end=\"3103\">New Crimes:</strong> Terrorism, Mob Lynching, Organized Crime,<br data-start=\"3145\" data-end=\"3148\" />Petty Organized Crime, Snatching</p>\n</li>\n<li data-start=\"3184\" data-end=\"3250\">\n<p data-start=\"3186\" data-end=\"3250\"><strong data-start=\"3186\" data-end=\"3216\">Mob Lynching (5+ persons):</strong><br data-start=\"3216\" data-end=\"3219\" /><strong data-start=\"3221\" data-end=\"3250\">Death / Life Imprisonment</strong></p>\n</li>\n<li data-start=\"3252\" data-end=\"3314\">\n<p data-start=\"3254\" data-end=\"3314\"><strong data-start=\"3254\" data-end=\"3282\">Using Children in Crime:</strong><br data-start=\"3282\" data-end=\"3285\" /><strong data-start=\"3287\" data-end=\"3314\">7&ndash;10 years imprisonment</strong></p>\n</li>\n<li data-start=\"3316\" data-end=\"3376\">\n<p data-start=\"3318\" data-end=\"3376\"><strong data-start=\"3318\" data-end=\"3335\">Repeat Theft:</strong><br data-start=\"3335\" data-end=\"3338\" /><strong data-start=\"3340\" data-end=\"3376\">1 to 5 years (minimum mandatory)</strong></p>\n</li>\n</ul>\n<hr data-start=\"3378\" data-end=\"3381\" />\n<h2 data-start=\"3383\" data-end=\"3438\">🔄 <strong data-start=\"3389\" data-end=\"3438\">7. Reformative Measures | सुधारात्मक प्रावधान</strong></h2>\n<ul data-start=\"3440\" data-end=\"3568\">\n<li data-start=\"3440\" data-end=\"3484\">\n<p data-start=\"3442\" data-end=\"3484\"><strong data-start=\"3442\" data-end=\"3463\">Community Service</strong> for petty offences</p>\n</li>\n<li data-start=\"3485\" data-end=\"3568\">\n<p data-start=\"3487\" data-end=\"3568\"><strong data-start=\"3487\" data-end=\"3511\">First-time offender:</strong><br data-start=\"3511\" data-end=\"3514\" />Property &lt; ₹5000 + returned &rarr; only community service</p>\n</li>\n</ul>\n<h3 data-start=\"3570\" data-end=\"3612\">🔹 Undertrial Release (BNSS Sec 479)</h3>\n<ul data-start=\"3613\" data-end=\"3767\">\n<li data-start=\"3613\" data-end=\"3677\">\n<p data-start=\"3615\" data-end=\"3677\">First-time offender + served <strong data-start=\"3644\" data-end=\"3660\">1/3 sentence</strong> &rarr; bond release</p>\n</li>\n<li data-start=\"3678\" data-end=\"3712\">\n<p data-start=\"3680\" data-end=\"3712\">Jail Superintendent must apply</p>\n</li>\n<li data-start=\"3713\" data-end=\"3767\">\n<p data-start=\"3715\" data-end=\"3767\"><strong data-start=\"3715\" data-end=\"3733\">Supreme Court:</strong> Retrospective application allowed</p>\n</li>\n</ul>\n<h3 data-start=\"3769\" data-end=\"3793\">🔹 Plea Bargaining</h3>\n<ul data-start=\"3794\" data-end=\"3877\">\n<li data-start=\"3794\" data-end=\"3840\">\n<p data-start=\"3796\" data-end=\"3840\">Apply within <strong data-start=\"3809\" data-end=\"3838\">30 days of charge framing</strong></p>\n</li>\n<li data-start=\"3841\" data-end=\"3877\">\n<p data-start=\"3843\" data-end=\"3877\">Sentence reduction: <strong data-start=\"3863\" data-end=\"3877\">1/4 or 1/6</strong></p>\n</li>\n</ul>\n<h3 data-start=\"3879\" data-end=\"3905\">🔹 Trial in Absentia</h3>\n<p data-path-to-node=\"14\"></p>\n<ul data-start=\"3906\" data-end=\"3966\">\n<li data-start=\"3906\" data-end=\"3966\">\n<p data-start=\"3908\" data-end=\"3966\">Declared fugitives can be <strong data-start=\"3934\" data-end=\"3955\">tried &amp; sentenced</strong> in absence</p>\n</li>\n</ul>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Q. With reference to the reformative measures and rights introduced in the BNS and BNSS, consider the following statements:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(BNS और BNSS में पेश किए गए सुधारात्मक उपायों और अधिकारों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</p>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"20\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Undertrial Release: First-time offenders (non-life/death cases) must be released on bond after serving one-third of the maximum sentence.</p>\n<p style=\"line-height: 1.15 !important;\">(विचाराधीन कैदियों की रिहाई: पहली बार अपराध करने वालों को अधिकतम सजा का एक-तिहाई पूरा करने के बाद बांड पर रिहा किया जाना चाहिए।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Community Service: This has been introduced as a punishment for petty thefts where the stolen property is worth less than ₹5,000 and is returned.</p>\n<p style=\"line-height: 1.15 !important;\">(सामुदायिक सेवा: इसे उन छोटी चोरियों के लिए दंड के रूप में पेश किया गया है जहाँ चोरी की संपत्ति ₹5,000 से कम मूल्य की है और वापस कर दी गई है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Victim&rsquo;s Right to be Heard: A prosecution cannot be withdrawn without hearing the victim first (under Section 360 of BNSS).</p>\n<p style=\"line-height: 1.15 !important;\">(पीड़ित की सुनवाई का अधिकार: पीड़ित को सुने बिना अभियोजन वापस नहीं लिया जा सकता।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Summary Trial: The scope of summary trials is expanded to include all offences punishable up to 3 years.</p>\n<p style=\"line-height: 1.15 !important;\">(संक्षिप्त सुनवाई: संक्षिप्त सुनवाई का दायरा बढ़ाकर 3 वर्ष तक के दंडनीय सभी अपराधों को शामिल किया गया है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"21\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"22,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"22,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"23\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23\" data-index-in-node=\"0\">Answer (उत्तर): D</strong></p>\n<hr style=\"width: 1138.39px; margin-top: 0px !important; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\" data-path-to-node=\"24\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25\" data-index-in-node=\"0\">Final Revision Summary Table:</strong></h3>\n<p></p>\n<p data-path-to-node=\"27\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<p></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Timeline / Detail</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,1,0,0\" data-index-in-node=\"0\">Preliminary Enquiry</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,1,1,0\">Must be completed within&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,1,1,0\" data-index-in-node=\"25\">14 days</strong>.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,2,0,0\" data-index-in-node=\"0\">Medical Report (Rape)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,2,1,0\">Doctor must submit to IO within&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,2,1,0\" data-index-in-node=\"32\">7 days</strong>.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,3,0,0\" data-index-in-node=\"0\">Judgment Delivery</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,3,1,0\">Within&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,3,1,0\" data-index-in-node=\"7\">45 days</strong>&nbsp;of concluding arguments.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,4,0,0\" data-index-in-node=\"0\">Zero FIR</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26,4,1,0\">Can be filed anywhere; transferred to jurisdictional station later.</span></td>\n</tr>\n</tbody>\n</table>\n<h2 data-start=\"3973\" data-end=\"4021\"><strong data-start=\"3979\" data-end=\"4021\">&nbsp;Key Issues &amp; Challenges | चुनौतियाँ</strong></h2>\n<ul data-start=\"4023\" data-end=\"4377\">\n<li data-start=\"4023\" data-end=\"4124\">\n<p data-start=\"4025\" data-end=\"4124\"><strong data-start=\"4025\" data-end=\"4054\">Police Custody Expansion:</strong><br data-start=\"4054\" data-end=\"4057\" />15 days custody within first 40&ndash;60 days (no justification needed)</p>\n</li>\n<li data-start=\"4126\" data-end=\"4187\">\n<p data-start=\"4128\" data-end=\"4187\"><strong data-start=\"4128\" data-end=\"4150\">Handcuffs Allowed:</strong><br data-start=\"4150\" data-end=\"4153\" />Against Supreme Court guidelines</p>\n</li>\n<li data-start=\"4189\" data-end=\"4245\">\n<p data-start=\"4191\" data-end=\"4245\"><strong data-start=\"4191\" data-end=\"4214\">Limited Bail Scope:</strong><br data-start=\"4214\" data-end=\"4217\" />May slow jail decongestion</p>\n</li>\n<li data-start=\"4247\" data-end=\"4303\">\n<p data-start=\"4249\" data-end=\"4303\"><strong data-start=\"4249\" data-end=\"4267\">Legal Overlap:</strong><br data-start=\"4267\" data-end=\"4270\" />With existing public order laws</p>\n</li>\n<li data-start=\"4305\" data-end=\"4377\">\n<p data-start=\"4307\" data-end=\"4377\"><strong data-start=\"4307\" data-end=\"4330\">Infrastructure Gap:</strong><br data-start=\"4330\" data-end=\"4333\" />Weak digital, forensic &amp; manpower capacity</p>\n</li>\n</ul>\n<hr data-start=\"4379\" data-end=\"4382\" />\n<h2 data-start=\"4384\" data-end=\"4430\">🧠 <strong data-start=\"4390\" data-end=\"4428\">ONE-LINE EXAM TAKEAWAY (PYQ STYLE)</strong></h2>\n<p></p>\n<blockquote data-start=\"4431\" data-end=\"4613\">\n<p data-start=\"4433\" data-end=\"4613\"><strong data-start=\"4433\" data-end=\"4613\">India&rsquo;s new criminal laws prioritize technology, victim rights, speedy justice, and reformative punishment while replacing the colonial framework with a citizen-centric system.</strong></p>\n</blockquote>",
