    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the transition of criminal laws in India, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"98\">(भारत में आपराधिक कानूनों के संक्रमण के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">Bharatiya Nyaya Sanhita (BNS)</strong> replaces the IPC 1860, while the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"67\">Bharatiya Nagarik Suraksha Sanhita (BNSS)</strong> replaces the CrPC 1973. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"133\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"134\">भारतीय न्याय संहिता (BNS)</strong> IPC 1860 का स्थान लेती है, जबकि <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"192\">भारतीय नागरिक सुरक्षा संहिता (BNSS)</strong> CrPC 1973 का स्थान लेती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">Bharatiya Sakshya Adhiniyam (BSA)</strong> is the new evidence law that replaces the Indian Evidence Act of 1872. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"109\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"110\">भारतीय साक्ष्य अधिनियम (BSA)</strong> नया साक्ष्य कानून है जो 1872 के भारतीय साक्ष्य अधिनियम का स्थान लेता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The foundation of the colonial IPC was laid by the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"51\">1st Law Commission (1834)</strong> chaired by <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"88\">Thomas Babington Macaulay</strong>. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"115\">(औपनिवेशिक IPC की नींव <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"138\">थॉमस बैबिंगटन मैकाले</strong> की अध्यक्षता में <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"176\">प्रथम विधि आयोग (1834)</strong> द्वारा रखी गई थी।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">All three new criminal laws came into effective implementation from <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"68\">January 26, 2024</strong>. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"86\">(तीनों नए आपराधिक कानून <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"110\">26 जनवरी, 2024</strong> से प्रभावी रूप से लागू हुए।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<p>&nbsp;Statement 4 is incorrect. The three laws came into effect on <strong data-path-to-node=\"9,0\" data-index-in-node=\"82\">July 1, 2024</strong>, not January. (<strong data-path-to-node=\"9,0\" data-index-in-node=\"110\">महत्वपूर्ण सुधार:</strong> कथन 4 गलत है। तीनों कानून <strong data-path-to-node=\"9,0\" data-index-in-node=\"154\">1 जुलाई, 2024</strong> से प्रभावी हुए, न कि जनवरी से।)</p>\n<h2 style=\"text-align: center;\" data-start=\"119\" data-end=\"146\">🔹 <strong data-start=\"125\" data-end=\"146\">Overview / अवलोकन</strong></h2>\n<p data-start=\"148\" data-end=\"385\"><strong data-start=\"148\" data-end=\"280\">India has replaced its colonial-era criminal justice framework with three modern laws, collectively called the &ldquo;Three Sanhitas&rdquo;.</strong><br data-start=\"280\" data-end=\"283\" /><strong data-start=\"283\" data-end=\"385\">भारत ने औपनिवेशिक आपराधिक कानूनों को तीन नए आधुनिक कानूनों (तीन संहिताएँ) से प्रतिस्थापित किया है।</strong></p>\n<p data-start=\"387\" data-end=\"425\">👉 <strong data-start=\"390\" data-end=\"423\">Core Objective / मूल उद्देश्य</strong></p>\n<ul data-start=\"426\" data-end=\"633\">\n<li data-start=\"426\" data-end=\"491\">\n<p data-start=\"428\" data-end=\"491\">Shift from <strong data-start=\"439\" data-end=\"459\">Punishment (दंड)</strong> &rarr; <strong data-start=\"462\" data-end=\"489\">Justice (न्याय / Nyaya)</strong></p>\n</li>\n<li data-start=\"492\" data-end=\"562\">\n<p data-start=\"494\" data-end=\"562\">Remove colonial mindset (400+ references to British Crown earlier)</p>\n</li>\n<li data-start=\"563\" data-end=\"633\">\n<p data-start=\"565\" data-end=\"633\">Citizen-centric, technology-driven, victim-oriented justice system</p>\n</li>\n</ul>\n<hr data-start=\"635\" data-end=\"638\" />\n<h2 data-start=\"640\" data-end=\"690\">🔹 <strong data-start=\"646\" data-end=\"690\">1. The Three Sanhitas (नए आपराधिक कानून)</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"692\" data-end=\"1294\">\n<thead data-start=\"692\" data-end=\"795\">\n<tr data-start=\"692\" data-end=\"795\">\n<th data-start=\"692\" data-end=\"715\" data-col-size=\"sm\"><strong data-start=\"694\" data-end=\"714\">Old Colonial Law</strong></th>\n<th data-start=\"715\" data-end=\"736\" data-col-size=\"md\"><strong data-start=\"717\" data-end=\"735\">New Law (2023)</strong></th>\n<th data-start=\"736\" data-end=\"758\" data-col-size=\"md\"><strong data-start=\"738\" data-end=\"757\">Nature / प्रकार</strong></th>\n<th data-start=\"758\" data-end=\"795\" data-col-size=\"sm\"><strong data-start=\"760\" data-end=\"793\">Effective Date / प्रभावी तिथि</strong></th>\n</tr>\n</thead>\n<tbody data-start=\"814\" data-end=\"1294\">\n<tr data-start=\"814\" data-end=\"959\">\n<td data-start=\"814\" data-end=\"846\" data-col-size=\"sm\">Indian Penal Code (IPC), 1860</td>\n<td data-col-size=\"md\" data-start=\"846\" data-end=\"882\"><strong data-start=\"848\" data-end=\"881\">Bharatiya Nyaya Sanhita (BNS)</strong></td>\n<td data-col-size=\"md\" data-start=\"882\" data-end=\"940\">Substantive Law (Crime &amp; Punishment) <br />(अपराध व दंड)</td>\n<td data-col-size=\"sm\" data-start=\"940\" data-end=\"959\"><strong data-start=\"942\" data-end=\"957\">1 July 2024</strong></td>\n</tr>\n<tr data-start=\"960\" data-end=\"1145\">\n<td data-start=\"960\" data-end=\"999\" data-col-size=\"sm\">Criminal Procedure Code (CrPC), 1973</td>\n<td data-start=\"999\" data-end=\"1047\" data-col-size=\"md\"><strong data-start=\"1001\" data-end=\"1046\">Bharatiya Nagarik Suraksha Sanhita (BNSS)</strong></td>\n<td data-start=\"1047\" data-end=\"1126\" data-col-size=\"md\">Procedural Law (Investigation, Arrest, Trial) <br />(जांच, गिरफ्तारी, विचारण)</td>\n<td data-col-size=\"sm\" data-start=\"1126\" data-end=\"1145\"><strong data-start=\"1128\" data-end=\"1143\">1 July 2024</strong></td>\n</tr>\n<tr data-start=\"1146\" data-end=\"1294\">\n<td data-start=\"1146\" data-end=\"1180\" data-col-size=\"sm\">Indian Evidence Act (IEA), 1872</td>\n<td data-col-size=\"md\" data-start=\"1180\" data-end=\"1220\"><strong data-start=\"1182\" data-end=\"1219\">Bharatiya Sakshya Adhiniyam (BSA)</strong></td>\n<td data-col-size=\"md\" data-start=\"1220\" data-end=\"1275\">Evidence Law (Proof &amp; Evidence) <br />(साक्ष्य कानून)</td>\n<td data-col-size=\"sm\" data-start=\"1275\" data-end=\"1294\"><strong data-start=\"1277\" data-end=\"1292\">1 July 2024</strong></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"1296\" data-end=\"1350\">📌 <strong data-start=\"1299\" data-end=\"1312\">PYQ Line:</strong> <em data-start=\"1313\" data-end=\"1350\">IPC &rarr; BNS | CrPC &rarr; BNSS | IEA &rarr; BSA</em></p>\n<hr data-start=\"1352\" data-end=\"1355\" />\n<h2 data-start=\"1357\" data-end=\"1409\">🔹 <strong data-start=\"1363\" data-end=\"1409\">2. Historical Context / ऐतिहासिक पृष्ठभूमि</strong></h2>\n<h3 data-start=\"1411\" data-end=\"1458\"><strong data-start=\"1415\" data-end=\"1458\">Before Codification / संहिताकरण से पहले</strong></h3>\n<ul data-start=\"1459\" data-end=\"1621\">\n<li data-start=\"1459\" data-end=\"1542\">\n<p data-start=\"1461\" data-end=\"1489\">Criminal laws were based on:</p>\n<ul data-start=\"1492\" data-end=\"1542\">\n<li data-start=\"1492\" data-end=\"1505\">\n<p data-start=\"1494\" data-end=\"1505\">Hindu Law</p>\n</li>\n<li data-start=\"1508\" data-end=\"1522\">\n<p data-start=\"1510\" data-end=\"1522\">Muslim Law</p>\n</li>\n<li data-start=\"1525\" data-end=\"1542\">\n<p data-start=\"1527\" data-end=\"1542\">Local customs</p>\n</li>\n</ul>\n</li>\n<li data-start=\"1543\" data-end=\"1586\">\n<p data-start=\"1545\" data-end=\"1586\">Result: <strong data-start=\"1553\" data-end=\"1584\">Inconsistency &amp; uncertainty</strong></p>\n</li>\n<li data-start=\"1587\" data-end=\"1621\">\n<p data-start=\"1589\" data-end=\"1621\">परिणाम: <strong data-start=\"1597\" data-end=\"1621\">असमानता और अस्पष्टता</strong></p>\n</li>\n</ul>\n<h3 data-start=\"1623\" data-end=\"1676\"><strong data-start=\"1627\" data-end=\"1676\">Need for Codification / संहिताकरण की आवश्यकता</strong></h3>\n<ul data-start=\"1677\" data-end=\"1752\">\n<li data-start=\"1677\" data-end=\"1701\">\n<p data-start=\"1679\" data-end=\"1701\">Uniform criminal law</p>\n</li>\n<li data-start=\"1702\" data-end=\"1721\">\n<p data-start=\"1704\" data-end=\"1721\">Legal certainty</p>\n</li>\n<li data-start=\"1722\" data-end=\"1752\">\n<p data-start=\"1724\" data-end=\"1752\">Centralized administration</p>\n</li>\n</ul>\n<hr data-start=\"1754\" data-end=\"1757\" />\n<h2 data-start=\"1759\" data-end=\"1812\">🔹 <strong data-start=\"1765\" data-end=\"1810\">3. Law Commissions &amp; Criminal Code Reform</strong></h2>\n<h3 data-start=\"1813\" data-end=\"1853\"><strong data-start=\"1817\" data-end=\"1853\">विधि आयोग और आपराधिक कानून सुधार</strong></h3>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1855\" data-end=\"2175\">\n<thead data-start=\"1855\" data-end=\"1911\">\n<tr data-start=\"1855\" data-end=\"1911\">\n<th data-start=\"1855\" data-end=\"1876\" data-col-size=\"sm\"><strong data-start=\"1857\" data-end=\"1875\">Law Commission</strong></th>\n<th data-start=\"1876\" data-end=\"1887\" data-col-size=\"sm\"><strong data-start=\"1878\" data-end=\"1886\">Year</strong></th>\n<th data-start=\"1887\" data-end=\"1911\" data-col-size=\"md\"><strong data-start=\"1889\" data-end=\"1909\">Key Role / महत्व</strong></th>\n</tr>\n</thead>\n<tbody data-start=\"1926\" data-end=\"2175\">\n<tr data-start=\"1926\" data-end=\"2009\">\n<td data-start=\"1926\" data-end=\"1951\" data-col-size=\"sm\"><strong data-start=\"1928\" data-end=\"1950\">1st Law Commission</strong></td>\n<td data-start=\"1951\" data-end=\"1958\" data-col-size=\"sm\">1834</td>\n<td data-start=\"1958\" data-end=\"2009\" data-col-size=\"md\">Chaired by <strong data-start=\"1971\" data-end=\"1988\">T.B. Macaulay</strong>; foundation of IPC</td>\n</tr>\n<tr data-start=\"2010\" data-end=\"2061\">\n<td data-start=\"2010\" data-end=\"2031\" data-col-size=\"sm\">2nd Law Commission</td>\n<td data-start=\"2031\" data-end=\"2038\" data-col-size=\"sm\">1853</td>\n<td data-start=\"2038\" data-end=\"2061\" data-col-size=\"md\">Review &amp; refinement</td>\n</tr>\n<tr data-start=\"2062\" data-end=\"2115\">\n<td data-start=\"2062\" data-end=\"2083\" data-col-size=\"sm\">3rd Law Commission</td>\n<td data-start=\"2083\" data-end=\"2090\" data-col-size=\"sm\">1861</td>\n<td data-start=\"2090\" data-end=\"2115\" data-col-size=\"md\">Final drafting inputs</td>\n</tr>\n<tr data-start=\"2116\" data-end=\"2175\">\n<td data-start=\"2116\" data-end=\"2137\" data-col-size=\"sm\">4th Law Commission</td>\n<td data-start=\"2137\" data-end=\"2144\" data-col-size=\"sm\">1879</td>\n<td data-start=\"2144\" data-end=\"2175\" data-col-size=\"md\">Further legal consolidation</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Q. Match the new laws with their structural changes and identify the correct combination:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(नए कानूनों को उनके संरचनात्मक परिवर्तनों के साथ सुमेलित करें और सही संयोजन की पहचान करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">New Law (नया कानून)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">New Sections (नई धाराएं)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Structural Change (प्रमुख संरचनात्मक परिवर्तन)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,1,0,0\" data-index-in-node=\"0\">(A) BNS</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,1,1,0\">358</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,1,2,0\">Defines crime and punishment; 8 new crimes added. (अपराध और सजा को परिभाषित करता है)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,0,0\" data-index-in-node=\"0\">(B) BNSS</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,1,0\">531</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,2,0\">Governs investigation and arrest; focuses on victim-centric procedures. (जांच और गिरफ्तारी को नियंत्रित करता है)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,0,0\" data-index-in-node=\"0\">(C) BSA</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,1,0\">170</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,2,0\">Focuses on the admissibility of electronic and digital proof. (इलेक्ट्रॉनिक और डिजिटल साक्ष्य की स्वीकार्यता पर केंद्रित है)</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Which of the following describes the primary objective of these changes?</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(निम्नलिखित में से कौन इन परिवर्तनों के प्राथमिक उद्देश्य का वर्णन करता है?)</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,0,0\" data-index-in-node=\"0\">A)</strong> To increase the number of sections for more complexity.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0\" data-index-in-node=\"0\">B)</strong> To shift the focus from punishment (retribution) to <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0\" data-index-in-node=\"55\">justice (Nyaya)</strong> and protecting citizen rights.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,0\" data-index-in-node=\"0\">C)</strong> To maintain the colonial mindset of the British Crown.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,3,0\" data-index-in-node=\"0\">D) Only B and C.</strong></p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"18,0\"><strong data-path-to-node=\"18,0\" data-index-in-node=\"0\">Quick Revision (SSC/UPSC Tip):</strong></p>\n<ul data-path-to-node=\"18,1\">\n<li>\n<p data-path-to-node=\"18,1,0,0\"><strong data-path-to-node=\"18,1,0,0\" data-index-in-node=\"0\">BNS</strong> reduced sections from 511 to <strong data-path-to-node=\"18,1,0,0\" data-index-in-node=\"33\">358</strong>.</p>\n</li>\n<li>\n<p data-path-to-node=\"18,1,1,0\"><strong data-path-to-node=\"18,1,1,0\" data-index-in-node=\"0\">BNSS</strong> increased sections from 484 to <strong data-path-to-node=\"18,1,1,0\" data-index-in-node=\"36\">531</strong>.</p>\n</li>\n<li>\n<p data-path-to-node=\"18,1,2,0\"><strong data-path-to-node=\"18,1,2,0\" data-index-in-node=\"0\">BSA</strong> slightly increased sections from 167 to <strong data-path-to-node=\"18,1,2,0\" data-index-in-node=\"44\">170</strong>.</p>\n</li>\n</ul>\n<p data-start=\"2177\" data-end=\"2219\"></p>\n<p data-start=\"2177\" data-end=\"2219\">📌 <strong data-start=\"2180\" data-end=\"2217\">Important Facts / महत्वपूर्ण तथ्य</strong></p>\n<ul data-start=\"2220\" data-end=\"2326\">\n<li data-start=\"2220\" data-end=\"2264\">\n<p data-start=\"2222\" data-end=\"2264\"><strong data-start=\"2222\" data-end=\"2238\">IPC enacted:</strong> 1860 &rarr; enforced in 1862</p>\n</li>\n<li data-start=\"2265\" data-end=\"2298\">\n<p data-start=\"2267\" data-end=\"2298\"><strong data-start=\"2267\" data-end=\"2291\">Indian Evidence Act:</strong> 1872</p>\n</li>\n<li data-start=\"2299\" data-end=\"2326\">\n<p data-start=\"2301\" data-end=\"2326\"><strong data-start=\"2301\" data-end=\"2319\">CrPC (modern):</strong> 1973</p>\n</li>\n</ul>\n<hr data-start=\"2328\" data-end=\"2331\" />\n<h2 data-start=\"2333\" data-end=\"2386\">🔹 <strong data-start=\"2339\" data-end=\"2384\">4. Primary Objective of New Criminal Laws</strong></h2>\n<h3 data-start=\"2387\" data-end=\"2423\"><strong data-start=\"2391\" data-end=\"2423\">नए कानूनों का मुख्य उद्देश्य</strong></h3>\n<p data-start=\"2425\" data-end=\"2439\"><strong data-start=\"2425\" data-end=\"2437\">English:</strong></p>\n<ul data-start=\"2440\" data-end=\"2566\">\n<li data-start=\"2440\" data-end=\"2468\">\n<p data-start=\"2442\" data-end=\"2468\">Replace colonial mindset</p>\n</li>\n<li data-start=\"2469\" data-end=\"2497\">\n<p data-start=\"2471\" data-end=\"2497\">Justice over retribution</p>\n</li>\n<li data-start=\"2498\" data-end=\"2526\">\n<p data-start=\"2500\" data-end=\"2526\">Protect citizens&rsquo; rights</p>\n</li>\n<li data-start=\"2527\" data-end=\"2566\">\n<p data-start=\"2529\" data-end=\"2566\">Faster &amp; technology-enabled justice</p>\n</li>\n</ul>\n<p data-start=\"2568\" data-end=\"2580\"><strong data-start=\"2568\" data-end=\"2578\">हिंदी:</strong></p>\n<p></p>\n<ul data-start=\"2581\" data-end=\"2694\">\n<li data-start=\"2581\" data-end=\"2605\">\n<p data-start=\"2583\" data-end=\"2605\">औपनिवेशिक सोच का अंत</p>\n</li>\n<li data-start=\"2606\" data-end=\"2631\">\n<p data-start=\"2608\" data-end=\"2631\">दंड के स्थान पर न्याय</p>\n</li>\n<li data-start=\"2632\" data-end=\"2662\">\n<p data-start=\"2634\" data-end=\"2662\">नागरिक अधिकारों की सुरक्षा</p>\n</li>\n<li data-start=\"2663\" data-end=\"2694\">\n<p data-start=\"2665\" data-end=\"2694\">त्वरित व तकनीक आधारित न्याय</p>\n</li>\n</ul>",

    "question": "<p data-start=\"0\" data-end=\"117\"><strong data-start=\"0\" data-end=\"115\">Q. Regarding the legislative journey of India&rsquo;s new criminal laws, which of the following sequences is correct?</strong></p>\n<p data-start=\"119\" data-end=\"220\"><strong data-start=\"119\" data-end=\"220\">(भारत के नए आपराधिक कानूनों की विधायी यात्रा के संबंध में, निम्नलिखित में से कौन सा क्रम सही है?)</strong></p>\n<p data-start=\"222\" data-end=\"418\">A) <strong data-start=\"225\" data-end=\"322\">Bills Tabled (Aug 2023) &rarr; Presidential Assent (Dec 25, 2023) &rarr; Implementation (July 1, 2024).</strong><br data-start=\"322\" data-end=\"325\" />(विधेयक पेश (अगस्त 2023) &rarr; राष्ट्रपति की सहमति (25 दिसंबर 2023) &rarr; कार्यान्वयन (1 जुलाई 2024))</p>\n<p data-start=\"420\" data-end=\"609\">B) <strong data-start=\"423\" data-end=\"516\">Presidential Assent (Aug 2023) &rarr; Bills Tabled (Dec 2023) &rarr; Implementation (July 1, 2024).</strong><br data-start=\"516\" data-end=\"519\" />(राष्ट्रपति की सहमति (अगस्त 2023) &rarr; विधेयक पेश (दिसंबर 2023) &rarr; कार्यान्वयन (1 जुलाई 2024))</p>\n<p data-start=\"611\" data-end=\"795\">C) <strong data-start=\"614\" data-end=\"704\">Implementation (Dec 2023) &rarr; Bills Tabled (July 2024) &rarr; Presidential Assent (Aug 2024).</strong><br data-start=\"704\" data-end=\"707\" />(कार्यान्वयन (दिसंबर 2023) &rarr; विधेयक पेश (जुलाई 2024) &rarr; राष्ट्रपति की सहमति (अगस्त 2024))</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<p data-start=\"797\" data-end=\"822\" data-is-last-node=\"\" data-is-only-node=\"\">D) <strong data-start=\"800\" data-end=\"822\" data-is-last-node=\"\">None of the above.</strong></p>",

    "solution": "<p data-path-to-node=\"25,0\">The President of India gave assent to these three landmark bills on <strong data-path-to-node=\"25,0\" data-index-in-node=\"78\">December 25, 2023</strong> (Good Governance Day). (<strong data-path-to-node=\"25,0\" data-index-in-node=\"120\">मुख्य नोट:</strong> भारत के राष्ट्रपति ने <strong data-path-to-node=\"25,0\" data-index-in-node=\"153\">25 दिसंबर, 2023</strong> (सुशासन दिवस) को इन तीन ऐतिहासिक विधेयकों को अपनी सहमति दी थी।)</p>\n<h2 data-start=\"2701\" data-end=\"2768\"><strong data-start=\"2707\" data-end=\"2768\">&nbsp;Key Timeline of New Criminal Laws / महत्वपूर्ण समयरेखा</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2770\" data-end=\"3182\">\n<thead data-start=\"2770\" data-end=\"2821\">\n<tr data-start=\"2770\" data-end=\"2821\">\n<th data-start=\"2770\" data-end=\"2781\" data-col-size=\"sm\"><strong data-start=\"2772\" data-end=\"2780\">Date</strong></th>\n<th data-start=\"2781\" data-end=\"2793\" data-col-size=\"sm\"><strong data-start=\"2783\" data-end=\"2792\">Event</strong></th>\n<th data-start=\"2793\" data-end=\"2821\" data-col-size=\"sm\"><strong data-start=\"2795\" data-end=\"2819\">Significance / महत्व</strong></th>\n</tr>\n</thead>\n<tbody data-start=\"2836\" data-end=\"3182\">\n<tr data-start=\"2836\" data-end=\"2908\">\n<td data-start=\"2836\" data-end=\"2853\" data-col-size=\"sm\"><strong data-start=\"2838\" data-end=\"2852\">March 2020</strong></td>\n<td data-col-size=\"sm\" data-start=\"2853\" data-end=\"2880\">Reform panel constituted</td>\n<td data-col-size=\"sm\" data-start=\"2880\" data-end=\"2908\">Reform process initiated</td>\n</tr>\n<tr data-start=\"2909\" data-end=\"2984\">\n<td data-start=\"2909\" data-end=\"2924\" data-col-size=\"sm\"><strong data-start=\"2911\" data-end=\"2923\">Feb 2022</strong></td>\n<td data-col-size=\"sm\" data-start=\"2924\" data-end=\"2953\">Public suggestions invited</td>\n<td data-col-size=\"sm\" data-start=\"2953\" data-end=\"2984\">Public consultation ensured</td>\n</tr>\n<tr data-start=\"2985\" data-end=\"3057\">\n<td data-start=\"2985\" data-end=\"3000\" data-col-size=\"sm\"><strong data-start=\"2987\" data-end=\"2999\">Aug 2023</strong></td>\n<td data-start=\"3000\" data-end=\"3029\" data-col-size=\"sm\">Bills tabled in Parliament</td>\n<td data-start=\"3029\" data-end=\"3057\" data-col-size=\"sm\">Legislative introduction</td>\n</tr>\n<tr data-start=\"3058\" data-end=\"3117\">\n<td data-start=\"3058\" data-end=\"3077\" data-col-size=\"sm\"><strong data-start=\"3060\" data-end=\"3076\">Dec 25, 2023</strong></td>\n<td data-start=\"3077\" data-end=\"3099\" data-col-size=\"sm\">Presidential assent</td>\n<td data-start=\"3099\" data-end=\"3117\" data-col-size=\"sm\">Legal approval</td>\n</tr>\n<tr data-start=\"3118\" data-end=\"3182\">\n<td data-start=\"3118\" data-end=\"3136\" data-col-size=\"sm\"><strong data-start=\"3120\" data-end=\"3135\">1 July 2024</strong></td>\n<td data-col-size=\"sm\" data-start=\"3136\" data-end=\"3159\">Laws came into force</td>\n<td data-col-size=\"sm\" data-start=\"3159\" data-end=\"3182\">Full implementation</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"3184\" data-end=\"3256\">📌 <strong data-start=\"3187\" data-end=\"3208\">Prelims Favorite:</strong> <em data-start=\"3209\" data-end=\"3256\">All three laws effective from <strong data-start=\"3240\" data-end=\"3255\">1 July 2024</strong></em></p>\n<hr data-start=\"3258\" data-end=\"3261\" />\n<h2 data-start=\"3263\" data-end=\"3322\">🔹 <strong data-start=\"3269\" data-end=\"3320\">6. Structural Changes (Section-wise Comparison)</strong></h2>\n<h3 data-start=\"3323\" data-end=\"3350\"><strong data-start=\"3327\" data-end=\"3350\">संरचनात्मक परिवर्तन</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the key modernizing provisions of the new criminal laws (BNS and BNSS), consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"128\">(नए आपराधिक कानूनों (BNS और BNSS) के प्रमुख आधुनिक प्रावधानों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Mandatory Forensics:</strong> Under the BNSS, forensic investigation is now mandatory for all offenses punishable with an imprisonment of <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"129\">7 years or more</strong>. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"146\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"147\">अनिवार्य फोरेंसिक:</strong> BNSS के तहत, अब <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"182\">7 वर्ष या उससे अधिक</strong> के कारावास से दंडनीय सभी अपराधों के लिए फोरेंसिक जांच अनिवार्य है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">New Categories of Crime:</strong> The Bharatiya Nyaya Sanhita (BNS) introduces specific punishments for <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"95\">Mob Lynching</strong> and <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"112\">Terrorism</strong>, which were not explicitly defined in the IPC. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"169\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"170\">अपराधों की नई श्रेणियां:</strong> भारतीय न्याय संहिता (BNS) <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"221\">मॉब लिंचिंग</strong> और <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"236\">आतंकवाद</strong> के लिए विशिष्ट दंड पेश करती है, जो IPC में स्पष्ट रूप से परिभाषित नहीं थे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Community Service:</strong> For the first time, 'Community Service' has been introduced as a formal form of minor punishment in the criminal justice system. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"148\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"149\">सामुदायिक सेवा:</strong> पहली बार, आपराधिक न्याय प्रणाली में 'सामुदायिक सेवा' को लघु दंड के एक औपचारिक रूप में पेश किया गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Judicial Timelines:</strong> The BNSS mandates that the judgment must be pronounced within <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"82\">30 days</strong> after the conclusion of the hearing. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"127\">(<strong data-path-to-node=\"5,3,0\" data-index-in-node=\"128\">न्यायिक समयसीमा:</strong> BNSS यह अनिवार्य करता है कि सुनवाई पूरी होने के <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"193\">30 दिनों</strong> के भीतर निर्णय सुनाया जाना चाहिए।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" data-index-in-node=\"0\">Quick Revision Summary (SSC/UPSC Facts):</strong></h3>\n<p data-path-to-node=\"13\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<thead style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Provision (प्रावधान)</strong></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Detail (विवरण)</strong></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Law (कानून)</strong></td>\n</tr>\n</thead>\n<tbody style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\" data-index-in-node=\"0\">Digitization</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0\">Summons, Trials, and FIRs can be handled electronically.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,2,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,2,0\" data-index-in-node=\"0\">BNSS</strong></span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\" data-index-in-node=\"0\">Investigation</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\">Must be finalized within <strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\" data-index-in-node=\"25\">90 days</strong>.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,2,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,2,0\" data-index-in-node=\"0\">BNSS</strong></span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\" data-index-in-node=\"0\">Mob Lynching</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,1,0\">Penalty ranges from life imprisonment to death.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,2,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,2,0\" data-index-in-node=\"0\">BNS</strong></span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0,0\" data-index-in-node=\"0\">Arrest Records</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,1,0\">Police must display arrest info on an <strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,1,0\" data-index-in-node=\"38\">online platform</strong>.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,2,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,2,0\" data-index-in-node=\"0\">BNSS</strong></span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\" data-index-in-node=\"0\">Deceitful Sex</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,1,0\">Punishment for sexual exploitation by false promise of marriage.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,2,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,2,0\" data-index-in-node=\"0\">BNS</strong></span></td>\n</tr>\n</tbody>\n</table>\n<h2 data-start=\"0\" data-end=\"64\"><strong data-start=\"3\" data-end=\"62\">Key Modernising Provisions of India&rsquo;s New Criminal Laws</strong></h2>\n<h3 data-start=\"65\" data-end=\"125\"><strong data-start=\"69\" data-end=\"123\">(नए आपराधिक कानूनों के प्रमुख आधुनिकीकरण प्रावधान)</strong></h3>\n<hr data-start=\"192\" data-end=\"195\" />\n<h3 data-start=\"197\" data-end=\"249\"><strong data-start=\"201\" data-end=\"247\">1. Digitisation of Criminal Process (BNSS)</strong></h3>\n<p data-start=\"250\" data-end=\"277\"><strong data-start=\"250\" data-end=\"275\">डिजिटलीकरण (बीएनएसएस)</strong></p>\n<ul data-start=\"278\" data-end=\"614\">\n<li data-start=\"278\" data-end=\"396\">\n<p data-start=\"280\" data-end=\"396\"><strong data-start=\"280\" data-end=\"325\">Electronic FIR, search, seizure &amp; summons</strong> allowed.<br data-start=\"334\" data-end=\"337\" /><strong data-start=\"339\" data-end=\"394\">इलेक्ट्रॉनिक एफआईआर, तलाशी, जब्ती और समन की अनुमति।</strong></p>\n</li>\n<li data-start=\"397\" data-end=\"510\">\n<p data-start=\"399\" data-end=\"510\"><strong data-start=\"399\" data-end=\"421\">Video-conferencing</strong> for investigation and trial stages.<br data-start=\"457\" data-end=\"460\" /><strong data-start=\"462\" data-end=\"508\">जांच व सुनवाई के लिए वीडियो कॉन्फ्रेंसिंग।</strong></p>\n</li>\n<li data-start=\"511\" data-end=\"614\">\n<p data-start=\"513\" data-end=\"614\"><strong data-start=\"513\" data-end=\"536\">Electronic evidence</strong> given statutory recognition.<br data-start=\"565\" data-end=\"568\" /><strong data-start=\"570\" data-end=\"614\">इलेक्ट्रॉनिक साक्ष्य को वैधानिक मान्यता।</strong></p>\n</li>\n</ul>\n<hr data-start=\"616\" data-end=\"619\" />\n<h3 data-start=\"621\" data-end=\"661\"><strong data-start=\"625\" data-end=\"659\">2. New Crimes Introduced (BNS)</strong></h3>\n<p data-start=\"662\" data-end=\"685\"><strong data-start=\"662\" data-end=\"683\">नए अपराध (बीएनएस)</strong></p>\n<ul data-start=\"687\" data-end=\"1166\">\n<li data-start=\"687\" data-end=\"784\">\n<p data-start=\"689\" data-end=\"784\"><strong data-start=\"689\" data-end=\"720\">Organised Crime &amp; Terrorism</strong><br data-start=\"720\" data-end=\"723\" /><strong data-start=\"725\" data-end=\"752\">संगठित अपराध और आतंकवाद</strong> &ndash; स्पष्ट परिभाषा और कड़ी सजा।</p>\n</li>\n<li data-start=\"786\" data-end=\"981\">\n<p data-start=\"788\" data-end=\"842\"><strong data-start=\"788\" data-end=\"804\">Mob Lynching</strong><br data-start=\"804\" data-end=\"807\" /><strong data-start=\"809\" data-end=\"840\">भीड़ द्वारा हत्या (लिंचिंग)</strong></p>\n<ul data-start=\"845\" data-end=\"981\">\n<li data-start=\"845\" data-end=\"877\">\n<p data-start=\"847\" data-end=\"877\">Specific offence introduced.</p>\n</li>\n<li data-start=\"880\" data-end=\"981\">\n<p data-start=\"882\" data-end=\"981\">Maximum punishment: <strong data-start=\"902\" data-end=\"932\">Life Imprisonment or Death</strong>.<br data-start=\"933\" data-end=\"936\" /><strong data-start=\"938\" data-end=\"981\">अधिकतम सजा: आजीवन कारावास या मृत्युदंड।</strong></p>\n</li>\n</ul>\n</li>\n<li data-start=\"983\" data-end=\"1166\">\n<p data-start=\"985\" data-end=\"1075\"><strong data-start=\"985\" data-end=\"1036\">Sexual Exploitation of Women by Deceitful Means</strong><br data-start=\"1036\" data-end=\"1039\" /><strong data-start=\"1041\" data-end=\"1073\">छलपूर्वक महिलाओं का यौन शोषण</strong></p>\n<ul data-start=\"1078\" data-end=\"1166\">\n<li data-start=\"1078\" data-end=\"1166\">\n<p data-start=\"1080\" data-end=\"1166\">Explicitly defined under sexual offences.<br data-start=\"1121\" data-end=\"1124\" /><strong data-start=\"1126\" data-end=\"1166\">यौन अपराधों में स्पष्ट रूप से शामिल।</strong></p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"1168\" data-end=\"1171\" />\n<h3 data-start=\"1173\" data-end=\"1225\"><strong data-start=\"1177\" data-end=\"1223\">3. Mandatory Forensic Investigation (BNSS)</strong></h3>\n<p data-start=\"1226\" data-end=\"1265\"><strong data-start=\"1226\" data-end=\"1263\">अनिवार्य फॉरेंसिक जांच (बीएनएसएस)</strong></p>\n<ul data-start=\"1266\" data-end=\"1497\">\n<li data-start=\"1266\" data-end=\"1389\">\n<p data-start=\"1268\" data-end=\"1389\">Compulsory for offences punishable with <strong data-start=\"1308\" data-end=\"1327\">7 years or more</strong>.<br data-start=\"1328\" data-end=\"1331\" /><strong data-start=\"1333\" data-end=\"1387\">7 वर्ष या उससे अधिक सजा वाले अपराधों में अनिवार्य।</strong></p>\n</li>\n<li data-start=\"1390\" data-end=\"1497\">\n<p data-start=\"1392\" data-end=\"1497\">Aims to reduce faulty investigation &amp; wrongful acquittals.<br data-start=\"1450\" data-end=\"1453\" /><strong data-start=\"1455\" data-end=\"1497\">गलत जांच और दोषमुक्ति को कम करने हेतु।</strong></p>\n</li>\n</ul>\n<hr data-start=\"1499\" data-end=\"1502\" />\n<h3 data-start=\"1504\" data-end=\"1554\"><strong data-start=\"1508\" data-end=\"1552\">4. Community Service as Punishment (BNS)</strong></h3>\n<p data-start=\"1555\" data-end=\"1584\"><strong data-start=\"1555\" data-end=\"1582\">सामुदायिक सेवा (बीएनएस)</strong></p>\n<ul data-start=\"1585\" data-end=\"1758\">\n<li data-start=\"1585\" data-end=\"1670\">\n<p data-start=\"1587\" data-end=\"1670\">Introduced as a <strong data-start=\"1603\" data-end=\"1627\">new minor punishment</strong>.<br data-start=\"1628\" data-end=\"1631\" /><strong data-start=\"1633\" data-end=\"1668\">नई लघु सजा के रूप में जोड़ी गई।</strong></p>\n</li>\n<li data-start=\"1671\" data-end=\"1758\">\n<p data-start=\"1673\" data-end=\"1758\">Reformative &amp; restorative approach.<br data-start=\"1708\" data-end=\"1711\" /><strong data-start=\"1713\" data-end=\"1758\">सुधारात्मक और पुनर्स्थापनात्मक दृष्टिकोण।</strong></p>\n</li>\n</ul>\n<hr data-start=\"1760\" data-end=\"1763\" />\n<h3 data-start=\"1765\" data-end=\"1819\"><strong data-start=\"1769\" data-end=\"1817\">5. Faster Justice &amp; Time-Bound Trials (BNSS)</strong></h3>\n<p data-start=\"1820\" data-end=\"1865\"><strong data-start=\"1820\" data-end=\"1863\">तेज़ न्याय और समयबद्ध सुनवाई (बीएनएसएस)</strong></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1867\" data-end=\"2123\">\n<thead data-start=\"1867\" data-end=\"1912\">\n<tr data-start=\"1867\" data-end=\"1912\">\n<th data-start=\"1867\" data-end=\"1877\" data-col-size=\"sm\">Process</th>\n<th data-start=\"1877\" data-end=\"1888\" data-col-size=\"sm\">Timeline</th>\n<th data-start=\"1888\" data-end=\"1900\" data-col-size=\"sm\">प्रक्रिया</th>\n<th data-start=\"1900\" data-end=\"1912\" data-col-size=\"sm\">समय सीमा</th>\n</tr>\n</thead>\n<tbody data-start=\"1943\" data-end=\"2123\">\n<tr data-start=\"1943\" data-end=\"2019\">\n<td data-start=\"1943\" data-end=\"1973\" data-col-size=\"sm\">Completion of Investigation</td>\n<td data-start=\"1973\" data-end=\"1987\" data-col-size=\"sm\"><strong data-start=\"1975\" data-end=\"1986\">90 days</strong></td>\n<td data-start=\"1987\" data-end=\"2005\" data-col-size=\"sm\">जांच की समाप्ति</td>\n<td data-start=\"2005\" data-end=\"2019\" data-col-size=\"sm\"><strong data-start=\"2007\" data-end=\"2017\">90 दिन</strong></td>\n</tr>\n<tr data-start=\"2020\" data-end=\"2123\">\n<td data-start=\"2020\" data-end=\"2048\" data-col-size=\"sm\">Pronouncement of Judgment</td>\n<td data-col-size=\"sm\" data-start=\"2048\" data-end=\"2076\"><strong data-start=\"2050\" data-end=\"2061\">30 days</strong> after hearing</td>\n<td data-col-size=\"sm\" data-start=\"2076\" data-end=\"2091\">फैसला सुनाना</td>\n<td data-col-size=\"sm\" data-start=\"2091\" data-end=\"2123\">सुनवाई के <strong data-start=\"2103\" data-end=\"2113\">30 दिन</strong> के भीतर</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2125\" data-end=\"2128\" />\n<h3 data-start=\"2130\" data-end=\"2181\"><strong data-start=\"2134\" data-end=\"2179\">6. Arrest Information Transparency (BNSS)</strong></h3>\n<p data-start=\"2182\" data-end=\"2223\"><strong data-start=\"2182\" data-end=\"2221\">गिरफ्तारी में पारदर्शिता (बीएनएसएस)</strong></p>\n<ul data-start=\"2224\" data-end=\"2450\">\n<li data-start=\"2224\" data-end=\"2359\">\n<p data-start=\"2226\" data-end=\"2359\">Police must upload <strong data-start=\"2245\" data-end=\"2285\">arrest details on an online platform</strong>.<br data-start=\"2286\" data-end=\"2289\" /><strong data-start=\"2291\" data-end=\"2357\">पुलिस को गिरफ्तारी की जानकारी ऑनलाइन प्लेटफॉर्म पर डालनी होगी।</strong></p>\n</li>\n<li data-start=\"2360\" data-end=\"2450\">\n<p data-start=\"2362\" data-end=\"2450\">Strengthens <strong data-start=\"2374\" data-end=\"2407\">accountability &amp; transparency</strong>.<br data-start=\"2408\" data-end=\"2411\" /><strong data-start=\"2413\" data-end=\"2450\">जवाबदेही और पारदर्शिता बढ़ाता है।</strong></p>\n</li>\n</ul>\n<hr data-start=\"2452\" data-end=\"2455\" />\n<h3 data-start=\"2457\" data-end=\"2501\"><strong data-start=\"2461\" data-end=\"2499\">🔥 Prelims Super-Crux (One-Liners)</strong></h3>\n<p></p>\n<ul data-start=\"2502\" data-end=\"2805\">\n<li data-start=\"2502\" data-end=\"2628\">\n<p data-start=\"2504\" data-end=\"2628\"><strong data-start=\"2504\" data-end=\"2558\">BNSS = Technology + Speed + Victim-centric justice</strong><br data-start=\"2558\" data-end=\"2561\" /><strong data-start=\"2563\" data-end=\"2626\">बीएनएसएस = तकनीक + त्वरित न्याय + पीड़ित-केंद्रित दृष्टिकोण</strong></p>\n</li>\n<li data-start=\"2629\" data-end=\"2712\">\n<p data-start=\"2631\" data-end=\"2712\"><strong data-start=\"2631\" data-end=\"2671\">Mob Lynching = New offence under BNS</strong><br data-start=\"2671\" data-end=\"2674\" /><strong data-start=\"2676\" data-end=\"2710\">लिंचिंग = बीएनएस में नया अपराध</strong></p>\n</li>\n<li data-start=\"2713\" data-end=\"2805\">\n<p data-start=\"2715\" data-end=\"2805\"><strong data-start=\"2715\" data-end=\"2758\">Forensic mandatory &ge; 7 years punishment</strong><br data-start=\"2758\" data-end=\"2761\" /><strong data-start=\"2763\" data-end=\"2805\">7 वर्ष से अधिक सजा &rarr; फॉरेंसिक अनिवार्य</strong></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. Consider the following statements regarding the transition from IPC to BNS:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"79\">(IPC से BNS में संक्रमण के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The total number of sections has been reduced from <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"51\">511</strong> in the IPC to <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"69\">358</strong> in the BNS. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"85\">(IPC में धाराओं की कुल संख्या <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"115\">511</strong> से घटाकर BNS में <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"136\">358</strong> कर दी गई है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The BNS includes a dedicated <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"29\">Chapter V</strong> that gives top priority to crimes against women and children. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"101\">(BNS में एक समर्पित <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"121\">अध्याय V</strong> शामिल है जो महिलाओं और बच्चों के खिलाफ अपराधों को सर्वोच्च प्राथमिकता देता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The new code officially came into effect on <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"44\">January 1, 2024</strong>. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"61\">(नई संहिता आधिकारिक तौर पर <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"88\">1 जनवरी, 2024</strong> से प्रभावी हुई।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"8\"><strong data-path-to-node=\"8\" data-index-in-node=\"0\">Answer (उत्तर): A</strong></p>\n<p data-path-to-node=\"8\"><strong data-path-to-node=\"9,0\" data-index-in-node=\"0\">Note:</strong>&nbsp;The BNS became effective on&nbsp;<strong data-path-to-node=\"9,0\" data-index-in-node=\"34\">July 1, 2024</strong>. (BNS&nbsp;<strong data-path-to-node=\"9,0\" data-index-in-node=\"53\">1 जुलाई, 2024</strong>&nbsp;से प्रभावी हुआ।)</p>\n<h2 data-start=\"0\" data-end=\"44\"><strong data-start=\"3\" data-end=\"42\">Bharatiya Nyaya Sanhita (BNS), 2023</strong></h2>\n<h3 data-start=\"45\" data-end=\"89\"><strong data-start=\"49\" data-end=\"87\">भारतीय न्याय संहिता (बीएनएस), 2023</strong></h3>\n<hr data-start=\"161\" data-end=\"164\" />\n<h3 data-start=\"166\" data-end=\"190\"><strong data-start=\"170\" data-end=\"190\">Overview / परिचय</strong></h3>\n<ul data-start=\"191\" data-end=\"476\">\n<li data-start=\"191\" data-end=\"282\">\n<p data-start=\"193\" data-end=\"282\"><strong data-start=\"193\" data-end=\"206\">Replaced:</strong> Indian Penal Code (IPC), 1860<br data-start=\"236\" data-end=\"239\" /><strong data-start=\"241\" data-end=\"256\">स्थानापन्न:</strong> भारतीय दंड संहिता, 1860</p>\n</li>\n<li data-start=\"283\" data-end=\"361\">\n<p data-start=\"285\" data-end=\"361\"><strong data-start=\"285\" data-end=\"304\">Effective from:</strong> <strong data-start=\"305\" data-end=\"320\">1 July 2024</strong><br data-start=\"320\" data-end=\"323\" /><strong data-start=\"325\" data-end=\"342\">प्रभावी तिथि:</strong> <strong data-start=\"343\" data-end=\"359\">1 जुलाई 2024</strong></p>\n</li>\n<li data-start=\"362\" data-end=\"476\">\n<p data-start=\"364\" data-end=\"476\"><strong data-start=\"364\" data-end=\"384\">Core Philosophy:</strong> Shift from <strong data-start=\"396\" data-end=\"428\">Punishment &rarr; Justice (Nyaya)</strong><br data-start=\"428\" data-end=\"431\" /><strong data-start=\"433\" data-end=\"453\">मुख्य दृष्टिकोण:</strong> <strong data-start=\"454\" data-end=\"476\">दंड से न्याय की ओर</strong></p>\n</li>\n</ul>\n<hr data-start=\"478\" data-end=\"481\" />\n<h2 data-start=\"483\" data-end=\"533\"><strong data-start=\"486\" data-end=\"533\">1. Structural Changes / संरचनात्मक परिवर्तन</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"535\" data-end=\"811\">\n<thead data-start=\"535\" data-end=\"585\">\n<tr data-start=\"535\" data-end=\"585\">\n<th data-start=\"535\" data-end=\"545\" data-col-size=\"sm\">Feature</th>\n<th data-start=\"545\" data-end=\"558\" data-col-size=\"sm\">IPC (1860)</th>\n<th data-start=\"558\" data-end=\"571\" data-col-size=\"sm\">BNS (2023)</th>\n<th data-start=\"571\" data-end=\"585\" data-col-size=\"sm\">Key Change</th>\n</tr>\n</thead>\n<tbody data-start=\"616\" data-end=\"811\">\n<tr data-start=\"616\" data-end=\"665\">\n<td data-start=\"616\" data-end=\"633\" data-col-size=\"sm\">Total Sections</td>\n<td data-start=\"633\" data-end=\"639\" data-col-size=\"sm\">511</td>\n<td data-start=\"639\" data-end=\"645\" data-col-size=\"sm\">358</td>\n<td data-start=\"645\" data-end=\"665\" data-col-size=\"sm\">Laws streamlined</td>\n</tr>\n<tr data-start=\"666\" data-end=\"709\">\n<td data-start=\"666\" data-end=\"685\" data-col-size=\"sm\">Revised Sections</td>\n<td data-start=\"685\" data-end=\"689\" data-col-size=\"sm\">&ndash;</td>\n<td data-start=\"689\" data-end=\"695\" data-col-size=\"sm\">175</td>\n<td data-col-size=\"sm\" data-start=\"695\" data-end=\"709\">Modernized</td>\n</tr>\n<tr data-start=\"710\" data-end=\"753\">\n<td data-start=\"710\" data-end=\"725\" data-col-size=\"sm\">New Sections</td>\n<td data-start=\"725\" data-end=\"729\" data-col-size=\"sm\">&ndash;</td>\n<td data-start=\"729\" data-end=\"733\" data-col-size=\"sm\">8</td>\n<td data-start=\"733\" data-end=\"753\" data-col-size=\"sm\">New crimes added</td>\n</tr>\n<tr data-start=\"754\" data-end=\"811\">\n<td data-start=\"754\" data-end=\"773\" data-col-size=\"sm\">Deleted Sections</td>\n<td data-start=\"773\" data-end=\"777\" data-col-size=\"sm\">&ndash;</td>\n<td data-start=\"777\" data-end=\"782\" data-col-size=\"sm\">22</td>\n<td data-start=\"782\" data-end=\"811\" data-col-size=\"sm\">Colonial/obsolete removed</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"813\" data-end=\"909\">👉 <strong data-start=\"816\" data-end=\"826\">Focus:</strong> Justice, clarity, victim protection<br data-start=\"862\" data-end=\"865\" />👉 <strong data-start=\"868\" data-end=\"877\">फोकस:</strong> न्याय, स्पष्टता, पीड़ित संरक्षण</p>\n<hr data-start=\"911\" data-end=\"914\" />\n<h2 data-start=\"916\" data-end=\"969\"><strong data-start=\"919\" data-end=\"969\">2. New Offences &amp; Punishments / नए अपराध व दंड</strong></h2>\n<h3 data-start=\"971\" data-end=\"1018\"><strong data-start=\"975\" data-end=\"1018\">Major Additions (High-Probability PYQs)</strong></h3>\n<p data-path-to-node=\"8\"></p>\n<ul data-start=\"1020\" data-end=\"1960\">\n<li data-start=\"1020\" data-end=\"1150\">\n<p data-start=\"1022\" data-end=\"1086\"><strong data-start=\"1022\" data-end=\"1053\">Organized Crime &amp; Terrorism</strong><br data-start=\"1053\" data-end=\"1056\" /><strong data-start=\"1058\" data-end=\"1084\">संगठित अपराध व आतंकवाद</strong></p>\n<ul data-start=\"1089\" data-end=\"1150\">\n<li data-start=\"1089\" data-end=\"1122\">\n<p data-start=\"1091\" data-end=\"1122\">Included in main criminal law</p>\n</li>\n<li data-start=\"1125\" data-end=\"1150\">\n<p data-start=\"1127\" data-end=\"1150\">Broader than <strong data-start=\"1140\" data-end=\"1148\">UAPA</strong></p>\n</li>\n</ul>\n</li>\n<li data-start=\"1152\" data-end=\"1309\">\n<p data-start=\"1154\" data-end=\"1218\"><strong data-start=\"1154\" data-end=\"1170\">Mob Lynching</strong><br data-start=\"1170\" data-end=\"1173\" /><strong data-start=\"1175\" data-e     "solution": "<h2 data-start=\"1967\" data-end=\"2024\"><strong data-start=\"1970\" data-end=\"2024\">Deleted / Omitted Provisions / हटाए गए प्रावधान</strong></h2>\n<ul data-start=\"2026\" data-end=\"2338\">\n<li data-start=\"2026\" data-end=\"2143\">\n<p data-start=\"2028\" data-end=\"2143\"><strong data-start=\"2028\" data-end=\"2064\">Section 377 &ndash; Unnatural Offences</strong><br data-start=\"2064\" data-end=\"2067\" />❌ Repealed &rarr; Homosexuality decriminalised<br data-start=\"2110\" data-end=\"2113\" /><strong data-start=\"2115\" data-end=\"2143\">समलैंगिकता अब अपराध नहीं</strong></p>\n</li>\n<li data-start=\"2145\" data-end=\"2212\">\n<p data-start=\"2147\" data-end=\"2212\"><strong data-start=\"2147\" data-end=\"2173\">Adultery (Section 497)</strong><br data-start=\"2173\" data-end=\"2176\" />❌ Removed (as per Supreme Court)</p>\n</li>\n<li data-start=\"2214\" data-end=\"2277\">\n<p data-start=\"2216\" data-end=\"2277\"><strong data-start=\"2216\" data-end=\"2239\">Thugs (Section 310)</strong><br data-start=\"2239\" data-end=\"2242\" />❌ Deleted (colonial &amp; obsolete)</p>\n</li>\n<li data-start=\"2279\" data-end=\"2338\">\n<p data-start=\"2281\" data-end=\"2338\"><strong data-start=\"2281\" data-end=\"2309\">Gender-biased provisions</strong><br data-start=\"2309\" data-end=\"2312\" />❌ Removed for equality</p>\n</li>\n</ul>\n<hr data-start=\"2340\" data-end=\"2343\" />\n<h2 data-start=\"2345\" data-end=\"2396\"><strong data-start=\"2348\" data-end=\"2394\">&nbsp;Key Modifications &amp; Harsher Punishments</strong></h2>\n<h3 data-start=\"2397\" data-end=\"2435\"><strong data-start=\"2401\" data-end=\"2435\">महत्वपूर्ण संशोधन व कड़ी सजाएं</strong></h3>\n<p></p>\n<ul data-start=\"2437\" data-end=\"3207\">\n<li data-start=\"2437\" data-end=\"2559\">\n<p data-start=\"2439\" data-end=\"2516\"><strong data-start=\"2439\" data-end=\"2474\">Crimes against Women &amp; Children</strong><br data-start=\"2474\" data-end=\"2477\" /><strong data-start=\"2479\" data-end=\"2514\">महिला व बच्चों के विरुद्ध अपराध</strong></p>\n<ul data-start=\"2519\" data-end=\"2559\">\n<li data-start=\"2519\" data-end=\"2559\">\n<p data-start=\"2521\" data-end=\"2559\"><strong data-start=\"2521\" data-end=\"2544\">Dedicated Chapter V</strong> (Top priority)</p>\n</li>\n</ul>\n</li>\n<li data-start=\"2561\" data-end=\"2719\">\n<p data-start=\"2563\" data-end=\"2598\"><strong data-start=\"2563\" data-end=\"2596\">Gang Rape (Victim &lt; 18 years)</strong></p>\n<ul data-start=\"2601\" data-end=\"2719\">\n<li data-start=\"2601\" data-end=\"2665\">\n<p data-start=\"2603\" data-end=\"2665\"><strong data-start=\"2603\" data-end=\"2618\">Punishment:</strong> Life imprisonment till natural life OR Death</p>\n</li>\n<li data-start=\"2668\" data-end=\"2719\">\n<p data-start=\"2670\" data-end=\"2719\"><strong data-start=\"2670\" data-end=\"2678\">सजा:</strong> प्राकृतिक जीवन तक कारावास या मृत्युदंड</p>\n</li>\n</ul>\n</li>\n<li data-start=\"2721\" data-end=\"2834\">\n<p data-start=\"2723\" data-end=\"2748\"><strong data-start=\"2723\" data-end=\"2746\">Death by Negligence</strong></p>\n<ul data-start=\"2751\" data-end=\"2834\">\n<li data-start=\"2751\" data-end=\"2772\">\n<p data-start=\"2753\" data-end=\"2772\">Up to <strong data-start=\"2759\" data-end=\"2770\">5 years</strong></p>\n</li>\n<li data-start=\"2775\" data-end=\"2834\">\n<p data-start=\"2777\" data-end=\"2834\"><strong data-start=\"2777\" data-end=\"2789\">Doctors:</strong> Up to <strong data-start=\"2796\" data-end=\"2807\">2 years</strong> (registered practitioners)</p>\n</li>\n</ul>\n</li>\n<li data-start=\"2836\" data-end=\"2930\">\n<p data-start=\"2838\" data-end=\"2930\"><strong data-start=\"2838\" data-end=\"2869\">Mandatory Minimum Sentences</strong><br data-start=\"2869\" data-end=\"2872\" /><strong data-start=\"2874\" data-end=\"2898\">न्यूनतम अनिवार्य सजा</strong> &ndash; introduced in many offences</p>\n</li>\n<li data-start=\"2932\" data-end=\"3018\">\n<p data-start=\"2934\" data-end=\"2980\"><strong data-start=\"2934\" data-end=\"2953\">Property Damage</strong><br data-start=\"2953\" data-end=\"2956\" /><strong data-start=\"2958\" data-end=\"2978\">संपत्ति को क्षति</strong></p>\n<ul data-start=\"2983\" data-end=\"3018\">\n<li data-start=\"2983\" data-end=\"3018\">\n<p data-start=\"2985\" data-end=\"3018\">Fine based on <strong data-start=\"2999\" data-end=\"3018\">value of damage</strong></p>\n</li>\n</ul>\n</li>\n<li data-start=\"3020\" data-end=\"3117\">\n<p data-start=\"3022\" data-end=\"3071\"><strong data-start=\"3022\" data-end=\"3042\">Repeat Offenders</strong><br data-start=\"3042\" data-end=\"3045\" /><strong data-start=\"3047\" data-end=\"3069\">पुनरावृत्ति अपराधी</strong></p>\n<ul data-start=\"3074\" data-end=\"3117\">\n<li data-start=\"3074\" data-end=\"3117\">\n<p data-start=\"3076\" data-end=\"3117\">Repeat theft &rarr; <strong data-start=\"3091\" data-end=\"3117\">1&ndash;5 years imprisonment</strong></p>\n</li>\n</ul>\n</li>\n<li data-start=\"3119\" data-end=\"3207\">\n<p data-start=\"3121\" data-end=\"3167\"><strong data-start=\"3121\" data-end=\"3142\">Gender Neutrality</strong><br data-start=\"3142\" data-end=\"3145\" /><strong data-start=\"3147\" data-end=\"3165\">लैंगिक तटस्थता</strong></p>\n<ul data-start=\"3170\" data-end=\"3207\">\n<li data-start=\"3170\" data-end=\"3207\">\n<p data-start=\"3172\" data-end=\"3207\">Some offences made gender-neutral</p>\n</li>\n</ul>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"21\"><strong data-path-to-node=\"21\" data-index-in-node=\"0\">Q. Which of the following provisions from the IPC has been REPEALED or REMOVED in the Bharatiya Nyaya Sanhita (BNS)?</strong> <strong data-path-to-node=\"21\" data-index-in-node=\"117\">(भारतीय न्याय संहिता (BNS) में IPC के निम्नलिखित में से किस प्रावधान को निरस्त या हटा दिया गया है?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"22\">\n<li>\n<p data-path-to-node=\"22,0,0\"><strong data-path-to-node=\"22,0,0\" data-index-in-node=\"0\">Section 377:</strong> Unnatural offences (ensuring homosexuality is decriminalized). <em data-path-to-node=\"22,0,0\" data-index-in-node=\"76\">(धारा 377: अप्राकृतिक अपराध (समलैंगिकता को अपराध की श्रेणी से बाहर करना)।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,1,0\"><strong data-path-to-node=\"22,1,0\" data-index-in-node=\"0\">Adultery (Section 497):</strong> Removed as per Supreme Court verdict. <em data-path-to-node=\"22,1,0\" data-index-in-node=\"62\">(व्यभिचार (धारा 497): सुप्रीम कोर्ट के फैसले के अनुसार हटाया गया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,2,0\"><strong data-path-to-node=\"22,2,0\" data-index-in-node=\"0\">Thugs (Section 310):</strong> Deleted as an obsolete concept. <em data-path-to-node=\"22,2,0\" data-index-in-node=\"53\">(ठग (धारा 310): एक अप्रचलित अवधारणा के रूप में हटाया गया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,3,0\"><strong data-path-to-node=\"22,3,0\" data-index-in-node=\"0\">Snatching:</strong> Removed to simplify theft laws. <em data-path-to-node=\"22,3,0\" data-index-in-node=\"43\">(छीना-झपटी: चोरी के कानूनों को सरल बनाने के लिए हटाया गया।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"23\"><strong data-path-to-node=\"23\" data-index-in-node=\"0\">Select the correct option (सही विकल्प चुनें):</strong></p>\n<ul data-path-to-node=\"24\">\n<li>\n<p data-path-to-node=\"24,0,0\"><strong data-path-to-node=\"24,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"24,1,0\"><strong data-path-to-node=\"24,1,0\" data-index-in-node=\"0\">B)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"24,2,0\"><strong data-path-to-node=\"24,2,0\" data-index-in-node=\"0\">C)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"24,3,0\"><strong data-path-to-node=\"24,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Q. Match the following new offences under the Bharatiya Nyaya Sanhita (BNS) with their corresponding Section numbers and descriptions:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(भारतीय न्याय संहिता (BNS) के तहत निम्नलिखित नए अपराधों को उनकी संबंधित धारा संख्या और विवरण के साथ सुमेलित करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">BNS Section (BNS धारा)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">New Offence (नया अपराध)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Feature (प्रमुख विशेषता)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,0,0\" data-index-in-node=\"0\">(A) Sec 111</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,1,0\">(i) Snatching (छीना-झपटी)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,1,2,0\">Defined as stealing by forcefully grabbing an article.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,0,0\" data-index-in-node=\"0\">(B) Sec 103(2)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,1,0\">(ii) Organized Crime</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,2,2,0\">Tackles serial crimes like extortion and cyber-crime by syndicates.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,0,0\" data-index-in-node=\"0\">(C) Sec 304</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,1,0\">(iii) Mob Lynching</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,3,2,0\">Murder caused by 5 or more people based on identity/belief.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">(D) Sec 69</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\">(iv) Sex by Deception</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,2,0\">Sexual intercourse through false promise of marriage or job.</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"6\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"0\">Select the correct code (सही कूट चुनें):</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> A-ii, B-iii, C-i, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> A-i, B-ii, C-iv, D-iii</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> A-ii, B-i, C-iii, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> A-iii, B-iv, C-i, D-ii</p>\n</li>\n</ul>",
