    "question": "<p data-start=\"50\" data-end=\"200\"><strong data-start=\"50\" data-end=\"118\">Consider the following statements regarding the Drainage System:</strong><br data-start=\"118\" data-end=\"121\" /><strong data-start=\"121\" data-end=\"200\">अपवाह तंत्र (Drainage System) के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"202\" data-end=\"1036\">\n<li data-section-id=\"tbslpt\" data-start=\"202\" data-end=\"415\">\n<p data-start=\"205\" data-end=\"415\"><strong data-start=\"205\" data-end=\"226\">Consequent rivers</strong> flow along the initial slope of the land and are the first rivers to develop.<br data-start=\"304\" data-end=\"307\" /><strong data-start=\"310\" data-end=\"342\">अनुवर्ती (Consequent) नदियाँ</strong> भूमि की प्रारंभिक ढाल के अनुसार बहती हैं और सबसे पहले विकसित होती हैं।</p>\n</li>\n<li data-section-id=\"1nddgc9\" data-start=\"417\" data-end=\"576\">\n<p data-start=\"420\" data-end=\"576\"><strong data-start=\"420\" data-end=\"441\">Subsequent rivers</strong> generally join the main river at right angles.<br data-start=\"488\" data-end=\"491\" /><strong data-start=\"494\" data-end=\"525\">अनुगामी (Subsequent) नदियाँ</strong> सामान्यतः मुख्य नदी से समकोण (90&deg;) पर मिलती हैं।</p>\n</li>\n<li data-section-id=\"bf56ea\" data-start=\"578\" data-end=\"827\">\n<p data-start=\"581\" data-end=\"827\"><strong data-start=\"581\" data-end=\"602\">Antecedent rivers</strong> existed before the upliftment of mountains and maintain their course by cutting deep gorges.<br data-start=\"695\" data-end=\"698\" /><strong data-start=\"701\" data-end=\"735\">पूर्ववर्ती (Antecedent) नदियाँ</strong> पर्वतों के उत्थान से पहले से विद्यमान थीं और गहरी घाटियाँ काटकर अपना मार्ग बनाए रखती हैं।</p>\n</li>\n<li data-section-id=\"12wxrjk\" data-start=\"829\" data-end=\"1036\">\n<p data-start=\"832\" data-end=\"1036\"><strong data-start=\"832\" data-end=\"855\">Superimposed rivers</strong> maintain their course even after the upper rock layer is eroded away.<br data-start=\"925\" data-end=\"928\" /><strong data-start=\"931\" data-end=\"967\">अध्यारोपित (Superimposed) नदियाँ</strong> ऊपरी शैल-परत के अपरदित हो जाने के बाद भी अपना मार्ग बनाए रखती हैं।</p>\n</li>\n</ol>\n<p data-start=\"1038\" data-end=\"1131\"><strong data-start=\"1038\" data-end=\"1090\">Which of the statements given above are correct?</strong><br data-start=\"1090\" data-end=\"1093\" /><strong data-start=\"1093\" data-end=\"1131\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1133\" data-end=\"1167\">A. 1 and 2 only<br data-start=\"1148\" data-end=\"1151\" />A. केवल 1 और 2</p>\n<p data-start=\"1169\" data-end=\"1203\">B. 2 and 3 only<br data-start=\"1184\" data-end=\"1187\" />B. केवल 2 और 3</p>\n<p data-start=\"1205\" data-end=\"1245\">C. 1, 2 and 3 only<br data-start=\"1223\" data-end=\"1226\" />C. केवल 1, 2 और 3</p>\n<p data-start=\"1247\" data-end=\"1283\">D. 1, 2, 3 and 4<br data-start=\"1263\" data-end=\"1266\" />D. 1, 2, 3 और 4</p>\n<p data-start=\"1285\" data-end=\"1329\"></p>",

    "solution": "<h1 data-section-id=\"smkzad\" data-start=\"1352\" data-end=\"1362\">&nbsp;</h1>\n<p></p>\n<ul data-start=\"1364\" data-end=\"1913\" data-is-only-node=\"\" data-is-last-node=\"\">\n<li data-section-id=\"u4cs6i\" data-start=\"1364\" data-end=\"1483\">\n<p data-start=\"1366\" data-end=\"1483\"><strong data-start=\"1366\" data-end=\"1406\">Consequent Rivers (अनुवर्ती नदियाँ):</strong>&nbsp;Original slope के अनुसार बहती हैं।<br data-start=\"1441\" data-end=\"1444\" />उदाहरण:&nbsp;<strong data-start=\"1454\" data-end=\"1483\">Godavari, Krishna, Kaveri</strong></p>\n</li>\n<li data-section-id=\"1p20ztk\" data-start=\"1485\" data-end=\"1602\">\n<p data-start=\"1487\" data-end=\"1602\"><strong data-start=\"1487\" data-end=\"1526\">Subsequent Rivers (अनुगामी नदियाँ):</strong>&nbsp;मुख्य नदी से&nbsp;<strong data-start=\"1540\" data-end=\"1560\">90&deg; पर मिलती हैं</strong>।<br data-start=\"1561\" data-end=\"1564\" />उदाहरण:&nbsp;<strong data-start=\"1574\" data-end=\"1602\">Chambal, Ken, Betwa, Son</strong></p>\n</li>\n<li data-section-id=\"1irz5p6\" data-start=\"1604\" data-end=\"1759\">\n<p data-start=\"1606\" data-end=\"1759\"><strong data-start=\"1606\" data-end=\"1648\">Antecedent Rivers (पूर्ववर्ती नदियाँ):</strong>&nbsp;पर्वत बनने से पहले से मौजूद थीं और पर्वतों को काटकर बहती हैं।<br data-start=\"1710\" data-end=\"1713\" />उदाहरण:&nbsp;<strong data-start=\"1723\" data-end=\"1759\">Indus, Sutlej, Brahmaputra, Kosi</strong></p>\n</li>\n<li data-section-id=\"b4f5jx\" data-start=\"1761\" data-end=\"1913\" data-is-last-node=\"\">\n<p data-start=\"1763\" data-end=\"1913\" data-is-last-node=\"\"><strong data-start=\"1763\" data-end=\"1807\">Superimposed Rivers (अध्यारोपित नदियाँ):</strong>&nbsp;ऊपरी शैल हटने के बाद भी पुराना मार्ग बनाए रखती हैं।<br data-start=\"1859\" data-end=\"1862\" />उदाहरण:&nbsp;<strong data-start=\"1872\" data-end=\"1913\" data-is-last-node=\"\">Damodar, Chambal, Banas, Subarnarekha</strong></p>\n</li>\n</ul>",

    "question": "<p data-start=\"280\" data-end=\"433\"><strong data-start=\"280\" data-end=\"346\">Consider the following statements regarding Drainage Patterns:</strong><br data-start=\"346\" data-end=\"349\" /><strong data-start=\"349\" data-end=\"433\">अपवाह प्रतिरूप (Drainage Patterns) के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"435\" data-end=\"1519\">\n<li data-section-id=\"15c4nra\" data-start=\"435\" data-end=\"677\">\n<p data-start=\"438\" data-end=\"677\"><strong data-start=\"438\" data-end=\"459\">Dendritic pattern</strong> resembles the branches of a tree and develops in regions with uniform rock type and slope.<br data-start=\"550\" data-end=\"553\" /><strong data-start=\"556\" data-end=\"580\">डेंड्राइटिक प्रतिरूप</strong> वृक्ष की शाखाओं जैसा दिखाई देता है और समान शैल संरचना तथा ढाल वाले क्षेत्रों में विकसित होता है।</p>\n</li>\n<li data-section-id=\"1p6dc5b\" data-start=\"679\" data-end=\"879\">\n<p data-start=\"682\" data-end=\"879\"><strong data-start=\"682\" data-end=\"701\">Trellis pattern</strong> has parallel main streams and tributaries join them at right angles.<br data-start=\"770\" data-end=\"773\" /><strong data-start=\"776\" data-end=\"796\">ट्रेलिस प्रतिरूप</strong> में मुख्य धाराएँ समानांतर होती हैं तथा सहायक नदियाँ उनसे समकोण (90&deg;) पर मिलती हैं।</p>\n</li>\n<li data-section-id=\"zipers\" data-start=\"881\" data-end=\"1091\">\n<p data-start=\"884\" data-end=\"1091\"><strong data-start=\"884\" data-end=\"902\">Radial pattern</strong> develops when rivers flow outward in all directions from a central high point.<br data-start=\"981\" data-end=\"984\" /><strong data-start=\"987\" data-end=\"1006\">रेडियल प्रतिरूप</strong> तब बनता है जब नदियाँ किसी केंद्रीय ऊँचे स्थान से सभी दिशाओं में बाहर की ओर बहती हैं।</p>\n</li>\n<li data-section-id=\"ka3lst\" data-start=\"1093\" data-end=\"1307\">\n<p data-start=\"1096\" data-end=\"1307\"><strong data-start=\"1096\" data-end=\"1119\">Centripetal pattern</strong> occurs when streams flow from all directions into a central depression or lake.<br data-start=\"1199\" data-end=\"1202\" /><strong data-start=\"1205\" data-end=\"1229\">सेंट्रीपीटल प्रतिरूप</strong> तब बनता है जब नदियाँ सभी दिशाओं से किसी केंद्रीय झील या अवसाद की ओर बहती हैं।</p>\n</li>\n<li data-section-id=\"11b30bf\" data-start=\"1309\" data-end=\"1519\">\n<p data-start=\"1312\" data-end=\"1519\"><strong data-start=\"1312\" data-end=\"1332\">Parallel pattern</strong> develops where rivers flow parallel to each other on steep uniform slopes.<br data-start=\"1407\" data-end=\"1410\" /><strong data-start=\"1413\" data-end=\"1431\">पैरलल प्रतिरूप</strong> तीव्र और समान ढाल वाले क्षेत्रों में बनता है जहाँ नदियाँ एक-दूसरे के समानांतर बहती हैं।</p>\n</li>\n</ol>\n<p data-start=\"1521\" data-end=\"1614\"><strong data-start=\"1521\" data-end=\"1573\">Which of the statements given above are correct?</strong><br data-start=\"1573\" data-end=\"1576\" /><strong data-start=\"1576\" data-end=\"1614\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1616\" data-end=\"1656\">A. 1, 2 and 3 only<br data-start=\"1634\" data-end=\"1637\" />A. केवल 1, 2 और 3</p>\n<p data-start=\"1658\" data-end=\"1704\">B. 1, 3, 4 and 5 only<br data-start=\"1679\" data-end=\"1682\" />B. केवल 1, 3, 4 और 5</p>\n<p data-start=\"1706\" data-end=\"1746\">C. 2, 3 and 4 only<br data-start=\"1724\" data-end=\"1727\" />C. केवल 2, 3 और 4</p>\n<p></p>\n<p data-start=\"1748\" data-end=\"1769\">D. 1, 2, 3, 4 and 5</p>",

    "question": "<p data-start=\"1898\" data-end=\"2053\"><strong data-start=\"1898\" data-end=\"1973\">Consider the following statements regarding river drainage terminology:</strong><br data-start=\"1973\" data-end=\"1976\" /><strong data-start=\"1976\" data-end=\"2053\">नदी अपवाह तंत्र की शब्दावली के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"2055\" data-end=\"3184\">\n<li data-section-id=\"1kakiy2\" data-start=\"2055\" data-end=\"2210\">\n<p data-start=\"2058\" data-end=\"2210\"><strong data-start=\"2058\" data-end=\"2076\">Catchment area</strong> refers to the region from which a river collects its water.<br data-start=\"2136\" data-end=\"2139\" /><strong data-start=\"2142\" data-end=\"2161\">कैचमेंट क्षेत्र</strong> वह क्षेत्र है जहाँ से नदी अपना जल एकत्र करती है।</p>\n</li>\n<li data-section-id=\"1inlr2e\" data-start=\"2212\" data-end=\"2384\">\n<p data-start=\"2215\" data-end=\"2384\"><strong data-start=\"2215\" data-end=\"2230\">River basin</strong> is the large area drained by a river and all its tributaries.<br data-start=\"2292\" data-end=\"2295\" /><strong data-start=\"2298\" data-end=\"2311\">नदी बेसिन</strong> वह विस्तृत क्षेत्र है जिसे एक नदी और उसकी सहायक नदियाँ जलनिकास करती हैं।</p>\n</li>\n<li data-section-id=\"o2weku\" data-start=\"2386\" data-end=\"2521\">\n<p data-start=\"2389\" data-end=\"2521\"><strong data-start=\"2389\" data-end=\"2402\">Watershed</strong> is the boundary separating one river basin from another.<br data-start=\"2459\" data-end=\"2462\" /><strong data-start=\"2465\" data-end=\"2476\">वाटरशेड</strong> वह सीमा है जो दो नदी बेसिनों को अलग करती है।</p>\n</li>\n<li data-section-id=\"sgtok3\" data-start=\"2523\" data-end=\"2746\">\n<p data-start=\"2526\" data-end=\"2746\"><strong data-start=\"2526\" data-end=\"2537\">Estuary</strong> is the tidal mouth of a river where freshwater meets seawater and little sediment is deposited.<br data-start=\"2633\" data-end=\"2636\" /><strong data-start=\"2639\" data-end=\"2652\">एस्ट्यूरी</strong> नदी का ज्वारीय मुहाना है जहाँ मीठा जल समुद्री जल से मिलता है और अवसाद का निक्षेपण कम होता है।</p>\n</li>\n<li data-section-id=\"1982rwg\" data-start=\"2748\" data-end=\"2967\">\n<p data-start=\"2751\" data-end=\"2967\"><strong data-start=\"2751\" data-end=\"2760\">Delta</strong> is a triangular or fan-shaped landform formed by deposition of sediments at the mouth of a river.<br data-start=\"2858\" data-end=\"2861\" /><strong data-start=\"2864\" data-end=\"2874\">डेल्टा</strong> नदी के मुहाने पर अवसाद के निक्षेपण से बनने वाली त्रिभुजाकार या पंखे के आकार की स्थलाकृति है।</p>\n</li>\n<li data-section-id=\"1rkufoj\" data-start=\"2969\" data-end=\"3184\">\n<p data-start=\"2972\" data-end=\"3184\"><strong data-start=\"2972\" data-end=\"2992\">Perennial rivers</strong> flow throughout the year, while <strong data-start=\"3025\" data-end=\"3045\">Ephemeral rivers</strong> flow mainly during the rainy season.<br data-start=\"3082\" data-end=\"3085\" /><strong data-start=\"3088\" data-end=\"3106\">सदानीरा नदियाँ</strong> पूरे वर्ष बहती हैं, जबकि <strong data-start=\"3132\" data-end=\"3152\">अल्पकालिक नदियाँ</strong> मुख्यतः वर्षा ऋतु में बहती हैं।</p>\n</li>\n</ol>\n<p data-start=\"3186\" data-end=\"3279\"><strong data-start=\"3186\" data-end=\"3238\">Which of the statements given above are correct?</strong><br data-start=\"3238\" data-end=\"3241\" /><strong data-start=\"3241\" data-end=\"3279\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"3281\" data-end=\"3327\">A. 1, 2, 3 and 4 only<br data-start=\"3302\" data-end=\"3305\" />A. केवल 1, 2, 3 और 4</p>\n<p data-start=\"3329\" data-end=\"3375\">B. 2, 3, 4 and 5 only<br data-start=\"3350\" data-end=\"3353\" />B. केवल 2, 3, 4 और 5</p>\n<p data-start=\"3377\" data-end=\"3425\">C. 1, 2, 3, 4, 5 and 6<br data-start=\"3399\" data-end=\"3402\" />C. 1, 2, 3, 4, 5 और 6</p>\n<p></p>\n<p data-start=\"3427\" data-end=\"3473\">D. 1, 3, 5 and 6 only<br data-start=\"3448\" data-end=\"3451\" />D. केवल 1, 3, 5 और 6</p>",

    "question": "<p data-start=\"322\" data-end=\"473\"><strong data-start=\"322\" data-end=\"399\">Consider the following statements regarding the Drainage System of India:</strong><br data-start=\"399\" data-end=\"402\" /><strong data-start=\"402\" data-end=\"473\">भारत की अपवाह प्रणाली के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"475\" data-end=\"1780\">\n<li data-section-id=\"hnzlrc\" data-start=\"475\" data-end=\"722\">\n<p data-start=\"478\" data-end=\"722\">The Indian drainage system can be classified on the basis of discharge of water, size of watershed, and origin of rivers.<br data-start=\"599\" data-end=\"602\" />भारतीय अपवाह प्रणाली को जल निकास, जलग्रहण क्षेत्र के आकार तथा नदियों की उत्पत्ति के आधार पर वर्गीकृत किया जा सकता है।</p>\n</li>\n<li data-section-id=\"ec20ji\" data-start=\"724\" data-end=\"961\">\n<p data-start=\"727\" data-end=\"961\">Nearly <strong data-start=\"734\" data-end=\"801\">77% of the drainage area of India drains into the Bay of Bengal</strong>, while about <strong data-start=\"815\" data-end=\"850\">23% drains into the Arabian Sea</strong>.<br data-start=\"851\" data-end=\"854\" />भारत के अपवाह क्षेत्र का लगभग <strong data-start=\"887\" data-end=\"917\">77% भाग बंगाल की खाड़ी में</strong> तथा लगभग <strong data-start=\"927\" data-end=\"951\">23% भाग अरब सागर में</strong> गिरता है।</p>\n</li>\n<li data-section-id=\"xiifyp\" data-start=\"963\" data-end=\"1124\">\n<p data-start=\"966\" data-end=\"1124\">More than <strong data-start=\"976\" data-end=\"1047\">90% of the total river water of India drains into the Bay of Bengal</strong>.<br data-start=\"1048\" data-end=\"1051\" />भारत के कुल नदी जल का <strong data-start=\"1076\" data-end=\"1114\">90% से अधिक भाग बंगाल की खाड़ी में</strong> गिरता है।</p>\n</li>\n<li data-section-id=\"p6cj2q\" data-start=\"1126\" data-end=\"1422\">\n<p data-start=\"1129\" data-end=\"1422\">The <strong data-start=\"1133\" data-end=\"1184\">Delhi Ridge, Aravalli Range, and Sahyadri Range</strong> act as the main water divide between the Arabian Sea and Bay of Bengal drainage systems.<br data-start=\"1273\" data-end=\"1276\" /><strong data-start=\"1279\" data-end=\"1335\">दिल्ली रिज, अरावली पर्वतमाला तथा सह्याद्रि पर्वतमाला</strong> अरब सागर तथा बंगाल की खाड़ी अपवाह प्रणालियों के बीच मुख्य जल-विभाजक का कार्य करती हैं।</p>\n</li>\n<li data-section-id=\"1tst1i7\" data-start=\"1424\" data-end=\"1780\">\n<p data-start=\"1427\" data-end=\"1780\">Major river basins have a <strong data-start=\"1453\" data-end=\"1497\">catchment area of more than 20,000 sq km</strong>, medium basins range between <strong data-start=\"1527\" data-end=\"1549\">2,000&ndash;20,000 sq km</strong>, and minor basins have <strong data-start=\"1573\" data-end=\"1598\">less than 2,000 sq km</strong> catchment area.<br data-start=\"1614\" data-end=\"1617\" />प्रमुख नदी बेसिन का जलग्रहण क्षेत्र <strong data-start=\"1656\" data-end=\"1684\">20,000 वर्ग किमी से अधिक</strong>, मध्यम बेसिन का <strong data-start=\"1701\" data-end=\"1727\">2,000&ndash;20,000 वर्ग किमी</strong>, तथा लघु बेसिन का <strong data-start=\"1746\" data-end=\"1771\">2,000 वर्ग किमी से कम</strong> होता है।</p>\n</li>\n</ol>\n<p data-start=\"1782\" data-end=\"1875\"><strong data-start=\"1782\" data-end=\"1834\">Which of the statements given above are correct?</strong><br data-start=\"1834\" data-end=\"1837\" /><strong data-start=\"1837\" data-end=\"1875\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1877\" data-end=\"1917\">A. 1, 2 and 3 only<br data-start=\"1895\" data-end=\"1898\" />A. केवल 1, 2 और 3</p>\n<p data-start=\"1919\" data-end=\"1959\">B. 2, 3 and 4 only<br data-start=\"1937\" data-end=\"1940\" />B. केवल 2, 3 और 4</p>\n<p data-start=\"1961\" data-end=\"2007\">C. 1, 2, 3 and 5 only<br data-start=\"1982\" data-end=\"1985\" />C. केवल 1, 2, 3 और 5</p>\n<p></p>\n<p data-start=\"2009\" data-end=\"2030\">D. 1, 2, 3, 4 and 5</p>",

    "question": "<p data-start=\"262\" data-end=\"426\"><strong data-start=\"262\" data-end=\"342\">Consider the following statements regarding Himalayan and Peninsular rivers:</strong><br data-start=\"342\" data-end=\"345\" /><strong data-start=\"345\" data-end=\"426\">हिमालयी तथा प्रायद्वीपीय नदियों के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"428\" data-end=\"1607\">\n<li data-section-id=\"1c7az0d\" data-start=\"428\" data-end=\"698\">\n<p data-start=\"431\" data-end=\"698\">Himalayan rivers originate from glaciers and remain <strong data-start=\"483\" data-end=\"496\">perennial</strong>, while Peninsular rivers are mainly <strong data-start=\"533\" data-end=\"558\">rain-fed and seasonal</strong>.<br data-start=\"559\" data-end=\"562\" />हिमालयी नदियाँ हिमनदों से निकलती हैं और <strong data-start=\"605\" data-end=\"616\">सदानीरा</strong> होती हैं, जबकि प्रायद्वीपीय नदियाँ मुख्यतः <strong data-start=\"660\" data-end=\"688\">वर्षा पर निर्भर और मौसमी</strong> होती हैं।</p>\n</li>\n<li data-section-id=\"1th34s7\" data-start=\"700\" data-end=\"912\">\n<p data-start=\"703\" data-end=\"912\">Himalayan rivers are <strong data-start=\"724\" data-end=\"746\">geologically young</strong>, whereas Peninsular rivers are <strong data-start=\"778\" data-end=\"803\">older and more stable</strong>.<br data-start=\"804\" data-end=\"807\" />हिमालयी नदियाँ <strong data-start=\"825\" data-end=\"852\">भूगर्भीय दृष्टि से युवा</strong> हैं, जबकि प्रायद्वीपीय नदियाँ <strong data-start=\"883\" data-end=\"907\">अधिक पुरानी और स्थिर</strong> हैं।</p>\n</li>\n<li data-section-id=\"dxxbdv\" data-start=\"914\" data-end=\"1220\">\n<p data-start=\"917\" data-end=\"1220\">Himalayan rivers generally have <strong data-start=\"949\" data-end=\"991\">long courses and large catchment areas</strong>, while Peninsular rivers usually have <strong data-start=\"1030\" data-end=\"1068\">shorter courses and smaller basins</strong>.<br data-start=\"1069\" data-end=\"1072\" />हिमालयी नदियों का <strong data-start=\"1093\" data-end=\"1138\">लंबा प्रवाह मार्ग और बड़ा जलग्रहण क्षेत्र</strong> होता है, जबकि प्रायद्वीपीय नदियों का <strong data-start=\"1176\" data-end=\"1211\">छोटा प्रवाह मार्ग और छोटा बेसिन</strong> होता है।</p>\n</li>\n<li data-section-id=\"1dihhdw\" data-start=\"1222\" data-end=\"1607\">\n<p data-start=\"1225\" data-end=\"1607\">Himalayan rivers form <strong data-start=\"1247\" data-end=\"1289\">deep V-shaped valleys and large deltas</strong>, whereas Peninsular rivers generally flow through <strong data-start=\"1340\" data-end=\"1365\">broad shallow valleys</strong> and many west-flowing rivers form <strong data-start=\"1400\" data-end=\"1413\">estuaries</strong>.<br data-start=\"1414\" data-end=\"1417\" />हिमालयी नदियाँ <strong data-start=\"1435\" data-end=\"1476\">गहरी V-आकार की घाटियाँ और बड़े डेल्टा</strong> बनाती हैं, जबकि प्रायद्वीपीय नदियाँ सामान्यतः <strong data-start=\"1523\" data-end=\"1545\">चौड़ी उथली घाटियों</strong> में बहती हैं और कई पश्चिममुखी नदियाँ <strong data-start=\"1583\" data-end=\"1596\">एस्ट्यूरी</strong> बनाती हैं।</p>\n</li>\n</ol>\n<p data-start=\"1609\" data-end=\"1702\"><strong data-start=\"1609\" data-end=\"1661\">Which of the statements given above are correct?</strong><br data-start=\"1661\" data-end=\"1664\" /><strong data-start=\"1664\" data-end=\"1702\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1704\" data-end=\"1738\">A. 1 and 2 only<br data-start=\"1719\" data-end=\"1722\" />A. केवल 1 और 2</p>\n<p data-start=\"1740\" data-end=\"1780\">B. 1, 2 and 3 only<br data-start=\"1758\" data-end=\"1761\" />B. केवल 1, 2 और 3</p>\n<p data-start=\"1782\" data-end=\"1822\">C. 2, 3 and 4 only<br data-start=\"1800\" data-end=\"1803\" />C. केवल 2, 3 और 4</p>\n<p></p>\n<p data-start=\"1824\" data-end=\"1842\">D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"417\" data-end=\"567\"><strong data-start=\"417\" data-end=\"495\">Consider the following statements regarding the Himalayan Drainage System:</strong><br data-start=\"495\" data-end=\"498\" /><strong data-start=\"498\" data-end=\"567\">हिमालयी अपवाह तंत्र के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"569\" data-end=\"1508\">\n<li data-section-id=\"nzemya\" data-start=\"569\" data-end=\"774\">\n<p data-start=\"572\" data-end=\"774\">Himalayan rivers are <strong data-start=\"593\" data-end=\"606\">perennial</strong> because they are fed by both glacier melt and rainfall.<br data-start=\"662\" data-end=\"665\" />हिमालयी नदियाँ <strong data-start=\"683\" data-end=\"694\">सदानीरा</strong> होती हैं क्योंकि इन्हें हिमनदों के पिघलने और वर्षा दोनों से जल प्राप्त होता है।</p>\n</li>\n<li data-section-id=\"5n0rxc\" data-start=\"776\" data-end=\"990\">\n<p data-start=\"779\" data-end=\"990\">In their mountainous course, these rivers form <strong data-start=\"826\" data-end=\"884\">deep gorges and V-shaped valleys due to strong erosion</strong>.<br data-start=\"885\" data-end=\"888\" />अपने पर्वतीय भाग में ये नदियाँ <strong data-start=\"922\" data-end=\"979\">तीव्र अपरदन के कारण गहरी घाटियाँ और V-आकार की घाटियाँ</strong> बनाती हैं।</p>\n</li>\n<li data-section-id=\"1tezmbe\" data-start=\"992\" data-end=\"1183\">\n<p data-start=\"995\" data-end=\"1183\">In the plains, these rivers form <strong data-start=\"1028\" data-end=\"1087\">flood plains, ox-bow lakes, braided channels and deltas</strong>.<br data-start=\"1088\" data-end=\"1091\" />मैदानी भाग में ये नदियाँ <strong data-start=\"1119\" data-end=\"1172\">बाढ़ मैदान, ऑक्स-बो झीलें, ब्रेडेड चैनल और डेल्टा</strong> बनाती हैं।</p>\n</li>\n<li data-section-id=\"za3dj6\" data-start=\"1185\" data-end=\"1508\">\n<p data-start=\"1188\" data-end=\"1508\">According to the <strong data-start=\"1205\" data-end=\"1244\">Indo-Brahma (Shiwalik) River theory</strong>, a single large river during the Miocene period later split into the <strong data-start=\"1314\" data-end=\"1354\">Indus, Ganga and Brahmaputra systems</strong>.<br data-start=\"1355\" data-end=\"1358\" /><strong data-start=\"1361\" data-end=\"1400\">इंडो-ब्रह्मा (शिवालिक) नदी सिद्धांत</strong> के अनुसार मियोसीन काल में एक विशाल नदी बाद में <strong data-start=\"1448\" data-end=\"1478\">सिंधु, गंगा और ब्रह्मपुत्र</strong> प्रणालियों में विभाजित हो गई।</p>\n</li>\n</ol>\n<p data-start=\"1510\" data-end=\"1603\"><strong data-start=\"1510\" data-end=\"1562\">Which of the statements given above are correct?</strong><br data-start=\"1562\" data-end=\"1565\" /><strong data-start=\"1565\" data-end=\"1603\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1605\" data-end=\"1639\">A. 1 and 2 only<br data-start=\"1620\" data-end=\"1623\" />A. केवल 1 और 2</p>\n<p data-start=\"1641\" data-end=\"1681\">B. 1, 2 and 3 only<br data-start=\"1659\" data-end=\"1662\" />B. केवल 1, 2 और 3</p>\n<p data-start=\"1683\" data-end=\"1723\">C. 2, 3 and 4 only<br data-start=\"1701\" data-end=\"1704\" />C. केवल 2, 3 और 4</p>\n<p></p>\n<p data-start=\"1725\" data-end=\"1743\">D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"1923\" data-end=\"2128\"><strong data-start=\"1923\" data-end=\"2028\">Consider the following statements regarding the Indus River System and Peninsular Drainage evolution:</strong><br data-start=\"2028\" data-end=\"2031\" /><strong data-start=\"2031\" data-end=\"2128\">सिंधु नदी तंत्र तथा प्रायद्वीपीय अपवाह के विकास के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"2130\" data-end=\"3017\">\n<li data-section-id=\"19wtfzd\" data-start=\"2130\" data-end=\"2390\">\n<p data-start=\"2133\" data-end=\"2390\">The Indus River originates near the <strong data-start=\"2169\" data-end=\"2220\">Bokhar Chu Glacier in the Kailash Range (Tibet)</strong> and is known as <strong data-start=\"2237\" data-end=\"2254\">Singi Khamban</strong> in Tibet.<br data-start=\"2264\" data-end=\"2267\" />सिंधु नदी का उद्गम <strong data-start=\"2289\" data-end=\"2334\">कैलाश पर्वतमाला (तिब्बत) के बोखर चू हिमनद</strong> के पास है और तिब्बत में इसे <strong data-start=\"2363\" data-end=\"2377\">सिंगी खंबन</strong> कहा जाता है।</p>\n</li>\n<li data-section-id=\"yvnwix\" data-start=\"2392\" data-end=\"2600\">\n<p data-start=\"2395\" data-end=\"2600\">The Indus flows between the <strong data-start=\"2423\" data-end=\"2451\">Ladakh and Zaskar ranges</strong>, and the city of <strong data-start=\"2469\" data-end=\"2493\">Leh lies on its bank</strong>.<br data-start=\"2494\" data-end=\"2497\" />सिंधु नदी <strong data-start=\"2510\" data-end=\"2548\">लद्दाख और ज़ास्कर पर्वत श्रृंखलाओं</strong> के बीच बहती है तथा <strong data-start=\"2568\" data-end=\"2579\">लेह शहर</strong> इसके तट पर स्थित है।</p>\n</li>\n<li data-section-id=\"asbzz0\" data-start=\"2602\" data-end=\"2791\">\n<p data-start=\"2605\" data-end=\"2791\"><strong data-start=\"2605\" data-end=\"2625\">Narmada and Tapi</strong> are rift valley rivers flowing westward due to tectonic faults.<br data-start=\"2689\" data-end=\"2692\" /><strong data-start=\"2695\" data-end=\"2715\">नर्मदा और ताप्ती</strong> भ्रंश घाटी (रिफ्ट वैली) नदियाँ हैं जो भ्रंशन के कारण पश्चिम की ओर बहती हैं।</p>\n</li>\n<li data-section-id=\"6dow48\" data-start=\"2793\" data-end=\"3017\">\n<p data-start=\"2796\" data-end=\"3017\">The <strong data-start=\"2800\" data-end=\"2811\">Panjnad</strong> is formed by the confluence of the five rivers of Punjab and finally joins the Indus at <strong data-start=\"2900\" data-end=\"2913\">Mithankot</strong>.<br data-start=\"2914\" data-end=\"2917\" /><strong data-start=\"2920\" data-end=\"2929\">पंजनद</strong> पंजाब की पाँच नदियों के संगम से बनती है और अंततः <strong data-start=\"2979\" data-end=\"2990\">मिथनकोट</strong> में सिंधु नदी से मिलती है।</p>\n</li>\n</ol>\n<p data-start=\"3019\" data-end=\"3112\"><strong data-start=\"3019\" data-end=\"3071\">Which of the statements given above are correct?</strong><br data-start=\"3071\" data-end=\"3074\" /><strong data-start=\"3074\" data-end=\"3112\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"3114\" data-end=\"3148\">A. 1 and 2 only<br data-start=\"3129\" data-end=\"3132\" />A. केवल 1 और 2</p>\n<p data-start=\"3150\" data-end=\"3190\">B. 1, 2 and 3 only<br data-start=\"3168\" data-end=\"3171\" />B. केवल 1, 2 और 3</p>\n<p data-start=\"3192\" data-end=\"3232\">C. 2, 3 and 4 only<br data-start=\"3210\" data-end=\"3213\" />C. केवल 2, 3 और 4</p>\n<p></p>\n<p data-start=\"3234\" data-end=\"3252\">D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"373\" data-end=\"530\"><strong data-start=\"373\" data-end=\"452\">Consider the following statements regarding the rivers of the Indus system:</strong><br data-start=\"452\" data-end=\"455\" /><strong data-start=\"455\" data-end=\"530\">सिंधु नदी तंत्र की नदियों के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"532\" data-end=\"1190\">\n<li data-section-id=\"frcbp2\" data-start=\"532\" data-end=\"696\">\n<p data-start=\"535\" data-end=\"696\">The <strong data-start=\"539\" data-end=\"555\">Jhelum River</strong> originates from a spring at <strong data-start=\"584\" data-end=\"595\">Verinag</strong> in the Kashmir Valley.<br data-start=\"618\" data-end=\"621\" /><strong data-start=\"624\" data-end=\"636\">झेलम नदी</strong> का उद्गम कश्मीर घाटी में <strong data-start=\"662\" data-end=\"673\">वेरिनाग</strong> के एक झरने से होता है।</p>\n</li>\n<li data-section-id=\"1lnqnip\" data-start=\"698\" data-end=\"916\">\n<p data-start=\"701\" data-end=\"916\">The <strong data-start=\"705\" data-end=\"721\">Chenab River</strong> is formed by the confluence of the <strong data-start=\"757\" data-end=\"795\">Chandra and Bhaga streams at Tandi</strong> in Himachal Pradesh.<br data-start=\"816\" data-end=\"819\" /><strong data-start=\"822\" data-end=\"835\">चेनाब नदी</strong> हिमाचल प्रदेश में <strong data-start=\"854\" data-end=\"863\">टांडी</strong> के पास <strong data-start=\"871\" data-end=\"904\">चंद्रा और भागा नदियों के संगम</strong> से बनती है।</p>\n</li>\n<li data-section-id=\"1k3q209\" data-start=\"918\" data-end=\"1039\">\n<p data-start=\"921\" data-end=\"1039\">The <strong data-start=\"925\" data-end=\"939\">Beas River</strong> merges with the <strong data-start=\"956\" data-end=\"972\">Chenab River</strong> in Punjab.<br data-start=\"983\" data-end=\"986\" /><strong data-start=\"989\" data-end=\"1002\">ब्यास नदी</strong> पंजाब में <strong data-start=\"1013\" data-end=\"1026\">चेनाब नदी</strong> से मिलती है।</p>\n</li>\n<li data-section-id=\"13ia2jr\" data-start=\"1041\" data-end=\"1190\">\n<p data-start=\"1044\" data-end=\"1190\">The <strong data-start=\"1048\" data-end=\"1062\">Ravi River</strong> rises near the <strong data-start=\"1078\" data-end=\"1094\">Rohtang Pass</strong> in Himachal Pradesh.<br data-start=\"1115\" data-end=\"1118\" /><strong data-start=\"1121\" data-end=\"1133\">रावी नदी</strong> हिमाचल प्रदेश में <strong data-start=\"1152\" data-end=\"1169\">रोहतांग दर्रे</strong> के पास से निकलती है।</p>\n</li>\n</ol>\n<p data-start=\"1192\" data-end=\"1285\"><strong data-start=\"1192\" data-end=\"1244\">Which of the statements given above are correct?</strong><br data-start=\"1244\" data-end=\"1247\" /><strong data-start=\"1247\" data-end=\"1285\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1287\" data-end=\"1321\">A. 1 and 2 only<br data-start=\"1302\" data-end=\"1305\" />A. केवल 1 और 2</p>\n<p data-start=\"1323\" data-end=\"1363\">B. 1, 2 and 4 only<br data-start=\"1341\" data-end=\"1344\" />B. केवल 1, 2 और 4</p>\n<p data-start=\"1365\" data-end=\"1405\">C. 2, 3 and 4 only<br data-start=\"1383\" data-end=\"1386\" />C. केवल 2, 3 और 4</p>\n<p data-start=\"1407\" data-end=\"1425\">D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"1633\" data-end=\"1785\"><strong data-start=\"1633\" data-end=\"1712\">Consider the following statements regarding the Indus Waters Treaty (1960):</strong><br data-start=\"1712\" data-end=\"1715\" /><strong data-start=\"1715\" data-end=\"1785\">सिंधु जल संधि (1960) के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"1787\" data-end=\"2429\">\n<li data-section-id=\"ar47el\" data-start=\"1787\" data-end=\"1981\">\n<p data-start=\"1790\" data-end=\"1981\">The treaty was signed between <strong data-start=\"1820\" data-end=\"1842\">India and Pakistan</strong> by <strong data-start=\"1846\" data-end=\"1880\">Jawaharlal Nehru and Ayub Khan</strong>.<br data-start=\"1881\" data-end=\"1884\" />यह संधि <strong data-start=\"1895\" data-end=\"1916\">भारत और पाकिस्तान</strong> के बीच <strong data-start=\"1924\" data-end=\"1954\">जवाहरलाल नेहरू और अयूब खान</strong> द्वारा हस्ताक्षरित हुई थी।</p>\n</li>\n<li data-section-id=\"1bkaaur\" data-start=\"1983\" data-end=\"2174\">\n<p data-start=\"1986\" data-end=\"2174\">Under the treaty, the <strong data-start=\"2008\" data-end=\"2050\">western rivers (Indus, Jhelum, Chenab)</strong> were allocated mainly to Pakistan.<br data-start=\"2085\" data-end=\"2088\" />संधि के अनुसार <strong data-start=\"2106\" data-end=\"2145\">पश्चिमी नदियाँ (सिंधु, झेलम, चेनाब)</strong> मुख्यतः पाकिस्तान को दी गईं।</p>\n</li>\n<li data-section-id=\"brfkqd\" data-start=\"2176\" data-end=\"2307\">\n<p data-start=\"2179\" data-end=\"2307\">The <strong data-start=\"2183\" data-end=\"2222\">eastern rivers (Ravi, Beas, Sutlej)</strong> were allocated to India.<br data-start=\"2247\" data-end=\"2250\" /><strong data-start=\"2253\" data-end=\"2291\">पूर्वी नदियाँ (रावी, ब्यास, सतलुज)</strong> भारत को दी गईं।</p>\n</li>\n<li data-section-id=\"1ruhgv8\" data-start=\"2309\" data-end=\"2429\">\n<p data-start=\"2312\" data-end=\"2429\">India has full control over the waters of the <strong data-start=\"2358\" data- 1050\">Arabian Sea near Sagar Island</strong>.<br data-start=\"1051\" data-end=\"1054\" />यह नदी अंततः <strong data-start=\"1070\" data-end=\"1100\">सागर द्वीप के पास अरब सागर</strong> में गिरती है।</p>\n</li>\n</ol>\n<p data-start=\"1116\" data-end=\"1209\"><strong data-start=\"1116\" data-end=\"1168\">Which of the statements given above are correct?</strong><br data-start=\"1168\" data-end=\"1171\" /><strong data-start=\"1171\" data-end=\"1209\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1211\" data-end=\"1245\">A. 1 and 2 only<br data-start=\"1226\" data-end=\"1229\" />A. केवल 1 और 2</p>\n<p data-start=\"1247\" data-end=\"1287\">B. 1, 2 and 3 only<br data-start=\"1265\" data-end=\"1268\" />B. केवल 1, 2 और 3</p>\n<p data-start=\"1289\" data-end=\"1329\">C. 2, 3 and 4 only<br data-start=\"1307\" data-end=\"1310\" />C. केवल 2, 3 और 4</p>\n<p data-start=\"1331\" data-end=\"1349\">D. 1, 2, 3 and 4</p>\n<p data-start=\"1351\" data-end=\"1457\"></p>",

    "correct_option_id": 1,
    "solution": "<h1 data-section-id=\"1ygn97t\" data-start=\"225\" data-end=\"265\">THE GANGA RIVER SYSTEM &ndash; CHEAT SHEET</h1>\n<hr data-start=\"303\" data-end=\"306\" />\n<h1 data-section-id=\"qmguao\" data-start=\"308\" data-end=\"329\">1. Basic Overview</h1>\n<h1 data-section-id=\"zs4to6\" data-start=\"330\" data-end=\"346\">1. मूल जानकारी</h1>\n<p data-start=\"348\" data-end=\"481\"><strong data-start=\"348\" data-end=\"414\">Most important river of India (basin + cultural significance).</strong><br data-start=\"414\" data-end=\"417\" /><strong data-start=\"417\" data-end=\"481\">भारत की सबसे महत्वपूर्ण नदी (बेसिन और सांस्कृतिक दृष्टि से)।</strong></p>\n<p data-start=\"483\" data-end=\"554\">&bull; <strong data-start=\"485\" data-end=\"518\">Largest river system in India</strong><br data-start=\"518\" data-end=\"521\" />&bull; <strong data-start=\"523\" data-end=\"554\">भारत का सबसे बड़ा नदी तंत्र</strong></p>\n<hr data-start=\"556\" data-end=\"559\" />\n<h1 data-section-id=\"rs9s8l\" data-start=\"561\" data-end=\"583\">2. Origin &amp; Course</h1>\n<h1 data-section-id=\"163cd7k\" data-start=\"584\" data-end=\"604\">2. उद्गम और प्रवाह</h1>\n<p data-start=\"606\" data-end=\"808\"><strong data-start=\"606\" data-end=\"617\">Origin:</strong><br data-start=\"617\" data-end=\"620\" />Bhagirathi rises from <strong data-start=\"642\" data-end=\"684\">Gangotri Glacier near Gaumukh (3900 m)</strong> in Uttarkashi district, Uttarakhand.<br data-start=\"721\" data-end=\"724\" /><strong data-start=\"724\" data-end=\"734\">उद्गम:</strong><br data-start=\"734\" data-end=\"737\" />भागीरथी का उद्गम <strong data-start=\"754\" data-end=\"796\">गौमुख के पास गंगोत्री हिमनद (3900 मी.)</strong> से होता है।</p>\n<p data-start=\"810\" data-end=\"909\"><strong data-start=\"810\" data-end=\"824\">Devprayag:</strong><br data-start=\"824\" data-end=\"827\" />Bhagirathi + Alaknanda &rarr; <strong data-start=\"852\" data-end=\"861\">Ganga</strong><br data-start=\"861\" data-end=\"864\" /><strong data-start=\"864\" data-end=\"878\">देवप्रयाग:</strong><br data-start=\"878\" data-end=\"881\" />भागीरथी + अलकनंदा &rarr; <strong data-start=\"901\" data-end=\"909\">गंगा</strong></p>\n<p data-start=\"911\" data-end=\"977\"><strong data-start=\"911\" data-end=\"931\">Entry to Plains:</strong><br data-start=\"931\" data-end=\"934\" />Haridwar<br data-start=\"942\" data-end=\"945\" /><strong data-start=\"945\" data-end=\"966\">मैदान में प्रवेश:</strong><br data-start=\"966\" data-end=\"969\" />हरिद्वार</p>\n<p data-start=\"979\" data-end=\"1097\"><strong data-start=\"979\" data-end=\"999\">Final Discharge:</strong><br data-start=\"999\" data-end=\"1002\" />Bay of Bengal near <strong data-start=\"1021\" data-end=\"1037\">Sagar Island</strong><br data-start=\"1037\" data-end=\"1040\" /><strong data-start=\"1040\" data-end=\"1058\">अंतिम विसर्जन:</strong><br data-start=\"1058\" data-end=\"1061\" /><strong data-start=\"1061\" data-end=\"1075\">सागर द्वीप</strong> के पास बंगाल की खाड़ी</p>\n<hr data-start=\"1099\" data-end=\"1102\" />\n<h1 data-section-id=\"qkh106\" data-start=\"1104\" data-end=\"1125\">3. Length &amp; Basin</h1>\n<h1 data-section-id=\"h3pok1\" data-start=\"1126\" data-end=\"1145\">3. लंबाई और बेसिन</h1>\n<p data-start=\"1147\" data-end=\"1252\">&bull; <strong data-start=\"1149\" data-end=\"1166\">Total Length:</strong> 2525 km (Longest river of India)<br data-start=\"1199\" data-end=\"1202\" />&bull; <strong data-start=\"1204\" data-end=\"1218\">कुल लंबाई:</strong> 2525 किमी (भारत की सबसे लंबी नदी)</p>\n<p data-start=\"1254\" data-end=\"1327\">&bull; <strong data-start=\"1256\" data-end=\"1271\">Basin Area:</strong> 8.6 lakh sq km<br data-start=\"1286\" data-end=\"1289\" />&bull; <strong data-start=\"1291\" data-end=\"1309\">बेसिन क्षेत्र:</strong> 8.6 लाख वर्ग किमी</p>\n<p data-start=\"1329\" data-end=\"1422\">&bull; Drains <strong data-start=\"1338\" data-end=\"1374\">26% of India's geographical area</strong><br data-start=\"1374\" data-end=\"1377\" />&bull; भारत के <strong data-start=\"1387\" data-end=\"1410\">26% भौगोलिक क्षेत्र</strong> का जल निकास</p>\n<hr data-start=\"1424\" data-end=\"1427\" />\n<h1 data-section-id=\"eozoht\" data-start=\"1429\" data-end=\"1462\">4. State Share (River Length)</h1>\n<h1 data-section-id=\"y6batg\" data-start=\"1463\" data-end=\"1485\">4. राज्यों में लंबाई</h1>\n<p data-start=\"1487\" data-end=\"1611\">Uttar Pradesh &ndash; <strong data-start=\"1503\" data-end=\"1524\">1450 km (Longest)</strong><br data-start=\"1524\" data-end=\"1527\" />West Bengal &ndash; <strong data-start=\"1541\" data-end=\"1551\">520 km</strong><br data-start=\"1551\" data-end=\"1554\" />Bihar &ndash; <strong data-start=\"1562\" data-end=\"1572\">445 km</strong><br data-start=\"1572\" data-end=\"1575\" />Uttarakhand &ndash; <strong data-start=\"1589\" data-end=\"1599\">110 km</strong><br data-start=\"1599\" data-end=\"1602\" />Jharkhand</p>\n<hr data-start=\"1613\" data-end=\"1616\" />\n<h1 data-section-id=\"ylf0m5\" data-start=\"1618\" data-end=\"1647\">5. Important Water Divide</h1>\n<h1 data-section-id=\"8dn6ce\" data-start=\"1648\" data-end=\"1673\">5. महत्वपूर्ण जल विभाजक</h1>\n<p data-start=\"1675\" data-end=\"1754\"><strong data-start=\"1675\" data-end=\"1685\">Ambala</strong> lies on the water divide between<br data-start=\"1718\" data-end=\"1721\" /><strong data-start=\"1721\" data-end=\"1754\">Indus and Ganga river systems</strong></p>\n<p data-start=\"1756\" data-end=\"1827\"><strong data-start=\"1756\" data-end=\"1767\">अम्बाला</strong><br data-start=\"1767\" data-end=\"1770\" />सिंधु और गंगा नदी तंत्र के बीच <strong data-start=\"1801\" data-end=\"1814\">जल विभाजक</strong> पर स्थित है।</p>\n<hr data-start=\"1829\" data-end=\"1832\" />\n<h1 data-section-id=\"1q2sgo8\" data-start=\"1834\" data-end=\"1872\">6. Panch Prayag (Five Confluences)</h1>\n<h1 data-section-id=\"1y1x9y5\" data-start=\"1873\" data-end=\"1888\">6. पंच प्रयाग</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1890\" data-end=\"2193\">\n<thead data-start=\"1890\" data-end=\"1937\">\n<tr data-start=\"1890\" data-end=\"1937\">\n<th class=\"\" data-start=\"1890\" data-end=\"1899\" data-col-size=\"sm\">Prayag</th>\n<th class=\"\" data-start=\"1899\" data-end=\"1925\" data-col-size=\"sm\">River Meeting Alaknanda</th>\n<th class=\"\" data-start=\"1925\" data-end=\"1937\" data-col-size=\"sm\">Location</th>\n</tr>\n</thead>\n<tbody data-start=\"1982\" data-end=\"2193\">\n<tr data-start=\"1982\" data-end=\"2026\">\n<td data-start=\"1982\" data-end=\"1998\" data-col-size=\"sm\">Vishnu Prayag</td>\n<td data-start=\"1998\" data-end=\"2013\" data-col-size=\"sm\">Dhauli Ganga</td>\n<td data-col-size=\"sm\" data-start=\"2013\" data-end=\"2026\">Joshimath</td>\n</tr>\n<tr data-start=\"2027\" data-end=\"2068\">\n<td data-start=\"2027\" data-end=\"2041\" data-col-size=\"sm\">Nand Prayag</td>\n<td data-start=\"2041\" data-end=\"2053\" data-col-size=\"sm\">Nandakini</td>\n<td data-start=\"2053\" data-end=\"2068\" data-col-size=\"sm\">Uttarakhand</td>\n</tr>\n<tr data-start=\"2069\" data-end=\"2108\">\n<td data-start=\"2069\" data-end=\"2084\" data-col-size=\"sm\">Karan Prayag</td>\n<td data-start=\"2084\" data-end=\"2093\" data-col-size=\"sm\">Pindar</td>\n<td data-start=\"2093\" data-end=\"2108\" data-col-size=\"sm\">Uttarakhand</td>\n</tr>\n<tr data-start=\"2109\" data-end=\"2151\">\n<td data-start=\"2109\" data-end=\"2124\" data-col-size=\"sm\">Rudra Prayag</td>\n<td data-col-size=\"sm\" data-start=\"2124\" data-end=\"2136\">Mandakini</td>\n<td data-col-size=\"sm\" data-start=\"2136\" data-end=\"2151\">Uttarakhand</td>\n</tr>\n<tr data-start=\"2152\" data-end=\"2193\">\n<td data-start=\"2152\" data-end=\"2165\" data-col-size=\"sm\">Dev Prayag</td>\n<td data-start=\"2165\" data-end=\"2178\" data-col-size=\"sm\">Bhagirathi</td>\n<td data-start=\"2178\" data-end=\"2193\" data-col-size=\"sm\">Uttarakhand</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2195\" data-end=\"2198\" />\n<h1 data-section-id=\"rvnio6\" data-start=\"2200\" data-end=\"2222\">7. Alaknanda River</h1>\n<h1 data-section-id=\"13dp8n5\" data-start=\"2223\" data-end=\"2239\">7. अलकनंदा नदी</h1>\n<p data-start=\"2241\" data-end=\"2314\"><strong data-start=\"2241\" data-end=\"2252\">Source:</strong> Satopanth Glacier (above Badrinath)<br data-start=\"2288\" data-end=\"2291\" /><strong data-start=\"2291\" data-end=\"2301\">उद्गम:</strong> सतोपंथ हिमनद</p>\n<p data-start=\"2316\" data-end=\"2395\"><strong data-start=\"2316\" data-end=\"2332\">Tributaries:</strong><br data-start=\"2332\" data-end=\"2335\" />Dhauli Ganga<br data-start=\"2347\" data-end=\"2350\" />Vishnu Ganga<br data-start=\"2362\" data-end=\"2365\" />Nandakini<br data-start=\"2374\" data-end=\"2377\" />Pindar<br data-start=\"2383\" data-end=\"2386\" />Mandakini</p>\n<hr data-start=\"2397\" data-end=\"2400\" />\n<h1 data-section-id=\"rq5fau\" data-start=\"2402\" data-end=\"2431\">8. Right Bank Tributaries</h1>\n<h1 data-section-id=\"1u33vdu\" data-start=\"2432\" data-end=\"2456\">8. दाहिनी सहायक नदियाँ</h1>\n<h3 data-section-id=\"y14oa1\" data-start=\"2458\" data-end=\"2468\">Yamuna</h3>\n<p data-start=\"2469\" data-end=\"2604\">&bull; Longest tributary of Ganga (<strong data-start=\"2499\" data-end=\"2510\">1370 km</strong>)<br data-start=\"2511\" data-end=\"2514\" />&bull; Origin: <strong data-start=\"2524\" data-end=\"2565\">Yamunotri Glacier (Bandarpunch Range)</strong><br data-start=\"2565\" data-end=\"2568\" />&bull; Confluence: <strong data-start=\"2582\" data-end=\"2604\">Prayag (Allahabad)</strong></p>\n<p data-start=\"2606\" data-end=\"2659\"><strong data-start=\"2606\" data-end=\"2628\">Right Tributaries:</strong><br data-start=\"2628\" data-end=\"2631\" />Chambal<br data-start=\"2638\" data-end=\"2641\" />Sind<br data-start=\"2645\" data-end=\"2648\" />Betwa<br data-start=\"2653\" data-end=\"2656\" />Ken</p>\n<p data-start=\"2661\" data-end=\"2727\"><strong data-start=\"2661\" data-end=\"2682\">Left Tributaries:</strong><br data-start=\"2682\" data-end=\"2685\" />Tons (largest by volume)<br data-start=\"2709\" data-end=\"2712\" />Hindan<br data-start=\"2718\" data-end=\"2721\" />Varuna</p>\n<hr data-start=\"2729\" data-end=\"2732\" />\n<h3 data-section-id=\"1rg9n4e\" data-start=\"2734\" data-end=\"2745\">Chambal</h3>\n<p data-start=\"2747\" data-end=\"2808\"><strong data-start=\"2747\" data-end=\"2758\">Origin:</strong> Mhow (Malwa Plateau)<br data-start=\"2779\" data-end=\"2782\" /><strong data-start=\"2782\" data-end=\"2792\">उद्गम:</strong> महू, मालवा पठार</p>\n<p data-start=\"2810\" data-end=\"2839\"><strong data-start=\"2810\" data-end=\"2832\">Joins Yamuna near:</strong> Etawah</p>\n<p data-start=\"2841\" data-end=\"2908\"><strong data-start=\"2841\" data-end=\"2856\">Famous For:</strong><br data-start=\"2856\" data-end=\"2859\" />Chambal ravines (Badland topography)<br data-start=\"2895\" data-end=\"2898\" />चंबल बीहड़</p>\n<p data-start=\"2910\" data-end=\"2922\"><strong data-start=\"2910\" data-end=\"2922\">Projects</strong></p>\n<p data-start=\"2924\" data-end=\"2976\">Gandhi Sagar Dam<br data-start=\"2940\" data-end=\"2943\" />Rana Pratap Sagar<br data-start=\"2960\" data-end=\"2963\" />Jawahar Sagar</p>\n<hr data-start=\"2978\" data-end=\"2981\" />\n<h3 data-section-id=\"6x1u2r\" data-start=\"2983\" data-end=\"2992\">Betwa</h3>\n<p data-start=\"2994\" data-end=\"3061\">Origin: <strong data-start=\"3002\" data-end=\"3019\">Vindhya Range</strong><br data-start=\"3019\" data-end=\"3022\" />Projects: <strong data-start=\"3032\" data-end=\"3061\">Matatila Dam, Rajghat Dam</strong></p>\n<hr data-start=\"3063\" data-end=\"3066\" />\n<h3 data-section-id=\"1xxfecm\" data-start=\"3068\" data-end=\"3075\">Ken</h3>\n<p data-start=\"3077\" data-end=\"3101\">Origin: <strong data-start=\"3085\" data-end=\"3101\">Kaimur Hills</strong></p>\n<p data-start=\"3103\" data-end=\"3141\">Passes through <strong data-start=\"3118\" data-end=\"3141\">Panna National Park</strong></p>\n<p data-start=\"3143\" data-end=\"3173\">Major river of <strong data-start=\"3158\" data-end=\"3173\">Bundelkhand</strong></p>\n<hr data-start=\"3175\" data-end=\"3178\" />\n<h3 data-section-id=\"1czfi6m\" data-start=\"3180\" data-end=\"3193\">Son River</h3>\n<p data-start=\"3195\" data-end=\"3225\">Origin: <strong data-start=\"3203\" data-end=\"3225\">Amarkantak Plateau</strong></p>\n<p data-start=\"3227\" data-end=\"3278\">Flows <strong data-start=\"3233\" data-end=\"3247\">northwards</strong> and joins Ganga near <strong data-start=\"3269\" data-end=\"3278\">Arrah</strong></p>\n<p data-start=\"3280\" data-end=\"3314\">Tributaries:<br data-start=\"3292\" data-end=\"3295\" />Rihand<br data-start=\"3301\" data-end=\"3304\" />North Koel</p>\n<p data-start=\"3316\" data-end=\"3339\">Project: <strong data-start=\"3325\" data-end=\"3339\">Rihand Dam</strong></p>\n<hr data-start=\"3341\" data-end=\"3344\" />\n<h3 data-section-id=\"1b0vtrq\" data-start=\"3346\" data-end=\"3357\">Damodar</h3>\n<p data-start=\"3359\" data-end=\"3411\">Flows through <strong data-start=\"3373\" data-end=\"3411\">rift valley in Chotanagpur Plateau</strong></p>\n<p data-start=\"3413\" data-end=\"3448\">Earlier called <strong data-start=\"3428\" data-end=\"3448\">Sorrow of Bengal</strong></p>\n<p data-start=\"3450\" data-end=\"3504\">Now controlled by <strong data-start=\"3468\" data-end=\"3504\">Damodar Valley Corporation (DVC)</strong></p>\n<hr data-start=\"3506\" data-end=\"3509\" />\n<h1 data-section-id=\"rkw830\" data-start=\"3511\" data-end=\"3539\">9. Left Bank Tributaries</h1>\n<h1 data-section-id=\"1b8l6od\" data-start=\"3540\" data-end=\"3562\">9. बाईं सहायक नदियाँ</h1>\n<h3 data-section-id=\"1umnms6\" data-start=\"3564\" data-end=\"3576\">Ramganga</h3>\n<p data-start=\"3578\" data-end=\"3603\">Origin: <strong data-start=\"3586\" data-end=\"3603\">Garhwal Hills</strong></p>\n<p data-start=\"3605\" data-end=\"3633\">Joins Ganga near <strong data-start=\"3622\" data-end=\"3633\">Kannauj</strong></p>\n<p data-start=\"3635\" data-end=\"3679\">Passes through <strong data-start=\"3650\" data-end=\"3679\">Jim Corbett National Park</strong></p>\n<hr data-start=\"3681\" data-end=\"3684\" />\n<h3 data-section-id=\"6tw05a\" data-start=\"3686\" data-end=\"3695\">Gomti</h3>\n<p data-start=\"3697\" data-end=\"3744\">Origin: <strong data-start=\"3705\" data-end=\"3744\">Gomat Taal (Fulhaar Lake), Pilibhit</strong></p>\n<p data-start=\"3746\" data-end=\"3788\">Only tributary <strong data-start=\"3761\" data-end=\"3788\">originating from plains</strong></p>\n<p data-start=\"3790\" data-end=\"3829\">Cities:<br data-start=\"3797\" data-end=\"3800\" />Lucknow<br data-start=\"3807\" data-end=\"3810\" />Sultanpur<br data-start=\"3819\" data-end=\"3822\" />Jaunpur</p>\n<hr data-start=\"3831\" data-end=\"3834\" />\n<h3 data-section-id=\"1kcjkz9\" data-start=\"3836\" data-end=\"3848\">Ghaghara</h3>\n<p data-start=\"3850\" data-end=\"3890\">Origin: <strong data-start=\"3858\" data-end=\"3890\">Tibet (Mapchachungo Glacier)</strong></p>\n<p data-start=\"3892\" data-end=\"3921\">Known as <strong data-start=\"3901\" data-end=\"3921\">Karnali in Nepal</strong></p>\n<p data-start=\"3923\" data-end=\"3949\">Joins Ganga at <strong data-start=\"3938\" data-end=\"3949\">Chhapra</strong></p>\n<hr data-start=\"3951\" data-end=\"3954\" />\n<h3 data-section-id=\"c4bzq8\" data-start=\"3956\" data-end=\"3966\">Gandak</h3>\n<p data-start=\"3968\" data-end=\"3995\">Origin: <strong data-start=\"3976\" data-end=\"3995\">Nepal Himalayas</strong></p>\n<p data-start=\"3997\" data-end=\"4037\">Formed by <strong data-start=\"4007\" data-end=\"4037\">Kali Gandak + Trishulganga</strong></p>\n<p data-start=\"4039\" data-end=\"4075\">Joins Ganga at <strong data-start=\"4054\" data-end=\"4075\">Sonpur near Patna</strong></p>\n<hr data-start=\"4077\" data-end=\"4080\" />\n<h3 data-section-id=\"yni6go\" data-start=\"4082\" data-end=\"4090\">Kosi</h3>\n<p data-start=\"4092\" data-end=\"4122\">Origin: <strong data-start=\"4100\" data-end=\"4122\">Gosainthan Glacier</strong></p>\n<p data-start=\"4124\" data-end=\"4159\">Formed by<br data-start=\"4133\" data-end=\"4136\" />Arun<br data-start=\"4140\" data-end=\"4143\" />Tamur<br data-start=\"4148\" data-end=\"4151\" />Sun Kosi</p>\n<p data-start=\"4161\" data-end=\"4181\">Called <strong data-start=\"4168\" data-end=\"4181\">Sapt Kosi</strong></p>\n<p data-start=\"4183\" data-end=\"4211\">Known as <strong data-start=\"4192\" data-end=\"4211\">Sorrow of Bihar</strong></p>\n<hr data-start=\"4213\" data-end=\"4216\" />\n<h3 data-section-id=\"enw6sn\" data-start=\"4218\" data-end=\"4231\">Mahananda</h3>\n<p data-start=\"4233\" data-end=\"4261\">Origin: <strong data-start=\"4241\" data-end=\"4261\">Darjeeling Hills</strong></p>\n<p data-start=\"4263\" data-end=\"4300\">Last <strong data-start=\"4268\" data-end=\"4300\">left bank tributary of Ganga</strong></p>\n<hr data-start=\"4302\" data-end=\"4305\" />\n<h1 data-section-id=\"o3ijre\" data-start=\"4307\" data-end=\"4333\">10. Major Distributary</h1>\n<h1 data-section-id=\"1t7js8z\" data-start=\"4334\" data-end=\"4356\">10. प्रमुख वितरिकाएँ</h1>\n<h3 data-section-id=\"edenti\" data-start=\"4358\" data-end=\"4382\">Hooghly (Bhagirathi)</h3>\n<p data-start=\"4384\" data-end=\"4421\">Ganga splits near <strong data-start=\"4402\" data-end=\"4421\">Farakka Barrage</strong></p>\n<p data-start=\"4423\" data-end=\"4436\">Two branches:</p>\n<p data-start=\"4438\" data-end=\"4460\"><strong data-start=\"4438\" data-end=\"4460\">Padma &rarr; Bangladesh</strong></p>\n<p data-start=\"4462\" data-end=\"4492\"><strong data-start=\"4462\" data-end=\"4492\">Bhagirathi/Hooghly &rarr; India</strong></p>\n<p data-start=\"4494\" data-end=\"4505\">Tributaries</p>\n<p data-start=\"4507\" data-end=\"4540\">Damodar<br data-start=\"4514\" data-end=\"4517\" />Mayurakshi<br data-start=\"4527\" data-end=\"4530\" />Kangsabati</p>\n<hr data-start=\"4542\" data-end=\"4545\" />\n<h1 data-section-id=\"1qspm16\" data-start=\"4547\" data-end=\"4568\">11. Special Facts</h1>\n<h1 data-section-id=\"1blmm93\" data-start=\"4569\" data-end=\"4585\">11. विशेष तथ्य</h1>\n<p data-start=\"4587\" data-end=\"4611\"><strong data-start=\"4587\" data-end=\"4611\">Self Purifying River</strong></p>\n<p data-start=\"4613\" data-end=\"4647\">Because of <strong data-start=\"4624\" data-end=\"4647\">Bacteriophage virus</strong></p>\n<p data-start=\"4649\" data-end=\"4671\">Kills harmful bacteria</p>\n<hr data-start=\"4673\" data-end=\"4676\" />\n<p data-start=\"4678\" data-end=\"4703\"><strong data-start=\"4678\" data-end=\"4703\">High Dissolved Oxygen</strong></p>\n<p data-start=\"4705\" data-end=\"4749\">Supports aquatic life<br data-start=\"4726\" data-end=\"4729\" />(Ganga Dolphin etc.)</p>\n<hr data-start=\"4751\" data-end=\"4754\" />\n<h1 data-section-id=\"cc3swf\" data-start=\"4756\" data-end=\"4778\">12. National River</h1>\n<h1 data-section-id=\"8e7p4s\" data-start=\"4779\" data-end=\"4798\">12. राष्ट्रीय नदी</h1>\n<p data-start=\"4800\" data-end=\"4841\"><strong data-start=\"4800\" data-end=\"4841\">Ganga declared National River in 2008</strong></p>\n<p data-start=\"4843\" data-end=\"4901\"><strong data-start=\"4843\" data-end=\"4901\">2008 में गंगा को भारत की राष्ट्रीय नदी घोषित किया गया।</strong></p>\n<hr data-start=\"4903\" data-end=\"4906\" />\n<p data-start=\"4908\" data-end=\"4931\"><strong data-start=\"4910\" data-end=\"4931\">Exam Memory Lines</strong></p>\n<p></p>\n<p data-start=\"4933\" data-end=\"5114\">&bull; Longest river of India &rarr; <strong data-start=\"4960\" data-end=\"4979\">Ganga (2525 km)</strong><br data-start=\"4979\" data-end=\"4982\" />&bull; Panch Prayag &rarr; <strong data-start=\"4999\" data-end=\"5004\">5</strong><br data-start=\"5004\" data-end=\"5007\" />&bull; Sorrow of Bihar &rarr; <strong data-start=\"5027\" data-end=\"5035\">Kosi</strong><br data-start=\"5035\" data-end=\"5038\" />&bull; Sorrow of Bengal &rarr; <strong data-start=\"5059\" data-end=\"5070\">Damodar</strong><br data-start=\"5070\" data-end=\"5073\" />&bull; Only plain-origin tributary &rarr; <strong data-start=\"5105\" data-end=\"5114\">Gomti</strong></p>",
    "marks": 2.0,
    "section": "DRAINAGE SYSTEM"
  },

    "question": "<p data-start=\"2215\" data-end=\"2342\"><strong data-start=\"2215\" data-end=\"2280\">Consider the following statements regarding the Yamuna River:</strong><br data-start=\"2280\" data-end=\"2283\" /><strong data-start=\"2283\" data-end=\"2342\">यमुना नदी के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"2344\" data-end=\"2952\">\n<li data-section-id=\"e6l4eo\" data-start=\"2344\" data-end=\"2547\">\n<p data-start=\"2347\" data-end=\"2547\">Yamuna originates from the <strong data-start=\"2374\" data-end=\"2395\">Yamunotri Glacier</strong> on the western slopes of the <strong data-start=\"2425\" data-end=\"2446\">Bandarpunch Range</strong>.<br data-start=\"2447\" data-end=\"2450\" />यमुना का उद्गम <strong data-start=\"2468\" data-end=\"2535\">बंदरपूंछ पर्वत श्रृंखला की पश्चिमी ढाल पर स्थित यमुनोत्री हिमनद</strong> से होता है।</p>\n</li>\n<li data-section-id=\"10wie90\" data-start=\"2549\" data-end=\"2649\">\n<p data-start=\"2552\" data-end=\"2649\">It joins the Ganga at <strong data-start=\"2574\" data-end=\"2596\">Prayag (Allahabad)</strong>.<br data-start=\"2597\" data-end=\"2600\" />यह गंगा से <strong data-start=\"2614\" data-end=\"2635\">प्रयाग (इलाहाबाद)</strong> में मिलती है।</p>\n</li>\n<li data-section-id=\"16rc301\" data-start=\"2651\" data-end=\"2805\">\n<p data-start=\"2654\" data-end=\"2805\"><strong data-start=\"2654\" data-end=\"2686\">Chambal, Betwa, Sind and Ken</strong> are major right bank tributaries of Yamuna.<br data-start=\"2730\" data-end=\"2733\" /><strong data-start=\"2736\" data-end=\"2764\">चंबल, बेतवा, सिंध और केन</strong> यमुना की प्रमुख दाहिनी सहायक नदियाँ हैं।</p>\n</li>\n<li data-section-id=\"11rhbw8\" data-start=\"2807\" data-end=\"2952\">\n<p data-start=\"2810\" data-end=\"2952\">The <strong data-start=\"2814\" data-end=\"2828\">Tons River</strong> is the largest tributary of Yamuna by water volume.<br data-start=\"2880\" data-end=\"2883\" /><strong data-start=\"2886\" data-end=\"2898\">टोंस नदी</strong> जल मात्रा के आधार पर यमुना की सबसे बड़ी सहायक नदी है।</p>\n</li>\n</ol>\n<p data-start=\"2954\" data-end=\"3006\"><strong data-start=\"2954\" data-end=\"3006\">Which of the statements given above are correct?</strong></p>\n<p></p>\n<p data-start=\"3008\" data-end=\"3086\">A. 1 and 2 only<br data-start=\"3023\" data-end=\"3026\" />B. 1, 2 and 3 only<br data-start=\"3044\" data-end=\"3047\" />C. 2, 3 and 4 only<br data-start=\"3065\" data-end=\"3068\" />D. 1, 2, 3 and 4</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 3,
    "solution": "",
    "marks": 2.0,
    "section": "DRAINAGE SYSTEM"

  {
    "question": "<p data-start=\"3211\" data-end=\"3288\"><strong data-start=\"3211\" data-end=\"3249\">Consider the following statements:</strong><br data-start=\"3249\" data-end=\"3252\" /><strong data-start=\"3252\" data-end=\"3288\">निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"3290\" data-end=\"3568\">\n<li data-section-id=\"16kp9k4\" data-start=\"3290\" data-end=\"3359\">\n<p data-start=\"3293\" data-end=\"3359\"><strong data-start=\"3293\" data-end=\"3310\">Chambal River</strong> originates near <strong data-start=\"3327\" data-end=\"3356\">Mhow in the Malwa Plateau</strong>.</p>\n</li>\n<li data-section-id=\"1hwaouy\" data-start=\"3360\" data-end=\"3422\">\n<p data-start=\"3363\" data-end=\"3422\"><strong data-start=\"3363\" data-end=\"3376\">Son River</strong> originates from the <strong data-start=\"3397\" data-end=\"3419\">Amarkantak Plateau</strong>.</p>\n</li>\n<li data-section-id=\"1ydqect\" data-start=\"3423\" data-end=\"3505\">\n<p data-start=\"3426\" data-end=\"3505\"><strong data-start=\"3426\" data-end=\"3443\">Damodar River</strong> flows through a <strong data-start=\"3460\" data-end=\"3502\">rift valley in the Chotanagpur Plateau</strong>.</p>\n</li>\n<li data-section-id=\"jejn4p\" data-start=\"3506\" data-end=\"3568\">\n<p data-start=\"3509\" data-end=\"3568\"><strong data-start=\"3509\" data-end=\"3524\">Gomti River</strong> originates from the <strong data-start=\"3545\" data-end=\"3567\">Himalayan glaciers</strong>.</p>\n</li>\n</ol>\n<p data-start=\"3570\" data-end=\"3610\"><strong data-start=\"3570\" data-end=\"3610\">उपरोक्त कथनों में से कौन से सही हैं?</strong></p>\n<p data-start=\"3612\" data-end=\"3690\">A. 1 and 2 only<br data-start=\"3627\" data-end=\"3630\" />B. 1, 2 and 3 only<br data-start=\"3648\" data-end=\"3651\" />C. 2, 3 and 4 only<br data-start=\"3669\" data-end=\"3672\" />D. 1, 2, 3 and 4</p>\n<p data-start=\"3692\" data-end=\"3805\"></p>",
    "comp": "",
    "options": [

    "solution": "<p>✅&nbsp;<strong data-start=\"3694\" data-end=\"3715\">Correct Answer: B</strong><br data-start=\"3715\" data-end=\"3718\" /><em data-start=\"3718\" data-end=\"3784\">(Statement 4 incorrect &ndash; Gomti originates from Gomat Taal in UP)</em></p>",

    "question": "<p data-start=\"3915\" data-end=\"3992\"><strong data-start=\"3915\" data-end=\"3953\">Consider the following statements:</strong><br data-start=\"3953\" data-end=\"3956\" /><strong data-start=\"3956\" data-end=\"3992\">निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"3994\" data-end=\"4683\">\n<li data-section-id=\"17jcr1w\" data-start=\"3994\" data-end=\"4166\">\n<p data-start=\"3997\" data-end=\"4166\">The <strong data-start=\"4001\" data-end=\"4015\">Kosi River</strong> is formed by the confluence of <strong data-start=\"4047\" data-end=\"4082\">Arun, Tamur and Sun Kosi rivers</strong>.<br data-start=\"4083\" data-end=\"4086\" /><strong data-start=\"4089\" data-end=\"4101\">कोसी नदी</strong> का निर्माण <strong data-start=\"4113\" data-end=\"4139\">अरुण, तमूर और सुन कोसी</strong> नदियों के संगम से होता है।</p>\n</li>\n<li data-section-id=\"1xhlgs0\" data-start=\"4168\" data-end=\"4346\">\n<p data-start=\"4171\" data-end=\"4346\">Because of frequent course changes and floods, the Kosi is known as the <strong data-start=\"4243\" data-end=\"4265\">&ldquo;Sorrow of Bihar.&rdquo;</strong><br data-start=\"4265\" data-end=\"4268\" />बार-बार मार्ग बदलने और बाढ़ के कारण कोसी को <strong data-start=\"4315\" data-end=\"4333\">&ldquo;बिहार का शोक&rdquo;</strong> कहा जाता है।</p>\n</li>\n<li data-section-id=\"1dutxxp\" data-start=\"4348\" data-end=\"4551\">\n<p data-start=\"4351\" data-end=\"4551\">The Ganga splits near <strong data-start=\"4373\" data-end=\"4384\">Farakka</strong> into <strong data-start=\"4390\" data-end=\"4412\">Padma (Bangladesh)</strong> and <strong data-start=\"4417\" data-end=\"4439\">Bhagirathi-Hooghly</strong> distributaries.<br data-start=\"4455\" data-end=\"4458\" />गंगा <strong data-start=\"4466\" data-end=\"4476\">फरक्का</strong> के पास <strong data-start=\"4484\" data-end=\"4506\">पद्मा (बांग्लादेश)</strong> और <strong data-start=\"4510\" data-end=\"4527\">भागीरथी-हुगली</strong> में विभाजित हो जाती है।</p>\n</li>\n<li data-section-id=\"1owm4pz\" data-start=\"4553\" data-end=\"4683\">\n<p data-start=\"4556\" data-end=\"4683\">The Ganga was declared the <strong data-start=\"4583\" data-end=\"4618\">National River of India in 2008</strong>.<br data-start=\"4619\" data-end=\"4622\" /><strong data-start=\"4625\" data-end=\"4683\">2008 में गंगा को भारत की राष्ट्रीय नदी घोषित किया गया।</strong></p>\n</li>\n</ol>\n<p data-start=\"4685\" data-end=\"4737\"><strong data-start=\"4685\" data-end=\"4737\">Which of the statements given above are correct?</strong></p>\n<p></p>\n<p data-start=\"4739\" data-end=\"4817\">A. 1 and 2 only<br data-start=\"4754\" data-end=\"4757\" />B. 1, 2 and 3 only<br data-start=\"4775\" data-end=\"4778\" />C. 2, 3 and 4 only<br data-start=\"4796\" data-end=\"4799\" />D. 1, 2, 3 and 4</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 3,
    "solution": "",
    "marks": 2.0,
    "section": "DRAINAGE SYSTEM"
  },
  {
    "question": "<p data-path-to-node=\"9\"><strong data-path-to-node=\"9\" data-index-in-node=\"0\">&nbsp;Which of the following statements regarding the Yamuna river is INCORRECT?</strong> <strong data-path-to-node=\"9\" data-index-in-node=\"79\">यमुना नदी के संबंध में निम्नलिखित में से कौन सा कथन गलत है?</strong></p>\n<p data-path-to-node=\"10\">(a) It is the longest and westernmost tributary of the Ganga.</p>\n<p data-path-to-node=\"10\">(यह गंगा की सबसे लंबी और सबसे पश्चिमी सहायक नदी है।)</p>\n<p data-path-to-node=\"10\">(b) The Tons is its largest tributary by volume.</p>\n<p data-path-to-node=\"10\">(टोन्स आयतन की दृष्टि से इसकी सबसे बड़ी सहायक नदी है।)</p>\n<p data-path-to-node=\"10\">(c) Its right bank tributaries like Chambal and Betwa originate from the Himalayas.</p>\n<p data-path-to-node=\"10\">(चंबल और बेतवा जैसी इसकी दाहिने तट की सहायक नदियाँ हिमालय से निकलती हैं।)</p>\n<p data-path-to-node=\"10\">(d) It joins the Ganga at Prayag (Allahabad).</p>\n<p data-path-to-node=\"10\">(यह प्रयाग (इलाहाबाद) में गंगा से मिलती है।)</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 2,
    "solution": "<p><strong data-path-to-node=\"11\" data-index-in-node=\"0\">Answer: (c)</strong>&nbsp;<strong data-path-to-node=\"11\" data-index-in-node=\"12\">Solution:</strong>&nbsp;The right bank tributaries of Yamuna, such as&nbsp;<strong data-path-to-node=\"11\" data-index-in-node=\"68\">Chambal, Sind, Betwa, and Ken</strong>, originate from the&nbsp;<strong data-path-to-node=\"11\" data-index-in-node=\"118\">Peninsular Plateau</strong>&nbsp;(Malwa/Vindhya ranges), not the Himalayas. The Tons and Hindan are left bank tributaries. (यमुना के दाहिने तट की सहायक नदियाँ जैसे चंबल, सिंध, बेतवा और केन&nbsp;<strong data-path-to-node=\"11\" data-index-in-node=\"293\">प्रायद्वीपीय पठार</strong>&nbsp;(मालवा/विंध्य श्रेणियों) से निकलती हैं, न कि हिमालय से। टोन्स और हिंडन बाएं तट की सहायक नदियाँ हैं।)</p>",
    "marks": 2.0,
    "section": "DRAINAGE SYSTEM"
  },
  {
    "question": "<p data-path-to-node=\"17\"><strong data-path-to-node=\"17\" data-index-in-node=\"0\">&nbsp;Consider the following statements about the Kosi and Son rivers:</strong> <strong data-path-to-node=\"17\" data-index-in-node=\"69\">कोसी और सोन नदियों के बारे में निम्नलिखित कथनों पर विचार करें:</strong></p>\n<ol start=\"1\" data-path-to-node=\"18\">\n<li>\n<p data-path-to-node=\"18,0,0\">The <strong data-path-to-node=\"18,0,0\" data-index-in-node=\"4\">Son</strong> is the only major tributary that flows North to join the Ganga from the South. (सोन एकमात्र प्रमुख सहायक नदी है जो दक्षिण से गंगा में मिलने के लिए उत्तर की ओर बहती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"18,1,0\">The <strong data-path-to-node=\"18,1,0\" data-index-in-node=\"4\">Kosi</strong> is known as the 'Sorrow of Bihar' due to frequent course changes. (कोसी को बार-बार मार्ग बदलने के कारण 'बिहार का शोक' कहा जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"18,2,0\">Both rivers originate from the Amarkantak Plateau. (दोनों नदियाँ अमरकंटक पठार से निकलती हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"19\"><strong data-path-to-node=\"19\" data-index-in-node=\"0\">Which of the statements given above is/are CORRECT?</strong> <strong data-path-to-node=\"19\" data-index-in-node=\"52\">ऊपर दिए गए कथनों में से कौन सा/से सही है/हैं?</strong></p>\n<p data-path-to-node=\"20\">(a) 1 and 2 only (b) 2 and 3 only (c) 1 and 3 only (d) 1, 2, and 3</p>\n<p data-path-to-node=\"21\"></p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p><strong data-path-to-node=\"21\" data-index-in-node=\"0\">Answer: (a) 1 and 2 only</strong>&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"25\">Solution:</strong>&nbsp;Statement 3 is wrong because only the&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"73\">Son</strong>&nbsp;(and Narmada) originates from Amarkantak. The&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"123\">Kosi</strong>&nbsp;originates from the&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"148\">Gosainthan Glacier</strong>&nbsp;(Tibet/Nepal). The Son joins the Ganga near Patna, and the Kosi is an antecedent river formed by 7 streams (Sapt Kosi). (कथन 3 गलत है क्योंकि केवल&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"314\">सोन</strong>&nbsp;(और नर्मदा) अमरकंटक से निकलती है।&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"352\">कोसी</strong>&nbsp;का उद्गम&nbsp;<strong data-path-to-node=\"21\" data-index-in-node=\"366\">गोसाईंथान ग्लेशियर</strong>&nbsp;(तिब्बत/नेपाल) से होता है। सोन पटना के पास गंगा में मिलती है, और कोसी 7 धाराओं (सप्त कोसी) से बनी एक पूर्ववर्ती नदी है।)</p>",
    "marks": 2.0,
    "section": "DRAINAGE SYSTEM"
  },
  {
    "question": "<p data-path-to-node=\"23\"><strong data-path-to-node=\"23\" data-index-in-node=\"0\">Identify the river features based on the provided geographical data:</strong> <strong data-path-to-node=\"23\" data-index-in-node=\"73\">प्रदान किए गए भौगोलिक आंकड़ों के आधार पर नदी की विशेषताओं की पहचान करें:</strong></p>\n<ul data-path-to-node=\"24\">\n<li>\n<p data-path-to-node=\"24,0,0\"><strong data-path-to-node=\"24,0,0\" data-index-in-node=\"0\">Farakka:</strong> Northernmost point of the Ganga delta. (गंगा डेल्टा का सबसे उत्तरी बिंदु।)</p>\n</li>\n<li>\n<p data-path-to-node=\"24,1,0\"><strong data-path-to-node=\"24,1,0\" data-index-in-node=\"0\">Ambala:</strong> Water divide between Indus and Ganga systems. (सिंधु और गंगा प्रणालियों के बीच जल विभाजक।)</p>\n</li>\n<li>\n<p data-path-to-node=\"24,2,0\"><strong data-path-to-node=\"24,2,0\" data-index-in-node=\"0\">Mahananda:</strong> The last left bank tributary in West Bengal. (पश्चिम बंगाल में अंतिम बाएं तट की सहायक नदी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"24,3,0\"><strong data-path-to-node=\"24,3,0\" data-index-in-node=\"0\">Self-Purification:</strong> Due to the presence of Bacteriophages. (बैक्टेरियोफेज की उपस्थिति के कारण स्वतः शुद्धिकरण।)</p>\n</li>\n</ul>\n<p data-path-to-node=\"25\"><strong data-path-to-node=\"25\" data-index-in-node=\"0\">Which state has the longest share of the Ganga river's length?</strong> <strong data-path-to-node=\"25\" data-index-in-node=\"63\">गंगा नदी की लंबाई में किस राज्य की हिस्सेदारी सबसे लंबी है?</strong></p>\n<p data-path-to-node=\"26\">(a) West Bengal (पश्चिम बंगाल) (b) Uttarakhand (उत्तराखंड) (c) Uttar Pradesh (उत्तर प्रदेश) (d) Bihar (बिहार)</p>\n<p data-path-to-node=\"27\"></p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 2,
    "solution": "<p><strong data-path-to-node=\"27\" data-index-in-node=\"0\">Answer: (c) Uttar Pradesh (उत्तर प्रदेश)</strong>&nbsp;<strong data-path-to-node=\"27\" data-index-in-node=\"41\">Solution:</strong>&nbsp;The Ganga covers&nbsp;<strong data-path-to-node=\"27\" data-index-in-node=\"68\">1,450 km</strong>&nbsp;in Uttar Pradesh, which is the longest stretch among the five states (UP &gt; WB &gt; Bihar &gt; UK &gt; Jharkhand). The river was declared the&nbsp;<strong data-path-to-node=\"27\" data-index-in-node=\"209\">National River</strong>&nbsp;in 2008. (उत्तर प्रदेश में गंगा&nbsp;<strong data-path-to-node=\"27\" data-index-in-node=\"256\">1,450 किमी</strong>&nbsp;की दूरी तय करती है, जो पाँच राज्यों (यूपी &gt; प.बंगाल &gt; बिहार &gt; उत्तराखंड &gt; झारखंड) में सबसे लंबी है। नदी को 2008 में&nbsp;<strong data-path-to-node=\"27\" data-index-in-node=\"383\">राष्ट्रीय नदी</strong>&nbsp;घोषित किया गया था।)</p>",

  },

    "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Which left-bank tributary of the Ganga is unique because it originates from the plains (land) rather than glaciers or hills?</strong></p>\n<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"129\">गंगा की कौन सी बाएं तट की सहायक नदी अद्वितीय है क्योंकि यह हिमनदों या पहाड़ियों के बजाय मैदानों (भूमि) से निकलती है?</strong></p>\n<p data-path-to-node=\"14\">(a) Ramganga (रामगंगा)</p>\n<p data-path-to-node=\"14\">(b) Gomti (गोमती)</p>\n<p data-path-to-node=\"14\">(c) Ghaghara (घाघरा)</p>\n<p data-path-to-node=\"14\">(d) Gandak (गंडक)</p>",

    "solution": "<p><strong data-path-to-node=\"15\" data-index-in-node=\"0\">Answer: (b) Gomti (गोमती)</strong>&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"26\">Solution:</strong>&nbsp;The&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"40\">Gomti</strong>&nbsp;originates from&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"62\">Gomat Taal (Fulhaar Lake)</strong>&nbsp;in Pilibhit, UP. It is the only tributary that originates from the plains. Cities like Lucknow and Jaunpur are situated on its banks. (गोमती का उद्गम उत्तर प्रदेश के पीलीभीत में&nbsp;<strong data-path-to-node=\"15\" data-index-in-node=\"266\">गोमत ताल (फुलहार झील)</strong>&nbsp;से होता है। यह एकमात्र सहायक नदी है जो मैदानों से निकलती है। लखनऊ और जौनपुर जैसे शहर इसके तट पर स्थित हैं।)</p>",
