    "question": "<p data-start=\"363\" data-end=\"501\"><strong data-start=\"363\" data-end=\"433\">Consider the following statements regarding the Brahmaputra River:</strong><br data-start=\"433\" data-end=\"436\" /><strong data-start=\"436\" data-end=\"501\">ब्रह्मपुत्र नदी के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"503\" data-end=\"1174\">\n<li data-section-id=\"1i1yckq\" data-start=\"503\" data-end=\"727\">\n<p data-start=\"506\" data-end=\"727\">The Brahmaputra originates from the <strong data-start=\"542\" data-end=\"617\">Chemayungdung (Angsi) glacier in the Kailash Range near Mansarovar Lake</strong>.<br data-start=\"618\" data-end=\"621\" />ब्रह्मपुत्र का उद्गम <strong data-start=\"645\" data-end=\"715\">कैलाश पर्वतमाला में मानसरोवर झील के पास चेमायुंगडुंग (अंगसी) हिमनद</strong> से होता है।</p>\n</li>\n<li data-section-id=\"1ittw3g\" data-start=\"729\" data-end=\"853\">\n<p data-start=\"732\" data-end=\"853\">In Tibet it flows eastward and is known as <strong data-start=\"775\" data-end=\"786\">Tsangpo</strong>.<br data-start=\"787\" data-end=\"790\" />तिब्बत में यह पूर्व की ओर बहती है और <strong data-start=\"830\" data-end=\"842\">त्सांगपो</strong> कहलाती है।</p>\n</li>\n<li data-section-id=\"1entuly\" data-start=\"855\" data-end=\"1056\">\n<p data-start=\"858\" data-end=\"1056\">After entering India near <strong data-start=\"884\" data-end=\"915\">Sadiya in Arunachal Pradesh</strong>, it is known as <strong data-start=\"932\" data-end=\"951\">Siang or Dihang</strong>.<br data-start=\"952\" data-end=\"955\" /><strong data-start=\"958\" data-end=\"1018\">अरुणाचल प्रदेश में सादिया के पास भारत में प्रवेश करने पर</strong> इसे <strong data-start=\"1023\" data-end=\"1043\">सियांग या दिहांग</strong> कहा जाता है।</p>\n</li>\n<li data-section-id=\"u64886\" data-start=\"1058\" data-end=\"1174\">\n<p data-start=\"1061\" data-end=\"1174\">The Brahmaputra originates in the <strong data-start=\"1095\" data-end=\"1113\">Aravalli Range</strong>.<br data-start=\"1114\" data-end=\"1117\" />ब्रह्मपुत्र का उद्गम <strong data-start=\"1141\" data-end=\"1161\">अरावली पर्वतमाला</strong> में होता है।</p>\n</li>\n</ol>\n<p data-start=\"1176\" data-end=\"1269\"><strong data-start=\"1176\" data-end=\"1228\">Which of the statements given above are correct?</strong><br data-start=\"1228\" data-end=\"1231\" /><strong data-start=\"1231\" data-end=\"1269\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1271\" data-end=\"1349\">A. 1 and 2 only<br data-start=\"1286\" data-end=\"1289\" />B. 1, 2 and 3 only<br data-start=\"1307\" data-end=\"1310\" />C. 2, 3 and 4 only<br data-start=\"1328\" data-end=\"1331\" />D. 1, 2, 3 and 4</p>\n<p data-start=\"1351\" data-end=\"1423\"></p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&nbsp;<strong data-start=\"1353\" data-end=\"1374\">Correct Answer: B</strong><br data-start=\"1374\" data-end=\"1377\" /><em data-start=\"1377\" data-end=\"1402\">(Statement 4 incorrect)</em><br data-start=\"1402\" data-end=\"1405\" /><br /></p>\n<h1 data-section-id=\"qmd8y8\" data-start=\"0\" data-end=\"46\">THE BRAHMAPUTRA RIVER SYSTEM &ndash; CHEAT SHEET</h1>\n<hr data-start=\"91\" data-end=\"94\" />\n<h1 data-section-id=\"qmguao\" data-start=\"96\" data-end=\"117\">1. Basic Overview</h1>\n<p data-start=\"136\" data-end=\"252\"><strong data-start=\"136\" data-end=\"194\">Brahmaputra is one of the largest rivers in the world.</strong><br data-start=\"194\" data-end=\"197\" /><strong data-start=\"197\" data-end=\"252\">ब्रह्मपुत्र विश्व की सबसे बड़ी नदियों में से एक है।</strong></p>\n<p data-start=\"254\" data-end=\"318\">&bull; <strong data-start=\"256\" data-end=\"273\">Total Length:</strong> ~2900 km<br data-start=\"282\" data-end=\"285\" />&bull; <strong data-start=\"287\" data-end=\"301\">कुल लंबाई:</strong> लगभग 2900 किमी</p>\n<p data-start=\"320\" data-end=\"444\">&bull; Originates in <strong data-start=\"336\" data-end=\"384\">Tibet and flows through India and Bangladesh</strong><br data-start=\"384\" data-end=\"387\" />&bull; <strong data-start=\"389\" data-end=\"444\">तिब्बत से निकलकर भारत और बांग्लादेश से होकर बहती है</strong></p>\n<hr data-start=\"446\" data-end=\"449\" />\n<h1 data-section-id=\"agvt5a\" data-start=\"451\" data-end=\"464\">2. Origin</h1>\n<h1 data-section-id=\"mwx76p\" data-start=\"465\" data-end=\"475\">2. उद्गम</h1>\n<p data-start=\"477\" data-end=\"567\"><strong data-start=\"477\" data-end=\"488\">Origin:</strong> Chemayungdung Glacier (Angsi Glacier)<br data-start=\"526\" data-end=\"529\" />Kailash Range near <strong data-start=\"548\" data-end=\"567\">Mansarovar Lake</strong></p>\n<p data-start=\"569\" data-end=\"655\"><strong data-start=\"569\" data-end=\"579\">उद्गम:</strong> चेमायुंगडुंग हिमनद (अंगसी हिमनद)<br data-start=\"612\" data-end=\"615\" /><strong data-start=\"615\" data-end=\"655\">कैलाश पर्वतमाला, मानसरोवर झील के पास</strong></p>\n<hr data-start=\"657\" data-end=\"660\" />\n<h1 data-section-id=\"1p19c6s\" data-start=\"662\" data-end=\"683\">3. Course &amp; Names</h1>\n<h1 data-section-id=\"8rpalz\" data-start=\"684\" data-end=\"710\">3. प्रवाह और विभिन्न नाम</h1>\n<h3 data-section-id=\"12rgzt0\" data-start=\"712\" data-end=\"731\">Tibet (China)</h3>\n<h3 data-section-id=\"1bzk9wn\" data-start=\"732\" data-end=\"748\">तिब्बत (चीन)</h3>\n<p data-start=\"750\" data-end=\"841\">&bull; Name: <strong data-start=\"758\" data-end=\"769\">Tsangpo</strong> (meaning &ldquo;The Purifier&rdquo;)<br data-start=\"794\" data-end=\"797\" />&bull; नाम: <strong data-start=\"804\" data-end=\"816\">त्सांगपो</strong> (अर्थ &ndash; शुद्ध करने वाला)</p>\n<p data-start=\"843\" data-end=\"956\">&bull; Flows eastward for about <strong data-start=\"870\" data-end=\"881\">1200 km</strong> in southern Tibet<br data-start=\"899\" data-end=\"902\" />&bull; तिब्बत में लगभग <strong data-start=\"920\" data-end=\"956\">1200 किमी पूर्व दिशा में बहती है</strong></p>\n<p data-start=\"958\" data-end=\"994\">&bull; Major tributary: <strong data-start=\"977\" data-end=\"994\">Rango Tsangpo</strong></p>\n<hr data-start=\"996\" data-end=\"999\" />\n<h3 data-section-id=\"1g7whxh\" data-start=\"1001\" data-end=\"1023\">Entry into India</h3>\n<h3 data-section-id=\"1icmopl\" data-start=\"1024\" data-end=\"1043\">भारत में प्रवेश</h3>\n<p data-start=\"1045\" data-end=\"1154\">&bull; Near <strong data-start=\"1052\" data-end=\"1077\">Namcha Barwa (7755 m)</strong> it forms a deep gorge<br data-start=\"1099\" data-end=\"1102\" />&bull; <strong data-start=\"1104\" data-end=\"1128\">नमचा बरवा (7755 मी.)</strong> के पास गहरी घाटी बनाती है</p>\n<p data-start=\"1156\" data-end=\"1281\">&bull; Takes a sharp <strong data-start=\"1172\" data-end=\"1220\">U-turn due to syntaxial bending of Himalayas</strong><br data-start=\"1220\" data-end=\"1223\" />&bull; हिमालय के <strong data-start=\"1235\" data-end=\"1256\">सिन्टैक्सियल मोड़</strong> के कारण तीव्र <strong data-start=\"1271\" data-end=\"1281\">U-turn</strong></p>\n<p data-start=\"1283\" data-end=\"1397\">&bull; Enters India <strong data-start=\"1298\" data-end=\"1336\">west of Sadiya (Arunachal Pradesh)</strong><br data-start=\"1336\" data-end=\"1339\" />&bull; <strong data-start=\"1341\" data-end=\"1368\">सादिया (अरुणाचल प्रदेश)</strong> के पश्चिम से भारत में प्रवेश</p>\n<p data-start=\"1399\" data-end=\"1428\">&bull; Known as <strong data-start=\"1410\" data-end=\"1428\">Siang / Dihang</strong></p>\n<hr data-start=\"1430\" data-end=\"1433\" />\n<h3 data-section-id=\"1cs45hn\" data-start=\"1435\" data-end=\"1446\">Assam</h3>\n<h3 data-section-id=\"1xytudx\" data-start=\"1447\" data-end=\"1454\">असम</h3>\n<p data-start=\"1456\" data-end=\"1541\">&bull; Receives <strong data-start=\"1467\" data-end=\"1487\">Dibang and Lohit</strong> rivers<br data-start=\"1494\" data-end=\"1497\" />&bull; <strong data-start=\"1499\" data-end=\"1518\">दिबांग और लोहित</strong> नदियाँ इसमें मिलती हैं</p>\n<p data-start=\"1543\" data-end=\"1596\">&bull; After their confluence it is called <strong data-start=\"1581\" data-end=\"1596\">Brahmaputra</strong></p>\n<p data-start=\"1598\" data-end=\"1631\">&bull; Assam valley length: <strong data-start=\"1621\" data-end=\"1631\">750 km</strong></p>\n<p data-start=\"1633\" data-end=\"1668\">&bull; Total length in India: <strong data-start=\"1658\" data-end=\"1668\">916 km</strong></p>\n<hr data-start=\"1670\" data-end=\"1673\" />\n<h3 data-section-id=\"17rxcwr\" data-start=\"1675\" data-end=\"1691\">Bangladesh</h3>\n<h3 data-section-id=\"z4b4ev\" data-start=\"1692\" data-end=\"1706\">बांग्लादेश</h3>\n<p data-start=\"1708\" data-end=\"1732\">&bull; Enters near <strong data-start=\"1722\" data-end=\"1732\">Dhubri</strong></p>\n<p data-start=\"1734\" data-end=\"1761\">&bull; Known as <strong data-start=\"1745\" data-end=\"1761\">Jamuna River</strong></p>\n<p data-start=\"1763\" data-end=\"1802\">&bull; <strong data-start=\"1765\" data-end=\"1775\">Teesta</strong> joins it on the right bank</p>\n<hr data-start=\"1804\" data-end=\"1807\" />\n<h1 data-section-id=\"4sir3d\" data-start=\"1809\" data-end=\"1829\">4. Mouth &amp; Delta</h1>\n<h1 data-section-id=\"64obz2\" data-start=\"1830\" data-end=\"1851\">4. मुहाना और डेल्टा</h1>\n<p data-start=\"1853\" data-end=\"1930\">&bull; Jamuna merges with <strong data-start=\"1874\" data-end=\"1891\">Padma (Ganga)</strong><br data-start=\"1891\" data-end=\"1894\" />&bull; जमुना <strong data-start=\"1902\" data-end=\"1918\">पद्मा (गंगा)</strong> से मिलती है</p>\n<p data-start=\"1932\" data-end=\"1962\">&bull; Padma joins <strong data-start=\"1946\" data-end=\"1962\">Meghna River</strong></p>\n<p data-start=\"1964\" data-end=\"2003\">&bull; Finally drains into <strong data-start=\"1986\" data-end=\"2003\">Bay of Bengal</strong></p>\n<p data-start=\"2005\" data-end=\"2064\">&bull; Forms <strong data-start=\"2013\" data-end=\"2064\">World&rsquo;s Largest Delta &ndash; Ganga-Brahmaputra Delta</strong></p>\n<hr data-start=\"2066\" data-end=\"2069\" />\n<h1 data-section-id=\"9h60hy\" data-start=\"2071\" data-end=\"2097\">5. Basin &amp; Flow Region</h1>\n<h1 data-section-id=\"pub821\" data-start=\"2098\" data-end=\"2126\">5. बेसिन और प्रवाह क्षेत्र</h1>\n<p data-start=\"2128\" data-end=\"2142\">Flows through:</p>\n<p data-start=\"2144\" data-end=\"2196\">&bull; <strong data-start=\"2146\" data-end=\"2163\">China (Tibet)</strong><br data-start=\"2163\" data-end=\"2166\" />&bull; <strong data-start=\"2168\" data-end=\"2177\">India</strong><br data-start=\"2177\" data-end=\"2180\" />&bull; <strong data-start=\"2182\" data-end=\"2196\">Bangladesh</strong></p>\n<hr data-start=\"2198\" data-end=\"2201\" />\n<h3 data-section-id=\"566tv0\" data-start=\"2203\" data-end=\"2228\">Basin Spread in India</h3>\n<p data-start=\"2230\" data-end=\"2237\">States:</p>\n<p data-start=\"2239\" data-end=\"2322\">&bull; Arunachal Pradesh<br data-start=\"2258\" data-end=\"2261\" />&bull; Assam<br data-start=\"2268\" data-end=\"2271\" />&bull; West Bengal<br data-start=\"2284\" data-end=\"2287\" />&bull; Meghalaya<br data-start=\"2298\" data-end=\"2301\" />&bull; Nagaland<br data-start=\"2311\" data-end=\"2314\" />&bull; Sikkim</p>\n<hr data-start=\"2324\" data-end=\"2327\" />\n<h3 data-section-id=\"1xy7c21\" data-start=\"2329\" data-end=\"2347\">Latitude Range</h3>\n<p data-start=\"2349\" data-end=\"2395\"><strong data-start=\"2349\" data-end=\"2377\">Ganga&ndash;Brahmaputra Basin:</strong><br data-start=\"2377\" data-end=\"2380\" /><strong data-start=\"2380\" data-end=\"2395\">10&deg;N &ndash; 30&deg;N</strong></p>\n<hr data-start=\"2397\" data-end=\"2400\" />\n<h1 data-section-id=\"1e816jy\" data-start=\"2402\" data-end=\"2421\">6. Key Features</h1>\n<h1 data-section-id=\"zqfemg\" data-start=\"2422\" data-end=\"2443\">6. प्रमुख विशेषताएँ</h1>\n<h3 data-section-id=\"pwypq\" data-start=\"2445\" data-end=\"2467\">Floods &amp; Erosion</h3>\n<h3 data-section-id=\"ruhblr\" data-start=\"2468\" data-end=\"2485\">बाढ़ और अपरदन</h3>\n<p data-start=\"2487\" data-end=\"2513\">Brahmaputra is famous for:</p>\n<p data-start=\"2515\" data-end=\"2582\">&bull; <strong data-start=\"2517\" data-end=\"2536\">Frequent floods</strong><br data-start=\"2536\" data-end=\"2539\" />&bull; <strong data-start=\"2541\" data-end=\"2561\">Channel shifting</strong><br data-start=\"2561\" data-end=\"2564\" />&bull; <strong data-start=\"2566\" data-end=\"2582\">Bank erosion</strong></p>\n<p data-start=\"2584\" data-end=\"2591\">Reason:</p>\n<p data-start=\"2593\" data-end=\"2650\">&bull; Heavy rainfall in catchment area<br data-start=\"2627\" data-end=\"2630\" />&bull; Huge sediment load</p>\n<p data-start=\"2652\" data-end=\"2697\"><strong data-start=\"2652\" data-end=\"2697\">Largest sediment load among Indian rivers</strong></p>\n<hr data-start=\"2699\" data-end=\"2702\" />\n<h1 data-section-id=\"1umebll\" data-start=\"2704\" data-end=\"2733\">7. Right Bank Tributaries</h1>\n<h1 data-section-id=\"pp2ll9\" data-start=\"2734\" data-end=\"2758\">7. दाहिनी सहायक नदियाँ</h1>\n<h3 data-section-id=\"cm1wmk\" data-start=\"2760\" data-end=\"2773\">Subansiri</h3>\n<p data-start=\"2775\" data-end=\"2858\">&bull; Largest right bank tributary<br data-start=\"2805\" data-end=\"2808\" />&bull; Origin: <strong data-start=\"2818\" data-end=\"2827\">Tibet</strong><br data-start=\"2827\" data-end=\"2830\" />&bull; Type: <strong data-start=\"2838\" data-end=\"2858\">Antecedent River</strong></p>\n<hr data-start=\"2860\" data-end=\"2863\" />\n<h3 data-section-id=\"vu6lw3\" data-start=\"2865\" data-end=\"2888\">Kameng (Jiabharali)</h3>\n<p data-start=\"2890\" data-end=\"2960\">&bull; Origin: <strong data-start=\"2900\" data-end=\"2923\">Arunachal Himalayas</strong><br data-start=\"2923\" data-end=\"2926\" />&bull; Enters Assam near <strong data-start=\"2946\" data-end=\"2960\">Bhalukpong</strong></p>\n<hr data-start=\"2962\" data-end=\"2965\" />\n<h3 data-section-id=\"73gyc6\" data-start=\"2967\" data-end=\"2976\">Manas</h3>\n<p data-start=\"2978\" data-end=\"3062\">&bull; Transboundary river (<strong data-start=\"3001\" data-end=\"3019\">Bhutan &rarr; India</strong>)<br data-start=\"3020\" data-end=\"3023\" />&bull; Flows through <strong data-start=\"3039\" data-end=\"3062\">Manas National Park</strong></p>\n<p data-start=\"3064\" data-end=\"3079\">Famous animals:</p>\n<p data-start=\"3081\" data-end=\"3110\">&bull; Pygmy Hog<br data-start=\"3092\" data-end=\"3095\" />&bull; Golden Langur</p>\n<hr data-start=\"3112\" data-end=\"3115\" />\n<h3 data-section-id=\"19n0jz9\" data-start=\"3117\" data-end=\"3128\">Sankosh</h3>\n<p data-start=\"3130\" data-end=\"3150\">&bull; Origin: <strong data-start=\"3140\" data-end=\"3150\">Bhutan</strong></p>\n<p data-start=\"3152\" data-end=\"3190\">&bull; Important river of <strong data-start=\"3173\" data-end=\"3190\">Western Assam</strong></p>\n<hr data-start=\"3192\" data-end=\"3195\" />\n<h3 data-section-id=\"qx00b8\" data-start=\"3197\" data-end=\"3207\">Teesta</h3>\n<p data-start=\"3209\" data-end=\"3253\">&bull; Origin: <strong data-start=\"3219\" data-end=\"3253\">Teesta Kangse Glacier (Sikkim)</strong></p>\n<p data-start=\"3255\" data-end=\"3304\">&bull; Forms boundary between <strong data-start=\"3280\" data-end=\"3304\">Sikkim &amp; West Bengal</strong></p>\n<p data-start=\"3306\" data-end=\"3342\">&bull; Major tributary: <strong data-start=\"3325\" data-end=\"3342\">Rangeet River</strong></p>\n<p data-start=\"3344\" data-end=\"3381\">&bull; Joins Brahmaputra in <strong data-start=\"3367\" data-end=\"3381\">Bangladesh</strong></p>\n<hr data-start=\"3383\" data-end=\"3386\" />\n<h3 data-section-id=\"qkoz8k\" data-start=\"3388\" data-end=\"3420\">Other Right Bank Tributaries</h3>\n<p data-start=\"3422\" data-end=\"3453\">&bull; Torsa<br data-start=\"3429\" data-end=\"3432\" />&bull; Raidak<br data-start=\"3440\" data-end=\"3443\" />&bull; Jaldakha</p>\n<hr data-start=\"3455\" data-end=\"3458\" />\n<h1 data-section-id=\"di077x\" data-start=\"3460\" data-end=\"3488\">8. Left Bank Tributaries</h1>\n<h1 data-section-id=\"14q02ss\" data-start=\"3489\" data-end=\"3511\">8. बाईं सहायक नदियाँ</h1>\n<h3 data-section-id=\"7427bk\" data-start=\"3513\" data-end=\"3522\">Lohit</h3>\n<p data-start=\"3524\" data-end=\"3551\">&bull; Origin: <strong data-start=\"3534\" data-end=\"3551\">Eastern Tibet</strong></p>\n<p data-start=\"3553\" data-end=\"3597\">&bull; Enters India through <strong data-start=\"3576\" data-end=\"3597\">Arunachal Pradesh</strong></p>\n<hr data-start=\"3599\" data-end=\"3602\" />\n<h3 data-section-id=\"va39dl\" data-start=\"3604\" data-end=\"3623\">Dibang (Sikang)</h3>\n<p data-start=\"3625\" data-end=\"3640\">Major tributary</p>\n<p data-start=\"3642\" data-end=\"3664\">Important tributaries:</p>\n<p data-start=\"3666\" data-end=\"3700\">&bull; Dri<br data-start=\"3671\" data-end=\"3674\" />&bull; Mathun<br data-start=\"3682\" data-end=\"3685\" />&bull; Talon<br data-start=\"3692\" data-end=\"3695\" />&bull; Eme</p>\n<hr data-start=\"3702\" data-end=\"3705\" />\n<h3 data-section-id=\"1elqx3s\" data-start=\"3707\" data-end=\"3727\">Dhansari (South)</h3>\n<p data-start=\"3729\" data-end=\"3751\">&bull; Origin: <strong data-start=\"3739\" data-end=\"3751\">Nagaland</strong></p>\n<p data-start=\"3753\" data-end=\"3792\">&bull; Joins Brahmaputra near <strong data-start=\"3778\" data-end=\"3792\">Numaligarh</strong></p>\n<hr data-start=\"3794\" data-end=\"3797\" />\n<h3 data-section-id=\"z17h5z\" data-start=\"3799\" data-end=\"3815\">Burhi Dihing</h3>\n<p data-start=\"3817\" data-end=\"3843\">&bull; Origin: <strong data-start=\"3827\" data-end=\"3843\">Patkai Hills</strong></p>\n<p data-start=\"3845\" data-end=\"3887\">&bull; Important tributary of <strong data-start=\"3870\" data-end=\"3887\">Eastern Assam</strong></p>\n<hr data-start=\"3889\" data-end=\"3892\" />\n<h3 data-section-id=\"jm3mam\" data-start=\"3894\" data-end=\"3904\">Kopili</h3>\n<p data-start=\"3906\" data-end=\"3937\">&bull; Origin: <strong data-start=\"3916\" data-end=\"3937\">Meghalaya Plateau</strong></p>\n<p data-start=\"3939\" data-end=\"3977\">&bull; Known for <strong data-start=\"3951\" data-end=\"3977\">Hydroelectric Projects</strong></p>\n<hr data-start=\"3979\" data-end=\"3982\" />\n<h3 data-section-id=\"gko9i4\" data-start=\"3984\" data-end=\"3994\">Desang</h3>\n<p data-start=\"3996\" data-end=\"4020\">&bull; Origin: <strong data-start=\"4006\" data-end=\"4020\">Naga Hills</strong></p>\n<p data-start=\"4022\" data-end=\"4060\">&bull; Flows through <strong data-start=\"4038\" data-end=\"4060\">Sivasagar district</strong></p>\n<hr data-start=\"4062\" data-end=\"4065\" />\n<h3 data-section-id=\"gmznqo\" data-start=\"4067\" data-end=\"4077\">Dikhow</h3>\n<p data-start=\"4079\" data-end=\"4103\">&bull; Origin: <strong data-start=\"4089\" data-end=\"4103\">Naga Hills</strong></p>\n<p data-start=\"4105\" data-end=\"4146\">&bull; Joins Brahmaputra near <strong data-start=\"4130\" data-end=\"4146\">Nitaipukhuri</strong></p>\n<hr data-start=\"4148\" data-end=\"4151\" />\n<h3 data-section-id=\"6x4z4t\" data-start=\"4153\" data-end=\"4162\">Barak</h3>\n<p data-start=\"4164\" data-end=\"4191\">&bull; Origin: <strong data-start=\"4174\" data-end=\"4191\">Manipur Hills</strong></p>\n<p data-start=\"4193\" data-end=\"4216\">&bull; Flows into Bangladesh</p>\n<p data-start=\"4218\" data-end=\"4243\">&bull; Joins <strong data-start=\"4226\" data-end=\"4243\">Meghna system</strong></p>\n<p data-start=\"4245\" data-end=\"4250\">City:</p>\n<p data-start=\"4252\" data-end=\"4265\">&bull; <strong data-start=\"4254\" data-end=\"4265\">Silchar</strong></p>\n<hr data-start=\"4267\" data-end=\"4270\" />\n<h1 data-section-id=\"1sie2ap\" data-start=\"4272\" data-end=\"4301\">9. Islands of Brahmaputra</h1>\n<h1 data-section-id=\"1fwme7i\" data-start=\"4302\" data-end=\"4327\">9. ब्रह्मपुत्र के द्वीप</h1>\n<h3 data-section-id=\"11kz225\" data-start=\"4329\" data-end=\"4346\">Majuli Island</h3>\n<p data-start=\"4348\" data-end=\"4382\">&bull; <strong data-start=\"4350\" data-end=\"4382\">World&rsquo;s largest river island</strong></p>\n<p data-start=\"4384\" data-end=\"4405\">&bull; Location: <strong data-start=\"4396\" data-end=\"4405\">Assam</strong></p>\n<hr data-start=\"4407\" data-end=\"4410\" />\n<h3 data-section-id=\"1robsue\" data-start=\"4412\" data-end=\"4431\">Umananda Island</h3>\n<p data-start=\"4433\" data-end=\"4465\">&bull; Also called <strong data-start=\"4447\" data-end=\"4465\">Peacock Island</strong></p>\n<p data-start=\"4467\" data-end=\"4502\">&bull; <strong data-start=\"4469\" data-end=\"4502\">World&rsquo;s smallest river island</strong></p>\n<p data-start=\"4504\" data-end=\"4533\">&bull; Location: <strong data-start=\"4516\" data-end=\"4533\">Near Guwahati</strong></p>\n<hr data-start=\"4535\" data-end=\"4538\" />\n<h1 data-section-id=\"9j5a4m\" data-start=\"4540\" data-end=\"4578\">10. Different Names of Brahmaputra</h1>\n<h1 data-section-id=\"1cqcmdr\" data-start=\"4579\" data-end=\"4611\">10. ब्रह्मपुत्र के विभिन्न नाम</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4613\" data-end=\"4855\">\n<thead data-start=\"4613\" data-end=\"4630\">\n<tr data-start=\"4613\" data-end=\"4630\">\n<th class=\"\" data-start=\"4613\" data-end=\"4622\" data-col-size=\"sm\">Region</th>\n<th class=\"\" data-start=\"4622\" data-end=\"4630\" data-col-size=\"sm\">Name</th>\n</tr>\n</thead>\n<tbody data-start=\"4647\" data-end=\"4855\">\n<tr data-start=\"4647\" data-end=\"4666\">\n<td data-start=\"4647\" data-end=\"4655\" data-col-size=\"sm\">Tibet</td>\n<td data-start=\"4655\" data-end=\"4666\" data-col-size=\"sm\">Tsangpo</td>\n</tr>\n<tr data-start=\"4667\" data-end=\"4701\">\n<td data-start=\"4667\" data-end=\"4675\" data-col-size=\"sm\">China</td>\n<td data-start=\"4675\" data-end=\"4701\" data-col-size=\"sm\">Yarlung Zangbo / Jiang</td>\n</tr>\n<tr data-start=\"4702\" data-end=\"4740\">\n<td data-start=\"4702\" data-end=\"4722\" data-col-size=\"sm\">Arunachal Pradesh</td>\n<td data-start=\"4722\" data-end=\"4740\" data-col-size=\"sm\">Siang / Dihang</td>\n</tr>\n<tr data-start=\"4741\" data-end=\"4764\">\n<td data-start=\"4741\" data-end=\"4749\" data-col-size=\"sm\">Assam</td>\n<td data-start=\"4749\" data-end=\"4764\" data-col-size=\"sm\">Brahmaputra</td>\n</tr>\n<tr data-start=\"4765\" data-end=\"4788\">\n<td data-start=\"4765\" data-end=\"4778\" data-col-size=\"sm\">Bangladesh</td>\n<td data-start=\"4778\" data-end=\"4788\" data-col-size=\"sm\">Jamuna</td>\n</tr>\n<tr data-start=\"4789\" data-end=\"4820\">\n<td data-start=\"4789\" data-end=\"4811\" data-col-size=\"sm\">After meeting Ganga</td>\n<td data-col-size=\"sm\" data-start=\"4811\" data-end=\"4820\">Padma</td>\n</tr>\n<tr data-start=\"4821\" data-end=\"4855\">\n<td data-start=\"4821\" data-end=\"4844\" data-col-size=\"sm\">After meeting Meghna</td>\n<td data-start=\"4844\" data-end=\"4855\" data-col-size=\"sm\">Meghana</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"4857\" data-end=\"4860\" />\n<h1 data-section-id=\"1h8uvtr\" data-start=\"4862\" data-end=\"4886\">11. Exam Quick Facts</h1>\n<h1 data-section-id=\"1gxscx9\" data-start=\"4887\" data-end=\"4923\">11. परीक्षा के लिए महत्वपूर्ण तथ्य</h1>\n<p></p>\n<p data-start=\"4925\" data-end=\"5114\">&bull; Largest right tributary &rarr; <strong data-start=\"4953\" data-end=\"4966\">Subansiri</strong><br data-start=\"4966\" data-end=\"4969\" />&bull; Largest river island &rarr; <strong data-start=\"4994\" data-end=\"5004\">Majuli</strong><br data-start=\"5004\" data-end=\"5007\" />&bull; Smallest river island &rarr; <strong data-start=\"5033\" data-end=\"5045\">Umananda</strong><br data-start=\"5045\" data-end=\"5048\" />&bull; Major U-Turn &rarr; <strong data-start=\"5065\" data-end=\"5081\">Namcha Barwa</strong><br data-start=\"5081\" data-end=\"5084\" />&bull; Bangladesh name &rarr; <strong data-start=\"5104\" data-end=\"5114\">Jamuna</strong></p>",

  {
    "question": "<p data-start=\"1511\" data-end=\"1588\"><strong data-start=\"1511\" data-end=\"1549\">Consider the following statements:</strong><br data-start=\"1549\" data-end=\"1552\" /><strong data-start=\"1552\" data-end=\"1588\">निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"1590\" data-end=\"2303\">\n<li data-section-id=\"jkjwm5\" data-start=\"1590\" data-end=\"1806\">\n<p data-start=\"1593\" data-end=\"1806\">The Brahmaputra takes a sharp <strong data-start=\"1623\" data-end=\"1651\">U-turn near Namcha Barwa</strong> due to the <strong data-start=\"1663\" data-end=\"1701\">syntaxial bending of the Himalayas</strong>.<br data-start=\"1702\" data-end=\"1705\" />ब्रह्मपुत्र <strong data-start=\"1720\" data-end=\"1733\">नमचा बरवा</strong> के पास हिमालय के <strong data-start=\"1751\" data-end=\"1772\">सिन्टैक्सियल मोड़</strong> के कारण तीव्र <strong data-start=\"1787\" data-end=\"1797\">U-turn</strong> लेती है।</p>\n</li>\n<li data-section-id=\"czbf60\" data-start=\"1808\" data-end=\"1937\">\n<p data-start=\"1811\" data-end=\"1937\">In Bangladesh, the Brahmaputra is known as the <strong data-start=\"1858\" data-end=\"1874\">Jamuna River</strong>.<br data-start=\"1875\" data-end=\"1878\" />बांग्लादेश में ब्रह्मपुत्र को <strong data-start=\"1911\" data-end=\"1924\">जमुना नदी</strong> कहा जाता है।</p>\n</li>\n<li data-section-id=\"1qv9cix\" data-start=\"1939\" data-end=\"2147\">\n<p data-start=\"1942\" data-end=\"2147\">The Jamuna joins the <strong data-start=\"1963\" data-end=\"1980\">Padma (Ganga)</strong> and later merges with <strong data-start=\"2003\" data-end=\"2013\">Meghna</strong> before entering the Bay of Bengal.<br data-start=\"2048\" data-end=\"2051\" />जमुना <strong data-start=\"2060\" data-end=\"2076\">पद्मा (गंगा)</strong> से मिलती है और बाद में <strong data-start=\"2100\" data-end=\"2109\">मेघना</strong> से मिलकर बंगाल की खाड़ी में गिरती है।</p>\n</li>\n<li data-section-id=\"hg3vim\" data-start=\"2149\" data-end=\"2303\">\n<p data-start=\"2152\" data-end=\"2303\">The Brahmaputra forms the <strong data-start=\"2178\" data-end=\"2227\">world&rsquo;s largest delta together with the Ganga</strong>.<br data-start=\"2228\" data-end=\"2231\" />ब्रह्मपुत्र गंगा के साथ मिलकर <strong data-start=\"2264\" data-end=\"2293\">विश्व का सबसे बड़ा डेल्टा</strong> बनाती है।</p>\n</li>\n</ol>\n<p data-start=\"2305\" data-end=\"2357\"><strong data-start=\"2305\" data-end=\"2357\">Which of the statements given above are correct?</strong></p>\n<p></p>\n<p data-start=\"2359\" data-end=\"2434\">A. 1 and 2 only<br data-start=\"2374\" data-end=\"2377\" />B. 2 and 3 only<br data-start=\"2392\" data-end=\"2395\" />C. 1, 2 and 3 only<br data-start=\"2413\" data-end=\"2416\" />D. 1, 2, 3 and 4</p>",

    "question": "<p data-start=\"2552\" data-end=\"2629\"><strong data-start=\"2552\" data-end=\"2590\">Consider the following statements:</strong><br data-start=\"2590\" data-end=\"2593\" /><strong data-start=\"2593\" data-end=\"2629\">निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"2631\" data-end=\"3195\">\n<li data-section-id=\"1gepbzn\" data-start=\"2631\" data-end=\"2767\">\n<p data-start=\"2634\" data-end=\"2767\"><strong data-start=\"2634\" data-end=\"2647\">Subansiri</strong> is the largest right-bank tributary of the Brahmaputra.<br data-start=\"2703\" data-end=\"2706\" /><strong data-start=\"2709\" data-end=\"2721\">सुबनसिरी</strong> ब्रह्मपुत्र की सबसे बड़ी दाहिनी सहायक नदी है।</p>\n</li>\n<li data-section-id=\"1vxluzk\" data-start=\"2769\" data-end=\"2903\">\n<p data-start=\"2772\" data-end=\"2903\"><strong data-start=\"2772\" data-end=\"2787\">Manas River</strong> flows through <strong data-start=\"2802\" data-end=\"2834\">Manas National Park in Assam</strong>.<br data-start=\"2835\" data-end=\"2838\" /><strong data-start=\"2841\" data-end=\"2853\">मानस नदी</strong> असम के <strong data-start=\"2861\" data-end=\"2886\">मानस राष्ट्रीय उद्यान</strong> से होकर बहती है।</p>\n</li>\n<li data-section-id=\"wg7fml\" data-start=\"2905\" data-end=\"3052\">\n<p data-start=\"2908\" data-end=\"3052\"><strong data-start=\"2908\" data-end=\"2924\">Teesta River</strong> originates from <strong data-start=\"2941\" data-end=\"2976\">Teesta Kangse Glacier in Sikkim</strong>.<br data-start=\"2977\" data-end=\"2980\" /><strong data-start=\"2983\" data-end=\"2997\">तीस्ता नदी</strong> का उद्गम <strong data-start=\"3007\" data-end=\"3040\">तीस्ता कांगसे हिमनद (सिक्किम)</strong> से होता है।</p>\n</li>\n<li data-section-id=\"9vzemk\" data-start=\"3054\" data-end=\"3195\">\n<p data-start=\"3057\" data-end=\"3195\"><strong data-start=\"3057\" data-end=\"3077\">Lohit and Dibang</strong> are important right-bank tributaries of Brahmaputra.<br data-start=\"3130\" data-end=\"3133\" /><strong data-start=\"3136\" data-end=\"3155\">लोहित और दिबांग</strong> ब्रह्मपुत्र की दाहिनी सहायक नदियाँ हैं।</p>\n</li>\n</ol>\n<p data-start=\"3197\" data-end=\"3249\"><strong data-start=\"3197\" data-end=\"3249\">Which of the statements given above are correct?</strong></p>\n<p data-start=\"3251\" data-end=\"3329\">A. 1 and 2 only<br data-start=\"3266\" data-end=\"3269\" />B. 1, 2 and 3 only<br data-start=\"3287\" data-end=\"3290\" />C. 2, 3 and 4 only<br data-start=\"3308\" data-end=\"3311\" />D. 1, 2, 3 and 4</p>",

    ],

    "solution": "<p>✅&nbsp;<strong data-start=\"3333\" data-end=\"3354\">Correct Answer: B</strong><br data-start=\"3354\" data-end=\"3357\" /><em data-start=\"3357\" data-end=\"3425\">(Statement 4 incorrect &ndash; Lohit &amp; Dibang are left bank tributaries)</em></p>",

    "question": "<p data-start=\"3552\" data-end=\"3629\"><strong data-start=\"3552\" data-end=\"3590\">Consider the following statements:</strong><br data-start=\"3590\" data-end=\"3593\" /><strong data-start=\"3593\" data-end=\"3629\">निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"3631\" data-end=\"4193\">\n<li data-section-id=\"7rfdi4\" data-start=\"3631\" data-end=\"3802\">\n<p data-start=\"3634\" data-end=\"3802\"><strong data-start=\"3634\" data-end=\"3651\">Majuli Island</strong> is the world&rsquo;s largest river island located in the Brahmaputra River.<br data-start=\"3721\" data-end=\"3724\" /><strong data-start=\"3727\" data-end=\"3743\">माजुली द्वीप</strong> ब्रह्मपुत्र नदी में स्थित विश्व का सबसे बड़ा नदी द्वीप है।</p>\n</li>\n<li data-section-id=\"zi7y76\" data-start=\"3804\" data-end=\"3918\">\n<p data-start=\"3807\" data-end=\"3918\"><strong data-start=\"3807\" data-end=\"3826\">Umananda Island</strong> is also called <strong data-start=\"3842\" data-end=\"3860\">Peacock Island</strong>.<br data-start=\"3861\" data-end=\"3864\" /><strong data-start=\"3867\" data-end=\"3883\">उमानंद द्वीप</strong> को <strong data-start=\"3887\" data-end=\"3902\">पीकॉक द्वीप</strong> भी कहा जाता है।</p>\n</li>\n<li data-section-id=\"1jlbr5n\" data-start=\"3920\" data-end=\"4039\">\n<p data-start=\"3923\" data-end=\"4039\">Umananda Island is the <strong data-start=\"3946\" data-end=\"3983\">largest river island in the world</strong>.<br data-start=\"3984\" data-end=\"3987\" />उमानंद द्वीप <strong data-start=\"4003\" data-end=\"4035\">विश्व का सबसे बड़ा नदी द्वीप</strong> है।</p>\n</li>\n<li data-section-id=\"1sqge5l\" data-start=\"4041\" data-end=\"4193\">\n<p data-start=\"4044\" data-end=\"4193\">The Brahmaputra carries the <strong data-start=\"4072\" data-end=\"4117\">largest sediment load among Indian rivers</strong>.<br data-start=\"4118\" data-end=\"4121\" />ब्रह्मपुत्र भारतीय नदियों में <strong data-start=\"4154\" data-end=\"4184\">सबसे अधिक अवसाद     "question": "<p data-start=\"343\" data-end=\"499\"><strong data-start=\"343\" data-end=\"422\">Consider the following statements regarding the Peninsular Drainage System:</strong><br data-start=\"422\" data-end=\"425\" /><strong data-start=\"425\" data-end=\"499\">प्रायद्वीपीय अपवाह तंत्र के संबंध में निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"501\" data-end=\"1310\">\n<li data-section-id=\"18w5dm9\" data-start=\"501\" data-end=\"698\">\n<p data-start=\"504\" data-end=\"698\">Peninsular rivers are older than the Himalayan rivers and show mature valley features.<br data-start=\"590\" data-end=\"593\" />प्रायद्वीपीय नदियाँ हिमालयी नदियों की तुलना में अधिक पुरानी हैं और परिपक्व घाटी विशेषताएँ दर्शाती हैं।</p>\n</li>\n<li data-section-id=\"fwl91v\" data-start=\"700\" data-end=\"876\">\n<p data-start=\"703\" data-end=\"876\">Most of the Peninsular rivers are <strong data-start=\"737\" data-end=\"750\">perennial</strong> because they are fed by glaciers.<br data-start=\"784\" data-end=\"787\" />अधिकांश प्रायद्वीपीय नदियाँ <strong data-start=\"818\" data-end=\"829\">सदानीरा</strong> हैं क्योंकि वे हिमनदों से जल प्राप्त करती हैं।</p>\n</li>\n<li data-section-id=\"13qk52u\" data-start=\"878\" data-end=\"1125\">\n<p data-start=\"881\" data-end=\"1125\">The <strong data-start=\"885\" data-end=\"902\">Western Ghats</strong> act as the main water divide between rivers flowing to the Arabian Sea and those flowing to the Bay of Bengal.<br data-start=\"1013\" data-end=\"1016\" /><strong data-start=\"1019\" data-end=\"1034\">पश्चिमी घाट</strong> अरब सागर और बंगाल की खाड़ी में गिरने वाली नदियों के बीच मुख्य जल विभाजक का कार्य करते हैं।</p>\n</li>\n<li data-section-id=\"q60j8z\" data-start=\"1127\" data-end=\"1310\">\n<p data-start=\"1130\" data-end=\"1310\">Most major Peninsular rivers flow from <strong data-start=\"1169\" data-end=\"1185\">west to east</strong> into the Bay of Bengal.<br data-start=\"1209\" data-end=\"1212\" />अधिकांश प्रमुख प्रायद्वीपीय नदियाँ <strong data-start=\"1250\" data-end=\"1269\">पश्चिम से पूर्व</strong> की ओर बहकर बंगाल की खाड़ी में गिरती हैं।</p>\n</li>\n</ol>\n<p data-start=\"1312\" data-end=\"1405\"><strong data-start=\"1312\" data-end=\"1364\">Which of the statements given above are correct?</strong><br data-start=\"1364\" data-end=\"1367\" /><strong data-start=\"1367\" data-end=\"1405\">उपरोक्त में से कौन से कथन सही हैं?</strong></p>\n<p data-start=\"1407\" data-end=\"1485\">A. 1 and 2 only<br data-start=\"1422\" data-end=\"1425\" />B. 1, 3 and 4 only<br data-start=\"1443\" data-end=\"1446\" />C. 2, 3 and 4 only<br data-start=\"1464\" data-end=\"1467\" />D. 1, 2, 3 and 4</p>",

    ],

    "solution": "<p>✅&nbsp;<strong data-start=\"1489\" data-end=\"1510\">Correct Answer: B</strong><br data-start=\"1510\" data-end=\"1513\" /><em data-start=\"1513\" data-end=\"1576\">(Statement 2 incorrect &ndash; most Peninsular rivers are seasonal)</em></p>",

    "question": "<p data-start=\"1696\" data-end=\"1875\"><strong data-start=\"1696\" data-end=\"1784\">Consider the following geological events that shaped the Peninsular drainage system:</strong><br data-start=\"1784\" data-end=\"1787\" /><strong data-start=\"1787\" data-end=\"1875\">प्रायद्वीपीय अपवाह तंत्र को आकार देने वाली भूगर्भीय घटनाओं के संबंध में विचार कीजिए:</strong></p>\n<ol data-start=\"1877\" data-end=\"2616\">\n<li data-section-id=\"1n409bd\" data-start=\"1877\" data-end=\"2059\">\n<p data-start=\"1880\" data-end=\"2059\">Subsidence of the western flank of the Peninsula disturbed the symmetrical drainage pattern.<br data-start=\"1972\" data-end=\"1975\" />प्रायद्वीपीय भाग के पश्चिमी भाग के धँसने से नदियों की सममितीय योजना प्रभावित हुई।</p>\n</li>\n<li data-section-id=\"1ilku8p\" data-start=\"2061\" data-end=\"2224\">\n<p data-start=\"2064\" data-end=\"2224\">Uplift of the Himalayas caused trough faulting in the northern Peninsular block.<br data-start=\"2144\" data-end=\"2147\" />हिमालय के उत्थान से प्रायद्वीपीय भाग के उत्तरी भाग में भ्रंश घाटियाँ बनीं।</p>\n</li>\n<li data-section-id=\"1bywlpa\" data-start=\"2226\" data-end=\"2401\">\n<p data-start=\"2229\" data-end=\"2401\">Due to these trough faults, <strong data-start=\"2257\" data-end=\"2277\">Narmada and Tapi</strong> rivers flow through rift valleys.<br data-start=\"2311\" data-end=\"2314\" />इन भ्रंश घाटियों के कारण <strong data-start=\"2342\" data-end=\"2362\">नर्मदा और ताप्ती</strong> नदियाँ रिफ्ट घाटियों से होकर बहती हैं।</p>\n</li>\n<li data-section-id=\"mrsohk\" data-start=\"2403\" data-end=\"2616\">\n<p data-start=\"2406\" data-end=\"2616\">Tilting of the Peninsular block from <strong data-start=\"2443\" data-end=\"2469\">southeast to northwest</strong> caused most rivers to flow westward.<br data-start=\"2506\" data-end=\"2509\" />प्रायद्वीपीय भाग के <strong data-start=\"2532\" data-end=\"2564\">दक्षिण-पूर्व से उत्तर-पश्चिम</strong> झुकाव के कारण अधिकांश नदियाँ पश्चिम की ओर बहती हैं।</p>\n</li>\n</ol>\n<p data-start=\"2618\" data-end=\"2670\"><strong data-start=\"2618\" data-end=\"2670\">Which of the statements given above are correct?</strong></p>\n<p data-start=\"2672\" data-end=\"2750\">A. 1 and 2 only<br data-start=\"2687\" data-end=\"2690\" />B. 1, 2 and 3 only<br data-start=\"2708\" data-end=\"2711\" />C. 2, 3 and 4 only<br data-start=\"2729\" data-end=\"2732\" />D. 1, 2, 3 and 4</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p><strong data-start=\"2754\" data-end=\"2775\">Correct Answer: B</strong><br data-start=\"2775\" data-end=\"2778\" /><em data-start=\"2778\" data-end=\"2821\">(Statement 4 incorrect &ndash; tilt is NW &rarr; SE)</em></p>",
    "marks": 2.0,
    "section": "DRAINAGE SYSTEM"

    "question": "<p data-start=\"4277\" data-end=\"4354\"><strong data-start=\"4277\" data-end=\"4315\">Consider the following statements:</strong><br data-start=\"4315\" data-end=\"4318\" /><strong data-start=\"4318\" data-end=\"4354\">निम्नलिखित कथनों पर विचार कीजिए:</strong></p>\n<ol data-start=\"4356\" data-end=\"5004\">\n<li data-section-id=\"1123zmr\" data-start=\"4356\" data-end=\"4532\">\n<p data-start=\"4359\" data-end=\"4532\">Himalayan rivers are <strong data-start=\"4380\" data-end=\"4393\">perennial</strong> as they receive water from glaciers and rainfall.<br data-start=\"4443\" data-end=\"4446\" />हिमालयी नदियाँ <strong data-start=\"4464\" data-end=\"4475\">सदानीरा</strong> होती हैं क्योंकि इन्हें हिमनदों और वर्षा से जल मिलता है।</p>\n</li>\n<li data-section-id=\"d7urf1\" data-start=\"4534\" data-end=\"4700\">\n<p data-start=\"4537\" data-end=\"4700\">Peninsular rivers are generally <strong data-start=\"4569\" data-end=\"4610\">older and show mature valley features</strong>.<br data-start=\"4611\" data-end=\"4614\" />प्रायद्वीपीय नदियाँ सामान्यतः <strong data-start=\"4647\" data-end=\"4688\">अधिक पुरानी और परिपक्व घाटी विशेषताएँ</strong> दिखाती हैं।</p>\n</li>\n<li data-section-id=\"1doneo8\" data-start=\"4702\" data-end=\"4873\">\n<p data-start=\"4705\" data-end=\"4873\">Himalayan rivers have <strong data-start=\"4727\" data-end=\"4757\">very large drainage basins</strong> compared to Peninsular rivers.<br data-start=\"4788\" data-end=\"4791\" />हिमालयी नदियों का <strong data-start=\"4812\" data-end=\"4864\">जलग्रहण क्षेत्र प्रायद्वीपीय नदियों से अधिक बड़ा</strong> होता है।</p>\n</li>\n<li data-section-id=\"fquan5\" data-start=\"4875\" data-end=\"5004\">\n<p data-start=\"4878\" data-end=\"5004\">Peninsular rivers are mostly <strong data-start=\"4907\" data-end=\"4940\">perennial due to glacier melt</strong>.<br data-start=\"4941\" data-end=\"4944\" />प्रायद्वीपीय नदियाँ हिमनदों के कारण <strong data-start=\"4983\" data-end=\"4994\">सदानीरा</strong> होती हैं।</p>\n</li>\n</ol>\n<p data-start=\"5006\" data-end=\"5058\"><strong data-start=\"5006\" data-end=\"5058\">Which of the statements given above are correct?</strong></p>\n<p data-start=\"5060\" data-end=\"5135\">A. 1 and 2 only<br data-start=\"5075\" data-end=\"5078\" />B. 1, 2 and 3 only<br data-start=\"5096\" data-end=\"5099\" />C. 2 and 4 only<br data-start=\"5114\" data-end=\"5117\" />D. 1, 2, 3 and 4</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&nbsp;<strong data-start=\"5139\" data-end=\"5160\">Correct Answer: B</strong><br data-start=\"5160\" data-end=\"5163\" /><em data-start=\"5163\" data-end=\"5188\">(Statement 4 incorrect)</em></p>\n<h1 data-section-id=\"1dvc3yq\" data-start=\"209\" data-end=\"253\">PENINSULAR DRAINAGE SYSTEM &ndash; CHEAT SHEET</h1>\n<hr data-start=\"303\" data-end=\"306\" />\n<h1 data-section-id=\"1tlfdu0\" data-start=\"308\" data-end=\"331\">1. General Features</h1>\n<h1 data-section-id=\"1hhk94y\" data-start=\"332\" data-end=\"351\">सामान्य विशेषताएँ</h1>\n<p data-start=\"353\" data-end=\"450\">&bull; <strong data-start=\"355\" data-end=\"363\">Age:</strong> Older than the Himalayan rivers.<br data-start=\"396\" data-end=\"399\" />&bull; <strong data-start=\"401\" data-end=\"409\">आयु:</strong> हिमालयी नदियों की तुलना में अधिक पुरानी।</p>\n<p data-start=\"452\" data-end=\"550\">&bull; <strong data-start=\"454\" data-end=\"466\">Valleys:</strong> Broad, shallow and mature valleys.<br data-start=\"501\" data-end=\"504\" />&bull; <strong data-start=\"506\" data-end=\"518\">घाटियाँ:</strong> चौड़ी, उथली और परिपक्व घाटियाँ।</p>\n<p data-start=\"552\" data-end=\"648\">&bull; <strong data-start=\"554\" data-end=\"565\">Course:</strong> Fixed course with very little meandering.<br data-start=\"607\" data-end=\"610\" />&bull; <strong data-start=\"612\" data-end=\"626\">प्रवाह पथ:</strong> स्थिर मार्ग, कम मोड़।</p>\n<p data-start=\"650\" data-end=\"762\">&bull; <strong data-start=\"652\" data-end=\"671\">Nature of Flow:</strong> Mostly <strong data-start=\"679\" data-end=\"707\">seasonal (non-perennial)</strong>.<br data-start=\"708\" data-end=\"711\" />&bull; <strong data-start=\"713\" data-end=\"732\">प्रवाह प्रकृति:</strong> अधिकांश नदियाँ <strong data-start=\"748\" data-end=\"757\">मौसमी</strong> हैं।</p>\n<p data-start=\"764\" data-end=\"847\">&bull; <strong data-start=\"766\" data-end=\"780\">Exception:</strong> <strong data-start=\"781\" data-end=\"791\">Kaveri</strong> is perennial.<br data-start=\"805\" data-end=\"808\" />&bull; <strong data-start=\"810\" data-end=\"820\">अपवाद:</strong> <strong data-start=\"821\" data-end=\"831\">कावेरी</strong> सदानीरा नदी है।</p>\n<p data-start=\"849\" data-end=\"1032\">&bull; <strong data-start=\"851\" data-end=\"868\">Water Divide:</strong> <strong data-start=\"869\" data-end=\"886\">Western Ghats</strong> divide rivers flowing into Arabian Sea and Bay of Bengal.<br data-start=\"944\" data-end=\"947\" />&bull; <strong data-start=\"949\" data-end=\"963\">जल विभाजक:</strong> <strong data-start=\"964\" data-end=\"979\">पश्चिमी घाट</strong> अरब सागर और बंगाल की खाड़ी की नदियों को अलग करता है।</p>\n<p data-start=\"1034\" data-end=\"1143\">&bull; <strong data-start=\"1036\" data-end=\"1050\">Direction:</strong> Most rivers flow <strong data-start=\"1068\" data-end=\"1083\">West &rarr; East</strong>.<br data-start=\"1084\" data-end=\"1087\" />&bull; <strong data-start=\"1089\" data-end=\"1098\">दिशा:</strong> अधिकांश नदियाँ <strong data-start=\"1114\" data-end=\"1133\">पश्चिम से पूर्व</strong> बहती हैं।</p>\n<p data-start=\"1145\" data-end=\"1275\">&bull; <strong data-start=\"1147\" data-end=\"1162\">Exceptions:</strong> <strong data-start=\"1163\" data-end=\"1183\">Narmada and Tapi</strong> (west-flowing rivers).<br data-start=\"1206\" data-end=\"1209\" />&bull; <strong data-start=\"1211\" data-end=\"1221\">अपवाद:</strong> <strong data-start=\"1222\" data-end=\"1242\">नर्मदा और ताप्ती</strong> (पश्चिम की ओर बहने वाली नदियाँ)।</p>\n<hr data-start=\"1277\" data-end=\"1280\" />\n<h1 data-section-id=\"iy4e7w\" data-start=\"1282\" data-end=\"1321\">2. Evolution of Peninsular Drainage</h1>\n<h1 data-section-id=\"7c6gb\" data-start=\"1322\" data-end=\"1357\">प्रायद्वीपीय अपवाह तंत्र का विकास</h1>\n<h3 data-section-id=\"189sa1x\" data-start=\"1359\" data-end=\"1395\">1. Subsidence of Western Flank</h3>\n<p data-start=\"1396\" data-end=\"1495\">&bull; Western side of peninsula subsided into Arabian Sea.<br data-start=\"1450\" data-end=\"1453\" />&bull; इससे नदियों का संतुलित प्रवाह बाधित हुआ।</p>\n<h3 data-section-id=\"pksnmu\" data-start=\"1497\" data-end=\"1540\">2. Himalayan Uplift (Trough Faulting)</h3>\n<p data-start=\"1541\" data-end=\"1653\">&bull; Narmada and Tapi began flowing through <strong data-start=\"1582\" data-end=\"1598\">rift valleys</strong>.<br data-start=\"1599\" data-end=\"1602\" />&bull; नर्मदा और ताप्ती <strong data-start=\"1621\" data-end=\"1638\">भ्रंश घाटियों</strong> में बहने लगीं।</p>\n<h3 data-section-id=\"7gemz\" data-start=\"1655\" data-end=\"1691\">3. Tilting of Peninsular Block</h3>\n<p data-start=\"1692\" data-end=\"1778\">&bull; Peninsula tilted <strong data-start=\"1711\" data-end=\"1722\">NW &rarr; SE</strong>.<br data-start=\"1723\" data-end=\"1726\" />&bull; अधिकांश नदियाँ <strong data-start=\"1743\" data-end=\"1777\">बंगाल की खाड़ी की ओर बहने लगीं</strong>।</p>\n<hr data-start=\"1780\" data-end=\"1783\" />\n<h1 data-section-id=\"1cplftn\" data-start=\"1785\" data-end=\"1819\">EAST FLOWING PENINSULAR RIVERS</h1>\n<h1 data-section-id=\"klgdm7\" data-start=\"1820\" data-end=\"1863\">पूर्व की ओर बहने वाली प्रायद्वीपीय नदियाँ</h1>\n<p data-start=\"1865\" data-end=\"1992\">These rivers flow into the <strong data-start=\"1892\" data-end=\"1925\">Bay of Bengal and form deltas</strong>.<br data-start=\"1926\" data-end=\"1929\" />ये नदियाँ <strong data-start=\"1939\" data-end=\"1992\">बंगाल की खाड़ी में गिरती हैं और डेल्टा बनाती हैं।</strong></p>\n<hr data-start=\"1994\" data-end=\"1997\" />\n<h1 data-section-id=\"116r1ia\" data-start=\"1999\" data-end=\"2020\">1. Godavari River</h1>\n<h1 data-section-id=\"620iqx\" data-start=\"2021\" data-end=\"2034\">गोदावरी नदी</h1>\n<p data-start=\"2036\" data-end=\"2119\">&bull; <strong data-start=\"2038\" data-end=\"2049\">Origin:</strong> Trimbakeshwar (Maharashtra)<br data-start=\"2077\" data-end=\"2080\" />&bull; <strong data-start=\"2082\" data-end=\"2092\">उद्गम:</strong> त्र्यंबकेश्वर (महाराष्ट्र)</p>\n<p data-start=\"2121\" data-end=\"2167\">&bull; <strong data-start=\"2123\" data-end=\"2134\">Length:</strong> 1465 km<br data-start=\"2142\" data-end=\"2145\" />&bull; <strong data-start=\"2147\" data-end=\"2157\">लंबाई:</strong> 1465 किमी</p>\n<p data-start=\"2169\" data-end=\"2250\">&bull; <strong data-start=\"2171\" data-end=\"2181\">Title:</strong> Dakshin Ganga / Vridha Ganga<br data-start=\"2210\" data-end=\"2213\" />&bull; <strong data-start=\"2215\" data-end=\"2225\">उपाधि:</strong> दक्षिण गंगा / वृद्ध गंगा</p>\n<p data-start=\"2252\" data-end=\"2325\">&bull; <strong data-start=\"2254\" data-end=\"2282\">Largest Peninsular River</strong><br data-start=\"2282\" data-end=\"2285\" />&bull; <strong data-start=\"2287\" data-end=\"2325\">प्रायद्वीपीय भारत की सबसे लंबी नदी</strong></p>\n<h3 data-section-id=\"x31q3h\" data-start=\"2327\" data-end=\"2350\">Major Tributaries</h3>\n<p data-start=\"2351\" data-end=\"2409\">Left: Pranhita, Indravati, Sabari<br data-start=\"2384\" data-end=\"2387\" />Right: Manjra, Pravara</p>\n<h3 data-section-id=\"cvz9cw\" data-start=\"2411\" data-end=\"2425\">Projects</h3>\n<p data-start=\"2426\" data-end=\"2469\">Kaleshwaram Project, Nizam Sagar, Polavaram</p>\n<hr data-start=\"2471\" data-end=\"2474\" />\n<h1 data-section-id=\"6wzz0k\" data-start=\"2476\" data-end=\"2496\">2. Krishna River</h1>\n<h1 data-section-id=\"cn6as9\" data-start=\"2497\" data-end=\"2509\">कृष्णा नदी</h1>\n<p data-start=\"2511\" data-end=\"2594\">&bull; <strong data-start=\"2513\" data-end=\"2524\">Origin:</strong> Mahabaleshwar (Western Ghats)<br data-start=\"2554\" data-end=\"2557\" />&bull; <strong data-start=\"2559\" data-end=\"2569\">उद्गम:</strong> महाबलेश्वर (पश्चिमी घाट)</p>\n<p data-start=\"2596\" data-end=\"2617\">&bull; <strong data-start=\"2598\" data-end=\"2609\">Length:</strong> 1401 km</p>\n<p data-start=\"2619\" data-end=\"2651\">&bull; <strong data-start=\"2621\" data-end=\"2651\">3rd longest river in India</strong></p>\n<h3 data-section-id=\"x31q3h\" data-start=\"2653\" data-end=\"2676\">Major Tributaries</h3>\n<p data-start=\"2677\" data-end=\"2746\">Right: Tungabhadra, Koyna, Ghatprabha<br data-start=\"2714\" data-end=\"2717\" />Left: Bhima, Musi, Panchganga</p>\n<h3 data-section-id=\"3z3oc0\" data-start=\"2748\" data-end=\"2768\">Important Fact</h3>\n<p data-start=\"2769\" data-end=\"2828\">&bull; <strong data-start=\"2771\" data-end=\"2828\">Kolleru Lake lies between Krishna and Godavari deltas</strong></p>\n<hr data-start=\"2830\" data-end=\"2833\" />\n<h1 data-section-id=\"164863q\" data-start=\"2835\" data-end=\"2856\">3. Mahanadi River</h1>\n<h1 data-section-id=\"1spy3lt\" data-start=\"2857\" data-end=\"2865\">महानदी</h1>\n<p data-start=\"2867\" data-end=\"2952\">&bull; <strong data-start=\"2869\" data-end=\"2880\">Origin:</strong> Sihawa Hills (Chhattisgarh)<br data-start=\"2908\" data-end=\"2911\" />&bull; <strong data-start=\"2913\" data-end=\"2923\">उद्गम:</strong> सिहावा पहाड़ियाँ (छत्तीसगढ़)</p>\n<p data-start=\"2954\" data-end=\"2974\">&bull; <strong data-start=\"2956\" data-end=\"2967\">Length:</strong> 900 km</p>\n<h3 data-section-id=\"axqgdi\" data-start=\"2976\" data-end=\"2993\">Tributaries</h3>\n<p data-start=\"2994\" data-end=\"3033\">Left: Sheonath, Hasdo<br data-start=\"3015\" data-end=\"3018\" />Right: Tel, Ong</p>\n<h3 data-section-id=\"6uiy9f\" data-start=\"3035\" data-end=\"3048\">Project</h3>\n<p data-start=\"3049\" data-end=\"3089\">&bull; <strong data-start=\"3051\" data-end=\"3089\">Hirakud Dam (Longest dam in India)</strong></p>\n<hr data-start=\"3091\" data-end=\"3094\" />\n<h1 data-section-id=\"k1031g\" data-start=\"3096\" data-end=\"3115\">4. Kaveri River</h1>\n<h1 data-section-id=\"10gc5b5\" data-start=\"3116\" data-end=\"3128\">कावेरी नदी</h1>\n<p data-start=\"3130\" data-end=\"3218\">&bull; <strong data-start=\"3132\" data-end=\"3143\">Origin:</strong> Brahmagiri Hills (Karnataka)<br data-start=\"3172\" data-end=\"3175\" />&bull; <strong data-start=\"3177\" data-end=\"3187\">उद्गम:</strong> ब्रह्मगिरि पहाड़ियाँ (कर्नाटक)</p>\n<p data-start=\"3220\" data-end=\"3240\">&bull; <strong data-start=\"3222\" data-end=\"3233\">Length:</strong> 800 km</p>\n<p data-start=\"3242\" data-end=\"3278\">&bull; <strong data-start=\"3244\" data-end=\"3278\">Perennial river of South India</strong></p>\n<h3 data-section-id=\"1p7n2c5\" data-start=\"3280\" data-end=\"3292\">Titles</h3>\n<p data-start=\"3293\" data-end=\"3317\">&bull; <strong data-start=\"3295\" data-end=\"3317\">Ganga of the South</strong></p>\n<h3 data-section-id=\"9lokap\" data-start=\"3319\" data-end=\"3333\">Features</h3>\n<p data-start=\"3334\" data-end=\"3400\">&bull; Shivanasamudra Falls<br data-start=\"3356\" data-end=\"3359\" />&bull; Delta called <strong data-start=\"3374\" data-end=\"3400\">Granary of South India</strong></p>\n<h3 data-section-id=\"cvz9cw\" data-start=\"3402\" data-end=\"3416\">Projects</h3>\n<p data-start=\"3417\" data-end=\"3457\">&bull; Mettur Dam<br data-start=\"3429\" data-end=\"3432\" />&bull; Grand Anicut (Kallanai)</p>\n<hr data-start=\"3459\" data-end=\"3462\" />\n<h1 data-section-id=\"1tpt0gx\" data-start=\"3464\" data-end=\"3493\">SMALL EAST FLOWING RIVERS</h1>\n<h1 data-section-id=\"1tg1csd\" data-start=\"3494\" data-end=\"3519\">छोटी पूर्वाभिमुख नदियाँ</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3521\" data-end=\"3839\">\n<thead data-start=\"3521\" data-end=\"3548\">\n<tr data-start=\"3521\" data-end=\"3548\">\n<th class=\"\" data-start=\"3521\" data-end=\"3529\" data-col-size=\"sm\">River</th>\n<th class=\"\" data-start=\"3529\" data-end=\"3540\" data-col-size=\"sm\">Key Fact</th>\n<th class=\"\" data-start=\"3540\" data-end=\"3548\" data-col-size=\"sm\">तथ्य</th>\n</tr>\n</thead>\n<tbody data-start=\"3572\" data-end=\"3839\">\n<tr data-start=\"3572\" data-end=\"3621\">\n<td data-start=\"3572\" data-end=\"3587\" data-col-size=\"sm\">Subarnarekha</td>\n<td data-col-size=\"sm\" data-start=\"3587\" data-end=\"3602\">Hundru Falls</td>\n<td data-col-size=\"sm\" data-start=\"3602\" data-end=\"3621\">हुंडरू जलप्रपात</td>\n</tr>\n<tr data-start=\"3622\" data-end=\"3675\">\n<td data-start=\"3622\" data-end=\"3633\" data-col-size=\"sm\">Brahmani</td>\n<td data-start=\"3633\" data-end=\"3654\" data-col-size=\"sm\">Sankh + South Koel</td>\n<td data-col-size=\"sm\" data-start=\"3654\" data-end=\"3675\">संख + दक्षिण कोएल</td>\n</tr>\n<tr data-start=\"3676\" data-end=\"3712\">\n<td data-start=\"3676\" data-end=\"3688\" data-col-size=\"sm\">Baitarani</td>\n<td data-start=\"3688\" data-end=\"3703\" data-col-size=\"sm\">Odisha river</td>\n<td data-start=\"3703\" data-end=\"3712\" data-col-size=\"sm\">ओडिशा</td>\n</tr>\n<tr data-start=\"3713\" data-end=\"3765\">\n<td data-start=\"3713\" data-end=\"3722\" data-col-size=\"sm\">Penner</td>\n<td data-col-size=\"sm\" data-start=\"3722\" data-end=\"3747\">Forms Gandikota canyon</td>\n<td data-col-size=\"sm\" data-start=\"3747\" data-end=\"3765\">गांडीकोटा घाटी</td>\n</tr>\n<tr data-start=\"3766\" data-end=\"3839\">\n<td data-start=\"3766\" data-end=\"3775\" data-col-size=\"sm\">Vaigai</td>\n<td data-col-size=\"sm\" data-start=\"3775\" data-end=\"3809\">Southernmost east flowing river</td>\n<td data-col-size=\"sm\" data-start=\"3809\" data-end=\"3839\">दक्षिण की सबसे दक्षिणी नदी</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"3841\" data-end=\"3844\" />\n<h1 data-section-id=\"sr8e94\" data-start=\"3846\" data-end=\"3869\">WEST FLOWING RIVERS</h1>\n<h1 data-section-id=\"o0dsso\" data-start=\"3870\" data-end=\"3901\">पश्चिम की ओर बहने वाली नदियाँ</h1>\n<p data-start=\"3903\" data-end=\"4021\">These rivers flow into <strong data-start=\"3926\" data-end=\"3960\">Arabian Sea and form estuaries</strong>.<br data-start=\"3961\" data-end=\"3964\" />ये नदियाँ <strong data-start=\"3974\" data-end=\"4021\">अरब सागर में गिरती हैं और मुहाना बनाती हैं।</strong></p>\n<hr data-start=\"4023\" data-end=\"4026\" />\n<h1 data-section-id=\"1qhtm7z\" data-start=\"4028\" data-end=\"4051\">Key Characteristics</h1>\n<h1 data-section-id=\"1js3lk5\" data-start=\"4052\" data-end=\"4069\">मुख्य विशेषताएँ</h1>\n<p data-start=\"4071\" data-end=\"4103\">&bull; Shorter rivers<br data-start=\"4087\" data-end=\"4090\" />&bull; छोटी नदियाँ</p>\n<p data-start=\"4105\" data-end=\"4131\">&bull; Less sediment<br data-start=\"4120\" data-end=\"4123\" />&bull; कम गाद</p>\n<p data-start=\"4133\" data-end=\"4211\">&bull; Form <strong data-start=\"4140\" data-end=\"4171\">estuaries instead of deltas</strong><br data-start=\"4171\" data-end=\"4174\" />&bull; डेल्टा के बजाय <strong data-start=\"4191\" data-end=\"4201\">मुहाना</strong> बनाती हैं</p>\n<p data-start=\"4213\" data-end=\"4283\">&bull; Flow through <strong data-start=\"4228\" data-end=\"4244\">rift valleys</strong><br data-start=\"4244\" data-end=\"4247\" />&bull; <strong data-start=\"4249\" data-end=\"4266\">भ्रंश घाटियों</strong> से होकर बहती हैं</p>\n<hr data-start=\"4285\" data-end=\"4288\" />\n<h1 data-section-id=\"7leudz\" data-start=\"4290\" data-end=\"4310\">1. Narmada River</h1>\n<h1 data-section-id=\"152i32j\" data-start=\"4311\" data-end=\"4323\">नर्मदा नदी</h1>\n<p data-start=\"4325\" data-end=\"4385\">&bull; <strong data-start=\"4327\" data-end=\"4338\">Origin:</strong> Amarkantak Plateau<br data-start=\"4357\" data-end=\"4360\" />&bull; <strong data-start=\"4362\" data-end=\"4372\">उद्गम:</strong> अमरकंटक पठार</p>\n<p data-start=\"4387\" data-end=\"4408\">&bull; <strong data-start=\"4389\" data-end=\"4400\">Length:</strong> 1310 km</p>\n<p data-start=\"4410\" data-end=\"4442\">&bull; <strong data-start=\"4412\" data-end=\"4442\">Longest west-flowing river</strong></p>\n<p data-start=\"4444\" data-end=\"4483\">&bull; Flows between <strong data-start=\"4460\" data-end=\"4483\">Vindhya and Satpura</strong></p>\n<h3 data-section-id=\"ov26hz\" data-start=\"4485\" data-end=\"4501\">Waterfalls</h3>\n<p data-start=\"4502\" data-end=\"4529\">Dhuandhar Falls (Bhedaghat)</p>\n<h3 data-section-id=\"1x8xliz\" data-start=\"4531\" data-end=\"4551\">Major Projects</h3>\n<p data-start=\"4552\" data-end=\"4595\">Sardar Sarovar<br data-start=\"4566\" data-end=\"4569\" />Indira Sagar<br data-start=\"4581\" data-end=\"4584\" />Omkareshwar</p>\n<hr data-start=\"4597\" data-end=\"4600\" />\n<h1 data-section-id=\"ev1r0s\" data-start=\"4602\" data-end=\"4619\">2. Tapi River</h1>\n<h1 data-section-id=\"1lzj79t\" data-start=\"4620\" data-end=\"4632\">ताप्ती नदी</h1>\n<p data-start=\"4634\" data-end=\"4697\">&bull; <strong data-start=\"4636\" data-end=\"4647\">Origin:</strong> Multai Hills (MP)<br data-start=\"4665\" data-end=\"4668\" />&bull; <strong data-start=\"4670\" data-end=\"4680\">उद्गम:</strong> मुलताई पहाड़ियाँ</p>\n<p data-start=\"4699\" data-end=\"4719\">&bull; <strong data-start=\"4701\" data-end=\"4712\">Length:</strong> 724 km</p>\n<p data-start=\"4721\" data-end=\"4756\">&bull; Called <strong data-start=\"4730\" data-end=\"4756\">Twin Sister of Narmada</strong></p>\n<p data-start=\"4758\" data-end=\"4791\">&bull; <strong data-start=\"4760\" data-end=\"4791\">Surat city lies on its bank</strong></p>\n<h3 data-section-id=\"cvz9cw\" data-start=\"4793\" data-end=\"4807\">Projects</h3>\n<p data-start=\"4808\" data-end=\"4831\">Ukai Dam<br data-start=\"4816\" data-end=\"4819\" />Kakrapar Dam</p>\n<hr data-start=\"4833\" data-end=\"4836\" />\n<h1 data-section-id=\"llb9jz\" data-start=\"4838\" data-end=\"4855\">3. Luni River</h1>\n<h1 data-section-id=\"ltpdsg\" data-start=\"4856\" data-end=\"4866\">लूनी नदी</h1>\n<p data-start=\"4868\" data-end=\"4924\">&bull; <strong data-start=\"4870\" data-end=\"4881\">Origin:</strong> Aravalli Hills<br data-start=\"4896\" data-end=\"4899\" />&bull; <strong data-start=\"4901\" data-end=\"4911\">उद्गम:</strong> अरावली पर्वत</p>\n<p data-start=\"4926\" data-end=\"5000\">&bull; Largest river of western Rajasthan<br data-start=\"4962\" data-end=\"4965\" />&bull; पश्चिमी राजस्थान की सबसे बड़ी नदी</p>\n<p data-start=\"5002\" data-end=\"5031\">&bull; Ends in <strong data-start=\"5012\" data-end=\"5031\">Rann of Kachchh</strong></p>\n<p data-start=\"5033\" data-end=\"5054\">&bull; <strong data-start=\"5035\" data-end=\"5054\">Inland drainage</strong></p>\n<hr data-start=\"5056\" data-end=\"5059\" />\n<h1 data-section-id=\"1mz6p7\" data-start=\"5061\" data-end=\"5078\">4. Mahi River</h1>\n<h1 data-section-id=\"8zw7y9\" data-start=\"5079\" data-end=\"5089\">माही नदी</h1>\n<p data-start=\"5091\" data-end=\"5123\">&bull; <strong data-start=\"5093\" data-end=\"5104\">Origin:</strong> Vindhya Range (MP)</p>\n<p data-start=\"5125\" data-end=\"5169\">&bull; Flows through <strong data-start=\"5141\" data-end=\"5169\">MP &rarr; Rajasthan &rarr; Gujarat</strong></p>\n<p data-start=\"5171\" data-end=\"5207\">&bull; <strong data-start=\"5173\" data-end=\"5207\">Crosses Tropic of Cancer twice</strong></p>\n<hr data-start=\"5209\" data-end=\"5212\" />\n<h1 data-section-id=\"nql52t\" data-start=\"5214\" data-end=\"5236\">5. Sabarmati River</h1>\n<h1 data-section-id=\"1frjons\" data-start=\"5237\" data-end=\"5250\">साबरमती नदी</h1>\n<p data-start=\"5252\" data-end=\"5280\">&bull; <strong data-start=\"5254\" data-end=\"5265\">Origin:</strong> Aravalli Hills</p>\n<p data-start=\"5282\" data-end=\"5325\">&bull; Flows through <strong data-start=\"5298\" data-end=\"5325\">Ahmedabad &amp; Gandhinagar</strong></p>\n<hr data-start=\"5327\" data-end=\"5330\" />\n<h1 data-section-id=\"1vvc0ks\" data-start=\"5332\" data-end=\"5361\">OTHER WEST FLOWING RIVERS</h1>\n<h1 data-section-id=\"29bufb\" data-start=\"5362\" data-end=\"5388\">अन्य पश्चिमाभिमुख नदियाँ</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex flex-col-reverse w-fit\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5390\" data-end=\"5591\">\n<thead data-  />B. 1 and 2 only<br data-start=\"1757\" data-end=\"1760\" />C. 2 and 3 only<br data-start=\"1775\" data-end=\"1778\" />D. 1, 2 and 3</p>",
