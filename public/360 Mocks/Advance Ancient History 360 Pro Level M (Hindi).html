    "solution": "<p>The <strong data-path-to-node=\"9,0\" data-index-in-node=\"17\">Satavahanas</strong> were the first native Deccan power (Paithan). The <strong data-path-to-node=\"9,0\" data-index-in-node=\"79\">Ikshvakus</strong> are famous for the Buddhist site of Nagarjunakonda (Vijayapuri). The <strong data-path-to-node=\"9,0\" data-index-in-node=\"158\">Kadambas</strong> were based in Banavasi (modern Karnataka).</p>\n<p></p>\n<h2 data-start=\"204\" data-end=\"247\">🏛️ IMPORTANT ANCIENT INDIAN DYNASTIES</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"301\" data-end=\"2478\">\n<thead data-start=\"301\" data-end=\"444\">\n<tr data-start=\"301\" data-end=\"444\">\n<th data-start=\"301\" data-end=\"317\" data-col-size=\"sm\">Dynasty (वंश)</th>\n<th data-start=\"317\" data-end=\"338\" data-col-size=\"sm\">Founder (संस्थापक)</th>\n<th data-start=\"338\" data-end=\"371\" data-col-size=\"md\">Important Rulers (प्रमुख शासक)</th>\n<th data-start=\"371\" data-end=\"388\" data-col-size=\"sm\">Timeline (काल)</th>\n<th data-start=\"388\" data-end=\"408\" data-col-size=\"sm\">Capital (राजधानी)</th>\n<th data-start=\"408\" data-end=\"444\" data-col-size=\"md\">Key Contributions (मुख्य योगदान)</th>\n</tr>\n</thead>\n<tbody data-start=\"471\" data-end=\"2478\">\n<tr data-start=\"471\" data-end=\"752\">\n<td data-start=\"471\" data-end=\"499\" data-col-size=\"sm\"><strong data-start=\"473\" data-end=\"498\">Satavahanas (सातवाहन)</strong></td>\n<td data-col-size=\"sm\" data-start=\"499\" data-end=\"508\">Simuka</td>\n<td data-col-size=\"md\" data-start=\"508\" data-end=\"595\"><strong data-start=\"510\" data-end=\"551\">Gautamiputra Satakarni</strong>, <strong data-start=\"553\" data-end=\"594\">Vashishtiputra Pulumavi</strong></td>\n<td data-col-size=\"sm\" data-start=\"595\" data-end=\"620\">1st c. BCE &ndash; 3rd c. CE</td>\n<td data-col-size=\"sm\" data-start=\"620\" data-end=\"645\">Paithan (Pratishthana)</td>\n<td data-col-size=\"md\" data-start=\"645\" data-end=\"752\">First major <strong data-start=\"659\" data-end=\"684\">native Deccan dynasty</strong>; promoted <strong data-start=\"695\" data-end=\"706\">Prakrit</strong>, inland &amp; maritime trade, <strong data-start=\"733\" data-end=\"750\">Amaravati art</strong></td>\n</tr>\n<tr data-start=\"753\" data-end=\"996\">\n<td data-start=\"753\" data-end=\"788\" data-col-size=\"sm\"><strong data-start=\"755\" data-end=\"787\">Early Cholas (प्रारंभिक चोल)</strong></td>\n<td data-col-size=\"sm\" data-start=\"788\" data-end=\"853\">Ancient lineage (to) <strong data-start=\"811\" data-end=\"852\">Karikala Chola</strong></td>\n<td data-col-size=\"md\" data-start=\"853\" data-end=\"870\">Karikala Chola</td>\n<td data-col-size=\"sm\" data-start=\"870\" data-end=\"888\">1st &ndash; 4th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"888\" data-end=\"913\">Urayur, Kaveripattinam</td>\n<td data-col-size=\"md\" data-start=\"913\" data-end=\"996\">Built <strong data-start=\"921\" data-end=\"948\">Kallanai (Grand Anicut)</strong>; foundation of Chola administration &amp; culture</td>\n</tr>\n<tr data-start=\"997\" data-end=\"1233\">\n<td data-start=\"997\" data-end=\"1016\" data-col-size=\"sm\"><strong data-start=\"999\" data-end=\"1015\">Cheras (चेर)</strong></td>\n<td data-col-size=\"sm\" data-start=\"1016\" data-end=\"1039\">Uthiyan Cheral Athan</td>\n<td data-col-size=\"md\" data-start=\"1039\" data-end=\"1108\"><strong data-start=\"1041\" data-end=\"1082\">Senguttuvan</strong> (Red Chera), Udayanjeral</td>\n<td data-col-size=\"sm\" data-start=\"1108\" data-end=\"1134\">3rd c. BCE &ndash; 12th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"1134\" data-end=\"1160\">Vanji (Karur) / Muziris</td>\n<td data-col-size=\"md\" data-start=\"1160\" data-end=\"1233\">Tamil culture; <strong data-start=\"1177\" data-end=\"1195\">maritime trade</strong>; patronage of <strong data-start=\"1210\" data-end=\"1231\">Sangam literature</strong></td>\n</tr>\n<tr data-start=\"1234\" data-end=\"1458\">\n<td data-start=\"1234\" data-end=\"1257\" data-col-size=\"sm\"><strong data-start=\"1236\" data-end=\"1256\">Pandyas (पांड्य)</strong></td>\n<td data-col-size=\"sm\" data-start=\"1257\" data-end=\"1289\">Kadungon (revival, 6th c. CE)</td>\n<td data-col-size=\"md\" data-start=\"1289\" data-end=\"1349\"><strong data-start=\"1291\" data-end=\"1332\">Jatavarman Sundara Pandya</strong>, Sundara Pandya</td>\n<td data-col-size=\"sm\" data-start=\"1349\" data-end=\"1375\">3rd c. BCE &ndash; 14th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"1375\" data-end=\"1385\">Madurai</td>\n<td data-col-size=\"md\" data-start=\"1385\" data-end=\"1458\">Trade with <strong data-start=\"1398\" data-end=\"1417\">Greeks &amp; Romans</strong>; art, literature &amp; temple architecture</td>\n</tr>\n<tr data-start=\"1459\" data-end=\"1668\">\n<td data-start=\"1459\" data-end=\"1488\" data-col-size=\"sm\"><strong data-start=\"1461\" data-end=\"1487\">Ikshavakus (इक्ष्वाकु)</strong></td>\n<td data-col-size=\"sm\" data-start=\"1488\" data-end=\"1532\"><strong data-start=\"1490\" data-end=\"1531\">Vashishtiputra Chamtamula</strong></td>\n<td data-col-size=\"md\" data-start=\"1532\" data-end=\"1560\">Vashishtiputra Chamtamula</td>\n<td data-col-size=\"sm\" data-start=\"1560\" data-end=\"1578\">3rd &ndash; 4th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"1578\" data-end=\"1608\">Vijayapuri (Nagarjunakonda)</td>\n<td data-col-size=\"md\" data-start=\"1608\" data-end=\"1668\">Patronage of <strong data-start=\"1623\" data-end=\"1656\">Buddhist stupas &amp; monasteries</strong> in Andhra</td>\n</tr>\n<tr data-start=\"1669\" data-end=\"1894\">\n<td data-start=\"1669\" data-end=\"1703\" data-col-size=\"sm\"><strong data-start=\"1671\" data-end=\"1702\">Kadambas of Banavasi (कदंब)</strong></td>\n<td data-col-size=\"sm\" data-start=\"1703\" data-end=\"1747\"><strong data-start=\"1705\" data-end=\"1746\">Mayurasharma</strong></td>\n<td data-col-size=\"md\" data-start=\"1747\" data-end=\"1805\">Mayurasharma, <strong data-start=\"1763\" data-end=\"1804\">Kakusthavarma</strong></td>\n<td data-col-size=\"sm\" data-start=\"1805\" data-end=\"1820\">345 &ndash; 525 CE</td>\n<td data-col-size=\"sm\" data-start=\"1820\" data-end=\"1831\">Banavasi</td>\n<td data-col-size=\"md\" data-start=\"1831\" data-end=\"1894\"><strong data-start=\"1833\" data-end=\"1858\">Early Kannada kingdom</strong>; literature &amp; temple architecture</td>\n</tr>\n<tr data-start=\"1895\" data-end=\"2190\">\n<td data-start=\"1895\" data-end=\"1918\" data-col-size=\"sm\"><strong data-start=\"1897\" data-end=\"1917\">Pallavas (पल्लव)</strong></td>\n<td data-col-size=\"sm\" data-start=\"1918\" data-end=\"1962\"><strong data-start=\"1920\" data-end=\"1961\">Simha Vishnu</strong></td>\n<td data-col-size=\"md\" data-start=\"1962\" data-end=\"2072\"><strong data-start=\"1964\" data-end=\"2005\">Mahendravarman I</strong>, <strong data-start=\"2007\" data-end=\"2050\">Narasimhavarman I</strong> (Mamalla), Rajasimha</td>\n<td data-col-size=\"sm\" data-start=\"2072\" data-end=\"2090\">3rd &ndash; 9th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"2090\" data-end=\"2104\">Kanchipuram</td>\n<td data-col-size=\"md\" data-start=\"2104\" data-end=\"2190\">Rock-cut &amp; structural temples at <strong data-start=\"2139\" data-end=\"2156\">Mahabalipuram</strong>; art, architecture &amp; literature</td>\n</tr>\n<tr data-start=\"2191\" data-end=\"2478\">\n<td data-start=\"2191\" data-end=\"2234\" data-col-size=\"sm\"><strong data-start=\"2193\" data-end=\"2233\">Chalukyas of Badami (बादामी चालुक्य)</strong></td>\n<td data-col-size=\"sm\" data-start=\"2234\" data-end=\"2280\"><strong data-start=\"2236\" data-end=\"2279\">Pulakeshin I</strong></td>\n<td data-col-size=\"md\" data-start=\"2280\" data-end=\"2357\"><strong data-start=\"2282\" data-end=\"2325\">Pulakeshin II</strong>, Kirtivarman I, Vikramaditya I</td>\n<td data-col-size=\"sm\" data-start=\"2357\" data-end=\"2372\">543 &ndash; 757 CE</td>\n<td data-col-size=\"sm\" data-start=\"2372\" data-end=\"2390\">Vatapi (Badami)</td>\n<td data-col-size=\"md\" data-start=\"2390\" data-end=\"2478\">Checked <strong data-start=\"2400\" data-end=\"2410\">Harsha</strong> in Deccan; early <strong data-start=\"2428\" data-end=\"2450\">Kannada &amp; Sanskrit</strong> patronage; Badami temples</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2480\" data-end=\"2483\" />\n<h2 data-start=\"2485\" data-end=\"2528\">🎯 SSC EXAM QUICK TRAPS (VERY IMPORTANT)</h2>\n<p></p>\n<ul data-start=\"2529\" data-end=\"2834\">\n<li data-start=\"2529\" data-end=\"2580\">\n<p data-start=\"2531\" data-end=\"2580\"><strong data-start=\"2531\" data-end=\"2560\">First native Deccan power</strong> &rarr; <strong data-start=\"2563\" data-end=\"2578\">Satavahanas</strong></p>\n</li>\n<li data-start=\"2581\" data-end=\"2633\">\n<p data-start=\"2583\" data-end=\"2633\"><strong data-start=\"2583\" data-end=\"2610\">Grand Anicut (Kallanai)</strong> &rarr; <strong data-start=\"2613\" data-end=\"2631\">Karikala Chola</strong></p>\n</li>\n<li data-start=\"2634\" data-end=\"2678\">\n<p data-start=\"2636\" data-end=\"2678\"><strong data-start=\"2636\" data-end=\"2663\">Maritime trade + Sangam</strong> &rarr; <strong data-start=\"2666\" data-end=\"2676\">Cheras</strong></p>\n</li>\n<li data-start=\"2679\" data-end=\"2727\">\n<p data-start=\"2681\" data-end=\"2727\"><strong data-start=\"2681\" data-end=\"2708\">Buddhist Nagarjunakonda</strong> &rarr; <strong data-start=\"2711\" data-end=\"2725\">Ikshavakus</strong></p>\n</li>\n<li data-start=\"2728\" data-end=\"2772\">\n<p data-start=\"2730\" data-end=\"2772\"><strong data-start=\"2730\" data-end=\"2755\">Mahabalipuram temples</strong> &rarr; <strong data-start=\"2758\" data-end=\"2770\">Pallavas</strong></p>\n</li>\n<li data-start=\"2773\" data-end=\"2834\">\n<p data-start=\"2775\" data-end=\"2834\"><strong data-start=\"2775\" data-end=\"2803\">Stopped Harsha in Deccan</strong> &rarr; <strong data-start=\"2806\" data-end=\"2834\">Pulakeshin II (Chalukya)</strong></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Q. Consider the following statements regarding the South Indian powers and identify the INCORRECT one:</strong> <strong data-path-to-node=\"13\" data-index-in-node=\"103\">(दक्षिण भारतीय शक्तियों के संबंध में निम्नलिखित कथनों पर विचार करें और गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"14\">\n<li>\n<p data-path-to-node=\"14,0,0\"><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">A) Early Cholas:</strong> King Karikala Chola ruled from Urayur and is credited with building the <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"89\">Kallanai (Grand Anicut)</strong> dam. <em data-path-to-node=\"14,0,0\" data-index-in-node=\"118\">(<strong data-path-to-node=\"14,0,0\" data-index-in-node=\"119\">प्रारंभिक चोल:</strong> राजा करिकाल चोल ने उरैयूर से शासन किया और उन्हें <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"183\">कल्लणै (ग्रैंड एनीकट)</strong> बांध बनाने का श्रेय दिया जाता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,1,0\"><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">B) Cheras &amp; Pandyas:</strong> The Cheras (Vanji) controlled the <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"55\">Muziris</strong> port, while the Pandyas (Madurai) were famous for their pearl trade and early interaction with Romans. <em data-path-to-node=\"14,1,0\" data-index-in-node=\"166\">(<strong data-path-to-node=\"14,1,0\" data-index-in-node=\"167\">चेर और पांड्य:</strong> चेरों (वंजी) ने <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"198\">मुज़िरिस</strong> बंदरगाह को नियंत्रित किया, जबकि पांड्य (मदुरै) अपने मोती व्यापार और रोमनों के साथ प्रारंभिक बातचीत के लिए प्रसिद्ध थे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,2,0\"><strong data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">C) Pallavas:</strong> Based in <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"22\">Kanchipuram</strong>, they are famous for the rock-cut Ratha temples at <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"85\">Mahabalipuram</strong> and rulers like Narasimhavarman I. <em data-path-to-node=\"14,2,0\" data-index-in-node=\"134\">(<strong data-path-to-node=\"14,2,0\" data-index-in-node=\"135\">पल्लव:</strong> <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"142\">कांचीपुरम</strong> में स्थित, वे <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"166\">महाबलीपुरम</strong> के रॉक-कट रथ मंदिरों और नरसिंहवर्मन प्रथम जैसे शासकों के लिए प्रसिद्ध हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,3,0\"><strong data-path-to-node=\"14,3,0\" data-index-in-node=\"0\">D) Chalukyas of Badami:</strong> Founded by Pulakeshin I, their greatest king <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"69\">Pulakeshin II</strong> was famously defeated by King <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"113\">Harshavardhana</strong> on the banks of the Narmada. <em data-path-to-node=\"14,3,0\" data-index-in-node=\"157\">(<strong data-path-to-node=\"14,3,0\" data-index-in-node=\"158\">बादामी के चालुक्य:</strong> पुलकेशिन प्रथम द्वारा स्थापित, उनके सबसे महान राजा <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"228\">पुलकेशिन द्वितीय</strong> को नर्मदा के तट पर राजा <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"269\">हर्षवर्द्धन</strong> ने हराया था।)</em></p>\n</li>\n</ul>",

    "solution": "<p>Statement D is incorrect because <strong data-path-to-node=\"16,0\" data-index-in-node=\"46\">Pulakeshin II actually DEFEATED Harshavardhana</strong> on the banks of the Narmada river, preventing Harsha from expanding into the Deccan. <strong data-path-to-node=\"16,0\" data-index-in-node=\"178\">व्याख्या:</strong> कथन D गलत है क्योंकि <strong data-path-to-node=\"16,0\" data-index-in-node=\"209\">पुलकेशिन द्वितीय ने वास्तव में नर्मदा नदी के तट पर हर्षवर्धन को हराया था</strong>, जिससे हर्ष दक्कन में विस्तार नहीं कर पाए थे।</p>\n<p style=\"text-align: center;\"></p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"18\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" data-index-in-node=\"0\">&nbsp;South India Summary Cheat Sheet (दक्षिण भारत सारांश शीट)</strong></h3>\n<p data-path-to-node=\"20\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<thead style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; width: 102.031px; text-align: center;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Dynasty (वंश)</strong></td>\n<td style=\"border: 1px solid; f ight: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,2,0\">Karnasubarna</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,3,0\">First unified political entity in Bengal.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\" data-index-in-node=\"0\">Parivrajaka</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,1,0\">Hastin</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,2,0\">Unknown</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,3,0\">Promoted Shaivism in Central India.</span></td>\n</tr>\n</tbody>\n</table>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Rudradaman I (Shaka):</strong> H "><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,5,2,0\">Inscription mentioning Vedic Gods (Indra, Varuna, etc.).</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Select the correct combination:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(सही मिलान कूट का चयन करें:)</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> Only A, C, and D are correct.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> Only B and E are correct.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> All pairs A, B, C, D, and E are correctly matched.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"7,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> None of the above.</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"9,0\"><strong data-path-to-node=\"9,0\" data-index-in-node=\"0\">Explanation:</strong> These are foundational facts. <strong data-path-to-node=\"9,0\" data-index-in-node=\"43\">James Prinsep</strong> is a frequent SSC question, while <strong data-path-to-node=\"9,0\" data-index-in-node=\"91\">Boghaz-Koi</strong> is a high-yield UPSC fact proving the antiquity of Vedic deities outside India.</p>\n<h1 data-start=\"363\" data-end=\"406\">📜 IMPORTANCE OF ANCIENT INDIAN HISTORY</h1>\n<p data-start=\"407\" data-end=\"441\"><em data-start=\"407\" data-end=\"441\">(प्राचीन भारतीय इतिहास का महत्व)</em></p>\n<p data-start=\"443\" data-end=\"741\">Studying Ancient Indian History helps us understand:<br data-start=\"495\" data-end=\"498\" />&bull; <strong data-start=\"500\" data-end=\"522\">Origin of cultures</strong> &ndash; How, when &amp; where early cultures developed<br data-start=\"567\" data-end=\"570\" />&bull; <strong data-start=\"572\" data-end=\"599\">Agricultural beginnings</strong> &ndash; Transition to settled life<br data-start=\"628\" data-end=\"631\" />&bull; <strong data-start=\"633\" data-end=\"661\">Use of natural resources</strong> &ndash; Metals, forests, rivers<br data-start=\"687\" data-end=\"690\" />&bull; <strong data-start=\"692\" data-end=\"714\">Livelihood systems</strong> &ndash; Farming, trade, crafts</p>\n<p data-start=\"743\" data-end=\"831\">👉 <em data-start=\"746\" data-end=\"831\">यह इतिहास सभ्यता के विकास, अर्थव्यवस्था और संस्कृति की जड़ें समझने में मदद करता है।</em></p>\n<hr data-start=\"833\" data-end=\"836\" />\n<h1 data-start=\"838\" data-end=\"878\">📚 HISTORICAL SOURCES (ऐतिहासिक स्रोत)</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"880\" data-end=\"1080\">\n<thead data-start=\"880\" data-end=\"909\">\n<tr data-start=\"880\" data-end=\"909\">\n<th data-start=\"880\" data-end=\"891\" data-col-size=\"sm\">Category</th>\n<th data-start=\"891\" data-end=\"909\" data-col-size=\"md\">Types (प्रकार)</th>\n</tr>\n</thead>\n<tbody data-start=\"920\" data-end=\"1080\">\n<tr data-start=\"920\" data-end=\"1013\">\n<td data-start=\"920\" data-end=\"963\" data-col-size=\"sm\"><strong data-start=\"922\" data-end=\"948\">Archaeological Sources</strong> (पुरातात्विक)</td>\n<td data-col-size=\"md\" data-start=\"963\" data-end=\"1013\">Material remains, Pottery, Inscriptions, Coins</td>\n</tr>\n<tr data-start=\"1014\" data-end=\"1080\">\n<td data-start=\"1014\" data-end=\"1049\" data-col-size=\"sm\"><strong data-start=\"1016\" data-end=\"1036\">Literary Sources</strong> (साहित्यिक)</td>\n<td data-col-size=\"md\" data-start=\"1049\" data-end=\"1080\">Religious, Secular, Foreign</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1082\" data-end=\"1085\" />\n<h1 data-start=\"1087\" data-end=\"1134\">🏺 ARCHAEOLOGICAL SOURCES (पुरातात्विक स्रोत)</h1>\n<p data-start=\"1136\" data-end=\"1239\"><strong data-start=\"1136\" data-end=\"1151\">Definition:</strong> Physical remains used to reconstruct history<br data-start=\"1196\" data-end=\"1199\" /><strong data-start=\"1199\" data-end=\"1210\">Expert:</strong> Archaeologist (पुरातत्वविद्)</p>\n<h3 data-start=\"1241\" data-end=\"1278\">🔹 Material Remains (भौतिक अवशेष)</h3>\n<p data-start=\"1279\" data-end=\"1539\">&bull; Settlement layout, houses, tools, food grains<br data-start=\"1326\" data-end=\"1329\" />&bull; <strong data-start=\"1331\" data-end=\"1354\">Vertical excavation</strong> &rarr; cultural sequence (chronology)<br data-start=\"1387\" data-end=\"1390\" />&bull; <strong data-start=\"1392\" data-end=\"1406\">Ring Wells</strong> &rarr; toilets / drainage / garbage<br data-start=\"1437\" data-end=\"1440\" />&bull; <strong data-start=\"1442\" data-end=\"1456\">Iron usage</strong> &rarr; ~3000 years ago<br data-start=\"1474\" data-end=\"1477\" />&bull; <strong data-start=\"1479\" data-end=\"1506\">Megaliths (South India)</strong> &rarr; burial sites with iron tools</p>\n<hr data-start=\"1541\" data-end=\"1544\" />\n<h2 data-start=\"1546\" data-end=\"1598\">🗺️ MAJOR ARCHAEOLOGICAL REGIONS (VERY IMPORTANT)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1600\" data-end=\"2114\">\n<thead data-start=\"1600\" data-end=\"1647\">\n<tr data-start=\"1600\" data-end=\"1647\">\n<th data-start=\"1600\" data-end=\"1616\" data-col-size=\"sm\">Site / Region</th>\n<th data-start=\"1616\" data-end=\"1627\" data-col-size=\"sm\">Location</th>\n<th data-start=\"1627\" data-end=\"1647\" data-col-size=\"sm\">Key Significance</th>\n</tr>\n</thead>\n<tbody data-start=\"1662\" data-end=\"2114\">\n<tr data-start=\"1662\" data-end=\"1725\">\n<td data-start=\"1662\" data-end=\"1683\" data-col-size=\"sm\"><strong data-start=\"1664\" data-end=\"1682\">Narmada Valley</strong></td>\n<td data-start=\"1683\" data-end=\"1699\" data-col-size=\"sm\">Central India</td>\n<td data-col-size=\"sm\" data-start=\"1699\" data-end=\"1725\">Early hunter-gatherers</td>\n</tr>\n<tr data-start=\"1726\" data-end=\"1795\">\n<td data-start=\"1726\" data-end=\"1750\" data-col-size=\"sm\"><strong data-start=\"1728\" data-end=\"1749\">North of Vindhyas</strong></td>\n<td data-col-size=\"sm\" data-start=\"1750\" data-end=\"1766\">Central India</td>\n<td data-col-size=\"sm\" data-start=\"1766\" data-end=\"1795\">Earliest rice cultivation</td>\n</tr>\n<tr data-start=\"1796\" data-end=\"1842\">\n<td data-start=\"1796\" data-end=\"1810\" data-col-size=\"sm\"><strong data-start=\"1798\" data-end=\"1809\">Magadha</strong></td>\n<td data-col-size=\"sm\" data-start=\"1810\" data-end=\"1818\">Bihar</td>\n<td data-col-size=\"sm\" data-start=\"1818\" data-end=\"1842\">First Indian kingdom</td>\n</tr>\n<tr data-start=\"1843\" data-end=\"1938\">\n<td data-start=\"1843\" data-end     "question": "<p data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">&nbsp;Consider the following statements regarding ancient Indian coinage and identify which one is INCORRECT:</strong> <strong data-path-to-node=\"22\" data-index-in-node=\"107\">(प्राचीन भारतीय सिक्कों के संबंध में निम्नलिखित कथनों पर विचार करें और पहचानें कि कौन सा गलत है:)</strong></p>\n<ul data-path-to-node=\"23\">\n<li>\n<p data-path-to-node=\"23,0,0\"><strong data-path-to-node=\"23,0,0\" data-index-in-node=\"0\">A) Punch-Marked Coins:</strong> The earliest coins (Karshapanas) were generally silver, non-inscribed, and stamped with nature-inspired symbols. <em data-path-to-node=\"23,0,0\" data-index-in-node=\"136\">(<strong data-path-to-node=\"23,0,0\" data-index-in-node=\"137\">आहत सिक्के:</strong> शुरुआती सिक्के (कार्षापण) आम तौर पर चांदी के थे, उन पर कोई लेख नहीं था और प्रकृति से प्रेरित प्रतीकों के ठप्पे लगे थे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"23,1,0\"><strong data-path-to-node=\"23,1,0\" data-index-in-node=\"0\">B) Indo-Greeks:</strong> They were the first to issue coins bearing names and portraits of rulers, introducing the bilingual (Greek/Prakrit) tradition. <em data-path-to-node=\"23,1,0\" data-index-in-node=\"143\">(<strong data-path-to-node=\"23,1,0\" data-index-in-node=\"144\">हिंद-यूनानी:</strong> वे शासकों के नाम और चित्र वाले सिक्के जारी करने वाले पहले व्यक्ति थे, जिन्होंने द्विभाषी परंपरा की शुरुआत की।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"23,2,0\"><strong data-path-to-node=\"23,2,0\" data-index-in-node=\"0\">C) Satavahanas:</strong> They were the first to issue lead coins on a large scale because the Andhra region was rich in lead resources. <em data-path-to-node=\"23,2,0\" data-index-in-node=\"127\">(<strong data-path-to-node=\"23,2,0\" data-index-in-node=\"128\">सातवाहन:</strong> वे बड़े पैमाने पर सीसे के सिक्के जारी करने वाले पहले व्यक्ति थे क्योंकि आंध्र क्षेत्र सीसा संसाधनों से समृद्ध था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"23,3,0\"><strong data-path-to-node=\"23,3,0\" data-index-in-node=\"0\">D) Guptas:</strong> They issued the largest number of copper coins, while the Kushanas were the first to issue gold coins called 'Dinaras'. <em data-path-to-node=\"23,3,0\" data-index-in-node=\"131\">(<strong data-path-to-node=\"23,3,0\" data-index-in-node=\"132\">गुप्त:</strong> उन्होंने तांबे के सिक्कों की सबसे बड़ी संख्या जारी की, जबकि कुषाण 'दीनार' नामक सोने के सिक्के जारी करने वाले पहले व्यक्ति थे।)</em></p>\n</li>\n</ul>",

    "solution": "<blockquote data-path-to-node=\"25\">\n<p data-path-to-node=\"25,0\">Statement D is incorrect because the <strong data-path-to-node=\"25,0\" data-index-in-node=\"50\">Guptas</strong> issued the largest number of <strong data-path-to-node=\"25,0\" data-index-in-node=\"86\">GOLD</strong> coins (Dinaras), not copper. While the <strong data-path-to-node=\"25,0\" data-index-in-node=\"130\">Kushanas</strong> were the first to issue gold coins on a wide scale in India, the Gupta gold coins are considered the finest in terms of visual appeal.</p>\n</blockquote>\n<hr data-path-to-node=\"26\" />\n<h3 data-path-to-node=\"27\"><strong data-path-to-node=\"27\" data-index-in-node=\"0\">&nbsp;Quick Revision Cheat Sheet&nbsp;</strong></h3>\n<ul data-path-to-node=\"28\">\n<li>\n<p data-path-to-node=\"28,0,0\"><strong data-path-to-node=\"28,0,0\" data-index-in-node=\"0\">Brahmi Script:</strong> Written Left-to-Right (used by Ashoka).</p>\n</li>\n<li>\n<p data-path-to-node=\"28,1,0\"><strong data-path-to-node=\"28,1,0\" data-index-in-node=\"0\">Kharosthi Script:</strong> Written Right-to-Left (North-West India).</p>\n</li>\n<li>\n<p data-path-to-node=\"28,2,0\"><strong data-path-to-node=\"28,2,0\" data-index-in-node=\"0\">Vikram Samvat:</strong> 58 BC | <strong data-path-to-node=\"28,2,0\" data-index-in-node=\"23\">Saka Samvat:</strong> 78 AD | <strong data-path-to-node=\"28,2,0\" data-index-in-node=\"44\">Gupta Era:</strong> 319 AD.</p>\n</li>\n<li>\n<p data-path-to-node=\"28,3,0\"><strong data-path-to-node=\"28,3,0\" data-index-in-node=\"0\">Megaliths:</strong> Large stone burials in South India (Iron Age).</p>\n</li>\n<li>\n<p data-path-to-node=\"28,4,0\"><strong data-path-to-node=\"28,4,0\" data-index-in-node=\"0\">Nishka/Satamana:</strong> Vedic units of precious metal used for commerce.</p>\n</li>\n</ul>\n<h1 data-start=\"3596\" data-end=\"3637\">ANCIENT COINS &amp; NUMISMATICS (सिक्के)</h1>\n<p data-start=\"3639\" data-end=\"3672\"><strong data-start=\"3639\" data-end=\"3655\">Numismatics:</strong> Study of coins</p>\n<h3 data-start=\"3674\" data-end=\"3695\">🔹 Earliest Coins</h3>\n<p data-start=\"3696\" data-end=\"3818\">&bull; <strong data-start=\"3698\" data-end=\"3720\">Punch-Marked Coins</strong> (Silver Karshapana / Pana)<br data-start=\"3747\" data-end=\"3750\" />&bull; No inscription, symbols punched<br data-start=\"3783\" data-end=\"3786\" />&bull; Used till early centuries CE</p>\n<hr data-start=\"3820\" data-end=\"3823\" />\n<h2 data-start=\"3825\" data-end=\"3865\">🧠 EVOLUTION OF COINAGE (PYQ-FOCUSED)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3867\" data-end=\"4400\">\n<thead data-start=\"3867\" data-end=\"3892\">\n<tr data-start=\"3867\" data-end=\"3892\">\n<th data-start=\"3867\" data-end=\"3876\" data-col-size=\"sm\">Period</th>\n<th data-start=\"3876\" data-end=\"3892\" data-col-size=\"sm\">Key Features</th>\n</tr>\n</thead>\n<tbody data-start=\"3903\" data-end=\"4400\">\n<tr data-start=\"3903\" data-end=\"3949\">\n<td data-start=\"3903\" data-end=\"3915\" data-col-size=\"sm\"><strong data-start=\"3905\" data-end=\"3914\">Vedic</strong></td>\n<td data-start=\"3915\" data-end=\"3949\" data-col-size=\"sm\">Nishka, Satamana (metal units)</td>\n</tr>\n<tr data-start=\"3950\" data-end=\"3989\">\n<td data-start=\"3950\" data-end=\"3966\" data-col-size=\"sm\"><strong data-start=\"3952\" data-end=\"3965\">Janapadas</strong></td>\n<td data-col-size=\"sm\" data-start=\"3966\" data-end=\"3989\">Karshapana, Suvarna</td>\n</tr>\n<tr data-start=\"3990\" data-end=\"4034\">\n<td data-start=\"3990\" data-end=\"4009\" data-col-size=\"sm\"><strong data-start=\"3992\" data-end=\"4008\">Post-Mauryan</strong></td>\n<td data-col-size=\"sm\" data-start=\"4009\" data-end=\"4034\">Max variety of metals</td>\n</tr>\n<tr data-start=\"4035\" data-end=\"4091\">\n<td data-start=\"4035\" data-end=\"4053\" data-col-size=\"sm\"><strong data-start=\"4037\" data-end=\"4052\">Indo-Greeks</strong></td>\n<td data-col-size=\"sm\" data-start=\"4053\" data-end=\"4091\">First portraits &amp; names; bilingual</td>\n</tr>\n<tr data-start=\"4092\" data-end=\"4135\">\n<td data-start=\"4092\" data-end=\"4107\" data-col-size=\"sm\"><strong data-start=\"4094\" data-end=\"4106\">Kushanas</strong></td>\n<td data-col-size=\"sm\" data-start=\"4107\" data-end=\"4135\">Gold coins; deity + king</td>\n</tr>\n<tr data-start=\"4136\" data-end=\"4182\">\n<td data-start=\"4136\" data-end=\"4154\" data-col-size=\"sm\"><strong data-start=\"4138\" data-end=\"4153\">Satavahanas</strong></td>\n<td data-col-size=\"sm\" data-start=\"4154\" data-end=\"4182\">Lead coins (Andhra lead)</td>\n</tr>\n<tr data-start=\"4183\" data-end=\"4219\">\n<td data-start=\"4183\" data-end=\"4196\" data-col-size=\"sm\"><strong data-start=\"4185\" data-end=\"4195\">Guptas</strong></td>\n<td data-start=\"4196\" data-end=\"4219\" data-col-size=\"sm\">Finest gold dinaras</td>\n</tr>\n<tr data-start=\"4220\" data-end=\"4257\">\n<td data-start=\"4220\" data-end=\"4237\" data-col-size=\"sm\"><strong data-start=\"4222\" data-end=\"4236\">Post-Gupta</strong></td>\n<td data-start=\"4237\" data-end=\"4257\" data-col-size=\"sm\">Decline of coins</td>\n</tr>\n<tr data-start=\"4258\" data-end=\"4309\">\n<td data-start=\"4258\" data-end=\"4278\" data-col-size=\"sm\"><strong data-start=\"4260\" data-end=\"4277\">Indo-Sasanian</strong></td>\n<td data-start=\"4278\" data-end=\"4309\" data-col-size=\"sm\">Geometric bust + fire altar</td>\n</tr>\n<tr data-start=\"4310\" data-end=\"4357\">\n<td data-start=\"4310\" data-end=\"4332\" data-col-size=\"sm\"><strong data-start=\"4312\" data-end=\"4331\">Imperial Cholas</strong></td>\n<td data-col-size=\"sm\" data-start=\"4332\" data-end=\"4357\">Bow-tiger-fish emblem</td>\n</tr>\n<tr data-start=\"4358\" data-end=\"4400\">\n<td data-start=\"4358\" data-end=\"4372\" data-col-size=\"sm\"><strong data-start=\"4360\" data-end=\"4371\">Rajputs</strong></td>\n<td data-col-size=\"sm\" data-start=\"4372\" data-end=\"4400\">Lakshmi, bull &amp; horseman</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"4402\" data-end=\"4405\" />\n<h2 data-start=\"4407\" data-end=\"4436\">🚨 SUPER-SHORT MEMORY PACK</h2>\n<ul data-start=\"4437\" data-end=\"4613\">\n<li data-start=\"4437\" data-end=\"4474\">\n<p data-start=\"4439\" data-end=\"4474\">Earliest coins &rarr; <strong data-start=\"4456\" data-end=\"4472\">Punch-marked</strong></p>\n</li>\n<li data-start=\"4475\" data-end=\"4517\">\n<p data-start=\"4477\" data-end=\"4517\">Indo-Greeks &rarr; <strong data-start=\"4491\" data-end=\"4515\">First portrait coins</strong></p>\n</li>\n<li data-start=\"4518\" data-end=\"4547\">\n<p data-start=\"4520\" data-end=\"4547\">Kushanas &rarr; <strong data-start=\"4531\" data-end=\"4545\">Gold coins</strong></p>\n</li>\n<li data-start=\"4548\" data-end=\"4582\">\n<p data-start=\"4550\" data-end=\"4582\">Guptas &rarr; <strong data-start=\"4559\" data-end=\"4580\">Finest gold coins</strong></p>\n</li>\n<li data-start=\"4583\" data-end=\"4613\">\n<p data-start=\"4585\" data-end=\"4613\">Satavahanas &rarr; <strong data-start=\"4599\" data-end=\"4613\">Lead coins</strong></p>\n</li>\n</ul>\n<hr data-start=\"4615\" data-end=\"4618\" />\n<h1 data-start=\"4620\" data-end=\"4658\">🪨 INSCRIPTIONS &amp; EPIGRAPHY (अभिलेख)</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4660\" data-end=\"4830\">\n<thead data-start=\"4660\" data-end=\"4678\">\n<tr data-start=\"4660\" data-end=\"4678\">\n<th data-start=\"4660\" data-end=\"4667\" data-col-size=\"sm\">Term</th>\n<th data-start=\"4667\" data-end=\"4678\" data-col-size=\"sm\">Meaning</th>\n</tr>\n</thead>\n<tbody data-start=\"4689\" data-end=\"4830\">\n<tr data-start=\"4689\" data-end=\"4740\">\n<td data-start=\"4689\" data-end=\"4707\" data-col-size=\"sm\"><strong data-start=\"4691\" data-end=\"4706\">Inscription</strong></td>\n<td data-col-size=\"sm\" data-start=\"4707\" data-end=\"4740\">Text engraved on hard surface</td>\n</tr>\n<tr data-start=\"4741\" data-end=\"4782\">\n<td data-start=\"4741\" data-end=\"4757\" data-col-size=\"sm\"><strong data-start=\"4743\" data-end=\"4756\">Epigraphy</strong></td>\n<td data-col-size=\"sm\" data-start=\"4757\" data-end=\"4782\">Study of inscriptions</td>\n</tr>\n<tr data-start=\"4783\" data-end=\"4830\">\n<td data-start=\"4783\" data-end=\"4802\" data-col-size=\"sm\"><strong data-start=\"4785\" data-end=\"4801\">Palaeography</strong></td>\n<td data-col-size=\"sm\" data-start=\"4802\" data-end=\"4830\">Study of ancient scripts</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"4832\" data-end=\"4835\" />\n<h2 data-start=\"4837\" data-end=\"4869\">🔹 KEY FACTS (VERY IMPORTANT)</h2>\n<p data-start=\"4871\" data-end=\"5044\">&bull; <strong data-start=\"4873\" data-end=\"4897\">Earliest inscription</strong> &rarr; Harappa seals (undeciphered)<br data-start=\"4928\" data-end=\"4931\" />&bull; <strong data-start=\"4933\" data-end=\"4954\">Oldest deciphered</strong> &rarr; Ashokan Brahmi<br data-start=\"4971\" data-end=\"4974\" />&bull; <strong data-start=\"4976\" data-end=\"4993\">Deciphered by</strong> &rarr; <strong data-start=\"4996\" data-end=\"5037\">James Prinsep</strong> (1837)</p>\n<hr data-start=\"5046\" data-end=\"5049\" />\n<h2 data-start=\"5051\" data-end=\"5075\">🗣️ LANGUAGE &amp; SCRIPT</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5077\" data-end=\"5357\">\n<thead data-start=\"5077\" data-end=\"5098\">\n<tr data-start=\"5077\" data-end=\"5098\">\n<th data-start=\"5077\" data-end=\"5087\" data-col-size=\"sm\">Feature</th>\n<th data-start=\"5087\" data-end=\"5098\" data-col-size=\"md\">Details</th>\n</tr>\n</thead>\n<tbody data-start=\"5109\" data-end=\"5357\">\n<tr data-start=\"5109\" data-end=\"5143\">\n<td data-start=\"5109\" data-end=\"5132\" data-col-size=\"sm\"><strong data-start=\"5111\" data-end=\"5131\">Ashokan Language</strong></td>\n<td data-col-size=\"md\" data-start=\"5132\" data-end=\"5143\">Prakrit</td>\n</tr>\n<tr data-start=\"5144\" data-end=\"5212\">\n<td data-start=\"5144\" data-end=\"5163\" data-col-size=\"sm\"><strong data-start=\"5146\" data-end=\"5162\">Scripts Used</strong></td>\n<td data-col-size=\"md\" data-start=\"5163\" data-end=\"5212\">Brahmi (L&rarr;R), Kharosthi (R&rarr;L), Greek, Aramaic</td>\n</tr>\n<tr data-start=\"5213\" data-end=\"5247\">\n<td data-start=\"5213\" data-end=\"5232\" data-col-size=\"sm\"><strong data-start=\"5215\" data-end=\"5231\">Sanskrit use</strong></td>\n<td data-col-size=\"md\" data-start=\"5232\" data-end=\"5247\">From 2nd CE</td>\n</tr>\n<tr data-start=\"5248\" data-end=\"5311\">\n<td data-start=\"5248\" data-end=\"5275\" data-col-size=\"sm\"><strong data-start=\"5250\" data-end=\"5274\">Junagarh Inscription</strong></td>\n<td data-col-size=\"md\" data-start=\"5275\" data-end=\"5311\">Rudradaman &ndash; first pure Sanskrit</td>\n</tr>\n<tr data-start=\"5312\" data-end=\"5357\">\n<td data-start=\"5312\" data-end=\"5337\" data-col-size=\"sm\"><strong data-start=\"5314\" data-end=\"5336\">Regional Languages</strong></td>\n<td data-col-size=\"md\" data-start=\"5337\" data-end=\"5357\">From 9th&ndash;10th CE</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"5359\" data-end=\"5362\" />\n<h2 data-start=\"5364\" data-end=\"5408\">🌍 BOGHAZ-KOI INSCRIPTION (100% VERIFIED)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5410\" data-end=\"5654\">\n<thead data-start=\"5410\" data-end=\"5430\">\n<tr data-start=\"5410\" data-end=\"5430\">\n<th     "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Q. Consider the following statements regarding the literary sources of Ancient India and identify the INCORRECT one:</strong> <strong data-path-to-node=\"13\" data-index-in-node=\"117\">(प्राचीन भारत के साहित्यिक स्रोतों के संबंध में निम्नलिखित कथनों पर विचार करें और गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"14\">\n<li>\n<p data-path-to-node=\"14,0,0\"><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">A) Buddhist &amp; Jain Texts:</strong><span class=\"citation-60\"> The earliest Buddhist texts (Tripitakas) were written in </span><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"83\">Pali</strong><span class=\"citation-60\">, while Jain texts (Angas) were primarily composed in </span><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"141\">Prakrit</strong><span class=\"citation-60 citation-end-60\">.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> <em data-path-to-node=\"14,0,0\" data-index-in-node=\"150\">(<strong data-path-to-node=\"14,0,0\" data-index-in-node=\"151\">बौद्ध और जैन ग्रंथ:</strong> शुरुआती बौद्ध ग्रंथ (त्रिपिटक) <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"202\">पाली</strong> में लिखे गए थे, जबकि जैन ग्रंथ (अंग) मुख्य रूप से <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"257\">प्राकृत</strong> में रचे गए थे।)</em><sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n</li>\n<li>\n<p data-path-to-node=\"14,1,0\"><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">B) Secular Biographies:</strong> <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"24\">Banabhatta</strong><span class=\"citation-59\"> wrote the </span><em data-path-to-node=\"14,1,0\" data-index-in-node=\"45\">Harshacharita</em><span class=\"citation-59\"> (life of Harsha), and </span><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"81\">Kalhana</strong><span class=\"citation-59\"> wrote the </span><em data-path-to-node=\"14,1,0\" data-index-in-node=\"99\">Rajatarangini</em><span class=\"citation-59 citation-end-59\">, which is a chronological history of the kings of Kashmir.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> <em data-path-to-node=\"14,1,0\" data-index-in-node=\"172\">(<strong data-path-to-node=\"14,1,0\" data-index-in-node=\"173\">धर्मनिरपेक्ष जीवनियाँ:</strong> <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"196\">बाणभट्ट</strong> ने 'हर्षचरित' (हर्ष का जीवन) लिखा, और <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"242\">कल्हण</strong> ने 'राजतरंगिणी' लिखी, जो कश्मीर के राजाओं का कालानुक्रमिक इतिहास है।)</em><sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n</li>\n<li>\n<p data-path-to-node=\"14,2,0\"><strong data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">C) Kautilya&rsquo;s Arthashastra:</strong><span class=\"citation-58 citation-end-58\"> It is divided into 15 books and provides rich material for studying Mauryan polity and economy.<source-footnote ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c4207110723=\"\"></source-footnote></span> <em data-path-to-node=\"14,2,0\" data-index-in-node=\"124\">(<strong data-path-to-node=\"14,2,0\" data-index-in-node=\"125\">कौटिल्य का अर्थशास्त्र:</strong> यह 15 पुस्तकों में विभाजित है और मौर्यकालीन राजनीति और अर्थव्यवस्था के अध्ययन के लिए समृद्ध सामग्री प्रदान करता है।)</em><sources-carousel-inline ng-version=\"0.0.0-PLACEHOLDER\" _nghost-ng-c2742577412=\"\"><source-inline-chips _ngcontent-ng-c2742577412=\"\" _nghost-ng-c2631690858=\"\" class=\"ng-star-inserted\"><source-inline-chip _ngcontent-ng-c2631690858=\"\" _nghost-ng-c3128960296=\"\" class=\"ng-star-inserted\"></source-inline-chip></source-inline-chips></sources-carousel-inline></p>\n</li>\n<li>\n<p data-path-to-node=\"14,3,0\"><strong data-path-to-node=\"14,3,0\" data-index-in-node=\"0\">D) Sangam Literature:</strong> These are the earliest Sanskrit texts composed in North India that describe the Aryan conquest of South India. <em data-path-to-node=\"14,3,0\" data-index-in-node=\"133\">(<strong data-path-to-node=\"14,3,0\" data-index-in-node=\"134\">संगम साहित्य:</strong> ये उत्तर भारत में रचित सबसे पुराने संस्कृत ग्रंथ हैं जो दक्षिण भारत पर आर्यों की विजय का वर्णन करते हैं।)</em></p>\n</li>\n</ul>",

    "solution": "<p style=\"line-height: 1.15 !important;\">&nbsp;Statement D is incorrect because Sangam Literature consists of the earliest TAMIL texts (not Sanskrit), composed in assemblies (Sangams) in Madurai.7 They describe the social, economic, and political life of the people in the South Indian Delta region, not Aryan conquests.</p>\n<p style=\"line-height: 1.15 !important;\">&nbsp;कथन D गलत है क्योंकि संगम साहित्य सबसे पुराने तमिल ग्रंथों (संस्कृत नहीं) से बना है, जिनकी रचना मदुरै की सभाओं (संगमों) में हुई थी। वे दक्षिण भारतीय डेल्टा क्षेत्र के लोगों के सामाजिक, आर्थिक और राजनीतिक जीवन का वर्णन करते हैं।</p>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"18\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" data-index-in-node=\"0\">&nbsp;Literature &amp; Inscriptions Revision Table&nbsp;</strong></h3>\n<p data-path-to-node=\"20\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<thead style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; lin     "solution": "<p data-path-to-node=\"8\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" data-index-in-node=\"0\">Answer (उत्तर): C) All pairs are correctly matched (सभी युग्म सही सुमेलित हैं)</strong></p>\n<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\">\n<p data-path-to-node=\"9,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"0\">Key Insight:</strong>&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"13\">Megasthenes</strong>&nbsp;is crucial for Mauryan administration.&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"64\">Al-Biruni</strong>&nbsp;is unique because he compared Indian philosophy with Greek thinkers like Plato.&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"154\">Ibn Battuta</strong>&nbsp;and&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"170\">Abdur Razzak</strong>&nbsp;are the primary sources for the medieval transition.</p>\n</blockquote>",

    "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Q. Consider the following statements regarding Chinese travelers to India and identify the INCORRECT one:</strong> <strong data-path-to-node=\"13\" data-index-in-node=\"106\">(भारत आने वाले चीनी यात्रियों के संबंध में निम्नलिखित कथनों पर विचार करें और गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"14\">\n<li>\n<p data-path-to-node=\"14,0,0\"><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">A) Fa-Hien:</strong> He visited during the reign of <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"43\">Chandragupta II (Vikramaditya)</strong> and wrote <em data-path-to-node=\"14,0,0\" data-index-in-node=\"84\">Record of Buddhist Kingdoms</em>, focusing on the Gupta era. <em data-path-to-node=\"14,0,0\" data-index-in-node=\"140\">(<strong data-path-to-node=\"14,0,0\" data-index-in-node=\"141\">फा-ह्यान:</strong> उन्होंने <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"160\">चंद्रगुप्त द्वितीय (विक्रमादित्य)</strong> के शासनकाल के दौरान दौरा किया और गुप्त काल पर ध्यान केंद्रित करते हुए 'बौद्ध राज्यों का रिकॉर्ड' लिखा।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,1,0\"><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">B) Hiuen Tsang (Xuanzang):</strong> Known as the \"Prince of Pilgrims,\" he visited during <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"80\">Harsha Vardhana's</strong> reign, studied at Nalanda, and wrote <em data-path-to-node=\"14,1,0\" data-index-in-node=\"135\">Si-yu-ki</em>. <em data-path-to-node=\"14,1,0\" data-index-in-node=\"145\">(<strong data-path-to-node=\"14,1,0\" data-index-in-node=\"146\">ह्वेन सांग:</strong> 'तीर्थयात्रियों के राजकुमार' के रूप में जाने जाने वाले, उन्होंने <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"223\">हर्षवर्द्धन</strong> के शासनकाल के दौरान दौरा किया, नालंदा में अध्ययन किया और 'सी-यू-की' लिखा।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,2,0\"><strong data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">C) I-Tsing:</strong> He arrived after Harsha's death, spent 10 years at Nalanda studying the <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"84\">Vinaya</strong>, and later translated Sanskrit texts in Shri Bhoja (Sumatra). <em data-path-to-node=\"14,2,0\" data-index-in-node=\"153\">(<strong data-path-to-node=\"14,2,0\" data-index-in-node=\"154\">इ-त्सिंग:</strong> वह हर्ष की मृत्यु के बाद आए, विनय का अध्ययन करने के लिए नालंदा में 10 साल बिताए, और बाद में श्री भोज (सुमात्रा) में संस्कृत ग्रंथों का अनुवाद किया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,3,0\"><strong data-path-to-node=\"14,3,0\" data-index-in-node=\"0\">D) Sungyun:</strong> He was the first Chinese traveler to visit the court of <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"68\">Ashoka</strong> and returned with 500 Mahayana texts. <em data-path-to-node=\"14,3,0\" data-index-in-node=\"113\">(<strong data-path-to-node=\"14,3,0\" data-index-in-node=\"114\">सुंगयुन:</strong> वह <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"126\">अशोक</strong> के दरबार में जाने वाले पहले चीनी यात्री थे और 500 महायान ग्रंथों के साथ लौटे थे।)</em></p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"15\"><strong data-path-to-node=\"15\" data-index-in-node=\"0\">Answer (उत्तर): D</strong></p>\n<p data-path-to-node=\"15\">Statement D is incorrect. <strong data-path-to-node=\"16,0\" data-index-in-node=\"49\">Sungyun</strong> visited in 518 CE (post-Gupta era), specifically the Swat and Gandhara regions, not Ashoka's court. Also, he returned with 117 texts, not 500.</p>\n<p data-path-to-node=\"15\">कथन D गलत है। <strong data-path-to-node=\"16,0\" data-index-in-node=\"232\">सुंगयुन</strong>&nbsp;ने 518 ईस्वी (उत्तर-गुप्त काल) में विशेष रूप से स्वात और गांधार क्षेत्रों का दौरा किया था, न कि अशोक के दरबार का। साथ ही, वह 117 ग्रंथों के साथ लौटे थे, न कि 500 के साथ।</p>\n<h1 data-start=\"287\" data-end=\"335\">&nbsp;FOREIGN ACCOUNTS (ACCOUNTS BY TRAVELLERS)</h1>\n<p data-start=\"336\" data-end=\"365\"><em data-start=\"336\" data-end=\"365\">(विदेशी यात्रियों के विवरण)</em></p>\n<p data-start=\"367\" data-end=\"538\">Foreign travellers&mdash;<strong data-start=\"386\" data-end=\"431\">Greek, Roman, Chinese, Arab, and European</strong>&mdash;visited India as <strong data-start=\"449\" data-end=\"491\">envoys, pilgrims, traders, or scholars</strong> and recorded valuable first-hand observations.</p>\n<hr data-start=\"540\" data-end=\"543\" />\n<h2 data-start=\"545\" data-end=\"574\">I. GREEK &amp; ROMAN SOURCES</h2>\n<p data-start=\"575\" data-end=\"600\"><em data-start=\"575\" data-end=\"600\">(यूनानी एवं रोमन स्रोत)</em></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"602\" data-end=\"1466\">\n<thead data-start=\"602\" data-end=\"671\">\n<tr data-start=\"602\" data-end=\"671\">\n<th data-start=\"602\" data-end=\"623\" data-col-size=\"md\">Traveller / Author</th>\n<th data-start=\"623\" data-end=\"637\" data-col-size=\"sm\">Time Period</th>\n<th data-start=\"637\" data-end=\"671\" data-col-size=\"lg\">Key Contribution / Information</th>\n</tr>\n</thead>\n<tbody data-start=\"686\" data-end=\"1466\">\n<tr data-start=\"686\" data-end=\"872\">\n<td data-start=\"686\" data-end=\"730\" data-col-size=\"md\"><strong data-start=\"688\" data-end=\"729\">Herodotus</strong></td>\n<td data-col-size=\"sm\" data-start=\"730\" data-end=\"748\">5th century BCE</td>\n<td data-col-size=\"lg\" data-start=\"748\" data-end=\"872\">Did <strong data-start=\"754\" data-end=\"773\">not visit India</strong>; described NW India under Persian rule; called India <strong data-start=\"827\" data-end=\"845\">&ldquo;Indus Nation&rdquo;</strong>, 20th province of Darius</td>\n</tr>\n<tr data-start=\"873\" data-end=\"998\">\n<td data-start=\"873\" data-end=\"927\" data-col-size=\"md\">Greek Writers (Arrian, Curtius, Plutarch, Diodorus)</td>\n<td data-col-size=\"sm\" data-start=\"927\" data-end=\"944\">1st BCE&ndash;1st CE</td>\n<td data-col-size=\"lg\" data-start=\"944\" data-end=\"998\">Accounts of Alexander&rsquo;s campaigns &amp; Indian society</td>\n</tr>\n<tr data-start=\"999\" data-end=\"1090\">\n<td data-start=\"999\" data-end=\"1036\" data-col-size=\"md\"><strong data-start=\"1001\" data-end=\"1017\">Sandrokottas</strong> (Greek reference)</td>\n<td data-col-size=\"sm\" data-start=\"1036\" data-end=\"1049\">c. 322 BCE</td>\n<td data-col-size=\"lg\" data-start=\"1049\" data-end=\"1090\">Identified as <strong data-start=\"1065\" data-end=\"1088\">Chandragupta Maurya</strong></td>\n</tr>\n<tr data-start=\"1091\" data-end=\"1255\">\n<td data-start=\"1091\" data-end=\"1135\" data-col-size=\"md\"><strong data-start=\"1093\" data-end=\"1134\">Megasthenes</strong></td>\n<td data-col-size=\"sm\" data-start=\"1135\" data-end=\"1149\">302&ndash;298 BCE</td>\n<td data-col-size=\"lg\" data-start=\"1149\" data-end=\"1255\">Ambassador of Seleucus; wrote <strong data-start=\"1181\" data-end=\"1191\">Indica</strong> (lost); Mauryan admin &amp; society; <strong data-start=\"1225\" data-end=\"1253\">Father of Indian History</strong></td>\n</tr>\n<tr data-start=\"1256\" data-end=\"1373\">\n<td data-start=\"1256\" data-end=\"1291\" data-col-size=\"md\"><em data-start=\"1258\" data-end=\"1290\">Periplus of the Erythraean Sea</em></td>\n<td data-start=\"1291\" data-end=\"1308\" data-col-size=\"sm\">1st century CE</td>\n<td data-start=\"1308\" data-end=\"1373\" data-col-size=\"lg\">Anonymous; ports &amp; Roman-Indian trade; <strong data-start=\"1349\" data-end=\"1371\">Barygaza (Bharuch)</strong></td>\n</tr>\n<tr data-start=\"1374\" data-end=\"1466\">\n<td data-start=\"1374\" data-end=\"1418\" data-col-size=\"md\"><strong data-start=\"1376\" data-end=\"1417\">Ptolemy</strong></td>\n<td data-start=\"1418\" data-end=\"1430\" data-col-size=\"sm\">c. 150 CE</td>\n<td data-start=\"1430\" data-end=\"1466\" data-col-size=\"lg\">Geography of India; trade routes</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1468\" data-end=\"1471\" />\n<h2 data-start=\"1473\" data-end=\"1519\">II. CHINESE SOURCES (BUDDHIST TRAVELLERS)</h2>\n<p data-start=\"1520\" data-end=\"1541\"><em data-start=\"1520\" data-end=\"1541\">(चीनी बौद्ध यात्री)</em></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1543\" data-end=\"2115\">\n<thead data-start=\"1543\" data-end=\"1604\">\n<tr data-start=\"1543\" data-end=\"1604\">\n<th data-start=\"1543\" data-end=\"1555\" data-col-size=\"sm\">Traveller</th>\n<th data-start=\"1555\" data-end=\"1564\" data-col-size=\"sm\">Period</th>\n<th data-start=\"1564\" data-end=\"1581\" data-col-size=\"sm\">Visited During</th>\n<th data-start=\"1581\" data-end=\"1604\" data-col-size=\"md\">Work / Significance</th>\n</tr>\n</thead>\n<tbody data-start=\"1623\" data-end=\"2115\">\n<tr data-start=\"1623\" data-end=\"1767\">\n<td data-start=\"1623\" data-end=\"1667\" data-col-size=\"sm\"><strong data-start=\"1625\" data-end=\"1666\">Fa-H ine-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,1,1,0\" data-index-in-node=\"83\">Hindu Polity</em>.</p>\n</li>\n</ul>\n</blockquote>\n<hr style=\"width: 1138.39px; margin-top: 0px !important; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\" data-path-to-node=\"26\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"27\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27\" data-index-in-node=\"0\">🚀 Foreign Travelers &amp; Historians Quick Revision</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"28\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"28,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"28,0,0\" data-index-in-node=\"0\">First Book translated by EIC:</strong>&nbsp;<em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"28,0,0\" data-index-in-node=\"30\">Manusmriti</em>&nbsp;(as \"A Code of Gentoo Laws\").</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"28,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"28,1,0\" data-index-in-node=\"0\">Father of Indian History:</strong>&nbsp;Megasthenes.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"28,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top:     "solution": "<p data-path-to-node=\"9,0\"><strong data-path-to-node=\"9,0\" data-index-in-node=\"0\">Quick Revision Facts (Revision Checklist):</strong></p>\n<ul data-path-to-node=\"9,1\">\n<li>\n<p data-path-to-node=\"9,1,0,0\"><strong data-path-to-node=\"9,1,0,0\" data-index-in-node=\"0\">Mathematics:</strong> <em data-path-to-node=\"9,1,0,0\" data-index-in-node=\"13\">Surya Siddhanta</em> (Aryabhatta), <em data-path-to-node=\"9,1,0,0\" data-index-in-node=\"43\">Lilavati</em> (Bhaskaracharya).</p>\n</li>\n<li>\n<p data-path-to-node=\"9,1,1,0\"><strong data-path-to-node=\"9,1,1,0\" data-index-in-node=\"0\">Literature:</strong> <em data-path-to-node=\"9,1,1,0\" data-index-in-node=\"12\">Abhigyan Shakuntalam</em> (Kalidasa), <em data-path-to-node=\"9,1,1,0\" data-index-in-node=\"45\">Buddha Charita</em> (Asvaghosa).</p>\n</li>\n<li>\n<p data-path-to-node=\"9,1,2,0\"><strong data-path-to-node=\"9,1,2,0\" data-index-in-node=\"0\">Polity/Law:</strong> <em data-path-to-node=\"9,1,2,0\" data-index-in-node=\"12\">Arthashastra</em> (Kautilya), <em data-path-to-node=\"9,1,2,0\" data-index-in-node=\"37\">Nitisara</em> (Kamandaka).</p>\n</li>\n<li>\n<p data-path-to-node=\"9,1,3,0\"><strong data-path-to-node=\"9,1,3,0\" data-index-in-node=\"0\">Harsha&rsquo;s Works:</strong> Note that King Harsha himself wrote <em data-path-to-node=\"9,1,3,0\" data-index-in-node=\"52\">Nagananda</em> and <em data-path-to-node=\"9,1,3,0\" data-index-in-node=\"66\">Ratnavali</em>, while his court poet Banabhatta wrote <em data-path-to-node=\"9,1,3,0\" data-index-in-node=\"115\">Harshacharita</em>.</p>\n</li>\n</ul>\n<h1 data-start=\"225\" data-end=\"271\">📚 IMPORTANT ANCIENT BOOKS &amp; THEIR AUTHORS</h1>\n<p data-start=\"272\" data-end=\"303\"><em data-start=\"272\" data-end=\"303\">(प्राचीन ग्रंथ एवं उनके लेखक)</em></p>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\"     "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Q. With reference to the languages of Ancient India, consider the following statements and identify the INCORRECT one:</strong> <strong data-path-to-node=\"13\" data-index-in-node=\"119\">(प्राचीन भारत की भाषाओं के संदर्भ में, निम्नलिखित कथनों पर विचार करें और गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"14\">\n<li>\n<p data-path-to-node=\"14,0,0\"><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">A) Sanskrit:</strong> It achieved its \"refined\" (Samskarta) form under Panini; the first major inscription in ornate Sanskrit was Rudradaman&rsquo;s <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"134\">Junagarh/Girnar inscription</strong>. <em data-path-to-node=\"14,0,0\" data-index-in-node=\"163\">(<strong data-path-to-node=\"14,0,0\" data-index-in-node=\"164\">संस्कृत:</strong> इसने पाणिनी के तहत अपना \"परिष्कृत\" रूप प्राप्त किया; अलंकृत संस्कृत में पहला प्रमुख शिलालेख रुद्रदामन का <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"278\">जूनागढ़ शिलालेख</strong> था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,1,0\"><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">B) Tamil:</strong> It is the oldest spoken literary language of South India; <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"68\">Tolkappiyam</strong> is the earliest extant Tamil grammar book composed during the Second Sangam. <em data-path-to-node=\"14,1,0\" data-index-in-node=\"157\">(<strong data-path-to-node=\"14,1,0\" data-index-in-node=\"158\">तमिल:</strong> यह दक्षिण भारत की सबसे पुरानी बोली जाने वाली साहित्यिक भाषा है; <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"228\">तोलकाप्पियम</strong> दूसरी संगम अवधि के दौरान रचित सबसे पुरानी तमिल व्याकरण पुस्तक है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,2,0\"><strong data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">C) Prakrit &amp; Pali:</strong> Prakrit was the vernacular language often spoken by women and minor characters in plays, while <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"114\">Pali</strong> became the liturgical language of Theravada Buddhism. <em data-path-to-node=\"14,2,0\" data-index-in-node=\"173\">(<strong data-path-to-node=\"14,2,0\" data-index-in-node=\"174\">प्राकृत और पाली:</strong> प्राकृत वह मातृभाषा थी जो अक्सर नाटकों में महिलाओं और छोटे पात्रों द्वारा बोली जाती थी, जबकि <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"284\">पाली</strong> थेरवाद बौद्ध धर्म की धार्मिक भाषा बन गई।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,3,0\"><strong data-path-to-node=\"14,3,0\" data-index-in-node=\"0\">D) Telugu &amp; Kannada:</strong> Telugu branched from the Indo-Aryan family, while the <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"75\">Kavirajamarga</strong> (written by Amoghavarsha) is a famous early work in the Tamil language. <em data-path-to-node=\"14,3,0\" data-index-in-node=\"161\">(<strong data-path-to-node=\"14,3,0\" data-index-in-node=\"162\">तेलुगु और कन्नड़:</strong> तेलुगु इंडो-आर्यन परिवार से निकली है, जबकि <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"223\">कविराजमार्ग</strong> (अमोघवर्ष द्वारा लिखित) तमिल भाषा की एक प्रसिद्ध प्रारंभिक रचना है।)</em></p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"15\"><strong data-path-to-node=\"15\" data-index-in-node=\"0\">Answer (उत्तर): D</strong></p>\n<p data-path-to-node=\"15\">&nbsp;Statement D is incorrect because&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"56\">Telugu</strong>&nbsp;belongs to the&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"78\">Dravidian</strong>&nbsp;family (not Indo-Aryan). Also,&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"119\">Kavirajamarga</strong>&nbsp;is the earliest available writing on poetics and grammar in the&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"197\">Kannada</strong> language, not Tamil.</p>\n<p data-path-to-node=\"15\">कथन D गलत है क्योंकि&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"265\">तेलुगु</strong>,&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"273\">द्रविड़</strong>&nbsp;परिवार (इंडो-आर्यन नहीं) से संबंधित है। इसके अलावा,&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"333\">कविराजमार्ग</strong>,&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"346\">कन्नड़</strong>&nbsp;भाषा (तमिल नहीं) में काव्य और व्याकरण पर उपलब्ध सबसे प्रारंभिक रचना है।</p>\n<p data-path-to-node=\"15\"></p>\n<h1 data-start=\"2956\" data-end=\"2989\">LANGUAGE IN ANCIENT INDIA</h1>\n<p data-start=\"2990\" data-end=\"3016\"><em data-start=\"2990\" data-end=\"3016\">(प्राचीन भारत की भाषाएँ)</em></p>\n<h2 data-start=\"3018\" data-end=\"3053\">🔹 MAJOR LANGUAGE FAMILIES (PYQ)</h2>\n<ol data-start=\"3054\" data-end=\"3211\">\n<li data-start=\"3054\" data-end=\"3099\">\n<p data-start=\"3057\" data-end=\"3099\"><strong data-start=\"3057\" data-end=\"3071\">Indo-Aryan</strong> &ndash; Sanskrit, Prakrit, Pali</p>\n</li>\n<li data-start=\"3100\" data-end=\"3154\">\n<p data-start=\"3103\" data-end=\"3154\"><strong data-start=\"3103\" data-end=\"3116\">Dravidian</strong> &ndash; Tamil, Telugu, Kannada, Malayalam</p>\n</li>\n<li data-start=\"3155\" data-end=\"3211\">\n<p data-start=\"3158\" data-end=\"3211\"><strong data-start=\"3158\" data-end=\"3190\">Austroasiatic &amp; Sino-Tibetan</strong> &ndash; Tribal languages</p>\n</li>\n</ol>\n<hr data-start=\"3213\" data-end=\"3216\" />\n<h2 data-start=\"3218\" data-end=\"3253\">I. LANGUAGES OF THE SUBCONTINENT</h2>\n<h3 data-start=\"3255\" data-end=\"3290\">1️⃣ Indus Valley Language (IVC)</h3>\n<ul data-start=\"3291\" data-end=\"3370\">\n<li data-start=\"3291\" data-end=\"3327\">\n<p data-start=\"3293\" data-end=\"3327\">Undeciphered script (Bronze Age)</p>\n</li>\n<li data-start=\"3328\" data-end=\"3370\">\n<p data-start=\"3330\" data-end=\"3370\">Confirms existence of written language</p>\n</li>\n</ul>\n<h3 data-start=\"3372\" data-end=\"3398\">2️⃣ Sanskrit (संस्कृत)</h3>\n<ul data-start=\"3399\" data-end=\"3589\">\n<li data-start=\"3399\" data-end=\"3444\">\n<p data-start=\"3401\" data-end=\"3444\">Indo-Aryan; closest to European languages</p>\n</li>\n<li data-start=\"3445\" data-end=\"3489\">\n<p data-start=\"3447\" data-end=\"3489\"><strong data-start=\"3447\" data-end=\"3470\">Panini (4th c. BCE)</strong> &rarr; Classical form</p>\n</li>\n<li data-start=\"3490\" data-end=\"3557\">\n<p data-start=\"3492\" data-end=\"3557\"><strong data-start=\"3492\" data-end=\"3522\">First Sanskrit inscription</strong> &rarr; Rudradaman&rsquo;s Junagarh (150 CE)</p>\n</li>\n<li data-start=\"3558\" data-end=\"3589\">\n<p data-start=\"3560\" data-end=\"3589\">Golden age &rarr; <strong data-start=\"3573\" data-end=\"3589\">Gupta period</strong></p>\n</li>\n</ul>\n<h3 data-start=\"3591\" data-end=\"3611\">3️⃣ Tamil (तमिल)</h3>\n<ul data-start=\"3612\" data-end=\"3757\">\n<li data-start=\"3612\" data-end=\"3663\">\n<p data-start=\"3614\" data-end=\"3663\">Dravidian; <strong data-start=\"3625\" data-end=\"3661\">oldest living classical language</strong></p>\n</li>\n<li data-start=\"3664\" data-end=\"3721\">\n<p data-start=\"3666\" data-end=\"3721\">Sangam literature; <strong data-start=\"3685\" data-end=\"3700\">Tolkappiyam</strong> = earliest grammar</p>\n</li>\n<li data-start=\"3722\" data-end=\"3757\">\n<p data-start=\"3724\" data-end=\"3757\">Not Bhakti-oriented in Sangam age</p>\n</li>\n</ul>\n<h3 data-start=\"3759\" data-end=\"3782\">4️⃣ Telugu (तेलुगु)</h3>\n<ul data-start=\"3783\" data-end=\"3886\">\n<li data-start=\"3783\" data-end=\"3813\">\n<p data-start=\"3785\" data-end=\"3813\">Dravidian (Central branch)</p>\n</li>\n<li data-start=\"3814\" data-end=\"3852\">\n<p data-start=\"3816\" data-end=\"3852\">Ancient names &rarr; <em data-start=\"3832\" data-end=\"3840\">Tenugu</em>, <em data-start=\"3842\" data-end=\"3850\">Andhra</em></p>\n</li>\n<li data-start=\"3853\" data-end=\"3886\">\n<p data-start=\"3855\" data-end=\"3886\">Closely related to Gondi, Konda</p>\n</li>\n</ul>\n<h3 data-start=\"3888\" data-end=\"3913\">5️⃣ Prakrit (प्राकृत)</h3>\n<ul data-start=\"3914\" data-end=\"4033\">\n<li data-start=\"3914\" data-end=\"3947\">\n<p data-start=\"3916\" data-end=\"3947\">Middle Indo-Aryan; vernacular</p>\n</li>\n<li data-start=\"3948\" data-end=\"4000\">\n<p data-start=\"3950\" data-end=\"4000\">Jain texts; stage language for women/minor roles</p>\n</li>\n<li data-start=\"4001\" data-end=\"4033\">\n<p data-start=\"4003\" data-end=\"4033\">Types: Maharashtri, Shauraseni</p>\n</li>\n</ul>\n<h3 data-start=\"4035\" data-end=\"4054\">6️⃣ Pali (पाली)</h3>\n<ul data-start=\"4055\" data-end=\"4166\">\n<li data-start=\"4055\" data-end=\"4093\">\n<p data-start=\"4057\" data-end=\"4093\">Language of <strong data-start=\"4069\" data-end=\"4091\">Theravada Buddhism</strong></p>\n</li>\n<li data-start=\"4094\" data-end=\"4125\">\n<p data-start=\"4096\" data-end=\"4125\">Used in Sri Lanka &amp; SE Asia</p>\n</li>\n<li data-start=\"4126\" data-end=\"4166\">\n<p data-start=\"4128\" data-end=\"4166\">&ldquo;Pali&rdquo; = original text (vs commentary)</p>\n</li>\n</ul>\n<h3 data-start=\"4168\" data-end=\"4196\">7️⃣ Apabhramsa (अपभ्रंश)</h3>\n<ul data-start=\"4197\" data-end=\"4290\">\n<li data-start=\"4197\" data-end=\"4218\">\n<p data-start=\"4199\" data-end=\"4218\">Corrupted Prakrit</p>\n</li>\n<li data-start=\"4219\" data-end=\"4254\">\n<p data-start=\"4221\" data-end=\"4254\">Used for dohas, Jain literature</p>\n</li>\n<li data-start=\"4255\" data-end=\"4290\">\n<p data-start=\"4257\" data-end=\"4290\">Bridge to modern Indian languages</p>\n</li>\n</ul>\n<hr data-start=\"4292\" data-end=\"4295\" />\n<h2 data-start=\"4297\" data-end=\"4342\">🎯 SIGNIFICANCE OF ANCIENT LANGUAGES (PYQ)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4344\" data-end=\"4605\">\n<thead data-start=\"4344\" data-end=\"4367\">\n<tr data-start=\"4344\" data-end=\"4367\">\n<th data-start=\"4344\" data-end=\"4353\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"4353\" data-end=\"4367\" data-col-size=\"md\">Importance</th>\n</tr>\n</thead>\n<tbody data-start=\"4378\" data-end=\"4605\">\n<tr data-start=\"4378\" data-end=\"4420\">\n<td data-start=\"4378\" data-end=\"4398\" data-col-size=\"sm\">Cultural Identity</td>\n<td data-start=\"4398\" data-end=\"4420\" data-col-size=\"md\">Pride &amp; continuity</td>\n</tr>\n<tr data-start=\"4421\" data-end=\"4483\">\n<td data-start=\"4421\" data-end=\"4444\" data-col-size=\"sm\">Classical Literature</td>\n<td data-start=\"4444\" data-end=\"4483\" data-col-size=\"md\">Tamil (&gt;500 BCE), Telugu (&gt;400 BCE)</td>\n</tr>\n<tr data-start=\"4484\" data-end=\"4550\">\n<td data-start=\"4484\" data-end=\"4505\" data-col-size=\"sm\">Literary Treasures</td>\n<td data-start=\"4505\" data-end=\"4550\" data-col-size=\"md\">Sangam, Kavirajamarga, Andhra Mahabharata</td>\n</tr>\n<tr data-start=\"4551\" data-end=\"4605\">\n<td data-start=\"4551\" data-end=\"4575\" data-col-size=\"sm\">Modern Reorganization</td>\n<td data-start=\"4575\" data-end=\"4605\" data-col-size=\"md\">Basis of linguistic states</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"4607\" data-end=\"4610\" />\n<h2 data-start=\"4612\" data-end=\"4649\">🧠 SUPER-SHORT PRELIMS MEMORY PACK</h2>\n<p data-path-to-node=\"15\"></p>\n<ul data-start=\"4650\" data-end=\"4861\">\n<li data-start=\"4650\" data-end=\"4686\">\n<p data-start=\"4652\" data-end=\"4686\"><strong data-start=\"4652\" data-end=\"4675\">Grammar of Sanskrit</strong> &rarr; Panini</p>\n</li>\n<li data-start=\"4687\" data-end=\"4729\">\n<p data-start=\"4689\" data-end=\"4729\"><strong data-start=\"4689\" data-end=\"4713\">Oldest Tamil grammar</strong> &rarr; Tolkappiyam</p>\n</li>\n<li data-start=\"4730\" data-end=\"4777\">\n<p data-start=\"4732\" data-end=\"4777\"><strong data-start=\"4732\" data-end=\"4762\">First Sanskrit inscription</strong> &rarr; Rudradaman</p>\n</li>\n<li data-start=\"4778\" data-end=\"4820\">\n<p data-start=\"4780\" data-end=\"4820\"><strong data-start=\"4780\" data-end=\"4811\">Buddhist canonical language</strong> &rarr; Pali</p>\n</li>\n<li data-start=\"4821\" data-end=\"4861\">\n<p data-start=\"4823\" data-end=\"4861\"><strong data-start=\"4823\" data-end=\"4849\">Stage language (women)</strong> &rarr; Prakrit</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the Palaeolithic Age in India, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"87\">(भारत में पुरापाषाण काल के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Hominin Fossil:</strong> The only existing fossil of a human ancestor in India is the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"77\">Narmada Man</strong> (<em data-path-to-node=\"5,0,0\" data-index-in-node=\"90\">Sivapithecus sivalensis</em>), discovered at <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"130\">Hathnora</strong>, Madhya Pradesh. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"156\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"157\">होमिनिन जीवाश्म:</strong> भारत में मानव पूर्वज का एकमात्र मौजूदा जीवाश्म <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"221\">नर्मदा मानव</strong> है, जिसे मध्य प्रदेश के <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"257\">हथनोरा</strong> में खोजा गया था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Tool Technology:</strong> Early Palaeolithic people are called <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"54\">Quartzite men</strong> because they used quartzite to make unpolished tools like hand axes, cleavers, and choppers. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"161\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"162\">उपकरण तकनीक:</strong> प्रारंभिक पुरापाषाण काल के लोगों को <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"211\">क्वाटज़ाइट पुरुष</strong> कहा जाता है क्योंकि वे हैंड-एक्स और क्लीवर जैसे उपकरण बनाने के लिए क्वाटज़ाइट का उपयोग करते थे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Upper Palaeolithic Art:</strong> This period is marked by the appearance of art, such as green-coloured paintings at <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"108\">Bhimbetka</strong> and ostrich eggshell beads. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"146\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"147\">उच्च पुरापाषाण काल की कला:</strong> यह काल कला की उपस्थिति से चिह्नित है, जैसे <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"217\">भीमबेटका</strong> में हरे रंग के चित्र और शुतुरमुर्ग के अंडे के छिलके के मोती।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Robert Bruce Foote:</strong> He is known for identifying the first Palaeolithic tool in India at <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"88\">Pallavaram</strong> near Chennai in 1863. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"121\">(<strong data-path-to-node=\"5,3,0\" data-index-in-node=\"122\">रॉबर्ट ब्रूस फूट:</strong> उन्हें 1863 में चेन्नई के पास <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"170\">पल्लवरम</strong> में भारत में पहले पुरापाषाणकालीन उपकरण की पहचान करने के लिए जाना जाता है।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",
    "comp": "",
    "options": [
      "<p>D</p>",
      "<p>B</p>",
      "<p>A</p>",
