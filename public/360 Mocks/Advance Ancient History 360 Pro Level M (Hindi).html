    "solution": "<h2 data-start=\"396\" data-end=\"429\">🧠 CLASSIFICATION OF HISTORY</h2>\n<p data-start=\"430\" data-end=\"452\"><em data-start=\"430\" data-end=\"452\">(इतिहास का वर्गीकरण)</em></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"454\" data-end=\"814\">\n<thead data-start=\"454\" data-end=\"506\">\n<tr data-start=\"454\" data-end=\"506\">\n<th data-start=\"454\" data-end=\"465\" data-col-size=\"sm\">Category</th>\n<th data-start=\"465\" data-end=\"489\" data-col-size=\"md\">Explanation (English)</th>\n<th data-start=\"489\" data-end=\"506\" data-col-size=\"sm\">विवरण (हिंदी)</th>\n</tr>\n</thead>\n<tbody data-start=\"521\" data-end=\"814\">\n<tr data-start=\"521\" data-end=\"599\">\n<td data-start=\"521\" data-end=\"539\" data-col-size=\"sm\"><strong data-start=\"523\" data-end=\"538\">Pre-History</strong></td>\n<td data-col-size=\"md\" data-start=\"539\" data-end=\"576\">Period before invention of writing</td>\n<td data-col-size=\"sm\" data-start=\"576\" data-end=\"599\">लेखन से पहले का काल</td>\n</tr>\n<tr data-start=\"600\" data-end=\"708\">\n<td data-start=\"600\" data-end=\"620\" data-col-size=\"sm\"><strong data-start=\"602\" data-end=\"619\">Proto-History</strong></td>\n<td data-start=\"620\" data-end=\"677\" data-col-size=\"md\">Writing existed but script undeciphered (e.g. Harappa)</td>\n<td data-col-size=\"sm\" data-start=\"677\" data-end=\"708\">लिपि है पर पढ़ी नहीं जा सकी</td>\n</tr>\n<tr data-start=\"709\" data-end=\"814\">\n<td data-start=\"709\" data-end=\"723\" data-col-size=\"sm\"><strong data-start=\"711\" data-end=\"722\">History</strong></td>\n<td data-col-size=\"md\" data-start=\"723\" data-end=\"773\">Study based on written + archaeological sources</td>\n<td data-col-size=\"sm\" data-start=\"773\" data-end=\"814\">लिखित व पुरातात्विक स्रोतों पर आधारित</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"816\" data-end=\"840\">🔹 <strong data-start=\"819\" data-end=\"838\">Examples (PYQ):</strong></p>\n<ul data-start=\"841\" data-end=\"915\">\n<li data-start=\"841\" data-end=\"876\">\n<p data-start=\"843\" data-end=\"876\">Harappan script &rarr; Proto-history</p>\n</li>\n<li data-start=\"877\" data-end=\"915\">\n<p data-start=\"879\" data-end=\"915\">Vedic age (early) &rarr; Oral tradition</p>\n</li>\n</ul>\n<hr data-start=\"917\" data-end=\"920\" />\n<h1 data-start=\"922\" data-end=\"965\">🪨 PREHISTORIC PERIOD (प्रागैतिहासिक काल)</h1>\n<h2 data-start=\"967\" data-end=\"994\">STONE AGE CLASSIFICATION</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"996\" data-end=\"1269\">\n<thead data-start=\"996\" data-end=\"1025\">\n<tr data-start=\"996\" data-end=\"1025\">\n<th data-start=\"996\" data-end=\"1002\" data-col-size=\"sm\">Age</th>\n<th data-start=\"1002\" data-end=\"1011\" data-col-size=\"sm\">Period</th>\n<th data-start=\"1011\" data-end=\"1025\" data-col-size=\"sm\">Time Frame</th>\n</tr>\n</thead>\n<tbody data-start=\"1040\" data-end=\"1269\">\n<tr data-start=\"1040\" data-end=\"1124\">\n<td data-start=\"1040\" data-end=\"1075\" data-col-size=\"sm\"><strong data-start=\"1042\" data-end=\"1058\">Palaeolithic</strong> (Old Stone Age)</td>\n<td data-col-size=\"sm\" data-start=\"1075\" data-end=\"1096\">Lower&ndash;Middle&ndash;Upper</td>\n<td data-col-size=\"sm\" data-start=\"1096\" data-end=\"1124\">c. 5,00,000 &ndash; 10,000 BCE</td>\n</tr>\n<tr data-start=\"1125\" data-end=\"1199\">\n<td data-start=\"1125\" data-end=\"1161\" data-col-size=\"sm\"><strong data-start=\"1127\" data-end=\"1141\">Mesolithic</strong> (Middle Stone Age)</td>\n<td data-col-size=\"sm\" data-start=\"1161\" data-end=\"1178\">Late Stone Age</td>\n<td data-col-size=\"sm\" data-start=\"1178\" data-end=\"1199\">10,000 &ndash; 6000 BCE</td>\n</tr>\n<tr data-start=\"1200\" data-end=\"1269\">\n<td data-start=\"1200\" data-end=\"1232\" data-col-size=\"sm\"><strong data-start=\"1202\" data-end=\"1215\">Neolithic</strong> (New Stone Age)</td>\n<td data-col-size=\"sm\" data-start=\"1232\" data-end=\"1250\">Food production</td>\n<td data-col-size=\"sm\" data-start=\"1250\" data-end=\"1269\">6000 &ndash; 1000 BCE</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1271\" data-end=\"1274\" />\n<h1 data-start=\"1276\" data-end=\"1299\">🪓 PALAEOLITHIC AGE</h1>\n<p data-start=\"1300\" data-end=\"1349\"><em data-start=\"1300\" data-end=\"1349\">(पुरापाषाण काल | c. 3.3 million BP &ndash; 10,000 BP)</em></p>\n<h3 data-start=\"1351\" data-end=\"1367\">KEY FEATURES</h3>\n<ul data-start=\"1368\" data-end=\"1582\">\n<li data-start=\"1368\" data-end=\"1398\">\n<p data-start=\"1370\" data-end=\"1398\">First use of <strong data-start=\"1383\" data-end=\"1398\">stone tools</strong></p>\n</li>\n<li data-start=\"1399\" data-end=\"1426\">\n<p data-start=\"1401\" data-end=\"1426\">Hunter-gatherers; nomadic</p>\n</li>\n<li data-start=\"1427\" data-end=\"1463\">\n<p data-start=\"1429\" data-end=\"1463\">Lived in <strong data-start=\"1438\" data-end=\"1463\">caves &amp; rock shelters</strong></p>\n</li>\n<li data-start=\"1464\" data-end=\"1493\">\n<p data-start=\"1466\" data-end=\"1493\">Used <strong data-start=\"1471\" data-end=\"1479\">fire</strong> (later phase)</p>\n</li>\n<li data-start=\"1494\" data-end=\"1546\">\n<p data-start=\"1496\" data-end=\"1546\">Tools: <strong data-start=\"1503\" data-end=\"1517\">Unpolished</strong> (hand-axe, cleaver, chopper)</p>\n</li>\n<li data-start=\"1547\" data-end=\"1582\">\n<p data-start=\"1549\" data-end=\"1582\">Called <strong data-start=\"1556\" data-end=\"1573\">Quartzite men</strong> in India</p>\n</li>\n</ul>\n<hr data-start=\"1584\" data-end=\"1587\" />\n<h2 data-start=\"1589\" data-end=\"1617\">DIVISIONS OF PALAEOLITHIC</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1619\" data-end=\"1802\">\n<thead data-start=\"1619\" data-end=\"1642\">\n<tr data-start=\"1619\" data-end=\"1642\">\n<th data-start=\"1619\" data-end=\"1627\" data-col-size=\"sm\">Phase</th>\n<th data-start=\"1627\" data-end=\"1642\" data-col-size=\"sm\">Time Period</th>\n</tr>\n</thead>\n<tbody data-start=\"1653\" data-end=\"1802\">\n<tr data-start=\"1653\" data-end=\"1703\">\n<td data-start=\"1653\" data-end=\"1678\" data-col-size=\"sm\"><strong data-start=\"1655\" data-end=\"1677\">Lower Palaeolithic</strong></td>\n<td data-col-size=\"sm\" data-start=\"1678\" data-end=\"1703\">20,00,000 &ndash; 60,000 BP</td>\n</tr>\n<tr data-start=\"1704\" data-end=\"1754\">\n<td data-start=\"1704\" data-end=\"1730\" data-col-size=\"sm\"><strong data-start=\"1706\" data-end=\"1729\">Middle Palaeolithic</strong></td>\n<td data-start=\"1730\" data-end=\"1754\" data-col-size=\"sm\">3,85,000 &ndash; 40,000 BP</td>\n</tr>\n<tr data-start=\"1755\" data-end=\"1802\">\n<td data-start=\"1755\" data-end=\"1780\" data-col-size=\"sm\"><strong data-start=\"1757\" data-end=\"1779\">Upper Palaeolithic</strong></td>\n<td data-start=\"1780\" data-end=\"1802\" data-col-size=\"sm\">40,000 &ndash; 10,000 BP</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1804\" data-end=\"1807\" />\n<h2 data-start=\"1809\" data-end=\"1837\">🔹 LOWER PALAEOLITHIC AGE</h2>\n<h3 data-start=\"1839\" data-end=\"1856\">HUMAN SPECIES</h3>\n<ul data-start=\"1857\" data-end=\"1875\">\n<li data-start=\"1857\" data-end=\"1875\">\n<p data-start=\"1859\" data-end=\"1875\"><strong data-start=\"1859\" data-end=\"1875\">Homo erectus</strong></p>\n</li>\n</ul>\n<h3 data-start=\"1877\" data-end=\"1915\">NARMADA MAN (VERY IMPORTANT &ndash; PYQ)</h3>\n<ul data-start=\"1916\" data-end=\"2062\">\n<li data-start=\"1916\" data-end=\"1960\">\n<p data-start=\"1918\" data-end=\"1960\">Found: <strong data-start=\"1925\" data-end=\"1937\">Hathnora</strong>, Narmada Valley (1982)</p>\n</li>\n<li data-start=\"1961\" data-end=\"1998\">\n<p data-start=\"1963\" data-end=\"1998\">Represents <strong data-start=\"1974\" data-end=\"1998\">Archaic Homo sapiens</strong></p>\n</li>\n<li data-start=\"1999\" data-end=\"2031\">\n<p data-start=\"2001\" data-end=\"2031\">Only hominin fossil from India</p>\n</li>\n<li data-start=\"2032\" data-end=\"2062\">\n<p data-start=\"2034\" data-end=\"2062\">Direct proof of early humans</p>\n</li>\n</ul>\n<hr data-start=\"2064\" data-end=\"2067\" />\n<h3 data-start=\"2069\" data-end=\"2088\">IMPORTANT SITES</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2090\" data-end=\"2399\">\n<thead data-start=\"2090\" data-end=\"2122\">\n<tr data-start=\"2090\" data-end=\"2122\">\n<th data-start=\"2090\" data-end=\"2099\" data-col-size=\"sm\">Region</th>\n<th data-start=\"2099\" data-end=\"2107\" data-col-size=\"sm\">Sites</th>\n<th data-start=\"2107\" data-end=\"2122\" data-col-size=\"sm\">Key Feature</th>\n</tr>\n</thead>\n<tbody data-start=\"2137\" data-end=\"2399\">\n<tr data-start=\"2137\" data-end=\"2184\">\n<td data-start=\"2137\" data-end=\"2148\" data-col-size=\"sm\">NW India</td>\n<td data-start=\"2148\" data-end=\"2162\" data-col-size=\"sm\">Soan Valley</td>\n<td data-col-size=\"sm\" data-start=\"2162\" data-end=\"2184\">Early Palaeolithic</td>\n</tr>\n<tr data-start=\"2185\" data-end=\"2242\">\n<td data-start=\"2185\" data-end=\"2199\" data-col-size=\"sm\">North India</td>\n<td data-start=\"2199\" data-end=\"2219\" data-col-size=\"sm\">Belan Valley (UP)</td>\n<td data-col-size=\"sm\" data-start=\"2219\" data-end=\"2242\">Palaeo + Mesolithic</td>\n</tr>\n<tr data-start=\"2243\" data-end=\"2304\">\n<td data-start=\"2243\" data-end=\"2257\" data-col-size=\"sm\">South India</td>\n<td data-start=\"2257\" data-end=\"2285\" data-col-size=\"sm\">Attirampakkam, Pallavaram</td>\n<td data-col-size=\"sm\" data-start=\"2285\" data-end=\"2304\">Acheulian tools</td>\n</tr>\n<tr data-start=\"2305\" data-end=\"2355\">\n<td data-start=\"2305\" data-end=\"2314\" data-col-size=\"sm\">Deccan</td>\n<td data-col-size=\"sm\" data-start=\"2314\" data-end=\"2332\">Hunsgi, Isampur</td>\n<td data-col-size=\"sm\" data-start=\"2332\" data-end=\"2355\">Tool-making centres</td>\n</tr>\n<tr data-start=\"2356\" data-end=\"2399\">\n<td data-start=\"2356\" data-end=\"2372\" data-col-size=\"sm\">Central India</td>\n<td data-col-size=\"sm\" data-start=\"2372\" data-end=\"2384\">Bhimbetka</td>\n<td data-col-size=\"sm\" data-start=\"2384\" data-end=\"2399\">UNESCO site</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2401\" data-end=\"2404\" />\n<h2 data-start=\"2406\" data-end=\"2425\">TOOLS &amp; CULTURES</h2>\n<h3 data-start=\"2427\" data-end=\"2461\">ACHEULIAN vs SOHNIAN (PYQ FAV)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2463\" data-end=\"2676\">\n<thead data-start=\"2463\" data-end=\"2496\">\n<tr data-start=\"2463\" data-end=\"2496\">\n<th data-start=\"2463\" data-end=\"2472\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"2472\" data-end=\"2484\" data-col-size=\"sm\">Acheulian</th>\n<th data-start=\"2484\" data-end=\"2496\" data-col-size=\"sm\">Sohanian</th>\n</tr>\n</thead>\n<tbody data-start=\"2511\" data-end=\"2676\">\n<tr data-start=\"2511\" data-end=\"2553\">\n<td data-start=\"2511\" data-end=\"2519\" data-col-size=\"sm\">Tools</td>\n<td data-col-size=\"sm\" data-start=\"2519\" data-end=\"2541\">Hand-axes, cleavers</td>\n<td data-col-size=\"sm\" data-start=\"2541\" data-end=\"2553\">Choppers</td>\n</tr>\n<tr data-start=\"2554\" data-end=\"2599\">\n<td data-start=\"2554\" data-end=\"2563\" data-col-size=\"sm\">Region</td>\n<td data-start=\"2563\" data-end=\"2587\" data-col-size=\"sm\">Central &amp; South India</td>\n<td data-col-size=\"sm\" data-start=\"2587\" data-end=\"2599\">NW India</td>\n</tr>\n<tr data-start=\"2600\" data-end=\"2638\">\n<td data-start=\"2600\" data-end=\"2615\" data-col-size=\"sm\">Raw material</td>\n<td data-start=\"2615\" data-end=\"2627\" data-col-size=\"sm\">Quartzite</td>\n<td data-col-size=\"sm\" data-start=\"2627\" data-end=\"2638\">Pebbles</td>\n</tr>\n<tr data-start=\"2639\" data-end=\"2676\">\n<td data-start=\"2639\" data-end=\"2647\" data-col-size=\"sm\">Notes</td>\n<td data-start=\"2647\" data-end=\"2665\" data-col-size=\"sm\">Well-documented</td>\n<td data-col-size=\"sm\" data-start=\"2665\" data-end=\"2676\">Limited</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2678\" data-end=\"2681\" />\n<h1 data-start=\"2683\" data-end=\"2711\">🪓 MIDDLE PALAEOLITHIC AGE</h1>\n<ul data-start=\"2713\" data-end=\"2820\">\n<li data-start=\"2713\" data-end=\"2756\">\n<p data-start=\"2715\" data-end=\"2756\">Identified by <strong data-start=\"2729\" data-end=\"2747\">H. D. Sankalia</strong> (Nevasa)</p>\n</li>\n<li data-start=\"2757\" data-end=\"2790\">\n<p data-start=\"2759\" data-end=\"2790\">Tool industry &rarr; <strong data-start=\"2775\" data-end=\"2790\">Flake-based</strong></p>\n</li>\n<li data-start=\"2791\" data-end=\"2820\">\n<p data-start=\"2793\" data-end=\"2820\">No fossil evidence in India</p>\n</li>\n</ul>\n<h3 data-start=\"2822\" data-end=\"2831\">TOOLS</h3>\n<ul data-start=\"2832\" data-end=\"2900\">\n<li data-start=\"2832\" data-end=\"2858\">\n<p data-start=\"2834\" data-end=\"2858\">Scrapers, points, borers</p>\n</li>\n<li data-start=\"2859\" data-end=\"2900\">\n<p data-start=\"2861\" data-end=\"2900\">Raw material: chert, jasper, chalcedony</p>\n</li>\n</ul>\n<h3 data-start=\"2902\" data-end=\"2927\">NEANDERTHALS (EUROPE)</h3>\n<ul data-start=\"2928\" data-end=\"3006\">\n<li data-start=\"2928\" data-end=\"2959\">\n<p data-start=\"2930\" data-end=\"2959\">Not found as fossils in India</p>\n</li>\n<li data-start=\"2960\" data-end=\"3006\">\n<p data-start=\"2962\" data-end=\"3006\">Associated globally with Middle Palaeolithic</p>\n</li>\n</ul>\n<hr data-start=\"3008\" data-end=\"3011\" />\n<h1 data-start=\"3013\" data-end=\"3040\">🪓 UPPER PALAEOLITHIC AGE</h1>\n<h3 data-start=\"3042\" data-end=\"3058\">KEY FEATURES</h3>\n<ul data-start=\"3059\" data-end=\"3173\">\n<li data-start=\"3059\" data-end=\"3089\">\n<p data-start=\"3061\" data-end=\"3089\">Arrival of <strong data-start=\"3072\" data-end=\"3089\">modern humans</strong></p>\n</li>\n<li data-start=\"3090\" data-end=\"3110\">\n<p data-start=\"3092\" data-end=\"3110\">Blade &amp; bone tools</p>\n</li>\n<li data-start=\"3111\" data-end=\"3145\">\n<p data-start=\"3113\" data-end=\"3145\">Art: paintings, beads, ornaments</p>\n</li>\n<li data-start=\"3146\" data-end=\"3173\">\n<p data-start=\"3148\" data-end=\"3173\"><strong data-start=\"3148\" data-end=\"3173\">Microliths introduced</strong></p>\n</li>\n</ul>\n<h3 data-start=\"3175\" data-end=\"3194\">IMPORTANT SITES</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3196\" data-end=\"3361\">\n<thead data-start=\"3196\" data-end=\"3214\">\n<tr data-start=\"3196\" data-end=\"3214\">\n<th data-start=\"3196\" data-end=\"3205\" data-col-size=\"sm\">Region</th>\n<th data-start=\"3205\" data-end=\"3214\" data-col-size=\"sm\">Sites</th>\n</tr>\n</thead>\n<tbody data-start=\"3225\" data-end=\"3361\">\n<tr data-start=\"3225\" data-end=\"3251\">\n<td data-start=\"3225\" data-end=\"3237\" data-col-size=\"sm\">Karnataka</td>\n<td data-col-size=\"sm\" data-start=\"3237\" data-end=\"3251\">Meralbhavi</td>\n</tr>\n<tr data-start=\"3252\" data-end=\"3274\">\n<td data-start=\"3252\" data-end=\"3257\" data-col-size=\"sm\">AP</td>\n<td data-start=\"3257\" data-end=\"3274\" data-col-size=\"sm\">Kurnool caves</td>\n</tr>\n<tr data-start=\"3275\" data-end=\"3309\">\n<td data-start=\"3275\" data-end=\"3280\" data-col-size=\"sm\">MP</td>\n<td data-col-size=\"sm\" data-start=\"3280\" data-end=\"3309\">Baghor I &amp; III, Bhimbetka</td>\n</tr>\n<tr data-start=\"3310\" data-end=\"3333\">\n<td data-start=\"3310\" data-end=\"3324\" data-col-size=\"sm\">Maharashtra</td>\n<td data-col-size=\"sm\" data-start=\"3324\" data-end=\"3333\">Patne</td>\n</tr>\n<tr data-start=\"3334\" data-end=\"3361\">\n<td data-start=\"3334\" data-end=\"3346\" data-col-size=\"sm\">Jharkhand</td>\n<td data-col-size=\"sm\" data-start=\"3346\" data-end=\"3361\">Chotanagpur</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p></p>\n<p data-start=\"3363\" data-end=\"3412\">🔹 <strong data-start=\"3366\" data-end=\"3394\">Earliest shrine in India</strong> &rarr; <strong data-start=\"3397\" data-end=\"3412\">Baghor (UP)</strong></p>",

    "solution": "<p data-path-to-node=\"16\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\" data-index-in-node=\"0\">Answer (उत्तर): A</strong></p>\n<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\">\n<p data-path-to-node=\"17,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0\" data-index-in-node=\"0\">SSC/UPSC Tip:</strong>&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0\" data-index-in-node=\"14\">Mesolithic</strong>&nbsp;age is characterized by&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0\" data-index-in-node=\"49\">Microliths</strong>&nbsp;(tiny stone tools).&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0\" data-index-in-node=\"80\">Neolithic</strong>&nbsp;age is called the \"Revolution\" because of the start of&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0\" data-index-in-node=\"145\">Agriculture</strong>&nbsp;and permanent settlements.</p>\n<h1 data-start=\"3419\" data-end=\"3440\">🪵 MESOLITHIC AGE</h1>\n<p data-start=\"3441\" data-end=\"3460\"><em data-start=\"3441\" data-end=\"3460\">(10,000&ndash;6000 BCE)</em></p>\n<h3 data-start=\"3462\" data-end=\"3478\">KEY FEATURES</h3>\n<ul data-start=\"3479\" data-end=\"3600\">\n<li data-start=\"3479\" data-end=\"3501\">\n<p data-start=\"3481\" data-end=\"3501\">Post-Ice Age warming</p>\n</li>\n<li data-start=\"3502\" data-end=\"3534\">\n<p data-start=\"3504\" data-end=\"3534\">Highly mobile hunter-gatherers</p>\n</li>\n<li data-start=\"3535\" data-end=\"3558\">\n<p data-start=\"3537\" data-end=\"3558\"><strong data-start=\"3537\" data-end=\"3558\">Microlithic tools</strong></p>\n</li>\n<li data-start=\"3559\" data-end=\"3600\">\n<p data-start=\"3561\" data-end=\"3600\">Beginning of domestication (late phase)</p>\n</li>\n</ul>\n<hr data-start=\"3602\" data-end=\"3605\" />\n<h3 data-start=\"3607\" data-end=\"3626\">IMPORTANT SITES</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3628\" data-end=\"3763\">\n<thead data-start=\"3628\" data-end=\"3644\">\n<tr data-start=\"3628\" data-end=\"3644\">\n<th data-start=\"3628\" data-end=\"3635\" data-col-size=\"sm\">Type</th>\n<th data-start=\"3635\" data-end=\"3644\" data-col-size=\"sm\">Sites</th>\n</tr>\n</thead>\n<tbody data-start=\"3655\" data-end=\"3763\">\n<tr data-start=\"3655\" data-end=\"3685\">\n<td data-start=\"3655\" data-end=\"3665\" data-col-size=\"sm\">General</td>\n<td data-start=\"3665\" data-end=\"3685\" data-col-size=\"sm\">Paisra, Langhnaj</td>\n</tr>\n<tr data-start=\"3686\" data-end=\"3725\">\n<td data-start=\"3686\" data-end=\"3702\" data-col-size=\"sm\">Rock shelters</td>\n<td data-col-size=\"sm\" data-start=\"3702\" data-end=\"3725\">Bhimbetka, Adamgarh</td>\n</tr>\n<tr data-start=\"3726\" data-end=\"3763\">\n<td data-start=\"3726\" data-end=\"3736\" data-col-size=\"sm\">Coastal</td>\n<td data-start=\"3736\" data-end=\"3763\" data-col-size=\"sm\">Mumbai, Teri sites (TN)</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<h3 data-start=\"3765\" data-end=\"3782\">ART &amp; BURIALS</h3>\n<ul data-start=\"3783\" data-end=\"3856\">\n<li data-start=\"3783\" data-end=\"3818\">\n<p data-start=\"3785\" data-end=\"3818\">Rock paintings (hunting, dancing)</p>\n</li>\n<li data-start=\"3819\" data-end=\"3856\">\n<p data-start=\"3821\" data-end=\"3856\">Burials with grave goods (Mahadaha)</p>\n</li>\n</ul>\n<hr data-start=\"3858\" data-end=\"3861\" />\n<h1 data-start=\"3863\" data-end=\"3883\">🌾 NEOLITHIC AGE</h1>\n<p data-start=\"3884\" data-end=\"3901\"><em data-start=\"3884\" data-end=\"3901\">(New Stone Age)</em></p>\n<h3 data-start=\"3903\" data-end=\"3927\">NEOLITHIC REVOLUTION</h3>\n<ul data-start=\"3928\" data-end=\"4020\">\n<li data-start=\"3928\" data-end=\"3957\">\n<p data-start=\"3930\" data-end=\"3957\">Agriculture &amp; domestication</p>\n</li>\n<li data-start=\"3958\" data-end=\"3978\">\n<p data-start=\"3960\" data-end=\"3978\">Permanent villages</p>\n</li>\n<li data-start=\"3979\" data-end=\"4001\">\n<p data-start=\"3981\" data-end=\"4001\">Polished stone tools</p>\n</li>\n<li data-start=\"4002\" data-end=\"4020\">\n<p data-start=\"4004\" data-end=\"4020\">Pottery &amp; houses</p>\n</li>\n</ul>\n<hr data-start=\"4022\" data-end=\"4025\" />\n<h2 data-start=\"4027\" data-end=\"4057\">REGIONAL NEOLITHIC CULTURES</h2>\n<h3 data-start=\"4059\" data-end=\"4094\">1️⃣ NORTH-WEST (MEHRGARH &ndash; PYQ)</h3>\n<ul data-start=\"4095\" data-end=\"4186\">\n<li data-start=\"4095\" data-end=\"4126\">\n<p data-start=\"4097\" data-end=\"4126\">Earliest Neolithic (7000 BCE)</p>\n</li>\n<li data-start=\"4127\" data-end=\"4155\">\n<p data-start=\"4129\" data-end=\"4155\">Wheat, barley; sheep, goat</p>\n</li>\n<li data-start=\"4156\" data-end=\"4186\">\n<p data-start=\"4158\" data-end=\"4186\"><strong data-start=\"4158\" data-end=\"4186\">Early dentistry evidence</strong></p>\n</li>\n</ul>\n<h3 data-start=\"4188\" data-end=\"4203\">2️⃣ KASHMIR</h3>\n<ul data-start=\"4204\" data-end=\"4255\">\n<li data-start=\"4204\" data-end=\"4214\">\n<p data-start=\"4206\" data-end=\"4214\">Burzahom</p>\n</li>\n<li data-start=\"4215\" data-end=\"4230\">\n<p data-start=\"4217\" data-end=\"4230\">Pit dwellings</p>\n</li>\n<li data-start=\"4231\" data-end=\"4255\">\n<p data-start=\"4233\" data-end=\"4255\">Neolithic + Megalithic</p>\n</li>\n</ul>\n<h3 data-start=\"4257\" data-end=\"4277\">3️⃣ GANGA VALLEY</h3>\n<ul data-start=\"4278\" data-end=\"4321\">\n<li data-start=\"4278\" data-end=\"4321\">\n<p data-start=\"4280\" data-end=\"4321\">Lahuradeva &rarr; <strong data-start=\"4293\" data-end=\"4321\">earliest rice (6500 BCE)</strong></p>\n</li>\n</ul>\n<h3 data-start=\"4323\" data-end=\"4342\">4️⃣ SOUTH INDIA</h3>\n<ul data-start=\"4343\" data-end=\"4396\">\n<li data-start=\"4343\" data-end=\"4371\">\n<p data-start=\"4345\" data-end=\"4371\">Ash mounds (Utnur, Kupgal)</p>\n</li>\n<li data-start=\"4372\" data-end=\"4396\">\n<p data-start=\"4374\" data-end=\"4396\">Cattle-keeping culture</p>\n</li>\n</ul>\n<h3 data-start=\"4398\" data-end=\"4416\">5️⃣ NORTH-EAST</h3>\n<ul data-start=\"4417\" data-end=\"4456\">\n<li data-start=\"4417\" data-end=\"4433\">\n<p data-start=\"4419\" data-end=\"4433\">Daojali Hading</p>\n</li>\n<li data-start=\"4434\" data-end=\"4456\">\n<p data-start=\"4436\" data-end=\"4456\">Shifting cultivation</p>\n</li>\n</ul>\n<hr data-start=\"4458\" data-end=\"4461\" />\n<h1 data-start=\"4463\" data-end=\"4486\">⚒️ CHALCOLITHIC AGE</h1>\n<p data-start=\"4487\" data-end=\"4504\"><em data-start=\"4487\" data-end=\"4504\">(2600&ndash;1200 BCE)</em></p>\n<h3 data-start=\"4506\" data-end=\"4518\">FEATURES</h3>\n<p data-path-to-node=\"17,0\" style=\"line-height: 1.15 !important;\"></p>\n<ul data-start=\"4519\" data-end=\"4609\">\n<li data-start=\"4519\" data-end=\"4541\">\n<p data-start=\"4521\" data-end=\"4541\">Copper + stone tools</p>\n</li>\n<li data-start=\"4542\" data-end=\"4565\">\n<p data-start=\"4544\" data-end=\"4565\">Painted pottery (BRW)</p>\n</li>\n<li data-start=\"4566\" data-end=\"4585\">\n<p data-start=\"4568\" data-end=\"4585\">Rural settlements</p>\n</li>\n<li data-start=\"4586\" data-end=\"4609\">\n<p data-start=\"4588\" data-end=\"4609\">Pre-Harappan cultures</p>\n</li>\n</ul>\n</blockquote>",

    "question": "<p data-path-to-node=\"21\"><strong data-path-to-node=\"21\" data-index-in-node=\"0\">Q. Consider the following statements regarding the Chalcolithic cultures of India and identify the INCORRECT one:</strong> <strong data-path-to-node=\"21\" data-index-in-node=\"114\">(भारत की ताम्रपाषाण संस्कृतियों के संबंध में निम्नलिखित कथनों पर विचार करें और गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"22\">\n<li>\n<p data-path-to-node=\"22,0,0\"><strong data-path-to-node=\"22,0,0\" data-index-in-node=\"0\">A) General Features:</strong> It was a predominantly rural culture where people used both copper and stone tools; <strong data-path-to-node=\"22,0,0\" data-index-in-node=\"105\">Black-and-Red ware</strong> pottery was commonly used. <em data-path-to-node=\"22,0,0\" data-index-in-node=\"151\">(<strong data-path-to-node=\"22,0,0\" data-index-in-node=\"152\">सामान्य विशेषताएं:</strong> यह मुख्य रूप से एक ग्रामीण संस्कृति थी जहाँ लोग तांबे और पत्थर दोनों उपकरणों का उपयोग करते थे; <strong data-path-to-node=\"22,0,0\" data-index-in-node=\"266\">ब्लैक-एंड-रेड</strong> मृदभांड का उपयोग किया जाता था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,1,0\"><strong data-path-to-node=\"22,1,0\" data-index-in-node=\"0\">B) Regional Sites:</strong> <strong data-path-to-node=\"22,1,0\" data-index-in-node=\"19\">Ahar and Gilund</strong> are in Rajasthan, while <strong data-path-to-node=\"22,1,0\" data-index-in-node=\"59\">Kayatha and Navdatoli</strong> (Malwa culture) are located in Madhya Pradesh. <em data-path-to-node=\"22,1,0\" data-index-in-node=\"128\">(<strong data-path-to-node=\"22,1,0\" data-index-in-node=\"129\">क्षेत्रीय स्थल:</strong> <strong data-path-to-node=\"22,1,0\" data-index-in-node=\"145\">आहड़ और गिलुंड</strong> राजस्थान में हैं, जबकि <strong data-path-to-node=\"22,1,0\" data-index-in-node=\"183\">कायथा और नवदातोली</strong> (मालवा संस्कृति) मध्य प्रदेश में स्थित हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,2,0\"><strong data-path-to-node=\"22,2,0\" data-index-in-node=\"0\">C) Jorwe Culture:</strong> Centred in Maharashtra (sites like Inamgaon and Daimabad), it is known for burials under house floors in a <strong data-path-to-node=\"22,2,0\" data-index-in-node=\"125\">North-to-South</strong> position. <em data-path-to-node=\"22,2,0\" data-index-in-node=\"150\">(<strong data-path-to-node=\"22,2,0\" data-index-in-node=\"151\">जॉरवे संस्कृति:</strong> महाराष्ट्र में केंद्रित (इनामगाँव और दैमाबाद जैसे स्थल), यह घर के फर्श के नीचे <strong data-path-to-node=\"22,2,0\" data-index-in-node=\"246\">उत्तर-से-दक्षिण</strong> स्थिति में दफनाने के लिए जानी जाती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,3,0\"><strong data-path-to-node=\"22,3,0\" data-index-in-node=\"0\">D) Urbanization:</strong> The Chalcolithic people were the first to build massive urban cities with a bronze-based economy across North India. <em data-path-to-node=\"22,3,0\" data-index-in-node=\"134\">(<strong data-path-to-node=\"22,3,0\" data-index-in-node=\"135\">शहरीकरण:</strong> ताम्रपाषाण काल के लोग उत्तर भारत में कांस्य आधारित अर्थव्यवस्था के साथ विशाल शहरी शहरों का निर्माण करने वाले पहले व्यक्ति थे।</em></p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"24,0\">Statement D is incorrect because the Chalcolithic culture was <strong data-path-to-node=\"24,0\" data-index-in-node=\"75\">predominantly rural</strong>. Urbanization (the first urban revolution) only occurred during the <strong data-path-to-node=\"24,0\" data-index-in-node=\"163\">Bronze Age Harappan Civilization</strong>, while Chalcolithic settlements like Inamgaon were large villages but not cities.</p>\n<p data-path-to-node=\"24,0\"></p>\n<h2 data-start=\"4616\" data-end=\"4659\">IMPORTANT CHALCOLITHIC SITES (PYQ-BASED)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4661\" data-end=\"4873\">\n<thead data-start=\"4661\" data-end=\"4692\">\n<tr data-start=\"4661\" data-end=\"4692\">\n<th data-start=\"4661\" data-end=\"4670\" data-col-size=\"sm\">Region</th>\n<th data-start=\"4670\" data-end=\"4677\" data-col-size=\"sm\">Site</th>\n<th data-start=\"4677\" data-end=\"4692\" data-col-size=\"sm\">Key Feature</th>\n</tr>\n</thead>\n<tbody data-start=\"4707\" data-end=\"4873\">\n<tr data-start=\"4707\" data-end=\"4759\">\n<td data-start=\"4707\" data-end=\"4719\" data-col-size=\"sm\">Rajasthan</td>\n<td data-start=\"4719\" data-end=\"4731\" data-col-size=\"sm\">Ganeshwar</td>\n<td data-start=\"4731\" data-end=\"4759\" data-col-size=\"sm\">Copper supply to Harappa</td>\n</tr>\n<tr data-start=\"4760\" data-end=\"4805\">\n<td data-start=\"4760\" data-end=\"4774\" data-col-size=\"sm\">Maharashtra</td>\n<td data-start=\"4774\" data-end=\"4785\" data-col-size=\"sm\">Inamgaon</td>\n<td data-start=\"4785\" data-end=\"4805\" data-col-size=\"sm\">Large pit houses</td>\n</tr>\n<tr data-start=\"4806\" data-end=\"4845\">\n<td data-start=\"4806\" data-end=\"4811\" data-col-size=\"sm\">MP</td>\n<td data-start=\"4811\" data-end=\"4821\" data-col-size=\"sm\">Kayatha</td>\n<td data-start=\"4821\" data-end=\"     "question": "<p data-path-to-node=\"28\"><strong data-path-to-node=\"28\" data-index-in-node=\"0\">Q. With reference to the Iron Age and Megalithic sites in South India, which of the following pairs is/are correctly matched?</strong> <strong data-path-to-node=\"28\" data-index-in-node=\"126\">(दक्षिण भारत में लौह युग और महापाषाण कालीन स्थलों के संदर्भ में, निम्नलिखित में से कौन सा युग्म सही सुमेलित है?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"29\">\n<li>\n<p data-path-to-node=\"29,0,0\"><strong data-path-to-node=\"29,0,0\" data-index-in-node=\"0\">Adichanallur (Tamil Nadu):</strong> Famous for <strong data-path-to-node=\"29,0,0\" data-index-in-node=\"38\">Urn burials</strong>, gold diadems, and iron objects. <em data-path-to-node=\"29,0,0\" data-index-in-node=\"83\">(<strong data-path-to-node=\"29,0,0\" data-index-in-node=\"84\">आदिचनल्लूर:</strong> कलश दफनाने (Urn burials), सोने के मुकुट और लोहे की वस्तुओं के लिए प्रसिद्ध।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"29,1,0\"><strong data-path-to-node=\"29,1,0\" data-index-in-node=\"0\">Brahmagiri (Karnataka):</strong> Known for the transition from Neolithic to Megalithic and <strong data-path-to-node=\"29,1,0\" data-index-in-node=\"82\">Cist burials</strong>. <em data-path-to-node=\"29,1,0\" data-index-in-node=\"96\">(<strong data-path-to-node=\"29,1,0\" data-index-in-node=\"97\">ब्रह्मगिरि:</strong> नवपाषाण से महापाषाण काल में संक्रमण और सिस्ट (Cist) दफनाने के लिए जाना जाता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"29,2,0\"><strong data-path-to-node=\"29,2,0\" data-index-in-node=\"0\">Hirebenkal (Karnataka):</strong> The largest megalithic site in South India featuring <strong data-path-to-node=\"29,2,0\" data-index-in-node=\"77\">Dolmens and Menhirs</strong>. <em data-path-to-node=\"29,2,0\" data-index-in-node=\"98\">(<strong data-path-to-node=\"29,2,0\" data-index-in-node=\"99\">हायरबेंकल:</strong> दक्षिण भारत का सबसे बड़ा महापाषाण स्थल जिसमें <strong data-path-to-node=\"29,2,0\" data-index-in-node=\"156\">डोलमेन और मेनहिर</strong> शामिल हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"29,3,0\"><strong data-path-to-node=\"29,3,0\" data-index-in-node=\"0\">Paiyampalli (Tamil Nadu):</strong> Notable for the presence of <strong data-path-to-node=\"29,3,0\" data-index-in-node=\"54\">Black-and-Red Ware</strong> pottery and early iron implements. <em data-path-to-node=\"29,3,0\" data-index-in-node=\"108\">(<strong data-path-to-node=\"29,3,0\" data-index-in-node=\"109\">पय्यमपल्ली:</strong> <strong data-path-to-node=\"29,3,0\" data-index-in-node=\"121\">ब्लैक-एंड-रेड वेयर</strong> मृदभांड और शुरुआती लोहे के उपकरणों के लिए उल्लेखनीय।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"30\"><strong data-path-to-node=\"30\" data-index-in-node=\"0\">Select the correct answer using the codes below:</strong> <strong data-path-to-node=\"30\" data-index-in-node=\"49\">(नीचे दिए गए कूट का उपयोग करके सही उत्तर चुनें:)</strong></p>\n<ul data-path-to-node=\"31\">\n<li>\n<p data-path-to-node=\"31,0,0\"><strong data-path-to-node=\"31,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"31,1,0\"><strong data-path-to-node=\"31,1,0\" data-index-in-node=\"0\">B)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"31,2,0\"><strong data-path-to-node=\"31,2,0\" data-index-in-node=\"0\">C)</strong> 3 and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"31,3,0\"><strong data-path-to-node=\"31,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",

    "solution": "<ul>\n<li data-path-to-node=\"33,1,0,0\"><strong data-path-to-node=\"33,1,0,0\" data-index-in-node=\"0\">North India Iron Age:</strong> Associated with <strong data-path-to-node=\"33,1,0,0\" data-index-in-node=\"38\">PGW</strong> (Painted Grey Ware).</li>\n<li data-path-to-node=\"33,1,1,0\"><strong data-path-to-node=\"33,1,1,0\" data-index-in-node=\"0\">South India Iron Age:</strong> Associated with <strong data-path-to-node=\"33,1,1,0\" data-index-in-node=\"38\">Megaliths</strong> (Large stone burials).</li>\n<li data-path-to-node=\"33,1,2,0\"><strong data-path-to-node=\"33,1,2,0\" data-index-in-node=\"0\">Ash Mound Sites:</strong> Found in Neolithic South India (e.g., Utnur, Kupgal).</li>\n</ul>\n<h1 data-start=\"4989\" data-end=\"5023\">🪨 IRON AGE &amp; MEGALITHIC CULTURE</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5025\" data-end=\"5204\">\n<thead data-start=\"5025\" data-end=\"5063\">\n<tr data-start=\"5025\" data-end=\"5063\">\n<th data-start=\"5025\" data-end=\"5034\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"5034\" data-end=\"5048\" data-col-size=\"sm\">North India</th>\n<th data-start=\"5048\" data-end=\"5063\" data-col-size=\"sm\">South India</th>\n</tr>\n</thead>\n<tbody data-start=\"5078\" data-end=\"5204\">\n<tr data-start=\"5078\" data-end=\"5118\">\n<td data-start=\"5078\" data-end=\"5088\" data-col-size=\"sm\">Pottery</td>\n<td data-start=\"5088\" data-end=\"5094\" data-col-size=\"sm\">PGW</td>\n<td data-start=\"5094\" data-end=\"5118\" data-col-size=\"sm\">Black-ware (burials)</td>\n</tr>\n<tr data-start=\"5119\" data-end=\"5158\">\n<td data-start=\"5119\" data-end=\"5129\" data-col-size=\"sm\">Culture</td>\n<td data-col-size=\"sm\" data-start=\"5129\" data-end=\"5144\">Mahajanapada</td>\n<td data-col-size=\"sm\" data-start=\"5144\" data-end=\"5158\">Megalithic</td>\n</tr>\n<tr data-start=\"5159\" data-end=\"5204\">\n<td data-start=\"5159\" data-end=\"5170\" data-col-size=\"sm\">Timeline</td>\n<td data-start=\"5170\" data-end=\"5185\" data-col-size=\"sm\">1100&ndash;800 BCE</td>\n<td data-start=\"5185\" data-end=\"5204\" data-col-size=\"sm\">1000 BCE&ndash;300 CE</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"5206\" data-end=\"5209\" />\n<h2 data-start=\"5211\" data-end=\"5251\">KEY MEGALITHIC SITES (VERY IMPORTANT)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5253\" data-end=\"5537\">\n<thead data-start=\"5253\" data-end=\"5286\">\n<tr data-start=\"5253\" data-end=\"5286\">\n<th data-start=\"5253\" data-end=\"5260\" data-col-size=\"sm\">Site</th>\n<th data-start=\"5260\" data-end=\"5271\" data-col-size=\"sm\">Location</th>\n<th data-start=\"5271\" data-end=\"5286\" data-col-size=\"sm\">Key Feature</th>\n</tr>\n</thead>\n<tbody data-start=\"5301\" data-end=\"5537\">\n<tr data-start=\"5301\" data-end=\"5336\">\n<td data-start=\"5301\" data-end=\"5316\" data-col-size=\"sm\">Adichanallur</td>\n<td data-start=\"5316\" data-end=\"5321\" data-col-size=\"sm\">TN</td>\n<td data-start=\"5321\" data-end=\"5336\" data-col-size=\"sm\">Urn burials</td>\n</tr>\n<tr data-start=\"5337\" data-end=\"5388\">\n<td data-start=\"5337\" data-end=\"5350\" data-col-size=\"sm\">Brahmagiri</td>\n<td data-col-size=\"sm\" data-start=\"5350\" data-end=\"5362\">Karnataka</td>\n<td data-col-size=\"sm\" data-start=\"5362\" data-end=\"5388\">Neolithic &rarr; Megalithic</td>\n</tr>\n<tr data-start=\"5389\" data-end=\"5441\">\n<td data-start=\"5389\" data-end=\"5402\" data-col-size=\"sm\">Hirebenkal</td>\n<td data-col-size=\"sm\" data-start=\"5402\" data-end=\"5414\">Karnataka</td>\n<td data-col-size=\"sm\" data-start=\"5414\" data-end=\"5441\">Largest megalithic site</td>\n</tr>\n<tr data-start=\"5442\" data-end=\"5489\">\n<td data-start=\"5442\" data-end=\"5450\" data-col-size=\"sm\">Maski</td>\n<td data-start=\"5450\" data-end=\"5462\" data-col-size=\"sm\">Karnataka</td>\n<td data-start=\"5462\" data-end=\"5489\" data-col-size=\"sm\">Ashoka name inscription</td>\n</tr>\n<tr data-start=\"5490\" data-end=\"5537\">\n<td data-start=\"5490\" data-end=\"5507\" data-col-size=\"sm\">Nagarjunakonda</td>\n<td data-start=\"5507\" data-end=\"5512\" data-col-size=\"sm\">AP</td>\n<td data-start=\"5512\" data-end=\"5537\" data-col-size=\"sm\">Megalithic + Buddhist</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"5539\" data-end=\"5542\" />\n<h1 data-start=\"5544\" data-end=\"5579\">🎯 EXAM FINAL TAKEAWAYS (LOCK IT)</h1>\n<ul data-start=\"5581\" data-end=\"5769\">\n<li data-start=\"5581\" data-end=\"5613\">\n<p data-start=\"5583\" data-end=\"5613\"><strong data-start=\"5583\" data-end=\"5598\">Oldest rice</strong> &rarr; Lahuradeva</p>\n</li>\n<li data-start=\"5614\" data-end=\"5647\">\n<p data-start=\"5616\" data-end=\"5647\"><strong data-start=\"5616\" data-end=\"5631\">Only fossil</strong> &rarr; Narmada Man</p>\n</li>\n<li data-start=\"5648\" data-end=\"5680\">\n<p data-start=\"5650\" data-end=\"5680\"><strong data-start=\"5650\" data-end=\"5669\">Earliest shrine</strong> &rarr; Baghor</p>\n</li>\n<li data-start=\"5681\" data-end=\"5713\">\n<p data-start=\"5683\" data-end=\"5713\"><strong data-start=\"5683\" data-end=\"5697\">Ash mounds</strong> &rarr; South India</p>\n</li>\n<li data-start=\"5714\" data-end=\"5742\">\n<p data-start=\"5716\" data-end=\"5742\"><strong data-start=\"5716\" data-end=\"5723\">PGW</strong> &rarr; Iron Age North</p>\n</li>\n<li data-start=\"5743\" data-end=\"5769\">\n<p data-start=\"5745\" data-end=\"5769\"><strong data-start=\"5745\" data-end=\"5752\">BRW</strong> &rarr; Chalcolithic</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the geographical extent and chronology of the Indus Valley Civilization (IVC), consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"135\">(सिंधु घाटी सभ्यता (IVC) के भौगोलिक विस्तार और कालक्रम के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Chronology:</strong> While the civilization began around 3300 BC, the most widely accepted radiocarbon dating for its <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"109\">Mature Phase</strong> (Peak) is between <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"140\">2350&ndash;1750 BC</strong>. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"154\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"155\">कालक्रम:</strong> हालांकि सभ्यता लगभग 3300 ईसा पूर्व शुरू हुई थी, इसके <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"217\">परिपक्व चरण</strong> (शिखर) के लिए सबसे व्यापक रूप से स्वीकृत रेडियोकार्बन डेटिंग <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"290\">2350-1750 ईसा पूर्व</strong> के बीच है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Geographical Shape:</strong> The civilization covered a vast <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"52\">triangular region</strong> of approximately <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"87\">12,99,000 km&sup2;</strong>, making it larger than the contemporary civilizations of Mesopotamia and Egypt. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"181\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"182\">भौगोलिक आकार:</strong> यह सभ्यता लगभग <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"211\">12,99,000 वर्ग किमी</strong> के विशाल <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"240\">त्रिकोणीय क्षेत्र</strong> में फैली हुई थी, जो इसे मेसोपोटामिया और मिस्र की समकालीन सभ्यताओं से बड़ा बनाती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Indigenous Origin:</strong> Current evidence suggests that Harappan culture evolved out of <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"82\">indigenous settlements</strong> (like Mehrgarh) rather than being influenced by Egypt or Mesopotamia. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"175\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"176\">स्वदेशी उत्पत्ति:</strong> वर्तमान साक्ष्य बताते हैं कि हड़प्पा संस्कृति मिस्र या मेसोपोटामिया से प्रभावित होने के बजाय <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"287\">स्वदेशी बस्तियों</strong> (जैसे मेहरगढ़) से विकसित हुई थी।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Extreme Boundaries:</strong> Match the extreme points of the IVC correctly:</p>\n<ul data-path-to-node=\"5,3,1\">\n<li>\n<p data-path-to-node=\"5,3,1,0,0\"><strong data-path-to-node=\"5,3,1,0,0\" data-index-in-node=\"0\">North:</strong> Shortugai (Afghanistan) on the Amu Darya.</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,1,1,0\"><strong data-path-to-node=\"5,3,1,1,0\" data-index-in-node=\"0\">South:</strong> Daimabad (Maharashtra) on the Pravara River.</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,1,2,0\"><strong data-path-to-node=\"5,3,1,2,0\" data-index-in-node=\"0\">West:</strong> Sutkagendor (Pakistan-Iran border) on the Dasht/Dasak River.</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,1,3,0\"><strong data-path-to-node=\"5,3,1,3,0\" data-index-in-node=\"0\">East:</strong> Alamgirpur (Uttar Pradesh) on the Hindon River. <em data-path-to-node=\"5,3,1,3,0\" data-index-in-node=\"54\">(<strong data-path-to-node=\"5,3,1,3,0\" data-index-in-node=\"55\">अंतिम सीमाएँ:</strong> IVC के अंतिम बिंदुओं का सही मिलान करें: उत्तर: शोरतुगई; दक्षिण: दैमाबाद; पश्चिम: सुतकागेंडोर; पूर्व: आलमगीरपुर।)</em></p>\n</li>\n</ul>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1, 2, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, 3, and 4)</p>\n</li>\n</ul>",

    "solution": "<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">Quick Revision Snapshot (त्वरित पुनरीक्षण)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Details (विवरण)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\" data-index-in-node=\"0\">First Site Discovered</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0\" data-index-in-node=\"0\">Harappa</strong> (1921) - Hence named Harappan Civilization.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,0,0\" data-index-in-node=\"0\">Northernmost (India)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,2,1,0\" data-index-in-node=\"0\">Manda</strong> (Jammu &amp; Kashmir) on Chenab River.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,0,0\" data-index-in-node=\"0\">Oldest Evidence</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,1,0\">Cotton production at <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,3,1,0\" data-index-in-node=\"21\">Mehrgarh</strong> (Pre-Harappan).</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,0,0\" data-index-in-node=\"0\">Environment</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,1,0\">Moist/Humid with dense forests (Sind/Rajasthan were not deserts then).</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\" data-index-in-node=\"0\">Total Area</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,1,0\">Approx. 1.3 million sq. km.</span></td>\n</tr>\n</tbody>\n</table>\n<h1 data-start=\"249\" data-end=\"309\"><strong data-start=\"266\" data-end=\"307\">Indus Valley Civilization</strong></h1>\n<p data-start=\"310\" data-end=\"348\"><em data-start=\"310\" data-end=\"348\">(सिंधु घाटी सभ्यता / हड़प्पा सभ्यता)</em></p>\n<hr data-start=\"350\" data-end=\"353\" />\n<h2 data-start=\"355\" data-end=\"373\">📌 INTRODUCTION</h2>\n<ul data-start=\"374\" data-end=\"542\">\n<li data-start=\"374\" data-end=\"415\">\n<p data-start=\"376\" data-end=\"415\"><strong data-start=\"376\" data-end=\"413\">Beginning of Indian urban history</strong></p>\n</li>\n<li data-start=\"416\" data-end=\"458\">\n<p data-start=\"418\" data-end=\"458\">Named after the <strong data-start=\"434\" data-end=\"456\">Indus river system</strong></p>\n</li>\n<li data-start=\"459\" data-end=\"542\">\n<p data-start=\"461\" data-end=\"542\">One of the <strong data-start=\"472\" data-end=\"508\">largest Bronze Age civilizations</strong> (bigger than Egypt &amp; Mesopotamia)</p>\n</li>\n</ul>\n<hr data-start=\"544\" data-end=\"547\" />\n<h2 data-start=\"549\" data-end=\"590\">⏳ CHRONOLOGY &amp; NAMING (VERY IMPORTANT)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"592\" data-end=\"817\">\n<thead data-start=\"592\" data-end=\"610\">\n<tr data-start=\"592\" data-end=\"610\">\n<th data-start=\"592\" data-end=\"600\" data-col-size=\"sm\">Phase</th>\n<th data-start=\"600\" data-end=\"610\" data-col-size=\"sm\">Period</th>\n</tr>\n</thead>\n<tbody data-start=\"621\" data-end=\"817\">\n<tr data-start=\"621\" data-end=\"649\">\n<td data-start=\"621\" data-end=\"630\" data-col-size=\"sm\">Origin</td>\n<td data-col-size=\"sm\" data-start=\"630\" data-end=\"649\">c. <strong data-start=\"635\" data-end=\"647\">3300 BCE</strong></td>\n</tr>\n<tr data-start=\"650\" data-end=\"697\">\n<td data-start=\"650\" data-end=\"676\" data-col-size=\"sm\"><strong data-start=\"652\" data-end=\"675\">Mature / Peak Phase</strong></td>\n<td data-start=\"676\" data-end=\"697\" data-col-size=\"sm\"><strong data-start=\"678\" data-end=\"695\">2600&ndash;1900 BCE</strong></td>\n</tr>\n<tr data-start=\"698\" data-end=\"730\">\n<td data-start=\"698\" data-end=\"708\" data-col-size=\"sm\">Decline</td>\n<td data-start=\"708\" data-end=\"730\" data-col-size=\"sm\">After <strong data-start=\"716\" data-end=\"728\">1900 BCE</strong></td>\n</tr>\n<tr data-start=\"731\" data-end=\"766\">\n<td data-start=\"731\" data-end=\"747\" data-col-size=\"sm\">Disappearance</td>\n<td data-start=\"747\" data-end=\"766\" data-col-size=\"sm\">c. <strong data-start=\"752\" data-end=\"764\">1400 BCE</strong></td>\n</tr>\n<tr data-start=\"767\" data-end=\"817\">\n<td data-start=\"767\" data-end=\"796\" data-col-size=\"sm\">Radiocarbon (Mature Phase)</td>\n<td data-col-size=\"sm\" data-start=\"796\" data-end=\"817\"><strong data-start=\"798\" data-end=\"815\">2350&ndash;1750 BCE</strong></td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"819\" data-end=\"839\"><strong data-start=\"819\" data-end=\"837\">Harappan Name:</strong></p>\n<ul data-start=\"840\" data-end=\"925\">\n<li data-start=\"840\" data-end=\"925\">\n<p data-start=\"842\" data-end=\"925\">Named after <strong data-start=\"854\" data-end=\"895\">Harappa</strong>, the <strong data-start=\"901\" data-end=\"925\">first excavated site</strong></p>\n</li>\n</ul>\n<hr data-start=\"927\" data-end=\"930\" />\n<h2 data-start=\"932\" data-end=\"966\">🌍 GEOGRAPHICAL EXTENT &amp; ORIGIN</h2>\n<h3 data-start=\"968\" data-end=\"981\">🔹 EXTENT</h3>\n<ul data-start=\"982\" data-end=\"1156\">\n<li data-start=\"982\" data-end=\"1029\">\n<p data-start=\"984\" data-end=\"1029\">Covered <strong data-start=\"992\" data-end=\"1010\">~12,99,000 km&sup2;</strong> (Triangular shape)</p>\n</li>\n<li data-start=\"1030\" data-end=\"1112\">\n<p data-start=\"1032\" data-end=\"1112\">Regions: <strong data-start=\"1041\" data-end=\"1112\">Punjab, Sindh, Baluchistan, Haryana, Rajasthan, Gujarat, western UP</strong></p>\n</li>\n<li data-start=\"1113\" data-end=\"1156\">\n<p data-start=\"1115\" data-end=\"1156\">Extended into <strong data-start=\"1129\" data-end=\"1144\">Afghanistan</strong> (Shortugai)</p>\n</li>\n</ul>\n<h3 data-start=\"1158\" data-end=\"1194\">🔹 EXTREME POINTS (PYQ FAVORITE)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1196\" data-end=\"1491\">\n<thead data-start=\"1196\" data-end=\"1224\">\n<tr data-start=\"1196\" data-end=\"1224\">\n<th data-start=\"1196\" data-end=\"1208\" data-col-size=\"sm\">Direction</th>\n<th data-start=\"1208\" data-end=\"1215\" data-col-size=\"sm\">Site</th>\n<th data-start=\"1215\" data-end=\"1224\" data-col-size=\"sm\">River</th>\n</tr>\n</thead>\n<tbody data-start=\"1239\" data-end=\"1491\">\n<tr data-start=\"1239\" data-end=\"1304\">\n<td data-start=\"1239\" data-end=\"1247\" data-col-size=\"sm\">North</td>\n<td data-start=\"1247\" data-end=\"1291\" data-col-size=\"sm\"><strong data-start=\"1249\" data-end=\"1290\">Shortugai</strong></td>\n<td data-col-size=\"sm\" data-start=\"1291\" data-end=\"1304\">Amu Darya</td>\n</tr>\n<tr data-start=\"1305\" data-end=\"1365\">\n<td data-start=\"1305\" data-end=\"1312\" data-col-size=\"sm\">West</td>\n<td data-start=\"1312\" data-end=\"1356\" data-col-size=\"sm\"><strong data-start=\"1314\" data-end=\"1355\">Sutkagendor</strong></td>\n<td data-col-size=\"sm\" data-start=\"1356\" data-end=\"1365\">Dasht</td>\n</tr>\n<tr data-start=\"1366\" data-end=\"1427\">\n<td data-start=\"1366\" data-end=\"1373\" data-col-size=\"sm\">East</td>\n<td data-start=\"1373\" data-end=\"1417\" data-col-size=\"sm\"><strong data-start=\"1375\" data-end=\"1416\">Alamgirpur</strong></td>\n<td data-col-size=\"sm\" data-start=\"1417\" data-end=\"1427\">Hindon</td>\n</tr>\n<tr data-start=\"1428\" data-end=\"1491\">\n<td data-start=\"1428\" data-end=\"1436\" data-col-size=\"sm\">South</td>\n<td data-col-size=\"sm\" data-start=\"1436\" data-end=\"1480\"><strong data-start=\"1438\" data-end=\"1479\">Daimabad</strong></td>\n<td data-col-size=\"sm\" data-start=\"1480\" data-end=\"1491\">Pravara</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"1493\" data-end=\"1637\">🔹 <strong data-start=\"1496\" data-end=\"1511\">Core Areas:</strong> Pakistan, Gujarat, Rajasthan, Haryana<br data-start=\"1549\" data-end=\"1552\" />🔹 <strong data-start=\"1555\" data-end=\"1580\">Northernmost (India):</strong> <strong data-start=\"1581\" data-end=\"1596\">Manda (J&amp;K)</strong><br data-start=\"1596\" data-end=\"1599\" />🔹 <strong data-start=\"1602\" data-end=\"1627\">Overall Northernmost:</strong> Shortugai</p>\n<hr data-start=\"1639\" data-end=\"1642\" />\n<h2 data-start=\"1644\" data-end=\"1658\">🌦️ CLIMATE</h2>\n<ul data-start=\"1659\" data-end=\"1746\">\n<li data-start=\"1659\" data-end=\"1674\">\n<p data-start=\"1661\" data-end=\"1674\">Moist &amp; humid</p>\n</li>\n<li data-start=\"1675\" data-end=\"1710\">\n<p data-start=\"1677\" data-end=\"1710\">Sindh &amp; Rajasthan <strong data-start=\"1695\" data-end=\"1710\">not deserts</strong></p>\n</li>\n<li data-start=\"1711\" data-end=\"1746\">\n<p data-start=\"1713\" data-end=\"1746\">Dense forests in NW &amp; North India</p>\n</li>\n</ul>\n<hr data-start=\"1748\" data-end=\"1751\" />\n<h2 data-start=\"1753\" data-end=\"1792\">🧑&zwj;🔬 DISCOVERY &amp; KEY ARCHAEOLOGISTS</h2>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1794\" data-end=\"2142\">\n<thead data-start=\"1794\" data-end=\"1810\">\n<tr data-start=\"1794\" data-end=\"1810\">\n<th data-start=\"1794\" data-end=\"1801\" data-col-size=\"sm\">Year</th>\n<th data-start=\"1801\" data-end=\"1810\" data-col-size=\"sm\">Event</th>\n</tr>\n</thead>\n<tbody data-start=\"1821\" data-end=\"2142\">\n<tr data-start=\"1821\" data-end=\"1865\">\n<td data-start=\"1821\" data-end=\"1828\" data-col-size=\"sm\">1875</td>\n<td data-start=\"1828\" data-end=\"1865\" data-col-size=\"sm\">Cunningham reported Harappan seal</td>\n</tr>\n<tr data-start=\"1866\" data-end=\"1913\">\n<td data-start=\"1866\" data-end=\"1873\" data-col-size=\"sm\">1921</td>\n<td data-col-size=\"sm\" data-start=\"1873\" data-end=\"1913\"><strong data-start=\"1875\" data-end=\"1893\">Daya Ram Sahni</strong> excavated Harappa</td>\n</tr>\n<tr data-start=\"1914\" data-end=\"1964\">\n<td data-start=\"1914\" data-end=\"1921\" data-col-size=\"sm\">1922</td>\n<td data-start=\"1921\" data-end=\"1964\" data-col-size=\"sm\"><strong data-start=\"1923\" data-end=\"1940\">R.D. Banerjee</strong> excavated Mohenjodaro</td>\n</tr>\n<tr data-start=\"1965\" data-end=\"2020\">\n<td data-start=\"1965\" data-end=\"1972\" data-col-size=\"sm\">1924</td>\n<td data-start=\"1972\" data-end=\"2020\" data-col-size=\"sm\"><strong data-start=\"1974\" data-end=\"1991\">John Marshall</strong> announced new civilisation</td>\n</tr>\n<tr data-start=\"2021\" data-end=\"2053\">\n<td data-start=\"2021\" data-end=\"2028\" data-col-size=\"sm\">1955</td>\n<td data-col-size=\"sm\" data-start=\"2028\" data-end=\"2053\"><strong data-start=\"2030\" data-end=\"2042\">S.R. Rao</strong> &ndash; Lothal</td>\n</tr>\n<tr data-start=\"2054\" data-end=\"2104\">\n<td data-start=\"2054\" data-end=\"2061\" data-col-size=\"sm\">1960</td>\n<td data-start=\"2061\" data-end=\"2104\" data-col-size=\"sm\"><strong data-start=\"2063\" data-end=\"2089\">B.B. Lal &amp; B.K. Thapar</strong> &ndash; Kalibangan</td>\n</tr>\n<tr data-start=\"2105\" data-end=\"2142\">\n<td data-start=\"2105\" data-end=\"2112\" data-col-size=\"sm\">1990</td>\n<td data-start=\"2112\" data-end=\"2142\" data-col-size=\"sm\"><strong data-start=\"2114\" data-end=\"2128\">R.S. Bisht</strong> &ndash; Dholavira</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Q. With reference to the discovery and phases of the Harappan Civilization, which of the following statements is INCORRECT?</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(हड़प्पा सभ्यता की खोज और चरणों के संदर्भ में, निम्नलिखित में से कौन सा कथन गलत है?)</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">A) Discovery: While Alexander Cunningham published the first report on a Harappan seal in 1875, the formal announcement of the discovery of a \"new civilization\" was made by John Marshall in 1924.</p>\n<p style=\"line-height: 1.15 !important;\">(खोज: जबकि अलेक्जेंडर कनिंघम ने 1875 में हड़प्पा की मुहर पर पहली रिपोर्ट प्रकाशित की थी, \"नई सभ्यता\" की खोज की औपचारिक घोषणा 1924 में जॉन मार्शल द्वारा की गई थी।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">B) Key Excavations: Daya Ram Sahni led the first excavations at Harappa (1921), followed by R.D. Banerjee at Mohenjodaro (1922), and much later, R.S. Bisht at Dholavira (1990).</p>\n<p style=\"line-height: 1.15 !important;\">(प्रमुख उत्खनन: दया राम साहनी ने हड़प्पा (1921) में पहले उत्खनन का नेतृत्व किया, उसके बाद आर.डी. बनर्जी ने मोहनजोदड़ो (1922) में, और बहुत बाद में, आर.एस. बिष्ट ने धोलावीरा (1990) में उत्खनन किया।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">C) Mature Phase: This phase (2600&ndash;1900 BC) is characterized by full-scale urbanization, the emergence of a script, and uniformity in artifacts across sites like Lothal, Chanhudaro, and Kalibangan.</p>\n<p style=\"line-height: 1.15 !important;\">(परिपक्व चरण: यह चरण (2600-1900 ईसा पूर्व) पूर्ण शहरीकरण, एक लिपि के उद्भव और लोथल, चन्हुदड़ो और कालीबंगन जैसे स्थलों पर कलाकृतियों में एकरूपता द्वारा चिह्नित है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">D) Late Harappan Phase: During this phase (Post-1800 BC), the civilization saw a massive increase in international trade with Mesopotamia and the construction of new large-scale urban centers in the Gangetic plain.</p>\n<p style=\"line-height: 1.15 !important;\">(उत्तर हड़प्पा चरण: इस चरण (1800 ईसा पूर्व के बाद) के दौरान, सभ्यता ने मेसोपोटामिया के साथ अंतर्राष्ट्रीय व्यापार में भारी वृद्धि और गंगा के मैदान में नए बड़े पैमाने पर शहरी केंद्रों का निर्माण देखा।)</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"8\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" data-index-in-node=\"0\">Correct Answer: D</strong></p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Why D is incorrect?</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">The Late Harappan Phase (Localization) was actually a period of decline, not growth.</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Urban features vanished:</strong>&nbsp;Large cities were abandoned in favor of a&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"67\">pastoral and rural</strong>&nbsp;way of life.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Trade collapsed:</strong>&nbsp;Long-distance trade with Mesopotamia (the Sumerian civilization on the Tigris and Euphrates) effectively ended.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" dat     "solution": "<p data-path-to-node=\"8\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"font-family: 'Noto Sans'; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"0\">Extra Edge:</strong><span style=\"font-family: 'Noto Sans';\">&nbsp;</span><strong style=\"font-family: 'Noto Sans'; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"12\">Mohenjo-Daro</strong><span style=\"font-family: 'Noto Sans';\">&nbsp;</span><span style=\"font-family: 'Noto Sans';\">means \"Mound of the Dead.\" It has a well in almost every house.</span><span style=\"font-family: 'Noto Sans';\">&nbsp;</span><strong style=\"font-family: 'Noto Sans'; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9,0\" data-index-in-node=\"89\">Harappa</strong><span style=\"font-family: 'Noto Sans';\">&nbsp;</span><span style=\"font-family: 'Noto Sans';\">was the first site discovered (1921), which is why the civilization is named after it.</span></p>\n<h2 data-start=\"3451\" data-end=\"3498\"><strong data-start=\"3457\" data-end=\"3498\">Chanhudaro</strong></h2>\n<ul data-start=\"3499\" data-end=\"3644\">\n<li data-start=\"3499\" data-end=\"3530\">\n<p data-start=\"3501\" data-end=\"3530\"><strong data-start=\"3501\" data-end=\"3530\">Only city without Citadel</strong></p>\n</li>\n<li data-start=\"3531\" data-end=\"3562\">\n<p data-start=\"3533\" data-end=\"3562\">Bead-making, bangle factory</p>\n</li>\n<li data-start=\"3563\" data-end=\"3584\">\n<p data-start=\"3565\" data-end=\"3584\">Ink pot, lipstick</p>\n</li>\n<li data-start=\"3585\" data-end=\"3614\">\n<p data-start=\"3587\" data-end=\"3614\">Dog chasing cat footprint</p>\n</li>\n<li data-start=\"3615\" data-end=\"3644\">\n<p data-start=\"3617\" data-end=\"3644\">&ldquo;<strong data-start=\"3618\" data-end=\"3643\">Lancashire of Harappa</strong>&rdquo;</p>\n</li>\n</ul>\n<hr data-start=\"3646\" data-end=\"3649\" />\n<h2 data-start=\"3651\" data-end=\"3698\">🟥 <strong data-start=\"3657\" data-end=\"3698\">Kalibangan</strong></h2>\n<ul data-start=\"3699\" data-end=\"3841\">\n<li data-start=\"3699\" data-end=\"3719\">\n<p data-start=\"3701\" data-end=\"3719\">River: <strong data-start=\"3708\" data-end=\"3719\">Ghaggar</strong></p>\n</li>\n<li data-start=\"3720\" data-end=\"3749\">\n<p data-start=\"3722\" data-end=\"3749\"><strong data-start=\"3722\" data-end=\"3749\">Ploughed field evidence</strong></p>\n</li>\n<li data-start=\"3750\" data-end=\"3769\">\n<p data-start=\"3752\" data-end=\"3769\">Fire altars (7)</p>\n</li>\n<li data-start=\"3770\" data-end=\"3785\">\n<p data-start=\"3772\" data-end=\"3785\">Camel bones</p>\n</li>\n<li data-start=\"3786\" data-end=\"3804\">\n<p data-start=\"3788\" data-end=\"3804\">Earthen bricks</p>\n</li>\n<li data-start=\"3805\" data-end=\"3841\">\n<p data-start=\"3807\" data-end=\"3841\"><strong data-start=\"3807\" data-end=\"3841\">Early Harappan + Mature layers</strong></p>\n</li>\n</ul>\n<hr data-start=\"3843\" data-end=\"3846\" />\n<h2 data-start=\"3848\" data-end=\"3897\">🟩 <strong data-start=\"3854\" data-end=\"3897\">Lothal</strong></h2>\n<ul data-start=\"3898\" data-end=\"4066\">\n<li data-start=\"3898\" data-end=\"3918\">\n<p data-start=\"3900\" data-end=\"3918\">River: <strong data-start=\"3907\" data-end=\"3918\">Bhogava</strong></p>\n</li>\n<li data-start=\"3919\" data-end=\"3953\">\n<p data-start=\"3921\" data-end=\"3953\"><strong data-start=\"3921\" data-end=\"3953\">World&rsquo;s first tidal dockyard</strong></p>\n</li>\n<li data-start=\"3954\" data-end=\"3979\">\n<p data-start=\"3956\" data-end=\"3979\">Port city (naval trade)</p>\n</li>\n<li data-start=\"3980\" data-end=\"4002\">\n<p data-start=\"3982\" data-end=\"4002\">Rice husk evidence</p>\n</li>\n<li data-start=\"4003\" data-end=\"4020\">\n<p data-start=\"4005\" data-end=\"4020\">Double burial</p>\n</li>\n<li data-start=\"4021\" data-end=\"4036\">\n<p data-start=\"4023\" data-end=\"4036\">Ivory scale</p>\n</li>\n<li data-start=\"4037\" data-end=\"4066\">\n<p data-start=\"4039\" data-end=\"4066\">&ldquo;<strong data-start=\"4040\" data-end=\"4065\">Manchester of Harappa</strong>&rdquo;</p>\n</li>\n</ul>\n<hr data-start=\"4068\" data-end=\"4071\" />\n<h2 data-start=\"4073\" data-end=\"4122\">🟪 <strong data-start=\"4079\" data-end=\"4122\">Dholavira</strong></h2>\n<ul data-start=\"4123\" data-end=\"4325\">\n<li data-start=\"4123\" data-end=\"4138\">\n<p data-start=\"4125\" data-end=\"4138\">Rann of Kutch</p>\n</li>\n<li data-start=\"4139\" data-end=\"4171\">\n<p data-start=\"4141\" data-end=\"4171\"><strong data-start=\"4141\" data-end=\"4171\">Only city with 3 divisions</strong></p>\n</li>\n<li data-start=\"4172\" data-end=\"4203\">\n<p data-start=\"4174\" data-end=\"4203\"><strong data-start=\"4174\" data-end=\"4203\">Advanced water management</strong></p>\n</li>\n<li data-start=\"4204\" data-end=\"4245\">\n<p data-start=\"4206\" data-end=\"4245\">Largest Harappan inscription (10 signs)</p>\n</li>\n<li data-start=\"4246\" data-end=\"4275\">\n<p data-start=\"4248\" data-end=\"4275\">Stadium / ceremonial ground</p>\n</li>\n<li data-start=\"4276\" data-end=\"4296\">\n<p data-start=\"4278\" data-end=\"4296\">Stone construction</p>\n</li>\n<li data-start=\"4297\" data-end=\"4325\">\n<p data-start=\"4299\" data-end=\"4325\">UNESCO World Heritage Site</p>\n</li>\n</ul>\n<hr data-start=\"4327\" data-end=\"4330\" />\n<h2 data-start=\"4332\" data-end=\"4381\">🟧 <strong data-start=\"4338\" data-end=\"4381\">Banawali</strong></h2>\n<p data-path-to-node=\"8\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<ul data-start=\"4382\" data-end=\"4494\">\n<li data-start=\"4382\" data-end=\"4400\">\n<p data-start=\"4384\" data-end=\"4400\">Oval-shaped city</p>\n</li>\n<li data-start=\"4401\" data-end=\"4429\">\n<p data-start=\"4403\" data-end=\"4429\"><strong data-start=\"4403\" data-end=\"4429\">Radial street planning</strong></p>\n</li>\n<li data-start=\"4430\" data-end=\"4450\">\n<p data-start=\"4432\" data-end=\"4450\">No proper drainage</p>\n</li>\n<li data-start=\"4451\" data-end=\"4470\">\n<p data-start=\"4453\" data-end=\"4470\">Terracotta plough</p>\n</li>\n<li data-start=\"4471\" data-end=\"4494\">\n<p data-start=\"4473\" data-end=\"4494\">Largest barley grains</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Q. Consider the following statements about specialized IVC sites and identify the INCORRECT one:</strong> <strong data-path-to-node=\"13\" data-index-in-node=\"97\">(IVC के विशिष्ट स्थलों के बारे में निम्नलिखित कथनों पर विचार करें और गलत कथन की पहचान करें:)</strong></p>\n<ul data-path-to-node=\"14\">\n<li>\n<p data-path-to-node=\"14,0,0\"><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">A) Lothal (Gujarat):</strong> Known as the 'Manchester of IVC'; it features the world&rsquo;s first artificial <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"96\">tidal dockyard</strong> and evidence of rice husk. <em data-path-to-node=\"14,0,0\" data-index-in-node=\"138\">(<strong data-path-to-node=\"14,0,0\" data-index-in-node=\"139\">लोथल:</strong> इसे 'IVC का मैनचेस्टर' कहा जाता है; यहाँ दुनिया का पहला कृत्रिम <strong data-path-to-node=\"14,0,0\" data-index-in-node=\"209\">ज्वारीय गोदी (dockyard)</strong> और धान की भूसी के साक्ष्य मिलते हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,1,0\"><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">B) Chanhudaro (Sindh):</strong> The only Indus city <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"43\">without a Citadel</strong>; famous for a bead-making factory and a brick with a dog&rsquo;s paw imprint. <em data-path-to-node=\"14,1,0\" data-index-in-node=\"133\">(<strong data-path-to-node=\"14,1,0\" data-index-in-node=\"134\">चन्हुदड़ो:</strong> बिना <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"150\">गढ़ (Citadel)</strong> वाला एकमात्र सिंधु शहर; मनके बनाने के कारखाने और कुत्ते के पंजों के निशान वाली ईंट के लिए प्रसिद्ध।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,2,0\"><strong data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">C) Kalibangan (Rajasthan):</strong> Literally means 'Black Bangle'; provides evidence of a <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"82\">ploughed field</strong>, fire altars, and camel bones. <em data-path-to-node=\"14,2,0\" data-index-in-node=\"128\">(<strong data-path-to-node=\"14,2,0\" data-index-in-node=\"129\">कालीबंगन:</strong> इसका शाब्दिक अर्थ है 'काली चूड़ी'; यहाँ <strong data-path-to-node=\"14,2,0\" data-index-in-node=\"179\">जुते हुए खेत</strong>, अग्नि वेदियों और ऊंट की हड्डियों के साक्ष्य मिलते हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,3,0\"><strong data-path-to-node=\"14,3,0\" data-index-in-node=\"0\">D) Banawali (Haryana):</strong> Known for its <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"37\">highly systematic grid drainage system</strong> and the absence of any clay models of ploughs. <em data-path-to-node=\"14,3,0\" data-index-in-node=\"123\">(<strong data-path-to-node=\"14,3,0\" data-index-in-node=\"124\">बनावली:</strong> यह अपनी <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"140\">अत्यधिक व्यवस्थित ग्रिड जल निकासी प्रणाली</strong> और हल के किसी भी मिट्टी के मॉडल की अनुपस्थिति के लिए जाना जाता है।)</em></p>\n</li>\n</ul>",
    "comp": "",

    "solution": "<p data-path-to-node=\"15\"><strong data-path-to-node=\"16,0\" data-index-in-node=\"0\">Explanation:</strong>&nbsp;Statement D is incorrect.&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"39\">Banawali</strong>&nbsp;is unique because it&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"69\">lacked a systematic drainage system</strong>. Also, a famous&nbsp;<strong data-path-to-node=\"16,0\" data-index-in-node=\"121\">terracotta model of a plough</strong>&nbsp;was actually found there, along with high-quality barley.</p>\n<h2 data-start=\"4501\" data-end=\"4545\">OTHER IMPORTANT SITES (PYQ ONE-LINERS)</h2>\n<ul data-start=\"4547\" data-end=\"5174\">\n<li data-start=\"4547\" data-end=\"4640\">\n<p data-start=\"4549\" data-end=\"4640\"><strong data-start=\"4549\" data-end=\"4592\">Rakhigarhi</strong> &ndash; <strong data-start=\"4595\" data-end=\"4624\">Largest IVC site in India</strong>, all 3 phases</p>\n</li>\n<li data-start=\"4641\" data-end=\"4725\">\n<p data-start=\"4643\" data-end=\"4725\"><strong data-start=\"4643\" data-end=\"4686\">Ropar</strong> &ndash; First post-Independence excavation</p>\n</li>\n<li data-start=\"4726\" data-end=\"4800\">\n<p data-start=\"4728\" data-end=\"4800\"><strong data-start=\"4728\" data-end=\"4771\">Surkotada</strong> &ndash; Horse bones, oval graves</p>\n</li>\n<li data-start=\"4801\" data-end=\"4867\">\n<p data-start=\"4803\" data-end=\"4867\"><strong data-start=\"4803\" data-end=\"4846\">Alamgirpur</strong> &ndash; Easternmost site</p>\n</li>\n<li data-start=\"4868\" data-end=\"4946\">\n<p data-start=\"4870\" data-end=\"4946\"><strong data-start=\"4870\" data-end=\"4913\">Daimabad</strong> &ndash; Southernmost; bronze chariot</p>\n</li>\n<li data-start=\"4947\" data-end=\"5023\">\n<p data-start=\"4949\" data-end=\"5023\"><strong data-start=\"4949\" data-end=\"4992\">Kot Diji</strong> &ndash; Pre-Harappan fortification</p>\n</li>\n<li data-start=\"5024\" data-end=\"5094\">\n<p data-start=\"5026\" data-end=\"5094\"><strong data-start=\"5026\" data-end=\"5069\">Amri</strong> &ndash; Transitional culture</p>\n</li>\n<li data-start=\"5095\" data-end=\"5174\">\n<p data-start=\"5097\" data-end=\"5174\"><strong data-start=\"5097\" data-end=\"5140\">Balakot</strong> &ndash; Early Harappan, bead industry</p>\n</li>\n</ul>\n<hr data-start=\"5176\" data-end=\"5179\" />\n<h2 data-start=\"5181\" data-end=\"5218\">🎯 SUPER-IMPORTANT PYQ LOCK POINTS</h2>\n<p data-path-to-node=\"15\"></p>\n<ul data-start=\"5220\" data-end=\"5510\">\n<li data-start=\"5220\" data-end=\"5255\">\n<p data-start=\"5222\" data-end=\"5255\"><strong data-start=\"5222\" data-end=\"5238\">Largest city</strong> &rarr; Mohenjo-daro</p>\n</li>\n<li data-start=\"5256\" data-end=\"5297\">\n<p data-start=\"5258\" data-end=\"5297\"><strong data-start=\"5258\" data-end=\"5282\">Largest site (India)</strong> &rarr; Rakhigarhi</p>\n</li>\n<li data-start=\"5298\" data-end=\"5330\">\n<p data-start=\"5300\" data-end=\"5330\"><strong data-start=\"5300\" data-end=\"5319\">Dockyard / Port</strong> &rarr; Lothal</p>\n</li>\n<li data-start=\"5331\" data-end=\"5372\">\n<p data-start=\"5333\" data-end=\"5372\"><strong data-start=\"5333\" data-end=\"5358\">Best water management</strong> &rarr; Dholavira</p>\n</li>\n<li data-start=\"5373\" data-end=\"5408\">\n<p data-start=\"5375\" data-end=\"5408\"><strong data-start=\"5375\" data-end=\"5393\">Ploughed field</strong> &rarr; Kalibangan</p>\n</li>\n<li data-start=\"5409\" data-end=\"5450\">\n<p data-start=\"5411\" data-end=\"5450\"><strong data-start=\"5411\" data-end=\"5435\">Only no-citadel city</strong> &rarr; Chanhudaro</p>\n</li>\n<li data-start=\"5451\" data-end=\"5482\">\n<p data-start=\"5453\" data-end=\"5482\"><strong data-start=\"5453\" data-end=\"5468\">Horse bones</strong> &rarr; Surkotada</p>\n</li>\n<li data-start=\"5483\" data-end=\"5510\">\n<p data-start=\"5485\" data-end=\"5510\"><strong data-start=\"5485\" data-end=\"5498\">Granaries</strong> &rarr; Harappa</p>\n</li>\n</ul>",
