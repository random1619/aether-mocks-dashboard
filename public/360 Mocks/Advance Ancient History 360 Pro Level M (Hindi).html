    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Q. Match the following IVC sites with their most distinguishing archaeological feature:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(निम्नलिखित IVC स्थलों का उनकी सबसे विशिष्ट पुरातात्विक विशेषता के साथ मिलान करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Site (स्थल)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Distinguishing Feature (विशिष्ट विशेषता)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,0,0\" data-index-in-node=\"0\">1. Dholavira (Gujarat)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,1,0\">Divided into <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,1,0\" data-index-in-node=\"13\">3 parts</strong>; Giant reservoirs and a 10-sign \"Signboard.\"</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,2,0,0\" data-index-in-node=\"0\">2. Surkotada (Gujarat)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,2,1,0\">The only site where actual <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,2,1,0\" data-index-in-node=\"27\">Horse bones</strong> have been found.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,3,0,0\" data-index-in-node=\"0\">3. Ropar (Punjab)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,3,1,0\">First site excavated after independence; <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,3,1,0\" data-index-in-node=\"41\">Dog buried with human</strong>.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,4,0,0\" data-index-in-node=\"0\">4. Rakhigarhi (Haryana)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,4,1,0\">Currently considered the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,4,1,0\" data-index-in-node=\"25\">largest IVC site in India</strong>.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,5,0,0\" data-index-in-node=\"0\">5. Daimabad (MH)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,5,1,0\">Southernmost site; famous for <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,5,1,0\" data-index-in-node=\"30\">Bronze chariot</strong> and rhino images.</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Select the correct code:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(सही कूट चुनें:)</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"23,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 4 only</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"23,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,1,0\" data-index-in-node=\"0\">B)</strong> 1, 3, and 5 only</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"23,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,2,0\" data-index-in-node=\"0\">C)</strong> All of the above (1, 2, 3, 4, and 5) are correctly matched.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"23,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,3,0\" data-index-in-node=\"0\">D)</strong> None of the above.</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to Harappan town planning and architecture, which of the following statements is/are correct?</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"112\">(हड़प्पा नगर नियोजन और वास्तुकला के संदर्भ में, निम्नलिखित में से कौन सा/से कथन सही है/हैं?)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Grid System:</strong> Harappan cities were planned on a grid pattern where streets cut each other at right angles. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"106\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"107\">ग्रिड प्रणाली:</strong> हड़प्पा के शहर एक ग्रिड पैटर्न पर नियोजित थे जहाँ सड़कें एक-दूसरे को समकोण पर काटती थीं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Standardization:</strong> Bricks used in construction followed a strict uniform ratio of <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"80\">1:2:4</strong> (thickness: width: length) across all sites. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"131\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"132\">मानकीकरण:</strong> निर्माण में उपयोग की जाने वाली ईंटें सभी स्थलों पर <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"193\">1:2:4</strong> (मोटाई: चौड़ाई: लंबाई) के सख्त समान अनुपात का पालन करती थीं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Drainage:</strong> Every house was connected to street drains, which were covered with loose bricks or limestone for cleaning access. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"125\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"126\">जल निकासी:</strong> प्रत्येक घर सड़क की नालियों से जुड़ा था, जिन्हें सफाई के लिए ढीली ईंटों या चूना पत्थर से ढका गया था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Citadel:</strong> The \"Lower Town\" was built on a mud-brick platform and contained the Great Bath, while the \"Citadel\" was where common people lived. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"141\">(<strong data-path-to-node=\"5,3,0\" data-index-in-node=\"142\">गढ़:</strong> \"निचला शहर\" मिट्टी-ईंट के चबूतरे पर बनाया गया था और इसमें विशाल स्नानागार था, जबकि \"गढ़\" वह जगह थी जहाँ आम लोग रहते थे।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Select the correct answer using the code below:</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"48\">(नीचे दिए गए कूट का प्रयोग कर सही उत्तर चुनिए:)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"8\"><strong data-path-to-node=\"9,0\" data-index-in-node=\"0\">Correction for Statement 4:</strong> The <strong data-path-to-node=\"9,0\" data-index-in-node=\"32\">Citadel</strong> (Upper Town) was on the mud-brick platform and housed public buildings like the Great Bath and Granaries; the <strong data-path-to-node=\"9,0\" data-index-in-node=\"150\">Lower Town</strong> was the residential area for common citizens.</p>\n<h1 data-start=\"252\" data-end=\"285\">🏛️ INDUS VALLEY CIVILIZATION</h1>\n<h2 data-start=\"286\" data-end=\"330\"><strong data-start=\"289\" data-end=\"328\">Polity, Society, Religion &amp; Economy</strong></h2>\n<p data-start=\"331\" data-end=\"370\"><em data-start=\"331\" data-end=\"370\">(राजनीति, समाज, धर्म और अर्थव्यवस्था)</em></p>\n<hr data-start=\"372\" data-end=\"375\" />\n<h2 data-start=\"377\" data-end=\"411\">🏗️ I. POLITY &amp; TOWN PLANNING</h2>\n<p data-start=\"412\" data-end=\"448\"><em data-start=\"412\" data-end=\"448\">(राजनीतिक व्यवस्था एवं नगर नियोजन)</em></p>\n<h3 data-start=\"450\" data-end=\"490\">🔹 Political Organisation (PYQ CORE)</h3>\n<ul data-start=\"491\" data-end=\"683\">\n<li data-start=\"491\" data-end=\"535\">\n<p data-start=\"493\" data-end=\"535\"><strong data-start=\"493\" data-end=\"518\">Centralised authority</strong> likely existed</p>\n</li>\n<li data-start=\"536\" data-end=\"683\">\n<p data-start=\"538\" data-end=\"552\">Uniformity in:</p>\n<ul data-start=\"555\" data-end=\"683\">\n<li data-start=\"555\" data-end=\"565\">\n<p data-start=\"557\" data-end=\"565\">Bricks</p>\n</li>\n<li data-start=\"568\" data-end=\"590\">\n<p data-start=\"570\" data-end=\"590\">Weights &amp; measures</p>\n</li>\n<li data-start=\"593\" data-end=\"602\">\n<p data-start=\"595\" data-end=\"602\">Seals</p>\n</li>\n<li data-start=\"605\" data-end=\"616\">\n<p data-start=\"607\" data-end=\"616\">Pottery</p>\n</li>\n<li data-start=\"619\" data-end=\"683\">\n<p data-start=\"621\" data-end=\"683\">Town planning<br data-start=\"634\" data-end=\"637\" />➡️ Indicates <strong data-start=\"650\" data-end=\"683\">strong administrative control</strong></p>\n</li>\n</ul>\n</li>\n</ul>\n<ul data-start=\"698\" data-end=\"774\">\n<li data-start=\"698\" data-end=\"736\">\n<p data-start=\"700\" data-end=\"736\">एक <strong data-start=\"703\" data-end=\"725\">केंद्रीकृत प्रशासन</strong> के संकेत</p>\n</li>\n<li data-start=\"737\" data-end=\"774\">\n<p data-start=\"739\" data-end=\"774\">समान संस्कृति &rarr; मजबूत शासन व्यवस्था</p>\n</li>\n</ul>\n<hr data-start=\"776\" data-end=\"779\" />\n<h3 data-start=\"781\" data-end=\"812\">🔹 City Layout (नगर संरचना)</h3>\n<ul data-start=\"813\" data-end=\"1007\">\n<li data-start=\"813\" data-end=\"847\">\n<p data-start=\"815\" data-end=\"847\"><strong data-start=\"815\" data-end=\"831\">Grid pattern</strong> town planning</p>\n</li>\n<li data-start=\"848\" data-end=\"887\">\n<p data-start=\"850\" data-end=\"887\">Streets intersect at <strong data-start=\"871\" data-end=\"887\">right angles</strong></p>\n</li>\n<li data-start=\"888\" data-end=\"930\">\n<p data-start=\"890\" data-end=\"930\">Town divided into <strong data-start=\"908\" data-end=\"930\">rectangular blocks</strong></p>\n</li>\n<li data-start=\"931\" data-end=\"1007\">\n<p data-start=\"933\" data-end=\"951\">Planning sequence:</p>\n<ol data-start=\"954\" data-end=\"1007\">\n<li data-start=\"954\" data-end=\"975\">\n<p data-start=\"957\" data-end=\"975\">Roads laid first</p>\n</li>\n<li data-start=\"978\" data-end=\"1007\">\n<p data-start=\"981\" data-end=\"1007\">Houses constructed later</p>\n</li>\n</ol>\n</li>\n</ul>\n<p data-start=\"1009\" data-end=\"1066\">📌 <strong data-start=\"1012\" data-end=\"1025\">UPSC PYQ:</strong> Harappans planned cities <em data-start=\"1051\" data-end=\"1059\">before</em> houses</p>\n<hr data-start=\"1068\" data-end=\"1071\" />\n<h3 data-start=\"1073\" data-end=\"1118\">🔹 Construction &amp; Bricks (VERY IMPORTANT)</h3>\n<ul data-start=\"1119\" data-end=\"1266\">\n<li data-start=\"1119\" data-end=\"1164\">\n<p data-start=\"1121\" data-end=\"1164\"><strong data-start=\"1121\" data-end=\"1137\">Burnt bricks</strong> + stone used extensively</p>\n</li>\n<li data-start=\"1165\" data-end=\"1224\">\n<p data-start=\"1167\" data-end=\"1224\">Brick ratio: <strong data-start=\"1180\" data-end=\"1193\">1 : 2 : 4</strong> (Thickness : Width : Length)</p>\n</li>\n<li data-start=\"1225\" data-end=\"1266\">\n<p data-start=\"1227\" data-end=\"1266\">Highly standardised across all cities</p>\n</li>\n</ul>\n<p data-start=\"1268\" data-end=\"1289\"><strong data-start=\"1268\" data-end=\"1289\">Comparison (PYQ):</strong></p>\n<p data-path-to-node=\"8\"></p>\n<ul data-start=\"1290\" data-end=\"1384\">\n<li data-start=\"1290\" data-end=\"1316\">\n<p data-start=\"1292\" data-end=\"1316\">Harappa &rarr; Burnt bricks</p>\n</li>\n<li data-start=\"1317\" data-end=\"1355\">\n<p data-start=\"1319\" data-end=\"1355\">Mesopotamia &rarr; Limited baked bricks</p>\n</li>\n<li data-start=\"1356\" data-end=\"1384\">\n<p data-start=\"1358\" data-end=\"1384\">Egypt &rarr; Sun-dried bricks</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"13\"><strong data-path-to-node=\"13\" data-index-in-node=\"0\">Q. Consider the following statements regarding the religious and social life of the Indus Valley Civilization:</strong> <strong data-path-to-node=\"13\" data-index-in-node=\"111\">(सिंधु घाटी सभ्यता के धार्मिक और सामाजिक जीवन के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"14\">\n<li>\n<p data-path-to-node=\"14,0,0\"><strong data-path-to-node=\"14,0,0\" data-index-in-node=\"0\">Nature of Religion:</strong> It was a secular civilization where religion existed but did not dominate; no temples have been discovered. <em data-path-to-node=\"14,0,0\" data-index-in-node=\"128\">(<strong data-path-to-node=\"14,0,0\" data-index-in-node=\"129\">धर्म की प्रकृति:</strong> यह एक धर्मनिरपेक्ष सभ्यता थी जहाँ धर्म मौजूद था लेकिन हावी नहीं था; कोई मंदिर नहीं खोजा गया है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,1,0\"><strong data-path-to-node=\"14,1,0\" data-index-in-node=\"0\">Deities:</strong> They worshipped a male deity identified as <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"52\">Pasupati Mahadeva</strong> (surrounded by animals) and a Mother Goddess symbolizing fertility. <em data-path-to-node=\"14,1,0\" data-index-in-node=\"138\">(<strong data-path-to-node=\"14,1,0\" data-index-in-node=\"139\">देवता:</strong> वे <strong data-path-to-node=\"14,1,0\" data-index-in-node=\"149\">पशुपति महादेव</strong> (जानवरों से घिरे) और उर्वरता का प्रतीक मातृ देवी की पूजा करते थे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,2,0\"><strong data-path-to-node=\"14,2,0\" data-index-in-node=\"0\">Script:</strong> The Harappan script is alphabetical and was written from left to right, similar to modern Hindi. <em data-path-to-node=\"14,2,0\" data-index-in-node=\"105\">(<strong data-path-to-node=\"14,2,0\" data-index-in-node=\"106\">लिपि:</strong> हड़प्पा की लिपि वर्णमाला आधारित है और आधुनिक हिंदी की तरह बाएं से दाएं लिखी जाती थी।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"14,3,0\"><strong data-path-to-node=\"14,3,0\" data-index-in-node=\"0\">Weights:</strong> The weighing system was highly standardized, based on a unit of <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"73\">16</strong> and its multiples. <em data-path-to-node=\"14,3,0\" data-index-in-node=\"95\">(<strong data-path-to-node=\"14,3,0\" data-index-in-node=\"96\">बाट:</strong> वजन प्रणाली अत्यधिक मानकीकृत थी, जो <strong data-path-to-node=\"14,3,0\" data-index-in-node=\"137\">16</strong> की इकाई और उसके गुणकों पर आधारित थी।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"15\"><strong data-path-to-node=\"15\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"15\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"16\">\n<li>\n<p data-path-to-node=\"16,0,0\"><strong data-path-to-node=\"16,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"16,1,0\"><strong data-path-to-node=\"16,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"16,2,0\"><strong data-path-to-node=\"16,2,0\" data-index-in-node=\"0\">C)</strong> 1, 2, and 4 only</p>\n</li>\n<li>\n<p data-path-to-node=\"16,3,0\"><strong data-path-to-node=\"16,3,0\" data-index-in-node=\"0\">D)</strong> 1 and 4 only</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"17\"><strong data-path-to-node=\"18,0\" data-index-in-node=\"0\">Explanation:</strong> Statement 3 is incorrect. The script was <strong data-path-to-node=\"18,0\" data-index-in-node=\"54\">Pictographic</strong> (not alphabetical) and written from <strong data-path-to-node=\"18,0\" data-index-in-node=\"103\">right to left</strong>. It remains undeciphered to this day.</p>\n<h3 data-start=\"1391\" data-end=\"1422\">🔹 Residential Architecture</h3>\n<ul data-start=\"1423\" data-end=\"1702\">\n<li data-start=\"1423\" data-end=\"1483\">\n<p data-start=\"1425\" data-end=\"1432\">Houses:</p>\n<ul data-start=\"1435\" data-end=\"1483\">\n<li data-start=\"1435\" data-end=\"1451\">\n<p data-start=\"1437\" data-end=\"1451\">Multi-roomed</p>\n</li>\n<li data-start=\"1454\" data-end=\"1483\">\n<p data-start=\"1456\" data-end=\"1483\">Sometimes double-storeyed</p>\n</li>\n</ul>\n</li>\n<li data-start=\"1484\" data-end=\"1529\">\n<p data-start=\"1486\" data-end=\"1529\"><strong data-start=\"1486\" data-end=\"1507\">Central courtyard</strong> &rarr; hub of daily life</p>\n</li>\n<li data-start=\"1530\" data-end=\"1567\">\n<p data-start=\"1532\" data-end=\"1567\">Bathrooms with <strong data-start=\"1547\" data-end=\"1565\">brick flooring</strong></p>\n</li>\n<li data-start=\"1568\" data-end=\"1613\">\n<p data-start=\"1570\" data-end=\"1613\">Covered drains connected to street drains</p>\n</li>\n<li data-start=\"1614\" data-end=\"1702\">\n<p data-start=\"1616\" data-end=\"1622\">Wells:</p>\n<ul data-start=\"1625\" data-end=\"1702\">\n<li data-start=\"1625\" data-end=\"1648\">\n<p data-start=\"1627\" data-end=\"1648\">Often inside houses</p>\n</li>\n<li data-start=\"1651\" data-end=\"1702\">\n<p data-start=\"1653\" data-end=\"1702\">In Kalibangan, some wells accessible from outside</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"1704\" data-end=\"1707\" />\n<h2 data-start=\"1709\" data-end=\"1760\">🚰 DRAINAGE SYSTEM (BEST IN ANCIENT WORLD &ndash; PYQ)</h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1762\" data-end=\"1999\">\n<thead data-start=\"1762\" data-end=\"1787\">\n<tr data-start=\"1762\" data-end=\"1787\">\n<th data-start=\"1762\" data-end=\"1772\" data-col-size=\"sm\">Feature</th>\n<th data-start=\"1772\" data-end=\"1787\" data-col-size=\"sm\">Description</th>\n</tr>\n</thead>\n<tbody data-start=\"1798\" data-end=\"1999\">\n<tr data-start=\"1798\" data-end=\"1838\">\n<td data-start=\"1798\" data-end=\"1813\" data-col-size=\"sm\">Connectivity</td>\n<td data-start=\"1813\" data-end=\"1838\" data-col-size=\"sm\">Every house connected</td>\n</tr>\n<tr data-start=\"1839\" data-end=\"1872\">\n<td data-start=\"1839\" data-end=\"1850\" data-col-size=\"sm\">Material</td>\n<td data-start=\"1850\" data-end=\"1872\" data-col-size=\"sm\">Brick-lined drains</td>\n</tr>\n<tr data-start=\"1873\" data-end=\"1911\">\n<td data-start=\"1873\" data-end=\"1881\" data-col-size=\"sm\">Cover</td>\n<td data-start=\"1881\" data-end=\"1911\" data-col-size=\"sm\">Loose bricks / stone slabs</td>\n</tr>\n<tr data-start=\"1912\" data-end=\"1954\">\n<td data-start=\"1912\" data-end=\"1924\" data-col-size=\"sm\">Sump pits</td>\n<td data-start=\"1924\" data-end=\"1954\" data-col-size=\"sm\">For solid waste settlement</td>\n</tr>\n<tr data-start=\"1955\" data-end=\"1999\">\n<td data-start=\"1955\" data-end=\"1966\" data-col-size=\"sm\">Cleaning</td>\n<td data-start=\"1966\" data-end=\"1999\" data-col-size=\"sm\">Inspection holes at intervals</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"2001\" data-end=\"2013\"></p>\n<ul data-start=\"2014\" data-end=\"2082\">\n<li data-start=\"2014\" data-end=\"2056\">\n<p data-start=\"2016\" data-end=\"2056\">विश्व की सबसे उन्नत जल-निकासी व्यवस्था</p>\n</li>\n<li data-start=\"2057\" data-end=\"2082\">\n<p data-start=\"2059\" data-end=\"2082\">स्वच्छता पर विशेष ध्यान</p>\n</li>\n</ul>\n<hr data-start=\"2084\" data-end=\"2087\" />\n<h2 data-start=\"2089\" data-end=\"2121\">🏰 CITADEL &amp; PUBLIC BUILDINGS</h2>\n<h3 data-start=\"2123\" data-end=\"2137\">🔹 Citadel</h3>\n<ul data-start=\"2138\" data-end=\"2289\">\n<li data-start=\"2138\" data-end=\"2178\">\n<p data-start=\"2140\" data-end=\"2178\">Built on <strong data-start=\"2149\" data-end=\"2178\">raised mud-brick platform</strong></p>\n</li>\n<li data-start=\"2179\" data-end=\"2214\">\n<p data-start=\"2181\" data-end=\"2214\">Separated from Lower Town by wall</p>\n</li>\n<li data-start=\"2215\" data-end=\"2289\">\n<p data-start=\"2217\" data-end=\"2227\">Contained:</p>\n<ul data-start=\"2230\" data-end=\"2289\">\n<li data-start=\"2230\" data-end=\"2250\">\n<p data-start=\"2232\" data-end=\"2250\">Elite residences</p>\n</li>\n<li data-start=\"2253\" data-end=\"2273\">\n<p data-start=\"2255\" data-end=\"2273\">Public buildings</p>\n</li>\n<li data-start=\"2276\" data-end=\"2289\">\n<p data-start=\"2278\" data-end=\"2289\">Granaries</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"2291\" data-end=\"2294\" />\n<h3 data-start=\"2296\" data-end=\"2328\">🔹 Great Bath (Mohenjo-daro)</h3>\n<p data-path-to-node=\"17\"></p>\n<ul data-start=\"2329\" data-end=\"2473\">\n<li data-start=\"2329\" data-end=\"2355\">\n<p data-start=\"2331\" data-end=\"2355\">Largest public structure</p>\n</li>\n<li data-start=\"2356\" data-end=\"2385\">\n<p data-start=\"2358\" data-end=\"2385\">Rectangular tank with steps</p>\n</li>\n<li data-start=\"2386\" data-end=\"2418\">\n<p data-start=\"2388\" data-end=\"2418\">Waterproofed using <strong data-start=\"2407\" data-end=\"2418\">bitumen</strong></p>\n</li>\n<li data-start=\"2419\" data-end=\"2443\">\n<p data-start=\"2421\" data-end=\"2443\">Changing rooms present</p>\n</li>\n<li data-start=\"2444\" data-end=\"2473\">\n<p data-start=\"2446\" data-end=\"2473\">Used for <strong data-start=\"2455\" data-end=\"2473\">ritual bathing</strong></p>\n</li>\n</ul>",

and Oman</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,2,0,0\" data-index-in-node=\"0\">II. Lapis Lazuli</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,2,1,0\">B. Shortughai (Afghanistan)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,3,0,0\" data-index-in-node=\"0\">III. Gold</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,3,1,0\">C. Kolar (South India) and Iran</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,4,0,0\" data-index-in-node=\"0\">IV. Tin</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"23,4,1,0\">D. Afghanistan and Iran</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"24\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"24\" data-index-in-node=\"0\">Regarding Decline (पतन के बारे में):</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"25,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,0,0\" data-index-in-node=\"0\">Meluha:</strong> Mesopotamian cuneiform inscriptions refer to the Indus region as 'Meluha'.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"25,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,1,0\" data-index-in-node=\"0\">Excluded Animal:</strong> The <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,1,0\" data-index-in-node=\"21\">Lion</strong> and the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,1,0\" data-index-in-node=\"34\">Iron</strong> metal were unknown to Harappans.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"25,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,2,0\" data-index-in-node=\"0\">Decline Theory:</strong> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,2,0\" data-index-in-node=\"16\">Wheeler</strong> proposed the \"Aryan Invasion\" theory, while <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"25,2,0\" data-index-in-node=\"68\">S.R. Rao</strong> and others suggested \"Floods and Climate Change.\"</p>\n</li>\n</ul>\n<p data-path-to-node=\"26\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26\" data-index-in-node=\"0\">Select the correct code (सही कूट चुनें):</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"27,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,0,0\" data-index-in-node=\"0\">A)</strong> Only I, II and IV are correctly matched.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"27,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,1,0\" data-index-in-node=\"0\">B)</strong> All materials (I-IV) are correctly matched; Meluha refers to Indus.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"27,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,2,0\" data-index-in-node=\"0\">C)</strong> Harappans used Iron for their weapons, leading to their decline.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"27,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,3,0\" data-index-in-node=\"0\">D)</strong> The Horse was the most common animal found on Harappan seals.</p>\n</li>\n</ul>",

    "solution": "<blockquote style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29\">\n<p data-path-to-node=\"29,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29,0\" data-index-in-node=\"0\">Key Knowledge Point:</strong>&nbsp;The&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29,0\" data-index-in-node=\"25\">Lion</strong>&nbsp;was unknown (Tiger/Elephant were common).&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29,0\" data-index-in-node=\"72\">Iron</strong>&nbsp;was unknown (it was a Bronze Age culture). Trade happened via intermediate stations like&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29,0\" data-index-in-node=\"166\">Dilmun</strong>&nbsp;(Bahrain) and&nbsp;<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"29,0\" data-index-in-node=\"187\">Makan</strong>&nbsp;(Makran Coast).</p>\n<h3 data-start=\"2534\" data-end=\"2563\">🔹 Granaries / Warehouses</h3>\n<ul data-start=\"2564\" data-end=\"2717\">\n<li data-start=\"2564\" data-end=\"2598\">\n<p data-start=\"2566\" data-end=\"2598\">Mohenjo-daro &rarr; Largest granary</p>\n</li>\n<li data-start=\"2599\" data-end=\"2624\">\n<p data-start=\"2601\" data-end=\"2624\">Harappa &rarr; 6 granaries</p>\n</li>\n<li data-start=\"2625\" data-end=\"2666\">\n<p data-start=\"2627\" data-end=\"2666\">Circular platforms &rarr; threshing floors</p>\n</li>\n<li data-start=\"2667\" data-end=\"2717\">\n<p data-start=\"2669\" data-end=\"2717\">Kalibangan &rarr; Southern brick platform = granary</p>\n</li>\n</ul>\n<hr data-start=\"2719\" data-end=\"2722\" />\n<h2 data-start=\"2724\" data-end=\"2744\">🛕 II. RELIGION</h2>\n<p data-start=\"2745\" data-end=\"2773\"><em data-start=\"2745\" data-end=\"2773\">(धार्मिक जीवन &ndash; PYQ HEAVY)</em></p>\n<h3 data-start=\"2775\" data-end=\"2800\">🔹 Nature of Religion</h3>\n<ul data-start=\"2801\" data-end=\"2907\">\n<li data-start=\"2801\" data-end=\"2841\">\n<p data-start=\"2803\" data-end=\"2841\"><strong data-start=\"2803\" data-end=\"2827\">Secular civilisation</strong> (UPSC 2011)</p>\n</li>\n<li data-start=\"2842\" data-end=\"2862\">\n<p data-start=\"2844\" data-end=\"2862\">No temples found</p>\n</li>\n<li data-start=\"2863\" data-end=\"2907\">\n<p data-start=\"2865\" data-end=\"2907\">Religion inferred from figurines &amp; seals</p>\n</li>\n</ul>\n<hr data-start=\"2909\" data-end=\"2912\" />\n<h3 data-start=\"2914\" data-end=\"2935\">🔹 Mother Goddess</h3>\n<ul data-start=\"2936\" data-end=\"3043\">\n<li data-start=\"2936\" data-end=\"2963\">\n<p data-start=\"2938\" data-end=\"2963\">Earth/Fertility goddess</p>\n</li>\n<li data-start=\"2964\" data-end=\"2988\">\n<p data-start=\"2966\" data-end=\"2988\">Terracotta figurines</p>\n</li>\n<li data-start=\"2989\" data-end=\"3043\">\n<p data-start=\"2991\" data-end=\"3043\">Plant emerging from female womb &rarr; fertility symbol</p>\n</li>\n</ul>\n<hr data-start=\"3045\" data-end=\"3048\" />\n<h3 data-start=\"3050\" data-end=\"3093\">🔹 Male Deity (Proto-Shiva / Pashupati)</h3>\n<ul data-start=\"3094\" data-end=\"3241\">\n<li data-start=\"3094\" data-end=\"3192\">\n<p data-start=\"3096\" data-end=\"3113\">Depicted on seal:</p>\n<ul data-start=\"3116\" data-end=\"3192\">\n<li data-start=\"3116\" data-end=\"3131\">\n<p data-start=\"3118\" data-end=\"3131\">Three faces</p>\n</li>\n<li data-start=\"3134\" data-end=\"3144\">\n<p data-start=\"3136\" data-end=\"3144\">Horned</p>\n</li>\n<li data-start=\"3147\" data-end=\"3164\">\n<p data-start=\"3149\" data-end=\"3164\">Yogic posture</p>\n</li>\n<li data-start=\"3167\" data-end=\"3192\">\n<p data-start=\"3169\" data-end=\"3192\">Surrounded by animals</p>\n</li>\n</ul>\n</li>\n<li data-start=\"3193\" data-end=\"3241\">\n<p data-start=\"3195\" data-end=\"3241\">Considered <strong data-start=\"3206\" data-end=\"3241\">Proto-Shiva (Pasupati Mahadeva)</strong></p>\n</li>\n</ul>\n<hr data-start=\"3243\" data-end=\"3246\" />\n<h3 data-start=\"3248\" data-end=\"3280\">🔹 Other Religious Practices</h3>\n<ul data-start=\"3281\" data-end=\"3442\">\n<li data-start=\"3281\" data-end=\"3306\">\n<p data-start=\"3283\" data-end=\"3306\">Lingam &amp; Yoni worship</p>\n</li>\n<li data-start=\"3307\" data-end=\"3336\">\n<p data-start=\"3309\" data-end=\"3336\">Animal worship (Zoolatry)</p>\n</li>\n<li data-start=\"3337\" data-end=\"3373\">\n<p data-start=\"3339\" data-end=\"3373\">Fire altars (Kalibangan, Lothal)</p>\n</li>\n<li data-start=\"3374\" data-end=\"3399\">\n<p data-start=\"3376\" data-end=\"3399\">Tree worship (Peepal)</p>\n</li>\n<li data-start=\"3400\" data-end=\"3442\">\n<p data-start=\"3402\" data-end=\"3442\">Amulets &rarr; protection from evil spirits</p>\n</li>\n</ul>\n<hr data-start=\"3444\" data-end=\"3447\" />\n<h2 data-start=\"3449\" data-end=\"3477\">✍️ III. HARAPPAN SCRIPT</h2>\n<p data-start=\"3478\" data-end=\"3494\"><em data-start=\"3478\" data-end=\"3494\">(हड़प्पा लिपि)</em></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3496\" data-end=\"3740\">\n<thead data-start=\"3496\" data-end=\"3517\">\n<tr data-start=\"3496\" data-end=\"3517\">\n<th data-start=\"3496\" data-end=\"3506\" data-col-size=\"sm\">Feature</th>\n<th data-start=\"3506\" data-end=\"3517\" data-col-size=\"sm\">Details</th>\n</tr>\n</thead>\n<tbody data-start=\"3528\" data-end=\"3740\">\n<tr data-start=\"3528\" data-end=\"3567\">\n<td data-start=\"3528\" data-end=\"3544\" data-col-size=\"sm\">Oldest script</td>\n<td data-start=\"3544\" data-end=\"3567\" data-col-size=\"sm\">Indian subcontinent</td>\n</tr>\n<tr data-start=\"3568\" data-end=\"3597\">\n<td data-start=\"3568\" data-end=\"3580\" data-col-size=\"sm\">Direction</td>\n<td data-start=\"3580\" data-end=\"3597\" data-col-size=\"sm\">Right to Left</td>\n</tr>\n<tr data-start=\"3598\" data-end=\"3639\">\n<td data-start=\"3598\" data-end=\"3607\" data-col-size=\"sm\">Nature</td>\n<td data-start=\"3607\" data-end=\"3639\" data-col-size=\"sm\">Pictographic (250&ndash;400 signs)</td>\n</tr>\n<tr data-start=\"3640\" data-end=\"3673\">\n<td data-start=\"3640\" data-end=\"3655\" data-col-size=\"sm\">Decipherment</td>\n<td data-start=\"3655\" data-end=\"3673\" data-col-size=\"sm\">Not deciphered</td>\n</tr>\n<tr data-start=\"3674\" data-end=\"3714\">\n<td data-start=\"3674\" data-end=\"3689\" data-col-size=\"sm\">Inscriptions</td>\n<td data-start=\"3689\" data-end=\"3714\" data-col-size=\"sm\">Short (max ~26 signs)</td>\n</tr>\n<tr data-start=\"3715\" data-end=\"3740\">\n<td data-start=\"3715\" data-end=\"3724\" data-col-size=\"sm\">Medium</td>\n<td data-start=\"3724\" data-end=\"3740\" data-col-size=\"sm\">Mostly seals</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"3742\" data-end=\"3789\">📌 <strong data-start=\"3745\" data-end=\"3757\">SSC PYQ:</strong> Script was <strong data-start=\"3769\" data-end=\"3789\">not alphabetical</strong></p>\n<hr data-start=\"3791\" data-end=\"3794\" />\n<h2 data-start=\"3796\" data-end=\"3824\">⚖️ IV. WEIGHTS &amp; MEASURES</h2>\n<ul data-start=\"3826\" data-end=\"4003\">\n<li data-start=\"3826\" data-end=\"3851\">\n<p data-start=\"3828\" data-end=\"3851\">Made of <strong data-start=\"3836\" data-end=\"3851\">chert stone</strong></p>\n</li>\n<li data-start=\"3852\" data-end=\"3871\">\n<p data-start=\"3854\" data-end=\"3871\">Cubical, unmarked</p>\n</li>\n<li data-start=\"3872\" data-end=\"3921\">\n<p data-start=\"3874\" data-end=\"3921\"><strong data-start=\"3874\" data-end=\"3891\">Binary system</strong> used:<br data-start=\"3897\" data-end=\"3900\" />1, 2, 4, 8, 16, 32&hellip;</p>\n</li>\n<li data-start=\"3922\" data-end=\"3959\">\n<p data-start=\"3924\" data-end=\"3959\">Weight units in multiples of <strong data-start=\"3953\" data-end=\"3959\">16</strong></p>\n</li>\n<li data-start=\"3960\" data-end=\"4003\">\n<p data-start=\"3962\" data-end=\"3978\">Measuring scale:</p>\n<ul data-start=\"3981\" data-end=\"4003\">\n<li data-start=\"3981\" data-end=\"4003\">\n<p data-start=\"3983\" data-end=\"4003\">1 inch &asymp; <strong data-start=\"3992\" data-end=\"4003\">1.75 cm</strong></p>\n</li>\n</ul>\n</li>\n</ul>\n<p data-start=\"4005\" data-end=\"4038\">📌 Continuity: 16 annas = 1 rupee</p>\n<hr data-start=\"4040\" data-end=\"4043\" />\n<h2 data-start=\"4045\" data-end=\"4073\">👥 V. SOCIETY &amp; LIFESTYLE</h2>\n<h3 data-start=\"4075\" data-end=\"4098\">🔹 Social Structure</h3>\n<ul data-start=\"4099\" data-end=\"4220\">\n<li data-start=\"4099\" data-end=\"4124\">\n<p data-start=\"4101\" data-end=\"4124\">Predominantly <strong data-start=\"4115\" data-end=\"4124\">urban</strong></p>\n</li>\n<li data-start=\"4125\" data-end=\"4149\">\n<p data-start=\"4127\" data-end=\"4149\">Middle-class dominance</p>\n</li>\n<li data-start=\"4150\" data-end=\"4220\">\n<p data-start=\"4152\" data-end=\"4166\">Social groups:</p>\n<ol data-start=\"4169\" data-end=\"4220\">\n<li data-start=\"4169\" data-end=\"4186\">\n<p data-start=\"4172\" data-end=\"4186\">Ruling elite</p>\n</li>\n<li data-start=\"4189\" data-end=\"4203\">\n<p data-start=\"4192\" data-end=\"4203\">Merchants</p>\n</li>\n<li data-start=\"4206\" data-end=\"4220\">\n<p data-start=\"4209\" data-end=\"4220\">Labourers</p>\n</li>\n</ol>\n</li>\n</ul>\n<hr data-start=\"4222\" data-end=\"4225\" />\n<h3 data-start=\"4227\" data-end=\"4250\">🔹 Burial Practices</h3>\n<ul data-start=\"4251\" data-end=\"4448\">\n<li data-start=\"4251\" data-end=\"4273\">\n<p data-start=\"4253\" data-end=\"4273\">Pit burials common</p>\n</li>\n<li data-start=\"4274\" data-end=\"4301\">\n<p data-start=\"4276\" data-end=\"4301\">Brick-lined graves (some)</p>\n</li>\n<li data-start=\"4302\" data-end=\"4372\">\n<p data-start=\"4304\" data-end=\"4316\">Grave goods:</p>\n<ul data-start=\"4319\" data-end=\"4372\">\n<li data-start=\"4319\" data-end=\"4330\">\n<p data-start=\"4321\" data-end=\"4330\">Pottery</p>\n</li>\n<li data-start=\"4333\" data-end=\"4346\">\n<p data-start=\"4335\" data-end=\"4346\">Jewellery</p>\n</li>\n<li data-start=\"4349\" data-end=\"4360\">\n<p data-start=\"4351\" data-end=\"4360\">Mirrors</p>\n</li>\n<li data-start=\"4363\" data-end=\"4372\">\n<p data-start=\"4365\" data-end=\"4372\">Beads</p>\n</li>\n</ul>\n</li>\n<li data-start=\"4373\" data-end=\"4405\">\n<p data-start=\"4375\" data-end=\"4405\">Belief in <strong data-start=\"4385\" data-end=\"4405\">life after death</strong></p>\n</li>\n<li data-start=\"4406\" data-end=\"4448\">\n<p data-start=\"4408\" data-end=\"4448\">Both men &amp; women buried with ornaments</p>\n</li>\n</ul>\n<hr data-start=\"4450\" data-end=\"4453\" />\n<h3 data-start=\"4455\" data-end=\"4479\">🔹 Dress &amp; Cosmetics</h3>\n<ul data-start=\"4480\" data-end=\"4597\">\n<li data-start=\"4480\" data-end=\"4519\">\n<p data-start=\"4482\" data-end=\"4519\">Clothing similar to <strong data-start=\"4502\" data-end=\"4519\">dhoti &amp; shawl</strong></p>\n</li>\n<li data-start=\"4520\" data-end=\"4597\">\n<p data-start=\"4522\" data-end=\"4532\">Cosmetics:</p>\n<ul data-start=\"4535\" data-end=\"4597\">\n<li data-start=\"4535\" data-end=\"4547\">\n<p data-start=\"4537\" data-end=\"4547\">Cinnabar</p>\n</li>\n<li data-start=\"4550\" data-end=\"4570\">\n<p data-start=\"4552\" data-end=\"4570\">Collyrium (kohl)</p>\n</li>\n<li data-start=\"4573\" data-end=\"4597\">\n<p data-start=\"4575\" data-end=\"4597\">Face paint, lipstick</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"4599\" data-end=\"4602\" />\n<h2 data-start=\"4604\" data-end=\"4648\">🌾 VI. AGRICULTURE &amp; ANIMAL DOMESTICATION</h2>\n<h3 data-start=\"4650\" data-end=\"4662\">🔹 Crops</h3>\n<ul data-start=\"4663\" data-end=\"4735\">\n<li data-start=\"4663\" data-end=\"4680\">\n<p data-start=\"4665\" data-end=\"4680\">Wheat, barley</p>\n</li>\n<li data-start=\"4681\" data-end=\"4703\">\n<p data-start=\"4683\" data-end=\"4703\">Lentils, chickpeas</p>\n</li>\n<li data-start=\"4704\" data-end=\"4723\">\n<p data-start=\"4706\" data-end=\"4723\">Sesame, mustard</p>\n</li>\n<li data-start=\"4724\" data-end=\"4735\">\n<p data-start=\"4726\" data-end=\"4735\">Millets</p>\n</li>\n</ul>\n<h3 data-start=\"4737\" data-end=\"4767\">🔹 Agricultural Technology</h3>\n<ul data-start=\"4768\" data-end=\"4874\">\n<li data-start=\"4768\" data-end=\"4798\">\n<p data-start=\"4770\" data-end=\"4798\">Wooden plough (animal-drawn)</p>\n</li>\n<li data-start=\"4799\" data-end=\"4814\">\n<p data-start=\"4801\" data-end=\"4814\">Stone sickles</p>\n</li>\n<li data-start=\"4815\" data-end=\"4840\">\n<p data-start=\"4817\" data-end=\"4840\">Canal + well irrigation</p>\n</li>\n<li data-start=\"4841\" data-end=\"4874\">\n<p data-start=\"4843\" data-end=\"4874\">Granaries &rarr; tax storage &amp; wages</p>\n</li>\n</ul>\n<hr data-start=\"4876\" data-end=\"4879\" />\n<h3 data-start=\"4881\" data-end=\"4913\">🔹 Key Agricultural Evidence</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4915\" data-end=\"5032\">\n<thead data-start=\"4915\" data-end=\"4934\">\n<tr data-start=\"4915\" data-end=\"4934\">\n<th data-start=\"4915\" data-end=\"4926\" data-col-size=\"sm\">Evidence</th>\n<th data-start=\"4926\" data-end=\"4934\" data-col-size=\"sm\">Site</th>\n</tr>\n</thead>\n<tbody data-start=\"4945\" data-end=\"5032\">\n<tr data-start=\"4945\" data-end=\"4976\">\n<td data-start=\"4945\" data-end=\"4962\" data-col-size=\"sm\">Ploughed field</td>\n<td data-start=\"4962\" data-end=\"4976\" data-col-size=\"sm\">Kalibangan</td>\n</tr>\n<tr data-start=\"4977\" data-end=\"5003\">\n<td data-start=\"4977\" data-end=\"4984\" data-col-size=\"sm\">Rice</td>\n<td data-start=\"4984\" data-end=\"5003\" data-col-size=\"sm\">Lothal, Rangpur</td>\n</tr>\n<tr data-start=\"5004\" data-end=\"5032\">\n<td data-start=\"5004\" data-end=\"5020\" data-col-size=\"sm\">Plough models</td>\n<td data-start=\"5020\" data-end=\"5032\" data-col-size=\"sm\">Banawali</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"5034\" data-end=\"5037\" />\n<h3 data-start=\"5039\" data-end=\"5066\">🔹 Animal Domestication</h3>\n<p data-start=\"5068\" data-end=\"5085\"><strong data-start=\"5068\" data-end=\"5085\">Domesticated:</strong></p>\n<ul data-start=\"5086\" data-end=\"5160\">\n<li data-start=\"5086\" data-end=\"5114\">\n<p data-start=\"5088\" data-end=\"5114\">Zebu cattle, ox, buffalo</p>\n</li>\n<li data-start=\"5115\" data-end=\"5135\">\n<p data-start=\"5117\" data-end=\"5135\">Sheep, goat, pig</p>\n</li>\n<li data-start=\"5136\" data-end=\"5160\">\n<p data-start=\"5138\" data-end=\"5160\">Dog, cat, camel, ass</p>\n</li>\n</ul>\n<p data-start=\"5162\" data-end=\"5185\"><strong data-start=\"5162\" data-end=\"5185\">Wild animals known:</strong></p>\n<ul data-start=\"5186\" data-end=\"5222\">\n<li data-start=\"5186\" data-end=\"5222\">\n<p data-start=\"5188\" data-end=\"5222\">Elephant, rhinoceros, deer, boar</p>\n</li>\n</ul>\n<p data-start=\"5224\" data-end=\"5308\">❌ <strong data-start=\"5226\" data-end=\"5240\">Not known:</strong> Lion<br data-start=\"5245\" data-end=\"5248\" />⚠️ <strong data-start=\"5251\" data-end=\"5261\">Horse:</strong> Not primary; limited late evidence (Surkotada)</p>\n<hr data-start=\"5310\" data-end=\"5313\" />\n<h2 data-start=\"5315\" data-end=\"5342\">🚢 VII. TRADE &amp; COMMERCE</h2>\n<h3 data-start=\"5344\" data-end=\"5364\">🔹 Trade Network</h3>\n<ul data-start=\"5365\" data-end=\"5527\">\n<li data-start=\"5365\" data-end=\"5406\">\n<p data-start=\"5367\" data-end=\"5406\">Extensive <strong data-start=\"5377\" data-end=\"5406\">internal &amp; external trade</strong></p>\n</li>\n<li data-start=\"5407\" data-end=\"5457\">\n<p data-start=\"5409\" data-end=\"5457\">Indus region = <strong data-start=\"5424\" data-end=\"5434\">Meluha</strong> (Mesopotamian records)</p>\n</li>\n<li data-start=\"5458\" data-end=\"5527\">\n<p data-start=\"5460\" data-end=\"5479\">Intermediate ports:</p>\n<ul data-start=\"5482\" data-end=\"5527\">\n<li data-start=\"5482\" data-end=\"5502\">\n<p data-start=\"5484\" data-end=\"5502\">Dilmun (Bahrain)</p>\n</li>\n<li data-start=\"5505\" data-end=\"5527\">\n<p data-start=\"5507\" data-end=\"5527\">Makan (Makran coast)</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"5529\" data-end=\"5532\" />\n<h3 data-start=\"5534\" data-end=\"5550\">🔹 Transport</h3>\n<ul data-start=\"5551\" data-end=\"5633\">\n<li data-start=\"5551\" data-end=\"5587\">\n<p data-start=\"5553\" data-end=\"5587\">Land: Bullock carts (solid wheels)</p>\n</li>\n<li data-start=\"5588\" data-end=\"5610\">\n<p data-start=\"5590\" data-end=\"5610\">Water: Boats &amp; ships</p>\n</li>\n<li data-start=\"5611\" data-end=\"5633\">\n<p data-start=\"5613\" data-end=\"5633\">Dockyard: <strong data-start=\"5623\" data-end=\"5633\">Lothal</strong></p>\n</li>\n</ul>\n<hr data-start=\"5635\" data-end=\"5638\" />\n<h3 data-start=\"5640\" data-end=\"5654\">🔹 Economy</h3>\n<ul data-start=\"5655\" data-end=\"5697\">\n<li data-start=\"5655\" data-end=\"5674\">\n<p data-start=\"5657\" data-end=\"5674\"><strong data-start=\"5657\" data-end=\"5674\">Barter system</strong></p>\n</li>\n<li data-start=\"5675\" data-end=\"5697\">\n<p data-start=\"5677\" data-end=\"5697\">No metallic currency</p>\n</li>\n</ul>\n<hr data-start=\"5699\" data-end=\"5702\" />\n<h3 data-start=\"5704\" data-end=\"5730\">🔹 Imports (PYQ TABLE)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5732\" data-end=\"5984\">\n<thead data-st     "question": "<p data-path-to-node=\"3\"><strong data-path-to-node=\"3\" data-index-in-node=\"0\">Q. With reference to Vedic literature, consider the following statements:</strong> <strong data-path-to-node=\"3\" data-index-in-node=\"74\">(वैदिक साहित्य के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"4\">\n<li>\n<p data-path-to-node=\"4,0,0\">The <em data-path-to-node=\"4,0,0\" data-index-in-node=\"4\">Rigveda</em>, <em data-path-to-node=\"4,0,0\" data-index-in-node=\"13\">Samaveda</em>, and <em data-path-to-node=\"4,0,0\" data-index-in-node=\"27\">Yajurveda</em> are collectively known as <strong data-path-to-node=\"4,0,0\" data-index-in-node=\"63\">'Vedatrayi'</strong>. (<em data-path-to-node=\"4,0,0\" data-index-in-node=\"77\">ऋग्वेद, सामवेद और यजुर्वेद को सामूहिक रूप से <strong data-path-to-node=\"4,0,0\" data-index-in-node=\"122\">'वेदत्रयी'</strong> कहा जाता है।</em>)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,1,0\"><strong data-path-to-node=\"4,1,0\" data-index-in-node=\"0\">Upanishads</strong> are also called 'Vedanta' and primarily deal with philosophical mysteries like the soul and nature. (<em data-path-to-node=\"4,1,0\" data-index-in-node=\"112\">उपनिषदों को 'वेदांत' भी कहा जाता है और ये मुख्य रूप से आत्मा और प्रकृति जैसे दार्शनिक रहस्यों से संबंधित हैं।</em>)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,2,0\"><strong data-path-to-node=\"4,2,0\" data-index-in-node=\"0\">Mundaka Upanishad</strong> is the source of India's national motto, 'Satyamev Jayate'. (<em data-path-to-node=\"4,2,0\" data-index-in-node=\"79\">भारत के राष्ट्रीय आदर्श वाक्य, 'सत्यमेव जयते' का स्रोत मुण्डकोपनिषद है।</em>)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,3,0\"><strong data-path-to-node=\"4,3,0\" data-index-in-node=\"0\">Shilp Veda</strong> is the Upaveda of the Rigveda, dealing with the art of medicine. (<em data-path-to-node=\"4,3,0\" data-index-in-node=\"77\">शिल्प वेद ऋग्वेद का उपवेद है, जो चिकित्सा की कला से संबंधित है।</em>)</p>\n</li>\n</ol>\n<p data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"5\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong> A) 1, 2, and 4 only B) 1, 2, and 3 only C) 2, 3, and 4 only D) All of the above</p>",

    "solution": "<p data-path-to-node=\"13\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><span style=\"font-family: 'Noto Sans';\">Quick Fact: The Battle of Ten Kings (Dashrajana) was fought on the banks of the Parushni (Ravi) river, where Sudas emerged victorious.</span></p>\n<p style=\"line-height: 1.15 !important;\">(त्वरित तथ्य: दस राजाओं का युद्ध (दशराज्ञ युद्ध) परुष्णी (रावी) नदी के तट पर लड़ा गया था, जिसमें सुदास विजयी हुआ था।)</p>\n<h3 data-start=\"2327\" data-end=\"2362\">D. UPAVEDAS (APPLIED KNOWLEDGE)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2364\" data-end=\"2570\">\n<thead data-start=\"2364\" data-end=\"2400\">\n<tr data-start=\"2364\" data-end=\"2400\">\n<th data-start=\"2364\" data-end=\"2374\" data-col-size=\"sm\">Upaveda</th>\n<th data-start=\"2374\" data-end=\"2389\" data-col-size=\"sm\">Related Veda</th>\n<th data-start=\"2389\" data-end=\"2400\" data-col-size=\"sm\">Subject</th>\n</tr>\n</thead>\n<tbody data-start=\"2415\" data-end=\"2570\">\n<tr data-start=\"2415\" data-end=\"2449\">\n<td data-start=\"2415\" data-end=\"2426\" data-col-size=\"sm\">Ayurveda</td>\n<td data-start=\"2426\" data-end=\"2437\" data-col-size=\"sm\">Rig Veda</td>\n<td data-start=\"2437\" data-end=\"2449\" data-col-size=\"sm\">Medicine</td>\n</tr>\n<tr data-start=\"2450\" data-end=\"2487\">\n<td data-start=\"2450\" data-end=\"2463\" data-col-size=\"sm\">Dhanurveda</td>\n<td data-start=\"2463\" data-end=\"2476\" data-col-size=\"sm\">Yajur Veda</td>\n<td data-start=\"2476\" data-end=\"2487\" data-col-size=\"sm\">Warfare</td>\n</tr>\n<tr data-start=\"2488\" data-end=\"2525\">\n<td data-start=\"2488\" data-end=\"2504\" data-col-size=\"sm\">Gandharvaveda</td>\n<td data-start=\"2504\" data-end=\"2516\" data-col-size=\"sm\">Sama Veda</td>\n<td data-start=\"2516\" data-end=\"2525\" data-col-size=\"sm\">Music</td>\n</tr>\n<tr data-start=\"2526\" data-end=\"2570\">\n<td data-start=\"2526\" data-end=\"2539\" data-col-size=\"sm\">Shilpaveda</td>\n<td data-start=\"2539\" data-end=\"2554\" data-col-size=\"sm\">Atharva Veda</td>\n<td data-start=\"2554\" data-end=\"2570\" data-col-size=\"sm\">Architecture</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2572\" data-end=\"2575\" />\n<h3 data-start=\"2577\" data-end=\"2616\">E. IMPORTANT UPANISHADS (PYQ HEAVY)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2618\" data-end=\"2828\">\n<thead data-start=\"2618\" data-end=\"2643\">\n<tr data-start=\"2618\" data-end=\"2643\">\n<th data-start=\"2618\" data-end=\"2630\" data-col-size=\"sm\">Upanishad</th>\n<th data-start=\"2630\" data-end=\"2643\" data-col-size=\"md\">Key Facts</th>\n</tr>\n</thead>\n<tbody data-start=\"2654\" data-end=\"2828\">\n<tr data-start=\"2654\" data-end=\"2720\">\n<td data-start=\"2654\" data-end=\"2675\" data-col-size=\"sm\"><strong data-start=\"2656\" data-end=\"2674\">Brihadaranyaka</strong></td>\n<td data-start=\"2675\" data-end=\"2720\" data-col-size=\"md\">Oldest; Yajur Veda; &ldquo;तमसो मा ज्योतिर्गमय&rdquo;</td>\n</tr>\n<tr data-start=\"2721\" data-end=\"2795\">\n<td data-start=\"2721\" data-end=\"2737\" data-col-size=\"sm\"><strong data-start=\"2723\" data-end=\"2736\">Chandogya</strong></td>\n<td data-start=\"2737\" data-end=\"2795\" data-col-size=\"md\">Sama Veda; first mention of <strong data-start=\"2767\" data-end=\"2793\">Krishna (Devaki-putra)</strong></td>\n</tr>\n<tr data-start=\"2796\" data-end=\"2828\">\n<td data-start=\"2796\" data-end=\"2810\" data-col-size=\"sm\"><strong data-start=\"2798\" data-end=\"2809\">Mundaka</strong></td>\n<td data-start=\"2810\" data-end=\"2828\" data-col-size=\"md\">&ldquo;सत्यमेव जयते&rdquo;</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"2830\" data-end=\"2887\">📌 Total Upanishads: <strong data-start=\"2851\" data-end=\"2858\">108</strong><br data-start=\"2858\" data-end=\"2861\" />📌 Also called <strong data-start=\"2876\" data-end=\"2887\">Vedanta</strong></p>\n<hr data-start=\"2889\" data-end=\"2892\" />\n<h3 data-start=\"2894\" data-end=\"2936\">F. NON-INDIAN SOURCES (VERY IMPORTANT)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2938\" data-end=\"3186\">\n<thead data-start=\"2938\" data-end=\"2963\">\n<tr data-start=\"2938\" data-end=\"2963\">\n<th data-start=\"2938\" data-end=\"2947\" data-col-size=\"sm\">Source</th>\n<th data-start=\"2947\" data-end=\"2963\" data-col-size=\"sm\">Significance</th>\n</tr>\n</thead>\n<tbody data-start=\"2974\" data-end=\"3186\">\n<tr data-start=\"2974\" data-end=\"3029\">\n<td data-start=\"2974\" data-end=\"2988\" data-col-size=\"sm\">Zend Avesta</td>\n<td data-start=\"2988\" data-end=\"3029\" data-col-size=\"sm\">Indo-Iranian similarity (Ahura&ndash;Asura)</td>\n</tr>\n<tr data-start=\"3030\" data-end=\"3090\">\n<td data-start=\"3030\" data-end=\"3054\" data-col-size=\"sm\">Boghazkoi Inscription</td>\n<td data-start=\"3054\" data-end=\"3090\" data-col-size=\"sm\">Oldest mention of <strong data-start=\"3074\" data-end=\"3088\">Vedic gods</strong></td>\n</tr>\n<tr data-start=\"3091\" data-end=\"3125\">\n<td data-start=\"3091\" data-end=\"3110\" data-col-size=\"sm\">Mitanni, Kassite</td>\n<td data-start=\"3110\" data-end=\"3125\" data-col-size=\"sm\">Aryan names</td>\n</tr>\n<tr data-start=\"3126\" data-end=\"3186\">\n<td data-start=\"3126\" data-end=\"3146\" data-col-size=\"sm\">Andronovo Culture</td>\n<td data-start=\"3146\" data-end=\"3186\" data-col-size=\"sm\">Archaeological evidence of migration</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"3188\" data-end=\"3191\" />\n<h2 data-start=\"3193\" data-end=\"3222\">IV. INDO-ARYANS &amp; ORIGIN</h2>\n<p data-start=\"3223\" data-end=\"3249\"><em data-start=\"3223\" data-end=\"3249\">(आर्य एवं उनकी उत्पत्ति)</em></p>\n<h3 data-start=\"3251\" data-end=\"3274\">🔹 Who were Aryans?</h3>\n<ul data-start=\"3275\" data-end=\"3372\">\n<li data-start=\"3275\" data-end=\"3315\">\n<p data-start=\"3277\" data-end=\"3315\">Linguistic group (Indo-Iranian branch)</p>\n</li>\n<li data-start=\"3316\" data-end=\"3345\">\n<p data-start=\"3318\" data-end=\"3345\">Horse-riders, chariot users</p>\n</li>\n<li data-start=\"3346\" data-end=\"3372\">\n<p data-start=\"3348\" data-end=\"3372\">Used <strong data-start=\"3353\" data-end=\"3363\">Varman</strong> (armour)</p>\n</li>\n</ul>\n<p data-start=\"3374\" data-end=\"3416\">📌 &ldquo;Arya&rdquo; appears <strong data-start=\"3392\" data-end=\"3404\">36 times</strong> in Rig Veda</p>\n<hr data-start=\"3418\" data-end=\"3421\" />\n<h3 data-start=\"3423\" data-end=\"3466\">🔹 THEORIES OF ORIGINAL HOME (UPSC FAV)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3468\" data-end=\"3648\">\n<thead data-start=\"3468\" data-end=\"3488\">\n<tr data-start=\"3468\" data-end=\"3488\">\n<th data-start=\"3468\" data-end=\"3477\" data-col-size=\"sm\">Theory</th>\n<th data-start=\"3477\" data-end=\"3488\" data-col-size=\"sm\">Scholar</th>\n</tr>\n</thead>\n<tbody data-start=\"3499\" data-end=\"3648\">\n<tr data-start=\"3499\" data-end=\"3528\">\n<td data-start=\"3499\" data-end=\"3514\" data-col-size=\"sm\">Central Asia</td>\n<td data-start=\"3514\" data-end=\"3528\" data-col-size=\"sm\">Max M&uuml;ller</td>\n</tr>\n<tr data-start=\"3529\" data-end=\"3557\">\n<td data-start=\"3529\" data-end=\"3540\" data-col-size=\"sm\">European</td>\n<td data-start=\"3540\" data-end=\"3557\" data-col-size=\"sm\">William Jones</td>\n</tr>\n<tr data-start=\"3558\" data-end=\"3581\">\n<td data-start=\"3558\" data-end=\"3567\" data-col-size=\"sm\">Arctic</td>\n<td data-start=\"3567\" data-end=\"3581\" data-col-size=\"sm\">B.G. Tilak</td>\n</tr>\n<tr data-start=\"3582\" data-end=\"3612\">\n<td data-start=\"3582\" data-end=\"3590\" data-col-size=\"sm\">Tibet</td>\n<td data-start=\"3590\" data-end=\"3612\" data-col-size=\"sm\">Dayanand Saraswati</td>\n</tr>\n<tr data-start=\"3613\" data-end=\"3648\">\n<td data-start=\"3613\" data-end=\"3622\" data-col-size=\"sm\">Indian</td>\n<td data-start=\"3622\" data-end=\"3648\" data-col-size=\"sm\">Sampurnanand, A.C. Das</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"3650\" data-end=\"3653\" />\n<h2 data-start=\"3655\" data-end=\"3706\">V. EARLY VEDIC / RIG VEDIC PERIOD (1500&ndash;1000 BC)</h2>\n<hr data-start=\"3708\" data-end=\"3711\" />\n<h3 data-start=\"3713\" data-end=\"3756\">A. <strong data-start=\"3720\" data-end=\"3756\">RIG VEDA &ndash; CORE FACTS (PYQ GOLD)</strong></h3>\n<ul data-start=\"3758\" data-end=\"3889\">\n<li data-start=\"3758\" data-end=\"3791\">\n<p data-start=\"3760\" data-end=\"3791\"><strong data-start=\"3760\" data-end=\"3774\">1028 hymns</strong>, <strong data-start=\"3776\" data-end=\"3791\">10 Mandalas</strong></p>\n</li>\n<li data-start=\"3792\" data-end=\"3826\">\n<p data-start=\"3794\" data-end=\"3826\">Oldest religious text of mankind</p>\n</li>\n<li data-start=\"3827\" data-end=\"3858\">\n<p data-start=\"3829\" data-end=\"3858\">Written in <strong data-start=\"3840\" data-end=\"3858\">Vedic Sanskrit</strong></p>\n</li>\n<li data-start=\"3859\" data-end=\"3889\">\n<p data-start=\"3861\" data-end=\"3889\">Prayers recited by <strong data-start=\"3880\" data-end=\"3889\">Hotri</strong></p>\n</li>\n</ul>\n<p data-start=\"3891\" data-end=\"3948\">📌 <strong data-start=\"3894\" data-end=\"3914\">Oldest Mandalas:</strong> 2&ndash;7<br data-start=\"3918\" data-end=\"3921\" />📌 <strong data-start=\"3924\" data-end=\"3935\">Newest:</strong> 10th Mandala</p>\n<hr data-start=\"3950\" data-end=\"3953\" />\n<h4 data-start=\"3955\" data-end=\"3978\">IMPORTANT MANDALAS</h4>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3980\" data-end=\"4190\">\n<thead data-start=\"3980\" data-end=\"4004\">\n<tr data-start=\"3980\" data-end=\"4004\">\n<th data-start=\"3980\" data-end=\"3990\" data-col-size=\"sm\">Mandala</th>\n<th data-start=\"3990\" data-end=\"4004\" data-col-size=\"sm\">Importance</th>\n</tr>\n</thead>\n<tbody data-start=\"4015\" data-end=\"4190\">\n<tr data-start=\"4015\" data-end=\"4067\">\n<td data-start=\"4015\" data-end=\"4021\" data-col-size=\"sm\">3rd</td>\n<td data-start=\"4021\" data-end=\"4067\" data-col-size=\"sm\"><strong data-start=\"4023\" data-end=\"4041\">Gayatri Mantra</strong> (Vishwamitra &rarr; Savitri)</td>\n</tr>\n<tr data-start=\"4068\" data-end=\"4101\">\n<td data-start=\"4068\" data-end=\"4074\" data-col-size=\"sm\">7th</td>\n<td data-start=\"4074\" data-end=\"4101\" data-col-size=\"sm\"><strong data-start=\"4076\" data-end=\"4099\">Battle of Ten Kings</strong></td>\n</tr>\n<tr data-start=\"4102\" data-end=\"4133\">\n<td data-start=\"4102\" data-end=\"4108\" data-col-size=\"sm\">9th</td>\n<td data-start=\"4108\" data-end=\"4133\" data-col-size=\"sm\">Dedicated to <strong data-start=\"4123\" data-end=\"4131\">Soma</strong></td>\n</tr>\n<tr data-start=\"4134\" data-end=\"4190\">\n<td data-start=\"4134\" data-end=\"4141\" data-col-size=\"sm\">10th</td>\n<td data-start=\"4141\" data-end=\"4190\" data-col-size=\"sm\"><strong data-start=\"4143\" data-end=\"4160\">Purusha Sukta</strong>, <strong data-start=\"4162\" data-end=\"4176\">Nadi Sukta</strong> (25 rivers)</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"4192\" data-end=\"4231\">📌 First line: <strong data-start=\"4207\" data-end=\"4231\">&ldquo;Agnimile Purohitam&rdquo;</strong></p>\n<hr data-start=\"4233\" data-end=\"4236\" />\n<h3 data-start=\"4238\" data-end=\"4266\">B. GEOGRAPHICAL EXTENT</h3>\n<p data-start=\"4267\" data-end=\"4288\"><em data-start=\"4267\" data-end=\"4288\">(सप्तसिंधु क्षेत्र)</em></p>\n<ul data-start=\"4290\" data-end=\"4496\">\n<li data-start=\"4290\" data-end=\"4315\">\n<p data-start=\"4292\" data-end=\"4315\">Region: <strong data-start=\"4300\" data-end=\"4315\">Saptasindhu</strong></p>\n</li>\n<li data-start=\"4316\" data-end=\"4496\">\n<p data-start=\"4318\" data-end=\"4325\">Rivers:</p>\n<ul data-start=\"4328\" data-end=\"4496\">\n<li data-start=\"4328\" data-end=\"4361\">\n<p data-start=\"4330\" data-end=\"4361\">Sindhu (Indus &ndash; most mentioned)</p>\n</li>\n<li data-start=\"4364\" data-end=\"4396\">\n<p data-start=\"4366\" data-end=\"4396\">Saraswati (Naditama &ndash; holiest)</p>\n</li>\n<li data-start=\"4399\" data-end=\"4417\">\n<p data-start=\"4401\" data-end=\"4417\">Jhelum (Vitasta)</p>\n</li>\n<li data-start=\"4420\" data-end=\"4437\">\n<p data-start=\"4422\" data-end=\"4437\">Chenab (Askini)</p>\n</li>\n<li data-start=\"4440\" data-end=\"4457\">\n<p data-start=\"4442\" data-end=\"4457\">Ravi (Parushni)</p>\n</li>\n<li data-start=\"4460\" data-end=\"4475\">\n<p data-start=\"4462\" data-end=\"4475\">Beas (Vipasa)</p>\n</li>\n<li data-start=\"4478\" data-end=\"4496\">\n<p data-start=\"4480\" data-end=\"4496\">Sutlej (Sutudri)</p>\n</li>\n</ul>\n</li>\n</ul>\n<p data-start=\"4498\" data-end=\"4543\">📌 <strong data-start=\"4501\" data-end=\"4512\">Samudra</strong> = collection of water, not sea</p>\n<hr data-start=\"4545\" data-end=\"4548\" />\n<h3 data-start=\"4550\" data-end=\"4581\">C. POLITICAL ORGANISATION</h3>\n<p data-start=\"4582\" data-end=\"4603\"><em data-start=\"4582\" data-end=\"4603\">(राजनीतिक व्यवस्था)</em></p>\n<ul data-start=\"4605\" data-end=\"4693\">\n<li data-start=\"4605\" data-end=\"4624\">\n<p data-start=\"4607\" data-end=\"4624\"><strong data-start=\"4607\" data-end=\"4624\">Tribal polity</strong></p>\n</li>\n<li data-start=\"4625\" data-end=\"4643\">\n<p data-start=\"4627\" data-end=\"4643\">King = <strong data-start=\"4634\" data-end=\"4643\">Rajan</strong></p>\n</li>\n<li data-start=\"4644\" data-end=\"4671\">\n<p data-start=\"4646\" data-end=\"4671\">Titles: <strong data-start=\"4654\" data-end=\"4671\">Gopa / Gopati</strong></p>\n</li>\n<li data-start=\"4672\" data-end=\"4693\">\n<p data-start=\"4674\" data-end=\"4693\">Queen = <strong data-start=\"4682\" data-end=\"4693\">Mahishi</strong></p>\n</li>\n</ul>\n<p data-start=\"4695\" data-end=\"4747\">📌 Kingship partly hereditary, checked by assemblies</p>\n<hr data-start=\"4749\" data-end=\"4752\" />\n<h4 data-start=\"4754\" data-end=\"4776\">TRIBAL ASSEMBLIES</h4>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"4778\" data-end=\"4917\">\n<thead data-start=\"4778\" data-end=\"4797\">\n<tr data-start=\"4778\" data-end=\"4797\">\n<th data-start=\"4778\" data-end=\"4789\" data-col-size=\"sm\">Assembly</th>\n<th data-start=\"4789\" data-end=\"4797\" data-col-size=\"sm\">Role</th>\n</tr>\n</thead>\n<tbody data-start=\"4808\" data-end=\"4917\">\n<tr data-start=\"4808\" data-end=\"4826\">\n<td data-start=\"4808\" data-end=\"4816\" data-col-size=\"sm\">Sabha</td>\n<td data-start=\"4816\" data-end=\"4826\" data-col-size=\"sm\">Elders</td>\n</tr>\n<tr data-start=\"4827\" data-end=\"4861\">\n<td data-start=\"4827\" data-end=\"4836\" data-col-size=\"sm\">Samiti</td>\n<td data-start=\"4836\" data-end=\"4861\" data-col-size=\"sm\">People (checked king)</td>\n</tr>\n<tr data-start=\"4862\" data-end=\"4896\">\n<td data-start=\"4862\" data-end=\"4872\" data-col-size=\"sm\">Vidatha</td>\n<td data-start=\"4872\" data-end=\"4896\" data-col-size=\"sm\">Military + religious</td>\n</tr>\n<tr data-start=\"4897\" data-end=\"4917\">\n<td data-start=\"4897\" data-end=\"4904\" data-col-size=\"sm\">Gana</td>\n<td data-start=\"4904\" data-end=\"4917\" data-col-size=\"sm\">Clan body</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"4919\" data-end=\"4956\">📌 Women attended <strong data-start=\"4937\" data-end=\"4956\">Sabha &amp; Vidatha</strong></p>\n<hr data-start=\"4958\" data-end=\"4961\" />\n<h4 data-start=\"4963\" data-end=\"4987\">OFFICIALS (RATNINS)</h4>\n<p data-start=\"4989\" data-end=\"5084\">Purohita, Senani, Gramani, Vrajapati, Bhagadugha (tax), Sangrihitri (treasurer), Spasas (spies)</p>\n<hr data-start=\"5086\" data-end=\"5089\" />\n<h3 data-start=\"5091\" data-end=\"5113\">D. WARS &amp; MILITARY</h3>\n<ul data-start=\"5115\" data-end=\"5316\">\n<li data-start=\"5115\" data-end=\"5133\">\n<p data-start=\"5117\" data-end=\"5133\">No standing army</p>\n</li>\n<li data-start=\"5134\" data-end=\"5160\">\n<p data-start=\"5136\" data-end=\"5160\">Units: Grama, Vrat, Gana</p>\n</li>\n<li data-start=\"5161\" data-end=\"5316\">\n<p data-start=\"5163\" data-end=\"5200\"><strong data-start=\"5163\" data-end=\"5200\">Battle of Ten Kings (Dasharajna):</strong></p>\n<ul data-start=\"5203\" data-end=\"5316\">\n<li data-start=\"5203\" data-end=\"5233\">\n<p data-start=\"5205\" data-end=\"5233\">Sudas (Bharatas) vs 10 kings</p>\n</li>\n<li data-start=\"5236\" data-end=\"5264\">\n<p data-start=\"5238\" data-end=\"5264\">River: <strong data-start=\"5245\" data-end=\"5264\">Parushni (Ravi)</strong></p>\n</li>\n<li data-start=\"5267\" data-end=\"5290\">\n<p data-start=\"5269\" data-end=\"5290\">Priest: <strong data-start=\"5277\" data-end=\"5290\">Vasishtha</strong></p>\n</li>\n<li data-start=\"5293\" data-end=\"5316\">\n<p data-start=\"5295\" data-end=\"5316\">Result: <strong data-start=\"5303\" data-end=\"5316\">Sudas won</strong></p>\n</li>\n</ul>\n</li>\n</ul>\n<hr data-start=\"5318\" data-end=\"5321\" />\n<h3 data-start=\"5323\" data-end=\"5339\">E. SOCIETY</h3>\n<p data-start=\"5340\" data-end=\"5357\"><em data-start=\"5340\" data-end=\"5357\">(समाज व्यवस्था)</em></p>\n<ul data-start=\"5359\" data-end=\"5436\">\n<li data-start=\"5359\" data-end=\"5372\">\n<p data-start=\"5361\" data-end=\"5372\">Egalitarian</p>\n</li>\n<li data-start=\"5373\" data-end=\"5395\">\n<p data-start=\"5375\" data-end=\"5395\">No birth-based caste</p>\n</li>\n<li data-start=\"5396\" data-end=\"5436\">\n<p data-start=\"5398\" data-end=\"5436\">Varna appears <strong data-start=\"5412\" data-end=\"5436\">only in 10th Mandala</strong></p>\n</li>\n</ul>\n<h4 data-start=\"5438\" data-end=\"5471\">VARNA SYSTEM (Purusha Sukta)</h4>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"5473\" data-end=\"5594\">\n<thead data-start=\"5473\" data-end=\"5489\">\n<tr data-start=\"5473\" data-end=\"5489\">\n<th data-start=\"5473\" data-end=\"5481\" data-col-size=\"sm\">Varna</th>\n<th data-start=\"5481\" data-end=\"5489\" data-col-size=\"sm\">Role</th>\n</tr>\n</thead>\n<tbody data-start=\"5500\" data-end=\"5594\">\n<tr data-start=\"5500\" data-end=\"5520\">\n<td data-start=\"5500\" data-end=\"5510\" data-col-size=\"sm\">Brahmin</td>\n<td data-start=\"5510\" data-end=\"5520\" data-col-size=\"sm\">Priest</td>\n</tr>\n<tr data-start=\"5521\" data-end=\"5544\">\n<td data-start=\"5521\" data-end=\"5533\" data-col-size=\"sm\">Kshatriya</td>\n<td data-start=\"5533\" data-end=\"5544\" data-col-size=\"sm\">Warrior</td>\n</tr>\n<tr data-start=\"5545\" data-end=\"5573\">\n<td data-start=\"5545\" data-end=\"5555\" data-col-size=\"sm\">Vaishya</td>\n<td data-start=\"5555\" data-end=\"5573\" data-col-size=\"sm\">Farmer, trader</td>\n</tr>\n<tr data-start=\"5574\" data-end=\"5594\">\n<td data-start=\"5574\" data-end=\"5583\" data-col-size=\"sm\">Shudra</td>\n<td data-start=\"5583\" data-end=\"5594\" data-col-size=\"sm\">Service</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p style=\"line-height: 1.15 !important;\"></p>\n<p data-start=\"5596\" data-end=\"5629\">📌 Initially <strong data-start=\"5609\" data-end=\"5629\">occupation-based</strong></p>",

    "question": "<p data-path-to-node=\"17\"><strong data-path-to-node=\"17\" data-index-in-node=\"0\">Q. In the Early Vedic Period, which of the following terms regarding governance is INCORRECTLY described?</strong> <strong data-path-to-node=\"17\" data-index-in-node=\"106\">(प्रारंभिक वैदिक काल में, शासन के संबंध में निम्नलिखित में से कौन सा शब्द गलत तरीके से वर्णित है?)</strong></p>\n<p data-path-to-node=\"18\">A) <strong data-path-to-node=\"18\" data-index-in-node=\"3\">Gopati:</strong> Title for the King, meaning protector of cows. (<em data-path-to-node=\"18\" data-index-in-node=\"59\">गोपति: राजा के लिए उपाधि, जिसका अर्थ है गायों का रक्षक।</em>)</p>\n<p data-path-to-node=\"18\">B) <strong data-path-to-node=\"18\" data-index-in-node=\"119\">Sabha:</strong> An assembly primarily composed of elders or elites. (<em data-path-to-node=\"18\" data-index-in-node=\"179\">सभा: मुख्य रूप से वृद्धों या अभिजात वर्ग से बनी एक सभा।</em>)</p>\n<p data-path-to-node=\"18\">C) <strong data-path-to-node=\"18\" data-index-in-node=\"239\">Bali:</strong> A mandatory tax imposed by the King on the farmers. (<em data-path-to-node=\"18\" data-index-in-node=\"298\">बली: राजा द्वारा किसानों पर लगाया गया एक अनिवार्य कर।</em>)</p>\n<p data-path-to-node=\"18\">D) <strong data-path-to-node=\"18\" data-index-in-node=\"356\">Vidatha:</strong> The oldest tribal assembly with deliberative and religious roles. (<em data-path-to-node=\"18\" data-index-in-node=\"432\">विदथ: विचारात्मक और धार्मिक भूमिकाओं वाली सबसे पुरानी कबीलाई सभा।</em>)</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
