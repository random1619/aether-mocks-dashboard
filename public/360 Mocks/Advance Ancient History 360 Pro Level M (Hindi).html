    "question": "<p data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">Q. With reference to the foreign travelers who visited ancient India during the Mauryan and Indo-Greek periods, consider the following statements:</strong> <strong data-path-to-node=\"5\" data-index-in-node=\"147\">(प्राचीन भारत में मौर्य और इंडो-ग्रीक काल के दौरान आने वाले विदेशी यात्रियों के संदर्भ में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"6\">\n<li>\n<p data-path-to-node=\"6,0,0\"><strong data-path-to-node=\"6,0,0\" data-index-in-node=\"0\">Megasthenes:</strong> He was the ambassador of Seleucus Nicator to the court of Chandragupta Maurya and wrote 'Indica', which describes the 7-caste system of Indian society. <em data-path-to-node=\"6,0,0\" data-index-in-node=\"165\">(<strong data-path-to-node=\"6,0,0\" data-index-in-node=\"166\">मेगास्थनीज:</strong> वह चंद्रगुप्त मौर्य के दरबार में सेल्यूकस निकेटर का राजदूत था और उसने 'इंडिका' लिखी थी, जो भारतीय समाज की 7-जाति व्यवस्था का वर्णन करती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"6,1,0\"><strong data-path-to-node=\"6,1,0\" data-index-in-node=\"0\">Deimachus:</strong> He succeeded Megasthenes and served as the Syrian ambassador to the court of Bindusara, providing insights into Mauryan diplomacy. <em data-path-to-node=\"6,1,0\" data-index-in-node=\"142\">(<strong data-path-to-node=\"6,1,0\" data-index-in-node=\"143\">डायमेकस:</strong> वह मेगास्थनीज का उत्तराधिकारी था और बिंदुसार के दरबार में सीरियाई राजदूत के रूप में कार्य किया, जिससे मौर्य कूटनीति की जानकारी मिलती है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"6,2,0\"><strong data-path-to-node=\"6,2,0\" data-index-in-node=\"0\">Strabo &amp; Arrian:</strong> While Strabo's 'Geography' mentions Greek-Indian trade, Arrian's 'Indica' focuses on Alexander&rsquo;s campaigns and the geography of the Indus region. <em data-path-to-node=\"6,2,0\" data-index-in-node=\"163\">(<strong data-path-to-node=\"6,2,0\" data-index-in-node=\"164\">स्ट्रैबो और एरियन:</strong> जहाँ स्ट्रैबो की 'जियोग्राफी' में ग्रीक-भारतीय व्यापार का उल्लेख है, वहीं एरियन की 'इंडिका' सिकंदर के अभियानों और सिंधु क्षेत्र के भूगोल पर केंद्रित है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"6,3,0\"><strong data-path-to-node=\"6,3,0\" data-index-in-node=\"0\">Plutarch:</strong> In his work 'Parallel Lives', he records the military exploits of Alexander and mentions the interaction between Chandragupta Maurya and the Greeks. <em data-path-to-node=\"6,3,0\" data-index-in-node=\"159\">(<strong data-path-to-node=\"6,3,0\" data-index-in-node=\"160\">प्लूटार्क:</strong> अपने काम 'पैरेलल लाइव्स' में, वह सिकंदर के सैन्य कारनामों को दर्ज करता है और चंद्रगुप्त मौर्य तथा यूनानियों के बीच बातचीत का उल्लेख करता है।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"7\"><strong data-path-to-node=\"7\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"7\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"8\">\n<li>\n<p data-path-to-node=\"8,0,0\"><strong data-path-to-node=\"8,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only (केवल 1 और 2)</p>\n</li>\n<li>\n<p data-path-to-node=\"8,1,0\"><strong data-path-to-node=\"8,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only (केवल 2, 3 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"8,2,0\"><strong data-path-to-node=\"8,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only (केवल 1, 3 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"8,3,0\"><strong data-path-to-node=\"8,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

    "solution": "<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Megasthenes (c. 302&ndash;298 BCE): He is known as the 'Father of Indian History'. His book 'Indica' is the most important source for Mauryan administration. He noted that there was no slavery in India (though he likely misunderstood the caste/varna system).</p>\n<p style=\"line-height: 1.15 !important;\">(मेगास्थनीज: इन्हें 'भारतीय इतिहास का पिता' कहा जाता है। इनकी पुस्तक 'इंडिका' मौर्य प्रशासन का सबसे महत्वपूर्ण स्रोत है। उन्होंने उल्लेख किया कि भारत में दासता नहीं थी।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Deimachus: He was the ambassador of Antiochus I (Syrian King). He visited Bindusara's court and maintained the diplomatic continuity established by Megasthenes.</p>\n<p style=\"line-height: 1.15 !important;\">(डायमेकस: वह एंटिओकस प्रथम (सीरियाई राजा) का राजदूत था। उसने बिंदुसार के दरबार का दौरा किया और मेगास्थनीज द्वारा स्थापित राजनयिक निरंतरता को बनाए रखा।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Dionysius (Extra Fact): He was another ambassador sent by Ptolemy Philadelphus (King of Egypt) to the court of Bindusara/Ashoka.</p>\n<p style=\"line-height: 1.15 !important;\">(डायोनिसियस: वह मिस्र के राजा टॉलेमी फिलाडेल्फस द्वारा बिंदुसार/अशोक के दरबार में भेजा गया एक अन्य राजदूत था।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Plutarch &amp; Arrian: Their writings are primarily based on the lost original accounts of Megasthenes and Nearchus (Alexander's admiral).</p>\n<p style=\"line-height: 1.15 !important;\">(प्लूटार्क और एरियन: उनके लेखन मुख्य रूप से मेगास्थनीज और नियरकस के खोए हुए मूल वृत्तांतों पर आधारित हैं।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"15\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" data-index-in-node=\"0\">🚀 Travelers Quick Table&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Traveler (यात्री)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Ruler/Dynasty (शासक/वंश)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Contribution (मुख्य योगदान)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0,0\" data-index-in-node=\"0\">Megasthenes</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,1,0\">Chandragupta Maurya</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,2,0\">Wrote 'Indica'; described 7 castes. (7 जातियों का वर्णन किया)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,0,0\" data-index-in-node=\"0\">Deimachus</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,1,0\">Bindusara</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,2,2,0\">Syrian Ambassador; focused on administration. (सीरियाई राजदूत)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,3,0,0\" data-index-in-node=\"0\">Arrian</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,3,1,0\">Indo-Greek context</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,3,2,0\">Detailed Alexander's Indian campaign. (सिकंदर के अभियान का विवरण)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,4,0,0\" data-index-in-node=\"0\">Strabo</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,4,1,0\">Indo-Greek context</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,4,2,0\">Focused on India-Greek trade &amp; geography. (व्यापार और भूगोल)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the foreign travelers and scholars who documented ancient India, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"121\">(प्राचीन भारत का विवरण देने वाले विदेशी यात्रियों और विद्वानों के संदर्भ में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Pliny the Elder:</strong> In his work 'Natural History', he criticized the drain of Roman gold to India due to the high demand for Indian luxury goods like pepper and silk. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"164\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"165\">प्लिनी द एल्डर:</strong> अपनी कृति 'नेचुरल हिस्ट्री' में, उन्होंने काली मिर्च और रेशम जैसी भारतीय विलासिता की वस्तुओं की उच्च मांग के कारण भारत में रोमन सोने के प्रवाह (निकासी) की आलोचना की।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Ptolemy:</strong> Writing during the Satavahana era, his 'Geography' provided a detailed map of the Indian coastline and mentioned major inland cities like Pataliputra. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"160\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"161\">टॉलेमी:</strong> सातवाहन काल के दौरान लिखते हुए, उनकी 'जियोग्राफी' ने भारतीय तटरेखा का एक विस्तृत मानचित्र प्रदान किया और पाटलिपुत्र जैसे प्रमुख आंतरिक शहरों का उल्लेख किया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Faxian (Fa-Hien):</strong> He visited India during the reign of Chandragupta II (Vikramaditya) and recorded the prosperity of the Gupta Empire, though he did not mention the King by name. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"179\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"180\">फाह्यान:</strong> उन्होंने चंद्रगुप्त द्वितीय (विक्रमादित्य) के शासनकाल के दौरान भारत का दौरा किया और गुप्त साम्राज्य की समृद्धि को दर्ज किया, हालांकि उन्होंने राजा का नाम से उल्लेख नहीं किया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Xuanzang (Hiuen Tsang):</strong> Known as the 'Prince of Pilgrims', he stayed at Nalanda University during Harsha Vardhana's reign and detailed the socio-political conditions in his book 'Si-Yu-Ki'. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"190\">(<strong data-path-to-node=\"5,3,0\" data-index-in-node=\"191\">ह्वेनसांग:</strong> 'तीर्थयात्रियों के राजकुमार' के रूप में जाने जाने वाले, वे हर्षवर्द्धन के शासनकाल के दौरान नालंदा विश्वविद्यालय में रहे और अपनी पुस्तक 'सी-यू-की' में सामाजिक-राजनीतिक स्थितियों का विवरण दिया।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1, 3, and 4 only (केवल 1, 3 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 4 only (केवल 2 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 2 only (केवल 1 और 2)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

    "solution": "<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Pliny the Elder (1st Century CE): He never visited India personally. He relied on the accounts of Greek sailors and Roman merchants. He famously lamented that Rome was losing 550 million sesterces annually to India.</p>\n<p style=\"line-height: 1.15 !important;\">(प्लिनी द एल्डर: उन्होंने कभी व्यक्तिगत रूप से भारत का दौरा नहीं किया। उन्होंने रोमन व्यापारियों के वृत्तांतों पर भरोसा किया। उन्होंने अफसोस जताया था कि रोम सालाना भारत को भारी मात्रा में सोना खो रहा है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Faxian (c. 399&ndash;414 CE): His primary goal was to find authentic copies of the Vinaya Pitaka (Buddhist Monastic Code). He noted that the people were wealthy and practiced non-violence (Ahimsa).</p>\n<p style=\"line-height: 1.15 !important;\">(फाह्यान: उनका मुख्य लक्ष्य 'विनय पिटक' की प्रामाणिक प्रतियां खोजना था। उन्होंने उल्लेख किया कि लोग समृद्ध थे और अहिंसा का पालन करते थे।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Xuanzang (c. 629&ndash;645 CE): He attended the Prayag Assembly and the Kanauj assembly organized by Harsha. He described Harsha as a generous patron of Buddhism.</p>\n<p style=\"line-height: 1.15 !important;\">(ह्वेनसांग: उन्होंने हर्ष द्वारा आयोजित प्रयाग सभा और कन्नौज सभा में भाग लिया। उन्होंने हर्ष को बौद्ध धर्म के एक उदार संरक्षक के रूप में वर्णित किया।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"14\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">🚀 Travelers Summary Table&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Traveler (यात्री)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Period (काल)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Main Focus (मुख्य फोकस)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0,0\" data-index-in-node=\"0\">Pliny</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,1,0\">Roman (1st CE)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,2,0\">Trade &amp; Economy (व्यापार और अर्थव्यवस्था)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0,0\" data-index-in-node=\"0\">Ptolemy</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,1,0\">Satavahana (2nd CE)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,2,0\">Geography &amp; Ports (भूगोल और बंदरगाह)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\" data-index-in-node=\"0\">Faxian</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1,0\">Gupta (5th CE)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,2,0\">Buddhist Ethics &amp; Society (बौद्ध नैतिकता और समाज)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\" data-index-in-node=\"0\">Xuanzang</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\">Pushyabhuti (7th CE)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,2,0\">Education (Nalanda) &amp; Politics (शिक्षा और राजनीति)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the ancient Indian scholars and their contributions, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"109\">(प्राचीन भारतीय विद्वानों और उनके योगदान के संदर्भ में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Grammarians (व्याकरणविद्):</strong> While <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"33\">Panini</strong> wrote the <em data-path-to-node=\"5,0,0\" data-index-in-node=\"50\">Ashtadhyayi</em> (earliest Sanskrit grammar), <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"91\">Patanjali</strong> wrote the <em data-path-to-node=\"5,0,0\" data-index-in-node=\"111\">Mahabhashya</em> during the Shunga period, and <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"153\">Tholkappiyar</strong> authored the <em data-path-to-node=\"5,0,0\" data-index-in-node=\"179\">Tholkappiyam</em>, the earliest work on Tamil grammar. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"229\">(जहाँ <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"235\">पाणिनी</strong> ने 'अष्टाध्यायी' (सबसे पुराना संस्कृत व्याकरण) लिखा, वहीं <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"300\">पतंजलि</strong> ने शुंग काल के दौरान 'महाभाष्य' लिखा, और <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"348\">तोलकाप्पियार</strong> ने 'तोलकाप्पियम' की रचना की, जो तमिल व्याकरण की सबसे पुरानी रचना है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Kushana Scholars (कुषाण विद्वान):</strong> Under Kanishka&rsquo;s patronage, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"62\">Vasumitra</strong> presided over the 4th Buddhist Council, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"112\">Ashvaghosa</strong> wrote the <em data-path-to-node=\"5,1,0\" data-index-in-node=\"133\">Buddhacharita</em>, and <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"152\">Nagarjuna</strong> developed the <em data-path-to-node=\"5,1,0\" data-index-in-node=\"176\">Madhyamaka</em> (Sunyavada) philosophy. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"211\">(कनिष्क के संरक्षण में, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"235\">वसुमित्र</strong> ने चौथी बौद्ध संगीति की अध्यक्षता की, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"282\">अश्वघोष</strong> ने 'बुद्धचरित' लिखा, और <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"314\">नागार्जुन</strong> ने 'माध्यमिक' (शून्यवाद) दर्शन विकसित किया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Scientific Works (वैज्ञानिक कार्य):</strong> <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"36\">Aryabhata</strong> authored the <em data-path-to-node=\"5,2,0\" data-index-in-node=\"59\">Aryabhatiya</em> (Mathematics/Astronomy), while <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"102\">Varahamihira</strong> compiled the <em data-path-to-node=\"5,2,0\" data-index-in-node=\"128\">Brihat Samhita</em>, an encyclopedic text on astrology and science. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"191\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"192\">आर्यभट्ट</strong> ने 'आर्यभटीय' (गणित/खगोल विज्ञान) की रचना की, जबकि <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"252\">वराहमिहिर</strong> ने ज्योतिष और विज्ञान पर एक विश्वकोश 'बृहत संहिता' का संकलन किया।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only (केवल 1 और 2)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only (केवल 2 और 3)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only (केवल 1 और 3)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

    "solution": "<h3 style=\"text-align: center;\" data-path-to-node=\"18\"><strong data-path-to-node=\"18\" data-index-in-node=\"0\">&nbsp;\"Scholar &amp; Literature\" Ultra Cheat Sheet (विद्वान और साहित्य अल्ट्रा चीट शीट)</strong></h3>\n<ul data-path-to-node=\"19\">\n<li>\n<p data-path-to-node=\"19,0,0\"><strong data-path-to-node=\"19,0,0\" data-index-in-node=\"0\">Tamil Epics (तमिल महाकाव्य):</strong> <em data-path-to-node=\"19,0,0\" data-index-in-node=\"29\">Silappatikaram</em> was written by <strong data-path-to-node=\"19,0,0\" data-index-in-node=\"59\">Ilango Adigal</strong> (Sangam Age).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,1,0\"><strong data-path-to-node=\"19,1,0\" data-index-in-node=\"0\">Gupta Lexicon (गुप्त शब्दकोश):</strong> <strong data-path-to-node=\"19,1,0\" data-index-in-node=\"31\">Amarasimha</strong> wrote <em data-path-to-node=\"19,1,0\" data-index-in-node=\"48\">Amarakosha</em> (Sanskrit Dictionary).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,2,0\"><strong data-path-to-node=\"19,2,0\" data-index-in-node=\"0\">Royal Authors (शाही लेखक):</strong> * <strong data-path-to-node=\"19,2,0\" data-index-in-node=\"29\">Harshavardhana:</strong> <em data-path-to-node=\"19,2,0\" data-index-in-node=\"45\">Ratnavali, Nagananda, Priyadarsika</em>.</p>\n<ul data-path-to-node=\"19,2,1\">\n<li>\n<p data-path-to-node=\"19,2,1,0,0\"><strong data-path-to-node=\"19,2,1,0,0\" data-index-in-node=\"0\">Mahendravarman I (Pallava):</strong> <em data-path-to-node=\"19,2,1,0,0\" data-index-in-node=\"28\">Mattavilasaprahasanam</em> (Satire).</p>\n</li>\n</ul>\n</li>\n<li>\n<p data-path-to-node=\"19,3,0\"><strong data-path-to-node=\"19,3,0\" data-index-in-node=\"0\">Drama &amp; Prose (नाटक और गद्य):</strong></p>\n<ul data-path-to-node=\"19,3,1\">\n<li>\n<p data-path-to-node=\"19,3,1,0,0\"><strong data-path-to-node=\"19,3,1,0,0\" data-index-in-node=\"0\">Bhasa:</strong> Wrote 13 plays (e.g., <em data-path-to-node=\"19,3,1,0,0\" data-index-in-node=\"29\">Swapnavasavadatta</em>).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,1,1,0\"><strong data-path-to-node=\"19,3,1,1,0\" data-index-in-node=\"0\">Dandin (Pallava):</strong> <em data-path-to-node=\"19,3,1,1,0\" data-index-in-node=\"18\">Dashakumaracharita</em> (Prose).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,1,2,0\"><strong data-path-to-node=\"19,3,1,2,0\" data-index-in-node=\"0\">Bhavabhuti:</strong> <em data-path-to-node=\"19,3,1,2,0\" data-index-in-node=\"12\">Malatimadhava</em> &amp; <em data-path-to-node=\"19,3,1,2,0\" data-index-in-node=\"28\">Mahaviracharita</em>.</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,1,3,0\"><strong data-path-to-node=\"19,3,1,3,0\" data-index-in-node=\"0\">Vatsyayana:</strong> <em data-path-to-node=\"19,3,1,3,0\" data-index-in-node=\"12\">Kamasutra</em>.</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,1,4,0\"><strong data-path-to-node=\"19,3,1,4,0\" data-index-in-node=\"0\">Sarvasena (Vakataka):</strong> <em data-path-to-node=\"19,3,1,4,0\" data-index-in-node=\"22\">Harivijaya</em>.</p>\n</li>\n</ul>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the early rock-cut caves in India, which of the following statements is INCORRECT?</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"104\">(भारत में प्रारंभिक रॉक-कट गुफाओं के संदर्भ में, निम्नलिखित में से कौन सा कथन गलत है?)</strong></p>\n<ul data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">A)</strong> The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"7\">Barabar Caves</strong> were built by Ashoka for the Ajivika sect, while the nearby <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"81\">Nagarjuni Caves</strong> were dedicated by his grandson, Dasharatha. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"141\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"142\">बराबर गुफाएं</strong> अशोक द्वारा आजीविका संप्रदाय के लिए बनाई गई थीं, जबकि पास की <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"216\">नागार्जुनी गुफाएं</strong> उनके पोते दशरथ द्वारा समर्पित की गई थीं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">B)</strong> The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"7\">Khandagiri and Udayagiri Caves</strong> in Odisha are primarily Buddhist caves patronized by the Kalinga King Kharavela. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"119\">(ओडिशा की <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"129\">खंडगिरी और उदयगिरि गुफाएं</strong> मुख्य रूप से बौद्ध गुफाएं हैं जिन्हें कलिंग राजा खारवेल ने संरक्षण दिया था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">C)</strong> The <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"7\">Bhaja, Karle, and Pandavleni caves</strong> are prominent Buddhist sites in Maharashtra patronized during the Satavahana period. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"127\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"128\">भाजा, कार्ला और पांडवलेनी गुफाएं</strong> महाराष्ट्र में प्रमुख बौद्ध स्थल हैं जिन्हें सातवाहन काल के दौरान संरक्षण प्राप्त हुआ था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">D)</strong> <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"3\">Edakkal Caves</strong> in Kerala are famous for prehistoric rock art dating back to the Neolithic era. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"97\">(केरल में <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"107\">एडक्कल गुफाएं</strong> नवपाषाण युग की प्रागैतिहासिक शैल कला के लिए प्रसिद्ध हैं।)</em></p>\n</li>\n</ul>",

aves</strong></td>\n<td data-col-size=\"sm\" data-start=\"585\" data-end=\"603\">3rd Century BCE</td>\n<td data-col-size=\"sm\" data-start=\"603\" data-end=\"622\">Jehanabad, Bihar</td>\n<td data-col-size=\"sm\" data-start=\"622\" data-end=\"632\">Ajivika</td>\n<td data-col-size=\"sm\" data-start=\"632\" data-end=\"659\">Mauryan Empire (Ashoka)</td>\n</tr>\n<tr data-start=\"660\" data-end=\"782\">\n<td data-start=\"660\" data-end=\"704\" data-col-size=\"sm\"><strong data-start=\"662\" data-end=\"703\">Nagarjuni Caves</strong></td>\n<td data-col-size=\"sm\" data-start=\"704\" data-end=\"722\">3rd Century BCE</td>\n<td data-col-size=\"sm\" data-start=\"722\" data-end=\"741\">Jehanabad, Bihar</td>\n<td data-col-size=\"sm\" data-start=\"741\" data-end=\"751\">Ajivika</td>\n<td data-col-size=\"sm\" data-start=\"751\" data-end=\"782\">Mauryan Empire (Dasharatha)</td>\n</tr>\n<tr data-start=\"783\" data-end=\"905\">\n<td data-start=\"783\" data-end=\"827\" data-col-size=\"sm\"><strong data-start=\"785\" data-end=\"826\">Udayagiri and Khandagiri Caves</strong></td>\n<td data-col-size=\"sm\" data-start=\"827\" data-end=\"845\">2nd Century BCE</td>\n<td data-col-size=\"sm\" data-start=\"845\" data-end=\"867\">Bhubaneswar, Odisha</td>\n<td data-col-size=\"sm\" data-start=\"867\" data-end=\"874\">Jain</td>\n<td data-col-size=\"sm\" data-start=\"874\" data-end=\"905\">Kalinga Kingdom (Kharavela)</td>\n</tr>\n<tr data-start=\"906\" data-end=\"1023\">\n<td data-start=\"906\" data-end=\"950\" data-col-size=\"sm\"><strong data-start=\"908\" data-end=\"949\">Bhaja Caves</strong></td>\n<td data-col-size=\"sm\" data-start=\"950\" data-end=\"968\">2nd Century BCE</td>\n<td data-col-size=\"sm\" data-start=\"968\" data-end=\"997\">Near Lonavala, Maharashtra</td>\n<td data-col-size=\"sm\" data-start=\"997\" data-end=\"1008\">Buddhist</td>\n<td data-col-size=\"sm\" data-start=\"1008\" data-end=\"1023\">Satavahanas</td>\n</tr>\n<tr data-start=\"1024\" data-end=\"1133\">\n<td data-start=\"102     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the diverse schools of Indian philosophy, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"98\">(भारतीय दर्शन के विभिन्न संप्रदायों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Logic and Atomism:</strong> While <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"25\">Gautama&rsquo;s Nyaya</strong> school defines four valid means of knowledge (<em data-path-to-node=\"5,0,0\" data-index-in-node=\"87\">Pramanas</em>), <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"98\">Kanada&rsquo;s Vaisheshika</strong> school introduced the earliest form of atomic theory in India. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"182\">(जहाँ <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"188\">गौतम के न्याय</strong> संप्रदाय ने ज्ञान के चार वैध साधनों (प्रमाण) को परिभाषित किया, वहीं <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"270\">कणाद के वैशेषिक</strong> संप्रदाय ने भारत में परमाणु सिद्धांत के प्रारंभिक रूप की शुरुआत की।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Dualism and Practice:</strong> The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"26\">Samkhya</strong> school (founded by Kapila) is dualistic, distinguishing between <em data-path-to-node=\"5,1,0\" data-index-in-node=\"98\">Purusha</em> (soul) and <em data-path-to-node=\"5,1,0\" data-index-in-node=\"117\">Prakriti</em> (matter), while <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"142\">Patanjali&rsquo;s Yoga</strong> provides the practical path for self-realization through <em data-path-to-node=\"5,1,0\" data-index-in-node=\"216\">Ashtanga Yoga</em>. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"231\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"232\">सांख्य</strong> संप्रदाय (कपिल द्वारा स्थापित) द्वैतवादी है, जो पुरुष (आत्मा) और प्रकृति (पदार्थ) के बीच अंतर करता है, जबकि <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"347\">पतंजलि का योग</strong> 'अष्टांग योग' के माध्यम से आत्म-साक्षात्कार का व्यावहारिक मार्ग प्रदान करता है।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Vedantic Interpretations:</strong> <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"26\">Adi Shankaracharya</strong> advocated <em data-path-to-node=\"5,2,0\" data-index-in-node=\"55\">Advaita</em> (Absolute Non-dualism), whereas <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"95\">Madhvacharya</strong> proposed <em data-path-to-node=\"5,2,0\" data-index-in-node=\"117\">Dvaita</em> (Strict Dualism) and <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"145\">Ramanuja</strong> founded <em data-path-to-node=\"5,2,0\" data-index-in-node=\"162\">Vishishtadvaita</em> (Qualified Non-dualism). <em data-path-to-node=\"5,2,0\" data-index-in-node=\"203\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"204\">आदि शंकराचार्य</strong> ने अद्वैत (पूर्ण अद्वैतवाद) का समर्थन किया, जबकि <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"268\">माधवाचार्य</strong> ने द्वैत (सख्त द्वैतवाद) का प्रस्ताव रखा और <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"323\">रामानुज</strong> ने विशिष्टाद्वैत (योग्य अद्वैतवाद) की स्थापना की।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Ritualism vs. Inquiry:</strong> <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"23\">Purva Mimamsa</strong> (Jaimini) focuses on Vedic rituals and sacrifices, while <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"94\">Uttara Mimamsa</strong> (Vedanta) focuses on philosophical inquiry into <em data-path-to-node=\"5,3,0\" data-index-in-node=\"157\">Brahman</em> based on the Upanishads. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"190\">(<strong data-path-to-node=\"5,3,0\" data-index-in-node=\"191\">पूर्व मीमांसा</strong> (जैमिनी) वैदिक अनुष्ठानों और यज्ञों पर केंद्रित है, जबकि <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"262\">उत्तर मीमांसा</strong> (वेदांत) उपनिषदों पर आधारित ब्रह्म की दार्शनिक जांच पर केंद्रित है।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only (केवल 1 और 2)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only (केवल 2, 3 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1, 3, and 4 only (केवल 1, 3 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

    "solution": "<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Nyaya &amp; Vaisheshika: Often studied together; Nyaya provides the logic, and Vaisheshika provides the physical theory of the universe categorized into six Padarthas (categories).</p>\n<p style=\"line-height: 1.15 !important;\">(न्याय और वैशेषिक का अक्सर साथ अध्ययन किया जाता है; न्याय तर्क प्रदान करता है, और वैशेषिक छह पदार्थों (श्रेणियों) में ब्रह्मांड का भौतिक सिद्धांत प्रदान करता है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0\" data-index-in-node=\"0\">Vedantic Sub-schools:</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0,0\" data-index-in-node=\"0\">Vallabhacharya (Shuddhadvaita):</strong> Rejected the concept of <em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0,0\" data-index-in-node=\"56\">Maya</em> and emphasized Krishna's grace (<em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0,0\" data-index-in-node=\"93\">Pushti Marg</em>).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"12,1,1,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,1,0\" data-index-in-node=\"0\">Nimbarkara (Dvaita-Advaita):</strong> Taught that the soul is simultaneously distinct and non-distinct from God.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Chaitanya Mahaprabhu (Achintya Bheda Abheda): Emphasized the inconceivable relationship between the creator and creation through Bhakti.</p>\n<p style=\"line-height: 1.15 !important;\">(वल्लभाचार्य (शुद्धाद्वैत): माया की अवधारणा को खारिज कर दिया और कृष्ण की कृपा (पुष्टि मार्ग) पर जोर दिया। निम्बार्काचार्य (द्वैताद्वैत): सिखाया कि आत्मा ईश्वर से एक साथ अलग और गैर-अलग है। चैतन्य महाप्रभु (अचिंत्य भेदा अभेद): भक्ति के माध्यम से निर्माता और सृष्टि के बीच अकल्पनीय संबंध पर जोर दिया।)</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">🚀 Philosophy Quick Reference&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">School (दर्शन)</strong></td>\n<td style=\"bo ight: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,1,0\">Patanjali</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,2,0\">Mind Control (चित्त वृत्ति निरोध)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0,0\" data-index-in-node=\"0\">Nyaya</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,1,0\">Gautama</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,2,0\">Logical Analysis (तार्किक विश्लेषण)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,0,0\" data-index-in-node=\"0\">Vaisheshika</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,1,0\">Kanada</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,4,2,0\">Atomic Theory (परमाणु सिद्धांत)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,0,0\" data-index-in-node=\"0\">Purva Mimamsa</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,1,0\">Jaimini</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,5,2,0\">Dharma &amp; Rituals (धर्म और अनुष्ठान)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,6,0,0\" data-index-in-node=\"0\">Vedanta</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,6,1,0\">Badarayana</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,6,2,0\">Brahman/Atman (ब्रह्म/आत्मा)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the historical evolution of Northern India (321 BCE &ndash; 375 CE), consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"119\">(उत्तर भारत के ऐतिहासिक विकास (321 ईसा पूर्व &ndash; 375 ईस्वी) के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Mauryan to Kanva Succession:</strong> After the fall of the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"51\">Mauryan Empire</strong> (unified by Chandragupta Maurya), the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"104\">Shunga Empire</strong> saw a revival of Brahmanical traditions under Pushyamitra Shunga, followed by the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"200\">Kanva Dynasty</strong> founded by Vasudeva in Magadha. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"246\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"247\">मौर्य से कण्व उत्तराधिकार:</strong> मौर्य साम्राज्य (चंद्रगुप्त मौर्य द्वारा एकीकृत) के पतन के बाद, <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"338\">शुंग साम्राज्य</strong> में पुष्यमित्र शुंग के तहत ब्राह्मणवादी परंपराओं का पुनरुद्धार हुआ, जिसके बाद मगध में वासुदेव द्वारा स्थापित <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"462\">कण्व वंश</strong> आया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Indo-Greeks and Parthians:</strong> <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"27\">Menander I</strong> was the most famous Indo-Greek ruler who patronized Buddhism, while the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"110\">Indo-Parthian</strong> king <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"129\">Gondophernes</strong> is associated with the arrival of Apostle Thomas and cultural exchange along the Silk Road. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"234\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"235\">हिंद-यूनानी और पार्थियन:</strong> <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"260\">मेनांडर प्रथम</strong> सबसे प्रसिद्ध हिंद-यूनानी शासक था जिसने बौद्ध धर्म को संरक्षण दिया, जबकि <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"347\">हिंद-पार्थियन</strong> राजा <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"366\">गोंडोफर्नीस</strong> सेंट थॉमस के आगमन और रेशम मार्ग (Silk Road) के सांस्कृतिक आदान-प्रदान से जुड़े हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">The Kushan Influence:</strong> Founded by <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"33\">Kujula Kadphises</strong>, the Kushan Empire reached its peak under <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"92\">Kanishka</strong>, who established capitals at Peshawar (Purushapura) and Mathura, fostering the Gandhara school of art and Mahayana Buddhism. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"226\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"227\">कुषाण प्रभाव:</strong> <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"241\">कुजुल कडफिसेस</strong> द्वारा स्थापित, कुषाण साम्राज्य <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"287\">कनिष्क</strong> के तहत अपने चरम पर पहुँचा, जिसने पेशावर और मथुरा में राजधानियाँ स्थापित कीं, और गांधार कला तथा महायान बौद्ध धर्म को बढ़ावा दिया।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only (केवल 1 और 2)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only (केवल 2 and 3)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only (केवल 1 and 3)</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

p: 0px !important;\" data-path-to-node=\"12,4,2,0\">Taxila / Sialkot</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,4,3,0\">Hellenistic coins, Patronage of Buddhism.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,0,0\" data-index-in-node=\"0\">Parthian</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,1,0\">Gondophernes</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,2,0\">Taxila</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,5,3,0\">Silk Road exchange, early Christian links.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,6,0,0\" data-index-in-node=\"0\">Kushan</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,6,1,0\">Kujula Kadphises</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,6,2,0\">Peshawar / Mathura</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,6,3,0\">Gandhara Art, Mahayana Buddhism, Silk Road.</span></td>\n</tr>\n</tbody>\n</table>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Mauryan (321&ndash;185 BCE):</strong> The last ruler, <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,0,0\" data-index-in-node=\"39\">Brihadratha</strong>, was killed by Pushyamitra Shunga.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Indo-Greeks (2nd&ndash;1st BCE):</strong> Introduced <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"38\">Hellenistic influence</strong>; Menander is famous for his dialogue in the <em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0\" data-index-in-node=\"104\">Milindapanho</em>.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"13,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Kushans (30&ndash;375 CE):</strong> <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"21\">Kanishka</strong> started the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0\" data-index-in-node=\"42\">Saka Era (78 CE)</strong> and held the 4th Buddhist Council in Kashmir.</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">Q. With reference to the North Indian dynasties following the rise and fall of the Gupta Empire, consider the following statements:</strong> <strong data-path-to-node=\"5\" data-index-in-node=\"132\">(गुप्त साम्राज्य के उदय और पतन के बाद उत्तर भारतीय राजवंशों के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"6\">\n<li>\n<p data-path-to-node=\"6,0,0\"><strong data-path-to-node=\"6,0,0\" data-index-in-node=\"0\">Gupta Empire:</strong> Founded by <strong data-path-to-node=\"6,0,0\" data-index-in-node=\"25\">Sri Gupta</strong>, it is celebrated as the \"Golden Age\" of Indian culture for its progress in science and literature, with Pataliputra as its capital. <em data-path-to-node=\"6,0,0\" data-index-in-node=\"168\">(<strong data-path-to-node=\"6,0,0\" data-index-in-node=\"169\">गुप्त साम्राज्य:</strong> श्री गुप्त द्वारा स्थापित, इसे विज्ञान और साहित्य में प्रगति के लिए भारतीय संस्कृति का 'स्वर्ण युग' माना जाता है, जिसकी राजधानी पाटलिपुत्र थी।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"6,1,0\"><strong data-path-to-node=\"6,1,0\" data-index-in-node=\"0\">Hunas (Hephthalites):</strong> Under leaders like <strong data-path-to-node=\"6,1,0\" data-index-in-node=\"41\">Toramana</strong> and <strong data-path-to-node=\"6,1,0\" data-index-in-node=\"54\">Mihirakula</strong>, the Hunas operated from Sakala (Sialkot) and significantly contributed to the decline of the Gupta Empire. <em data-path-to-node=\"6,1,0\" data-index-in-node=\"173\">(<strong data-path-to-node=\"6,1,0\" data-index-in-node=\"174\">हुण:</strong> तोरमाण और मिहिरकुल जैसे नेताओं के नेतृत्व में, हुणों ने साकल (सियालकोट) से शासन किया और गुप्त साम्राज्य के पतन में महत्वपूर्ण भूमिका निभाई।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"6,2,0\"><strong data-path-to-node=\"6,2,0\" data-index-in-node=\"0\">Maukharis and Maitrakas:</strong> While the <strong data-path-to-node=\"6,2,0\" data-index-in-node=\"35\">Maukharis</strong> rose to prominence in Kannauj after the Guptas, the <strong data-path-to-node=\"6,2,0\" data-index-in-node=\"97\">Maitrakas of Vallabhi</strong> established Vallabhi as a major center of learning and culture. <em data-path-to-node=\"6,2,0\" data-index-in-node=\"183\">(<strong data-path-to-node=\"6,2,0\" data-index-in-node=\"184\">मौखरि और मैत्रक:</strong> जहाँ गुप्तों के बाद कन्नौज में <strong data-path-to-node=\"6,2,0\" data-index-in-node=\"232\">मौखरि</strong> राजवंश प्रमुखता से उभरा, वहीं <strong data-path-to-node=\"6,2,0\" data-index-in-node=\"268\">वल्लभी के मैत्रकों</strong> ने वल्लभी को शिक्षा और संस्कृति के एक प्रमुख केंद्र के रूप में स्थापित किया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"6,3,0\"><strong data-path-to-node=\"6,3,0\" data-index-in-node=\"0\">Harsha Dynasty:</strong> Founded by <strong data-path-to-node=\"6,3,0\" data-index-in-node=\"27\">Prabhakar Vardhana</strong>, the dynasty reached its peak under <strong data-path-to-node=\"6,3,0\" data-index-in-node=\"82\">Harshavardhana</strong>, who moved the capital to Kannauj and unified North India while patronizing Nalanda University. <em data-path-to-node=\"6,3,0\" data-index-in-node=\"193\">(<strong data-path-to-node=\"6,3,0\" data-index-in-node=\"194\">हर्ष राजवंश:</strong> प्रभाकर वर्द्धन द्वारा स्थापित, यह राजवंश <strong data-path-to-node=\"6,3,0\" data-index-in-node=\"249\">हर्षवर्द्धन</strong> के तहत अपने शिखर पर पहुँचा, जिसने राजधानी को कन्नौज स्थानांतरित किया और नालंदा विश्वविद्यालय को संरक्षण देते हुए उत्तर भारत को एकीकृत किया।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"7\"><strong data-path-to-node=\"7\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"7\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"8\">\n<li>\n<p data-path-to-node=\"8,0,0\"><strong data-path-to-node=\"8,0,0\" data-index-in-node=\"0\">A)</strong> 1, 2, and 4 only (केवल 1, 2 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"8,1,0\"><strong data-path-to-node=\"8,1,0\" data-index-in-node=\"0\">B)</strong> 2, 3, and 4 only (केवल 2, 3 और 4)</p>\n</li>\n<li>\n<p data-path-to-node=\"8,2,0\"><strong data-path-to-node=\"8,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only (केवल 1 और 3)</p>\n</li>\n<li>\n<p data-path-to-node=\"8,3,0\"><strong data-path-to-node=\"8,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (उपर्युक्त सभी)</p>\n</li>\n</ul>",

 data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Gupta Empire</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\">Sri Gupta</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,2,0\">Pataliputra</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,3,0\">Golden Age; Samudragupta, Chandragupta II.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">Hunas</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\">Toramana</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,2,0\">Sakala (Sialkot)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,3,0\">Disrupted North Indian polity; led to regionalism.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">Maukharis</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">Harivarman</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,2,0\">Kannauj</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,3,0\">Buffer state; rose after Gupta decline.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Harsha Dynasty</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">Prabhakar Vardhana</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\">Kannauj</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,3,0\">Unified North India; Harsha&rsquo;s rule (606&ndash;647 CE).</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\" data-index-in-node=\"0\">Maitrakas</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\">Bhatarka</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,2,0\">Vallabhi</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,3,0\">Center of learning (Vallabhi University).</span></td>\n</tr>\n</tbody>\n</table>\n<h1 style=\"text-align: center;\" data-start=\"209\" data-end=\"244\">&nbsp;NORTHERN INDIA DYNASTIES</h1>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"279\" data-end=\"3117\">\n<thead data-start=\"279\" data-end=\"422\">\n<tr data-start=\"279\" data-end=\"422\">\n<th data-start=\"279\" data-end=\"295\" data-col-size=\"sm\">Dynasty (वंश)</th>\n<th data-start=\"295\" data-end=\"316\" data-col-size=\"sm\">Founder (संस्थापक)</th>\n<th data-start=\"316\" data-end=\"349\" data-col-size=\"md\">Important Rulers (प्रमुख शासक)</th>\n<th data-start=\"349\" data-end=\"366\" data-col-size=\"sm\">Timeline (काल)</th>\n<th data-start=\"366\" data-end=\"386\" data-col-size=\"sm\">Capital (राजधानी)</th>\n<th data-start=\"386\" data-end=\"422\" data-col-size=\"lg\">Key Contributions (मुख्य योगदान)</th>\n</tr>\n</thead>\n<tbody data-start=\"449\" data-end=\"3117\">\n<tr data-start=\"449\" data-end=\"814\">\n<td data-start=\"449\" data-end=\"501\" data-col-size=\"sm\"><strong data-start=\"451\" data-end=\"492\">Mauryan Empire</strong> (मौर्य)</td>\n<td data-col-size=\"sm\" data-start=\"501\" data-end=\"545\"><strong data-start=\"503\" data-end=\"544\">Chandragupta Maurya</strong></td>\n<td data-col-size=\"md\" data-start=\"545\" data-end=\"666\">Chandragupta Maurya, <strong data-start=\"568\" data-end=\"609\">Bindusara</strong>, <strong data-start=\"611\" data-end=\"652\">Ashoka</strong>, Brihadratha</td>\n<td data-col-size=\"sm\" data-start=\"666\" data-end=\"680\">321&ndash;185 BCE</td>\n<td data-col-size=\"sm\" data-start=\"680\" data-end=\"694\">Pataliputra</td>\n<td data-col-size=\"lg\" data-start=\"694\" data-end=\"814\">First political <strong data-start=\"712\" data-end=\"736\">unification of India</strong>; strong bureaucracy; <strong data-start=\"758\" data-end=\"779\">Dhamma &amp; Buddhism</strong>; famous <strong data-start=\"788\" data-end=\"812\">rock &amp; pillar edicts</strong></td>\n</tr>\n<tr data-start=\"815\" data-end=\"1050\">\n<td data-start=\"815\" data-end=\"866\" data-col-size=\"sm\"><strong data-start=\"817\" data-end=\"858\">Shunga Empire</strong> (शुंग)</td>\n<td data-col-size=\"sm\" data-start=\"866\" data-end=\"910\"><strong data-start=\"868\" data-end=\"909\">Pushyamitra Shunga</strong></td>\n<td data-col-size=\"md\" data-start=\"910\" data-end=\"942\">Pushyamitra Shunga, Agnimitra</td>\n<td data-col-size=\"sm\" data-start=\"942\" data-end=\"955\">185&ndash;73 BCE</td>\n<td data-col-size=\"sm\" data-start=\"955\" data-end=\"969\">Pataliputra</td>\n<td data-col-size=\"lg\" data-start=\"969\" data-end=\"1050\">Revival of <strong data-start=\"982\" data-end=\"1008\">Brahmanical traditions</strong>; controlled eastern India after Mauryas</td>\n</tr>\n<tr data-start=\"1051\" data-end=\"1206\">\n<td data-start=\"1051\" data-end=\"1102\" data-col-size=\"sm\"><strong data-start=\"1053\" data-end=\"1094\">Kanva Dynasty</strong> (कण्व)</td>\n<td data-col-size=\"sm\" data-start=\"1102\" data-end=\"1113\">Vasudeva</td>\n<td data-col-size=\"md\" data-start=\"1113\" data-end=\"1124\">Vasudeva</td>\n<td data-col-size=\"sm\" data-start=\"1124\" data-end=\"1136\">73&ndash;28 BCE</td>\n<td data-col-size=\"sm\" data-start=\"1136\" data-end=\"1150\">Pataliputra</td>\n<td data-col-size=\"lg\" data-start=\"1150\" data-end=\"1206\">Ruled <strong data-start=\"1158\" data-end=\"1169\">Magadha</strong> after Shungas; short-lived dynasty</td>\n</tr>\n<tr data-start=\"1207\" data-end=\"1470\">\n<td data-start=\"1207\" data-end=\"1265\" data-col-size=\"sm\"><strong data-start=\"1209\" data-end=\"1250\">Indo-Greeks</strong> (इंडो-यूनानी)</td>\n<td data-col-size=\"sm\" data-start=\"1265\" data-end=\"1279\">Demetrius I</td>\n<td data-col-size=\"md\" data-start=\"1279\" data-end=\"1336\"><strong data-start=\"1281\" data-end=\"1322\">Menander I</strong>, Demetrius I</td>\n<td data-col-size=\"sm\" data-start=\"1336\" data-end=\"1353\">2nd&ndash;1st c. BCE</td>\n<td data-col-size=\"sm\" data-start=\"1353\" data-end=\"1389\">Sirkap (Taxila), Sagala (Sialkot)</td>\n<td data-col-size=\"lg\" data-start=\"1389\" data-end=\"1470\"><strong data-start=\"1391\" data-end=\"1416\">Hellenistic influence</strong>; advanced coinage; trade; <strong data-start=\"1443\" data-end=\"1468\">patronage of Buddhism</strong></td>\n</tr>\n<tr data-start=\"1471\" data-end=\"1679\">\n<td data-start=\"1471\" data-end=\"1531\" data-col-size=\"sm\"><strong data-start=\"1473\" data-end=\"1514\">Indo-Parthians</strong> (इंडो-पार्थियन)</td>\n<td data-col-size=\"sm\" data-start=\"1531\" data-end=\"1546\">Gondophernes</td>\n<td data-col-size=\"md\" data-start=\"1546\" data-end=\"1573\">Gondophernes, Aspavarman</td>\n<td data-col-size=\"sm\" data-start=\"1573\" data-end=\"1598\">1st c. BCE &ndash; 1st c. CE</td>\n<td data-col-size=\"sm\" data-start=\"1598\" data-end=\"1607\">Taxila</td>\n<td data-col-size=\"lg\" data-start=\"1607\" data-end=\"1679\">Silk Route cultural exchange; <strong data-start=\"1639\" data-end=\"1677\">early Christian links (St. Thomas)</strong></td>\n</tr>\n<tr data-start=\"1680\" data-end=\"1988\">\n<td data-start=\"1680\" data-end=\"1734\" data-col-size=\"sm\"><strong data-start=\"1682\" data-end=\"1725\">Kushan Empire</strong> (कुषाण)</td>\n<td data-col-size=\"sm\" data-start=\"1734\" data-end=\"1780\"><strong data-start=\"1736\" data-end=\"1779\">Kujula Kadphises</strong></td>\n<td data-col-size=\"md\" data-start=\"1780\" data-end=\"1872\">Kujula Kadphises, Vima Kadphises, <strong data-start=\"1816\" data-end=\"1859\">Kanishka</strong>, Vasudeva I</td>\n<td data-col-size=\"sm\" data-start=\"1872\" data-end=\"1884\">30&ndash;375 CE</td>\n<td data-col-size=\"sm\" data-start=\"1884\" data-end=\"1918\">Purushapura (Peshawar), Mathura</td>\n<td data-col-size=\"lg\" data-start=\"1918\" data-end=\"1988\">Spread of <strong data-start=\"1930\" data-end=\"1951\">Mahayana Buddhism</strong>; <strong data-start=\"1953\" data-end=\"1969\">Gandhara art</strong>; Silk Road trade</td>\n</tr>\n<tr data-start=\"1989\" data-end=\"2306\">\n<td data-start=\"1989\" data-end=\"2043\" data-col-size=\"sm\"><strong data-start=\"1991\" data-end=\"2034\">Gupta Empire</strong> (गुप्त)</td>\n<td data-col-size=\"sm\" data-start=\"2043\" data-end=\"2055\">Sri Gupta</td>\n<td data-col-size=\"md\" data-start=\"2055\" data-end=\"2204\"><strong data-start=\"2057\" data-end=\"2100\">Chandragupta I</strong>, <strong data-start=\"2102\" data-end=\"2145\">Samudragupta</strong>, <strong data-start=\"2147\" data-end=\"2190\">Chandragupta II</strong>, Skandagupta</td>\n<td data-col-size=\"sm\" data-start=\"2204\" data-end=\"2217\">319&ndash;550 CE</td>\n<td data-col-size=\"sm\" data-start=\"2217\" data-end=\"2231\">Pataliputra</td>\n<td data-col-size=\"lg\" data-start=\"2231\" data-end=\"2306\"><strong data-start=\"2233\" data-end=\"2256\">Golden Age of India</strong>; science, maths, astronomy, Sanskrit literature</td>\n</tr>\n<tr data-start=\"2307\" data-end=\"2501\">\n<td data-start=\"2307\" data-end=\"2359\" data-col-size=\"sm\"><strong data-start=\"2309\" data-end=\"2352\">Hunas</strong> (हूण)</td>\n<td data-col-size=\"sm\" data-start=\"2359\" data-end=\"2370\">Toramana</td>\n<td data-col-size=\"md\" data-start=\"2370\" data-end=\"2393\">Toramana, Mihirakula</td>\n<td data-col-size=\"sm\" data-start=\"2393\" data-end=\"2409\">5th&ndash;6th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"2409\" data-end=\"2428\">Sakala (Sialkot)</td>\n<td data-col-size=\"lg\" data-start=\"2428\" data-end=\"2501\">Weakened &amp; accelerated <strong data-start=\"2453\" data-end=\"2474\">decline of Guptas</strong>; political fragmentation</td>\n</tr>\n<tr data-start=\"2502\" data-end=\"2688\">\n<td data-start=\"2502\" data-end=\"2556\" data-col-size=\"sm\"><strong data-start=\"2504\" data-end=\"2547\">Maukhari Dynasty</strong> (मौखरी)</td>\n<td data-col-size=\"sm\" data-start=\"2556\" data-end=\"2569\">Harivarman</td>\n<td data-col-size=\"md\" data-start=\"2569\" data-end=\"2597\">Ishanavarman, Sarvavarman</td>\n<td data-col-size=\"sm\" data-start=\"2597\" data-end=\"2609\">6th c. CE</td>\n<td data-col-size=\"sm\" data-start=\"2609\" data-end=\"2619\">Kannauj</td>\n<td data-col-size=\"lg\" data-start=\"2619\" data-end=\"2688\">Controlled Magadha; acted as <strong data-start=\"2650\" data-end=\"2666\">buffer state</strong> after Gupta decline</td>\n</tr>\n<tr data-start=\"2689\" data-end=\"2927\">\n<td data-start=\"2689\" da
