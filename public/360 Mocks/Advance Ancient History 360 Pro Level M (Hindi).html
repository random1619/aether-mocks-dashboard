    "solution": "<p>&nbsp;In the Early Vedic age, <strong data-path-to-node=\"20,0\" data-index-in-node=\"37\">Bali</strong> was a <strong data-path-to-node=\"20,0\" data-index-in-node=\"48\">voluntary</strong> contribution or gift from the people to the King, not a mandatory tax. Standing armies and formal tax systems were absent. (<strong data-path-to-node=\"20,0\" data-index-in-node=\"182\">व्याख्या:</strong> प्रारंभिक वैदिक युग में, <strong data-path-to-node=\"20,0\" data-index-in-node=\"217\">बली</strong> जनता द्वारा राजा को दिया जाने वाला एक <strong data-path-to-node=\"20,0\" data-index-in-node=\"259\">स्वैच्छिक</strong> अंशदान या उपहार था, न कि अनिवार्य कर। स्थायी सेना और औपचारिक कर प्रणाली अनुपस्थित थी।)</p>\n<h4 data-start=\"5636\" data-end=\"5663\">WOMEN (VERY IMPORTANT)</h4>\n<ul data-start=\"5665\" data-end=\"5773\">\n<li data-start=\"5665\" data-end=\"5688\">\n<p data-start=\"5667\" data-end=\"5688\">Education &amp; Upanayana</p>\n</li>\n<li data-start=\"5689\" data-end=\"5712\">\n<p data-start=\"5691\" data-end=\"5712\">Could choose husbands</p>\n</li>\n<li data-start=\"5713\" data-end=\"5739\">\n<p data-start=\"5715\" data-end=\"5739\">Widow remarriage allowed</p>\n</li>\n<li data-start=\"5740\" data-end=\"5773\">\n<p data-start=\"5742\" data-end=\"5773\">No sati, purdah, child marriage</p>\n</li>\n</ul>\n<p data-start=\"5775\" data-end=\"5815\"><strong data-start=\"5775\" data-end=\"5791\">Women poets:</strong> Apala, Lopamudra, Ghosa</p>\n<hr data-start=\"5817\" data-end=\"5820\" />\n<h3 data-start=\"5822\" data-end=\"5838\">F. ECONOMY</h3>\n<p data-start=\"5839\" data-end=\"5854\"><em data-start=\"5839\" data-end=\"5854\">(आर्थिक जीवन)</em></p>\n<ul data-start=\"5856\" data-end=\"6083\">\n<li data-start=\"5856\" data-end=\"5878\">\n<p data-start=\"5858\" data-end=\"5878\"><strong data-start=\"5858\" data-end=\"5878\">Pastoral economy</strong></p>\n</li>\n<li data-start=\"5879\" data-end=\"5914\">\n<p data-start=\"5881\" data-end=\"5914\">Cow = unit of wealth (<strong data-start=\"5903\" data-end=\"5913\">Aghnya</strong>)</p>\n</li>\n<li data-start=\"5915\" data-end=\"5930\">\n<p data-start=\"5917\" data-end=\"5930\">Barter system</p>\n</li>\n<li data-start=\"5931\" data-end=\"5958\">\n<p data-start=\"5933\" data-end=\"5958\">No private land ownership</p>\n</li>\n<li data-start=\"5959\" data-end=\"6012\">\n<p data-start=\"5961\" data-end=\"5973\">Agriculture:</p>\n<ul data-start=\"5976\" data-end=\"6012\">\n<li data-start=\"5976\" data-end=\"5992\">\n<p data-start=\"5978\" data-end=\"5992\">Barley (yavam)</p>\n</li>\n<li data-start=\"5995\" data-end=\"6012\">\n<p data-start=\"5997\" data-end=\"6012\">Wheat (godhuma)</p>\n</li>\n</ul>\n</li>\n<li data-start=\"6013\" data-end=\"6035\">\n<p data-start=\"6015\" data-end=\"6035\">Tools: Wooden plough</p>\n</li>\n<li data-start=\"6036\" data-end=\"6069\">\n<p data-start=\"6038\" data-end=\"6069\">Metal: <strong data-start=\"6045\" data-end=\"6053\">Ayas</strong> (Copper/Bronze)</p>\n</li>\n<li data-start=\"6070\" data-end=\"6083\">\n<p data-start=\"6072\" data-end=\"6083\">Iron absent</p>\n</li>\n</ul>\n<hr data-start=\"6085\" data-end=\"6088\" />\n<h3 data-start=\"6090\" data-end=\"6107\">G. RELIGION</h3>\n<p data-start=\"6108\" data-end=\"6136\"><em data-start=\"6108\" data-end=\"6136\">(धार्मिक जीवन &ndash; PYQ HEAVY)</em></p>\n<ul data-start=\"6138\" data-end=\"6212\">\n<li data-start=\"6138\" data-end=\"6158\">\n<p data-start=\"6140\" data-end=\"6158\"><strong data-start=\"6140\" data-end=\"6158\">Nature worship</strong></p>\n</li>\n<li data-start=\"6159\" data-end=\"6179\">\n<p data-start=\"6161\" data-end=\"6179\">Yajnas, no temples</p>\n</li>\n<li data-start=\"6180\" data-end=\"6212\">\n<p data-start=\"6182\" data-end=\"6212\"><strong data-start=\"6182\" data-end=\"6212\">Henotheism / Kathenotheism</strong></p>\n</li>\n</ul>\n<h4 data-start=\"6214\" data-end=\"6233\">IMPORTANT GODS</h4>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"6235\" data-end=\"6495\">\n<thead data-start=\"6235\" data-end=\"6255\">\n<tr data-start=\"6235\" data-end=\"6255\">\n<th data-start=\"6235\" data-end=\"6241\" data-col-size=\"sm\">God</th>\n<th data-start=\"6241\" data-end=\"6255\" data-col-size=\"sm\">Importance</th>\n</tr>\n</thead>\n<tbody data-start=\"6266\" data-end=\"6495\">\n<tr data-start=\"6266\" data-end=\"6298\">\n<td data-start=\"6266\" data-end=\"6274\" data-col-size=\"sm\">Indra</td>\n<td data-start=\"6274\" data-end=\"6298\" data-col-size=\"sm\">Chief god, Vritrahan</td>\n</tr>\n<tr data-start=\"6299\" data-end=\"6324\">\n<td data-start=\"6299\" data-end=\"6306\" data-col-size=\"sm\">Agni</td>\n<td data-start=\"6306\" data-end=\"6324\" data-col-size=\"sm\">Mediator, fire</td>\n</tr>\n<tr data-start=\"6325\" data-end=\"6357\">\n<td data-start=\"6325\" data-end=\"6334\" data-col-size=\"sm\">Varuna</td>\n<td data-start=\"6334\" data-end=\"6357\" data-col-size=\"sm\">Cosmic order (Rita)</td>\n</tr>\n<tr data-start=\"6358\" data-end=\"6378\">\n<td data-start=\"6358\" data-end=\"6365\" data-col-size=\"sm\">Soma</td>\n<td data-start=\"6365\" data-end=\"6378\" data-col-size=\"sm\">Plant god</td>\n</tr>\n<tr data-start=\"6379\" data-end=\"6402\">\n<td data-start=\"6379\" data-end=\"6387\" data-col-size=\"sm\">Rudra</td>\n<td data-start=\"6387\" data-end=\"6402\" data-col-size=\"sm\">Proto-Shiva</td>\n</tr>\n<tr data-start=\"6403\" data-end=\"6428\">\n<td data-start=\"6403\" data-end=\"6413\" data-col-size=\"sm\">Savitri</td>\n<td data-start=\"6413\" data-end=\"6428\" data-col-size=\"sm\">Solar deity</td>\n</tr>\n<tr data-start=\"6429\" data-end=\"6455\">\n<td data-start=\"6429\" data-end=\"6437\" data-col-size=\"sm\">Aditi</td>\n<td data-start=\"6437\" data-end=\"6455\" data-col-size=\"sm\">Mother of gods</td>\n</tr>\n<tr data-start=\"6456\" data-end=\"6471\">\n<td data-start=\"6456\" data-end=\"6463\" data-col-size=\"sm\">Usha</td>\n<td data-start=\"6463\" data-end=\"6471\" data-col-size=\"sm\">Dawn</td>\n</tr>\n<tr data-start=\"6472\" data-end=\"6495\">\n<td data-start=\"6472\" data-end=\"6482\" data-col-size=\"sm\">Ashvins</td>\n<td data-start=\"6482\" data-end=\"6495\" data-col-size=\"sm\">Twin gods</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"6497\" data-end=\"6500\" />\n<h2 data-start=\"6502\" data-end=\"6538\">🎯 FINAL EXAM TAKEAWAYS (LOCK IT)</h2>\n<p></p>\n<ul data-start=\"6540\" data-end=\"6710\">\n<li data-start=\"6540\" data-end=\"6566\">\n<p data-start=\"6542\" data-end=\"6566\">Rig Veda &rarr; Early Vedic</p>\n</li>\n<li data-start=\"6567\" data-end=\"6602\">\n<p data-start=\"6569\" data-end=\"6602\">Sabha + Samiti &rarr; Checks on king</p>\n</li>\n<li data-start=\"6603\" data-end=\"6624\">\n<p data-start=\"6605\" data-end=\"6624\">No iron, no coins</p>\n</li>\n<li data-start=\"6625\" data-end=\"6641\">\n<p data-start=\"6627\" data-end=\"6641\">Cow = wealth</p>\n</li>\n<li data-start=\"6642\" data-end=\"6671\">\n<p data-start=\"6644\" data-end=\"6671\">Indra = most powerful god</p>\n</li>\n<li data-start=\"6672\" data-end=\"6710\">\n<p data-start=\"6674\" data-end=\"6710\">Varna system &rarr; Late Rig Vedic only</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"23\"><strong data-path-to-node=\"23\" data-index-in-node=\"0\">Q. With reference to the Rigvedic society and religion, consider the following statements:</strong> <strong data-path-to-node=\"23\" data-index-in-node=\"91\">(ऋग्वैदिक समाज और धर्म के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"24\">\n<li>\n<p data-path-to-node=\"24,0,0\">The Varna system was flexible and based on occupation in the Early Vedic phase, as evidenced in the 9th Mandal. (<em data-path-to-node=\"24,0,0\" data-index-in-node=\"113\">प्रारंभिक वैदिक चरण में वर्ण व्यवस्था लचीली और व्यवसाय पर आधारित थी, जैसा कि 9वें मंडल में प्रमाणित है।</em>)</p>\n</li>\n<li>\n<p data-path-to-node=\"24,1,0\">Women had a high status, could attend assemblies, and child marriage was generally absent. (<em data-path-to-node=\"24,1,0\" data-index-in-node=\"92\">महिलाओं की स्थिति उच्च थी, वे सभाओं में भाग ले सकती थीं और बाल विवाह आम तौर पर अनुपस्थित था।</em>)</p>\n</li>\n<li>\n<p data-path-to-node=\"24,2,0\"><strong data-path-to-node=\"24,2,0\" data-index-in-node=\"0\">Indra</strong>, also known as 'Purandhara', was the most important deity with 250 hymns dedicated to him. (<em data-path-to-node=\"24,2,0\" data-index-in-node=\"98\">इंद्र, जिन्हें 'पुरंदर' के नाम से भी जाना जाता है, 250 भजनों के साथ सबसे महत्वपूर्ण देवता थे।</em>)</p>\n</li>\n<li>\n<p data-path-to-node=\"24,3,0\">Iron technology played a crucial role in expanding the Rigvedic economy. (<em data-path-to-node=\"24,3,0\" data-index-in-node=\"74\">ऋग्वैदिक अर्थव्यवस्था के विस्तार में लोहे की तकनीक ने महत्वपूर्ण भूमिका निभाई।</em>)</p>\n</li>\n</ol>\n<p data-path-to-node=\"25\"><strong data-path-to-node=\"25\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"25\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong> A) 1 and 3 only B) 2 and 4 only C) 1, 2, and 3 only D) All of the above</p>",

      "<p>A</p>",

    "solution": "<p data-path-to-node=\"26\"><strong data-path-to-node=\"27,0\" data-index-in-node=\"0\">Critical Error Correction:</strong>&nbsp;Statement 4 is false. The Rigvedic Aryans were a&nbsp;<strong data-path-to-node=\"27,0\" data-index-in-node=\"76\">Bronze Age</strong>&nbsp;people;&nbsp;<strong data-path-to-node=\"27,0\" data-index-in-node=\"95\">Iron was unknown</strong>&nbsp;to them (it was introduced in the Later Vedic Period around 1000 BC). (<strong data-path-to-node=\"27,0\" data-index-in-node=\"183\">महत्वपूर्ण त्रुटि सुधार:</strong>&nbsp;कथन 4 गलत है। ऋग्वैदिक आर्य&nbsp;<strong data-path-to-node=\"27,0\" data-index-in-node=\"236\">कांस्य युग</strong>&nbsp;के लोग थे;&nbsp;<strong data-path-to-node=\"27,0\" data-index-in-node=\"258\">लोहा उनके लिए अज्ञात था</strong>&nbsp;(इसे 1000 ईसा पूर्व के आसपास उत्तर वैदिक काल में पेश किया गया था)।)</p>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the transition from the Rig Vedic to the Later Vedic Period, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"117\">(ऋग्वैदिक से उत्तर वैदिक काल के संक्रमण के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Shift Eastward:</strong> The Aryans moved from the Saptasindhu region toward the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"72\">Ganga-Yamuna Doab</strong>, establishing the Kuru-Panchala region as their core. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"144\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"145\">पूर्व की ओर विस्थापन:</strong> आर्य सप्तसिंधु क्षेत्र से <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"193\">गंगा-यमुना दोआब</strong> की ओर चले गए, और कुरु-पांचाल क्षेत्र को अपना केंद्र बनाया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Janapadas:</strong> The political unit evolved from the kin-based <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"57\">Jana</strong> to the territory-based <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"85\">Janapada</strong>, and wars were now fought for land rather than cows. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"147\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"148\">जनपद:</strong> राजनीतिक इकाई कबीले आधारित <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"181\">'जन'</strong> से क्षेत्र आधारित <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"204\">'जनपद'</strong> में विकसित हुई, और अब युद्ध गायों के बजाय भूमि के लिए लड़े जाने लगे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Royal Titles:</strong> Kings began assuming grand titles like <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"53\">Samrat</strong> and <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"64\">Ekrat</strong>, and the significance of tribal assemblies like <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"118\">Vidatha</strong> disappeared. <em data-path-to-node=\"5,2,0\" data-index-in-node=\"139\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"140\">शाही उपाधियाँ:</strong> राजाओं ने <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"165\">सम्राट</strong> और <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"175\">एकराट</strong> जैसी भव्य उपाधियाँ धारण करना शुरू कर दिया, और <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"227\">विदथ</strong> जैसी कबीलाई सभाओं का महत्व समाप्त हो गया।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct?</strong> <strong data-path-to-node=\"6\" data-index-in-node=\"49\">(उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,3,0\"><strong data-path-to-node=\"7,3,0\" data-index-in-node=\"0\">D)</strong> All of the above (1, 2, and 3)</p>\n</li>\n</ul>",

rt=\"588\" data-end=\"608\" data-col-size=\"sm\">लौह युग का आरम्भ</td>\n</tr>\n<tr data-start=\"609\" data-end=\"662\">\n<td data-start=\"609\" data-end=\"618\" data-col-size=\"sm\">Nature</td>\n<td data-start=\"618\" data-end=\"641\" data-col-size=\"sm\">Transitional society</td>\n<td data-start=\"641\" data-end=\"662\" data-col-size=\"sm\">संक्रमणकालीन समाज</td>\n</tr>\n<tr data-start=\"663\" data-end=\"740\">\n<td data-start=\"663\" data-end=\"678\" data-col-size=\"sm\">Major Tribes</td>\n<td data-start=\"678\" data-end=\"712\" data-col-size=\"sm\">Kuru, Panchala, Vatsa, Ushinara</td>\n<td data-start=\"712\" data-end=\"740\" data-col-size=\"sm\">कुरु, पंचाल, वत्स, उशीनर</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"742\" data-end=\"798\">📌 <strong data-start=\"745\" data-end=\"798\">State-level political organisation &rarr; after 500 BC</strong></p>\n<hr data-start=\"800\" data-end=\"803\" />\n<h2 data-start=\"805\" data-end=\"836\">2️⃣ GEOGRAPHICAL EXPANSION</h2>\n<p data-start=\"837\" data-end=\"856\"><em data-start=\"837\" data-end=\"856\">(भौगोलिक विस्तार)</em></p>\n<h3 data-start=\"858\" data-end=\"893\">🔹 Eastward Movement (UPSC FAV)</h3>\n<ul data-start=\"894\" data-end=\"977\">\n<li data-start=\"894\" data-end=\"938\">\n<p data-start=\"896\" data-end=\"938\">Aryans moved <strong data-start=\"909\" data-end=\"922\">eastwards</strong> up to <strong data-start=\"929\" data-end=\"938\">Bihar</strong></p>\n</li>\n<li data-start=\"939\" data-end=\"977\">\n<p data-start=\"941\" data-end=\"977\">Core area &rarr; <strong data-start=\"953\" data-end=\"977\">Kuru&ndash;Panchala region</strong></p>\n</li>\n</ul>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"979\" data-end=\"1237\">\n<thead data-start=\"979\" data-end=\"999\">\n<tr data-start=\"979\" data-end=\"999\">\n<th data-start=\"979\" data-end=\"988\" data-col-si ne-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">(iv) Treasurer/Cashier (कोषाध्यक्ष)</span></td>\n</tr>\n</tbody>\n</table>\n<p data-path-to-node=\"14\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">Select the correct code (सही कूट चुनें):</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"0\">A)</strong> A-ii, B-i, C-iii, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0\" data-index-in-node=\"0\">B)</strong> A-i, B-ii, C-iii, D-iv</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"0\">C)</strong> A-ii, B-i, C-iv, D-iii</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,3,0\" data-index-in-node=\"0\">D)</strong> A-iii, B-iv, C-i, D-ii</p>\n</li>\n</ul>",

    "solution": "<p data-path-to-node=\"16\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><span style=\"font-family: 'Noto Sans';\">SSC/UPSC Tip: In this period, Bali became a compulsory tax, and the king took 1/6th (Bhaga) of the agricultural produce.</span></p>\n<p style=\"line-height: 1.15 !important;\">(सुझाव: इस काल में बली एक अनिवार्य कर बन गया, और राजा कृषि उपज का 1/6 भाग (भाग) कर के रूप में लेता था।)</p>\n<h2 data-start=\"1407\" data-end=\"1435\">3️⃣ POLITICAL STRUCTURE</h2>\n<p data-start=\"1436\" data-end=\"1457\"><em data-start=\"1436\" data-end=\"1457\">(राजनीतिक व्यवस्था)</em></p>\n<h3 data-start=\"1459\" data-end=\"1498\">🔹 Jana &rarr; Janapada (VERY IMPORTANT)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1500\" data-end=\"1651\">\n<thead data-start=\"1500\" data-end=\"1536\">\n<tr data-start=\"1500\" data-end=\"1536\">\n<th data-start=\"1500\" data-end=\"1509\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"1509\" data-end=\"1521\" data-col-size=\"sm\">Rig Vedic</th>\n<th data-start=\"1521\" data-end=\"1536\" data-col-size=\"sm\">Later Vedic</th>\n</tr>\n</thead>\n<tbody data-start=\"1551\" data-end=\"1651\">\n<tr data-start=\"1551\" data-end=\"1608\">\n<td data-start=\"1551\" data-end=\"1559\" data-col-size=\"sm\">Basis</td>\n<td data-start=\"1559\" data-end=\"1578\" data-col-size=\"sm\">Kin-based (Jana)</td>\n<td data-start=\"1578\" data-end=\"1608\" data-col-size=\"sm\">Territory-based (Janapada)</td>\n</tr>\n<tr data-start=\"1609\" data-end=\"1651\">\n<td data-start=\"1609\" data-end=\"1616\" data-col-size=\"sm\">Term</td>\n<td data-start=\"1616\" data-end=\"1623\" data-col-size=\"sm\">Jana</td>\n<td data-start=\"1623\" data-end=\"1651\" data-col-size=\"sm\">Janapada, Rashtra, Rajya</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"1653\" data-end=\"1708\">📌 <strong data-start=\"1656\" data-end=\"1668\">Janapada</strong> term appears in <strong data-start=\"1685\" data-end=\"1708\">Brahmanas (~800 BC)</strong></p>\n<hr data-start=\"1710\" data-end=\"1713\" />\n<h3 data-start=\"1715\" data-end=\"1739\">🔹 Kingship &amp; Titles</h3>\n<ul data-start=\"1741\" data-end=\"1798\">\n<li data-start=\"1741\" data-end=\"1773\">\n<p data-start=\"1743\" data-end=\"1773\">Kingship became <strong data-start=\"1759\" data-end=\"1773\">hereditary</strong></p>\n</li>\n<li data-start=\"1774\" data-end=\"1798\">\n<p data-start=\"1776\" data-end=\"1798\">Authority strengthened</p>\n</li>\n</ul>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1800\" data-end=\"1964\">\n<thead data-start=\"1800\" data-end=\"1819\">\n<tr data-start=\"1800\" data-end=\"1819\">\n<th data-start=\"1800\" data-end=\"1808\" data-col-size=\"sm\">Title</th>\n<th data-start=\"1808\" data-end=\"1819\" data-col-size=\"sm\">Meaning</th>\n</tr>\n</thead>\n<tbody data-start=\"1830\" data-end=\"1964\">\n<tr data-start=\"1830\" data-end=\"1858\">\n<td data-start=\"1830\" data-end=\"1839\" data-col-size=\"sm\">Samrat</td>\n<td data-start=\"1839\" data-end=\"1858\" data-col-size=\"sm\">Universal ruler</td>\n</tr>\n<tr data-start=\"1859\" data-end=\"1881\">\n<td data-start=\"1859\" data-end=\"1867\" data-col-size=\"sm\">Ekrat</td>\n<td data-start=\"1867\" data-end=\"1881\" data-col-size=\"sm\">Sole ruler</td>\n</tr>\n<tr data-start=\"1882\" data-end=\"1921\">\n<td data-start=\"1882\" data-end=\"1899\" data-col-size=\"sm\">Rajavisvajanan</td>\n<td data-start=\"1899\" data-end=\"1921\" data-col-size=\"sm\">King of all people</td>\n</tr>\n<tr data-start=\"1922\" data-end=\"1964\">\n<td data-start=\"1922\" data-end=\"1941\" data-col-size=\"sm\">Ahilabhuvanapati</td>\n<td data-start=\"1941\" data-end=\"1964\" data-col-size=\"sm\">Lord of who </th>\n</tr>\n</thead>\n<tbody data-start=\"2735\" data-end=\"2888\">\n<tr data-start=\"2735\" data-end=\"2762\">\n<td data-start=\"2735\" data-end=\"2742\" data-col-size=\"sm\">Army</td>\n<td data-start=\"2742\" data-end=\"2762\" data-col-size=\"sm\">No standing army</td>\n</tr>\n<tr data-start=\"2763\" data-end=\"2794\">\n<td data-start=\"2763\" data-end=\"2771\" data-col-size=\"sm\">Units</td>\n<td data-start=\"2771\" data-end=\"2794\" data-col-size=\"sm\">Tribal mobilisation</td>\n</tr>\n<tr data-start=\"2795\" data-end=\"2830\">\n<td data-start=\"2795\" data-end=\"2801\" data-col-size=\"sm\">Tax</td>\n<td data-start=\"2801\" data-end=\"2830\" data-col-size=\"sm\"><strong data-start=\"2803\" data-end=\"2828\">Bhaga = 1/6th produce</strong></td>\n</tr>\n<tr data-start=\"2831\" data-end=\"2859\">\n<td data-start=\"2831\" data-end=\"2838\" data-col-size=\"sm\">Bali</td>\n<td data-start=\"2838\" data-end=\"2859\" data-col-size=\"sm\">Became compulsory</td>\n</tr>\n<tr data-start=\"2860\" data-end=\"2888\">\n<td data-start=\"2860\" data-end=\"2869\" data-col-size=\"sm\">Payers</td>\n<td data-start=\"2869\" data-end=\"2888\" data-col-size=\"sm\">Mainly Vaishyas</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

    "question": "<p data-path-to-node=\"21\"><strong data-path-to-node=\"21\" data-index-in-node=\"0\">Q. Regarding the Later Vedic society, which of the following statements is INCORRECT?</strong> <strong data-path-to-node=\"21\" data-index-in-node=\"86\">(उत्तर वैदिक समाज के संबंध में, निम्नलिखित में से कौन सा कथन गलत है?)</strong></p>\n<ul data-path-to-node=\"22\">\n<li>\n<p data-path-to-node=\"22,0,0\"><strong data-path-to-node=\"22,0,0\" data-index-in-node=\"0\">A) Varna System:</strong> It became rigid and based on <strong data-path-to-node=\"22,0,0\" data-index-in-node=\"46\">birth</strong> rather than occupation; the concept of <strong data-path-to-node=\"22,0,0\" data-index-in-node=\"91\">Dvija</strong> (twice-born) emerged for the top three varnas. <em data-path-to-node=\"22,0,0\" data-index-in-node=\"144\">(<strong data-path-to-node=\"22,0,0\" data-index-in-node=\"145\">वर्ण व्यवस्था:</strong> यह व्यवसाय के बजाय <strong data-path-to-node=\"22,0,0\" data-index-in-node=\"179\">जन्म</strong> पर आधारित और कठोर हो गई; शीर्ष तीन वर्णों के लिए <strong data-path-to-node=\"22,0,0\" data-index-in-node=\"233\">द्विज</strong> (दो बार जन्म लेने वाला) की अवधारणा उभरी।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,1,0\"><strong data-path-to-node=\"22,1,0\" data-index-in-node=\"0\">B) Status of Women:</strong> Women&rsquo;s status declined; they were excluded from assemblies and the Upanayana ceremony. <em data-path-to-node=\"22,1,0\" data-index-in-node=\"108\">(<strong data-path-to-node=\"22,1,0\" data-index-in-node=\"109\">महिलाओं की स्थिति:</strong> महिलाओं की स्थिति में गिरावट आई; उन्हें सभाओं और उपनयन संस्कार से बाहर कर दिया गया।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,2,0\"><strong data-path-to-node=\"22,2,0\" data-index-in-node=\"0\">C) Ashrama System:</strong> The <strong data-path-to-node=\"22,2,0\" data-index-in-node=\"23\">Jabala Upanishad</strong> first mentions the four stages: Brahmacharya, Grihastha, Vanaprastha, and Sanyasa. <em data-path-to-node=\"22,2,0\" data-index-in-node=\"123\">(<strong data-path-to-node=\"22,2,0\" data-index-in-node=\"124\">आश्रम व्यवस्था:</strong> <strong data-path-to-node=\"22,2,0\" data-index-in-node=\"140\">जाबाल उपनिषद</strong> में पहली बार चार चरणों का उल्लेख है: ब्रह्मचर्य, गृहस्थ, वानप्रस्थ और संन्यास।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"22,3,0\"><strong data-path-to-node=\"22,3,0\" data-index-in-node=\"0\">D) Gotra:</strong> Inter-marriage within the same <strong data-path-to-node=\"22,3,0\" data-index-in-node=\"41\">Gotra</strong> (common ancestor group) was permitted and encouraged. <em data-path-to-node=\"22,3,0\" data-index-in-node=\"101\">(<strong data-path-to-node=\"22,3,0\" data-index-in-node=\"102\">गोत्र:</strong> एक ही <strong data-path-to-node=\"22,3,0\" data-index-in-node=\"115\">गोत्र</strong> (समान पूर्वज समूह) के भीतर अंतर-विवाह की अनुमति थी और इसे प्रोत्साहित किया जाता था।)</em></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. With reference to the political systems of the 6th Century BC, consider the following statements:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"101\">(6वीं शताब्दी ईसा पूर्व की राजनीतिक व्यवस्थाओं के संदर्भ में, निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">Sources:</strong> The Buddhist text <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"27\">Anguttara Nikaya</strong> and the Jain text <em data-path-to-node=\"5,0,0\" data-index-in-node=\"62\">Bhagavati Sutra</em> are the primary sources that list the 16 Mahajanapadas. <em data-path-to-node=\"5,0,0\" data-index-in-node=\"134\">(<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"135\">स्रोत:</strong> बौद्ध ग्रंथ <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"154\">अंगुत्तर निकाय</strong> और जैन ग्रंथ 'भगवती सूत्र' प्राथमिक स्रोत हैं जो 16 महाजनपदों को सूचीबद्ध करते हैं।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Republics (Gana-Sanghas):</strong> States like <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"38\">Vajji</strong> (Vaishali) and <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"59\">Malla</strong> (Kushinara) were oligarchies where power was exercised by a group of rajas rather than a single king. <em data-path-to-node=\"5,1,0\" data-index-in-node=\"167\">(<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"168\">गणराज्य (गण-संघ):</strong> <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"186\">वज्जी</strong> (वैशाली) और <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"204\">मल्ल</strong> (कुशीनारा) जैसे राज्य अल्पतंत्र थे जहाँ शक्ति का प्रयोग एक राजा के बजाय राजाओं के समूह द्वारा किया जाता था।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Vajji Confederacy:</strong> It was a union of eight clans, including the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"64\">Lichchhavis</strong> and <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"80\">Jnatrikas</strong> (the clan of Lord Mahavira). <em data-path-to-node=\"5,2,0\" data-index-in-node=\"119\">(<strong data-path-to-node=\"5,2,0\" data-index-in-node=\"120\">वज्जी संघ:</strong> यह आठ कुलों का संघ था, जिसमें <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"161\">लिच्छवी</strong> और <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"172\">ज्ञातृक</strong> (भगवान महावीर का कुल) शामिल थे।)</em></p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Kamboja:</strong> Located in the North-West, it was famous for its excellent breed of <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"77\">horses</strong> and followed a republican constitution. <em data-path-to-node=\"5,3,0\" data-index-in-node=\"124\">(<strong data-path-to-node=\"5,3,0\" data-index-in-node=\"125\">कम्बोज:</strong> उत्तर-पश्चिम में स्थित, यह <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"160\">घोड़ों</strong> की उत्कृष्ट नस्ल के लिए प्रसिद्ध था और एक गणतांत्रिक संविधान का पालन करता था।)</em></p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are correct? (उपर्युक्त में से कौन से कथन सही हैं?)</strong></p>\n<ul data-path-to-node=\"7\">\n<li>\n<p data-path-to-node=\"7,0,0\"><strong data-path-to-node=\"7,0,0\" data-index-in-node=\"0\">A)</strong> 1 and 2 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,1,0\"><strong data-path-to-node=\"7,1,0\" data-index-in-node=\"0\">B)</strong> 2 and 3 only</p>\n</li>\n<li>\n<p data-path-to-node=\"7,2,0\"><strong data-path-to-node=\"7,2,0\" data-index-in-node=\"0\">C)</strong> 1, 2     "solution": "<h1 data-start=\"259\" data-end=\"308\">THE RISE OF MAHAJANAPADAS (c. 900&ndash;600 BC)</h1>\n<h2 data-start=\"309\" data-end=\"349\">महाजनपदों का उदय (लगभग 900&ndash;600 ई.पू.)</h2>\n<hr data-start=\"351\" data-end=\"354\" />\n<h2 data-start=\"356\" data-end=\"392\">1️⃣ BASIC CONCEPT &amp; TERMINOLOGY</h2>\n<h3 data-start=\"393\" data-end=\"410\">(मूल अवधारणा)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"412\" data-end=\"646\">\n<thead data-start=\"412\" data-end=\"451\">\n<tr data-start=\"412\" data-end=\"451\">\n<th data-start=\"412\" data-end=\"419\" data-col-size=\"sm\">Term</th>\n<th data-start=\"419\" data-end=\"437\" data-col-size=\"sm\">English Meaning</th>\n<th data-start=\"437\" data-end=\"451\" data-col-size=\"sm\">हिंदी अर्थ</th>\n</tr>\n</thead>\n<tbody data-start=\"466\" data-end=\"646\">\n<tr data-start=\"466\" data-end=\"507\">\n<td data-start=\"466\" data-end=\"473\" data-col-size=\"sm\">Jana</td>\n<td data-start=\"473\" data-end=\"491\" data-col-size=\"sm\">Tribe / lineage</td>\n<td data-col-size=\"sm\" data-start=\"491\" data-end=\"507\">जनजाति / कुल</td>\n</tr>\n<tr data-start=\"508\" data-end=\"577\">\n<td data-start=\"508\" data-end=\"519\" data-col-size=\"sm\">Janapada</td>\n<td data-start=\"519\" data-end=\"550\" data-col-size=\"sm\">Territory where Jana settles</td>\n<td data-col-size=\"sm\" data-start=\"550\" data-end=\"577\">वह भूमि जहाँ जन बसता है</td>\n</tr>\n<tr data-start=\"578\" data-end=\"646\">\n<td data-start=\"578\" data-end=\"593\" data-col-size=\"sm\">Mahajanapada</td>\n<td data-col-size=\"sm\" data-start=\"593\" data-end=\"621\">Large &amp; powerful Janapada</td>\n<td data-col-size=\"sm\" data-start=\"621\" data-end=\"646\">बड़ा व शक्तिशाली जनपद</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"648\" data-end=\"739\">📌 <strong data-start=\"651\" data-end=\"676\">Key Shift (UPSC PYQ):</strong><br data-start=\"676\" data-end=\"679\" /><strong data-start=\"679\" data-end=\"713\">Jana &rarr; Janapada &rarr; Mahajanapada</strong><br data-start=\"713\" data-end=\"716\" /><strong data-start=\"716\" data-end=\"739\">जन &rarr; जनपद &rarr; महाजनपद</strong></p>\n<hr data-start=\"741\" data-end=\"744\" />\n<h2 data-start=\"746\" data-end=\"780\">2️⃣ WHY MAHAJANAPADAS EMERGED</h2>\n<h3 data-start=\"781\" data-end=\"811\">(महाजनपदों के उदय के कारण)</h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"813\" data-end=\"1261\">\n<thead data-start=\"813\" data-end=\"866\">\n<tr data-start=\"813\" data-end=\"866\">\n<th data-start=\"813\" data-end=\"822\" data-col-size=\"sm\">Reason</th>\n<th data-start=\"822\" data-end=\"846\" data-col-size=\"sm\">Explanation (English)</th>\n<th data-start=\"846\" data-end=\"866\" data-col-size=\"sm\">व्याख्या (हिंदी)</th>\n</tr>\n</thead>\n<tbody data-start=\"881\" data-end=\"1261\">\n<tr data-start=\"881\" data-end=\"948\">\n<td data-start=\"881\" data-end=\"896\" data-col-size=\"sm\">Fertile Land</td>\n<td data-start=\"896\" data-end=\"925\" data-col-size=\"sm\">Settlement in Ganga plains</td>\n<td data-col-size=\"sm\" data-start=\"925\" data-end=\"948\">गंगा के उपजाऊ मैदान</td>\n</tr>\n<tr data-start=\"949\" data-end=\"1013\">\n<td data-start=\"949\" data-end=\"967\" data-col-size=\"sm\">Iron Technology</td>\n<td data-start=\"967\" data-end=\"994\" data-col-size=\"sm\">Forest clearance &amp; tools</td>\n<td data-start=\"994\" data-end=\"1013\" data-col-size=\"sm\">लोहे से वन कटाई</td>\n</tr>\n<tr data-start=\"1014\" data-end=\"1085\">\n<td data-start=\"1014\" data-end=\"1037\" data-col-size=\"sm\">Agricultural Surplus</td>\n<td data-col-size=\"sm\" data-start=\"1037\" data-end=\"1067\">Extra food for army &amp; admin</td>\n<td data-col-size=\"sm\" data-start=\"1067\" data-e
