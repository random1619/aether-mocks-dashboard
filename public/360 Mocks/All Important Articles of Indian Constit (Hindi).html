    "correct_option_id": 0,
    "solution": "<p><strong>The correct answer is Article 15.</strong></p>\n<p></p>\n<p><strong>Key Points</strong></p>\n<p></p>\n<h3>Key Points:</h3>\n<ul>\n<li>\n<p><strong>Equality and Non-Discrimination</strong>:</p>\n<ul>\n<li><strong>Article 14</strong>: Ensures everyone is treated equally before the law and receives equal protection under the law.<br /><strong>(अनुच्छेद 14 कानून के समक्ष हर किसी को समानता और कानून के तहत समान सुरक्षा की गारंटी देता है।)</strong></li>\n<li><strong>Article 15</strong>: Expands on secularism by prohibiting discrimination based on religion, race, caste, sex, or place of birth. <strong>(अनुच्छेद 15 धर्म, जाति, लिंग या जन्म स्थान के आधार पर भेदभाव को गैरकानूनी बनाकर धर्मनिरपेक्षता को अधिकतम सीमा तक विस्तृत करता है।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Prohibition of Discrimination</strong>:</p>\n<ul>\n<li>According to <strong>Article 15</strong>, no citizen can be discriminated against solely on the basis of religion, race, caste, sex, or place of birth.<br /><strong>(अनुच्छेद 15 के अनुसार, किसी भी नागरिक के साथ धर्म, जाति, लिंग या जन्म स्थान के आधार पर भेदभाव नहीं किया जा सकता।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Exception</strong>:</p>\n<ul>\n<li>Special provisions (like reservations and access to free education) can be granted for the benefit of women, children, and socially or educationally disadvantaged groups.<br /><strong>(महिलाओं, बच्चों और किसी भी सामाजिक या शैक्षिक रूप से पिछड़े वर्ग के लाभ के लिए विशेष रियायतें दी जा सकती हैं, जैसे आरक्षण और मुफ्त शिक्षा तक पहुंच।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Philosophical Concept: \"Sarva Dharma Sambhava\"</strong>:</p>\n<ul>\n<li>This concept refers to the equal respect of all religions, implying that all religious paths lead to the same ultimate goal, although the paths themselves may differ.<br /><strong>(यह विचार सभी धर्मों के समान सम्मान को संदर्भित करता है, जिसका अर्थ है कि सभी धर्मों के मार्ग अंततः एक ही लक्ष्य तक पहुंचते हैं, भले ही वे मार्ग अलग-अलग हों।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Positive Secularism</strong>:</p>\n<ul>\n<li>This idea was championed by leaders like <strong>Swami Vivekananda</strong> and <strong>Mahatma Gandhi</strong> and is rooted in the spirit of Indian culture.<br /><strong>(भारतीय संस्कृति की प्रमुख भावना को दर्शाने वाला यह विचार स्वामी विवेकानंद और महात्मा गांधी द्वारा आगे बढ़ाया गया था।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>No State Religion</strong>:</p>\n<ul>\n<li>India has no official state religion. However, personal laws based on religion may govern issues such as marriage, divorce, inheritance, and alimony.<br /><strong>(भारत में कोई मान्यता प्राप्त राज्य धर्म नहीं है। हालाँकि, विवाह, तलाक, विरासत और गुजारा भत्ता जैसे मुद्दों पर धर्म आधारित व्यक्तिगत कानून लागू हो सकते हैं।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Objective of Indian Secularism</strong>:</p>\n<ul>\n<li>The aim is to ensure peaceful coexistence of different religions without promoting any single one as an end goal in itself.<br /><strong>(भारतीय धर्मनिरपेक्षता का उद्देश्य विभिन्न धर्मों का शांतिपूर्ण सह-अस्तित्व सुनिश्चित करना है, न कि किसी एक को अंतिम लक्ष्य के रूप में स्थापित करना।)</strong></li>\n</ul>\n</li>\n</ul>",

    "correct_option_id": 3,
    "solution": "<h4><strong>Key Points</strong>:</h4>\n<ul>\n<li><strong>44th Constitution Amendment Act</strong>:\n<ul>\n<li>Introduced the term <strong>&lsquo;armed rebellion&rsquo;</strong> in the Constitution as grounds for declaring a National Emergency.<br /><strong>(44वें संविधान संशोधन अधिनियम के तहत, 'सशस्त्र विद्रोह' शब्द को राष्ट्रीय आपातकाल घोषित करने के लिए संविधान में जोड़ा गया।)</strong></li>\n</ul>\n</li>\n</ul>\n<hr />\n<h4><strong>National Emergency (Article 352)</strong>:</h4>\n<ul>\n<li>\n<p><strong>When Declared</strong>:</p>\n<ul>\n<li>The President can declare a National Emergency if the security of India or any part of it is threatened b#>\n<li><strong>War</strong></li>\n<li><strong>External Aggression</strong></li>\n<li><strong>Armed Rebellion</strong><br /><strong>(राष्ट्रपति भारत या उसके किसी हिस्से की सुरक्षा को युद्ध, बाहरी आक्रमण या सशस्त्र विद्रोह से खतरा होने पर राष्ट्रीय आपातकाल घोषित कर सकते हैं।)</strong></li>\n</ul>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>Approval Requirement</strong>:</p>\n<ul>\n<li>This emergency can only be declared on the basis of a <strong>written request</strong> by the Union Cabinet headed by the Prime Minister.<br /><strong>(प्रधानमंत्री की अध्यक्षता वाले केंद्रीय मंत्रिमंडल के लिखित अनुरोध पर ही यह आपातकाल घोषित किया जा सकता है।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Types of Emergency</strong>:</p>\n<ul>\n<li><strong>External Emergency</strong>: Declared on the basis of war or external aggression.<br /><strong>(बाहरी आपातकाल: युद्ध या बाहरी आक्रमण के आधार पर घोषित किया जाता है।)</strong></li>\n<li><strong>Internal Emergency</strong>: Declared on the basis of armed rebellion.<br /><strong>(आंतरिक आपातकाल: सशस्त्र विद्रोह के आधार पर घोषित किया जाता है।)</strong></li>\n</ul>\n</li>\n</ul>\n<hr />\n<h4><strong>President's Rule (Article 356)</strong>:</h4>\n<ul>\n<li>\n<p><strong>Grounds</strong>:</p>\n<ul>\n<li>Can be imposed in any state on the grounds of failure of constitutional machinery.<br /><strong>(संवैधानिक तंत्र की विफलता के आधार पर किसी भी राज्य में राष्ट्रपति शासन लगाया जा सकता है।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Duration</strong>:</p>\n</li>\n</ul>\n<p>Action: Does not automatically suspend the Fundamental Rights. It empowers the President to suspend the right to move any court for the enforcement of the Fundamental Rights specified in a Presidential Order.If approved by both houses of Parliament, President's Rule can last for <strong>6 months</strong> and can be extended for a maximum of <strong>3 years</strong> with Parliament&rsquo;s approval every 6 months.<br /><strong>(दोनों सदनों की मंजूरी मिलने पर राष्ट्रपति शासन 6 महीने तक लागू रह सकता है और इसे हर 6 महीने में संसद की मंजूरी से अधिकतम 3 साल तक बढ़ाया जा सकता है।)</strong></p>\n<h3><strong><strong>Article 358: Automatic Suspension of Article 19</strong></strong></h3>\n<ul>\n<li>\n<p>Action: Automatically suspends the six fundamental freedoms guaranteed by Article 19 (e.g., freedom of speech, assembly, movement).</p>\n</li>\n</ul>\n<ul>\n<li>\n<p>Condition: Activates automatically as soon as a National Emergency is proclaimed.</p>\n</li>\n<li>\n<p>Limitation (44th Amendment Act): Applies only when the emergency is declared on the grounds of war or external aggression, and not on the ground of</p>\n</li>\n</ul>\n<ul>\n<li>\n<p>armed rebellion</p>\n</li>\n</ul>\n<p></p>\n<hr />\n<h3><strong><strong>Distinction: Article 359 (Presidential Order)</strong><span style=\"font-size: 16px;\">Exclusion:</span><span style=\"font-size: 16px;\"> The enforcement of </span><span style=\"font-size: 16px;\">Article 20</span><span style=\"font-size: 16px;\"> (protection in respect of conviction for offences) and </span><span style=\"font-size: 16px;\">Article 21</span><span style=\"font-size: 16px;\"> (protection of life and personal liberty) </span><span style=\"font-size: 16px;\">cannot be suspended</span><span style=\"font-size: 16px;\"> under any circumstances.</span></strong></h3>\n<p></p>\n<p></p>\n<hr />\n<h4><strong>Instances of President's Rule in Rajasthan</strong>:</h4>\n<ol>\n<li>\n<p><strong>13 March 1967 - 26 April 1967</strong> (44 days):</p>\n<ul>\n<li>Imposed due to an indecisive outcome in the elections.<br /><strong>(चुनाव के अनिर्णायक परिणाम के कारण लागू किया गया।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>29 April 1977 - 22 June 1977</strong> (54 days):</p>\n<ul>\n<li>Imposed despite <strong>Hari Dev Joshi</strong> enjoying majority support in the Assembly.<br /><strong>(हरिदेव जोशी को विधानसभा में बहुमत प्राप्त होने के बावजूद लागू किया गया।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>16 February 1980 - 6 June 1980</strong> (111 days):</p>\n<ul>\n<li>Imposed despite <strong>Bhairon Singh Shekhawat</strong> enjoying majority support in the Assembly.<br /><strong>(भैरों सिंह शेखावत को विधानसभा में बहुमत प्राप्त होने के बावजूद लागू किया गया।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>15 December 1992 - 4 December 1993</strong> (354 days):</p>\n<ul>\n<li>Imposed despite <strong>Bhairon Singh Shekhawat</strong> enjoying majority support in the Assembly.<br /><strong>(भैरों सिंह शेखावत को विधानसभा में बहुमत प्राप्त होने के बावजूद लागू किया गया।)</strong></li>\n</ul>\n</li>\n</ol>\n<p></p>",

    "solution": "<p><strong>The correct answer is Part III.</strong></p>\n<p></p>\n<p><strong>Key Points</strong></p>\n<p></p>\n<p><strong>Article 32 of the Indian Constitution gives the right to individuals to move to the Supreme Court to seek justice.</strong></p>\n<p><strong>Under Article 32, the parliament can also entrust any other court to exercise the power of the Supreme Court, provided that it is within its Jurisdiction.</strong></p>\n<p><strong>Article 32 is for the enforcement of Fundamental Rights.</strong></p>\n<p><strong>The nature of Writ Jurisdiction provided under this Article is discretionary.</strong></p>\n<p><strong>There are five types of Writs as provided under Article 32 of the Constitution:</strong></p>\n<p><strong>Habeas Corpus.</strong></p>\n<p><strong>Quo Warranto.</strong></p>\n<p><strong>Mandamus.</strong></p>\n<p><strong>Certiorari.</strong></p>\n<p><strong>Prohibition.</strong></p>\n<p><strong>सही उत्तर भाग III है।</strong></p>\n<p></p>\n<p><strong>प्रमुख बिंदु</strong></p>\n<p></p>\n<p><strong>भारतीय संविधान का अनुच्छेद 32 व्यक्तियों को न्याय पाने के लिए सर्वोच्च न्यायालय जाने का अधिकार देता है।</strong></p>\n<p><strong>अनुच्छेद 32 के तहत, संसद सर्वोच्च न्यायालय की शक्ति का प्रयोग करने के लिए किसी अन्य अदालत को भी सौंप सकती है, बशर्ते कि वह उसके अधिकार क्षेत्र में हो।</strong></p>\n<p><strong>अनुच्छेद 32 मौलिक अधिकारों के प्रवर्तन के लिए है।</strong></p>\n<p><strong>इस अनुच्छेद के तहत प्रदान किए गए रिट क्षेत्राधिकार की प्रकृति विवेकाधीन है।</strong></p>\n<p><strong>संविधान के अनुच्छेद 32 के तहत प्रदत्त पांच प्रकार की रिट हैं:</strong></p>\n<p><strong>बन्दी प्रत्यक्षीकरण।</strong></p>\n<p><strong>अधिकार पृच्छा।</strong></p>\n<p><strong>परमादेश।</strong></p>\n<p><strong>प्रमाणपत्र।</strong></p>\n<p><strong>निषेध।</strong></p>",

    "solution": "<p><strong>The correct answer is Article 26.</strong></p>\n<p></p>\n<p><strong>Article 26 of the Indian constitution is related to 'freedom to manage religious affairs'.</strong></p>\n<p><strong>Article 26 is available to only Citizens of India and not to aliens.</strong></p>\n<p><strong>In the Indian constitution, the right to freedom of religion is described from Article 25 to Article 28.</strong></p>\n<p><strong>Article 26 is a fundamental right in the Indian constitution.</strong></p>\n<p><strong>Article 26 allows every religious group to establish and maintain institutions for religious and charitable purposes.</strong></p>\n<p><strong>Additional Information</strong></p>\n<p></p>\n<p><strong>Article 23 prohibits traffic in human beings and other similar forms of forced labour.</strong></p>\n<p><strong>Article 24 deals with the prohibition of employment of children in factories etc.</strong></p>\n<p><strong>Article 28 deals with the freedom to attendance at religious worship in certain educational institutions.</strong></p>\n<p><strong>सही उत्तर अनुच्छेद 26 है।</strong></p>\n<p></p>\n<p><strong>भारतीय संविधान का अनुच्छेद 26 'धार्मिक मामलों के प्रबंधन की स्वतंत्रता' से संबंधित है।</strong></p>\n<p><strong>अनुच्छेद 26 केवल भारत के नागरिकों के लिए उपलब्ध है, विदेशियों के लिए नहीं।</strong></p>\n<p><strong>भारतीय संविधान में धर्म की स्वतंत्रता का अधिकार अनुच्छेद 25 से अनुच्छेद 28 तक वर्णित है।</strong></p>\n<p><strong>भारतीय संविधान में अनुच्छेद 26 एक मौलिक अधिकार है।</strong></p>\n<p><strong>अनुच्छेद 26 प्रत्येक धार्मिक समूह को धार्मिक और धर्मार्थ उद्देश्यों के लिए संस्थानों की स्थापना और रखरखाव की अनुमति देता है।</strong></p>\n<p><strong>अतिरिक्त जानकारी</strong></p>\n<p></p>\n<p><strong>अनुच्छेद 23 मानवों के अवैध व्यापार और अन्य समान प्रकार के जबरन श्रम पर रोक लगाता है।</strong></p>\n<p><strong>अनुच्छेद 24 कारखानों आदि में बच्चों के नियोजन के निषेध से संबंधित है।</strong></p>\n<p><strong>अनुच्छेद 28 कुछ शैक्षणिक संस्थानों में धार्मिक पूजा में उपस्थित होने की स्वतंत्रता से संबंधित है।</strong></p>",

    "solution": "<h3><strong>Solution: Procedure for Impeachment of the President of India</strong></h3>\n<hr />\n<h4><strong>Key Points</strong>:</h4>\n<ul>\n<li><strong>Correct Answer</strong>: <strong>Article 61</strong> outlines the <strong>procedure for the impeachment</strong> of the President for violating the Constitution.<br /><strong>(सही उत्तर अनुच्छेद 61 है, जो संविधान का उल्लंघन करने के लिए राष्ट्रपति के महाभियोग की प्रक्रिया का वर्णन करता है।)</strong></li>\n</ul>\n<hr />\n<h4><strong>Procedure for Impeachment</strong>:</h4>\n<ul>\n<li>\n<p><strong>Initiation of Charges</strong>:</p>\n<ul>\n<li><strong>Either House of Parliament</strong> can initiate the charges of impeachment against the President. However, no charge shall be preferred unless it is supported by not less than <strong>two-thirds of the total membership</strong> of the House initiating the charges.<br /><strong>(राष्ट्रपति पर आरोप संसद के किसी भी सदन द्वारा लगाए जा सकते हैं, लेकिन यह आरोप तब तक नहीं लगाया जाएगा जब तक कि सदन की कुल सदस्यता के दो-तिहाई से कम सदस्य उसे समर्थन नहीं देते।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Investigation</strong>:</p>\n<ul>\n<li>Once one House of Parliament prefers an accusation, the <strong>other House investigates</strong> or causes the charge to be investigated. During this process, the <strong>President has the right to appear</strong> and be represented.<br /><strong>(एक सदन आरोप लगाने के बाद, दूसरा सदन आरोप की जांच करता है या जांच करवाता है। इस दौरान राष्ट्रपति को पेश होने और अपना प्रतिनिधित्व करने का अधिकार होता है।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Resolution and Removal</strong>:</p>\n<ul>\n<li>If the investigation sustains the charge and a resolution is passed by not less than <strong>two-thirds of the total membership</strong> of the House investigating the charge, declaring that the President has been found guilty, the <strong>President will be removed from office</strong> effective from the date the resolution is passed.<br /><strong>(यदि जांच के बाद सदन की कुल सदस्यता के दो-तिहाई सदस्यों द्वारा प्रस्ताव पारित होता है कि राष्ट्रपति दोषी हैं, तो उस तिथि से राष्ट्रपति को पद से हटाने का प्रभाव होगा जिस दिन प्रस्ताव पारित किया जाता है।)</strong></li>\n</ul>\n</li>\n</ul>\n<hr />\n<h4><strong>Additional Information</strong>:</h4>\n<ul>\n<li>\n<p>On <strong>December 28, 1948</strong>, the <strong>Constituent Assembly</strong> debated <strong>Draft Article 50</strong>, which later became <strong>Article 61</strong> of the Indian Constitution.<br /><strong>(28 दिसंबर 1948 को, संविधान सभा ने मसौदा अनुच्छेद 50 पर बहस की, जो बाद में भारतीय संविधान का अनुच्छेद 61 बना।)</strong></p>\n</li>\n<li>\n<p>The <strong>Draft Article</strong> detailed the process for removing the <strong>President of India</strong> from office.<br /><strong>(इस ड्राफ्ट आर्टिकल में भारत के राष्ट्रपति को पद से हटाने की प्रक्रिया दी गई थी।)</strong></p>\n</li>\n</ul>\n<hr />\n<h4><strong>Related Articles</strong>:</h4>\n<ol>\n<li>\n<p><strong>Article 52</strong>:</p>\n<ul>\n<li><strong>President of India</strong><br />There shall be a <strong>President of India</strong>.<br /><strong>(अनुच्छेद 52: भारत का राष्ट्रपति होगा।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Article 74</strong>:</p>\n<ul>\n<li><strong>Council of Ministers</strong><br />To aid and advise the <strong>President</strong>.<br /><strong>(अनुच्छेद 74: राष्ट्रपति को सहायता और सलाह देने के लिए मंत्रिपरिषद।)</strong></li>\n</ul>\n</li>\n<li>\n<p><strong>Article 78</strong>:</p>\n<ul>\n<li><strong>Prime Minister's Responsibilities</strong><br />The <strong>Prime Minister</strong> is responsible for <strong>providing information</strong> to the President, etc.<br /><strong>(अनुच्छेद 78: प्रधानमंत्री की जिम्मेदारी, राष्ट्रपति को सूचना उपलब्ध कराना।)</strong></li>\n</ul>\n</li>\n</ol>\n<hr />\n<h3><strong>Conclusion</strong>:</h3>\n<p><strong>Article 61</strong> provides a detailed procedure for the <strong>impeachment</strong> of the President for violating the Constitution. The process requires a <strong>two-thirds majority</strong> in both Houses of Parliament and includes investigation rights for the President.</p>\n<p><strong>(निष्कर्ष: अनुच्छेद 61 राष्ट्रपति के महाभियोग की प्रक्रिया का वर्णन करता है, जिसमें दोनों सदनों के दो-तिहाई बहुमत की आवश्यकता होती है और इसमें राष्ट्रपति के लिए जांच के दौरान अधिकारों का प्रावधान है।)</strong></p>",

 <strong>elected</strong> in the <strong>first meeting</strong> of the Lok Sabha after the general elections.<br /><strong>(उन्हें आम चुनाव के बाद लोकसभा की पहली बैठक में चुना जाता है।)</strong></p>\n</li>\n<li>\n<p>The current <strong>Speaker</strong> of the <strong>Lok Sabha</strong> is <strong>Om Birla</strong>.<br /><strong>(वर्तमान लोकसभा अध्यक्ष ओम बिड़ला हैं।)</strong></p>\n</li>\n<li>\n<p>The <strong>Deputy Speaker</strong> is the <strong>second-highest authority</strong> in Lok Sabha. They act as presiding officers in the <strong>absence of the Speaker</strong>.<br /><strong>(लोकसभा में उपाध्यक्ष दूसरा सबसे बड़ा अधिकारी होता है और स्पीकर की अनुपस्थिति में पीठासीन अधिकारी के रूप में कार्य करते हैं।)</strong></p>\n</li>\n</ul>",

    "solution": "<p><strong>सही उत्&zwj;तर राष्&zwj;ट्रपति पर राष्&zwj;ट्रीय सुरक्षा के उल्&zwj;लंघन के लिए महाभियोग चलाया जा सकता है।</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>राष्ट्रीय सुरक्षा बयान के उल्लंघन के लिए राष्ट्रपति पर महाभियोग लगाया जा सकता है, यह गलत है।</strong></p>\n<p><strong>अनुच्छेद 61 राष्ट्रपति पर महाभियोग चलाने की प्रक्रिया।</strong></p>\n<p><strong>जब संविधान के उल्लंघन के लिए राष्ट्रपति पर महाभियोग चलाया जाता है, तो महाभियोग की प्रकिया को संसद के किसी भी सदन द्वारा शुरू किया जा सकता है।</strong></p>\n<p><strong>ऐसा प्रस्ताव सदन की कुल सदस्यता के कम से कम दो-तिहाई बहुमत से पारित किया गया है।</strong></p>\n<p><strong>भारत के संविधान का अनुच्छेद 61 राष्ट्रपति पर महाभियोग की प्रक्रिया का वर्णन करता है।</strong></p>\n<p><strong>महाभियोग का प्रस्ताव संसद के किसी भी सदन में प्रस्तुत किया जा सकता है।</strong></p>\n<p><strong>महाभियोग प्रस्ताव को सदन की कुल सदस्यता के दो-तिहाई बहुमत से पारित किया जा सकता है.</strong></p>\n<p><strong>Correct Answer: The President can be impeached for breach of national security.</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>That the President can be impeached for violating a national security statement is wrong.</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>Article 61 Procedure for impeachment of the President.</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>When the President is impeached for violation of the Constitution, the impeachment process can be initiated by either House of Parliament.</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p></p>\n<p><strong>Such a resolution is passed by a majority of not less than two-thirds of the total membership of the House.</strong></p>\n<p><strong>Article 61 of the Constitution of India describes the process of impeachment of the President.</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>The motion of impeachment can be presented in either house of the Parliament.</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p></p>\n<p><strong>The impeachment motion can be passed by a two-thirds majority of the total membership of the House.</strong></p>\n<h3>Impeachment of the President of India</h3>\n<ol>\n<li>\n<p><strong>Grounds for Impeachment:</strong></p>\n<ul>\n<li>The President can be removed only for a <strong>violation of the Constitution</strong>.</li>\n<li>The term \"violation of the Constitution\" is not defined in the Constitution.</li>\n</ul>\n</li>\n<li>\n<p><strong>Procedure (Article 61):</strong></p>\n<ul>\n<li><strong>Initiation of Charges:</strong>\n<ul>\n<li>The process can begin in either House of Parliament.</li>\n<li>The charges must be signed by <strong>1/4th of the members</strong> of the initiating House.</li>\n<li>A <strong>14-day notice</strong> must be given to the President.</li>\n</ul>\n</li>\n<li><strong>Passing the Resolution:</strong>\n<ul>\n<li>The impeachment resolution must be passed by a <strong>two-thirds majority</strong> of the total membership of the initiating House.</li>\n</ul>\n</li>\n<li><strong>Investigation by the Other House:</strong>\n<ul>\n<li>The charges are sent to the other House, which investigates the allegations.</li>\n<li>If the other House also passes the resolution by a <strong>two-thirds majority</strong>, the President is impeached.</li>\n</ul>\n</li>\n<li>The President is removed from office from the date the impeachment resolution is passed.</li>\n</ul>\n</li>\n<li>\n<p><strong>Related Articles:</strong></p>\n<ul>\n<li><strong>Article 52:</strong> The President of India.</li>\n<li><strong>Article 53:</strong> Executive power of the President.</li>\n<li><strong>Article 54:</strong> Election of the President.</li>\n<li><strong>Article 55:</strong> Manner of election.</li>\n<li><strong>Article 56:</strong> Term of office.</li>\n<li><strong>Article 57:</strong> Eligibility for re-election.</li>\n<li><strong>Article 58:</strong> Qualifications for the office of President.</li>\n<li><strong>Article 59:</strong> Conditions of the President's office.</li>\n<li><strong>Article 60:</strong> Oath or affirmation by the President.</li>\n<li><strong>Article 61:</strong> Procedure for impeachment.</li>\n<li><strong>Article 62:</strong> Election to fill a vacancy and the term of office for the newly elected President.</li>\n<li><strong>Article 70:</strong> Discharge of the President&rsquo;s functions in other contingencies.</li>\n<li><strong>Article 71:</strong> Matters related to the election of the President or Vice-President.</li>\n<li><strong>Article 72:</strong> Power to grant pardons, commute sentences, etc.</li>\n<li><strong>Article 74:</strong> Council of Ministers to aid and advise the President.</li>\n<li><strong>Article 75:</strong> Provisions related to Ministers.</li>\n<li><strong>Article 87:</strong> Special address by the President.</li>\n<li><strong>Article 123:</strong> Power to promulgate ordinances.</li>\n<li><strong>Article 143:</strong> Power to consult the Supreme Court.</li>\n</ul>\n</li>\n</ol>\n<h3>भारत के राष्ट्रपति का महाभियोग</h3>\n<ol>\n<li>\n<p><strong>महाभियोग का आधार:</strong></p>\n<ul>\n<li>राष्ट्रपति को केवल <strong>संविधान के उल्लंघन</strong> के लिए हटाया जा सकता है।</li>\n<li>\"संविधान का उल्लंघन\" शब्द को संविधान में परिभाषित नहीं किया गया है।</li>\n</ul>\n</li>\n<li>\n<p><strong>प्रक्रिया (अनुच्छेद 61):</strong></p>\n<ul>\n<li><strong>आरोप लगाना:</strong>\n<ul>\n<li>प्रक्रिया संसद के किसी भी सदन में शुरू की जा सकती है।</li>\n<li>आरोपों पर सदन के <strong>1/4 सदस्यों</strong> के हस्ताक्षर होने चाहिए।</li>\n<li>राष्ट्रपति को <strong>14 दिन पहले नोटिस</strong> देना अनिवार्य है।</li>\n</ul>\n</li>\n<li><strong>प्रस्ताव पारित करना:</strong>\n<ul>\n<li>महाभियोग प्रस्ताव को प्रारंभिक सदन की <strong>दो-तिहाई बहुमत</strong> से पारित करना आवश्यक है।</li>\n</ul>\n</li>\n<li><strong>दूसरे सदन द्वारा जांच:</strong>\n<ul>\n<li>आरोप दूसरे सदन को भेजे जाते हैं, जो आरोपों की जांच करता है।</li>\n<li>यदि दूसरा सदन भी प्रस्ताव को <strong>दो-तिहाई बहुमत</strong> से पारित करता है, तो राष्ट्रपति को हटा दिया जाता है।</li>\n</ul>\n</li>\n<li>राष्ट्रपति को उसी दिन से पदमुक्त माना जाता है जिस दिन महाभियोग प्रस्ताव पारित होता है।</li>\n</ul>\n</li>\n<li>\n<p><strong>संबंधित अनुच्छेद:</strong></p>\n<ul>\n<li><strong>अनुच्छेद 52:</strong> भारत के राष्ट्रपति।</li>\n<li><strong>अनुच्छेद 53:</strong> राष्ट्रपति की कार्यकारी शक्ति।</li>\n<li><strong>अनुच्छेद 54:</strong> राष्ट्रपति का चुनाव।</li>\n<li><strong>अनुच्छेद 55:</strong> चुनाव की प्रक्रिया।</li>\n<li><strong>अनुच्छेद 56:</strong> कार्यकाल।</li>\n<li><strong>अनुच्छेद 57:</strong> पुनर्निर्वाचन के लिए पात्रता।</li>\n<li><strong>अनुच्छेद 58:</strong> राष्ट्रपति के लिए आवश्यक योग्यताएं।</li>\n<li><strong>अनुच्छेद 59:</strong> राष्ट्रपति के कार्यालय की शर्तें।</li>\n<li><strong>अनुच्छेद 60:</strong> राष्ट्रपति द्वारा शपथ या प्रतिज्ञा।</li>\n<li><strong>अनुच्छेद 61:</strong> महाभियोग की प्रक्रिया।</li>\n<li><strong>अनुच्छेद 62:</strong> रिक्ति को भरने का चुनाव और नए राष्ट्रपति के कार्यकाल से संबंधित प्रावधान।</li>\n<li><strong>अनुच्छेद 70:</strong> अन्य आपात स्थितियों में राष्ट्रपति के कार्यों का निर्वहन।</li>\n<li><strong>अनुच्छेद 71:</strong> राष्ट्रपति या उपराष्ट्रपति के चुनाव से संबंधित मामले।</li>\n<li><strong>अनुच्छेद 72:</strong> दया याचिका, सजा को माफ करना, बदलना आदि।</li>\n<li><strong>अनुच्छेद 74:</strong> राष्ट्रपति की सहायता और परामर्श के लिए मंत्री परिषद।</li>\n<li><strong>अनुच्छेद 75:</strong> मंत्रियों से संबंधित अन्य प्रावधान।</li>\n<li><strong>अनुच्छेद 87:</strong> राष्ट्रपति का विशेष अभिभाषण।</li>\n<li><strong>अनुच्छेद 123:</strong> अध्यादेश जारी करने की शक्ति।</li>\n<li><strong>अनुच्छेद 143:</strong> उच्चतम न्यायालय से परामर्श करने की शक्ति।</li>\n</ul>\n</li>\n</ol>",

atil case, the Supreme Court added writ jurisdiction as a part of the basic structure of the Constitution.</strong></p>\n<p><strong>In the judgment, it is mentioned that we note that writ jurisdiction is one of the valuable rights provided under Article 32 of the Constitution, which itself is part of the basic structure of the Constitution.</strong></p>",

    "solution": "<p><strong>Key Points</strong></p>\n<p></p>\n<p><strong>Article 213 of the constitution deals with the ordinance making power of the Governor.</strong></p>\n<p><strong>Governor issues an ordinance when one or both the Houses of State Legislature are not in Session.</strong></p>\n<p><strong>The ordinance issued by him will have the same force as a law.</strong></p>\n<p><strong>The Governor has the power to withdraw the ordinance anytime.</strong></p>\n<p><strong>Governor is prohibited from promulgating ordinances that contains:</strong></p>\n<p><strong>​If a bill requires the previous sanction of the President for introduction in the State Legislature.</strong></p>\n<p><strong>If a bill is reserved for the assent of the President.</strong></p>\n<p><strong>He takes advice from the council of ministers before promulgating any ordinance.</strong></p>\n<p><strong>An ordinance issued by the Governor ceases to be in operation 6 weeks after the reassembly of the State Legislature unless approved earlier.</strong></p>\n<p><strong>The life of the Ordinance is the same as the ordinance issued by the President i.e. 6 months and 6 weeks.</strong></p>\n<p><strong>Additional Information</strong></p>\n<p></p>\n<p><strong>Article 161 -</strong></p>\n<p><strong>Deals with the Pardoning Powers of the Governor.</strong></p>\n<p><strong>Governor can grant pardon to any person convicted of any offence, against any law relating to a matter which the executive power of the state extends.</strong></p>\n<p><strong>Governor is deprived of pardoning the death sentence of the person.</strong></p>\n<p><strong>Article 200 -</strong></p>\n<p><strong>Deals with the Assent of the Governor.</strong></p>\n<p><strong>Every bill passed by the State Legislature has to receive Governor's assent.</strong></p>\n<p><strong>Governor can:</strong></p>\n<p><strong>Give assent to a bill</strong></p>\n<p><strong>Withhold his assent</strong></p>\n<p><strong>Reserve the bill for the reconsideration of the President.</strong></p>\n<p><strong>Article 167 -</strong></p>\n<p><strong>Deals with the duties of the Chief Minister.</strong></p>\n<p><strong>It is the duty of the Chief Minister to provide the Governor with all the information and decisions of the Council of Ministers relating to the affairs of the state.</strong></p>\n<p><strong>प्रमुख बिंदु</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>संविधान का अनुच्छेद 213 राज्यपाल की अध्यादेश बनाने की शक्ति से संबंधित है।</strong></p>\n<p><strong>राज्यपाल एक अध्यादेश जारी करता है जब राज्य विधानमंडल के एक या दोनों सदन सत्र में नहीं होते हैं।</strong></p>\n<p><strong>उसके द्वारा जारी किए गए अध्यादेश में कानून के समान बल होगा।</strong></p>\n<p><strong>राज्यपाल के पास किसी भी समय अध्यादेश को वापस लेने की शक्ति है।</strong></p>\n<p><strong>राज्यपाल को उन अध्यादेशों को प्रख्यापित करने से प्रतिबंधित किया गया है जिनमें शामिल हैं:</strong></p>\n<p><strong>यदि किसी विधेयक को राज्य विधानमंडल में पेश करने के लिए राष्ट्रपति की पूर्व स्वीकृति की आवश्यकता होती है।</strong></p>\n<p><strong>यदि कोई विधेयक राष्ट्रपति की सहमति के लिए आरक्षित है।</strong></p>\n<p><strong>वह किसी भी अध्यादेश को लागू करने से पहले मंत्रिपरिषद से सलाह लेता है।</strong></p>\n<p><strong>राज्यपाल द्वारा जारी किया गया एक अध्यादेश राज्य विधानमंडल के फिर से शुरू होने के 6 सप्ताह बाद प्रभाव में नहीं रहता है जब तक कि इसे पहले अनुमोदित नहीं किया जाता है।</strong></p>\n<p><strong>अध्यादेश का जीवन राष्ट्रपति द्वारा जारी किए गए अध्यादेश के समान है यानी 6 महीने और 6 सप्ताह।</strong></p>\n<p><strong>अतिरिक्त जानकारी</strong></p>\n<p><strong>&nbsp;</strong></p>\n<p><strong>अनुच्छेद 161 -</strong></p>\n<p><strong>राज्यपाल की क्षमादान शक्तियों से संबंधित है।</strong></p>\n<p><strong>राज्यपाल किसी भी मामले से संबंधित किसी भी कानून के खिलाफ किसी भी अपराध के दोषी व्यक्ति को क्षमा प्रदान कर सकता है, जो राज्य की कार्यकारी शक्ति का विस्तार करता है।</strong></p>\n<p><strong>राज्यपाल व्यक्ति की मृत्युदंड को क्षमा करने से वंचित रह जाता है।</strong></p>\n<p><strong>अनुच्छेद 200 -</strong></p>\n<p><strong>राज्यपाल की सहमति से व्यवहार करता है।</strong></p>\n<p><strong>राज्य विधानमंडल द्वारा पारित प्रत्येक विधेयक को राज्यपाल की स्वीकृति प्राप्त करनी होती है।</strong></p>\n<p><strong>राज्यपाल कर सकते हैं:</strong></p>\n<p><strong>विधेयक को स्वीकृति दें</strong></p>\n<p><strong>उसकी अनुमति रोको</strong></p>\n<p><strong>विधेयक को राष्ट्रपति के पुनर्विचार के लिए सुरक्षित रख लें।</strong></p>\n<p><strong>अनुच्छेद 167 -</strong></p>\n<p><strong>मुख्यमंत्री के कर्तव्यों से निपटता है।</strong></p>\n<p></p>\n<p><strong>मुख्यमंत्री का कर्तव्य है कि वह राज्यपाल को राज्य के मामलों से संबंधित मंत्रिपरिषद की सभी जानकारी और निर्णय प्रदान करे।</strong></p>\n<p></p>",
