    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the structure and types of the Executive in India and other democratic systems:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"124\">(भारत और अन्य लोकतांत्रिक प्रणालियों में कार्यपालिका की संरचना और प्रकारों के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">Union Executive</strong> under Part V (Articles 52-78) consists of the President, Vice-President, Prime Minister, Council of Ministers, and the Attorney General, but it excludes the Comptroller and Auditor General (CAG). (भाग V (अनुच्छेद 52-78) के तहत <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"247\">संघीय कार्यपालिका</strong> में राष्ट्रपति, उपराष्ट्रपति, प्रधानमंत्री, मंत्रिपरिषद और महान्यायवादी शामिल हैं, लेकिन इसमें नियंत्रक एवं महालेखा परीक्षक (CAG) शामिल नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">While the Prime Minister and other Ministers constitute the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"60\">Political Executive</strong> with a fixed tenure and public accountability, the Civil Servants (Bureaucracy) form the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"169\">Permanent Executive</strong> who remain in office until retirement age and are politically neutral. (जहाँ प्रधानमंत्री और अन्य मंत्री एक निश्चित कार्यकाल और सार्वजनिक जवाबदेही के साथ <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"343\">राजनीतिक कार्यपालिका</strong> का गठन करते हैं, वहीं सिविल सेवक (नौकरशाही) <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"408\">स्थायी कार्यपालिका</strong> बनाते हैं जो सेवानिवृत्ति की आयु तक पद पर बने रहते हैं और राजनीतिक रूप से तटस्थ होते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">In India's Parliamentary Republic, the President is the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"56\">Nominal Executive</strong> (Head of State) who possesses all legal powers but exercises none in practice, whereas the Prime Minister is the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"187\">Real Executive</strong> (Head of Government). (भारत के संसदीय गणराज्य में, राष्ट्रपति <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"264\">नाममात्र की कार्यपालिका</strong> (राष्ट्राध्यक्ष) हैं, जिनके पास सभी कानूनी शक्तियां हैं लेकिन व्यवहार में वे किसी का भी उपयोग नहीं करते हैं, जबकि प्रधानमंत्री <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"415\">वास्तविक कार्यपालिका</strong> (शासनाध्यक्ष) हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">A <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"2\">Semi-Presidential System</strong> (like in France) differs from a <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"59\">Presidential System</strong> (like in the USA) because the former divides powers between a President and a Prime Minister who is responsible to the Legislature, while the latter combines both roles in a President not accountable to the Legislature. (एक <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"303\">अर्ध-अध्यक्षीय प्रणाली</strong> (जैसे फ्रांस में) एक <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"347\">अध्यक्षीय प्रणाली</strong> (जैसे अमेरिका में) से भिन्न है क्योंकि पूर्व में राष्ट्रपति और एक प्रधानमंत्री (जो विधायिका के प्रति उत्तरदायी है) के बीच शक्तियों का विभाजन होता है, जबकि बाद में दोनों भूमिकाएं एक राष्ट्रपति में संयुक्त होती हैं जो विधायिका के प्रति जवाबदेह नहीं होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">The <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"4\">Plural Executive</strong> system, where authority is vested in collective leadership, is a characteristic feature of the Council of Ministers in a Parliamentary form of government. (संसदीय सरकार में मंत्रिपरिषद की एक विशिष्ट विशेषता <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"228\">बहुवचन कार्यपालिका</strong> (Plural Executive) प्रणाली है, जहाँ अधिकार सामूहिक नेतृत्व में निहित होता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, 3, and 5 only B) 2, 3, 4, and 5 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<p data-path-to-node=\"9\"><strong data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: D (All of the above)</strong></p>\n<ul data-path-to-node=\"10\">\n<li>\n<p data-path-to-node=\"10,0,0\"><strong data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Statement 1 is Correct:</strong> Per Art 52-78, the CAG (Art 148) is part of Part V but <em data-path-to-node=\"10,0,0\" data-index-in-node=\"79\">not</em> part of the Union Executive definition.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,1,0\"><strong data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 2 is Correct:</strong> This fixes the common \"Permanent vs Political\" trap. Ministers are elected (Political); IAS/IPS are appointed (Permanent).</p>\n</li>\n<li>\n<p data-path-to-node=\"10,2,0\"><strong data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3 is Correct:</strong> \"Nominal\" (De-jure) vs \"Real\" (De-facto) is the bedrock of the Indian Parliamentary system.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,3,0\"><strong data-path-to-node=\"10,3,0\" data-index-in-node=\"0\">Statement 4 is Correct:</strong> In the USA, the President is not part of the Legislature. In Semi-Presidential systems, the PM must have a majority in the house.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,4,0\"><strong data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">Statement 5 is Correct:</strong> Unlike the \"Single Executive\" of the USA President, India's Cabinet works on <strong data-path-to-node=\"10,4,0\" data-index-in-node=\"101\">Collective Responsibility</strong>.</p>\n</li>\n</ul>\n<div class=\"attachment-container search-images\"><response-element class=\"\" ng-version=\"0.0.0-PLACEHOLDER\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\"><single-image _nghost-ng-c3452170976=\"\" data-is-interactive=\"false\" class=\"ng-star-inserted\" style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<div class=\"image-container ng-star-insert argin-top: 0px !important;\" data-path-to-node=\"14,1,1,0\">Nominal/Ceremonial (नाममात्र)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,1,2,0\">President (राष्ट्रपति)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,0,0\" data-index-in-node=\"0\">Head of Government</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,1,0\">Real (वास्तविक)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,2,2,0\">Prime Minister (प्रधानमंत्री)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,0,0\" data-index-in-node=\"0\">Permanent Executive</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,1,0\">Expert/Neutral (विशेषज्ञ/तटस्थ)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,3,2,0\">Cabinet Secretary/IAS (कैबिनेट सचिव)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,4,0,0\" data-index-in-node=\"0\">Political Executive</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,4,1,0\">Amateur/Elected (चुने हुए)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14,4,2,0\">Cabinet Ministers (कैबिनेट मंत्री)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Consider the following statements regarding the office and election of the President of India:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(भारत के राष्ट्रपति के पद और चुनाव के संबंध में निम्नलिखित कथनों पर विचार करें:)</p>\n<ol style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"5\">\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">According to Article 52, the executive power of the Union is vested in the President, who serves as the formal head of the state and the symbol of the nation, performing an essentially ceremonial role.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 52 के अनुसार, संघ की कार्यपालिका शक्ति राष्ट्रपति में निहित है, जो राज्य के औपचारिक प्रमुख और राष्ट्र के प्रतीक के रूप में कार्य करते हैं, और अनिवार्य रूप से एक औपचारिक भूमिका निभाते हैं।)</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">While the President possesses legal authority and dignity, the Constitution ensures they do not arrogate real power and must carry out functions only with the aid and advice of the Prime Minister.</p>\n<p style=\"line-height: 1.15 !important;\">(जहाँ राष्ट्रपति के पास कानूनी अधिकार और गरिमा है, वहीं संविधान यह सुनिश्चित करता है कि वे वास्तविक शक्ति का अधिग्रहण न करें और केवल प्रधानमंत्री की सहायता और सलाह से ही कार्यों का निष्पादन करें।)</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">To qualify for the office under Article 58, a candidate must be a citizen of India, be at least 35 years of age, and possess the qualifications necessary to become a member of the Rajya Sabha.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 58 के तहत पद के लिए पात्र होने के लिए, एक उम्मीदवार को भारत का नागरिक होना चाहिए, कम से कम 35 वर्ष की आयु का होना चाहिए, और राज्यसभा का सदस्य बनने के लिए आवश्यक योग्यताएं होनी चाहिए।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\">The President is elected by Proportional Representation through the Single Transferable Vote (STV) system. </span><span style=\"font-family: Google Sans Text, sans-serif;\">Electoral Quota = (Total valid votes polled / (1 + 1)) + 1</span></p>\n<p style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\">राष्ट्रपति का चुनाव एकल संक्रमणीय मत (STV) के माध्यम से आनुपातिक प्रतिनिधित्व प्रणाली द्वारा किया जाता है। </span><span style=\"font-family: Google Sans Text, sans-serif;\">चुनावी कोटा = (कुल वैध मत / (1 + 1)) + 1</span></p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">A condition for the office under Article 59 is that the President shall not be a member of either House of Parliament or a State Legislature; if such a person is elected, they are deemed to have vacated their seat on the date they enter the office.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 59 के तहत पद की एक शर्त यह है कि राष्ट्रपति संसद के किसी भी सदन या राज्य विधायिका के सदस्य नहीं होंगे; यदि ऐसा कोई व्यक्ति निर्वाचित होता है, तो माना जाता है कि उन्होंने पद ग्रहण करने की तिथि से अपनी सीट खाली कर दी है।)</p>\n</li>\n</ol>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">A) 1, 2, 4, and 5 only</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">B) 1, 3, 4, and 5 only</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">C) 2, 3, and 4 only</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">D) All of the above (1, 2, 3, 4, and 5)</p>",

important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Minimum Age (न्यूनतम आयु)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\" data-index-in-node=\"0\">35 Years</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">House Qualification (सदन की योग्यता)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\" data-index-in-node=\"0\">Lok Sabha (लोकसभा)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">Office of Profit (लाभ का पद)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\" data-index-in-node=\"0\">Prohibited (प्रतिबंधित)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Voting Method (मतदान पद्धति)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\" data-index-in-node=\"0\">Secret Ballot (गुप्त मतदान)</strong></span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the nomination and vote calculation for the President of India:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"108\">(भारत के राष्ट्रपति के नामांकन और मत गणना के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">A valid nomination for the President requires <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"46\">50 proposers and 50 seconders</strong> from the electoral college, along with a security deposit of ₹15,000 in the RBI, which is forfeited if the candidate fails to secure <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"209\">one-sixth (1/6th)</strong> of the votes polled. (राष्ट्रपति के लिए एक वैध नामांकन के लिए निर्वाचक मंडल के <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"306\">50 प्रस्तावक और 50 समर्थक</strong> होने चाहिए, साथ ही RBI में ₹15,000 की सुरक्षा राशि जमा करनी होगी, जो उम्मीदवार द्वारा डाले गए वोटों का <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"435\">छठा हिस्सा (1/6)</strong> प्राप्त करने में विफल रहने पर जब्त कर ली जाती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The value of an <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"16\">MLA's vote</strong> is calculated by dividing the state's population by the total number of elected members of the assembly, then multiplying by 1/1000; this ensures the value of an MLA's vote is identical across all Indian states. (एक <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"243\">विधायक (MLA) के वोट</strong> के मूल्य की गणना राज्य की जनसंख्या को विधानसभा के निर्वाचित सदस्यों की कुल संख्या से विभाजित करके, फिर 1/1000 से गुणा करके की जाती है; यह सुनिश्चित करता है कि सभी भारतीय राज्यों में एक विधायक के वोट का मूल्य समान हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The value of an MP&rsquo;s vote is the same for both Lok Sabha and Rajya Sabha members, as it is calculated by dividing the total value of votes of all MLAs by the total number of elected MPs of both Houses.</p>\n<p data-path-to-node=\"5,2,0\">लोकसभा और राज्यसभा के सांसदों (MPs) के वोट का मूल्य समान होता है, क्योंकि इसका निर्धारण सभी राज्यों के विधायकों (MLAs) के वोटों के कुल मूल्य को संसद के दोनों सदनों के निर्वाचित सांसदों की कुल संख्या से विभाजित करके किया जाता है।</p>\n</li>\n<li>Under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"6\">Article 57</strong>, there is no constitutional bar on the number of times a person can be re-elected as President, as a person who holds or has held the office is eligible for re-election. (अनुच्छेद 57 के तहत, कोई व्यक्ति कितनी बार राष्ट्रपति के रूप में पुन: निर्वाचित हो सकता है, इस पर कोई संवैधानिक रोक नहीं है, क्योंकि जो व्यक्ति पद धारण करता है या कर चुका है, वह पुन: निर्वाचन के लिए पात्र है।)</li>\n<li>\n<p data-path-to-node=\"5,4,0\">According to <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"13\">Article 71</strong>, all doubts and disputes arising in connection with the election of the President or Vice-President shall be inquired into and decided exclusively by the <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"178\">Election Commission of India</strong>, whose decision shall be final. (अनुच्छेद 71 के अनुसार, राष्ट्रपति या उपराष्ट्रपति के चुनाव के संबंध में उत्पन्न होने वाले सभी संदेहों और विवादों की जांच और निर्णय विशेष रूप से <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"384\">भारत के चुनाव आयोग</strong> द्वारा किया जाएगा, जिसका निर्णय अंतिम होगा।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 3, and 4 only B) 1, 2, and 4 only C) 2, 3, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the President&rsquo;s office and its participants:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"89\">(राष्ट्रपति के पद और इसके प्रतिभागियों के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Oath of office is administered by the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"42\">Chief Justice of India (CJI)</strong>, where the President specifically swears to \"preserve, protect, and defend the Constitution.\" (पद की शपथ <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"176\">भारत के मुख्य न्यायाधीश (CJI)</strong> द्वारा दिलाई जाती है, जहाँ राष्ट्रपति विशेष रूप से \"संविधान के संरक्षण, सुरक्षा और बचाव\" की शपथ लेते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The President&rsquo;s term is <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"24\">5 years</strong> starting from the date he/she enters the office, and the current monthly salary is fixed at <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"124\">₹5 lakh</strong>. (राष्ट्रपति का कार्यकाल पद ग्रहण करने की तिथि से <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"182\">5 वर्ष</strong> का होता है, और वर्तमान मासिक वेतन <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"223\">₹5 लाख</strong> निर्धारित है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">A unique distinction exists: <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"29\">Nominated members</strong> of Parliament participate in the impeachment of the President, even though they cannot vote in the Presidential election. (एक अनूठा अंतर है: संसद के <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"196\">मनोनीत सदस्य</strong> राष्ट्रपति के महाभियोग में भाग लेते हैं, भले ही वे राष्ट्रपति चुनाव में मतदान नहीं कर सकते हों।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Elected members of State Legislative Assemblies</strong> (MLAs) participate in the election of the President but have no role in the impeachment process. (राज्यों की विधानसभाओं के <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"171\">निर्वाचित सदस्य</strong> (विधायक) राष्ट्रपति के चुनाव में भाग लेते हैं लेकिन महाभियोग प्रक्रिया में उनकी कोई भूमिका नहीं होती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements are CORRECT? / कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 3 and 4 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "solution": "<p data-start=\"146\" data-end=\"171\"><strong data-start=\"146\" data-end=\"171\">ELECTION of PRESIDENT</strong></p>\n<ul data-start=\"172\" data-end=\"264\">\n<li data-start=\"172\" data-end=\"199\">\n<p data-start=\"174\" data-end=\"199\">✔ Elected MPs (LS + RS)</p>\n</li>\n<li data-start=\"200\" data-end=\"218\">\n<p data-start=\"202\" data-end=\"218\">✔ Elected MLAs</p>\n</li>\n<li data-start=\"219\" data-end=\"238\">\n<p data-start=\"221\" data-end=\"238\">❌ Nominated MPs</p>\n</li>\n<li data-start=\"239\" data-end=\"264\">\n<p data-start=\"241\" data-end=\"264\">❌ MLAs in Impeachment</p>\n</li>\n</ul>\n<p data-start=\"266\" data-end=\"294\"><strong data-start=\"266\" data-end=\"294\">IMPEACHMENT of PRESIDENT</strong></p>\n<ul data-start=\"295\" data-end=\"343\">\n<li data-start=\"295\" data-end=\"312\">\n<p data-start=\"297\" data-end=\"312\">✔ Elected MPs</p>\n</li>\n<li data-start=\"313\" data-end=\"332\">\n<p data-start=\"315\" data-end=\"332\">✔ Nominated MPs</p>\n</li>\n<li data-start=\"333\" data-end=\"343\">\n<p data-start=\"335\" data-end=\"343\">❌ MLAs</p>\n</li>\n</ul>\n<p data-start=\"345\" data-end=\"466\"><strong data-start=\"345\" data-end=\"377\">ONE-LINE TRICK (EXAM READY):</strong><br data-start=\"377\" data-end=\"380\" />➡ <strong data-start=\"382\" data-end=\"424\">Nominated = Impeachment ✔ | Election ✖</strong><br data-start=\"424\" data-end=\"427\" />➡ <strong data-start=\"429\" data-end=\"466\">MLAs = Election ✔ | Impeachment ✖</strong></p>\n<p data-start=\"468\" data-end=\"571\">➡ <strong data-start=\"495\" data-end=\"533\">नामित सदस्य = महाभियोग ✔ | चुनाव ✖</strong><br data-start=\"533\" data-end=\"536\" />➡ <strong data-start=\"538\" data-end=\"571\">विधायक = चुनाव ✔ | महाभियोग ✖</strong></p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Regarding the removal of the President under Article 61, evaluate the following steps:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"87\">(अनुच्छेद 61 के तहत राष्ट्रपति को हटाने के संबंध में निम्नलिखित चरणों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">The only ground for impeachment is the <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"39\">\"Violation of the Constitution,\"</strong> and no President in India has ever been impeached to date. (महाभियोग का एकमात्र आधार <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"157\">\"संविधान का उल्लंघन\"</strong> है, और भारत में आज तक किसी भी राष्ट्रपति पर महाभियोग नहीं चलाया गया है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The process can begin in <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"25\">either House</strong> of Parliament, provided a <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"64\">14-day advance written notice</strong> is given to the President. (प्रक्रिया संसद के <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"140\">किसी भी सदन</strong> में शुरू हो सकती है, बशर्ते राष्ट्रपति को <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"194\">14 दिन पहले लिखित सूचना</strong> दी गई हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">To initiate the motion, the resolution must be signed by at least <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"66\">one-fourth (1/4th)</strong> of the total members of the house where it is introduced. (प्रस्ताव शुरू करने के लिए, उस सदन के कुल सदस्यों के कम से कम <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"205\">एक-चौथाई (1/4)</strong> द्वारा संकल्प पर हस्ताक्षर किए जाने चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">To successfully remove the President, the resolution must be passed by both houses individually with a <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"103\">Special Majority of two-thirds (2/3rd) of the total membership</strong> of the House. (राष्ट्रपति को सफलतापूर्वक हटाने के लिए, संकल्प को दोनों सदनों द्वारा अलग-अलग सदन की <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"265\">कुल सदस्यता के दो-तिहाई (2/3)</strong> के विशेष बहुमत से पारित किया जाना चाहिए।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the following is the correct sequence or fact? / निम्नलिखित में से कौन सा सही क्रम या तथ्य है?</strong> A) Only 1 and 2 are correct. B) Only 2, 3, and 4 are correct. C) Statement 3 is wrong because it requires 1/10th members. D) All statements (1, 2, 3, and 4) are correct.</p>",
    "comp": "",
    "options": [
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>",
      "<p>A</p>"
    ],
    "correct_option_id": 2,
    "solution": "<blockquote style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>1/4th (Signing) &rarr; 14 Days (Notice) &rarr; 2/3rd of Total Membership (Passing)&nbsp;&nbsp;</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>This is the exact legal sequence.</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>The requirement is 2/3rd of the TOTAL membership of the House,&nbsp;&nbsp;</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>which is much harder to achieve than 2/3rd of the members Present and Voting.</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>1/4 (हस्ताक्षर) &rarr; 14 दिन (सूचना) &rarr; कुल सदस्यता का 2/3 (पारित करना)&nbsp;&nbsp;</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>यह सटीक कानूनी प्रक्रिया है।</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>नोट:</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>यहाँ 2/3 बहुमत कुल सदस्यता का होता है,&nbsp;&nbsp;</strong></span></p>\n<p data-path-to-node=\"16,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>जो उपस्थित और मतदान करने वाले सदस्यों के 2/3 से कहीं अधिक कठिन होता है।</strong></span></p>\n</blockquote>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" data-index-in-node=\"0\">🚀 Simple Summary Table for Quick Revision</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Rule (नियम)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,0,0\" data-index-in-node=\"0\">Grounds (आधार)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,1,1,0\">Violation of Constitution Only (केवल संविधान का उल्लंघन)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,0,0\" data-index-in-node=\"0\">Notice (सूचना)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,2,1,0\">14 Days in writing (14 दिन लिखित में)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,0,0\" data-index-in-node=\"0\">Signing (हस्ताक्षर)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,3,1,0\">1/4th of the House (सदन का 1/4)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,0,0\" data-index-in-node=\"0\">Passing (पारित)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,1,0\">2/3rd of <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,4,1,0\" data-index-in-node=\"9\">Total</strong> Membership (कुल सदस्यता का 2/3)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,0,0\" data-index-in-node=\"0\">Court Role</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19,5,1,0\">None (It is a Quasi-Judicial process in Parliament)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements regarding the Executive powers of the President:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"83\">(राष्ट्रपति की कार्यकारी शक्तियों के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">According to <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"13\">Article 77</strong>, all executive actions of the Government of India are formally taken in the name of the President, who appoints the Prime Minister and other ministers to hold office during his <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"201\">pleasure</strong>. (अनुच्छेद 77 के अनुसार, भारत सरकार की सभी कार्यकारी कार्रवाइयां औपचारिक रूप से राष्ट्रपति के नाम पर की जाती हैं, जो प्रधानमंत्री और अन्य मंत्रियों को उनके <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"366\">प्रसादपर्यन्त</strong> पद धारण करने के लिए नियुक्त करते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The President has the power to appoint the CAG, the Attorney General, and the Governors of States, but the removal of the Attorney General does not require specific constitutional procedures like the removal of Supreme Court judges. (राष्ट्रपति के पास CAG, महान्यायवादी और राज्यों के राज्यपालों को नियुक्त करने की शक्ति है, लेकिन महान्यायवादी को हटाने के लिए उच्चतम न्यायालय के न्यायाधीशों की तरह विशिष्ट संवैधानिक प्रक्रियाओं की आवश्यकता नहीं होती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Under <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"6\">Article 78</strong>, it is the duty of the Prime Minister to communicate all decisions of the Council of Ministers to the President, who can also seek information relating to the administration of the Union. (अनुच्छेद 78 के तहत, यह प्रधानमंत्री का कर्तव्य है कि वह मंत्रिपरिषद के सभी निर्णयों की सूचना राष्ट्रपति को दें, जो संघ के प्रशासन से संबंधित जानकारी भी मांग सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The President's military powers allow him to declare war or conclude peace independently, without requiring any subsequent approval from the Parliament. (राष्ट्रपति की सैन्य शक्तियाँ उन्हें स्वतंत्र रूप से युद्ध की घोषणा करने या शांति स्थापित करने की अनुमति देती हैं, जिसके लिए संसद से किसी बाद की मंजूरी की आवश्यकता नहीं होती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements are CORRECT? / कौन से कथन सही हैं?</strong> A) 1, 2, and 3 only B) 2, 3, and 4 only C) 1 and 4 only D) All of the above</p>",
    "comp": "",

      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p data-path-to-node=\"8,0\"><span style=\"font-size: 12pt;\">Statement 4 is <strong data-path-to-node=\"8,0\" data-index-in-node=\"27\">Incorrect</strong>. While the President is the Supreme Commander, the power to declare war or peace is <strong data-path-to-node=\"8,0\" data-index-in-node=\"121\">subject to the approval of Parliament</strong>. (कथन 4 गलत है क्योंकि युद्ध या शांति की घोषणा संसद की मंजूरी के अधीन है।)</span></p>\n<p data-path-to-node=\"8,0\" style=\"text-align: center;\"><span style=\"font-size: 12pt;\"><strong data-start=\"146\" data-end=\"196\">Powers and Functions of the President of India</strong></span></p>\n<p data-start=\"198\" data-end=\"268\"><span style=\"font-size: 12pt;\">The powers of the President are broadly divided into two categories:</span></p>\n<ol data-start=\"269\" data-end=\"317\">\n<li data-start=\"269\" data-end=\"293\">\n<p data-start=\"272\" data-end=\"293\"><span style=\"font-size: 12pt;\"><strong data-start=\"272\" data-end=\"291\">Ordinary Powers</strong></span></p>\n</li>\n<li data-start=\"294\" data-end=\"317\">\n<p data-start=\"297\" data-end=\"317\"><span style=\"font-size: 12pt;\"><strong data-start=\"297\" data-end=\"317\">Emergency Powers</strong></span></p>\n</li>\n</ol>\n<p data-start=\"319\" data-end=\"377\"><span style=\"font-size: 12pt;\">राष्ट्रपति की शक्तियाँ मुख्यतः दो भागों में विभाजित हैं:</span></p>\n<ol data-start=\"378\" data-end=\"429\">\n<li data-start=\"378\" data-end=\"403\">\n<p data-start=\"381\" data-end=\"403\"><span style=\"font-size: 12pt;\"><strong data-start=\"381\" data-end=\"401\">सामान्य शक्तियाँ</strong></span></p>\n</li>\n<li data-start=\"404\" data-end=\"429\">\n<p data-start=\"407\" data-end=\"429\"><span style=\"font-size: 12pt;\"><strong data-start=\"407\" data-end=\"429\">आपातकालीन शक्तियाँ</strong></span></p>\n</li>\n</ol>\n<hr data-start=\"431\" data-end=\"434\" />\n<h2 data-start=\"436\" data-end=\"480\"><span style=\"font-size: 12pt;\"><strong data-start=\"439\" data-end=\"480\">I. Ordinary Powers (सामान्य शक्तियाँ)</strong></span></h2>\n<p data-start=\"482\" data-end=\"641\"><span style=\"font-size: 12pt;\">Ordinary Powers include:</span><br data-start=\"506\" data-end=\"509\" /><span style=\"font-size: 12pt;\"> a) Executive Powers</span><br data-start=\"528\" data-end=\"531\" /><span style=\"font-size: 12pt;\"> b) Legislative Powers</span><br data-start=\"552\" data-end=\"555\" /><span style=\"font-size: 12pt;\"> c) Financial Powers</span><br data-start=\"574\" data-end=\"577\" /><span style=\"font-size: 12pt;\"> d) Judicial Powers</span><br data-start=\"595\" data-end=\"598\" /><span style=\"font-size: 12pt;\"> e) Diplomatic Powers</span><br data-start=\"618\" data-end=\"621\" /><span style=\"font-size: 12pt;\"> f) Military Powers</span></p>\n<p data-start=\"643\" data-end=\"765\"><span style=\"font-size: 12pt;\">सामान्य शक्तियों में शामिल हैं:</span><br data-start=\"674\" data-end=\"677\" /><span style=\"font-size: 12pt;\"> a) कार्यपालिका</span><br data-start=\"691\" data-end=\"694\" /><span style=\"font-size: 12pt;\"> b) विधायी</span><br data-start=\"703\" data-end=\"706\" /><span style=\"font-size: 12pt;\"> c) वित्तीय</span><br data-start=\"716\" data-end=\"719\" /><span style=\"font-size: 12pt;\"> d) न्यायिक</span><br data-start=\"729\" data-end=\"732\" /><span style=\"font-size: 12pt;\"> e) कूटनीतिक</span><br data-start=\"743\" data-end=\"746\" /><span style=\"font-size: 12pt;\"> f) सैन्य शक्तियाँ</span></p>\n<hr data-start=\"767\" data-end=\"770\" />\n<h2 data-start=\"772\" data-end=\"821\"><span style=\"font-size: 12pt;\"><strong data-start=\"775\" data-end=\"821\">A. Executive Powers (कार्यपालिका शक्तियाँ)</strong></span></h2>\n<p data-start=\"823\" data-end=\"983\"><span style=\"font-size: 12pt;\"><strong data-start=\"823\" data-end=\"837\">Article 53</strong>:</span><br data-start=\"838\" data-end=\"841\" /><span style=\"font-size: 12pt;\"> The executive powers of the Union are vested in the President.</span><br data-start=\"903\" data-end=\"906\" /><span style=\"font-size: 12pt;\"> He may exercise these powers directly or through officers subordinate to him.</span></p>\n<p data-start=\"985\" data-end=\"1125\"><span style=\"font-size: 12pt;\"><strong data-start=\"985\" data-end=\"1000\">अनुच्छेद 53</strong>:</span><br data-start=\"1001\" data-end=\"1004\" /><span style=\"font-size: 12pt;\"> संघ की कार्यपालिका शक्ति राष्ट्रपति में निहित होती है, जिसे वह स्वयं या अपने अधीन अधिकारियों के माध्यम से प्रयोग करता है।</span></p>\n<h3 data-start=\"1127\" data-end=\"1146\"><span style=\"font-size: 12pt;\">Key Provisions:</span></h3>\n<ul data-start=\"1147\" data-end=\"1605\">\n<li data-start=\"1147\" data-end=\"1373\">\n<p data-start=\"1149\" data-end=\"1273\"><span style=\"font-size: 12pt;\"><strong data-start=\"1149\" data-end=\"1180\">Action in Name (Article 77)</strong>:</span><br data-start=\"1181\" data-end=\"1184\" /><span style=\"font-size: 12pt;\"> All executive actions of the Union Government are taken in the name of the President.</span></p>\n<p data-start=\"1277\" data-end=\"1373\"><span style=\"font-size: 12pt;\"><strong data-start=\"1277\" data-end=\"1292\">अनुच्छेद 77</strong>:</span><br data-start=\"1293\" data-end=\"1296\" /><span style=\"font-size: 12pt;\"> केंद्र सरकार की सभी कार्यकारी कार्रवाइयाँ राष्ट्रपति के नाम पर की जाती हैं।</span></p>\n</li>\n<li data-start=\"1375\" data-end=\"1605\">\n<p data-start=\"1377\" data-end=\"1506\"><span style=\"font-size: 12pt;\"><strong data-start=\"1377\" data-end=\"1407\">Communication (Article 75)</strong>:</span><br data-start=\"1408\" data-end=\"1411\" /><span style=\"font-size: 12pt;\"> The Prime Minister communicates all decisions of the Council of Ministers to the President.</span></p>\n<p data-start=\"1510\" data-end=\"1605\"><span style=\"font-size: 12pt;\"><strong data-start=\"1510\" data-end=\"1525\">अनुच्छेद 75</strong>:</span><br data-start=\"1526\" data-end=\"1529\" /><span style=\"font-size: 12pt;\"> प्रधानमंत्री मंत्रिपरिषद के सभी निर्णयों की जानकारी राष्ट्रपति को देता है।</span></p>\n</li>\n</ul>\n<hr data-start=\"1607\" data-end=\"1610\" />\n<h2 data-start=\"1612\" data-end=\"1674\"><span style=\"font-size: 12pt;\"><strong data-start=\"1615\" data-end=\"1674\">Appointments and Removals (नियुक्तियाँ एवं पदच्युतियाँ)</strong></span></h2>\n<h3 data-start=\"1676\" data-end=\"1711\"><span style=\"font-size: 12pt;\"><strong data-start=\"1680\" data-end=\"1711\">Appointments (नियुक्तियाँ):</strong></span></h3>\n<p data-start=\"1712\" data-end=\"1735\"><span style=\"font-size: 12pt;\">The President appoints:</span></p>\n<ul data-start=\"1736\" data-end=\"2180\">\n<li data-start=\"1736\" data-end=\"1808\">\n<p data-start=\"1738\" data-end=\"1808\"><span style=\"font-size: 12pt;\">Prime Minister and other Ministers (hold office during his pleasure)</span></p>\n</li>\n<li data-start=\"1809\" data-end=\"1838\">\n<p data-start=\"1811\" data-end=\"1838\"><span style=\"font-size: 12pt;\">Attorney-General of India</span></p>\n</li>\n<li data-start=\"1839\" data-end=\"1880\">\n<p data-start=\"1841\" data-end=\"1880\"><span style=\"font-size: 12pt;\">Comptroller and Auditor General (CAG)</span></p>\n</li>\n<li data-start=\"1881\" data-end=\"1939\">\n<p data-start=\"1883\" data-end=\"1939\"><span style=\"font-size: 12pt;\">Chief Election Commissioner and Election Commissioners</span></p>\n</li>\n<li data-start=\"1940\" data-end=\"1972\">\n<p data-start=\"1942\" data-end=\"1972\"><span style=\"font-size: 12pt;\">Chairman and Members of UPSC</span></p>\n</li>\n<li data-start=\"1973\" data-end=\"1996\">\n<p data-start=\"1975\" data-end=\"1996\"><span style=\"font-size: 12pt;\">Governors of States</span></p>\n</li>\n<li data-start=\"1997\" data-end=\"2043\">\n<p data-start=\"1999\" data-end=\"2043\"><span style=\"font-size: 12pt;\">Chairman and Members of Finance Commission</span></p>\n</li>\n<li data-start=\"2044\" data-end=\"2083\">\n<p data-start=\"2046\" data-end=\"2083\"><span style=\"font-size: 12pt;\">Administrators of Union Territories</span></p>\n</li>\n<li data-start=\"2084\" data-end=\"2145\">\n<p data-start=\"2086\" data-end=\"2145\"><span style=\"font-size: 12pt;\">Chief Justice and Judges of Supreme Court and High Courts</span></p>\n</li>\n<li data-start=\"2146\" data-end=\"2180\">\n<p data-start=\"2148\" data-end=\"2180\"><span style=\"font-size: 12pt;\">Members of Special Commissions</span></p>\n</li>\n</ul>\n<p data-start=\"2182\" data-end=\"2352\"><span style=\"font-size: 12pt;\"><strong data-start=\"2182\" data-end=\"2228\">राष्ट्रपति निम्नलिखित की नियुक्ति करता है:</strong></span><br data-start=\"2228\" data-end=\"2231\" /><span style=\"font-size: 12pt;\"> प्रधानमंत्री, मंत्री, अटॉर्नी जनरल, CAG, चुनाव आयुक्त, UPSC सदस्य, राज्यपाल, वित्त आयोग, UT प्रशासक, SC/HC न्यायाधीश आदि।</span></p>\n<h3 data-start=\"2354\" data-end=\"2385\"><span style=\"font-size: 12pt;\"><strong data-start=\"2358\" data-end=\"2385\">Removals (पदच्युतियाँ):</strong></span></h3>\n<p data-start=\"2386\" data-end=\"2498\"><span style=\"font-size: 12pt;\">The President can remove certain officials as per constitutional provisions (e.g., Governors, Attorney-General).</span></p>\n<p data-start=\"2500\" data-end=\"2571\"><span style=\"font-size: 12pt;\"><strong data-start=\"2500\" data-end=\"2571\">संविधान के अनुसार राष्ट्रपति कुछ पदाधिकारियों को पद से हटा सकता है।</strong></span></p>\n<hr data-start=\"2573\" data-end=\"2576\" />\n<h2 data-start=\"2578\" data-end=\"2617\"><span style=\"font-size: 12pt;\"><strong data-start=\"2581\" data-end=\"2617\">Military Powers (सैन्य शक्तियाँ)</strong></span></h2>\n<ul data-start=\"2619\" data-end=\"2804\">\n<li data-start=\"2619\" data-end=\"2682\">\n<p data-start=\"2621\" data-end=\"2682\"><span style=\"font-size: 12pt;\">President is the <strong data-start=\"2638\" data-end=\"2679\">Supreme Commander of the Armed Forces</strong>.</span></p>\n</li>\n<li data-start=\"2683\" data-end=\"2732\">\n<p data-start=\"2685\" data-end=\"2732\"><span style=\"font-size: 12pt;\">Appoints Chiefs of Army, Navy, and Air Force.</span></p>\n</li>\n<li data-start=\"2733\" data-end=\"2804\">\n<p data-start=\"2735\" data-end=\"2804\"><span style=\"font-size: 12pt;\">Can declare war or conclude peace, subject to Parliamentary approval.</span></p>\n</li>\n</ul>\n<p data-start=\"2806\" data-end=\"2862\"><span style=\"font-size: 12pt;\"><strong data-start=\"2806\" data-end=\"2862\">राष्ट्रपति सशस्त्र बलों का सर्वोच्च सेनापति होता है।</strong></span></p>\n<hr data-start=\"2864\" data-end=\"2867\" />\n<h2 data-start=\"2869\" data-end=\"2917\"><span style=\"font-size: 12pt;\"><strong data-start=\"2872\" data-end=\"2917\">Special Administrative &amp; Executive Powers</strong></span></h2>\n<h3 data-start=\"2919\" data-end=\"2965\"><span style=\"font-size: 12pt;\"><strong data-start=\"2923\" data-end=\"2965\">I. Duty of Prime Minister (Article 78)</strong></span></h3>\n<p data-start=\"2967\" data-end=\"3070\"><span style=\"font-size: 12pt;\">The President can seek information regarding administration and policy matters from the Prime Minister.</span></p>\n<p data-start=\"3072\" data-end=\"3161\"><span style=\"font-size: 12pt;\"><strong data-start=\"3072\" data-end=\"3087\">अनुच्छेद 78</strong>:</span><br data-start=\"3088\" data-end=\"3091\" /><span style=\"font-size: 12pt;\"> प्रधानमंत्री राष्ट्रपति को प्रशासन व नीतिगत मामलों की जानकारी देता है।</span></p>\n<h3 data-start=\"3163\" data-end=\"3208\"><span style=\"font-size: 12pt;\"><strong data-start=\"3167\" data-end=\"3208\">II. Administrative &amp; Statutory Powers</strong></span></h3>\n<ul data-start=\"3210\" data-end=\"3379\">\n<li data-start=\"3210\" data-end=\"3259\">\n<p data-start=\"3212\" data-end=\"3259\"><span style=\"font-size: 12pt;\">Appointment of Commissions for SCs, STs, OBCs</span></p>\n</li>\n<li data-start=\"3260\" data-end=\"3298\">\n<p data-start=\"3262\" data-end=\"3298\"><span style=\"font-size: 12pt;\">Appointment of Inter-State Council</span></p>\n</li>\n<li data-start=\"3299\" data-end=\"3338\">\n<p data-start=\"3301\" data-end=\"3338\"><span style=\"font-size: 12pt;\">Administration of Union Territories</span></p>\n</li>\n<li data-start=\"3339\" data-end=\"3379\">\n<p data-start=\"3341\" data-end=\"3379\"><span style=\"font-size: 12pt;\">Powers over Scheduled &amp; Tribal Areas</span></p>\n</li>\n</ul>\n<p data-start=\"3381\" data-end=\"3466\"><span style=\"font-size: 12pt;\"><strong data-start=\"3381\" data-end=\"3466\">प्रशासनिक शक्तियाँ: आयोगों की नियुक्ति, UT प्रशासन, अनुसूचित एवं जनजातीय क्षेत्र।</strong></span></p>\n<hr data-start=\"3468\" data-end=\"3471\" />\n<h2 data-start=\"3473\" data-end=\"3516\"><span style=\"font-size: 12pt;\"><strong data-start=\"3476\" data-end=\"3516\">Legislative Powers (विधायी शक्तियाँ)</strong></span></h2>\n<p data-start=\"3518\" data-end=\"3580\"><span style=\"font-size: 12pt;\"><strong data-start=\"3518\" data-end=\"3532\">Article 79</strong>:</span><br data-start=\"3533\" data-end=\"3536\" /><span style=\"font-size: 12pt;\"> President is an integral part of Parliament.</span></p>\n<p data-start=\"3582\" data-end=\"3634\"><span style=\"font-size: 12pt;\"><strong data-start=\"3582\" data-end=\"3597\">अनुच्छेद 79</strong>:</span><br data-start=\"3598\" data-end=\"3601\" /><span style=\"font-size: 12pt;\"> राष्ट्रपति संसद का अभिन्न अंग है।</span></p>\n<h3 data-start=\"3636\" data-end=\"3663\"><span style=\"font-size: 12pt;\">Key Legislative Powers:</span></h3>\n<ul data-start=\"3665\" data-end=\"3923\">\n<li data-start=\"3665\" data-end=\"3729\">\n<p data-start=\"3667\" data-end=\"3729\"><span style=\"font-size: 12pt;\"><strong data-start=\"3667\" data-end=\"3679\">Sessions</strong>: Summons &amp; prorogues Parliament; gap &le; 6 months</span></p>\n</li>\n<li data-start=\"3730\" data-end=\"3775\">\n<p data-start=\"3732\" data-end=\"3775\"><span style=\"font-size: 12pt;\"><strong data-start=\"3732\" data-end=\"3746\">Nomination</strong>: 12 members to Rajya Sabha</span></p>\n</li>\n<li data-start=\"3776\" data-end=\"3837\">\n<p data-start=\"3778\" data-end=\"3837\"><span style=\"font-size: 12pt;\"><strong data-start=\"3778\" data-end=\"3795\">Joint Sitting</strong>: In case of deadlock on non-money bills</span></p>\n</li>\n<li data-start=\"3838\" data-end=\"3923\">\n<p data-start=\"3840\" data-end=\"3923\"><span style=\"font-size: 12pt;\"><strong data-start=\"3840\" data-end=\"3864\">Addresses &amp; Messages</strong>: Addresses Parliament after general elections &amp; annually</span></p>\n</li>\n</ul>\n<p data-start=\"3925\" data-end=\"4006\"><span style=\"font-size: 12pt;\"><strong data-start=\"3925\" data-end=\"4006\">राष्ट्रपति संसद सत्र बुलाता है, नामांकन करता है और संयुक्त बैठक बुला सकता है।</strong></span></p>\n<hr data-start=\"4008\" data-end=\"4011\" />\n<h2 data-start=\"4013\" data-end=\"4056\"><span style=\"font-size: 12pt;\"><strong data-start=\"4016\" data-end=\"4056\">Ordinance-Making Power (Article 123)</strong></span></h2>\n<ul data-start=\"4058\" data-end=\"4320\">\n<li data-start=\"4058\" data-end=\"4119\">\n<p data-start=\"4060\" data-end=\"4119\"><span style=\"font-size: 12pt;\">Ordinance can be issued when Parliament is not in session</span></p>\n</li>\n<li data-start=\"4120\" data-end=\"4144\">\n<p data-start=\"4122\" data-end=\"4144\"><span style=\"font-size: 12pt;\">Has the force of law</span></p>\n</li>\n<li data-start=\"4145\" data-end=\"4187\">\n<p data-start=\"4147\" data-end=\"4187\"><span style=\"font-size: 12pt;\">Valid for <strong data-start=\"4157\" data-end=\"4185\">6 weeks after reassembly</strong></span></p>\n</li>\n<li data-start=\"4188\" data-end=\"4256\">\n<p data-start=\"4190\" data-end=\"4256\"><span style=\"font-size: 12pt;\">Can be issued only on subjects on which Parliament can legislate</span></p>\n</li>\n<li data-start=\"4257\" data-end=\"4320\">\n<p data-start=\"4259\" data-end=\"4320\"><span style=\"font-size: 12pt;\">Cannot amend the Constitution or violate Fundamental Rights</span></p>\n</li>\n</ul>\n<p data-start=\"4322\" data-end=\"4398\"><span style=\"font-size: 12pt;\"><strong data-start=\"4322\" data-end=\"4338\">अनुच्छेद 123</strong>:</span><br data-start=\"4339\" data-end=\"4342\" /><span style=\"font-size: 12pt;\"> राष्ट्रपति संसद सत्र न होने पर अध्यादेश जारी कर सकता है।</span></p>\n<hr data-start=\"4400\" data-end=\"4403\" />\n<h2 data-start=\"4405\" data-end=\"4453\"><span style=\"font-size: 12pt;\"><strong data-start=\"4408\" data-end=\"4453\">II. Emergency Powers (आपातकालीन शक्तियाँ)</strong></span></h2>\n<p data-start=\"4455\" data-end=\"4542\"><span style=\"font-size: 12pt;\">These powers are exercised during national emergencies as provided in the Constitution.</span></p>\n<p data-start=\"4544\" data-end=\"4633\"><span style=\"font-size: 12pt;\"><strong data-start=\"4544\" data-end=\"4633\">संविधान में वर्णित आपातकाल की स्थिति में राष्ट्रपति विशेष शक्तियों का प्रयोग करता है।</strong></span></p>\n<hr data-start=\"4635\" data-end=\"4638\" />\n<h3 data-start=\"4640\" data-end=\"4672\"><span style=\"font-size: 12pt;\"><strong data-start=\"4644\" data-end=\"4672\">EXAM TRICK (SSC / UPSC):</strong></span></h3>\n<p data-path-to-node=\"8,0\"></p>\n<ul data-start=\"4673\" data-end=\"4812\">\n<li data-start=\"4673\" data-end=\"4705\">\n<p data-start=\"4675\" data-end=\"4705\"><span style=\"font-size: 12pt;\">Executive power &rarr; Article 53</span></p>\n</li>\n<li data-start=\"4706\" data-end=\"4739\">\n<p data-start=\"4708\" data-end=\"4739\"><span style=\"font-size: 12pt;\">Ordinance power &rarr; Article 123</span></p>\n</li>\n<li data-start=\"4740\" data-end=\"4764\">\n<p data-start=\"4742\" data-end=\"4764\"><span style=\"font-size: 12pt;\">PM duty &rarr; Article 78</span></p>\n</li>\n<li data-start=\"4765\" data-end=\"4812\">\n<p data-start=\"4767\" data-end=\"4812\"><span style=\"font-size: 12pt;\">President = Part of Parliament &rarr; Article 79</span></p>\n</li>\n</ul>",
    "marks": 2.0,
    "section": "ADVANCE POLITY 360 MOCK 02"

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Consider the following statements regarding the President&rsquo;s role in the Indian Parliament:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"91\">(भारतीय संसद में राष्ट्रपति की भूमिका के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">Under <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"6\">Article 79</strong>, the President is an integral part of the Parliament and has the power to summon and prorogue both Houses, ensuring that the gap between two sessions does not exceed <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"183\">six months</strong>. (अनुच्छेद 79 के तहत, राष्ट्रपति संसद का एक अभिन्न अंग है और उसके पास दोनों सदनों को बुलाने और सत्रावसान करने की शक्ति है, यह सुनिश्चित करते हुए कि दो सत्रों के बीच का अंतर <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"367\">छह महीने</strong> से अधिक न हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The President can promulgate an ordinance under <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"48\">Article 123</strong> only when both Houses are not in session or when either of the two Houses is not in session. (राष्ट्रपति <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"165\">अनुच्छेद 123</strong> के तहत अध्यादेश तभी जारी कर सकते हैं जब दोनों सदन सत्र में न हों या जब दोनों में से कोई भी एक सदन सत्र में न हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">An ordinance issued by the President has the same force as an Act of Parliament but it automatically ceases to operate at the expiry of <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"136\">six weeks</strong> from the re-assembly of Parliament. (राष्ट्रपति द्वारा जारी अध्यादेश में संसद के अधिनियम के समान ही शक्ति होती है, लेकिन संसद के पुन: समवेत होने से <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"294\">छह सप्ताह</strong> की समाप्ति पर यह स्वतः ही समाप्त हो जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">While an ordinance can modify or repeal any existing Act of Parliament, it cannot be used to <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"93\">amend the Constitution</strong> or abridge Fundamental Rights. (जबकि एक अध्यादेश संसद के किसी भी मौजूदा अधिनियम को संशोधित या निरस्त कर सकता है, इसका उपयोग <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"240\">संविधान में संशोधन</strong> करने या मौलिक अधिकारों को कम करने के लिए नहीं किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,4,0\">Under <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"6\">Article 102</strong>, the President decides on the disqualification of a Member of Parliament, but he is constitutionally bound to consult the <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"140\">Election Commission</strong> before taking such a decision. (अनुच्छेद 102 के तहत, राष्ट्रपति संसद सदस्य की अयोग्यता पर निर्णय लेते हैं, लेकिन ऐसा निर्णय लेने से पहले वे <strong data-path-to-node=\"13,4,0\" data-index-in-node=\"300\">चुनाव आयोग</strong> से परामर्श करने के लिए संवैधानिक रूप से बाध्य हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements are CORRECT? / कौन से कथन सही हैं?</strong> A) 1, 2, 4, and 5 only B) 2, 3, and 5 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, 4, and 5)</p>",
    "comp": "",
    "options": [
      "<p>D</p>",
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p data-path-to-node=\"16,0\">All statements are 100% accurate. Remember the <strong data-path-to-node=\"16,0\" data-index-in-node=\"59\">6 months / 6 weeks</strong> rule: 6 months is the max gap between sessions; 6 weeks is the life of an ordinance after Parliament meets.</p>\n<h3 data-path-to-node=\"18\"><strong data-path-to-node=\"18\" data-index-in-node=\"0\">&nbsp;Technical \"Cheat Sheet\" for Revision</strong></h3>\n<ul data-path-to-node=\"19\">\n<li>\n<p data-path-to-node=\"19,0,0\"><strong data-path-to-node=\"19,0,0\" data-index-in-node=\"0\">Article 123:</strong> Ordinance power (जब संसद सत्र में न हो).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,1,0\"><strong data-path-to-node=\"19,1,0\" data-index-in-node=\"0\">Article 102:</strong> Disqualification of MP (चुनाव आयोग की सलाह पर).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,2,0\"><strong data-path-to-node=\"19,2,0\" data-index-in-node=\"0\">Joint Sitting:</strong> Called for Non-Money bills only (साधारण विधेयक के लिए).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,0\"><strong data-path-to-node=\"19,3,0\" data-index-in-node=\"0\">Nominations:</strong> 12 members to Rajya Sabha (साहित्य, विज्ञान, कला, समाज सेवा).</p>\n</li>\n<li>\n<p data-path-to-node=\"19,4,0\"><strong data-path-to-node=\"19,4,0\" data-index-in-node=\"0\">UT Administration:</strong> Directly through an Administrator/LG.</p>\n</li>\n</ul>",
    "marks": 2.0,
    "section": "ADVANCE POLITY 360 MOCK 02"
