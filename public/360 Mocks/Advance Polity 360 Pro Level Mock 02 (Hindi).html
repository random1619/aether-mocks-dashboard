    "solution": "<p data-path-to-node=\"14,0\">The CoM is <strong data-path-to-node=\"14,0\" data-index-in-node=\"43\">Collectively responsible to the Lok Sabha</strong> (Art 75) and <strong data-path-to-node=\"14,0\" data-index-in-node=\"98\">Individually responsible to the President</strong> (Ministers hold office during his pleasure). <em data-path-to-node=\"14,0\" data-index-in-node=\"185\">(सुधार: यह इसके विपरीत है। मंत्रिपरिषद <strong data-path-to-node=\"14,0\" data-index-in-node=\"224\">सामूहिक रूप से लोकसभा</strong> के प्रति उत्तरदायी है और <strong data-path-to-node=\"14,0\" data-index-in-node=\"271\">व्यक्तिगत रूप से राष्ट्रपति</strong> के प्रति उत्तरदायी है।)</em></p>\n<h2 data-start=\"2197\" data-end=\"2248\"><strong data-start=\"2200\" data-end=\"2248\">Article 163 &ndash; Council of Ministers in States</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2250\" data-end=\"2461\">\n<thead data-start=\"2250\" data-end=\"2278\">\n<tr data-start=\"2250\" data-end=\"2278\">\n<th data-start=\"2250\" data-end=\"2259\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"2259\" data-end=\"2269\" data-col-size=\"sm\">English</th>\n<th data-start=\"2269\" data-end=\"2278\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"2305\" data-end=\"2461\">\n<tr data-start=\"2305\" data-end=\"2344\">\n<td data-start=\"2305\" data-end=\"2312\" data-col-size=\"sm\">Head</td>\n<td data-start=\"2312\" data-end=\"2329\" data-col-size=\"sm\">Chief Minister</td>\n<td data-start=\"2329\" data-end=\"2344\" data-col-size=\"sm\">मुख्यमंत्री</td>\n</tr>\n<tr data-start=\"2345\" data-end=\"2394\">\n<td data-start=\"2345\" data-end=\"2360\" data-col-size=\"sm\">Aid &amp; Advice</td>\n<td data-start=\"2360\" data-end=\"2374\" data-col-size=\"sm\">To Governor</td>\n<td data-start=\"2374\" data-end=\"2394\" data-col-size=\"sm\">राज्यपाल को सलाह</td>\n</tr>\n<tr data-start=\"2395\" data-end=\"2461\">\n<td data-start=\"2395\" data-end=\"2412\" data-col-size=\"sm\">Responsibility</td>\n<td data-col-size=\"sm\" data-start=\"2412\" data-end=\"2438\">Collective &amp; Individual</td>\n<td data-col-size=\"sm\" data-start=\"2438\" data-end=\"2461\">सामूहिक व व्यक्तिगत</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2463\" data-end=\"2466\" />\n<h2 data-start=\"2468\" data-end=\"2527\"><strong data-start=\"2471\" data-end=\"2527\">Appointment of Prime Minister (Convention + Art. 75)</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2529\" data-end=\"2738\">\n<thead data-start=\"2529\" data-end=\"2549\">\n<tr data-start=\"2529\" data-end=\"2549\">\n<th data-start=\"2529\" data-end=\"2541\" data-col-size=\"sm\">Situation</th>\n<th data-start=\"2541\" data-end=\"2549\" data-col-size=\"sm\">Rule</th>\n</tr>\n</thead>\n<tbody data-start=\"2568\" data-end=\"2738\">\n<tr data-start=\"2568\" data-end=\"2613\">\n<td data-start=\"2568\" data-end=\"2585\" data-col-size=\"sm\">Clear majority</td>\n<td data-col-size=\"sm\" data-start=\"2585\" data-end=\"2613\">President invites leader</td>\n</tr>\n<tr data-start=\"2614\" data-end=\"2654\">\n<td data-start=\"2614\" data-end=\"2627\" data-col-size=\"sm\">Hung House</td>\n<td data-col-size=\"sm\" data-start=\"2627\" data-end=\"2654\">Presidential discretion</td>\n</tr>\n<tr data-start=\"2655\" data-end=\"2693\">\n<td data-start=\"2655\" data-end=\"2668\" data-col-size=\"sm\">Non-Member</td>\n<td data-start=\"2668\" data-end=\"2693\" data-col-size=\"sm\">6 months rule applies</td>\n</tr>\n<tr data-start=\"2694\" data-end=\"2738\">\n<td data-start=\"2694\" data-end=\"2709\" data-col-size=\"sm\">House Leader</td>\n<td data-col-size=\"sm\" data-start=\"2709\" data-end=\"2738\">PM is Leader of his House</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2740\" data-end=\"2743\" />\n<h2 data-start=\"2745\" data-end=\"2781\"><strong data-start=\"2748\" data-end=\"2781\">Eligibility of Prime Minister</strong></h2>\n<p data-path-to-node=\"14,0\"></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2783\" data-end=\"2946\">\n<thead data-start=\"2783\" data-end=\"2809\">\n<tr data-start=\"2783\" data-end=\"2809\">\n<th data-start=\"2783\" data-end=\"2794\" data-col-size=\"sm\">Criteria</th>\n<th data-start=\"2794\" data-end=\"2809\" data-col-size=\"sm\">Requirement</th>\n</tr>\n</thead>\n<tbody data-start=\"2834\" data-end=\"2946\">\n<tr data-start=\"2834\" data-end=\"2858\">\n<td data-start=\"2834\" data-end=\"2848\" data-col-size=\"sm\">Citizenship</td>\n<td data-start=\"2848\" data-end=\"2858\" data-col-size=\"sm\">Indian</td>\n</tr>\n<tr data-start=\"2859\" data-end=\"2883\">\n<td data-start=\"2859\" data-end=\"2872\" data-col-size=\"sm\">Membership</td>\n<td data-start=\"2872\" data-end=\"2883\" data-col-size=\"sm\">LS / RS</td>\n</tr>\n<tr data-start=\"2884\" data-end=\"2911\">\n<td data-start=\"2884\" data-end=\"2890\" data-col-size=\"sm\">Age</td>\n<td data-col-size=\"sm\" data-start=\"2890\" data-end=\"2911\">25 (LS) / 30 (RS)</td>\n</tr>\n<tr data-start=\"2912\" data-end=\"2946\">\n<td data-start=\"2912\" data-end=\"2931\" data-col-size=\"sm\">Office of Profit</td>\n<td data-col-size=\"sm\" data-start=\"2931\" data-end=\"2946\">Not allowed</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

    "question": "<p data-path-to-node=\"18\"><strong data-path-to-node=\"18\" data-index-in-node=\"0\">Regarding the powers of the Prime Minister and the composition of the Council of Ministers, evaluate the following:</strong> <strong data-path-to-node=\"18\" data-index-in-node=\"116\">(प्रधानमंत्री की शक्तियों और मंत्रिपरिषद की संरचना के संबंध में, निम्नलिखित का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"19\">\n<li>\n<p data-path-to-node=\"19,0,0\">The Prime Minister is the Chairman of the <strong data-path-to-node=\"19,0,0\" data-index-in-node=\"42\">NITI Aayog, Inter-State Council, and National Water Resources Council</strong>. (प्रधानमंत्री <strong data-path-to-node=\"19,0,0\" data-index-in-node=\"127\">नीति आयोग, अंतर-राज्य परिषद और राष्ट्रीय जल संसाधन परिषद</strong> के अध्यक्ष होते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,1,0\">The <strong data-path-to-node=\"19,1,0\" data-index-in-node=\"4\">\"Kitchen Cabinet\"</strong> is a formal constitutional body consisting of the PM and 15&ndash;20 senior Cabinet Ministers. ( <strong data-path-to-node=\"19,1,0\" data-index-in-node=\"113\">\"किचन कैबिनेट\"</strong> एक औपचारिक संवैधानिक निकाय है जिसमें प्रधानमंत्री और 15-20 वरिष्ठ कैबिनेट मंत्री शामिल होते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,2,0\"><strong data-path-to-node=\"19,2,0\" data-index-in-node=\"0\">Cabinet Ministers</strong> head important ministries, while <strong data-path-to-node=\"19,2,0\" data-index-in-node=\"51\">Deputy Ministers</strong> assist them and do not hold independent charge of any ministry. ( <strong data-path-to-node=\"19,2,0\" data-index-in-node=\"134\">कैबिनेट मंत्री</strong> महत्वपूर्ण मंत्रालयों के प्रमुख होते हैं, जबकि <strong data-path-to-node=\"19,2,0\" data-index-in-node=\"196\">उप-मंत्री</strong> उनकी सहायता करते हैं और किसी भी मंत्रालय का स्वतंत्र प्रभार नहीं संभालते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"19,3,0\">If the Prime Minister resigns or dies, the entire Council of Ministers stands <strong data-path-to-node=\"19,3,0\" data-index-in-node=\"78\">automatically dissolved</strong>. (यदि प्रधानमंत्री इस्तीफा देते हैं या उनकी मृत्यु हो जाती है, तो संपूर्ण मंत्रिपरिषद <strong data-path-to-node=\"19,3,0\" data-index-in-node=\"188\">स्वतः भंग</strong> हो जाती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">Choose the correct code: / सही कूट का चयन करें:</strong> A) 1, 2, and 3 only B) 1, 3, and 4 only C) 2 and 4 only |D) 1 and 4 only</p>",
    "comp": "",
    "options": [
      "<p>B</p>",
      "<p>A</p>",
      "<p>D</p>",
      "<p>C</p>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 2 is wrong because the \"Kitchen Cabinet\" is an <strong data-path-to-node=\"22,0\" data-index-in-node=\"64\">informal</strong> circle of advisors, not a constitutional body. (कथन 2 गलत है क्योंकि \"किचन कैबिनेट\" सलाहकारों का एक <strong data-path-to-node=\"22,0\" data-index-in-node=\"173\">अनौपचारिक</strong> घेरा है, संवैधानिक निकाय नहीं।)</p>\n<h2 data-start=\"2953\" data-end=\"2996\"><strong data-start=\"2956\" data-end=\"2996\">Powers &amp; Functions of Prime Minister</strong></h2>\n<h3 data-start=\"2998\" data-end=\"3034\"><strong data-start=\"3002\" data-end=\"3034\">A. With Council of Ministers</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3036\" data-end=\"3240\">\n<thead data-start=\"3036\" data-end=\"3053\">\n<tr data-start=\"3036\" data-end=\"3053\">\n<th data-start=\"3036\" data-end=\"3044\" data-col-size=\"sm\">Power</th>\n<th data-start=\"3044\" data-end=\"3053\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"3069\" data-end=\"3240\">\n<tr data-start=\"3069\" data-end=\"3124\">\n<td data-start=\"3069\" data-end=\"3093\" data-col-size=\"sm\">Appointment &amp; Removal</td>\n<td data-col-size=\"sm\" data-start=\"3093\" data-end=\"3124\">मंत्रियों की नियुक्ति/हटाना</td>\n</tr>\n<tr data-start=\"3125\" data-end=\"3163\">\n<td data-start=\"3125\" data-end=\"3148\" data-col-size=\"sm\">Portfolio Allocation</td>\n<td data-col-size=\"sm\" data-start=\"3148\" data-end=\"3163\">विभाग आवंटन</td>\n</tr>\n<tr data-start=\"3164\" data-end=\"3203\">\n<td data-start=\"3164\" data-end=\"3177\" data-col-size=\"sm\">Leadership</td>\n<td data-col-size=\"sm\" data-start=\"3177\" data-end=\"3203\">मंत्रिपरिषद का नेतृत्व</td>\n</tr>\n<tr data-start=\"3204\" data-end=\"3240\">\n<td data-start=\"3204\" data-end=\"3219\" data-col-size=\"sm\">Coordination</td>\n<td data-col-size=\"sm\" data-start=\"3219\" data-end=\"3240\">कार्यों का समन्वय</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<h3 data-start=\"3242\" data-end=\"3267\"><strong data-start=\"3246\" data-end=\"3267\">B. With President</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3269\" data-end=\"3436\">\n<thead data-start=\"3269\" data-end=\"3286\">\n<tr data-start=\"3269\" data-end=\"3286\">\n<th data-start=\"3269\" data-end=\"3277\" data-col-size=\"sm\">Power</th>\n<th data-start=\"3277\" data-end=\"3286\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"3302\" data-end=\"3436\">\n<tr data-start=\"3302\" data-end=\"3340\">\n<td data-start=\"3302\" data-end=\"3318\" data-col-size=\"sm\">Communication</td>\n<td data-col-size=\"sm\" data-start=\"3318\" data-end=\"3340\">मुख्य संचार माध्यम</td>\n</tr>\n<tr data-start=\"3341\" data-end=\"3384\">\n<td data-start=\"3341\" data-end=\"3355\" data-col-size=\"sm\">Information</td>\n<td data-col-size=\"sm\" data-start=\"3355\" data-end=\"3384\">प्रशासन/विधेयक की जानकारी</td>\n</tr>\n<tr data-start=\"3385\" data-end=\"3436\">\n<td data-start=\"3385\" data-end=\"3407\" data-col-size=\"sm\">Appointments Advice</td>\n<td data-col-size=\"sm\" data-start=\"3407\" data-end=\"3436\">AG, CAG, UPSC, EC, FC आदि</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<h3 data-start=\"3438\" data-end=\"3464\"><strong data-start=\"3442\" data-end=\"3464\">C. With Parliament</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3466\" data-end=\"3656\">\n<thead data-start=\"3466\" data-end=\"3483\">\n<tr data-start=\"3466\" data-end=\"3483\">\n<th data-start=\"3466\" data-end=\"3474\" data-col-size=\"sm\">Power</th>\n<th data-start=\"3474\" data-end=\"3483\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"3499\" data-end=\"3656\">\n<tr data-start=\"3499\" data-end=\"3536\">\n<td data-start=\"3499\" data-end=\"3521\" data-col-size=\"sm\">Leader of Lok Sabha</td>\n<td data-col-size=\"sm\" data-start=\"3521\" data-end=\"3536\">लोकसभा नेता</td>\n</tr>\n<tr data-start=\"3537\" data-end=\"3577\">\n<td data-start=\"3537\" data-end=\"3548\" data-col-size=\"sm\">Sessions</td>\n<td data-col-size=\"sm\" data-start=\"3548\" data-end=\"3577\">सत्र बुलाने/स्थगन की सलाह</td>\n</tr>\n<tr data-start=\"3578\" data-end=\"3619\">\n<td data-start=\"3578\" data-end=\"3592\" data-col-size=\"sm\">Dissolution</td>\n<td data-col-size=\"sm\" data-start=\"3592\" data-end=\"3619\">लोकसभा भंग करने की सलाह</td>\n</tr>\n<tr data-start=\"3620\" data-end=\"3656\">\n<td data-start=\"3620\" data-end=\"3629\" data-col-size=\"sm\">Policy</td>\n<td data-start=\"3629\" data-end=\"3656\" data-col-size=\"sm\">सरकारी नीतियों की घोषणा</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<h3 data-start=\"3658\" data-end=\"3677\"><strong data-start=\"3662\" data-end=\"3677\">Other Roles</strong></h3>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3679\" data-end=\"3831\">\n<thead data-start=\"3679\" data-end=\"3695\">\n<tr data-start=\"3679\" data-end=\"3695\">\n<th data-start=\"3679\" data-end=\"3686\" data-col-size=\"sm\">Role</th>\n<th data-start=\"3686\" data-end=\"3695\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"3710\" data-end=\"3831\">\n<tr data-start=\"3710\" data-end=\"3749\">\n<td data-start=\"3710\" data-end=\"3721\" data-col-size=\"sm\">Chairman</td>\n<td data-start=\"3721\" data-end=\"3749\" data-col-size=\"sm\">NITI Aayog, ISC, NDC आदि</td>\n</tr>\n<tr data-start=\"3750\" data-end=\"3790\">\n<td data-start=\"3750\" data-end=\"3767\" data-col-size=\"sm\">Foreign Policy</td>\n<td     "solution": "<h3 style=\"text-align: center;\" data-path-to-node=\"31\"><strong data-path-to-node=\"31\" data-index-in-node=\"0\">Cheat Sheet\" for Final Revision</strong></h3>\n<ul data-path-to-node=\"32\">\n<li>\n<p data-path-to-node=\"32,0,0\"><strong data-path-to-node=\"32,0,0\" data-index-in-node=\"0\">Article 74:</strong> Advice is binding (reconsider once). / सलाह बाध्यकारी है (एक बार पुनर्विचार)।</p>\n</li>\n<li>\n<p data-path-to-node=\"32,1,0\"><strong data-path-to-node=\"32,1,0\" data-index-in-node=\"0\">Article 75:</strong> PM appointment &amp; Collective Responsibility. / PM की नियुक्ति और सामूहिक उत्तरदायित्व।</p>\n</li>\n<li>\n<p data-path-to-node=\"32,2,0\"><strong data-path-to-node=\"32,2,0\" data-index-in-node=\"0\">Article 78:</strong> PM's duty to inform President. / राष्ट्रपति को सूचित करने का PM का कर्तव्य।</p>\n</li>\n<li>\n<p data-path-to-node=\"32,3,0\"><strong data-path-to-node=\"32,3,0\" data-index-in-node=\"0\">Collective Responsibility:</strong> If one minister loses a No-Confidence Motion, all must resign (\"Sink or Swim together\"). / यदि एक मंत्री अविश्वास प्रस्ताव हारता है, तो सभी को इस्तीफा देना होगा।</p>\n</li>\n<li>\n<p data-path-to-node=\"32,4,0\"><strong data-path-to-node=\"32,4,0\" data-index-in-node=\"0\">Age:</strong> LS (25), RS (30).</p>\n</li>\n</ul>\n<h2 data-start=\"3838\" data-end=\"3879\"><strong data-start=\"3841\" data-end=\"3879\">Council of Ministers &ndash; Composition</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3881\" data-end=\"4079\">\n<thead data-start=\"3881\" data-end=\"3896\">\n<tr data-start=\"3881\" data-end=\"3896\">\n<th data-start=\"3881\" data-end=\"3888\" data-col-size=\"sm\">Type</th>\n<th data-start=\"3888\" data-end=\"3896\" data-col-size=\"sm\">Role</th>\n</tr>\n</thead>\n<tbody data-start=\"3910\" data-end=\"4079\">\n<tr data-start=\"3910\" data-e .141px;\" data-start=\"4706\" data-end=\"4719\" data-col-size=\"sm\">1979&ndash;1980</td>\n</tr>\n<tr data-start=\"4720\" data-end=\"4748\">\n<td style=\"width: 507.859px;\" data-start=\"4720\" data-end=\"4735\" data-col-size=\"sm\">Jagjivan Ram</td>\n<td style=\"width: 411.141px;\" data-start=\"4735\" data-end=\"4748\" data-col-size=\"sm\">1979&ndash;1980</td>\n</tr>\n<tr data-start=\"4749\" data-end=\"4776\">\n<td style=\"width: 507.859px;\" data-start=\"4749\" data-end=\"4763\" data-col-size=\"sm\">Y.B. Chavan</td>\n<td style=\"width: 411.141px;\" data-col-size=\"sm\" data-start=\"4763\" data-end=\"4776\">1979&ndash;1980</td>\n</tr>\n<tr data-start=\"4777\" data-end=\"4801\">\n<td style=\"width: 507.859px;\" data-start=\"4777\" data-end=\"4788\" data-col-size=\"sm\">Devi Lal</td>\n<td style=\"width: 411.141px;\" data-col-size=\"sm\" data-start=\"4788\" data-end=\"4801\">1989&ndash;1991</td>\n</tr>\n<tr data-start=\"4802\" data-end=\"4829\">\n<td style=\"width: 507.859px;\" data-start=\"4802\" data-end=\"4816\" data-col-size=\"sm\">L.K. Advani</td>\n<td style=\"width: 411.141px;\" data-col-size=\"sm\" data-start=\"4816\" data-end=\"4829\">2002&ndash;2004</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Attorney General (AG) for India:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"81\">(भारत के महान्यायवादी (AG) के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Attorney General is appointed by the President under <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"57\">Article 76</strong> and must be a person who is qualified to be appointed as a <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"127\">Judge of the Supreme Court</strong>. (महान्यायवादी की नियुक्ति <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"181\">अनुच्छेद 76</strong> के तहत राष्ट्रपति द्वारा की जाती है और वह ऐसा व्यक्ति होना चाहिए जो <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"261\">उच्चतम न्यायालय का न्यायाधीश</strong> नियुक्त होने के योग्य हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The Constitution of India explicitly defines a <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"47\">fixed term of five years</strong> and the specific grounds for the removal of the Attorney General. (भारत का संविधान स्पष्ट रूप से महान्यायवादी के लिए <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"189\">पाँच वर्ष का निश्चित कार्यकाल</strong> और उन्हें हटाने के विशिष्ट आधारों को परिभाषित करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The AG has the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"15\">right of audience in all courts</strong> in India and represents the Government of India in all cases in the Supreme Court, including references made under <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"162\">Article 143</strong>. (महान्यायवादी को भारत के <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"200\">सभी न्यायालयों में सुनवाई का अधिकार</strong> है और वह <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"245\">अनुच्छेद 143</strong> के तहत किए गए संदर्भों सहित उच्चतम न्यायालय में भारत सरकार के सभी मामलों का प्रतिनिधित्व करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Unlike Cabinet Ministers, the Attorney General&rsquo;s remuneration is <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"65\">not fixed by the Constitution</strong> but is determined by the President of India. (कैबिनेट मंत्रियों के विपरीत, महान्यायवादी का पारिश्रमिक <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"197\">संविधान द्वारा निर्धारित नहीं</strong> है, बल्कि भारत के राष्ट्रपति द्वारा निर्धारित किया जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">While the AG is the chief law officer, the <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"43\">Cabinet Secretary</strong> heads the Cabinet Secretariat and assists the Cabinet, which is the actual decision-making body of the government. (जबकि महान्यायवादी मुख्य विधि अधिकारी है, <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"218\">कैबिनेट सचिव</strong> कैबिनेट सचिवालय का प्रमुख होता है और कैबिनेट की सहायता करता है, जो सरकार का वास्तविक निर्णय लेने वाला निकाय है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 3 only B) 1, 3, 4, and 5 only C) 2, 4, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<p data-path-to-node=\"9\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: B (1, 3, 4, and 5 only)</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Statement 1 is Correct:</strong> Matches Article 76 and the SC Judge qualification requirement.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Statement 2 is INCORRECT (Trap!): The Constitution does not fix the term and does not mention any procedure/grounds for removal. The AG holds office during the pleasure of the President.</p>\n<p style=\"line-height: 1.15 !important;\">(कथन 2 गलत है: संविधान कार्यकाल तय नहीं करता है और न ही हटाने की प्रक्रिया का उल्लेख करता है। AG राष्ट्रपति के प्रसादपर्यन्त पद धारण करता है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3 is Correct:</strong> This is a unique privilege of the AG. They can appear in any court (SC, HC, or lower courts).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,0\" data-index-in-node=\"0\">Statement 4 is Correct:</strong> Unlike other constitutional posts where Parliament decides, for the AG, the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,0\" data-index-in-node=\"100\">President</strong> determines the remuneration.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">Statement 5 is Correct:</strong> It correctly distinguishes between the legal advisor (AG) and the administrative head (Cabinet Secretary).</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">&nbsp;Quick Revision \"Cheat Sheet\"</strong></h3>\n<p data-path-to-node=\"14\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans- : 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,2,0\" data-index-in-node=\"0\">निश्चित नहीं</strong> (राष्ट्रपति के प्रसादपर्यन्त)।</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Removal</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">No grounds in Constitution.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\">संविधान में हटाने का कोई आधार नहीं।</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\" data-index-in-node=\"0\">Remuneration</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\">Determined by <strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\" data-index-in-node=\"14\">President</strong>.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,2,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,2,0\" data-index-in-node=\"0\">राष्ट्रपति</strong> द्वारा निर्धारित।</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,6,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,6,0,0\" data-index-in-node=\"0\">Audience</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,6,1,0\">All courts within India.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,6,2,0\">भारत के सभी न्यायालयों में।</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Fundamental Duties (FDs) in the Indian Constitution:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"101\">(भारतीय संविधान में मौलिक कर्तव्यों (FDs) के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Fundamental Duties were not part of the original Constitution but were added by the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"88\">42nd Amendment Act (1976)</strong> based on the recommendations of the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"150\">Swaran Singh Committee</strong>, inspired by the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"190\">USSR</strong> Constitution. (मौलिक कर्तव्य मूल संविधान का हिस्सा नहीं थे, लेकिन इन्हें <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"268\">USSR</strong> के संविधान से प्रेरित होकर <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"300\">स्वर्ण सिंह समिति</strong> की सिफारिशों के आधार पर <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"342\">42वें संशोधन अधिनियम (1976)</strong> द्वारा जोड़ा गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Initially, 10 duties were added; however, the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"46\">11th duty</strong>&mdash;providing education opportunities for children aged 6&ndash;14 years&mdash;was added by the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"136\">86th Amendment Act (2002)</strong>. (प्रारंभ में 10 कर्तव्य जोड़े गए थे; हालाँकि, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"209\">11वाँ कर्तव्य</strong>&mdash;6-14 वर्ष के बच्चों के लिए शिक्षा के अवसर प्रदान करना&mdash;<strong data-path-to-node=\"5,1,0\" data-index-in-node=\"277\">86वें संशोधन अधिनियम (2002)</strong> द्वारा जोड़ा गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Fundamental Duties are <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"23\">non-justiciable</strong> (cannot be enforced by courts directly), apply <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"86\">only to citizens</strong> (not foreigners), and do not include duties like paying taxes or voting. (मौलिक कर्तव्य <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"191\">गैर-न्यायोचित</strong> हैं (अदालतों द्वारा सीधे लागू नहीं किए जा सकते), <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"254\">केवल नागरिकों</strong> पर लागू होते हैं (विदेशियों पर नहीं), और इनमें करों का भुगतान करना या मतदान करना जैसे कर्तव्य शामिल नहीं हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">According to the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"17\">Verma Committee (1999)</strong> and Supreme Court interpretations, Parliament can make laws to enforce these duties, and such laws may be considered \"reasonable restrictions\" under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"189\">Articles 14 and 19</strong>. ( <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"211\">वर्मा समिति (1999)</strong> और सुप्रीम कोर्ट की व्याख्याओं के अनुसार, संसद इन कर्तव्यों को लागू करने के लिए कानून बना सकती है, और ऐसे कानूनों को <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"347\">अनुच्छेद 14 और 19</strong> के तहत \"उचित प्रतिबंध\" माना जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Article 51A(g)</strong> specifically mandates the protection of the natural environment, including forests, lakes, rivers, and wildlife, and showing compassion for living creatures. ( <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"175\">अनुच्छेद 51A(g)</strong> विशेष रूप से वनों, झीलों, नदियों और वन्यजीवों सहित प्राकृतिक पर्यावरण की रक्षा करने और जीवित प्राणियों के प्रति दया दिखाने का आदेश देता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 5 only B) 2, 3, and 4 only C) 1, 3, 4, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<p data-path-to-node=\"9\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: D (All of the above)</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Statement 1:</strong> Correct. Swaran Singh suggested 8, but the 42nd CAA added 10. Inspired by the Soviet model.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 2:</strong> Correct. 10 (1976) + 1 (2002) = 11 Total.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3:</strong> Correct. Just like DPSPs, you cannot sue someone for not being \"scientific,\" but they are applicable only to Indians. Taxes/Voting are <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0\" data-index-in-node=\"148\">not</strong> FDs (Swaran Singh suggested taxes, but it was rejected).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,0\" data-index-in-node=\"0\">Statement 4:</strong> Correct. The Verma Committee identified existing laws (like the Wildlife Protection Act) that help implement these duties.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">Statement 5:</strong> Correct. Article 51A(g) is a frequently asked clause in UPSC/SSC regarding the environment.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">&nbsp;\"Logic &amp; History\"&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Aspect (पहलू)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Detail (विवरण)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Fact (प्रमुख तथ्य)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Committee</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\">Swaran Singh (स्वर्ण सिंह)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,2,0\">Suggested 8 duties (8 का सुझाव दिया)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,0,0\" data-index-in-node=\"0\">Amendment 1</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,1,0\">42nd CAA, 1976</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,2,2,0\">Added 10 duties (10 कर्तव्य जोड़े)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">Amendment 2</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">86th CAA, 2002</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,2,0\">Added Education (11th) (शिक्षा जोड़ी)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Nature</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">Non-Justiciable (अवादयोग्य)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\">Only for Citizens (केवल नागरिकों के लिए)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,0,0\" data-index-in-node=\"0\">Court View</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\">Aids Constitutionality</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,2,0\">Help check if a law is valid.</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\" data-index-in-node=\"0\">&nbsp;Bonus: Famous Quotes on DPSPs&nbsp;</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,0,0\" data-index-in-node=\"0\">K.T. Shah:</strong> \"Cheque on a bank payable only when resources permit.\" (बैंक पर एक चेक जिसका भुगतान संसाधनों के होने पर ही संभव है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"16,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16,1,0\" data-index-in-node=\"0\">B.R. Ambedkar:</strong> \"Instruments of Instruction.\" (अनुदेशों के साधन - 1935 Act की तरह।)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Indian Judicial System:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"72\">(भारतीय न्यायिक प्रणाली के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"4\">Regulating Act of 1773</strong> led to the establishment of the Supreme Court of Judicature at Calcutta in 1774, while the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"118\">Indian High Courts Act of 1861</strong> replaced these early Supreme Courts with High Courts in provinces. ( <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"218\">1773 के रेगुलेटिंग एक्ट</strong> के कारण 1774 में कलकत्ता में 'सुप्रीम कोर्ट ऑफ ज्यूडिकेचर' की स्थापना हुई, जबकि <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"322\">1861 के भारतीय उच्च न्यायालय अधिनियम</strong> ने इन प्रारंभिक सर्वोच्च न्यायालयों को प्रांतों में उच्च न्यायालयों से बदल दिया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Unlike the United States, India has an <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"39\">Integrated Judicial System</strong> where a single hierarchy of courts (Supreme Court at the top, followed by High Courts and Subordinate Courts) enforces both Central and State laws. (संयुक्त राज्य अमेरिका के विपरीत, भारत में एक <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"260\">एकीकृत न्यायिक प्रणाली</strong> है जहाँ न्यायालयों का एक एकल पदानुक्रम (शीर्ष पर सर्वोच्च न्यायालय, उसके बाद उच्च न्यायालय और अधीनस्थ न्यायालय) केंद्र और राज्य दोनों कानूनों को लागू करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"4\">Seventh Amendment Act of 1956</strong> empowers the Parliament to establish a common High Court for two or more States or Union Territories; currently, there are <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"157\">25 High Courts</strong> in India. ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"184\">1956 का सातवां संशोधन अधिनियम</strong> संसद को दो या दो से अधिक राज्यों या केंद्र शासित प्रदेशों के लिए एक साझा उच्च न्यायालय स्थापित करने का अधिकार देता है; वर्तमान में भारत में <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"354\">25 उच्च न्यायालय</strong> हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">In the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"7\">Second Judges Case (1993)</strong>, the Supreme Court ruled that \"consultation\" means \"concurrence,\" and in the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"110\">Third Judges Case (1998)</strong>, it expanded the Collegium to include the Chief Justice of India (CJI) and <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"210\">four senior-most judges</strong>. ( <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"237\">द्वितीय न्यायाधीश मामले (1993)</strong> में, सर्वोच्च न्यायालय ने फैसला सुनाया कि \"परामर्श\" का अर्थ \"सहमति\" है, और <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"343\">तृतीय न्यायाधीश मामले (1998)</strong> में, इसने कॉलेजियम का विस्तार करके इसमें भारत के मुख्य न्यायाधीश (CJI) और <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"446\">चार सबसे वरिष्ठ न्यायाधीशों</strong> को शामिल किया।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">The <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"4\">National Judicial Appointments Commission (NJAC)</strong>, introduced via the <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"73\">99th Constitutional Amendment Act</strong>, was declared unconstitutional by the Supreme Court in 2015 (Fourth Judges Case) because it interfered with judicial independence. ( <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"240\">99वें संवैधानिक संशोधन अधिनियम</strong> के माध्यम से पेश किए गए <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"295\">राष्ट्रीय न्यायिक नियुक्ति आयोग (NJAC)</strong> को 2015 में सर्वोच्च न्यायालय द्वारा असंवैधानिक घोषित कर दिया गया था क्योंकि यह न्यायिक स्वतंत्रता में हस्तक्षेप करता था।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 2, 3, and 5 only C) 1, 3, 4, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<p data-path-to-node=\"9\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: D (All of the above)</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Statement 1:</strong> Correct. High Courts replaced the Supreme Courts of the British era in 1862.</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 2:</strong> Correct. India follows an integrated model, meaning there are no separate \"State Courts\" for state laws as seen in the US.</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3:</strong> Correct. Calcutta High Court (1862) is the oldest. Total count is now 25.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>Statement 4: Correct.</strong></span></p>\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>1st Case: Consultation &ne; Concurrence&nbsp;&nbsp;</strong></span></p>\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>2nd Case: Consultation = Concurrence (Collegium of 3)&nbsp;&nbsp;</strong></span></p>\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\"><strong>3rd Case: Collegium of 5 (CJI + 4 Judges)</strong></span></p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">statement 5:</strong> Correct. The NJAC was struck down to protect the \"Basic Structure\" of the Constitution (Judicial Independence).</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">🚀 \"Judiciary Quick-Ref\" Table (Bilingual)</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !imp     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Supreme Court (SC) and High Courts (HC) of India:</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The Supreme Court was inaugurated on <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"37\">January 28, 1950</strong>, replacing the Federal Court and Privy Council, while the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"112\">7th Amendment Act (1956)</strong> allowed for a common High Court for two or more states.</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The strength of the Supreme Court is currently <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"47\">34 judges</strong> (including CJI) and can be increased by <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"97\">Parliament</strong>, whereas the strength of a High Court is <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"149\">not fixed</strong> and is left to the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"178\">President's discretion</strong>.</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The Chief Justice of India (CJI) is appointed by the President after consulting SC and HC judges, while a High Court Chief Justice is appointed under <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"150\">Article 217</strong> after consulting the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"183\">CJI and the Governor</strong> of the state.</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">In the case of a <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"17\">Common High Court</strong>, the President is constitutionally required to consult the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"94\">Governors of all concerned states</strong>.</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 3 only B) 2, 3, and 4 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements regarding the jurisdiction of the Supreme Court (SC) and High Courts (HC):</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"109\">(उच्चतम न्यायालय (SC) और उच्च न्यायालयों (HC) के क्षेत्राधिकार के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">The SC has <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"11\">exclusive original jurisdiction</strong> in federal disputes (Centre vs States), but this does not extend to inter-state water disputes or pre-constitutional treaties. (SC के पास संघीय विवादों (केंद्र बनाम राज्य) में <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"219\">अनन्य प्रारंभिक क्षेत्राधिकार</strong> है, लेकिन इसका विस्तार अंतर-राज्यीय जल विवादों या संविधान-पूर्व संधियों तक नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Under <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"6\">Article 32</strong>, the SC's writ jurisdiction is narrower than the HC's under <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"77\">Article 226</strong>, as the SC can only issue writs for Fundamental Rights, while the HC can issue them for other legal rights as well. (अनुच्छेद 32 के तहत, SC का रिट क्षेत्राधिकार अनुच्छेद 226 के तहत HC की तुलना में संकीर्ण है, क्योंकि SC केवल मौलिक अधिकारों के लिए रिट जारी कर सकता है, जबकि HC अन्य कानूनी अधिकारों के लिए भी रिट जारी कर सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">A private citizen can bring a suit against the Centre or a State under the SC's <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"80\">Original Jurisdiction (Art 131)</strong> if their legal rights are violated. (एक निजी नागरिक SC के <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"170\">प्रारंभिक क्षेत्राधिकार (अनुच्छेद 131)</strong> के तहत केंद्र या राज्य के खिलाफ मुकदमा ला सकता है यदि उनके कानूनी अधिकारों का उल्लंघन होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The High Court has original jurisdiction over election disputes of MPs and MLAs and certain revenue matters. (उच्च न्यायालय के पास सांसदों और विधायकों के चुनाव विवादों और कुछ राजस्व मामलों पर प्रारंभिक क्षेत्राधिकार है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 2 and 3 only C) 1 and 3 only D) All of the above (1, 2, 3, and 4</p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Regarding the powers and administrative provisions of the Judiciary, consider the following:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"93\">(न्यायपालिका की शक्तियों और प्रशासनिक प्रावधानों के संबंध में, निम्नलिखित पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">Both SC (Art 129) and HC (Art 215) are <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"39\">Courts of Record</strong>, meaning their decisions have evidentiary value and they can punish for their own contempt. (SC (अनुच्छेद 129) और HC (अनुच्छेद 215) दोनों <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"194\">अभिलेख न्यायालय</strong> हैं, जिसका अर्थ है कि उनके निर्णयों का साक्ष्य मूल्य है और वे अपनी अवमानना के लिए दंडित कर सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The expression <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"15\">'Contempt of Court'</strong> is clearly defined in the Constitution of India. ('न्यायालय की अवमानना' शब्द को भारत के संविधान में स्पष्ट रूप से परिभाषित किया गया है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Criminal Contempt</strong> includes actions that scandalize or lower the authority of the court, whereas <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"96\">Civil Contempt</strong> refers to willful disobedience of court orders. (<strong data-path-to-node=\"13,2,0\" data-index-in-node=\"160\">अपराधिक अवमानना</strong> में वे कार्य शामिल हैं जो न्यायालय के अधिकार को कलंकित या कम करते हैं, जबकि <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"252\">दीवानी अवमानना</strong> न्यायालय के आदेशों की जानबूझकर की गई अवज्ञा को संदर्भित करती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"4\">pensions</strong> of both Supreme Court and High Court judges are charged on the <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"76\">Consolidated Fund of India</strong>. (उच्चतम न्यायालय और उच्च न्यायालय दोनों के न्यायाधीशों की <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"162\">पेंशन</strong> <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"168\">भारत की संचित निधि</strong> पर भारित होती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 1, 3, and 4 only C) 2, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "solution": "<p>Motion (Signed) &rarr; Speaker/Chairman Admits &rarr; Inquiry Committee &rarr; Voting (Special Majority) &rarr; President&rsquo;s Order</p>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; text-align: center;\" data-path-to-node=\"26\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"26\" data-index-in-node=\"0\">Quick Revision Table: Jurisdiction &amp; Powers&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Parameter (मानदंड)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Supreme Court (SC)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">High Court (HC)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,1,0,0\"><strong style=\"line-height: 1.15 ight: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,3,0,0\" data-index-in-node=\"0\">Court of Record</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,3,1,0\">Article 129</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,3,2,0\">Article 215</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,4,0,0\" data-index-in-node=\"0\">Salary Source</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,4,1,0\" data-index-in-node=\"0\">CFI (India)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,4,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,4,2,0\" data-index-in-node=\"0\">CFS (State)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,5,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,5,0,0\" data-index-in-node=\"0\">Pension Source</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,5,1,0\" data-index-in-node=\"0\">CFI (India)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,5,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,5,2,0\" data-index-in-node=\"0\">CFI (India)</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,6,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,6,0,0\" data-index-in-node=\"0\">Final Interpreter</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,6,1,0\">Of the Constitution (संविधान का)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"27,6,2,0\">Within the State</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Evaluate the following statements regarding the special provisions of the Supreme Court:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"89\">(उच्चतम न्यायालय के विशेष प्रावधानों के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">Under <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"6\">Article 127</strong>, the CJI can appoint a High Court judge as an <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"64\">Ad Hoc judge</strong> only if there is a lack of quorum and with the prior consent of the President. (अनुच्छेद 127 के तहत, CJI केवल कोरम (गणपूर्ति) की कमी होने पर और राष्ट्रपति की पूर्व सहमति से ही उच्च न्यायालय के न्यायाधीश को <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"283\">तदर्थ (Ad Hoc) न्यायाधीश</strong> के रूप में नियुक्त कर सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Article 130</strong> mandates that the Supreme Court must always sit in Delhi and no other location can be appointed as its seat. (अनुच्छेद 130 यह आदेश देता है कि उच्चतम न्यायालय को हमेशा दिल्ली में ही बैठना चाहिए और किसी अन्य स्थान को इसकी सीट के रूप में नियुक्त नहीं किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Special Leave to Appeal (Article 136)</strong> is a discretionary power of the SC that can be used for any court or tribunal in India, including <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"136\">Military Courts (Court Martial)</strong>. (विशेष अनुमति अपील (अनुच्छेद 136) SC की एक विवेकाधीन शक्ति है जिसका उपयोग भारत के किसी भी न्यायालय या ट्रिब्यूनल के लिए किया जा सकता है, जिसमें <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"313\">सैन्य न्यायालय (कोर्ट मार्शल)</strong> भी शामिल हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"6\">Advisory Jurisdiction (Article 143)</strong>, the SC is <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"53\">bound</strong> to give an opinion on disputes arising from pre-constitutional treaties, but the opinion is <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"151\">not binding</strong> on the President. (परामर्शदात्री क्षेत्राधिकार (अनुच्छेद 143) के तहत, SC संविधान-पूर्व संधियों से उत्पन्न विवादों पर राय देने के लिए <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"296\">बाध्य</strong> है, लेकिन यह राय राष्ट्रपति पर <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"333\">बाध्यकारी नहीं</strong> है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 4 only B) 2, 3, and 4 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">With reference to the enforcement of Supreme Court orders, consider the following:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"83\">(उच्चतम न्यायालय के आदेशों के प्रवर्तन के संदर्भ में, निम्नलिखित पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\">According to <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"13\">Article 141</strong>, the law declared by the Supreme Court is binding on all courts within the territory of India, including the Supreme Court itself. (अनुच्छेद 141 के अनुसार, उच्चतम न्यायालय द्वारा घोषित कानून भारत के क्षेत्र के भीतर सभी न्यायालयों पर बाध्यकारी है, जिसमें स्वयं उच्चतम न्यायालय भी शामिल है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Article 142</strong> allows the SC to pass any decree or order necessary for doing <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"74\">\"complete justice\"</strong>, a power notably used in the <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"122\">Union Carbide (Bhopal Gas Tragedy) case</strong>. (अनुच्छेद 142 SC को <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"183\">\"पूर्ण न्याय\"</strong> करने के लिए आवश्यक कोई भी डिक्री या आदेश पारित करने की अनुमति देता है, इस शक्ति का विशेष रूप से <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"293\">यूनियन कार्बाइड (भोपाल गैस त्रासदी) मामले</strong> में उपयोग किया गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">The Supreme Court has the power to review its own judgments under <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"66\">Article 137</strong>, meaning it is not strictly bound by its previous decisions. (उच्चतम न्यायालय को अनुच्छेद 137 के तहत अपने स्वयं के निर्णयों की समीक्षा करने की शक्ति है, जिसका अर्थ है कि वह अपने पिछले निर्णयों से पूरी तरह बाध्य नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">Disputes regarding the election of the <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"39\">President and Vice-President</strong> are decided exclusively by the Supreme Court. (राष्ट्रपति और उपराष्ट्रपति के चुनाव से संबंधित विवादों का निर्णय विशेष रूप से उच्चतम न्यायालय द्वारा किया जाता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 2, 3, and 4 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Match the following Judicial Doctrines with their correct principles:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(निम्नलिखित न्यायिक सिद्धांतों को उनके सही सिद्धांतों के साथ सुमेलित करें:)</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Doctrine (सिद्धांत)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Principle (सिद्धांत/नियम)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,0,0\" data-index-in-node=\"0\">A) Pith and Substance</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"21,1,1,0\">1. Only the unconstitutional part of a law is voided, not the whole act.</span></td>\n</tr>     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Regarding the Advocates Act 1961 and High Court provisions (Articles 222-227), consider the following:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"103\">(अधिवक्ता अधिनियम 1961 और उच्च न्यायालय के प्रावधानों (अनुच्छेद 222-227) के संबंध में, निम्नलिखित पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">Under the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"10\">Advocates Act 1961</strong>, Advocates are the only recognized class entitled to practice law; <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"96\">Senior Advocates</strong> are designated by the SC or HC based on merit and experience. (अधिवक्ता अधिनियम 1961 के तहत, अधिवक्ता कानून का अभ्यास करने के लिए पात्र एकमात्र मान्यता प्राप्त वर्ग हैं; <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"283\">वरिष्ठ अधिवक्ताओं</strong> को योग्यता के आधार पर SC या HC द्वारा नामित किया जाता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">An <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"3\">Advocate-on-Record (AoR)</strong> is the only class of lawyer permitted to file appearances and act for a party in the Supreme Court. ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"130\">एडवोकेट-ऑन-रिकॉर्ड (AoR)</strong> वकीलों का एकमात्र वर्ग है जिसे उच्चतम न्यायालय में उपस्थिति दर्ज करने और पक्षकार के लिए कार्य करने की अनुमति है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Under <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"6\">Article 222</strong>, the President can transfer a High Court judge after consulting the CJI, and such a transfer can be challenged in court by any citizen to prevent arbitrariness. (अनुच्छेद 222 के तहत, राष्ट्रपति CJI से परामर्श के बाद उच्च न्यायालय के न्यायाधीश का स्थानांतरण कर सकता है, और ऐसे स्थानांतरण को मनमानेपन को रोकने के लिए किसी भी नागरिक द्वारा अदालत में चुनौती दी जा सकती है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Article 227</strong> grants High Courts the power of <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"44\">superintendence</strong> over all courts and tribunals within their jurisdiction, excluding military courts. (अनुच्छेद 227 उच्च न्यायालयों को उनके अधिकार क्षेत्र के भीतर सभी अदालतों और न्यायाधिकरणों (सैन्य अदालतों को छोड़कर) पर <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"263\">अधीक्षण</strong> की शक्ति प्रदान करता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 2 and 3 only C) 1 and 3 only D) All of the above (1, 2, 3, and 4)</p>",
