    "question": "<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Consider the following statements regarding the legal aid and grassroots judicial system in India:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">(भारत में कानूनी सहायता और जमीनी स्तर की न्यायिक प्रणाली के संबंध में निम्नलिखित कथनों पर विचार करें:)</p>\n<ol style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"5\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\"><span style=\"font-family: Google Sans Text, sans-serif;\">NALSA was established under the Legal Services Authorities Act, 1987 to fulfil the mandate of Article 39A, providing free legal aid to women, children, SC/ST and persons with income &le; ₹1 lakh.</span><span style=\"font-family: Google Sans Text, sans-serif;\">नालसा की स्थापना कानूनी सेवा प्राधिकरण अधिनियम, 1987 के तहत अनुच्छेद 39A के उद्देश्य को पूरा करने के लिए की गई थी, जो महिलाओं, बच्चों, SC/ST तथा ₹1 लाख तक की आय वाले व्यक्तियों को निःशुल्क कानूनी सहायता प्रदान करता है।</span></p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">The award of a Permanent Lok Adalat is final and binding on all parties, and no appeal lies against it in any court of law.</p>\n<p style=\"line-height: 1.15 !important;\">( स्थायी लोक अदालत का निर्णय अंतिम और सभी पक्षों पर बाध्यकारी होता है, और किसी भी अदालत में इसके खिलाफ कोई अपील नहीं की जा सकती।)</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Gram Nyayalayas are presided over by a Nyayadhikari (Judicial Magistrate 1st Class) and are not strictly bound by the Indian Evidence Act, following the principles of natural justice instead.</p>\n<p style=\"line-height: 1.15 !important;\">( ग्राम न्यायालयों की अध्यक्षता एक न्यायाधिकारी (प्रथम श्रेणी न्यायिक मजिस्ट्रेट) द्वारा की जाती है और वे सख्ती से भारतीय साक्ष्य अधिनियम से बंधे नहीं होते हैं, बल्कि प्राकृतिक न्याय के सिद्धांतों का पालन करते हैं।)</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Appeals against the criminal and civil judgments of a Gram Nyayalaya lie directly to the High Court of the concerned state.</p>\n<p style=\"line-height: 1.15 !important;\">(ग्राम न्यायालय के आपराधिक और दीवानी निर्णयों के खिलाफ अपील सीधे संबंधित राज्य के उच्च न्यायालय में की जाती है।)</p>\n</li>\n</ol>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">A) 1, 2, and 3 only</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">B) 2, 3, and 4 only</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">C) 1 and 4 only</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">D) All of the above (1, 2, 3, and 4)</p>",
    "comp": "",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">With reference to Tribunals in India, evaluate the following statements:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"73\">(भारत में न्यायाधिकरणों के संदर्भ में, निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Part XIV-A</strong> and <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"15\">Articles 323A and 323B</strong> were added to the Constitution by the <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"76\">42nd Amendment Act, 1976</strong>, to establish judicial or quasi-judicial bodies for specific disputes. ( <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"174\">भाग XIV-A</strong> और <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"187\">अनुच्छेद 323A और 323B</strong> को विशिष्ट विवादों के लिए न्यायिक या अर्ध-न्यायिक निकायों की स्थापना के लिए <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"285\">42वें संशोधन अधिनियम, 1976</strong> द्वारा संविधान में जोड़ा गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">Under <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"6\">Article 323A</strong>, only <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"25\">Parliament</strong> can establish administrative tribunals, whereas under <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"90\">Article 323B</strong>, both Parliament and State Legislatures can establish tribunals for matters like taxation and land reforms. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"213\">अनुच्छेद 323A</strong> के तहत, केवल <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"240\">संसद</strong> प्रशासनिक न्यायाधिकरण स्थापित कर सकती है, जबकि <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"292\">अनुच्छेद 323B</strong> के तहत, संसद और राज्य विधायिका दोनों कराधान और भूमि सुधार जैसे मामलों के लिए न्यायाधिकरण स्थापित कर सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">Following the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"14\">L. Chandra Kumar Case (1997)</strong>, appeals against the decisions of the <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"81\">Central Administrative Tribunal (CAT)</strong> must first be made to the Division Bench of the concerned <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"177\">High Court</strong>. ( <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"191\">एल. चंद्र कुमार मामले (1997)</strong> के बाद, <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"228\">केंद्रीय प्रशासनिक न्यायाधिकरण (CAT)</strong> के निर्णयों के खिलाफ अपील पहले संबंधित <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"304\">उच्च न्यायालय</strong> की खंडपीठ में की जानी चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">The <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"4\">Tribunal Reforms Act, 2021</strong> fixed the tenure for the Chairperson and members at <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"83\">4 years</strong>, with a minimum age of <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"114\">50 years</strong> for appointment. ( <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"142\">न्यायाधिकरण सुधार अधिनियम, 2021</strong> ने अध्यक्ष और सदस्यों के लिए कार्यकाल <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"212\">4 वर्ष</strong> निर्धारित किया और नियुक्ति के लिए न्यूनतम आयु <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"265\">50 वर्ष</strong> तय की।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 2, 3, and 4 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "question": "<p><strong data-path-to-node=\"19\" data-index-in-node=\"0\">Regarding the powers and philosophies of the Indian Judiciary, identify the INCORRECT statement:</strong> <strong data-path-to-node=\"19\" data-index-in-node=\"97\">(भारतीय न्यायपालिका की शक्तियों और दर्शन के संबंध में, गलत कथन की पहचान करें:)</strong></p>",
    "comp": "",
    "options": [
      "<p><strong data-path-to-node=\"20\" data-index-in-node=\"3\">Judicial Review</strong> is a basic feature of the Constitution (I.R. Coelho Case), though the phrase is not explicitly mentioned in the text of the Constitution.</p>\n<p>(न्यायिक समीक्षा संविधान की एक बुनियादी विशेषता है (I.R. कोएल्हो मामला), हालांकि इस वाक्यांश का संविधान के पाठ में स्पष्ट रूप से उल्लेख नहीं किया गया है।)&nbsp;</p>",
      "<p><strong data-path-to-node=\"20\" data-index-in-node=\"315\">Public Interest Litigation (PIL)</strong>&nbsp;was introduced in India in the 1980s by&nbsp;<strong data-path-to-node=\"20\" data-index-in-node=\"388\">Justices V.R. Krishna Iyer and P.N. Bhagwati</strong>, relaxing the traditional rule of&nbsp;<em data-path-to-node=\"20\" data-index-in-node=\"467\">locus standi</em>.</p>\n<p>(भारत में 1980 के दशक में&nbsp;<strong data-path-to-node=\"20\" data-index-in-node=\"507\">न्यायमूर्ति वी.आर. कृष्णा अय्यर और पी.एन. भगवती</strong>&nbsp;द्वारा&nbsp;<em data-path-to-node=\"20\" data-index-in-node=\"562\">लोकस स्टैंडाई</em>&nbsp;के पारंपरिक नियम को शिथिल करते हुए जनहित याचिका (PIL) पेश की गई थी।)</p>",
      "<p>&nbsp;A&nbsp;<strong data-path-to-node=\"20\" data-index-in-node=\"650\">PIL</strong>&nbsp;can be filed by any citizen against Central/State governments and private parties for matters like landlord-tenant disputes or service matters.</p>\n<p>(एक&nbsp;<strong data-path-to-node=\"20\" data-index-in-node=\"802\">PIL</strong>&nbsp;किसी भी नागरिक द्वारा केंद्र/राज्य सरकारों और निजी पार्टियों के खिलाफ मकान मालिक-किरायेदार विवाद या सेवा मामलों के लिए दायर की जा सकती है।)</p>",
      "<p>&nbsp;<strong data-path-to-node=\"20\" data-index-in-node=\"949\">Judicial Overreach</strong>&nbsp;occurs when the judiciary encroaches into the domain of the legislature or executive, such as the blanket liquor ban near highways.</p>\n<p>(न्यायिक अतिरेक तब होता है जब न्यायपालिका विधायिका या कार्यपालिका के क्षेत्र में अतिक्रमण करती है, जैसे कि राजमार्गों के पास शराब पर पूर्ण प्रतिबंध।)</p>"

line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,0,0\" data-index-in-node=\"0\">126</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">Acting Chief Justice</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,2,0\">कार्यवाहक मुख्य न्यायाधीश</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">127</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\" data-index-in-node=\"0\">Ad-Hoc</strong> Judges (Quorum)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\" data-ind pan style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,6,2,0\">SC कानून की बाध्यकारी प्रकृति</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,7,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,7,0,0\" data-index-in-node=\"0\">145</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,7,1,0\">Rules of Court (Bench strength)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,7,2,0\">न्यायालय के नियम (बेंच की संख्या)</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,8,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,8,0,0\" data-index-in-node=\"0\">146</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,8,1,0\">Expenses (CFI Charged)</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,8,2,0\">खर्च (भारत की संचित निधि पर भारित)</span></td>\n</tr>\n</tbody>\n</table " data-path-to-node=\"5,4,0,0\" data-index-in-node=\"0\">D) L.M. Singhvi (1986)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5,4,1,0\">4. Focused on \"Grass without Roots\" and District Development Commissioner. (\"जड़विहीन घास\" और जिला विकास आयुक्त पर ध्यान केंद्रित किया।)</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">Choose the correct code: / सही कूट का चयन करें:</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">A) A-3, B-1, C-4, D-2</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">B) A-1, B-3, C-4, D-2</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">C) A-3, B-1, C-2, D-4</p>\n<p style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">D) A-4, B-1, C-3, D-2</p>",

    "solution": "<p>Balwant Rai Mehta is the \"pioneer\" of the 3-tier system. Ashok Mehta famously diverted to a 2-tier model. G.V.K. Rao critiqued the bureaucracy (\"Grass without roots\"), and L.M. Singhvi was the first to strongly advocate for <strong data-path-to-node=\"8,0\" data-index-in-node=\"231\">Constitutional Status</strong>.</p>\n<h2 data-start=\"157\" data-end=\"211\"><strong data-start=\"160\" data-end=\"211\">PANCHAYATI RAJ SYSTEM &ndash; CHEAT SHEET (Bilingual)</strong></h2>\n<hr data-start=\"213\" data-end=\"216\" />\n<h2 data-start=\"218\" data-end=\"248\"><strong data-start=\"221\" data-end=\"248\">1. Definition (परिभाषा)</strong></h2>\n<ul data-start=\"250\" data-end=\"906\">\n<li data-start=\"250\" data-end=\"444\">\n<p data-start=\"252\" data-end=\"444\"><strong data-start=\"252\" data-end=\"270\">Panchayati Raj</strong>: System of rural local self-government; basis of <strong data-start=\"320\" data-end=\"351\">democratic decentralisation</strong>.<br data-start=\"352\" data-end=\"355\" /><strong data-start=\"357\" data-end=\"372\">पंचायती राज</strong>: ग्रामीण स्थानीय स्वशासन की व्यवस्था; लोकतांत्रिक विकेंद्रीकरण का आधार।</p>\n</li>\n<li data-start=\"446\" data-end=\"601\">\n<p data-start=\"448\" data-end=\"601\"><strong data-start=\"448\" data-end=\"459\">Meaning</strong>: &ldquo;Rule of Five&rdquo; &ndash; decisions by five village elders (historical origin).<br data-start=\"531\" data-end=\"534\" /><strong data-start=\"536\" data-end=\"544\">अर्थ</strong>: &ldquo;पाँच का शासन&rdquo; &ndash; ग्राम के पाँच बुजुर्गों द्वारा निर्णय।</p>\n</li>\n<li data-start=\"603\" data-end=\"768\">\n<p data-start=\"605\" data-end=\"768\"><strong data-start=\"605\" data-end=\"634\">Principle of Subsidiarity</strong>: Powers should be exercised at the lowest effective level.<br data-start=\"693\" data-end=\"696\" /><strong data-start=\"698\" data-end=\"721\">सब्सिडियरी सिद्धांत</strong>: शक्तियाँ न्यूनतम सक्षम स्तर पर दी जानी चाहिए।</p>\n</li>\n<li data-start=\"770\" data-end=\"906\">\n<p data-start=\"772\" data-end=\"906\"><strong data-start=\"772\" data-end=\"788\">Role of PRIs</strong>: People&rsquo;s participation + democratic decentralisation.<br data-start=\"843\" data-end=\"846\" /><strong data-start=\"848\" data-end=\"865\">PRI की भूमिका</strong>: जन-भागीदारी व लोकतांत्रिक विकेंद्रीकरण।</p>\n</li>\n</ul>\n<hr data-start=\"908\" data-end=\"911\" />\n<h2 data-start=\"913\" data-end=\"962\"><strong data-start=\"916\" data-end=\"962\">2. Historical Context (ऐतिहासिक पृष्ठभूमि)</strong></h2>\n<ul data-start=\"964\" data-end=\"1208\">\n<li data-start=\"964\" data-end=\"1072\">\n<p data-start=\"966\" data-end=\"1072\"><strong data-start=\"966\" data-end=\"983\">Ancient Roots</strong>: Village assemblies in ancient India.<br data-start=\"1021\" data-end=\"1024\" /><strong data-start=\"1026\" data-end=\"1041\">प्राचीन मूल</strong>: प्राचीन भारत में ग्राम सभाएँ।</p>\n</li>\n<li data-start=\"1074\" data-end=\"1208\">\n<p data-start=\"1076\" data-end=\"1208\"><strong data-start=\"1076\" data-end=\"1101\">Constitutional Status</strong>: <strong data-start=\"1103\" data-end=\"1146\">73rd Constitutional Amendment Act, 1992</strong>.<br data-start=\"1147\" data-end=\"1150\" /><strong data-start=\"1152\" data-end=\"1171\">संवैधानिक दर्जा</strong>: 73वाँ संविधान संशोधन अधिनियम, 1992।</p>\n</li>\n</ul>\n<hr data-start=\"1210\" data-end=\"1213\" />\n<h2 data-start=\"1215\" data-end=\"1265\"><strong data-start=\"1218\" data-end=\"1265\">3. Evolution of Panchayati Raj (विकास क्रम)</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1267\" data-end=\"2139\">\n<thead data-start=\"1267\" data-end=\"1327\">\n<tr data-start=\"1267\" data-end=\"1327\">\n<th data-start=\"1267\" data-end=\"1284\" data-col-size=\"sm\">Period / Event</th>\n<th data-start=\"1284\" data-end=\"1309\" data-col-size=\"sm\">Contribution (English)</th>\n<th data-start=\"1309\" data-end=\"1327\" data-col-size=\"sm\">योगदान (हिंदी)</th>\n</tr>\n</thead>\n<tbody data-start=\"1342\" data-end=\"2139\">\n<tr data-start=\"1342\" data-end=\"1413\">\n<td data-start=\"1342\" data-end=\"1359\" data-col-size=\"sm\">British Period</td>\n<td data-start=\"1359\" data-end=\"1387\" data-col-size=\"sm\">Village autonomy weakened</td>\n<td data-col-size=\"sm\" data-start=\"1387\" data-end=\"1413\">ग्राम स्वायत्तता कमजोर</td>\n</tr>\n<tr data-start=\"1414\" data-end=\"1496\">\n<td data-start=\"1414\" data-end=\"1440\" data-col-size=\"sm\">Mayo&rsquo;s Resolution, 1870</td>\n<td data-col-size=\"sm\" data-start=\"1440\" data-end=\"1470\">Decentralisation encouraged</td>\n<td data-col-size=\"sm\" data-start=\"1470\" data-end=\"1496\">विकेंद्रीकरण को बढ़ावा</td>\n</tr>\n<tr data-start=\"1497\" data-end=\"1576\">\n<td data-start=\"1497\" data-end=\"1516\" data-col-size=\"sm\">Lord Ripon, 1882</td>\n<td data-col-size=\"sm\" data-start=\"1516\" data-end=\"1550\">Father of Local Self-Government</td>\n<td data-col-size=\"sm\" data-start=\"1550\" data-end=\"1576\">स्थानीय स्वशासन के जनक</td>\n</tr>\n<tr data-start=\"1577\" data-end=\"1663\">\n<td data-start=\"1577\" data-end=\"1602\" data-col-size=\"sm\">Royal Commission, 1907</td>\n<td data-col-size=\"sm\" data-start=\"1602\" data-end=\"1634\">Recognised village panchayats</td>\n<td data-col-size=\"sm\" data-start=\"1634\" data-end=\"1663\">ग्राम पंचायतों की मान्यता</td>\n</tr>\n<tr data-start=\"1664\" data-end=\"1745\">\n<td data-start=\"1664\" data-end=\"1691\" data-col-size=\"sm\">Montagu-Chelmsford, 1919</td>\n<td data-col-size=\"sm\" data-start=\"1691\" data-end=\"1717\">Local govt to provinces</td>\n<td data-col-size=\"sm\" data-start=\"1717\" data-end=\"1745\">प्रांतों को स्थानीय शासन</td>\n</tr>\n<tr data-start=\"1746\" data-end=\"1814\">\n<td data-start=\"1746\" data-end=\"1766\" data-col-size=\"sm\">Post-Independence</td>\n<td data-col-size=\"sm\" data-start=\"1766\" data-end=\"1791\">Art. 40; State Subject</td>\n<td data-col-size=\"sm\" data-start=\"1791\" data-end=\"1814\">अनु. 40; राज्य विषय</td>\n</tr>\n<tr data-start=\"1815\" data-end=\"1873\">\n<td data-start=\"1815\" data-end=\"1840\" data-col-size=\"sm\">CDP (1952), NES (1953)</td>\n<td data-col-size=\"sm\" data-start=\"1840\" data-end=\"1858\">Limited success</td>\n<td data-col-size=\"sm\" data-start=\"1858\" data-end=\"1873\">सीमित सफलता</td>\n</tr>\n<tr data-start=\"1874\" data-end=\"1939\">\n<td data-start=\"1874\" data-end=\"1900\" data-col-size=\"sm\">Balwant Rai Mehta, 1957</td>\n<td data-col-size=\"sm\" data-start=\"1900\" data-end=\"1916\">3-tier system</td>\n<td data-col-size=\"sm\" data-start=\"1916\" data-end=\"1939\">त्रि-स्तरीय प्रणाली</td>\n</tr>\n<tr data-start=\"1940\" data-end=\"2006\">\n<td data-start=\"1940\" data-end=\"1965\" data-col-size=\"sm\">First PRI State (1959)</td>\n<td data-col-size=\"sm\" data-start=\"1965\" data-end=\"1986\">Rajasthan (Nagaur)</td>\n<td data-col-size=\"sm\" data-start=\"1986\" data-end=\"2006\">राजस्थान (नागौर)</td>\n</tr>\n<tr data-start=\"2007\" data-end=\"2058\">\n<td data-start=\"2007\" data-end=\"2024\" data-col-size=\"sm\">73rd CAA, 1992</td>\n<td data-start=\"2024\" data-end=\"2042\" data-col-size=\"sm\">PRIs formalised</td>\n<td data-col-size=\"sm\" data-start=\"2042\" data-end=\"2058\">PRIs औपचारिक</td>\n</tr>\n<tr data-start=\"2059\" data-end=\"2139\">\n<td data-start=\"2059\" data-end=\"2079\" data-col-size=\"sm\"><strong data-start=\"2061\" data-end=\"2078\">24 April 1993</strong></td>\n<td data-col-size=\"sm\" data-start=\"2079\" data-end=\"2109\">National Panchayati Raj Day</td>\n<td data-col-size=\"sm\" data-start=\"2109\" data-end=\"2139\">राष्ट्रीय पंचायती राज दिवस</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2141\" data-end=\"2144\" />\n<h2 data-start=\"2146\" data-end=\"2199\"><strong data-start=\"2149\" data-end=\"2199\">4. Key Committees &amp; Recommendations (समितियाँ)</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2201\" data-end=\"2747\">\n<thead data-start=\"2201\" data-end=\"2261\">\n<tr data-start=\"2201\" data-end=\"2261\">\n<th data-start=\"2201\" data-end=\"2213\" data-col-size=\"sm\">Committee</th>\n<th data-start=\"2213\" data-end=\"2220\" data-col-size=\"sm\">Year</th>\n<th data-start=\"2220\" data-end=\"2261\" data-col-size=\"md\">Key Recommendations (English / हिंदी)</th>\n</tr>\n</thead>\n<tbody data-start=\"2276\" data-end=\"2747\">\n<tr data-start=\"2276\" data-end=\"2345\">\n<td data-start=\"2276\" data-end=\"2296\" data-col-size=\"sm\">Balwant Rai Mehta</td>\n<td data-start=\"2296\" data-end=\"2303\" data-col-size=\"sm\">1957</td>\n<td data-col-size=\"md\" data-start=\"2303\" data-end=\"2345\">3-tier PRIs; ZP advisory / त्रि-स्तरीय</td>\n</tr>\n<tr data-start=\"2346\" data-end=\"2416\">\n<td data-start=\"2346\" data-end=\"2360\" data-col-size=\"sm\">Ashok Mehta</td>\n<td data-col-size=\"sm\" data-start=\"2360\" data-end=\"2367\">1977</td>\n<td data-col-size=\"md\" data-start=\"2367\" data-end=\"2416\">2-tier; district focus; parties / द्वि-स्तरीय</td>\n</tr>\n<tr data-start=\"2417\" data-end=\"2473\">\n<td data-start=\"2417\" data-end=\"2428\" data-col-size=\"sm\">Dantwala</td>\n<td data-start=\"2428\" data-end=\"2435\" data-col-size=\"sm\">1978</td>\n<td data-start=\"2435\" data-end=\"2473\" data-col-size=\"md\">Block-level planning / ब्लॉक योजना</td>\n</tr>\n<tr data-start=\"2474\" data-end=\"2539\">\n<td data-start=\"2474\" data-end=\"2491\" data-col-size=\"sm\">Hanumantha Rao</td>\n<td data-start=\"2491\" data-end=\"2498\" data-col-size=\"sm\">1984</td>\n<td data-col-size=\"md\" data-start=\"2498\" data-end=\"2539\">District planning bodies / जिला योजना</td>\n</tr>\n<tr data-start=\"2540\" data-end=\"2590\">\n<td data-start=\"2540\" data-end=\"2553\" data-col-size=\"sm\">G.V.K. Rao</td>\n<td data-start=\"2553\" data-end=\"2560\" data-col-size=\"sm\">1985</td>\n<td data-start=\"2560\" data-end=\"2590\" data-col-size=\"md\">ZP as key body / ZP प्रमुख</td>\n</tr>\n<tr data-start=\"2591\" data-end=\"2656\">\n<td data-start=\"2591\" data-end=\"2606\" data-col-size=\"sm\">L.M. Singhvi</td>\n<td data-col-size=\"sm\" data-start=\"2606\" data-end=\"2613\">1986</td>\n<td data-col-size=\"md\" data-start=\"2613\" data-end=\"2656\">Constitutional status; Nyaya Panchayats</td>\n</tr>\n<tr data-start=\"2657\" data-end=\"2703\">\n<td data-start=\"2657\" data-end=\"2667\" data-col-size=\"sm\">Thungon</td>\n<td data-col-size=\"sm\" data-start=\"2667\" data-end=\"2674\">1988</td>\n<td data-col-size=\"md\" data-start=\"2674\" data-end=\"2703\">5-year term; reservations</td>\n</tr>\n<tr data-start=\"2704\" data-end=\"2747\">\n<td data-start=\"2704\" data-end=\"2713\" data-col-size=\"sm\">Gadgil</td>\n<td data-col-size=\"sm\" data-start=\"2713\" data-end=\"2720\">1988</td>\n<td data-col-size=\"md\" data-start=\"2720\" data-end=\"2747\">Basis of 73rd Amendment</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<p data-start=\"2749\" data-end=\"2982\"><strong data-start=\"2749\" data-end=\"2762\">Post-73rd</strong>: Devolution Task Force (2001 &ndash; Lalit Mathur), Grassroots Planning (2005 &ndash; V. Ramachandran), District Planning Manual (2008 &ndash; Rajwant Sandhu), DRDA Restructuring (2010), Leveraging Panchayats (2012 &ndash; Mani Shankar Aiyar).</p>\n<hr data-start=\"2984\" data-end=\"2987\" />\n<h2 data-start=\"2989\" data-end=\"3055\"><strong data-start=\"2992\" data-end=\"3053\">5. 73rd Constitutional Amendment Act, 1992 &ndash; Key Features</strong></h2>\n<h3 data-start=\"3056\" data-end=\"3104\"><strong data-start=\"3060\" data-end=\"3104\">(73वाँ संविधान संशोधन &ndash; प्रमुख प्रावधान)</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"3106\" data-end=\"4036\">\n<thead data-start=\"3106\" data-end=\"3155\">\n<tr data-start=\"3106\" data-end=\"3155\">\n<th data-start=\"3106\" data-end=\"3118\" data-col-size=\"sm\">Provision</th>\n<th data-start=\"3118\" data-end=\"3138\" data-col-size=\"md\">Details (English)</th>\n<th data-start=\"3138\" data-end=\"3155\" data-col-size=\"sm\">विवरण (हिंदी)</th>\n</tr>\n</thead>\n<tbody data-start=\"3170\" data-end=\"4036\">\n<tr data-start=\"3170\" data-end=\"3273\">\n<td data-start=\"3170\" data-end=\"3188\" data-col-size=\"sm\">Part &amp; Schedule</td>\n<td data-col-size=\"md\" data-start=\"3188\" data-end=\"3248\"><strong data-start=\"3190\" data-end=\"3217\">Part IX (Art. 243&ndash;243O)</strong>; <strong data-start=\"3219\" data-end=\"3247\">11th Schedule (29 items)</strong></td>\n<td data-col-size=\"sm\" data-start=\"3248\" data-end=\"3273\">भाग IX; 11वीं अनुसूची</td>\n</tr>\n<tr data-start=\"3274\" data-end=\"3335\">\n<td data-start=\"3274\" data-end=\"3294\" data-col-size=\"sm\">Gram Sabha (243A)</td>\n<td data-col-size=\"md\" data-start=\"3294\" data-end=\"3313\">Direct democracy</td>\n<td data-col-size=\"sm\" data-start=\"3313\" data-end=\"3335\">प्रत्यक्ष लोकतंत्र</td>\n</tr>\n<tr data-start=\"3336\" data-end=\"3419\">\n<td data-start=\"3336\" data-end=\"3348\" data-col-size=\"sm\">Structure</td>\n<td data-col-size=\"md\" data-start=\"3348\" data-end=\"3404\">3-tier; Intermediate optional if population &lt; 20 lakh</td>\n<td data-col-size=\"sm\" data-start=\"3404\" data-end=\"3419\">त्रि-स्तरीय</td>\n</tr>\n<tr data-start=\"3420\" data-end=\"3477\">\n<td data-start=\"3420\" data-end=\"3439\" data-col-size=\"sm\">Elections (243C)</td>\n<td data-start=\"3439\" data-end=\"3458\" data-col-size=\"md\">Direct elections</td>\n<td data-start=\"3458\" data-end=\"3477\" data-col-size=\"sm\">प्रत्यक्ष चुनाव</td>\n</tr>\n<tr data-start=\"3478\" data-end=\"3546\">\n<td data-start=\"3478\" data-end=\"3499\" data-col-size=\"sm\">Reservation (243D)</td>\n<td data-start=\"3499\" data-end=\"3536\" data-col-size=\"md\">SC/ST by population; <strong data-start=\"3522\" data-end=\"3535\">1/3 women</strong></td>\n<td data-col-size=\"sm\" data-start=\"3536\" data-end=\"3546\">आरक्षण</td>\n</tr>\n<tr data-start=\"3547\" data-end=\"3610\">\n<td data-start=\"3547\" data-end=\"3563\" data-col-size=\"sm\">Tenure (243E)</td>\n<td data-col-size=\"md\" data-start=\"3563\" data-end=\"3600\">5 years; elections within 6 months</td>\n<td data-col-size=\"sm\" data-start=\"3600\" data-end=\"3610\">5 वर्ष</td>\n</tr>\n<tr data-start=\"3611\" data-end=\"3672\">\n<td data-start=\"3611\" data-end=\"3637\" data-col-size=\"sm\">Disqualification (243F)</td>\n<td data-start=\"3637\" data-end=\"3654\" data-col-size=\"md\">Min age <strong data-start=\"3647\" data-end=\"3653\">21</strong></td>\n<td data-col-size=\"sm\" data-start=\"3654\" data-end=\"3672\">न्यूनतम आयु 21</td>\n</tr>\n<tr data-start=\"3673\" data-end=\"3751\">\n<td data-start=\"3673\" data-end=\"3686\" data-col-size=\"sm\">SEC (243K)</td>\n<td data-start=\"3686\" data-end=\"3731\" data-col-size=\"md\">Panchayat elections; removal like HC judge</td>\n<td data-col-size=\"sm\" data-start=\"3731\" data-end=\"3751\">राज्य चुनाव आयोग</td>\n</tr>\n<tr data-start=\"3752\" data-end=\"3817\">\n<td data-start=\"3752\" data-end=\"3765\" data-col-size=\"sm\">SFC (243I)</td>\n<td data-start=\"3765\" data-end=\"3797\" data-col-size=\"md\">Every 5 years; finance review</td>\n<td data-col-size=\"sm\" data-start=\"3797\" data-end=\"3817\">राज्य वित्त आयोग</td>\n</tr>\n<tr data-start=\"3818\" data-end=\"3888\">\n<td data-start=\"3818\" data-end=\"3834\" data-col-size=\"sm\">Powers (243G)</td>\n<td data-col-size=\"md\" data-start=\"3834\" data-end=\"3871\">Planning for development &amp; justice</td>\n<td data-col-size=\"sm\" data-start=\"3871\" data-end=\"3888\">योजना निर्माण</td>\n</tr>\n<tr data-start=\"3889\" data-end=\"3946\">\n<td data-start=\"3889\" data-end=\"3907\" data-col-size=\"sm\">Finances (243H)</td>\n<td data-start=\"3907\" data-end=\"3931\" data-col-size=\"md\">Taxes, duties, grants</td>\n<td data-col-size=\"sm\" data-start=\"3931\" data-end=\"3946\">कर व अनुदान</td>\n</tr>\n<tr data-start=\"3947\" data-end=\"4036\">\n<td data-start=\"3947\" data-end=\"3970\" data-col-size=\"sm\">Bar to Courts (243O)</td>\n<td data-start=\"3970\" data-end=\"4007\" data-col-size=\"md\">No court interference in elections</td>\n<td data-col-size=\"sm\" data-start=\"4007\" data-end=\"4036\">न्यायालय हस्तक्षेप वर्जित</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"4038\" data-end=\"4041\" />\n<h2 data-start=\"4043\" data-end=\"4068\"><strong data-start=\"4046\" data-end=\"4068\">EXAM ONE-LINERS 🔥</strong></h2>\n<p></p>\n<ul data-start=\"4069\" data-end=\"4308\">\n<li data-start=\"4069\" data-end=\"4114\">\n<p data-start=\"4071\" data-end=\"4114\"><strong data-start=\"4071\" data-end=\"4112\">73rd CAA, 1992 &rarr; Panchayats (Part IX)</strong></p>\n</li>\n<li data-start=\"4115\" data-end=\"4152\">\n<p data-start=\"4117\" data-end=\"4152\"><strong data-start=\"4117\" data-end=\"4150\">Gram Sabha = Direct Democracy</strong></p>\n</li>\n<li data-start=\"4153\" data-end=\"4210\">\n<p data-start=\"4155\" data-end=\"4210\"><strong data-start=\"4155\" data-end=\"4208\">Intermediate level optional (&lt;20 lakh population)</strong></p>\n</li>\n<li data-start=\"4211\" data-end=\"4261\">\n<p data-start=\"4213\" data-end=\"4261\"><strong data-start=\"4213\" data-end=\"4259\">SEC = Panchayat Elections | SFC = Finances</strong></p>\n</li>\n<li data-start=\"4262\" data-end=\"4308\">\n<p data-start=\"4264\" data-end=\"4308\"><strong data-start=\"4264\" data-end=\"4308\">Courts barred in election matters (243O)</strong></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">With reference to the 73rd Amendment Act, evaluate the following statements:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"77\">(73वें संशोधन अधिनियम के संदर्भ में, निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Gram Sabha</strong> is a body consisting of all persons registered in the electoral rolls relating to a village comprised within the area of Panchayat at the village level. ( <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"166\">ग्राम सभा</strong> एक ऐसा निकाय है जिसमें ग्राम स्तर पर पंचायत के क्षेत्र में आने वाले गाँव से संबंधित निर्वाचन नामावली में पंजीकृत सभी व्यक्ति शामिल होते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"4\">Intermediate level</strong> (Panchayat Samiti) can be skipped by a State having a population not exceeding <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"102\">20 lakhs</strong>. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"114\">20 लाख</strong> से अधिक जनसंख्या न होने वाले राज्य द्वारा मध्यवर्ती स्तर (पंचायत समिति) को छोड़ा जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">The minimum age to contest elections for a Panchayat is <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"56\">21 years</strong>, whereas the minimum age to be a member of the Gram Sabha is <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"126\">18 years</strong>. (पंचायत चुनाव लड़ने की न्यूनतम आयु <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"171\">21 वर्ष</strong> है, जबकि ग्राम सभा का सदस्य होने के लिए न्यूनतम आयु <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"231\">18 वर्ष</strong> है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\">If a Panchayat is dissolved before its 5-year term, the newly elected Panchayat continues for a fresh full term of 5 years. (यदि एक पंचायत अपने 5 साल के कार्यकाल से पहले भंग हो जाती है, तो नई निर्वाचित पंचायत 5 साल के नए पूर्ण कार्यकाल के लिए जारी रहती है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 3 only B) 2 and 4 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,1,0\" data-index-in-node=\"0\">Exempted</strong> Areas</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,5,2,0\" data-index-in-node=\"0\">छूट</strong> प्राप्त क्षेत्र (जैसे नागालैंड, मेघालय)</span></td>\n</tr>\n</tbody>\n</table>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Q. Evaluate the following statements regarding the PESA Act and the evolution of Municipalities:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"97\">(पेसा (PESA) अधिनियम और नगर पालिकाओं के विकास के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\"><strong data-path-to-node=\"5,0,0\" data-index-in-node=\"0\">PESA Act (1996)</strong> extends Part IX provisions to Fifth Schedule areas, mandating that at least <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"92\">50%</strong> of seats and all Chairpersons posts be reserved for Scheduled Tribes. ( <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"168\">पेसा अधिनियम (1996)</strong> भाग IX के प्रावधानों को पांचवीं अनुसूची के क्षेत्रों तक विस्तारित करता है, जिसमें यह अनिवार्य है कि कम से कम <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"297\">50%</strong> सीटें और सभी अध्यक्ष पद अनुसूचित जनजातियों के लिए आरक्षित हों।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Under PESA, the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"16\">Gram Sabha</strong> has the mandatory power to prevent alienation of tribal land and possesses ownership of minor forest produce. (पेसा के तहत, <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"151\">ग्राम सभा</strong> के पास आदिवासी भूमि के हस्तांतरण को रोकने की अनिवार्य शक्ति है और लघु वनोपज का स्वामित्व उसी के पास होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">The first Municipal Corporation in India was established in <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"60\">Bombay</strong> in 1688, following Lord Ripon's resolution. (भारत में पहला नगर निगम 1688 में <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"144\">बॉम्बे</strong> में स्थापित किया गया था, जो लॉर्ड रिपन के प्रस्ताव के बाद आया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\"><strong data-path-to-node=\"5,3,0\" data-index-in-node=\"0\">Lord Ripon</strong> is known as the \"Father of Local Self-Government\" in India, and his 1882 resolution is dubbed the 'Magna Carta' of local governance. ( <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"146\">लॉर्ड रिपन</strong> को भारत में \"स्थानीय स्वशासन का जनक\" कहा जाता है, और उनके 1882 के प्रस्ताव को स्थानीय शासन का 'मैग्ना कार्टा' कहा जाता है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, and 4 only B) 2 and 3 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "question": "<p data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Q. With reference to the 74th Amendment Act (1992), consider the following:</strong> <strong data-path-to-node=\"12\" data-index-in-node=\"76\">(74वें संशोधन अधिनियम (1992) के संदर्भ में, निम्नलिखित पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Article 243Q</strong> provides for three types of municipalities: Nagar Panchayats (transitional), Municipal Councils (smaller urban), and Municipal Corporations (larger urban). ( <strong data-path-to-node=\"13,0,0\" data-index-in-node=\"171\">अनुच्छेद 243Q</strong> तीन प्रकार की नगर पालिकाओं का प्रावधान करता है: नगर पंचायत (संक्रमणकालीन), नगर परिषद (छोटे शहरी), और नगर निगम (बड़े शहरी)।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\">The <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"4\">District Planning Committee (Art 243ZD)</strong> and <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"48\">Metropolitan Planning Committee (Art 243ZE)</strong> are constitutional bodies meant to consolidate plans from rural and urban local bodies. ( <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"182\">जिला योजना समिति (अनुच्छेद 243ZD)</strong> और <strong data-path-to-node=\"13,1,0\" data-index-in-node=\"219\">महानगरीय योजना समिति (अनुच्छेद 243ZE)</strong> संवैधानिक निकाय हैं जिनका उद्देश्य ग्रामीण और शहरी स्थानीय निकायों की योजनाओं को समेकित करना है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\">In a <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"5\">Municipal Corporation</strong>, the Mayor is the chief executive authority responsible for daily operations, while the Municipal Commissioner is a ceremonial head. (एक <strong data-path-to-node=\"13,2,0\" data-index-in-node=\"164\">नगर निगम</strong> में, मेयर दैनिक कार्यों के लिए जिम्मेदार मुख्य कार्यकारी अधिकारी होता है, जबकि नगर आयुक्त एक औपचारिक प्रमुख होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Cantonment Boards</strong> are established for municipal administration for civilian populations in inter-state boundary areas and are controlled by the Ministry of Home Affairs. ( <strong data-path-to-node=\"13,3,0\" data-index-in-node=\"172\">छावनी बोर्ड</strong> अंतर-राज्यीय सीमा क्षेत्रों में नागरिक आबादी के लिए नगर पालिका प्रशासन हेतु स्थापित किए जाते हैं और गृह मंत्रालय द्वारा नियंत्रित होते हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"14\"><strong data-path-to-node=\"14\" data-index-in-node=\"0\">Which of the statements given above are INCORRECT? / उपर्युक्त में से कौन से कथन गलत हैं?</strong> A) 1 and 2 only B) 3 and 4 only C) 2 and 4 only D) 1, 3, and 4 only</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",

    "correct_option_id": 1,
    "solution": "<p data-path-to-node=\"16,0\">Statement 3: In a Corporation, the <strong data-path-to-node=\"16,0\" data-index-in-node=\"42\">Mayor is ceremonial</strong> and the <strong data-path-to-node=\"16,0\" data-index-in-node=\"70\">Commissioner (IAS) is the Executive</strong>. Statement 4: Cantonment Boards are under the <strong data-path-to-node=\"16,0\" data-index-in-node=\"152\">Ministry of Defence</strong>, governed by the 2006 Act. (कथन 3: मेयर औपचारिक प्रमुख है और आयुक्त कार्यकारी। कथन 4: छावनी बोर्ड <strong data-path-to-node=\"16,0\" data-index-in-node=\"270\">रक्षा मंत्रालय</strong> के अधीन हैं।)</p>\n<p data-path-to-node=\"16,0\"></p>\n<h2 data-start=\"206\" data-end=\"269\"><strong data-start=\"209\" data-end=\"269\">PESA Act, 1996 (Panchayats Extension to Scheduled Areas)</strong></h2>\n<ul data-start=\"271\" data-end=\"999\">\n<li data-start=\"271\" data-end=\"398\">\n<p data-start=\"273\" data-end=\"398\"><strong data-start=\"273\" data-end=\"290\">Applicability</strong>: Part IX extended to <strong data-start=\"312\" data-end=\"336\">Fifth Schedule areas</strong> with modifications<br data-start=\"355\" data-end=\"358\" /><strong data-start=\"360\" data-end=\"376\">लागू क्षेत्र</strong>: पंचम अनुसूची क्षेत्र</p>\n</li>\n<li data-start=\"400\" data-end=\"560\">\n<p data-start=\"402\" data-end=\"560\"><strong data-start=\"402\" data-end=\"416\">Gram Sabha</strong>: Mandatory; prevents land alienation; owns <strong data-start=\"460\" data-end=\"490\">Minor Forest Produce (MFP)</strong><br data-start=\"490\" data-end=\"493\" /><strong data-start=\"495\" data-end=\"508\">ग्राम सभा</strong>: भूमि हस्तांतरण रोकने की शक्ति; लघु वनोपज पर अधिकार</p>\n</li>\n<li data-start=\"562\" data-end=\"679\">\n<p data-start=\"564\" data-end=\"679\"><strong data-start=\"564\" data-end=\"581\">Customary Law</strong>: State laws must align with tribal customs<br data-start=\"624\" data-end=\"627\" /><strong data-start=\"629\" data-end=\"647\">परंपरागत कानून</strong>: राज्य कानूनों का पालन अनिवार्य</p>\n</li>\n<li data-start=\"681\" data-end=\"766\">\n<p data-start=\"683\" data-end=\"766\"><strong data-start=\"683\" data-end=\"698\">Reservation</strong>: <strong data-start=\"700\" data-end=\"736\">50% seats + Chairpersons for STs</strong><br data-start=\"736\" data-end=\"739\" /><strong data-start=\"741\" data-end=\"751\">आरक्षण</strong>: ST के लिए 50%</p>\n</li>\n<li data-start=\"768\" data-end=\"892\">\n<p data-start=\"770\" data-end=\"892\"><strong data-start=\"770\" data-end=\"786\">Consultation</strong>: Mandatory before land acquisition/minor mineral licenses<br data-start=\"844\" data-end=\"847\" /><strong data-start=\"849\" data-end=\"860\">परामर्श</strong>: भूमि अधिग्रहण से पहले अनिवार्य</p>\n</li>\n<li data-start=\"894\" data-end=\"999\">\n<p data-start=\"896\" data-end=\"999\"><strong data-start=\"896\" data-end=\"914\">Nodal Ministry</strong>: <strong data-start=\"916\" data-end=\"953\">Ministry of Tribal Affairs (MoTA)</strong><br data-start=\"953\" data-end=\"956\" /><strong data-start=\"958\" data-end=\"975\">नोडल मंत्रालय</strong>: जनजातीय कार्य मंत्रालय</p>\n</li>\n</ul>\n<hr data-start=\"1001\" data-end=\"1004\" />\n<h2 data-start=\"1006\" data-end=\"1052\"><strong data-start=\"1009\" data-end=\"1052\">URBAN LOCAL GOVERNANCE (Municipalities)</strong></h2>\n<h3 data-start=\"1054\" data-end=\"1085\"><strong data-start=\"1058\" data-end=\"1085\">Constitutional Position</strong></h3>\n<ul data-start=\"1086\" data-end=\"1175\">\n<li data-start=\"1086\" data-end=\"1126\">\n<p data-start=\"1088\" data-end=\"1126\"><strong data-start=\"1088\" data-end=\"1105\">State Subject</strong> &ndash; Seventh Schedule</p>\n</li>\n<li data-start=\"1127\" data-end=\"1175\">\n<p data-start=\"1129\" data-end=\"1175\"><strong data-start=\"1129\" data-end=\"1147\">74th CAA, 1992</strong> &rarr; Effective <strong data-start=\"1160\" data-end=\"1175\">1 June 1993</strong></p>\n</li>\n</ul>\n<hr data-start=\"1177\" data-end=\"1180\" />\n<h2 data-start=\"1182\" data-end=\"1228\"><strong data-start=\"1185\" data-end=\"1228\">74th Constitutional Amendment Act, 1992</strong></h2>\n<h3 data-start=\"1230\" data-end=\"1247\"><strong data-start=\"1234\" data-end=\"1247\">Framework</strong></h3>\n<ul data-start=\"1248\" data-end=\"1328\">\n<li data-start=\"1248\" data-end=\"1290\">\n<p data-start=\"1250\" data-end=\"1290\"><strong data-start=\"1250\" data-end=\"1263\">Part IX-A</strong>: Articles <strong data-start=\"1274\" data-end=\"1288\">243P&ndash;243ZG</strong></p>\n</li>\n<li data-start=\"1291\" data-end=\"1328\">\n<p data-start=\"1293\" data-end=\"1328\"><strong data-start=\"1293\" data-end=\"1310\">12th Schedule</strong>: <strong data-start=\"1312\" data-end=\"1328\">18 functions</strong></p>\n</li>\n</ul>\n<h3 data-start=\"1330\" data-end=\"1373\"><strong data-start=\"1334\" data-end=\"1373\">Types of Municipalities (Art. 243Q)</strong></h3>\n<ul data-start=\"1374\" data-end=\"1512\">\n<li data-start=\"1374\" data-end=\"1417\">\n<p data-start=\"1376\" data-end=\"1417\"><strong data-start=\"1376\" data-end=\"1395\">Nagar Panchayat</strong> &ndash; Transitional area</p>\n</li>\n<li data-start=\"1418\" data-end=\"1464\">\n<p data-start=\"1420\" data-end=\"1464\"><strong data-start=\"1420\" data-end=\"1441\">Municipal Council</strong> &ndash; Smaller urban area</p>\n</li>\n<li data-start=\"1465\" data-end=\"1512\">\n<p data-start=\"1467\" data-end=\"1512\"><strong data-start=\"1467\" data-end=\"1492\">Municipal Corporation</strong> &ndash; Larger urban area</p>\n</li>\n</ul>\n<h3 data-start=\"1514\" data-end=\"1536\"><strong data-start=\"1518\" data-end=\"1536\">Key Provisions</strong></h3>\n<ul data-start=\"1537\" data-end=\"2026\">\n<li data-start=\"1537\" data-end=\"1573\">\n<p data-start=\"1539\" data-end=\"1573\"><strong data-start=\"1539\" data-end=\"1559\">Direct elections</strong> (Art. 243R)</p>\n</li>\n<li data-start=\"1574\" data-end=\"1646\">\n<p data-start=\"1576\" data-end=\"1646\"><strong data-start=\"1576\" data-end=\"1595\">Ward Committees</strong> mandatory if population &ge; <strong data-start=\"1622\" data-end=\"1632\">3 lakh</strong> (Art. 243S)</p>\n</li>\n<li data-start=\"1647\" data-end=\"1709\">\n<p data-start=\"1649\" data-end=\"1709\"><strong data-start=\"1649\" data-end=\"1659\">Tenure</strong>: 5 years; elections within 6 months (Art. 243U)</p>\n</li>\n<li data-start=\"1710\" data-end=\"1735\">\n<p data-start=\"1712\" data-end=\"1735\"><strong data-start=\"1712\" data-end=\"1723\">Min age</strong>: 21 years</p>\n</li>\n<li data-start=\"1736\" data-end=\"1850\">\n<p data-start=\"1738\" data-end=\"1768\"><strong data-start=\"1738\" data-end=\"1765\">Reservation (Art. 243T)</strong>:</p>\n<ul data-start=\"1771\" data-end=\"1850\">\n<li data-start=\"1771\" data-end=\"1799\">\n<p data-start=\"1773\" data-end=\"1799\">SC/ST &ndash; population basis</p>\n</li>\n<li data-start=\"1802\" data-end=\"1821\">\n<p data-start=\"1804\" data-end=\"1821\">Women &ndash; <strong data-start=\"1812\" data-end=\"1819\">1/3</strong></p>\n</li>\n<li data-start=\"1824\" data-end=\"1850\">\n<p data-start=\"1826\" data-end=\"1850\">OBC &ndash; as per State law</p>\n</li>\n</ul>\n</li>\n<li data-start=\"1851\" data-end=\"1901\">\n<p data-start=\"1853\" data-end=\"1901\"><strong data-start=\"1853\" data-end=\"1875\">Powers (Art. 243W)</strong>: Planning + development</p>\n</li>\n<li data-start=\"1902\" data-end=\"1940\">\n<p data-start=\"1904\" data-end=\"1940\"><strong data-start=\"1904\" data-end=\"1916\">Finances</strong>: Taxes, grants, funds</p>\n</li>\n<li data-start=\"1941\" data-end=\"1998\">\n<p data-start=\"1943\" data-end=\"1998\"><strong data-start=\"1943\" data-end=\"1956\">Elections</strong>: State Election Commission (Art. 243ZA)</p>\n</li>\n<li data-start=\"1999\" data-end=\"2026\">\n<p data-start=\"2001\" data-end=\"2026\"><strong data-start=\"2001\" data-end=\"2014\">Court bar</strong>: Art. 243ZG</p>\n</li>\n</ul>\n<hr data-start=\"2028\" data-end=\"2031\" />\n<h2 data-start=\"2033\" data-end=\"2083\"><strong data-start=\"2036\" data-end=\"2081\">12th Schedule &ndash; High-Yield Functions (18)</strong></h2>\n<p data-start=\"2084\" data-end=\"2320\">Urban planning, land use, roads, water supply, public health &amp; sanitation, solid waste, fire services, urban forestry, slums, poverty alleviation, parks, culture, burials, cattle ponds, births &amp; deaths, street lighting, slaughterhouses.</p>\n<hr data-start=\"2322\" data-end=\"2325\" />\n<h2 data-start=\"2327\" data-end=\"2361\"><strong data-start=\"2330\" data-end=\"2361\">Types of Urban Local Bodies</strong></h2>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2363\" data-end=\"2729\">\n<thead data-start=\"2363\" data-end=\"2388\">\n<tr data-start=\"2363\" data-end=\"2388\">\n<th data-start=\"2363\" data-end=\"2370\" data-col-size=\"sm\">Body</th>\n<th data-start=\"2370\" data-end=\"2388\" data-col-size=\"sm\">Executive Head</th>\n</tr>\n</thead>\n<tbody data-start=\"2412\" data-end=\"2729\">\n<tr data-start=\"2412\" data-end=\"2468\">\n<td data-start=\"2412\" data-end=\"2436\" data-col-size=\"sm\">Municipal Corporation</td>\n<td data-start=\"2436\" data-end=\"2468\" data-col-size=\"sm\">Municipal Commissioner (IAS)</td>\n</tr>\n<tr data-start=\"2469\" data-end=\"2511\">\n<td data-start=\"2469\" data-end=\"2484\" data-col-size=\"sm\">Municipality</td>\n<td data-col-size=\"sm\" data-start=\"2484\" data-end=\"2511\">Chief Executive Officer</td>\n</tr>\n<tr data-start=\"2512\" data-end=\"2573\">\n<td data-start=\"2512\" data-end=\"2531\" data-col-size=\"sm\">Cantonment Board</td>\n<td data-start=\"2531\" data-end=\"2573\" data-col-size=\"sm\">Executive Officer (President of India)</td>\n</tr>\n<tr data-start=\"2574\" data-end=\"2619\">\n<td data-start=\"2574\" data-end=\"2600\" data-col-size=\"sm\">Notified Area Committee</td>\n<td data-start=\"2600\" data-end=\"2619\" data-col-size=\"sm\">State-appointed</td>\n</tr>\n<tr data-start=\"2620\" data-end=\"2653\">\n<td data-start=\"2620\" data-end=\"2631\" data-col-size=\"sm\">Township</td>\n<td data-start=\"2631\" data-end=\"2653\" data-col-size=\"sm\">Enterprise-managed</td>\n</tr>\n<tr data-start=\"2654\" data-end=\"2682\">\n<td data-start=\"2654\" data-end=\"2667\" data-col-size=\"sm\">Port Trust</td>\n<td data-col-size=\"sm\" data-start=\"2667\" data-end=\"2682\">Chairperson</td>\n</tr>\n<tr data-start=\"2683\" data-end=\"2729\">\n<td data-start=\"2683\" data-end=\"2708\" data-col-size=\"sm\">Special Purpose Agency</td>\n<td data-col-size=\"sm\" data-start=\"2708\" data-end=\"2729\">Function-specific</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"2731\" data-end=\"2734\" />\n<h2 data-start=\"2736\" data-end=\"2762\"><strong data-start=\"2739\" data-end=\"2762\">Planning Committees</strong></h2>\n<ul data-start=\"2764\" data-end=\"2889\">\n<li data-start=\"2764\" data-end=\"2831\">\n<p data-start=\"2766\" data-end=\"2831\"><strong data-start=\"2766\" data-end=\"2786\">DPC (Art. 243ZD)</strong>: District plans (Panchayat + Municipality)</p>\n</li>\n<li data-start=\"2832\" data-end=\"2889\">\n<p data-start=\"2834\" data-end=\"2889\"><strong data-start=\"2834\" data-end=\"2854\">MPC (Art. 243ZE)</strong>: Metro areas (&gt;10 lakh population)</p>\n</li>\n</ul>\n<hr data-start=\"2891\" data-end=\"2894\" />\n<h2 data-start=\"2896\" data-end=\"2924\"><strong data-start=\"2899\" data-end=\"2924\">COOPERATIVE SOCIETIES</strong></h2>\n<h3 data-start=\"2926\" data-end=\"2940\"><strong data-start=\"2930\" data-end=\"2940\">Basics</strong></h3>\n<ul data-start=\"2941\" data-end=\"3029\">\n<li data-start=\"2941\" data-end=\"2984\">\n<p data-start=\"2943\" data-end=\"2984\"><strong data-start=\"2943\" data-end=\"2960\">State Subject</strong>: Entry 32, State List</p>\n</li>\n<li data-start=\"2985\" data-end=\"3029\">\n<p data-start=\"2987\" data-end=\"3029\"><strong data-start=\"2987\" data-end=\"3005\">97th CAA, 2011</strong> &rarr; Constitutional status</p>\n</li>\n</ul>\n<h3 data-start=\"3031\" data-end=\"3065\"><strong data-start=\"3035\" data-end=\"3065\">Key Constitutional Changes</strong></h3>\n<ul data-start=\"3066\" data-end=\"3179\">\n<li data-start=\"3066\" data-end=\"3114\">\n<p data-start=\"3068\" data-end=\"3114\"><strong data-start=\"3068\" data-end=\"3074\">FR</strong>: Right to form cooperatives (Art. 19)</p>\n</li>\n<li data-start=\"3115\" data-end=\"3141\">\n<p data-start=\"3117\" data-end=\"3141\"><strong data-start=\"3117\" data-end=\"3125\">DPSP</strong>: Art. <strong data-start=\"3132\" data-end=\"3139\">43B</strong></p>\n</li>\n<li data-start=\"3142\" data-end=\"3179\">\n<p data-start=\"3144\" data-end=\"3179\"><strong data-start=\"3144\" data-end=\"3157\">Part IX-B</strong>: Arts <strong data-start=\"3164\" data-end=\"3179\">243ZH&ndash;243ZT</strong></p>\n</li>\n</ul>\n<h3 data-start=\"3181\" data-end=\"3216\"><strong data-start=\"3185\" data-end=\"3216\">Core Provisions (Part IX-B)</strong></h3>\n<ul data-start=\"3217\" data-end=\"3479\">\n<li data-start=\"3217\" data-end=\"3263\">\n<p data-start=\"3219\" data-end=\"3263\"><strong data-start=\"3219\" data-end=\"3233\">Board term</strong>: 5 years (max 21 directors)</p>\n</li>\n<li data-start=\"3264\" data-end=\"3302\">\n<p data-start=\"3266\" data-end=\"3302\"><strong data-start=\"3266\" data-end=\"3281\">Reservation</strong>: 1 SC/ST + 2 Women</p>\n</li>\n<li data-start=\"3303\" data-end=\"3362\">\n<p data-start=\"3305\" data-end=\"3362\"><strong data-start=\"3305\" data-end=\"3321\">Supersession</strong>: Max 6 months (1 year for co-op banks)</p>\n</li>\n<li data-start=\"3363\" data-end=\"3401\">\n<p data-start=\"3365\" data-end=\"3401\"><strong data-start=\"3365\" data-end=\"3374\">Audit</strong>: Annual, within 6 months</p>\n</li>\n<li data-start=\"3402\" data-end=\"3433\">\n<p data-start=\"3404\" data-end=\"3433\"><strong data-start=\"3404\" data-end=\"3411\">AGM</strong>: Mandatory annually</p>\n</li>\n<li data-start=\"3434\" data-end=\"3479\">\n<p data-start=\"3436\" data-end=\"3479\"><strong data-start=\"3436\" data-end=\"3453\">Applicability</strong>: Multi-State co-ops &amp; UTs</p>\n</li>\n</ul>\n<h3 data-start=\"3481\" data-end=\"3506\"><strong data-start=\"3485\" data-end=\"3506\">Judicial Position</strong></h3>\n<ul data-start=\"3507\" data-end=\"3607\">\n<li data-start=\"3507\" data-end=\"3607\">\n<p data-start=\"3509\" data-end=\"3607\"><strong data-start=\"3509\" data-end=\"3548\">Rajendra Shah Case (2013) + SC 2021</strong>:<br data-start=\"3549\" data-end=\"3552\" />Part IX-B valid <strong data-start=\"3570\" data-end=\"3607\">only for Multi-State Cooperatives</strong></p>\n</li>\n</ul>\n<hr data-start=\"3609\" data-end=\"3612\" />\n<h2 data-start=\"3614\" data-end=\"3651\"><strong data-start=\"3617\" data-end=\"3651\">Ministry of Cooperation (2021)</strong></h2>\n<ul data-start=\"3653\" data-end=\"3762\">\n<li data-start=\"3653\" data-end=\"3688\">\n<p data-start=\"3655\" data-end=\"3688\"><strong data-start=\"3655\" data-end=\"3662\">Aim</strong>: <em data-start=\"3664\" data-end=\"3686\">Sahakar se Samriddhi</em></p>\n</li>\n<li data-start=\"3689\" data-end=\"3762\">\n<p data-start=\"3691\" data-end=\"3762\"><strong data-start=\"3691\" data-end=\"3705\">Objectives</strong>: Strengthen co-ops, transparency, Ease of Doing Business</p>\n</li>\n</ul>\n<hr data-start=\"3764\" data-end=\"3767\" />\n<h2 data-start=\"3769\" data-end=\"3794\"><strong data-start=\"3772\" data-end=\"3794\">EXAM ONE-LINERS&nbsp;</strong></h2>\n<p data-path-to-node=\"16,0\"></p>\n<ul data-start=\"3795\" data-end=\"4003\">\n<li data-start=\"3795\" data-end=\"3849\">\n<p data-start=\"3797\" data-end=\"3849\"><strong data-start=\"3797\" data-end=\"3847\">PESA = Tribal self-rule + Gram Sabha supremacy</strong></p>\n</li>\n<li data-start=\"3850\" data-end=\"3896\">\n<p data-start=\"3852\" data-end=\"3896\"><strong data-start=\"3852\" data-end=\"3894\">74th CAA = Urban constitutional status</strong></p>\n</li>\n<li data-start=\"3897\" data-end=\"3933\">\n<p data-start=\"3899\" data-end=\"3933\"><strong data-start=\"3899\" data-end=\"3931\">SEC conducts local elections</strong></p>\n</li>\n<li data-start=\"3934\" data-end=\"4003\">\n<p data-start=\"3936\" data-end=\"4003\"><strong data-start=\"3936\" data-end=\"4003\">97th CAA = Co-ops constitutional, but Part IX-B limited to MSCS</strong></p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"20\"><strong data-path-to-node=\"20\" data-index-in-node=\"0\">&nbsp;Regarding Cooperative Societies and the 97th Constitutional Amendment (2011), identify the correct sequence of logic:</strong> <strong data-path-to-node=\"20\" data-index-in-node=\"121\">(सहकारी समितियों और 97वें संविधान संशोधन (2011) के संबंध में, तर्क के सही क्रम की पहचान करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"21\">\n<li>\n<p data-path-to-node=\"21,0,0\">The 97th Amendment made the right to form cooperatives a <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"57\">Fundamental Right</strong> under <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"81\">Article 19</strong> and added <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"102\">Article 43B</strong> to the DPSPs. (97वें संशोधन ने सहकारी समितियाँ बनाने के अधिकार को <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"180\">अनुच्छेद 19</strong> के तहत <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"199\">मौलिक अधिकार</strong> बना दिया और DPSPs में <strong data-path-to-node=\"21,0,0\" data-index-in-node=\"234\">अनुच्छेद 43B</strong> जोड़ा।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,1,0\">Part <strong data-path-to-node=\"21,1,0\" data-index-in-node=\"5\">IX-B</strong> (Articles 243ZH to 243ZT) was added to regulate the incorporation, terms, and audits of these societies. (इन समितियों के निगमन, शर्तों और ऑडिट को विनियमित करने के लिए भाग <strong data-path-to-node=\"21,1,0\" data-index-in-node=\"181\">IX-B</strong> (अनुच्छेद 243ZH से 243ZT) जोड़ा गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,2,0\">The Supreme Court in 2021 (affirming the Rajendra Shah case) struck down Part IX-B for <strong data-path-to-node=\"21,2,0\" data-index-in-node=\"87\">all</strong> cooperatives, including multi-state ones, due to lack of state ratification. (सुप्रीम कोर्ट ने 2021 में राज्य अनुसमर्थन की कमी के कारण <strong data-path-to-node=\"21,2,0\" data-index-in-node=\"226\">सभी</strong> सहकारी समितियों (बहु-राज्यीय सहित) के लिए भाग IX-B को रद्द कर दिया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"21,3,0\">A new <strong data-path-to-node=\"21,3,0\" data-index-in-node=\"6\">Ministry of Cooperation</strong> was established in 2021 with the aim of \"Sahakar se Samriddhi\". (2021 में \"सहकार से समृद्धि\" के उद्देश्य से एक नया <strong data-path-to-node=\"21,3,0\" data-index-in-node=\"145\">सहकारिता मंत्रालय</strong> स्थापित किया गया था।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"22\"><strong data-path-to-node=\"22\" data-index-in-node=\"0\">Choose the correct code: / सही कूट का चयन करें:</strong> A) 1, 2, and 4 only B) 2 and 3 only C) 1 and 3 only D) All of the above (1, 2, 3, and 4)</p>",
    "comp": "",
    "options": [
      "<p>A</p>",
      "<p>B</p>",
      "<p>C</p>",
      "<p>D</p>"
