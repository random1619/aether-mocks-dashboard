    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Veto, Financial, and Judicial powers of the President of India:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"112\">(भारत के राष्ट्रपति की वीटो, वित्तीय और न्यायिक शक्तियों के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">Under <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"6\">Article 111</strong>, the President has three options for a bill: give assent, withhold assent (<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"93\">Absolute Veto</strong>), or return it for reconsideration (<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"143\">Suspensive Veto</strong>), but he cannot return a <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"184\">Money Bill</strong>. (अनुच्छेद 111 के तहत, राष्ट्रपति के पास विधेयक के लिए तीन विकल्प होते हैं: सहमति देना, सहमति रोकना (<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"296\">पूर्ण वीटो</strong>), या पुनर्विचार के लिए वापस भेजना (<strong data-path-to-node=\"5,0,0\" data-index-in-node=\"342\">निलंबनकारी वीटो</strong>), लेकिन वह <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"369\">धन विधेयक</strong> को वापस नहीं कर सकता।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">The <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"4\">Pocket Veto</strong> allows the President to keep a bill pending indefinitely because the Constitution prescribes no time limit for his decision; this was famously used by Giani Zail Singh in 1986 for the Indian Post Office (Amendment) Bill. ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"239\">पॉकेट वीटो</strong> राष्ट्रपति को किसी विधेयक को अनिश्चित काल तक लंबित रखने की अनुमति देता है क्योंकि संविधान उसके निर्णय के लिए कोई समय सीमा निर्धारित नहीं करता है; इसका प्रसिद्ध उपयोग 1986 में ज्ञानी जैल सिंह द्वारा भारतीय डाकघर (संशोधन) विधेयक के लिए किया गया था।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\">Since the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"10\">24th Amendment Act (1971)</strong>, the President is constitutionally obligated to give assent to <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"99\">Constitutional Amendment Bills</strong>, meaning he has no veto power over them. ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"173\">24वें संशोधन अधिनियम (1971)</strong> के बाद से, राष्ट्रपति <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"223\">संविधान संशोधन विधेयकों</strong> पर सहमति देने के लिए संवैधानिक रूप से बाध्य है, जिसका अर्थ है कि उसके पास इन पर कोई वीटो शक्ति नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">Unlike the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"11\">Qualified Veto</strong> used by the US President (which requires a higher majority to override), the Indian President&rsquo;s <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"122\">Suspensive Veto</strong> can be overridden by the Parliament with a simple ordinary majority. (अमेरिकी राष्ट्रपति द्वारा उपयोग किए जाने वाले <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"254\">क्वालिफाइड वीटो</strong> के विपरीत (जिसे ओवरराइड करने के लिए उच्च बहुमत की आवश्यकता होती है), भारतीय राष्ट्रपति के <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"360\">निलंबनकारी वीटो</strong> को संसद द्वारा साधारण बहुमत से ओवरराइड किया जा सकता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">Under <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"6\">Article 143</strong>, the President can seek advice from the Supreme Court on any question of law, but he is not legally bound to follow that advice. ( <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"149\">अनुच्छेद 143</strong> के तहत, राष्ट्रपति कानून के किसी भी प्रश्न पर सर्वोच्च न्यायालय से सलाह मांग सकता है, लेकिन वह उस सलाह को मानने के लिए कानूनी रूप से बाध्य नहीं है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,5,0\">All <strong data-path-to-node=\"5,5,0\" data-index-in-node=\"4\">Money Bills</strong> (Article 112) require the President's prior recommendation before introduction, and he is responsible for appointing the <strong data-path-to-node=\"5,5,0\" data-index-in-node=\"137\">Finance Commission</strong> every five years. (सभी <strong data-path-to-node=\"5,5,0\" data-index-in-node=\"179\">धन विधेयकों</strong> (अनुच्छेद 112) को पेश करने से पहले राष्ट्रपति की पूर्व सिफारिश की आवश्यकता होती है, और वह हर पांच साल में <strong data-path-to-node=\"5,5,0\" data-index-in-node=\"297\">वित्त आयोग</strong> की नियुक्ति के लिए जिम्मेदार है।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, 4, and 5 only B) 2, 3, 5, and 6 only C) 1, 3, 4, and 6 only D) All of the above (1, 2, 3, 4, 5, and 6)</p>",
    "comp": "",
    "options": [
      "<p>B</p>",
      "<p>D</p>",
      "<p>A</p>",
      "<p>C</p>"
    ],
    "correct_option_id": 1,
    "solution": "<p data-path-to-node=\"9\"><strong data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: D (All of the above)</strong></p>\n<ul data-path-to-node=\"10\">\n<li>\n<p data-path-to-node=\"10,0,0\"><strong data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Statement 1:</strong> Correct. Article 111 outlines these three paths. Money bills are excluded from being \"returned.\"</p>\n</li>\n<li>\n<p data-path-to-node=\"10,1,0\"><strong data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 2:</strong> Correct. \"The pocket of the Indian President is bigger than the US President\" because the US President must decide in 10 days.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,2,0\"><strong data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3:</strong> Correct. 24th CAA 1971 removed the President's discretion on Constitutional Amendments.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,3,0\"><strong data-path-to-node=\"10,3,0\" data-index-in-node=\"0\">Statement 4:</strong> Correct. This is the main difference between Indian and US Veto systems.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,4,0\"><strong data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">Statement 5:</strong> Correct. This is the <strong data-path-to-node=\"10,4,0\" data-index-in-node=\"34\">Advisory Jurisdiction</strong> of the SC. It's a two-way street: SC may refuse to advise, and President may refuse to follow.</p>\n</li>\n<li>\n<p data-path-to-node=\"10,5,0\"><strong data-path-to-node=\"10,5,0\" data-index-in-node=\"0\">Statement 6:</strong> Correct. These are the core financial duties, including laying CAG reports in Parliament.</p>\n</li>\n</ul>\n<h3 style=\"text-align: center;\" data-path-to-node=\"12\"><strong data-path-to-node=\"12\" data-index-in-node=\"0\">Cheat Sheet\" for Final Revision</strong></h3>\n<ul data-path-to-node=\"13\">\n<li>\n<p data-path-to-node=\"13,0,0\"><strong data-path-to-node=\"13,0,0\" data-index-in-node=\"0\">Absolute Veto:</strong> Ends the bill. Used for Private Member bills. (<strong data-path-to-node=\"13,0,0\" data-index-in-node=\"62\">पूर्ण वीटो:</strong> विधेयक समाप्त।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,1,0\"><strong data-path-to-node=\"13,1,0\" data-index-in-node=\"0\">Suspensive Veto:</strong> Parliament can override it with a simple majority. (<strong data-path-to-node=\"13,1,0\" data-index-in-node=\"69\">निलंबनकारी वीटो:</strong> साधारण बहुमत से संसद द्वारा रद्द।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,2,0\"><strong data-path-to-node=\"13,2,0\" data-index-in-node=\"0\">Pocket Veto:</strong> \"Sitting on the bill.\" No time limit. (<strong data-path-to-node=\"13,2,0\" data-index-in-node=\"52\">पॉकेट वीटो:</strong> कोई समय सीमा नहीं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,3,0\"><strong data-path-to-node=\"13,3,0\" data-index-in-node=\"0\">Article 112:</strong> Prior approval for Money Bills. (<strong data-path-to-node=\"13,3,0\" data-index-in-node=\"46\">अनुच्छेद 112:</strong> धन विधेयक हेतु पूर्व अनुमति।)</p>\n</li>\n<li>\n<p data-path-to-node=\"13,4,0\"><strong data-path-to-node=\"13,4,0\" data-index-in-node=\"0\">Article 143:</strong> Asking SC for help/advice. (<strong data-path-to-node=\"13,4,0\" data-index-in-node=\"41\">अनुच्छेद 143:</strong> सुप्रीम कोर्ट से सलाह।)</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"1\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"1\" data-index-in-node=\"0\">I. Power Regarding Bills &amp; Veto (Article 111)</strong></h3>\n<p data-path-to-node=\"2\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">When a bill is presented to the President, the following legal pathways exist:</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Aspect</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Action &amp; Result (English)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">क्रिया और परिणाम (हिंदी)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,0,0\" data-index-in-node=\"0\">Assent</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\">President signs; Bill becomes <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,1,0\" data-index-in-node=\"30\">Act</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\">राष्ट्रपति हस्ताक्षर करता है; विधेयक <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,1,2,0\" data-index-in-node=\"37\">अधिनियम</strong> बनता है।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,0,0\" data-index-in-node=\"0\">Withhold Assent</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\">President refuses; Bill <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,1,0\" data-index-in-node=\"24\">dies</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\">राष्ट्रपति मना कर देता है; विधेयक <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,2,2,0\" data-index-in-node=\"34\">समाप्त</strong> हो जाता है।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,0,0\" data-index-in-node=\"0\">Return Bill</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\">Returns for reconsideration (<strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,1,0\" data-index-in-node=\"29\">Non-Money Bill</strong>).</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\">पुनर्विचार के लिए वापस (केवल <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,3,2,0\" data-index-in-node=\"29\">साधारण विधेयक</strong>)।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,0,0\" data-index-in-node=\"0\">Repassed Bill</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\">Parliament passes it again; <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,1,0\" data-index-in-node=\"28\">Assent is mandatory</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,2,0\">संसद दोबारा पारित करती है; <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3,4,2,0\" data-index-in-node=\"27\">स्वीकृति अनिवार्य</strong> है।</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" data-index-in-node=\"0\">II. Classification of Veto Powers</strong></h3>\n<p data-path-to-node=\"6\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">The Indian President exercises three types of vetoes. The <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"58\">Qualified Veto</strong> (requiring a higher majority to override) is unique to the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\" data-index-in-node=\"132\">USA</strong> and does not exist in India.</p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Veto Type</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Mechanism (English)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">अर्थ (हिंदी)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Key Fact</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,0,0\" data-index-in-node=\"0\">Absolute Veto</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,1,0\">Complete rejection of the bill.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,2,0\">विधेयक को पूरी तरह खारिज करना।</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,1,3,0\">Used for Private Member Bills.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,0,0\" data-index-in-node=\"0\">Suspensive Veto</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,1,0\">Overridden by a <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,1,0\" data-index-in-node=\"16\">simple majority</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,2,0\">साधारण बहुमत द्वारा रद्द किया जा सकता है।</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,3,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,2,3,0\" data-index-in-node=\"0\">Cannot</strong> be used for Money Bills.</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,0,0\" data-index-in-node=\"0\">Pocket Veto</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,1,0\">Keeping the bill pending indefinitely.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,2,0\">विधेयक को अनिश्चित काल के लिए रोकना।</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"7,3,3,0\">No time limit in the Constitution.</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">III. Special Exceptions &amp; Limitations</strong></h3>\n<p data-path-to-node=\"10\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\">There are specific scenarios where the President's discretionary power is restricted:</p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,0,0\" data-index-in-node=\"0\">Constitutional Amendment Bills (24th CAA, 1971):</strong> The President <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,0,0\" data-index-in-node=\"63\">must</strong> give assent. No veto power is allowed.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,1,0\" data-index-in-node=\"0\">Money Bills:</strong> Can be accepted or rejected, but <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,1,0\" data-index-in-node=\"46\">never returned</strong> for reconsideration (since they are introduced with his prior recommendation).</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"11,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11,2,0\" data-index-in-node=\"0\">State Legislation:</strong> The President can withhold assent or return state bills (reserved by the Governor) indefinitely; there is no obligation to sign even if repassed by the State Legislature.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\" data-index-in-node=\"0\">IV. Financial &amp; Judicial Powers</strong></h3>\n<h4 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"14\" data-index-in-node=\"0\">A. Financial Powers</strong></h4>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,0,0\" data-index-in-node=\"0\">Money Bills (Article 112):</strong> Requires prior recommendation of the President before introduction in Lok Sabha.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0\" data-index-in-node=\"0\">Finance Commission:</strong> Appointed every <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,1,0\" data-index-in-node=\"36\">5 years</strong> to recommend tax distribution.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"15,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"0\">Audit Reports:</strong> Causes the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"15,2,0\" data-index-in-node=\"26\">CAG reports</strong> to be laid before each House of Parliament.</p>\n</li>\n</ul>\n<h4 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"16\" data-index-in-node=\"0\">B. Judicial Powers</strong></h4>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"17,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,0,0\" data-index-in-node=\"0\">Appointments:</strong> Appoints the Chief Justice of India (CJI) and Judges of the SC/HC.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"17,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,1,0\" data-index-in-node=\"0\">Advisory Jurisdiction (Article 143):</strong> Can seek the Supreme Court's opinion on law/fact.</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,1,1\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"17,1,1,0,0\" style=\"line-height: 1.15 !important;\"><em style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"17,1,1,0,0\" data-index-in-node=\"0\">Note:</em> The SC is not bound to give an opinion, and the President is not bound to follow it.</p>\n</li>\n</ul>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"18\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"19\" data-index-in-node=\"0\">🔥 EXAM ONE-LINERS (Bilingual)</strong></h3>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"20\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Pocket Veto Example: First used by Giani Zail Singh (1986) for the Post Office Bill.</p>\n<p style=\"line-height: 1.15 !important;\">(ज्ञानी जैल सिंह ने 1986 में डाकघर विधेयक के लिए पहली बार पॉकेट वीटो का उपयोग किया।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 111: The source of the President's power regarding bills.</p>\n<p style=\"line-height: 1.15 !important;\">(विधेयकों के संबंध में राष्ट्रपति की शक्ति का स्रोत।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Salary: Fixed at ₹5 Lakh/month (Non-taxable).</p>\n<p style=\"line-height: 1.15 !important;\">(वेतन ₹5 लाख प्रति माह निर्धारित है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 143: Advisory power; Supreme Court's advice is NOT binding.</p>\n<p style=\"line-height: 1.15 !important;\">(परामर्श शक्ति; सुप्रीम कोर्ट की सलाह बाध्यकारी नहीं है।)</p>\n</li>\n</ul>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the powers of the President of India:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"82\">(भारत के राष्ट्रपति की शक्तियों के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">Under <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"6\">Article 72</strong>, the President can grant a <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"44\">Pardon</strong>, which completely absolves the offender of both the punishment and the guilt. (अनुच्छेद 72 के तहत, राष्ट्रपति <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"161\">क्षमा (Pardon)</strong> प्रदान कर सकता है, जो अपराधी को सजा और अपराधबोध दोनों से पूरी तरह मुक्त कर देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\"><strong data-path-to-node=\"5,1,0\" data-index-in-node=\"0\">Commutation</strong> involves reducing the amount of sentence without changing its nature (e.g., 5 years to 2 years), while <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"115\">Remission</strong> involves substituting one form of punishment for a lighter one (e.g., death sentence to life imprisonment). ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"235\">लघुकरण (Commutation)</strong> में सजा की प्रकृति बदले बिना उसकी अवधि कम करना शामिल है, जबकि <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"318\">परिहार (Remission)</strong> में सजा के एक रूप को हल्के रूप में बदलना शामिल है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Respite</strong> is the power to award a lesser sentence on special grounds, such as the pregnancy of a woman offender, whereas <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"119\">Reprieve</strong> implies a temporary stay on the execution of a sentence (especially death) to allow time for seeking a pardon. ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"241\">विराम (Respite)</strong> विशेष आधारों पर कम सजा देने की शक्ति है, जबकि <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"303\">प्रविलम्बन (Reprieve)</strong> का अर्थ है सजा (विशेषकर मृत्युदंड) के निष्पादन पर अस्थायी रोक लगाना।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The President exercises his pardoning power on the <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"51\">advice of the Union Cabinet</strong>, and while he may examine evidence afresh, his decision is generally not subject to judicial review unless it is arbitrary or malafide. (राष्ट्रपति <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"227\">केंद्रीय कैबिनेट की सलाह</strong> पर अपनी क्षमादान शक्ति का प्रयोग करता है, और वह साक्ष्यों की नए सिरे से जांच कर सकता है, लेकिन उसका निर्णय आमतौर पर न्यायिक समीक्षा के अधीन नहीं होता जब तक कि वह मनमाना या दुर्भावनापूर्ण न हो।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\">As the <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"7\">Supreme Commander</strong> of the defense forces under <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"53\">Article 53(2)</strong>, the President can declare war and conclude peace, and all international treaties are negotiated and concluded in his/her name. (अनुच्छेद 53(2) के तहत रक्षा बलों के <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"232\">सर्वोच्च कमांडर</strong> के रूप में, राष्ट्रपति युद्ध की घोषणा और शांति की स्थापना कर सकता है, और सभी अंतर्राष्ट्रीय संधियाँ उसके नाम पर संपन्न की जाती हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 3, 4, and 5 only B) 2, 4, and 5 only C) 1, 2, and 3 only D) All of the above</p>",

    "solution": "<p data-path-to-node=\"9\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: A (1, 3, 4, and 5 only)</strong></p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\">\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,0,0\" data-index-in-node=\"0\">Statement 1 is Correct:</strong> Pardon = Zero guilt + Zero punishment.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,0\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,0\" data-index-in-node=\"0\">Statement 2 is INCORRECT (Trap!):</strong> The definitions are swapped.</p>\n<ul style=\"padding-inline-start: 32px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1\">\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,1,0,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,0,0\" data-index-in-node=\"0\">Remission (परिहार):</strong> Changing the <strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,0,0\" data-index-in-node=\"33\">amount/time</strong> (7 years &rarr; 3 years) but nature stays same.</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,1,1,1,0\" style=\"line-height: 1.15 !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,1,0\" data-index-in-node=\"0\">Commutation (लघुकरण):</strong><span style=\"font-family: Google Sans Text, sans-serif;\"> Changing the </span><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,1,1,1,0\" data-index-in-node=\"35\">nature/character</strong><span style=\"font-family: Google Sans Text, sans-serif;\"> ((Rigorous &rarr; Simple OR Death &rarr; Life)</span></p>\n</li>\n</ul>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,2,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,2,0\" data-index-in-node=\"0\">Statement 3 is Correct:</strong> Respite is for special conditions (pregnancy/disability). Reprieve is a \"stay\" (usually for death penalty).</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,3,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,3,0\" data-index-in-node=\"0\">Statement 4 is Correct:</strong> Per Supreme Court rulings, the President is not a \"Court of Appeal\" but can look at facts differently.</p>\n</li>\n<li style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<p data-path-to-node=\"10,4,0\" style=\"line-height: 1.15 !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10,4,0\" data-index-in-node=\"0\">Statement 5 is Correct:</strong> Highlights both Military and Diplomatic powers.</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\" data-index-in-node=\"0\">🚀 The \"Power Vocabulary\"&nbsp;</strong></h3>\n<p data-path-to-node=\"14\" style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important;\"></p>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13\">\n<thead style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Term (शब्दावली)</strong></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Simple Meaning (English)</strong></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">सरल अर्थ (हिंदी)</strong></td>\n</tr>\n</thead>\n<tbody style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,0,0\" data-index-in-node=\"0\">Pardon</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,1,0\">100% Free.</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,1,2,0\">पूर्ण क्षमा।</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: ' \"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,1,0\">Time change (Long to Short).</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,3,2,0\">समय में कमी (प्रकृति वही रहेगी)।</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,0,0\" data-index-in-node=\"0\">Respite</strong></span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,1,0\">Special ground (Pregnancy).</span></td>\n<td style=\"border: 1px solid; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"13,4,2,0\">विशेष कारण से कम सजा।</span></td>\n</tr>\n<tr style=\"font-family: 'Google Sans Text', sans-serif !important; line-heigh     "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Emergency Provisions in the Indian Constitution:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"97\">(भारतीय संविधान में आपातकालीन प्रावधानों के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">A <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"2\">National Emergency (Article 352)</strong> can be declared on the grounds of War, External Aggression, or Armed Rebellion, and it must be approved by both Houses of Parliament within <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"175\">one month</strong> by a two-thirds majority of members present and voting. ( <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"243\">राष्ट्रीय आपातकाल (अनुच्छेद 352)</strong> युद्ध, बाहरी आक्रमण या सशस्त्र विद्रोह के आधार पर घोषित किया जा सकता है, और इसे <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"356\">एक महीने</strong> के भीतर संसद के दोनों सदनों द्वारा उपस्थित और मतदान करने वाले दो-तिहाई सदस्यों के बहुमत से अनुमोदित किया जाना चाहिए।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Under <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"6\">Article 356</strong> (President&rsquo;s Rule), the President can take over a State's administration due to the failure of constitutional machinery; it ordinarily lasts for 6 months and cannot exceed a total of <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"201\">3 years</strong> under any circumstances. ( <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"236\">अनुच्छेद 356</strong> (राष्ट्रपति शासन) के तहत, संवैधानिक तंत्र की विफलता के कारण राष्ट्रपति राज्य का प्रशासन संभाल सकता है; यह साधारणतया 6 महीने तक रहता है और किसी भी परिस्थिति में कुल <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"413\">3 वर्ष</strong> से अधिक नहीं हो सकता।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Article 360</strong> provides for a <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"27\">Financial Emergency</strong> if the financial stability of India is threatened; unlike the other two types, a Financial Emergency has never been declared in India to date. ( <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"192\">अनुच्छेद 360</strong> वित्तीय आपातकाल का प्रावधान करता है यदि भारत की वित्तीय स्थिरता को खतरा हो; अन्य दो प्रकारों के विपरीत, भारत में आज तक कभी भी वित्तीय आपातकाल घोषित नहीं किया गया है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">During a National Emergency, <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"29\">Article 358</strong> automatically suspends the fundamental rights under <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"93\">Article 19</strong>, while <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"111\">Article 359</strong> allows the President to suspend the enforcement of other fundamental rights (except Articles 20 and 21). (राष्ट्रीय आपातकाल के दौरान, <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"257\">अनुच्छेद 358</strong> स्वतः ही <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"279\">अनुच्छेद 19</strong> के तहत मौलिक अधिकारों को निलंबित कर देता है, जबकि <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"341\">अनुच्छेद 359</strong> राष्ट्रपति को अन्य मौलिक अधिकारों (अनुच्छेद 20 और 21 को छोड़कर) के प्रवर्तन को निलंबित करने की अनुमति देता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,4,0\"><strong data-path-to-node=\"5,4,0\" data-index-in-node=\"0\">Article 355</strong> imposes a duty on the Union to protect States against external aggression and internal disturbance, ensuring that the government of every State is carried on in accordance with the Constitution. ( <strong data-path-to-node=\"5,4,0\" data-index-in-node=\"209\">अनुच्छेद 355</strong> संघ पर बाहरी आक्रमण और आंतरिक अशांति से राज्यों की रक्षा करने का कर्तव्य लगाता है, यह सुनिश्चित करते हुए कि प्रत्येक राज्य की सरकार संविधान के अनुसार चलाई जाए।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 3, and 4 only B) 2, 4, and 5 only C) 1, 3, 4, and 5 only D) All of the above (1, 2, 3, 4, and 5)</p>",

    "solution": "<p data-path-to-node=\"9\"><strong data-path-to-node=\"9\" data-index-in-node=\"0\">Correct Option: C (1, 3, 4, and 5 only)</strong></p>\n<p style=\"text-align: center;\"><strong style=\"font-size: 16px; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"2\" data-index-in-node=\"0\">Detailed Analysis (विस्तृत विश्लेषण)</strong></p>\n<ul style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"3\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Statement 1 (Article 352): Correct. It requires Special Majority (2/3rd) and approval within 1 month.</p>\n<p style=\"line-height: 1.15 !important;\">(सही। इसके लिए विशेष बहुमत और 1 महीने के भीतर अनुमोदन आवश्यक है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Statement 2 (Article 356): INCORRECT. While the absolute maximum is 3 years, it cannot be extended beyond 1 year unless two conditions are met: (A) National Emergency is active, or (B) Election Commission says elections are not possible.</p>\n<p style=\"line-height: 1.15 !important;\">(गलत। हालांकि अधिकतम सीमा 3 वर्ष है, इसे 1 वर्ष से अधिक तब तक नहीं बढ़ाया जा सकता जब तक: (A) राष्ट्रीय आपातकाल लागू न हो, या (B) चुनाव आयोग यह न कहे कि चुनाव संभव नहीं हैं।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Statement 3 (Article 360): Correct. India has never used this.</p>\n<p style=\"line-height: 1.15 !important;\">(सही। भारत ने इसका उपयोग कभी नहीं किया है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Statement 4 (Art 358 vs 359): Correct. Art 358 deals with Article 19 (Automatic suspension), while Art 359 is for other rights (by Order).</p>\n<p style=\"line-height: 1.15 !important;\">(सही। अनु. 358 अनुच्छेद 19 (स्वचालित निलंबन) से संबंधित है, जबकि अनु. 359 अन्य अधिकारों के लिए है।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Statement 5 (Article 355): Correct. It is the Union's duty to protect states.</p>\n<p style=\"line-height: 1.15 !important;\">(सही। यह राज्यों की रक्षा करने का संघ का कर्तव्य है।)</p>\n</li>\n</ul>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"4\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"5\" data-index-in-node=\"0\">🚀 Quick Revision \"Emergency\"&nbsp;</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Feature (विशेषता)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">National (राष्ट्रीय)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">State (राज्य/राष्ट्रपति शासन)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Financial (वित्तीय)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,0,0\" data-index-in-node=\"0\">Article (अनुच्छेद)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,1,0\" data-index-in-node=\"0\">352</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,2,0\" data-index-in-node=\"0\">356</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,3,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"6,1,3,0\" data-index-in-node=\"0\">360</strong></span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style     "question": "<p data-path-to-node=\"3\"><strong data-path-to-node=\"3\" data-index-in-node=\"0\">Consider the following statements regarding the discretionary powers and the historical office-holders of the President of India:</strong> <strong data-path-to-node=\"3\" data-index-in-node=\"130\">(भारत के राष्ट्रपति की विवेकाधीन शक्तियों और ऐतिहासिक पदाधिकारियों के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"4\">\n<li>\n<p data-path-to-node=\"4,0,0\">Although the <strong data-path-to-node=\"4,0,0\" data-index-in-node=\"13\">42nd Amendment (1976)</strong> made it mandatory for the President to act on ministerial advice, the President can still exercise <strong data-path-to-node=\"4,0,0\" data-index-in-node=\"134\">situational discretion</strong> in appointing a Prime Minister when no party has a clear majority in the Lok Sabha. (हालांकि <strong data-path-to-node=\"4,0,0\" data-index-in-node=\"250\">42वें संशोधन (1976)</strong> ने राष्ट्रपति के लिए मंत्री स्तर की सलाह पर कार्य करना अनिवार्य बना दिया, फिर भी राष्ट्रपति लोकसभा में किसी भी दल के पास स्पष्ट बहुमत न होने पर प्रधानमंत्री की नियुक्ति में <strong data-path-to-node=\"4,0,0\" data-index-in-node=\"443\">'परिस्थितिजन्य विवेक'</strong> का उपयोग कर सकते हैं।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,1,0\">The President has the discretion to <strong data-path-to-node=\"4,1,0\" data-index-in-node=\"36\">return the advice</strong> of the Council of Ministers once for reconsideration and can also return a non-money bill passed by Parliament once (<strong data-path-to-node=\"4,1,0\" data-index-in-node=\"171\">Suspensive Veto</strong>). (राष्ट्रपति के पास मंत्रिपरिषद की <strong data-path-to-node=\"4,1,0\" data-index-in-node=\"223\">सलाह को एक बार पुनर्विचार के लिए वापस भेजने</strong> का विवेक है और वे संसद द्वारा पारित गैर-धन विधेयक को भी एक बार वापस भेज सकते हैं (<strong data-path-to-node=\"4,1,0\" data-index-in-node=\"349\">निलंबनकारी वीटो</strong>)।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,2,0\"><strong data-path-to-node=\"4,2,0\" data-index-in-node=\"0\">Dr. Zakir Hussain</strong> was the first Muslim President and the first to die in office, while <strong data-path-to-node=\"4,2,0\" data-index-in-node=\"87\">Justice M. Hidayatullah</strong> is the only person to have served as the Chief Justice of India and an Acting President of India. ( <strong data-path-to-node=\"4,2,0\" data-index-in-node=\"211\">डॉ. जाकिर हुसैन</strong> पहले मुस्लिम राष्ट्रपति और पद पर रहते हुए मरने वाले पहले व्यक्ति थे, जबकि <strong data-path-to-node=\"4,2,0\" data-index-in-node=\"301\">न्यायमूर्ति एम. हिदायतुल्ला</strong> एकमात्र व्यक्ति हैं जिन्होंने भारत के मुख्य न्यायाधीश और भारत के कार्यवाहक राष्ट्रपति के रूप में कार्य किया है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,3,0\"><strong data-path-to-node=\"4,3,0\" data-index-in-node=\"0\">Neelam Sanjeeva Reddy</strong> is the only President to be elected unopposed, whereas <strong data-path-to-node=\"4,3,0\" data-index-in-node=\"77\">K.R. Narayanan</strong> was the first Dalit President of India. ( <strong data-path-to-node=\"4,3,0\" data-index-in-node=\"134\">नीलम संजीव रेड्डी</strong> निर्विरोध चुने जाने वाले एकमात्र राष्ट्रपति हैं, जबकि <strong data-path-to-node=\"4,3,0\" data-index-in-node=\"206\">के.आर. नारायणन</strong> भारत के पहले दलित राष्ट्रपति थे।)</p>\n</li>\n<li>\n<p data-path-to-node=\"4,4,0\"><strong data-path-to-node=\"4,4,0\" data-index-in-node=\"0\">Smt. Droupadi Murmu</strong>, the 15th President, holds multiple records: she is the first tribal President, the first President born in independent India, and the youngest person to hold the office. (15वीं राष्ट्रपति <strong data-path-to-node=\"4,4,0\" data-index-in-node=\"209\">श्रीमती द्रौपदी मुर्मू</strong> के नाम कई रिकॉर्ड हैं: वह पहली आदिवासी राष्ट्रपति हैं, स्वतंत्र भारत में पैदा होने वाली पहली राष्ट्रपति हैं और इस पद को धारण करने वाली सबसे कम उम्र की व्यक्ति हैं।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"5\"><strong data-path-to-node=\"5\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1, 2, 4, and 5 only B) 2, 3, and 5 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, 4, and 5)</p>",

 incumbent, Smt. Droupadi Murmu.</p>\n</li>\n</ul>\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"11\" data-index-in-node=\"0\">&nbsp;\"Firsts\" and \"Shortcuts\" for President History</strong></h3>\n<table style=\"margin-bottom: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12\">\n<thead style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Record (रिकॉर्ड)</strong></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important; margin-bottom: 0px !important;\">Personality (व्यक्तित्व)</strong></td>\n</tr>\n</thead>\n<tbody style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,0,0\" data-index-in-node=\"0\">Longest Tenure (सबसे लंबा कार्यकाल)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"12,1,1,0\ ht: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,1,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,1,0\" data-index-in-node=\"0\">Financial Emergency</strong>.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,2,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,3,2,0\" data-index-in-node=\"0\">वित्तीय आपातकाल</strong>।</span></td>\n</tr>\n<tr style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,0,0\"><strong style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,0,0\" data-index-in-node=\"0\">361 (1)</strong></span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,1,0\">Not answerable to any court for exercise of duties.</span></td>\n<td style=\"border: 1px solid; line-height: 1.15 !important; margin-top: 0px !important;\"><span style=\"line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"8,4,2,0\">कर्तव्यों के पालन के लिए किसी भी अदालत के प्रति जवाबदेह नहीं।</span></td>\n</tr>\n</tbody>\n</table>\n<hr style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"9\" />\n<h3 style=\"font-family: 'Google Sans', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\"><strong style=\"font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" data-path-to-node=\"10\" data-index-in-node=\"0\">🔥 CRUCIAL \"TRAP\" CLAUSES FOR EXAMS</strong></h3>\n<ol style=\"padding-inline-start: 32px; font-family: 'Google Sans Text', sans-serif !important; line-height: 1.15 !important; margin-top: 0px !important;\" start=\"1\" data-path-to-node=\"11\">\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 56(1)(a): The President gives resignation to the Vice-President, but the VP must immediately inform the Speaker of Lok Sabha.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 56(1)(a): राष्ट्रपति अपना इस्तीफा उपराष्ट्रपति को देते हैं, लेकिन उपराष्ट्रपति को इसकी सूचना तुरंत लोकसभा अध्यक्ष को देनी चाहिए।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 111: The President cannot return a Money Bill for reconsideration.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 111: राष्ट्रपति पुनर्विचार के लिए धन विधेयक (Money Bill) को वापस नहीं कर सकते।)</p>\n</li>\n<li style=\"line-height: 1.15 !important; margin-top: 0px !important;\">\n<p style=\"line-height: 1.15 !important;\">Article 123: An Ordinance must be approved by Parliament within 6 weeks of reassembly.</p>\n<p style=\"line-height: 1.15 !important;\">(अनुच्छेद 123: अध्यादेश को संसद के पुन: समवेत होने के 6 सप्ताह के भीतर अनुमोदित किया जाना चाहिए।)</p>\n</li>\n</ol>",

    "question": "<p data-path-to-node=\"4\"><strong data-path-to-node=\"4\" data-index-in-node=\"0\">Consider the following statements regarding the Council of Ministers (CoM) and the President:</strong> <strong data-path-to-node=\"4\" data-index-in-node=\"94\">(मंत्रिपरिषद और राष्ट्रपति के संबंध में निम्नलिखित कथनों पर विचार करें:)</strong></p>\n<ol start=\"1\" data-path-to-node=\"5\">\n<li>\n<p data-path-to-node=\"5,0,0\">According to <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"13\">Article 74</strong>, the President is bound by the advice of the CoM; however, the <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"87\">44th Amendment Act (1978)</strong> allowed the President to return advice once for reconsideration. (अनुच्छेद 74 के अनुसार, राष्ट्रपति मंत्रिपरिषद की सलाह मानने के लिए बाध्य है; हालाँकि, <strong data-path-to-node=\"5,0,0\" data-index-in-node=\"265\">44वें संशोधन अधिनियम (1978)</strong> ने राष्ट्रपति को एक बार पुनर्विचार के लिए सलाह वापस भेजने की अनुमति दी।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,1,0\">Under <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"6\">Article 75</strong>, the Prime Minister is appointed by the President, but the Minister holds office during the <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"109\">pleasure of the President</strong>, which is practically linked to majority support in the Lok Sabha. (अनुच्छेद 75 के तहत, प्रधानमंत्री की नियुक्ति राष्ट्रपति द्वारा की जाती है, लेकिन मंत्री <strong data-path-to-node=\"5,1,0\" data-index-in-node=\"291\">राष्ट्रपति के प्रसादपर्यन्त</strong> पद धारण करते हैं, जो व्यावहारिक रूप से लोकसभा में बहुमत के समर्थन से जुड़ा होता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,2,0\"><strong data-path-to-node=\"5,2,0\" data-index-in-node=\"0\">Article 163</strong> mirrors the Union provisions for the State Government, establishing a Council of Ministers headed by the <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"117\">Chief Minister</strong> to aid and advise the Governor. (अनुच्छेद 163 राज्य सरकार के लिए केंद्रीय प्रावधानों को दर्शाता है, जो राज्यपाल को सहायता और सलाह देने के लिए <strong data-path-to-node=\"5,2,0\" data-index-in-node=\"274\">मुख्यमंत्री</strong> की अध्यक्षता में एक मंत्रिपरिषद की स्थापना करता है।)</p>\n</li>\n<li>\n<p data-path-to-node=\"5,3,0\">The Constitution explicitly states that the question of whether any, and if so what, advice was tendered by Ministers to the President <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"135\">cannot be inquired into by any court</strong>. (संविधान स्पष्ट रूप से कहता है कि क्या मंत्रियों द्वारा राष्ट्रपति को कोई सलाह दी गई थी, और यदि दी गई थी तो क्या दी गई थी, इसकी <strong data-path-to-node=\"5,3,0\" data-index-in-node=\"301\">किसी भी अदालत द्वारा जांच नहीं की जा सकती</strong>।)</p>\n</li>\n</ol>\n<p data-path-to-node=\"6\"><strong data-path-to-node=\"6\" data-index-in-node=\"0\">Which of the statements given above are CORRECT? / उपर्युक्त में से कौन से कथन सही हैं?</strong> A) 1 and 2 only B) 2 and 3 only C) 1, 3, and 4 only D) All of the above (1, 2, 3, and 4)</p>",

    "solution": "<h2 data-start=\"890\" data-end=\"947\"><strong data-start=\"893\" data-end=\"947\">Article 75 &ndash; Prime Minister &amp; Council of Ministers</strong></h2>\n<h3 data-start=\"949\" data-end=\"971\"><strong data-start=\"953\" data-end=\"971\">Prime Minister</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"973\" data-end=\"1388\">\n<thead data-start=\"973\" data-end=\"1001\">\n<tr data-start=\"973\" data-end=\"1001\">\n<th data-start=\"973\" data-end=\"982\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"982\" data-end=\"992\" data-col-size=\"md\">English</th>\n<th data-start=\"992\" data-end=\"1001\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"1028\" data-end=\"1388\">\n<tr data-start=\"1028\" data-end=\"1096\">\n<td data-start=\"1028\" data-end=\"1042\" data-col-size=\"sm\">Appointment</td>\n<td data-col-size=\"md\" data-start=\"1042\" data-end=\"1067\">Appointed by President</td>\n<td data-col-size=\"sm\" data-start=\"1067\" data-end=\"1096\">राष्ट्रपति द्वारा नियुक्त</td>\n</tr>\n<tr data-start=\"1097\" data-end=\"1160\">\n<td data-start=\"1097\" data-end=\"1108\" data-col-size=\"sm\">Majority</td>\n<td data-col-size=\"md\" data-start=\"1108\" data-end=\"1133\">Must enjoy LS majority</td>\n<td data-col-size=\"sm\" data-start=\"1133\" data-end=\"1160\">लोकसभा में बहुमत आवश्यक</td>\n</tr>\n<tr data-start=\"1161\" data-end=\"1202\">\n<td data-start=\"1161\" data-end=\"1169\" data-col-size=\"sm\">House</td>\n<td data-col-size=\"md\" data-start=\"1169\" data-end=\"1180\">LS or RS</td>\n<td data-col-size=\"sm\" data-start=\"1180\" data-end=\"1202\">लोकसभा या राज्यसभा</td>\n</tr>\n<tr data-start=\"1203\" data-end=\"1288\">\n<td data-start=\"1203\" data-end=\"1216\" data-col-size=\"sm\">Non-Member</td>\n<td data-col-size=\"md\" data-start=\"1216\" data-end=\"1251\">Must get elected within 6 months</td>\n<td data-col-size=\"sm\" data-start=\"1251\" data-end=\"1288\">6 माह में निर्वाचित होना अनिवार्य</td>\n</tr>\n<tr data-start=\"1289\" data-end=\"1388\">\n<td data-start=\"1289\" data-end=\"1298\" data-col-size=\"sm\">Tenure</td>\n<td data-col-size=\"md\" data-start=\"1298\" data-end=\"1346\">Pleasure of President (linked to LS majority)</td>\n<td data-col-size=\"sm\" data-start=\"1346\" data-end=\"1388\">राष्ट्रपति की इच्छा, LS बहुमत से जुड़ा</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<h3 data-start=\"1390\" data-end=\"1418\"><strong data-start=\"1394\" data-end=\"1418\">Council of Ministers</strong></h3>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"1420\" data-end=\"1809\">\n<thead data-start=\"1420\" data-end=\"1448\">\n<tr data-start=\"1420\" data-end=\"1448\">\n<th data-start=\"1420\" data-end=\"1429\" data-col-size=\"sm\">Aspect</th>\n<th data-start=\"1429\" data-end=\"1439\" data-col-size=\"sm\">English</th>\n<th data-start=\"1439\" data-end=\"1448\" data-col-size=\"sm\">हिंदी</th>\n</tr>\n</thead>\n<tbody data-start=\"1475\" data-end=\"1809\">\n<tr data-start=\"1475\" data-end=\"1524\">\n<td data-start=\"1475\" data-end=\"1489\" data-col-size=\"sm\">Appointment</td>\n<td data-col-size=\"sm\" data-start=\"1489\" data-end=\"1507\">On advice of PM</td>\n<td data-col-size=\"sm\" data-start=\"1507\" data-end=\"1524\">PM की सलाह पर</td>\n</tr>\n<tr data-start=\"1525\" data-end=\"1573\">\n<td data-start=\"1525\" data-end=\"1538\" data-col-size=\"sm\">Membership</td>\n<td data-col-size=\"sm\" data-start=\"1538\" data-end=\"1554\">MPs generally</td>\n<td data-col-size=\"sm\" data-start=\"1554\" data-end=\"1573\">सामान्यतः सांसद</td>\n</tr>\n<tr data-start=\"1574\" data-end=\"1631\">\n<td data-start=\"1574\" data-end=\"1583\" data-col-size=\"sm\">Non-MP</td>\n<td data-col-size=\"sm\" data-start=\"1583\" data-end=\"1609\">Allowed (6 months rule)</td>\n<td data-col-size=\"sm\" data-start=\"1609\" data-end=\"1631\">अनुमत (6 माह नियम)</td>\n</tr>\n<tr data-start=\"1632\" data-end=\"1715\">\n<td data-start=\"1632\" data-end=\"1660\" data-col-size=\"sm\">Collective Responsibility</td>\n<td data-col-size=\"sm\" data-start=\"1660\" data-end=\"1675\">To Lok Sabha</td>\n<td data-col-size=\"sm\" data-start=\"1675\" data-end=\"1715\">लोकसभा के प्रति सामूहिक उत्तरदायित्व</td>\n</tr>\n<tr data-start=\"1716\" data-end=\"1809\">\n<td data-start=\"1716\" data-end=\"1744\" data-col-size=\"sm\">Individual Responsibility</td>\n<td data-col-size=\"sm\" data-start=\"1744\" data-end=\"1765\">For own department</td>\n<td data-col-size=\"sm\" data-start=\"1765\" data-end=\"1809\">अपने विभाग के लिए व्यक्तिगत उत्तरदायित्व</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>\n<hr data-start=\"1811\" data-end=\"1814\" />\n<h2 data-start=\"1816\" data-end=\"1845\"><strong data-start=\"1819\" data-end=\"1845\">Oath of PM &amp; Ministers</strong></h2>\n<p data-start=\"1847\" data-end=\"2071\">| Administered by | President | राष्ट्रपति |<br />| Swear to uphold | Constitution, Sovereignty &amp; Integrity | संविधान, संप्रभुता व अखंडता |<br />| Duty | Without fear, favour, affection or ill-will | भय, पक्षपात, स्नेह या द्वेष बिना |</p>\n<hr data-start=\"2073\" data-end=\"2076\" />\n<h2 data-start=\"2078\" data-end=\"2091\"><strong data-start=\"2081\" data-end=\"2091\">Salary</strong></h2>\n<p></p>\n<div class=\"TyagGW_tableContainer\">\n<div class=\"group TyagGW_tableWrapper flex w-fit flex-col-reverse\">\n<table class=\"w-fit min-w-(--thread-content-width)\" data-start=\"2093\" data-end=\"2190\">\n<thead data-start=\"2093\" data-end=\"2110\">\n<tr data-start=\"2093\" data-end=\"2110\">\n<th data-start=\"2093\" data-end=\"2100\" data-col-size=\"sm\">Post</th>\n<th data-start=\"2100\" data-end=\"2110\" data-col-size=\"sm\">Salary</th>\n</tr>\n</thead>\n<tbody data-start=\"2127\" data-end=\"2190\">\n<tr data-start=\"2127\" data-end=\"2163\">\n<td data-start=\"2127\" data-end=\"2144\" data-col-size=\"sm\">Prime Minister</td>\n<td data-start=\"2144\" data-end=\"2163\" data-col-size=\"sm\">₹1.6 lakh/month</td>\n</tr>\n<tr data-start=\"2164\" data-end=\"2190\">\n<td data-start=\"2164\" data-end=\"2176\" data-col-size=\"sm\">Ministers</td>\n<td data-start=\"2176\" data-end=\"2190\" data-col-size=\"sm\">Same as MP</td>\n</tr>\n</tbody>\n</table>\n</div>\n</div>",

      "<p>&nbsp;A person who is not a member of either House of Parliament can be appointed as a Minister, provided they get elected to either House within <strong data-path-to-node=\"12\" data-index-in-node=\"143\">six months</strong>.</p>\n<p>(एक व्यक्ति जो संसद के किसी भी सदन का सदस्य नहीं है, उसे मंत्री के रूप में नियुक्त किया जा सकता है, बशर्ते वह <strong data-path-to-node=\"12\" data-index-in-node=\"265\">छह महीने</strong> के भीतर किसी भी सदन के लिए निर्वाचित हो जाए।)</p>",
      "<p>&nbsp;The total salary of the Prime Minister is approximately&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"379\">₹1.6 lakh per month</strong>, which is determined by the Parliament.</p>\n<p>(प्रधानमंत्री का कुल वेतन लगभग&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"470\">₹1.6 लाख प्रति माह</strong>&nbsp;है, जो संसद द्वारा निर्धारित किया जाता है।)</p>",
      "<p>The Council of Ministers is&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"564\">individually responsible</strong>&nbsp;to the Lok Sabha and&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"610\">collectively responsible</strong>&nbsp;to the President.</p>\n<p>(मंत्रिपरिषद लोकसभा के प्रति&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"682\">व्यक्तिगत रूप से उत्तरदायी</strong>&nbsp;है और राष्ट्रपति के प्रति&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"735\">सामूहिक रूप से उत्तरदायी</strong>&nbsp;है।)</p>",
      "<p>To be eligible for the post of PM, a person must be a citizen of India and at least&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"852\">25 years old</strong>&nbsp;if they are a member of the Lok Sabha. (प्रधानमंत्री पद के लिए पात्र होने के लिए, एक व्यक्ति को भारत का नागरिक होना चाहिए और यदि वह लोकसभा का सदस्य है तो उसकी आयु कम से कम&nbsp;<strong data-path-to-node=\"12\" data-index-in-node=\"1037\">25 वर्ष</strong>&nbsp;होनी चाहिए।)</p>"
    ],
